body:
  text: 禮書綱目卷五十五婺源江永撰月令附吕氏春秋十二月紀淮南子時則訓通典唐月令通禮四補鄭目録云名曰月令者以其記十二月政之所行也本呂氏春秋十二月紀之首章也以禮家好事抄合之後人因題之名曰禮記言周公所作其中官名時事多不合周法此於别録屬明堂隂陽記孟春之月日在營室昏參中旦尾中孟長也日月之行一歲十二㑹聖王因其㑹而分之以為大數焉觀斗所建命其四時此云孟春者日月㑹於娵訾而斗建寅之辰也凡記昏明中星者為人君南靣而聽天下視時候以授人事唐淮南子時則訓篇無日在營室字有招搖指寅字本作正月之節日在虛昏昴中曉心中斗建寅位之初其日甲乙乙之言軋也日之行春東從青道發生萬物月為之佐時萬物皆解孚甲自抽軋而出因以為日名焉乙不為月名者君統臣功也淮此上有其位東方下有盛德在木字其帝大皥其神句芒此蒼精之君木官之臣自古以來著德立功者也大皥宓戲氏句芒少皥氏之子曰重為木官淮無此二句其蟲鱗象物孚甲將解鱗龍蛇之屬其音角謂樂器之聲也三分羽益一以生角角數六十四屬木者以其清濁中民象也春氣和則角聲調樂記曰角亂則憂其民怨几聲尊卑取象五行數多者濁數少者清大不過宮細不過羽律中大蔟律候氣之管以銅為之中猶應也孟春氣至則大益蔟之律應應謂吹灰也大蔟者林鍾之所生三分一律長八寸凡律空圍九分周語曰大蔟所以金奏贊陽出滯其數八數者五行佐天地生物成物之次也易曰天一地二天三地四天五地六天七地八天九地十而五行自水始火次之木次之金次之土為後木生數三成數八但言八者舉其成數唐此下有其性仁其事貌字其味酸其臭羶木之味臭也凡酸羶者皆屬焉其祀户祭先脾春陽氣出祀之於户內陽也祀之先祭脾者春為陽中於藏直脾脾為尊凡祭五祀於廟用特牲有主有尸皆先設席於奧祀户之禮南靣設主於户內之西乃制脾及腎為俎奠於主北又設盛於俎西祭黍稷祭肉祭醴皆三祭肉脾一腎再既祭徹之更陳鼎俎設饌於筵前迎尸略如祭宗廟之儀東風解凍蟄蟲始振魚上冰獺祭魚鴻鴈來皆記時候也振動也夏小正正月啓蟄魚陟負冰漢始亦以驚蟄為正月中此時魚肥美獺將食之先以祭也鴈自南方來將北反其居今月令鴻皆為候字呂氏春秋及淮鴻鴈來皆作候鴈北淮振下有蘇上下有負字魚唐云立春之日東風解凍後五日蟄蟲始振後五日上冰仍以獺祭魚鴻鴈來兩句入後章天子居青陽左個乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達皆所以順時氣也青陽左個大寢東堂北偏鸞路有虞氏之車有鸞和之節而飾之以青取其名耳春言鸞冬夏言色互文馬八尺以上為龍凡所服玉謂冠飾及所佩者之衡璜也麥實有孚甲屬木羊火畜也時尚寒食之以安性也器疏者刻鏤之象物當貫土而出也凡此車馬衣服皆所取於殷時而有變焉非周制也周禮朝祀戎獵車服各以其事不以四時為異又玉藻曰天子龍衮以祭𤣥端而朝日皮辨以日視朝與此皆殊天呂路作輅倉龍作蒼龍倉玉作青玉淮此一節作子衣青衣乘蒼龍服蒼玉建青旗食麥與羊服八風水爨柘燧火東宮御女青色衣青衣鼓琴瑟其兵矛其畜羊朝於青陽左個以出春令命相布德施惠行慶賞省徭賦唐鸞作青路作輅倉並作蒼是月也以立春先立春三日太史謁之天子曰某日立春盛德在木天子乃齊太史禮官之屬掌正歲年以序事謁告也呂唐齊皆作齊淮無是月至此一節下唐無是月也以立春字太史有以先立春三日字之作於立春之日天子親帥三公九卿諸侯大夫以迎春於東郊還反賞公卿諸侯大夫於朝迎春祭倉帝靈威仰於東郊之兆也王居明堂禮曰出十五里迎嵗蓋殷禮也周近郊五十里賞謂有功德者有以顯賜之也朝大寢門外迎吕淮唐帥皆作率唐無三九字呂淮並無諸侯字淮春作迎歲于作於無還反至於朝一節呂唐反皆作乃命相布德和令行慶施惠下及兆民相謂三公相王之事也德謂善教也令謂時禁也慶謂休其善也惠謂恤其不足也天子曰兆民唐民作人篇內並同慶賜遂行毋有不當遂猶達也言使當得者皆得得者無非其人呂唐毋皆作無篇內並同文淮以命相至此一節屬上乃命太史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常典六典法八法也離讀如儷偶之儷宿儷謂其屬馮相氏保章氏掌天文者相與宿偶當審候伺不得過差也經紀謂天文進退度數天呂貸作忒行淮無乃命至此一節也唐云命太史司歷候無之字為常下又有是月命有司祭風師是月也命有司釁龜策占兆審卦吉凶斗下又别分一章云正月中氣日在危昏畢中曉尾中建寅位之中雨水之日獺祭魚復五日鴻鴈來後五日草木萌動天子乃命有司布農事舍東郊修封疆端徑術善相丘陵阪險原隰土地所宜五榖所殖以教導人必躬親之田事既飭先定準直農乃不惑是月也天子乃以元日祈榖於上帝謂以上辛郊祭天也春秋傳曰夫郊祀后稷以祈農事是故啓蟄而郊郊而後耕上帝大微之帝也唐無是月也字乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝籍天子三推三公五推卿諸侯九推元辰蓋郊後吉辰也耒耜之上曲也保介車右也置耒耜於車右與御者之間明已勸農非農者也人君之車必使勇士衣甲居右而參乘備非常也保猶衣也介甲也帝籍為天神借民力所治之田也呂于參作參於帥作率帝籍作籍田侯下有大夫字字唐措作置無于參保介之御閒字有車右無三九字帥及帝籍同呂本反執爵於大寢三公九卿諸侯大夫皆御命曰勞酒既耕而宴飲以勞羣臣也大寢路寢御侍也還呂無大夫皆字作淮無是月至此一節唐反作執爵作宴飲于於無三九字是月也天氣下降地氣上騰天地和同唐無此一節草木萌動此陽氣蒸達可耕之候也農書曰土長冒橛陳根可拔耕者急發呂萌作繁王命布農事命田舍東郊皆修封疆審端徑術田謂田畯主農之官也舍東郊順時氣則居以命其事也封疆田首之分職術周禮作遂遂上有徑遂小溝也步道曰徑今尚書曰分命羲仲宅嵎夷也呂王下無命字善相丘陵阪險原隰土地所宜五榖所殖以教道民必躬親之相視也田事既飭先定準直農乃不惑說所以命田舍東郊之意也凖直謂封疆徑遂也夏小正曰農率均田淮無是月至此一節唐屬上文是月也命樂正入學習舞為仲春將釋菜入淮無此一節唐無學字乃修祭典重祭禮歲始省録也淮作修除祠位命祀山林川澤犧牲毋用牝為傷妊之類山淮作幣禱鬼神犧牲用牝唐林川澤作嶽鎮海瀆禁止伐木盛德所在淮無止字毋覆巢毋殺孩蟲胎天飛鳥毋麛毋卵為傷萌幼之類淮巢下無毋字及孩蟲飛鳥字唐無毋覆至飛鳥字毋聚大衆毋置城郭為妨農之始淮無大字及下毋字掩骼埋胔為死氣逆生也骨枯曰骼肉腐曰胔埋胔呂作霾髊淮作薶胔是月也不可以稱兵稱兵必天殃逆生氣有呂唐必下有字兵戎不起不可從我始為客不利主人則可呂可下有以字毋變天之道以隂政犯陽毋絶地之理易剛柔之宜毋亂人之紀仁之時而舉義事淮無是月至此一節孟春行夏令則雨水不時已之氣乘之也四月於消息為乾呂淮雨水竝作風雨草木蚤落生日促竝呂淮唐蚤竝作早篇內同呂落作槁國時有恐以火訛相驚作呂淮時乃行秋令則其民大疫申之氣乘之也七月始殺呂無其字猋風暴雨揔至正月宿值尾箕箕好風其氣逆也回風為猋呂猋作疾揔作數淮唐猋作飄淮揔作總藜莠蓬蒿竝興生氣亂惡物茂行冬令則水潦為敗雪霜大摯首種不入亥之氣乘之也舊說首種謂稷月淮雪作雨摯作雹種作稼句下有正宮司空其樹楊仲春之月日在奎昏弧中旦建星中仲中也仲春者日月㑹於降婁而斗建卯之辰也弧在輿鬼南建星在斗上呂弧作孤淮無日在奎字有招搖指卯字唐作二月之節日在營室昏東井中曉箕中斗建卯位之初律中夾鍾夾鍾者夷則之所生三分益一律長七寸二千一百八十七分寸之千七十五仲春氣至則夾鍾之律應周語曰夾鍾出四隙之細諸本上下竝與孟春文同今從唐本删後放此始雨水桃始華倉庚鳴鷹化為鳩皆記時候也倉庚黃鸝也鳩布榖也漢始以雨水為二月節呂始作李淮作桃李始華唐無始雨水字作驚蟄之日桃始華後五日倉庚鳴後五日鷹化為鳩天子居青陽大廟青陽太廟東堂當大室朝淮居作於是月也安萌芽養幼少存諸孤助生氣也節淮以此一屬下文擇元日命民社社后土也使民祀焉神其農業也祀社日用甲淮唐皆以此屬下文命有司省囹圄去桎梏毋肆掠止獄訟順陽寬也省減也囹圄所以禁守繫者若今别獄矣桎梏今械也在手曰梏在足曰桎肆謂死刑暴尸也周禮曰肆之三日掠謂棰治人以淮肆作笞下有養幼小存孤獨通句萌擇元日令民社十六字是月也唐此下有命樂正習舞上丁釋奠於國學天子乃率公卿諸侯親往視之命有司上戊釋奠於太公廟是月也擇元日命人社又分此下别為一章云二月中氣日在奎昏東井中曉南斗中斗建卯位之中春分之日𤣥鳥至後五日雷乃發聲後五日始電是月也祀朝日於東郊天子獻羔開冰先薦寢廟是月也日夜分則同度量平權衡𤣥鳥至至之日以大牢祠於高禖天子親往𤣥鳥燕也燕以施生時來巢人堂宇而孚乳嫁娶之象也媒氏之官以為候高辛氏之世𤣥鳥遺卵娀簡吞之而生契後王以為媒官嘉祥而立其祠焉變媒言禖神之也字呂祠作祀唐此上别有是月也無下至字后妃帥九嬪御御謂從往侍祠周禮天子有夫人有嬪有世婦有女御獨云九嬪舉中言也呂唐帥作率乃禮天子所御帶以弓韣授以弓矢於高禖之前天子所御謂今有娠者於祠大祝酌酒飲於高禖之庭以神惠顯之也帶以弓韣授以弓矢求男之祥也王居明堂禮曰帶以弓韣禮之禖下其子必得天材也淮無是月也至此節唐此下有是月命有司祭馬祖九字是月也日夜分雷乃發聲始電蟄蟲咸動啓户始出又記時候發猶出也呂啓作開字淮乃作始無始電字動下有蘇字無啓户始出唐以此一節屬上文無蟄蟲以下八字先雷三日奮木鐸以命兆民曰雷將發聲有不戒其容止者生子不備必有凶災主戒婦人有娠者也容止猶動靜呂淮竝無木字將竝作且呂命下有於字淮奮作振命下有於字唐無此一節日夜分則同度量鈞衡石角斗甬正權概因晝夜等而平當平也同角正皆謂平之也丈尺曰度斗斛曰量三十斤曰鈞稱上曰衡百二十斤曰石甬今斛也稱錘曰權概平斗斛者呂甬作桶淮無日夜分則字有令官市字甬作稱正作端上唐此一節屬文是月也耕者少舍乃修闔扇寢廟畢備舍猶止也因蟄蟲啓户耕事少閒而治門户也用木曰闔用竹葦曰扇畢猶皆也凡廟前曰廟後曰寢淮無此一節毋作大事以妨農之事大事兵役之屬事呂淮唐竝無之字呂淮作功淮以此句屬下文是月也毋竭川澤毋漉陂池毋焚山林順陽養物也畜水曰陂穿地通水曰池功淮無是月也字有毋作大事以妨農八字天子乃鮮羔開冰先薦寢廟鮮當為獻聲之誤也獻羔謂祭司寒也祭司寒而出冰薦於宗廟乃後賦之春秋傳曰古者日在北陸而藏冰西陸朝覿而出之其藏冰也深山窮谷固隂沍寒於是乎取之其出之也朝之祿位賔食喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之祿冰皆與焉大夫命婦喪浴用冰祭寒而藏之獻羔而啓之公始用之火出而畢賦自命夫命婦至於老疾無不受冰一呂鮮作獻上淮無此節唐屬文上丁命樂正習舞釋菜樂正樂官之長也命習舞者順萬物始出地鼓舞也將舞必釋菜於先師以禮之夏小正曰丁亥萬舞入學天子乃帥三公九卿諸侯大夫親往視之順時達物也仲丁又命樂正入學習樂為季春將合樂也習樂者習歌與八音作呂習作入釋作舍帥作率無大夫字仲中一淮無上丁以下至此節唐入前章是月也祀不用犧牲用圭璧更皮幣為季春將選而合騰之也更猶易也當祀者告以玉帛而已仲春行秋令則其國大水寒氣揔至酉之氣乘之也八月宿直昴畢畢好雨淮揔作總寇戎來征金氣動也畢又為邉兵行冬令則陽氣不勝麥乃不孰子之氣乘之也十一月為大隂內諸本孰皆作熟篇皆同民多相掠隂姦衆也淮掠作殘行夏令則國乃大旱暖氣早來午之氣乘之也作呂淮暖作暖淮國乃其國蟲螟為害暑氣所生為災害也樹淮此下有二月官倉其杏季春之月日在胃昏七星中旦牽牛中季少也季春者日月㑹於大梁而斗建辰之辰淮無日在胃字有招搖指辰字唐作三月之節日在婁昏柳中曉南斗中斗建辰位之初律中姑洗姑洗者南呂之所生也三分益一律長七寸九分才之一季春氣至則姑洗之律應國語曰姑洗所以修潔百物考神納賔諸本見仲春章桐始華田鼠化為鴽虹始見萍始生皆記時候也鴽鴾母螮蝀謂之虹萍蓱也其大者曰蘋鼠呂淮唐蓱作萍虹唐云清明之日桐始華後五日田化為鴽後五日始見又分萍始生入下章天子居青陽右個青陽右個東堂南偏諸本見仲春章是月也天子乃薦鞠衣於先帝為將蠶求福祥之助鞠衣黃桑之服先帝太皥之屬呂無乃字淮無此一節命舟牧覆舟五覆五反乃告舟備具於天子焉舟牧主舟之官也覆反舟者備傾側也言吕淮皆無命字唐舟牧作有司淮告作無舟備焉字天子始乘舟薦鮪于寢廟進時美物于淮子下有乃字作於乃為麥祈實於含秀求其成也不言所祈承寢廟可知唐無此句是月也生氣方盛陽氣發泄句者畢出萌者盡達不可以內時可宣出不可收斂也句屈生者芒而直曰萌呂句作芽天子布德行惠命有司發倉廩賜貧窮振乏絶振猶救也淮無布德行惠字倉作囷廩作倉賜作助呂倉作窖開府庫出幣帛周天下勉諸侯聘名士禮賢者周謂給不足也勉猶勸也聘問也名士不仕者淮無周天下字勉作使南唐分此下别為一章云三月中氣日在胃昏張中曉斗中斗建辰位之中榖雨之日萍始生後五日鳴鳩拂其羽後五日戴勝降于桑是月也命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞廣平曰原國也邑也平野也溝瀆與道路皆不得不通所以除水潦便民事也古者溝上有路無淮無是月也字道達作導通開通道路作達路除道毋有障塞字有從國始至境止字唐命司空作天子命有司循作巡田獵置罘羅罔畢翳餧獸之藥毋出九門為鳥獸方孚乳傷之逆天時也獸罟曰罝罘鳥罟曰羅罔小而柄長謂之畢翳射者所以自隱也凡諸罟及毒藥禁其出九門明其常有時不得用耳天子九門者路門也應門也雉門也庫門也臯門也城門也近郊門也逺郊門也關門也今月令無罘翳為弋作呂罔作網呂淮獵下有罼弋字無畢翳字呂唐九竝國淮罔作罟獸作毒是月也命野虞毋伐桑柘愛蠶食也野虞謂主田及山林之官淮無是月也字命作乃禁司唐野虞作有鳴鳩拂其羽戴勝降于桑蠶將生之候也鳴鳩飛且翼相擊趨農急也戴勝織紝之鳥是時常在桑言降者若時始自天來重之也淮拂作奮勝作鵀唐屬上文具曲植籧筐時所以養蠶器也曲薄也植槌也作呂曲植籧作狹曲䝉淮作朴曲筥唐乃修蠶器后妃齊戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事后妃親採桑示帥先天下也東鄉者鄉時氣也是明其不常留養蠶也留養者所卜夫人與世婦婦謂世婦及諸臣之妻也內宰職曰仲春詔后帥外內命婦治蠶於北郊女外內女子也夏小正曰妾子治蠶執養宮事毋觀去容飾也婦使縫線組紃之事以呂勸作力淮無親字躬作親無禁婦女毋觀字無字唐親東鄉躬桑作享先蠶而躬桑無禁婦女毋觀省婦使字蠶事既登分繭稱絲效功以共郊廟之服無有敢惰登成也敕往蠶者蠶畢將課功以勸戒之呂惰作墮淮無此一節是月也命工師令百工審五庫之量金鐵皮革筋角齒羽箭幹脂膠丹漆毋或不良工師司空之屬官也五庫藏此諸物之舍也量謂物善惡之舊法也幹器之木也凡輮幹有當用脂良善也呂淮或竝作有淮無是月也字命工師至之量作命五庫令百官審無齒羽字百工咸理監工日號毋悖於時毋或作為淫巧以蕩上心咸皆也於百工皆理治其事之時工師則監之日號令之戒之以此二事也悖猶逆也百工作器物各有時逆之則不善時者若弓人春液角夏治筋秋合三材冬定體之屬也淫巧謂僞飾不如法也蕩謂動之使生奢泰也今月令無于時作為為詐僞呂為作僞呂唐于作於唐無或為字是月之末擇吉日大合樂天子乃率三公九卿諸侯大夫親往視之大合樂者所以助陽達物風化天下也其禮亡今天子以大射郡國以鄉射禮代之下淮無是月之末字唐之末作也淮擇下有下旬字樂有致歡欣字無天子以下十六字唐屬下文是月也乃合纍牛騰馬遊牝於牧纍騰皆乘匹之名是月所合牛馬謂繫在廄者其牝欲遊則就牧之牡而合之呂纍作纍淮無是月也纍作欙犧牲駒犢舉書其數以在牧而校數書之明出時無他故至秋當録內且以知其息之多少也淮無此八字唐此下云是月也擇吉日大合樂天子乃率公卿諸侯大夫親往視之命國難九門磔攘以畢春氣此難難隂氣也隂寒至此不止害將及人所以及人者隂氣右行此月之中日行厯昴昴有大陵積尸之氣氣佚則厲鬼隨而出行命方相氏帥百𨽻索室驅疫以逐之又磔牲以攘於四方之神所以畢止其災也王居明堂禮曰季春出疫于郊以攘春氣旬呂無命字國下有人字此下有行之是令甘雨至三呂淮唐難並作儺月令甘雨至三旬淮命作令此下有行是唐命上有是月也字季春行冬令則寒氣時發草木皆肅丑之氣乘之也肅謂枝葉縮栗國有大恐以水訛相驚行夏令則民多疾疫時雨不降未之氣乘之也六月宿直鬼鬼為天尸時又有暑也山陵不收高者暵於熱也淮收作登行秋令則天多沈隂淫雨蚤降戌之氣乘之也九月多隂淫霖也雨三日以上為霖今月令曰衆雨兵革竝起隂氣勝也鄉淮此下有三月官其樹李孟夏之月日在畢昏翼中旦婺女中孟夏者月月㑹於實沈而斗建巳之辰字呂作旦須女中淮無日在畢字有招搖指己唐作四月之節日在昴昏翼中曉牽牛中斗建己位之初其日丙丁丙之言炳也日之行夏南從赤道長育萬物月為之佐時萬物皆炳然著見而强大又因以為日名焉易曰齊乎㢲相見乎離淮此上有其位南方字下有盛德在火字唐丙作景其帝炎帝其神祝融此赤精之君火官之臣自古以來著德立功者也炎帝大庭氏也祝融顓頊氏之子曰黎為火官淮無此二句其蟲羽象物從風鼓葉飛鳥之屬其音徴三分宮去一以生徴徴數五十四屬火者以其微清事之象也夏氣和則徴聲調樂記曰徴亂則哀其事勤律中中呂孟夏氣至則中呂之律應中呂者無射之所生三分益一律長六寸萬九千六百八十三分寸之萬二千九百七十四周語曰中呂宣中氣諸本中皆作仲其數七火生數二成數七但言七者亦舉其成數唐此下有其性禮其事視其味苦其臭焦火之臭味也凡苦焦者皆屬焉其祀竈祭先肺夏陽氣盛熱於外祀之於竈從熱類也祀之先祭肺者陽位在上肺亦在上肺為尊也竈在廟門外之東祀竈之禮先席於門之奧東靣設主於竈陘乃制肺及心肝為俎奠于主西又設盛於俎南亦祭黍三祭肺心肝各一祭醴三亦既祭徹之更陳鼎俎設饌於筵前迎尸如祀户之禮螻蟈鳴蚯蚓出王瓜生苦菜秀皆記時候也螻蟈蛙也王瓜萆挈也今月令云王萯生夏小正云王萯秀未聞孰是呂瓜作善淮矧作蠙唐云立夏之日螻蟈鳴後五日丘矧出後五日王瓜生而分苦菜秀入後章天子居明堂左個乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器高以粗明堂左個大寢南堂東偏也菽實孚甲堅合屬水雞木畜時熱食之亦以安性也粗猶大也器高大者象物盛長呂唐路作輅菽淮此一節作天子衣赤衣乘赤騮服赤玉建赤旗食與雞服八風水爨柘燧火南宮御女赤色衣赤采吹竽笙其兵㦸其畜雞朝於明堂左個以出夏令唐雞作彘是月也以立夏先立夏三日大史謁之天子曰某日立夏盛德在火天子乃齊謁告也夏淮無是月也至此一節夏唐無是月也以立六字太史下云以先立三日謂於立夏之日天子親帥三公九卿大夫以迎夏於南郊還反行賞封諸侯慶賜遂行無不欣說迎夏祭赤帝赤熛怒於南郊之兆也不言帥諸侯而云封諸侯諸侯時或無在京師者空其文也祭統曰古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順隂義也今此行賞可也而封諸侯則違於古封諸侯出土地之事於時未可似失之諸本帥竝作率反竝作乃賜呂無行及諸字無淮迎夏作迎嵗行賞作賞賜無慶以下八字唐三九字賞下無封字有公卿字侯下有大夫於朝字乃命樂師習合禮樂為將飲酎饗淮作修禮樂左右節唐以此一屬下文命太尉贊桀俊遂賢良舉長大助長氣也贊猶出也桀俊能者也遂猶進也三王之官有司馬無大尉秦官則有大尉今俗人皆云周公作月令未通於古呂尉作封子淮遂作選長大作孝弟此唐大尉作相桀作傑朱曰後章養壯俊字當屬長大之下蓋簡錯也行爵出祿必當其位使順之也此淮必當其位作佐天長養唐下有是月也命樂正習盛樂大雩帝命有司禱祀山川百辟卿士有益於人者以祈榖實是月也命有司祀雨師又别分一章云四月中氣日在畢昏軫中曉須女中斗建巳位之中小滿之日苦菜秀後五日靡草死後五日小暑至挺重囚出輕繫是月也繼長增高謂草木盛蕃廡修淮無是月也長作毋有壞墮亦為逆時氣隳呂淮墮作毋起土功毋發大衆為妨蠶農之事大淮起作興無毋發衆字毋伐大樹亦為逆時氣是月也天子始絺初服暑服無此一節淮唐作天子初衣暑服命野虞出行田原為天子勞農勸民毋或失時重敕之勸呂無為天子字淮唐同時淮命作令無出字勞農民作勸農事無毋或失字唐野虞出作有司巡勸民作勉人命司徒巡行縣鄙命農勉作毋休於都急趨於農也縣鄙鄉遂之屬主民者也王居明堂禮曰毋宿於國今月令休為伏呂巡作循淮唐竝無此一節是月也驅獸毋害五榖淮無是月也字獸下有畜字毋害亦作勿令害毋大田獵為傷蕃廡之氣淮無此句農乃登麥天子乃以彘嘗麥先薦寢廟登進也麥之新氣尤盛以彘食之散其熱也彘水畜呂登作升淮無農乃登麥一句無乃字唐嘗麥下有羞以含桃字是月也聚畜百藥蕃廡之時毒氣盛也呂畜作蓄淮無是月字唐以屬下章靡草死麥秋至斷薄刑決小罪舊說云靡草薺葶藶之屬祭統曰草艾則墨謂立秋後也刑無輕於墨者今以純陽之月斷刑決罪與毋有壞墮自相違似非呂靡作糜無決小罪一句決小罪二句淮無斷薄刑唐已見上文出輕繫崇寬此句呂淮竝無唐已見上文蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服后妃獻繭者內命婦獻繭於后妃收繭稅者收於外命婦外命婦雖就公桑蠶室而蠶其夫亦當有祭服以助祭收以近郊之稅耳貴賤長幼如一國服同呂無蠶事畢字長幼作少長之下有祭字也淮無此一節唐作是月蠶事既登是月也天子飲酎用禮樂酎之言醇也謂重釀之酒也春酒至此始成與羣臣以禮樂飲之於朝正尊卑也孟冬云大飲蒸此言用禮樂互其文至呂無用禮樂字有行之是令甘雨三旬字淮無此一節孟夏行秋令則苦雨數來五榖不滋申之氣乘之也苦雨白露之類時物得雨傷四鄙入保金氣為害也鄙界上邑小城曰保淮鄙作鄰行冬令則草木蚤枯長日促後乃大水敗其城郭亥之氣乘之也淮敗作壞行春令則蝗蟲為災暴風來格寅之氣乘之也必以蝗蟲為災者寅有啓蟄之氣行於初暑則當蟄者大出矣格至也呂淮災作敗秀草不實氣更生之不得成也樹淮此下有四月官田其桃仲夏之月日在東井昏亢中旦危中仲夏者日月㑹於鶉首而斗建午之辰也淮無日在東井字有招搖指午字危唐作五月之節日在參昏角中曉中斗建午位之初律中蕤賔蕤賔者應鍾之所生三分益一律長六寸八十一分寸之二十六仲夏氣至則蕤賔之律應周語曰蕤賔所以安靜神人獻酬交錯同諸本上下與孟夏今從唐本小暑至唐已見上章螳蜋生鵙始鳴反舌無聲皆記時侯也螳蜋螵蛸母也鵙伯勞也反舌百舌鳥唐作芒種之日螳蜋生後五日鵙始鳴後五日反舌無聲天子居明堂大廟明堂大廟南堂當大室也諸本下與孟夏文同今從唐本删養壯佼助長氣也舉朱子曰此句當屬上章長大之下是月也命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鐘磬柷敔為將大雩帝習樂也修均執調飭者治其器物習其事之言呂竾簧作塤箎呂淮無是月也及鼓字鞞字作鼙無均字執干戚戈羽在鐘磬下無笙簧字竾作箎無柷敔字唐無此一節命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈榖實陽氣盛而常旱山川百源能興雲雨者也衆水始所出為百源必先祭其本乃雩雩吁嗟求雨之祭也雩帝謂為壇南郊之旁雩五精之帝配以先帝也自鞀鞞至柷敔皆作曰盛樂凡他雩用歌舞而已百辟卿士古者上公若句龍后稷之類也春秋傳曰龍見而雩雩之正當以四月凡周之秋三月之中而旱亦修雩禮以求雨因著正雩此月失之矣天子雩上帝諸侯以下雩上公周冬及春夏雖旱禮有禱無雩下呂淮源作原呂縣雩下有祭字淮無乃命百縣以唐已見上章農乃登黍登進也句淮唐無此是月也天子乃以雛嘗黍羞以含桃先薦寢廟此嘗雛也而云嘗黍不以牲主榖也必以黍者黍火榖氣之主也含桃櫻桃也雛呂雛作雞無淮無是月也作雉唐此一節令民毋艾藍以染為傷長氣也此月藍始可别夏小正曰五月啓灌藍蓼淮令作禁毋燒灰為傷火氣也火之氣於是為盛火之滅者為灰炭呂灰作毋暴布不以隂功干大陽之事唐無此一節門閭毋閉關市毋索順陽敷縱不難物挺重囚益其食挺猶寬也死淮此下有存孤寡振事六字唐門上有是月也字又以挺重囚入上章而無益其食三字游牝别羣孕妊之欲止也則縶騰駒為其北氣有餘相蹄齧也呂淮無則字縶作執班馬政馬政謂養馬之政教也庾人職曰掌十有二間之政教以阜馬佚特教駣攻駒此之謂也呂政作正唐此下云是月也聚蓄百藥又别分一章云五月中氣日在東井昏亢中曉營室中斗建午位之中夏至之日鹿角解後五日蜩始鳴後五日半夏生是月也祀皇地祗於方丘是月也日長至隂陽爭死生分爭者陽方盛隂欲起也分猶半也也吕日長至作長至日淮無是月字長作短君子齊戒處必掩身毋躁掩猶隱翳也躁猶動也今月令毋躁為欲靜呂身下有欲靜字淮無處必字掩作慎止聲色毋或進進猶御見也聲謂樂也易樂及春秋說夏至人主與羣臣從八能之士作樂五日今止之非其道也掩淮止作節無毋或進字言朱子曰止聲色蓋亦處必身毋躁之義若以止樂則拘矣月令之說固多有未安而此難以為非也注文蓋失其指矣薄滋味毋致和為其氣異此時傷人淮無此句節耆欲定心氣微隂扶精不可散也淮呂節作退呂唐耆欲作嗜欲無此二句百官靜事毋刑罪罰之事不可以聞今月令刑為徑淮刑作徑以定晏隂之所成晏安也隂稱安鹿角解蟬始鳴半夏生木堇榮又記時候也半夏藥草木堇王蒸也是唐上三句已見上文而無下一句此下有月也命有司祭先牧九字是月也毋用火南方陽氣盛又用火於其方害微隂也淮作禁民無發火可以居高明可以逺眺望可以升山陵可以處臺榭順陽在上也高明謂樓觀也闍者謂之臺有木者謂之榭登淮無下三可以字升作仲夏行冬令則雹凍傷榖子之氣乘之也陽為雨隂起脅之凝為雹呂淮凁作霰道路不通暴兵來至盜賊攻劫亦雹之類行春令則五榖晚孰卯之氣乘之也生日長淮晚作不百螣時起其國乃饑螣蝗之屬言百者明衆類並為害唐饑作虗行秋令則草木零落酉之氣乘之也八月宿值昴畢為天獄主殺果實早成生日短蚤淮早作民殃於疫大陵之氣來為害也其淮此下有五月官相樹榆季夏之月日在柳昏火中旦奎中季夏者日月㑹於鶉火而斗建未之辰也中淮無日在柳字有招搖指未字呂淮作昏心唐作六月之節日在東井昏氐中曉東壁中斗建未位之初律中林鐘林鐘者黃鐘之所生三分去一律長六寸季夏氣至則林鐘之律應周語曰林鐘和展百物俾莫不任肅純恪淮林作百高誘云百鐘者林鐘也諸本見仲夏章但淮云其位中央其日戊巳盛德在土其蟲裸其音宮律中百鐘其數五其味甘其臭香其祀中霤祭先心溫風始至蟋蟀居壁鷹乃學習腐草為螢皆記時候也鷹學習謂攫搏也夏小正曰六月鷹始鷙螢飛蟲熒火也呂壁作宇螢下有蚈字呂淮草下有化字淮宇作奧螢作熒鷹唐云小暑之日溫風至後五日蟋蟀居壁後五日乃學習而以腐草為螢入下章天子居明堂右個明堂右個南堂西偏也乘諸本見仲夏章但淮云天子衣純黃黃騮服黃玉建黃旗食稷與牛服八風水爨柘燧火中宮御女黃色衣黃采其兵劔其畜牛朝于中宮命漁師伐蛟取鼉登龜取黿四者甲類秋乃堅成周禮曰秋獻龜魚又曰凡取龜用秋時是夏之秋也作月令者以為此秋據周之時也周之八月夏之六月因書於此似誤也蛟言伐者以其有兵衛也龜言登者尊之也鼉黿言取羞物賤也鼉皮又可以冒鼓今月令漁師為搒人呂命上有是月也字命作令無登龜字唐淮師作人章屬後九月命澤人納材葦蒲葦之屬此時柔又可取作器物也呂命上有乃字澤作虞納作入一淮命作令澤作滂唐無此節是月也命四監大合百縣之秩芻以養犧牲令民無不咸出其力四監主山林川澤之官百縣鄉遂之屬地有山林川澤者也秩常也百縣給國養犧牲之芻多少有常民皆當出力為艾之今月令四為田字呂淮命作令大下有夫淮無令民以下八字以共皇天上帝名山大川四方之神以祠宗廟社稷之靈以為民祈福牲以供祠神靈為民求福明使民艾芻是不虗取皇天北辰耀魄寶冬至所祭於圓丘也上帝大微五帝呂淮共作供淮無以祠之靈以字福下有行惠令弔死問疾存視長老行稃鬻厚席蓐以送萬物歸也二十二字唐無是月至此一節是月也命婦官染采黼黻文章必以法故無或差貸婦官染人也采五色八呂無染字貸作忒司淮無是月也及必以以下字唐婦官作有采作綵黑黃倉赤莫不質良無敢詐僞質正也良善也所用染者當得真采正善也呂無作勿詐僞作僞詐呂唐倉竝作蒼淮黑作青倉作白赤作黑無無敢詐僞字以給郊廟祭祀之服以為旗章以别貴賤等給之度旗章旌旗及章識也呂唐給作級淮郊作宗無祭祀及以為旗章以下十二字而服下有必宣以明字唐此下别分一章云六月中氣日在柳昏尾中曉奎中斗建未位之中大暑之日腐草為螢後五日土潤溽暑後五日大雨時行是月也樹木方盛乃命虞人入山行木毋有斬伐為其未堅紉也呂命作令有作或作淮無乃命至行木八字毋有勿敢唐虞人作有司不可以興土功不可以合諸侯不可以起兵動衆土將用事氣欲靜下淮無不可以興土功字侯有起土功字無不可以字起兵動衆作動衆興兵唐自是月也樹木至此屬下文毋舉大事以搖養氣大事興繇役以有為呂養作蕩下有於字毋發令而待以妨神農之事也發令而待謂出繇役之令以預驚民也民驚則心動是害土神之氣土神稱曰神農者以其主於稼穡時呂待作干下有字無也字水潦盛昌神農將持功舉大事則有天殃言土以受天雨澤安靜養物為功動之則致害也孝經說曰地順受澤謙虗開張含泉任萌滋物歸中大呂無昌字下有命字持作循並淮無毋舉大事至舉事一節則作必唐與淮同無則有天殃四字是月也土潤辱暑潤辱謂涂濕也字餘已見上文淮唐無是月也諸本辱作溽大雨時行唐已見上文燒剃行水利以殺草如以熱湯剃謂迫地芟草也此謂欲稼萊地先剃其草草乾燒之至此月大雨流水潦畜於其中則草死不復生而地美可稼也剃人掌殺草職曰夏日至而剃之又曰如欲其化也則以水火變之淮無燒剃行水如以熱湯字唐燒上有乃字無如以熱湯字可以糞田疇可以美土疆土潤辱膏澤易行也糞美互文耳土疆强㯺之地甘淮無兩可以字美作肥此呂此下有行之是令是月雨三至三旬二日唐下有是月也樹木方盛乃命有司入山行水無有斬伐不可以興土功不可以合諸侯不可以起兵動衆季夏行春令則榖實鮮落國多風咳辰之氣乘之也未屬㢲辰又在㢲位二氣相亂為害諸本鮮皆作解淮無國字民乃遷徙象風轉移物也行秋令則丘隰水潦戌之氣乘之也九月宿值奎奎為溝瀆與此月大雨並而髙下皆水禾稼不孰傷於水也稼吕禾稼作穡乃多女災含任之類敗也行冬令則風寒不時丑之氣乘之也呂風寒作寒氣鷹隼蚤得疾癘之氣也作呂唐竝作鷙淮摯四鄙入保象鳥雀之走竄也都邑之城曰保其淮此下有六月官少內樹梓中央土火休而盛德在土也其日戊巳戊之言茂也已之言起也日之行四時之間從黃道月為之佐至此萬物皆枝葉茂盛其含秀者抑屈而起故因以為日名焉其帝黃帝其神后土此黃精之君土官之臣自古以來著德立功者也黃帝軒轅氏也后土亦顓頊氏之子曰黎兼為土官其蟲倮象物露見不隱藏虎豹之屬恆淺毛作呂倮螺其音宮聲始於宮宮數八十一屬土者以其最濁君之象也季夏之氣和則宮聲調樂記曰宮亂則荒其君驕律中黃鐘之宮黃鐘之宮最長也十二律轉相生五聲具終於六十焉季夏之氣至則黃鐘之宮應禮運曰五聲六律十二管還相為宮其數五土生數五成數十但言五者土以生為本事唐此下有其性信其思其味甘其臭香土之臭味也凡甘香者皆屬之其祀中霤祭先心中霤猶中室也土主中央而神在室古者復冗是以名室為霤云祀之先祭心者五臟之次心次肺至此心為尊也祀中霤之禮設主於牖下乃制心及肺肝為俎其祭肉心肺肝各一他皆如祀户之禮於唐此下有是月也祀黃帝南郊天子居大廟大室乘大路駕黃駵載黃旗衣黃衣服黃玉食稷與牛其器圜以閎大廟大室中央室也大路殷路也車如殷路之制而飾之以黃稷五榖之長牛土畜也器圜者象土周匝於四時閎讀如紘紘謂中寬象土含物大呂圜作高閎作掩淮無此章文並見季夏章唐路作黃路駵作龍孟秋之月日在翼昏建星中旦畢中孟秋者日月㑹於鶉尾而斗建申之辰也有呂之月下有長日至四旬六日字建星作斗畢中下則立秋字淮無日在翼字有招搖指申字建星亦作斗婁唐作七月之節日在張昏尾中曉中斗建申位之初其日庚辛庚之言更也辛之言新也日之行秋西從白道成熟萬物月為之佐萬物皆肅然改更秀實新成人因以為日名焉淮此上有其位西方字下有盛德在金字其帝少皥其神蓐收此白精之君金官之臣自古以來著德立功者也少皥金天氏蓐收少皥氏之子曰該為金官淮無此二句其蟲毛象物應凉氣而備寒狐貉之屬生㫋毛也其音商三分徴益一以生商商數七十二屬金者以其濁次宮臣之象也秋氣和則商聲調樂記曰商亂則陂其官壞律中夷則孟秋氣至則夷則之律應夷則者大呂之所生也三分去一律長五寸七百二十九分寸之四百五十一周語曰夷則所以詠歌九則平民無二其數九金生數四成數九但言九者亦舉其成數唐此下有其性義其事言其味辛其臭腥金之臭味也凡辛腥者皆屬焉其祀門祭先肝秋隂氣出祀之於門外隂也祀之先祭肝者秋為隂中於藏直肝肝為尊也祀門之禮北靣設主於門左樞乃制肝及肺心為俎奠於主南又設盛於俎東其他皆如祭竈之禮凉風至白露降寒蟬鳴鷹乃祭鳥用始行戮皆記時候也寒蟬寒蜩謂霓也鷹祭鳥者將食之示有先也既祭之後不必盡食若人君行刑戮之而已唐作立秋之日凉風至後五日白露降後五日寒蟬鳴以鷹乃祭鳥屬後章無用始行戮一句天子居總章左個乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器亷以深總章左個大寢西堂南偏戎路兵車也制如周革路而飾之以白白馬黑鬛曰駱麻實有文理屬金犬金畜也器亷以深象金傷害物入藏淮此一節云天子衣白衣乘白輅服白玉建白旗食麻與犬服八風水爨柘燧火西宮御女白色衣白衣撞白鐘其兵戈其畜狗朝於總章左個以出秋令求不孝不悌戮暴傲悍而副之以助損氣唐戎路作白輅麻作酒犬作魚是月也以立秋先立秋三日太史謁之天子曰某日立秋盛德在金天子乃齊淮無是月至此一節立唐無是月也以立秋字太史下有以先秋三日字之作於立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊還反賞軍帥武人於朝迎秋者祭白帝白招拒於西郊之兆也軍帥諸將也武人謂環人之屬有勇力者字諸本帥皆作率反作乃淮無諸侯於作于唐無三九字天子乃命將帥選士厲兵簡練桀俊專任有功以征不義征之言正也伐也呂淮無乃字帥作率淮唐無天子字淮士作卒唐厲作勵桀作傑俊作雋詰誅暴慢以明好惡順彼遠方詰謂問其罪窮治之也順猶服也唐呂順作巡淮無以明好惡字逺作四此下别分一章云七月中氣日在張昏箕中曉昴中斗建申位之中處暑之日鷹乃祭鳥後五日天地始肅後五日禾乃登是月也命有司修法制繕囹圄具桎棤呂繕作謹淮無是月也及其桎梏字小唐此下有斷薄刑決罪字禁止姦愼罪邪務摶執順秋氣政尚嚴塞淮無止罪字愼作無務搏執三字命理瞻傷察創視折理治獄官也有虞氏曰士夏曰大理周曰大司冦創之淺者曰傷淮無此一節審斷決獄訟必端平端猶正也下呂端作正字淮無斷字獄有平詞訟無必端平字戮有罪嚴斷刑淮無此六字唐無禁止至此三節天地始肅不可以贏肅嚴急之言也贏猶解也淮地作墜後並同是月也農乃登榖天子嘗新先薦寢廟黍稷之屬於是始孰呂淮登作升唐淮無也字乃作始字月也下有築場圃命百官始收斂順秋氣收斂物呂無收字唐作是月也命有司納材葦完隄防謹壅塞以備水潦備者備八月也八月宿值畢畢好雨此淮壅作障唐無一節修宮室壞墻垣補城郭象秋收斂物當藏也壞淮作修城郭繕宮室無壞墻垣字字呂作壞修上有是月也字無補城郭是月也毋以封諸侯立大官毋以割地行大使出大幣古者於嘗出田邑此其月也而禁封諸侯割地失其義呂呂淮無諸字呂以割地作割土地淮無毋以割地字淮下有二句並作行重幣出大使行呂此下有行之是令而凉風至三旬淮此下有是月令凉風至三旬唐無此一節孟秋行冬令則隂氣大勝亥之氣乘之也介蟲敗榖介甲也甲蟲屬冬敗榖者稻蟹之屬戎兵乃來十月宿值營室營室之氣為害也營室主武士行春令則其國乃旱寅之氣乘之也雲雨以風除也陽氣復還五榖無實陽氣能生而不能成實呂復作後無作不行夏令則國多火災已之氣乘之也其淮作冬多唐作國寒熱不節民多瘧疾瘧疾寒熱所為也今月令瘧疾為厲疫淮熱作暑此下有七月官庫其樹棟仲秋之月日在角昏牽牛中旦觜觽中仲秋者日月㑹於夀星而斗建酉之辰也唐淮無日在角字有招搖指酉字呂淮觽皆作雋作八月之節日在翼昏南斗中曉畢中斗建酉位之初律中南呂南呂者大蔟之所生三分去一律長五寸三分寸之一仲秋氣至則南呂之律應周語曰南呂者贊陽秀物諸本上下與孟秋同今從唐本盲風至鴻鴈來𤣥鳥歸羣鳥養羞皆記時候也盲風疾風也𤣥鳥燕也歸謂去蟄也凡鳥隨隂陽者不以中國為居羞謂所食也夏小正曰九月丹鳥羞白鳥說曰丹鳥也者謂丹良也白鳥也者謂閩蚋也其謂之鳥者重其養者也有翼為鳥養也者不盡食也二者丈異羣鳥丹良未聞孰是呂淮盲作凉鴻作候淮養作翔無羞字後唐作白露之日鴻鴈來後五日𤣥鳥歸五日羣鳥養羞無肓風至三字天子居總章大廟總章大廟西堂當大室也從淮居作朝于諸本孟秋同今唐本是月也養衰老授几杖行糜粥飲食助老氣也行猶賜也淮以此一節屬下文乃命司服飭衣裳文繡有恆制有大小度有長短此謂祭服也文謂畫也祭服之制畫衣而繡裳呂恆作常衣服有量必循其故此謂朝燕及他服凡此為寒益至也詩云七月流火九月授衣於是作之可也冠帶有常因制衣服而作之也唐淮無乃命至此一節以屬季秋章乃命有司申嚴百刑斬殺必當毋或枉撓枉撓不當反受其殃申重也當謂值其罪有諸本皆無乃字淮枉撓作决獄下是月也養長老授几杖行稃鬻飲食仍唐命有上有是月也必當下有無留有罪以此一節屬後章是月也乃命宰祝循行犧牲視全具案芻豢瞻肥瘠察物色必比類量大小視長短皆中度五者備當上帝其饗於鳥獸肥充之時宜省羣牲也宰祝大宰大祝主祭祀之官也養牛羊曰芻犬豕曰豢五者謂所視也所案也所瞻也所察也所量也此皆得其正則上帝饗之上帝饗之而無神不饗也呂循作巡饗作享淮無是月也循視全具字瞻肥瘠作視肥癯全粹必作謂長短作少長皆作莫不無五者以下八字唐無乃字宰祝作有司天子乃難以達秋氣此難難陽氣也陽暑至此不衰害亦將及人所以及人者陽氣左行此月宿直昴畢昴畢亦得大陵積尸之氣氣佚則厲鬼亦隨而出行於是亦命方相氏帥百𨽻而難之王居明堂禮曰仲秋九門磔攘以發陳氣禦止疾疫作諸本難作儺上呂儺下有禦佐疾字逹作通淮達御唐天子有是月也字此下有是月也命樂正習吹上丁釋奠於國學天子乃率公卿諸侯大夫親往視之是月也命有司上戊釋奠於太公廟是月也擇元日命人社此下又别分一章云八月中氣日在軫昏南斗中曉東井中斗建酉位之中秋分之日雷乃收聲後五日蟄蟲壞户後五日水始涸是月也祝夕月于西郊是月也命有司享夀星於南郊以犬嘗麻先薦寢朝麻始孰也文唐以此屬下是月也可以築城郭建都邑穿竇窖修囷倉為民將入物當藏也穿竇窖者入地圓曰竇方曰窖王居明堂禮曰仲秋命庶民畢入于室曰時殺將至毋罹其災呂窖作窖淮無也字乃命有司趣民收斂務畜萊多積聚始為禦冬之備菜呂畜作蓄淮無務字作采唐無是月至此二節乃勸種麥毋或失時其有失時行罪無疑麥者接絶續乏之榖尤重之時呂其有作其或種下有宿字無毋或失字其有作若或淮無乃字唐以此一節屬下文是月也日夜分雷始收聲蟄蟲壞户殺氣浸盛陽氣日衰水始涸又記時侯也雷始收聲在地中動內物也壞益也蟄蟲益户謂稍小之也涸竭也此甫八月中氣雨未止而云水竭非也周語曰辰角見而雨畢天根見而水涸又曰雨畢而除道水涸而成梁辰角見九月本也天根見九月末也王居明堂禮曰季秋除道致梁以利農也呂淮雷下有乃字無聲字呂壞作俯户淮壞作培唐以屬上文日夜分則同度量平權衡正鈞石角斗甬呂淮同作一甬作齊斗作升淮無則字甬作稱唐無正鈞石角斗甬别有是月也命有司祭馬社天子嘗麻先薦寢廟命有司申嚴百刑斬殺必當無留有罪無或枉撓枉撓不當反受其殃是月也勸人種麥無或失時四十八字是月也易關市來商旅納貨賄以便民事四方來集逺鄉皆至則財不匱上無乏用百事乃遂易關市謂輕其稅使民利之啇旅賈客也匱亦乏也遂猶成也呂集作雜淮無是月也及則字易作理賄作財呂淮納作入則財下有物字凡舉大事毋逆大數必順其時慎因其類事謂興土功合諸侯舉兵衆也季夏禁之孟秋始征伐此月築城郭季秋教田獵是以於中為之戒焉呂無大字大作天慎作乃此下有行之是令白露降三旬淮無此一節唐無是月以下至此一節仲秋行春令則秋雨不降卯之氣乘之也卯宿直房心心為大火草木生榮應陽動也國乃有恐以火訛相驚火呂淮乃有作有行夏令則其國乃旱蟄蟲不藏五榖復生午之氣乘之也有呂無乃字淮榖下皆字行冬令則風災數起收雷先行子之氣乘之也北風殺物先猶蚤也冬至閉藏草木蚤死寒氣盛也尉淮此下有八月官其樹柘季秋之月日在房昏虛中旦柳中季秋者日月㑹於大火而斗建戌之辰也日淮無日在房字有招搖指戌字唐作九月之節在角昏牽牛中曉東井中斗建戌位之初律中無射無射者夾鐘之所生三分去一律長四寸六千五百六十一分寸之六千五百二十四季秋氣至則無射之律應周語曰無射所以宣布哲人之令德示民軌儀諸本見仲秋章鴻鴈來賔爵入大水為蛤鞠有黃華豺乃祭獸戮禽皆記時候也來賔言其客止未去也大水海也戮猶殺也呂淮鴻作候鞠作菊呂乃作則淮爵作雀為唐作寒露之日鴻鴈來賔後五日雀入大水蛤後五日菊有黃華豺乃以下入後章天子居總章右個總章右個西堂北偏章淮居作朝于餘見中秋是月也申嚴號令申重作淮唐是月也竝命有司命百官貴賤無不務內以㑹天地之藏無有宣出內謂收斂入之也㑹猶聚也也呂淮無命字內作入唐此月有是月命有司伐蛟取鼉登龜取黿又分此下别為一章云九月中氣日在氐昏須女中曉柳中斗建戌位之中霜降之日豺乃祭獸後五日草木黃落後五日蟄蟲咸俯乃命冡宰農事備收備猶盡也呂無乃字唐屬下文舉五榖之要定其租稅之簿呂榖作種藏帝籍之收於神倉祗敬必飭重粢盛之委也帝籍所耕千畝也藏祭祀之榖為神倉祗亦敬也呂無之收字淮無祇敬必飭字唐屬下文是月也霜始降則百工休寒而膠漆之作不堅好也淮無則字乃命有司曰寒氣總至民力不堪其皆入室總猶猥卒恆唐總作揔此下有是月也命有司具飭衣裳文繡有衣服有量冠帶有常必循其故是月也天子嘗稻先薦寢廟乃命有司農事備收舉五榖之要藏帝藉於神倉祗敬必飭是月也命有司合秩芻以養犧牲以供皇天上帝名山大川四方之神以祠宗廟社稷之靈為人祈福上丁命樂正入學習吹為將饗帝也春夏重舞秋冬重吹也唐無上丁入學字是月也大饗帝言大饗者遍祭五帝也曲禮曰大饗不問卜謂此也堂淮唐無是月也字唐帝下有於明字嘗犧牲告備於天子嘗者謂嘗羣神也天子親嘗帝使有司祭於羣神禮畢而告焉淮無告備於天子唐此上有命有司此下有是月也趣人收斂務畜菜十字合諸侯制百縣為來歲受朔日與諸侯所稅於民輕重之法貢職之數以逺近土地所宜為度以給郊廟之事無有所私秦以建亥之月為嵗首於是歲終使諸侯及鄉遂之官受此法焉合諸侯制者定其國家宮室車旗衣服禮儀也諸侯言合制百縣言受朔日互文也貢職謂所入天子凡周之法以正月和之正嵗而縣於象魏淮職作賦地作墜無以給下十字唐無此一節是月也天子乃教於田獵以習五戎班馬政教於田獵因田獵之禮教民以戰法也五戎謂五兵弓矢殳矛戈㦸也政謂齊其色度其力使同乘也校人職曰凡軍事物馬而頒之呂班作敻無政字字淮無天子班馬政命僕及七騶咸駕載旌旐授車以級整設於屛外僕戎僕及御夫也七騶謂趣馬在為諸官駕稅者也既駕之又為之載旌旗司馬職曰仲秋教治兵如振旅之陳辨旗物之用王載太常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟是也級等次也整正列也設陳也屏所田之地門外之蔽呂旌作旍旐下有與字授作受淮命下有火字載作戴旌作荏無旐字整作皆正司徒搢撲北面誓之誓衆以軍法也呂淮面作嚮以淮誓作贊天子乃厲飾執弓挾矢以獵厲飾謂戎服尚威武也今月令獵為射淮呂厲下有服厲字淮有服廣字呂挾作操呂獵作射命主祠祭禽於四方以所獲禽祀四方之神也司馬職曰羅弊致禽以祀祊呂于作於淮無于字唐無是月也以下至此一節是月也草木黃落乃伐薪為炭伐木必因殺氣無淮無也字唐是月也字草木黃落已見上文蟄蟲咸俯在內皆墐其戶墐為塗閉之辟殺氣呂內作穴字淮俯作俯無下六字唐上四見上文亦無下六字乃趣獄刑毋留有罪殺氣已至有罪者即決也呂趣作決唐無此一節收祿秩之不當供養之不宜者天地殺而萬物收藏可以去之也祿秩之不當恩所加增也供養之不宜欲所貪耆熊蹯之屬非常食從呂當下有者字供作共字淮此下有通路除道境始至國而後已十二唐無此一節是月也天子乃以犬嘗稻先薦寢廟稻始熟也作呂無以犬字淮稻麻唐已見上文季秋行夏命則其國大水冬藏殃敗民多鼽嚏未之氣乘之也六月宿值東井氣多暑雨呂淮嚏作窒行冬令則國多盜賊邉境不寧土地分裂丑之氣乘之也極隂為外邉境之象也大寒之時地隆拆也行春令則暖風來至民氣解惰辰之氣乘之也㢲為風呂暖作暖惰作墮師興不居辰宿值角角主兵不居象風行不休止也樹呂興不居作旅必興淮此下有九月官候其槐孟冬之月日在尾昏危中旦七星中孟冬者日月㑹於析木之津而斗建亥之辰也節淮無日在尾字有招搖指亥字位唐作十月之日在房昏虛中曉張中斗建亥之初其日壬癸壬之言任也癸之言揆也日之行冬北從黑道閉藏萬物月為之佐時萬物懷任於下揆然萌芽人因以為日名焉盛淮此上有其位北方字下有德在水字其帝顓頊其神𤣥冥此黑精之君水官之臣自古以來著德立功者也顓頊高陽氏也𤣥冥少皥氏之子曰修曰熙為水官淮無此二句其蟲介介甲也象物閉藏地中龜鱉之屬其音羽三分商去一以生羽羽數四十八屬水者以為最清物之象也冬氣和則羽聲調樂記曰羽亂則危其財匱律中應鐘孟冬氣至則應鐘之律應應鐘者姑洗之所生三分去一律長四寸二十七分寸之二十周語曰應鐘均利器用俾應復其數六水生數一成數六但言六者亦舉其成數唐此下有其性智其事聽其味鹹其臭朽水之臭味也凡鹹朽者皆屬焉氣若有若無為朽淮朽作腐其祀行祭先腎冬隂盛寒於水祀之於行從辟除之類也祀之先祭腎者隂位在下腎亦在下腎為尊也行在廟門外之西為軷壤厚二寸廣五尺輪四尺祀行之禮北面設主於軷上乃制腎及脾為俎奠于主南又設盛於俎東祭肉腎一脾再其他皆如祀門之禮淮行作井水始冰地始凍雉入大水為蜃虹藏不見皆記時候也大水淮也大蛤曰蜃雞唐作立冬之日水始冰後五日地始凍後五日野入大水為蜃而以下四字屬後章天子居𤣥堂左個乘𤣥路駕鐵驪載𤣥旗衣黑衣服𤣥玉食黍與彘其器閎以奄𤣥堂左個北堂西偏也鐵驪色如鐵黍秀舒散屬火寒時食之亦以安性也彘水畜也器閎而奄象物閉藏也今月令曰乘軫路似當為袗字之誤也玉呂奄作弇黍淮此一節作天子衣黑衣乘𤣥驪服𤣥建𤣥旗食與彘服八風水爨松燧火北宮御女黑色衣黑衣擊磬石其兵鎩其畜彘朝於𤣥堂右個以出冬令命有司修羣禁禁外徙閉門閭大搜客斷罰刑殺當罪阿上亂法者誅彘諸本路皆作輅唐黑作𤣥作鴈是月也以立冬先立冬三日大史謁之天子曰某日立冬盛德在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬於北郊還反賞死事恤孤寡迎冬者祭黑帝叶光紀於北郊之兆也死事謂以國事死者若公叔禺人顔涿聚者也孤寡其妻子也有以惠賜之大功加賞冬呂無以字帥作率反作乃淮無是月至乃齊一節於作歲于九唐無是月也以立冬字大史下有先立冬三字無三字有諸侯字淮唐帥反字並同呂本是月也命大史釁龜策占兆審卦吉凶策蓍也占兆龜之繇文也周禮龜人上春釁龜謂建寅之月也秦以其嵗首使大史釁龜策與周異矣卦吉凶謂易也審省録之而不釁筮筮短賤於兆也今月令曰釁祠祠衍字兆呂史作卜釁作禱祠呂淮策作䇿無占兆字卦下有以察字淮無也字史作祝釁作禱祀下又有神位占字唐以此一節屬孟春章是察阿黨則罪無有掩蔽阿黨謂治獄吏以私恩曲橈相為也字呂是上有于字黨作上下有亂法者罪下有之淮無此一節城唐無是字蔽下有是月也可以築郭造宮室穿竇窖修囷倉是月也天子始裘九月授衣至此可以加裘于淮是月也作于是司唐此下有是月也祭神州地祇北郊是月也命有祭司寒是月也命有司祭司中司命司人司祿此下又别分為一章云十月中氣日在尾昏危中曉翼中斗建亥位之中命有司曰天氣上騰地氣下降天地不通閉塞而成冬使有司助閉藏之氣門户可閉閉之忩牖可塞塞之呂無塞字淮無此一節唐云小雪之日虹藏不見後五日天氣上騰地氣下降後五日閉塞而成冬無天地不通字命百官謹蓋藏謂府庫囷倉有藏物作呂命作令唐百官有司命司徒循行積聚無有不斂謂芻木薪蒸之屬唐淮無循字及無有不斂字無命司徒字壞城郭戒門閭修鍵閉慎管籥固封疆備邉境完要塞謹關梁塞徯徑壞益也鍵牡閉牝也管籥摶鍵器也固封疆謂使有司循其溝樹及其衆庶之守法也要塞邉城要害處也梁橋橫也徯徑禽獸之道也今月令疆或為璽淮呂壞作附管作關作呂淮鍵作楗疆作璽徯作蹊壞作修戒作警備修無梁字塞作絶三唐無慎至疆六字及完要塞字徯作蹊飭喪紀辨衣裳審棺椁之薄厚塋丘壟之小大高卑厚薄之度貴賤之等級此亦閉藏之具順時飭正之也辨衣裳謂襲斂尊卑所用也所用又有多少呂喪作哀淮無辨衣裳字槨下有衣衾字卑作庳度下云使貴賤尊卑各有等級是月也命工師效功陳祭器案度程毋或作為淫巧以蕩上心必功致為上霜降而百工休至此物皆成也工師工官之長也效功録見百工所作器物也主于祭器祭器尊也度謂制大小也程謂器所容也淫巧謂奢僞怪好也蕩謂搖動生其奢淫心呂淮無命字呂唐無或為必字淮程作呈無毋或至必十一字功作堅物勒工名以考其誠勒刻也刻工姓名於其器以察其信知其不功致淮無此一節功有不當必行其罪以窮其情功不當者取材美而器不堅也呂功作工罪淮云功事若慢作為淫巧必行其與唐皆無以窮其情四字是月也大飲蒸十月農事畢天子諸侯與其羣臣飲酒於大學以正齒位謂之大飲别之于他其禮亡今天子以燕禮羣國以鄉飲酒禮代之蒸為有牲體為俎也黨正職曰國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位亦謂此時也詩云十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥受福無疆是頌大飲之詩呂淮蒸作蒸天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀此周禮所謂蠟祭也天宗謂日月星辰也大割大殺羣牲割之也臘謂以田獵所得禽祭也五祀門户中霤竈行也或言祈年或言大割或言臘互文祭呂割下有牲字臘作饗禱淮無乃字割作禱祠作無及門閭字臘作畢饗無五祀字唐無此一節勞農以休息之黨正屬民飲酒正齒位是也呂淮農下有夫字天子乃命將帥講武習射御角力為仲冬將大閲簡習之亦因營室主武事也凡田之禮唯狩最備夏小正十一月王狩呂帥作率習作肄淮無天子乃字力下有徑字唐無此一節而有是月也易關市來征旅納貨賄以便人事四方來集逺鄉皆至則財不匱上無乏用百事乃遂是月也乃命水虞漁師收水泉池澤之賦毋或敢侵削衆庶兆民以為天子取怨于下其有若此者行罪無赦因盛德在水收其稅一淮無是月也及敢字削作平又無衆庶以下二十字唐水虞漁師作有司無泉池字或作令亦無衆庶字赦下有是月也乃命有司秫稻必齊麴蘖必時湛熾必潔水泉必香淘器必良火齊必得兼用六物酒官監之無有差貸四十字孟冬行春令則凍閉不密地氣上泄寅之氣乘之也呂淮上並作發民多流亡象蟄蟲動行夏令則國多暴風方冬不寒蟄蟲復出巳之氣乘之也立夏㢲用事巽為風淮無國字行秋令則雪霜不時申之氣乘之也小兵時起土地侵削申隂氣尚微申宿值參伐為兵其淮此下有十月官司馬樹檀仲冬之月日在斗昏東辟中旦軫中仲冬者日月㑹于星紀而斗建子之辰也字呂辟作壁淮無日在斗字有招搖指子無東字中唐作十一月之節日左箕昏營室曉軫中斗建子位之初律中黃鍾黃鍾者律之始也九寸仲冬氣至則黃鍾之律應周語曰黃鍾所以宣養六氣九德諸本上下與孟冬同今從唐本冰益壯地始坼鶡旦不鳴虎始交皆記時候也鶡旦求旦之鳥也交猶合也呂淮旦作鴠淮鶡作鳱唐無冰益壯地始坼字作大雪之日鶡鳥不鳴後五日武始交後五日荔挺生天子居𤣥堂大廟𤣥堂大廟北堂當大室唐諸本上下與孟冬同今從本飭死事飭軍事戰必有死志字呂淮唐並無此三字今按三衍文當從唐本命有司曰土事毋作慎毋發蓋毋發室屋及起大衆以固而閉地氣沮泄是謂發天地之房諸蟄則死民必疾疫又隨以喪命之曰暢月而猶女也暢猶充也大隂用事尤重閉藏蓋呂無慎字蓋下有藏字無發室屋及字閉下有發藏起大衆字沮作且必作多作淮無慎蓋字屋作居無以固至沮泄八字房作藏又有喪下有急捕盜賊誅淫佚詐僞之又無之字暢作畼曰唐無曰慎蓋字沮作且無命之暢月字是月也命奄尹申宮令審門閭謹房室必重閉奄尹主領奄竪之官也于周則為內宰掌治王之內政宮令譏出入及開閉之屬重閉外內閉也淮無是月也字唐奄尹作內宰省婦事毋得淫雖有貴戚近習毋有不禁省婦事所以靜隂類也淫為女工奢僞怪好物也貴戚謂姑姊妹之屬近習天子所親幸者下淮無毋得以下十三字唐無省婦以六字乃命大酋秫稻必齊麴蘖必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸酒孰曰酋大酋者酒官之長也于周則為酒人秫稻必齊謂孰成也湛漬也熾炊也火齊生孰之調也物猶事也差貸謂失誤有善有惡也古者穫稻而漬米麴至春而為酒詩云十月穫稻為此春酒以介眉壽呂熾作熺無兼用以下八字唐此一節見前章天子命有司祈祀四海大川名源淵澤井泉順其德盛之時祭之也今月令淵為深井呂淮子下有乃字呂源作原淮唐無祈字淮無源淵泉字唐無天子字無淵澤字又分此下别為一章云十一月中氣日在南斗昏東壁中曉角中斗建子位之中冬至之日蚯蚓結後五日麋角解後五日水泉動是月也祀昊天上帝於圓丘是月也農有不收藏積聚者馬牛畜獸有放佚者取之不詰此收斂尤急之時人有取者不罪所以警懼其主也王居明堂禮曰孟冬之月命農畢積聚繫收牛馬呂淮馬牛作牛馬佚作失淮無上者字唐畜作禽佚作逸山林藪澤有能取蔬食田獵禽獸者野虞教道之其有相侵奪者罪之不赦務收斂野物也大澤曰藪草木之實為蔬食諸本道皆作導呂淮蔬作疏淮無下者字唐野虞作有司此下有是月也命有司祭馬步是月也伐木取竹箭是月也日短至隂陽爭諸生蕩爭者隂方盛陽欲起也蕩謂物動將萌芽也淮無諸生蕩字君子齊戒處必掩身身欲寧去聲色禁耆欲安形性事欲靜以待隂陽之所定寧安也聲謂樂也易及樂春秋說云冬至人主與羣臣從八能之士作樂五日此言去聲色又相反上諸本並無一身字耆皆作嗜呂掩作弇淮君子有是月也字寧作靜欲作欲下又有寧身體字無事欲以下十字唐欲靜作無躁藝始生荔挺出蚯蚓結麋角解水泉動又記時侯也藝香草也荔挺馬䪥也水泉動潤上行淮作荔挺出藝始生蚓作蚓字唐無藝始生三餘見上文日短至則伐木取竹箭此其堅成之極時淮無日短至三字伐下有樹字唐已見上文是月也可以罷官之無事去器之無用者謂先時權所建作者也天地閉藏而萬物休可以去之淮無以去字塗闕庭門閭築囹圄此以助天地之閉藏也順時氣也藏呂淮此作所淮無也字唐無此一節仲冬行夏令則其國乃旱午之氣乘之也氛霧冥冥霜露之氣散相亂也呂氛作氣雷乃發聲震之動也午屬震行秋令則天時雨汁瓜瓠不成酉之氣乘之也酉宿直昴畢畢好雨雨汁者水雪雜下也子宿值虛危虗危內有瓜瓠淮天作其汁作水國有大兵兵亦畢之氣行春令則蝗蟲為敗當蟄者出卯之氣乘之也作呂淮並作蟲螟唐蟲蝗水泉咸竭大火為旱民多疥癘疥癘之病孚甲象也一呂淮疥作疾樹淮此下有十月官都尉其棗季冬之月日在婺女昏婁中旦氐中季冬者日月㑹于𤣥枵而斗建丑之辰也淮無日在婺女字有招搖指丑字昏唐作十二月之節日在南斗奎中曉亢中斗建丑位之初律中大呂大呂者蕤賔之所生也三分益一律長八寸二百四十三分寸之百四季冬氣至則大呂之律應周語曰大呂助陽宣物諸本見仲冬章鴈北向鵲始巢雉雊雞乳皆記時候也雊雉鳴也詩云雉之朝雊尚求其雌呂雉雊雞乳作乳雉雊日淮始作加雉雊雞乳作雉雊雞呼卵唐云小寒之鴈北鄉後五日鵲始巢後五日野雉始雊天子居𤣥堂右個𤣥堂右個北堂東偏有諸本見仲冬章唐此下命將帥講武習射御角力乃教田獵以習五戎班馬政命僕及七騶咸駕載旌旐授車以級整設於屏外有司搢撲北面以誓之天子乃厲飾執弓挾矢以獵命有司修祭禽之禮天子乃䄍百神于南郊為來年祈福于天宗又分此下别為一章云十二月中氣日在須女昏婁中曉氐中斗建丑位之中大寒之日雞始乳後五日鷙鳥厲疾後五日水澤腹堅命有司大難旁磔出土牛以送寒氣此難難隂氣也難隂始於此者隂氣右行此月之中日歷虗危虗危有墳墓四司之氣為厲鬼將隨强隂出害人也旁磔于四方之門磔攘也出猶作也作土牛者丑為牛牛可牽止也送猶畢也諸本難作儺淮無以送寒氣字唐屬下文征鳥厲疾殺氣當極也征鳥題肩也齊人謂之擊征或名曰鷹仲春化為鳩唐見上文乃畢山川之祀及帝之大臣天之神祇四時之功成于冬孟月祭其宗至此可以祭其佐也帝之大臣句芒之屬天之神祗司中司命風師雨師呂畢下有行字天下有地字淮唐無此一節是月也命漁師始漁天子親往乃嘗魚先薦寢廟天子必親往視漁明漁非常事重之也此時魚潔美淮無是月也字嘗作射淮唐無乃字唐漁師作有司冰方盛水澤腹堅命取冰腹厚也此月日在北陸冰堅厚之時也北陸謂虗也今月令無堅文呂淮腹作復而唐水澤腹堅已見上此但云命取藏之冰以入命告民出五種冰既入而令田官告民出五種明大寒氣過農事將起也淮無冰方至以入十三字又無告字作唐以已命農計耦耕事修耒耜具田器耜者耒之金也廣五寸田器鎡䥓之屬又命下作有司字牛淮命作令之唐無事字此下有命有司出土以示農耕早晚命樂師大合吹而罷嵗將終與族人大飲作樂于大寢以綴恩也言罷者此用禮樂於族人最盛後年若時乃復然也凡用樂必有禮用禮則有不用樂者王居明堂禮季冬命國為酒以合三族君子說小人樂節唐以此一屬下文乃命四監收秩薪柴以共郊廟及百祀之薪燎四監主山林川澤之官也大者可析謂之薪小者合束謂之柴薪施炊㸑柴以給燎春秋傳曰其父析薪今月令無及百祀之薪燎節吕淮共作供郊作寢淮無柴字唐以此一屬下文是月也日窮於次月窮於紀星回於天數將幾終言日月星辰運行於此月皆周匝於故處也次舍也紀㑹也終呂回作回淮回作周無數將幾字嵗且更始專而農民毋有所使而猶女也言專一女農民之心令之豫有志於耕稼之事不可徭役徭役之則志散失業也作呂淮且作將呂而作于淮專令而作靜唐而作其天子乃與公卿大夫共飭國典論時令以待來嵗之宜飭國典者和六典之法也周禮以正月為之建寅而縣之今用此月則所因於夏殷也合呂無公字縣淮無共字來作嗣唐此下有是月也諸侯制百為來嵗受朔日與諸侯所稅於人輕重之法貢職之數以遠近土宜為度以給郊廟之事無有所私乃命大史次諸侯之列賦之犧牲以共皇天上帝社稷之饗此所與諸侯共者也列國有大小也賦之犧牲大者出多小者出少饗獻也諸本共並作供淮饗作芻享社唐大史作有司無皇天上帝稷之享八字而有享祀二字乃命同姓之邦共寢廟之芻豢此所與同姓共者也芻豢猶犧牲呂淮邦作國共作供命宰歷卿大夫至於庶民土田之數而賦犧牲以共山林名川之祀此所與卿大夫庶民共者也歷猶次也卿大夫采地亦有大小其非采地以其邑之民多少賦之呂命作令歷作磨賦下有之字共作供牲淮無命宰歷三字卿下有士字無土田至犧以九字唐無此一節凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寢廟山林名川之祀民非神之福不生雖有其邦國采地此賦要由民出呂此下有行之是令此謂一終二旬二日又淮無此一節合唐無者字共作供名川作川澤此下有命樂正大吹而罷乃命有司收秩薪柴以供郊廟及百祀之薪燎命有司大儺旁磔以送寒氣季冬行秋令則白露早降介蟲為妖戌之氣乘之也九月初尚有白露月中乃為霜丑為鱉蟹四鄙入保畏兵辟寒象呂鄙作鄰行春令則胎夭多傷辰之氣乘之也夭少長也此月物甫萌芽季春乃句者畢出萌者盡達胎夭多傷者生氣早至不充其性淮無多字國多固疾生不充性有久疾也命之曰逆衆害莫大于此行夏令則水潦敗國時雪不降冰凍稍釋未之氣乘之也季夏大雨時行淮此下有十二月官獄其樹櫟禮書綱目卷五十五
