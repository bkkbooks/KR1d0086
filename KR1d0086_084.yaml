body:
  text: 禮書綱目卷八十二婺源江永撰鍾律樂二補伏羲氏作易紀陽氣之初以為律法劉昭續後漢志黃帝使伶倫自大夏之西昆侖之隂應劭曰大夏西戎之國也取竹於嶰溪之谷以生而空竅厚薄均者斷兩節間而吹之以為黃鍾之宫孟康曰嶰溪昆侖之北谷名也灼曰取谷中之竹生而內孔外內厚薄自然均者截以為筒不復加削刮也師古曰黃鍾之宫律之最長者制十二筒以聽鳳皇之鳴其雄鳴為六雌鳴亦六以比黃鍾之宫而皆可以生之故曰黃鍾律吕之本師古曰比合也可以生之謂上下相生也十一管皆生於黃鍾之宫故曰律吕之本秋前漢律歷志上吕氏春與此小異見篇大師掌六律六同以合隂陽之聲陽聲黃鍾大蔟姑洗蕤賔夷則無射隂聲大吕應鍾南吕函鍾小吕夾鍾皆文之以五聲宫商角徵羽皆播之以八音金石土革絲木匏竹以合隂陽之聲者聲之隂陽各有合黃鍾子之氣也十一月建焉而辰在星紀大吕丑之氣也十二月建焉而辰在𤣥枵大蔟寅之氣也正月建焉而辰在娵訾應鍾亥之氣也十月建焉而辰在析木姑洗辰之氣也三月建焉而辰在大梁南吕酉之氣也八月建焉而辰在夀星蕤賔午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾中吕巳之氣也四月建焉而辰在實沈無射戌之氣也九月建焉而辰在大火夾鍾卯之氣也二月建焉而辰在降婁辰與建交錯貿處如表裏然是其合也文之者以調五聲使之相次如錦繡之有文章播猶揚也揚之以八音乃可得而觀之矣金鍾鏄也石磬也土塤也革鼓鼗也絲琴瑟也木柷敔也匏笙也竹管簫也見其言相生之法及十二律之長後春官右造律鄭康成曰黃鍾長九寸大吕長八寸二百四十三分寸之一百四大蔟長八寸夾鍾長七寸二千一百八十七分寸之千七十五姑洗長七寸九分寸之一中吕長六寸萬九千六百八十三分寸之萬二千九百七十四蕤賔長六寸八十一分寸之二十六林鍾長六寸夷則長五寸七百二十七分寸之四百五十一南吕長五寸三分寸之一無射長四寸六千五百六十一分寸之六千五百二十四應鍾長四寸二十七分寸之二十周禮大師注月令注同司馬遷曰黃鍾長八寸七分一朱子曰七當作十大吕七寸五分三分一朱子曰一當作二强蔡元定曰七寸五分三分二四百五大蔟七寸七分二朱子曰七當作十夾鍾六寸一分三分一朱子曰一當作七一蔡曰六寸七分三分强一百九十八姑洗六寸七分四朱子曰七當作十仲吕五寸九分三分二蔡曰强五百八十一蕤賔五寸六分三分一朱子曰一當作二百蔡曰五寸六分三分二强四八十六林鍾五寸七分四朱子曰七當作十夷則五寸四分三分二朱子曰四分字衍百蔡曰五寸三分二弱二一十六南吕四寸七分八朱子曰七當作十無射四寸四分三分二蔡曰强六百二十今按當云强六百一八應鍾四寸二分三分二史記律書生鍾分之法見後異朱子曰按鄭氏與太史公說不同太史二說又自為而今皆取之且以鄭先於馬者鄭氏之言分寸審度之正法也太史之言欲其便於損益而為假設之權制也蓋管律之長以九為本上下相生以三為法而鄭氏所用正法破一寸以為十分而其下破分為釐破釐為毫破毫為絲破絲為忽皆必以十為數則其數中損益之際皆有餘分雖有巧歷終不能盡是以自分而下遂不可析而直以九相乘歷十二管至破一寸以為一萬九千餘分而後略可得而記焉然亦苦於難記而易差終不若太史公之法為得其要而易考也蓋其以子為一而十一三之以至於亥則得十七萬七千一百四十七算而子為全律之數亥為全律之實可知矣以寅為子之寸數而酉為寸法則其律有九寸可知矣以辰為子之分數而未為分法則其寸有九分可知矣以午為子之釐數而已為釐法則其分有九釐可知矣以申為子之毫數而卯為毫法則其釐有九毫可知矣以戌為絲數而丑為絲法則毫有九絲可知矣下而為忽亦因絲而九之雖出權宜而不害其得乎自然之數以之損益則三分之數整齊簡直易記而不差也其曰黃鍾八寸十分一者亦放此意但以正法之數合其權法之分故不同耳其實則不異也又曰史記律數十誤作七者五皆誤屈其下垂之筆本司馬貞沈括之說其夾㽔夷三律誤字則今以算得之朱子曰今依史記生鍾法約定分釐毫絲忽皆以十為九而止黃鍾九寸林鍾六寸太蔟八寸南吕五寸三分凡言分者皆九分寸之一姑洗七寸一分應鍾四寸六分六釐凡言釐者皆九分分之一蕤賔六寸二分八釐大吕八寸三分七釐六毫凡言毫者皆九分釐之一夷則五寸五分五釐一毫夾鍾七寸四分三釐七毫三絲凡言絲者皆九分毫之一無射四寸八分八釐四毫八絲中吕六寸五分八釐三毫四絲六忽凡言忽者皆九分絲之一鄭康成曰凡律空圍九分月令注稱蔡雍月令章句曰黃鍾之管長九寸徑三分其餘皆短雖大小圍數無增減又雍銅籥銘曰籥黃鍾之宫長九寸空圍九分又韋昭國語注曰黃鍾之變也管長九寸徑三分圍九分因而九之九九八十一故黃鍾之數立焉則今按蔡韋皆言徑三分誤也雍謂餘律圍數無增減是孟康注漢書圍皆隨長而減誤也孟說見後篇朱子曰黃鍾之管長九寸圍九分徑三分四釐六毫今按此用胡瓊之說然算術亦未密也蔡元定曰黃鍾長九寸空圍九分積八百一十分以漢志斛銘文定右十二律長圍徑之數漢志說見後篇班固曰太極元氣函三為一行於十二辰始動於子參之於丑得三又參之於寅得九又參之於卯得二十七又參之於辰得八十一又參之於已得二百四十三又參之於午得七百二十九又參之於未得二千一百八十七又參之於申得六千五百六十一又參之於酉得萬九千六百八十三又參之於戌得五萬九千四十九又參之於亥得十七萬七千一百四十七漢志司馬遷生黃鍾術曰置一而九三之以為法實如法得長一寸凡得九寸命曰黃鍾之宫律書蔡元定曰子一黃鍾之律丑三為絲法寅九為寸數卯二十七為毫法辰八十一為分數巳二百四十三為釐法午七百二十九為釐數未二千一百八十七為分法申六千五百六十一為毫數酉一萬九千六百八十三為寸法戌五萬九千四十九為絲數亥一十七萬七千一百四十七黃鍾之實蔡曰黃鍾九寸以三分為損益故以三歷十二辰得一十七萬七千一百四十七為黃鍾之實其十二辰所得之數在子寅辰午申戌六陽辰為黃鍾寸分釐毫絲之數在亥酉未巳卯丑六隂辰為黃鍾寸分釐毫絲之法其寸分釐毫絲之法皆用九數故九絲為毫九毫為釐九釐為分九分為寸九寸為黃鍾蓋黃鍾之實一十七萬七千一百四十七之數以三約之為絲者五萬九千四十九以二十七約之為毫者六千五百六十一以二百四十三約之為釐者七百二十九以二千一百八十七約之為分者八十一以一萬九千六百八十三約之為寸者九由是三分損益以生十一律焉或曰徑圍之分以十為法而相生之分釐毫絲以九為法何也曰以十為法者天地之全數也以九為法者因三分損益而立也全數者即十而取九相生者約十而為九即十而取九者體之所以立約十而為九者用之所以行體者所以定中聲用者所以生十一律也又曰十二律之實子黃鍾十七萬七千一百四十七丑林鍾十一萬八千九十八寅太蔟十五萬七千四百六十四卯南吕十萬四千九百七十六辰姑洗十三萬九千九百六十八巳應鍾九萬三千三百一十二午蕤賔十二萬四千四百一十六未大吕十六萬五千八百八十八申夷則十一萬五百九十二酉夾鍾十四萬七千四百五十六戌無射九萬八千三百四亥仲吕十三萬一千七十二右黃鍾十一律之實司馬遷曰生鍾分子一分蔡元定曰一為九寸十朱子曰黃鍾全律之數凡七萬七千一百四十七算丑三分二蔡曰一為三寸之朱子曰以參乘子數得三為子絲法又三分子數而去一得二為林鍾林鍾未律丑之衝也凡隂律放此凡一十一萬八千九十八算寅九分八蔡曰一為一寸一朱子曰以三乘三得九為子之寸數又三分二而益得八為太簇凡一十五萬七千四百六十四算卯二十七分十六蔡曰三為一寸一為三分十朱子曰以三乘寅上數得二七為子之毫法又三分寅下數而去一得此下數為南吕凡一十萬四千九百七十六算辰八十一分六十四蔡曰九為一寸一為一分分朱子曰以三乘卯上數得此上數為子之數又三分卯下數而益一得此下數而為姑洗凡一十三萬九千九百六十八算巳二百四十三分一百二十八蔡曰二十七為一寸三為一分一為三釐釐朱子曰以三乘辰上數得此上數為子之法又三分辰下數而去一得此下數為應鍾凡九萬三千三百一十二算午七百二十九分五百一十二蔡曰八十一為一寸九為一分一為一釐朱子曰以三乘巳上數得此上數為子之釐數又三分巳下數而益一得此下數為蕤賔凡一十二萬四千四百一十六算未二千一百八十七分一千二十四蔡曰二百四十三為一寸二十七為一分三為一釐一為三毫分朱子曰以三乘午上數得此上數為子之分法又三午下數而去一得此下數為大吕凡一十六萬五千八百八十八算申六千五百六十一分四千九十六蔡曰七百二十九為一寸八十一為一分九為一釐一為一毫分朱子曰以三乘未上數得此上數為子之毫數又三未下數而益一得此下數為夷則凡一十一萬五百九十二算酉一萬九千六百八十三分八千一百九十二蔡曰二千一百八十七為一寸二百四十三為一分二十七為一釐三為一毫一為三絲分朱子曰以三乘申上數得此上數為子之寸法又三申下數而去一得此下數為夾鍾凡一十四萬七千四百五十六算戌五萬九千四十九分三萬二千七百六十八蔡曰六千五百六十一為一寸七百二十九為一分八十一為一釐九為一毫一為一絲朱子曰以三乘酉上數得此上數為子之絲數又三分酉下數而益一得此下數為無射凡九萬八千三百四算亥十七萬七千一百四十七分六萬五千五百三十六蔡曰一萬九千六百八十三為一寸二千一百八十七為一分二百四十三為一釐二十七為一毫三為一絲一為三忽戌朱子曰以三乘戌上數得此上數為子之實又三分下數而去一得此下數為仲吕凡一十三萬一千七十二算律書右黃鍾生十一律司馬遷生黃鍾術曰以下生者倍其實三其法上生者四其實三其法律書班固曰黃鍾三分損一下生林鍾三分林鍾益一上生太蔟三分太蔟損一下生南吕三分南吕益一上生姑洗三分姑洗損一下生應鍾三分應鍾益一上生蕤賔三分蕤賔損一下生大吕三分大吕益一上生夷則三分夷則損一下生夾鍾三分夾鍾益一上生無射三分無射損一下生仲吕今按大吕夾鍾仲吕三律皆用倍數隂陽相生自黃鍾始而左旋八八為五前漢志下今按上相生當以律書漢前後志為正吕氏春秋淮南子鄭𤣥周禮注韋昭國語注杜佑通典及朱子律寸新舊二法皆云蕤賔夷則無射上生大吕夾鍾仲吕下生與史漢之說不同雖大吕夾鍾仲吕三律用倍數則一然諸家皆以數之多寡為生之上下蔡氏謂其律吕隂陽皆錯亂無倫非相生之本法者其說是也今除史漢以外惟存鄭氏之說以備觀考也他不盡録鄭康成曰十二律相生以隂陽六體為之黃鍾初九也下生林鍾之初六林鍾又上生太蔟之九二太簇又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賔之九四蕤賔又上生大吕之六四大吕又下生夷則之九五夷則又