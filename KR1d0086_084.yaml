法又以三為度以上生者皆三分益一以下生者皆三分去一宫生徴三分宫數八十一分各二十七下生去一去二十七餘五十四以為徴故徴數五十四也徴生商三分徴數五十四分各十八上生者加一加十八於五十四得七十二以為商故商數七十二也商生羽三分商數七十二分各二十四下生者去一去二十四餘四十八以為羽故羽數四十八也羽生角三分羽數四十八分各十六上生者益一加十六於四十八得六十四以為角故角數六十四也此五聲大小之次也是黃鍾為均用五聲之法以下十一辰辰各有五聲其為宫商之法亦如之故辰各有五聲合為六十聲是十二律之正聲也朱子曰沈括疑史記此說止是黃鍾一均之數非衆律之通法今詳通典云十一辰宫商之法亦如之蓋若以十一律為宫亦用此數以乘本律之分數而損益之如林鍾為均則以八十一為五十四二十七為十八之類也通典變宫聲四十二小分六前羽後宫變徴聲五十六小分八後徴前角鍾律新書參定右變聲漢志引舜曰豫欲聞六律五聲八音七始詠晏子曰五聲六律七音八風九歌以相成也左氏傳韋昭曰周有七音黃鍾為宫太蔟為商姑洗為角林鍾為徴南吕為羽應鍾為變宫蕤賔為變徴國語注蓋朱子曰後漢志說與此同此說以黃鍾為法餘律凖此杜佑曰殷已前但有五音自周以來加文武二聲謂之為七音五聲為正二聲為變者是也通典注淮南子曰姑洗生應鍾比於正音故為和應鍾生蕤賔不比於正音故為繆朱子曰五聲相生至於角位則其數六十有四隔八下生當得宫前一位以為變宫然其數三分損一每分各得二十有一尚餘一分不可損益故五聲之正至此而窮若欲生之則須更以所餘一分析而為九損其三分之一分乃得四十二分餘九分分之六而後得成變宫之數又自變宫隔八上生當得徴前一位其數五十有六餘九分分之八以為變徴正合相生之法自此又當下生則又餘二分不可損益而其數又窮故立均之法至於是而終焉然而一變但為和繆已不得為正聲矣宫商角變徴徴羽變宫第一宫黃正太正姑正蕤正林正南正應正第二宫林正南正應正大正半太正半姑正半蕤正半第三宫太正姑正蕤正夷正南正應正大正半第四宫南正應正大正半夾正半姑正半蕤正半夷正半第五宫姑正蕤正夷正無正應正大正半夾正半第六宫應正大正半夾正半仲正半蕤正半夷正半無正半第七宫蕤正夷正無正半黃變半大正半夾正半仲正半第八宫大正夾正仲正林變夷正無正黃變半第九宫夷正無正黃變半太變半夾正半仲正半林變半第十宫夾正仲正林變南變無正黃變半太變半第十一宫無正黃變半太變半姑變半仲正半林變半南變半第十二宫仲正林變南變應變黃變半太變半姑變半右旋宫八十四聲圗鍾律新書參定變正律墨書正律之半朱書律朱書變律之半墨書舜典曰律和聲五聲六律十二管還相為宫也疏曰十二辰各自為宫一宫各有五聲十二管相生之次至中吕而止凡六十聲及朱子曰按孔氏以本文但云五聲十二管故不二變而止為六十聲今增入二變二十四聲合為八十四聲自唐以來法皆如此云禮運黃鍾為宫則太蔟姑洗林鍾南吕皆以正聲應無有忽微不復與他律為役者同心一統之義也非黃鍾而他律雖當其月自宫者則其和應之律有空積忽微不得其正此黃鍾至尊無與竝也朱子曰此言黃鍾唯於本宫用正律若它律為宫則黃鍾之為商角徴羽二變者皆但用其變律而正律不復與之為役也此與通典變律之說相發明而本志所言有未盡者前漢志為宫為商為角為徴為羽十二管自本律之外為他律之四聲者合其律為調黃於本律於無於夷於中於夾以上黃宫五調各用本均七聲而以黃鍾起調黃鍾畢曲餘律放此大本律應南蕤姑太本律黃無林中夾本律大應夷蕤姑本律太黃南林中本律夾大無夷蕤本律姑太應南林本律中夾黃無夷本律蕤姑大應南本律林中太黃無本律夷蕤夾大應本律南林姑太右六十調圗朱子曰六十調即前旋宫圗內六十聲也其二變二十四聲非五聲之正不可為調故止於六十也候氣之法為室三重户閉塗釁必周密布緹縵室中以木為案每律各一律卑外髙從其方位加律其上以葭莩灰抑其內端按厯而候之氣至者灰去其為氣所動者其灰散人及風所動者其灰聚後漢志其升陽之數在冬至則黃鍾九寸升五分一釐三毫大寒則大吕八寸三分七釐六毫升三分七釐六毫雨水則太蔟八寸升四分五釐一毫六絲春分則夾鍾七寸四分三釐七毫三絲升三分三釐七毫三絲榖雨則姑洗七寸一分升四分五毫四絲三忽小滿則仲吕六寸五分八釐三毫四絲六忽升三分三毫四絲六忽夏至則蕤賔六寸二分八釐升二分八釐大暑則林鍾六寸升三分三釐四毫處暑則夷則五寸五分五釐五毫升二分五釐五毫秋分則南吕五寸三分升三分四毫一絲霜降則無射四寸八分八釐四毫八絲升二分二釐四毫八絲小雪則應鍾四寸六分六釐律吕新書右候氣度者分寸尺丈引也所以度長短也本起黃鍾之長以子榖秬黍中者一黍之廣度之九十分黃鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣師古曰子榖猶言榖子秬即黑黍也中者不大不小也言取黑黍榖子大小中者率為分寸也漢志右審度量者籥合升斗斛也所以量多少也本起於黃鍾之籥用度數審其容以子榖秬黍中者千有二百實其籥以井水凖其概合籥為合十合為升十升為斗十斗為斛而五量嘉矣孟康曰概欲其直故以水平之井水清清則平也師古曰概所以概平斗斛之上者也嘉善也其法用銅方尺而圜其外旁有庣焉其上為斛其下為斗左耳為升右耳為合籥其狀似爵上三下二參天兩地圜而函方左一右二隂陽之象也其圜象規其重二鈞聲中黃鍾之宫漢志右嘉量衡權者衡平也權重也衡所以任權而均物平輕重也權者銖兩斤鈞石也所以稱物平施知輕重也本起於黃鍾之重一籥容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石五權之制以義起之以物鈞之其餘小大之差以輕重為冝圜而環之令之肉倍好者孟康曰謂錘之形如環也如淳曰體為肉孔為好周旋無端終而復始無窮已而五權謹矣漢志右謹權衡鍾律義樂三補管子曰凡聽徴如負猪豕覺而駭凡聽羽如鳴馬在樹馬疑當作鳥凡聽宫如牛鳴窖中凡聽商如離羣羊凡聽角如雉登木以鳴音疾以清以鳴下木字疑衍地員司馬遷曰音樂者所以動蕩血脈通流精神而和正心也故宫動脾而和正聖商動肺而和正義角動肝而和正仁徴動心而和正禮羽動腎而和正智故聞宫音使人溫舒而廣大聞商音使人方正而好義聞角音使人惻隱而愛人聞徴音使人樂善而好施聞羽音使人整齊而好禮史記漢志曰商之為言章也物成孰可章度也角觸也物觸地而出載芒角也宫中也居中央暢四方唱始施生為四聲綱也徴祉也物盛大而繁祉也羽宇也物聚藏宇覆之也夫聲者中於宫觸於角祉於徴章於商宇於羽故四聲為宫紀也協之五行則角為木五常為仁五事為貌商為金為義為言徴為火為禮為視羽為水為智為聽宫為土為信為思以君臣民事物言之則宫為君商為臣角為民徴為事羽為物唱和有象故言君臣位事之體也五聲之本生於黃鍾之律九寸為宫或損或益以㝎商角徴羽九六相生隂陽之應也王將鑄無射王景王也問律於伶州鳩律鍾律也對曰律所以立均出度也律謂六律六吕也陽為律隂為吕六律黃鍾太蔟姑洗蕤賔夷則無射也六吕林鍾中吕夾鍾大吕應鍾南吕也均者均鍾木長七尺有絃繫之以均鍾者度謂鍾之大小清濁也漢大豫樂官有之古之神瞽考中聲而量之以制神瞽古樂正知天道者也死以為樂祖祭於瞽宗謂之神瞽考合也謂合中和之聲而量度之以制樂也度律均鍾百官軌儀均平也軌道也儀法也度律度律吕之長短以平其鍾和其聲以立百事之道法也故曰律度量衡於是乎生紀之以三三天地人古者紀聲合樂以舞天神地祗人鬼故能神人以和朱子曰此疑謂三分損益之法平之以六平之以六律也上章曰律以平聲成於十二十二律吕也隂陽相扶律取妻而吕生子上下相生之數備也天之道也天之大數不過十二夫六中之色也故名之曰黃鍾十一月黃鍾乾初九也六者天地之中天有六氣降生五味天有六母地有五子十一而天地畢矣而六為中故六律六吕而成天道黃鍾初九六律之首故以六律正色為黃鍾之名重元正始之義也黃鍾陽之變也管長九寸徑三分圍九分律長九寸因而九之九九八十一故黃鍾之數立而為宫法云九寸之六得林鍾初六六吕之首隂之變管長六寸六月之律坤之始也故九六隂陽夫婦子母之道是以初九為黃鍾黃中之色也鍾之言陽氣鍾聚于下也漢朱子曰六字之義注雖粗通然似亦太牽合矣下章志正作黃字而其他說亦多出此疑此六字本是黃字劉歆時尚未誤至韋昭作注時乃滅其上之半而為六耳又注云九寸之一亦疑有誤當是去其三分之一所以宣養六氣九德也宣遍也六氣隂陽風雨晦明也九德九功之德水火金木土榖正德利用厚生十一月陽伏于下物始萌于五聲為宫含元處中所以遍養六氣九德之本也由是第之由從也第次也次其月也二曰太蔟正月太蔟乾九二也管長八寸法云九分之八太蔟言陽氣太蔟達於上所以金奏贊陽出滯也贊佐也賈唐云太蔟正聲為商故為金奏所以佐陽發出滯伏也明堂月令正月蟄蟲始震三曰姑洗所以修潔百物考神納賔也三月姑洗乾九三也管長七寸一分律長七寸九分寸之一姑潔也洗濯也考合也言陽氣養生洗濯枯穢改柯易葉也於正聲為角是月百物修潔故用之宗廟合致神人用之享宴可以納賔也四曰蕤賔所以安靖神人獻酬交酢也五月蕤賔乾九四也管長六寸三分律長六寸八十一分寸之二十六蕤委蕤柔貌也言隂氣為主委蕤於下陽氣盛長於上有似於賔主故可用之宗廟賔客以安靜神人行酬酢也酬勸酢報也五曰夷則所以詠歌九則平民無二也七月夷則乾九五也管長五寸六分律長五寸七百二十九分寸之四百五十一夷平也則法也言萬物既成可法則也故可以詠歌九功之則成民之志使無疑二也六曰無射所以宣布哲人之令德示民軌儀也九月無射乾上九也管長四寸九分律長四寸六千五百六十一分寸之六千五百二十四宣遍也軌道也儀法也九月陽氣上升隂氣收藏萬物無射見者故可以遍布前哲之令德示民道法也為之六間以揚沈伏而黜散越也六間六吕在陽律之間沈滯也黜去也越揚也吕隂律所以侣間陽律成其功發揚滯伏之氣而去散越者也伏則不宣散則不和隂陽序次風雨時至所以生物者也元閒大吕助宣物也十二月大吕坤六四也管長八寸八分法云三分之二四寸二百四十三分寸之五十二倍之為八寸分寸之一百四下生律元一也隂繫於陽以黃鍾為主故曰元間以陽為首不名其初臣歸功於上之義也大吕助陽宣散物也天氣始于黃鍾萌而赤地受之于大吕牙而白成黃鍾之功也二閒夾鍾出四隙之細也二月夾鍾坤六五也管長七寸四分律長三寸二千一百八十七分寸之一千五百三十三倍之為七寸分寸之一千七十五隙間也夾鍾助陽鍾聚曲細也四隙四時之間氣微細者春為春中萬物始生四時之氣皆始於春春發而出之三時奉而成之故夾鍾出四時之微氣也三間中吕宣中氣也四月中吕坤上六也管長六寸六分律長三寸萬九千六百八十三分寸之六千四百八十七倍之為六寸分寸之萬二千九百七十四陽氣起于中至四月宣散于外純乾用事隂閉藏于內所以助陽成功也故曰正月正陽之月也四間林鍾和展百事俾莫不任肅純恪也六月林鍾坤初六也管長六寸律長六寸林衆盛也鍾聚也於正聲為徴展審也俾使也肅速也純大也恪敬也言時務和審百事無有僞詐使莫不任其職事速其功大敬其職事也五間南吕贊陽秀也八月南吕坤六二也管長五寸三分律長五寸三分寸之一不榮而實曰秀南任也隂任陽事助成萬物贊佐也六間應鍾均利器用俾應復也十月應鍾坤六三也管長四寸七分律長四寸二十七分寸之二十言隂應陽用事萬物鍾聚百嘉具備時務均利百官器用程度庶品使皆應其禮復其常也月令孟冬命工師效功陳祭器按程度母作淫巧以蕩上心必功致為上也律吕不易無姦物也律吕不變易其正各順其時則神無姦行物無害生也細鈞有鍾無鏄昭其大也細細聲謂角徴羽也鈞調也鐘大鍾鏄小鍾也昭明也有鍾無鏄為兩細不相和故以鍾為節節明其大者以大平細大鈞有鏄無鍾大謂宫商也舉宫商而但有鏄無鍾為兩大不相和故去鍾而用鏄以小平大甚大無鏄鳴其細也甚大謂同尚大聲也則又去鏄獨鳴其細細謂絲竹革木大昭小鳴和之道也大聲昭小聲鳴和平之道也和平則久久可久樂也久固則純固安也可久則安安則純也孔子曰從之純如也純明則終終成也書曰簫韶九成終復則樂終復終則復奏故樂所以成政也言政象樂也故先王貴之貴其和平可以移風易俗王曰七律者何周有七音王問七音之律意謂七律為音器用黃鍾為宫大蔟為商姑洗為角林鍾為徴南吕為羽應鍾為變宫蕤賔為變徴對曰昔武王伐殷嵗在鶉火嵗嵗星也鶉火次名周分野也從栁九度至張十七度為鶉火謂武王始發師東行時殷之十一月二十八日戊子於夏為十月是時嵗星在張十三度張鶉火也月在天駟天駟房星也謂戊子日月宿房五度日在析木之津津天漢也析木次名從尾十度至斗十一度為析木其間為漢津謂戊子日日宿箕七度辰在斗柄辰日月之㑹斗柄斗前也謂戊子後三日得周正月辛卯朔於殷為十二月夏為十一月是日月合在斗前一度星在天黿星辰星也天黿次名一曰𤣥枵從須女八度至危十五度為天黿謂周正月辛卯朔二日壬辰辰星始見三日癸巳武王發行二十八日戊午渡孟津距戊子三十一日二十九日己未晦冬至辰星在須女伏天黿之首星與日辰之位皆在北維星辰星辰星在須女日在析木之津辰在斗柄故皆在北維北維北方水位也顓頊之所建也帝嚳受之建立也顓頊帝嚳所代也帝嚳周之先祖后稷所出也禮祭法曰周人禘嚳而郊稷顓頊水德之王立於北方帝嚳木德故受之於水今周亦木德當受殷之水猶帝嚳之受顓頊也我姬氏出自天黿姬氏周姓天黿即𤣥枵齊之分野也周之皇妣王季之母太姜者逢伯陵之後齊女也故言出於天黿有逢伯陵因之蒲姑氏因之而後大公因之又曰有星出於須女姜氏任氏實守其地及析木者有建星及牽牛焉從斗一度至十一度分屬析木日辰所在也建星在牽牛間謂從辰星所在須女天黿之首至析木之分歷建星及牽牛皆水宿言得水類也則我皇妣大姜之姪伯陵之後逢公之所馮神也皇君也生曰母死曰妣太姜大王之妃王季之母姜女也女子謂昆弟之子男女皆曰姪伯陵太姜之祖有逢伯陵也逢公伯陵之後太姜之姪殷之諸侯封於齊地齊地屬天黿故祀天黿死而配食為其神主故云馮馮依也言天黿乃皇妣家之所馮依非但合於水木相承而已又我實出於水家周道起於太王故本於太姜嵗之所在則我有周之分野也嵗星在鶉火鶉火周之分野嵗星所在利以伐人月之所在辰馬農祥也辰馬謂房心星也心星所在大辰之次為天駟駟馬也故曰辰馬言月在房合於農祥也祥猶象也房星晨正而農事起故謂之農祥我太祖后稷之所經緯也稷播百榖故農祥后稷之所經緯也晉語曰辰以成善后稷是相王欲合是五位三所而用之王武王也五位嵗月日星辰也三所逢公所馮神周分野所在后稷所經緯也自鶉及駟七列也鶉鶉火之分張十三度駟天駟房五度嵗月之所在從張至房七列合七宿謂張翼軫角亢氐房之位南北之揆七同也七同合七律也揆度也嵗在鶉火午辰星在天黿子鶉火周分野天黿及辰水星周所出自午至子其度七同也凡神人以數合之以聲昭之凡凡合神人之樂也以數合之謂取其七也以聲昭之用律調音也數合聲和然後可同也同謂神人相應故以七同其數而以律和其聲於是乎有七律七同其數謂七列七同七律也律和其聲律有隂陽正變之聲王以二月癸亥夜陳未畢而雨二月周二月四日癸亥至牧野之日夜陳師陳師未畢而雨雨天地人神叶同之應也以夷則之上宫畢之夷平也則法也夷則所以平民無二也上宫以夷則為宫聲夷則上宫也故以畢陳周禮大師執同律以聽軍聲而詔吉凶一曰陽氣在上故曰上宫當辰辰在戌上故長夷則之上宫名之曰羽長謂先用之也辰時也辰日月之會斗柄也當初陳之時周二月昏斗建丑而斗柄在戌上下臨其時名其樂為羽羽翼其衆也所以藩屏民則也屏蔽也羽之義取能藩蔽民使中法則也王以黃鍾之下宫布戎于牧之野布戎陳兵也謂夜陳之晨旦甲子昧爽左杖黃鉞右秉白旄時也黃鍾所以宣養氣德使皆自勉尚桓桓也黃鍾在下故曰下宫故謂之厲所以厲六師也名此樂為厲者所以厲六軍之衆也以大蔟之下宫布令於商昭顯文德底紂之多罪商紂都也文文王也底至也既殺紂入商之都發號施令以昭明文王之德致紂之多罪太蔟所以贊揚出滯蓋謂釋箕子之囚散鹿臺之財發巨橋之粟也太蔟在下故曰下宫故謂之宣所以宣三王之德也三王太王王季文王也反及嬴內以無射之上宫布憲施舍於百姓嬴內地名憲法也施施惠舍舍罪也無射所以宣布哲人之令德示民軌儀無射在上故曰上宫故謂之嬴亂所以優柔容民也亂治也柔安也周語漢志曰律十有二陽六為律隂六為吕律以統氣類物吕以旅陽宣氣黃鍾黃者中之色君之服也鍾者種也天之中數五韋昭曰一三在上七九在下五為聲聲上宫五聲莫大焉地之中數六韋昭曰二四在上八十在下六為律律有形有色色上黃五色莫盛焉故陽氣施種於黃泉孳萌萬物師古曰孳讀與滋同滋益也萌始生為六氣元也以黃色名元氣律者著宫聲也宫以九唱六孟康曰黃鍾陽九林鍾隂六言陽唱隂和變動不居周流六虛始於子在十一月大吕吕旅也言隂大吕助黃鍾宣氣而牙物也位於丑在十二月大蔟族奏也言陽氣大奏地而達物也師古曰奏進也位於寅在正月夾鍾言隂夾助大族宣四方之氣而出種物也位於卯在二月姑洗洗潔也言陽氣洗物辜潔之也孟康曰辜必也必使之潔也位於辰在三月中吕言微隂始起未成著於其中旅助姑洗宣氣齊物也位於已在四月蕤賔蕤繼也賔導也言陽始導隂氣使繼養物也位於午在五月林鍾林君也言隂氣受任助蕤賔君主種物使長大楙盛也師古曰種物種生之物楙古茂字也位於未在六月夷則則法也言陽氣正法度而使隂氣夷當傷之物也師古曰夷亦傷位於申在七月南吕南任也言隂氣旅助夷則任成萬物也位於酉在八月無射射厭也言陽氣究物而使隂氣畢剝落之終而復始亡厭已也位於戌在九月應鍾言隂氣應亡射該臧萬物而雜陽閡種也孟康曰閡臧塞也隂雜陽氣臧塞為萬物作種也晉灼曰外開曰閡位於亥在十月朱子曰十二律之名必有深指然國語漢志所言如此支離附合恐非本真今姑存之不足深究也孟子曰師曠之聰不以六律不能正五音聖人既竭耳力焉繼之以六律正五音不可勝用也司馬遷曰細若氣微若聲聖人因神而存之雖妙必效班固曰至治之世天地之氣合以生風天地之風氣正十二律定劉昭曰截管為律吹以考聲列以候氣道之本也續後漢志漢志曰易曰參天兩地而倚數天之數始於一終於二十五其義紀之以三故置一得三又二十五分之六凡二十五置終天之數得八十一以天地五位之合終於十者乘之為八百一十分應歷一統千五百三十九嵗之章數黃鍾之實也由此之義起十二律之周徑孟康曰律孔徑三分參天數也圍九分終天數也地之數始於二終於三十其義紀之以兩故置一得二凡三十置終地之數得六十以地中六數乘之為三百六十分當期之日林鍾之實也孟康曰林鍾長六寸圍六分以圍乘長得三百六十分人者繼天順地序氣成物統八卦調八風理八政正八節諧八音舞八佾監八方被八荒以終天地之功故八八六十四其義極天地之變以天地五位之合終於十者乘之為六百四十分以應六十四卦太蔟之實也孟康曰太蔟長八寸圍八分為積六百四十分也今按十二律之圍徑皆同孟康此注誤也淮南子曰規始於一一不生故分而為隂陽隂陽合和而萬物生故曰一生二二生三三生萬物天地三月而為一時三參物三三如九黃鍾之九寸而宫音調因而九之九九八十一故黃鍾之數立焉律之數六分為雌雄故曰十二鍾以副十二月十二各以三成故置一而十一三之為積分十七萬七千一百四十七黃鍾大數立焉後漢志術曰陽以圓為形其性動隂以方為節其性靜動者數三靜者數二以陽生隂倍之以隂生陽四之皆三而一陽生隂曰下生隂生陽曰上生上生不得過黃鍾之清濁下生不得及黃鍾之數實皆參天兩地圓蓋方覆六耦承竒之道也禮書綱目卷八十二
