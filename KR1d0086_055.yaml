body:
  text: 禮書綱目卷五十三婺源江永撰歷數通禮一補黃帝迎日推䇿晋灼曰䇿數也迎數之也瓉曰日月朔望未來而推之故曰迎日順天地之紀幽明之占旁羅日月星辰旁羅大戴禮作歷離史記少皥氏以鳥名官少皥金天氏黃帝之子巳姓之祖也鳳鳥氏歷正也鳳鳥知天時故以名厯正之官𤣥鳥氏司分者也𤣥鳥燕也以春分來秋分去伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止青鳥氏司啓者也青鳥鶬鷃也以立春鳴立夏止丹鳥氏司閉者也丹鳥鷩雉也以立秋來立冬去入大水為蜃上四鳥皆厯正之屬官年昭十七左氏傳帝顓頊載時以象天帝嚳厯日月而迎送之史記帝嚳能序星辰以著衆著衆謂使民興事知休作之期也祭法堯乃命羲和欽若昊天歷象日月星辰敬授人時集傳曰羲氏和氏主厯象授時之官若順也旲廣大之意厯所以紀數之書象所以觀天之器如下篇璣衡之屬是也日陽精一日而繞地一周月隂精一月而與日一㑹星二十八宿衆星為經金木水火土五星為緯皆是也辰以日月所㑹分周天之度為十二次也人時謂耕穫之候凡民事早晚之所關也其說詳見下文分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾此下四節言厯既成而分職以頒布且考驗之恐其推步之或差也或曰上文所命蓋羲伯和伯此乃分命其仲叔未詳是否也宅居也嵎夷即禹貢嵎夷既略者也曰暘谷者取日出之義羲仲所居官次之名蓋官在國都而測候之所則在於嵎夷東表之地也寅敬也賔禮接之如賔客也亦帝嚳歷日月而迎送之意出日方出之日蓋以春分之旦朝方出之日而識其初出之景也平均秩序作起也東作春月嵗功方興所當作起之事也蓋以歷之節氣早晚均次其先後之宜以授有司也日中者春分之刻於夏永冬短為適中也晝夜皆五十刻舉畫以見夜故曰日星鳥南方朱鳥七宿唐一行推以鶉火為春分昏之中星也殷中也春分陽之中也析分散也先時冬寒民聚於隩至是則以民之散處而驗其氣之溫也乳化曰孳交接曰尾以物之生育而驗其氣之和也申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革申重也南交南方交址之地陳氏曰南交下當有曰明都三字訛化也謂夏月時物長盛所當變化之事也史記索隱作南為謂所當為之事也敬致周禮所謂冬夏致日蓋以夏至之日中祠日而識其景如所謂日至之景尺有五寸謂之地中者也永長也日永晝六十刻也星火東方蒼龍七宿火謂大火夏至昏之中星也正者夏至陽之極午為正陽位也因析而又析以氣愈熱而民愈散處也希革鳥獸毛希而革易也分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋厥民夷鳥獸毛毨西謂西極之地也曰昧谷者以日所入而名也餞禮送行者之名納日方納之日也蓋以秋分之莫夕方納之日而識其景也西成秋月物成之時所當成就之事也宵夜也宵中者秋分夜之刻於夏冬為適中也畫夜亦各五十刻舉夜以見日故曰宵星虛北方𤣥武七宿之虛星秋分昏之中星也亦曰殷者秋分隂之中也夷平也暑退而人氣平也毛毨鳥獸毛落更生潤澤鮮好也申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛朔方北荒之地謂之朔者朔之為言蘇也萬物至此死而復蘇猶月之晦而有朔也日行至是則淪於地中萬象幽暗故曰幽都在察也朔易冬月嵗事已畢除舊更新所當改易之事也日短晝四十刻也星昴西方白虎七宿之昴宿冬至昏之中星也亦曰正者冬至隂之極子為正隂之位也隩室之內也氣寒而民聚於內也氄毛鳥獸生耎毳細毛以自溫也蓋既命羲和造歷制器而又分方與時使各驗其實以審夫推步之差聖人之敬天勤民其謹如此是以術不違天而政不失時也又按此冬至日在虛昏中昴今冬至日在斗昏中壁中星不同者蓋天有三百六十五度四分度之一嵗有三百六十五日四分日之一天度四分之一而有餘嵗日四分之一而不足故天度常平運而舒日道常內轉而縮天漸差而西嵗漸差而東此嵗差之由唐一行所謂嵗差者是也古厯簡易未立差法但隨時占候修改以與天合至東晋虞喜始以天為天以嵗為嵗乃立差以追其變約以五十年退一度何承天以為太過乃倍其年而又反不及至隋劉焯取二家中數七十五年為近之然亦未為精密也因附著於此帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成嵗允釐百工庶績咸熙咨嗟也嗟歎而告之也暨及也朞猶周也允信釐治工官庶衆績功咸皆熙廣也天體至圓周圍三百六十五度四分度之一繞地左旋常一日一周而過一度日麗天而少遲故日行一日亦繞地一周而在天為不及一度積三百六十五日九百四十分日之二百三十五而與天㑹是一嵗日行之數也月麗天而尤遲一日常不及大十三度十九分度之七積二十九日九百四十分日之四百九十七而與日㑹十二㑹得全日三百四十八餘分之積又五千九百八十八如日法九百四十而一得六不盡三百四十八通計得日三百五十四九百四十分日之三百四十八是一嵗月行之數也嵗有十二月月有三十日三百六十者一嵗之常數也故日與天㑹而多五日九百四十分日之二百三十五者為氣盈月與日㑹而少五日九百四十分日之五百九十二者為朔虗合氣盈朔虛而閏生焉故一嵗閏率則十日九百四十分日之八百二十七三嵗一閏則三十二日九百四十分日之六百單一五嵗再閏則五十四日九百四十分日之三百七十五十有九嵗七閏則氣朔分齊是為一章也故三年而不置閏則春之一月入於夏而時漸不定矣子之一月入於丑而嵗漸不成矣積之之久至於三失閏則春皆入夏而時全不定矣十二失閏子皆入丑嵗全不成矣其名實乖戾寒暑反易農桑庶務皆失其時故必以此餘日置閏月於其間然後四時不差而嵗功得成以此信治百官而衆功皆廣也堯典舜在璿璣玉衡以齊七政在察也美珠謂之璿璣機也以璿飾璣所以象天體之運轉也衡橫也謂衡簫也以玉為管橫而設之所以窺璣而齊七政之運行猶今之渾天儀也七政日月五星也七者運行於天有遲有速有順有逆猶人君之有政事也此言舜初攝位整理庶務首察璣衡以齊七政蓋歷象授時所當先也曰按渾天儀者天文志云言天體者三家一曰周髀二宣夜三曰渾天宣夜絶無師說不知其狀如何周髀之術以為天似覆盆蓋以斗極為中中高而四邉下日月旁行繞之日近而見之為晝日遠而不見為夜蔡雍以為考驗天象多所違失渾天說曰天之形狀似鳥卵地居其中天包地外猶卵之裹黃圓如彈丸故曰渾天言其形體渾渾然也其術以為天半覆地上半在地下其天居地上見者一百八十二度半强地下亦然北極出地上三十六度南極入地下亦三十六度而嵩高正當天之中極南五十五度當嵩高之上又其南十二度為夏至之日道又其南二十四度為春秋分之日道又其南二十四度為冬至之日道南下去地三十一度而已是夏至日北去極六十七度春秋分去極九十一度冬至去極一百一十五度此其大率也其南北極持其兩端其天與日月星宿斜而回轉此必古有其法遭秦而滅至漢武帝時落下閎始經營之鮮于妄人又量度之至宣帝時耿夀昌始鑄銅而為之象宋錢樂又鑄銅作渾天儀衡長八尺孔徑一寸璣徑八尺圓周二丈五尺强轉而望之以知日月星辰之所在即璿璣玉衡之遺法也巡守協時月正日時謂四時月謂月之大小日謂日之甲乙諸侯之國其有不齊者則協而正之也舜典洪範次四曰協用五紀五紀曰協所以合天也四五紀一曰嵗二曰月三曰日四曰星辰五曰歷數嵗者序四時也月者定晦朔也日者正躔度也星經星緯星辰日月所㑹十二次也厯數者占步之法所以紀嵗月日星辰也洪範太史正嵗年以序事頒之於官府及都鄙中數曰嵗朔數曰年中朔大小不齊正之以閠若今時作歷日矣定四時以次序授民時之事春秋傳曰閏以正時時以作事事以厚生生民之本於是乎在頒告朔於邦國天子頒朔於諸侯諸侯藏之祖廟至朔朝於廟告而受行之鄭司農云頒讀為班班布也以十二月朔布告天下諸侯春官馮相氏掌十有二嵗十有二月十有二辰十日二十有八星之位辨其叙事以㑹天位嵗謂太嵗嵗星與日同次之月斗所建之辰樂說說嵗星與日常應太嵗月建以見嵗日月星辰宿之位謂方面所在辨其叙事若謂仲春辨秩東作仲夏辨秩南訛仲秋辨秩西成仲冬辨在朔易㑹天位者合此嵗日月星辰宿五者以為時事之候若今厯日太嵗在某月某日某甲朔日值某也冬夏致日春秋致月以辨四時之序冬至日牽牛景丈三尺夏至日在東井景尺五寸此長短之極極則氣至冬無愆陽夏無伏隂春分日在婁秋分日在角而月弦於牽牛東井亦以其景知氣至否春秋冬夏氣皆至則是四時之叙正矣同上土圭尺有五寸以致日致日度景至否夏日至之景尺有五寸冬日至之景丈有三尺考工記玉人典瑞土圭以致四時日月以致四時日月者度其景至不至以知其行得失也冬夏以致日春秋以致月春官孟春乃命太史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常典六典法八法也離讀如儷偶之儷宿儷謂其屬馮相氏保章氏掌天文者相與宿偶當審候伺不得過差也經紀謂天文進退度數月令右治歷澤中有火革君子以治歷明時四時之變革之大者象傳聖人慎守日月之數以察星辰之行以序四時之順逆謂之厯截十二管以宗八音之上下清濁謂之律也律居隂而治陽因地主氣歷居陽而治隂因天主事律歷迭相治也厯以治時律以候氣其間不容髮其致一也大戴禮桓公十七年冬十月朔日有食之甲乙者厯之紀也晦朔者日月之㑹也日食不可以不存晦朔晦朔須甲乙而可推故日食必以書朔日為例不書日官失之也天子有日官諸侯有日御日官日御典厯數者日官居卿以底日禮也日官天子掌厯者不在六卿之數而位從卿故言居卿也底平也謂平厯數日御不失日以授百官於朝日官平厯以班諸侯諸侯奉之不失天時以授百官左傳文公元年於是閏三月非禮也於厯法閏當在僖公末年誤於今年三月置閏蓋時達歷者所譏先王之正時也履端於始舉正於中歸餘於終步履之始以為術之端首朞之日三百六十有六日日月之行又有遲速而必分為十二月舉中氣以正月有餘日則歸之於終積而為閏故言歸餘於終履端於始序則不愆四時無愆過舉正於中民則不惑斗建不失其次寒暑不失其常故無疑惑歸餘於終事則不悖四時得所則事無悖亂六年閏月不告朔非禮也經稱告月傳稱告朔明告月必以朔閏以正時四時漸差則致閏以正之時以作事順時命事事以厚生事不失時則年豐生民之道於是乎在矣不告閏朔棄時政也何以為民襄公二十七年十一月乙亥朔日有食之辰在申司歷過也再失閏矣謂斗建指申周十一月今之九月斗當建戌而在申故知再失閏也丈十一年三月甲子至今年七十一嵗應有二十六閏今長厯推得二十四閏通計少再閏釋例言之詳矣哀公十二年冬十有二月螽周十二月今十月是嵗應置閏而失不置雖書十二月實今之九月司歷誤一月九月之初尚溫故得有螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢火心星也火伏在今十月今火猶西流司厯過也猶西流言未盡沒知是九月厯官失一閏釋例論之備尼明年經書十有二月螽注云前年季孫雖聞仲之言而不正厯失閏至此年故復十二月螽實十一月並同上洪範次八曰念用庶徴庶徴曰念所以省驗也八庶徴曰雨曰暘曰燠曰寒曰風曰時五者來備各以其叙庶草蕃廡徴驗也廡豐茂所驗者非一故謂之庶徴雨暘燠寒風各以時至故曰時也備者無缺少也叙者應節候也五者備而不失其叙庶草且蕃廡矣則其他可知也雨屬水暘屬火燠屬木寒屬金風屬土吳仁傑曰易以坎為水北方之卦也又曰雨以潤之則雨為水矣離為火南方之卦也又曰日以烜之則暘為火矣小明之詩首章云我征徂西二月初吉二章云昔我往矣日月方燠夫以二月為燠則燠之為春為木明矣漢志引狐突金寒之言顔師古謂金行在西故謂之寒則寒之為秋為金明矣又按稽疑以雨屬水以霽屬火霽暘也則庶徴雨之為水暘之為火類例抑又甚明蓋五行乃生數自然之叙五事則本於五行庶徴則本於五事其條理次第相為貫通有秩然而不可紊亂者也一極備凶一極無凶極備過多也極無過少也唐孔氏曰雨多則潦雨少則旱是極備亦凶極無亦凶餘凖是曰休徴曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徴曰狂恆雨若曰僭恆暘若曰豫恆燠若曰急恆寒若曰䝉恆風若狂妄僭差豫怠急迫䝉昧也在天為五行在人為五事五事修則休徴各以類應之五事失則咎徴各以類應之自然之理也然必曰某事得則某休徴應某事失則某咎徴應則亦膠固不通而不足與語造化之妙矣天人之際未易言也失得之機應感之微非知道者孰能識之哉曰王省惟嵗卿士惟月師尹惟日嵗月日以尊卑為徴也王者之失得其徴以嵗卿士之失得其徴以月師尹之失得其徴以日蓋雨暘燠寒風五者之休咎有係一嵗之利害有係一月之利害有係一日之利害各以其大小言也嵗月日時無易百榖用成乂用明俊民用章家用平康嵗月日三者雨暘燠寒風不失其時則其效如此休徴所感也日月嵗時既易百榖用不成乂用昏不明俊民用微家用不寧日月嵗三者雨暘燠寒風既失其時則其害如此咎徴所致也休徴言嵗月日者總於大也咎徴言日月嵗者著其小也庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨民之麗乎土猶星之麗乎天也好風者箕星好雨者畢星漢志言軫星亦好雨意者星宿皆有所好也日有中道月有九行中道者黃道也北至東井去極近南至牽牛去極逺東至角西至婁去極中是也九行者黑道二出黃道北赤道二出黃道南白道二出黃道西青道二出黃道東并黃道為九行也日極南至於牽牛則為冬至極北至於東井則為夏至南北中東至角西至婁則為春秋分月立春春分從青道立秋秋分從白道立冬冬至從黑道立夏夏至從赤道所謂日月之行則有冬有夏也月行東北入於箕則多風月行西南入於畢則多雨所謂月之從星則以風雨也民不言省者庶民之休咎係乎上人之得失故但以月之從星以見所以從民之欲者如何爾夫民生之衆寒者欲衣饑者欲食鰥寡孤獨者之欲得其所此王政之所先而卿士師尹近民者之責也然星雖有好風好雨之異而日月之行則有冬有夏之常以月之常行而從星之異好以卿士師尹之常職而從民之異欲則其從民者非所以徇民矣言日月而不言嵗者有冬有夏所以成嵗功也言月而不言日者從星惟月為可見耳洪範保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶志古文識識記也星謂五星辰日月所㑹五星有嬴縮圜角日有薄食暈珥月有虧盈朓側匿之變七者右行列舍天下禍福變移所在皆見焉以星土辨九州之地所封封域皆有分星以觀妖祥星土星所主土也封猶界也鄭司農說星土以春秋傳曰參為晋星商主大火國語曰嵗之所在則我有周之分野之屬是也𤣥謂大界則曰九州中諸國中之封域於星亦有分焉其書亡矣堪輿雖有郡國所入度非古數也今其存可言者十二次之分也星紀吳越也𤣥枵齊也娵訾衛也降婁魯也大梁趙也實沈晋也鶉首秦也鶉火周也鶉尾楚也夀星鄭也大火宋也析木燕也此分野之妖祥主用客星慧孛之氣為象以十有二嵗之相觀天下之妖祥嵗謂太嵗嵗星與日同次之月斗所建之辰也嵗星為陽右行於天太嵗為隂左行於地十二嵗而小周其妖祥之占甘氏嵗星經其遺象也鄭司農云太嵗所在嵗星所居春秋傳曰越得嵗而吳伐之必受其凶之屬是也以五雲之物辨吉凶水旱降豐荒之祲象物色也視日旁雲氣之色降下也知水旱所下之國鄭司農云以二至二分觀雲氣青為蟲白為喪赤為兵荒黑為水黃為豐故春秋傳曰凡分至啓閉必書雲物為備故也故曰凡此五物以詔救政以十有二風察天地之和命乖别之妖祥十有二辰皆有風吹其律以知和不其道亡矣春秋襄十八年楚師伐鄭師曠曰吾驟歌北風又歌南風南風不競多死聲楚必無功是時楚師多凍其命乖别審矣凡此五物者以詔救政訪序事訪謀也見其象則當豫為之備以詔王救其政且謀今嵗天時占相所宜次序其事春官眂祲掌十輝之法以觀妖祥辨吉凶妖祥善惡之徴鄭司農云輝謂日光氣也一曰祲二曰象三曰鐫四曰監五曰暗六曰瞢七曰彌八曰叙九曰隮十曰想故書彌作迷隮作資鄭司農云祲隂陽氣相侵也象者如赤烏也鐫謂日旁氣四靣反鄉如輝狀也監雲氣臨日也暗日月食也瞢日月瞢瞢無光也彌者白虹彌天也叙者雲有次序也如山在日上也隮者升氣也想者輝光也𤣥謂鐫讀如童子佩鐫之鐫謂日旁氣刺目也監冠珥也彌氣貫日也隮虹也詩云朝隮於西想雜氣有似可形想掌安宅叙降宅居也降下也人見妖祥則不安主安其居處也次序其凶禍所下謂禳移也正嵗則行事占夢以季冬贈惡夢此正月而行安宅之事所以順民嵗終則弊其事弊斷也謂計其吉凶然否多少上同右占候僖公五年春王正月辛亥朔日南至周正月今十一月冬至之日日南極公既視朔遂登觀臺以望而書禮也視朔親告朔也觀臺臺上構屋可以逺觀者也朔旦冬至厯數之所始治厯者因此則可以明其術數審别隂陽叙事訓民魯君不能常修此禮故善公之得禮凡分至啓閉必書雲物分春秋分也至冬夏至也啓立春立夏閉立秋立冬雲物氣色災變也傳重申周典不言公者日官掌其職為備故也素察妖祥逆為之備左氏傳十六年王正月戊申朔隕石於宋五隕落也聞其隕視之石數之五各隨其聞見先後而記之莊七年星隕如雨見星之隕而隊於四逺若山若水不見在地之驗此則見在地之驗而不見始隕之星史各據事而書是月六鷁退飛過宋都是月隕石之月重言是月嫌同日鷁水鳥高飛遇風而退宋人以為災告於諸侯故書春秋隕石于宋五隕星也但言星則嫌星使石隕故傳言隕星六鷁退飛過宋都風也六鷁遇迅風而退飛風高不為物害故不記風之異周內史叔興聘于宋宋襄公問焉曰是何祥也吉凶焉在祥吉凶之先見者襄公以為石隕鷁退能為禍福之始故問其所在對曰今兹魯多大喪今兹此嵗明年齊有亂君將得諸侯而不終魯喪齊亂宋襄公不終别以政刑吉凶他占知之退而告人曰君失問是隂陽之事非吉凶所生也言石隕鷁退隂陽錯逆所為非人所生襄公不知隂陽而問人事故曰君失問叔興自以對非其實恐為有識所譏故退而告人吉凶由人吾不致逆君故也積善餘慶積惡餘殃故曰吉凶由人君問吉凶不敢逆之故假他占以對左氏傳晋公子重耳適齊齊侯妻之姜氏言於公子曰吾聞晋之始封也始封謂唐叔虞嵗在大火閼伯之星也實紀商人商殷也自氐五度至尾九度為大火之次閼伯陶唐氏之火正居于商丘祀大火死以配食相土因之故商主大火實紀商之吉凶也商之饗國三十一王自湯至紂瞽史之記曰唐叔之世將如商數瞽史知天道者今未半也自唐叔至惠公十四世故曰未半子必有晋若何懷安國語晋語秦伯納公子董因迎公於河董因晋大夫周大史辛有之後也傳曰辛有之二子董之晋故晋有董史公問焉曰吾其濟乎對曰嵗在大梁將集天行元年始受實沈之星也嵗在大梁謂魯僖公二十三年嵗星在大梁之次也集成也行道也言公將成天道也公以辰出晋祖唐叔所以封也而以參入晋星也元年謂文公即位之年魯僖二十四年嵗星去大梁在實沈之次受受於大梁也自胃七度至畢十二度為大梁自畢十三度至東井十五度曰實沈實沈之墟晋人是居所以興也墟次也是居居其分次以主祀也傳曰高辛氏有子季曰實沈遷於大夏主祀參唐人是因成王滅唐而封叔虞南有晋水子燮改為晋侯故參為晋星今君當之無不濟矣當嵗星在實沈之虛故無不成君之行也嵗在大火大火閼伯之星也是謂大辰君之行謂魯僖公五年重耳出奔時嵗在大火大火大辰也傳曰高辛氏有子曰閼伯遷於商丘祀大火辰以成善后稷是相唐叔以封成善謂辰為農祥周先后稷之所經緯以成善道相視也謂祀農祥以戒農事封者唐叔封之時嵗在大火瞽史記曰嗣續其祖如榖之滋必有晋國瞽史記云唐叔之世將如啇數今言嗣續其祖明趣同也言晋子孫將繼續其先祖如榖之蕃滋故必有晋國且以辰出而以參入皆晋祥也辰大火也參伐也參在實沈之次而天之大紀也所以大紀天時也傳曰大火為大辰伐亦為大辰辰時也濟且秉成必霸諸侯秉執也子孫賴之同上文公十四年秋七月有星孛入於北斗孛彗也既見而移入北斗非常所有故書之春秋周內史叔服曰不出七年宋齊晋之君皆將死亂後三年宋弒昭公五年齊弒懿公七年晋弒靈公史服但言事徴而不論其占固非末學所得詳言左氏傳襄公九年春宋災晋侯問於士弱弱士渥濁之子莊子曰吾聞之宋災於是乎知有天道何故問宋何故自知天道將災對曰古之火正或食於心或食於味以出內火是故咮為鶉火心為大火謂火正之官配食於火星建辰之月鶉火星昏在南方則令民放火建戌之月大火星伏在日下夜不得見則令民內火禁放火陶唐氏之火正閼伯居商丘陶唐堯有天下號閼伯高辛氏之子傳曰遷閼伯於商丘主辰辰大火也今為宋星然則啇丘在宋地祀大火而火紀時焉謂出內火時相土因之故商主大火相土契孫商之祖也始伐閼伯之後居商丘祀大火商人閲其禍敗之釁必始於火是以日知其有天道也閲猶數也商人數所更歷恆多火災宋是殷商之後故知天道之災必火公曰可必乎對曰在道國亂無象不可知也言國無道則災變亦殊故不可必知十八年冬十月諸侯同伐齊十二月楚師伐鄭信於城下而還信再宿也楚師多凍役徒幾盡晋人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競歌者吹律以詠八風南風音微故曰不競也師曠唯歌南北風者聽晋楚之强弱多死聲楚必無功董叔曰天道多在西北嵗在豕韋月又建亥故曰多在西北南師不時必無功不時謂觸嵗月叔向曰在其君之德也言天時地利不如人和二十八年春無冰梓慎曰今兹宋鄭其饑乎梓慎魯大夫今年鄭游吉宋向戌言之明年饑甚傳乃詳其事嵗在星紀而淫於𤣥枵嵗嵗星也星紀在丑斗牛之次𤣥枵在子虛危之次十八年晋董叔曰天道多在西北是嵗嵗星在亥至此年十一嵗故在星紀明年乃當在𤣥枵今已在𤣥枵淫行失次以有時菑隂不堪陽時菑無冰也盛隂用事而溫無冰是隂不勝陽地氣發泄蛇乘龍蛇𤣥武之宿虛危之星龍嵗星嵗星木也木為青龍失次出虛危下為蛇所乘龍宋鄭之星也嵗星本位在東方東方房心為宋角亢為鄭故以龍為宋鄭之星宋鄭必饑𤣥枵虛中也𤣥枵三宿虗星在其中枵耗名也土虛而民耗不饑何為嵗為宋鄭之星今失常淫入虗耗之次時復無冰地氣發泄故曰土虛民耗禆竈曰今兹周王及楚子皆將死禆竈鄭大夫嵗棄其次而旅於明年之次以害鳥帑周楚惡之旅客處也嵗星棄星紀之次客在𤣥枵嵗星所在其國有福失次於北禍衝在南南為朱鳥鳥尾曰帑鶉火鶉尾周楚之分故周王楚子受其咎俱論嵗星過次梓慎則曰宋鄭饑禆竈則曰周楚王死傳故備舉以示卜占惟人所在十一月癸已天王崩十二月楚康王卒昭公六年三月鄭人鑄刑書鑄刑書於鼎以為國之常法士文伯曰火見鄭其火乎火心星周五月昏見火未出而作火以鑄刑器刑器鼎也藏爭辟焉火如象之不火何為象類也同氣相求火未出而用火相感而致災六月丙戌鄭災終士文伯之言七年夏四月甲辰朔日有食之晋侯問於士文伯曰誰將當日食對曰魯衛惡之受其凶惡衛大魯小公曰何故對曰去衛地如魯地衛地豕韋也魯地降婁也日食於豕韋之末及降婁之始乃息故禍在衛大在魯小周四月今二月故曰在降婁於是有災魯實受之災發於衛而魯受其餘禍其大咎其衛君乎魯將上卿八月衛侯卒十一月季孫宿卒公曰詩所謂彼日而食于何不臧者何也感日食而問詩對曰不善政之謂也國無政不用善則自取謫於日月之災謫譴也故政不可不慎也八月衛襄公卒十一月季武子卒晉侯謂伯瑕伯瑕士文伯曰吾所問日食從矣可常乎衛侯武子皆卒故對曰不可六物不同各異時民心不一政教殊事序不類有變易官職不則治官居職非一法同始異終胡可常也公曰何謂六物對曰嵗時日月星辰是謂也公曰多語寡人辰而莫同何謂辰對曰日月之㑹是謂辰一嵗日月十二㑹所㑹謂之辰故以配日謂以子丑配甲乙八年冬十月壬午楚師滅陳晉侯問於史趙曰陳其遂亡乎對曰未也公曰何故對曰陳顓頊之族也陳祖舜舜出顓頊嵗在鶉火是以卒滅陳將如之顓頊氏以嵗在鶉火而滅火盛而水滅今在析木之津猶將復由箕斗之間有天漢故謂之析木之津由用也且陳氏得政於齊而後陳卒亡物莫能兩盛自幕至於瞽瞍無違命幕舜之先瞽瞍舜父從幕至瞽瞍間無違天命廢絶者舜重之以明德置德於遂遂舜後蓋殷之興存舜之後而封遂言舜德乃至於遂遂世守之及胡公不淫故周賜之姓使祀虞帝胡公滿遂之後也事周武王賜姓曰媯封諸陳紹舜後臣聞盛德必百世祀虞之世數未也繼守將在齊其兆既存矣言陳氏興盛於齊形兆巳見九年夏四月陳災鄭禆竈曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬也陳顓頊之後故為水屬火水妃也火畏水故為之妃而楚所相也相治也楚之先祝融為高辛氏火正主治火事今火出而火陳火心星也火出於周為五月而以四月出者以長歷推前年誤置閏逐楚而建陳也水得妃而興陳興則楚衰故曰逐楚而建陳妃以五成故曰五年妃合也五行各相配合得五而成故五嵗而陳復封為十三年陳侯吳歸于陳傳嵗五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年是嵗嵗在星紀五嵗及大梁而陳復封自大梁四嵗而及鶉火後四周四十八嵗凡五及鶉火五十二年天數以五為紀故五及鶉火火盛水衰十年春王正月有星出於婺女客星也不書非孛鄭禆竈言於子産曰七月戊子晋君將死今兹嵗在顓頊之虗嵗嵗星也顓頊之虗謂𤣥枵姜氏任氏實守其地姜齊姓任薛姓齊薛二國守𤣥枵之地居其維首而有妖星焉告邑姜也客星居𤣥枵之維首邑姜齊太公女晋唐叔之母星占婺女為既嫁之女織女為處女邑姜齊之既嫁女妖星在婺女齊得嵗故知禍歸邑姜邑姜晉之妣也天以七紀二十八宿面七戊子逢公以登星斯於是乎出逢公殷諸侯居齊地者逢公將死妖星出婺女時非嵗星所在故齊自當禍而以戊子日卒吾是以譏之為晉侯彪卒傳秋七月戊子晉平公卒如禆竈之言十一年春景王問於萇𢎞曰今茲諸侯何實吉何實凶萇𢎞周大夫對曰蔡凶此蔡侯般弒其君之嵗也嵗在豕韋襄三十年蔡世子般弒其君嵗在豕韋至今十三嵗嵗復在豕韋般即靈侯也弗過此矣言蔡凶不過此年楚將有之然壅也蔡近楚故知楚將有之楚無德而享大利所以壅積其惡嵗及大梁蔡復楚凶天之道也楚靈王弒立之嵗嵗在大梁到昭十三年嵗復在大梁美惡周必復故知楚凶楚子召蔡靈侯殺之十一月楚子滅蔡十五年春將禘于武公戒百官齊戒梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也祲妖氛也蓋見於宗廟故以為非祭祥也氛惡氛也其在涖事乎涖臨也二月癸酉禘叔弓涖事籥入而卒十七年冬有星孛於大辰西及漢大辰房心尾也夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢申胥曰彗所以除舊布新也申胥魯大夫天事恆象天道恆以象類告示人今除於火火出必布焉諸侯其有火災乎今火向伏故知當須火出乃布散為災梓慎曰往年吾見之是其徴也徴始有形象而微也火出而見前年火出時今兹火出而章必火入而伏隨火沒也其居火也久矣歷三年其與不然乎言必然也火出於夏為三月謂昏見於商為四月於周為五月夏數得天得天正若火作其四國當之在宋衛陳鄭乎宋大辰之虛也大辰大火宋分野陳太皥之虛也大皥居陳木火所自出鄭祝融之虛也祝融高辛氏之火正居鄭皆火房也房舍也星孛及漢漢水祥也天漢水也衛顓頊之虛也故為帝丘衛今濮陽縣昔帝顓頊居之其城內有顓頊冡其星為大水衛星營室營室水也水火之牡也牡雄也其以丙子若壬午作乎水火所以合也丙午火壬子水水火合而相薄水少而火多故水不勝火若火入而伏必以壬午尚未知今孛星當復隨火星俱伏不故言若不過其見之月火見周之五月鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斝玉瓚鄭必不火瓘圭也斝玉爵也瓉勺也欲以禳火子産弗與以為天災流行非禳所息故也為明年宋衛陳鄭災傳十八年夏五月火始昏見火心星丙子風梓慎曰是謂融風火之始也東北曰融風融風木也木火毋故曰火之始七日其火作乎從丙子至壬午七日壬午水火合之日故知當火作戊寅風甚壬午火甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之大庭氏古國名在魯城內魯於其處作庫高顯故登以望氣參近占以審前年之言曰宋衛陳鄭也數日皆來告火言經所以書禆竈曰不用吾言鄭又將火前年禆竈欲用瓘斝禳火子産不聽今復請用之鄭人請用之信竈言子産不可曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信多言者或時有中遂不與亦不復火傳言天道難明雖禆竈猶不足以盡知之鄭之未災也里析告子産曰將有大祥里析鄭大夫祥變異之氣民震動國幾亡吾身泯焉弗良及也言將先災死國遷其可乎子産曰雖可吾不足以定遷矣子産知天災不可逃非遷所免故託以知不足及火里析死矣二十年春王二月己丑日南至是嵗朔旦冬至之嵗也當言正月己丑朔日南至時史失閏閏更在二月後故經因史而書正月傳更具二月記日南至者以正厯也梓慎望氛氛氣也時魯侯不行登臺之禮使梓慎望氛曰今兹宋有亂國幾亡三年而後弭蔡有大喪為宋華向出奔蔡侯卒傳叔孫昭子曰然則戴桓也戴族華氏桓族向氏汰侈無禮巳甚亂所在也傳言妖由人興二十一年秋七月壬午朔日有食之公問於梓慎曰是何物也禍福何為物事也對曰二至二分二至冬至夏至二分春分秋分日有食之不為災日月之行也分同道也至相過也二分日夜等故言同道二至長短極故言相過其他月則為災陽不克也故常為水隂侵陽是陽不勝隂於是叔輒哭日食意在於憂災昭子曰子叔將死非所哭也八月叔輒卒二十四年夏五月乙未朔日有食之梓慎曰將水隂勝陽故曰將水昭子曰旱也日過分而陽猶不克克必甚能無旱乎過春分陽氣盛時而不勝隂陽將猥出故為旱陽不克莫將積聚也陽氣莫然不動乃將積聚秋八月大雩旱也終如叔孫之言三十一年十二月辛亥朔日有食之是夜也趙簡子夢童子裸而轉以歌轉宛轉也旦占諸史墨曰吾夢如是今而日食何也簡子夢適與日食㑹謂咎在巳故問之對曰六年及此月也吳其入郢乎終亦弗克史墨知夢非日食之應故釋日食之咎而不釋其夢入郢必以庚辰庚日有變日在辰尾故曰以庚辰定四年十一月庚辰吳入郢日月在辰尾辰尾龍尾也周十二月今之十月日月合朔於辰尾而食庚午之日日始有謫火勝金故弗克謫變氣也庚午十月十九日去辛亥朔四十一日雖食在辛亥更以始變為占也午南方楚之位也午火庚金也日以庚午有變故災在楚楚之仇敵唯吳故知入郢必吳火勝金者金為火妃食在辛亥亥水也水數六故六年也三十二年夏吳伐越始用師於越也自此之前雖疆事小爭未嘗用大兵史墨曰不及四十年越其有吳乎存亡之數不過三紀歲星三周三十六嵗故曰不及四十年哀二十二年越滅吳至此三十八嵗越得嵗而吳伐之必受其凶此年嵗在星紀星紀吳越之分也嵗星所在其國有福吳先用兵故反受其殃哀公六年楚昭王卒是嵗也有雲如衆赤鳥夾日以飛三日楚子使問諸周大史周大史曰其當王身乎日為人君妖氣守之故以為當王身雲在楚上唯楚見之故禍不及他國若禜之可移於令尹司馬禜禳祭王曰除腹心之疾而置諸股肱何益不榖不有大過天其夭諸有罪受罰又焉移之遂弗禜孔子曰楚昭王知大道矣其不失國也宜哉並左氏傳挈壺氏凡軍事縣壺以序聚柝凡喪縣壺以代哭者皆以水火守之分以日夜鄭司農云縣壺以為漏以序聚柝以次更聚擊柝備守也𤣥謂擊柝兩木相敲行夜時也代亦更也禮未大斂代哭以水守壺者為沃漏也以火守壺者夜則視刻數也分以日夜者異畫夜漏也漏之箭晝夜共百刻冬夏之間有長短焉大史立成法有四十八箭及冬則以火爨鼎水而沸之而沃之鄭司農云冬水凍漏不下故以火炊水沸以沃之謂沃漏也官夏雞人凡國事為期則告之時象雞知時也告其有司主事者少牢曰宗人朝服北靣曰請祭期主人曰比於子宗人曰旦明行事告時者至此旦明而告之春官右壺漏東方未明刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉挈壺氏掌漏刻者詩齊風序禮書綱目卷五十三
