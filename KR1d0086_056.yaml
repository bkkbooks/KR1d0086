body:
  text: 禮書綱目卷五十四婺源江永撰夏小正通禮二補大戴禮補傳曰何以謂之小正以小著名也夏以十三月為正平旦為朔殷以十二月為正鷄鳴為朔周以十一月為正夜半為朔尚書大傳王者受命必改朔何明易姓示不相襲也明受之於天不受之於人所以變易民心革其耳目以助化也故喪服大傳曰王始起改正朔易服色殊徽號異器械别衣服也是以舜禹雖繼太平猶宜改以應天正朔有三何本天有三統謂三㣲之月也明王者當奉順而成之故受命各統一正也禮三正記曰正朔三而改文質再而復也三微者何謂也陽氣始於黄泉萬物動微而未著也十一月之時陽氣始養根株黄泉之下萬物皆赤赤者盛陽之氣也故周為天正色尚赤也十二月之時萬物始芽而白白者隂氣故殷為地正色尚白也十三月之時萬物始逹孚甲而出皆黑人得加功故夏為人正色尚黒不以二月後為正者萬物不齊莫適所統故必以三㣲之月也白虎通有扈氏威侮五行怠棄三正三正子丑寅之正也夏正建寅怠棄者不用正朔也今按此章則三正迭建其來久矣舜協時月正日亦所以一正朔也子丑之建唐虞之前當已有之甘誓顔淵問為邦子曰行夏之時夏時謂以斗柄初昏建寅之月為嵗首也天開於子地闢於丑人生於寅故斗柄建此三辰之月皆可以為嵗首而三代迭用之夏以寅為人正商以丑為地正周以子為天正也然時以作事則歳月自當以人為紀故孔子嘗曰吾得夏時焉而説者以為謂夏小正之屬盖取其時之正與其令之善而於此又以告顔子也論語縣子問子思曰顔回問為邦夫子曰行夏之時若時殷周異正為非乎縣子𤨏言夏以建寅為正夫子是之則啇周以子丑為正乃非乎子思曰夏數得天堯舜之所同也夏以寅為正得天數之全故堯舜亦然殷周王征伐革命以應乎天因改正朔若云天時之改爾故不相因也湯武革命所以應天故變其正朔盖言若受天命然夫受禪於人者則襲其統夏因人心之歸以受舜禪故亦因其朔不改受命於天者則革之所以神其事如天道之變然也三統之義夏得其正是以夫子云孔叢子孔子曰我欲觀夏道欲行其禮觀其所成是故之杞杞夏后氏之後也而不足徴也徴成也無賢君不足與成也吾得夏時焉得夏四時之書也其書存者有小正禮運正月啟蟄鴈北鄉雉震呴魚陟負冰農緯厥耒初歳祭耒始用暢時有俊風寒日滌凍塗田䑕出農率均田獺祭魚鷹則為鳩農及雪澤初服於公田采芸鞠則見初昏參中斗柄縣在下栁稊梅杏杝桃則華緹縞雞桴粥傳曰正月啟蟄言始發蟄也鴈北鄉先言鴈而後言鄉者何也見鴈而後數其鄉也鄉者何也鄉其居也鴈以北方為居何以謂之為居生且長焉爾九月遰鴻鴈先言遰而後言鴻鴈何也見遰而後數之則鴻鴈也何不謂南鄉也曰非其居也故不謂南鄉記鴻鴈之遰也如不記其鄉何也曰鴻不必當小正之遰者也雉震呴震也者鳴也呴也者鼓其翼也正月必雷雷不必聞唯雉為必聞之何以謂之雷則雉震呴相識以雷魚陟負氷陟升也負氷云者言解蟄也農緯厥耒緯束也束其耒云爾者用是見君之亦有耒也初嵗祭耒始用暢也暢也者終歳之用祭也其曰初云爾也者言是月之始用之也初者始也或曰祭韭也囿有見韭囿也者園之燕者也時有俊風俊者大也大風南風也何大於南風也曰合冰必於南風解冰必於南風生必於南風收必於南風故大之也寒日滌凍塗滌也者變也變而煖也凍塗者凍下而澤上多也田䑕出田䑕者嗛䑕也記時也農率均田率者循也均田者始除田也言農夫急除田也獺祭魚傳本獺下有獸字其必與之獻與疑作謂獻傳作獸何也曰非其類也祭也者得多也善其祭而後食之十月豺祭獸謂之祭獺祭魚謂之獻傳作獸祭何也豺祭其類獺祭非其類故謂之獻傳作獸大之也鷹則為鳩鷹也者其殺之時也鳩也者非其殺之時也善變而之仁也故具言之也曰則盡其辭也鳩為鷹變而之不仁也故不盡其辭也農及雪澤言雪澤之無高下也初服於公田古者有公田焉者古言先服公田而後服其田也采芸舊注云似邪蒿可食為廟采也鞠則見鞠也者何也星名也鞠則見者歳再見爾初昏參中蓋記時也云斗柄縣在下言斗柄者所以著參之中也柳稊稊也者發孚也梅杏杝桃則華杝桃山桃也緹縞緹也者莎隨也縞也者其實也先言緹而後言縞者何也緹先見者也雞桴粥粥也者相粥之時也或曰桴嫗伏也粥養也二月徃耰黍禪初俊羔助厥毋粥綏多女士丁亥萬用入學祭鮪榮堇采蘩昆小蟲抵蚳來降燕乃睇剝鱓有鳴倉庚榮芸時有見稊始收傳曰二月徃耰黍禪禪單也初俊羔助厥毋粥俊也者大也粥也者養也言大羔能食草木而不食其毋也羊羔非其子而後養之善養而繼之也或曰夏大戴作憂有煑祭祭者用羔是時也不足喜樂喜傳本作善羔之為生也而記之與牛羊傳云舊註作羔羊腹時也綏多女士綏安也冠子娶婦之時也丁亥萬用入學丁亥者吉日也萬也者干戚舞也入學也者太學也謂今時大舍采也祭鮪祭不必記記鮪何也鮪之至有時美物也鮪者魚之先至者也而其至有時謹記其時榮堇采蘩堇采也蘩由胡由胡由者蘩毋也蘩旁勃也皆豆實也故記之昆小蟲抵蚳昆者衆也由魂魂也者動也小蟲動也其先言動而後言蟲者何也萬物至是動而後著抵猶推也蚳螘卵也為祭醢也取之則必推之推之不必取取必推而不言取來降燕乃睇燕乙也降者下也言來者何也莫能見其始出也故曰來降言乃睇何也睇者眄也眄者視可為室者也百鳥皆曰巢穴取與之室何也摻泥而就家入人内也剥鱓以為鼓也有鳴倉庚倉庚者商庚也商庚者長股也榮芸時有見稊始收有見稊而後始收是小正序也小正之序時也皆若是也稊者所為豆實三月參則伏攝桑委楊䍷羊􅕪則鳴頒冰采識妾子始蠶執養宫事祈麥實越有小旱田䑕化為鴽拂桐芭鳴鳩傳曰三月參則伏伏者非亡之辭也星無時而不見我有不見之時故曰伏云攝桑攝而記之急桑也委一作萎楊楊則花而後記之䍷羊羊有相還之時其類䍷䍷然記變爾或曰䍷羝也􅕪則鳴􅕪天螻也頒冰頒冰者分冰以授大夫也采識識草也妾子始蠶先妾而後子何也曰事有漸也言自卑事者始也傳本云當云事自卑者始或無也字執養宮事執操也養長也祈麥實麥實者五榖之先見者故急祈而記之也越有小旱越于也記是時恒有小旱田䑕化為鴽鴽鵪也變而之善故盡其辭也鴽為䑕變而之不善故不盡其辭也拂桐芭拂也者拂也桐芭之時也或曰言桐芭始生貌拂拂然也鳴鳩言始相命也先鳴而後鳩何也鳩者鳴而後知其鳩也四月昴則見初昏南門正鳴札囿有見杏鳴蜮王萯莠取荼莠幽越有大旱執陟攻駒傳曰四月昴則見初昬南門正南門者星也歳再見壹正蓋大正所取法也鳴札札者寜縣也鳴而後知之故先鳴而後札囿有見杏囿者山之燕者也鳴蜮蜮也者或曰屈造之屬也王萯莠取荼荼也者以為君薦蔣也莠幽越有大旱記時爾執陟攻駒執也者始執駒也始執駒也者離之去母也執而升之君也攻駒也者教之服車數舍之也五月參則見浮游有殷鴂則鳴時有養日乃𤓰良蜩鳴匽之興五日翕望乃伏啟灌藍蓼鳩為鷹唐蜩鳴初昏大火中煑梅蓄蘭菽糜頒馬傳曰五月參則見參也者伐星也故盡其辭也浮游有殷殷衆也浮游者渠略也朝生而暮死稱有何也有見也鴂則鳴鴂者百鷯也鳴者相命也其不辜之時也是善之故盡其辭也時有養日養長也一則在本一則在末故其記曰時養日云也乃𤓰傳本𤓰上有衣字乃傳云一本有衣字者急𤓰傳云一作衣之辭也傳云一本有衣也者始創衣也𤓰也者始食𤓰也良蜩鳴良蜩也者五采具匽之興五日翕望乃伏其不言生而稱興何也不知其生之時故曰興以其興也故言之興五日翕也望也者月之望也而伏云者不知其死也故謂之伏五日也者十五日也翕也者合也伏也者入而不見也啓灌藍蓼啟者别也陶而疏之也灌者聚生者也記時也鳩為鷹唐蜩鳴唐蜩鳴者匽也初昏大火中大火者心也心中種黍菽穈時也煑梅為豆實也蓄蘭為沐浴也菽糜以在經中矣又言之時何也是食短關而記之頒馬分夫婦一作大夫鄉之駒也將間諸則或取離駒納之則法也六月初昏斗柄正在上煑桃鷹始摯傳曰六月初昏斗柄正在上五月大火中六月斗柄正在上用此見斗柄之不在當心也蓋當依依尾也煑桃桃也者杝桃也杝桃也者山桃也煑以為豆實也傳本杝作柂註云按爾雅柂椵郭璞云白椵也樹似白楊而古今字書有杝而無柂亦無有訓山桃者爾雅榹桃山桃音斯唐韻亦云此書柂桃者山桃也當作榹蓋傳冩之誤鷹始摯始摯而言之何也諱煞之辭也傳本有言字摯云七月莠雚葦梩子肇肆湟潦生苹爽死苹莠漢案户寒蟬鳴初昏織女正東鄉時有霖雨灌荼斗柄縣在下則旦傳曰七月莠雚葦未莠則不為雚葦莠然後為雚葦故先言莠梩子肇肆肇始也肆遂也言其始遂也其或曰肆殺也湟潦生苹湟下處也有湟然後有潦有潦而後有苹草也爽死爽也者猶疏也苹莠苹也者有馬帚也漢案户漢也者河也大戴無此三字案户也者直户也言正南北也寒蟬鳴蟬也者蝭􅧽也初昏織女正東鄉時有霖雨灌荼灌聚也荼灌葦之莠傳本有也字為蔣楮之也雚未秀為菼葦未秀為蘆傳本秀皆作莠斗柄縣在下則旦八月剝𤓰𤣥校剝棗桌日人人零丹鳥羞白鳥辰則伏鹿人從鴽為䑕參中則旦傳曰八月剝𤓰剝𤓰也者畜𤓰之時也𤣥校𤣥也者黑也校也者若緑色然婦人未嫁者衣之剝棗剝也者取也桌日人人零零也者降也零而後取之故不言剝也丹鳥羞白鳥丹鳥者謂丹良也白鳥者謂蚊蚋也其謂之鳥也重其養者也有翼者為鳥羞也者進也不盡食也辰則伏辰也者謂星也伏也者入而不見也鹿人從鹿人從者從羣也鹿之養也離羣而善而傳本無此而字之離而生非所知時也故記從不記離君子之居幽也不言或曰人從大戴無此從字人從也者大者於外小者於内率之也鴽為䑕參中則旦九月内火遰鴻鴈主夫出火陟𤣥鳥蟄熊罷貃貉鼬鼪則穴榮鞠樹麥王始裘辰繫於日雀入于海為蛤傳曰九月内火内火也者大火也大火也者心也遰鴻雁遰徃也主夫出火主夫也者主以時縱火也陟𤣥鳥蟄陟升也𤣥鳥者鷰也先言陟而後言蟄何也陟而後蟄也熊羆貃貉鼬鼪則穴若蟄而榮鞠樹麥大戴無樹麥字傳云或曰傳文也鞠草也鞠榮而樹麥時之急也王始裘王始裘者何也衣裘之時也辰繫於日雀入於海為蛤蓋有矣非常入也十月豺祭獸初昏南門見黒鳥浴時有養夜𤣥雉入於淮為蜄織女正北鄉則旦傳曰十月豺祭獸善其祭而後食之也初昏南門見南門者星名也及此再見矣黒鳥浴黒鳥者何也烏也浴也者飛乍高乍下也時有養夜時有養夜者養長也若日之長也𤣥雉入於淮為蜄蜄者蒲蘆也織女正北鄉則旦織女星名也十有一月王狩陳筋革嗇人不從隕麋角傳曰十有一月王狩狩者言王之時田冬獵為狩陳筋革陳筋革者省甲兵也嗇人不從不從者弗行於時月也萬物不通隕麋角隕墜也日冬至陽氣至始動諸向生皆䝉䝉符矣故麋角隕記時焉爾十有二月鳴弋𤣥駒賁納卵蒜虞人入梁隕麋角傳曰十有二月鳴弋弋也者禽也先言鳴而後言弋者何也鳴而後知其弋也𤣥駒賁𤣥駒也者螘也賁者何也走於地中也納卵蒜卵蒜也者本如卵者也納者何也納之君也虞人入梁虞人官也梁者主設罔罟者也隕麋角蓋陽氣旦睹也故記之也單子曰夫辰角見而雨畢辰角大辰蒼龍之角角星名也見者朝見東方建戌之初寒露節也雨畢者殺氣日至而雨氣盡也天根見而水涸天根亢氐之間涸竭也謂寒露雨畢之後五日天根朝見水潦盡竭也月令仲秋水始涸天根見乃盡竭也本見而草木節觧本氐也謂寒露之後十日陽氣盡草木之枝節皆理觧也駟見而隕霜駟天駟房星也隕落也謂建戌之中霜始降火見而清風戒寒謂霜降之後清風先至所以戒人為寒備也故先王之教曰雨畢而除道水涸而成梁教謂月令之屬也九月雨畢十月水涸也草木節觧而備藏備故藏也月令季秋農事畢收隕霜而冬裘具孟冬天子始裘故九月可以具清風至而修城郭宮室謂火見之後建亥之初也故夏令曰九月除道十月成梁夏令夏后氏之令周所因也除道所以便行旅成梁所以便民使不渉也其時儆曰收而場功偫而畚挶時儆時以儆告其民也收而場功使人修囷倉也偫具也畚器名土籠也挶舁土之器具爾畚挶以築作也營室之中土功其始定謂之營室也建亥小雪中定星昏正於午土功可以始故詩云定之方中作於楚宮也火之初見期於司里期㑹也致其築作之具㑹於司里之官也此先王所以不用財賄而廣施德於天下者也施德謂因時警戒謹蓋藏成築功也國語周語周月通禮三補周月維一月既南至昏昴畢見日短極基踐長㣲陽動於黄泉隂降惨於萬物是月斗柄建子始昏北指陽氣虧草木萌蕩日月俱起於牽牛之初右回而行月周天起一次而與日合宿日行月一次而周天歴舍於十有二辰終則復始是謂日月權輿與周正嵗道數起於時一而成於十次一為首其義則然凡四時成歳歳有春夏秋冬各有孟仲季以名十有二月中氣以著時應春三中氣雨水春分榖雨夏三中氣小滿夏至大暑秋三中氣處暑秋分霜降冬三中氣小雪冬至大寒閏無中氣斗指兩辰之間萬物春生夏長秋收冬藏天地正四時之極不易之道夏數得天百王所同其在商湯用師於夏除民之災順天革命改正朔變服殊號一文一質示不相沿以建丑為正易民之眂若天時大變亦一代之時亦越我周王致伐於商改正異械以垂三統至於敬授民時廵狩祭享猶自夏焉是謂周月以紀於政汲冢周書周月觧大史正嵗年以序事頒之於官府及都鄙中數曰嵗朔數曰年中朔大小不齊正之以閏若今時作厯日矣定四時以次序授民時之事春秋傳曰閏以正時時以作事事以厚生生民之本於是乎在春官鄉師凡四時之徴令有常者以木鐸徇於市朝徴令有常者謂田狩及正月命修封疆二月令雷且發聲地官以上嵗時常命族師月吉則屬民而讀邦法書其孝弟睦婣有學者月吉毎月朔日也吉地官此條毎月日小宰月終則以官府之叙受羣吏之要主毎月之小計宰夫月終則令正月要宫正月終則㑹其稍食宮伯月終則均秩酒正酒正之出日入其成月入其要小宰聽之出謂授酒材及用酒之多少也受用酒者日言其計於酒正酒正月盡言於小宰並天官以上月終黨正及四時之孟月吉日則屬民而讀邦去以糾戒之以四孟之月朔日讀法者彌親民者於教亦彌數地官月此條四孟吉日宫正春以木鐸修火禁火星以春出以秋入因天時而以戒庖人凡用禽獻春行羔豚膳膏香用禽獻謂煎和之以獻王鄭司農云膏香牛脂也以牛脂和之獸人春獻獸物獸物凡獸皆可獻也及狐貍􅘋人春獻王鮪王鮪鮪之大者月令季春薦鮪於寢廟鼈人春獻鼈蜃凌人掌冰春始治鑑鑑如甀大口以盛冰置食物於中以禦温氣春而始治之為二月將獻羔而啓冰掌皮春獻之皮革踰歳乾久乃可用獻之獻其良者於王以入司裘給王用遂以式法頒皮革於百工式法作物所用多少故事並天官州長春以禮㑹民而射於州序序州黨之學也黨正春祭禜讀邦法禜謂雩禜水旱之神族師春祭酺讀邦法酺者為人物烖害之神也並地官大宗伯以祠春享先王大胥春入學舍采合舞春始以學士入學宫而學之合舞等其進退使應節奏舍即釋也采讀為菜始入學必釋菜禮先師也菜蘋蘩之屬男巫春招弭以除疾病招招福也弭讀為敉敉安也安凶禍也招敉皆有祀衍之禮並春官稾人春獻素校人春祭馬祖執駒焉祖天駟也執猶拘也春通淫之時駒弱血氣未定為其乘匹傷之圉師春除蓐釁廄始牧蓐馬兹也馬旣出而除之新釁焉神之也並夏官雍氏春令為阱擭溝瀆之利於民者阱穿地為塹所以禦禽獸其或超踰則䧟焉世謂之䧟阱擭柞鄂也堅地阱淺則設柞鄂於其中薙氏掌殺草春始生而萌之萌之者以兹其斫其生者大行人春朝諸侯而圖天下之事王者春見諸侯則圖其事之可否小行人令諸侯春入貢貢六服所貢也春並秋官以上小宰正歳帥治官之屬而觀治象之法徇以木鐸曰不用法者國有常刑正歳謂夏之正月得四時之正以出教令者審也古者將有新令必奮木鐸以警衆使明聽也木鐸木舌也文事奮木鐸武事奮金鐸乃退以宫刑憲禁於王宫憲謂表縣之若今新有法令云令於百官府曰各修乃職攷乃法待乃事以聽王命其有不共則國有大刑乃猶女也宰夫正歳則以法警戒羣吏令修宫中之職事警勑戒之言鄭司農云正嵗夏之正月以法戒勑羣吏内宰正歳均其稍食施其功事憲禁令於王之北宮而糾其守均猶調度也施猶賦也北宫后之六宫謂之北宫者繫於王言之明用王之禁令令之守宿衛者並天官大司徒正嵗令於教官曰各共爾職修乃事以聴王命其有不正則國有常刑正嵗夏正月朔日小司徒正嵗則帥其屬而觀教象之法徇以木鐸曰不用法者國有常刑令羣吏憲禁令修法糾職以待邦治憲表縣之鄉師正嵗稽其鄉器鄉大夫正嵗命羣吏攷法於司徒以退各憲之於其所治州長正嵗則讀教法如初雖以正月讀之至正嵗猶復讀之因此四時之正重申之黨正正嵗屬民讀法而書其徳行道藝書記之遂大夫正嵗簡稼器修稼政簡猶閲也稼器耒耜鎡基之屬稼政孟春之月令所云皆修封疆審端經術善相丘陵阪險原隰土地所宜五穀所殖以教道民必躬親之並地官眂祲正嵗則行事占夢以季冬贈惡夢此正月而行安宅之事所以順民春官訓方氏正嵗則布而訓四方布告以教天下使知世所善惡夏官小司寇正嵗帥其屬而觀刑象令以木鐸曰不用法者國有常刑令羣士羣士遂士以下乃宣布于四方憲刑禁宣徧也憲表也謂縣之也刑禁士師之五禁乃命其屬入㑹乃致事得其属之計乃令致之於王士師正嵗帥其屬而憲禁令于國及郊野去國百里為郊郊外謂之野並秋官以上正嵗内宰上春詔王后帥六宫之人而生穜稑之種而獻之於王六宫之人夫人以下分居后之六宫者古者使后宫蔵種以其有傳類蕃孳之祥必生而獻之示能育之使不傷敗且以佐王耕事共禘郊也鄭司農云先種後熟謂之穜後種先熟謂之稑王當以耕種於藉田天官天府上春釁寳鎮及寳器上春孟春也釁謂殺牲以血釁之龜人上春釁龜祭祀先卜釁者殺牲以血之神之也先卜始用卜筮者言祭言祀尊焉天地之也世本作曰巫咸作筮卜未聞其人也是上春者夏正建寅之月月令孟冬云釁祠龜䇿相互矣秦以十月建亥為嵗首則月令秦世之書亦或欲以嵗首釁龜耳簭人上春相簭相謂更選擇其蓍也蓍龜歳易者與並春官牧師孟春焚牧焚牧地以除陳生新草也夏官以上孟春内宰中春詔后帥外内命婦治蠶於北郊以為祭服蠶於北郊婦人以純隂為尊郊必有公桑蠶室焉媒氏中春之月令㑹男女中春隂陽交以成昏禮順天時也於是時也奔者不禁重天時權許之也若無故而不用令者罰之無故謂無䘮禍之變也有䘮禍者娶得用非中春之月並地官籥章中春晝擊土鼓龡豳詩以逆暑豳詩豳風七月也吹之者以籥為之節七月言寒暑之事迎氣歌其類也此風也而言詩詩總名也迎暑以晝求諸陽馮相氏春致月春分日在婁而月絃於東井亦以其景知氣至不並春官大司馬中春教振旅凡師出曰治兵入曰振旅皆習戰也四時各教民以其一焉春習振旅兵入收衆専於農遂以蒐田春田為蒐羅氏中春羅春鳥獻鳩以養國老行羽物春鳥蟄而始出者若今南郡黄雀之属是時鷹化為鳩鳩與春鳥變舊為新宜以養老助生氣行謂賦賜司弓矢中春獻弓弩弓弩成於和牧師中春通淫中春隂陽交萬物生之時可以合馬之牝牡也月令季春乃合累牛騰馬遊牝於牧秦時書也秦地寒凉萬物後動夏並官司烜氏中春以木鐸修火禁於國中為季春将出火也火禁謂用火之處及備風燥秋官以上中春司爟季春出火民咸従之火所以用陶冶民隨國而為之鄭人鑄刑書火星未出而出火後有災鄭司農云以三月本時昏心星見於辰上使民出火夏官季此條春庖人夏行腒鱐膳膏臊鄭司農云腒乾雉鱐乾魚杜子春云膏臊犬膏獸人夏獻麋麋膏散散則凉凌人夏頒冰掌事暑氣盛王以冰頒賜則主為之春秋傳曰古者日在北陸而蔵冰西陸朝覿而出之並天官稻人凡稼澤夏以水殄草而芟荑之殄病也絶也将以澤地為稼者必於夏六月之時大雨時行以水病絶草之後生者至秋水涸芟之明年乃稼地官大宗伯以禴夏享先王春官校人夏祭先牧頒馬攻特先牧始養馬者其人未聞夏通淫之後攻其特為其蹄齧不可乗用鄭司農云攻特謂騬之圉師夏庌馬庌廡也廡所以庇馬者也並夏官大行人夏宗以陳天下之謨夏見諸侯則陳其謀之是非秋官以上夏大司馬中夏教茇舎苃舎草止之也軍有草止之法遂以苗田夏田為苗擇取不孕任者若治苗去不秀實夏官馮相氏夏致日夏至日在東井景尺五寸大司樂函鍾為宫夏日至於澤中之方丘奏之詳見吉禮凡以神士者以夏日至致地示物鬽地物隂也隂氣升而祭地示物鬽致物鬽於墠壇葢用祭地之明日百物之神曰鬽並春官山虞中夏斬隂木隂木生山北者地官柞氏夏日至令刋陽木而火之生山南為陽木火之使其肄不生薙氏夏日至而夷之夷之以鉤鎌迫地芟之也若今取茭矣秋官以上中夏宫正秋以木鐸修火禁庖人秋行犢麛膳膏腥膏腥雞膏也獸人秋獻獸物鼈人秋獻龜魚凌人秋刷刷清也秋凉冰不用可以清除其室掌皮掌秋斂皮典婦功凡授嬪婦功及秋獻功辨其苦良比其小大而賈之物書而楬之授當為受聲之誤也國中嬪婦所作成即送之不須獻功時賈之者物不正齊當以泉計通功鄭司農苦讀為盬謂分别其縑帛與布紵之麄細皆比方其大小書其賈數而著其物若今時題署物並天官州長秋以禮㑹民而射於州序黨正秋祭禜讀邦法族師秋祭酺讀邦法並地官大宗伯以嘗秋享先王大胥秋頒學合聲春使之學秋頒其才藝所為合聲亦等其曲折使應節奏春並官槀人秋獻成矢箙春作秋成校人秋祭馬社臧僕馬社始乘馬者世本作曰相士作乘馬鄭司農云臧僕謂簡練馭者令皆善也𤣥謂僕馭五路之僕並夏官雍氏秋令塞阱杜擭秋而杜塞阱擭收刈之時謂其陷害人也薙氏秋繩而芟之含實曰繩芟其繩則實不成熟大行人秋覲以比邦國之功秋見諸侯則比其功之高下小行人令諸侯秋獻功功考績之功也秋獻之若今計文書斷於九月其舊法並秋官以上秋司裘中秋獻良裘王乃行羽物良善也中秋鳥獸毛毨因其良時而用之鄭司農云良裘王所服也行羽物以羽物飛鳥賜羣吏𤣥謂良裘玉藻所謂黼裘與此羽物小鳥鶉雀之屬鷹所擊者中秋鳩化為鷹中春鷹化為鳩順其始殺與其將止而大班羽物天官籥章中秋夜迎寒亦如之迎寒以夜求諸隂馮相氏秋致月秋分日在角而月弦於牽牛並春官大司馬中秋教治兵遂以獮田秋田為獮獮殺也司弓矢中秋獻矢箙矢箙成於堅並夏官中以上秋司裘季秋獻功裘以待頒賜功裘人功㣲麤謂狐青麛裘之屬鄭司農云功裘卿大夫所服天官司爟季秋内火民亦如之鄭司農云九月本黄昏心星伏在戌上使民内火夏官以上季秋庖人冬行鱻羽膳膏羶杜子春云鮮魚也羽鴈也膏羶羊脂也獸人冬獻狼狼膏聚聚則温掌皮冬斂革染人春㬥練夏纁𤣥秋染夏冬獻功注見名器篇並天官大宗伯以烝冬享先王男巫冬堂贈無方無算冬歳終以禮送不祥及惡夢皆是也其行必由堂始巫與神通言當東則東當西則西可近則近可逺則逺無常數並春官校人冬祭馬歩獻馬講馭夫馬歩神為災害馬者獻馬見成馬於王也馭夫馭貳車從車使車者講猶簡習圉師冬獻馬並夏官大行人冬遇以協諸侯之慮冬見諸侯則合其慮之異同秋官以上冬小司冦孟冬祀司民獻民數於王王拜受之以圖國用而進退之司民星名謂軒轅角也小司冦於祀司民而獻民數於王重民也進退猶損益也國用民衆則益民寡則損司民以萬民之數詔司寇司冦及孟冬祀司民之日獻其數於王王拜受之登於天府内史司㑹冡宰貳之以贊王治詳見政事上篇並秋官籥章國祭蜡則龡豳頌擊土鼓以息老物十二月建亥之月也求萬物而祭之者萬物助天成嵗事至此為其老而勞乃祀而老息之於是國亦養老焉月令孟冬勞農以休息之是也豳頌亦七月也七月又有穫稻作酒躋彼公堂稱彼兕觥萬夀無疆之事是亦歌其類也謂之頌者以其言歳終人功之成春官羅氏蜡則作羅襦詳見政事下篇冬夏官已上孟大宰正月之吉始和布治於邦國都鄙乃縣治象之法於象魏使萬民觀治象挾日而斂之正月周之正月吉謂朔日大宰以正月朔日布王治之事於天下至正歳又書而縣於象魏振木鐸以徇之使萬民觀焉小宰亦帥其屬而徃皆所以重治法新王事也凡治有故言始和者若改造云爾鄭司農云象魏闕也故魯災季桓子御公立於象魏之外命藏象魏曰舊章不可忘從甲至甲謂之挾日凡十日天官大司徒正月之吉始和布教於邦國都鄙乃縣教象之法於象魏使萬民觀教象挾日而斂之正月之吉周正月朔日也司徒以布五教至正歳又書教法而縣焉鄉大夫正月之吉受教法於司徒退而頒之於其鄉吏使各以教其所治以攷其德行察其道藝其鄉吏州長以下州長正月之吉各屬其州之民而讀法以攷其德行道藝而勸之以糾其過惡而戒之屬猶合也聚也因聚衆而勸戒之者欲其善並地官大司馬正月之吉始和布政於邦國都鄙乃縣政象之法於象魏使萬民觀政象挾日而歛之以正月朔日布王政於天下至正歳又縣政法之書挾日十日也夏官大司冦正月之吉始和布刑於邦國都鄙乃縣刑象之法於象魏使萬民觀刑象挾日而斂之正月朔日布五刑於天下正歳又縣其書重之布憲正月之吉執旌節以宣布於四方而憲邦之刑禁以詰四方邦國及其都鄙達於四海詳見刑辟並秋官大司馬中冬教大閲大閲簡軍實遂以狩田冬田為狩言守取之無所擇也夏官馮相氏冬致日冬至日在牽牛景丈三尺大司樂圜鍾為宮冬日至於地上之圜丘奏之詳見吉禮凡以神士者以冬日至致天神人鬼天人陽也陽氣升而祭鬼神致人鬼於祖廟葢用祭天之明日並春官山虞中冬斬陽木陽木生山南者地官柞氏冬日至令剥隂木而水之生山北為隂木水之使其肄不生薙氏冬日至而耜之耜之以耜側凍土剗之並秋官以上中冬凌人正歳十有二月令斬冰三其凌正歳季冬火星中大寒冰方盛之時春秋傳曰火星中而寒暑退凌冰室也三之者為消釋度也天官天府季冬陳玉以貞來歳之􅍇惡問事之正曰貞問歳之美惡謂問於龜大卜職大貞之屬陳玉陳禮神之玉凡卜筮實問於鬼神龜筮能出其卦兆之占耳龜有天地四方則玉有六器者與言陳者既事藏之不必貍之也鄭司農云貞問也易曰師貞丈人吉問於丈人國語曰貞於陽卜占夢季冬聘王夢獻吉夢於王王拜而受之乃舍萌於四方以贈惡夢注見卜筮篇春官遂令始難敺疫令令方相氏也難謂難兵以有難郤也冬注詳見吉禮百神篇春官以上季太宰歳終則令百官府各正其治受其㑹正正處也㑹大計也聽其致事而詔王廢置平其事來至者之功狀而奏白王小宰歳終則令羣吏致事使齊歳盡文書來至若今上計宰夫歳終則令羣吏正歳㑹歳終自周季冬正猶定也宫正歳終則㑹其行事行事吏事也宫伯歳終則均叙膳夫歳終則㑹其頒賜諸臣則計之庖人歳終則㑹醫師歳終則稽其醫事以制其食食禄也酒正歳終則㑹以酒式誅賞誅賞作酒之善惡者大府歳終則以貨賄之入出㑹之外府歳終則㑹職幣歳終則㑹其出司裘歳終則㑹掌皮歳終則㑹其財齎財斂財本數及餘見者齎所給予人以物日齎令時詔書或曰齎計吏鄭司農云齎或為資内宰歳終則㑹内人之稍食稽其功事内人主謂九御典絲歳終則各以其物㑹之種别為計鄭司農云各以其所飾之物計㑹傳著之典枲歳終則各以其物㑹之並天官大司徒歳終則令教官正治而致事歳終自周季冬也教官其屬六十正治明處其文書致事上其計簿小司徒歳終則攷其屬官之治成而誅賞治成治事之計令羣吏正要㑹而致事鄉師歳終則攷六鄉之治以詔廢置鄉大夫歳終則令六鄉之吏皆㑹政致事㑹計也致事言其歳盡文書州長歳終則㑹其州之政令黨正歳終則㑹其黨政帥其吏而致事族師歳終則㑹政致事泉府歳終則㑹其出入而納其餘㑹計也納入也入餘於職幣遂大夫令為邑者歳終則㑹政致事不言其遂之吏而言為邑者容公邑及公卿大夫王子弟之采邑政令戒禁遂大夫亦施焉鄙師歳終則㑹其鄙之政而致事並地官眂祲歳終則弊其事弊㫁也謂計其吉凶然否多少春官小司寇歳終則令羣士計獄弊訟登中於天府上其所㫁獄訟之數士師歳終則令正要㑹定計簿上並秋官以歳終太史閏月詔王居門終月門謂路寢門也鄭司農云月令十二月分在青陽明堂總章𤣥堂左右之位唯閏月無所居居於門故於文王在門謂之閏春官此條閏月禮書綱目巻五十四
