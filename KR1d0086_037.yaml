body:
  text: 禮書綱目卷三十五婺源江永撰天神吉禮二補天子祭天地嵗遍曲禮嵗此條通言一祭天大宗伯以禋祀祀昊天上帝禋之言煙周人尚臭煙氣之臭聞者鄭司農云昊天天也上帝𤣥天也昊天上帝樂以雲門𤣥謂昊天上帝冬至於圜丘所祀天皇大帝詳見祭法此條通言祀天禮郊之祭迎長至之日詳見祭義然注說亦誤此條冬至祀天郊之祭大報天而主日配以月主日者以其光明天之神可見者莫著焉祭義此條主日配月有虞氏郊嚳夏后氏郊鯀殷人郊冥周人郊稷祭上帝於南郊曰郊有虞氏以上尚德配用有德者自夏以下稍用其姓代之先後之次有虞氏夏后氏宜郊顓頊殷人宜郊契詳見祭法周公郊祀后稷以配天后稷周之始祖郊謂圜丘祀天也周公攝政因行郊天之祭乃尊始祖以配之也配孝經此兩條郊祀以祖大宗伯以玉作六器以禮天地四方禮謂始告神時薦於神坐書曰周公植璧秉圭是也以蒼璧禮天此禮天以冬至謂天皇大帝在北極者也禮神者必象其類璧圜象天牲幣放其器之色幣以從爵若人飲酒有酬幣此條祀天玉幣春官季夏命四監大合百縣之秩芻以養犧牲令民無不咸出其力以共皇天上帝以為民祈福皇天北辰耀魄寶冬至所祭於圜丘也上帝大微五帝詳見祭物仲秋命宰祝循行犧牲視全具案芻豢瞻肥瘠察物色必比類量小大視長短皆中度五者備當上帝其饗詳見祭物祭天特牲禮器郊特牲牲孕祭帝弗用犢者誠慤未有牝牡之情是以小為貴也孕任子也詳見祭義牲用騂用犢尚赤者周也同上帝牛不吉以為稷牛養牲必養二也帝牛必在滌三月稷牛唯具滌牢中所搜除處也唯具遭時又選可用也詳見祭義牧人凡陽祀用騂牲毛之詳見祭物用騂犢祭法祭天地之牛角繭栗王制郊禘不過繭栗詳見祭義禘郊之事則有全脀全脀全其牲體而升之也凡禘郊皆血腥也上國語周語牲已十二條犧酒人以法共五齊三酒以實八尊大祭三二唯齊酒不二大祭者王服大裘衮冕所祭也詳見祭物幂人以疏布巾幂八尊以疏布者天地之神尚質並天官犧尊疏布冪樿杓冪或作幂樿杓白理也禮器鬯人掌共秬鬯而飾之詳見祭物天子親耕粢盛秬鬯以事上帝疏曰案小宰注云天地大神至尊不祼此祭上帝有秬鬯者凡鬯有二若和之以鬱謂之鬱鬯鬱人所掌是也祭宗廟而灌也若不和鬱謂之秬鬯鬯人所掌是也謂五齊之酒以秬黍為之以芬芳調暢故言鬱鬯故得以事上帝表記天子親舂禘郊之盛帥后舂之酒國語盛已上六條齊粢蒲越藁鞂之尚蒲越藁鞂籍神席也去郊特牲禹禮器藁鞂之段注穗實曰鞂貢三百里納鞂服器用陶匏詳見祭義卬盛于豆于豆于登其香始升上帝居歆胡臭亶時木曰豆瓦曰登豆薦菹醢也于登薦大羮也箋云祀天用瓦豆陶器質也大雅生民鼎聖人亨以享上帝程傳鼎之為器極其用之大則聖人亨以享上帝聖人古之聖王也易已上四條器具典瑞四圭有邸以祀天鄭司農云於中央為璧圭著其四面一玉俱成爾雅曰邸本也圭本著於璧故四圭有邸圭末四出故也或說四圭有邸有四角也邸讀為抵欺之抵上帝𤣥天𤣥謂祀天夏正郊天也春官玉人四圭尺有二寸以祀天郊天所以禮其神也典瑞職曰四圭有邸以祀天旅上帝考工記此二條圭玉司裘掌為大裘以共王祀天之服鄭司農云大裘黑羔裘服以祀天示質天官司服王祀昊天上帝則服大裘而冕鄭司農云大裘黑羔裘也春官天子大裘以黼之家語郊問詳見祭義王被衮謂有日月星辰之章戴冕璪十有二旒天之大數不過十二冕詳見祭義以上四條服巾車玉路錫樊纓十有再就建大常十有二斿以祀詳見祭通禮出路章大馭掌馭玉路以祀同上乘素車旗十有二旒龍章而設日月素車殷路也設日月畫於旗上詳見祭義大路素疏曰大路殷祭天之車也禮器已上四條車旗大司樂乃奏黃鍾歌大吕舞雲門以祀天神以黃鍾之鍾大呂之聲為均者黃鍾陽聲之首大吕為之合奏之以祀天神尊之也天神謂五帝及日月星辰也王者又各以夏正月祀其所受命之帝於南郊尊之也孝經說曰祭天南郊就陽位是也凡樂圜鍾為宫黃鍾為角大簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣本文此下有地示人鬼二節此三者皆禘大祭也天神則主北辰地祗則主崑崙人鬼則主后稷先奏是樂以致其神禮之以玉而祼焉乃後合樂而祭之大傳曰王者必禘其祖之所自出祭法曰周人禘嚳而郊稷謂此祭天圜丘以嚳祀之圜鍾夾鍾也夾鍾生於房心之氣房心為大辰天帝之明堂以此為宫用聲類求之天宫夾鍾陰聲其相生從陽數其陽無射無射上生中吕中吕與地宫同位不用也中吕上生黃鍾黃鍾下生林鍾林鍾地宫又不用林鍾上生大簇大簇下生南吕南吕與無射同位又不用南吕上生姑洗鄭司農云靁鼓靁鼗皆謂六面有革可擊者也雲和地名也𤣥謂靁鼓靁鼗八面孤竹竹特生者雲和山名詳見樂制篇春官鼓人以靁鼓鼓神祀靁鼓八面鼓也神祀祀天神也地官此二條樂舞大宰祀五帝則掌百官之誓戒與其具修祀五帝謂四郊及明堂誓戒要之以重刑失禮也明堂位所謂各揚其職百官廢職服大刑是其辭之略也具所當共修掃除糞灑前期十日帥執事而卜日遂戒前期前所諏之日也十日容散齊七日致齊三日執事宗伯大卜之屬既卜又戒百官以始齊及執事眂滌濯執事初為祭事前祭日之夕滌濯謂溉祭器及甑甗之屬及納亨贊王牲事納亨納牲將告殺謂鄉祭之晨既殺以授亨人凡大祭祀君親牽牲大夫贊之及祀之日贊玉幣爵之事日旦明也玉幣所以禮神玉與幣各如其方之色爵所以獻齊酒不用玉爵尚質也三者執以從王至而授之祀大神示亦如之大神祗謂天地天官大宗伯凡祀大神帥執事而卜日宿眂滌濯位玉鬯省牲鑊奉玉齍詔大號治其大禮詔相王之大禮執事諸有事於祭者宿申戒也滌濯溉祭器也玉禮神之玉也始涖之祭又奉之鑊亨牲器也大號六號之大者以詔太祝以為祝辭治猶簡習也豫簡習大禮至祭當以詔相王羣臣禮為小禮故書涖作立鄭司農讀為涖涖視也春官郊用辛卜郊受命於祖廟作龜於禰宫受命謂告之退而卜卜之日王立於澤親聽誓命澤澤宫也所以擇賢之宫也既卜必到澤宫擇可與祭祀者因誓勑之以禮也禮記曰舉賢而置之聚衆而誓之是也獻命庫門之內戒百官大廟之命戒百姓王自澤宫而還以誓命重相申勑也庫門在雉門之外入庫門則至廟門外矣大廟者祖廟也百官公卿以下也百姓王之親也入廟戒親親也王自此還齊路寢之室庫或為廄祭之日王皮辨以聽祭報報猶白也夙興朝服以待白祭事者乃後服祭服而行事也周禮祭之日小宗伯逆粢省鑊告時於王告備於王也喪者不哭不敢凶服泛掃反道鄉為田燭謂郊道之民為之也反道剗令新土在上也田燭田首為燭也郊特牲詳見祭義夏后氏祭其暗殷人祭其陽周人祭日以朝及暗暗昏時也陽讀為曰雨曰暘之暘謂日中時也朝日出時也夏后氏大事以昏殷人大事以日中周人大事以日出亦謂此郊祭也以朝及暗謂終日有事祭義祭之日王被衮戴冕璪十有二旒乘素車旗十有二旒龍章而設日月詳見祭義節服氏郊祀裘冕二人執戈送逆尸從車裘冕者亦從尸服也裘大裘也凡尸服卒者之上服從車從尸車送逆之往來春秋傳曰晉祀夏郊董伯為尸夏官大宗伯以禋祀祀昊天上帝本文此下云以實柴祀日月星辰以槱燎祀司中司命飌師雨師禋之言煙周人尚臭煙氣之臭聞者槱積也三祀皆積柴實牲體焉或有玉帛燔燎而升煙所以報陽也詳見祭法春官燔柴於泰壇祭天也壇封土為祭處也壇之言坦也坦明貌也祭法祭天曰燔柴既祭積薪燒之爾雅至敬不壇掃地而祭疏曰此謂祭五方之天初則燔柴於大壇燔柴訖於壇下掃地而設正祭此周法也禮器郊血郊祭天也血腥爓孰逺近備古今也尊者先逺詳見祭義禮器大祝大禋祀隋釁逆牲逆尸令鐘鼓右亦如之隋釁謂薦血也凡血祭曰釁既隋釁後言逆牲容逆鼎右讀亦當為侑大祝辨六號一曰神號神號若云皇天上帝凡大禋祀則執明水火而號祝明水火司烜所共日月之氣以給蒸亨執之如以六號祝明此圭潔也禋祀祭天神也春官皇皇上天照臨下土集地之靈降甘風雨禮運曰地秉隂竅於山川庶物羣生各得其所靡今靡古言覆施均維豫一人某敬拜皇天之祜古祝辭則云嗣王某或曰一人某王者親告之辭也維某年某月上日年謂太嵗所在月正月也大戴禮大祝既祭令徹春官禮已上祭天節凡以神仕者以冬日至致天神人鬼天人陽也陽氣升而祭鬼神致人鬼于祖廟蓋用祭天明日詳見百神春官此條祭天明日凡祀啓蟄而郊啓蟄夏正建寅之月祀天南郊左詳見祭通禮時日卜筮章桓五年氏傳孟春天子乃以元日祈穀于上帝謂以上辛郊祭天也春秋傳曰夫郊祀后稷以祈農事是故啓蟄而郊郊而後耕上帝大微之帝也月令郊祀后稷以祈農事詳見本章傳祈已上三條孟春穀龍見而雩龍見建巳之月蒼龍宿之體昏見東方萬物始盛待雨而大故祭天逺為百穀祈膏雨桓五年左氏傳仲春命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鐘磬柷敔為將大雩帝習樂也修均執調飭者治其器物習其事之言命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈穀實陽氣盛而常旱山川百源能興雲雨者也衆水始所出為百源必先祭其本乃雩雩吁嗟求雨之祭也雩帝謂為壇南郊之旁雩五精之帝配以先帝也自鞀鞞至柷敔皆作曰盛樂凡他雩用歌舞而已百辟卿士古者上公若勾龍后稷之類也春秋傳曰龍見而雩雩之正當以四月凡周之秋三月之中而旱亦修雩禮以求雨因著正雩此月失之矣天子雩上帝諸侯以下雩上公周冬及春夏雖旱禮有禱無雩二月令大此條夏雩季秋上丁命樂正入學習吹為將饗帝也春夏重舞秋冬重吹也大饗帝言大饗者遍祭五帝也曲禮曰大饗不問卜謂此也嘗犧牲告備於天子嘗者謂嘗羣神也天子親嘗帝使有司祭於羣神禮畢而告焉月令大饗不問卜祭五帝於明堂莫適卜也郊特牲曰郊血大饗腥不饒富富之言備也備而已勿多於禮也禮曲周公宗祀文王於明堂以配上帝明堂天子布政之堂也周公因祀五方上帝於明堂乃尊文王以配之也孝經已上三條秋季大饗昔者周公旦有勳勞於天下周公既沒成王康王追念周公之所以勳勞者而欲尊魯故賜之以重祭外祭則郊社是也詳見祭義成王以周公為有勳勞於天下王功曰勳事功曰勞命魯公世世祀周公以天子之禮樂同之於周尊之也魯公謂伯禽是以魯君孟春乘大路載弧韣旗十有二旒日月之章祀帝於郊配以后稷天子之禮也孟春建子之月魯之始郊日以至大路殷之祭天車也弧旌旗所以張幅也其衣曰韣天子之旌旗畫日月帝謂蒼帝靈威仰也昊天上帝魯不祭明堂位魯人將有事於上帝必先有事於頖宫上帝周所郊祀之帝謂蒼帝靈威仰也魯以周公之故得郊祀上帝與周同先有事於頖宫告后稷也告之者將以配天先仁也頖宫郊之學也詩所謂頖宫也字或為郊宫郊禮器已上三條魯之杞之郊也禹也宋之郊也契也詳下傳之此條杞宋郊右祀天郊者并百王於上天而祭之也百王百神也或神字誤為王言社稷唯祭一神至郊天則兼祭百神以喻君兼父母者也荀子因天事天因地事地因名山升中於天因吉土以饗帝於郊升中於天而鳳凰降龜龍格饗帝於郊而風雨節寒暑時詳見祭義雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考本義曰雷出地奮和之至也先王作樂既象其聲又取其義殷盛也易維十有三祀帝乃稱王而入唐郊猶以丹朱為尸舜承堯猶子承父雖已改禮易樂猶祭天於唐郊以丹朱為尸至十三年天下既知已受堯位之意矣將自止郊而以丹朱為王者後欲天下昭然知之然後為之故稱王也晉祀夏郊以董伯為尸於時百執事咸昭然乃知王世不絶爤然必自有繼祖守宗廟之君知當以丹朱為王者後使祭其郊也祖或為體尚書大傳噫嘻春夏祈穀於上帝也朱子曰序誤我將祀文王于明堂也詩並序僖公三十一年夏四月四卜郊不從乃免牲龜曰卜不從不吉也卜郊不吉故免牲免猶縱也猶三望三望分野之星國中山川皆因郊祀望而祭之魯廢郊天而修其小祀故曰猶猶者可止之辭卜郊不從乃免牲非禮也諸侯不得郊天魯以周公故得用天子禮樂故郊為魯常祀猶三望亦非禮也禮不卜常祀必其時而卜其牲日卜牲與日知吉凶牛卜日曰牲既得吉日則牛改名曰牲牲成而卜郊上怠慢也怠於古典慢瀆龜䇿望郊之細也不郊亦無望可也左氏傳曷為或言三卜或言四卜三卜禮也四卜非禮也三卜何以禮四卜何以非禮據俱卜也求吉之道三三卜吉凶必有相竒者可以决疑故求吉必三卜禘嘗不卜郊何以卜禘比祫為大嘗比四時祭為大故據之卜郊非禮也禮天子不卜郊卜郊何以非禮據上言三卜禮魯郊非禮也以魯郊非禮故卜爾昔武王既沒成王幼少周公居攝行天子事制禮作樂致太平有大功周公薨成王以王禮葬之命魯使郊以彰周公之德非王故卜三卜吉則用之不吉則免牲謂之郊者天人相與交接之意也不言郊天者謙不敢斥尊魯郊何以非禮據成公乃不郊惡之天子祭天郊者所以祭天也天子所祭莫重於郊居南郊者就陽位也槀席𤣥酒器用陶匏大圭不瑑大羮不和為天至尊物不可悉備故惟質以事之諸侯祭土土謂社也諸侯所祭莫重於社卿大夫祭五祀士祭其先祖天子有方望之事方望謂郊時所望祭四方羣神日月星辰風伯雨師五嶽四瀆及餘山川凡三十六所無所不通盡八極之內天之所覆地之所載無所不至故得郊也諸侯山川有不在其封內者則不祭也故魯郊非禮也曷為或言免牲或言免牛免牲禮也魯卜郊不吉免之禮卜郊不吉則為牲作𤣥衣纁裳使有司𤣥端放之於南郊明本為天不敢留天牲免牛非禮也免牛何以非禮傷者曰牛養牲不謹敬有灾傷天不饗用不得復為天牲故以本牛名之非禮者非天牲不當復見免但內自省責而已三望者何望祭也然則曷祭祭泰山河海曷為祭泰山河海據郊者主為祭天山川有能潤於百里者天子秩而祭之此皆助天宣氣布功故祭天及之秩者隨其大小尊卑髙下所宜禮祭天牲角繭栗社稷宗廟角握六宗五嶽四瀆角尺其餘山川視卿大夫天燎地瘞日月星辰布山縣水沈風磔雨升燎者取爼上七體與其圭寶在辨中置於柴上燒之觸石而出膚寸而合側手為膚案指為寸言其觸石理而出無有膚寸而不合不崇朝而遍雨乎天下者唯泰山爾崇重也不崇朝言一朝也河海潤於千里亦能通氣致雨潤澤及於千里韓詩傳曰湯時大旱使人禱於山川是也郊望非一獨祭三者魯郊非禮故獨祭其大者猶者何通可以已也已止何以書譏不郊而望祭也譏尊者不食而卑者獨食書者惡失禮也魯至是郊者僖公賢君欲尊明其先祖之功德不就廢之譏者春秋不見事不書皆從事舉可知也不吉言不從者明己意汲汲欲郊而卜不從耳所以見事鬼神當加精神公羊傳宣公三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望牛不稱牲未卜日言牛雖傷死當更改卜取其吉者郊不可廢也前年冬天王崩未葬而郊者不以王者廢天事禮記曽子問天子崩未殯五祀不行既殯而祭自啓至於反哭五祀之祭不行已葬而祭望郊之屬也不郊亦無望可也已有例在僖三十一年復發傳者嫌牛死與卜不從異左氏傳其言之何據食角不言之緩也辭間容之故為緩不若食角急也别天牲主以角書者譏宣公養牲不謹敬不潔清而灾重事至尊故詳録其簡甚曷為不復卜據定十五年牛死改卜牛養牲養二卜二卜語在下帝牲不吉帝皇天大帝在北辰之中主總領天地五帝羣神也不吉者有灾則扳稷牲而卜之先卜帝牲養之有灾更引稷牲卜之以為天牲養之凡當二卜爾復不吉不復郊帝牲在於滌三月滌宫名養帝牲三牢之處也謂之滌者取其蕩滌潔清三牢者各主一月取三月一時足以充其天牲於稷者唯具是視祖其身體具無灾害而已不特養於滌宫所以降稷尊帝郊則曷為必祭稷據郊者主為祭天王者必以其祖配祖謂后稷周之始祖姜嫄履大人迹所生配配食也王者則曷為必以其祖配據方父事天自內出者無匹不行匹合也無所與㑹合則不行自外至者無主不止必得主人乃止者天道暗昧故推人道以接之不以文王配之者重本尊始之義也故孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝五帝在大微之中迭生子孫更王天下書改卜者善其應變得禮公羊傳之口緩辭也傷自牛作也牛自傷口非備灾之道不至也故以緩辭言之改卜牛牛死乃不郊事之變也牛無故自傷其口易牛改卜復死乃廢郊禮此事之變異乃者亡乎人之辭也譏宣公不恭致天變穀梁傳成公七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛杜曰稱牛未卜日免放也免牛可也不郊非禮也夏五月不郊猶三望書不郊間有事三望非禮不言日急辭也辭中促迫不容日過有司也郊牛日展斛角而知傷展道盡矣其所以備灾之道不盡也有司展察牛而即知傷是展察之道盡不能防灾禦患致使牛傷故不書日以顯有司之過斛球球然角貌改卜牛鼷鼠又食其角又有繼之辭也前已食故曰繼其緩辭也曰亡乎人矣非人之所能也所以免有司之過也至此復食乃知國無賢君天灾之爾非有司之過也故言其以赦之乃免牛乃者亡乎人之辭也免牲者為之緇衣纁裳有司𤣥端奉送至於南郊免牛亦然免牲不曰不郊免牛亦然郊者用牲今言免牲則不郊顯矣若言免牛亦不郊而經復書不郊者蓋為三望起爾言時既不郊而猶三望明失禮傳穀梁成公十年夏四月五卜郊不從乃不郊杜曰卜常祀不郊皆非禮故書夏四月不時也郊時極於三月五卜强也穀梁傳成公十七年九月辛丑用郊杜曰九月郊祭非禮明矣書用郊從史文用者不宜用也九月非所用郊也周之九月夏之七月天氣上升地氣下降又非郊時故加用之然則郊曷用郊用正月上辛魯郊博卜春三月言正月者因見百王正所當用也三王之郊一用夏正言正月者春秋之制也正月者嵗首上辛猶始新皆取其首月之辛日者明用辛例不郊則不日或曰用然後郊或曰用者先有事存后稷神名也晉人將有事於河必先有事於惡池齊人將有事於泰山必先有事於蜚林魯人將有事於天必先有事於頖宫九月郊尤悖禮故言用小大盡譏之以不郊乃譏三望知郊不得譏小也又夕牲告牷后稷當在日上不得在日下公羊傳夏之始可以承春以秋之末承春之始蓋不可矣郊春事也僖三十一年夏四月四卜郊不從傳曰四月不時今言可者方明秋末之不可故以是為猶可也九月用郊用者不宜用也宫室不設不可以祭衣服不修不可以祭車馬器械不備不可以祭有司一人不備其職不可以祭祭者薦其時也薦其敬也薦其美也非享味也穀梁傳襄公七年夏四月三卜郊不從乃免牲稱牲既卜日也卜郊又非禮也孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也郊祀后稷以配天后稷周始祖能播殖者是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也啓蟄夏正建寅之月耕謂春分左氏傳襄公十一年夏四月四卜郊不從乃不郊夏四月不時也四卜郊非禮也穀梁傳定公十五年春王正月鼷鼠食郊牛牛死改卜牛杜曰不言所食處舉死重也改卜禮也曷為不書其所食漫也公羊傳不敬莫大焉不言所食食非一處而至死定公不敬最大故天灾最甚穀梁傳夏五月辛亥郊杜曰書過曷為以夏五月郊三卜之運也公羊傳哀公元年春王正月鼷鼠食郊牛角改卜牛按左氏無角字夏四月辛巳郊此該郊之變而道之也該備也春秋書郊終於此故於此備說郊之變變謂郊非其時或牲被灾害於變之中又有言焉於灾變之中又有可善而言者鼷鼠食郊牛角改卜牛志不敬也郊牛日展斛角而知傷展道盡矣展道雖盡所以備灾之道不盡譏哀公不敬故致天灾郊自正月至於三月郊之時也夏四月郊不時也五月郊不時也夏之始可以承春以秋之末承春之始蓋不可矣凱曰不時之中有差劇也夏始承春方秋之末猶可為也九月用郊用者不宜用也在成十七年郊三卜禮也以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛所謂三卜也鄭嗣曰謂卜辛而三也求吉之道三故曰禮也四卜非禮也僖三十一年襄十一年皆四卜五卜强也成十年五卜卜免牲者吉則免之不吉則否牛傷不言傷之者傷自牛作也故其辭緩宣三年郊牛之口傷以牛自傷故加之言緩辭全曰牲傷曰牛未牲曰牛其牛一也其所以為牛者異已卜日成牲而傷之曰牛未卜日未成牲之牛二者不同有變而不郊故卜免牛也已牛矣其尚卜免之何也灾傷不復以郊怪復卜免之禮與其亡也寧有於禮有卜之與無卜寧當有卜嘗置之上帝矣故卜而後免之不敢専也當置之滌宫名之為上帝牲故不敢擅放也卜之不吉則如之何不免安置之繫而待六月上甲始庀牲然後左右之庀具也待具後牲然後左右前牛在我用之不復須卜已有新牲故也周禮曰司門掌授管鍵以啓閉國門祭祀之牛牲繫焉然則未左右時監門者養之子之所言者牲之變而曰我一該郊之變而道之何也我以六月上甲始庀牲十月上甲始繫牲十一月十二月牲雖有變不道也牲有變則改卜牛以不妨郊事故不言其變待正月然後言牲之變此乃所以該郊至郊時然後言其變重其妨郊也十二月不道自前可知也至正月然後道則二月三月亦可知也此所以該郊言其變道盡郊享道也貴其時大其禮其養牲雖小不備可也享者飲食之道牲有變則改卜牛郊日已逼庀繫之禮雖小不備合時得禮用之可也子不志三月卜郊何也三月謂十二月正月二月也郊自正月至於三月郊之時也有變乃志常事不書我以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣意欲郊而卜不吉故曰不從郊必用上辛者取其新潔莫先也穀梁傳哀公十三年公㑹吳晉盟吳人囚子服景伯景伯謂大宰曰魯將以十月上辛有事於上帝先王季辛而畢何世有職焉有職於祭事左氏傳孔子曰嗚呼哀哉我觀周道幽厲傷之吾舍魯何適矣政亂禮失以為魯尚愈魯之郊禘非禮也周公其衰矣非猶失也魯之郊牛口傷鼷鼠食其角又有四卜郊不從是周公之道衰矣言子孫不能奉行興之杞之郊也禹也宋之郊也契也是天子之事守也先祖法度子孫所當守故天子祭天地諸侯祭社稷禮運桓公五年秋大雩書不時也凡祀龍見而雩注見上過則書卜日有吉否過次節則書以譏慢也左氏傳定公元年九月大雩雩月雩之正也秋大雩非正也冬大雩非正也秋大雩之為非正何也冬禾稼既成猶雩則非禮可知秋禾稼始苗嫌當須雨故問也毛澤未盡人力未竭未可以雩也邵曰凡地之所生者謂毛公羊傳曰錫之不毛之地是也言秋百穀之潤澤未盡也人力未盡謂耕耘之功未畢雩月雩之正也月之為雩之正何也其時窮人力盡然後雩雩之正也何謂其時窮人力盡是月不雨則無及矣是年不艾則無食矣是其時時窮人力盡也雩之必待其時窮人力盡何也雩者為旱求者也求者請也古之人重請何重乎請人之所以為人者讓也請道去讓也則是舍其所以為人也是以重之焉請哉請應乎上公古之神人有應上公者通乎陰陽君親帥諸大夫道之而以請焉道之謂君必為先也其禱辭曰方今大旱野無生稼寡人當死百姓何謗不敢煩民請命願撫萬民以身塞無狀禱亦請也此即請辭也夫請者非可詒託而往也必親之者也是以重之詒託猶假寄穀梁傳成公七年冬大雩雩不月而時非之也冬無為雩也穀梁傳小宗伯兆五帝於四郊兆為壇之營域五帝蒼曰靈威仰大昊食焉赤曰赤熛怒炎帝食焉黃曰含樞紐黃帝食焉白曰白招拒少昊食焉黑曰叶光紀顓頊食焉黃帝亦於南郊春官因吉土以饗帝於郊吉土王者所卜而居之土也饗帝於郊以四時所兆祭於四郊者也今漢亦四時迎氣其禮則簡位禮器此兩條五帝神春其帝大皥其神句芒此蒼精之君木官之臣自古以來著德立功者也大皥宓戲氏句芒少昊氏之子曰重為木官夏其帝炎帝其神祝融此赤精之君火官之臣自古以來著德立功者也炎帝大庭氏也祝融顓頊氏之子曰犂為火官中央土其帝黃帝其神后土此黃精之君土官之臣自古以來著德立功者也黃帝軒轅氏也后土亦顓頊氏之子曰犂兼為土官秋其帝少皥其神蓐收此白精之君金官之臣自古以來著德立功者也少昊金天氏蓐收少皥氏之子曰該為金官冬其帝顓頊其神𤣥冥此黑精之君水官之臣自古以來著德立功者也顓頊髙陽氏也𤣥冥少皥氏之子曰修曰熙為水官月令此條配帝及帝臣大宗伯以玉作六器以禮天地四方禮謂始告神時薦於神坐書曰周公植璧秉圭是也以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方禮東方以立春謂蒼精之帝而大皥句芒食焉禮南方以立夏謂赤精之帝而炎帝祝融食焉禮西方以立秋謂白精之帝而少昊蓐收食焉禮北方以立冬謂黑精之帝而顓頊𤣥冥食焉禮神者必象其類圭鋭象春物初生半圭曰璋象夏物半死琥猛象秋嚴肅半璧曰璜象冬閉藏地上無物唯天半見皆有牲幣各放其器之色幣以從爵若人飲酒有酬幣春官充人掌繫祭祀之牲牷祀五帝則繫於牢芻之三月牢間也必有間者防禽獸觸齧養牛羊曰芻三月一時節氣成地官司服王祀昊天上帝則服大裘而冕祀五帝亦如之注見祀天春官掌次祀五帝則張大次小次設重㡩重案祀五帝於四郊次謂幄也大幄初往所止居也小幄既接祭退俟之處祭義曰周人祭日以朝及暗雖有强力孰能支之是以退俟與諸臣代有事焉重㡩復㡩重案牀重席也鄭司農云五帝五色之帝天官大司樂乃奏黃鍾歌大吕舞雲門以祀天神注見祀天五春官物已上祀帝禮舞樂大宰祀五帝則掌百官之誓戒與其具修前期十日帥執事而卜日遂戒及執事眂滌濯及納亨贊王牲事及祀之日贊王幣爵之事注見祀天天官大司冦若禋祀五帝則戒之日涖誓百官戒于百族戒之日卜之日也百族謂府史以下也郊特牲曰卜之日王立於澤親聼誓命受教諫之義也獻命庫門之內戒百官也大廟之內戒百姓也及納亨前王祭之日亦如之納亨致牲奉其明水火明水火所取于日者小司冦凡禋祀五實鑊水納亨亦如之納亨致牲也其時鑊水當以洗解牲體肉士師祀五帝則沃户及王盥洎鑊水洎謂增其沃汁並秩官大司徒祀五帝奉牛牲羞其肆牛能任載地類也奉猶進也鄭司農云羞進也肆陳骨體也𤣥謂進所解骨體士喪節禮曰肆解去蹄地官已上祀五帝禮先立春三日大史謁之天子曰某日立春盛德在木天子乃齊大史禮官之屬掌正嵗年以序事謂告也立春之日天子親帥三公九卿諸侯大夫以迎春於東郊還反賞公卿諸侯大夫於朝迎春祭蒼帝靈威仰於東郊之兆也王居明堂禮曰出十五里迎嵗蓋殷禮也周迎郊五十里賞謂有功德者有以顯賜之也朝大寢門外命相布德和令行慶施惠下及兆民相謂三公相王之事也德謂善教也令謂時禁也慶謂休其善也惠謂恤其不足也天子曰兆民慶賜遂行毋有不當遂猶達也言使當得者皆得得者無非其人先立夏三日大史謁之天子曰某日立夏盛德在火天子乃齊立夏之日天子親帥三公九卿大夫以迎夏于南郊還反行賞封諸侯慶賜遂行無不欣恱迎夏祭赤帝赤熛怒于南郊之兆也不言帥諸侯而云封諸侯諸侯時或無在京師者空其文也祭統曰古者于禘也發爵賜服順陽義也于嘗也出田邑發秋政順隂義也今此行賞可也而封諸侯則違于古封諸侯出土地之事于時未可似失之先立秋三日大史謁之天子曰某日立秋盛德在金天子乃齊立秋之日天子親帥三公九卿諸侯大夫以迎秋于西郊還反賞軍帥武人于朝迎秋者祭白帝白招拒于西郊之兆也軍帥諸將也武人謂環人之屬有勇力者先立冬三日大史謁之天子曰某日立冬盛德在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬于北郊還反賞死事恤孤寡迎冬者祭黑帝叶光紀于北郊之逃也死事謂以國事死者若公叔禺人顔涿聚者也孤寡其妻子也有以惠賜之大功加賞月令此條四時迎氣季冬乃畢祀帝之大臣天之神祇四時之功成于冬孟月祭其宗至此可以祭其佐也帝之大臣句芒之屬天之神祇司中司命風師雨師月令此條祀帝臣右祀五帝及五人帝五人神季康子問于孔子曰舊聞五帝之名而不知其實請問何謂五帝孔子曰昔丘也聞諸老聃曰天有五行水火金木土分時化育以成萬物一嵗三百六十日五行各主七十二日也化生長育一嵗之功萬物莫敢不成其神謂之五帝五帝五行之神佐天生物者而後世讖緯皆為之名字亦為妖怪妄言古之王者易代而改號取法五行五行更王終始相生亦象其義法五行更王終始相生始以木德王天下其次以生之行轉相成而諸說乃謂五精之帝下生王者其義或無可言者故其生為明王者而死配五行是以太皥配木炎帝配火黃帝配土少皥配金顓頊配水康子曰太皥氏其始之木何如孔子曰五行用事先起於木木東方萬物之初皆出焉是故王者則之而君以木德王天下其次則以所生之行轉相承也木生火火生土之屬康子曰吾聞句芒為木正祝融為火正蓐收為金正𤣥冥為水正后土為土正此五行之主而不亂稱曰帝者何也孔子曰凡五正者五行之官名五行佐成上帝而稱五帝太皥之屬配焉亦云帝從其號天至尊物不可以同其號亦兼稱上帝上得包下五行佐成天事謂之五帝以地有五行而其精神在上故亦為之上帝黃帝之屬故亦稱帝蓋從天五帝之號故王者雖號稱五帝而不得稱天帝而曰天子者言天子與天其尊卑相去逺矣曰天王者言乃天下之王也昔少皥氏之子有四叔曰重曰該曰修曰熙實能金木及水使重為句芒該為蓐收修及熙為𤣥冥顓頊氏之子曰黎為祝融共工氏之子曰句龍為后土此五者各以其所能業為官職各以一行之官為職業之事生為上公死為貴神别稱五祀不得同帝五祀上公之神故不得稱帝也其序則五正不及五帝五帝不及天地而不知者以祭社為祭地不亦失之逺矣且土與火水俱為五行是地之子也以子為母不亦顛倒失尊卑之序也康子曰陶唐有虞夏后殷周獨不得配五帝意者德不及上古耶將有限乎孔子曰古之平治水土及播殖百穀者衆矣唯句龍兼食於社兼猶配也而棄為稷神易代奉之無敢益者明不可與等故自太皥以降逮於顓頊其應五行而王數非徒五而配五帝是其德不可以多也家語蔡墨曰有五行之官是謂五官實列受氏姓封為上公爵上公祀為貴神社稷五祀是尊是奉五官之君長能修其業者死皆配食於五行之神為王者所尊奉木正曰句芒正官長也取木生句曲而有芒角也其祀重焉火正曰祝融祝融明貌其祀犂焉金正曰蓐收秋物摧辱而可收也其祀該焉水正曰𤣥冥水陰而幽冥其祀修及熙焉土正曰后土土為羣物主故稱后也其祀句龍焉在家則祀中霤在野則為社獻子曰社稷五祀誰氏之五官也問五官之長皆是誰對曰少皥氏有四叔少皥金天氏曰重曰該曰修曰熙實能金木及水能治其官使重為句芒木正該為蓐收金正修及熙為𤣥冥二子相代為水正世不失職遂濟窮桑此其三祀也窮桑少昊之號也四子能治其官使不失職濟成少昊之功死皆為民所祀窮桑地在魯北顓頊氏有子曰犂為祝融犂為火正共工氏有子曰句龍為后土此其二祀也昭二十九年左氏傳王宫祭日也夜明祭月也王宫日壇王君也日稱君宫壇營域也夜明亦謂月壇也法祭祭日於壇祭月於坎祭日於東祭月於西詳見祭義掌次朝日則張大次小次設重㡩重案朝日春分拜日於東門之外次謂幄也大幄初往所止居也小幄既接祭退俟之處重㡩復㡩重案牀重席也天官天子𤣥端而朝日於東門之外端當為冕字之誤也𤣥衣而冕冕服之下朝日春分之時也東門謂國門也玉藻典瑞王晉大圭執鎮圭繅藉五采五就以朝日繅有五采文所以薦玉木為中幹用韋衣而畫之就成也王朝日者示有所尊訓民事君也天子常春分朝日秋分夕月覲禮曰拜日於東門之外故書鎮作瑱鄭司農云晉讀為搢紳之搢謂插之於紳帶之間若帶劍也瑱讀為鎮玉人職曰大圭長三尺抒上終葵首天子服之鎮圭尺有二寸天子守之繅讀為藻率之藻五就五匝也一匝為一就春官天子大采朝日與三公九卿祖識地德禮天子以春分朝日示有尊也虞說云大采衮織也祖習也識知也地德所以廣生昭謂禮玉藻天子𤣥冕以朝日𤣥冕冕服之下則大采非衮職也周禮王搢大圭執鎮圭藻藉五采五就以朝日則大采謂此也言天子與公卿因朝日以修陽政而習地德因夕月以治隂教而糾天刑日照晝月照夜各因其明以修其事也少采夕月與大史司載紏䖍天刑夕月以秋分紏恭也䖍敬也刑法也或云少采黼衣也昭謂朝日以五采則夕月其三采也載天文也司天文謂馮相氏保章氏與大史相儷偶也此因夕月而恭敬觀天法考行度以知妖祥也國語魯語大宗伯以實柴祀日月星辰實柴實牛柴上也春官羊人凡積共其羊牲積積柴禋祀槱燎實柴下疏曰祭天用犢其日月以有用羊者夏官典瑞圭璧以祀日月星辰圭其邸為璧取殺於上帝春官圭璧五寸以祀日月星辰禮其神也圭其邸為璧取殺於上帝考工記玉人大司樂乃奏黃鐘歌大吕舞雲門以祀天神天神謂五帝及日月星辰也詳見祀天春官迎日之辭曰維某年月上日明光於上下勤施於四方旁作穆穆維豫一人某敬拜迎日東郊尚書大傳上按大戴禮亦有此辭已祀日月之正禮已下因事而祀日月郊之祭大報天而主日配以月主日者以其光明天之神可見者莫著焉祭義此因郊而祀諸侯覲於天子天子乘龍載大斾象日月升龍降龍出拜日於東門之外此謂㑹同以春者也馬八尺以上為龍大斾大常也王建大常縿首畫日月其下及旒交畫升龍降龍朝事儀曰天子冕而執鎮圭尺有二寸繅藉尺有二寸搢大圭乘大路建大常十有二旒樊纓十有二就二車十有一乘帥諸侯而朝日於東郊所以教尊尊也禮日於南門外禮月與四瀆於北門外此謂㑹同以夏冬者也變拜言禮者容祀也禮月於北郊者月大陰之精以為地神也覲禮此因㑹同而祀孟冬天子乃祈來年於天宗此周禮所謂蠟祭也天宗謂日月星辰也月令此因蠟而祀日月星辰之神則雪霜風雨之不時於是乎禜之周禮四曰禜祭為營攢用幣以祈福祥昭元年左氏傳此因禜而祀右祀日月莊公十八年日有食之不言日不言朔夜食也何以知其夜食也曰王者朝日王制曰天子𤣥冕而朝日於東門之外故日始出而有虧傷之處是以知其夜食也何休曰春秋不言月食日者以其無形故闕疑其夜食何緣書乎鄭君釋之曰一日一夜合為一日今朔日月始出其食虧傷之處未復故知此日以夜食夜食則亦屬前月之晦故穀梁不以為疑故雖為天子必有尊也貴為諸侯必有長也故天子朝日諸侯朝朔穀梁傳大宗伯以實柴祀星辰星為五緯辰謂日月所㑹十二次典瑞圭璧以祀日月星辰詳見上章並春官圭璧五寸以祀日月星辰詳見上章祭星曰布布散祭於地爾雅大司樂乃奏黃鐘歌大吕舞雲門以祀天神詳見祀天下已上祀星辰正禮以因事而祀孟冬天子乃祈來年於天宗詳見上章幽宗祭星也宗皆當為禜字之誤也幽禜亦謂星壇也星以昏始見禜之言營也春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之祭法日月星辰之神則雪霜風雨之不時於是乎禜之星辰之神若實沈者傳昭元年左氏右祀星辰祭司民司祿見百神篇古之火正或食於心或食於咮以出內火是故咮為鶉火心為大火謂火正之官配食於火星建辰之月鶉火星昏在南方則令民放火建戌之月大火星伏在日下夜不得見則令民內火禁放火陶唐氏之火正閼伯居商丘陶唐堯有天下號閼伯髙辛氏之子傳曰遷閼伯於商丘主辰辰大火也今為宋星然則商丘在宋地祀大火而火紀時焉謂出內火時相土因之故商主大火相土契孫商之祖也始代閼伯之後居商丘祀大火襄九年左氏傳遷閼伯於商丘主辰商丘宋地主祀辰星辰大火也商人是因商人湯先相土封商丘因閼伯故國祀星辰遷實沈於大夏主參大夏今晉陽縣唐人是因唐人若劉纍之等纍遷魯縣此在大夏云詳見因祭疾病章昭元年左氏傳按通典周制仲秋之月祭靈星於國之東南秋分日享夀星於南郊此皆不見於經典又絲衣詩序引髙子曰靈星之尸也朱子謂髙子尤誤今附載於此大宗伯以槱燎祀司中司命飌師雨師槱積也詩曰芃芃棫朴薪之槱之積柴實牲體焉燔燎而升煙所以報陽也鄭司農云司中三能三階也司命文昌宫星風師箕也雨師畢也𤣥謂司中司命文昌第五第四星或曰中能上能也春官祭風曰磔今俗當大道中磔狗云以止風此其象爾雅季冬乃畢祀天之神祇天之神祇司中司命風師雨師東月令夏按通典云周制立春後丑日祭風師於國城北立後申日祀雨師於國城西南立冬後亥日祀司中司命司民司祿於國城西北亦未知何據右祀司中司命飌師雨師禮書綱目卷三十五
