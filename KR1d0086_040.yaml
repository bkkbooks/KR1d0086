body:
  text: 禮書綱目卷三十八婺源江永撰宗廟吉禮五補君子將營宫室宗廟為先廏庫為次居室為後重先祖及國之用禮曲匠人營國左祖右社祖宗廟夏后氏世室世室者宗廟也殷人重屋重屋者王宫正堂若大寢也周人明堂明堂者明政教之堂此三者或舉宗廟或舉王寢或舉明堂互言之以明其同制考工記詳見通禮名器下小宗伯掌建國之神位右社稷左宗廟詳見祭通禮神位章天子不卜處大廟卜可建國之處吉則宫廟吉可知表記已上四條論營建宗廟小宗伯辨廟祧之昭穆祧遷主所藏之廟自始祖之後父曰昭子曰穆春官天子七廟三昭三穆與大祖之廟而七此周制七者大祖及文王武王之祧與親廟四大祖后稷殷則六廟契及湯與二昭二穆夏則五廟無大祖禹與二昭二穆而已諸侯五廟二昭二穆與大祖之廟而五大祖始封之君王者之後不為始封之君廟大夫三廟一昭一穆與大祖之廟而三大祖别子始爵者大傳曰别子為祖謂此雖非别子始爵者亦然士一廟謂諸侯之中士下士名曰官師者上士二廟庶人祭於寢寢適寢也王制天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疏多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去壇為鬼大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼建國封諸侯也置都立邑為卿大夫之采地及賜士有功者之地廟之言貌也宗廟者先祖之尊貌也祧之言超也超上去意也封土曰壇土地曰墠書曰三壇用墠王皇皆君也顯明也祖始也名先人以君明始者所以尊本之意也天子遷廟之主以昭穆合藏於二祧之中諸侯無祧藏於祖考之廟中聘禮曰不腆先君之祧是謂始祖廟也享嘗謂四時之祭天子諸侯為壇墠所禱謂後遷在祧者也既事則反其主於祧鬼亦在祧顧逺之於無事祫乃祭之爾春秋文二年秋大事於大廟傳曰毁廟之主陳於大祖未毁廟之主皆升合食於大祖是也魯煬公者伯禽之子也至昭公定公久已為鬼而季氏禱之而立其宫則鬼之主在祧明矣唯天子諸侯有主禘祫大夫有祖考者亦鬼其百世不禘祫無主爾其無祖考者庶士以下鬼其考王考官師鬼其皇考大夫適士鬼其顯考而已大夫祖考謂别子也凡鬼者薦而不祭王制曰大夫士有田則祭無田則薦適士上士也官師中士下士庶士府史之屬此適士云顯考無廟非也當為皇考字之誤祭法已上三條論立廟昭穆之制多少之數山節藻棁復廟重簷刮楹達鄉反坫出尊崇坫康圭疏屏天子之廟飾也山節刻欂盧為山也藻棁畫侏儒柱為藻文也復廟重屋也重簷重承壁材也刮刮摩也鄉牖屬謂夾户窗也每室八窗為四達反坫反爵之坫也出尊當尊南也唯兩君為好既獻反爵於其上禮君尊於兩楹之間崇髙也康讀為亢龍之亢又為髙坫亢所受圭奠於上焉屏謂之樹今浮思也刻之為雲氣蟲獸如今闕上為之矣明堂位廟門容大扃七個大扃牛鼎之扃長三尺每扃為一個七個二丈一尺闈門容小扃參個廟中之門曰闈小扃膷鼎之扃長二尺參個六尺考工記匠人閍謂之門詩曰祝祭于祊廟中路謂之唐詩曰中唐有甓堂途謂之陳堂下至門徑也室有東西廂曰廟夾室前堂無東西廂有室曰寢但有大寢爾雅寢不踰廟王制論已上四條廟中制度守祧奄八人逺廟為祧周為文王武王廟遷主藏焉奄如今之宦者天子七廟三昭三穆掌守先王先公之廟祧詳見下守藏章若將祭祀其廟則有司修除之其祧則守祧黝堊之廟祭此廟也祧祭遷主有司宗伯也修除黝堊互言之有司恆主修除守祧恆主黝堊鄭司農云黝讀為幽黑也堊白也爾雅曰地謂之黝牆謂之堊春官隸僕掌五寢之掃除糞灑之事五寢五廟之寢也周天子七廟唯祧無寢詩云寢廟繹繹相連貌也前曰廟後曰寢泛掃曰掃掃席前曰拚灑灑也鄭司農云灑當為灑玄謂論語曰子夏之門人當灑掃應對祭祀修寢於廟祭寢或有事焉月令凡新物先薦寢廟官夏仲春寢廟畢備畢猶皆也凡廟前曰廟後曰寢月令已上三條論修廟國君下齊牛式宗廟疏曰案齊右職凡有牲事則前馬注引曲禮曰國君下宗廟式齊牛鄭注周官與此文異者熊氏云此文誤當以周禮注為正曲禮太子過廟則趨過闕則下望廟則趨宗大戴禮此二條恭敬廟公若有出疆之政謂朝覲會同也庶子以公族之無事者守於公宫正室守太廟正室適子也大廟大祖之廟諸父守貴宫貴室謂守路寢諸子諸孫守下宫下室下宫親廟也下室燕寢或言宫或言廟通異語文王世子此條守宗廟有焚其先人之室則三日哭謂人燒其宗廟哭者哀精神之有虧傷故曰新宫火亦三日哭火人火也新宫火在魯成三年檀弓此條廟災右廟制周公作大邑成周於土中乃位五宫太廟宗宫考宫路寢明堂五宫宫府寺也太廟后稷二宫祖考廟也路寢王所居也明堂在國南者也咸有四阿反坫重亢重郎常纍復格升藻棁設移旅楹憃常畫咸皆也廟四下曰阿反坫外向室也重亢纍棟也重郎纍屋也常纍系也復格纍之櫺也升藻棁畫梁柱也承屋曰移旅列也憃謂藻升之飾也言皆畫列柱為之也內階玄階堤唐山牆以黑石為階唐中庭道堤謂為髙之也山牆謂畫山雲汲冢周書孔子適周厯郊社之所考明堂之則察廟朝之度於是喟然曰吾乃今知周公之聖與周之所以王也家語衛莊公改舊制變宗廟易朝市髙子睪問於孔子曰周禮繹祭於祊祊在廟門之西前朝而後市今衛君更之如之何孔子曰繹之於庫門內祊之於東方市朝於西方失之矣同上大廟天子明堂言廟如天子之制也明堂位子貢觀於魯廟之北堂出而問孔子曰鄉者賜觀於太廟之北堂吾亦未輟還復瞻被九蓋皆繼彼有説邪匠過絶邪北堂神主所在也輟止也九當為北被當為彼傳寫誤耳蓋音盍户扇也繼謂其材木斷絶相接繼也子貢問北盍語皆繼續彼有説邪匠過誤而遂絶之也按家作還瞻北盍皆繼焉彼有説邪匠過之也注觀北面之盍皆斷絶也孔子曰太廟之堂亦嘗有説言舊曽説今則無也官致良工因麗節文致極也官致良工謂初造太廟之時官極其良工良工則因隨其木之美麗節文而裁制之所以斷絶家語作官致良工之匠匠致良材盡其功巧蓋貴文也非無良材也蓋曰貴文也非無良材大木不斷絶者蓋所以貴文飾也此蓋明夫子之博識也荀子魯公之廟文世室也武公之廟武世室也此二廟象周有文王武王之廟也世室者不毁之名也魯公伯禽也武公伯禽之玄孫也名敖明堂位文公十三年大室屋壞大廟之室書不共也簡慢宗廟使至傾頺故書以見臣子不共左春秋氏傳世室屋壞世室魯公之廟也魯公周公子伯禽周公稱大廟魯公稱世室羣公稱宫少差異其下者所以上尊周公此魯公之廟也曷為謂之世室世室猶世室也世世不毁也魯公始封之君故不毁也周公何以稱大廟于魯據魯公始封也封魯公以為周公也為周公故語在下公羊傳大室屋壞者有壞道也譏不修也大室猶世室也世世有是室故言世室周公曰大廟爾雅曰室有東西廂曰廟伯禽曰大室羣公曰宫爾雅曰宫謂之室室謂之宫然則其實一也蓋尊伯禽而異其名禮宗廟之事君親割割牲夫人親舂舂粢盛也敬之至也為社稷之主而先君之廟壞極稱之志不敬也極稱言屋壞不復依違其文穀梁傳莊公二十三年秋丹桓宫楹桓公廟也楹柱也二十四年春王三月刻桓宫桷刻鏤也桷椽也將逆夫人故為盛飾皆非禮也并非丹楹故言皆御孫諫曰臣聞之儉德之共也侈惡之大也御孫魯大夫先君有共德而君納諸大惡無乃不可乎以不丹楹刻桷為共左氏傳天子諸侯黝堊黝堊黑色大夫蒼士黈黈黃色丹楹非禮也天子之桷斫之礱之加密石焉以細石磨之諸侯之桷斫之礱之大夫斫之士斫本刻桷非正也非正謂刻桷丹楹也穀梁傳成公六年二月辛巳立武宫魯人自鞍之功至今無患故築武軍又作先君武公宫以告成事欲以示後世季文子以鞍之功立武宫非禮也宣十二年潘黨勸楚子立武軍楚子答以武有七德非己所堪其為先君宫告成事而已今魯倚晉之功又非霸主而立武宫故譏之左氏傳武宫者何武公之宫也在春秋前立者不宜立也立武宫非禮也禮天子諸侯立五廟受命始封之君立一廟至於子孫過高祖不得復立廟周家祖有功宗有德立后稷文武廟至於子孫自高祖已下而七廟天子卿大夫三廟元士二廟諸侯之卿大夫比元士二廟諸侯之士一廟立武宫者蓋時衰多廢人事而好求福於鬼神故重而書之臧孫許伐齊有功故立武宫公羊傳立武宫立者不宜立也舊説曰武公之宫廟毁已久矣故傳曰不宜立也禮記明堂位曰魯公之廟文世室也武公之廟武世室也言世室則不毁也則義與此違穀梁傳定公元年立煬宫煬公伯禽子也其廟已毁季氏禱之而立其宫書以譏之昭公出故季平子禱于煬公九月立煬宫平子逐公懼而請禱於煬宫昭公死於外自以為獲福故立其宫左氏傳煬宫者何煬公之宫也春秋前煬公也立者不宜立也立煬宫非禮也公羊傳立煬宫立者不宜立者也煬宫伯禽子廟毁已久穀梁傳成公三年二月甲子新宫災三日哭杜曰三年喪畢宣公神主新入廟故謂之新宫書三日哭善得禮宗廟親之神靈所馮居而遇災故哀而哭之秋春宣公之宫也以無新宫知宣公之宫廟曷為謂之新宫不忍言也親之精神所依而災孝子隱痛不忍正言也謂之新宫者因新入宫易其西北角示昭穆相繼代有斫改更也其言三日哭何據桓僖宫災不言三日哭廟災三日哭禮也善得禮痛傷鬼神無所依歸故君臣素縞哭之公羊傳新宫者禰宫也三日哭哀也其哀禮也宫廟親之神靈所馮居而遇災故以哀哭為禮迫近不敢稱諡恭也迫近言親禰也桓僖逺祖則稱諡其辭恭且哀以成公為無譏矣穀梁傳哀公三年桓宫僖宫災孔子在陳聞火曰其桓僖乎言桓僖親盡而廟不毁宜為天所災不左氏傳焉家語孔子曰禮祖有功而宗有德故毁其廟今桓僖之親盡矣又功德不足以存其廟而魯不毁是以天災加之此皆毁廟也其言災何復立也曷為不言其復立春秋見者不復見也公羊傳凡邑有宗廟先君之主曰都無曰邑周禮四縣為都四井為邑然宗廟所在則雖邑曰都尊之也莊二十八年左氏傳諸侯不敢祖天子大夫不敢祖諸侯而公廟之設於私家非禮也由三桓始也言仲孫叔孫季孫氏皆立桓公廟魯以周公之故立文王廟三家見而僭焉牲郊特衛將軍文子將立三軍之廟於其家使子羔訪於孔子孔子曰公廟設於私家非古禮之所及吾弗知家語震夷伯之廟夷伯魯大夫也因此以見天子至于士皆有廟明夷伯之廟過制故因此以言禮天子七廟諸侯五大夫三士二故德厚者流光德薄者流卑雍曰德厚者位尊道隆者爵重故天子逺及七世士祭祖而已是以貴始德之本也始封必為祖若契為殷祖棄為周祖穀梁傳子大叔之廟在道南其寢在道北昭十八年左氏傳大司樂乃奏夷則歌小吕舞大濩以享先妣先妣薑嫄也薑嫄履大人迹感神靈而生后稷是周之先母也周立廟祀后稷為始祖薑嫄無所祀是以特立廟而祭之謂之閟宫閟神之舞詳見祭物樂章右妣廟有虞氏祖顓頊而宗堯夏后氏祖顓頊而宗禹殷人祖契而宗湯周人祖文王而宗武王詳見祭法右祖宗正月上日受終于文祖文祖者堯始祖之廟舜典正月朔旦受命于神宗神宗堯廟也大禹謨伊尹曰七世之廟可以觀德天子七廟三昭三穆與太祖之廟七七廟親盡則遷必有德之主則不祧毁故曰七世之廟可以觀德咸有一德子羔問曰祭典云昔者有虞氏祖顓頊而宗堯夏后氏亦祖顓頊而宗禹殷人祖契而宗湯周人祖文王而宗武王此四祖四宗或乃異代或其考祖之有功德其廟可也若有虞宗堯夏祖顓頊皆異代之有功德者也亦可以存其廟乎孔子曰善如汝所問也如殷周之祖宗其廟可以不毁其他祖宗者功德不殊雖在殊代亦可以無疑矣詩云蔽芾甘棠勿翦勿伐召伯所憩周人之於召公也愛其人猶敬其所舍之樹况祖宗其功德而可以不尊奉其廟乎家語魯公之廟文世室也武公之廟武世室也詳見上章宋祖帝乙鄭祖厲王猶上祖也詳見下章措之廟立之主曰帝同之天神春秋傳曰凡君卒哭而祔祔而作主曲禮右廟主葬僖公緩作主非禮也凡君薨卒哭而祔祔而作主特祀於主蒸嘗禘於廟詳見凶禮喪大記下作主章文公二年春王二月丁丑作僖公主書不時也同上作僖公主者何為僖公作主也主者曷用虞主用桑練主用栗用栗者藏主也作僖公主何以書譏不時也其不時奈何欲久喪而後不能也同上立主喪主於虞吉主於練作僖公主譏其後也作主壞廟有時日於練焉壞廟壞廟之道易簷可也改塗可也同上曽子問曰喪有二孤廟有二主禮與怪時有之孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也尊喻卑也神雖多猶一一祭之昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始也偽有假也舉兵以遷廟主行無則主命為假主非也曽子問曽子問曰古者師行必以遷廟主行乎孔子曰天子巡守以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣齊車金路當七廟五廟無虛主虛主者唯天子崩諸侯薨與去其國與祫祭於祖為無主耳吾聞諸老聃曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而后主各反其廟老聃古夀考者之號也與孔子同時藏諸主於祖廟象有凶事者聚也卒哭成事先祔之祭名也君去其國大宰取羣廟之主以從鬼神依人者也祫祭於祖則祝迎四廟之主祝接神者也主出廟入廟必蹕蹕止行也老聃云同上文公二年八月丁卯大事於大廟躋僖公大事禘也躋升也僖公閔公庶兄繼閔而立廟坐宜次閔下今升在閔上故書而譏之時未應吉禘而於大廟行之其譏已明徒以逆祀故特大其事異其文逆祀也僖是閔兄不得為父子嘗為臣位應在下今居閔上故曰逆祀於是夏父弗忌為宗伯宗伯掌宗廟昭穆之禮尊僖公且明見曰吾見新鬼大故鬼小新鬼僖公既為兄死時年又長故鬼閔公死時年少弗忌明言其所見先大後小順也躋聖賢明也又以僖公為聖賢明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣齊肅也臣繼君猶子繼父故禹不先鯀湯不先契鯀禹父契湯十三世祖文武不先不窋不窋后稷子宋祖帝乙鄭祖厲王猶上祖也帝乙微子父厲王鄭桓公父二國不以帝乙厲王不肖而猶尊尚之是以魯頌曰春秋匪懈享祀不忒皇皇后帝皇祖后稷忒差也皇皇美也后帝天也詩頌僖公郊祭上天配以后稷君子曰禮謂其后稷親而先帝也先稱帝也詩曰問我諸姑遂及伯姊詩邶風也衛女思歸而不得故願至問於姑姊君子曰禮謂其姊親而先姑也僖親文公父夏父弗忌從阿時君先其所親故傳以此二詩深責其意仲尼曰臧文仲其不仁者三不知者三下展禽展禽桞下惠也文仲知桞下惠之賢而使在下位非己欲立而立人之道廢六關塞關陽關之屬凡六關所以禁絶末遊而廢之妾織蒲三不仁也家人販席言其與民爭利作虛器謂居蔡山節藻棁也有其器而無其位故曰虛縱逆祀聽夏公躋僖公祀爰居三不知也海鳥曰爰居止于魯東門外文公以為神命國人祀之左氏傳夏父弗忌為宗弗忌魯大夫夏父展之後也宗宗伯掌國祭祀之禮蒸將躋僖公躋升也賈侍中云蒸進也謂夏父弗忌進言於公將升僖公於閔公上也唐尚書云蒸祭也昭謂此魯文公三年喪畢祫祭先君於太廟升羣廟之主序昭穆之時也經曰八月丁卯大事於大廟躋僖公是也僖閔之兄繼閔而立凡祭秋曰嘗冬曰蒸此八月而言蒸用蒸禮也凡四時之祭蒸為備傳曰大事者祫祭也毁廟之主陳于太祖未毁廟之主皆升合食于太祖躋僖公逆祀也逆祀者先禰而後祖也宗有司曰非昭穆宗有司宗官司事臣也非昭穆謂非昭穆之次也父為昭子為穆僖為閔臣臣子一例而升閔上故曰非昭穆也曰我為宗伯明者為昭其次為穆何常之有明言僖有明德當為昭閔次之當為穆也有司曰夫宗廟之有昭穆也以次世之長幼而等胄之親疏也長幼先後也等齊也胄裔也夫祀昭孝也昭明也明孝道也各致齊敬於其皇祖昭孝之至也皇大也故工史書世工瞽師官也史太史也世世次先後也工誦其德史書其言宗祝書昭穆宗宗伯祝太祝也宗掌其禮祝掌其位猶恐其踰也今將先明而後祖以僖為明而升之是先禰而後祖自玄王以及主癸莫若湯玄王契也主癸湯父也自稷以至王季莫若文武稷棄也王季文王父商周之蒸也未嘗躋湯與文武為不踰也不使相踰魯未若商周而改其常無乃不可乎弗聽遂躋之展禽曰夏父弗忌必有殃夫宗有司之言順矣僖又未有明焉未有明德犯順不祥以逆訓民亦不祥易神之班亦不祥不明而躋之亦不祥犯鬼道二二易神之班躋不明也犯人道二犯順以逆訓民也能無殃乎魯語躋者何升也何言乎升僖公據禘于太廟不道所升譏何譏爾逆祀也其逆祀奈何先禰而後祖也升謂西上禮昭穆指父子近取法春秋惠公與莊公當同南面西上隱桓與閔僖公亦當同北面西上繼閔者在下文公緣僖公於閔公為庶兄置僖公於閔公上失先後之義故譏之傳曰後祖者僖公以臣繼閔公猶子繼父故閔公於文公亦猶祖也自先君言之隱桓及閔僖各當為兄弟顧有貴賤耳自繼代言之有父子君臣之道此恩義逆順各有所施也不言吉祫者就不三年不復譏略為下張本公羊傳躋升也先親而後祖也逆祀也舊説僖公閔公庶兄故文公升僖公之主於閔公之上耳僖公雖長已為臣矣閔公雖小已為若矣臣不可以先君猶子不可以先父故以昭穆父子為喻寧曰即之於傳則無以知其然若引左氏以釋此傳則義雖有似而於文不辨高宗殷之賢王猶祭豐於禰以致雉雊之變然後率修常禮文公顛倒祖考固不足多怪矣親謂僖祖謂莊逆祀則是無昭穆也無昭穆則是無祖也無祖則無天也故曰文無天無天者是無天而行也祖人之始也人之所仰天也君子不以親親害尊尊此春秋之義也尊卑有序不可亂也穀梁傳孔子曰臧文仲安知禮夏父弗綦逆祀而弗止也文仲魯公子彄之曽孫臧孫辰也莊文之間為大夫於時為賢是以非之不正禮也文二年八月丁卯大事于大廟躋僖公始逆祀是夏父弗綦為宗人之為也禮器定公八年從祀先公從順也先公閔公僖公也將正二公之位次所順非一親盡故通言先公陽虎欲去三桓冬十月順祀先公而祈焉將作大事故以順祀取媚辛卯禘于僖公辛卯十月二日不於大廟者順祀之義當退僖公懼於僖神故於僖廟行順祀左氏傳從祀者何順祀也復文公之逆祀文公逆祀去者三人諫不從而去之定公順祀叛者五人諫不以禮而去曰叛去與叛皆不言者微也不書禘者後祫亦順非獨禘也言祀者無已長久之辭不言僖公者閔公亦得其順公羊傳從祀先公貴復正也文公逆祀今還順穀梁傳僖公八年秋七月禘于大廟用致夫人禘三年大祭之名大廟周公廟致者致新死之主於廟而列之昭穆夫人淫而與殺不薨於寢於禮不應致故僖公疑其禮厯三禘今果行之嫌異常故書之禘而致哀薑焉非禮也凡夫人不薨於寢不殯於廟不赴於同不祔於姑則弗致也寢小寢同同盟將葬又不以殯過廟據經哀薑薨葬之文則為殯廟赴同祔姑今當以不薨於寢不得致也傳左氏鄭火使祝史徙主祏於周廟告于先君祏廟主石函周廟厲王廟也有火災故合羣主於祖廟易救護昭十八年左氏傳衛孔悝出奔宋使二車反祏於西圃使副車還取廟主西圃孔氏廟所在祏藏主石函傳哀十六年左氏守祧掌守先王先公之廟祧其遺衣服藏焉廟謂大祖之廟及三昭三穆遷主所藏曰祧先公之遷主藏于后稷之廟先王之遷主藏于文武之廟遺衣服大斂之餘也故書祧作濯鄭司農濯讀為祧此王者之宫而有先公謂大王以前為諸侯若將祭祀則各以其服授尸尸當服卒者之上服以象生時既祭則藏其隋與其服鄭司農云隋謂神前所沃灌器名玄謂隋尸所祭肺脊黍稷之屬藏之以依神天府掌祖廟之守藏與其禁令祖廟始祖后稷之廟其寶物世傳守之若魯寶玉大弓者凡國之玉鎮大寶器藏焉若有大祭大喪則出而陳之既事藏之玉鎮大寶器玉瑞玉器之美者禘祫及大喪陳之以華國也故書鎮作瑱鄭司農云瑱讀為鎮上春釁寶鎮及寶器上春孟春也釁謂殺牲以血血之鄭司農云釁讀為徽或曰釁鼓之釁若遷寶則奉之奉猶送也並春官右守藏孔子適周觀乎眀堂覩四門墉有堯舜之容桀紂之象而各有善惡之狀興廢之誡焉又有周公相成王抱之負斧扆南面以朝諸侯之圖焉遂入大祖后稷之廟廟堂右階之前有金人焉三緘其口而銘其背曰古之慎言人也家語桓公二年三月公會齊侯陳侯鄭伯于稷以成宋亂成平也宋有弒君之亂故為會欲以平之稷宋地夏四月取郜大鼎于宋戊申納于大廟非禮也宋以鼎賂公大廟周公廟也始欲平宋之亂終于受賂故備書之臧哀伯諫曰臧哀伯魯大夫僖伯之子君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫今滅德立違謂立華督違命之臣而置其賂器於大廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉公不聽春秋左氏傳桓內弒其君外成人之亂受賂而退以事其祖非禮也其道以周公為弗受也穀梁傳孔子觀於魯桓公之廟有欹器焉夫子問於守廟者曰此謂何器對曰此蓋為宥坐之器孔子曰吾聞宥坐之器虛則欹中則正滿則覆明君以為至誡故常置之於坐側家語齊侯滅萊獻萊宗器于襄宫襄宫齊襄公廟襄六年左氏傳禮書綱目卷三十八
