body:
  text: 禮書綱目卷七十七楘源江永撰内則曲禮二補后王命冢宰降德于衆兆民后君也德猶教也萬億曰兆天子曰兆民諸侯曰萬民周禮冢宰掌飲食司徒掌十二教今一云冢宰記者據諸侯也諸侯并六卿為二或兼職焉子事父母雞初鳴咸盥潄櫛縰笄總拂髦冠緌纓端韠紳搢笏咸皆也縰韜髪者也總束髪也垂後為飾拂髦振去塵著之髦用髪為之象㓜時鬠其制未聞緌纓之飾也端𤣥端士服也庶人深衣紳大帶所以自紳約也搢猶扱也扱笏于紳笏所以記事也左右佩用自佩也必佩者備尊者使令也左佩紛帨刀礪小觽金燧紛帨拭物之巾也今齊人有言紛者刀礪小刀及礪礱也小觽解小結之觽貌如錐以象骨為之金燧可取火於日右佩玦捍管遰大觽木燧捍謂拾也言可以捍弦也管筆彄也遰刀韠也木燧鑽火也偪偪行縢屦著綦綦屦繫也婦事舅姑如事父母雞初鳴咸盥潄櫛縰笄總衣紳笄今簮也衣紳衣而著紳左佩紛帨刀礪小觽金燧右佩箴管線纊施縏袠大觽木燧縏小嚢也縏袠言施明為箴管線纊有之衿纓綦屦衿猶結也婦人有纓示繫屬也以適父母舅姑之所適之及所下氣怡聲問衣燠寒疾痛疴癢而敬抑搔之怡悦也疴疥也抑按瘙摩也出入則或先或後而敬扶持之先後之隨時便也進盥少者奉槃長者奉水請沃盥盥卒受巾槃承盥水者巾以捝手問所欲而敬進之柔色以温之温藉也承尊者必和顔色饘酏酒醴芼羮菽麥蕡稲黍梁秫唯所欲酏粥也芼菜也蕡熬枲實棗栗飴蜜以甘之堇荁枌榆免薧滫瀡以滑之脂膏以膏之謂用調和飲食也荁堇類也冬用堇夏用荁榆白曰枌免新生者薧乾也秦人㳛曰滫齊人滑曰瀡也父母舅姑必嘗之而後退敬也男女未冠笄者雞𥘉鳴咸盥潄櫛縰拂髦總角衿纓皆佩容臭總角収髪結之容臭香物也以纓佩之為廹尊者給小使也昧爽而朝後成人也問何食飲矣若已食則退若未食則佐長者視具具饌也凡内外雞𥘉鳴咸盥潄衣服歛枕簟灑埽室堂及庭布席各從其事歛枕簟者不欲人見已褻也簟席之親身者孺子蚤寢晏起唯所欲食無時孺子小子也又後未成人者由命士以上父子皆異宮昧爽而朝慈以㫖甘日出而退各從其事日入而夕慈以旨甘異宮崇敬也慈愛敬進之日出乃從事食禄不免農也父母舅姑將坐奉席請何鄉將衽長者奉席請何趾少者執牀與坐將衽謂更卧䖏御者舉几歛席與簟縣衾箧枕斂簟而襡之須卧乃敷之也襡韜也父母舅姑之衣衾簟席枕几不傳杖屦祗敬之勿敢近傳移也敦牟巵匜非餕莫敢用餕乃用之牟讀曰堥也巵匜酒漿器敦牟黍稷器也與恒飲食非餕莫之敢飲食餕乃食之恒常也旦夕之常食父母在朝夕恒食子婦佐餕婦皆與夫餕也既食恒餕每食進而盡之未有原也父没母存冡子御食羣子婦佐餕如初御侍也謂長子侍母食也侍食者不餕其婦猶皆餕也旨甘柔滑孺子餕父母在子雖老不坐在父母舅姑之所有命之應唯敬對進退周旋慎齊齊荘也升降出入揖遊不敢噦噫嚏咳欠伸跛倚睇視不敢唾洟睇傾視也易曰明夷睇于左股寒不敢襲癢不敢搔襲謂重衣不有敬事不敢袒裼不涉不撅撅揭衣也䙝衣衾不見裏為其可穢父母唾洟不見輙刷去之冠帶垢和灰請潄衣裳垢和灰請澣手曰潄足曰澣和漬也衣裳綻裂紉箴請𥙷綴綻猶解也五日則燂湯請浴三日具沐其間面垢燂潘請靧足垢燂湯請洗潘米瀾也少事長賤事貴共帥時共猶皆也帥循也時是也禮皆如此也子婦孝者敬者父母舅姑之命勿逆勿怠朱子曰此謂不可變節以傷尊者平日慈愛之心也若飲食之雖不嗜必嘗而待待後命而去也加之衣服雖不欲必服而待待後命釋藏也加之事人代之已雖弗欲姑與之而姑使之而後復之朱子曰弗欲者慮以自逸而違命姑與姑使者嫌於怨懟而必爭子婦有勤勞之事雖甚愛之姑縱之而寧數休之不可愛此而移苦於彼也子婦未孝未敬勿庸疾怨庸之言用也姑教之若不可教而后怒之怒譴責也不可怒子放婦出而不表禮焉表猶眀也猶為之隱不明其犯禮之過也父母有過下氣怡色柔聲以諌諌若不入起敬起孝説則復諌子事父母有隱無犯起猶更也不説與其得罪於鄉黨州閭寧熟諫子從父之令不可謂孝也周禮曰二十五家為閭四閭為族五族為黨五黨為州五州為郷也父母怒不説而撻之流血不敢疾怨起敬起孝撻擊也父母有婢子若庶子庶孫甚愛之雖父母没没身敬之不衰婢子所通賤人之子子有二妾父母愛一人焉子愛一人焉由衣服飲食由執事毋敢視父母所愛雖父母没不衰由自也子甚宜其妻父母不説出宜猶善也子不宜其妻父母曰是善事我子行夫婦之禮焉没身不衰父母雖没將為善思貽父母令名必果將為不善思貽父母羞辱必不果貽遺也果決也舅没則姑老謂傳家事於長婦也冢婦所祭祀賓客每事必請於姑婦雖受傳猶不敢專行也介婦請於冢婦以其代姑之事介婦衆婦舅姑使冢婦毋怠雖有勤勞不敢懈倦不友無禮於介婦衆婦無禮冢婦不友之也善兄弟為友娣姒猶兄弟也友朱子曰此句之義未詳註説恐未然也或疑當作敢舅姑若使介婦毋敢敵耦於冢婦雖有勤勞不敢掉磬不敢並行不敢並命不敢並坐下冢婦也命為使令凡婦不命適私室不敢退婦侍舅姑者也婦將有事大小必請於舅姑不敢專行子婦無私貨無私畜無私器不敢私假不敢私與家事統於尊也婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如新受賜或賜之謂私親兄弟若反賜之則辭不得命如更受賜藏以待乏待舅姑之乏也不得命者不見許也婦若有私親兄弟將與之則必復請其故賜而後與之並内則凡為人子之禮冬温而夏凊昏定而晨省定安其牀衽也省問其安否何如在醜夷不爭醜衆也夷猶儕也四皓曰陛下之等夷夫為人子者三賜不及車馬三賜三命也凡仕者一命而受爵再命而受衣服三命而受車馬車馬而身所以尊者備矣卿大夫士之子不受不敢以成尊比踰於父天子諸侯之子不受自卑逺於君故州閭鄉黨稱其孝也兄弟親戚稱其慈也僚友稱其弟也執友稱其仁也交逰稱其信也不敢受重賜者心也如此而五者備有焉夫為人子者出必告反必面告面同耳反言面者從外來宜知親之顔色安否所遊必有常所習必有業縁親之意欲知之恒言不稱老廣敬為人子者居不主奥坐不中席行不中道立不中門謂與父同宫者也不敢當其尊處室中西南隅謂之奥道有左右中門謂棖闑之中央内則曰由命士以上父子皆異宮食饗不為概概量也不制待賓客饌具之所有祭祀不為尸尊者之處為其失子之道然則尸卜筮無父者聽於無聲視於無形恒若親之將有教使然不登髙不臨深不苟訾不苟笑為其近危辱也人之性不欲見毁訾不欲見笑君子樂然後笑孝子不服闇不登危懼辱親也服事也闇㝠也不於冥闇之中從事為卒有非常且嫌失禮也男女夜行以燭父母存不許友以死為忘親也死為報仇讐不有私財並曲禮未仕者不敢税人如税人則以父兄之命不專家財也税謂遺予人弓檀親在行禮於人稱父人或賜之則稱父拜之事統於尊玉藻父子不同席異尊卑也父前子名對至尊無大小皆稱名子於父母則自名也名父母所為也子之事親也三諫而不聽則號泣而隨之至親無去志在感動之並曲禮父命呼唯而不諾手執業則投之食在口則吐之走而不趨至敬親老出不易方復不過時不可以憂父母也易方為其不信已所處也復反也親癠色容不盛此孝子之疏節也言未為至孝也王季有疾文王色憂行不能正履玉藻父母有疾冠者不櫛行不翔憂不為容也言不惰憂不在私好琴瑟不御憂不在樂食肉不至變味飲酒不至變貌憂不在味笑不至矧怒不至詈憂在心難變也齒本曰矧大笑則見疾止復故自若常也親有疾飲藥子先嘗之嘗度其所堪醫不三世不服其藥慎物齊也禮並曲事親有隱而無犯隱謂不稱揚其過失也無犯不犯顔而諫論語曰事父母幾諫左右就養無方左右謂扶持之方猶常也子則然無常人服勤至死致喪三年勤勞辱之事也致謂戚容稱其服也凡此以恩為制檀弓父没而不能讀父之書手澤存焉耳母没而杯圈不能飲焉口澤之氣存焉爾孝子見親之器物哀惻不忍用也圈屈木所為謂巵匜之屬玉藻為人子者父母存冠衣不純素為其有喪象也純縁也玉藻曰縞冠𤣥武子姓之冠也縞冠素紕既祥之冠也深衣曰具父母純以青孤子當室冠衣不純采早喪親雖除喪不心哀也謂年未三十者三十壯有室有代親之端不為孤也當室適子也深衣曰孤子衣純以素君子已孤不更名亦重本已孤暴貴不為父作諡子事父無貴賤並曲禮右事親事長凡聖賢論孝之言詳見孝經篇後禮始於謹夫婦為宮室辨外内男子居外女子居内深宮固門閽寺守之男不入女不出閽掌中門之禁也寺掌内人之禁令也男不言内女不言外謂事業之次序非祭非喪不相授器祭嚴喪遽不嫌也其相授則女受以篚其無篚則皆坐奠之而後取之奠停地也外内不共井不共湢浴不通寢席不通乞假男女不通衣裳内言不出外言不入湢浴室也男子入内不嘯不指夜行以燭無燭則止嘯讀為叱叱嫌有隱使也女子出門必擁蔽其面夜行以燭無燭則止擁猶幛也道路男子由右女子由左地道尊右内則男女不雜坐不同椸枷不同巾櫛不親授嫂叔不通問諸母不潄裳外言不入於梱内言不出於梱女子許嫁纓非有大故不入其門姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食皆謂重别防淫亂不雜坐謂男子在堂女子在房也椸可以枷衣者通問謂相稱謝也諸母庶母也潄澣也庶母賤可使潄衣不可使潄裳裳賤尊之者亦所以逺别外言内言凡女子職也不出入者不以相問也梱門限也女子許嫁繫纓有從人之端也大故宮中有灾變若疾病乃後入也女子有宮者亦謂由命士以上也春秋傳曰羣公子之舍則已卑矣女子十年而不出嫁乃成人可以出矣猶不與男子共席而坐亦逺别也男女異長各自為伯季也男女非有行媒不相知名謂媒徃來傳婚姻之言乃相知姓名非受幣不交不親重别有禮乃相纒固寡婦之子非有見焉弗與為友辟嫌也有見謂有竒才卓然衆人所知並曲禮道路男子由右女子由左車從中央道中三途逺别也王制男女相答拜也嫌逺别不相答拜以明之曲禮右男女之别男女無媒不交無幣不相見恐男女之無别也重男女之㑹所以逺别之於禽獸也有幣者必有媒有媒者不必有幣仲春之月㑹男女之時不必待幣以此坊民民猶有自獻其身獻猶進也禮非祭男女不交爵交爵謂相獻酢以此坊民陽侯猶殺繆侯而竊其夫人同姓也以貪夫人之色至殺君而立其國未聞故大饗廢夫人之禮大饗享諸侯來朝者也夫人之禮使人攝寡婦之子不有見焉則弗友也君子以辟逺也有見謂暏其才藝也同志為友故朋友之交主人不在不有大故則不入其門大故喪疾以此坊民民猶以色厚於德子云好德如好色此句似不足論語曰未見好德如好色疾時人厚於色之甚而薄於德也諸侯不下漁色謂不内取於國中也内取國中為下漁色昏禮始納采謂采擇其可者也國君而内取象捕魚然中網取之是無所擇故君子逺色以為民紀故男女授受不親不親者不以手相與也内則曰非祭非喪不相授器其相授則女受以篚其無篚則皆坐奠之而後取之御婦人則進左手御者在右前左手則身㣲偕之姑姊妹女子子已嫁而反兄弟弗與同席而坐女子十年而不出也嫁及成人可以出矣猶不與男子共席而坐逺别寡婦不夜哭嫌思人道婦人疾問之不以其疾嫌媚畧之也問増損而已以此坊民民猶淫泆而亂於族亂族犯非妃匹也坊記淳于髠曰男女授受不親禮與孟子曰禮也曰嫂溺則援之以手乎曰嫂溺不援是豺狼也男女授受不親禮也嫂溺援之以手者權也淳于姓髠名齊之辨士授與也受取也古禮男女不親授受以逺别也援救之也權稱錘也稱物輕重而徃來以取中者也權而得中是乃禮也孟子公將有行遂與姜氏如齊始議行事申繻曰女有家男有室無相瀆也謂之有禮易此必敗女安夫之家夫安妻之室違此則為瀆今公將姜氏如齊故知其當致禍亂桓十八年左氏傳鄭文夫人芊氏姜氏勞楚子于柯澤楚子還過鄭鄭文公夫人芊氏楚女姜氏齊女也柯澤鄭地名楚子使師縉示之俘馘師縉楚樂師也俘所得囚馘所截耳君子曰非禮也婦人送迎不出門見兄弟不踰閾閾門限戎事不邇女器邇近也器物也言俘馘非近婦人之物僖二十二年左氏傳孔子適季氏康子晝居内寢孔子問其所疾康子出見之言終孔子退子貢問曰季孫不疾而問諸疾禮與孔子曰夫禮君子不有大故則不宿於外大故謂喪憂非致齊也非疾也則不晝夜處于内是故夜居於外雖弔之可也晝居於内雖問其疾可也家語公父文伯之母敬姜者季康子之從祖叔母也康子徃焉䦱門而與之言䦱闢也門寢門也皆不踰閾閾門限也皆二人也敬姜不踰閾而出康子不踰閾而入傳曰婦人送迎不出門見兄弟不踰閾是也祭悼子康子與焉悼子穆伯之父敬姜先舅也與與祭也酢不受徹俎不宴禮祭主人獻賓賓酢主人不受敬姜不親受也祭畢徹俎又不與康子宴飲宗不具不繹繹又祭也唐尚書云祭之明日也昭謂天子諸侯曰繹以祭之明日卿大夫曰賓尸與祭同日此言繹通言之也賈侍中云宗宗臣主祭祀之禮不具謂宗臣不具在則敬姜不與繹也繹不盡飫則退説云飫宴安私飫也昭謂立曰飫坐曰宴言宗具則與繹繹畢而飲不盡飫禮而退恐有醉飽之失皆所以逺嫌也孔子聞之曰男女之别禮之大經公父氏之婦動中禮趣度于禮矣國語魯語男女不同椸枷不敢懸于夫之楎椸不敢藏于夫之箧笥不敢共湢浴竿謂之椸楎杙也夫不在歛枕箧簟席襡器而藏之不敢䙝也少事長賤事貴咸如之咸皆也内則右夫婦之别臼季使過冀見冀缺耨其妻饁之臼季胥臣也冀晉邑耨鋤也野饋曰饁敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有德德以治民請用之臣聞之出門如賓如大賓承事如祭常謹敬也仁之則也僖三十四年左氏傳夫婦之禮唯及七十同藏無間衰老無嫌及猶至也故妾雖老年未滿五十必與五日之御五十始衰不能孕也妾閉房不復出御矣此御謂侍夜勸息也五日一御諸侯制也諸侯取九女姪娣两两而御則三日也次两媵則四日也次夫人專夜則五日也天子十五日而一御將御者齊潄澣慎衣服櫛縰笄縂角拂髦衿纓綦屨其徃如朝也角衍字也拂髦或為繆髪也雖婢妾衣服飲食必後長者人貴賤不可以無禮妻不在妾御莫敢當夕辟女君之御日也内則右御妻妾荀子曰霜降逆女氷泮殺内十日一御楊倞曰此盖誤耳當為氷泮逆女霜降殺内故詩曰士如歸妻迨氷未泮殺减也内謂妾御也十日一御即殺内之義氷泮逆女謂𤼵生之時合男女也霜降殺内謂閉藏之時禁嗜慾也月令在十一月此云霜降荀卿與呂氏所聞異也鄭云歸期謂請期也氷未泮正月中以前二月可成昏矣故曰氷泮逆女氏朱子曰荀子本文與家語孔子對哀公語同楊之説恐未必然然其言霜降閉藏十日一御者似亦有理故特存之晉平公有疾叔向問于子産子産曰僑聞之君子有四時朝以聽政聴國政晝以訪問問可否夕以脩令念所施夜以安身于是乎節宣其氣宣散也勿使有所壅蔽湫底以露其體湫集也底滯也露羸也壹之則血氣集滯而體羸露兹心不爽而昬亂百度兹此也爽明也百度百事之節今無乃壹之同四時也則生疾矣叔向曰善哉肸未之聞也此皆然矣晉侯求醫于秦秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱蠱惑疾非鬼非食惑以喪志惑女色而失志良臣將死天命不祐良臣不匡救君過故將死而不為天所祜公曰女不可近乎對曰節之先王之樂所以節百事也故有五節五聲之節遲速本末以相及中聲以降五降之後不容弹矣此謂先王之樂得中聲聲成五降而息也降罷退于是有煩手淫聲慆堙心耳乃㤀平和君子弗聽也五降而不息則雜聲並奏所謂鄭衛之聲物亦如之言百事皆如樂不可失節至於煩乃舍也已無以生疾煩不舍則生疾君子之近琴瑟以儀節也非以慆心也為心之節儀使動不過度天有六氣謂隂陽風雨晦明也降生五味謂金味辛木味酸水味醎火味苦土味甘皆由隂陽風雨而生𤼵為五色辛色白酸色青醎色黒苦色赤甘色黄𤼵見也徴為五聲白聲商青聲角黒聲羽赤聲徴黄聲宮徴騐也淫生六疾淫過也滋味聲色所以飬人然過則生害六氣曰隂陽風雨晦明也分為四時序為五節六氣之化分而序之則成四時得五行之節過則為菑隂淫寒疾寒過則為冷陽淫熱疾熱過則喘渴風淫末疾末四支也風為緩急雨淫腹疾雨濕之氣為洩注晦淫惑疾晦夜也為宴寢過節則心惑亂明淫心疾明晝也思慮煩多心勞生疾女陽物而晦時淫則生内熱惑蠱之疾女常隨男故言陽物家道常在夜故言晦時今君不節不時能無及此乎出告趙孟趙孟曰誰當良臣對曰主是謂矣主相晉國於今八年晉國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵禄任其大節有菑禍興而無改焉改改行以救菑必受其咎今君至於淫以生疾將不能圖恤社稷禍孰大焉主不能禦吾是以云也云主將死趙孟曰何謂蠱對曰淫溺惑亂之所生也溺沈没于嗜慾于文皿蟲為蠱文字也皿器也器受蠱害者為蠱穀之飛亦為蠱穀乆積則變為飛蠱名曰蠱在周易女惑男風落山謂之蠱㢲下艮上蠱巽為長女為風艮為少男為山少男而説長女非匹故惑山木得風而落皆同物也物謂類也趙孟曰良醫也厚其禮而歸之贈賄之禮傳昭元年左氏姙子者寢不側坐不邉立不蹕不食邪味割不正不食席不正不坐目不視邪色耳不聽淫聲夜則令瞽誦詩道政事列女傳右胎教姙子之時必謹所感心感于物則其子形音肖之故姙者能謹于此則生子形容端正才識必過人矣此之謂胎教列女傳妻將生子及月辰居側室側室謂夾之室次燕寢也夫使人日再問之作而自問之妻不敢見使姆衣服而對至於子生夫復使人日再問之作有感動夫齊則不入側室之門若始時使人問子生男子設弧於門左女子設帨于門右表男女也弧者示有事于武也帨事人之佩巾也三日始負子男射女否始有事也負之謂抱之而使鄉前也凡接子擇日雖三日之内尊卑必皆選其吉焉接字之義見内治篇冢子則大牢天子世子也冢大也冢子猶言長子通于下也庶人特豚士特豕大夫少牢國君世子大牢皆謂長子其非冡子則皆降一等謂冡子之弟及衆妾之子生也天子諸侯少牢大夫特豕士特豚庶人猶特豚也異為孺子室於宫中特埽一處以處之擇於諸母與可者必求其寛裕慈惠温良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室此人君飬子之禮也諸母衆妾也可者傅御之屬也子師教示以善道者慈母知其嗜慾者保母安其居處者士妻食乳之而已他人無事不徃為兒精氣㣲弱將驚動也大夫之子有食母選於傅御之中喪服所謂乳母也士之喪自飬其子賤不敢使人也三月之末擇日剪髪為鬌男角女羈否則男左女右鬌所遺髪也夾囟曰角午達曰覊也是日也妻以子見于父貴人則為衣服由命士以下皆潄澣貴人大夫以上也由自也男女夙興沐浴衣服具視朔食朔食天子大牢諸侯少牢大夫特豕士特豚也夫入門升自阼階立於阼西鄉妻抱子出自房當楣立東面入門者入側室之門也大夫以下見子就側室見妾子于内寢辟人君也姆先相曰母某敢用時日祗見孺子其妻姓若言姜氏也祗敬也或作振夫對曰欽有師父執子之右手咳而名之欽敬也帥循也言教之敬使有循也執右手明將授之事也妻對曰記有成遂左還授師記猶識也識夫之言使有成也師子師也子師辯告諸婦諸母名後告諸母若名成于尊妻遂適寢復夫之燕寢夫告宰名宰辯告諸男名書曰某年某月某日某生而藏之宰謂屬吏也春秋書桓六年九月丁夘子同生宰告閭史閭史書為二其一藏諸閭府其一獻諸州史州史獻諸州伯州伯命藏諸州府四閭為族族百家也閭胥中士一人五黨為州州二千五百家也州長中大夫一人也皆有屬吏獻猶言也夫入食如飬禮夫入已見子入室也其與妻食如婦始饋舅姑之禮也凡名子不以國不以日月不以隱疾不以山川本篇不以國在日月之下無不以山川一句依朱子取曲禮移入隱此在常語之中為後難諱也春秋傳曰名終將諱之疾衣中之疾也謂若黒臀黒肱矣疾在外者雖不得言尚可指摘此則無時可辟俗語云隱疾為醫難也大夫士之子不敢與世子同名尊世子也其先世子生亦勿為改妾將生子及月辰夫使人日一問之子生三月之末潄澣夙齊見於内寢禮之如始入室君已食徹焉使之特餕遂入御内寢適妻寢也禮謂已見子夫食而使獨餕也如始入室始來嫁時妾餕夫婦之餘亦如之既見子可以御此謂大夫士之妾也凡妾稱夫曰君庶人無側室者及月辰夫出居羣室其問之也與子見父之禮無以異也夫雖辟之至問妻及見子禮同也庶人或無妾凡父在孫見于祖祖亦名之禮如子見父無辭見子于祖家統于尊也父在則無辭有適子者無適孫與見庻子同也父卒而有適孫則有辭與見冢子同父雖卒而庻孫猶無辭也由命士以上及大夫之子旬而見旬當為均聲之誤也有時適妾同時生子子均而見者以生先後見之既見乃食亦辟人君也易説卦坤為均今亦或作旬也朱子曰此説疑鄭失之旬如字謂十日也别記異聞或不待三月也冢子未食而見必執其右手適子庶子已食而見必循其首天子諸侯尊别世子雖同母禮則異矣未食已食急正緩庶之義也異朱子曰此承上文記大夫禮而又别其冢適庶子之同也冢子之禮仍與前章同唯適子庶子為異耳並内則右生子㓜子常視母誑視今之示字小未有所知常示以正物以正教之無欺誑幼曲禮子能食食教以右手能言男唯女俞男鞶革女鞶絲俞然也鞶小嚢盛帨巾者男用韋女用繒有飾縁之則是鞶裂與詩云垂𢃄如厲紀子帛名裂繻字雖異意實同也六年教之数與方名方名東西南北七年男女不同席不共食蚤其别也八年出入門户及即席飲食必後長者始教之譲示以亷耻九年教之数日朔望與六甲也十年出就外傅居宿于外學書記衣不帛𥜗袴禮帥初朝夕學㓜儀請肄簡諒外傳教學師也不用帛為𥜗袴為太溫傷隂氣也禮帥初遵習先日所為也肄習也諒信也請習簡謂所書篇數也請習信謂應對之言也十有三年學樂誦詩舞勺成童舞象學射御先學勺後學象文武之次也成童十五以上二十而冠始學禮可以衣裘帛舞大夏惇行孝弟博學不教内而不出大夏樂之文武備者也内而不出謂人之謀慮也三十而有室始理男事博學無方孫友視志室猶妻也男事授田給政役也方猶常也至此也無常學在志所好也孫順也順于友視其所志四十始仕方物出謀𤼵慮道合則服從不可則去方猶常也物猶事也朱子曰方猶比也五十命為大夫服官政統一官之政也七十致事致其事於君而告老凡男拜尚左手左陽女子十年不出恒居内也姆教婉娩聴從婉謂言語也娩之言媚也媚謂容貌也執麻枲治絲繭織紝組紃學女事以共衣服紃絛也觀於祭祀納酒漿籩豆菹醢禮相助奠當及女時而知十有五年而笄謂應年許嫁者女子許嫁笄而字之其未許嫁二十則笄二十而嫁有故二十三年而嫁故謂父母之喪聘則為妻聘問也妻之言齊也以禮聘問則得與夫敵體奔則為妾妾之言接也聞彼有禮走而徃焉以得接見于君子也奔或為衒凡女拜尚右手右隂也内則右教子孟軻之母其舍近墓孟子之少也嬉戲為墓間之事踊躍築埋孟母曰此非所以居子也乃去舍市其嬉戲為賈衒孟母曰此非所以居子也乃徙舍學宮之旁其嬉戲乃設爼豆揖讓進退孟母曰此真可以居子矣遂居之孟子㓜時問東家殺猪何為母曰欲啖汝既而悔曰吾聞古者胎教今適有知而欺之是教之不信乃買猪肉以食之既長就學遂成大儒列女傳禮書綱目卷七十七
