body:
  text: 禮書綱目卷四十三婺源江永撰諸侯遷廟吉禮十補經此篇出大戴禮成廟將遷之新廟君前徙三日齊祝宗人及從者皆齊謂親過髙祖則毁廟以昭穆遷之右將遷齊記作王壞廟有時日於練焉壞廟壞廟之道易檐可也改塗可也禮過髙祖則毁其廟以次而遷將納新神示有所加梁文公二年穀傳徙之日君𤣥服從者皆𤣥服從至于廟廟殯宫羣臣如朝位列於廟門外如路門之位君入立于阼階下西向有司如朝位立於門內如門外之位宗人擯舉手曰有司其請升君升祝奉幣從在左北面祝王辭故在左神將遷故出在户牖間南面矣再拜興祝聲三曰孝嗣侯某敢以嘉幣告于皇考某侯言嗣以遷代不言國未忍有之也成廟將徙敢告卒不奠幣者禮畢矣於此將有事於新廟君及祝再拜興右殯宫告遷祝曰請導君降立于階下奉衣服者皆奉以從祝不言奉主而稱奉衣服者以毁易祖考誠人神之不忍徙祝者祝所以導神也言皆者衣服非一稱周禮守祧職曰掌先王先公之廟祧其遺衣服藏焉奉衣服者降堂君及在位者皆辟也奉衣服者至碑君從有司皆以次從出廟門奉衣服者升車乃步君升車從者皆就車也皆就車謂乘二車者凡出入門及大溝渠祝下擯神車祝為左故於步處則下至于新廟筵于户牖間始自外來故先於堂樽于西序下四時之祭在室筵奧中在堂筵序下是以設樽恆於東方今惟布南面之席故置樽於西以因其便矣脯醢陳于房中房西房也諸侯左右房也設洗當東榮南北以堂深記因卿士當言東霤有司皆先入如朝位祝導奉衣服者乃入君從奉衣服者入門左門左門西在位者皆辟也奉衣服者升堂皆反位君從升奠衣服于席上祝奠幣于几東君北向祝在左右奉主入新廟贊者盥升適房薦脯醢君盥酌奠于薦西反位君及祝再拜興祝聲三曰孝嗣侯某敢用嘉幣告于皇考某侯今月吉日可以徙于新廟敢告再拜君就東廂西面祝就西廂東面東西俟也祝就西廂因其便也在位者皆反走辟如食間走疾趨也擯者舉手曰請反位君反位祝從在左卿大夫及衆有司諸在位者皆反位祝聲三曰孝嗣侯某潔為而明薦之享詩云潔蠲為饎是用孝享君及祝再拜君反位東廂之位祝徹反位西廂之位右祭告擯者曰遷廟事畢請就燕君出廟門卿大夫有司執事者皆出廟門告事畢事謂內主藏衣服斂幣徹几筵之等乃曰擇日而祭焉所以安神右事畢諸侯釁廟吉禮十一補經亦出大戴禮成廟釁之以羊廟新成而釁者尊而神之祭器名者成則釁之以豭也君𤣥服立于寢門內南向祝宗人宰夫雍人皆𤣥服以神事故亦同爵辨小戴君朝服者謂不與也宗人曰請令以釁某廟君曰諾遂入雍人拭羊拭捝乃行入廟門碑南北面東上居上者宰夫也宰夫攝主也雍人舉羊升屋自中中屋南面刲羊血流于前乃降門以雞有司當門北面有司宰夫祝宗人也雍人割雞屋下當門郟室割雞于室中有司亦北面也郟室門郟之室一曰東西廂也釁東西室有司猶北面統於廟也案小戴割雞亦於屋上記者不同耳既事宗人告事畢皆退反命于君君寢門中南向宗人曰釁某廟事畢君曰諾宗人請就宴君揖之乃退記成廟則釁之其禮祝宗人宰夫雍人皆爵辨純衣廟新成必釁之尊而神之也宗人先請於君曰請令以釁某廟君諾之乃行雍人拭羊宗人祝宰夫北面于碑南東上居上者宰夫也宰夫攝主也拭靜也雍人舉羊升屋自中中屋南面刲羊血流于前乃降門夾室皆用雞先門而後夾室其衈皆於屋下割雞門當門夾室中室自由也衈謂將刲割牲以釁先滅耳旁毛薦之耳聽聲者告神欲其聽之周禮有刉衈有司皆鄉室而立門則有司當門北面有司宰夫祝宗人既事宗人告事畢乃皆退告者告宰夫反命于君曰釁某廟事畢反命于寢君南鄉于門內朝服既反命乃退君朝服者不至廟也路寢成則考之而不釁釁屋者交神明之道也言路寢者生人所居不釁者不神之也考之者設盛食以落之爾檀弓曰晉獻文子成室諸大夫發焉是也凡宗廟之器其名者成則釁之以豭豚宗廟名器謂尊彝之屬雜記禮書綱目卷四十三
