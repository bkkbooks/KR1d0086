body:
  text: 禮書綱目卷八十婺源江永撰臣禮曲禮六補事君有犯而無𨼆既諫人有問其國政者可以語其得失若齊晏子為晉叔向言之左右就養有方不可侵官服勤至死方喪三年方喪資于事父凡此以義為制弓檀事君者量而後入不入而后量凡乞假于人為人從事者亦然然故上無怨而下遠罪也量量其事意合成否少儀為人臣下者有諫而無訕有亡而無疾亡去也疾惡也頌而無讇諫而無驕頌謂将順其美匡救其惡驕謂恃知而慢也怠則張而相之怠隋也相助也廢則埽而更之廢政教壊亂不可因也謂之社稷之役役為也同上四郊多壘此卿大夫之辱也辱其謀人之國不能安也壘軍壁也數見侵伐則多壘地廣大荒而不治此亦士之辱也辱其親民不能安荒穢也曲禮右通論子言之事君先資其言拜自獻其身以成其信資謀也獻猶進也言臣事君必先謀定其言乃後親進為君言也是故君有責於其臣臣有死于其言故其受禄不誣其受罪益寡死其言者竭力於其所言之事死而不負於事不信曰誣子曰事君大言入則望大利小言入則望小利大言可以立大事也小言可以立小事也入謂君受之利禄賞也入或為人故君子不以小言受大禄不以大言受小禄言臣受禄各用其德能也子曰事君不下達不尚辭非其人弗自不下達不以私事自通於君也不尚辭不多出浮華之言也弗自不身與相親子曰邇臣守和宰正百官大臣慮四方邇近也和謂調和君事者也齊景公曰唯據與我和宰冢宰也冢宰正治百官子曰事君難進而易退則位有序易進而難退則亂也亂謂賢否不别故君子三揖而進一辭而退以遠亂也進難者為主人之擇已也退速者為君子之倦也子曰事君三違而不出竟則利禄也人雖曰不要吾弗信也違猶去也利禄言為貪禄留也臣以道去君至于三而不遂去是貪禄必以其强與君要也子曰事君慎始而敬終輕交易絶君子所恥子曰事君可貴可賤可富可貧可生可殺而不可使為亂亂謂違廢事君之禮子曰事君軍旅不辟難朝廷不辭賤言尚忠且謙也處其位而不履其事則亂也履猶行也故君使其臣得志則慎慮而從之否則孰慮而從之終事而退臣之厚也使謂使之聘問師役之屬也慎慮而從之者此己志也欲其必有成也否謂非己志也孰慮而從之又計於己利害也終事而退非己志者事成則去也事或為身竝表記子曰下難知則君長勞難知有姦心也臣儀行不重辭不援其所不及不煩其所不知則君不勞矣儀當為義聲之誤也言臣義事君則行也重猶尚也援猶引也引君所不及謂必使其君所行如堯舜也不煩以其所不知謂必使其知慮如聖人也凡告諭人當隨其才以誘之緇衣子云善則稱君過則稱已則民作忠坊記子路問事君子曰勿欺也而犯之犯謂犯顏諫諍難范氏曰犯非子路之所難也而以不欺為故夫子敎以先勿欺而後犯也子曰事君敬其事而後其食後與後獲之後同食禄也君子之仕也有官守者修其職有言責者盡其忠皆以敬吾之事而已不可先有求禄之心也並論語責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊范氏曰人臣以難事責於君使其君為堯舜之君者尊君之大也開陳善道以禁閉君之邪心惟恐其君或陷于有過之地者敬君之至也謂其君不能行善道而不以告者賊害其君之甚也孟子史黯曰事君者諫過而賞善諫過匡救其惡賞善將順其美薦可而替否薦進也替去也傳曰君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否獻能而進賢擇才而薦之朝夕誦善敗而納之道之以文行之以順勤之以力致之以死死其難也聴則進否則退國語晉語召公曰夫事君者險而不懟君諸侯也在危險之中不當懟懟謂若晉慶鄭怨惠公愎諫違卜棄而不戰怨而不怒怨怨望也怒作氣也况事王乎周語司士掌擯士者膳其摯擯士告見初為士者於王也鄭司農云膳其摯者王食其所執羔鴈之摯𤣥謂膳者入於王之膳人夏官始見于君執摯至下容彌蹙下謂君所也蹙猶促也促恭慤貌也其為恭士大夫一也庶人見於君不為容進退走容謂趨翔士大夫則奠摯再拜稽首君答壹拜言君答士大夫一拜則於庶人不答之庶人之摯鶩古文壹作一若他邦之人則使擯者還其摯曰寡君使某還摯賓對曰君不有其外臣臣不敢辭再拜稽首受士相見禮右始見子曰擇日月以見君恐民之不敬也擇日月以見君謂臣在邑竟者表記臣見君所以有贄何贄者質也質己之誠致己之悃愊也王者因臣之心以為之制差其尊卑以副其意子見父無贄何至親也見無時故無贄臣之事君以義合也得親供養故質己之誠副己之意故有贄也白虎通孟子曰在國曰市井之臣在野曰草莽之臣皆謂庶人庶人不傳質為臣不敢見於諸侯禮也傳通也質者士執雉庶人執鶩相見以自通者也國内莫非君臣但未仕者與執贄在位之臣不同故不敢見也將適公所宿齋戒居外寢沐浴史進象笏書思對命思所思念將以告君者也對所以對君者也命所受君命也書之於笏為失忘也既服習容觀玊聲玉佩乃出揖私朝煇如也登車則有光矣私朝自大夫家之朝也揖其臣乃行玉藻大夫士出入君門由闑右臣統於君闑門橛不踐閾閾門限也曲禮凡有指畫於君前用笏造受命於君前則書於笏玊藻輟朝而顧不有異事必有異慮心不正志不在君輟猶止也故輟朝而顧君子謂之固固謂不達於禮也曲禮君命召雖賤人大夫士必自御之御當為訝訝迎也君雖使賤人來必自出迎之尊君命也春秋傳曰跛者御跛者眇者御眇者皆訝也世人亂之曲禮凡君召以三節二節以走一節以趨節所以明信輔君命也使使召臣急則持二緩則持一周禮曰鎮圭以徴守其餘未聞也今漢使者擁節在官不俟屨在外不俟車趨君命也必有執隨授之者官謂朝廷治事處也玊藻右朝君朝與下大夫言侃侃如也與上大夫言誾誾如也此君未視朝時也王制諸侯上大夫卿下大夫五人許氏説文侃侃剛直也誾誾和悦而諍也君在踧踖如也與與如也君在視朝也踧踖恭敬不寧之貌與與威儀中適之貌張子曰與與不忘向君也亦通此一節記孔子在朝廷事上接下之不同也入公門鞠躬如也如不容鞠躬曲身也公門高大而若不容敬之至也立不中門行不履閾中門中於門也謂當棖闑之間君出入處也閾門限也禮士大夫出入君門由闑右不踐閾謝氏曰立中門則當尊行履閾則不恪過位色勃如也足躩如也其言似不足者位君之虚位謂門屏之間人君宁立之處所謂宁也君雖不在過之必敬不敢以虚位而慢之也言似不足不敢肆也攝齊升堂鞠躬如也屏氣似不息者攝摳也齊衣下縫也禮將升堂兩手摳衣使去地尺恐躡之而傾跌失容也屏藏也息鼻息出入者也近至尊氣容肅也出降一等逞顏色怡怡如也沒階趨翼如也復其位踧踖如也等階之級也逞放也漸遠所尊舒氣解顔怡怡和悦也沒階下盡階也趨走就位也復位踧踖敬之餘也之此一節記孔子在朝容吉月必朝服而朝吉月月朔也孔子在魯致仕時如此君命召不俟駕行矣急趨君命行出而駕車隨之子曰拜下禮也今拜乎上泰也雖違衆吾從下臣與君行禮當拜於堂下君辭之乃升成拜泰驕慢也子曰事君盡禮人以為諂也黄氏曰孔子於事君之禮非有所加也如是而後盡爾時人不能反以為諂故孔子言之以明禮之當然也竝論語晉靈公不君趙宣子驟諫公患之使鉏麑賊之鉏麑晉力士晨往寢門闢矣盛服將朝尚早坐而假寐不解衣冠而睡麑退嘆而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死槐趙盾庭樹傳宣二年左氏凡侍於君紳垂足如履齊頤霤垂拱視下而聴上視帶以及祫聴鄉任左紳垂則磬折也齊裳下緝也祫交領也玊藻贊幣自左詔辭自右自由也謂為君授幣為君傳命也立者尊右少儀凡燕見于君必辨君之南面若不得則正方不疑君辯猶正也君南面則臣見正北面君或時不然當正東面若正西面不得疑君所處邪鄉之此謂特見圖事非立賓主之燕也疑度之君在堂升見無方階辯君所在升見升堂見于君也君近東則升東階君近西則升西階見士相禮侍坐則必退席不退則必引而去君之黨引郤也黨鄉之細者退謂旁側也辟君之親黨也玊藻君命大夫與士肄肄習也君有命大夫則與士展習其事謂欲有所𤼵為也在官言官在府言府在庫言庫在朝言朝唯君命所在就展習之也官謂版圖文書之處府謂寶藏貨賄之處也庫謂車馬兵甲之處也朝謂君臣謀政事之處也朝言不及犬馬非公議也在朝言禮問禮對以禮於朝廷言無所不用禮曲禮君前臣名詳見曲禮言語士於君所言大夫沒矣則稱諡若字名士同上君所無私諱同上過而舉君之諱則起舉猶言也起立若失言而變自新與君之諱同則稱字謂諸臣之名也雜記若賜之食而君客之則命之祭然後祭雖見賓客猶不敢備禮也侍食則正不祭先飯辯甞羞飲而俟俟君食而後食也君將食臣先甞之忠孝也若有甞羞者則俟君之食然後食飯飲而俟不祭俟食不敢備禮也不甞羞膳宰存也飯飲利将食也君命之羞羞近者辟貪味也命之品甞之然後惟所欲必先徧甞之凡甞逺食必順近食從近始也君未覆手不敢飱覆手以循咡已食也飱勸食也君既食又飯飱不敢先君飽飯飱者三飯也臣勸君食如是可也君既徹執飯與醤乃出授從者食于尊者之前當親徹也君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後授虚爵不敢先君盡爵君子之飲酒也受一爵而色洒如也洒如肅敬貌洒或為察二爵而言言斯言言和敬貌斯猶耳也禮已三爵而油油油油説敬貌以退禮飲過三爵則敬殺可以去矣退則坐取屨𨼆辟而后屨坐左納右坐右納左𨼆辟俛逡巡而退著屨也玉藻若君賜之食則君祭先飯徧嘗膳飲而俟君命之食然後食君祭先飯食其祭食臣先飯示為君嘗食也此謂君與之禮食膳謂進庶羞既嘗庶羞則飲俟君之徧嘗也今云呫嘗膳若有將食者則俟君之食然後食將食猶進食謂膳宰也膳宰進食則臣不嘗食周禮膳夫授祭品嘗食王乃食若君賜之爵則下席再拜稽首受爵升席祭卒爵而俟君卒爵然後授虚爵受爵者於尊所至於授爵坐授人耳必俟君卒爵者若欲其釂然也今文曰若賜之爵無君也退坐取屨𨼆辟而后屨君為之興則曰君無為興臣不敢辭君若降送之則不敢顧辭遂出謂君若食之飲之而退也𨼆辟俛而逡巡興起也辭君興而不敢辭其降于已大崇不敢當也大夫則辭退下比及門三辭下亦降也士相見禮賜果於君前其有核者懐其核嫌棄尊者物也木實曰果御食于君君賜餘器之溉者不寫其餘皆寫重汙辱君之器也溉謂陶梓之器不溉謂萑竹之器也寫者傳已器中乃食之也勸侑曰御曲禮凡獻于君大夫使宰士親皆再拜稽首送之敬也膳於君有葷桃茢於大夫去茢於士去葷皆造于膳宰膳美食也葷桃茢辟凶邪也大夫用葷桃士桃而已葷薑及辛菜也茢菼帚也造於膳宰既致命而授之葷或作焄大夫不親拜為君之答已也不敢變動至尊凡於尊者有獻而弗敢以聞此謂獻辭也少儀曰君將適他臣若致金玊貨貝于君則曰致馬資于有司是其類也玉藻君將適他臣如致金玊貨貝於君則曰致馬資于有司適他行朝會也資猶用也少儀士有獻於國君他日君問之曰安取彼再拜稽首而后對起敬也曲禮君賜車馬乘以拜賜衣服服以拜敬君惠也賜君未有命弗敢即乘服也謂卿大夫受賜于天子者歸必致于其君君有命乃服之君賜稽首據掌致諸地致首于地據掌以左手覆按右手也酒肉之賜弗再拜輕也受重賜者拜受又拜于其室也大夫拜賜而退士待諾而退又拜弗答拜小臣受大夫之拜復以入告大夫拜便辟也並玊藻大夫有獻弗親君有賜不面拜為君之答已也不面拜于外告小臣小臣受以入也小臣掌三公及孤卿之復逆也郊特牲有慶非君賜不賀唯君賜為榮也玉藻君有疾飲藥臣先嘗之嘗度其所堪曲禮右侍坐侍食獻賜侍疾君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之食恐或餕餘故不以祭正席先嘗如對君也言先嘗則餘當以頒賜矣腥生肉熟而薦之祖考榮君賜也畜之者仁君之惠無故不敢殺也侍食於君君祭先飯周禮王日一舉膳夫授祭品嘗食王乃食君侍食者君祭則已不祭而先飯若為君嘗食然不敢當客禮也論語孔子侍坐於哀公賜之桃與黍焉哀公曰請用孔子先食黍而後食桃左右皆掩口而笑公曰黍者所以雪夫桃非為食之也孔子對曰丘知之矣然夫黍者五穀之長郊禮宗廟以為上盛果屬有六而桃為下祭祀不用不登郊廟丘聞之君子以賤雪貴不聞以貴雪賤今以五穀之長雪果之下者是從上雪下臣以為妨于教害于義故不敢家語晏子聘於楚楚王進橘置削晏子不削而并食之楚王曰橘當去剖晏子對曰臣聞之賜人主前者𤓰桃不削橘柚不剖今臣無教臣不敢剖臣非不知也説苑凡為君使者已受命君言不宿於家急君使也言謂有故所問也聘禮曰若有言則以束帛如享禮君言至則主人出拜君言之辱使者歸則必拜送于門外敬君命也此謂國君問事於其臣若使人於君所則必朝服而命之使者反則必下堂而受命此臣有所告請於其君曲禮凡自稱于君士大夫則曰下臣宅者在邦則曰市井之臣在野則曰草茅之臣庶人則曰刺草之臣他國之人則曰外臣宅者謂致仕者去官而居宅或在國中或在野周禮載師之職以宅田任近郊之地刺猶剗除也今文宅或為託古文茅作苗士相見禮振書端書於君前有誅倒筴側龜於君前有誅臣不豫事不敬也振去塵也端正也倒顛倒也側反側也皆謂甫省視之龜筴几杖席葢重素袗絺綌不入公門龜筴嫌問國家吉凶凡杖嫌自長老席葢載喪車也雜記曰士輤葦席以為屋蒲席以為裳帷重素衣裳皆素喪服也袗單也孔子曰當暑袗絺綌必表而出之為其形䙝苞屨扱祍厭冠不入公門此皆凶服也苞藨也齊衰藨蒯之菲也問喪曰親始死扱上祍厭猶伏也喪冠厭伏苞或為菲書方衰凶器不以告不入公門此謂喪在内不得不入當先告君耳方板也士喪禮下篇曰書賵於方若九若七若五凶器明器也大夫私行出疆必請反必有獻士私行出疆必請反必告臣不敢自專也私行謂以已事也士言告者不必有其獻也告反而已君勞之則拜問其行拜而后對亦起敬也問行謂道中無恙及所經過執天子之器則上衡謂高於心彌敬也此衡謂與心平國君則平衡大夫則綏之士則提之綏讀曰妥妥之謂下於心執主器執輕如不克重慎之也主君也克勝也執主器操幣圭璧則尚左手行不舉足車輪曳踵重慎也尚左手尊左也車輪謂行不絶地立則磬折垂佩主佩倚則臣佩垂主佩垂則臣佩委君臣俛仰之節倚謂附于身小俛則垂大俛則委于地大夫士下公門式路馬乘路馬必朝服載鞭䇿不敢授綏左必式步路馬必中道以足蹙路馬芻有誅齒路馬有誅皆廣敬也路馬君之馬載鞭䇿不敢執也齒欲年也誅罰也竝曲禮祥車曠左空神位也祥車葬之乘車乘君之乘車不敢曠左左必式君存惡空其位上同乘貳車則式佐車則否貳車佐車皆副車也朝祀之副曰貳戎獵之副曰佐魯莊公敗于乾時公喪戎路乗傳而歸有貳車者之乘馬服車不齒尊有爵之物廣敬也服車所乘車也車有新舊觀君子之衣服服劒乘馬弗賈平尊者之物非敬也少儀卿非君命不越竟莊二十七年左氏傳為人臣者無外交不敢貳君也詳見賓禮諸侯相朝右恭敬君召使擯色勃如也足躩如也擯主國之君所使出接賓者勃變色貌躩盤辟貌皆敬君命故也揖所與立左右手衣前後䄡如也所與立謂同為擯者也擯用命數之半如上公九命則用五人以次傳命揖左人則左其手揖右人則右其手䄡整貌趨進翼如也疾趨而進張拱端好如鳥舒翼賓退必復命曰賓不顧矣紓君敬也擯此一節記孔子為君相之容疾君視之東首加朝服拖紳東首以受生氣也病臥不能著衣束帶又不可以䙝服見君故加朝服於身又引大帶於上也並論語衞靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問夫人曰知此為誰夫人曰此蘧伯玊也公曰何以知之夫人曰妾聞禮下公門式路馬所以廣敬也夫忠臣與孝子不為昭昭信節不為冥㝠惰行蘧伯玉衞之賢大夫也仁而有智敬于事上此其人必不以闇昧廢禮是以知之公使人視之果伯玊也列女傳聘弓鍭矢不出竟場束脩之肉不行竟中有至尊者不貳之也詳見賓禮諸侯相朝為人臣之禮不顯諫為奪美也顯明也謂明言其君惡不幾微三諫而不聴則逃之逃去也君臣有義則合無義則離曲禮事君有犯而無𨼆詳見首章右諫諍子曰事君遠而諫則讇也近而不諫則尸利也尸謂不知人事無辭讓也子曰事君欲諫不欲陳陳謂言其過于外也並表記孔子曰忠臣之諫君有五義焉一曰譎諫二曰戇諫三曰降諫四曰直諫五曰諷諫唯度主以行之吾從其諷諫乎家語公按莊二十四年羊傳何休註云諫有五一曰諷諫二曰順諫三曰直諫四曰爭諫五曰戇諫齊宣王問卿孟子曰王何卿之問也王曰卿不同乎曰不同有貴戚之卿有異姓之卿王曰請問貴戚之卿曰君有大過則諫反覆之而不聴則易位大過謂足以亡其國者易位易君之位更立親戚之賢者葢與君有親親之恩無可去之義以宗廟為重不忍坐視其亡故不得已而至於此也請問異姓之卿曰君有過則諫反覆之而不聴則去君臣義合不合則去行此章言大臣之義親疎不同守經權各有其分貴戚之卿小過非不諫也但必大過而不聴乃可易位異姓之卿大過非不諫也雖小過而不聴已可去矣然三仁貴戚不能行之于紂而霍光異姓乃能行之于昌邑此又委任權力之不同不可以執一論也孟子臣所以有諫君之義何盡忠納誠也諍不從得去何以屈尊申卑孤惡君也去曰某質性頑鈍言愚不任用請退避賢如是君待之以禮臣待放如不以禮待遂去君待之以禮奈何曰予熟思夫子言未得其道今子不且留聖王之制無塞賢之路夫子欲何之則遣大夫送至于郊必三諫者何以為得君臣之義必待於郊者忠厚之至冀君覺悟能用之所以必三年何古者臣下有大喪君三年不呼其門所以復君恩如以言放者臣為君諱若言有罪放之也臣待於郊君不絶其禄者示不欲去也道不合耳禄參二與之一留與其妻長子使終祭宗廟賜之環則反賜之玦則去明君子重恥也白虎通箕子者紂親戚也紂始為象箸箕子歎曰彼為象箸必為玉桮為玊桮則必思遠方珍怪之物而御之矣輿馬宫室之漸自此始不可振也紂為淫泆箕子諫紂不聴而囚之人或曰可以去矣箕子曰為人臣諫不聴而去是彰君之惡而自説於民吾不忍為也乃被髪佯狂而為奴遂𨼆而鼓琴以自悲故傳之曰箕子操王子比干者亦紂之親戚也見箕子諫不聴而為奴則曰君有過而不以死爭則百姓何辜乃直言諫紂紂怒曰吾聞聖人之心有七竅信有諸乎乃遂殺王子比干刳視其心微子曰父子有骨肉而臣主以義屬故父有過子三諫不聴則隨而號之人臣三諫不聴則其義可以去矣於是遂行孔子曰殷有三仁焉史記微子世家晏子曰君所謂可而有否焉臣獻其否以成其可獻君之否以成君可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心昭二十年左氏傳大夫士去國祭器不踰竟此用君禄所作取以出竟恐辱親也大夫寓祭器於大夫士寓祭器於士寓寄也與得用者言寄覬已後還大夫士去國踰竟為壇位鄉國而哭素衣素裳素冠徹縁鞮屨素簚乘髦馬不蚤鬋不祭食不説人以無罪婦人不當御三月而復服言以喪禮自處也臣無君猶無天也壇位除地為位也徹猶去也鞮屨無絇之菲也簚覆笭也髦馬不鬄落也蚤讀為爪鬋鬋鬢也不自説於人以無罪嫌惡其君也御接見也三月一時天氣變可以遂去也簚或為幕君子行禮不求變俗求猶務也不務變其故俗重本也謂去先祖之國居他國祭祀之禮居喪之服哭泣之位皆如其國之故謹修其法而審行之其法謂其先祖之制度若夏殷去國三世爵禄有列於朝出入有詔於國三世自祖至孫踰久可以變故俗而猶不變者爵禄有列於朝謂君不絶其祖祀復立其族若臧紇奔邾立臧為矣詔告也謂與卿大夫吉凶往來相赴告若兄弟宗族猶存則反告於宗後謂無列無詔者反告亦謂吉凶也宗後宗子也去國三世爵禄無列於朝出入無詔於國唯興之日從新國之法以故國與已無恩興謂起為卿大夫並曲禮右去國孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也接猶承也淅漬米水也漬米将炊而欲去之速故以手承水子路去魯謂顏淵曰何以贈我贈送曰吾聞之也去國則哭于墓而后行反其國不哭展墓而入無君事主於孝哭哀去也展省視之謂子路曰何以處我處猶安也子路曰吾聞之也過墓則式過祀則下居者主於敬檀弓子産曰卿違從大夫之位謂以禮去者降位一等罪人以其罪降罪重則降多古之制也昭七年左氏傳晉放其大夫胥甲父于衞放之者何猶曰無去是云爾是是衞然則何言爾近正也此其為近正奈何大夫已去三年待放古者刑不上大夫葢以為摘巢毁卵則鳯凰不翔刳胎焚夭則麒麟不至刑之則恐誤刑賢者死者不可復生刑者不可復屬故有罪放之而已所以尊賢者之類也三年者古者疑獄三年而後斷易曰繫用徽墨寘于叢棘三嵗不得凶是也自嫌有罪當誅故三年不敢去君放之非也曰無去是非也大夫待放正也聴君不去衞正也宣元年公羊傳國君去其國止之曰奈何去社稷也大夫曰奈何去宗廟也士曰奈何去墳墓也皆臣民殷勤之言國君死社稷死其所受於天子也謂見侵伐也春秋傳曰國滅君死之正也大夫死衆士死制死其所受於君衆謂君師制謂君教令所使為之曲禮君子曰謀人之軍師敗則死之謀人之邦邑危則亡之利已亡衆非忠也言亡之者雖辟賢非義退檀弓内亂不與焉外患弗辟也謂卿大夫也同僚將為亂已力不能討不與而已至于鄰國為冦則當死之也春秋魯公子友如陳葬原仲傳曰君子辟内難而不辟外難雜記右死節武公伐翼殺哀侯翼晉國都也止欒共子曰苟無死欒共子晉哀侯大夫共叔成也初桓叔為曲沃伯共子之父欒賓傅之故止共子使無死也吾以子見天子令子為上卿制晉國之政上卿執政命于天子者也辭曰臣聞之民生于三事之如一三君父師也如一服勤至死也父生之師教之君食之食謂禄也非父不生非食不長非教不知生之族也故壹事之族類也壹事之事之如一也唯其所在則致死焉在君父為君父在師為師報生以死報賜以力人之道也賜惠也以力謂家臣也臣敢以私利廢人之道私利謂不死為上卿君何以訓矣無以教為忠也且君知成之從也未知其待於曲沃也君武公也言君知成將死其君為從臣道也故使止臣未知成不死而待君于曲沃之為貳也從君而貳君焉用之貳二心也遂鬬而死國語晉語宋督将弑殤公孔父生而存則殤公不可得而弑也於是先攻孔父之家大夫稱家父者字也禮臣死君字之以君得字之知先攻孔父之家殤公知孔父死已必死趨而救之皆死焉孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色矣内有其義而外形見於顏色桓二年公羊傳宋萬搏閔公絕其脰仇牧聞君弑趨而至遇之于門手劒而叱之萬臂榝仇牧碎其首側手曰榝齒著于門闔闔扇仇牧可謂不畏彊禦矣莊十二年公羊傳晉獻公卒里克丕鄭以三公子之徒作亂三公子申生重耳夷吾初獻公使荀息傅奚齊公疾召之曰以是藐諸孤言其幼賤與諸子縣藐辱在大夫其若之何欲屈辱荀息使保䕶之稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也往死者居生者耦兩也送死事生兩無疑恨所謂正也及里克將殺奚齊先告荀息曰三怨將作三公子之徒秦晉輔之子將何如荀息曰将死之里克曰無益也荀叔曰吾與先君言矣不可以貳能欲復言而愛身乎苟叔荀息也復言言可復也雖無益也将焉辟之且人之欲善誰不如我我欲無貳而能謂人已乎言不能止里克使不忠于申生等里克殺奚齊于次次喪次荀息将死之人曰不如立卓子而輔之荀息立公子卓以葬里克殺公子卓于朝荀息死之僖九年左氏傳荀息可謂不食其言矣公羊傳晉懐公命無從亡人懐公子圉亡人重耳期期而不至無赦狐突之子毛及偃從重耳在秦弗召偃子犯也懐公執狐突曰子來則免對曰子之能仕父教之忠古之制也䇿名委贄貳乃辟也名書於所臣之䇿屈膝而君事之則不可以貳辟罪也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣乃殺之僖二十三年左氏傳楚子圍宋晉使解揚如宋使無降楚曰晉師悉起将至矣鄭人囚而獻諸楚楚子厚賂之使反其言反言晉不救不許三而許之登諸樓車使呼宋人而告之樓車車上望櫓遂致其君命楚子将殺之使與之言曰爾既許不穀而反之何故非我無信汝則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衞社稷民之主也義無二信欲為義者不行兩信信無二命欲行信者不受二命君之賂臣不知命也受命以出有死無霣霣廢墜也又可賂乎臣之許君以成命也成其君命死而成命臣之禄也寡君有信臣已不廢命下臣獲考考成也死又何求楚子舎之以歸宣十五年左氏傳衞懿公有臣曰宏演遠使未還翟人攻衞及懿公於滎澤殺之盡食其肉獨捨其肝宏演至報使於肝畢呼天而啼盡哀而止曰臣請為襮因自殺先出其腹内懿公之肝襮表也納公之肝於其腹中故曰臣請為襮也桓公聞之曰衞之亡也以為無道也今有臣若此不可不存於是復立衞于楚丘宏演可謂忠矣殺身出生以徇其君出去也去生就死以徇從其君非徒徇其君也又令衞之宗廟復立祭祀不絶可謂有功矣呂氏春秋樂毅破齊聞畫邑人王蠋賢令軍中環畫邑三十里無入使人請蠋蠋謝不往燕人曰不來吾且屠畫邑蠋曰忠臣不事二君烈女不更二夫齊王不用吾諫故退而耕於野國破君亡吾不能存而又欲刼之以兵吾與其不義而生不若死遂經其頸於樹枝自奮絶脰而死通鑑赧王三十一年齊崔杼弑其君光晏子立于崔氏之門外聞難而來其人曰死乎曰獨吾君也乎哉吾死也言已與衆臣無異曰行乎曰吾罪也乎哉吾亡也自謂無罪曰歸乎曰君死安歸言安可以歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養言君不徒君民上臣不徒求禄皆為社稷故君為社稷死則死之為社稷亡則亡之謂以公義死亡若為已死而為已亡非其私暱誰敢任之私暱所親愛也非所親暱無為當其禍且人有君而弑之吾焉得死之而焉得亡之言已非正卿見待無異于衆臣故不得死其難也将庸何歸将用死亡之義何所歸趣門啟而入枕尸股而哭以公尸枕已股興三踊而出襄二十五年左氏傳父之讎弗與共戴天父者子之天殺己之天與共戴天非孝子也行求殺之乃止曲禮餘按君之讎亦猶父也其親之讎詳見通禮刑辟父之讎辟諸海外君之讎眂父調人辟詳見刑右復讎韓魏趙氏殺智伯分其田趙襄子漆智伯之頭以為飲器智伯之臣豫讓欲為之報仇乃詐為刑人挾匕首入襄子宮中塗厠襄子如厠心動索之獲豫讓左右欲殺之襄子曰智伯死無後而此人欲為報仇真義士也吾謹避之耳乃舎之豫讓又漆身為癩吞炭為啞行乞於市其妻不識也行見其友其友識之為之泣曰以子之才臣事趙孟必得近幸子乃為所欲為顧不易邪何乃自苦如此求以報仇不亦愚乎豫讓笑而應之曰不可既已委質為臣而又求殺之是二心也且為先知報後知為故君賊新君大亂君臣之義吾弗為之矣凡吾所以為此者所以明君臣之義雖難不避也襄子出豫讓伏於橋下襄子至橋馬驚索之得豫讓遂殺之史記通鑑王孫賈事齊閔王王出走賈失王之處其母曰女朝去而晚來則吾倚門而望女莫出不還則吾倚閭而望女今欲王王出走女不知其處女尚何歸王孫賈乃入市中曰淖齒亂齊國殺閔王欲與我誅齒者袒右市人從之者四百人與誅淖齒刺而殺之通鑑赧王三十二年禮書綱目卷八十
