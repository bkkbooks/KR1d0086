body:
  text: 禮書綱目附録卷下婺源江永撰深衣考誤深衣鄭氏曰深衣連衣裳而純之以采者孔氏正義曰所以稱深衣者以餘服則上衣下裳不相連此深衣衣裳相連被體深邃故謂之深衣永按深衣之義鄭注孔疏皆得之獨其裳衽之制裁布之法與續衽鉤邊之文鄭氏本不誤而疏家皇氏熊氏孔氏皆不能細繹鄭説遂失其制度後儒承譌襲舛或以臆為之考辯愈詳而誤愈甚其失自玉藻疏始今為考訂如左玉藻曰深衣三袪縫齊倍要縫音逢齊音咨要一遥反鄭氏曰三袪者謂要中之數也袪尺二寸圍之為二尺四寸三之七尺二寸縫紩也紩下齊倍要中齊丈四尺四寸疏曰袪謂袂末言深衣之廣三倍於袂末齊謂裳之下畔要謂裳之上畔言縫下畔之廣倍於要中之廣謂齊廣一丈四尺四寸要廣七尺二寸又曰云三之七尺二寸者按深衣云幅十有二以計之幅廣二尺二寸一幅破為二四邊各去一寸餘有一尺八寸每幅交解之濶頭廣尺二寸狹頭廣六寸此寛頭嚮下狹頭嚮上要中十二幅廣各六寸故為七尺二寸下齊十二幅各廣尺二寸故為一丈四尺四寸永按深衣者聖賢之法服衣用正幅裳之中幅亦以正裁惟衽在裳旁始用斜裁古者布幅濶二尺四寸深衣裳用布六幅裁為十二幅其當裳之前後正處者以布四幅正裁為八幅上下皆廣一尺一寸各邊去一寸為縫一幅上下皆正得九寸八幅七尺二寸其在上者既足要中之數矣下齊當倍於要又以布二幅斜裁為四幅狹頭二寸寛頭二尺各去一寸為縫狹頭成角寛頭得一尺八寸皆以成角者向上以廣一尺八寸者向下則四幅下廣亦得七尺二寸合於齊得一丈四尺四寸此四幅連屬於裳之兩旁别名為衽下文衽當旁是也深衣裳裁縫之法本如此玩下文鄭注可見疏家不得其説妄謂六幅皆用交解狹頭去邊縫廣六寸濶頭去邊縫廣一尺二寸於是裳之前後惟中縫正直其餘皆成竒衺不正之縫可謂服之不衷曽謂聖賢法服而有是哉下文衽當旁疏及續衽鉤邊諸説之紛挐皆由六幅皆交解之説誤之耳衽當旁鄭氏曰衽謂裳幅所交裂也凡衽者或殺而下或殺而上是以小要取名焉衽屬衣則垂而放之屬裳則縫之以合前後上下相變永按衽者斜殺以掩裳際之名深衣裳前後當中者不名衽唯當旁而斜殺者名衽故經云衽當旁明其不當中也當中則前襟而後裾是也鄭云衽謂裳幅所交裂也玩所之一字明其唯在裳旁而名衽者交裂其餘幅不交裂也交裂者以布二幅交解為四幅狹頭二寸去邊縫成角寛頭二尺去邊縫一尺八寸也又云凡衽者或殺而下或殺而上此廣解凡裳之衽也衽有二朝服祭服喪服皆用帷裳前三幅後四幅裳際不連有衽掩之用布交解寛頭在上合縫之狹頭在下如燕尾之形即喪服篇衽二尺有五寸是也此衽之殺而下者也深衣之衽當裳旁亦交解而以狹頭向上寛頭向下此衽之殺而上者也云是以小要取名焉者謂棺上合縫之木亦名為衽也喪大記曰君蓋用漆三衽三束鄭注云衽小要也蓋小要之形上下廣而中狹以掩棺蓋合縫之際上半則殺而下下半則殺而上似衣衽之上殺下殺以掩裳際是以有衽之名此借衣衽名小要故鄭連及之也云衽屬於衣則垂而放之謂朝祭喪服之衽云屬於裳則縫之以合前後即此深衣之衽也其縫之以合前後者唯左旁為然若右旁則不能縫合别有鉤邊見深衣篇鄭亦畧言之耳此經與鄭注甚明又以他文證之問喪云扱上衽謂裳之兩角揷於帶間也論語云左衽謂夷俗衽掩於左其縫合者在右也皆衽當旁之證也而疏家忽之并失小要之義疏曰衽謂裳幅所交裂也者裳幅下廣尺二寸上濶六寸狹頭嚮上交裂一幅而為之按裳幅不皆交裂孔氏誤謂二二幅皆交裂是未繹所字之意云凡衽者或殺而下或殺而上者皇氏云言凡衽非一之辭非獨深衣也或殺而下謂喪服之衽廣頭在上狹頭在下按朝祭服亦如喪服之制皇氏不及朝祭服非也或殺而上謂深衣之衽寛頭在下狹頭在上云是以小要取名焉者謂深衣與喪服相對為小要兩旁皆有此衽按小要者棺上合縫之木也皇説誤熊氏大意與皇氏同或殺而下謂朝祭之服耳按熊氏又不及喪服亦非也合皇熊二説乃備云衽屬衣則垂而放之者謂喪服及熊氏朝祭之衽按此説是云屬裳則縫之以合前後者謂深衣之衽云上下相變者上體是陽陽體舒散故垂而下下體是陰陰主收斂故縫而合之按此皆得之今刪定深衣之上獨得衽名不應假他餘服相對為衽何以知之深衣衣下屬幅而下裳下屬幅而上相對為衽按喪服篇明言衽二尺有五寸孔氏乃謂深衣獨得衽名何耶殺上殺下明是與他服相對孔氏乃謂深衣衣下屬幅而下裳下屬幅而上相對為衽衣下屬幅何以謂之殺耶且下文衽屬衣則垂而放之豈得謂深衣之衽耶刪定之説大夫鄭注之意也鄭注深衣鉤邊今之曲裾則宜兩邊而有也按鉤邊别是一物此經未及深衣疏一旁有曲裾此云宜兩邊有與彼疏亦自相牴牾但此等無文言之且從先儒之業深衣云續衽鉤邊鄭氏曰續猶屬也衽在裳旁者也屬連之不殊裳前後也鉤讀如烏喙喙必鉤之鉤鉤邊若今曲裾也永按續衽謂裳之左旁縫合其衽也鉤邊謂裳之右旁别用一幅布斜裁之綴於右後衽之上使鉤而前也漢時謂之曲裾蓋裳後為裾綴於裾曲而前故名曲裾也所以必用鉤邊去裳之右畔前後衽不合若無鉤邊則其行步之際露則後衽之裏有鉤邉而後可揜裳際也鄭氏特引引孝經援神契烏喙必鉤之鉤讀如之明其為鉤曲之義使非别綴一幅曲而前不得謂之鉤也裳十二幅象十二月又有鉤邊其以象閏歟鄭氏不言左續衽右鉤邊者衣裳自左揜右左可連右不可連其事易明故不必言左右也續衽鉤邊之義鄭注分明疏家汨之後儒之説并鉤邊失之詳見後疏曰衽為深衣之裳以下濶上狹謂之為衽按裳幅不皆下濶上狹説已見前接續此衽而鉤其旁邊即今之朝服有曲裾而在旁者是也按此説似合續衽鉤邊而一之若兩旁皆續衽而鉤邊者其説誤矣又曰衽當旁者凡深衣之裳十二幅皆寛頭在下狹頭在上按此説甚誤前已辨之皆似小要之衽按小要上半殺而下下半殺而上須合他衽之殺而下者方似小要是前後左右皆有衽也今云衽當旁者謂所續之衽當身之一旁非謂餘衽悉當旁也按裳幅當前後者不名衽安得有餘衽經明言衽當旁安得謂前後左右皆有衽云屬連之不殊裳前後也若喪服其裳前三幅後四幅各自為之不相連也今深衣裳一旁則連之相著一旁則有曲裾掩之與相連無異故云屬連之不殊裳前後也按一旁連之相著謂在左者也一旁有曲裾掩之謂在右者也此二句分明最為得之然又云與相連無異故云屬連之不殊裳前後恐非鄭注之意續衽鉤邉鄭氏分别言之右邉曲裾掩裳際不可謂屬連之也云若今曲裾也鄭以後漢之時裳有曲裾故以續衽鉤邊似漢時曲裾今時朱衣朝服從後漢時帝所為則鄭云今曲裾者是今朝服之曲裾也按孔氏玉藻疏謂曲裾兩邊宜有似唐時朝服有兩曲裾然一以經文繹之一邊既續衽則曲裾惟宜施於右耳家禮深衣制度云衣全四幅其長過脇下屬於裳註云用布云幅中屈下垂前後共為四幅如今之直領衫但不裁破腋下其下過脇而屬於裳處約圍七尺二寸每幅屬裳三幅永按深衣之領自左而掩於右前襟亦自左掩右右襟有表有裏則前後當有五幅如後世之袍制而家禮謂衣前後四幅如今之直領衫恐誤矣家禮深衣圖亦是兩襟相掩既相掩則領不直而衣不止四幅豈朱子未定之説乎又云每幅屬裳三幅亦沿舊説之誤前後四幅每幅屬裳二幅而衽之四幅在兩旁衽之上頭但有角屬於衣前襟之裏一幅則有曲裾屬之耳裳交解十二幅上屬於衣其長及踝註云用布六幅每幅裁為二幅一頭廣一頭狹狹頭當廣頭之半以狹頭向上而連其縫以屬於衣其屬衣處約圍七尺二寸每三幅屬衣一幅其下邊及踝處約圍丈四尺四寸永按孔氏誤釋玉藻裳幅皆交解家禮遂承其誤當以玉藻衽當旁鄭注為正又按深衣篇制十有二幅以應十有二月鄭注云裳六幅幅分之以為上下之殺此注亦略言裳以六幅分為十二幅下齊廣於要中耳其為上下之殺者在當旁之衽非謂十二幅皆殺也又云方領註云兩襟相掩衽在腋下則兩領之㑹自方永按深衣云曲袷如矩以應方注袷交領也古者方領如今小兒衣領孔疏云鄭以漢時領皆向下交垂方領似今擁咽故云若小兒衣領但方折之也司馬温公引後漢馬援傳朱勃衣方領能矩步註謂頸下别施一衿映所交領使之方正又引後漢儒林傳服方領註方領直領也左傳衣有襘註襘領㑹也曲禮註袷交領也謂領之交㑹處自方即謂袷疑更無他物朱子此説蓋従温公後説也鄭氏謂如今小兒衣領豈漢時小兒衣領亦但曲之而自方非如孔氏擁咽之説乎但領既交㑹則不直而在右之前襟必有表裏前謂布四幅不知何以制之也曲裾註云用布一幅如裳之長交解裁之如裳之制但以廣頭向上布邊向外左掩其右交映垂之如燕尾狀又稍裁其内旁大半之下令漸如魚腹而末為烏喙内向綴於裳之右旁禮記深衣續衽鉤邊鄭註鉤邊若今曲裾永按曲裾别用一幅布裁之綴於裳之右旁是已然謂交解裁之廣頭向上左右交映垂之如燕尾狀則似朝服祭服喪服之衽非鉤邊之制也鄭注讀如烏喙必鉤之鉤此引孝經緯文明鉤字之義非謂末為烏喙也此條朱子後自有説蔡氏淵曰司馬所載方領與續衽鉤邊之制引證雖詳而不得古意先生病之常以理玩經文與身服之宜而得其説謂方領者只是衣領既交自有如矩之象謂續衽鉤邊者只是連續裳旁無前後幅之縫左右交鉤即為鉤邊非有别布一幅裁之如鉤而綴於裳旁也方領之説先生已修之家禮矣而續衽鉤邊則未及修焉永按續衽鉤邊朱子前後有三説謂别布一幅裁之如鉤綴於裳之右旁此家禮之説也謂左邊既合縫了再覆縫以合縫者為續衽覆縫為鉤邊此衣圖之説也謂是連續裳旁無前後幅之縫左右交鉤即為鉤邊此蔡氏所聞之説也三説似皆未確其源皆由孔氏釋玉藻誤之使其不謂六幅皆交解則當旁之衽左邊連屬之右邊必湏有别布一幅為曲裾以掩之非如合縫覆縫左右交鉤之説矣其有别布一幅也亦但綴於裳之後裾鉤曲而前非如交裁為燕尾之説矣楊氏復曰深衣制度唯續衽鉤邊一節難考按玉藻深衣疏皇氏熊氏孔氏三説皆不同皇氏以喪服之衽廣頭在上深衣之衽廣頭在下喪服與深衣二者相對為衽孔氏以衣下屬幅而下裳上屬而上衣裳二者相對為衽此其不同者一也按二説孔氏失之皇氏但失不兼朝祭服耳皇氏以衽為裳之兩旁皆有孔氏以衽為裳之一邊所有此其不同者二也按孔氏謂所續之衽當身之一旁非謂衽為裳之一邊所有也皇氏所謂廣頭在上為喪服之衽者熊氏又以此為朝祭服之衽一以為吉服之衽一以為凶服之衽此其不同者三也按此非不同也皇熊各舉一邊耳家禮以深衣續衽之制兩廣頭向上似與皇氏喪服之衽熊氏朝祭服之衽相類此為可疑是以先生晚嵗所服深衣去家禮舊説曲裾之制而不用按鄭氏解鉤邊為曲裾分明别有一物但非如燕尾下垂耳去而不用恐乖鄭義蓋有深意恨未得聞其説之詳也及得蔡淵所聞始知先師所以去舊説曲裾之意後又取禮記深衣篇熟讀之始知鄭注續衽二字文義甚明特疏家亂之耳按續衽與鉤邊是二事鄭注分言之而楊氏即以續衽當鉤邊是誤讀鄭注耳按鄭注曰續猶屬也衽在裳旁者也屬連之不殊裳前後也按鄭註别解鉤邊為曲裾此獨刪去何也鄭註之意蓋謂凡裳前三幅後四幅夫既分前後則其旁兩幅分開而不相屬唯深衣裳十二幅交裂裁之皆名為衽按此沿孔疏之誤見玉藻衽當旁註按鄭註衽謂裳幅所交裂也言唯衽之四幅交裂其餘八幅則不交裂也楊氏亦未細繹鄭註耳所謂續衽者指在裳旁兩幅言之謂屬連裳旁兩幅不殊裳前後也按屬連之者裳之左旁也若右旁兩幅各開是以别有曲裾以掩裳際楊氏但言裳旁不辨左右則右邊豈可屬連乎疏家不詳考其文義但見衽在裳旁一句意謂别用布一幅裁之如鉤而垂於裳旁妄生穿鑿紛紛異同愈多愈亂按孔疏深衣裳一旁連之相著一旁則有曲裾掩之二句最分明的確鄭註既解鉤邊為曲裾則安得混鉤邊於續衽而謂非别用一幅布為之乎自漢至今二千餘年讀者皆求之於别用一幅布之中而註之本義為其掩蓋而不可見按鉤邊别用一幅布正得鄭註之意唯玉藻疏誤謂深衣裳皆名衽十二幅皆交解於是註之本義為其掩盖而不可見耳夫疏所以釋註也今推尋鄭註本文其義如此而皇氏熊氏等所釋其謬如彼皆可以一掃而去之矣按皇熊之説未嘗謬先師晚嵗知疏家之失而未及修定愚故著鄭註於家禮深衣曲裾之下以破疏家之謬且以見先師晚嵗已定之説云永按楊氏之説雖謂以鄭註破疏家之謬而玉藻衽當旁之經文及鄭註衽謂裳幅所交裂也所字之意未嘗細玩又引深衣續衽鉤邊之註但及其釋續衽者而遺其曲裾之説於是疏説本不誤者以為誤而其真誤如孔氏所謂裳幅皆交解者反忽之甚矣註疏亦未易讀也深衣裳之誤已乆以聖賢法而反類於竒衺不正是以詳為之考俟當世君子論定焉禮書綱目附錄卷下
