body:
  text: 禮書綱目卷三十六婺源江永撰地示吉禮三補天子祭天地嵗徧曲禮嵗此條通言一祭地大宗伯以黄琮禮地禮地以夏至謂神在崑崙者也禮神者必象其類琮八方象地牲幣放其器之色幣以從爵若人飲酒有酬幣春官此條祀地玉幣牧人陰祀用黝牲毛之詳見祭物犧牲祭天地之牛角繭栗同上犬人祭祀共犬牲用牲物瘞亦如之同上犧此三條牲典瑞兩圭有邸以祀地兩圭者以象地數二也僢而同邸祀地謂所祀於北郊神州之神春官玉人兩圭五寸有邸以祀地邸謂之柢有邸僢共本也車考工記禮此兩條圭玉酒齊粢盛器席旗並如天之禮大司樂乃奏大蔟歌應鍾舞咸池以祭地示大蔟陽聲第二應鍾為之合咸池大咸也地示所祭於北郊謂神州之神及社稷凡樂函鍾為宫大蔟為角姑洗為徵南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣地祗則主崑崙先奏是樂以致其神禮之以玉乃後合樂而祭之樂詳見樂制此條舞大宰祀五帝則掌百官之誓戒與其具脩前期十日帥執事而卜日遂戒及執事眡滌濯及納亨贊王牲事及祀之日贊玉幣爵之事詳見天神祀五帝祀大示亦如之疏曰祀大祇謂夏至祭地於方澤天官大宗伯祭大示帥執事而卜日宿眡滌濯涖玉鬯省牲鑊奉玉齍詔大號治其大禮詔相王之大禮詳見天神瘞埋於泰折祭地也折炤晢也必為炤明之名尊神也祭地祭地曰瘞埋既祭埋藏之爾雅大祝辨六號三曰示號祗號若云后土地祗凡祭示則執明水火而號祝詳見天神薄薄之土承天之神薄旁薄也乃順承天也興甘風雨庶卉百穀莫不茂者既安且寧維予一人某敬拜下土之靈維某年某月上日大戴禮天已上祭地禮節其與祀同者詳見前篇凡以神仕者以夏日至致地示物鬽地物陰也陰氣升而祭地祗物鬽致物鬽於墠壇盖用祭地之明日而物之神曰鬽詳見百神此條祭日明日右祭地王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社羣衆也大夫以下至庶人也大夫不得特立社與民族居百家以上則共立一社今時里社是也郊特牲曰唯為社事單出里祭法小宗伯掌建國之神位右社稷左宗廟庫門内雉門外之左右春官匠人營國左祉右社王宫所居也考工記乃建大社於周中其壝東青土南赤土西白土北驪土中央亹以黄土汲冢周書作雒解封人掌設王之社壝壝謂壇及堳埓也不言稷者稷社之細也地官天子大社必受霜露風雨大社王為羣姓所立郊特牲小子掌珥於社稷鄭司農云珥社稷以牲頭祭也𤣥謂珥讀為衈釁禮之事也用毛牲曰刉羽牲曰衈衈社稷謂始成其宫兆時也秋官士師職曰凡刉珥則奉大牲此刉衈正字與夏官内宰凡建國佐后立市祭之以陰禮祭之以陰禮者市中之社先后所立社也天官諸侯祭社稷王制小司徒凡建邦國立其社稷封人凡封國設其社稷之壝封國建諸侯大並地官之已上天子諸侯夫社稷制大司徒設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野社稷后土及田正之神壝壇與堳埓也田主田神后土田正之所依也詩人謂之田祖所宜木謂若松柏栗也若以松為社者則名松社之野以别方面地官小宗伯若大師則帥有司而立軍社奉主車有司大祝也王出軍必先有事於社及遷廟而以其主行社主曰軍社遷主曰祖春秋傳曰軍行祓社釁鼓祝奉以從曽子問曰天子巡守以遷廟主行載於齊車言必有尊也書曰用命賞于祖不用命戮于社社之主盖用石為之奉謂將行春官已上社木社主厲山氏之有天下也其子曰農能殖百穀夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社厲山氏炎帝也起於厲山或曰有烈山氏棄后稷名也共工氏無録而王謂之霸在大昊炎帝之間祭法共工氏有子曰句龍為后土共工在大昊後神農前以水名官者其子句龍能平水土故死而見祀后土為社方答社稷故明言為社稷田正也掌播殖也有烈山氏之子曰柱為稷烈山氏神農世為諸侯自夏以上祀之祀柱周棄亦為稷棄周之始祖能播百穀湯既勝夏廢柱而以棄代之自商以來祀之昭二十九年左氏傳已上社稷配祭季夏命四監大合百縣之秩芻以養犧牲令民無不咸出其力以祠社稷之靈以為民祈福季冬乃命大史次諸侯之烈賦之犧牲以共社稷之饗凡在天下九州之民者無不咸獻其力以共社稷之祀詳見祭物犧牲天子社稷皆大牢諸侯社稷皆少牢王制牧人陰祀用黝牲毛之陰祀祭地北郊及社稷也鄭司農云黝讀為幽黑也地官大司馬中春教振旅遂以蒐田獻禽以祭社春田主祭社者土方施生也夏官鬯人凡祭祀社壝用大壘壝謂委土為墠壇所以祭也大壘瓦壘司服祭社稷則希冕希刺粉米無畫也其衣一章裳二章凡三也並春官大司樂乃奏大蔟歌應鍾舞咸池以祭地示詳見祭地鼓人以靈鼓鼓社祭靈鼓六面鼔也社祭祭地祗也舞師教帗舞帥而舞社稷之祭祀疏曰帗舞用五色繒並地官物已上禮樂舞封人令社稷之職將祭之時令諸有職事於社稷者也郊特牲曰唯為社事單出里唯為社田國人畢作唯社丘乗共粢盛所以報本反始也地官春社春田祭社大司馬職云明堂位社祭土日用甲國中之神莫貴於社君南鄉於北墉下牆謂之墉北墉社内北牆郊特牲詳見祭義大宗伯以血祭祭社稷不言祭地此皆地祇祭地可知也陰祀自血起貴氣臭也社稷土穀之神有徳者配食焉共工氏之子曰句龍食於社有厲山氏之子曰柱食於稷湯遷之而祀棄春官三獻文謂祭社稷五祀禮器三獻爓疏曰社又降於宗廟故用爓爓人稍近味郊特牲肆師社之日涖卜來嵗之稼社祭土為取財焉卜者問後嵗稼所宜春官已上祭社稷禮節䘮國之社屋之薄社北牖絶其陽通其陰而已薄社殷之社殷始都薄郊特牲詳見祭義䘮祝掌勝國邑之社稷之祝號以祭祀禱祠焉勝國邑所誅討者社稷者若亳社是已存之者重神也盖奄其上而棧其下為北牖春官士師若祭勝國之社稷則為之尸以刑官為尸略之也周謂亡殷之社為亳社秋官已上勝國社稷仲春擇元日命民社社后土也使民祀焉神其農業也祀社日用甲令月州長若以嵗時祭祀州社則屬其民而讀法凡州之大祭祀涖其事大祭祀謂州社稷也涖臨也閭胥凡春秋之祭祀聚衆庶既比則讀法祭祀謂州社黨禜族酺也並地官肆師若國有大故則令國人祭大故謂水旱凶荒所令祭者社及禜酺嵗時之祭祀亦如之月令仲春命民社此一隅春官唯為社事單出里唯為社田國人畢作唯社丘乗共粢盛單出里皆徃祭社於都鄙二十五家為里畢作人則盡行非徒羡也丘十六井也四丘六十四井曰甸或謂之乗乗者以千車賦出長轂一乗乗或為鄰祭郊特牲上詳見義已民社右祭社稷湯既勝夏欲遷其社不可作夏社湯承堯舜禪代之後順天應人逆取順守而有慙徳故革命創制改正易服變置社稷而後世無及句龍者故不可而止書序迺立冢土戎醜攸行冢土大社也亦大王所立而後因以為天子之制也戎醜大衆也起大事動大衆必有事乎社而後出謂之宜大雅緜哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗宰我孔子弟子名予三代之社不同者古者立社各樹其土之所宜木以為主也戰栗恐懼貌宰我又言周所以用栗之意如此豈以古者戮人於社故附㑹其説與子聞之曰成事不説遂事不諫既徃不咎遂事謂事雖未成而勢不能已者孔子以宰我所對非立社之本意又啓時君殺伐之心而其言已出不可復救故厯言此以深責之欲使謹其後也尹氏曰古者各以所宜木名其社非取義於木也宰我不知而妄對故夫子責之論語尚書亡篇曰太社唯松東社唯柏南社唯梓西社唯栗北社唯槐春秋文義曰天子之社稷廣五丈諸侯半之春秋傳曰天子有大社焉東方青土南方赤土西方白土北方黑土上冒以黄土故將封東方諸侯青土苴以白茅白虎通春社天子之祭也春田祭社明堂位載芟春藉田而祈社稷也良耜秋報社稷也並詩序以我齊明與我犧羊以社以方齊與粢同曲禮曰稷曰明粢此言齊明便文以協韵耳犧羊純色之羊也社后土也以句龍氏配方秋祭四方報成萬物周禮所謂羅弊獻禽以祀祊是也小雅甫田曽子問曰諸侯之祭社稷俎豆既陳聞天子崩后之䘮君薨夫人之䘮如之何孔子曰廢自薨比至於殯自啟至於反哭奉帥天子詳見祭通禮廢祭章孟子曰民為貴社稷次之君為輕社土神稷穀神建國則立壇壝以祀之盖國以民為本社稷亦為民而立而君之尊又係於二者之存亡故其輕重如此諸侯危社稷則變置諸侯無道將使社稷為人所滅則當更立賢君是君輕於社稷也犧牲既成粢盛既潔祭祀以時然而旱乾水溢則變置社稷祭祀不失禮而土穀之神不能為民禦灾捍患則毁其壇壝而更置之亦年不順成八蜡不通之意是社稷雖重於君而輕於民也鄭子産伐陳入之陳侯免擁社免䘮服擁社抱社主示服襄二十五年左氏傳哀公四年六月辛丑亳社灾杜曰天火也亳社殷社諸侯有之所以戒亡國以范曰殷都於亳武王克紂而班列其社於諸侯為亡國之戒劉向曰灾亳社戒人君縱恣不能警戒之象春秋亳社者亳之社也亳亡國也亳即殷也殷都於亳故國謂之亳社亡國之社以為廟屏戒也立亳之社於廟之外以為屏蔽取其不得通天人君瞻之而致戒心其屋亡國之社不得達上也必為之作屋不使上通天也縁有屋故言灾穀梁傳蒲社灾蒲社者何據鼓用牲於社不言蒲亡國之社也蒲社者先世之亡國在魯竟社者封也封土為社其言灾何據封土非火所能燒亡國之社盖揜之揜其上而柴其下故火得燒之揜柴之者絶不得使通天地四方以為有國者戒蒲社灾何以書記灾也戒社者先王之所以威示教戒諸侯使事上也灾者象諸侯背天子是後宋事彊吴齊晉前驅滕薛俠轂魯衞驂乗故天去戒社若曰王教滅絶云耳公羊傳莊公如齊觀社莊公二十三年齊因祀社蒐軍實以示客公徃觀之曹劌諫曰不可夫齊棄大公之法而觀民於社大公齊始祖大公望也君為是舉舉動也而徃觀之非故業也業事也何以訓民土𤼵而社助時也土𤼵春分也周語曰土乃脈𤼵社者助時求福為農始也收攟而烝納要也攟拾也冬祭曰烝因祭社以納五穀之要休農夫也月令曰孟冬祀於天宗大祀於公社及門閭今齊社而徃觀旅非先王之訓也旅衆也天子祀上帝上帝上天也諸侯㑹之受命焉助祭受政命也諸侯祀先王先公先王謂若宋祖帝乙鄭祖厲王之屬也先公先君也卿大夫佐之受事焉事職事也臣不聞諸侯之相㑹祀也祀又不法不法謂觀民也國語魯語王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰戸曰竈王自為立七祀諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自為立五祀大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士庶人立一祀或立户或立竈此非大神所祈報大事者也小神居人之間司察小過作譴告者爾樂記曰明則有禮樂幽則有鬼神鬼神謂此與司命主督察三命中霤主堂室居處門户主出入行主道路行作厲主殺伐竈主飲食之事明堂月令春曰其祀戸祭先脾夏曰其祀竈祭先肺中央曰其祀中霤祭先心秋曰其祀門祭先肝冬曰其祀行祭先腎聘禮曰使者出釋幣於行歸釋幣於門士喪禮曰疾病禱於五祀司命與厲其時不著今時民家或春秋祀司命行神山神門户竈在旁是必春祠司命秋祠厲也或者合而祠之山即厲也民惡言厲巫祝以厲山為之謬乎春秋傳曰鬼有所歸乃不為厲祭法小子掌祈於五祀故書祀作禩鄭司農云禩讀為祀書亦或為祀𤣥謂祈或為刉用毛牲曰刉刉者釁禮之事也刉五祀謂始成其宫兆時也夏官天子祭五祀嵗徧諸侯祭五祀嵗徧大夫祭五祀嵗徧五祀户竈中霤門行也此盖殷時制也祭法曰天子立七祀諸侯立五祀大夫立三祀士立二祀謂周制也曲禮大夫祭五祀五祀謂司命也中霤也門也行也厲也此祭謂大夫有地者其無地祭三耳王制春祀户祭先脾春陽氣出祀之於戸内陽也祀之先祭脾者春為陽中於藏直脾脾為尊凡祭五祀於廟用特牲有主有尸皆先設席於奥祀户之禮南面設主於户内之西乃制脾及腎為俎奠於主北又設盛於俎西祭黍稷祭肉祭醴皆三祭肉脾一腎再既祭徹之更陳鼎俎設饌於筵前迎尸略如祭宗廟之儀夏祀竈祭先肺夏陽氣盛熱於外祀之於竈從熱類也祀之祭先肺者陽位在上肺亦在上肺為尊也竈在廟門外之東祀竈之禮先席於門之奥東面設主於竈陘乃制肺及心肝為俎奠於主西又設盛於俎南亦祭黍三祭肺心肝各一祭醴三亦既祭徹之更陳鼎俎設饌於筵前迎尸如祀户之禮中央祀中霤祭先心中霤猶中室也土主中央而神在室古者複穴是以名室為霤云祀之先祭心者五藏之次心次肺至此心為尊也祀中霤之禮設主於牖下乃制心及肝肺為俎其祭肉心肺肝各一他如祀户之禮秋祀門祭先肝秋陰氣出祀之於門外陰也祀之先祭肝者秋為陰中於藏直肝肝為尊也祀門之禮北面設主於門左樞乃制肝及肺心為俎奠於主南又設盛於俎東其他皆如祭竈之禮冬祀行祭先腎冬陰盛寒於水祀之於行從辟除之類也祀之先祭腎者陰位在下腎亦在下腎為尊也行在廟門外之西為軷壤厚二寸廣五尺輪四尺祀行之禮北面設主於軷上乃制腎及脾為俎奠於主南又設盛於俎東祭肉腎一脾再其他皆如祀門之禮月令大宗伯以血祭祭五祀陰祀自血起貴氣臭也故書祀作禩鄭司農云禩當為祀書亦或作祀五祀五色之帝於王者宫中曰五祀𤣥謂此五祀者五官之神在四郊四時迎五行之氣於四郊而祭五徳之帝亦食此神焉少昊氏之子曰重為句芒食於木該為蓐收食於金脩及熈為𤣥㝠食於水顓頊氏之子曰黎為祝融后土食於火土司服祭五祀則希冕注見祭社稷章春官三獻文謂祭社稷五祀禮器司門凡嵗時之門受其餘鄭司農云受祭門之餘地官孟冬臘五祀臘謂以田獵所得禽祭也五祀門戸中霤竈行也月令右祭五祀天子崩未殯五祀之祭不行既殯而祭其祭也尸入三飯不侑酳不酢而已矣自啟至於反哭五祀之祭不行已葬而祭祝畢獻而已既葬彌吉畢獻祝而後止郊社亦然唯嘗禘宗廟俟吉也曽子問小宗伯兆五帝於四郊四望亦如之鄭司農云四望道氣出入𤣥謂四望五嶽四鎮四竇春官牧人望祀各以其方之色牲毛之望祀五嶽四鎮四瀆也地官司服祀四望則毳冕毳畫虎蜼謂宗彛也其衣三章裳二章凡五也典瑞兩圭有邸旅四望注見祭地並春官玉人兩圭五寸有邸旅四望注見祭地考工記大司樂乃奏姑洗歌南吕舞大㲈以祀四望姑洗陽聲第三南吕為之合四望五嶽四鎮四竇大祝國將有事於四望則前祝前祝者王出也歸也將有事於此神大祝居前先以祝辭告之春並官五獻察察明也謂祭四望山川也禮器右祀四望三正記曰郊後必有望僖公三十一年夏四月四卜郊不從乃免牲猶三望三望分野之星國中山川皆因郊祀望而祭之魯廢郊天而脩其小祀故曰猶猶者可止之辭猶三望亦非禮也望郊之細也不郊亦無望可也春秋左氏傳宣三年傳云望郊之屬也天子有方望之事方望謂郊時所望祭四方羣神日月星辰風伯雨師五嶽四瀆及餘山川凡三十六所無所不通盡八極之内天之所覆地之所戴無所不至故得郊也諸侯山川有不在其封内者則不祭也故魯郊非禮也三望者何望祭也然則曷祭祭泰山河海曷為祭泰山河海山川有能潤於百里者天子秩而祭之此皆助天宣氣布功故祭天及之秩者隨其大小尊卑髙下所宜禮祭天牲角繭栗社稷宗廟角握六宗五嶽四瀆角尺其餘山川視卿大夫天燎地瘞日月星辰布山縣水沈風磔雨升燎者取俎上七體與其珪寳在辨中置於柴上燒之觸石而出膚寸而合側手為膚案指為寸言其觸石理而興無有膚寸而不合不崇朝而徧雨乎天下者唯泰山爾崇重也不重朝言一朝也河海潤於千里亦能通氣致雨潤澤及於千里韓詩説曰湯時大旱使人禱山川是也郊望非一獨祭三者魯郊非禮故獨祭其大者猶者何通可以已也何以書譏不郊而望祭也譏尊者不食而卑者獨食書者惡失禮也公羊傳楚昭王曰三代命祀祭不越望諸侯望祀竟内山川星辰江漢睢章楚之望也四水在楚界六詳見因祭疾病章哀年左氏傳小宗伯兆山川丘陵墳衍各因其方順其所在春官天子諸侯祭山川嵗徧曲禮天子祭天下名山大川五嶽視三公四瀆視諸侯視視其牲器之數諸尚書大傳云五嶽視三公四瀆視侯其餘山川視伯小者視子男注云謂其牲幣粢盛籩豆爵獻之數非謂尊卑諸侯祭名山大川之在其地者魯人祭泰山晉人祭河是也王制孟春命祀山林川澤犧牲毋用牝為傷姙生之類仲冬天子命有司祈祀四海大川名源淵澤井泉順其徳盛之時祭之也今月令淵為深季冬乃畢山川之祀四時之功成於冬孟月祭其宗至此可以祭其佐也命宰厯卿大夫至於庶民土田之數而賦犧牲以共山林名川之祀此所與卿大夫庶民共者也厯猶次也卿大夫采地亦有大小其非采地以其邑之名多少賦之並月令羊人凡沈共其羊牲小子凡沈飾其牲鄭司農云沈謂祭川爾雅曰祭川曰浮沉並夏官犬人掌犬牲凡沈用駹可也駹謂不純色也秋官司服祀山川則毳冕注見祀四望典瑞璋邸射以祀山川璋有邸而射取殺於四望鄭司農云射剡也並春官玉人璋邸射素功以祀山川邸射剡而出也鄭司農云素功無飾也考工記鬯人凡山川用蜃蜃畫為蜃形蚌曰含漿尊之象春官大司樂乃奏蕤賓歌函鐘舞大夏以祭山川蕤賓陽聲第四函鐘為之合函鐘一名林鐘同上舞師掌教兵舞帥而舞山川之祭祀山虞若祭山林則為主而脩除且蹕為主主辨䕶之也脩除治道路場壇並春官大宗伯以血祭祭五嶽以貍沈祭山川澤陰祀自血起貴氣臭也五嶽東曰岱宗南曰衡山西曰華山北曰恒山中曰嵩髙山不見四竇者四竇五嶽之匹或省文祭山林曰埋川澤曰沈順其性之含藏春官祭山曰庪縣或庪或縣置之於山山海經曰縣以吉玉是也祭川曰浮沈投祭水中或浮或沈爾雅三王之祭川也皆先河而後海學記五獻察注見四望禮器山川之神則水旱癘疫之灾於是乎禜之詳見因祭疾病右祭山川周公祀泰山召公為尸白虎通晉人將有事於河必先有事於惡池惡當為呼聲之誤也呼池嘔夷并州川齊人將有事於泰山必先有事於配林配林林名禮器季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚乎曾謂泰山不如林放乎旅祭名㤗山山名在魯地禮諸侯祭封内山川季氏祭之僭也冉有孔子弟子名求時為季氏宰救謂救其陷於僭竊之罪嗚呼歎辭言神不享非禮欲季氏知其無益而自止又進林放以厲冉有也論語禮書綱目卷三十六
