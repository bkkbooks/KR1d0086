body:
  text: 禮書綱目卷九婺源江永撰鄉射禮嘉禮十四經鄭目録云州長春秋以禮會民而射於州序之禮謂之鄉者州鄉之屬鄉大夫或在焉不改其禮射於五禮屬嘉禮鄉射之禮右篇目周禮州長春秋以禮會民而射於州序序州黨之學也會民而射所以正其志也地官鄉大夫三年則大比考其德行道藝而興賢者能者退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞以用也行鄉射之禮而以五物詢於衆民鄭司農云詢謀也問於衆庶寧復有賢能者和謂閨門之內行也容謂容貌也主皮謂善射射所以觀士也故書舞為無杜子春讀和容為和頌謂能為樂也無讀為舞謂能為六舞玄謂和載六德容包六行庶民無射禮因田獵分禽則有主皮主皮者張皮射之無侯也主皮和容興舞則六藝之射與禮樂與當射之時民必觀焉因詢之也孔子射於矍相之圃蓋觀者如堵牆射至於司馬使子路執弓矢出誓射者又使公罔之裘序點揚觶而語詢衆庶之儀若是乎同上司徒命鄉簡不帥教者以告元日習射上功將習禮以化之使之觀焉鄉禮春秋射王制鄉師正歲稽其鄉器黨共射器鄉共吉凶禮樂之器射器者弓矢楅中之屬黨正主集為之為州長或時射於此黨也禮樂之器若州黨賔射之器者地官主人戒賔賔出迎再拜主人答再拜乃請主人州長也鄉大夫若在焉則稱鄉大夫也戒猶警也語也出迎出門也請告也告賔以射事不言拜辱此為習民以禮樂不主為賔已也不謀賔者時不獻賢能事輕也今郡國行此禮以季春周禮鄉老及鄉大夫三年正月獻賢能之書於王退而以鄉射之禮五物詢衆庶諸侯之鄉大夫既貢士於其君亦用此禮射而詢衆庶乎賔禮辭許主人再拜賔答再拜主人退賔送再拜退還射宮省録射事無介雖先飲酒主於射也其序賔之禮略右戒賔記大夫與則公士為賔不敢使鄉人加尊於大夫也公士在官之士鄉賔主用處士使能不宿戒能者敏於事不待宿戒而習之乃席賔南面東上不言於户牖之間者此射於序衆賔之席繼而西言繼者甫欲習衆庶未有所殊别席主人於阼階上西面阼階東階尊於賔席之東兩壺斯禁左玄酒皆加勺篚在其南東肆斯禁禁切地無足者也設尊者北靣西曰左尚之也肆陳也設洗於阼階東南南北以堂深東西當東榮水在洗東篚在洗西南肆榮屋翼也縣於洗東北西面此縣謂磬也縣於東方辟射位也但縣磬者半天子之士無鐘右設席陳器記尊綌幂賔至徹之以綌為幂取其堅潔蒲筵緇布純筵席也純緣西序之席北上衆賔純於賓乃張侯下綱不及地武侯謂所射布也綱持舌繩也武迹也中人之迹尺二寸侯象人綱即其足也是以取數焉不繫左下綱中掩束之事未至也乏參侯道居侯黨之一西五步容謂之乏所以為獲者御矢也侯道五十步此乏去侯北十丈西三丈右張侯記凡侯天子熊侯白質一條入三射記篇鄉侯上個五尋上個謂最上幅也八尺曰尋上幅用布四丈中十尺方者也用布五丈今官布幅廣二尺二寸旁削一寸考工記曰梓人為侯廣與崇方謂中也侯道五十弓弓二寸以為侯中言侯中所取數也量侯道以貍步而云弓者侯之所取數宜於射器也正二寸骹中之博也今文改弓為肱也倍中以為躬躬身也謂中之上下幅也用布各二丈倍躬以為左右舌謂上個也居兩旁謂之個左右出謂之舌下舌半上舌半者半其出於躬者也用布三丈所以半上舌者侯人之形類也上個象臂下個象足中人張臂八尺張足六尺五八四十五六三十以此為衰也凡鄉侯用布十六丈數起侯道五十弓以計道七十弓之侯用布二十五丈二尺道九十弓之侯用布三十六丈羮定肉謂之羮定猶孰也謂狗孰可食主人朝服乃速賔賔朝服出迎再拜主人答再拜退賔送再拜速召也射賔輕也戒時玄端今郡國行此鄉射禮皮辨服與禮為異賔及衆賔遂從之右速賔記其牲狗也狗取擇人亨於堂東北鄉飲酒義曰祖陽氣之所發也及門主人一相出迎於門外再拜賔答再拜相主人家臣擯贊傳命者揖衆賔差卑禮宜異主人以賔揖先入以猶與也先入入門右西靣賔厭衆賔衆賔皆入門左東靣北上賔少進引手曰厭少進差在前也今文皆曰揖衆賔主人以賔三揖皆行及階三讓主人升一等賔升三讓而主人先升者是主人先讓於賔不俱升者賔客之道進宜難也主人阼階上當楣北面再拜賔西階上當楣北面答再拜主人拜賔至此堂右迎賔記立者東靣北上賔黨主人取爵於上篚以降將獻賔也賔降從主人也主人阼階前西面坐奠爵興辭降重以主人事煩賔也今文無阼階賔對對答主人坐取爵興適洗南面坐奠爵於篚下盥洗盥手又洗爵致潔敬也古文盥皆作浣賔進東北靣辭洗必進者方辭洗宜違位也言東北靣則位南於洗矣主人坐奠爵於篚興對賔反位反從降之位也鄉飲酒曰當西序東靣主人卒洗一揖一讓以賔升賔西階上北面拜洗主人阼階上北面奠爵遂答拜乃降乃降將更盥也今文一皆作一賔降主人辭降賔對主人卒盥一揖一讓升賔升西階上疑立疑止也有矜莊之色主人坐取爵實之賔席之前西北面獻賔進於賔也凡進物曰獻賔西階上北面拜主人少退少退猶少辟也賔進受爵於席前復位復位西階上位主人阼階上拜送爵賔少退薦脯醢薦進賓升席自西方賔升降由下也乃設折俎牲體枝解節折以實俎也主人阼階東疑立賔坐左執爵右祭脯醢奠爵於薦西興取肺坐絶祭卻左手執本右手絶末以祭也肺離上為本下為末尚左手嚌之嚌嘗也右手在下絶以授口嘗之興加於俎坐捝手執爵遂祭酒興席末坐啐酒捝拭也啐嘗也古文捝作説降席坐奠爵拜告旨降席席西也旨美也執爵興主人阼階上答拜賔西階上北面坐卒爵興坐奠爵遂拜執爵興卒盡主人阼階上答拜右獻賔記獻用爵其他用觶爵尊不可褻也凡舉爵三作而不徒爵謂獻賔獻大夫獻工皆有薦獻大夫獻工通用薦脯用籩五膱祭半膱橫於上醢以豆出自東房膱長尺二寸脯用籩籩宜乾物也醢以豆豆宜濡物也膱猶脡也為記者異耳祭橫於上殊之也於人為縮膱廣狹未聞也古文膱為胾今文或作植凡薦通用俎由東壁自西階升狗既亨載於東方賔俎脊脅肩肺主人俎脊脅臂肺肺皆離皆右體也進腠以骨名肉貴骨也賔俎用肩主人用臂尊賔也離猶刲也腠膚理也進理謂前其本右體周所貴也若有尊者則俎其餘體也賔酢章主人俎於此考之以爵拜者不徒作以爵拜謂拜既爵徒猶空也作起也不空起言起必酢主人用獻大夫通賔以虛爵降將洗以酢主人主人降從賔也降立阼階東西面當東序賔西階前東面坐奠爵興辭降主人對賔坐取爵適洗北面坐奠爵於篚下興盥洗賔北面盥洗自外來主人阼階之東南面辭洗賔坐奠爵於篚興對主人反位反位從降之位也主人辭洗進也賔卒洗揖讓如初升主人拜洗賔答拜興降盥如主人之禮賔升賔爵主人之席前東南面酢主人酢報主人阼階上拜賔少退主人進受爵復位賔西階上拜送爵薦脯醢主人升席自北方乃設折俎祭如賔禮祭薦俎及酒亦嚌啐不告旨酒巳物自席前適阼階上北面坐卒爵興坐奠爵遂拜執爵興賔西階上北面答拜自由也啐酒於席末由前降便也主人坐奠爵於序端阼階上再拜崇酒賔西階上答再拜序端東序頭也崇充也謝酒惡相充滿也右賔酢主人之俎見獻賔章主人坐取觶於篚以降將酬賔賔降主人奠觶辭降賔對東面立主人坐取觶洗賔不辭洗不辭洗以其將自飲卒洗揖讓升賔西階上疑立主人實觶酬之阼階上北面坐奠觶遂拜執觶興酬勸酒賔西階上北面答拜主人坐祭遂飲卒觶興坐奠觶遂拜執觶興賔西階上北面答拜主人降洗賔降辭如獻禮以將酌已升不拜洗酬禮殺也賔西階上立主人實觶賔之席前北面酬賔賔西階上拜主人坐奠觶於薦西賔辭坐取觶以興反位賔辭辭主人復親酌已主人阼階上拜送賔北靣坐奠觶於薦東反位酬酒不舉主人揖降賔降東面立於西階西當西序主人將與衆賔為禮賔謙不敢獨居堂右酬賔記凡奠者於左不飲不欲其妨將舉者於右便其舉也舉將舉者於右見下一人觶二人舉觶章主人西南面三拜衆賔衆賔皆答一拜三拜示遍也一拜不備禮也獻賔畢乃與衆賔拜敬不能並主人揖升坐取爵於序端降洗升實爵西階上獻衆賔衆賔之長升拜受者三人長其老者言三人則衆賔多矣國以多德行道藝為榮何常數之有乎主人拜送拜送爵於衆賔右坐祭立飲不拜既爵授主人爵降復位既盡衆賔皆不拜受爵坐祭立飲自第四以下又不拜受爵禮彌略每一人獻則薦諸其席諸於衆賔辨有脯醢薦於其位主人以虛爵降奠於篚不復用右獻衆賔記衆賔之長一人辭洗如賔禮尊之於其黨樂正與立者齒謂其飲之次也尊樂正同於賔黨鄉飲酒記曰與立者皆薦以齒揖讓升賔厭衆賔升衆賔皆升就席一人洗舉觶於賔一人主人之吏升實觶西階上坐奠觶拜執觶興賔席末答拜舉觶者坐祭遂飲卒觶興坐奠觶拜執觶興賔答拜降洗升實之西階上北面將進奠觶賔拜拜受觶舉觶者進坐奠觶於薦西不授賤不敢也賔辭坐取以興若親受然舉觶者西階上拜送賔反奠於其所舉觶者降右一人舉觶將舉者於右見上章大夫若有遵者則入門左謂此鄉之人為大夫者也謂之遵者方以禮樂化民欲其遵法之也其士也於旅乃入鄉大夫士非鄉人禮亦然主於鄉人耳今文遵為僎主人降迎大夫於門內也不出門别於賔賔及衆賔皆降復初位不敢居堂俟大夫入也初位門內東面主人揖讓以大夫升拜至大夫答拜主人以爵降大夫降主人辭降大夫辭洗如賔禮席於尊東尊東明與賔夾尊也不言東上統於尊也升不拜洗主人實爵席前獻於大夫大夫西階上拜進受爵反位主人大夫之右拜送大夫辭加席主人對不去加席辭之者謙不以已尊加賢者也不去者大夫再重席正也賔一重席乃薦脯醢大夫升席設折俎祭如賔禮不嚌肺不啐酒不告旨西階上卒爵拜主人答拜凡所不者殺於賔也大夫升席由東方右獻大夫記若有諸公則如賔禮大夫如介禮無諸公則大夫如賔禮尊卑之差諸公大國之孤也樂作大夫不入後樂賢也大夫降洗將酢主人也大夫若衆則辨獻長乃酢主人復阼階降辭如初卒洗主人盥盥者雖將酌自飲尊大夫不敢褻揖讓升大夫授主人爵於兩楹間復位主人實爵以酢於西階上坐奠爵拜大夫答拜坐祭卒爵拜大夫答拜主人坐奠爵於西楹南再拜崇酒大夫答拜主人復阼階揖降將升賔大夫降立於賔南雖尊不奪人之正禮主人揖讓以賔升大夫及衆賔皆升就席右大夫酢席工於西階上少東樂正先升北面立於其西言少東者明樂正西側階不欲大東辟射位工四人二瑟瑟先相者皆左何瑟面鼓執越內弦右手相入升自西階北面東上工坐相者坐授瑟乃降瑟先賤者先就事也相扶工也面前也鼓在前變於君也執越內弦右手相由便也越瑟下孔所以發越其聲也前越言執者內有弦結手入之淺也相者降立西方笙入立於縣中西面堂下樂相從也縣中磬東立西面乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋不歌不笙不間志在射略於樂也不略合樂者周南召南之風鄉樂也不可略其正也昔大王王季文王始居岐山之陽躬行以成王業至三分天下乃宣周南召南之化本其德之初刑于寡妻至于兄弟以御于家邦故謂之鄉樂用之房中以及朝廷饗燕鄉射飲酒此六篇其風化之原也是以合金石絲竹而歌之工不興告於樂正曰正歌備不興者瞽矇禮略也樂正告於賔乃降樂正降者堂上正樂畢也降立西階東北面主人取爵於上篚獻工大師則為之洗尊之也君賜大夫樂又從之以其人謂之大師也賔降主人辭降大夫不降尊也工不辭洗卒洗升實爵工不興左瑟一人拜受爵左瑟辟主人授爵也一人無太師則工之長者主人阼階上拜送爵薦脯醢使人相祭人相者工飲不拜既爵授主人爵衆工不拜受爵祭飲辨有脯醢不祭祭飲不興受爵坐祭坐飲不洗遂獻笙於西階上不洗者賤也衆工而不洗矣而衆笙不洗者笙賤於衆工正君賜之猶不洗也笙一人拜於下盡階不升堂受爵主人拜送爵階前坐祭立飲不拜既爵升授主人爵衆笙不拜受爵坐祭立飲辨有脯醢不祭主人以爵降奠於篚反升就席亦揖讓以賔升衆賔皆升右樂賔記三笙一和而成聲三人吹笙一人吹和凡四人也爾雅曰笙小者謂之和獻工與笙取爵於上篚既獻奠於下篚其笙則獻諸西階上奠爵於下篚不復用也今文無與笙主人降席自南方禮殺由便側降賔不從降作相為司正禮辭許諾主人再拜司正答拜爵備樂畢將留賔以事為有解倦失禮立司正以監之察儀法也詩云既立之監或佐之史主人升就席右立司正司正洗觶升自西階由楹內適阼階上北面受命於主人洗觶者當酌以表其位顯其事也楹內楹北西階上北面請安於賔傳主人之辭賔禮辭許司正告於主人遂立於楹間以相拜相謂贊主人及賔相拜之辭主人阼階上再拜賔西階上答再拜皆揖就席為已安也今文揖為升司正實觶降自西階中庭北面坐奠觶興退少立奠觶表其位也少立自修正愼其位也古文曰少退立進坐取觶興反坐不祭遂卒觶興坐奠觶拜執觶興洗北面坐奠於其所今文坐取觶無進又曰坐奠之拜興少退北面立於觶南立觶南亦其故擯位未旅旅序也未以次序相酬以將射也旅則禮終也右司正舉觶記司正既舉觶而薦諸其位薦於觶南三耦俟於堂西南面東上司正既立司射選弟子之中德行道藝之高者以為三耦使俟事於此司射適堂西袒決遂取弓於階西兼挾乘矢升自西階階上北面告於賔曰弓矢既具有司請射司射主人之吏也於堂西袒決遂者主人無次隱蔽而已袒左免衣也決猶闓也以象骨為之著右大擘指以鉤弦闓體也遂射韝也以韋為之所以遂弦者也其非射時則謂之拾拾斂也所以蔽膚斂衣也方持弦矢曰挾乘矢四矢也大射曰挾乘矢於弓外見鏃於弣右巨指鉤弦古文挾皆作接賔對曰某不能為二三子許諾言某不能謙也二三子謂衆賔已下司射適阼階上東北面告於主人曰請射於賔賔許司射降自西階階前西面命弟子納射器弟子賔黨之年少者也納內也射器弓矢決拾旌中籌楅豐也賔黨東面主人之吏西面乃納射器皆在堂西賔與大夫之弓倚於西序矢在弓下北括衆弓倚於堂西矢在其上上堂西亷矢亦北括主人之弓矢在東序東亦倚於東序也矢在其下北括司射不釋弓矢遂以比三耦於堂西三耦之南北面命上射曰某御於子命下射曰子與某子射比選次其才相近者也古文曰某從於子司正為司馬兼官由便也立司正為涖酒爾今射司正無事司馬命張侯弟子説束遂繫左下綱事至也今文説皆作稅司馬又命獲者倚旌於侯中為當負侯也獲者亦弟子也謂之獲者以事名之獲者由西方坐取旌倚於侯中乃退樂正適西方命弟子贊工遷樂於下當辟射也贊佐也遷徙也弟子相工如初入降自西階阼階下之東南堂前三笴西面北上坐笴矢也今文無南樂正北面立於其南北面鄉堂不與工序也右請射記子路延射事見後二人舉觶章三耦者使弟子司射前戒之弟子賔黨之少者也前戒謂先射請戒之司射之弓矢與撲倚於西階之西便其事也司射既袒決遂而升司馬階前命張侯遂命倚旌著並行也古文曰遂命獲者倚旌凡挾矢於二指之間橫之二指謂左右手之第二指此以食指將指挾之司射在司馬之北司馬無事不執弓以不主射故也旌各以其物旌總名也雜帛為物大夫士之所建也言各者鄉射或於庠或於榭無物則以白羽與朱羽糅杠長三仞以鴻脰韜上二尋無物者謂小國之州長也其鄉大夫一命其州長士不命不命者無物此翿旌也翿亦所以進退衆者糅者雜也杠橦也七尺曰仞鴻鳥之長脰者也八尺曰尋今文糅為縮韜為翿司射猶挾乘矢以命三耦各與其耦讓取弓矢拾猶有故之辭拾更也三耦皆袒決遂有司左執弣右執弦而授弓有司弟子納射器者也凡納射器者皆執以俟事遂授矢受於納矢而授之三耦皆執弓搢三而挾一個未違俟處也搢捷也捷於帶右司射先立於所設中之西南東面三耦皆進由司射之西立於其西南東面北上而俟司射東靣立於三耦之北搢三而挾一個為當誘射也固東面矣復言之者明却時還揖進當階北面揖及階揖升堂揖豫則鉤楹內堂則由楹外當左物北面揖鉤楹繞楹而東也序無室可以湥也周立四代之學於國而又以有虞氏之庠為鄉學鄉飲酒義曰主人迎賔於庠門外是也庠之制有堂有室也今言豫者謂州學也讀如成周宣榭災之榭周禮作序凡屋無室曰榭宜從榭州立榭者下鄉也左物下物也今文豫為序序乃夏后氏之學亦非也及物揖左足履物不方足還視侯中俯正足方猶併也志在於射左足至右足還併足則是立也南面視侯之中乃俯視併正其足不去旌以其不獲誘射誘猶教也將乘矢將行也行四矢象有事於四方執弓不挾右執弦不挾矢盡南面揖揖如升射降出於其位南適堂西改取一個挾之改更也不射而挾之示有事也今文曰適序西遂適階西取撲搢之以反位撲所以撻犯教者書云撲作教刑右誘射記射自楹間物長如笴其間容弓距隨長武自楹間者謂射於庠也楹間中央東西之節也物謂射時所立處也謂之物者物猶事也君子所有事也長如笴者謂從畫之長短也笴矢幹也長三尺與跬相應射者進退之節也間容弓者上下射相去六尺也距隨者物橫畫也始前足至東頭為距從足來合而南面為隨武迹也尺二寸序則物當棟堂則物當楣是制五架之屋也正中曰棟次曰楣前曰屐楚撲長如笴刋本尺刋其可持處射者有過則撻之過謂矢揚中人凡射時矢中人當刑之今鄉會衆賢以禮樂勸民而射者中人本意在侯去傷害之心逺是以輕之以撲撻於中庭而已書曰撲作教刑司馬命獲者執旌以負侯欲令射者見侯與旌深有志於中獲者適侯執旌負侯而俟俟待也今文俟為立司射還當上耦西面作上耦射還左還也作使也司射反位上耦揖進上射在左並行當階北面揖及階揖上射先升三等下射從之中等中猶間也上射升堂少左下射升上射揖並行並併也併東行皆當其物北面揖及物揖皆左足履物還視侯中合足而俟司馬適堂西不決遂袒執弓不決遂因不射不備出於司射之南升自西階鉤楹由上射之後西南面立於物間右執簫南揚弓命去侯鉤楹以當由上射者之後也簫弓末也大射曰左執弣揚猶舉也獲者執旌許諾聲不絶以至於乏坐東面偃旌興而俟聲不絶不以宮啇不絶而已鄉射威儀省偃猶仆也司馬出於下射之南還其後降自西階反由司射之南適堂西釋弓襲反位立於司射之南圍下射者明為二人命去侯司射進與司馬交於階前相左由堂下西階之東北面視上射命曰無射獲無獵獲上射揖司射退反位射獲謂矢中人也獵矢從旁乃射上射既發挾弓矢而后下射射拾發以將乘矢后後也當從后獲者坐而獲射者中則大言獲獲得也射講武田之類是以中為獲也舉旌以宮偃旌以啇宮為君商為臣聲和律呂相生獲而未釋獲但大言獲未釋其算卒射皆執弓不挾南面揖揖如升射不挾亦右執弦如司射上射降三等下射少右從之中等並行上射於左降下與升射者相左交於階前相揖由司馬之南適堂西釋弓説決拾襲而俟於堂西南面東上三耦卒射亦如之司射去撲倚於西階之西升堂北面告於賔曰三耦卒射去撲乃升不敢佩刑器即尊者之側賔揖以揖然之司射降搢撲反位右初射獲而未釋獲記命負侯者由其位於賤者禮略上射於右於右物射始射獲而未釋獲復釋獲復用樂行之君子取人以漸凡適堂西皆出入於司馬之南唯賔與大夫降階遂西取弓矢尊者宜逸由便也司馬適堂西袒執弓由其位南進與司射交於階前相左升自西階鉤楹自右物之後立於物間西南面揖弓命取矢揖推之也獲者執旌許諾聲不絶以旌負侯而俟俟弟子取矢以旌指教之司馬出於左物之南還其後降自西階遂適堂前北面立於所設楅之南命弟子設楅楅猶幅也所以承笴齊矢者乃設楅於中庭南當洗東肆東肆統於賔司馬由司射之南退釋弓於堂西襲反位弟子取矢北面坐委於楅北括乃退司馬襲進當楅南北面坐左右撫矢而乘之撫拊之也就委矢左右手撫而四四數分之也上既言襲矣復言之者嫌有事即袒也凡事升堂乃袒若矢不備則司馬又袒執弓如初升命曰取矢不索索猶盡也弟子自西方應曰諾乃復求矢加於楅增故曰加嚮獲者許諾至此弟子曰諾事同互相明右取矢記楅長如笴博三寸厚寸有半龍首其中蛇交韋當博廣也兩端為龍首中央為蛇身相交也蛇龍君子之類也交者象君子取矢於楅上也直心背之衣曰當以丹韋為之司馬左右撫矢而乘之分委於當楅髤橫而奉之南面坐而奠之南北當洗髤赤黑漆也子奉本作拳朱正作奉今從之司射倚撲於階西升請射於賔如初賔許諾賔主人大夫若皆與射則遂告於賔適阼階上告於主人主人與賔為耦言若者或射或否在時欲耳射者繹已之志君子務焉大夫遵者也告賔曰主人御於子告主人曰子與賔射遂告於大夫大夫雖衆皆與士為耦以耦告於大夫曰某御於子大夫皆與士為耦謙也來觀禮同爵自相與耦則嫌自尊别也大夫為下射而云御於子尊大夫也士謂衆賔之在下者及羣士來觀禮者也禮一命已下齒於鄉里西階上北面作衆賔射作使司射降搢撲由司馬之南適堂西立比衆耦衆耦大夫耦及衆賔也命大夫之耦曰子與某子射其命衆耦如三耦衆賔將與射者皆降由司馬之南適堂西繼三耦而立東上大夫之耦為上若有東面者則北上言若有者大夫士來觀禮者及衆賔多無數也賔主人與大夫皆未降言未降者見其志在射司射乃比衆耦辨衆賔射者降比之耦乃遍遂命三耦拾取矢司射反位反位者俟其袒決遂來三耦拾取矢皆袒決遂執弓進立於司馬之西南必袒決遂者明將有射事司射作上耦取矢作之者還當上耦如作射司射反位上耦揖進當楅北面揖及楅揖當楅楅正南之東西上射東面下射西面上射揖進坐橫弓卻手自弓下取一個兼諸弣順羽且興執弦而左還退反位東面揖橫弓者南踣弓也郤手由弓下取矢者以左手在弓表右手從裏取之便也兼并矢於弣當順羽既又當執弦也順羽者手放而下備不整理也不言毋周在阼非君周可也下射進坐橫弓覆手自弓上取一個興其他如上射覆手由弓上取矢者以左手在弓裏右手從表取之亦便既拾取乘矢揖皆左還南面揖皆少進當楅南皆左還北面搢三挾一個楅南鄉當楅之位揖皆左還上射於右上射轉居右便其反位也下射左還少南行乃西面與進者相左相揖反位相左皆由進者之北三耦拾取矢亦如之後者遂取誘射之矢兼乘矢而取之以授有司於西方而后反位取誘射之矢挾五個弟子逆受於東面位之後衆賔未拾取矢皆袒決遂執弓搢三挾一個由堂西進繼三耦之南而立東面北上大夫之耦為上未猶不也衆賔不拾者未射無楅上矢也言此者嫌衆賔三耦同倫初時有射者後乃射有拾取矢禮也右再請射記取誘射之矢者既拾取矢而後兼誘射之乘矢而取之謂反位已禮成乃更進取之不相因也司射作射如初一耦揖升如初司馬命去侯獲者許諾司馬降釋弓反位司射猶挾一個去撲與司馬夾於階前升請釋獲於賔猶有故之辭司射既誘射恆執弓挾矢以掌射事備尚未知當教之也今三耦卒射衆足以知之矣猶挾之者君子不必也賔許降搢撲西面立於所設中之東北面命釋獲者設中遂視之視之當教釋獲者執鹿中一人執算以從之鹿中謂射於榭也於庠當兕中釋獲者坐設中南當楅西當西序東面興受算坐實八算於中橫委其餘於中西南末興共而俟興還北面受算反東面實之司射遂進由堂下北面命曰不貫不釋貫猶中也不中正不釋算也古文貫作關上射揖司射退反位釋獲者坐取中之八算改實八算於中興執而俟執所取算乃射若中則釋獲者坐而釋獲每一個釋一算上射於右下射於左若有餘算則反委之委餘算禮尚異也委之合於中西又取中之八算改實八算於中興執而俟三耦卒射右再射釋獲記鹿中髤前足跪鑿背容八算釋獲者奉之先首前足跪者象教擾之獸受負也箭籌八十箭篠也籌算也籌八十者略以十耦為正貴全數其時衆寡從賔長尺有握握素握本所持處也素謂刋之也刋本一作膚衆賔不與射者不降不以無事亂有事今文與為豫大夫降立於堂西以俟射尊大夫不使久列於射位賔主人大夫揖皆由其階降揖主人堂東袒決遂執弓搢三挾一個賔於堂西亦如之皆由其階階下揖升堂揖主人為下射皆當其物北面揖及物揖乃射卒南面揖皆由其階階上揖降階揖賔序西主人序東皆釋弓説次拾襲反位升及階揖升堂揖皆就席或言堂或言序亦為庠榭互言也賔主人射大夫止於堂西大夫袒決遂執弓搢三挾一個由堂西出於司射之西就其耦大夫為下射揖進耦少退揖如三耦及階耦先升卒射揖如升射耦先降降階耦少退皆釋弓於堂西襲耦遂止於堂西大夫升就席耦於庭不並行尊大夫也在堂如上射之儀近其事得申衆賔繼射釋獲皆如初司射所作唯上耦於是言唯上耦者嫌賔主人射亦作之大射三耦卒射司射請於公及賔卒射釋獲者遂以所執餘獲升自西階盡階不升堂告於賔曰左右卒射降反位坐委餘獲於中西興共而俟司射不告卒射者釋獲者於是有事宜終之也餘獲餘算也無餘算則空手耳俟俟數也右賔主大夫衆賔射記賔主人射則司射擯升降卒射即席而反位卒事擯賔主人升降者皆尊之也不使司馬擯其升降主於射大夫與士射袒纁襦不肉袒殊於耦耦少退於物下大夫也既發則然司馬袒決執弓升命取矢如初獲者許諾以旌負侯如初司馬降釋弓反位弟子委矢如初大夫之矢則兼束之以茅上握焉兼束大夫矢優之是以不拾也束於握上則兼取之順羽便也握謂中央也不束主人矢不可以殊於賔也言大夫之矢則矢有題識也肅慎氏貢楛矢銘其括今文上作尚司馬乘矢如初司射遂適西階西釋弓去撲襲進由中東立於中南北面視算釋弓去撲射事已釋獲者東面於中西坐先數右獲固東面矣復言之者為其少南就右獲二算為純純猶全也耦隂陽一純以取實於左手十純則縮而委之縮從也於數者東西為從古文縮皆為蹙每委異之易校數有餘純則橫於下又異之也自近為下一算為竒竒則又縮諸純下竒猶虧也又從之興自前適左東面起由中東就左獲少北於故東面鄉之坐兼斂算實於左手一純以委十則異之變於右其餘如右獲謂所縮所橫司射復位釋獲者遂進取賢獲執以升自西階盡階不升堂告於賔賢獲勝黨之算也齊之而取其餘若右勝則曰右賢於左若左勝則曰左賢於右以純數告若有竒者亦曰竒賢猶勝也言賢者射之以中為雋也假如右勝告曰右賢於左若干純若干竒若左右鈞則左右皆執一算以告曰左右鈞降復位坐兼斂算實八算於中委其餘於中西興共而俟右取矢視算記司射釋弓矢視算與獻釋獲者釋弓矢惟此二事休武主文釋弓矢耳然則擯升降不釋司射適堂西命弟子設豐將飲不勝者設豐所以承其爵也豐形蓋似豆而卑弟子奉豐升設於西楹之西乃降勝者之弟子洗觶升酌南面坐奠於豐上降袒執弓反位勝者之弟子其少者也耦不酌下無能也酌者不授爵略之也執弓反位不俟其黨已酌有事司射遂袒執弓挾一個搢撲北靣於三耦之南命三耦及衆賔勝者皆袒決遂執張弓執張弓言能用之也右手執弦如卒射不勝者皆襲説決拾郤左手右加弛弓於其上遂以執弣固襲説決拾矣復言之者起勝者也執弛弓言不能用之也兩手執弣又不得執弦司射先反位居前俟所命來三耦及衆射者皆與其耦進立於射位北上司射作升飲者如作射一耦進揖如升射及階勝者先升堂少右先升尊賢也少右辟飲者也亦相飲之位不勝者進北面坐取豐上之觶興少退立卒觶進坐奠於豐下興揖立卒觶不祭不拜受罰爵不備禮也右手執觶左手執弓不勝者先降後升先降略之不由次與升飲者相左交於階前相揖出於司馬之南遂適堂西釋弓襲而俟俟復射有執爵者主人使贊者代弟子酌也於既升飲而升自西階立於序端執爵者坐取觶實之反奠於豐上升飲者如初每者輒酌以至於遍三耦卒飲賔主人大夫不勝則不執弓執爵者取觶降洗升實之以授於席前優尊也受觶以適西階上北面立飲受罰爵者不宜自尊别卒觶授執爵者反就席大夫飲則耦不升以賔主人飲耦在上嫌其升若大夫之耦不勝則亦執弛弓特升飲尊者可以孤無能對衆賔繼飲射爵者辨乃徹豐與觶徹猶除也設豐者反豐於堂西執爵者反觶於篚右飲不勝者記主人亦飲於西階上就射爵而飲也已無俊才不可以辭罰司馬洗爵升實之以降獻獲者於侯鄉人獲者賤明其主以侯為功得獻也薦脯醢設折俎俎與薦皆三祭皆三祭為其將祭侯也祭侯三處也獲者負侯北面拜受爵司馬西面拜送爵負侯負侯中也拜送爵不同靣者辟正主也其設薦俎西面錯以南為上為受爵於侯薦之於位古文曰再拜受爵獲者執爵使人執其薦與爼從之適右個設薦俎獲者以侯為功是以獻焉人謂主人贊者上設薦俎者也為設籩在東豆在西俎當其北也言使設新之獲者南面坐左執爵祭脯醢執爵興取肺坐祭遂祭酒為侯祭也亦二手祭酒反注如大射興適左個中亦如之先祭左個後中者以外即之至中若神在中也左個之西北三步東面設薦俎獲者薦右東面立飲不拜既爵不就乏者明其享侯之餘也立飲薦右近司馬於是司馬北面司馬受爵奠於篚復位獲者執其薦使人執俎從之辟設於乏南遷設薦俎就乏明已所得禮也言辟之者不使當位辟舉旌偃旌也設於南右之也凡他薦俎皆當其位之前獲者負侯而俟司射適階西釋弓矢去撲説決拾襲適洗洗爵升實之以降獻釋獲者於其位少南薦脯醢折俎有祭不當其位辟中釋獲者薦右東面拜受爵司射北面拜送爵釋獲者就其薦坐左執爵祭脯醢興取肺坐祭遂祭酒興司射之西北面立飲不拜既爵司射受爵奠於篚釋獲者少西辟薦反位辟薦少西之者為復射妨司射視算也亦辟俎右獻獲者及釋獲者記獲者之俎折脊脅肺臑臑若膊胳觳折之以大夫之餘體東方謂之右個侯以鄉堂為面也釋獲者之俎折脊脅肺皆有祭皆皆獲者也祭祭肺也以言肺謂刌肺不離嫌無祭肺司射適堂西袒決遂取弓於階西挾一個搢撲以反位為將復射司射去撲倚於階西升請射於賔如初賔許司射降搢撲由司馬之南適堂西命三耦及衆賔皆袒決遂執弓就位位射位也不言射者以當序取矢司射先反位言先三耦及衆賔也既命之即反位不俟之也嚮不言先三耦未有拾取矢位無所先三耦及衆賔皆袒決遂執弓各以其耦進反於射位以猶與也今文以為與司射作拾取矢三耦拾取矢如初反位賔主人大夫降揖如初主人堂東賔堂西皆袒決遂執弓皆進階前揖南面相俟而揖行也及楅揖拾取矢如三耦及楅當楅東西也主人西面賔東面相揖拾取矢不北面揖由便也卒北面搢三挾一個亦於三耦為之位揖退皆已揖左還各由其塗反位賔堂西主人堂東皆釋弓矢襲及階揖升堂揖就席將袒先言主人將襲先言賔尊賔也大夫袒決遂執弓就其耦降袒決遂於堂西就其耦於射位與之拾取矢揖皆進如三耦耦東面大夫西面大夫進坐説矢束説矢束者下耦以將拾取興反位而后耦揖進坐兼取乘矢順羽而興反位揖兼取乘矢者尊大夫不敢與之拾也相下相尊君子之所以相接也大夫進坐亦兼取乘矢如其耦北面搢三挾一個亦於三耦為之位揖退耦反位大夫遂適序西釋弓矢襲升即席大夫不序於下尊也衆賔繼拾取矢皆如三耦以反位右三請射記大夫説矢束坐説之明不自尊别也司射猶挾一個以進作上射如初一耦揖升如初進前也嚮言還當上耦西靣是言進終始互相明也今文或言作升射司馬升命去侯獲者許諾司馬降釋弓反位司射與司馬交於階前去撲襲升請以樂樂於賔賔許諾司射降搢撲東面命樂正曰請以樂樂於賔賓許東面於西階之前也不就樂正命之者傳尊者之命於賤者遙號令之可也樂正亦許諾猶北面不還以賓在堂司射遂適階間堂下北面命曰不鼓不釋不與鼓節相應不釋算也鄉射之鼓五節歌五終所以將八矢一節之間當拾發四節四拾其一節先以聽也上射揖司射退反位樂正東面命大師曰奏騶虞間若一東面者進還鄉大師也騶虞國風召南之詩篇也射義曰騶虞者樂官備也其詩有一發五豝五豵于嗟騶虞之言樂得賢者衆多嘆思至仁之人以充其官此天子之射節也而用之者方有樂賢之志取其宜也其他賓客鄉大夫則歌采蘋間若一者重節大師不興許諾樂正退反位乃奏騶虞以射三耦卒射賔主人大夫衆賔繼射釋獲如初卒射降皆應鼓與歌之節乃釋算降者衆賓釋獲者執餘獲升告左右卒射如初卒已也今文曰告於賔右三射用樂記歌騶虞若采蘋皆五終射無算謂衆賔繼射者衆賔無數也每一耦射歌五終也司馬升命取矢獲者許諾司馬降釋弓反位弟子委矢司馬乘之皆如初司射釋弓視算如初算獲算也今文曰視數也釋獲者以賢獲與鈞告如初降復位右取矢視算司射命設豐實觶如初遂命勝者執張弓不勝者執弛弓升飲如初右飲不勝者司射猶袒決遂左執弓右執一個兼諸弦面鏃適堂西以命拾取矢如初側持弦矢曰執面猶尚也并矢於弦尚其鏃將止變於射也司射反位三耦及賔主人大夫衆賔皆袒決遂拾取矢如初矢不挾兼諸弦弣以退不反位遂授有司於堂西不挾亦謂執之如司射也不以反射位授有司者射禮畢辨拾取矢揖皆升就席謂賔大夫及衆賔也相俟堂西進立於西階之前主人以賔揖升大夫及衆賔從升立時少退於大夫三耦及弟子自若留下司射乃適堂西釋弓去撲説決拾襲反位司馬命弟子説侯之左下綱而釋之説解也釋之不復射掩束之命獲者以旌退命弟子退楅司射命釋獲者退中與算而俟諸所退皆俟堂西備復射也旌言以者旌恆執也獲者釋獲者亦退其薦俎右三射畢司馬反為司正退復觶南而立當監旅酬樂正命弟子贊工即位弟子相工如其降也升自西階反坐贊工遷樂也降時如初入樂正反自西階東北面賓北面坐取俎西之觶興阼階上北面酬主人主人降席立於賔東賔坐奠觶拜執觶興主人答拜賔不祭卒觶不拜不洗實之進東南靣所不者酬而禮殺也賔立飲主人阼階上北面拜賔少退少退少逡巡也主人進受觶賔主人之西北面拜送旅酬而同階禮殺也賔揖就席主人以觶適西階上酬大夫大夫降席立於主人之西如賔酬主人之禮其既實觶進西南面立鄉所酬主人揖就席若無大夫則長受酬亦如之長謂以長幼之次酬衆賓司正升自西階相旅作受酬者曰某酬某子某者字也某子者氏也稱酬者之字受酬者曰某子旅酬下為上尊之也春秋傳曰字不若子此言某酬某子者射禮略於飲酒飲酒言某子受酬以飲酒為主受酬者降席司正退立於西序端東面退立俟後酬者也始升相立階西北面衆受酬者拜興飲皆如賔酬主人之禮辨遂酬在下者皆升受酬於西階上在下謂賓黨也鄉飲酒記曰主人之贊者西面北上不與無算爵然後與此異於賔卒受者以觶降奠於篚司正降復位右旅酬記古者於旅也語禮成樂備乃可以言語先王禮樂之道也疾今人慢於禮樂之盛言語無節故追古道也凡旅不洗敬殺不洗者不祭不盛既旅士不入從正禮也既旅則將燕矣士入齒於鄉人使二人舉觶於賔與大夫二人主人之贊者舉觶者皆洗觶升實之西階上北面皆坐奠觶拜執觶興賔與大夫皆席末答拜舉觶者皆坐祭遂飲卒觶興坐奠觶拜執觶興賔與大夫皆答拜舉觶者逆降洗升實觶皆立於西階上北面東上賔與大夫拜舉觶者皆進坐奠於薦右坐奠之不敢授賔與大夫辭坐受觶以興辭辭非坐奠觶舉觶者退反位皆拜送乃降賔與大夫反奠於其所興不舉者盛禮已崇古文曰反坐若無大夫則唯賓長一人舉觶如燕禮媵爵之為右二人舉觶將舉者於右見酬賔章孔子射於矍相之圃蓋觀者如堵墻矍相地名也藝菜蔬曰圃射至於司馬使子路執弓矢出延射曰賁軍之將亡國之大夫與為人後者不入其餘皆入蓋去者半入者半先行飲酒禮將射乃以司正為司馬子路執弓矢出延射則為司射也延進也出進觀者欲射者也賁讀為僨僨猶覆敗也亡國亡君之國者也與猶竒也後人者一人而已既有為者而往竒之是貪財也子路陳此三者而觀者畏其義則或去也延或為誓又使公罔之裘序點揚觶而語公罔之裘揚觶而語曰幼壯孝弟耆耋好禮不從流俗修身以俟死者不在此位也蓋去者半處者半序點又揚觶而語曰好學不倦好禮不變旄期稱道不亂者不在此位也蓋㢙有存者之發聲也射畢又使此二人舉觶者古者於旅也語語謂説義理也三十曰壯耆耋皆老也流俗失俗也處猶留也八十九十曰旄百年曰期頥稱猶言也道猶行也不字讀作否言有此行否可以在此賔位也序或為徐壯或為將期或為勤今禮揚皆作騰射義司正升自西階阼階上受命於主人適西階上北面請坐於賓請坐欲與賔燕盡殷勤也至此盛禮已成酒清肴乾強有力者猶倦焉賔辭以俎俎者肴之貴者也辭之者不敢以燕坐褻貴肴反命於主人主人曰請徹俎賔許司正降自西階階前命弟子俟徹俎弟子賔黨也俎者主人贊者設之今賔辭之使其黨俟徹順賔意也上言請坐於賔此言主人曰互相備耳司正升立於序端賔降席北面主人降席自南方阼階上北面大夫降席席東南面俟弟子升受俎賔取俎還授司正司正以降自西階賔從之降遂立於階西東面司正以俎出授從者授賔家從來者也古者與人飲食必歸其盛者所以厚禮之主人取俎還授弟子弟子受俎降自西階以東主人降自阼階西面立以東授主人侍者大夫取俎還授弟子弟子以降自西階遂出授從者大夫從之降立於賔南凡言還者明取俎各自鄉其席衆賔皆降立於大夫之南少退北上從降亦為將燕右徹俎主人以賓揖讓説屨乃升大夫及衆賔皆説屨升坐説屨者將坐空屨褻賤不宜在堂也説屨則摳衣為其被地乃羞羞進也所進者狗胾醢也燕設啖具所以索酒無算爵使二人舉觶賔與大夫不興取奠觶飲卒觶不拜二人謂嚮者二人也使之升立於西階上賔與大夫將旅當執觶也卒觶者固不拜矣著之者嫌坐卒爵者拜既爵此坐於席禮既殺不崇執觶者受觶遂實之賓觶以之主人大夫之觶長受長衆賔長而錯皆不拜錯者實主人之觶以之次賓也實賓長之觶以之次大夫其或多者迭飲於坐而已皆不拜受禮又殺也辨卒受者興以旅在下者於西階上衆賓之末飲而酬主人之贊者大夫之末飲而酬賓黨亦錯焉不使執觶者酌以其將旅酬不以巳尊於人也其末若皆衆賔則先酬主人之贊者若皆大夫則先酬賓黨而已執觶者酌在上辨降復位長受酬酬者不拜乃飲卒觶以實之言酬者不拜者嫌酬堂下異位當拜也古文曰受酬者不拜受酬者不拜受禮殺雖受尊者之酬猶不拜辨旅皆不拜主人之贊者於此始旅嫌有拜執觶者皆與旅嫌已飲不復飲也上使之勸人耳非逮下之惠也亦自以齒與於旅也卒受者以虛觶降奠於篚執觶者洗升實觶反奠於賓與大夫復奠之者燕以飲酒為歡醉乃止主人之意也今文無執觶及賔觶大夫之觶皆為爵實觶觶為之無算樂合鄉樂無次數右燕賓興樂正命奏陔陔陔夏其詩亡周禮賔醉而出奏陔夏陔夏者天子諸侯以鐘鼓大夫士鼓而已賓降及階陔作賓出衆賓皆出主人送於門外再拜拜送賓於門東西面賓不答拜禮有終右賓出記大夫後出下鄉人不干其賓主之禮主人送於門外再拜拜送大夫尊之也主人送賔還入門揖大夫乃出拜送之明日賓朝服以拜賜於門外拜賜謝恩惠也主人不見如賔服遂從之拜辱於門外乃退不見不褻禮也拜辱謝其自屈辱右拜賜主人釋服乃息司正釋服説朝服服玄端也息猶勞也勞司正謂賓之與之飲酒以其昨日尤勞倦也月令曰勞農以休息之無介勞禮略貶於飲酒也此已下皆記禮之異者不殺無俎故也使人速速召賔迎於門外不拜入升不拜至不拜洗薦脯醢無俎賔酢主人主人不崇酒不拜衆賔既獻衆賔一人舉觶遂無算爵言遂者明其間闕也賔坐奠觶於其所擯者遂受命於主人請坐於賓賓降説屨升坐矣不言遂請坐者請坐主於無算爵無司正使擯者而已不立之賔不與昨日至尊不可褻也古文與作豫徴唯所欲徴召也謂所欲請呼以告於鄉先生君子可也告請也鄉先生鄉大夫致仕者也君子有大德行不仕者羞唯所有用時見物鄉樂唯欲不歌雅頌取周召之詩在所好右息司正禮書綱目卷九
