body:
  text: 禮書綱目卷三十七婺源江永撰百神吉禮四補有天下者祭百神詳祭法凡以神仕者以冬日至致天神人鬼以夏日至致地示物魅以禬國之凶荒民之札喪天人陽也地物陰也陽氣升而祭人鬼陰氣升而祭地祗物魅所以順其為人與物也致人鬼於祖廟致物魅於墠壇蓋用祭天地之明日百物之神曰魅春秋傳曰魑魅魍魎杜子春云禬除也玄謂此禬讀如潰癕之潰春官右總要埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也鄭注見祭法案孔安國王肅皆以此為六宗右六宗禋于六宗精意以享謂之禋宗尊也所尊祭者其祀有六謂四時也寒暑也日也月也星也水旱也祭亦以攝告舜典宰我曰敢問禋于六宗何謂也孔子曰所宗者六皆潔祀之也埋少牢於太昭所以祭時也祖迎於坎壇所以祭寒暑也主於郊宫所以祭日也夜明所以祭月也幽禜所以祭星也雩禜所以祭水旱也禋于六宗此之謂也孔叢子天子祭四方嵗遍諸侯方祀嵗遍祭四方謂祭五官之神於四郊也句芒在東祝融后土在南蓐收在西玄冥在北詩云來方禋祀方祀者各祭其方之官而已曲禮四坎壇祭四方也四方即謂山林川谷丘陵之神也祭山林丘陵於壇川谷於坎每方各為坎為壇祭法大司馬中春教治兵遂以獮田致禽以祀祊祊當為方聲之誤也秋田主祭四方報成萬物詩曰以社以方夏官季秋天子乃厲飭執弓挾矢以獵命主祠祭禽於四方以所獲禽祀四方之神也司馬職曰羅弊致禽以祀方夏官鬯人凡四方用蜃蜃漆尊也畫為蜃形蚌曰含漿尊之象春官舞師教羽舞帥而舞四方之祭祀羽析羽為之形如帗也四方之祭祀謂四望也地官右四方以我齊眀與我犧羊以社以方方秋祭四方報成萬物周禮所謂羅弊獻禽以祀祊是也來方禋祀以其騂黑與其黍稷曽孫之來又禋祀四方之神而賽禱焉四方各用其方色之牲此言騂黑舉南北以見其餘也雅並小方社不莫方祭四方也大雅小宗伯兆五帝於四郊四類亦如之兆為壇之禜域鄭司農云四類三皇五帝九皇六十四民咸祀之玄謂四類日月星辰運行無常以氣類為之位兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊春官右四類司民三年大比以萬民之數詔司冦司冦及孟冬祀司民之日獻其數於王王拜受之登於天府鄭司農云文昌宫三能屬軒轅角相與為體近文昌為司命次司中次司祿次司民玄謂司民軒轅角也天府主祖廟之藏者小司冦孟冬祀司民獻民數於王王拜受之司民星名謂軒轅角也小司冦於祀司民而獻民數於王重民也並秋官天府若祭天之司民司祿而獻民數穀數則受而藏之司民軒轅角也司祿文昌第六星或曰下能也祿之言穀也年穀登乃後制祿祭此二星者以孟冬既祭之而上民穀之數於天府春官右司民司祿季春天子乃薦鞠衣於先帝為將蠶求福祥之助也鞠衣黃桑之服先帝大皥之屬令月右先帝凡始立學者必釋奠於先聖先師及行事必以幣謂天子命之教始立學官者也先聖周公若孔子凡釋奠者必有合也國無先聖先師則所釋奠者當與鄰國合也有國故則否若唐虞有夔伯夷周有周公魯有孔子則各自奠之不合也陳氏曰凡行釋奠之禮必有合樂之事若國有凶喪之故則雖釋奠不合樂也始立學者既興器用幣興當為釁字之誤也禮樂之器成則釁之又用幣告先聖先師以器成然後釋菜告先聖先師以器成有時將用也不舞不授器釋菜禮輕也釋奠則舞舞則授器司馬之屬司兵司戈盾祭祀授舞者兵也乃退儐於東序一獻無介語可也言乃退者謂得立三代之學者釋菜於虞庠則儐賓於東序魯之學有米廪東序瞽宗也文王世子大司樂掌成均之法凡有道者有德者使教焉死則以為樂祖祭於瞽宗成均五帝學名道多才藝者德能躬行者若舜命夔典樂教胄子是也死則以為樂之祖神而祭之鄭司農云瞽樂人樂人所共宗也或曰祭於瞽宗祭於廟中明堂位曰瞽宗殷學也泮宫周學也以此觀之祭於學宫中春官祀先賢於西學西學周小學也先賢有道德王所使教國子者祭義凡學春官釋奠於其先師秋冬亦如之官謂禮樂詩書之官周禮曰凡有道者有德者使教焉死則以為樂祖祭於瞽宗此之謂先師之類也若漢禮有髙堂生樂有制氏詩有毛公書有伏生億可以為之也不言夏夏從春可知也釋奠者設薦饌酌奠而已無迎尸以下之事文王世子大胥春入學舍菜合舞春始以學士入學宫而學之合舞等其進退使應節奏鄭司農云舍菜謂舞者皆持芬香之菜或曰古者士見於君以雉為摯見於師以菜為摯菜直謂疏食菜羮之菜或曰學者皆人君卿大夫之子衣服采飾舍采者減損解釋盛服以下其師也月令仲春之月上丁命樂正習舞釋采仲丁又命樂正入學習樂玄謂舍即釋也采讀為菜始入學必釋菜禮先師也菜蘋蘩之屬秋頒學合聲春使之學秋頒其才藝所為合聲亦等其曲折使應節奏春官孟春命樂正入學習舞為仲春將釋菜仲春上丁命樂正習舞釋菜樂正樂官之長也合習舞者順萬物始出地鼓舞也將舞必釋菜於先師以禮之夏小正曰丁亥萬用入學天子乃帥三公九卿諸侯大夫親往視之順時達物也並月令天子視學大昕鼓徵早昧爽擊鼓以召衆也周禮凡用樂大胥以鼓徵學士衆至然後天子至乃命有司行事興秩節祭先師先聖焉興猶舉也秩常也節猶禮也使有司攝其事舉常禮祭先師先聖不親祭之者視學觀禮耳非為彼報也有司卒事反命告祭畢也祭畢天子乃入始之養也又之養老之處凡大合樂必遂養老是以養焉言始始立學也適東序釋奠於先老親奠之者已所有事也養老東序則是視學於上庠文王世子右先聖先師大學始教皮辨祭菜示敬道也皮辨天子之朝服也祭菜禮先聖先師菜謂芹藻之屬學記司勳凡有功者銘書於王之大常祭於大蒸司勳詔之銘之言名也生則書於王旌以識其人與其功也死則於蒸先王祭之詔謂告其神以辭也盤庚告其卿大夫曰兹豫大享于先王爾祖其從與享之是也今漢祭功臣於廟庭夏官右有功盤庚曰古我先王暨乃祖乃父胥及逸勤豫敢動用非罰世選爾勞豫不掩爾善兹豫大享于先王爾祖其從與享之古者天子録功臣配食於廟大享蒸嘗也所以不掩汝善尚書書曰兹豫大享于先王爾祖其從與享之季桓子問曰此何謂也孔子曰古之王者臣有大功死則必祀之於廟所以殊有績勸忠勤也盤庚舉其事以厲其世臣故稱焉桓子曰天子之臣有大功者則既然矣諸侯之臣有大功者可以如之乎孔子曰勞能定國功加於民大臣死難雖食之公廟可也桓子曰其位次如何孔子曰天子諸侯之臣生則有列於朝死則有位於廟其序一也孔叢子周公曰今王即命曰記功宗以功作元祀功宗功之尊顯者祭法曰聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之蓋功臣皆祭於大蒸而勳勞之最尊顯者則為之冠故謂之元祀洛誥天子諸侯祭因國之在其地而無主後者謂所因之國先王先公有功德宜享世祀今絶無後為之祭主者昔夏后氏郊鯀至杞為夏後而更郊禹晉侯夢黃熊入國而祀夏郊此其禮也王制右無主後仲春玄鳥至至之日以大牢祠于髙禖天子親往玄鳥燕也燕以施生時來巢人堂宇而孚乳嫁娶之象也媒氏之官以為候髙辛氏之世玄鳥遺卵娀簡吞之而生契後王以為媒官嘉祥而立其祠焉變媒言禖神之也后妃帥九嬪御御謂從往侍祠周禮天子有夫人有嬪有世婦有女御獨云帥九嬪舉中言也乃禮天子所御帶以弓韣授以弓矢於髙禖之前天子所御謂今有娠者於祠大祝酌酒飲於髙禖之庭以神惠顯之也帶以弓韣授以弓矢求男之祥也王居明堂禮曰帶以弓韣禮之禖下其子必得天材月令右髙禖厥初生民時維薑嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷民人也謂周人也時是也薑嫄炎帝後薑姓有邰氏女名嫄為高辛之世妃精意以享謂之禋祀祀郊禖也弗之言祓無子求有子也古者立郊禖蓋祭天於郊而以先媒配也變媒言禖者神之也其禮以玄鳥至之日用大牢祀之天子親往后率九嬪御乃禮天子所御帶以弓韣授以弓矢于郊禖之前也履踐也帝上帝也武迹敏拇歆動也猶驚異也介大震娠夙肅也生子者及月辰居側室也育養也薑嫄出祀郊禖見大人迹而履其拇遂歆歆然如有人道之感於是即其所大所止之處而震動有娠乃周人所由以生之始也大雅生民古者大史順時覛土覛視也陽疸憤盈土氣震發疸厚也憤積也盈滿也震動也發起也農祥晨正農祥房星也晨正謂立春之日晨中於午也農事之候故曰農祥日月底於天廟底至也天廟營室也孟春之月日月皆在營室土乃脈發脈理也農書曰春土冒橛陳根可拔耕者急發先時九日先先立春日也太史告稷曰自今至於初吉初吉二月朔日也詩云二月初吉陽氣俱蒸土膏其動蒸升也膏土潤也其動潤澤欲行弗震弗渝麥其漏眚穀乃不殖震動也渝變也眚災也言陽氣俱升土膏欲動當即發動變寫其氣不然則脈滿氣結更為災病穀乃不殖稷以告以太史之言告王王曰史帥陽官以命我司事史太史陽官春秋司事主農事官曰距今九日土其俱動距去也王其祗祓監農不易祗敬也祓齊戒祓除也不易不易物土之宜王乃使司徒咸戒公卿百吏庶民吏百官也庶民甸師氏所掌之民主耕耨王之藉田者司空除壇於藉司空掌地也命農大夫咸戒農用農大夫田畯也農用田器也先時五日先耕時也瞽告有協風至瞽樂太師知風聲者協和也風氣和時候至也立春曰融風王即齊宫所齊之宫百官御事各即其齊三日御治也王乃淳濯饗醴淳沃也濯溉也饗飲也謂王沐浴飲醴酒及期期耕日也鬱人薦鬯鬱鬱金香草宜以和鬯酒也周禮鬱人掌祼器凡祭祀賓客和鬱鬯以實彛而陳之共王之齊鬯犧人薦醴犧人司尊也掌共酒醴者王祼鬯饗禮乃行祼灌也灌鬯飲醴皆所以自香潔百吏庶民畢從及藉后稷監之監察也膳夫農正陳藉禮膳夫上士也掌王之飲食膳羞之饋食農正田大夫主敷陳藉禮而祭其神為農祈也太史贊王贊導也王敬從之王耕一墢一墢一耜之墢也王無耦以一耜耕班三之班次也三下各二其人王一墢公三卿九大夫二十七庶人終於千畝終盡耕也其后稷省功太史監之司徒省民太師監之國語周語右藉田籥章凡國祈年於田祖吹豳雅擊土鼓以樂田畯祈年祈豐年也田祖始耕田者謂神農也豳雅亦七月也七月又有于耜舉趾饁彼南畝之事是亦歌其類謂之雅者以其言男女之正鄭司農云田畯古之先教田者爾雅曰畯農夫也春官右田祖琴瑟擊鼓以御田祖以祈甘雨御迎也田祖先嗇也謂始耕田者即神農也小雅甫田天子大蠟八所祭有八神也嵗十二月合聚萬物而索饗之也嵗十二月周之正數謂建亥之月也饗者祭其神也萬物有功加於民者神使為之也祭之以報焉造者配之也主先嗇而祭司嗇也先嗇若先農者司嗇后稷是也饗農及郵表畷禽獸農田畯也郵表畷謂田畯所以督約百姓於井間之處也詩云為下國畯郵禽獸服不氏所教擾禽獸也迎貓迎虎迎其神也祭坊與水庸水庸溝也曰土反其宅水歸其壑昆蟲無作草木歸其澤此蠟祝辭也若辭同則祭同處可知矣壑猶坑也昆蟲暑生寒死螟螽之屬為害者也皮辨素服葛帶榛杖黃衣黃冠而祭言祭以息民服象其時物之色季秋而草木黃落祭謂既蠟臘先祖五祀也於是勞農以休息之論語曰黃衣狐裘八蠟以記四方四方方有祭也四方年不順成八蠟不通其方穀不孰則不通於蠟焉使民謹於用財蠟有八者先嗇一也司嗇二也農三也郵表畷四也貓虎五也坊六也水庸七也昆蟲八也順成之方其蠟乃通既蠟而收民息已收謂收斂聚積也息民與蠟異則黃衣黃冠而祭為臘必矣郊特牲詳見祭義此掇其大要孟冬天子乃祈來年於天宗大割祠於公社及門閭臘先祖五祀此周禮所謂蠟祭也天宗謂日月星辰也大割大殺羣牲割之也臘謂以田獵所得禽祭也五祀門户中霤竈行也或言祈或言大割或言臘互文勞農以休息之黨正屬民飲酒正齒位是也月令籥章國祭蠟則吹豳頌擊土鼓以息老物故書蠟為蠶杜子春曰蠶當為蠟郊特牲曰天子大蠟八伊耆氏始為蠟嵗十二月合聚萬物而索饗之也蠟之祭也主先嗇而祭司嗇也黃衣黃冠而祭息田夫也既蠟而收民息已玄謂十二月建亥之月也求萬物而祭之者萬物助天成嵗事至此為其老而勞乃祀而老息之於是國亦養老焉月令孟冬勞農以休息之是也豳頌亦七月也七月又有穫稻作酒躋彼公堂稱彼兕觥萬夀無疆之事是亦歌其類也謂之頌者以其言嵗終人功之成春官黨正國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位國索鬼神而祭祀謂嵗十二月大蠟之時建亥之月也正齒位者鄉飲酒義所謂六十者坐五十者立侍六十者三豆七十者四豆八十者五豆九十者六豆是也必正之者為民三時務農將闕於禮至此農隙而教之尊長養老見孝弟之道也黨正飲酒禮亡以此事屬於鄉飲酒之義微失少矣凡射飲酒此鄉民雖為鄉大夫必來觀禮鄉飲酒鄉射記大夫樂作不入士既旅不入是也地官大宗伯以疈辜祭四方百物鄭司農云罷辜披磔牲以祭若今時磔狗祭以止風玄謂疈疈牲胸也疈而磔之謂磔禳及蠟祭郊特牲曰八蠟以記四方四方年不順成八蠟不通以謹民財也又曰蠟之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也大宗伯凡六樂者一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神變猶更也樂成則更奏也此謂大蠟索鬼神而致百物六樂奏而禮畢東方之祭則用太蔟姑洗南方之祭則用蕤賓西方之祭則用夷則無射北方之祭則用黃鍾為均焉每奏有所感致和以來之凡動物敏疾者地祗髙下之甚者易致羽物既飛又走川澤有孔竅者蛤蟹走則遲墳衍孔竅則小矣是其所以舒疾之分土祗原隰及平地之神也象物有象在天所謂四靈者天地之神四靈之知非德至和則不至禮運曰何謂四靈麟鳯龜龍謂之四靈龍以為畜故魚鮪不淰鳯以為畜故鳥不矞麟以為畜故獸不狘龜以為畜故人情不失並春官鼓人凡祭祀百物之神鼓兵舞帗舞者兵謂干戚也帗列五采繒為之有秉皆舞者所執地官鬯人凡疈事用散漆尊無飾曰散春官右蠟及百物伊耆氏始為蠟詳祭義秋省而遂大蠟天子之祭也省讀為獮秋田名也大蠟嵗十二月索鬼神而祭之疏曰此明魯得祭之事明堂位昔者仲尼與於蠟賓蠟者索也嵗十二月合聚萬物而索饗之亦祭宗廟時孔子仕魯在助祭之中禮運子貢觀於蠟詳嘉事雜記鄉飲章埋少牢於泰昭祭時也相近於坎壇祭寒暑也昭明也亦謂壇也時四時也亦謂陰陽之神也埋之者陰陽出入於地中也凡此以下皆祭用少牢相近當為攘祈聲之誤也攘猶卻也祈求也寒暑不時則或攘之或祈之寒於坎暑於壇祭法籥章掌土鼓豳籥杜子春云上鼓以瓦為匡以革為兩面可擊也鄭司農云豳籥豳國之地竹豳詩亦如之玄謂豳籥豳人吹籥之聲章明堂位曰上鼓蒯桴葦籥伊耆氏之樂中春晝擊土鼓吹豳詩以逆暑豳詩豳風七月也吹之者以籥為之聲七月言寒暑之事迎氣歌其類也此風也而言詩時總名也迎暑以晝求諸陽中秋夜迎寒亦如之迎寒以夜求諸陰春官右時及寒暑古者日在北陸而藏氷陸道也謂夏十二月日在虛危氷堅而藏之西陸朝覿而出之謂夏三月日在昴畢蟄蟲出而用氷春分之中奎星朝見東方其藏氷也黑牡秬黍以享司寒黑牡黑牲也秬黑黍也司寒玄冥北方之神故物皆用黑有事於冰故祭其神其出之也桃弧棘矢以除其災禳除凶邪將御至尊故祭寒而藏之享司寒獻羔而啓之謂二月春分獻羔祭韭始開冰室昭四年左氏傳仲春天子乃鮮羔開冰先薦寢廟鮮當為獻聲之誤也獻羔謂祭司寒也祭司寒而出冰薦於宗廟乃始賦之月令右司寒二之日鑿冰沖沖三之日納于凌陰四之日其蚤獻羔祭韭冰盛水腹則命取冰於山林沖沖鑿冰之意凌陰冰室也箋云古者日在北陸而藏冰西陸朝覿而出之祭司寒而藏之獻羔而啓之其出之也朝之祿位賓食喪祭於是乎用之月令仲春天子乃獻羔開氷備先薦寢廟周禮凌人之職夏頒氷掌事秋刷上章寒故此章備暑后稷先公禮教備也豳風七月方相氏狂夫四人方相猶言放想可畏怖之貌掌蒙熊皮黃金四目玄衣朱裳執戈揚盾帥百𨽻而時難以索室驅疫蒙冒也冒熊皮者以驚驅疫癘之鬼如今魌頭也時難四時作方相氏以難卻凶惡也月令季冬命國難索廋也夏官占夢遂令始難驅疫令令方相氏也難謂執兵以有難卻也方相氏蒙熊皮黃金四目玄衣朱裳執戈揚盾帥百隸為之驅疫癘鬼也故書難或為儺杜子春難讀為難問之難其字當作儺月令季春之月命國儺九門磔攘以畢春氣仲秋之月天子乃儺以達秋氣季冬之月命有司大儺旁磔出土牛以送寒氣春官季春命國難九門磔攘以畢春氣此難難陰氣也陰寒至此不止害將及人所以及人者陰氣右行此月之中日行厯昴昴有大陵積尸之氣氣佚則厲鬼隨而出行命方相氏帥百𨽻索室驅疫以逐之又磔牲以攘於四方之神所以畢止其災也王居明堂禮曰季春出疫於郊以攘春氣仲秋天子乃難以達秋氣此難難陽氣也陽著至此不衰害亦將及人所以及人者陽氣左行此月宿直昴畢昴畢亦得大陵積尸之氣氣佚則厲鬼亦隨而出行於是亦命方相氏帥百隸而難之王居明堂禮曰仲秋九門磔攘以發陳氣禦止疾疫季冬命有司大難旁磔出土牛以送寒氣此難難陰氣也難陰始於此者陰氣右行此月之中日厯虛危虛危有墳墓四司之氣為厲鬼將隨強陰出害人也旁磔於四方之門磔攘也出猶作也作土牛者土為牛牛可牽止也送猶畢也並月令右難鄉人儺朝服而立於阼階儺所以逐疫周禮方相氏掌之阼階東階也儺雖古禮而近於戲亦必朝服而臨之者無所不用其誠敬也或曰恐其驚先祖五祀之神欲其依已而安之也鄉此一節記孔子居鄉之事黨鄉人裼易強鬼也謂時儺索室驅疫逐強鬼也裼或為獻或為儺孔子朝服立於阼存室神也神依人也郊特牲射人祭侯則為位祭侯獻服不服不以祭侯為位為服不受獻之位也天射曰服不侯西北三步北面拜受爵夏官梓人祭侯之禮以禮脯醢謂司馬實爵而獻獲者於侯薦脯醢折俎獲者執以祭侯其辭曰惟若寧侯若猶女也寧安也謂先有功德其鬼有神毋或若女不寧侯不屬于王所故抗而射女或有也若如也屬猶朝會也抗舉也張也強飲強食詒女曽孫諸侯百福詒遺也曽孫諸侯謂女後世為諸侯者考工記司馬正洗散遂實爵獻服不言服不者著其官尊大侯也服不司馬之屬掌養猛獸而教擾之者洗酌皆西面服不侯西北三步北面拜受爵近其所為獻宰夫有司薦庶子設折俎宰夫有司宰夫之吏也鄉射記曰獲者之俎折脊脅肺卒錯獲者適右個薦俎從之不言服不言獲者國君大侯服不負侯其徒居乏待獲變其文容二人也司馬正皆獻之薦俎已錯乃適右個明此獻已將歸功於侯也適右個由侯內鄉射記曰東方謂之右個獲者左執爵右祭薦俎二手祭酒祭俎不奠爵不備禮也二手祭酒者獲者南面於俎北當為侯祭於豆間爵反注為一手不能正也此薦俎之設如於北面人焉天子祝侯曰唯若寧侯無或若女不寧侯不屬於王所故抗而射女強飲強食貽女曽孫諸侯百福諸侯以下祝辭未聞適左個祭如右個中亦如之先祭個後中者以外即之至中若神在中鄉射禮曰獻獲者俎與薦皆三祭卒祭左個之西北三步東面北鄉受獻之位也不北面者嫌為侯卒爵設薦俎立卒爵大射儀右侯司爟凡祭祀則祭爟報其為明之功禮如祭爟夏官尸卒食而祭饎爨雍爨雍孰肉以尸享祭竈有功也舊説云宗婦祭饎爨亨者祭雍爨用黍肉而已無籩豆俎禮器曰燔燎于爨夫爨者老婦之祭盛於盆尊於瓶特牲記右爟爨孔子曰臧文仲安知禮燔柴於奧奧當為爨字之誤也或作竈禮尸卒食而祭饎爨饔爨也時人以為祭火神乃燔柴夫奧者老婦之祭也盛於盆尊於瓶老婦先炊者也盆瓶炊器也明此祭先炊非祭火神燔柴似失之祭禮器注案家語云竈者老婦之所王肅老婦主其祭大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之行山曰軷犯之者封土為山象以菩芻棘柏為神主既祭之以車轢之而去喻無險難也春秋傳曰跋涉山川自由也王由左馭禁制馬使不行也故書軷作罰杜子春云罰當為軷軷讀為别異之别謂祖道轢軷磔犬也詩云載謀載惟取蕭祭脂取羝以軷詩家説曰將出祖道犯軷之祭也聘禮曰乃舍軷飲酒于其側禮家説亦謂道祭及祭酌僕僕左執轡右祭兩軹祭軌乃飲杜子春云軹謂兩轊也軌當作軓謂車前軾也戎僕掌馭戎車戎車革路也師出王乘以自將犯軷如玉路之儀凡巡守及兵車之會亦如之如在軍也並夏官聘禮又釋幣于行告將行也行者之先其古人之名未聞天子諸侯有常祀在冬大夫三祀曰門曰行曰厲喪禮有毁宗躐行出于大門則行神之位在廟門外西方不言埋幣可知也今時民春秋祭祀有行神古之遺禮乎出祖釋軷祭酒脯乃飲酒于其側祖始也既受聘享之禮行出國門止陳車騎釋酒脯之奠於軷為行始也詩傳曰軷道祭也謂祭道路之神春秋傳曰軷涉山川然則軷山行之名也道路以險阻為難是以委土為山伏牲其上使者為軷祭酒脯祈吉也卿大夫處者於是餞之飲酒於其側禮畢乘車轢之而遂行舍於近郊矣其牲犬豕可也聘禮記右行及軷行神常祀見祭五祀取羝以軷羝牡羊也軷祭行道之神也大雅生民仲山甫出祖祖行祭也蒸民韓侯出祖既覲而反國必祖者尊其所往去則如始行焉韓奕龜人上春釁龜祭祀先卜鄭司農云祭祀先卜者卜其日與其牲玄謂先卜始用卜筮者言祭言祀尊焉天地之也世本作曰巫咸作筮卜未聞其人也春官右先卜天府季冬陳玉以貞來嵗之媺惡問事之正曰貞問嵗之媺惡謂問於龜大卜職大貞之屬陳玉陳禮神之玉凡卜筮實問於鬼神龜筮能出其卦兆之占耳龜有天地四方則玉有六器者與言陳者既事藏之不必貍之也鄭司農云貞問也易曰師貞丈人吉問於丈人國語曰貞於陽卜春官右貞卜校人春祭馬祖馬祖天駟也孝經説曰房為農馬夏祭先牧先牧始養馬者其人未聞秋祭馬社馬社始乘馬者世本作曰相土作乘馬冬祭馬步馬步神為災害馬者廋人及祭馬祖祭間之先牧玄謂間之先牧先牧制間者並夏官甸祝禱牲禱馬皆掌其祝號杜子春云禱禱也為馬禱無疾為田禱多獲禽牲詩云既伯既禱爾雅曰既伯既禱馬祭也玄謂禱讀如伏誅之誅今侏大字也為牲祭求肥充為馬祭求肥健春官右牲馬吉日維戊既伯既禱維戊順類乘牡也伯馬祖也重物慎微將用馬力必先為之禱其祖禱禱獲也箋云戊剛日也故乘牡為順類也小雅既伯既禱馬祭也伯祭馬祖也將用馬力必先祭其祖爾雅掌正及四時之孟月吉日則屬民而讀邦法以糾戒之春秋祭禜亦如之禜謂雩禜水旱之神蓋亦為壇位如祭社稷云凡其黨之祭祀教其禮事掌其戒禁其黨之民族師月吉則屬民而讀邦法春秋祭酺亦如之酺者為人物災害之神也故書酺或為步杜子春云當為酺玄謂校人職又有冬祭馬步則未知此世所云蝝螟之酺與神鬼之步與蓋亦為壇位如雩禜云族長無飲酒之禮因祭酺而與其民以長幼相獻酬焉並地官肆師若國有大故則令國人祭大故謂水旱凶荒所令祭者社及禜酺嵗時之祭祀亦如之月令仲春命民社此其一隅春官右禜酺禮書綱目卷三十七
