body:
  text: 禮書綱目卷七十一婺源江永撰名器下通禮二十四補夏后氏世室堂修二七廣四修一世室者宗廟也魯廟有世室牲有白牡此用先王之禮修南北之深也夏度以步令堂修十四步其廣益以四分修之一則堂廣十七步半五室三四步四三尺堂上為五室象五行也三四步室方也四三尺以益廣也木室於東北火室於東南金室于西南水室於西北其方皆三步其廣益之以三尺土室于中央方四步其廣益之以四尺此五室居堂南北六丈東西七丈九階南面三三面各二四旁兩夾窗窗助户為明每室四户八窗白盛蜃灰也盛之言成也以蜃灰堊牆所以飾成宫室門堂三之二門堂門側之堂取數於正堂令堂如上制則門堂南北九步二尺東西十一步四尺爾雅曰門側之堂謂之孰室三之一兩室與門各居一分殷人重屋堂修七尋堂崇三尺四阿重屋重屋者王宫正堂若大寢也其修七尋五丈六尺放夏周則其廣九尋七丈二尺也五室各二尋崇高也四阿若今四柱屋重屋復笮也周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵明堂者明政教之堂周度以筵亦王者相改周堂高九尺殷三尺則夏一尺矣相參之數禹卑宫室謂此一尺之堂與此三者或舉宗廟或舉王寢或舉明堂互言之以明其同制室中度以几堂上度以筵宫中度以尋周文者各因物宜為之數室中舉謂四壁之內廟門容大扃七個大扃牛鼎之扃長三尺每扃為一個七個二丈一尺闈門容小扃參個廟中之門曰闈小扃膷鼎之扃長二尺三個六尺路門不容乘車之五個路門者大寢之門乘車廣六尺六寸五個三丈三尺言不容者是兩門乃容之兩門乃容之則此門半之丈六尺五寸應門二徹參個正門謂之應門謂廟門也二徹之內八尺三個二丈四尺內有九室九嬪居之外有九室九卿朝焉內路寢之裏也外路門之表也九室如今朝堂諸曹治事處九嬪掌婦學之法以教九御六卿三孤為九卿王宫門阿之制五雉宫隅之制七雉城隅之制九雉阿棟也宫隅城隅謂角浮思也雉長三丈高一丈度高以高度廣以廣門阿之制以為都城之制都四百里外距五百里王子弟所封其城隅高五丈宫隅門阿皆三丈宫隅之制以為諸侯之城制諸侯畿以外也其城隅制高七丈宫隅門阿皆五丈禮器曰天子諸侯臺門考工記匠人天子之堂九尺諸侯七尺大夫五尺士三尺天子諸侯臺門禮器家不臺門同上臺門而旅樹反坫大夫之僭禮也詳總要章宫謂之室室謂之宫皆所以通古今之異語明同實而兩名牖户之間謂之扆窗東户西也禮云斧扆者以其所在處名之其內謂之家今人稱家義出於此東西牆謂之序所以序别內外西南隅謂之奧室中隱奧之處西北隅謂之屋漏詩曰尚不愧于屋漏其義未詳東北隅謂之宧宧見禮亦未詳東南隅謂之窔禮曰掃室聚窔窔亦隱暗柣謂之閾閾門限棖謂之楔門兩旁木楣謂之梁門户上橫梁樞謂之椳門户扉樞樞達北方謂之落時門持樞者或達北檼以為固也落時謂之􅩖道二名也垝謂之坫在堂隅坫端也牆謂之墉書曰既勤垣墉鏝謂之杇泥鏝地謂之黝黑飾地也牆謂之堊白飾牆也闍謂之臺積土四方有木者謂之榭臺上起土杗廇謂之梁屋大梁也其上楹謂之棁侏儒柱也閞謂之槉柱上欂也亦名枅又曰栭謂之楶即櫨也棟謂之桴屋檼桷謂之榱屋椽桷直而遂謂之閲謂五架屋際椽正相當直不受簷謂之交謂五架屋際椽不直上簷交于檼上簷謂之樀屋梠屋上薄謂之筄屋笮兩階間謂之鄉人君南鄉當階間中庭之左右謂之位羣臣之側位也門屏之間謂之寧人君視朝所寧立處屏謂之樹小牆當門中閍謂之門詩曰祝祭于祊正門謂之應門朝門觀謂之闕宫門雙闕宫中之門謂之闈謂相通小門也其小者謂之閨小閨謂之閣大小異名弄門謂之閎左傳曰盟諸僖閎弄頭門門側之堂謂之孰夾門堂也橛謂之闑門閫闔謂之扉公羊傳曰齒著于門闔所以止扉謂之閎門辟旁長橛也左傳曰高其閈閎閎長􅍻即門橛也瓴甋謂之甓㼾甎也今江東呼瓴甓宫中弄謂之壺巷門間道廟中路謂之唐詩曰中唐有甓堂途謂之陳堂下至門徑也路旅途也途即道也一達謂之道路長道二達謂之岐旁岐道旁出三達謂之劇旁今南陽冠軍樂鄉數道交錯俗呼之五劇鄉四達謂之衢交道四出五達謂之康史記所謂康莊之衢六達謂之莊左傳曰得慶氏之木百車於莊七達謂之劇驂三道交復有一岐出者今北海劇縣有此道八達謂之崇期四道交出九達謂之逵四道交出復有旁通室中謂之時堂上謂之行堂下謂之步門外謂之趨中庭謂之走大路謂之奔此皆人行步趨走之處因以名云室有東西廂曰廟夾室前堂無東西廂有室曰寢但有大寢無室曰榭榭即今堂隍四方而高曰臺陜而修曲曰樓修長也爾雅葺屋參分瓦屋四分各分其修以其一為峻囷窖倉城逆牆六分逆猶郤也築此四者六分其高郤一分以為閷囷圜倉穿地曰窖堂塗十有二分謂階前若今令甓祴也分其督旁之修以一分為峻也爾雅曰堂塗謂之陳竇其崇三尺宫中水道牆厚三尺崇三之高厚以是為率足以相勝匠人大司徒以本俗六安萬民一曰媺宫室本猶舊也美善也謂約椓攻堅風雨攸除各有攸宇地官右宮室上古穴居而野處後世聖人易之以宮室上棟下宇以待風雨蓋取諸大壯壯固之意易昔者先王未有宮室冬則居營窟夏則居橧巢寒則纍土暑則聚薪柴居其上後聖有作作起然後修火之利孰冶萬物范金鑄作器用合土瓦瓴甓及甒大以為臺榭宮室牖户榭器之所藏也禮運禹卑宮室論語明堂者古有之也明堂之作其代未得而詳也凡九室一室而有四户八牖凡三十六户七十二牖以茅蓋屋上圓下方明堂者所以明諸侯尊卑外水曰辟雍南蠻東夷北狄西戎言四海之聚於祭也各以其方列於水外明堂月令於明堂之中施十二月之令赤綴户也白綴牖也二九四七五三六一八記用九室謂法龜文故取此數以明其制也堂高三尺東西九筵南北七筵上圓下方九室十二堂室四户户二牖其宮方三百步在近郊近郊三十里淳于登説明堂在國之陽三里之外七里之內丙已之地韓詩説明堂在南方七里之郊然三十里無所取也此天子之路寢也不齊不居其室路寢亦為此制待朝在南宫揖朝出其南門大戴禮乃立臯門臯門有伉乃立應門應門將將傳曰王之郭門曰臯門伉高貌王之正門曰應門將將嚴正也大王之時未有制度特作二門其名如此及周有天下遂尊以為天子之門而諸侯不得立焉大雅綿大廟天子明堂庫門天子臯門雉門天子應門言廟及門如天子之制也天子五門臯庫雉應路魯有庫雉路則諸侯三門與臯之言高也詩云乃立臯門臯門有伉乃立應門應門將將明堂位僖公二十年春新作南門何以書譏何譏爾門有古常也惡奢泰不奉古制常法春秋公羊傳作為也有加其度也更加使大言新有故也非作也責其改舊制南門者法門也法門謂天子諸侯皆南面而治法令之所出入故謂之法門穀梁傳西宮災西宮者何小寢也小寢則曷為謂之西宮有西宮則有東宮矣魯子曰以有西宮亦知諸侯之有三宫也西宮者小寢內室楚女所居也禮諸侯娶三國女以楚女居西宮知二國女於小寢內各有一宮也故云爾禮夫人居中宮少在前右媵居西宮左媵居東宮少在後僖二十年公羊傳定公二年夏五月壬辰雉門及兩觀災其言雉門及兩觀災何據桓宮僖宮災不言及兩觀微也雉門兩觀皆天子之制門為其主觀為其飾故微也何以書記災也此本子家駒諫昭公所當先去以自正者昭公不從其言卒為季氏所逐定公繼其後宜去其所以失之者故災亦云爾立雉門兩觀不書者僭天子不可言雖在春秋中猶不書冬十月新作雉門及兩觀其言新作之何據俱一門兩觀如改常修大也天災之當減損如諸侯制而復修大僭天子之禮故言新作以見修大也修舊不書此何以書據西宮災復修不書譏何譏爾不務乎公室也務勉也不務公室亦可施于久不修亦可施于不務始公室之禮微辭也月者久也當即修之如諸侯禮公羊傳楚靈王為章華之臺靈王楚恭王之庶子靈王熊虔止章華地名吳語曰乃築臺于章華之上與伍舉升焉曰臺美夫對曰先君莊王為匏居之臺匏居臺名高不過望國氛氛祲氣也大不過容宴豆言宴有折俎籩豆之陳木不妨守備不妨城郭守備之用用不煩官府財用不出府藏民不廢時務官不易朝常今君為此臺也國民罷焉財用盡焉年穀敗焉敗廢民之時務百官煩焉為之徴發舉國留之留治之數年乃成臣不知其美也先王之為臺榭也積土曰臺築室曰榭榭不過講軍實講習也軍實戎士也臺不過望氛祥凶氣為氛吉氣為祥故榭度于大卒之居大卒王士卒也度謂足以臨見之臺度于臨觀之高足以臨下觀上使屋榭不蔽目明而已其所不奪穡地稼穡之地其為不匱財用為作也其事不煩官業業事也其日不廢時務以農隙也瘠磽之地於是乎為之不害穀土也磽確也城守之末於是乎用之城守之餘然後用之官寮之暇於是乎臨之暇間也四時之隙於是乎成之隙空間時也故周詩曰經始靈臺經謂經度之立其基址也天子曰靈臺經之營之庶民攻之不日成之攻治也不日不程課以時日也經始勿亟庶民子來亟疾也子來如子為父也夫為臺榭將以教民利也臺所以望氛祥而備災害榭所以講軍實而禦冦亂皆所以利民也不知其以匱之也知聞也語國語楚管仲山節而藻棁君子以為濫矣栭謂之節梁上楹謂之棁宮室之飾士首本大夫達校諸侯斫而礱之天子加密石焉無畫山藻之禮也禮器邦君樹塞門管氏亦樹塞門屛謂之樹塞猶蔽也設屛於門以蔽內外也論語趙文子為室室宫也斫其椽而礱之椽榱也礱磨也張老夕焉而見之見見匠人為之不謁而歸謁告也文子聞之駕而往曰吾不善子亦告我何其速也速去速也對曰天子之室斫其椽而礱之加密石焉密密理石謂砥也先粗礱之加以密砥諸侯礱之無密石也大夫斫之不礱也士首之斫其首也備其物義也物備得宜謂之義從其等禮也從尊卑之等謂之禮今子貴而忘義富而忘禮吾懼不免何敢以告文子歸令之勿礱也匠人請皆斫之通更斫之文子曰止為後世之見之也為使也其斫者仁者之為也其礱者不仁者之為也晉語鸞車有虞氏之路也鉤車夏后氏之路也大路殷路也乘路周路也鸞有鸞和也鉤有曲輿者也大路木路也乘路玊路也漢祭天乘殷之輅也今謂之桑根車也春秋傳曰大路素鸞或為欒也夏后氏駱馬黑鬛殷人白馬黑首周人黃馬蕃鬛順正色也白馬黑鬛曰駱殷黑首為純白凶也明堂位顏淵問為邦子曰乘殷之輅輅者大車之名商輅木輅也周人飾以金玊則過侈而易敗不若商輅朴素渾堅而等威已辨為質而得其中也論語周人尚輿武王誅紂疾上下失其服飾而尊輿故一器而工聚焉者車為多周所上也凡察車之道必自載於地者始也是故察車自輪始先視輪也自從也凡察車之道欲其朴屬而微至不朴屬無以為完久也不微至無以為戚速也朴屬猶附著堅固貌也齊人有名疾為戚者春秋傳曰蓋已操之為已蹙矣速疾也書或為數鄭司農云朴讀如子南僕之僕微之謂輪至地者少言其圜甚著地者微耳著地者微則易轉故不微至無以為戚數輪已崇則人不能登也輪已庳則於馬終古登陀也已大也甚也崇高也齊人之言終古猶言常也陀阪也輪庳則難引故兵車之輪六尺有六寸田車之輪六尺有三寸乘車之輪六尺有六寸此以馬大小為節也兵車革路也田車木路也乘車玊路金路象路也兵車乘車駕國馬田車駕田馬六尺有六寸之輪軹崇三尺有三寸也加軫與轐焉四尺也人長八尺登下以為節此車之高者也軫輿也鄭司農云軹軎也轐讀為旃僕之僕謂伏兔也玄謂軹轂末也此軫與僕并七寸田車又宜減焉乘車之軌廣取數於此軌廣八尺旁出輿亦七寸也考工記輪人為輪斬三材必以其時三材所以為轂幅牙也斬之以時材在陽則仲冬斬之在隂則仲夏斬之今世轂用雜榆輻以檀牙以橿也三材既具巧者和之調其鑿內而合之轂也者以為利轉也輻也者以為直指也牙也者以為固抱也利轉者轂以無有為用也鄭司農云牙讀如跛者訝跛者之訝謂輪輮也世間或謂之罔書或作輮輪敝三材不失職謂之完敝盡而轂輻牙不動望而眂其輪欲其幎爾而下迆也進而眂之欲其微至也無所取之取諸圜也輪謂牙也幎均致貌也進猶行也微至至地者少也非有他也圜使之然也鄭司農云微至書或作危至故書圜或作員當為圜望其輻欲其揱爾而纖也進而眂之欲其肉稱也無所取之取諸易直也揱纖殺小貌也肉稱𢎞殺好也鄭司農云揱讀為紛容揱參之揱玄謂如桑螵蛸之蛸望其轂欲其眼也進而眂之欲其幬之亷也無所取之取諸急也眼出大貌也幬幔轂之革也革急則裏木亷隅見鄭司農云眼讀如限切之限眂其綆欲其蚤之正也蚤當為爪謂幅入牙中者也鄭司農云綆讀為關東言餅之餅謂輪箄也玄謂輪雖箄爪牙必正也察其災蚤不齵則輪雖敝不匡災謂輻入轂中者也災與爪不相佹乃後輪敝盡不匡刺也鄭司農云災讀如雜厠之厠謂建幅也泰山平原所樹立物為災聲如胾博立梟棊亦為災匡枉也凡斬轂之道必矩其陰陽矩謂刻識之也故書矩為距鄭司農云當作矩謂規矩也陽也者稹理而堅陰也者疏理而柔是故以火養其陰而齊諸其陽則轂雖敝不藃稹致也火養其陰炙堅之也鄭司農云稹讀為奠祭之奠藃當作耗玄謂藃藃暴陰柔後必橈減幬革暴起轂小而長則柞大而短則摯鄭司農云柞讀為迫唶之唶謂幅間柞狹也摯讀為𣙗謂幅危摯也玄謂小而長則災中弱大而短則轂末不堅是故六分其輪崇以其一為之牙圍六尺六寸之輪牙圍尺一寸參分其牙圍而漆其二不漆其踐地者也漆者七寸三分寸之一不漆者三寸三分寸之二令牙厚一寸三分寸之二則內外面不漆者各一寸也椁其漆內而中詘之以為之轂長以其長為之圍六尺六寸之輪漆內六尺四寸是為轂長三尺二寸圍徑一尺三分寸之二也鄭司農云椁者度兩漆之內相距之尺寸也以其圍之阞捎其藪捎除也阞三分之一也鄭司農云捎讀為桑螵蛸之蛸藪讀為蜂藪之藪謂轂空壺中也玄謂此藪徑三寸九分寸之五壺中當輻災者也蜂藪者猶言趨也藪者衆輻之所趨也五分其轂之長去一以為賢去三以為軹鄭司農云賢大穿也軹小穿也玄謂此大穿徑八寸十五分寸之八小穿徑四寸十五分寸之四大穿甚大似誤矣大穿實五分轂長去二也去二則得六寸五分寸之二凡大小穿皆謂金也今大小穿金厚一寸則大穿穿內徑四寸五分寸之二小穿穿內徑二寸十五分寸之四如是乃與藪相稱也容轂必直陳篆必正施膠必厚施筋必數幬必負幹鄭司農去讀容上屬曰軹容玄謂容者治轂為之形容也篆轂約也幬負幹者革轂相應無贏不足既摩革色青白謂之轂之善謂丸漆之色而以石摩平之革色青白善之徴也參分其轂長二在外一在內以置其輻轂長三尺二寸者令幅廣三寸半則輻內九寸半輻外一尺九寸凡輻量其鑿深以為輻廣廣深相應則固足相任也輻廣而鑿淺則是以大扤雖有良工莫之能固扤搖動貌鑿深而輻小則是固有餘而強不足也言幅弱不勝轂之所任也故竑其輻廣以為之弱則雖有重任轂不折言力相稱也弱災也今人謂蒲本在水中者為弱是其類也鄭司農云竑讀如紘綎之紘謂度之參分其輻之長而殺其一則雖有深泥亦弗之溓也殺衰小之也鄭司農云溓讀為黏謂泥不黏著輻也參分其股圍去一以為骹圍謂殺輻之數也鄭司農云股謂近轂者也骹謂近牙者也方言股以喻其豐故言骹以喻其細人脛近足者細於股謂之骹羊脛細者亦為骹揉輻必齊平沈必均揉謂以火稿之衆輻之直齊如一也平沈平漸也鄭司農云平沈謂浮之水上無輕重直以指牙牙得則無𣙗而固得謂倨句鑿內相應也鄭司農云𣙗榝也蜀人言榝曰𣙗玄謂𣙗讀如涅從木熱省聲不得則有𣙗必足見也必足見言𣙗大也然則雖得猶有𣙗但小耳六尺有六寸之輪綆參分寸之二謂之輪之固輪箄則車行不掉也參分寸之二者出於輻股鑿之數也凡為輪行澤者欲杼行山者欲侔杼謂削薄其踐地者侔上下等杼以行澤則是刀以割塗也是故塗不附附著也侔以行山則是搏以行石也是故輪雖敝不甐於鑿搏圜厚也鄭司農云不甐於鑿謂不動於鑿中也玄謂甐亦敝也以輸之厚石雖齧之不能敝其鑿旁使之動凡揉牙外不廉而內不挫旁不腫謂之用火之善亷絶也挫折也腫瘣也是故規之以眂其圜也輪中規則圜矣萭之以眂其匡也等為萭蔞以運輸上輪中萭蔞則不匡刺也故書萭作禹鄭司農云讀為萭書或作矩縣之以眂其輻之直也輪輻三十上下相直從旁以繩縣之中繩則鑿正輻直矣水之以眂其平沈之均也平漸其輪而無輕重則斫材均矣量其藪以黍以眂其同也黍滑而齊以量兩壺無贏不足則同權之以眂其輕重之侔也侔等也稱兩輪鈞石同則等矣輪有輕重則引之有難易故可規可萭可水可縣可量可權也謂之國工國之名工輪人為蓋達常圍三寸圍三寸徑一寸也鄭司農云達常蓋斗柄下入杠中也桯圍倍之六寸圍六寸徑二寸足以含達常鄭司農云桯蓋杠也讀如丹桓宫楹之楹信其桯圍以為部廣部廣六寸廣謂徑也鄭司農云部蓋斗也部長二尺謂斗柄達常也桯長倍之四尺者二杠長八尺謂達常以下也加達常二尺則蓋高一丈立乘也十分寸之一謂之枚為下起數也枚一分故書十與上二合為二十字杜子春云當為四尺者二十分寸之一部尊一枚尊高也蓋斗上隆高高一分也弓鑿廣四枚鑿上二枚鑿下四枚弓蓋橑也廣大也是為部厚一寸鑿深二寸有半下直二枚鑿端一枚鑿深對為五寸是以不傷達常也下直二枚者鑿空下正而上低二分也其弓災則撓之平剡其下二分而內之欲令蓋之尊終平不蒙撓也端內題也弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫庇覆也故書庇作祕杜子春云祕當為庇謂覆幹也玄謂軹轂末也輿廣六尺六寸兩轂並六尺四寸旁減軌內七寸則兩軹之廣凡丈一尺六寸也六尺之弓倍之加部廣凡丈二尺六寸有宇曲之減可覆軹不及幹參分弓長而揉其一參分之持長橈短短者近部而平長者為宇曲也六尺之弓近部二尺四寸為宇曲參分其股圍去一以為蚤圍蚤當為爪以弓鑿之廣為股圍則寸六分也爪圍一寸十五分寸之一參分弓長以其一為之尊尊高也六尺之弓上近部平者二尺爪末下於部二尺二尺為句四尺為弦求其股股十二除之面三尺幾半也上欲尊而宇欲卑上近部平者也隤下曰宇上尊而宇卑則吐水疾而霤遠蓋者主為雨設也乘車無蓋禮所謂潦車謂蓋車與蓋已崇則難為門也蓋已卑是蔽目也是故蓋崇十尺十尺其中正也蓋十尺宇二尺而人長八尺卑於此蔽人目良蓋弗冒弗紘殷畝而馳不隊謂之國工隊落也善蓋者以橫馳於壟上無衣若無紘而弓不落也輿人為車輪崇車廣衡長參如一謂之參稱稱猶等也車輿也衡之長容兩服參分車廣去一以為隧兵車之隧四尺四寸鄭司農云隧謂車輿深也讀如鑽燧改火之燧玄謂讀如邃宇之邃參分其隧一在前二在後以操其式兵車之式深尺四寸三分寸之二以其廣之半為之式崇兵車之式高三尺三寸以其隧之半為之較崇較兩輢上出式者兵車自較而下凡五尺五寸故書較作榷杜子春云當為較六分其廣以一為之軫圍軫與後橫者也兵車之軫圍尺一寸參分軫圍去一以為式圍兵車之式圍七寸三分寸之一參分式圍去一以為較圍兵車之較圍四寸九分寸之八參分較圍去一以為軹圍兵車之軹圍三寸二十七分寸之七軹輢之植者衡者也與轂末同名參分軹圍去一以為轛圍兵車之轛圍二寸八十一分寸之十四轛式之植者衡者也鄭司農云轛讀如繫綴之綴謂車輿軨立者也立者為轛橫者為軹書轛或作軨玄謂轛者以其鄉人為名圜者中規方者中矩立者中縣衡者中水直者如生焉繼者如附焉治材居材如此乃善也如生如木從地生如附如附枝之𢎞殺也凡居材大與小無并大倚小則摧引之則絶并偏邪相就也用力之時其大并於小者小者強不堪則摧也其小并於大者小者力不堪則絶也棧車欲弇為其無革鞔不堅易折壞也士乘棧車飾車欲侈飾車謂革鞔輿也大夫以上革鞔輿故書侈作栘杜子春云當為侈輈人為輈輈車轅也詩云五楘梁輈輈有三度軸有三理目下事度深淺之數國馬之輈深四尺有七寸國馬謂種馬戎馬齊馬道馬高八尺兵車乘車軹崇三尺有三寸加軫與轐七寸又并此輈深則衡高八尺七寸也除馬之高則餘七寸為衡頸之間也鄭司農云深四尺七寸謂轅曲中田馬之輈深四尺田車軹崇三尺一寸半并此輈深為七尺一寸半今田車七尺衡頸之間亦七寸則軫與轐五寸半則衡高七尺七寸駑馬之輈深三尺有三寸輪軹與軫轐大小之減率寸半也則駑馬之車軹崇三尺加軫與轐四寸又并此輈深則衡高六尺七寸也今駑馬六尺除馬之高則衡頸之間亦七寸軸有三理一者以為媺也無節目也二者以為久也堅刃也三者以為利也滑密䡄前十尺而䇿半之謂輈䡄以前之長也䇿御者之䇿也十或作七合七為弦四尺七寸為句以求其股股則短矣七非也鄭司農云軌謂式前也書或作􅓶玄謂䡄是䡄法也謂輿下三面之材輢式之所樹持車正也凡任木目車持任之材任正者十分其輈之長以其一為之圍衡任者五分其長以其一為之圍小於度謂之無任任正者謂輿下三面材持車正者也輈䡄前十尺與隧四尺四寸凡丈四尺四寸則任正之圍尺四寸五分寸之二衡任者謂兩軛之間也兵車乘車衡圍一尺三寸五分寸之一無任言其不勝任五分其軫間以其一為之軸圍軸圍亦一尺三寸五分寸之一與衡任相應十分其輈之長以其一為之當兔之圍輈當伏兔者也亦圍尺四寸五分寸之二與任正者相應參分其兔圍去一以為頸圍頸前持衡者圍九寸十五分寸之九五分其頸圍去一以為踵圍踵後承軫者也圍七寸七十五分寸之五十一凡揉輈欲其孫而無弧深孫順理也杜子春云弧讀為淨而不汚之汙玄謂弧木弓也凡弓引之中參中參深之極也揉輈之倨句如二可也如三則深傷其力今夫大車之轅摯其登又難既克其登其覆車也必易此無故唯轅直且無橈也大車牛車也摯輖也登上阪也克能也是故大車平地既節軒摯之任及其登阤不伏其轅必縊其牛此無故唯轅直且無橈也阤阪也故書伏作逼杜子春云逼當作伏故登阤者倍任者也猶能以登及其下阤也不援其邸必緧其牛後此無故唯轅直且無橈也倍任用力倍也故書緧作䱸鄭司農云讀為緧關東謂紂為緧䱸魚字是故輈欲頎典頎典堅刃貌鄭司農云頎讀為懇典讀為殄駟車之轅率尺所一縳懇典似謂此也輈深則折淺則負揉之大深傷其力馬倚之則折也揉之淺則馬善負之輈注則利準利準則久和則安故書準作水鄭司農云注則利水謂轅脊上雨注令水去利也玄謂利水重讀似非也注則利謂輈之揉者形如注星則利也準則久謂輈之在輿下者平如準則能久也和則安注與準者和人乘之則安輈欲弧而無折經而無絶揉輈大深則折也經亦謂順理也進則與馬謀退則與人謀言進退之易與人馬之意相應馬行主於進人則有當退時終日馳騁左不楗杜子春云楗讀為蹇左面不便馬苦蹇輈調善則馬不蹇也書楗或作劵玄謂劵今倦字也輈和則久馳騁載在左者不罷倦尊者在左行數千里馬不契需鄭司農云契讀為爰契我龜之契需讀為畏需之需謂不傷蹄不需道里終歲御衣祍不敝祍謂裳也此唯輈之和也和則安是以然也謂進則與馬謀而下勸登馬力登上也輈和勸馬用力馬力既竭輈猶能一取焉馬止輈尚能一前取道喻易進良輈環灂自伏兔不至䡄七寸䡄中有灂謂之國輈伏兔至䡄蓋如式深兵車乘車式深尺四寸三分寸之二灂下至䡄七寸則半有灂也輈有筋膠之被用力均者則灂遠鄭司農云灂讀為灂酒之灂環謂漆沂鄂如環車人之事半矩謂之宣矩法也所法者人也人長八尺而大節三頭也腹也脛也以三通率之則矩二尺六寸三分寸之二頭髮皓落曰宣半矩尺三寸三分寸之一人頭之長也柯屬之木頭取名焉易巽為宣髮一宣有半謂之欘欘斫斤柄長二尺爾雅曰句欘謂之定一欘有半謂之柯伐木之柯柄長三尺詩云伐柯伐柯其則不遠鄭司農云蒼頡篇有柯欘一柯有半謂之磬折人帶以下四尺五寸磬折立則上俯玊藻曰三分帶下紳居二焉紳長三尺車人為車柯長三尺博三寸厚一寸有半五分其長以其一為之首首六寸謂今剛關頭斧柯其柄也鄭司農云柯長三尺謂斧柯因以為度轂長半柯其圍一柯有半大車轂徑尺五寸輻長一柯有半其博三寸厚三之一輻厚一寸也故書博或為搏杜子春云當為博渠三柯者三渠二丈七尺謂罔也其徑九尺鄭司農云渠謂車輮所謂牙行澤者欲短轂行山者欲長轂短轂則利長轂則安澤泥苦其大安山險苦其大動行澤者反輮行山者仄輮反輮則易仄輮則完故書仄為側鄭司農云反輮謂輪輮反其木裏需者在外澤地多泥柔也側當為仄山地剛多沙石玄謂仄輮為泥之黏欲得心在外滑仄輮為沙石破碎之欲得表裏相依堅刃六分其輪崇以其一為之牙圍輪高輪徑也牙圍尺五寸柏車轂長一柯其圍二柯其幅一柯其渠二柯者三五分其輪崇以其一為之牙圍柏車山車輪高六尺牙圍尺二寸大車崇三柯綆寸牝服二柯有參分柯之二大車平地載任之車轂長半柯者也綆輪箄牝服長八尺謂較也鄭司農云牝服謂車箱服讀為負羊車二柯有參分柯之一鄭司農云羊車謂車羊門也玄謂羊善也善車若今定張車較長七尺柏車二柯較六尺也柏車輪崇六尺其綆大半寸凡為轅三其輪崇參分其長二在前一在後以鑿其鉤徹廣六尺鬲長六尺鄭司農云鉤鉤心鬲謂轅端厭牛領者並同上巾車掌公車之政令辨其用與其旗物而等敘之以治其出入公猶官也用謂祀賓之屬旗物大常以下等敘之以封同姓異姓之次敘王之五路一曰玊路錫樊纓十有再就建大常十有二斿以祀王所御曰路玊路以玊飾諸末錫馬面當盧刻金為之所謂鏤錫也樊讀如鞶帶之鞶謂今馬大帶也鄭司農云纓謂當胸士喪禮下篇曰馬纓三就禮家説曰纓當胸以削革為之三就三重三匝也玄謂纓今馬鞅玉路之樊及纓皆以五采罽飾之十二就就成也大常九旗之畫日月者正幅為縿斿則屬焉金路鉤樊纓九就建大旗以賓同姓以封金路以金飾諸末鉤婁頷之鉤也金路無錫有鉤亦以金為之其樊及纓以五采罽飾之而九成大旗九旗之畫交龍者以賓以會賓客同姓以封謂王子母弟率以功德出封雖為侯伯其畫服猶如上公若魯衛之屬其無功德各以親疏食采畿內而已故書鉤為拘杜子春讀為鉤象路朱樊纓七就建大赤以朝異姓以封象路以象飾諸末象路無鉤以朱飾勒而已其樊及纓以五采罽飾之而七成大赤九旗之通帛以朝以日視朝異姓王甥舅革路龍勒條纓五就建大白以即戎以封四衛革路鞔之以革而漆之無他飾龍駹也以白黑飾革雜色為勒條讀為絛其樊及纓以絛絲飾之而五成不言樊字蓋脫爾以此言絛如玊路金路象路飾樊纓皆不用金玊象矣大白殷之旗猶周大赤蓋象正色也即戎謂兵事四衛四方諸侯守衛者蠻服以內木路前樊鵠纓建大麾以田以封蕃國木路不鞔以革漆之而已前讀為緇翦之翦翦淺黑也木路無龍勒以淺黑飾韋為樊鵠色飾韋為纓不言就數飾與革路同大麾不在九旗中以正色言之則黑夏后氏所建田四時田獵蕃國謂九州之外夷服鎮服蕃服杜子春云鵠或為結王后之五路重翟鍚面朱總厭翟勒面繢總安車雕面鷖總皆有容蓋重翟重翟雉之羽也厭翟次其羽使相迫也勒面謂以如王龍勒之韋為當面飾也雕者畫之不龍其韋安車坐乘車凡婦人車皆坐乘故書朱總為䌆鷖或為繄鄭司農云鍚馬面鍚䌆當為總書亦或為總鷖讀為鳬鷖之鷖鷖總者青黑色以繒為之總著馬勒直兩耳與兩鏕容謂幨車山東謂之裳幃或曰幢容玄謂朱總繢總其施之如鷖總車衡輨亦宜有焉繢畫文也蓋如今小車蓋也皆有容有蓋則重翟厭翟謂蔽也重翟后從王祭祀所乘厭翟后從王賓饗諸侯所乘安車無蔽后朝見於王所乘謂去飾也詩國風碩人曰翟蔽以朝謂諸侯夫人始來乘翟蔽之車以朝見於君盛之也此翟蔽蓋厭翟也然則王后始來乘重翟乎翟車貝面組總有握翟車不重不厭以翟飾車之側爾貝面貝飾勒之當面也有握則此無蓋矣如今軿車是也后所乘以出桑輦車組挽有翣羽蓋輦車不言飾后居宮中從容所乘但漆之而已為輇輪人挽之以行有翣所以禦風塵以羽作小蓋為翳日也故書翣為髦杜子春云當為翣書亦或為服車五乘孤乘夏篆卿乘夏縵大夫乘黑車士乘棧車庶人乘役車服車服事者之車故書夏篆為夏緣鄭司農云夏赤也緣緣色或曰夏篆篆讀為圭瑑之瑑夏篆轂有約也玄謂夏篆五采畫轂約也夏縵亦五采畫無瑑爾墨車不畫也棧車不革鞔而漆之役車方箱可載任器以共役凡良車散車不在等者其用無常給遊燕及恩惠之賜不在等者謂若今輜車後户之屬作之有功有沽凡車之出入歲終則會之計其完敗多少凡賜闕之完敗不計毁折入齎于職幣計所傷敗入其直杜子春云齎讀為資資謂財也乘官車毁折者入財以償繕治之直歲時更續共其弊車故書更續為受讀杜子春云受當為更讀當為續更續更受新共其弊車歸其故幣車也玄謂俱受新耳更易其舊續續其不任用共其弊車巾車既更續之取其弊車共於車人材或有中用之春官典路掌王及后之五路辨其名物與其用説用謂將有朝祀之事而駕之鄭司農云説謂舍車也春秋傳曰雞鳴而駕日中而説用謂所宜用同上有以少為貴者大路繁纓一就次路繁纓七就大輅繁纓一就殷祭天之車也周禮王之五路玊路繁纓十有二就金路九就象路七就革路五就木路翦繁鵠纓禮器大路繁纓一就先路三就次路五就此因小説以少為貴者禮器言次路七就與此異字之誤也郊特牲大路素大路殷路也器禮大輅在賓階面綴輅在阼階面大輅玊綴路金面前皆南向先路在左孰之前次輅在右孰之前先輅象次輅木金玊象皆以飾車木則無飾皆在路寢門內左右孰前北面顧命乘大路諸侯之僭禮也詳總要章上公樊纓九就二車九乘侯伯樊纓七就二車七乘子男樊纓五就二車五乘繁纓馬飾也以罽飾之每一處五采備為一就就成也二副也行秋官大人二車者諸侯七乘上大夫五乘下大夫三乘此蓋殷制也周禮二車公九乘侯伯七乘子男五乘卿大夫各如其命之數少儀君羔幦虎犆幦覆笭也犆讀皆如直道而行之直直謂緣也此君齊車之飾大夫齊車鹿幦豹犆朝車士齊車鹿幦豹犆臣之朝車與齊車同飾玊藻君賜車馬乘以拜敬君惠也賜君未有命弗敢即乘也同上為人子者三賜不及車馬三賜三命也凡仕者一命而受爵再命而受衣服三命而受車馬車馬所以尊者備矣卿大夫士之子不受不敢以成尊此踰於父天子諸侯之子不受自卑逺於君曲禮年不順成天子乘素車自貶損也大夫不得造車馬造謂作新也玊藻國家靡敝則車不雕幾雕畫也幾附纒為沂鄂也少儀有虞氏之旗夏后氏之綏殷之大白周之大赤四者旌旗之屬也綏當為緌讀如冠蕤之蕤有虞氏當言緌夏后氏當言旗此蓋錯誤也緌謂注旄牛尾於杠首所謂大麾書云武王左杖黃鉞右秉白旄以麾周禮王建大旗以賓建大赤以朝建大白以即戎建大麾以田也明堂位素錦綢杠以白地錦韜旗之竿纁帛縿纁帛降也縿衆旒所著素陛龍于縿畫白龍於縿令上向練旒九練絳練也飾以組用綦組飾旒之籩維以縷用朱縷維連持之不欲令曳地周禮曰六人維王之大常是也緇廣充幅長尋曰旐帛全幅長八尺繼旐曰斾帛續旐末為燕尾者義見詩注旄首曰旌載旄於竿頭如今之幢亦有旒有鈴曰旗縣鈴於竿頭畫交龍於旒錯革鳥曰旟此謂合剝鳥皮毛置之竿頭即禮記云載鴻及鳴鳶因章曰旃以白練為旒因其文章不復畫之周禮云通帛為旃爾雅司常掌九旗之物名各有屬以待國事日月為常交龍為旗通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌物名者所畫異物則異名也屬謂徽識也大傳謂之徽號今城門僕射所被及亭長著絳衣皆其舊象通帛謂大赤從周正色無飾雜帛者以帛素飾其側白殷之正色全羽析羽皆五采繫之於旞旌之上所謂注旄於干首也凡九旗之帛皆用絳及國之大閲贊司馬頒旗物王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌仲冬教大閲司馬主其禮自王以下治民者旗畫成物之象王畫日月象天明也諸侯畫交龍一象其升朝一象其下復也孤卿不畫言奉王之政教而已大夫士雜帛言以先王正道佐職也師都六鄉六遂大夫也謂之師都都民所聚也畫熊虎者鄉遂出軍賦象其守猛莫敢犯也州里縣鄙鄉遂之官互約言之鳥隼象其勇捷也龜蛇象其扞難辟害也道車象路也王以朝夕燕出入遊車木路也王以田以鄙全羽析羽五色象其文德也大閲王乘戎路建大常焉玉路金路不出皆畫其象焉官府各象其事州里各象其名家各象其號事名號者徽識所以題别衆臣樹之於位朝者各就焉覲禮曰公侯伯子男皆就其旗而立此其類也或謂之事或謂之名或謂之號異外內也三者旌旗之細也士喪禮曰為名各以其物亡則以緇長半幅赬末長終幅廣三寸書名於末此蓋其制也徽識之書則云某某之事某某之名某某之號今大閲禮象而為之兵凶事若有死事者亦當以相别也杜子春云畫當為書玄謂畫畫雲氣也異於在國軍事之飾歲時共更旌取舊與新春官上公建常九斿侯伯建常七斿子男建常五斿常旌旗也斿其屬幓垂者也大行人武車綏旌盡飾也綏謂垂舒之也武車亦兵車德車結旌不盡飾也結謂收斂之也德車乘車曲禮軫之方也以象地也蓋之圜也以象天也輪輻三十以象日月也蓋弓二十有八以象星也輪象日月者以其運行也日月三十日而合宿龍旗九斿以象大火也交龍為旗諸侯之所建也大火蒼龍宿之心其屬有尾尾九星鳥旟七斿以象鶉火也鳥隼為旟州里之所建鶉火朱鳥宿之柳其屬有星星七星熊旗六斿以象伐也熊虎為旗師都之所建伐屬白虎宿與參連體而六星龜蛇四斿以象營室也龜蛇為旐縣鄙之所建營室玄武宿與東璧連體而四星弧旌枉矢以象弧也覲禮曰侯氏載龍旗弧韣則旌旗之屬皆有弧也弧以張縿之幅有衣謂之韣又為設矢象􅓡星有矢也妖星有枉矢者蛇行有尾因此云枉矢蓋畫之考工記春天子乘鸞路駕蒼龍載青旗鸞路有虞氏之車有鸞和之節而飾之以青取其名耳春言鸞冬夏言色互文馬八尺以上為龍凡此車馬皆所取於殷時而有變焉非周制也周禮朝祀戎獵車服各以其事不以四時為異夏天子乘朱路駕赤駵載赤旗中央天子乘大路駕黃駵載黃旗大路殷路也車如殷路之制而飾之以黃秋天子乘戎路駕白駱載白旗戎路兵車也制如周革路而飾之以白白馬黑鬛曰駱冬天子乘玄路駕鐵驪載玄旗鐡驪色如鐡月令右車旗分魯公以大路大旗魯公伯禽也此大路金路賜同姓諸侯車也交龍為旗周禮同姓以封分康叔以大路少帛綪茷旃旌少帛雜帛也綪茷大赤取染草名也通帛為旃析羽為旌定四年左氏傳魯君孟春乘大路載弧韣旗十有二旒日月之章祀帝于郊配以后稷天子之禮也大路殷之祭天車也弧旌旗所以張幅也其衣曰韣天子之旌旗畫日月明堂位衛新築人仲叔于奚救孫桓子請繁纓以朝許之詳見總要章鄭公孫蠆卒范宣子言於晉侯以其善於伐秦也十四年晉伐秦子蟜見諸侯師而勸之濟涇晉侯請於王王追賜之大路使以行禮也大路天子所賜車之總名以行葬禮傳言大夫有功則賜服路襄十九年左氏傳穆叔如周聘王嘉其有禮也賜之大路大路天子所賜車之總名為昭四年叔孫以所賜路葬張本襄二十四年昭公四年叔孫卒杜泄將以路葬且盡卿禮路王所賜叔孫車南遺謂季孫曰叔孫未乘路葬焉用之且冢卿無路介卿以葬不亦左乎冢孫謂季孫介次也左不便季孫曰然使杜泄舍路舍置也不可曰夫子受命於朝而聘於王在襄二十四年夫子謂叔孫王思舊勳而賜之路感其有禮以念其先人復命而致之君豹不敢自乘君不敢逆王命而復賜之使三官書之吾子為司徒實書名謂季孫也書名定位號夫子為司馬與工正書服謂叔孫也服車服之器工正所書孟孫為司空以書勳勳功也今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以葬左氏傳公會晉師于上鄍賜三帥先路三命之服三帥郤克士燮欒書已嘗受王先路之賜今改而易新并此車所建所服之物司馬司空輿師候正亞旅皆受一命之服晉司馬司空皆大夫輿師主兵車候正主斥候亞旅亦大夫也皆魯侯賜成二年左氏傳絳之富商韋藩木楗以過於朝唯其功庸少也韋藩韋蔽前後木楗木簷也言無功庸雖富不得服其尊服過於朝無位爵故也國語晉語詳見職官下篇孟子曰齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不往也萬章曰敢問招虞人何以曰以皮冠庶人以旃士以旗大夫以旌皮冠田獵之冠也事見春秋傳然則皮冠者虞人之所有事也故以是招之庶人未仕之臣通帛曰旃士謂已仕者交龍為旗析羽而注於旗干之首曰旌孟子楚子之為令尹也為王旌以田析羽為旌王旌遊至于軫芋尹無宇斷之曰一國兩君其誰堪之昭七年左氏傳齊欒高氏伐虎門公卜使王黑以靈姑銔率吉請斷三尺焉而用之王黑齊大夫靈姑銔公旗名斷三尺不敢與君同昭十年左氏傳范宣子假羽毛於齊而弗歸齊人始二析羽為旌王者遊車之所建齊私有之因謂之羽毛宣子聞而借觀之襄十四年左氏傳召陵之會晉人假羽旄於鄭鄭人與之析羽為旌王者遊車之所建鄭私有之因謂之羽旄借觀之明日或斾以會或賤者也繼旐曰斾令賤人施其斾執以從會示卑鄭晉於是乎失諸侯傳言晉無禮所以遂弱定四年左氏傳舜輯五瑞既月乃日覲四嶽羣牧班瑞于羣后輯斂瑞信也公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧五等諸侯執之以合符于天子而驗其信否也周禮天子執冒以朝諸侯鄭氏注云名玉以冒以德覆冒天下也諸侯始受命天子錫以圭圭頭斜脫其冒下斜刻小大長短廣狹如之諸侯來朝天子以刻處冒其圭頭有不同者即辨其偽也班頒同既見之後審知非偽則又頒還其瑞以與天下正始也舜典大宗伯以玊作六瑞以等邦國等猶齊等也王執鎮圭鎮安也所以安四方鎮圭者蓋以四鎮之山為瑑飾圭長尺有二寸公執桓圭公二王之後及王之上公雙植謂之桓桓宮室之象所以安其上也桓圭蓋亦以桓為瑑飾圭長九寸侯執信圭伯執躬圭信當為身聲之誤也信圭躬圭蓋皆象以人形為瑑飾文有粗縟耳欲其慎行以保身圭皆長七寸子執榖璧男執蒲璧穀所以養人蒲為席所以安人二玊蓋或以榖為飾或以蒲為瑑飾璧皆徑五寸不執圭者未成國也以玊作六器以禮天地四方禮謂始告神時薦於神座書曰周公植璧秉圭是也以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方禮神者必象其類璧圓象天琮八方象地圭鋭象春物初生半圭曰璋象夏物半死琥猛象秋嚴半璧曰璜象冬閉藏地上無物唯天半見春官典瑞掌玊瑞玊器之藏辨其名物與其用事設其服飾人執以見曰瑞禮神曰器瑞符信也服飾服玉之飾謂繅藉王晉大圭執鎮圭繅藉五采五就以朝日繅有五采文所以薦玉木為中幹用韋衣而畫之成就也王朝日者示有所尊訓民事君也天子常春分朝日秋分夕月覲禮曰拜日於東門之外故書鎮作瑱鄭司農云晉讀為搢紳之搢謂插于紳帶之間若帶劔也瑱讀為鎮玉人職曰大圭長三尺杼上終葵首天子服之鎮圭尺有二寸天子守之繅讀為藻率之藻五就五匝也一匝為一就公執桓圭侯執信圭伯執躬圭繅皆三采三就子執榖璧男執蒲璧繅皆二采再就以朝覲宗遇會同于王三采朱白蒼二采朱緑也鄭司農云以圭璧見于王覲禮曰侯氏入門右坐奠圭再拜稽首侯氏見于天子春曰朝夏曰宗秋曰覲冬曰遇時見曰會殷見曰同諸侯相見亦如之鄭司農云亦執圭璧以相見故邾隱公朝于魯春秋傳曰邾子執玊高其容仰瑑圭璋璧琮繅皆二采一就以俯聘璋以聘后夫人以琮享之也大夫衆來曰俯寡來曰聘鄭司農云瑑有圻鄂瑑起四圭有邸以祀天旅上帝鄭司農云於中央為璧圭著其四面一玉俱成爾雅曰邸本也圭本著於璧故四圭有邸圭末四出故也或説四圭有邸有四角也邸讀為抵欺之抵上帝玄天玄謂祀天夏正郊天也上帝五帝所郊亦猶五帝殊言天者尊異之也大宗伯職曰國有大故則旅上帝及四望兩圭有邸以祀地旅四望兩圭者以象地數二也僢而同邸祀地謂所祀於北郊神州之神祼圭有瓚以肆先王以祼賓客鄭司農云於圭頭為器可以挹鬯祼祭謂之瓚故詩曰恤彼玊瓚黃流在中國語謂之鬯圭以肆先王祼先王祭也玄謂肆解牲體以祭因以為名爵行曰祼漢禮瓚槃大五升口徑八寸下有槃口徑一尺圭璧以祀日月星辰圭其邸為璧取殺于上帝璋邸射以祀山川以造贈賓客璋有邸而射取殺于四望鄭司農云射琰也土圭以致四時日月封國則以土地以致四時日月者度其景至不至以知其行得失也冬夏以致日春秋以致月土地猶度地也封諸侯以土圭度日景觀分寸長短以制其域所封也鄭司農説以玊人職曰土圭尺有五寸以致日以土地以求地中故謂之土圭珍圭以徴守以恤凶荒杜子春云珍當為鎮書亦或為鎮以徴守者以徴召守國諸侯若今時徴郡守以竹使符也鎮者國之鎮諸侯亦一國之鎮故以鎮圭徴之也凶荒則民有遠志不安其土故以鎮圭鎮安之玄謂珍圭王使之瑞節制大小當與琬琰相依王使人徴諸侯憂凶荒之國則授之執以往致王命焉如今時使者持節矣恤者闓府庫振救之凡瑞節歸又執以反命牙璋以起軍旅以治兵守鄭司農云牙璋瑑以為牙牙齒兵象故以牙璋發兵若今時以銅虎符發兵玄謂牙璋亦王使之瑞節兵守用兵所守若齊人戍遂諸侯戍周璧羡以起度鄭司農云羡長也此璧徑長尺以起度量玊人職曰璧羡度尺以為度玄謂羡不圜之貌蓋廣徑八寸袤一尺穀圭以和難以聘女穀圭亦王使之瑞節穀善也其飾若粟文然難仇讐和之者若春秋宣公及齊侯平莒及郯晉侯使瑕嘉平戎于王其聘女則以納徴焉琬圭以治德以結好琬圭亦王使之瑞節請侯有德王命賜之及諸侯使大夫來聘既而為壇會之使大夫執以命事焉大行人職曰時聘以結諸侯之好鄭司農云琬圭無鋒芒故治德以結好琰圭以易行以除慝琰圭亦王使之瑞節鄭司農云琰圭有鋒芒傷害征伐誅討之象故以易行除慝易惡行令為善者以此圭責讓喻告之也玄謂除慝亦於諸侯使大夫求眺既而使大夫執而命事於壇大行人職曰殷眺以除邦國之慝大祭祀大旅凡賓客之事共其玊器而奉之玊器謂四圭祼圭之屬凡玊器出則共奉之玊器出謂玊所好賜也奉之送以往遠則送於使者同上玊人之事鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之命圭者王所命之圭也朝覲執焉居則守之子守穀璧男守蒲璧不言之者闕耳故書或云命圭五寸謂之躬圭杜子春云當為七寸玄謂五寸者璧文之闕亂存焉天子執冒四寸以朝諸侯名玊曰冒者言德能覆蓋天下也四寸者方以尊接卑以小為貴天子用全上公用龍侯用瓚伯用將鄭司農云全純色也龍當為尨尨謂雜色玄謂全純玊也瓚讀為􅊡􅖸之􅖸龍瓚將皆雜名也卑者下尊以輕重為差玉多則重石多則輕公侯四玊一石伯子男三玉一石繼子男執皮帛謂公之孤也見禮次子男贄用束帛而以豹皮表之為飾天子之孤表帛以虎皮此説玊及皮帛者遂言見天子之用贄天子圭中必必讀如鹿車縪之縪謂以組約其中央為執之以備失墜四圭尺有二寸以祀天郊天所以祀其神也典瑞職曰四圭有邸以祀天旅上帝大圭長二尺杼上終葵首天子服之王所搢大圭也或謂之挺終葵椎也為椎於其杼上明無所屈也杼閷也相玊書曰珽玊六寸明自照土圭尺有五寸以致日以土地致日度景至不夏日至之景尺有五寸冬日至之景丈有三尺土猶度也建邦國以度其地而致其域祼圭尺有二寸有瓚以祀廟祼之言灌也或作淉或作果祼謂始獻酹奠也瓚如盤其柄用圭有流前注琬圭九寸而繅以象德琬猶圜也王使之瑞節也諸侯有德王命賜之使者執琬圭以致命焉繅藉也琰圭九寸判規以除慝以易行凡圭琰上寸半琰圭琰半以上又半為瑑飾諸侯有為不義使者征之執以瑞節也除慝誅惡逆也易行去煩苛璧羡度尺好三寸以為度鄭司農云羡徑也好璧孔也爾雅曰肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環玄謂羡猶延其袤一尺而廣狹焉圭璧五寸以祀日月星辰禮其神也圭其邸為璧取殺於上帝璧琮九寸諸侯以享天子享獻也聘禮享君以璧享夫人以琮穀圭七寸天子以聘女納徴加於束帛大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬射琰出者也勺故書或為約杜子春云當為勺謂酒尊中勺也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也玄謂鼻勺流也凡流皆為龍口也衡古文橫假借字也衡謂勺徑也三璋之勺形如圭瓚天子巡守有事山川則用灌焉於大山川則用大璋加文飾也於中山川用中璋殺文飾也於小山川用邊璋半文飾也其祈沈以馬宗祝亦執勺以先之禮王過大山川則大祝用事焉將有事於四海山川則校人飾黃駒大璋亦如之諸侯以聘女亦納徴加於束帛也大璋者以大璋之文飾之也亦如之者如邊璋七寸射四寸瑑圭璋八寸璧琮八寸以眺聘瑑文飾也眺視也聘問也衆來曰眺特來曰聘聘禮曰凡四器者唯其所寶以聘可也牙璋中璋七寸射二寸厚寸以起軍旅以治兵守二璋皆有鉏牙之飾於琰側先言牙璋有文飾也駔琮五寸宗后以為權駔讀為組以組繫之因名焉鄭司農云以為稱錘以起量大琮十有二寸射四寸厚寸是謂內鎮宗后守之如玉之鎮圭也射其外鉏牙駔琮七寸鼻寸有半寸天子以為權鄭司農云以為權故有鼻也兩圭有邸以祀地以旅四望邸謂之柢有邸僢共本也瑑琮八寸諸侯以享夫人獻於所朝聘君之夫人也案十有二寸棗栗十有二列諸侯純九大夫純五夫人以勞諸侯純猶皆也鄭司農云案玊案也夫人天子夫人玄謂案玉飾案也夫人王后也記時諸侯僭稱王而夫人之號不别是以同王后於夫人也玊案十二以為列王后勞朝諸侯皆九列聘大夫皆五列則十有二列者勞二王之後也棗栗實於器乃加于案聘禮曰夫人使下大夫勞以二竹簋方玄被纁裏有蓋實棗蒸栗擇兼執之以進璋邸射素功以祀山川以致稍餼邸射剡而出也致稍餼造賓客納稟食也鄭司農云素功無瑑飾也餼或作氣杜子春云當為餼考工記小行人成六瑞王用瑱圭公用桓圭侯用信圭伯用躬圭子用榖璧男用蒲璧成平也瑞信也皆朝見所執以為信秋官贊大行曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半玊也藻三采六等贊大行者書説大行人之禮者名也藻薦玊者也三采六等以朱白蒼畫之再行也子男執璧作此贊者失之矣雜記下所以朝天子圭與繅皆九寸剡上寸半厚半寸博三寸繅三采六等朱白蒼圭所執以為瑞節也剡上象天圜地方也雜采曰繅以韋衣木版飾以三色再就所以薦玊重慎也九寸上公之圭也古文繅或作藻今文作璪問諸侯朱緑繅八寸二采再就降於天子也於天子曰朝於諸侯曰問記之于聘文互相備皆玄纁繫長尺絢組采成文曰絢繫無事則以繫玊因以為飾皆用五采組上以玄下以絳為地今文絢作聘禮諸侯以圭為瑞家不藏圭瑞信也諸侯執瑞孤卿以下執摯禮器聘人以圭問事以璧召人以瑗絶人以玦反絶以環聘人以圭謂使人聘他國以圭璋也問謂訪其國事因遺之也衛侯使尹襄問子貢以弓是其類也説文曰瑗者大孔璧也爾雅好倍肉謂之瑗肉倍好謂之璧禮記曰君召臣以三節周禮珍圭以徴守鄭云以徴召守國之諸侯若今徴郡守以竹使符也然則天子以珍圭召諸侯諸侯召臣以瑗歟玦如環而缺肉好若一謂之環古者臣有罪待放于境三年不敢去與之環則還與之𬒮則絶皆所以見意也反絶謂反其將絶者此明諸侯以玊接人臣之禮也荀子大略璲瑞也詩曰鞙鞙佩璲璲者玊瑞玊十謂之區雙玊曰玨五玨為區圭大尺二寸謂之玠詩曰錫爾玠圭璋大八寸謂之琡璋半圭也璧大六寸謂之宣漢書所云瑄玊是也肉倍好謂之璧肉邊也好孔也好倍肉謂之瑗孔大于邊也肉好若一謂之環邊孔適等繸綬也即佩玊之組所以連繫瑞玊者因通謂之繸爾雅右玊器子貢問于孔子曰敢問君子貴王而賤碈者何也為玊之寡而碈之多與碈石似玊或作玫也孔子曰非為珉之多故賤之也玊之寡故貴之也夫昔者君子比德於玊焉溫潤而澤仁也色柔溫潤似仁也潤或作濡縝密以栗知也縝緻也栗堅貌亷而不劌義也劌傷也義者不苟傷人也垂之如隊禮也禮尚謙卑叩之其聲清越以長其終詘然樂也樂作則有聲止則無也越猶揚也詘絶止聲也樂記曰止如稿木瑕不掩瑜瑜不掩瑕忠也瑕玊之病也瑜其中間美者玊之性善惡不相掩似忠也孚尹旁達信也孚讀為浮尹讀為竹箭之筠浮筠謂玊采色也采色旁達不相隱翳似信也孚或作姇或為扶氣如白虹天也精神見于山川地也精神亦謂精氣也虹天氣也山川地所以通氣也圭璋特達德也特達謂以朝聘也璧琮則有幣有德者無所不達不有須而成也天下莫不貴者道也道者人無不由之詩云言念君子言我也溫其如玊故君子貴之也聘義何謂五瑞謂圭璧琮璜璋也禮王度記曰玊者有象君之德燥不輕濕不重薄不澆亷不傷疵不掩是以人君寶之天子之純玊尺有二寸公侯九寸四玊一石也伯子男俱三玊一石也五玊各何施蓋以為璜以徴召璧以聘問璋以發兵圭以信質琮以起土功之事也圭以為信者何圭者兌上象物皆生見于上也信莫著于作見故以圭為信而見萬物之始莫不自潔圭之為言潔也上兌陽也下方隂也陽尊故其禮順備也在位東方陽見義于上也璧以聘問何璧者方中圓外象地地道安寧而出財物故以璧聘問也位在中央璧之為言積也中央故有天地之象所以據用也璜所以徴召何璜者半璧位在北方北方隂極而陽始起故象半隂陽氣始施徴召萬物故以徴召也璜之為言光也陽光所及萬物不動也象君之威命所加莫敢不從璋以發兵何璋半圭位在南方南方陽極而隂始起兵亦隂也故以發兵也璋之為言明也賞罰之道使臣當章明也南方之時萬物莫不章故謂之璋琮以起土功發聚衆何琮之為言聚也象萬物之宗聚聖也功之所成故以起土功發衆也位西方西方陽收功於內隂出域于外內圓象陽外直為隂外牙而內湊象聚會也故謂之琮后夫人之財也五玊所施非一不可勝條略舉其大者也白虎通歲二月東巡守肆覲東后五玊三帛二生一死贄五玊五等諸侯所執者即五瑞也三帛諸侯世子執纁公之孤執玄附庸之君執黃二生卿執羔大夫執鴈一死士執雉五玊三帛二生一死所以為贄而見者舜典大宗伯以禽作六摯以等諸臣摯之言至所執以自致孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工商執雞皮帛者束帛而表以皮為之飾皮虎豹皮帛如今璧色繒也羔小羊取其羣而不失其類鴈取其候時而行雉取其守介而死不失其節鶩取其不飛遷雞取其守時而動曲禮曰飾羔鴈者以繢謂衣之以布而又畫之者自雉以下執之無飾士相見之禮卿大夫飾摯以布不言繢者諸侯之臣與天子之臣異也然則天子之孤飾摯以虎皮公之孤飾摯以豹皮與此孤卿大夫士之摯皆以爵不以命數凡摯無庭實春官凡摯天子鬯諸侯圭卿羔大夫鴈士雉庶人之摯匹童子委摯而退摯之言至也天子無客禮以鬯為摯者所以唯用告神為至也童子委摯而退不與成人為禮也説者以匹為鶩野外軍中無摯以纓拾矢可也非為禮之處用時物相禮而已纓馬繁纓也拾謂射韝曲禮飾羔鴈者以繢繢畫也諸侯大夫以布天子大夫以畫同上婦人之摯椇榛脯修棗栗婦人無外事見以羞物也椇榛木名椇枳也有實今邳郯之東食之榛似栗而小同上右摯臣見君所以有贄何贄者質己之誠致己之悃愊也王者緣臣子之心以為之制差其尊卑以副其意公侯以玊為贄者玊取其燥不輕濕不重公之德全卿以羔者取其羣不黨卿職在盡忠率下不阿黨也大夫以鴈為贄者取其飛成行列大夫職在以奉命之適四方動作當能自正以事君也士以雉為贄者取其不可誘之以食攝之以威必死不可生畜士行威守節死義不當移轉也卿大夫贄古以麑鹿今以羔鴈何以為古者質取其內謂得美草鳴相呼今文取其外謂羔跪乳鴈有行列也私相見亦有贄何所以相尊敬長和睦也朋友之際五常之道有通財之義賑窮告急之意中心好之欲飲食之故財幣者所以副至意也婦人之贄以棗栗腶修者婦人無專制之義御衆之任交接辭讓之禮職在供養饋食之間其義一也故后夫人以棗栗腵修者凡肉修隂也棗取其朝早起栗戰栗自正也白虎通相劉氏義見士見義齊伐魯晉士鞅趙鞅荀寅救魯公會晉師于瓦范獻子執羔趙簡子中行文子皆執鴈魯公於是始尚羔獻子士鞅也簡子趙鞅也中行文子荀寅也禮卿執羔大夫執鴈魯則同之今始知執羔之尊也定公八年左氏傳掌節掌守邦節而辨其用以輔王命邦節者珍圭牙璋穀圭琬圭琰圭也王有命則别其節之用以授使者輔王命者執以行為信守邦國者用玊節守都鄙者用角節謂諸侯於其國中公卿大夫王子弟於其采邑有命者亦自有節以輔之玊節之制以玊為之以命數為小大角用犀角其制未聞凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩為之使節卿大夫聘於天子諸侯行道所執之信也土平地也山多虎平地多人澤多龍以金為節鑄象焉必自以其國所多者於以相别為信明也今漢有銅虎符杜子春云蕩皆為帑謂以函器盛此節或曰英蕩畫函門關用符節貨賄用璽節道路用旌節皆有期以反節門關司門司關也貨賄者主通貨賄之官謂司市也道路者主治五塗之官謂鄉遂大夫也凡民遠出至於邦國邦國之民若來入由門者司門為之節由關者司關為之節其商則司市為之節其以徴令及家徙則鄉遂大夫為之節唯時事而行不出關不用節也變司市言貨賄者璽節主以通貨賄貨賄非必由市或資于民家焉變鄉遂言道路者容公邑及小都大都之吏皆主治五塗亦有民也符節者如今宫中諸官詔符也璽節者今之印章也旌節今使者所擁節是也將送者執此節以送行者皆以道里日時課如今郵行有程矣以防容姦擅有所通也凡節有法式藏於掌節凡通達於天下者必有節以傳輔之必有節言逺行無有不得節而出者也輔之以傳者節為信耳傳説所齎操及所適無節者有幾則不達圜土內之官地小行人達天下之六節山國用虎節土國用人節澤國用龍節皆以金為之道路用旌節門關用符節都鄙用管節皆以竹為之此謂邦國之節也達之者使之四方亦皆齎法式以齊等之也諸侯使臣行眺聘則以金節授之以為行道之信也虎人龍者自其國象也道路謂鄉遂大夫也都鄙者公之子弟及卿大夫之采地之吏也凡邦國之民逺出至他邦他邦之民若來入由國門者門人為之節由關者關人為之節其以徴令及家徙鄉遂大夫及采地吏為之節皆使人執節將之以達之亦有期以反節管節如今之竹使符也其有商者通之以符節如門關門關者與市聫事節可同也亦所以異於畿內也凡節有天子法式存於國秋官右節崇鼎貫鼎大璜封父龜天子之器也崇貫封父皆國名文王伐崇古者伐國遷其重器以分同姓大璜夏后氏之璜春秋傳曰分魯公以夏后氏之璜越棘大弓天子之戎器也越國名也棘戟也春秋傳曰子都拔棘明堂位禮有以下為貴者天子諸侯之尊廢禁大夫士棜禁廢猶去也棜斯禁也謂之棜者無足有似於棜或因名云耳大夫用斯禁士用棜禁如今方按隋長局足高三寸禮器大夫側尊用棜士側尊用禁棜斯禁也無足有似於棜是以言棜玊藻梓人為飲器勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣勺尊升也觚豆字聲之誤觚當為觶豆當為斗食一豆肉餘一豆酒中人之食也一豆酒又聲之誤當為斗凡試梓飲器鄉衡而實不盡梓師罪之鄭司農云梓師罪也衡謂麋衡也曲禮執君器齊衡玄謂衡平也平爵鄉口酒不盡則梓人之長罪於梓人焉考工記陶人為甗實二釜厚半寸脣寸盆實二釜厚半寸脣寸甑實二釜厚半寸脣寸七穿量六斗四升曰釜鄭司農云甗無底甑鬲實五觳厚半寸脣寸庾實二觳厚半寸脣寸鄭司農云觳讀為斛觳受三斗聘禮記有斛玄謂豆實三而成觳則觳受斗二升庾讀如請益與之庾之庾同上瓬人為簋實一觳崇尺厚半寸脣寸豆實三而成觳崇尺崇高也豆實四升凡陶瓬之事髺墾薜暴不入市為其不任用也鄭司農云髺讀刮薜讀為藥黃蘗之蘗暴讀為剝玄謂髺讀為跀墾頓傷也薜破裂也暴墳起不堅緻也器中膞豆中縣膊讀如車輇之輇既附泥而轉其均尌膞其側以擬度端其器也縣縣繩正豆之柄膞崇四尺方四寸凡器高於此則垺不能相勝厚於此則火氣不交因取式焉同上鼎絶大謂之鼐最大者圜弇上謂之鼒鼎斂上而小口附耳外謂之釴鼎耳在表款足者謂之鬲鼎曲腳也甑謂之鬵詩曰溉之釜鬵爾雅右雜器定公八年盜竊寶玉大弓寶者何璋判白判半也半圭曰璋白藏天子青藏諸侯魯得郊天故錫之白不言璋言玊者起圭璧琮璜五玊盡亡之也傳獨言璋者所以郊事天尤重詩云奉璋峨峨髦士攸宜是也禮圭以朝璧以聘琮以發兵璜以發衆璋以徴召弓繡質質柎也言大者力千斤龜青純純緣也謂緣甲頩也千歲之龜青明于吉凶經不言龜者以先知從寶省文謂之寶者世世寶用之辭此皆魯始封之錫傳春秋公羊巡守同律度量衡律法制及尺丈斛斗斤兩皆均同舜典謹權量審法度權稱錘也量斗斛也法度禮樂制度皆是也論語典瑞璧羡以起度鄭司農云羡長也此璧徑長尺以起度量玉人職曰璧羡度尺以為度玄謂羡不圜之貌蓋廣徑八寸袤一尺春官玊人璧羡度尺好三寸以為度鄭司農云羡徑也好璧孔也爾雅曰肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環玄謂羡猶延其邪一尺而廣狹焉考工記栗氏為量量豆區釜也改煎金錫則不耗消涷之精不復減也栗古文或作歷玄謂量當與鍾鼎同齊工異者大器不耗然後權之權謂稱分之也雖異法用金必齊權之然後準之準故書或作水杜子春云當為水金器有孔者水入孔中則當重也玄謂準擊平正之又當齊大小準之然後量之鑄之於法中也量讀如量人之量量之以為釜深尺內方尺而圜其外其實一釜以其容為之名也四升曰豆四豆曰區四區曰釜釜六斗四升也釜十則鐘方尺積千寸於今粟米法少二升八十一分升之二十二其數必容釜此言內方耳圜其外者為之脣其臀一升其實一豆故書臀作脣杜子春云當為臀謂覆之其底深一寸也其耳三寸其實一升耳在旁可舉也重一鈞重三十斤其聲中黃鐘之宫應律之首概而不稅鄭司農云令百姓得以量而不租稅其銘曰時文思索允臻其極銘刻之也時是也允信也臻至也極中也言是文德之君思求可以為民立法者而作此量信至于道之中嘉量既成以觀四國以觀示四方使放象之永啓厥後兹器維則永長也厥其也兹此也又長啓道其子孫使法則此器長用之考工記駔鬃五寸宗后以為權駔讀為組以組繫之因名焉鄭司農云以為稱錘以起量駔鬃七寸鼻寸有半寸天子以為權鄭司農云以為權故有鼻也玊人內宰凡建國佐后立市出其度量淳制度丈尺也量豆區之屬故書淳為敦杜子春讀敦為純純謂幅廣也制謂匹長玄謂純制天子巡守禮所云制幣丈八尺純四􅡥與天官質人同其度量一其淳制巡而考之犯禁者舉而罰之杜子春云淳當為純純謂幅廣制謂匹長也皆當中度量地官合方氏同其數器權衡不得有輕重一其度量尺丈釜鍾不得有大小夏官大行人王之所以撫邦國諸侯者十有一歲同度量同數器度丈尺也量豆區釜也數器銓衡也秋官仲春日夜分則同度量鈞衡石角斗甬正權概因晝夜等而平當平也同角正皆謂平之也丈尺曰度斗斛曰量三十斤曰鈞稱上曰衡百二十斤曰石甬今斛也稱錘曰權概平斗斛者仲秋日夜分則同度量平權衡正鈞石角斗甬月令權與物均而生衡衡運生規規圜生矩矩方生繩繩直生準準正則平衡而鈞權矣是謂五則百工繇焉以定法式輔弼執玊以翼天子以隂陽言之冬權夏衡秋矩春規中央為繩五則揆物有輕重圜方平直隂陽之義四方四時之體五常五行之象厥法有品各順其方而應其行前漢律歷志右度量權衡明明我祖萬邦之君有典有則貽厥子孫關石和鈞王府則有我祖禹也關通和平也百二十斤為石三十斤為鈞鈞與石五權之最重者也鈞石之設所以一天下之輕重而立民信者王府亦有之五子之歌晏子曰齊舊四量豆區釜鍾四升為豆各自其四以登於釜四豆為區區斗六升四區為釜釜六斗四升登成也釜十則鍾六斛四斗陳氏三量皆登一焉鍾乃大矣登加也加一謂加舊量之一也以五升為豆五豆為區五區為釡則區二斗釜八斗鍾八斛以家量貸而以公量收之貸厚而收薄年昭三年左氏傳陳又昭二十六晏子對景公曰氏雖無大德而有施於民豆區釜鍾之數其取之公也薄其施之民也厚公厚斂焉陳氏厚施焉民歸之矣禮書綱目卷七十一
