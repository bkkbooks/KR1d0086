body:
  text: 禮書綱目卷四十二婺源江永撰天子諸侯廟吉禮九補自天子達於庶人祭從生者詳見祭法王者禘其祖之所自出以其祖配之禘大祭也始祖感天神靈而生祭天則以祖配之自外至者無主不止而立四廟高祖以下與始祖而五庶子王亦如之世子有廢疾不可立而庶子立其祭天立廟亦如世子之立也春秋時衛侯元有兄縶喪服小記父為士子為天子諸侯則祭以天子諸侯其尸服以士服詳見祭法諸侯不敢祖天子詳見宗廟有天疾者不得入乎宗廟昭公二十年穀梁傳右祭主武王末受命周公成文武之德追王大王王季上祀先公以天子之禮斯禮也逹乎諸侯大夫及士庶人詳見祭法有虞氏禘黃帝夏后氏亦禘黃帝殷人禘嚳周人禘嚳詳見祭法祖此條論四代禘祭始所自出禮不王不禘王者禘其祖之所自出以其祖配之凡大祭曰禘自由也大祭其先祖所由生謂郊祀天也王者之先祖皆感大微五帝之精以生蒼則靈威仰赤則赤熛怒黃則含樞紐白則白招拒黑則汁光紀皆用正嵗之正月郊祭之蓋特尊焉孝經曰郊祀后稷以配天配靈威仰也宗祀文王於明堂以配上帝泛配五帝也諸侯及其大祖大祖受封君也大夫士有大事省於其君干祫及其髙祖大事冦戎之事也省善也善於其君謂免於大難也干猶空也空祫謂無廟祫祭之於壇墠大傳所趙伯循曰禮記大傳云禮不王不禘王者禘其祖之自出以其祖配之又喪服小記曰王者禘其祖之所自出又下云禮不王不禘正與大傳同則諸侯不得禘禮明矣是以祭法云有虞氏禘黃帝舜祖顓頊顓頊出於黃帝則所為禘其祖之所自出也而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝義同舜也而郊鯀祖顓頊而宗禹殷人禘嚳殷祖契出自嚳而郊冥祖契而宗湯周人禘嚳義與殷同而郊稷祖文王而宗武王禘者帝王立始祖之廟猶謂未盡其追逺尊先之義故又推尋始祖所出之帝而追祀之以其祖配之者謂於始祖廟祭之而便以始祖配祭也此祭不兼羣廟之主為其疏逺不敢䙝狎也鄭𤣥注祭法云禘為配祭昊天上帝於圜丘也蓋見祭法所說文在郊上謂為郊之最大者故為此說耳祭法所論禘郊祖宗者謂六廟之外永世不絶者有四種耳非關配祭也禘之所及最逺故先言之爾何關園丘哉然則春秋書魯之禘何也曰成王追寵周公故也祭統云成王追念周公賜之重祭郊社禘嘗是也魯之用禘蓋於周公廟而上及文王即周公之所出故也諸侯及其大祖天子及其始祖之所自出喪服傳詳見祭義不已上二條論王不禘大宗伯以肆獻祼享先王以饋食享先王肆獻祼饋食在四時之上則是祫也禘也肆者進所解牲醴謂薦熟時也獻獻體謂薦血腥也祼之言灌灌以鬱鬯謂始獻尸求神時也郊特牲曰魂氣歸於天形魄歸於地故祭所以求諸陰陽之義也殷人先求諸陽周人先求諸陰灌是也祭必先灌乃後薦腥薦熟於祫逆言之者與下共文明六享俱然祫言肆獻祼禘言饋食者著有黍稷互相備也魯禮三年喪畢而祫於大祖明年春禘於羣廟自爾以後率五年而再殷祭一祫十禘禘春官祫按鄭氏謂祫大於禘故先祫而後禘後儒謂大於故以肆獻祼為禘饋食為祫其實禘亦有饋食祫亦有肆獻祼故兼載之下章倣此此條周禮通言禘兼及祫司尊彝凡四時之間祀追享朝享祼用虎彛蜼彛皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也鄭司農云追享朝享謂禘祫也在四時之間故曰間祀大尊大古之瓦尊山尊山罍也明堂位曰泰有虞氏之尊也山罍夏后氏之尊𤣥謂追享謂追祭遷廟之主以事有所請禱朝享謂朝受政於廟春秋傳曰閏月不告朔猶朝於廟蜼禺屬卬鼻而長尾山罍亦刻而畫之為山雲之形同上今按追享朝享先鄭說是郊禘不過繭栗角如繭栗郊禘祭天也是國語楚語按注說非天子禘郊之事必自射其牲王后必自舂其粢天子親舂禘郊之盛王后親繅其服同上詳見祭義禘郊之事則有全蒸注見天神篇周語天府掌祖廟之守藏凡國之玉鎮大寶器藏焉若有大祭則出而陳之既事藏之禘祫陳之以華國也通詳見宗廟春官祫用大司樂凡樂黃鍾為宫大吕為角大蔟為徴應鍾為羽路鼓路鼗陰竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣本文凡樂上有天神地示二節人此三者皆禘大祭也天神則主北辰地祗則主崑崙鬼則主后稷先奏是樂以致其神禮之以玉而祼焉乃後合樂而祭之大傳曰王者必禘其祖之所自出祭法曰周人禘嚳而郊稷謂此祭天圜丘以嚳配之上詳見祭物樂同上略按注以禘為祭天非是此已禘祭禮物舞之其禮節與時祭同者詳見後右禘魯禘見下禘大祭也五年一大祭爾雅昔者周公旦有勳勞於天下周公既沒成王康王追念周公之所以勳勞者而欲尊魯故賜之以重祭內祭則大嘗禘是也夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也詳見祭義成王以周公為有勳勞於天下命魯公世世祀周公以天子之禮樂季夏六月以禘禮祀周公於大廟牲用白牡尊用犧象山罍鬱尊用黃目灌用玉瓚大圭薦用玉豆雕纂爵用玉盞仍雕加以璧散璧角俎用梡嶡升歌清廟下管象朱干玉戚冕而舞大武皮辨素積裼而舞大夏昧東夷之樂也任南蠻之樂也納夷蠻之樂於大廟言廣魯於天下也季夏建巳之月也禘大祭也周公曰大廟魯公曰世室羣公稱宫白牡殷牲也尊酒器也犧尊以沙羽為畫飾象骨飾之鬱鬯之器也黃彛也灌酌鬱尊以獻也瓚形如槃容五升以大圭為柄是謂圭瓚纂籩屬也以竹為之雕刻飾其直者也爵君所進於尸也仍因也因爵之形為之飾也加加爵也散角皆以璧飾其口也梡始有四足也嶡為之距清廟周頌也象謂周頌武也以管播之朱干赤大盾也戚斧也冕冠名也諸公之服自衮冕而下如王之服也大舞周舞也大夏夏舞也周禮昧師掌教昧樂詩曰以雅以南以籥不僭廣大也君卷冕立于阼夫人副褘立于房中君肉袒迎牲于門夫人薦豆籩卿大夫贊君命婦贊夫人各揚其職百官廢職服大刑副首飾也今之步搖是也詩云副笄六珈周禮追師掌王后之首服為副褘王后之上服唯魯及王者之後夫人服之諸侯夫人則自揄翟而下贊佐也命婦於內則世婦也於外則大夫之妻也祭祀世婦以下佐夫人揚舉也大刑重罪也明堂位閔公二年夏五月乙酉吉禘于莊公三年喪畢致新死者之主於廟廟之逺主當遷入祧因是大祭以審昭穆謂之禘莊公喪制未闋時别立廟廟成而吉祭又不於大廟故詳書以示譏速也春秋左氏傳言吉者未可以吉也都未可以吉祭經舉重不書禘於大廟嫌獨莊公不當禘於大廟可禘者故加吉明大廟皆不當曷為未可言吉據三年也未三年也禮禘祫從先君數朝聘從今君數三年喪畢遭禘則禘遭祫則祫公羊傳吉禘者不吉者也喪事未畢而舉吉祭故非之也莊公薨至此方二十二月喪未畢穀梁傳僖公八年秋七月禘于大廟用致夫人禘三年大祭之名大廟周公廟致者致新死之主於廟而列之昭穆夫人淫而與殺不薨於寢於禮不應致故僖公疑其禮厯三禘今果行之嫌異常故書之春秋傳詳見宗廟篇定公八年冬十月順祀先公而祈焉辛卯禘于僖公詳見宗廟孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖七月而禘獻子為之也記魯失禮所由也孟獻子魯大夫仲孫蔑也魯以周公之故得以正月日至之後郊天亦以始祖后稷配之獻子欲尊其祖以郊天之月對月禘之非也魯之宗廟猶以夏時之孟月耳明堂位曰季夏六月以禘禮祀周公於大廟雜記孔子曰魯之郊禘非禮也周公其衰矣詳見天神子曰禘自既灌而往者吾不欲觀之矣趙伯循曰禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也成王以周公有大勳勞賜魯重祭故得禘於周公之廟以文王為所出之帝而周公配之然非禮矣灌者方祭之始用鬱鬯之祭灌地以降神也魯之君臣當此之時誠意未散猶有可觀自此以後則浸以懈怠而無足觀矣蓋魯祭非禮孔子本不欲觀至此而失禮之中又失禮焉故發此歎也八佾大祫毁廟之主陳于大祖未毁廟之主皆升合食于大祖五年而再殷祭詳見本章傳主此條論大祫陳大宗伯以肆獻祼享先王以饋食享先王注見上章兼此條周禮論祫祭論禘司尊彝凡四時之間祀朝享祼用虎彝蜼彝皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也詳見上章大饗腥大饗祫祭先王也禮器大饗之禮尚𤣥酒而俎腥魚大羮不和詳見祭義大享尚𤣥尊俎生魚先大羮大享尚𤣥尊而用酒食先黍稷而飯稻粱祭嚌大羮而飽乎庶羞同上大饗三牲魚臘籩豆之薦內金束帛加璧龜為前列金次之丹漆絲纊竹箭其餘無常貨各以國之所有其出也肆夏而送之同上小史大祭祀讀禮法史以書序昭穆之俎簋讀禮法者大史與羣執事史此小史也言讀禮法者小史叙俎簋以為節故書簋或為几鄭司農云几讀為軌書亦或為簋古文也大祭祀小史主叙其昭穆以其主定繫世祭祀史主叙其昭穆次其俎簋故齊景公疾欲誅於祝史𤣥謂俎簋牲與黍稷以書次之校比之春官天子之席五重疏曰熊氏云天子祫祭席五重此文是也禘則宜四重也時祭三重司几筵職是也受神酢席亦然禘禮器禘今按姑依舊說載於此若以祫小於差之當五重祫當四重也周旅酬六尸使之相酌也后稷之尸不受旅詳禮器禘已上祫祭禮節之略其與時祭同者見後章天府陳寶器此章通用右祫周旅酬六尸曽子曰周禮其猶醵與詳見祭通禮文公二年八月丁卯大事于大廟大事者何大祫也以言大與有事異又從僖八年禘數之知為大祫大祫者何合祭也其合祭奈何毁廟之主陳于大祖毁廟謂親過高祖毁其廟藏其主于大祖廟中禮取其廟室笮以為死者炊沐大祖周公之廟陳者就陳列大祖前大祖東鄉昭南鄉穆北鄉其餘孫從王父父曰昭子曰穆昭取其鄉明穆取其北面尚敬未毁廟之主皆升合食于大祖自外來曰升五年而再殷祭殷盛也謂三年祫五年禘禘所以異於祫者功臣皆祭也祫猶合也禘猶諦也審禘無所遺失禮天子特禘特祫諸侯禘則不礿祫則不嘗大夫有賜於君然後祫其髙祖公羊傳大事者何大是事也著祫嘗祫合也嘗秋祭祫祭者毁廟之主陳于大祖未毁廟之主皆升合祭于大祖祫祭者皆合祭諸廟已毁未毁者之主於大祖廟中以昭穆為次序父為昭子為穆昭南鄉穆北向孫從王父坐也祭畢則復還其廟穀梁傳天子犆礿祫禘祫嘗祫蒸犆猶一也祫合也天子諸侯之喪畢合先君之主於祖廟而祭之謂之祫後因以為常天子先祫而後時祭諸侯先時祭而後祫凡祫之嵗春一礿而已不祫以物無成者不殷祭周改夏祭曰礿以禘為殷祭也魯禮三年喪畢而夾於大祖明年春禘于羣廟自爾之後五年而再殷祭一祫一禘諸侯礿犆互明犆礿文禘一犆一祫下天子也祫嵗不禘嘗祫蒸祫王制祫祭于祖則祝迎四廟之主祝接神者也主出廟入廟必蹕蹕止行也曽子問右時祫天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰蒸此蓋夏殷之祭名周則改之春曰祠夏曰礿以禘為殷祭詩小雅曰礿祠蒸嘗于公先王此周四時祭宗廟之名諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不礿虞夏之制諸侯嵗朝廢一時祭王制大宗伯以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王上有以肆獻祼享先王以饋食享先王二句宗廟之祭有此六享祭必先灌乃後薦腥薦熟於祫逆言之者與下共文明六享俱然春官春祭曰祠祠之言食夏祭曰礿新菜可汋秋祭曰嘗嘗新穀冬祭曰蒸進品物也爾雅始殺而嘗建酉之月隂氣始殺嘉穀始熟故薦嘗於宗廟閉蟄而蒸建亥之月昆蟲閉户萬物皆成可薦者衆故蒸祭宗廟釋例論之備矣桓五年左氏傳禘有樂而嘗無樂詳見祭義古者於禘發爵賜服於嘗出田邑發秋政同上嘗之日發公室同上肆師嘗之日涖卜來嵗之芟芟芟草除田也古之始耕者除田種穀嘗者嘗新穀此芟之功也卜者問後嵗宜芟不詩云載芟載柞其耕澤澤正春官已上四時祭大司馬中夏以苗田獻禽以享礿礿宗廟之夏祭也冬夏田主于祭宗廟者隂陽始起象神之在內疏曰此祭因田獵獻禽為祭若正祭自在孟月中冬以狩田入獻禽以享蒸入又以禽祭宗廟禽夏官此條因獻享祭右時享戊辰王在新邑蒸祭嵗文王騂牛一武王騂牛一王命作冊逸祝冊惟告周公其後王賓殺禋咸格王入太室祼戊辰十二月之戊辰日也是日成王在洛舉蒸祭之禮日嵗云者嵗舉之祭也周尚赤故用騂宗廟禮大牢此用特牛者命周公留後于洛故舉盛禮也逸史佚也作冊者冊書也逸祝冊者史逸為祝冊以告神也惟告周公其後者祝冊所載更不他及惟告周公留守其後之意重其事也王賓猶虞賓把宋之屬助祭諸侯也諸侯以王殺牲禋祭祖廟故咸至也太室清廟中央室也祼灌也以圭瓚酌秬鬯灌地以降神也王命周公後作冊逸誥在十有二月逸誥者史逸誥周公治洛留後也在十有二月者明戊辰為十二月日也洛誥夏礿秋嘗冬蒸天子之祭也不言春祠魯在東方王東巡守以春或闕之明堂位桓公八年春正月己卯蒸春曰祠薦尚韭卵祠猶食也猶繼嗣也春物始生孝子思親繼嗣而食之故曰祠因以别死生夏曰禴薦尚麥魚麥始熟可礿故曰礿秋曰嘗薦尚黍肫嘗者先辭也秋穀成者非一黍先熟可得薦故曰嘗冬曰蒸薦尚稻鴈蒸衆也氣盛貌冬萬物備成所薦衆多芬芳備具故曰蒸無牲而祭謂之薦天子四時四薦諸侯三祭三薦大夫士再祭再薦祭於室求之於幽祭於堂求之於明祭於祊求之於逺皆孝子博求之意也大夫求諸明士求諸幽尊卑之差也殷人先求諸明周人先求諸幽質文之義也禮天子諸侯卿大夫牛羊豕凡三牲曰大牢天子元士諸侯之卿大夫羊豕凡二牲曰牢諸侯之士特豕天子之牲角握諸侯角尺卿大夫索牛常事不書此何以書譏亟也亟數也屬十二月已蒸今復蒸也不異蒸祭名而言蒸者取冬祭所薦衆多可以包四時之物亟則黷黷則不敬黷泄黷也君子之祭也敬而不黷君子生則敬養死則敬享故將祭宫室既修牆屋既繕百物既備序其禮樂具其百官散齊七日致齊三日夫婦齊戒沐浴盛服君牽牲夫人奠酒君親獻尸夫人薦豆卿大夫相君命婦相夫人洞洞乎屬屬乎如弗勝如將失之濟濟乎致其敬也愈愈乎盡其忠也勿勿乎其欲饗之也文王之祭事死如事生孝子之至也疏則怠怠則忘怠解士不及兹四者則冬不裘夏不葛禮本下為士制兹此也四者四時祭也疏數之節靡所折中是故君子合諸天道感四時物而思親也祭必於夏之孟月者取其見新物之日也裘葛者禦寒暑之美服士有公事不得及此四時祭者則不敢美其衣服蓋思念親之至也故孔子曰吾不與祭如不祭春秋公羊傳蒸冬事也春興之志不時也夏五月丁丑蒸蒸冬事也春夏興之黷祀也志不敬也穀梁傳古者天子諸侯必有養獸之官及嵗時齊戒沐浴而躬朝之犧牷祭牲必於是取之君召牛納而視之擇其毛而卜之吉然後養之君皮辨素積朔月月半君巡牲嵗時齊戒沭浴而躬朝之謂將祭祀卜牲君朔月月半巡視之君召牛納而視之更本擇牲意祭義牧人凡陽祀用騂牲毛之陽祀祭天於南郊及宗廟地官宗廟之牛角握握謂長不出膚王制蒸嘗不過把握握長不出把者國語楚語充人掌繫祭祀之牲牷祀五帝則繫于牢芻之三月享先王亦如之三月一時節氣成地官牛人凡祭祀共其享牛求牛以授職人而芻之享獻也獻神之牛謂所以祭者也求終也終事之牛謂所以繹者也上同右養牲凡通用者詳見祭物犧牲章大事有時日大事有事於大神有常時常日也內事用柔日事之外內别乎四郊亥表記亥少牢篇注引禘于大廟禮曰不得丁則己辛亥亦用之無則茍有亥焉者可也大宰祀五帝前期十日帥執事而卜日享先王亦如之前期前所諏之日也十日容散齊七日致齊三日執事宗伯大卜之屬天官大宗伯享大鬼帥執事而卜日執事諸有事於祭者朝春官為少牢筮日主人朝服疏曰主人服者祭而筮還服祭服是以特牲筮亦服祭服𤣥端以此而言天子諸侯為祭卜筮亦服祭服案司服云享先王則衮冕祭義云易抱龜南面天子衮冕北面雖有明知之心必進斷其志焉是為祭而服還服祭服則諸侯為祭卜筮服祭服可知右卜日凡通用省詳見祭通禮卜筮章大宰祀五帝前期十日帥執事而卜日遂戒享先王亦如之既卜又戒百官以始齊天官及時將祭君子乃齊散齊七日致齊三日詳見祭義致齊於內散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者致齊思此五者也散齊七日不御不樂不弔耳見所為齊者思之熟也所嗜素所欲飲食也春秋傳曰屈到嗜芰祭義世婦掌女宫之宿戒女宫刑女給宫中事者宿戒當給事豫告之齊戒也春官先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日宫宰守宫官也宿讀為肅肅猶戒也戒輕肅重也君致齊於外夫人致齊於內祭統右齊戒凡通用者詳見祭通禮齊戒章又大祭前有習射擇士之禮詳見通禮擇士章大宰祀五帝掌百官之誓戒與其具修享先王亦如之誓戒要之以刑重失禮也明堂位所謂各揚其職百官廢職服大刑是其辭之略也具所當共修掃除糞灑天官世婦及祭祀比其具比次也具所濯溉及粢盛之爨鄭司農讀比為庀庀具也帥六宫之人共齍盛帥世婦女御春官寺人若有祭祀之事則帥女宫而致於有司有司謂公卿世婦天官諸侯宗廟之事夫人必自舂其盛國語楚語春秋修其祖廟修謂掃糞也中庸掌蜃祭祀共白盛之蜃盛猶成也謂飾牆使白之蜃也地官將祭祀其廟則有司修除之其祧則守祧黝堊之詳見宗廟隸僕祭祀修寢詳見宗廟右戒具修廟凡通用者詳見通禮戒具章及祭物粢盛庶羞酒齊祭器薪茅祭服等章孫為王父尸所使為尸者於祭者子行也子行猶子列也祭祖則用孫列皆取於同姓之適孫也為祭統天特牲疏云天子諸侯宗廟之祭亦用孫之倫尸但子諸侯雖用孫之倫取卿大夫有爵者為之故鳧鷖詩祭尸之等皆言公尸又曽子問云卿大夫將為尸於公尸服見祝迎尸章為君尸者大夫士見之則下之君知所以為尸者則自下之尊尸也下下車也國君或時幼少不能盡識羣臣有以告者乃下之尸必式禮之乘必以几尊者慎也曲禮右卜尸表記不違卜筮疏云特牲少牢大夫士筮尸則天子諸侯有卜尸少牢疏云天子諸侯前期十日卜得吉日則戒諸官散齊至祭前三日卜尸得吉又戒宿諸官使之致齊士卑不嫌得與人君同三日筮尸但下人君不得散齊七日耳大夫尊不敢與人君同直散齊九日前祭一日筮尸并宿諸官致齊也在按本章曲禮疏古者致齊各於其家散齊猶出路故有君臣於路見尸之禮然則天子諸侯卜尸當在散齊之日而此疏謂祭前三日卜尸未知孰是又按卜尸既吉則遂宿尸曽子問云卿大夫將為尸於公受宿矣是也少牢疏云特牲宿尸使宗人擯主人辭又有祝其傳命士卑不嫌兩有與人君同此大夫尊下人君故闕之唯有祝擯而已按此則天子宿尸當使大宗伯擯辭而大祝為之傳命也齊嘗于大公之廟麻嬰為尸為公尸年襄二十八左氏傳世婦掌祭祀之事帥女宫而濯溉為齍盛溉拭也為猶差擇天官女御凡祭祀贊世婦助其師涖女宫同上寺人佐世婦治禮事世婦二十七世婦設同上此二條祭日陳通用封人凡祭祀飾其牛牲設其楅衡置其絼飾謂刷治潔清之也鄭司農云楅衡所以楅持牛也絼著牛鼻繩所以牽牛者皆謂夕牲時也地官陳其犧牲疏曰謂將祭之夕省牲之時及祭日之旦迎牲而入麗於碑案特牲禮陳鼎于門外北面獸在鼎南東首牲在獸西西上北首其天子諸侯夕省牲之時亦陳于廟門外橫行西上祭日陳設通用備其鼎俎按此句疏引少牢皆據烹牲及舉鼎匕載時其實祭前夕亦當陳之以待視濯故兩載之列其琴瑟管磬鍾鼓疏曰琴瑟在堂而登歌故書云搏拊琴瑟以詠是也管磬鍾鼓堂下之樂書云下管鼗鼓笙鏞以間是也其歌鍾歌磬亦在堂下按琴瑟不先列升歌時工荷之而入此連言之耳禮運典庸器祭祀帥其屬而設筍簴設筍簴視瞭當以縣樂器焉春官大司樂大祭祀宿縣遂以聲展之叩聽其聲具陳次之以知完否同上大宰祀五帝及執事眂滌濯享先王亦如之執事初為祭事祭前日之夕滌濯謂溉祭器及甑甗之屬天官大宗伯享大鬼宿眂滌濯滌濯溉祭器也春官小宗伯大祭祀省牲眂滌濯同上充人展牲則告牷展牲若今夕牲也特牲饋食之禮曰宗人視牲告充舉獸尾告備近之地官右祭前夕滌濯陳設省眂凡通用者詳見通禮省眂章又視濯省牲後有為期一節附見下章注雞人大祭祀夜呼旦以􅑧百官夜夜漏未盡雞鳴時也呼旦以警起百官使夙興凡國事為期則告之時象雞知時也告其有司主事者少牢曰宗人朝服北面曰請祭期主人曰比於子宗人曰旦明行事告時者至此旦明而告之春官掌次凡祭祀張其旅幕張尸次旅衆也公卿夕下即位所祭祀之門外以待事為之張大幕尸則有幄鄭司農云尸次祭祀之尸所居更衣帳云按上文朝日祀五帝則張大次小次設重㡩重案注大幄初往所止居小幄既接祭退俟之處此宗廟之祭宜亦有之天官小宗伯毛六牲辨其名物而頒之於五官使共奉之毛擇毛也鄭司農云司徒主牛宗伯主雞司馬主馬及羊司冦主犬司空主豕章按宗廟不用馬牲則用五牲而已春官上陳其犧牲此條通用封人凡祭祀飾其牛牲設其楅衡置其絼見上章共其水稿水稿給殺牲時洗薦牲也地官牛人凡祭祀共其牛牲之互與其盆簝以待事鄭司農云互謂楅衡之屬盆簝皆器名盆所以盛血簝受肉籠也𤣥謂互若今屠家縣肉格同上小宗伯辨六彝之名物以待果將六彛雞彛鳥彛斝彝黃彛虎彛蜼彝果讀為祼辨六尊之名物以待祭祀待者有事則給之鄭司農云六尊獻尊象尊壺尊著尊大尊山尊春官肆師及果築煮果築煮者所築煮以祼也鄭司農云築煮築香草煮以為鬯同上鬱人掌祼器祼器謂彛及舟與瓚凡祭祀之祼事和鬱鬯以實彝而陳之築鬱金煮之以和鬯酒鄭司農云鬱草名十葉為貫百二十貫為築以煮之鐎中停於祭前鬱為草若蘭凡灌玉濯之陳之祼玉謂圭瓚璋瓚同上祼祼器詳見章司尊彝掌六尊六彝之位詔其酌辨其用與其實位所陳之處酌泲之使可酌各異也用四時祭祀所用亦不同實鬱及醴齊之屬凡六彝六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌凡此四者祼用鬱齊朝用醴齊饋用盎齊諸臣自酢用凡酒唯大事于太廟備五齊三酒注詳見祭物上同𤣥酒在室醴盞在户粢醍在堂澄酒在下粢讀為齊聲之誤也周禮五齊一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沈齊字雖異盞與盎澄與沈蓋同物也奠之不同處重古略近也此禮運室今按𤣥酒以配齊尊當各陳於齊尊之西而列於內近北者賈氏曰謂鬱鬯在室中而𤣥酒即明水也以配鬱鬯故在室疑此說是又按此不及泛齊者或省文或時祫用此四齊疏謂禘用四齊恐不然也又按設尊之法約注疏諸家之說春夏雞彝鳥彝陳室內近北獻尊陳户內象尊陳户外秋冬斝彝黃彝陳室內近北著尊陳户內壺尊陳户外其罍尊皆陳堂下凡尊皆南面明水𤣥酒在西廟堂之上罍尊在阼犧尊在西犧周禮作獻人疏曰罍尊在阼謂夫所酌也犧尊在西謂君所酌也熊氏云此謂諸侯時祭所用之禮故罍尊夫人所酌也若天子之祭則罍尊在堂下故禮運云澄酒在下酒謂三酒司尊彝云皆有罍諸臣之所酢則后不酌罍也禮器按下文君西酌犧象則西階上更有象尊此不言者省文也酒正凡祭祀以法共五齊三酒以實八尊大祭三二皆有酌數唯齊酒不二大祭王服大裘衮冕所祭也謂就三酒之尊而益之也益之者以飲諸臣尊詳見祭物天官今按時祭共二齊三酒以實五并明水𤣥酒尊為十尊幂人以畫布巾幂六彝宗廟可以文畫者畫其雲氣與同上謂按禮運與其越席疏布以幂疏曰越席謂蒲席疏布粗布若依周禮越席疏布是祭天之物此經云君與夫人則宗廟之禮也此蓋記者雜陳夏殷諸侯之禮故雖宗廟而用越席疏布也典庸器祭祀陳庸器庸器伐國所獲之器若崇鼎貫鼎及以其兵物所鑄銘也春官陳其宗器宗器祭器也大朱子曰宗器先世所藏之重器若周之赤刀訓天球河圖之屬也中庸世婦及祭之日涖陳女宫之具凡內羞之物涖臨也內羞房中之羞天官條上章女御寺人兩此條通用內豎若有祭祀之事則為內人蹕內人從世婦有事於廟者內豎為六宫蹕者以其掌內小事同上大宗伯享大鬼涖玉鬯省牲鑊奉玉齍鑊烹牲器也春官小宗伯大祭祀祭之日逆齍逆齍受饎人之盛以入同上小祝大祭祀逆齍盛同上按此條逆齍盛在迎尸之上小宗伯云祭之日逆齍省鑊告時於王告備於王肆師云祭之日表齍盛告潔展器陳告備據此諸文逆齍當在嚮祭之晨而此疏云饋獻後尸將入室乃迎齍恐不然也舍人凡祭祀共簠簋實之陳之方曰簠圓曰簋盛黍稷稻粱器地官按簋盛黍稷為正饌簠盛稻粱為加饌天子八簋諸侯六簋簠之數未聞凡賓客之禮簠皆少於簋則祭時宜亦倣此天子蓋四簠諸侯蓋二簠天子用六粢有麥苽蓋盛之於簠肆師祭之日表粢盛告潔展器陳告備粢六穀也在器亦盛陳陳列也故書表為剽剽表皆謂徽識也春官鋪筵設同几同之言詷也祭者以其妃配亦不特几也祭統司几筵凡大朝覲王設莞筵紛純加繅席畫純加次席黼純左右玉几純緣也紛如綬有文而狹者繅席削蒲蒻展之編以五采若今合歡矣畫謂雲氣也次席桃枝席有次列成文祀先王亦如之疏曰祀先王謂宗廟六享皆用上三種席諸侯祭祀席蒲筵繢純加莞席紛純右雕几繢畫文也不莞席加繅者繅柔礝不如莞清堅又於鬼神宜凡吉事變几吉事王祭宗廟祼於室饋食於堂繹於祊每事易几神事文示新之也春官大宰享先王贊玉几玉几所以依神天子左右玉几於天官已上三條朝踐章坐尸堂通用司巫祭祀則共匰主及道布及蒩館道布者為神所設中中霤禮曰以功布為道布屬于几也蒩之言藉也祭食有當藉者館所以承蒩謂若今筐也主先匰蒩後館互言之者明共主以匰共蒩以筐大祝取其主蒩陳之器則退也士虞禮曰苴刺茅長五寸實于筐饌于西坫上又曰祝盥取直降洗之升入設于几東席上東縮祭春官按士虞禮疏云天子吉祭亦有茅苴以藉小宗伯告時於王告備於王時薦陳之晚早備謂饌具同上右祭日陳設禮運疏用酒之法崔氏云周禮大祫於太廟則備五齊三酒朝踐王酌泛齊后酌醴齊饋食王酌盎齊后酌醍齊朝獻王酌泛齊因朝踐之尊再獻后酌醍齍因饋食之尊諸侯為賓則酌沈齊尸酢王與后皆還用所獻之齊賓長酳尸酢用清酒加爵亦用三酒大禘則用四齊三酒者醴齊以下悉用之朝踐王酌醴齊后酌盎齊饋食王酌醍齊后酌沈齊朝獻王酌醴齊再獻后還酌沈齊亦尊相因也諸侯為賓亦酌沈齊用三酒之法如祫禮也四時之祭唯二齊三酒則自祫禘以下至四時祭皆通用也二齊醴盎也朝踐王酌醴齊后亦酌醴齊饋食王酌盎齊后亦酌盎齊朝獻王還用醴齊再獻后還用盎齊亦尊相因也諸侯為賓亦酌盎齊三酒同於祫魯及王者之後大祫所用與王祫同若禘與王四時同侯伯子男祫禘皆用二齊醴盎而已三酒則並用用二齊之法朝踐君夫人酌醴齊饋食君夫人酌盎齊朝獻君還酌醴齊再獻夫人還酌盎齊諸臣為賓酌盎齊尸酢君夫人用昔酒酢諸臣用事酒加爵皆清酒時祭用一齊故禮器云君親制祭夫人薦盎君親割牲夫人薦酒其行之法朝踐君制祭則夫人薦盎進熟時君親割夫人薦酒朝獻時君酌盎齊以酳尸再獻時夫人還酌酒賓獻皆酒加爵如禘祫之禮天子諸侯酌奠皆用齊卿大夫之祭酌奠皆用酒祫祭在秋案司尊彝秋嘗用兩著尊饋獻用兩壺尊則泛齊醴齊各以著尊盛之盎齊醍齊沈齊各以壺尊盛之又五齊各有明水之尊凡十尊三酒各加𤣥酒凡六尊通斝彝盛明水黃彝盛鬱鬯此有十八尊其明水𤣥酒陳之各在五齊三酒之上禘祭在夏醴齊盎齊盛以犧尊醍齊沈齊盛以象尊時祭用二齊者春夏用犧尊盛醍齊用象尊盛沈齊秋冬用著尊盛醴齊用壺尊盛盎齊是一齊用一尊司尊彝皆云兩者以一尊盛明水也按前說謂時祭惟用醴盎二齊後又謂春夏用醍沈秋冬用醴盎自相抵牾覽者詳之其言祫禘用齊之差及所用尊彞之異亦恐未必然鄭司農謂追享朝享為禘祫則禘祫彝當用虎蜼尊當用犬山耳司服王之吉服享先王則衮冕享先公則鷩冕詳見祭物追師掌王后之首服為副追衡笄副服之以從王祭祀詳見祭物內司服掌王后之服褘衣揄狄闕狄素紗從王祭先王則服褘衣祭先公則服揄狄詳見祭物閽人大祭祀之事設門燎蹕宫門廟門燎地燭也蹕止行者廟在中門之外天官宫正凡邦之事蹕宫中廟中則執燭事祭事也邦之祭社稷七祀於宫中祭先公先王於廟中隸僕掌蹕止行者宫正則執燭以為明春秋傳曰有大事於大廟又曰有事于武宫同上大司樂大祭祀王出入則令奏王夏疏曰王出入謂王將祭祀初入廟門及祭訖出廟門皆令奏王夏也春官大僕祭祀正王之服位詔法儀詔告也夏官內宰正后之服位位謂房中户內及阼所立處門天官按婦人入廟當由闈君夫人㑹於大廟君純冕立於阼夫人副褘立於東房大廟始祖廟也祭統君在阼夫人在房人君尊東也天子諸侯有左右房禮器大史祭之日執書以次位常謂校呼之教其所當居之處春官祭有昭穆有事於大廟則羣昭羣穆咸在而不失其倫昭穆咸在同宗父子皆來祭統公族其在外朝則以官其在宗廟之中則如外朝之位宗人授事以爵以官宗人掌禮及宗廟也以爵貴賤異位也以官官有所掌也若司徒奉牛司馬奉羊司空奉豕衆文王世子東按特牲記公有司門西北面東上獻次賓私臣門北面西上獻次兄弟疏云天子諸侯祭祀其位無文此公有司在門西北面東上私臣在門東北面西上天子諸侯祭祀可依此位矣同姓無爵者在阼階前西面北上卿西階前東面北上大夫在門東北面士門西北面旅食在其後少牢下篇云衆賓位在門東北面既獻在西階西南衆賓繼上賓而南天子諸侯之賓其位或依此與案祭統云凡賜爵昭為一穆為一昭與昭齒穆與穆齒又文王世子云其在外朝則以官其在宗廟之中則如外朝之位宗人授事以爵以官以此差之知同姓無爵者從昭穆有爵者則以官矣右入廟即位宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也詳見祭義春秋設其裳衣裳衣先祖之遺衣服也設之當以授尸也中庸守祧掌守先王先公之廟祧其遺衣服藏焉遺衣服大斂之餘也若將祭祀則各以其服授尸尸當服卒者之上服以象生時春官小祝大祭祀逆尸同上大司樂尸出入則令奏肆夏同上大祝凡肆享逆尸令鍾鼓肆享祭宗廟也相尸禮延其出入詔其坐作章同上相尸禮後諸通用小祝沃尸盥疏曰沃尸盥者尸尊不就洗案特牲尸入廟門盥于槃其時小祝沃水同上天府凡吉凶之事祖廟之中沃盥執燭吉事四時祭也同上小按王將祼有鬱人沃盥故臣沃王盥入朝踐章右祝迎尸君迎牲而不迎尸詳見祭義春祠夏禴祼用雞彝鳥彝皆有舟秋嘗冬蒸祼用斝彝黃彝皆有舟祼謂以圭瓚酌鬱鬯始獻尸也后於是以璋瓚酌亞祼郊特牲曰周人尚臭灌用鬯臭鬱合鬯臭陰達於淵泉灌以圭璋用玉氣也既灌然後迎牲致陰氣也雞彝鳥彝謂刻而畫之為雞鳯凰之形鄭司農云舟尊下臺若今時承盤斝讀如稼稼彝畫禾稼也黃彝黃目尊也春官司尊彝典瑞祼圭有瓚以肆先王鄭司農云於圭頭為器可以挹鬯祼祭謂之瓚故詩曰瑟彼玉瓚黃流在中國語謂之鬯圭以肆先王灌先王祭也𤣥謂肆解牲體以祭因以為名爵行曰祼漢禮瓚盤大五升口徑八寸下有盤口徑一尺春官祼圭尺有二寸有瓚以祀廟祼之言灌也或作祼或作果謂始獻酌奠也瓚如盤其柄用圭有流前注考工記玉人鬱人凡祼玉濯之陳之以贊祼事祼玉謂圭瓚璋瓚詔祼將之儀與其節節謂王奉玉送祼早晏之時凡祼事沃盥春官小宰凡祭祀贊祼將之事將送也祼送送祼謂贊王酌鬱鬯以獻尸謂之祼祼之言灌也明不為飲主以祭祀唯人道宗廟有祼天地大神至尊不祼莫稱焉凡鬱鬯受祭之啐之奠之天官小宗伯凡祭祀以時將瓚果將送也猶奉也祭祀以時奉而授王天子圭瓚諸侯璋瓚春官內宰大祭祀后祼則贊謂祭宗廟王既祼而出迎牲后乃從後祼也祭統曰君執圭瓚祼尸大宗執璋瓚亞祼此大宗亞祼謂夫人不與而攝耳天官君執圭瓚祼尸大宗執璋瓚亞祼圭瓚璋瓚祼器也以圭璋為柄酌鬱鬯曰祼大宗亞祼容夫人有故攝焉祭統諸侯賜圭瓚然後為鬯未賜圭瓚則資鬯於天子圭瓚鬯爵也鬯秬酒也命王制鬯按尚書大傳云諸侯之有德者三以秬不得賜鬯者資於天子然後祭右祼按宗廟有作樂下神一節或云時祭無之己見禘章有虞氏之祭也尚用氣血腥爓殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲周人尚臭灌用鬯臭鬱合鬯灌以圭璋既灌然後迎牲詳見祭義王度記曰天子鬯諸侯薰大夫芑蘭庶人艾秬者黑黍一稃二米鬯者以百草之香鬱金合而釀之成為鬯陽達於牆屋陰入於淵泉所以灌地降神也玉瓚者器名也所以灌鬯之器也以圭飾其柄灌鬯貴玉氣也白虎通祭之屬莫重於祼祭統王在新邑蒸祭嵗王入大室祼詳見時享章既灌然後迎牲郊特牲異按迎牲之節內宰與司尊彝二注少而賈疏以司尊彝注為正今從之坐尸於堂謂朝事時也朝事延尸於戶西南面布主席東面特尸薦以籩豆同上按內宰及司尊彝疏延尸出户在二灌訖王出迎牲之時禮運疏在血毛詔於室之後今從賈氏疏蓋尸主在堂而血毛詔於室下文所謂求而未之得也又按此注尸南面而主東面未知何據或約漢禮而知之然祫祭則尸主同面主在尸右疑時祭亦尸主同面也是時堂上别設席室內之席不動祭日陳設章鋪筵設同几以下三條及迎尸章大祝相尸禮並此條通用朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡苑菹麋臡天官醢人注詳祭物故朝事解見下文豆先籩設先載此條朝事之籩其實麷蕡白黑形鹽膴鮑魚鱐鄭司農云朝事謂清朝未食先進寒具口實之籩𤣥謂以司尊彝之職參之朝事謂祭宗廟薦血腥之事籩人詳祭物按此疏及內宰司尊彝疏后薦朝事豆籩在延尸在戶迎牲未入之時禮運疏在升首之後薦腥之前今從賈疏蓋尸出在堂席前不可空故先設豆籩外宗掌宗廟之祭祀佐王后薦玉豆眂豆籩視視其實春官九嬪凡祭祀贊后薦豆籩本文云贊后薦徹豆籩豆天官用兩條饋獻章薦饋食籩通內宰詔其禮樂之儀本文云正后之服位而詔其禮樂之儀猶薦徹之禮當與樂相應按秦漢之樂乾豆上登歌古清廟之歌疏謂薦時歌清廟其說蓋本此樂歌之事詳見祭物樂舞章贊九嬪之禮事助九嬪贊后之事九嬪者贊后薦玉齍薦徹豆籩同上內小臣若有祭祀則擯詔后之禮事相九嬪之禮事正內人之禮事擯為后傳辭有所求為詔相正者異尊卑也同上世婦詔王后之禮事薦徹之節相外內宗之禮事同姓異姓之女有爵佐后者羞春官章內宰以下三條饋獻章薦饋食豆籩薦熟章齍徹徹豆籩通用相內宗之禮事又為再獻章薦加豆籩通用大宗伯凡大祭祀王后不與則攝而薦豆籩薦豆籩王后之事同上外宗王后不與則贊宗伯后有故不與祭宗伯攝其事用同上此兩條饋食豆籩通夫人薦豆執校執醴授之執鐙校豆中央直者也執醴授醴之人授夫人以豆則執鐙鐙豆下跗也祭統饋食豆通用大司樂牲出入則令奏昭夏疏曰牲出入謂二灌後王出迎牲及爓肉與體其犬豕是牲出入皆令奏昭夏春官饋獻薦熟通用大宰祀五帝及納亨贊王牲事享先王亦如之納亨納牲將告殺謂鄉祭之晨既殺以授亨人凡大祭祀君親牽牲大夫贊之天官大司徒奉牛牲牛能任載地類也奉猶進也疏曰謂初牽入時地官鄉師大祭祀羞牛牲疏曰鄉師佐大司徒同上大司冦大祭祀奉犬牲奉猶進也秋官及迎牲君執紖卿大夫從士執芻紖所以牽牲也周禮作絼芻謂藁也殺牲時用薦之周禮封人祭祀飾牲共其水藁天子諸侯之祭禮先有祼尸之事乃後迎牲祭統君親牽牲大夫贊幣而從納牲於庭時也當用幣告神而殺牲禮器祭之日君牽牲穆答君卿大夫序從祭謂祭宗廟也穆子姓也答對也序以次第從也序或為豫既入廟門麗于碑麗猶繫也祭義封人歌舞牲謂君牽牲入時隨歌舞之言其肥香以歆神也鄭司農云封人主歌舞其牲云傅碩肥腯地官充人碩牲則贊贊助也君牽牲入將致之助持之也春秋傳曰故奉牲以告曰博碩肥腯同上納牲詔於庭疏曰詔吉也牲入在庭以幣告神禮器奉牲以告曰博碩肥腯博廣也碩大也桓六年左傳司弓矢凡祭祀共射牲之弓矢射牲示親殺也殺牲非尊者所親唯射為可國語曰禘郊之事天子必自射其牲夏官射人祭祀則贊射牲蒸嘗之禮有射豕者國語曰禘郊之事天子必自射其牲今立秋有貙劉云同上大僕贊王牲事牲事殺割匕載之屬熟同上時此章割牲薦匕載通用諸侯宗廟之事必自射其牛刲羊擊豕刲刺也擊殺也國語楚語用牲於庭謂殺之時郊特牲薦其血毛疏曰朝踐時延尸在堂祝以血毛告於室也禮運血毛詔於室疏曰謂殺牲取血及毛入以告神於室禮器大祝凡肆享隋釁令鍾鼓肆享祭宗廟也隋釁謂薦血也凡血祭曰釁春官卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退毛牛尚耳以耳毛為上也膟膋血與腸間脂也祭義取膟膋燔燎郊特牲以按此句在升首之上似謂朝踐時燔膟膋而注疏饋食時爇蕭釋之下條祭義疏又謂一祭有兩度爇蕭指此文為朝踐時事前後抵牾今存其本文於此而注附見後章建設朝事燔燎羶薌見以蕭光朝事謂薦血腥時也見當為瞷字之誤也羶當為馨聲之誤也燔燎馨香覸以蕭光取牲祭脂也光猶氣也祭義詔祝於室本文云詔祝於室坐尸於堂謂朝事時也朝事延尸於户西南面布主席東面取牲膟膋燔于爐炭洗肝于鬱鬯而燔之入以詔神於室又出以墮于主前主人親制其肝所謂制祭也時尸薦以籩豆至薦孰乃更延主于室之奧尸來升席自此方坐于主北焉特郊牲君親制祭親制祭謂朝事進血膋時所制者制肝洗於鬱鬯以祭於室及主卿大夫從君疏曰謂制祭之時則卿大夫從君禮器升首文承取膟膋燔燎之下疏曰朝踐時祝取膟膋燎於爐炭入以告神於室出以綏於主前又升首於室郊特牲升首於室制祭之後升牲首於北墉下尊首尚氣也同上羊人祭祀割羊牲登其首登升也升首報陽也升首於室夏官腥其俎文承薦其血毛之下之腥其俎謂豚解而腥及血毛皆所以法於大古也禮運司士帥其屬而割牲羞俎豆割牲制體也羞進也二夏官用饋獻薦熟章通大司徒祀五帝奉牛牲羞其肆享先王亦如之鄭司農云羞進也肆陳骨體也𤣥謂進所肆解骨體士喪禮曰肆解去蹄地官小子掌祭祀羞羊肆鄭司農云羞進也羊肆體薦全蒸也𤣥謂肆讀為鬄羊鬄者所謂豚解也夏官設祭於堂設祭之饌於堂人君體然禮器饋獻通用祭腥祭義章詳見下小臣大祭祀沃王盥疏曰王將獻尸先盥手洗爵乃酌獻故小臣為王沃水盥手也夏官御僕大祭祀相盥詳見薦熟章春祠夏禴其朝踐用兩獻尊朝踐謂薦血腥酌醴始行祭事后於是薦朝事之豆籩既又酌獻鄭司農云獻讀為犧犧尊飾以翡翠故書踐作餞杜子春云餞當為踐司尊彝按朝獻與朝踐尊相因秋嘗冬蒸朝踐用兩著尊大宰享先王贊玉爵宗廟獻用玉爵天官小宰凡祭祀贊爵之事又從大宰助王也通同上兩條凡王獻用量人凡祭祀制其從獻脯燔之數量鄭司農云從獻者肉殽從酒也𤣥謂燔從於獻酒之肉炙也數多少也量長短也獻夏官不此數量殺牲訖即制之載於此者欲見有從之事言肝而言脯豈天子禮異與通饋獻朝獻再獻用內宰后獻則贊獻謂王薦腥薦熟后亦從後獻也天官獻饋獻章后通用外宗王后以樂羞齍則贊見薦熟章凡王后之獻亦如之獻獻酒於尸王后不與則贊宗伯注見前獻春官饋再獻章后獻通用醴盞以獻薦其膰炙君與夫人交獻疏曰醴盞以獻者朝踐之時用醴饋食之時用盞薦其燔炙者謂燔肉炙肝案特牲禮主人獻尸賓長以肝從主婦獻尸賓長以燔從則此君薦用炙夫人薦用燔也第一君獻第二夫人獻第三君獻第四夫人獻是君與夫人交錯而獻也用禮運用饋獻通但不醴君西酌犧象夫人東酌罍尊象日出東方而西行也月出西方而東行也周禮曰春祠夏禴祼用雞彝鳥彝皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所酢階按此據諸侯九獻之禮者言但設尊不於戶而於夫人不酌犧象而酌罍皆變於天子然疑罍尊太卑不當施於朝踐饋獻夫人酌罍豈謂再獻酳尸與禮交動乎上樂交應乎下言交乃和象禮器君饋獻朝獻再獻通用饋獻君酌朝獻酌犧再獻夫人酌罍大司樂乃奏無射歌夾鍾舞大武以享先祖無射陽聲之下也夾鍾為之合夾鍾一名圂鍾先祖謂先王先公之春官大杜佑曰時堂上以夾鍾之調歌堂下以無射調作武之樂再饋獻朝獻獻通用鼓人以路鼓鼓鬼享路鼓四面鼓也樂地官凡獻作通用詳凡樂事宗廟通用者見祭物樂舞宗婦執盎從夫人薦涗水涗盎齊也盎齊涗酌也几尊有明水因兼去水耳祭統夫人薦盎本文承君親制祭之下疏曰此謂殺牲已畢進血腥之時斷制牲肝洗以鬱鬯入以祭神於室於此之時夫人薦盎齊以獻之侯伯子男之君朝踐君不獻故夫人薦盎命婦從夫人疏曰謂薦盎之時禮器右朝踐祭以清酒從以騂牡享于祖考執其鸞刀以啓其毛取其血膋清酒清潔之酒鬱鬯之屬也騂赤色周所尚也祭禮先以鬱鬯灌地求神於陰然後迎牲執者主人親執也鸞刀刀有鈴也膋脂膏也啓其毛以告純也取其血以告殺也取其膋以升臭也合之黍稷實之於蕭而燔之以求神於陽也小雅信南山秋而載嘗夏而楅衡白牡騂剛犧尊將將毛炮胾羮籩豆大房萬舞洋洋孝孫有慶嘗秋祭名楅衡施於牛角所以止觸也周禮封人云凡祭飾其牛牲設其楅衡是也秋將嘗而夏楅衡其牛言夙戒也白牡周公之牲也騂剛魯公之牲也白牡殷牲也周公有王禮故不敢與文武同魯公則無所嫌故用騂剛犧尊畫牛於尊腹也或曰尊作牛形鑿其背以受酒也毛炮周禮封人祭祀有毛炮之豚注云爓去其毛而炮之也胾切肉也羮大羮鉶羮也大羮大古之羮湇煮肉汁不和盛之以登貴其質也鉶羮肉汁之有菜和者也盛之鉶器故曰鉶羮大房半體之俎足下有跗如堂房也萬舞名魯頌閟宫聲莫重於升歌舞莫重於武宿夜武宿夜武曲名也祭統古者帝王升歌清廟清廟樂章名大琴練弦達越大瑟朱弦達越以韋為鼓謂之搏拊何以也練弦朱弦互文也越下孔也凡練弦達越搏拊者象其德寬和君子有大人聲不以鍾鼓竽瑟之聲亂人聲清廟升歌者歌先人之功烈德澤也故欲其清也烈業也其歌之呼也呼出聲也曰於穆清廟於者歎之也穆者敬之也清者欲其在位者遍聞之也故周公升歌文王之功烈德澤茍在廟中見文王者愀然如見文王故書曰搏拊琴瑟以詠祖考來假此之謂也尚書大傳諸侯三命者皆受天子之樂以祀其宗廟所以褒有功而章有德之義也未命者不得用天子之樂祀其宗廟同上內饔凡宗廟之祭祀掌割亨之事天官小宗伯祭之日省鑊省鑊視亨腥孰通春官兩條薦孰用孰其殽謂體解而爓之此以下皆所以法於中古也司禮運出上章司士帥其屬割牲羞俎豆大樂牲入令奏昭夏皆此條通用饋食之豆其實葵菹螺醢脾析蠯醢蜃蚔醢豚拍魚醢醢人詳見祭物饋食之籩其實棗㮚桃乾䕩榛實饋食薦孰也今吉禮存者特牲少牢諸侯之大夫士祭禮也不祼不薦血腥而自薦孰始是以皆云饋食之禮籩人詳見祭物上章外宗佐王后薦玉豆以下七條並此二條通用小子掌祭祀羞羊殽鄭司農云羊殽體解節折也孰夏官薦通用君執鸞刀羞嚌夫人薦豆嚌嚌肺祭肺之屬也君以鸞刀割制之校祭統條上章夫人薦豆執條此通用君親割牲夫人薦酒親割謂進牲孰體時亦疏曰謂薦孰時君親割牲體於時君不獻故夫人薦酒卿大夫從君命婦從夫人疏曰謂割牲薦酒之時禮器秋嘗冬蒸其饋獻用兩壺尊其變再獻為饋獻者亦尊相因饋獻謂薦孰時后於是薦饋食之豆籩鄭司農云壺者以壺為尊春秋傳曰尊以魯壺兩司尊彝上按再獻與饋獻尊相因春祠夏禴饋獻用象尊章大宰贊玉爵以下至鼓人凡九條並此條通用爓祭而退本文爓祭下有祭腥字見上章爓祭祭腥祭爓肉腥肉也湯肉曰爓爓祭祭腥或為合祭腥泄䐲孰也祭義上章設祭於堂此條通用右饋獻按饋獻一節禮運疏謂在尸入室之後周禮疏以孰其殽當饋獻節在尸未入室之前今考司几筵吉事變几鄭注有饋食於堂之語當以賈疏為正若尸既入室則當食舉矣豈先獻然後食乎又按禮運以薦血腥法上古孰其殽法中古其下文醴盞以獻薦其燔炙君與夫人交獻云云皆在未合亨之前獻醴即朝踐也獻薦即饋獻也然則饋獻不在隂厭之後亦明矣故今所次皆從賈疏之說然後退而合亨此謂薦今世之食也取疏曰前薦爓既未孰今至饋食乃退嚮爓肉更合亨之令孰擬更薦尸又尸俎惟載右體其餘不載者及左體等亦於鑊中亨煮之故云合亨禮運朝踐章大司樂牲出入令奏昭夏上章內饔掌割亨小宗伯省鑊並此條通用備其鼎俎疏曰牲煮於鑊鑊在廟門外鼎隨鑊設各陳於鑊西取牲體以實其鼎而入設於阼階下南北陳之俎設於鼎西以次載於俎也案少牢陳鼎於廟門之外東方北面北上又云鼎入陳於東方當序西面北上俎皆設于鼎西是也禮運經按天子九鼎九俎諸侯七鼎七俎其牲無明文以諸約之天子九者牛一羊二豕三犬四雞五魚六臘七鮮魚八鮮臘九諸侯七者無鮮魚鮮臘也大祝肆享逆牲令鍾鼓本文逆牲在隋釁之下踐既隋釁後言逆牲容逆鼎通春官朝章大司樂令奏昭夏此條用御僕大祭祀相盥而登相盥者謂奉槃授巾與登謂為王登牲體於俎特牲饋食禮主人降盥出舉入乃匕載少夏官載朝踐章大僕贊王牲事此條通用人按特牲牢匕時先升心舌為肵俎至正祭時主親進之尸食舉皆加于肵又取餘體盛于肵祭畢以此俎歸之于尸天子諸侯亦當有之諸子大祭祀正六牲之體正謂朼載之同上體其犬豕牛羊實其簠簋籩豆鉶羮體其大豕牛羊謂分别骨肉之貴賤以為衆俎也禮運朝踐章司士割牲羞俎豆此條通用大司馬大祭祀羞牲魚詳見下小子祭祀贊羞夏官此又上章羞羊殽條通用羮定詔於堂肉謂之羮煮疏曰定孰肉也謂肉既孰將欲迎尸主入室乃先以俎盛之告神于堂是薦熟未食之前也禮器春秋薦其時食時食四時祭也中庸九嬪凡祭祀贊玉齍玉齍玉敦受黍稷器后進之而不徹故書玉為王杜子春讀為玉天官外宗王后以樂羞齍則贊贊猶佐也春官豆按羮定詔於堂之後乃延主于室徙堂上朝踐饋食籩入室設于尸席前俎入設于豆東后乃薦玉齍設于俎南三朝踐章內宰內小臣世婦條此二條通用亨人祭祀共鉶羮鄭司農云大羮不致五味鉶羮加鹽菜矣天官按特牲鉶羮設于豆南小祝贊奠本文在贊徹下一奠奠爵也祭祀奠先徹後反言之者明所佐大祝非疏曰大祝酌酒奠于鉶南則郊特牲注天子奠斝諸侯奠角小祝其時贊之皆春官按禮運疏天子諸侯酌奠用齊蕭合黍稷既奠然後焫蕭合羶薌奠謂薦孰時也特牲饋食所云祝酌奠于鉶南是也蕭薌蒿也染以脂合黍稷燒之詩云取蕭祭脂羶當為馨聲之誤也奠或為薦又取膟膋燔燎注云膟膋腸間脂也與蕭合燒之亦有黍稷也郊特牲大祝辨六號二曰鬼號鬼號若云皇祖伯某凡肆享則執明水火而號祝明水火司烜所共日月之氣以給蒸享執之如以六號祝明此圭潔也春官直祭祝于主謂薦孰時也如特牲少牢饋食之為也直正也祭以孰為正則血腥之屬盡敬心耳郊特牲祝以孝告疏曰案少牢祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦嵗事于皇祖伯某以某妃配某氏尚饗是祝以孝告禮運按尸未入而先設饌饗神曽子問所謂隂厭天子踐阼臨祭祀內事曰孝王某諸侯臨祭祀內事曰孝子某侯某詳見通禮祝號舉斝角詔妥尸妥安坐也尸始入舉奠斝若奠角將祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜妥之也天子奠斝諸侯奠角自郊特牲于按隂厭後尸入室禮器注所謂尸來升席北方坐王北謂此時也迎尸章大祝相尸禮亦此條通用初又按特牲主人拜妥尸尸答拜執奠祝饗主人拜如尸乃挼祭祭黍稷肺祭酒啐酒告㫖主人拜尸奠觶答拜注云饗勸强之也其辭取于士虞記則宜云孝孫某圭為而孝薦之饗少牢無執奠祝饗啐奠告㫖等事賈氏云士賤不嫌得與人君同大夫尊嫌與人君同故初不饗後亦不告㫖據此則天子諸侯妥尸後當有執奠祝饗等事小祝贊隋隋尸之祭也春官薦黍稷羞肝肺首心見間以俠甒薦黍稷所謂饋食也見間當為覸字之誤也有虞氏祭首夏后氏祭心殷祭肝周祭肺覸以俠甒謂雜之兩甒醴酒也水祭義之按醴酒疑謂祝酌奠于鉶南之酒俠甒併明尊言祭黍稷加肺祭黍稷加肺謂綏祭也疏郊特牲指按此文下云祭齊加眀水謂不専綏祭時詳見祭義亨人祭祀共大羮大羮肉湇于天官不按特牲大羮設醢北祭不嚌小子羞肉豆鄭司農云羞進也肉豆者切肉也尸夏官按肉豆庶羞也特牲少牢食舉之時佐食羞庶羞四豆設于左尸食之大司馬大祭祀羞牲魚授其祭牲魚魚牲也祭謂尸所以祭也鄭司農云大司馬主進魚牲同上按特牲少牢魚十有五正祭時尸以一魚振祭嚌之少牢儐尸加膴祭于其上賓長三獻時司士羞湇魚尸取膴祭祭之此言授其祭亦通正祭繹祭言之大祝逆尸令鍾鼓右亦如之右讀亦當為侑以按大祝辨九拜享右祭祀注云享獻也謂朝獻饋獻也右讀為侑侑勸尸食而拜按特牲尸三飯告飽祝侑主人拜舉幹舉獸幹魚一尸又三飯告飽祝侑之如初舉骼及獸魚尸又三飯告飽祝侑之如初舉肩及獸魚尸不復飯少牢上大夫禮尸食七飯告飽祝西面于主人之南獨侑不拜侑曰皇尸未實侑尸又飯舉牢肩尸不飯告飽祝西面于主人之南主人不言拜侑尸又三飯注云為祝一飯為主人三飯尊卑之差凡十一飯下人君也疏云此與特牲皆有尸飯法天子諸侯亦當有之故大祝九拜之下云以享侑祭祀注云侑勸尸食而拜若然士三飯即告飽而侑大夫七飯告飽而侑諸侯九飯告飽而侑天子十一飯而侑案此疏則天子諸侯尸告飽之後亦祝與主人更侑尸為祝一飯為主人三飯也又下大夫不賓尸尸七飯時祝侑亦如之尸食舉牢肩尸不飯告飽主人拜侑不言尸又三飯注云凡十一飯士九飯大夫十一飯其餘有十三飯十五飯疏云士禮九飯上下大夫同十一飯士大夫既不分命數為尊卑則五等諸侯同十三飯天子十五飯可知春官右薦熟索祭祝于祊索求神也廟門曰祊謂之祊者以於繹祭名也郊特牲右祝祭于祊按禮記索祭祝于祊文承直祭祝于主之下未知當在何時或云在祭末然以楚茨詩考之第二章云祝祭于祊祀事孔明文承或剝或亨或肆或將之下其三章始言獻酬交錯四章始言徂賚孝孫則祭祊不在祭末今次於薦熟之後其行事或在尸未食之前或在尸卒食之後皆不可知也秋嘗冬蒸其朝獻用兩著尊其變朝踐為朝獻者尊相因也朝獻謂尸卒食王酳之鬱人職曰受舉斝之卒爵而飲之則王酳尸以玉爵也鄭司農云著尊者著略尊也或曰著尊著地無足明堂位曰著殷尊也獻司尊彝踐按朝獻因朝踐之尊春祠夏禴朝獻用兩尊朝章大宰小宰量人大司樂鼓人五條及禮器君西酌犧並此條通用司几筵王設莞筵紛純加繅席畫純加次席黼純詳見祭日陳設章又案此條疏云受酢度未必有几故下文祀先王酢席亦如之及諸侯酢席皆不云几也祀先王昨席亦如之鄭司農云昨席於主階設席王所坐也𤣥謂昨讀曰酢謂祭祀反王受酢之席尸卒食王酳之卒爵祝受之又酌授尸尸酢王於是席王於户內后諸臣致爵乃設席用按司尊彝疏云王酳尸用朝踐之尊醴齊尸酢王還醴齊又王受尸酢有俎見徹章諸侯昨席莞筵紛純加繅席畫純昨亦讀曰酢春官嘏以慈告祝以孝告嘏以慈告各首其義也嘏禮運祝按楚茨詩既齊既稷既匡既勑箋云之禮遍取黍稷牢肉魚於俎以授尸孝孫前就尸受之天子使宰夫受之以筐祝則釋嘏辭以勑之天子嘏辭與大夫同也鬱人大祭祀與量人受舉斝之卒爵而飲之斝受福之嘏聲之誤也王酳尸尸嘏王此其卒爵也少牢饋食禮主人受嘏詩懷之卒爵執爵以興出宰夫以籩受嗇黍主人嘗之乃還獻祝此鬱人受王之卒爵亦王出房時也必與量人者鬱人贊祼尸量人制從獻之脯㸋事相成官春量人凡宰祭與鬱人受斝歷而皆飲之言宰祭者冢宰佐人祭亦容攝祭鄭司農云斝讀如嫁娶之嫁是器名明堂位曰爵夏后氏以盞殷以斝周以爵𤣥謂斝讀如嘏尸之嘏宰冢宰略夏官天少牢注云不啐而卒爵者大夫之佐食賤禮疏曰子諸侯禮雖亡或可對天子諸侯佐食啐乃卒爵貴故也右朝獻祭之日一獻君降立于阼階之南南鄉所命北面史右君右執策命之再拜稽首受書以歸而舍奠于其廟一獻酳尸也舍當為釋聲之誤也非時而祭曰奠祭統右因祭策命賚大封于廟也加豆之實芹菹兔醢深蒲醓醢箈菹鴈醢筍菹魚醢醢人詳見祭物加籩之實菱芡㮚脯菱芡㮚脯加籩謂尸既食后亞獻尸所加之籩重言之者以四物為八籩籩人詳見祭物內宗掌宗廟之祭祀薦加豆籩加爵之豆籩故書為籩豆鄭司農云謂婦人所薦杜子春云當為豆籩春官朝踐章世婦相內宗之禮事此條通用春祠夏禴其再獻用兩象尊再獻者王酳尸之後后酌亞獻諸臣為賓又次后酌盎齊備卒食三獻也於后亞獻內宗薦加豆籩明堂位曰灌用玉瓚大圭爵用玉盞加用璧角璧散又鬱人職曰受舉斝之卒爵而飲之則王酳尸以玉爵也王酳尸用玉爵而再獻者用璧角璧散可知也鄭司農云象尊以象鳯凰或曰以象骨飾尊司尊彝按再獻因饋獻之尊秋嘗冬蒸再獻用兩壺尊獻本章諸臣通用內宰后祼獻則贊瑶爵亦如之瑶爵謂尸卒食王既酳尸后亞獻之其爵以瑶為飾者天官君按少牢主婦入戶西面拜獻尸注云不北面辟人夫人也則夫人當北面拜從朝踐章外宗贊王后之獻后不與則贊宗伯量人制獻禮器夫人東酌罍尊及大司樂鼓人並此條通用尸酢夫人執柄夫人受尸執足疏曰爵如雀形以尾為柄夫人獻尸尸酢夫人則執爵尾授夫人夫人受酢於尸則執爵足按博古圖爵有鋬為柄疏說非是祭統用按司尊彝疏云后酳尸用饋獻之尊盎齊尸酢后還盎齊又后受尸酢有俎見徹章又按后受尸酢後諸臣為賓者再獻其尊已見上其爵用璧散見禘章樂舞見朝踐章夫婦相授受不相襲處酢必易爵疏曰襲因也謂夫婦交相致爵之時其執之物不相因故處酢必易爵者謂致爵之時主人受主婦之酢易換其爵故特牲主人受主婦之酢更爵酢注云主人更爵自酢男子不承婦人爵即引此文為證也爵同上人按特牲賓長三獻尸爵止於是主婦入戶致于主受爵酢主人入房致爵於主婦更爵酢此人君禮亦當諸臣獻尸尸止爵而後夫婦致爵也又后致爵乃設席見朝獻章司几筵注春祠夏禴皆有罍諸臣之所昨也秋嘗冬蒸皆有罍諸臣之所昨也昨讀為酢字之誤也諸臣獻者酌罍以自酢不敢與王之神靈共尊鄭司農云罍臣之所飲也詩曰瓶之罄矣維罍之恥婦司尊彝主按特牲少牢賓長獻尸後致尊於主人主而酢于人天子諸侯禮亦當有之羞籩之實糗餌粉餈羞籩謂若少牢主人酬尸宰夫羞房中之羞于尸侑主人主婦皆右之者籩人詳見祭物羞豆之實酏食糝食醢人詳見祭物夏按此皆內羞别有庶羞蓋官小子設之右再獻已上九獻之正禮也疏家論行禮先後次第及獻數降殺不同並著之以備參考禮運疏云大祫祭日之旦王服衮冕而入尸亦衮冕祝在後侑之王不出迎尸故祭統云君不迎尸所以别嫌也尸入室乃作樂降神故大司樂云凡樂圜鍾為宫九變而致人鬼是也乃灌故書王入大室祼當灌時衆尸皆同在太廟中依次而灌所灌鬱鬯小宰注云尸祭之啐之奠之是為一獻也王乃出迎牲后從灌二獻也迎牲而入至於庭故禮器云納牲詔於庭王親執鸞刀啓其毛而祝以血毛告於室故禮器云血毛詔於室凡牲則廟各别牢故公羊傳云周公白牲魯公騂犅案逸禮云毁廟之主昭共一牢穆共一牢於是行朝踐之事尸出於室太祖之尸坐於户西南面其主在右昭在東穆在西相對坐主各在其右故鄭注祭統云天子諸侯之祭朝事延尸於户外是以有北面事尸之禮祝乃取牲膟膋燎于爐炭入以詔神於室又出以墮於主前郊特牲云詔祝於室坐尸於堂是也王乃洗肝於鬱鬯而燔之以制於主前所謂制祭次乃升牲首於室中置於北墉下后薦朝事之豆籩乃薦腥於尸主之前謂之朝踐即此禮運薦其血毛腥其俎是也王乃以玉爵酌著尊泛齊以獻尸三獻也后又以玉爵酌著尊醴齊以亞獻四獻也乃退而合亨至薦孰之時陳於堂故禮器云設饌於堂乃後延主入室大祖東面昭在南面穆在北面徙堂上之饌於室內坐前祝以斝爵酌奠於饌南故郊特牲注云天子奠斝諸侯奠角即此之謂也既奠之後又取腸間脂焫蕭合馨薌郊特牲注云奠謂薦孰時當此大合樂也自此以前謂之挼祭乃迎尸入室舉此奠斝主人拜以妥尸故郊特牲云舉斝角拜妥尸是也后薦饋獻之豆籩王乃以玉爵酌壺尊盎齊以獻尸為五獻也后又以玉爵酌壺尊醴齊以獻尸是六獻也於是尸食十五飯訖王以玉爵因朝踐之尊泛齊以酳尸為七獻也故鄭云變朝踐云朝獻尊相因也朝獻謂此王酳尸因朝踐之尊也后乃薦九豆籩尸酌酢主人主人受嘏王可以獻諸侯於是后以瑶爵因酌饋食壺尊醍齊以酳尸為八獻也鄭注司尊彝云變再獻為饋獻者亦尊相因也再獻后酳尸獻謂饋食時后之獻也於時王可以瑶爵獻卿也諸侯為賓者以瑶爵酌壺尊醍齊以獻尸為九獻九獻之後謂之加爵按此論行禮先後次第與今所次間有不同覽者詳之九特牲疏曰天子大祫十有二獻四時與禘唯有獻上公亦有九獻侯伯七獻子男五獻祭按天子合諸侯而饗禮諸侯長十有再獻則大宜亦有十二獻但禮文殘缺不可考以意推之豈天子及后諸臣酳尸各兩爵與禮運疏又云天子祫禘時祭皆九獻其魯及王者之後皆九獻其行之法與天子同侯伯七獻朝踐及饋獻時君皆不獻於九獻之中減二故為七獻也禮器云君親制祭夫人薦盎君親割牲夫人薦酒是也子男五獻者亦以薦腥饋孰時君皆不獻酳尸之時君但一薦而已九獻之中去其四故為五此皆崔氏之說今案特牲少牢尸飲之後主人主婦及賓備行三獻主婦因獻而得受酢今子男尸食之後但得一獻夫人不得受酢不如卿大夫理亦不通蓋子男饋孰以前君與夫人並無獻也食後行三獻通二灌為五也禮器所云者據侯伯七獻之制也先按五獻之說孔氏得之公禮器七獻神注謂祭公疏曰鷩冕七章享先故知七獻祭先公也祼按侯伯七獻朝踐饋獻皆夫人獻而君不獻通與酳尸數之主人二獻而主婦四獻事亦可疑案禮有放而不致之例豈天子七獻朝踐饋獻皆王獻而后不獻侯伯避王故特異其禮與尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒尸飲五謂酳尸五獻也大夫士三獻而獻賓祭統也司尊彝注云此凡九酌王及后各四諸臣一祭之正以今祭禮特牲少牢言之二祼為奠而尸飲七矣王可以獻諸臣祭統曰尸飲五君洗玉爵獻卿是其差也按賈孔二疏論獻卿先後不同孔謂祭統據備九獻者言至主人酳尸而及飲五賈謂祭統據侯伯七獻者言至諸臣再獻而尸飲五以司尊彝注推之當以賈疏為正若如孔說則賓未獻尸而君先獻賓失其序矣其言飲七飲九皆誤蓋尸飲五正獻已畢飲七飲九皆正獻之後加爵也特牲士禮長兄弟衆賓長再加爵祭末又有利獻尸則侯伯有四加宜矣又以司尊彝注推之則備九獻者尸飲九而獻大夫尸飲十一而獻士及羣有司可知也諸臣致爵乃設席見朝獻章司几筵注宗廟之祭貴者獻以爵賤者獻以散凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散禮器右獻諸臣及加爵禮運疏曰特牲有三加則天子以下加爵之數依尊卑不止三加也凡為俎者以骨為主骨有貴賤殷人貴髀周人貴肩凡前貴於後貴者取貴骨賤者取賤骨貴者不重賤者不虛詳見祭義及入舞君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸君為東上近主位也皇君也言君尸者尊之祭統右樂尸按注疏不言樂尸當何時通典次於加爵之後今姑從之未知其是否也其登獻受爵則以上嗣本文登下有餕字食上嗣君之適長子以特牲饋禮言之受爵謂上嗣舉奠也獻謂舉奠洗爵酌入也餕謂宗人遣舉奠盥祝命之餕也大夫之嗣無此禮辟君也文王世子右上嗣舉奠司士凡祭祀及賜爵呼昭穆而進之賜爵神惠及下也此所賜王之子姓兄弟祭統曰凡賜爵昭為一穆為一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂長幼有序夏官凡賜爵昭為一穆為一昭與昭齒穆與穆齒凡羣有司皆以齒昭穆猶特牲少牢饋食之禮衆兄弟也羣有司猶衆賓下及執事者君賜之爵謂若酬之祭統旅酬下為上謂若特牲饋食之禮賓弟子兄弟之子各舉觶於其長也中庸右旅酬無算爵按特牲堂下設尊旅酬無算爵並行少牢上下大夫或行或否參差不等疏云大夫當辟國君士賤不嫌與君同故得備禮然則天子諸侯廟中旅酬無算爵並行略如士禮也肆師凡祭祀禮成則告事畢春官外按儀禮疏云特牲祝户告利成少牢階上告利成以尊者稍逺於尸若天子諸侯禮畢於堂下告利成故詩楚茨云孝孫徂位工祝致告鄭注云祭禮畢孝孫往位堂下西面位祝於是致孝孫之意告尸以利成也小祝送尸同上大司樂尸出入則令奏肆夏見祝迎尸章右禮畢送尸尸謖君與卿四人餕君起大夫六人餕大夫起士八人餕士起各執其具以出陳於堂下百官進徹之進當為餕聲之誤也百官謂有事於君祭者也既餕乃徹之而去凡餕以四簋黍疏曰諸侯之祭有六簋今云以四簋者以二簋留為陽厭之祭故以四簋而餕簋有黍稷特云黍者見其美舉黍稷可知也祭統詳見祭義其登餕則以上嗣見上嗣舉奠章上按尸謖君與卿四人餕則嗣初不得與餕也下云君起大夫六人餕豈上嗣與五大夫對餕與右餕大祝既祭令徹春官小祝贊徹同上樂師及徹帥學士而歌徹學士國子也鄭司農云謂將徹之時自有樂故帥學士而歌徹𤣥謂徹者歌雍雍在周頌臣工之什同上小師徹歌於有司徹而歌雍同上小子受徹焉夏官九嬪贊后徹豆籩詳見朝踐章外宗佐王后薦王豆視豆籩及以樂徹亦如之春官內宗及以樂徹則佐傳豆籩佐傳佐外宗下同上通朝踐章內宰以三條用大宗伯凡大祭祀王后不與則攝而徹本文云則攝而薦豆籩徹上薦徹豆籩王后之事同膳夫凡王祭祀則徹王之胙俎膳夫親徹胙俎胙俎最尊也其餘則其屬徹之天官內小臣徹后之俎俎謂后受尸之爵飲于房中之俎同上右徹按上章祭統疏云諸侯祭有六簋以四簋餕以二簋留為陽厭然則天子諸侯徹俎後亦當改饌西北隅為陽厭也楚茨朱子曰此詩述公卿有田祿者力於農事以奉宗廟之祭雅小為祊乎外祊祭之明日繹祭也謂之祊者於廟門之旁因名焉其祭之禮既設祭於室不事尸於堂孝子求神非一處也周禮曰夏后氏世室門堂三之二室三之一詩頌絲衣曰自堂徂基禮器君牽牲夫人奠盎君獻尸夫人薦豆卿大夫相君命婦相夫人奠盎設盎齊之奠也此時君牽牲將薦毛血君獻尸而夫人薦豆謂繹日也儐尸主人獻尸主婦自東房薦韭菹醢祭義牛人凡祭祀共其求牛求終也終事之牛謂所以繹者也宗廟有繹者孝子求神非一處地官右繹閍謂之門詩曰祝祭于祊爾雅繹又祭也祭之明日尋繹復祭周曰繹春秋經曰壬午猶繹商曰肜書曰高宗肜日夏曰復胙未見義所出同上鳧鷖朱子曰祭之明日繹而賓尸之樂大雅絲衣繹賓尸也周頌序詩曰明發不寐有懷二人文王之詩也祭之明日明發不寐饗而致之又從而思之詳見祭義宣公八年六月辛巳有事于大廟仲遂卒于垂壬午猶繹繹又祭陳昨日之禮所以賓尸繹者祭之旦日之享賓也春秋穀梁傳繹者何祭之明日也禮繹繼昨日事但不灌地降神爾天子諸侯曰繹大夫曰賓尸士曰宴尸去事之殺也必繹者尸屬昨日配先祖食不忍輒忘故因以復祭禮則無有誤敬慎之至殷曰肜周曰繹繹者據今日道昨日不敢斥尊言之文意也肜者肜肜不絶據昨日道今日斥尊言之質意也祭必有尸者節神也禮天子以卿為尸諸侯以大夫為尸卿大夫以下以孫為尸夏立尸殷坐尸周旅酬六尸公羊傳孔子曰繹之於庫門內祊之於東方失之矣祊之禮宜於廟門外之西室繹又於其堂神位於西也此二者同時而大名曰繹其祭禮簡而事尸禮大郊特牲案家語云衛莊公改舊制變宗廟易朝市高子睪問於孔子曰周禮繹祭于祊祊在廟門之西前朝而後市今衛君更之如之何孔子曰繹之於庫門內祊之於東方市朝於西方失之矣幕能帥顓頊者也有虞氏報焉幕舜之後虞思也為夏諸侯帥循也顓頊有虞氏之祖也報報德之祭也杼能帥禹者也夏后氏報焉杼禹後七世少康之子季杼也能興夏道者上甲微能帥契者也商人報焉上甲微契後八世湯之先也髙圉大王能帥稷者也周人報焉髙圉后稷後十世公非之子也大王髙圉之曽孫古公亶父也國語魯語右報祭書曰惟髙宗報上甲微案竹書紀年武丁十二年報祀上甲微定公問曰此何謂也孔子對曰此謂親盡廟毁有功而不及祖有德而不及宗故於每嵗之大嘗而報祭焉所以昭其功德也公曰先君僖公功德前行可以與於報乎孔子曰丘聞昔虞夏商周以帝王行此禮者則有矣自此以下未之知也孔叢子論書王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之諸侯立五廟曰考廟曰王考廟曰皇考廟皆月祭之祭法古者先王日祭月享日祭于祖考月祭于曽髙諸侯舍日有月祭也國語楚語甸服者祭供日祭也侯服者祀供月祀也日祭日祭于祖考謂上食也近漢亦然月祀月祀於曽髙周語右月告之祭案玉藻疏云天子諸侯行告朔禮訖然後祭於諸廟謂之朝享又謂之朝正又謂之月祭是月祭即朝廟朝正也今以朝廟事附見於下但周禮司尊彝四時間祀有朝享本謂大祫也疏家亦指為月祭則誤矣文公六年閏月不告月猶朝于廟疏曰朝享即月祭是也春秋漁人春獻王鮪王鮪鮪之大者月令季春薦鮪于寢廟天官仲春天子乃鮮羔開氷先薦寢廟鮮當為獻聲之誤也獻羔謂祭司寒也祭司寒而出氷薦於宗廟乃後賦之春秋傳曰古者日在北陸而藏氷西陸朝覿而出之其藏氷也深山窮谷固陰沍寒於是乎取之其出之也朝之祿位賓食喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之祿氷皆與焉大夫命婦喪浴用氷祭寒而藏之獻羔而啓之公始用之火出而畢賦自命夫命婦至於老疾無不受氷季春天子始乘舟薦鮪于寢廟進時美物孟夏農乃登麥天子乃以彘嘗麥先薦寢廟登進也麥之新氣尤盛以彘食之散其熟也彘水畜仲夏農乃登黍天子乃以雛嘗黍羞以含桃先薦寢廟此嘗雛也而云以嘗黍不以牲主穀也必以黍者黍火穀氣之主也含桃櫻桃也孟秋農乃登穀天子嘗新先薦寢廟黍稷之屬於是始熟仲秋以犬嘗麻先薦寢廟麻始熟也季秋天子乃以犬嘗稻先薦寢廟稻始熟也季冬命漁師始漁天子乃嘗魚先薦寢廟天子必親往視漁明漁非常事重之也此時魚潔美已上月令未嘗不食新嘗謂薦新物于寢廟少儀右薦新潛季冬薦魚春獻鮪也周頌詩序古者大寒降土蟄發水虞於是乎講罛罟罶取名魚登川禽而嘗之寢廟行諸國人國語魯語四之日其蚤獻羔祭韭豳風天子𤣥端聽朔于南門之外諸侯皮辨以聽朔于大廟詳見朝廷禮右告朔詳見王朝禮王下祭殤五適子適孫適曽孫適𤣥孫適來孫諸侯下祭三祭適殤也重適也祭適殤於廟之奧謂之陰厭凡庶殤不祭祭法右祭禮書綱目卷四十二
