body:
  text: 禮書綱目卷七婺源江永撰饗食燕記嘉禮十二𥙷大宗伯以嘉禮親萬民以饗燕之禮親四方之賔客賔客謂朝聘者春官掌客凡諸侯之禮上公三饗三食三燕若弗酌則以幣致之侯伯三饗再食再燕子男一饗一食一燕若弗酌謂君有故不親饗食燕也不饗則以酬幣致之不食則以侑幣致之秋官此二條總言饗食燕大司樂凡樂事宿縣遂以聲展之叩聽其聲具陳次之以知完不春官典庸器祭祀帥其屬而設筍虡陳庸器饗食亦如之設筍虡視瞭當以縣樂器焉陳功器以華國也同上笙師凡饗共其鍾笙之樂鍾笙與鍾聲相應之笙同上職金旅於上帝則共其金版饗諸侯亦如之鈃金謂之版此版所施未聞秋官司几筵大饗王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几斧謂之黼其繡白黑采以絳帛為質依其制如屏風然於依前為王設席左右有几優至尊也紛如綬有文而狹者繅席削蒲蒻展之編以五采若今合歡矣畫謂雲氣也次席桃枝席有次列成文諸侯祭祀昨席莞筵紛純加繅席畫純筵國賔於牖前亦如之左彤几鄭司農云禮記國賔老臣也為布筵席於牖前𤣥謂國賔諸侯來朝孤卿大夫來聘後言几者使不䝉如也朝者雕几聘者彤几春官小宗伯辨六尊之名物以待賔客鄭司農云六尊獻尊象尊壺尊著尊大尊山尊同上以上六條王朝饗食禮陳設宰夫凡賔客掌其飲食飲食燕饗也天官外饔掌外祭祀之割亨共其脯修刑膴陳其鼎俎實之牲體魚臘凡賔客之飱饔饗食之事亦如之同上牛人饗食共其膳羞之牛羞進也所進賔之膳燕禮小臣請執幂者與羞膳者至獻賔而膳宰設折俎王之膳羞亦猶此官地獸人賔客共其死獸生獸共其完者天官囿人賔客共其生獸死獸之物地官漁人凡賔客共其魚之鮮薧天官臘人賔客共其脯臘凡乾肉之事同上亨人祭祀共大羮鉶羮賔客亦如之大羮肉湇鄭司農云大羮不致五味也鉶羮加鹽菜矣上同川衡賔客共川奠川奠籩豆之實魚鱐蜃之屬地官澤虞賔客共其澤物之奠亦籩豆之實芹茆菱芡之屬同上埸人賔客共其果蓏同上籩人賔客之事共其薦籩羞籩謂饗燕時天官醢人凡祭祀共薦羞之豆實賔客亦如之同上醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物賔客亦如之齊菹醬屬醯人者皆須醯成味同上鹽人賔客共其形鹽散鹽形鹽鹽之似虎形同上凌人賔客共冰不以鑑往嫌使停膳羞同上舂人凡饗食共其食米饗有食米則饗禮兼燕與食地官饎人凡賔客共其簠簋之實饗食亦如之同上世婦賔客之事帥女宮而濯溉為齍盛溉拭也為猶差擇天官寺人若有賔客之事則帥女宮而致於有司有司謂官卿世婦佐世婦治禮事世婦二十七世婦同上世婦祭祀比其具比次也具所濯溉及粢盛之爨帥六宮之人共齍盛帥世婦女御大賔客之饗食亦如之比帥詔相其事同春官舍人祭祀共簠簋實之陳之方曰簠圓曰簋盛黍稷稻粱器賔客亦如之地宮饗以丄二十一條食之饌司服饗則鷩冕饗饗食賔客鷩畫以雉謂華蟲也其衣三章裳四章凡七也凡大賔客共其衣服而奉之春官內司服王后之服展衣素沙展衣以禮見王及賔客之服字當為䄠素沙者今之白縳也賔客共后之衣服及九嬪世婦凡命婦共其衣服凡者凡女御與外命婦也外命婦唯王祭祀賔客以禮佐后得服此上服天官追師掌王后之首服為九嬪及外內命婦之首服以待賔客同上此三條饗食之服齊僕掌金路以賔以待賔客朝覲宗遇饗食皆乘金路其法儀各以其等為車送迎之節節謂王乘車迎賔客及送相去逺近之數上公九十步侯伯七十步子男五十步司儀職曰車送拜辱又曰及出車送夏官巾車王后之路厭翟勒面繢總厭翟次其羽使相迫也勒面謂以如王龍勒之韋為當靣飾也繢畫文也厭翟后從王賔饗諸侯所乘春官此二條饗食之車士師諸侯為賔則率其屬而蹕於王宮謂諸侯來朝若燕饗時秋官閽人大祭祀喪紀之事設門燎蹕宮門廟門凡賔客亦如之燎地燭也蹕止行者廟在中門之內天官內豎若有賔客之事則為內人蹕內人從世婦有事於廟者內豎為六宮蹕者以其掌內小事同上九嬪若有賔客則從后當贊后事同上女史凡后之事以禮從亦如大史之從於王同上大司樂祭祀王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏三夏皆樂章名大饗不入牲其他皆如祭祀大饗饗賔客也不入牲牲不入亦不奏昭夏也其他謂王出入賔客出入亦奏王夏肆夏春官已上六條入廟大僕賔客詔王之服位詔法儀詔告也夏官小臣小賔客饗食掌事如大僕之法同上及此二條即位法儀內小臣若有賔客則擯詔后之禮事相九嬪之禮事正內人之禮事擯為后傳辭有所求為詔相正者異尊卑也天官內宗掌宗廟之祭祀薦加豆籩加爵之豆籩及以樂徹則佐傳豆籩佐傳佐外宗賔客之饗食亦如之王后有事則從春官外宗小祭祀掌事賔客之事亦如之同上世婦祭祀詔王后之禮事薦徹之節相外內宗之禮事同姓異姓之女有爵佐后者大賔客之饗食亦如之同上大饗尚腵修而已矣亦不饗味也此大饗饗諸侯也郊特牲肆師饗食授祭授賔祭肺春官大司馬饗食羞牲魚授其祭牲魚魚牲也祭謂賔所以祭也鄭司農云大司馬主進魚牲夏官小司馬凡饗掌其事如大司馬之法同上量人饗賔制其從獻脯燔之數量鄭司農云從獻者肉殽從酒也𤣥謂燔從於獻酒之肉炙也數多少也量長短也同上琥璜爵琥璜爵者天子酬諸侯諸侯相酬以此玉將幣也禮器內宰凡賔客之獻瑶爵皆贊謂王同姓及二王之後來朝覲為賔客者獻謂王饗燕亞王獻賔也瑶爵所以亞王酬賔也坊記曰陽侯殺穆侯而竊其夫人故大饗廢夫人之禮天官上公之禮饗禮九獻食禮九舉侯伯之禮饗禮七獻食禮七舉子男之禮饗禮五獻食禮五舉鄭司農云舉舉樂也𤣥謂九舉舉牲體九飯也秋官大行人薦以上十二條羞獻酬之節樂師饗食諸侯序其樂事令奏鐘鼓令相如祭之儀春官大師大祭祀帥瞽登歌令奏擊拊擊拊瞽乃歌也拊形如鼓以韋為之著之以糠下管播樂器令奏鼓朄鼓朄管乃作也特言管者貴人氣也鼓朄言擊朄詩云應朄縣鼓大饗亦如之同上小師大祭祀登歌擊拊亦自有拊擊之佐大師令奏下管擊應鼓應鼙也應與朄及朔皆小鼓也其所用别未聞徹歌於有司徹而歌雍大饗亦如之同上鐘師掌金奏金奏擊金以為奏樂之節金謂鐘及鎛凡樂事以鐘鼓奏九夏杜子春云王出入奏王夏尸出入奏肆夏四方賔來奏納夏客醉而出奏陔夏饗食奏燕樂以鐘鼓奏之同上鎛師凡祭祀鼓其金奏之樂饗食亦如之同上韎師掌教韎樂祭祀則帥其屬而舞之舞之以東夷之舞大饗亦如之同上旄人賔客舞其燕樂同上籥師祭祀則鼓羽籥之舞鼓之者恆為之節賔客饗食則亦如之同上司干祭祀舞者既陳則授舞器既舞則受之既已也受取藏之賔饗亦如之同上樂以上九條舞膳夫凡王賔客食則徹王之胙俎膳夫親徹胙俎胙俎最尊也其餘則其屬徹之賔客食而王有胙俎王與賔客禮食主人飲食之爼皆為胙爼見於此矣官天大饗既饗卷三牲之俎歸於賔館既饗歸賔俎所以厚之也條雜記歸此二徹爼爼掌客王合諸侯而饗禮則具十有二牢庶具百物備諸侯長十有再獻饗諸侯而用王禮之數者以公侯伯子男盡在是兼饗之莫敵用也諸侯長九命作伯者也獻公侯以下如其命數秋官此一條合諸侯饗禮酒正共賔客之禮酒禮酒王所致酒也天官酒人共賔客之禮酒飲酒而奉之酒正使之也禮酒饗燕之酒飲酒食之酒此謂給賔客之稍王不親饗燕不親食而使人各以其爵以酬幣侑幣致之則從而以酒往同上肆師大朝覲共設匪罋之禮設於賔客之館公食大夫禮曰若不親食使大夫以侑幣致之豆實實於罋簋食實於筐匪其筐字之誤與禮不親饗則以酬幣致之或者匪以致饗春官已上三條王不親饗食酒正凡王之燕飲酒共其計酒正奉之共其計者獻酬多少度當足也故書酒正無酒字鄭司農云正奉之酒正奉之也天官膳夫王燕飲酒則為獻主鄭司農云主人當獻賔則膳夫代王為主君不敵臣也燕義曰使宰夫為獻主臣莫敢與君亢禮同上大僕王燕飲則相其法相左右夏官司儀合諸侯王燕則諸侯毛謂以鬚髮坐也朝事尊尊上爵燕則親親上齒鄭司農云謂老者在上也老者二毛故曰毛秋官鞮鞻氏掌四夷之樂與其聲歌祭祀則吹而歌之燕亦如之吹之以管籥為之聲燕春官以上五條王朝禮酒正共后之致飲於賔客之禮醫酏糟皆使其士奉之王致酒后致飲夫婦之義糟醫酏不泲者泲曰清不泲曰糟后致飲無醴醫酏不清者與王同體屈也亦因以少為貴士謂酒人漿人奄士天官漿人共夫人致飲於賔客之禮清醴醫酏糟而奉之亦酒正使之三物有清有糟夫人不體王得備之禮飲醴用柶者糟也不用柶者清也同上此二條后夫人致飲諸侯之席三重大夫再重禮器大饗君三重席而酢焉言諸侯相饗獻酢禮敵也三獻之介君專席而酢焉三獻卿大夫來聘主君饗燕之以介為賔賔為苟敬則徹重席而受酢也專猶單也郊特牲五獻之尊門外缶門內壺君尊瓦甒五獻子男之饗禮也壺大一石瓦甒五斗缶大小未聞也易曰尊酒簋二用缶禮器反坫出尊反坫反爵之坫也出尊當尊南也惟兩君為好既獻反爵於其上禮君尊於兩楹之聞明堂位邦君為兩君之好有反坫好謂好會坫在兩楹之間獻酬飲畢則反爵於其上論語豆諸公十有六諸侯十有二上大夫八下大夫六豆之數謂諸侯相食及食大夫公食大夫禮曰宰夫自東房薦豆六設於醬東此食下大夫而豆六則其餘著矣聘禮致饔餼於上大夫堂上八豆設於户西則凡致饔餼堂上之豆數亦如此周禮公之豆四十其東西夾各十有二侯伯之豆三十有二其東西夾各十子男之豆三十有四其東西夾各六禮器諸公相為賔饗食如將幣之儀饗食速賔君如有故不親饗食則使大夫以酬幣侑幣致之賔之拜禮拜饗食秋官司儀公於賔一食再饗燕無常數賔介皆明日拜於堂上介一食一饗詳見聘禮其介為介同上司儀諸公之臣相為國客饗食如將幣之儀同上若不親食使大夫各以其爵朝服致之以侑幣如致饔無儐致饗以酬幣亦如之同上凡致禮皆用其饗之加籩豆各以其爵朝服同上大夫來使無罪饗之過則餼之同上有大客後至則先客不饗食致之同上無饔者無饗禮同上公與客燕謂四方之使者曰寡君有不腆之酒以請吾子之與寡君須臾焉使某也以請君使人戒客辭也禮使人各以其爵寡鮮也猶言少德謙也腆善也上介出請入告古文腆皆作殄今文皆曰不腆酒無之對曰寡君君之私也君無所辱賜於使臣臣敢辭上介出答主國使者辭也私謂獨受恩厚也君無所為辱賜於使臣謙不敢當也敢者怖懼用勢決之辭寡君固曰不腆使某固以請寡君君之私也君無所辱賜於使臣臣敢固辭重傳命固如故寡君固曰不腆使某固以請某固辭不得命敢不從許之也於是出見主國使者辭以見許為得命今文無使某致命曰寡君使某有不腆之酒以請吾子之與寡君須臾焉親相見致君命辭也君貺寡君多矣又辱賜於使臣臣敢拜賜命貺賜也猶愛也敢拜賜命從使者拜君之賜命猶謙不必辭也燕禮燕則上介為賔賔為苟敬宰夫獻詳聘禮若與四方之賔燕則公迎之於大門內揖讓升四方之賔謂來聘者也自戒至於拜至皆如公食亦告饌具而後公即席小臣請執幂請羞者乃迎賔也賔為苟敬席於阼階之西北面有脀不嚌肺不啐酒其介為賔苟且也假也主國君饗時親進醴於賔今燕又宜獻焉人臣不敢褻煩尊者至此升堂而辭讓欲以臣禮燕為恭敬也於是席之如獻諸公之位言苟敬者賔實主國所宜敬也脀折俎也不嚌啐似若尊者然也介門西北靣西上公降迎上介以為賔揖讓升如初禮主人獻賔獻公既獻苟敬乃媵觚羣臣即位如燕也無膳尊無膳爵降尊以就卑也記燕禮若與四方之賔燕媵爵曰臣受賜矣臣請贊執爵者受賜謂公卿者酬之至燕主人事賔之禮殺賔降洗升媵觶於公答恩惠也相者對曰吾子無自辱焉辭之也對答也亦告公以公命答之也有房中之樂弦歌周南召南之詩而不用鐘磬之節也謂之房中者后夫人之所諷誦以事其君子同上以上十八條諸侯饗食燕賔正公食大夫别有篇上公夫人致饗大牢食大牢侯伯夫人致饗大牢凡夫人之禮皆使下大夫致之於子男云膳視致饗言夫人致膳於小國君以致饗之禮則是不復饗也饗有壺酒秋官掌客此一條夫人致饗食大夫於賔一饗一食上介若食若饗若不親饗則公作大夫致之以酬幣致食以侑幣詳聘禮大夫相食親戒速記異於君者也速召也先就告之歸具既具復自召之迎賔於門外拜至皆如饗拜饔大夫相饗之禮也今亡古文饗或作鄉降盥受醬湇侑幣束錦也皆自阼階降堂受授者升一等皆者謂受醬受湇受幣也侑用束錦大夫文也降堂謂止階上今文無束賔止也主人三降賔不從賔執粱與湇之西序端不敢食於尊處主人辭賔反之巷加席主人辭賔反之辭幣降一等主人從從辭賔降受侑幣再拜稽首主人送幣亦然敵也辭於主人降一等主人從辭謂辭其臨已食卒食徹於西序端亦親徹東面再拜降出拜亦拜卒食其他皆如公食大夫之禮若不親食則公作大夫朝服以侑幣致之作使也大夫有故君必使其同爵者為之致禮列國之賔來榮辱之事君臣同賔受於堂無儐與受君禮同大公食大夫禮以上二條夫相饗食詩小雅魚麗集傳曰此燕饗通用之樂歌南有嘉魚此亦燕饗通用之樂南山有臺此亦燕饗通用之樂蓼蕭諸侯朝於天子天子與之燕以示慈惠故歌此詩湛露此亦天子燕諸侯之詩彤弓此天子燕有功諸侯而錫以弓矢之樂歌也菁菁者莪此亦燕飲賔客之詩桑扈此亦天子燕諸侯之詩瓠葉此亦燕飲之詩虢公晉侯朝王王饗醴命之宥王之覲羣后始則行饗禮先置醴酒示不忘古飲燕則命以幣物宥助也所以助歡敬之意言備設皆賜玉五瑴馬三匹非禮也雙玉為㲄王命諸侯名位不同禮亦異數不以禮假人侯而與公同賜是借人禮年莊十八左氏傳晉文公獻楚俘於王鄭伯傅王用平禮也傳相也以周平王享晉文侯仇之禮享晉侯王享醴命晉侯宥既饗又命晉侯助以束帛以將厚意僖二十八年左氏傳齊侯使管夷吾平戎於王平和也王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國高在國子高子天子所命為齊守臣皆上卿也莊二十二年高傒始見經僖二十八年國歸父乃見傳歸父之父曰懿仲高傒之子曰莊子不知今當誰也若節春秋來承王命何以禮焉節時也陪臣敢辭諸侯之臣曰陪臣王曰舅氏伯舅之使故曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命功勳美德可謂正而不可忘者不言位而言職者管仲位卑而執齊政故欲以職尊之管仲受下卿之禮而還管仲不敢以職自高卒受本位之禮君子曰管仲之世祀也宜哉讓不忘其上詩曰愷悌君子神所勞矣詩大雅愷樂也悌易也言樂易君子為神所勞來故世祀也管仲之後於齊沒不復見傳亦舉其無驗僖十二年左氏傳晉侯使士㑹平王室定王享之原襄公相禮原襄公周大夫相佐也殽蒸蒸升也升殽於俎武子私問其故享當體薦而殽蒸故怪問之武士㑹諡季其字王聞之召武子曰季氏而弗聞乎王享有體薦享則半解其體而薦之所以示共儉宴有折俎體解節折升之於俎物皆可食所以示慈惠也公當享卿當宴王室之禮也公謂諸侯武子歸而講求典禮以修晉國之法傳言典禮之廢久傳宣十六年左氏晉侯使隨㑹聘於周晉侯晉文公之孫成公之子景公儒也隨㑹晉正卿士蒍之孫成伯之子士季武子也定王饗之殽蒸定王周襄王之孫頃王之子定王榆也蒸升也升折俎之殽原公相禮原公周卿士原襄公也相佐也范子私於原公范子隨㑹也食采於隨范故或曰隨㑹或曰范㑹曰吾聞王室之禮無毁折今此何禮也王見其語也召原公而問之原公以告王召士季季范子字曰子弗聞乎禘郊之事則有全蒸全蒸全具牲體而升之也凡禘郊皆血牲也王公立飫則有房蒸王天子公諸侯也禮之立成者為飫房大俎也詩云籩豆大房謂半解其體升之房也親戚宴饗則有殽蒸殽蒸升體解節折之俎謂之折俎也今女非他也而叔父使士季實來修舊德以奬王室奬成也唯是先王之宴禮欲以貽女貽遺也余一人敢設飫禘焉飫半體禘全體忠非親禮而干舊職以亂前好忠厚也親禮親戚宴享之禮也舊職故事前好先王之好也且夫唯戎翟則有體薦體委與之也夫戎翟冒沒輕儳貪而不讓冒抵觸也沒入也儳進退上下無列也其血氣不治若禽獸焉其適來班貢不俟馨香嘉味也適往也班賦也故坐諸門外而使舌人體委與之舌人能逹異方之志象胥之官也女今我王室之一二兄弟以時相見兄弟晉也將和協典禮以示民訓則協和也典常也無亦擇其柔嘉無亦不亦也柔脆也嘉美也選其馨香潔其酒醴品其百籩籩竹器容四升其實棗栗糗餌之屬修其簠簋修備也簠簋黍稷之器奉其犧象犧犧尊飾以犧牛象象尊以象骨為之飾出其尊彛尊彛皆受酒之器陳其鼎俎俎設於左牛羊豕為一列魚臘腸胃為一列膚特於東靜其巾幂靜潔也巾幂所以覆尊彛敬其祓除祓除猶掃除也體解折節而共飲食之於是乎有折俎加豆加豆謂既食之後所加之豆也其實芹菹兔醢之屬酬幣宴貨酬報也聘有酬賔束帛之禮其宴束帛為好謂之燕貨以示容合好示容儀合和好也胡有孑然其效戎翟也孑然全體之貌夫王公諸侯之有飫也將以講事成章講講軍旅議大事也章章程也建大德昭大物也大德大功大物戎器也故立成禮蒸而已立成不坐也升其備物而已飫以顯物宴以食好顯物示物備也歲飫不倦歲行飫禮不至於解倦時宴不淫一時之間必有宴禮不至於淫湎月㑹㑹計也計一月之經用旬修修十日之中所成為者日完不忘日完一日之所為不忘不忘其禮也服物昭庸采飾顯明庸功也冕服旗章所以昭有功采色之飾所以顯明德也文章比象黼黻錦繡之文章也比象比文以象山龍華蟲之屬周旋序順周旋容止也序次也各以次比順於禮也容貌有崇崇飾也容止可觀也威儀有則則法也其威可畏其儀可度也五味實氣味以實氣氣以行志五色精心五色之章所以異賢不肖精其心也五聲昭德昭德謂政平者其樂和也亦謂見其樂知其德五義紀宜五義謂父義母慈兄友弟恭子孝也飲食可饗和同可觀殽蒸故可饗以可去不曰和一心不二曰同和同之用行則德義可觀財用可嘉酬幣宴貨以將厚意故可嘉也則順而建德則法也建立也古之善禮者將焉用全蒸武子遂不敢對而退歸乃講聚三代之典禮三代夏殷周也於是乎修執秩以為晉法秩常也可奉執以為常法者晉文公搜于被廬作執秩之法自靈公以來闕而不用故武子修之以為晉國之法國語周語晉侯使鞏朔獻齊捷於周王使委於三吏委屬也三吏三公也三公者天子之吏也禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍相相禮者籍書也王畏晉故私宴賄以慰鞏朔成二年左氏傳楚子入饗於鄭為鄭所饗九獻用上公之禮九獻酒而禮畢庭實旅百庭中所陳品數百也加籩豆六品食物六品加於籩豆籩豆禮食品饗畢夜出僖二十二年左氏傳宋成公如楚還入於鄭鄭伯將享之問禮於皇武子皇武子鄭卿對曰宋先代之後也於周為客天子有事膰焉有事祭宗廟也膰祭肉尊之故賜以祭胙有喪拜焉宋弔周喪王特拜謝之豐厚可也鄭伯從之享宋公有加禮也禮物事事加厚善鄭能尊先代僖二十四年左氏傳晉公子重耳如楚楚成王以周禮享之九獻庭實旅百成王楚武王之孫文王之子熊頵也九獻上公之享禮也庭實庭中之陳也百舉成數也周禮上公出入所享饔餼九牢米百有二十筥醯醢百有二十饔禾三十車芻薪倍禾公子欲辭不敢當禮子犯曰天命也君其饗之天命天使之也饗食也亡人而國薦之薦進也以國君之禮薦進之非敵而君設之非體敵而設之如人君也非天誰啓之心晉語宋公享晉侯於楚丘請以桑林桑林殷天子之樂名荀罃辭辭讓之荀偃士丐曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀魯有禘樂賔祭用之禘三年大祭則作四代之樂别祭群公則用諸侯樂宋以桑林享君不亦可乎言俱天子樂也舞師題以旌夏師樂師也旌夏大旌也題識也以大旌表識其行列晉侯懼而退入於房旌夏非常卒見之人心偶有所畏去旌卒享而還襄十年左氏傳定公㑹齊侯於夾谷孔丘相相㑹儀也齊侯將享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉故舊典事既成矣㑹事成而又享之是勤執事也且犧象不出門嘉樂不野合犧象酒器犧尊象尊也嘉樂鐘磬也享而既具是棄禮也若其不具用秕稗也秕穀不成者稗草之似穀者言享不具禮穢薄若秕稗用秕稗君辱棄禮名惡子盍圖之夫享所以昭德也不昭不如其已也乃不果享孔子知齊侯懷詐故以禮距之定十年左氏傳王使周公閲來聘饗有昌歜白黑形鹽菖歜菖蒲葅白熬稻黑熬黍形鹽鹽形象虎辭曰國君文足昭也武可畏也則有備物之饗以象其德薦五味羞嘉榖鹽虎形嘉穀熬稻黍也以象其文也鹽虎形以象武也以獻其功吾何以堪之僖三十年左氏傳衛寧武子來聘公與之宴為賦湛露及彤弓非禮之常公特命樂人以示意故言為賦湛露彤弓詩小雅不辭又不答賦使行人私焉私問之對曰臣以為肄業及之也肄習也魯人失所賦寧武子佯不知此其愚不可及昔諸侯朝正於王朝而受政教也王宴樂之於是乎賦湛露則天子當陽諸侯用命也湛露曰湛湛露斯匪陽不晞晞乾也言露見日而乾猶諸侯禀天子命而行諸侯敵王所愾而獻其功敵猶當也愾恨怒也王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以明報功宴樂今陪臣來繼舊好方論天子之樂故自稱陪臣君辱貺之其敢干大禮以自取戾貺賜也干犯也戾罪也文四年左氏傳穆叔如晉報知武子之聘也武子聘在元年晉侯享之金奏肆夏之三不拜肆夏樂曲名周禮以鐘鼓奏九夏其二曰肆夏一名樊三曰韶夏一名遏四曰納夏一名渠蓋擊鐘而奏此三夏曲工歌文王之三又不拜工樂人也文王之三大雅之首文王大明綿歌鹿鳴之三三拜小雅之首鹿鳴四牡皇皇者華韓獻子使行人子員問之行人通使之官曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子藉薦也吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞元侯牧伯文王兩君相見之樂也臣不敢及及與也文王之三皆稱文王之德受命作周故諸侯㑹同以相樂鹿鳴君所以嘉寡君也敢不拜嘉晉以叔孫為嘉賔故歌鹿鳴之詩取其我有嘉賔叔孫奉君命而來嘉叔孫乃所以嘉魯君四牡君所以勞使臣也敢不重拜詩言使臣乘四牡騑騑然行不止勤勞也晉以叔孫來聘故以此勞之皇皇者華君教使臣曰必咨於周皇皇者華君遣使臣之詩言忠臣奉使能光輝君命如華之皇皇然又當咨於忠信以補已不及忠信為周其詩曰周爰咨諏周爰咨謀周爰咨度周爰咨詢言必於忠信之人咨此四事臣聞之訪問於善為咨問善道咨親為詢問親戚之義咨禮為度問禮宜咨事為諏問政事咨難為謀問患難臣獲五善敢不重拜五善謂咨詢度諏謀襄四年左氏傳叔孫穆子聘於晉穆子魯卿叔孫得臣之子豹也晉悼公饗之以饗禮禮之樂及鹿鳴之三而後拜樂三及至也悼公先為穆子作肆夏文王各三篇而不拜至作鹿鳴之三篇而後拜樂三也晉侯使行人問焉行人官名掌賔客之禮傳曰韓獻子使行人子員問焉曰子以君命鎮撫敝邑鎮重也撫安也不腆先君之禮以辱從者腆厚也稱從者謙也不腆之樂以節之以樂節禮也吾子舍其大而加禮於其細敢問何禮也大謂肆夏文王細謂鹿鳴也對曰寡君使豹來繼先君之好君以諸侯之故貺使臣以大禮貺賜也夫先樂金奏肆夏繁遏渠天子所以饗元侯也金奏以鐘奏樂也肆夏一名樊韶夏一名遏納夏一名渠此三夏曲也禮有九夏周禮鐘師掌以鐘鼓奏九夏元侯牧伯也鄭司農云九夏皆篇名頌之類也載在樂章樂崩亦從而亡是以頌不能具也夫歌文王大明綿則兩君相見之樂也文王大明綿大雅之首文王之三也此三篇皆美文王武王有聖德天所輔祚其徴應符驗著見於天乃天命非人力也周公欲昭先王之德於天下故兩君相見得以為樂也皆昭令德以合好也皆非使臣之所敢聞也臣以為肄業及之故不敢拜肄習也以為樂人自習修其業而及之故不敢拜今伶簫咏歌及鹿鳴之三伶伶人樂官也簫樂器編管為之言樂人以簫作此三篇之聲與歌者相應也詩云簫管備舉君之所以貺使臣臣敢不拜貺夫鹿鳴君之所以嘉先君之好也敢不拜嘉嘉善也鹿鳴曰我有嘉賔德音孔昭是為嘉善先君之好也四牡君之所以章使臣之勤也敢不拜章四牡君勞使臣之樂也章著也言臣奉命勞勤於外述叙其情以歌樂之所以著其勤勞也皇皇者華君教使臣曰每懷靡及皇皇者華君遣使臣之樂也皇皇猶煌煌也懷私為每懷靡無也言臣奉使當榮顯其君如華之色煌煌然既受命當思在公每人人懷其私於事將無所及諏謀度詢必咨於周敢不拜教此六者皆君之所以教臣也訪問於善為咨忠信為周言諏謀度詢必當咨之於忠信之人臣聞之曰懷和為每懷鄭司農云和當為私咨才為諏才當為事傳曰咨事為諏咨事為謀事當為難傳曰咨難為謀咨義為度咨禮義為度度亦謀也咨親為詢詢親戚之謀忠信為周言當咨之於忠信之人也詩云周爰咨詢君貺使臣以大禮重之以六德敢不重拜六德謂諏也謀也度也詢也咨也周也魯語晉郤至如楚聘楚子享之子反相為地室而縣焉縣鐘鼓也卻至將登登堂金奏作於下擊鐘而奏樂驚而走出子反曰日云莫矣寡君須矣吾子其入也賔曰君不忘先君之好施及下臣貺之以大禮重之以備樂貺賜也如天之福兩君相見何以代此下臣不敢言此兩君相見之禮子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂言兩君戰乃相見無用此樂寡君須矣吾子其入也賔曰傳諸交讓得賔主辭者多曰賔主以明之若讓之以一矢禍之大者其何福之為世之治也諸侯閒於天子之事則相朝也王事間缺則修私好於是乎有享宴之禮享以訓共儉享有體薦設几而不倚爵盈而不飲肴乾而不食所以訓共儉宴以示慈惠宴則折俎相與共食共儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕不夕言無事此公侯之所以扞城其民也扞蔽也言享宴結好鄰國所以蔽扞其民天下有道則公侯能為民干城而制其腹心亂則反之略其武夫以為已腹心爪牙今吾子之言亂之道也不可以為法然吾子主也臣敢不從遂入卒事成十二年左氏傳衛侯饗苦成叔成叔卻豐寧惠子相相佐禮惠子寧殖苦成叔傲寧子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩旨酒思柔詩小雅言君子好禮飲酒皆思柔德雖設兕觥觩然不用以兕角為觥所以罰不敬觩陳設之貌彼交匪傲萬福來求彼之交於事而不惰傲乃萬福之所求今夫子傲取禍之道也為十七年卻氏亡成十四年左氏傳宋人享趙文子叔向為介司馬置折俎禮也折俎體解節折升之於俎合卿享宴之禮故曰禮也周禮司馬掌㑹同之事仲尼使舉是禮也以為多文辭宋向戍自美弭兵之意欲逆趙武趙武叔向因享宴之㑹展賔主之辭故仲尼以為多文辭襄二十七年左氏傳趙孟叔孫豹曹大夫入於鄭㑹罷過鄭鄭伯兼享之子皮戒趙孟戒享期禮終趙孟賦瓠葉受所戒禮畢而賦詩瓠葉詩小雅義取古人不以微薄廢禮雖瓠葉兔首猶與賔客享之子皮遂戒穆叔且告之告以趙孟賦瓠葉穆叔曰趙孟欲一獻瓠葉詩義取薄物而以獻酬知欲一獻子其從之子皮曰敢乎言不敢穆叔曰夫人之所欲也又何不敢夫人趙孟及享具五獻之籩豆於幕下朝聘之制大國之卿五獻趙孟辭趙孟自以今非聘鄭故辭五獻私於子産私語曰武請於冡宰矣冡宰子皮請謂賦瓠葉乃用一獻趙孟為客禮終乃宴卿㑹公侯享宴皆折俎不體薦昭元年左氏傳季孫宿如晉晉侯享之有加籩籩豆之數多於常禮武子退使行人告曰小國之事大國也苟免於討不敢求貺貺賜也得貺不過三獻周禮大夫三獻今豆有加下臣弗堪無乃戾也懼以不堪為罪韓宣子曰寡君以為歡也以加禮致歡心對曰寡君猶未敢未敢當此加也况下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨宴好之貨傳昭六年左氏晉羊舌肸聘於周肸晉大夫羊舌職之子叔向之名發幣於大夫及單靖公發其禮幣於周大夫次及單靖公靖公王卿士單襄公之孫頃公之子靖公享之儉而敬享禮薄而身敬也賔禮贈餞視其上而從之賔禮所以賔待叔向之禮也送之以物曰贈以飲食曰餞餞郊禮也上位在靖公上也視之不敢踰也燕無私無私好貨及籩豆之加也送不過郊至郊而反亦言無私語說昊天有成命語宴語所及者說樂也昊天有成命周頌篇名周語邦君為兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮此諸侯之禮而管仲僣之不知禮也論語公父文伯飲南宮敬叔酒敬叔魯大夫孟僖子之子懿子之弟南宮適也以露睹父為客睹父魯大夫客上客也禮飲尊一人以為客羞鱉焉小羞進也睹父怒怒鱉小也相延食鱉延進也衆賔相進以食龞辭曰將使鱉長而後食之遂出此睹父詞文伯之母聞之怒曰吾聞之先子先子先舅季悼子也曰祭養尸饗養上賔言祭祀之禮尊養尸饗宴之禮養上賔也鱉於何有於何有猶何禮有鱉也而使夫人怒也魯語射鄉食饗所以正交接也樂記食饗之禮所以仁賔客也仁猶存也射鄉食饗存生之善者也仲尼燕居仲尼燕居子張子貢言游侍縱言至於禮子曰慎聽之女三人者吾語女禮猶有九焉大饗有四焉苟知此矣雖在畎畝之中事之聖人已兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋升歌清廟下管象武夏籥序興陳其薦俎序其禮樂備其百官如此而後君子知仁焉行中規還中矩和鸞中采齊客出以雍徹以振羽是故君子無物而不在禮矣入門而金作示情也升歌清廟示德也下而管象示事也是故古之君子不必親相與言也以禮樂相示而已猶有九焉吾所欲語女餘有九也但大饗有四大饗謂饗諸侯來朝者也四者謂金再作升歌清廟下管象也事之謂立置於位也聖人已者是聖人也縣興金作也金再作者獻主君又作也下謂堂下也象舞武舞也夏籥文舞也序更也堂下吹管舞文武之樂更起也知仁焉知禮樂所存也采齊雍振羽皆樂章也振羽振鷺及雍金作示情也賔主人各以情相示也金性內明象人情也示德也相示以德也清廟頌文王之德示事也相示以事也武象武王之大事也同上賔入大門而奏肆夏示易以敬也賔朝聘者易和說也卒爵而樂闋孔子屢歎之美此禮也奠酬而工升歌發德也以詩之義發明賔主之德歌者在上匏竹在下貴人聲也匏笙也樂由陽來者也禮由隂作者也隂陽和而萬物得得得其所郊特牲大饗君三重席而酢焉三獻之介君專席而酢焉此降尊以就卑也同上子云敬則用祭器祭器籩豆簋鉶之屬也有敬事於賔客則用之謂饗食也盤盂之屬為燕器故君子不以菲廢禮不以美沒禮言不可以其薄不及禮而不行禮亦不可以其美過禮而去禮禮主敬廢滅之是不敬故食禮主人親饋則客祭主人不親饋則客不祭故君子苟無禮雖美不食焉詩云既醉以酒既飽以德言君子饗燕非專為酒肴亦以觀威儀講美德以此示民民猶爭利而忘義坊記子云禮非祭男女不交爵交爵謂相獻酬以此坊民陽侯猶殺繆侯而竊其夫人同姓也以貪夫人之色至殺君而立其國未聞故大饗廢夫人之禮大饗饗諸侯來朝者也夫人之禮使人攝同上大夫而饗君非禮也其饗君由强且富也郊特牲禮書綱目卷七
