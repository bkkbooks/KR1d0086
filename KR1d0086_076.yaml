body:
  text: 禮書綱目卷七十四婺源江永撰禮記通禮二十七補五載一巡守修五禮集傳曰五禮吉凶軍賓嘉也修之所以同天下之風俗舜典帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于夔龍帝曰俞往欽哉典主也三禮祀天神享人鬼祭地祗之禮也伯夷臣名薑姓秩序也宗祖廟也秩宗主敘次百神之官而專以秩宗名之者蓋以宗廟為主也周禮亦謂之宗伯而都家皆有宗人之名以掌祭祀之事亦此意也夙早寅敬畏也直者心無私曲之謂人能敬以直內不使少有私曲則其心潔清而無物欲之汚可以交於神明矣夔龍二臣名同上臯陶曰天敘有典敕我五典五惇哉天秩有禮自我五禮有庸哉同寅協恭和衷哉敘者君臣父子兄弟夫婦朋友之倫敘也秩者尊卑貴賤等級隆殺之品秩也敕正惇厚庸常也有庸馬本作五庸衷降衷之衷即所謂典禮也典禮雖天所敘秩然正之使敘倫而益厚用之使品秩而有常則在我而已故君臣當同其寅畏協其恭敬誠一無間融會流通而民彝物則各得其正所謂和衷也臯陶謨宗伯掌邦禮治神人和上下詳見職官下乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國注見職官上大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國注見祭法以吉禮事邦國之鬼神示事謂祀之祭之享之吉禮之别十有二以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王注並見祭法以凶禮哀邦國之憂哀謂救患分災凶禮之别有五以喪禮哀死亡注見弔禮以荒禮哀凶札以弔禮哀禍災以禬禮哀圍敗以恤禮哀冦亂注並見災變禮以賓禮親邦國親謂使之相親附賓禮之别有八春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同注見覲禮及會同篇時聘曰問殷俯曰視注見遣使禮以軍禮同邦國同謂威其不協僭差者軍禮之别有五大師之禮用衆也注見征伐大均之禮恤衆也大田之禮簡衆也大役之禮任衆也大封之禮合衆也注並見田役以嘉禮親萬民嘉善也因人心之所善者而為之制嘉禮之别有六以飲食之禮親宗族兄弟注見嘉事雜記以冠昏之禮親成男女注見冠昏記以賓射之禮親故舊朋友注見三射記以饗燕之禮親四方之賓客注見饗食燕記以脤膰之禮親兄弟之國以賀慶之禮親異姓之國注並見嘉事雜記小宗伯掌五禮之禁令與其用等注見名器凡國之大禮佐大宗伯凡小禮掌事如大宗伯之儀肆師凡國之大事治其禮儀以佐宗伯治謂如今每事者更奏白王禮也故書儀為義鄭司農云義讀為儀古者書儀但為義今時所謂義為誼凡國之小事治其禮儀而掌其事如宗伯之禮小史凡國事之用禮法者掌其小事並春官大宰掌建邦之六典三曰禮典以和邦國以統百官以諧萬民詳政事上小宰以官府之六職辨邦治三曰禮職以和邦國以諧萬民以事鬼神詳職官下司徒修六禮以節民性六禮冠昏喪祭鄉相見詳見學制大宰以八則治都鄙五曰禮俗以馭其民詳見封建土均禮俗喪紀祭祀皆以地媺惡為輕重之法而行之掌其禁令詳政事上夫禮始於冠本於昏重於喪祭尊於朝聘和於射鄉此禮之大體也始猶根也本猶幹也鄉鄉飲酒昏義夫禮者所以定親疏決嫌疑别同異明是非也道德仁義非禮不成教訓正俗非禮不備分爭辨訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊分辨皆别也宦仕也班次也涖臨也莊敬也學或為御是以君子恭敬撙節退讓以明禮撙猶趨也鸚鵡能言不離飛鳥猩猩能言不離禽獸今人而無禮雖能言不亦禽獸之心乎夫惟禽獸無禮故父子聚麀聚猶共也鹿牝曰麀是故聖人作為禮以教人使人以有禮知自别于禽獸人有禮則安無禮則危故曰禮者不可不學也夫禮者自卑而尊人雖負販者必有尊也而况富貴乎負販者尤輕恌志利宜若無禮然富貴而知好禮則不驕不淫貧賤而知好禮則志不懾懾猶怯惑並曲禮孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生是故夫禮必本於天殽於地列於鬼神聖人則天之明因地之利取法度於鬼神以制禮下教令也既又祀之盡其敬也教民嚴上也鬼者精魂所歸神者引物而出謂祖廟山川五祀之屬也達於喪祭射御冠昏朝聘民知嚴上則此禮達於下也故聖人以禮示之故天下國家可得而正也民知禮則易教禮者君之大柄也所以别嫌明微儐鬼神考制度别仁義所以治政安君也疾今失禮如此為言禮之大義也柄所操以治事故政不正則君位危君位危則大臣倍小臣竊刑肅而俗敝則法無常法無常而禮無列禮無列則士不事也刑肅而俗敝則民弗歸也是謂疵國又為言政失君危之禍敗也肅駿也疵病也故政者君之所以藏身也於此又遂為之言政也藏謂輝光於外而形體不見若日月星辰之是故夫政必本於天殽以降命降下也殽天之氣以下教令天有運移之期隂陽之節也命降於社之謂殽地謂教令由社下者也社土地之主也周禮土會之法有五地之物生降於祖廟之謂仁義謂教令由祖下者大傳曰自稱率而上至於祖逺者輕仁也自祖率而下至於稱高者重義也降於山川之謂興作謂教令由山川而下者也山川有草木禽獸可作器物共國事降於五祀之謂制度謂教令由五祀下者五祀有中霤門户竈行之神此始為宫室制度此聖人所以藏身之固也政之行如此何用城郭溝池之為故聖人參於天地並於鬼神以治政也處其所存禮之序也玩其所樂民之治也並并也謂比方之也存察也治所以樂其事居也故天生時而地生財人其父生而師教之四者君以正用之故君者立於無過之地也順時以養財尊師以教民而以治政則無過差矣易曰何以守位曰仁何以聚人曰財故君者所明也非明人者也君者所養也非養人者也君者所事也非事人者也故君明人則有過養人則不足事人則失位明猶尊也故百姓則君以自治也養君以自安也事君以自顯也故禮達而分定故人皆愛其死而患其生則當為明人之道身治居安名顯則不苟生也不義而死合義而生是不愛死患生也聖人耐以天下為一家以中國為一人者非意之也必知其情辟於其義明於其利達於其患然後能為之耐古能字傳書世異古字時有存者則亦有今誤矣意心所無慮也辟開也何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟弟夫義婦聽長惠幼順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患極言人事故聖人之所以治人七情修十義講信修睦尚辭讓去爭奪舍禮何以治之唯禮可耳飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舍禮何以哉言人情之難知明禮之重故人者其天地之德隂陽之交鬼神之會五行之秀氣也言人兼此氣性純也故天秉陽垂日星秉猶持也言天持陽氣施生照臨下也地秉隂竅於山川播五行於四時和而后月生也是以三五而盈三五而闕竅孔也言地持隂氣出內於山川以舒五行於四時此氣和乃后月生而上配日若臣功成進爵位也一盈一闕屈伸之義也必三五者播五行於四時也一曰水二曰火三曰木四曰金五曰土合為十五之成數也五行之動迭相竭也五行四時十二月還相為本也五聲六律十二管還相為宫也五味六和十二食還相為質也五色六章十二衣還相為質也竭猶負載也言五行運轉更相為始也五聲宫商角徵羽也其管陽曰律隂曰吕布十二辰始於黃鍾管長九寸下生者三分去一上生者三分益一終于南吕更相為宫凡六十也五味酸苦辛醎甘也和之者春多酸夏多苦秋多辛冬多鹹皆有􅉸甘是謂六和五色六章畫繢事也周禮考工記曰土以黃其象方天時變火以圜山以章水以龍鳥獸蛇雜四時五色之位以章之謂之巧也故人者天地之心也五行之端也食味别聲被色而生者也此言兼氣生之效也故聖人作則必以天地為本以隂陽為端以四時為柄以日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜天地以至於五行其制作所取象也禮義人情其政治也四靈者其徵報也此則春秋始於元終于麟包之矣吕氏説月令而謂春秋事類相近焉量猶分也鬼神謂山川也山川助地通氣之象也器所以操事田人所捊治也禮之位賓主象天地介撰象隂陽四面之位象四時三賓象三光夫婦象日月亦是也以天地為本故物可舉也物天地所養生以隂陽為端故情可睹也情以隂陽通也以四時為柄故事可勸也事以四時成以日星為紀故事可列也事以日與星為候興作有次第月以為量故功有藝也藝猶才也十二月各有分猶人之才各有所長也藝或為倪鬼神以為徒故事可守也山川守職不移五行以為質故事可復也事下竟復由上始也禮義以為器故事行有考也考成也器利則事成人情以為田故人以為奧也奧猶主也田無主則荒四靈以為畜故飲食有由也由用也四靈與羞物為羣先王患禮之不達於下也患下不信也故祭帝於郊所以定天位也祀社於國所以列地利也祖廟所以本仁也山川所以儐鬼神也五祀所以本事也故宗祝在廟三公在朝三老在學王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正此所以達禮於下也教民尊神慎居處也宗宗人也瞽樂人也侑四輔也故禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉言信得其禮則神物與人皆應之百神列宿也百貨金玊之屬故自郊社祖廟山川五祀義之修而禮之藏也修猶飾也藏若其城郭然是故夫禮必本於大一分而為天地轉而為隂陽變而為四時列而為鬼神其降曰命聖人象此下之以為教令其官於天也官猶法也此聖人所以法於天也夫禮必本於天本於大一與天之義動而之地後法地也列而之事後法五祀五祀所以本事也變而從時後法四時協於分藝協合也言禮合於月之分猶人之才也其居人也曰養養當為義字之誤也下之則為教令居人身為義孝經説曰義由人出其行之以貨力辭讓飲食冠昏喪祭射御朝聘貨摯幣庭實也力筋骸強者也不則偃罷故禮義也者人之大端也所以講信修睦而固人之肌膚之會筋骸之束也所以養生送死事鬼神之大端也所以達天道順人情之大竇也竇孔穴也故唯聖人為知禮之不可以已也故壞國喪家亡人必先去其禮言愚者之反聖人也故禮之於人也猶酒之有蘖也君子以厚小人以薄皆得以為美味性善者醇耳故聖王修義之柄禮之序以治人情治者去瑕穢養菁華也故人情者聖王之田也修禮以耕之和其剛柔陳義以種之樹以善道講學以耨之存是去非類也本仁以聚之合其所盛播樂以安之感動使之堅固故禮也者義之實也協諸義而協協合也合禮於義則與義合不乖剌則禮雖先王未之有可以義起也以其合于義可以義起作義者藝之分仁之節也藝猶才也協於藝講於仁得之者強有義則人服之也仁者義之本也順之體也得之者尊有仁則人仰之也故治國不以禮猶無耜而耕也無以入也為禮不本於義猶耕而弗種也無由生也為義而不講之以學猶種而弗耨也苗不殖草不除講之以學而不合之以仁猶耨而弗穫也無以知收之豐荒也合之以仁而不安之以樂猶穫而弗食也不知味之甘苦安之以樂而不達於順猶食而弗肥也功不見也四體既正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣亷官職相序君臣相正國之肥也天子以德為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順大順者所以養生送死事鬼神之常也常謂皆有禮用無匱乏也車或為居故事大積焉而不苑並行而不謬細行而不失深而通茂而有間連而不相及也動而不相害也此順之至也言人皆明於禮無有蓄亂滯合者各得其分理順其職也故明於順然後能守危也能守自危之道也君子居安如危小人居危如安易曰危者安其位故禮之不同也不豐也不殺也所以持情而合危也豐殺謂天子及士名位不同禮亦異數所以拱持其情合安其危故聖王所以順山者不使居川不使渚者居中原而弗敝也小洲曰渚廣平曰原山者利其禽獸渚者利其魚鹽中原利其五穀使各居其所安不易其利勞敝之也民失其業則窮窮則濫用水火金木飲食必時用水謂漁人以時漁為梁春獻鱉蜃秋獻龜魚也用火謂司爟四時變國火以救時疾及季春出火季秋納火也用金謂草人以時取金玊錫石也用木謂山虞仲冬斬陽木仲夏斬隂木飲食謂食齊視春時羹齊視夏時醬齊視秋時飲齊視冬時合男女頒爵位必當年德謂媒氏令男三十而娶女二十而嫁司士稽上任進退其爵祿也用民必順不奪農時故無水旱昆蟲之災民無凶飢妖孽之疾言大順之時隂陽和也昆蟲之災螟螽之屬也故天不愛其道地不愛其寶人不愛其情言嘉瑞出人情至也故天降膏露地出醴泉山出器車河出馬圖鳯凰麒麟皆在郊棷龜龍在宫沼其餘鳥獸之卵胎皆可俯而窺也膏猶甘也器謂若銀甕丹甑也馬圖龍馬負圖而出也棷聚草也沼池也則是無故非有他事使之然也先王能修禮以達義體信以達順故此順之實也實猶誠也盡也並禮運禮器是故大備大備盛德也禮器言禮使人成器如耒耜之為用也人情以為田修禮以耕之此是也大備自耕至于食之而肥禮釋回增美質措則正施則行釋猶去也回邪僻也質猶性也措置也其在人也如竹箭之有筠也如松柏之有心也二者居天下之大端矣故貫四時而不改柯易葉箭篠也端本也四物於天下最得氣之本或柔刃於外或和澤於內用此不變傷也人之得禮亦猶然也故君子有禮則外諧而內無怨人協服也故物無不懷仁鬼神饗德懷歸也先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行言必外內具也禮也者合于天時設於地財順於鬼神合于人心理萬物者也鬼神所祀祀有德也是故天時有生也地理有宜也人官有能也物曲有利也言皆有異故天不生地不養君子不以為禮鬼神弗饗天不生謂非其時物也地不養謂非此地所生居山以魚鱉為禮居澤以鹿豕為禮君子謂之不知禮不順其鄉之所有也故必舉其定國之數以為禮之大經定國之數謂地物所出多少禮之大倫以地廣狹謂貢賦之常差禮之薄厚與年之上下用年之豐凶也是故年雖大殺衆不匡懼則上之制禮也節矣言用之有節也殺謂穀不熟也匡猶恐也禮時為大順次之體次之宜次之稱次之言聖人制禮所先後也堯授舜舜授禹湯放桀武王伐紂時也言受命改制度天地之祭宗廟之事父子之道君臣之義倫也倫之言順也社稷山川之事鬼神之祭體也天地人之别體也喪祭之用賓客之交義也義之言宜也人道之宜羔豚而祭百官皆足大牢而祭不必有餘此之謂稱也足猶得也稱稱牲之大小而為俎此指謂助祭者耳而云百官喻衆也諸侯以龜為寶以圭為瑞家不寶龜不藏圭不臺門言有稱也古者貨貝寶龜大夫以下有貨耳易曰十朋之龜瑞信也諸侯執瑞孤卿以下執摯闍者謂之臺禮有以多為貴者天子七廟諸侯五大夫三士一天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六諸侯七介七牢大夫五介五牢天子之席五重諸侯之席三重大夫再重天子崩七月而葬五重八翣諸侯五月而葬三重六翣大夫三月而葬再重四翣此以多為貴也豆之數謂天子朝食諸侯相食及食大夫公食大夫禮曰宰夫自東房薦豆六設于醬東北食下大而豆六則其餘著矣聘禮致饔餼於上大夫堂上八豆設于户西則凡致饔餼堂上之豆數亦如此周禮公之豆四十其東西夾各十有二侯伯之豆三十有二其東西夾各十子男之豆二十有四其東西夾各六諸侯七介七牢者周之侯伯也大夫五介五牢者侯伯之卿使聘者也周禮上公九介七牢侯伯七介七牢子男五介五牢聘義所云上公七介侯伯五介子男三介乃謂其使者也天子葬五重者謂抗木與茵也葬者抗木在上茵在下士喪禮下篇陳器曰抗木橫三縮二加抗席三加茵用疏布緇剪有幅亦縮二橫三此士之禮一重者以此差之上公四重有以少為貴者天子無介祭天特牲天子適諸侯諸侯膳以犢諸侯相朝灌用鬱鬯無籩豆之薦大夫聘禮以脯醢天子一食諸侯再大夫士三食力無數大路繁纓一就次路繁纓七就圭璋特琥璜爵鬼神之祭單席諸侯視朝大夫特士旅之此以少為貴也天子無介無客禮也灌獻也一食再食三食謂告飽也食力謂工商農也大路繁纓一就殷祭天之車也周禮王之五路王路繁纓十有二就金路九就象路七就革路五就木路翦繁鵠纓圭璋特朝聘以為瑞無幣帛也琥璜爵者天子酬諸侯諸侯相酬以此謂將幣也大夫特士旅之謂君揖之有以大為貴者宫室之量器皿之度棺椁之厚丘封之大此以大為貴也有以小為貴者宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角五獻之尊門外缶門內壺君尊瓦甒此以小為貴也凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散五獻子男之饗禮也壺大一石瓦甒五斗缶大小未聞也易曰尊酒簋二用缶有以高為貴者天子之堂九尺諸侯七尺大夫五尺士三尺天子諸侯臺門此以高為貴也有以下為貴者至敬不壇掃地而祭天子諸侯之尊廢禁大夫士棜禁此以下為貴也廢猶去也棜斯禁也謂之棜者無足有似於棜或因名云耳大夫用斯禁士用棜禁如今方按隋長局足高三寸禮有以文為貴者天子龍衮諸侯黼大夫黻士玄衣纁裳天子之冕朱緑藻十有二旒諸侯九上大夫七下大夫五士三此以文為貴也此祭冕服也朱緑似夏殷禮也周禮天子五采藻有以素為貴者至敬無文父黨無容大圭不琢大羮不和大路素而越席犧尊疏布冪樿杓此以素為貴也大圭長三尺杼上終葵首琢當為篆字之誤也明堂位曰大略殷路也冪或作冪椫木白理也孔子曰禮不可不省也禮不同不豐不殺此之謂也蓋言稱也省察也不同言異也禮之以多為貴者以其外心者也外心用心於外其德在表也德發揚詡萬物詡猶著也遍也大理物博如此則得不以多為貴乎故君子樂其發也發猶見也樂多其外見也禮之以少為貴者以其內心者也內心用心於內其德在內德産之致也精微致致密也觀天下之物無可以稱其德者萬物皆天所生孰可奉薦以稱也如此則得不以少為貴乎是故君子愼其獨也少其牲物致誠慤古之聖人內之為尊外之為樂少之為貴多之為美是故先王之制禮也不可多也不可寡也唯其稱也是故君子大牢而祭謂之禮匹士大牢而祭謂之攘君子謂大夫以上攘盜竊也管仲鏤簋朱紘山節藻棁君子以為濫矣濫亦盜竊也鏤簋謂刻而飾之大夫刻為龜耳諸侯飾以象天子飾以玉朱紘天子冕之紘也諸侯青組紘大夫士當緇組紘纁邊栭謂之節梁上楹謂之棁宮室之飾士首本大夫達稜諸侯斫而礱之天子加密石焉無畫山藻之禮也晏平仲祀其先人豚肩不掩豆浣衣濯冠以朝君子以為隘矣隘猶狹陋也祀不以少牢與無田者同不盈禮也大夫士有田則祭無田則薦浣衣濯冠儉不務新是故君子之行禮也不可不慎也衆之紀也紀散而衆亂言二大夫皆非也紀絲縷之數有紀禮也者猶體也若人身體體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有微大者不可損小者不可益顯者不可掩微者不可大也故經禮三百曲禮三千其致一也致之言至也一謂誠也經禮謂周禮也周禮六篇其官有三百六十曲猶事也事禮謂今禮也禮篇多亡本數未聞其中事儀三千未有入室而不由户者三百三千皆由誠也君子之於禮也有所竭情盡愼致其敬而誠若謂以少小下素為貴也若順也有美而文而誠若謂以多大高文為貴也君子之于禮也有直而行也謂若始死哭踊無節也有曲而殺也謂若父在為母期也有經而等也謂若天子以下至士庶人為父母三年有順而討也討猶去也謂若天子以十二公以九侯伯以七子男以五為節也有摲而播也摲之言芟也謂芟殺有所與也若祭者貴賤皆有所得不使虛也有推而進也謂若王者之後得用天子之禮有放而文也謂若天子之服服日月以至黼黻有放而不致也謂若諸侯自山龍以下有順而托也謂若君沐粱大夫沐稷士沐粱三代之禮一也民共由之或素或青夏造殷因一也俱趨誠也由用也素尚白黑尚青者也言所尚雖異禮則相因耳孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也變白黑言素青者秦二世時趙高欲作亂或以青為黑黑為黃民言從之至今語猶存也周坐尸詔侑武方其禮亦然其道一也言此亦周所因於殷也武當為無聲之誤也方猶常也告尸行節勸尸飲食無常若孝子之為也孝子就養無方詔侑或為詔囿君子曰禮之近人情者非其至者也近人情者褻而逺之者敬郊血大饗腥三獻爓一獻孰郊祭天也大饗祫祭先王也三獻祭社稷五祀一獻祭羣小祀也爓沈肉於湯也血腥爓孰逺近備古今也尊者先逺差降而下至小祀孰而已是故君子之于禮也非作而致其情也作起也敬非已情也所以下彼此有由始也有所法也是故七介以相見也不然則已慤三辭三讓而至不然則已蹙已猶甚也慤蹙願貌大願則辭不見情無由至也故魯人將有事於上帝必先有事於頖宮上帝周所郊祀之帝謂蒼帝靈威仰也魯以周公之故得郊祀上帝與周同先有事於頖宮告后稷也告之者將以配天先仁也頖郊之學也詩所謂頖宮也字或為郊宮晉人將有事於河必先有事於惡池惡當為呼聲之誤也呼池漚夷并州川齊人將有事於泰山必先有事於配林配林林名三月繫七日戒三日宿愼之至也繫繫牲于牢也戒散齋也宿致齋也將有祭祀之事必先敬愼如此不敢切也故禮有擯詔樂有相步溫之至也皆為溫藉重禮有擯詔告道賓主者也相步扶工也詔或為紹禮也者反本修古不忘其初者也故凶事不詔朝事以樂二者反本也哭泣由中非由人也朝廷養賢以樂樂之也醴酒之用玄酒之尚割刀之用鸞刀之貴莞簟之安而稿鞂之設三者三古穗去實曰鞂禹貢百里納鞂服是故先王之制禮也必有主也主謂本與古也故可述而多學也以本與古求之而已君子曰無節於內者觀物弗之察矣節猶驗也欲察物而不由禮弗之得矣故作事不以禮弗之敬矣出言不以禮弗之信矣故曰禮也者物之致也致之言至也極至也祀事於郊敬之至也言就而祭之不敢致也宗廟之祭仁之至也仁恩也父子主恩也喪禮忠之至也謂哭踊袒襲也備服器仁之至也謂小斂大斂之衣服葬之明器賓客之用幣義之至也謂來賻賵故君子欲觀仁義之道禮其本也言禮有節于內可以觀也君子曰甘受和白受采忠信之人可以學禮苟無忠信之人則禮不虛道是以得其人之為貴也道猶由也從也並禮器貧者不以貨財為禮老者不以筋力為禮禮許儉不非無也年五十始杖八十拜君命一坐再至曲禮天下之禮致反始也致鬼神也致和用也致義也致讓也因祭之義泛説禮也致之言至也使人勤行至於此也至于反始謂報天之屬也至于鬼神謂祭宗廟之屬也至于和用謂治民之事以足用也故反始以厚其本也致鬼神以尊上也致物用以立民紀也致義則上下不悖逆矣致讓以去爭也合此五者以治天下之禮也雖有奇邪而不治者則微矣物猶事也變和言物互文也微猶少也祭義恭儉莊敬禮教也禮之失煩其為人也恭儉莊敬而不煩則深於禮者也經解禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圜也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜君子審禮不可誣以姦詐衡稱也縣謂錘也陳設謂彈畫也誠猶審也或作成是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民敬讓之道也故以奉宗廟則敬以入朝廷則貴賤有位以處室家則父子親兄弟和以處鄉里則長幼有序孔子曰安上治民莫善於禮此之謂也隆禮謂盛行禮也方猶道也春秋傳曰教之以義方故朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也喪祭之禮所以明臣子之恩也鄉飲酒之禮所以明長幼之序也昏姻之禮所以明男女之别也夫禮禁亂之所由生猶坊止水之所自來也故以舊坊為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患春見曰朝小聘曰問其篇今亡昏姻謂嫁取也壻曰昏妻曰姻自亦由也故昏姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬬之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣若謂不至不答之屬故禮之教化也微其止邪也於未形使人日徙善逺罪而不自知也是以先王隆之也易曰君子慎始差若毫釐繆以千里此之謂也隆謂尊盛之也始謂其微時也同上哀公問於孔子曰大禮何如君子之言禮何其尊也孔子曰丘也小人不足以知禮謙不答也君曰否吾子言之也孔子曰丘聞之民之所由生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長幼之位也非禮無以别男女父子兄弟之親昏姻疏數之交也君子以此之為尊敬然言君子以此故尊禮然後以其所能教百姓不廢其會節君子以其所能於禮教百姓使其不廢此上事之期節有成事然後治其雕鏤文章黼黻以嗣上事行於民有成功乃後續以治文飾以為尊卑之差其順之然後言其喪算備其鼎俎設其豕臘修其宗廟嵗時以敬祭祀以序宗族即安其居節醜其衣服卑其宮室車不雕幾器不刻鏤食不二味以與民同利昔之君子之行禮者如此言語也算數也即就也醜類也幾附纒之也言君子既尊禮民以為順乃後語以喪祭之禮就安其居處正其衣服教之節儉與之同利者上下俱足也公曰今之君子胡莫之行也孔子曰今之君子好實無厭淫德不倦荒怠敖慢固民是盡午其衆以伐有道求得當欲不以其所昔之用民者由前今之用民者由後今之君子莫為禮也實猶富也淫放也固猶故也午其衆逆其族類也當猶稱也所謂道也由前用上所言由後用下所言哀公問仲尼燕居子張子貢言遊侍縱言至於禮言遊言偃子遊也縱言泛説事子曰居女三人者吾語女禮使女以禮周流無不遍也居女三人者女三人且坐也使之坐凡與尊者言更端則起子貢越席而對曰敢問何如對應也子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁奪猶亂也巧言足恭之人似慈仁實鮮仁特言是者感子貢也子貢辨近於給子曰師爾過而商也不及子産猶衆人之母也能食之不能教也過與不及言敏鈍不同俱違禮也衆人之母言子産慈仁多不矜莊又與子張相反子産當以其乘輿濟冬涉者而車梁不成是慈仁亦違禮子貢越席而對曰敢問將何以為此中者也子曰禮乎禮夫禮所以制中也禮乎禮唯有禮也子貢退言偃進曰敢問禮也者領惡而全好者與子曰然領猶治也好善也然則何如子曰郊社之義所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也射鄉之禮所以仁鄉黨也食饗之禮所以仁賓客也仁猶存也凡存此者所以善全之道也郊社嘗禘饋奠存死之善者也射鄉食饗存生之善者也郊有后稷社有句龍子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎是故以之居處有禮故長幼辨也以之閨門之內有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事間也以之軍旅有禮故武功成也是故宫室得其度量鼎得其象味得其時樂得其節車得其式鬼神得其饗喪紀得其哀辨説得其黨官得其體政事得其施加於身而錯於前凡衆之動得其宜治國指諸掌言易知也郊社嘗禘尊卑之事有治國之象焉辨别也三族父子孫也凡言得者得法於禮也量豆區斗斛也味酸苦之屬也四時有所多及獻所宜也式謂載也所載有尊卑辨禮之説謂禮樂之官教學者黨類也體尊卑異而合同子曰禮者何也即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求于幽室之中非燭何見若無禮則手足無所錯耳目無所加進退揖讓無所制是故以之居處長幼失其别閨門三族失其和朝廷官爵失其序田獵戎事失其策軍旅武功失其制宮室失其度量鼎失其象味失其時樂失其節車失其式鬼神失其饗喪紀失其哀辨説失其黨官失其體政事失其施加於身而錯於前凡衆之動失其宜如此則無以祖洽於衆也凡言失者無禮故也策謀也祖始也洽合也言失禮無以為衆倡始無以合和衆子曰制度在禮文為在禮行之其在人乎文為文章所為子貢越席而對曰敢問夔其窮與見其不達於禮子曰古之人與古之人也達於禮而不達於樂謂之素達於樂而不達於禮謂之偏夫夔達於樂而不達於禮是以傳於此名也古之人也素與偏俱不備耳夔達於樂傳世名此賢人也非不能非所謂窮並仲尼燕居子云小人窮斯約富斯驕約斯盜驕斯亂約猶窮也禮者因人之情而為之節文以為民坊者也故聖人之制富貴也使民富不足以驕貧不至於約貴不慊於上故亂益亡此節文者謂農有田里之差士有爵命之級慊恨不滿之貌也慊或為嫌子云夫禮者所以章疑别微以為民坊者也故貴賤有等衣服有别朝廷有位則民有所讓位朝位也子云觴酒豆肉讓而受惡民猶犯齒祍席之上讓而坐下民猶犯貴朝廷之位讓而就賤民猶犯君犯猶僭也齒年也禮六十以上籩豆有加貴秩異者並坊記子曰夏道尊命事鬼敬神而遠之近人而忠焉先祿而後威先賞而後罰親而不尊逺鬼神近人謂外宗廟內朝廷其民之敝蠢而愚喬而野朴而不文以本不困於刑罰少詐諼也敝謂政教衰失之時也殷人尊神率民以事神先鬼而後禮先罰而後賞尊而不親先鬼後禮謂內宗廟外朝廷也禮者君臣朝會凡以摯交接相施豫其民之敝蕩而不靜勝而無恥以本狀于鬼神虛無之事令其心於蕩無所定困於刑罰苟勝免而無恥也月令曰無作淫巧以蕩上心周人尊禮尚施事鬼敬神而逺之近人而忠焉其賞罰用爵列親而不尊賞罰用爵列以尊卑為差其民之敝利而巧文而不慙賊而蔽以本數交接以言辭尊卑多訟獄子曰夏道未瀆辭不求備不大望於民民未厭其親殷人未瀆禮而求備於民周人強民未瀆神而賞爵刑罰窮矣未瀆辭者謂時王不尚辭民不褻為也不求備不大望言其政寬貢稅輕也強民言承殷難變之敝也賞爵刑罰窮矣言其繁文備設子曰虞夏之道寡怨於民殷周之道不勝其敝勝猶任也言殷周極文民無恥而巧利後世之政難復子曰虞夏之質殷周之文至矣言後有王者其作質文不能易之虞夏之文不勝其質殷周之質不勝其文言勝者相變質文各有所多並表記子張問十世可知也王者易姓受命為一世子張問自此以後十世之事可前知乎子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也馬氏曰所因謂三綱五常所損益謂文質三統愚按三綱謂君為臣綱父為子綱夫為妻綱五常謂仁義禮智信文質謂夏尚質商尚忠周尚文三統謂夏正建寅為人統商正建丑為地統周正建子為天統三綱五常禮之大體三代相繼皆因之而不能變其所損益不過文章制度太過不及之間而其已然之迹今皆可見則自今以往或有繼周而王者雖百世之遠所因所革亦不過此豈但十世而已乎聖人所以知來者蓋如此非若後世纖緯術數之學也明胡氏曰子張之問蓋欲知來而聖人言其既往者以之也夫自修身以至于為天下不可一日而無禮天敘天秩人所共由禮之本也商不能改乎夏周不能改乎商所謂天地之常經也若乃制度文為或太過則當損或不足則當益益之損之與時宜之而所因者不壞是古今之通義也因往推來雖百世之逺不過如此而已矣子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣祀夏之後宋殷之後徴證也文典籍也獻賢也言二代之禮我能言之而二國不足取以為證以其文獻不足故也文獻若足則我能取之以證吾言矣子曰周監於二代郁郁乎文哉吾從周監視也二代夏商也言其視二代之禮而損益之郁郁文盛貌尹氏曰二代之禮至周大備夫子美其文而從之並論語子曰吾説夏禮杞不足徴也吾學殷禮有宋存焉吾學周禮今用之吾從周三代之禮孔子皆嘗學之而能言其意但夏禮既不可考證殷禮雖存又非當世之法惟周禮乃時王之制今日所用孔子既不得位則從周而已中庸林放問禮之本林放魯人見世之為禮者專事繁文而疑其本之不在是也故以為問子曰大哉問孔子以時方逐末而放獨有志於本故大其問蓋得其本則禮之全體無不在其中矣禮與其奢也寧儉喪與其易也寧戚易治也孟子曰易其田疇在喪禮則節文習熟而無哀痛慘怛之實者也戚則一於哀而文不足耳禮貴得中奢易則過于文儉戚則不及而質二者皆未合禮然凡物之理必先有質而後有文則質乃禮之本也范氏曰夫祭與其敬不足而禮有餘也不若禮不足而敬有餘也喪與其哀不足而禮有餘也不若禮不足而哀有餘也禮夫之奢喪失之易皆不能反本而隨其末故也禮奢而備不若儉而不備之愈也喪易而文不若戚而不文之愈也儉者物之質戚者心之誠故曰禮之本楊氏曰禮始諸飲食故汙尊而壞飲為之簠簋籩豆罍爵之飾所以文之也則其本儉而已喪不可以徑情而直行為之衰麻哭踊之數所以節之也則其本戚而已周衰世方以文滅質而林放獨能問禮之本故夫子大之而告之以此子曰能以禮讓為國乎何有不能以禮讓為國如禮何讓者禮之實也何有言不難也言有禮之實以為國則何難之有不然則其禮文雖具亦且無如之何矣而况於為國乎有子曰禮之用和為貴先王之道斯為美小大由之禮者天理之節文人事之儀則也和者從容不迫之意蓋禮之為體雖嚴然皆出於自然之理故其為用必從容而不迫乃為可貴先王之道此其所以為美而小事大事無不由之也有所不行知和而和不以禮節之亦不可行也承上文而言如此而復有所不行者以其徒知和之為貴而一於和不復以禮節之則亦非復禮之本然矣所以流蕩忘返而亦不可行也程子曰禮勝則離故禮之用和為貴先王之道以斯為美而小大由之樂勝則流故有所不行者知和而和不以禮節之亦不可行范氏曰凡禮之體主於敬而其用則以和為貴敬者禮之所以立也和者樂之所由生也若有子可謂達禮樂之本矣愚謂嚴而泰和而節此理之自然禮之全體也毫釐有差則失其中正而各倚於一偏其不可行均矣棘子成曰君子質而已矣何以文為棘子成衛大夫疾時人文勝故為此言子貢曰惜乎夫子之説君子也駟不及舌言子成之言乃君子之意然言出於舌則駟馬不能追之又惜其失言也文猶質也質猶文也虎豹之鞹猶犬羊之鞹鞹皮去毛者也言文質等耳不可相無若必盡去其文而獨存其質則君子小人無以辨矣夫棘子成矯當時之弊固失之過而子貢矯子成之弊又無本本輕重之差胥失之矣並論語子路曰吾聞諸夫子喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也喪主哀祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也祭主敬檀弓曽子曰晏子可謂知禮也已恭敬之有焉言禮者敬而已矣有若曰晏子一狐裘三十年遣車一乘及墓而反國君七個遣車七乘大夫五個遣車五乘晏子焉知禮言其大儉逼下非之及墓而反言其既窆則歸不留賓客有事也人臣賜車馬者乃得有遣車遣車之差大夫五諸侯七則天子九諸侯不以命數喪數略也個謂所包遣奠牲體之數也雜記曰遣車視牢具曽子曰國無道君子恥盈禮焉國奢則示之以儉國儉則示之以禮時齊方奢矯之是也並檀弓冉有問於孔子曰先王制法禮不下庶人曲禮鄭注云為其遽於事且不能備物然則庶人行事不可以治於禮乎孔子曰所謂禮不下庶人者以庶人遽其事而不能充禮故不責之以備禮也家語子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰夫禮天之經也經者道之常地之義也義者利之宜民之行也行者人所履天地之經而民實則之則天之明日月星辰天之明也因地之性高下剛柔地之性也生其六氣謂隂陽風雨晦明用其五行金木水火土氣為五味酸鹹辛甘苦發為五色青黃赤白黑發見也章為五聲宮商角徴羽淫則昏亂民失其性滋味聲色過則傷性是故為禮以奉之制禮以奉其性為六畜馬牛羊雞犬豕五牲麋鹿麏狼兔三犧祭天地宗廟三者謂之犧以奉五味為九文謂山龍華蟲藻火粉米黼黻也華若草華藻水草火畫火粉米若白米黼若斧黻若兩已相戾傳曰火龍黼黻昭其文也六采畫繪之事雜用天地四方之色青與白赤與黑玄與黃皆相次謂之六色五章以奉五色青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五色備謂之繡集此五章以奉成五色之用為九歌八風七音六律以奉五聲解見二十年為君臣上下以則地義君臣有尊卑法則有高下為夫婦外內以經二物夫治外婦治內各有其物為父子兄弟姑姊甥舅昏媾姻亞以象天明六親和睦以事嚴父若衆星之拱辰極也妻父曰昏重昏曰媾壻父曰姻兩壻相謂曰亞為政事庸力行務以從四時在君為政在臣為事民功曰庸治功曰力行其德教務其時要禮之本也為刑罰威獄使民畏忌以類其震曜殺戮雷震電曜天之威也聖人作刑戮以象類之為溫慈惠和以效天之生殖長育民有好惡喜怒哀樂生於六氣此六者皆本隂陽風雨晦明之氣是故審則宜類以制六志為禮以制好惡哀樂喜怒六志使不過節哀有哭泣樂有歌舞喜有施舍怒有戰鬬喜生於好怒生於惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能協於天地之性是以長久協和也簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也經緯錯居以有成者民之所以生也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎曲直以弼其性氏昭公二十五年左傳景公曰吾今而後知禮之可以為國也晏子對曰禮之可以為國也久矣與天地並有天地則禮義興君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針針諫也兄愛而友弟敬而順夫和而義妻柔而正姑慈而從從不自專婦聽而婉婉順也禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所稟於天地以為其民也是以先王上之稟受也六昭二十年左氏傳公如晉自郊勞至於贈賄往有郊勞去有贈賄無失禮揖讓之禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家在大夫不能取也有子家羈弗能用也羈莊公玄孫懿伯也姦大國之盟陵虐小國謂伐莒取鄆利人之難謂往年莒難而取鄆不知其私不自知有私難公室四分民食於他他謂三家也言魯君與民無異思莫在公不圖其終無為公謀終始者為國君難將及身不恤其所禮之本末將於此乎在在恤民與憂國而屑屑焉習儀以亟言以習儀為急言善於禮不亦遠乎君子謂叔孫於是乎知禮時晉侯亦失政叔齊以此諷諫昭五年左氏傳任人有問屋廬子曰禮與食孰重曰禮重任國名屋廬子名連孟子弟子也色與禮孰重任人復問也曰禮重曰以禮食則飢而死不以禮食則得食必以禮乎親迎則不得妻不親迎則得妻必親迎乎屋廬子不能對明日之鄒以告孟子孟子曰於答是也何有何有不難也不揣其本而齊其末方寸之木可使高於岑樓本謂下末謂上方寸之木至卑喻食色岑樓樓之高鋭似山者至高喻禮若不取其下之平而升寸木於岑樓之上則寸木反高岑樓反卑矣金重於羽者豈謂一鉤金與一輿羽之謂哉鉤帶鉤也金本重而帶鉤小故輕喻禮有輕於食色者羽本輕而一輿多故重喻食色有重於禮者取食之重者與禮之輕者而比之奚翅食重取色之重者與禮之輕者而比之奚翅色重禮食親迎禮之輕者也飢而死以滅其性不得妻而廢人倫食色之重者也奚翅猶言何但言其相去懸絶不但有輕重之差而已往應之曰紾兄之臂而奪之食則得食不紾則不得食則將紾之乎踰東家牆而摟其處子則得妻不摟則不得妻則將摟之乎紾戾也摟牽也處子處女也此二者禮與食色皆其重者而以之相較則禮為尤重也此章言義理事物其輕重固有大分然於其中又各自有輕重之别聖賢於此錯綜斟酌毫髮不差固不肯枉尺而直尋亦未嘗膠柱而調瑟所以斷之一視於禮之當然而已矣孟子禮起於何也曰人生而有欲欲而不得則不能無求忿而無度量分界則不能不爭爭則亂先王惡其亂故制禮義以分之以養人之欲給人之求使欲必不窮乎物物必不屈乎欲兩者相持而長是禮之所起也故禮者養也芻豢稻粱五味調香所以養口也椒蘭芬苾所以養鼻也雕琢刻鏤黼黻文章所以養目也鐘鼓管絃琴瑟竽笙所以養耳也疏房檖貌越席牀笫几筵所以養體也故禮者養也君子既得其養又好其别曷謂别曰貴賤有等長幼有差貧富輕重皆有稱者也故天子大路越席所以養體也側載睪芷所以養鼻也前有錯衡所以養目也和鸞之聲步中武象驟中韶濩所以養耳也龍旗九旒所以養信也寢兕持虎鮫絲末彌龍所以養威也故大路之馬必倍至教順然後乘之所以養安也熟知夫出死要節之所以養生也熟知夫出費用之所養養財也熟知夫恭敬辭讓之所以養安也熟知夫禮義文理之所以養情也故人苟生之為見若者必死苟利之為見若者必害苟怠惰偷懦之為安若者必危苟情説之為樂若者必滅故人一之於禮義則兩得之矣一之於情性則兩喪之矣故儒者將使人兩得之者也墨者將使人兩喪之者也是儒墨之分也禮有三本天地者生之本也先祖者類之本也君師者治之本也無天地惡生無先祖惡出無君師惡治三者偏亡焉無安人故禮上事天下事地尊先祖而隆君師是禮之三本也故王者天太祖諸侯不敢壞大夫士有常宗所以别貴始貴始得之本也郊止乎天子而社至于諸侯道及士大夫所以别尊者事尊卑者事卑宜大者巨宜小者小故有天下者事十世有一國者事五世有五乘之地者事三世有三乘之地者事二世持手而食者不得立宗廟所以表積厚積厚者流澤廣積薄者流澤狹也大饗尚玄尊俎腥魚先大羹貴食飲之本也饗尚玄尊而用酒醴先黍稷而飯稻粱祭齊大羮而飽庶羞貴本而親用也貴本之謂文親用之謂理兩者合而成文以歸太一夫是謂大隆故尊之尚玄酒也俎之尚腥魚也豆之先大羮也一也利爵之不醮也成事之俎不嘗也三臭之不食也大昏之未發齊也大廟之未入尸也始卒之未小斂也一也大路之素未集也郊之麻絻也喪服之先散麻也一也三年之喪哭之不文也清廟之歌一唱而三歎也縣一鍾尚拊之膈朱弦而通越也一也凡禮始乎脫成乎文終乎悅故至備情文俱盡其次情文代勝其下復情以歸大一也天地以合日月以明四時以序星辰以行江河以流萬物以昌好惡以節喜怒以當以為下則順以為上則明萬物變而不亂二之則喪也禮豈不至矣哉立隆以為極而天下莫之能損益也本末相順終始相應至文以有别至察以有説天下從之者治不從者亂從之者安不從者危小人不能測也禮之理誠深矣堅白同異之察入焉而溺其理誠大矣擅作典制僻陋之説入焉而喪其貌誠高矣暴慢恣睢輕俗之屬入焉而隊故繩墨誠陳矣則不可欺以曲直衡誠縣矣則不可欺以輕重規矩誠施矣則不可欺以方圓君子審於禮則不可欺以詐偽故繩者直之至也衡者平之至規矩者方圓之至禮者人道之極也然而不法禮不足禮謂之無方之民法禮足禮謂之有方之士禮之中焉能思索謂之能慮禮之中焉能勿易謂之能固能慮能固加好者焉斯聖人矣故天者高之極也地者下之極也無窮者廣之極也聖人者道之極也禮者以財物為用以貴賤為文以多少為異以隆殺為要文理繁情用省是禮之隆也文理省情用繁是禮之殺也文理情欲相為內外表裏並行而雜是禮之中流也故君子上致其隆下盡其殺而中處其中步驟馳騁厲騖不外是矣是君子之壇宇宫庭也人有是士君子也外是民也於是其中也方皇周挾曲得其次序是聖人也故厚者禮之積也大者禮之廣也高者禮之隆也明者禮之盡也並荀子禮論大史公曰洋洋美德乎宰制萬物役使羣衆豈人力也哉余至大行禮官觀三代損益乃知緣人情而制禮依人性而作儀其所由來尚矣人道經緯萬端規矩無所不貫誘進以仁義束縛以刑罰故德厚者位尊祿重者寵榮所以總一海內而整齊萬民也人體安駕乘為之金輿錯衡以繁其飾目好五色為之黼黻文章以表其能耳樂鐘磬為之調諧八音以蕩其心口甘五味為之庶羞酸鹹以致其美情好珍善為之琢磨圭璧以通其意故大路越席皮辨布裳朱絃洞達大羮玄酒所以防其淫侈救其雕敝是以君臣朝廷尊卑貴賤之序下及黎庶車輿衣服宫室飲食嫁娶喪祭之分事有適宜物有節文史記禮書禮書綱目卷七十四
