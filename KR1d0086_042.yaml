body:
  text: 禮書綱目卷四十婺源江永撰少牢饋食禮上吉禮七經鄭目録云諸侯之卿大夫祭其祖禰於廟之禮於五禮屬吉禮少牢饋食之禮禮將祭祀必先擇牲繫于牢而芻之羊豕曰少牢諸侯之卿大夫祭宗廟之牲右篇目記大夫三廟一昭一穆與大祖之廟而三大祖别子始爵者大傳曰别子為祖謂此雖非别子始爵者亦然王制大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉為壇祭之去壇為鬼大夫祖考謂别子也廟祭法詳見宗篇大夫不敢祖諸侯郊特牲大夫有大事省于其君干祫及其高祖詳天子諸侯廟享篇大夫以索牛索求得而用之則疏曰天子大夫也若諸侯大夫用少牢曲禮大夫士宗廟之祭有田則祭無田則薦詳見祭物犧牲章父為士子為大夫葬以士祭以大夫中庸曽子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家祝曰孝子某為介子某薦其常事若宗子有罪居於他國庶子為大夫其祭也祝曰孝子某使介子某執其常事攝主不厭祭不旅不假不綏祭不配布奠于賓賓奠而不舉不歸肉其辭于賓曰宗兄宗弟宗子在他國使某辭詳見祭法篇日用丁巳内事用柔日必丁巳者取其令名自丁寧自變改皆為謹敬必先諏此日明日乃筮筮旬有一日旬十日也以先月下旬之已筮來月上旬之已筮於廟門之外主人朝服西面於門東史朝服左執筮右抽上韇兼與筮執之東面受命於主人史家臣主筮事者主人曰孝孫某來日丁亥用薦嵗事于皇祖伯某以某妃配某氏尚饗丁未必亥也直舉一日以言之耳禘于大廟禮曰不得丁亥則己亥辛亥亦用之無則苟有亥焉者可也薦進也進嵗時之祭事也皇君也伯某其字也大夫或因字為諡春秋傳曰魯無駭卒請諡與族公命之以字為展氏是也其仲叔季亦曰仲某叔某季某也某妃某妻也合食曰配某氏若言姜氏子氏也尚庶幾饗歆也史曰諾西面于門西抽下韇左執筮右兼執韇以擊筮將問吉凶焉故擊之以動其神易曰蓍之徳圓而神遂述命曰假爾大筮有常孝孫某來日丁亥用薦嵗事于皇祖伯某以某妃配某氏尚饗述循也重以主人辭告筮也假借也言因蓍之靈以問之常吉凶之占繇乃釋韇立筮卿大夫之蓍長五尺立筮由便卦者在左坐卦以木卒筮乃書卦于木示主人乃退占卦者史之屬也卦以木者每一爻畫地以識之六爻備書於板史受以示主人退占東面旅占之吉則史韇筮史兼執筮與卦以告于主人占曰従従者求吉得吉之言乃官戒宗人命滌宰命為酒乃退官戒戒諸官也當共祭祀事者使之具其物且齊也滌溉濯祭器埽除宗廟若不吉則及逺日又筮日如初及至也逺日後丁若後已右筮日宿宿讀為肅進也大夫尊儀益多筮日既戒諸官以齊戒矣至祭前之日又戒以進之使知祭日當來古文宿皆作羞前宿一日宿戒尸皆肅諸官之日又先肅尸者重所用為尸者又為將筮明日朝筮尸如筮日之禮命曰孝孫某來日丁亥用薦嵗事于皇祖伯某以某妃配某氏以某之某為尸尚饗筮卦占如初某之某者字尸父而名尸也字尸父尊鬼神也不前期三日筮尸者大夫下人君祭之朝乃視濯與士異吉則乃遂宿尸祝擯筮尸又遂肅尸重尸也既肅尸乃肅諸官及執事者祝為擯者尸神象主人再拜稽首祝告曰孝孫某來日丁亥用薦嵗事于皇祖伯某以某妃配某氏敢宿告以主人為此事來尸拜許諾主人又再拜稽首主人退尸送揖不拜尸不拜者尸尊若不吉則遂改筮尸即改筮之不及逺日右筮尸宿尸及宿諸官既宿尸反為期于廟門之外為期肅諸官而皆至定祭早晏之期為期亦夕時也言既肅尸反為期明大夫尊肅尸而已其為賓及執事者使人肅之主人門東南面宗人朝服北面曰請祭期主人曰比於子比次早晏在於子也主人不西面者大夫尊於諸官有君道也為期亦唯尸不來也宗人曰旦明行事主人曰諾乃退旦明旦日質明右為期明日主人朝服即位于廟門之外東方南面宰宗人西面北上牲北首東上司馬刲羊司士擊豕宗人告備乃退刲擊皆謂殺之此實既省告備乃殺之文互者省文也尚書傳羊屬火豕屬水雍人摡鼎匕俎于雍爨雍爨在門東南面北上雍人掌割烹之事者爨竈也在門東南統於主人北上羊豕魚腊皆有竈竈西有鑊凡摡者皆陳之而後告絜廩人摡甑甗匕與敦于廩爨廩爨在雍爨之北廩人掌米入之藏者甗如甑一孔匕所以匕黍稷者也古文甑為烝司宫摡豆籩勺爵觚觶几洗篚于東堂下勺爵觚觶實于篚卒摡饌豆籩與篚于房中放于西方設洗于阼階東南當東榮放猶依也大夫攝官司宫兼掌祭器也右視殺視濯羮定雍人陳鼎五三鼎在羊鑊之西二鼎在豕鑊之西魚腊従羊膚従豕統於牲司馬升羊右胖髀不升肩臂臑膊骼正脊一脡脊一横脊一短脅一正脅一代脅一皆二骨以並腸三胃三舉肺一祭肺三實于一鼎升猶上也上右胖周所貴也髀不升近竅賤也肩臂臑肱骨膊骼股骨脊従前為正脅旁中為正脊先前脅先後屈而反猶器之䋫也並併也脊脅骨多六體各取二骨併之以多為貴舉肺一尸食所先舉也祭肺三為尸主人主婦古文胖皆作辯髀皆作脾今文並皆為併司士升豕右胖髀不升肩臂臑膊骼正脊一脡脊一横脊一短脅一正脅一代脅一皆二骨以並舉肺一祭肺三實于一鼎豕無腸胃君子不食溷腴雍人倫膚九實于一鼎倫擇也膚革肉擇之取美者司士又升魚腊魚十有五而鼎腊一純而鼎腊用麋司士又升副倅者合升左右胖曰純純猶全也卒脀皆設扃鼏乃舉陳鼎于廟門之外東方北面北上北面北上鄉内相隨古文鼏皆為密司宫尊兩甒于房户之間同棜皆有幂甒有𤣥酒房户之間房西室户東也棜無足禁者酒戒也大夫去足改名優尊者若不為之戒然古文甒皆作廡今文幂作鼏司宫設罍水于洗東有枓設篚于洗西南肆枓㪺水器也凡設水用罍沃水用枓禮在此也改饌豆籩于房中南面如饋之設實豆籩之實改更也為實之更之威儀多也如饋之設如其陳之左右也饋設東面小祝設槃匜與簞巾于西階東為尸將盥右陳設主人朝服即位于阼階東西面為將祭也司宫筵于奥祝設几于筵上右之布陳神坐也室中西南隅謂之奥席東面近南為右主人出迎鼎除鼏士盥舉鼎主人先入道之也主人不盥不舉司宫取二勺于篚洗之兼執以升乃啟二尊之蓋幂奠于棜上加二勺于尊覆之南柄二尊兩甒也鼎序入雍正執一匕以従雍府執四匕以従司士合執二俎以従司士贊者二人皆合執二俎以相従入相助陳鼎于東方當序南于洗西皆西面北上膚為下匕皆加于鼎東枋膚為下以其加也南于洗西陳於洗西南俎皆設于鼎西西肆肵俎在羊俎之北亦西肆肵俎在北將先載也異其設文不當鼎宗人遣賓就主人皆盥于洗長朼長朼者長賓先次賓後也主人不朼言就主人者明親臨之古文朼作匕佐食上利升牢心舌載于肵俎心皆安下切上午割勿沒其載于肵俎末在上舌皆切本末亦午割勿沒其載于肵横之皆如初為之于爨也牢羊豕也安平也平割其下於載便也凡割本末食必正也午割使可絶勿沒為其分散也肵之為言敬也所以敬尸也周禮祭尚肺事尸尚心舌心舌知滋味今文切皆為刌佐食遷肵俎于阼階西西縮乃反佐食二人上利升羊載右胖髀不升肩臂臑膊骼正脊一脡脊一横脊一短脅一正脅一代脅一皆二骨以並腸三胃三長皆及俎拒舉肺一長終肺祭肺三皆切肩臂臑膊骼在兩端脊脅肺肩在上升之以尊卑載之以體次各有宜也拒讀為介距之距俎距脛中當横節也凡牲體之數及載備於此下利升豕其載如羊無腸胃體其載于俎皆進下進下變於食生也所以交於神明不敢以食道敬之至也鄉飲酒禮進腠羊次其體豕言進下互相見司士三人升魚腊膚魚用鮒十有五而俎縮載右首進膄右首進膄亦變於食生也有司載魚横之少儀曰羞濡魚者進尾腊一純而俎亦進下肩在上如羊豕凡腊之體載禮在此膚九而俎亦横載革順列載於俎令其皮相順亦者亦其骨體卒脀祝盥于洗升自西階主人盥升自阼階祝先入南面主人従户内西面將納祭也主婦被錫衣侈袂薦自東房韭菹醓醢坐奠于筵前主婦贊者一人亦被錫衣侈袂執葵菹蠃醢以授主婦主婦不興遂受陪設于東韭菹在南葵菹在北主婦興入于房被錫讀為髲鬄古者或剔賤者刑者之髮以被婦人之紒為飾因名髲鬄焉此周禮所謂次也不纚笄者大夫妻尊亦衣綃衣而侈其袂耳侈者蓋半士妻之袂以益之衣三尺三寸袪尺八寸韭菹醓醢朝事之豆也而饋食用之豐大夫禮葵菹在䋫今文鬄為緆蠃為蝸佐食上利執羊俎下利執豕俎司士三人執魚腊膚俎序升自西階相従入設俎羊在豆東豕亞其北魚在羊東腊在豕東特膚當俎北端相助也主婦自東房執一金敦黍有蓋坐設于羊俎之南婦贊者執敦稷以授主婦主婦興受坐設于魚俎南又興受贊者敦黍坐設于稷南又興受贊者敦稷坐設于黍南敦皆南首主婦興入于房敦有首者尊者器飾也飾蓋象龜周之禮飾器各以其類龜有上下甲今文曰主婦入于房祝酌奠遂命佐食啟㑹佐食啟㑹蓋二以重設于敦南酌奠酌酒為神奠之後酌者酒尊要成也特牲饋食禮曰祝洗酌奠奠于鉶南重累之主人西面祝在左主人再拜稽首祝祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦嵗事于皇祖伯某以某妃配某氏尚饗主人又再拜稽首羊曰柔毛豕曰剛鬛嘉薦菹醢也普淖黍稷也普大也淖和也徳能大和乃有黍稷春秋傳曰奉盛以告曰絜粢豐盛謂其三時不害而民和年豐也右舉鼎載俎設陰厭祝出迎尸于廟門之外主人降立于阼階東西面祝先入門右尸入門左主人不出迎尸伸尊也特牲饋食禮曰尸入主人及賓皆辟位出亦如之祝入門右者辟尸盥也既則後尸宗人奉槃東面于庭南一宗人奉匜水西面于槃東一宗人奉簞巾南面于槃北乃沃尸盥于槃上卒盥坐奠簞取巾興振之三以授尸巾庭南没霤祝延尸尸升自西階入祝従由後詔相之曰延延進也周禮曰大祝相尸禮祝従従尸升自西階主人升自阼階祝先入主人従祝接神先入宜也尸升筵祝主人西面立于户内祝在左主人由祝後而居右尊也祝従尸尸即席乃卻居主人左祝主人皆拜妥尸尸不言尸答拜遂坐拜妥尸拜之使安坐也尸自此答拜遂坐而卒食其間有不啐奠不嘗鉶不告旨大夫之禮尸彌尊也不告旨者為初亦不饗所謂曲而殺祝反南面未有事也墮祭爾敦官各肅其職不命尸取韭菹辯㨎于三豆祭于豆間上佐食取黍稷于四敦下佐食取牢一切肺于俎以授上佐食上佐食兼與黍以授尸尸同受祭于豆祭牢羊豕也同合也合祭於菹豆之祭也黍稷之祭為墮祭將食神餘尊之而祭之今文辯為徧上佐食舉尸牢肺正脊以授尸上佐食爾上敦黍于筵上右之爾近也或曰移也右之便尸食也重言上佐食明更起不相因主人羞肵俎升自阼階置于膚北羞進也肵敬也親進之主人敬尸之加上佐食羞兩鉶取一羊鉶于房中坐設于韭菹之南下佐食又取一豕鉶于房中以従上佐食受坐設于羊鉶之南皆芼皆有柶尸扱以柶祭羊鉶遂以祭豕鉶嘗羊鉶芼菜也羊用苦豕用薇皆有滑食舉舉牢肺正脊也先飲㗖之以為道也三飯食以黍上佐食舉尸牢幹尸受振祭嚌之佐食受加于肵幹正脅也古文幹為肝上佐食羞胾兩瓦豆有醢亦用瓦豆設于薦豆之北設于薦豆之北以其加也四豆亦䋫羊胾在南豕胾在北無臐膮者尚牲不尚味尸又食食胾上佐食舉尸一魚尸受振祭嚌之佐食受加于肵横之又復也或言食或言飯食大名小數曰飯魚横之者異於肉又食上佐食舉尸腊肩尸受振祭嚌之上佐食受加于肵腊魚皆一舉者少牢二牲略之腊必舉肩以肩為終也别舉魚腊崇威儀又食上佐食舉尸牢骼如初如舉幹也又食不舉者卿大夫之禮不過五舉須侑尸尸告飽祝西面于主人之南獨侑不拜侑曰皇尸未實侑侑勸也祝獨勸者更則尸飽實猶飽也祝既侑復反南面尸又食上佐食舉尸牢肩尸受振祭嚌之佐食受加于肵四舉牢體始於正脊終于肩尊於終始尸不飯告飽祝西面于主人之南祝當贊主人辭主人不言拜侑祝言而不拜主人不言而拜親疏之宜尸又三飯為祝一飯為主人三飯尊卑之差凡十一飯下人君也上佐食受尸牢肺正脊加于肵言受者尸授之也尸授牢幹而實舉于菹豆食畢操以授佐食焉右迎尸正祭主人降洗爵升北面酌酒乃酳尸尸拜受主人拜送酳猶羡也既食之而又飲之所以樂之古文酳作酌尸祭酒啐酒賓長羞牢肝用俎縮執俎肝亦縮進末鹽在右羞進也縮従也鹽在肝右便尸㨎之古文縮為蹙尸左執爵右兼取肝㨎于俎鹽振祭嚌之加于菹豆卒爵主人拜祝受尸爵尸答拜兼兼羊豕右主人酳尸祝酌授尸尸醋主人主人拜受爵尸答拜主人西面奠爵又拜主人受酢酒俠爵拜彌尊尸上佐食取四敦黍稷下佐食取牢一切肺以授上佐食上佐食以綏祭綏或為挼挼讀為墮將受嘏亦尊尸餘而祭之古文墮為肵主人左執爵右受佐食坐祭之又祭酒不興遂啐酒右受佐食右手受墮於佐食也至此言坐祭之者明尸與主人為禮也尸恒坐有事則起主人恒立有事則坐祝與二佐食皆出盥于洗入二佐食各取黍于一敦上佐食兼受摶之以授尸尸執以命祝命祝以嘏辭卒命祝祝受以東北面于户西以嘏于主人曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受禄于天宜稼于田眉夀萬年勿替引之嘏大也予主人以大福工官也承猶傳也來讀曰釐釐賜也耕種曰稼勿猶無也替廢也引長也言無廢止時長如是也古文嘏為格祿為福睂為微替為袂袂或為臷臷替聲相近主人坐奠爵興再拜稽首興受黍坐振祭嚌之詩懷之實于左袂挂于季指執爵以興坐卒爵執爵以興坐奠爵拜尸答拜執爵以興出宰夫以籩受嗇黍主人嘗之納諸内詩猶承也實于左袂便右手也季猶小也出出戸也宰夫掌飲食之事者收斂曰嗇明豐年乃有黍稷也復嘗之者重之至也納猶入也古文挂作卦右尸醋主人命祝嘏主人獻祝設席南面祝拜于席上坐受室中迫狹主人西面答拜不言拜送下尸薦兩豆菹醢葵菹蠃醢佐食設俎牢髀横脊一短脅一腸一胃一膚三魚一横之腊兩髀屬于尻皆升下體祝賤也魚横者四物共俎殊之也腊兩髀屬于尻尤賤不殊祝取菹㨎于醢祭于豆間祝祭俎大夫祝俎無肺祭用膚逺下尸不嚌之膚不盛祭酒啐酒肝牢従祝取肝㨎于鹽振祭嚌之不興加于俎卒爵興亦如佐食授爵乃興不拜既爵大夫祝賤也主人酌獻上佐食上佐食戸内牖東北面拜坐受爵主人西面答拜佐食祭酒卒爵拜坐授爵興不啐而卒爵者大夫之佐食賤禮略俎設于兩階之間其俎折一膚佐食不得成禮于室中折者擇取牢正體餘骨折分用之有脀而無薦亦逺下尸主人又獻下佐食亦如之其脀亦設于階間西上亦折一膚上佐食既獻則出就其俎特牲記曰佐食無事則中庭北面謂此時右主人獻祝佐食有司贊者取爵于篚以升授主婦贊者于房中男女不相因特牲饋食禮曰佐食卒角主人受角降反于篚婦贊者受以授主婦主婦洗于房中出酌入户西面拜獻尸入户西面拜由便也不北面者辟人君夫人也拜而後獻者當俠拜也昏禮曰婦洗在北堂直室東隅尸拜受主婦主人之北西面拜送爵拜於主人之北西面婦人位在内此拜於北則上拜於南矣由便也尸祭酒卒爵主婦拜祝受尸爵尸答拜易爵洗酌授尸祝出易爵男女不同爵主婦拜受爵尸答拜上佐食綏祭主婦西面于主人之北受祭祭之其綏祭如主人之禮不嘏卒爵拜尸答拜不嘏夫婦一體綏亦當為挼古文為肵主婦以爵出贊者受易爵于篚以授主婦于房中贊者有司贊者也易爵亦以授婦贊者婦贊者受房户外入授主婦主婦洗酌獻祝祝拜坐受爵主婦答拜於主人之北卒爵不興坐授主婦不俠拜下尸也今文曰祝拜受主婦受酌獻上佐食于户内佐食北面拜坐受爵主婦西面答拜祭酒卒爵坐授主婦主婦獻下佐食亦如之主婦受爵以入于房不言拜於主人之北可知也爵奠於内篚右主婦亞獻賓長洗爵獻于尸尸拜受爵賓户西北面拜送爵尸祭酒卒爵賓拜祝受尸爵尸答拜祝酌授尸賓拜受爵尸拜送爵賓坐奠爵遂拜執爵以興坐祭遂飲卒爵執爵以興坐奠爵拜尸答拜賓酌獻祝祝拜坐受爵賓北面答拜祝祭酒啐酒奠爵于其筵前啐酒而不卒爵祭事畢示醉也不獻佐食將儐尸禮殺右賓長三獻主人出立于阼階上西面祝出立于西階上東面祝告曰利成利猶養也成畢也孝子之養禮畢祝入尸謖主人降立于阼階東西面謖起也謖或作休祝先尸從遂出于廟門事尸之禮訖於廟門外右告利成尸出廟祝反復位于室中主人亦入于室復位祝命佐食徹肵俎降設于堂下阼階南徹肵俎不出門將儐尸也肵俎將以儐尸者其本為不反魚肉耳不云尸俎未歸尸司宫設對席乃四人𧃊大夫禮四人餕明恵大也上佐食盥升下佐食對之賓長二人備備四人餕也三餕亦盥升司士進一敦黍于上佐食又進一敦黍于下佐食皆右之于席上右之者東面在南西面在北資黍于羊俎兩端兩下是餕資猶減也減置于羊俎兩端則一賓長在上佐食之北一賓長在下佐食之南今文資作齎司士乃辯舉𧃊者皆祭黍祭舉舉舉膚今文辯為徧主人西面三拜𧃊者𧃊者奠舉于俎皆答拜皆反取舉三拜旅之示徧也言反者拜時或去其席在東而席者東面拜在西面席者皆南面拜司士進一鉶于上𧃊又進一鉶于次𧃊又進二豆湇于兩下乃皆食食舉湇肉汁也卒食主人洗一爵升酌以授上𧃊贊者洗三爵酌主人受于户内以授次𧃊若是以辯皆不拜受爵主人西面三拜𧃊者𧃊者奠爵皆答拜皆祭酒卒爵奠爵皆拜主人答一拜不拜受爵者大夫餕者賤也答一拜略也古文一為壹也𧃊者三人興出出降實爵于篚反賓位上𧃊止主人受上𧃊爵酌以醋于户内西面坐奠爵拜上𧃊答拜坐祭酒啐酒主人自酢者上𧃊獨止當尸位尊不酌也上𧃊親嘏曰主人受祭之福胡夀保建家室親嘏不使祝授之亦以黍主人興坐奠爵拜執爵以興坐卒爵拜上𧃊答拜上𧃊興出主人送乃退送佐食不拜賤右徹肵俎行𧃊禮書綱目卷四十
