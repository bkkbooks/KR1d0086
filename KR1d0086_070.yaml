body:
  text: 禮書綱目卷六十八婺源江永撰教太子通禮十九補帝曰夔命汝典樂教胄子詳見學制古者王子年八歲而出就外舍學小藝焉履小節焉束髮而就大學學大藝焉履大節焉小學謂虎闈師保之學也大學王宫之東者束髮謂成童白虎通曰八歲入小學十五入大學是也此太子之禮尚書大傳曰公卿之太子大夫元士嫡子年十三始入小學見小節而踐小義年二十入大學見大節而踐大義此王子入學之期也又曰十五年入小學十八入大學者謂諸子姓既成者至十五入小學其早成者十八入大學內則曰十年出就外傅居宿於外學書計者謂公卿以下教子於家也朱子曰虎闈見周禮師氏居虎門之左教國子弟保氏掌養國子守王闈一作庠門者非是又按姓孫也或恐當作性既或恐當作晚居則習禮文行則鳴佩玉升車則聞和鸞之聲是以非僻之心無自入也大戴禮天子設四學當入學而太子齒四學謂周四郊之虞庠也文王世子曰行一物而三善皆得者唯世子而已其齒於學之謂也祭義凡學世子及學士必時詳見學制凡三王教世子必以禮樂樂所以修內也禮所以修外也禮樂交錯於中發形於外是故其成也懌恭敬而溫文中心中也懌悅懌立大傅少傅以養之欲其知父子君臣之道也養猶教也言養者漬浸成長之大傅審父子君臣之道以示之謂為之行其禮少傅奉世子以觀大傅之德行而審喻之為説其義大傅在前少傅在後謂其在學時入則有保出則有師謂燕居出入時是以教諭而德成也以有四人維持之師也者教之以事而喻諸德者也保也者慎其身以輔翼之而歸諸道者也慎其身者謹安護之記曰虞夏商周有師保有疑丞記所云謂天子也取以成説設四輔及三公不必備唯其人語使能也語言也得能則用之無則已不必備其官也小人處其位不如且闕君子曰德德成而教尊教尊而官正官正而國治君之謂也文王世子周文王使太公望傅太子發嗜鮑魚而太公弗與曰禮鮑魚不登於俎豈有非禮而可以養太子哉賈誼新書成王幼不能涖阼涖視也不能視阼階行人君之事周公相踐阼而治踐履也代成王履阼階攝王位治天下也抗世子法於伯禽欲令成王之知父子君臣長幼之道也抗猶舉也謂舉以世子之法使與成王居而學之成王有過則撻伯禽所以示成王世子之道也以成王之過擊伯禽則足以感喻焉文王世子仲尼曰昔者周公攝政踐阼而治抗世子法於伯禽所以善成王也聞之曰為人臣者殺其身有益於君則為之況于其身以善其君乎周公優為之聞之者聞之於古也于讀為迂迂猶廣也大也是故知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人成王幼不能涖阼以為世子則無為也以為世子若為世子時是故抗世子法於伯禽使之與成王居亦學此禮於成王側欲令成王之知父子君臣長幼之義也君之於世子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是故養世子不可不慎也處君父之位覽海內之上而近不能教其子則其餘不足觀矣行一物而三善皆得者唯世子而已其齒於學之謂也物猶事也故世子齒於學國人觀之曰將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰將君我而與我齒讓何也曰有君在則禮然然而衆著於君臣之義也其三曰將君我而與我齒讓何也曰長長也然而衆知長幼之節矣故父在斯為子君在斯謂之臣居子與臣之節所以尊君親親也故學之為父子焉學之為君臣焉學之為長幼焉學教父子君臣長幼之道得而國治語曰樂正司業父師司成一有元良萬國以貞世子之謂也司主也一一人也元大也良善也貞正也同上賈誼曰古之王者太子乃生固舉以禮大戴禮保傅篇乃作乃後同以作之鄭曰古即殷周時也使士負之鄭曰卜其吉也有司齊肅端冕見之南郊見于天也大戴齊肅作參夙興鄭曰參職謂三月朝也朱子曰參乃齊字之誤其下當脫一字而注文職字亦誤過闕則下鄭曰敬君典法之處過廟則趨鄭曰徑闕故下望廟則趨孝子之道也故自為赤子而教固己行矣大戴而作時已作以髮顔曰赤子言其新生未有眉其色赤昔者成王幼在襁褓之中召公為太保周公為太傅太公為太師保保其身體鄭曰保謂安守之顔曰保安也傅傅之德義大戴之作其曰鄭曰傅猶敷也顔傅輔也師導之教訓大戴訓作順傅鄭曰師傅之教大同也師上於訓道即受而述之書敘曰周公為師召公為保相成王為左右也此三公之職也鄭曰今尚書説三公司馬司徒司空也尚書及周禮説古文與此同故先儒論者多依此為説也於是為置三少皆上大夫也鄭曰卿也謂之孤也曰少保少傅少師是與太子宴者也鄭曰記者因成王幼稚周公居攝又以王少漸聖賢之訓長終封禪之美故據其成事同於太子而始末敘之取明殷周之隆師友為先也顔曰宴謂安居故乃孩提有識三公三少固明孝仁禮義以導習之大戴無乃有識三字之下有也字顔曰孩小兒也提謂提撕之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道德者以衛翼之使與太子居處出入大戴皆作比下下無之字博聞作間博衛作輔使下有之字故太子乃生而見正事聞正言行正道大戴無生而二字有目字左右前後皆正人也大戴左右下皆有視字人下無也字夫習與正人居之不能毋正猶生長於齊不能不齊言也大戴居下無之字毋作不正下有也字習與不正人居之不能毋不正猶生長於楚不能不楚言也故擇其所耆必先受業乃得嘗之擇其所樂必先有習乃得為之鄭曰恐其懈惰故以所味好而誘之孔子曰少成若天性大戴無天字習貫如自然大戴如自然作之為常下又有此殷周之所以長有常道也十一字也鄭曰言人性本或有所不能少教成之若天性自然周書曰習之為常自血氣始顔曰貫亦習也及太子少長知妃色顔曰妃色妃匹之色則入于學大戴作小學又引學禮一假今見學制篇及太子既冠成人免於保傅之嚴則有記過之史大戴記作司記顔曰有過則徹膳之宰大戴有有字徹下有虧字宰下云太子有過史必書之史之義不得不書過不書過則死過書而宰徹去膳夫膳宰之義不得不徹膳不徹膳則死進善之旌大戴旌作旍立鄭曰堯置之令進善者於旍下也誹謗之木鄭曰堯設之使書政之愆失也敢諫之鼓鄭曰舜置之使諫者擊之以自聞也瞽史誦詩顔曰瞽無目者也工誦針諫大戴針作正隨鄭曰工樂人也瞽官長誦謂其過誦詩以諷大夫進謀大戴無此四字士傳民語習與智長故切而不愧大戴愧作攘切鄭曰量知受業故雖勞能授也漢書作愧顔曰每被磋故無大過可耻愧之事朱子曰此文漢書為是而顔説亦非其意但謂習聞規誨與智俱長故諫之雖切亦能受之而不愧恨也化與心成故中道若性鄭曰觀心施化故變善如性也合朱子曰此言教化與心俱成故所為皆於道如性自然也戴大戴下有是殷周所以長有道也九字又漢書大皆有三代之禮一段今見朝廷禮篇夫三代之所以長久者以其輔翼太子有此具也大戴三代作殷周之前者下無以字太作天下同又漢書大戴皆有及秦不然一段今刪去天下之命懸於太子太子之善在於早諭教與選左右顔曰諭曉告也與猶及也開於道術知義理之指則教之力也大戴力作功若其服習積貫則左右而已大戴其作夫無而字胡粵之人生而同聲嗜欲不異及其長而成俗纍數譯而不能相通行者有雖死而不能相為者則教習然也大戴粵作越俗下有也字纍作參有雖作雖有死下無而字者下無則字相鄭曰生而同聲及其長也重譯而曉之不能使言語通嗜欲不異至於成俗其所行雖有死之可畏猶不能相為者皆習使之然也蘇林曰言其人之行不能易事相為處朱子曰行有雖死而不能相為者鄭説誤蘇説是也承上文言習俗之殊終身不變雖至於死而不能相放效猶老子言民至老死不相往來也故曰選左右早諭教最急夫教得而左右正大戴再有左右正三字則太子正矣太子正而天下定矣鄭曰孟子曰君正莫不正也君正而國定也書曰一人有慶兆民賴之此之謂也漢書賈誼傳楚莊王使士亹傅太子針莊王楚君名旅也士亹楚大夫針恭王名也問於申叔時叔時楚賢大夫申公叔時曰教之春秋而為之聳善而抑惡焉以戒勸其心以天時紀人事謂之春秋聳奬也抑貶也教之世而為之昭明德而廢幽昏焉世謂先王之世系也昭顯也幽暗也昏亂也為之陳有明德者世顯而暗亂者世廢也以休懼其動休嘉也動行也使之嘉顯而懼廢也教之詩而為之導廣顯德以耀明其志導開也顯德謂若成湯文武周召僖公之屬諸詩所美者也教之禮使知上下之則教之樂以疏其穢而鎮其浮則法也疏滌也樂者所以移風易俗蕩滌人之邪穢也鎮重也浮輕也教之令使訪物官令謂先王官法時令也訪議也物事也使議知百官之事業教之語使明其德而知先王之務用明德於民也語治國之善語教之故志使知廢興者而戒懼焉故志謂所記前世成敗之書垂之訓典使知族類行比義焉訓典五帝之書族類謂若惇敘九族比義義之與比也若是而不從不見從也動而不悛悛改也則文詠物以行之文文辭也詠風也謂以文辭風記事物以動行之求賢良以翼之翼輔也悛而不攝則身勤之攝固也勤勤身以朂勉之多訓典刑以納之刑法也務慎惇篤以固之攝而不徹徹通也則明施舍以導之忠施己所欲原心舍過謂之忠恕明久長以導之信有信然後可以長久明度量以導之義義宜也言度量所宜也明等級以導之禮等級貴賤之品明恭儉以導之孝恭儉所以事親明敬戒以導之事敬戒於事則無敗功明慈愛以導之仁明昭利以導之文昭明也明利言利人及物明除害以導之武除害去暴亂也明精意以導之罰明盡精意斷之以情明正德以導之賞正德謂不私於所愛明齊肅以耀之臨齊一也肅敬也耀明也臨臨事也若是而不濟不可為也濟成也謂為師傅也國語楚語司馬侯對晉悼公曰諸侯之為日在君側為行也以其善行以其惡戒可謂德義矣公曰孰能對曰羊舌肸習於春秋肸叔向之名春秋紀人事之善惡而目以天時謂之春秋周史之法也時孔子未作春秋乃召叔嚮使傅太子彪彪平公也晉語書數通禮二十補大司徒以鄉三物教萬民而賔興之三曰六藝禮樂射御書數詳見學制保氏養國子以道乃教之六藝五曰六書六曰九數同上八年出就外傅居宿於外學書計外傅教學之師也內則上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬明決之意繫辭傳黃帝之史蒼頡見鳥獸蹄迒之迹知分理之可相别異也初造書契百工以乂萬品以察蒼頡之初作書蓋依類象形故謂之文其後形聲相益即謂之字字者言孶乳而浸多也著於竹帛謂之書書者如也以迄五帝三王之世改易殊體封於泰山者七十有二代靡有同焉周禮八歲入小學保氏教國子先以六書一曰指事指事者視而可識察而可見上下是也二曰象形象形者畫成其物隨體詰詘日月是也三曰形聲形聲者以事為名取譬相成江河是也四曰會意會意者比類合意以見指撝武信是也五曰轉注轉注者建類一首同意相受考老是也六曰假借假借者本無其字依聲託事令長是也及宣王太史籀著大篆十五篇與古文或異至孔子書六經左丘明述春秋傳皆以古文厥意可得而説其後諸侯力政不統於王惡禮樂之害己而皆去其典籍分為七國田疇異疇車塗異軌律令異法衣冠異制言語異聲文字異形秦始皇帝初兼天下丞相李斯乃奏同之罷其不與秦文合者斯作蒼頡篇中車府令趙高作爰歷篇太史令胡毋敬作博學篇皆取史籀大篆或頗省改所謂小篆者也是時秦燒滅詩書滌除舊典大發𨽻卒興役戍官獄職務繁初有𨽻書以趣約易而古文由此絶矣許慎説文解字序小史掌邦國之志鄭司農云志謂記也春秋傳所謂周志國語所謂鄭書之屬是也史官主書故韓宣子聘於魯觀書太史氏春官外史掌四方之志志記也謂若魯之春秋晉之乘楚之檮杌掌三王五帝之書楚靈王所謂三墳五典掌逹書名于四方謂若堯典禹貢逹此名使知之或曰古曰名今曰字使四方知書之文字得能讀之同上大行人王之所以撫邦國諸侯者九歲屬瞽史諭書名書名書之字也古曰名聘禮曰百名以上秋官非天子不考文文書名今天下書同文今子思自謂當時也中庸韓宣子來聘觀書於太史氏見易象與魯春秋曰周禮盡在魯矣易象上下經之象辭魯春秋史記之策書春秋遵周公之典以序事故曰周禮盡在魯矣吾乃今知周公之德與周之所以王也易象春秋文王周公之制當此時儒道廢諸國多闕唯魯備故宣子適魯而説之昭二年左氏傳楚左史倚相是良史也是能讀三墳五典八索九丘皆古書名氏昭十二年左傳九數一方田以御田疇界域二粟布以御交質變易三衰分以御貴賤稟稅四少廣以御積羃方圓五商功以御功程積實六均輸以御逺近勞費七盈朒以御隱雜互見八方程以御雜糅正負九勾股以御高深廣逺九章算術禮書綱目卷六十八
