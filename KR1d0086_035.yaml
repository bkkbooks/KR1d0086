body:
  text: 禮書綱目卷三十三婺源江永撰災變禮凶禮十七補膳夫大喪則不舉大荒則不舉大札則不舉天地有災則不舉邦有大故則不舉大荒凶年大札疫癘天災日月晦食地災崩動大故寇戎之事鄭司農云大故刑殺也春秋傳曰司冦行戮君為之不舉天官司服大札大荒大災素服大荒饑饉也大災水火為害君臣素服縞冠若晉伯宗哭梁山之崩大司樂凡日月食四鎮五嶽崩大傀異烖諸侯薨令去樂四鎮山之重大者謂揚州之㑹稽青州之沂山幽州之醫無閭冀州之霍山五嶽岱在兖州衡在豫州嶽在雍州恆在并州傀猶怪也大怪異烖謂天地竒變若星辰奔霣及震裂為害者去樂藏之也春秋傳曰壬午猶繹萬入去籥萬言入則去者不入藏之可知大札大凶大烖大臣死凡國之大憂令弛縣札疫癘也凶凶年也烖水火也弛釋下之若今休兵鼓之為並春官右總要天反時為烖寒暑易節地反物為妖羣物失性民反德為亂亂則妖烖生故文反正為乏文字年宣十五左氏傳小宗伯凡天地之大烖類社稷宗廟則為位禱祈禮輕類者依其正禮而為之春官鼓人救日月則詔王鼓救日月食王必親擊鼓者聲大異春秋傳曰非日月之眚不鼓地官大僕軍旅甸役贊王鼓救日月亦如之日月食時春秋傳曰非日月之眚不鼓夏官日食則天子素服而修六官之職蕩天下之陽事月食則后素服而修六宫之職蕩天下之隂事食者見道有虧傷也蕩蕩滌去惡穢也昏義諸侯旅見天子入門日食則廢旅衆如諸侯皆在而日食則從天子救日各以其方色與其兵示奉時事將有所討也方色者東方衣青南方衣赤西方衣白北方衣黑兵未聞也諸侯相見揖讓入門日食則廢當祭而日食接祭而已矣如牲至未殺則廢接祭而已不迎尸也大夫之祭鼎俎既陳籩豆既設日食廢曽子問右天地大烖惟時羲和畔官離次俶擾天紀遐棄厥司乃季秋月朔辰弗集于房辰日月所㑹房所舍之次集合也不合則日食可知瞽奏鼓嗇夫馳庶人走凡日食天子伐鼓于社責上公瞽樂官樂官進鼓則伐之嗇夫主幣之官馳取幣禮天神衆人走供救日食之百役也羲和尸厥官罔聞知主其官而無聞知于日食之變異所以罪重昏迷于天象以干先王之誅暗錯天象言昏亂之甚干犯也𦙍征莊公二十五年六月辛未朔日有食之鼓用牲于社鼓伐鼓也用牲以祭社傳例曰非常也非常也非常鼓之月長厯推之辛未實七月朔置閏失所故致月錯唯正月之朔慝未作正月夏之四月周之六月謂正陽之月今書六月而傳云唯者明此月非正陽月也慝隂氣日有食之于是乎用幣于社伐鼓于朝日食厯之常也然食于正陽之月則諸侯用幣于社請救于上公伐鼓于朝退而自責以明隂不宜侵陽臣不宜掩君以示大義左氏傳日食則曷為鼓用牲于社據日食在天求乎隂之道也求責求也以朱絲營社或曰脅之或曰為暗恐人犯之故營之或曰者或人辭其義各異也或曰脅之與責求同義社者土地之主也月者土地之精也上繫于天而犯日故鳴鼓而攻之脅其本也朱絲營之助陽抑隂也或曰為暗者社者土地之主尊也為日光盡天暗冥恐人犯厯之故營之然此說非也記或傳者示不欲絶異記爾先言鼓後言用牲者明先以尊命責之後以臣子禮接之所以為順也不言鼓于社用牲者與禘于太廟用致夫人同嫌起用牲為非禮書者善內感懼天烖應變得禮也是後夫人遂不制通于二叔殺二嗣子也公羊傳言日言朔食正朔也鼓用牲于社鼓禮也用牲非禮也天子救日置五麾陳五兵五鼓麾旌幡也五兵矛㦸鉞楯弓矢諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也凡有聲皆陽事以壓隂氣柝兩木相擊充實也穀梁傳文公十五年六月辛丑朔日有食之鼓用牲于社傳例曰非禮也非禮也得常鼓之月而于社用牲為非禮日有食之天子不舉去盛饌伐鼓于社責羣隂伐猶擊也諸侯用幣于社社尊于諸侯故請救而不敢責之伐鼓于朝退自責以昭事神訓民事君天子不舉諸侯用幣所以事神尊卑異制所以訓民示有等威古之道也等威威儀之等差傳左氏昭公十七年六月甲戌朔日有食之祝史請所用幣禮正陽之月日食當用幣于社故請之昭子曰日有食之天子不舉不舉盛饌伐鼓于社責羣隂諸侯用幣于社請上公伐鼓于朝退自責禮也平子禦之禦止也曰止也唯正月朔慝未作日有食之于是乎有伐鼓用幣禮也其餘則否大史曰在此月也正月謂建巳正陽之月也于周為六月于夏為四月慝隂氣也四月純陽用事隂氣未動而侵陽災重故有伐鼓用幣之禮也平子以為六月非正月故大史答言在此月也日過分而未至過春分而未夏至三辰有災三辰日月星也日月相侵又犯是宿故三辰皆為災于是乎百官降物降物素服君不舉辟移時辟正寢過日食時樂奏鼓伐鼓祝用幣用幣于社史用辭用辭以自責故夏書曰辰不集于房逸書也集安也房舍也日月不安其舍則食瞽奏鼓瞽樂師嗇夫馳庶人走車馬曰馳步曰走為救日食備也此月朔之謂也當夏四月是謂孟夏言此六月當夏家之四月平子弗從昭子退曰夫子將有異志不君君矣安君之災故曰有異志同上日食必救之何隂侵陽也故用牲于社社者衆隂之主以朱絲縈之鳴鼓攻之以陽責隂也所以必用牲者社地别神也尊之故不敢虛責也日食大水則鼓用牲于社大旱則雩祭水雨非苟虛也敕陽責下求隂道也月食救之者隂失明也救之者謂夫人擊鏡傳人擊杖庶人之妻楔搔白虎通梁山崩記異也梁山在馮翊夏陽縣北晉侯以傳召伯宗絳人曰國主山川主謂所主祭故山崩川竭君為之不舉去盛饌降服損盛服乘縵車無文徹樂息八音出次舍于郊祝幣陳玉帛史辭自罪責以禮焉禮山川其如此而已遂以告而從之成五年左氏傳國語詳見因祭篇年不順成則天子素服乘素車食無樂自貶損也至于八月不雨君不舉為旱變也此謂建子之月不雨蓋建未月也春秋之義周之春夏無雨未能成災至其秋秀實之時而無雨則雩雩而得之則書雩喜祀有益也雩而不得則書旱明災成也年不順成君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬皆為凶年變也君衣布者謂若衛文公大布之衣大帛之冠是也搢本去珽荼珮士笏也士以竹為笏飾本以象關梁不租此周禮也殷則關恆譏而不征列之言遮列也雖不賦猶為之禁不得非時取也造謂作新也並玉藻五穀不升為大饑升成也一穀不升謂之嗛嗛不足貌二穀不升謂之饑三穀不升謂之饉四穀不升謂之康康虛五穀不升謂之大侵侵傷大侵之禮君食不兼味臺榭不塗塗堊飾弛侯廷道不除弛廢也侯射侯也廢侯不燕射廷內道路不修除百官布而不制官職修列不可闕廢不更有造作鬼神禱而不祀周書曰大荒有禱而無祀此大侵之禮也襄二十四年穀梁傳嵗凶年穀不登登成也君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食粱士飲酒不樂皆自為貶損憂民也禮食殺牲則祭先有虞氏以首夏后氏以心殷人以肝周人以肺不祭肺則不殺也天子食日少牢朔月大牢諸侯食日特牲朔月少牢除治也不治道為妨民取蔬食也縣樂器鐘磬之屬也粱加食也不樂去琴瑟曲禮國家靡敝則車不雕幾甲不組縢食器不刻鏤君子不履絲屨馬不常秣靡敝賦稅亟也雕畫也幾附纒為沂鄂也組縢以組飾之及襟帶也詩云公徒三萬貝胄朱綅亦鎧飾也少儀大宗伯以凶禮哀邦國之憂哀謂救患分烖凶禮之别有五以荒禮哀凶札荒人物有害也曲禮曰嵗凶年穀不登君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食梁士飲酒不樂札讀為截截謂疫癘春官小行人若國札喪則令賻補之若國凶荒則令賙委之鄭司農云賻補之謂賻喪家補助其不足也若今時一室二尸則官與之棺也秋官小宰荒受其幣玉之事凶荒有幣玉者賓客所賙委之禮天官右凶札禮國有饑人人主不飧國有凍人人主不裘報囚之日人主不舉樂嵗凶殺不登臺扉榭徹于侯馬不食穀馳道不除食减膳饗祭有闕故禮自行之義養民之道也孔子在齊齊大旱春饑景公問於孔子曰如之何孔子曰凶年則乘駑馬力役不興馳道不修馳道君行之道祈以幣玉君所祈請用幣及玉不用牲也祭事不縣不作樂也祀以下牲當用大牢者用少牢此則賢君自貶以救民之禮也家語夏大旱公欲焚巫尩巫尩女巫也主祈禱請雨者或以為尩非巫也瘠病之人其病上向俗謂天哀其病恐雨入其鼻故為之旱是以公欲焚之臧文仲曰非旱備也修城郭貶食省用務穡勸分穡儉也勸分有無相濟此其務也巫尩何為僖二十一年左氏傳嵗旱穆公召縣子而問然然之言焉也凡穆或作繆曰天久不雨吾欲暴尩而奚若尩者面向天覬天哀而雨之曰天則不雨而暴人之疾子虐毋乃不可與錮疾人之所哀暴之是虐然則吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃已疏乎已猶甚也巫主接神亦覬天哀而雨之春秋傳說巫曰在女曰巫在男曰覡周禮女巫旱暵則舞雩徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎徙市者庶人之喪禮今徙市是憂戚于旱若喪檀弓隱公六年冬京師來告饑公為之請糴于宋衛齊鄭禮也告饑不以王命故傳言京師而不書于經也雖非王命而公共以稱命己國不足旁請鄰國故曰禮也傳見隱之賢傳左氏有焚其先人之室則三日哭謂人燒其宗廟哭者哀精神之有虧傷故曰新宫火亦三日哭火人火也新宫火在魯成三年檀弓諸侯旅見天子入門大廟火則廢大廟始祖廟宗廟皆然主于始祖耳大廟火則從天子救火不以方色與兵諸侯相見揖讓入門大廟火則廢當祭而大廟火接祭而已矣如牲至未殺則廢大夫之祭鼎俎既陳籩豆既設君之大廟火廢曽子問大宗伯以凶禮哀邦國之憂以弔禮哀禍烖禍烖謂遭水火宋大水魯莊公使人弔焉曰天作淫雨害于粢盛如何不弔廄焚孔子拜鄉人為火來者士一大夫再亦相弔之道春官小行人若國有禍災則令哀弔之禍災水火大行人致禬以補諸侯之烖致禬凶禮之弔禮禬禮也補諸侯烖者若春秋澶淵之㑹謀歸宋財並秋官右水火成公三年二月甲子新宫災三日哭杜曰三年喪畢宣公神主新入廟故謂之新宫書三日哭善得禮宗廟親之神靈所馮居而遇災故哀而哭之春秋宫公之宫也以無新宫知宣公之宫廟曷為謂之新宫不忍言也親之精神所依而災孝子隱痛不忍正言也謂之新宫者因新入宫易其西北角示昭穆相繼代有斫改更也其言三日哭何據桓僖宫災不言三日哭廟災三日哭禮也善得禮痛傷鬼神無所依歸故君臣素縞哭之公羊傳新宫者禰宫也三日哭哀也其哀禮也宫廟親之精神所馮居而遇災故以哀哭為禮迫近不敢稱諡恭也迫近言親禰也桓僖逺祖則稱諡其辭恭且哀以成公為無譏矣穀梁傳哀公三年司鐸火司鐸宫名火踰公宫桓僖災桓公僖公廟救火者皆曰顧府言常人愛財南宫敬叔至命周人出御書俟于宫敬叔孔子弟子南宫閲周人司周書典籍之官御書進于君者也使待命于宫曰庀女而不在死庀具也子服景伯至命宰人出禮書景伯子服何也宰人冢宰之屬以待命命不共有常刑待求之命校人乘馬巾車脂轄校人掌馬巾車掌車乘馬使四四相從為駕之易百官官備府庫慎守官人肅給國有火災恐有變難故慎為備濟濡帷幕鬱攸從之鬱攸火氣也濡物于水出用為濟蒙葺公屋以濡物冒覆公屋自大廟始外內以悛悛次也先尊後卑以次救之助所不給有不用命則有常刑無赦公父文伯至命校人駕乘車乘車公車季桓子至御公立于象魏之外象魏門闕命救火者傷人則止財可為也命藏象魏周禮正月縣教令之法于象魏使萬民觀之故謂其書為象魏曰舊章不可亡也富父槐至曰無備而官辦者猶拾瀋也槐富父終生之後瀋汁也言不備而責辦不可得於是乎去表之槀表火道風所向者去其槀積道還公宫開除道周匝公宫使火無相連宋災樂喜為司城以為政樂喜子罕也為正卿知將有火災素戒為備火之政使伯氏司里伯氏宋大夫司里里宰火所未至徹小屋塗大屋大屋難徹就塗之陳畚挶具綆缶畚簣籠挶土輿綆汲索缶汲器備水器盆􅧲之屬量輕重計人力所在蓄水潦積土塗巡丈城繕守備巡行也丈度也繕治也行度守備之處恐因災有亂表火道火起則從其所趨標表之使華臣具正徒華臣華元子為司徒正徒役徒也司徒之所主也令隧正納郊保奔火所隧正官名也五縣為隧納聚郊野保守之民使隨火所起往救之使華閲討右官官庀其司亦華元子代元為右師討治也庀具也使具其官屬向戌討左亦如之向戌左師使樂遄庀刑器亦如之樂遄司冦刑器刑書使皇鄖命校正出馬工正出車備甲兵庀武守皇鄖皇父充石之後校正主馬工正主車使各備其官使西鉏吾庀府守鉏吾大宰也府六官之典令司宫巷伯警宫司宫奄臣巷伯寺人皆掌宫內之事二師令四鄉正敬享二師左右師也鄉正鄉大夫享祀也祝宗用馬于四墉祀盤庚于西門之外祝大祝宗宗人墉城也用馬祭于四城以禳火盤庚殷王宋之逺祖城積隂之氣故祀之凡天災有幣無牲用馬祀盤庚皆非禮襄九年昭公十八年五月壬午宋衛陳鄭災火作子産辭晉公子公孫于東門晉人新來未入故辭不使前也使司冦出新客新來聘者禁舊客勿出于宫為其知國情不欲令去使子寬子上巡羣屏攝至于大宫二子鄭大夫屏攝祭祀之位大宫鄭祖廟巡行宗廟不得使火及之使公孫登徙大龜登開卜大夫使祝史徙主祏于周廟告于先君祏廟主石函周廟厲王廟也有火災故合羣主于祖廟易救護使府人庫人各敬其事警備火也商成公警司宫商成公鄭大夫司宫巷伯寺人之官出舊宫人置諸火所不及舊宫人先公宫女司馬司冦列居火道備非常也行火所焮焮炙也城下之人伍列登城為部伍登城備姦也明日使野司冦各保其徵野司冦縣士也火之明日四方乃聞災故戒保所徵役之人郊人助祝史除于國北為祭處于國北者就太隂禳火禳火于𤣥冥回祿𤣥冥水神回祿火神祈于四墉墉城也城積土隂氣所聚故祈祭之以禳火之餘災書焚室而寬其征與之材征賦稅也三日哭國不市示憂戚不㑹市使行人告于諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也不義所以亡七月鄭子産為火故大為社為治也祓禳于四方振除火災禮也振棄也傳並左氏襄公三十年五月宋災冬十月晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故㑹未有言其事者此言宋災故以惡宋人不克己自責而出㑹求財春秋為宋災故諸侯之大夫㑹以謀歸宋財既而無歸于宋故不書其人左氏傳莊公十一年秋宋大水公使弔焉曰天作淫雨害于粢盛若之何不弔不為天所愍弔對曰孤實不敏天降之災又以為君憂拜命之辱謝辱厚命臧文仲曰宋其興乎禹湯罪已其興也悖焉悖盛貌桀紂罪人其亡也忽焉忽速貌且列國有凶稱孤禮也列國諸侯無凶則常稱寡人言懼而名禮其庶乎言懼罪已名禮稱孤其庶幾于興既而聞之曰公子御說之辭也宋莊公子臧孫達曰是宜為君有恤民之心左氏傳廄焚孔子拜鄉人為火來者拜謝之拜之士一大夫再亦相弔之道也言拜之者為其來弔己宗伯職曰以弔禮哀禍災雜記家語云孔子為大司冦國廄焚子退朝而之火所鄉人有自為火來者則拜之士一大夫再子貢曰敢問何也孔子曰其來者亦相弔之道吾為有司故拜之小祝有冦戎之事則保郊祀于社故書祀或作祀鄭司農云謂保守郊祭諸祀及社無令冦侵犯之杜子春讀祀為祀書亦或為祀𤣥謂保祀互文郊社皆守而祀之彌烖兵都宗人若有冦戎之事則保羣神之壝守山川丘陵墳衍之壇域大宗伯以凶禮哀邦國之憂以禬禮哀圍敗同盟者合㑹財貨以更其所喪春秋襄三十年冬㑹于澶淵宋災故是其類以恤禮哀冦亂恤憂也鄰國相憂兵作于外為冦作于內為亂並春官大行人致禬以補諸侯之烖注見上章小行人若國有師役則令槁禬之故書槁為槀鄭司農云槀當為槁謂槁師也𤣥謂師役者國有兵冦以匱病者也使鄰國合㑹財貨以與之春秋定五年夏歸粟于蔡是也宗伯職曰以禬禮合圍敗並秋官右兵冦狄人滅衛衛立戴公以廬于曹廬舍也曹衛下邑戴公名申立其年卒而立文公齊侯使公子無虧帥車三百乘甲士三千人以戍曹無虧齊桓公子武孟也車甲之賦異于常故傳别見之歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸遺也四馬曰乘衣單復具曰稱門材使先立門户歸夫人魚軒魚軒夫人車以魚皮為飾重錦三十兩重錦錦之熟細者以二丈雙行故曰兩三十兩三十匹也閔二年左氏傳昭公六年冬叔弓如楚聘且弔敗也弔為吳所敗定公五年夏歸粟于蔡蔡為楚所圍饑乏故魯歸之粟以周亟矜無資亟急也哀公二十年越圍吳趙孟降于喪食趙孟襄子無恤時有父簡子之喪楚隆曰三年之喪親昵之極也主又降之無乃有故乎楚隆襄子家臣趙孟曰黃池之役先主與吳王有質黃池在十三年先主簡子質盟信也曰好惡同之今越圍吳嗣子不廢舊業而敵之嗣子襄子自謂欲敵越救吳非晉之所能及也吾是以為降並左氏傳國亡大縣邑公卿大夫士皆厭冠哭于大廟三日君不舉軍敗失地以喪歸也厭冠今喪冠其服未聞或曰君舉而哭于后土后土社也弓檀國君去其國止之曰奈何去社稷也大夫曰奈何去宗廟也士曰奈何去墳墓也皆民臣殷勤之言國君死社稷死其所受于天子也謂見侵伐也春秋傳曰國滅君死之正也大夫死衆士死制死其所受于君衆謂君師制謂君教令所使為之曲禮國有患君死社稷謂之義大夫死宗廟謂之變變當為辨聲之誤也辨猶正也君守社稷臣衛君宗廟者患謂見圍入運禮右亡邑失國鄰國國滅君出奔附見于下楚人滅江秦伯為之降服出次不舉過數降服素服也出次辟正寢不舉去盛饌鄰國之有禮數今秦伯過之大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也秦江同盟不告故不書文四年左氏傳衛侯出奔齊公使厚成叔弔于衛曰寡君使瘠聞君不撫社稷而越在他竟越逺也瘠厚成叔名若之何不弔以同盟之故使瘠敢私于執事執事衛諸大夫曰有君不弔弔恤也有臣不敏敏達也君不赦宥臣亦不帥職增淫發泄其若之何衛人使大叔儀大叔儀衛大夫對曰羣臣不佞得罪于寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔羣臣又重恤之重恤謂愍其不達也敢拜君命之辱重拜大貺謝重恤之賜傳襄十四年左氏盜殺衛侯之兄縶公如死鳥死鳥衛地齊侯使公孫青聘于衛遂從諸死鳥請將事辭曰亡人不佞失守社稷越在草莽吾子無所辱君命賓曰寡君命下臣于朝曰阿下執事阿比也命已使比衛臣下臣不敢二二違命也主人曰君若惠顧先君之好照臨敝邑鎮撫其社稷則有宗祧在言受聘當在宗廟也乃止止不行聘事衛侯固請見之欲與青相見不獲命以其良馬見以為相見之禮為未致使故也未致使故不敢以客禮見賓將掫掫行夜主人辭曰亡人之憂不可以及吾子草莽之中不足以辱從者敢辭賓曰寡君之下臣君之牧圉也若不獲扞外役是不有寡君也有相親有臣懼不免于戾請以除死親執鐸終夕與於燎設火燎以備守傳昭二十年左氏昭公走之齊齊侯唁公于野井弔亡國曰唁弔死國曰弔弔喪主曰傷弔所執紼曰絻曰奈何去魯國之社稷昭公曰喪人自謂亡人不佞不善失守魯國之社稷執事以羞謙自比齊下執事言以羞及君再拜顙顙者猶今叩頭矣謝見唁也髙子執簞食簞􅓗器也圎曰簞方曰笥食即下所致糗也與四脡脯屈曰朐申曰脡國子執壺漿壺禮器腹方口圓曰壺反之曰方壺有爵飾曰吾寡君聞君在外餕饔未就餕熟食饔熟肉未就未成也解所以致糗意敢致糗于從者糗糒也謙不敢斥魯侯故言從者昭公曰君不忘先君延及喪人錫之以大禮再拜稽首以衽受衽衣下裳當前者乏器謙不敢求索髙子曰有夫不祥猶曰人皆有夫不善君無所辱大禮禮臣受君錫答拜謂之辱髙子見昭公拜辱大卑故曰君無辱大禮昭公蓋祭而不嘗食必祭者謙不敢便嘗示有所先不嘗者待禮讓故也景公曰寡人有不腆先君之服未之敢服腆厚也服謂齊侯所著衣服也言未敢服者見魯侯乃敢服之謙辭也禮天子朝皮辨夕𤣥端朝服以聽朝𤣥端以燕皮辨以征不義取禽獸行射諸侯朝朝服夕深衣𤣥端以燕裨冕以朝天子以祭其祖禰卿大夫冕服而助君祭朝服祭其祖禰士爵辨黻衣裳以助公祭𤣥端以祭其祖禰有不腆先君之器器謂上所執簞壺未之敢用敢以請請行禮昭公曰喪人不佞失守魯國之社稷執事以羞敢辱大禮敢辭不敢當大禮故敢辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢固以請昭公曰以吾宗廟之在魯也以我守宗廟在魯時有先君之服未之能以服有先君之器未之能以出敢固辭已有時未能以事人今已無有義不可以受人之禮景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用請以饗乎從者欲令受之故益謙言從者昭公曰喪人其何稱行禮賓主當各有所稱時齊侯以諸侯遇禮接昭公昭公自謙失國不敢以故稱自稱故執謙問之景公曰孰君而無稱猶曰誰為君者而豈無所稱乎昭公非君乎昭公於是噭然而哭噭然哭聲貌感景公言而自傷諸大夫皆哭魯諸大夫從昭公者既哭以人為菑菑周埒坦也所以分别內外衛威儀今大學辟雍作側字以幦為席幦車覆苓以鞍為几以遇禮相見以諸侯出相遇之禮相見孔子曰其禮與其辭足觀矣言昭公素能如此禍不至是昭二十五年公羊傳大史典禮執簡記奉諱惡簡記䇿書也諱先王名惡忌日若子卯王制諸侯子卯稷食菜羮忌日貶也玉藻子卯不樂紂以甲子死桀以乙卯死王者謂之疾日不以舉樂為吉事所以自戒懼檀弓辰在子卯謂之疾日疾惡也紂以甲子喪桀以乙卯亡故國君以為忌日君徹宴樂學人舍業為疾故也昭九年左氏傳朝夕哭不辟子卯子卯桀紂亡日凶事不辟吉事闕焉士喪禮右子卯莊公二十有二年春王正月肆大省肆者何跌也跌過度大省者何災省也謂子卯日也夏以卯日亡殷以子日亡先王常以此日省吉事不忍舉又大自省敕得無獨有此行乎常若聞災自省故曰災省也肆大省何以書譏何譏爾譏始忌省也時魯有夫人喪忌省日不哭省日本以忌吉事不以忌凶事故禮哭不辟子卯所以専孝子之思也不與念母而譏忌省者本不事母則已不當忌省公羊傳禮書綱目卷三十三
