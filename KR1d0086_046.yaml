body:
  text: 禮書綱目卷四十四婺源江永撰祭通禮補大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國以吉禮事邦國之鬼神示詳見祭法凡祀大神享大鬼祭大示詔大號治其大禮詔相王之大禮大號六號之大者以詔大祝以為祝辭治猶簡習也豫簡習大禮至祭當以詔相王羣臣禮為小禮乃頒祀于邦國都家鄉邑頒讀為班班其所當祀及其禮都家之鄉邑謂王子弟及公卿大夫所食采地小宗伯掌四時祭祀之序事與其禮序事卜日省牲視滌濯饔爨之事次序之時凡祭祀詔相祭祀之小禮凡大禮佐大宗伯小禮羣臣之禮小祭祀掌事如大宗伯之禮肆師之職掌立國祀之禮以佐大宗伯詳見祭物總要以祭時序其祭祀及其祈珥序第次其先後大小詳見因祭釁章大祝建邦國禁督逆祝命者督正也正王之所命諸侯之所祀有逆者則刑罰焉小祝掌小祭祀凡事佐大祝唯大祝所有事凡外内小祭祀掌事焉並春官女祝掌王后之内祭祀凡内禱祠之事内祭祀六宮之中竈門户禱疾病求瘳也祠報福也小宰以官府之六職辨邦治三曰禮職以事鬼神以官府之六聯合邦治一曰祭祀之聯事鄭司農云大祭祀大宰賛玉幣司徒奉牛牲宗伯視滌濯涖玉鬯省牲鑊奉玉齍司馬羞魚牲奉馬牲司冦奉明水火𤣥謂奉牲者其司空奉豕與並天官司隸邦有祭祀之事則役其煩辱之事煩猶劇也秋官大宰以八則治都鄙一曰祭祀以馭其神都鄙公卿大夫之采邑王子弟所食也祭祀其先君社稷五祀天官都宗人掌都祭祀之禮都或有山川及因國無主九皇六十四氏之祀王子弟則立其祖王之廟其祭祀王皆賜禽鳥主其禮者警戒之糾其戒具其來致福則帥而以造祭僕家宗人掌家祭祀之禮大夫采地之所祀與都同若先王之子孫亦有祖廟並春官大司徒施十有二教一曰以祀禮教敬則民不苟小司徒掌建邦之教法與其祭祀之禁令土均和邦國都鄙之政令與其禮俗祭祀以地媺惡為輕重之法而行之掌其禁令並地官孟春乃修祭典重祭禮嵗始省録也月令䘮祭從先祖志所言本謂先王之世舊俗所傳禮文小異而可以通行者耳不謂後世失禮之甚者也孟子君子行禮不求變俗祭祀之禮皆如其國之故謹修其法而審行之曲禮右總要小宗伯之職掌建國之神位右社稷左宗廟詳見地示及宗廟兆五帝於四郊四望四類亦如之詳見天神地示兆山川丘陵墳衍各因其方詳見地示辨廟祧之昭穆詳見宗廟肆師掌兆中廟中之禁令兆壇塋域典祀掌外祀之兆守皆有域掌其禁令外祀謂所祀於四郊者域兆表之塋域若以時祭祀則帥其属而修除徴役于司隸而役之属其属胥徒也脩除芟掃之徴召也役之作使之及祭帥其属而守其厲禁而蹕之鄭司農云遮列禁人不得令入凡以神仕者掌三辰之法以猶鬼神示之居辨其名物猶圖也居謂坐也天者羣神之精日月星辰其著位也以此圖天神人鬼地示之坐者謂布祭衆寡與其居句孝經說郊祀之禮曰燔燎埽地祭牲繭栗或象天酒旗坐星厨倉具黍稷布席極敬心也言郊之布席象五帝坐禮祭宗廟序昭穆亦又有似虚危則祭天圜丘象北極祭地方澤象后妃及社稷之席皆有明法焉國語曰古者民之精爽不擕貳者而又能齊肅中正其知能上下比義其聖能光逺宣朗其明能光照之其聰能聽徹之如是則神明降之在男曰覡在女曰巫是以使制神之處位次主而為之牲器時服巫既知神如此又能居以天法是以聖人用之今之巫祝既闇其義何明之見何法之行正神不降或於淫厲苟貪貨食遂誣人神令此道滅痛矣小祝有冦戎之事則保郊祀于社故書祀或作禩鄭司農云謂保守郊祭諸祀及社無令冦侵犯之杜子春讀禩為祀書亦或為祀𤣥謂保祝互文郊社皆守而祀之弭烖兵都宗人若有冦戎之事則保羣神之壝守山川丘陵墳衍之壇域春並官過祀則下居者主於敬檀弓右神位男男尸女女尸必使異姓不使賤者異姓婦也賤者謂庶孫之妾也尸配尊者必使適也士虞禮禮曰君子抱孫不抱子此言孫可以為王父尸子不可以為父尸以孫與祖昭穆同曲禮孫為王父尸所使為尸者於祭者子行也父北面而事之子行猶子列也祭祖則用孫列皆取于同姓之適孫也天子諸侯之祭朝事延尸於户外是以有北面事尸之禮詳見祭統曾子問曰祭必有尸乎言無益無用為若厭祭亦可乎厭時無尸孔子曰祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則取於同姓可也人以有子孫為成人子不殤父義由此也祭殤必厭蓋弗成也厭飫而已不成其為人祭成喪而無尸是殤之也與不成人同曽子問無禄者稷饋庶人無常牲故以稷為主稷饋者無尸無尸者厭也大戴為人子者祭祀不為尸尊者之處為其失子道然則尸卜筮無父者曲禮為君尸者大夫士見之則下之君知所以為尸者則自下之尊尸也下下車也國君或時幼少不能盡識羣臣有以告者乃下之尸必式禮之乘必以几尊者慎也同上孔子曰尸弁冕而出為君尸或弁者先祖或有為大夫士者故服士大夫之服也卿大夫士皆下之見而下車尸必式小俛禮之必有前驅為辟道曾子問酌尸之僕如君之僕當其為尸則尊其在車則左執轡右受爵祭左右軌范乃飲周禮大御祭兩軹祭軌乃飲軌與軹於車同謂轊頭也范與範聲同謂軾前也少儀服之襲也充美也是故尸襲尸尊玉藻君迎牲而不迎尸詳見祭義當其為尸則弗臣也尸主也為祭主也學記曽子問曰卿大夫將為尸於公受宿矣而有齊衰之内喪則如之何孔子曰出舍於公宮以待事禮也尸重受宿則不得哭内喪同宮也凶雜記曽子問作出舍於公館注云吉不可同處右尸維十有三祀帝乃稱王而入唐郊丹朱為尸詳見天神晉平公祀郊董伯為尸詳見因祭疾病章周公祀泰山召公為尸齊嘗于太公之廟麻嬰為尸襄二十八年左氏傳司巫掌羣巫之政令大祝掌六祝之辭以事鬼神示詳見祝號掌六祈以同鬼神示詳因祭祈禳章作六辭以通上下親疏逺近詳祝號辨六號詳祝器辨九祭詳見事尸章辨九􅉔以享右祭祀詳曲禮凡大禋祀肆享祭示則執明水火而號祝明水火司烜所共日月之氣以給烝享執之如以六號祝明此主絜也禮記祭天神也肆享祭宗廟也故書祇為祊杜子春云祊當為祗隋釁逆牲逆尸令鍾鼓右亦如之隋釁謂薦血也凡血祭曰釁既隋釁後言逆牲容逆鼎右讀亦當為侑來瞽令臯舞臯讀為卒嘷呼之嘷來嘷者亦皆呼之入相尸禮延其出入詔其坐作既祭令徹小祝掌小祭祀將事侯禳禱祠之祝號詳見因祭祈禳章大祭祀逆齍盛送逆尸沃尸盥賛隋賛徹賛奠隋尸之祭也奠奠爵也祭祀奠先徹後反言之者明所佐大祝非一凡事佐大祝惟大祝所有事並春官女祝掌王后之内祭祀凡内禱祠之事詳總要章天子出户而巫覡有事出門而宗祝有事出户謂出門内也女曰巫男曰覡有事祓除不祥出門謂車駕出國門宗者主祭祀之官有事謂祭行神也荀子宗祝辨乎宗廟之禮故後尸辨猶別也後尸居後賛禮儀樂記右巫祝楚昭王問於觀射父曰昭王楚平王之子昭王熊軫也觀射父楚大夫也周書所謂重黎實使天地不通者何也周書謂周穆王之相甫侯所作吕刑也重黎顓頊掌天地之臣也吕刑曰乃命重黎絶地天通謂少皡之末民神雜揉不可方物顓頊受之乃命南正重司天以属神火正黎司地以属民謂絶地與天相通之道也若無然民将能登天乎若重黎不絶天地民豈能上天乎對曰非此之謂也古者民神不雜雜㑹也謂司民司神之官各異民之精爽不攜貳者而又能齊肅衷正爽明也攜離也貳二也齊一也肅敬也衷中也其智能上下比義義宜也其聖能光逺宣朗聖通也朗明也其明能光照之其聰能聽徹之徹達也如是則明神降之降下也在男曰覡在女曰巫巫覡見鬼者周禮男亦曰巫是以使制神之處位次主處居也位祭位也次主次其尊卑先後也而為之牲器時服牲牲之毛色小大也器所當用也時服四時服色所宜也而後使先聖之後之有光烈烈明也而能知山川之號號名位也髙祖之主髙祖廟之先也宗廟之事昭穆之世父昭子穆先後之次也春秋躋僖公謂之逆祀齊敬之勤齊荘也禮節之宜威儀之則容貌之崇崇節也忠信之質質誠也禋潔之服潔祀曰禋而敬恭明神者以為之祝祝太祝也掌祈福祥使名姓之後能知四時之生名姓謂舊俗若伯夷炎帝之後為堯秩宗生嘉穀韭卵之属犠牲之物玉帛之類采服之儀彝器之量彝六彝器俎豆量大小也次主之度疏數之度屏攝之位周氏云屏者并攝主人之位昭謂屏屏風也攝形如今要扇皆然所以分別尊卑為祭祀之位近漢亦壇場之所除地曰場上下之神氏姓之出所自出也而心率舊典者為之宗宗宗伯也掌祭祀之禮於是乎有天地神民類物之官謂之五官類物謂別善惡利器用之官各司其序不相亂也民是以能有忠信神是以能有明徳明徳謂降福祥不為災孽也民神異業業事也敬而不瀆故神降之嘉生嘉生善物也民以物享禍災不至求用不匱及少皥之衰也九黎亂德少皥黄帝之子金天氏也九黎黎氏九人也民神雜揉不可方物同位故雜揉方猶別也物名也夫人作享家為巫史夫人人人也享祀也巫主接神史次位序言人人自為之無有要質質誠也民匱乎祀而不知其福言民因匱於祭祀而不獲其福烝享無度民神同位民瀆齊盟無有嚴威齊同也嚴敬也威畏也神伸民則不蠲其為伸習也則法也蠲絜也其為所為也嘉生不降無物以享禍災荐臻莫盡其氣荐重也臻至也氣夀命之氣顓頊受之少皥氏没顓頊氏作受承也乃命南正重司天以屬神南陽位正長也司主也屬會也所以會羣神使各有分序不相干亂周禮則宗伯掌祭祀命火正黎司地以屬民唐尚書云火當為北北隂位也周禮則司徒掌土地人民也使復舊掌無相侵瀆侵犯也是謂絶地天通絶地民與天神相通之道其後三苗復九黎之徳其後髙辛氏之季年也三苗九黎之後也髙辛氏衰三苗為亂行其凶徳如九黎之為也堯興而誅之堯復育重黎之後不忘舊者使復典之育長也堯繼髙辛氏平三苗之亂紹育重黎之後使復典天地之官羲和氏是也以至於夏商故重黎氏世叙天地而別其分主者也叙次也分位也其在周程伯休父其後也當宣王時失其官守而為司馬氏程國也伯爵也休父名也失官守謂失天地之官而以諸侯為大司馬詩曰王謂尹氏命程伯休父是也寵神其祖以取威于民曰重實上天黎實下地寵尊也言休父之後世尊神其祖以威耀其民言重能舉上天黎能抑下地令相逺故不復通也遭世之亂而莫之能禦也亂謂幽平以下也禦止也不然夫天地成而不變言天地體成不復改變也何比之有言不相比近也國語楚語劉文公合諸侯于召陵文公王官伯也将會衛靈公使祝佗從祝佗大祝子魚辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二共二職徼大罪也且夫祝社稷之常隸也隸賤名也社稷不動祝不出竟官之制也社稷動謂國遷君以軍行祓社釁鼓師出先有事祓禱於社謂之宜社於是殺牲以血塗鼓鼙為釁鼓祝奉以從奉社主也於是乎出竟若嘉好之事謂朝會君行師從二千五百人卿行旅從五百人臣無事焉定四年左氏傳凡祀啟蟄而郊言凡祀通下三句天地宗廟之事也啟蟄夏建寅之月祀天南郊龍見而雩龍見建巳之月蒼龍宿之體昏建東方萬物始盛待雨而大故祭天逺為百穀祈膏雨始殺而嘗建酉之月隂氣始殺嘉穀始熟故薦嘗於宗廟閉蟄而烝建亥之月昆蟲閉户萬物皆成可薦者衆故烝祭宗廟釋例論之備矣過則書卜日有吉否過次節則書以譏慢也桓五年左氏傳昔三代明王皆事天地之神明無非卜筮之用不敢以其私䙝事上帝言動任卜筮也神明謂羣神也是故不犯日月不違卜筮日月謂冬夏至正月及四時也所不違者日與牲尸也卜筮不相襲也襲因也大事則卜小事則筮大事有時日大事有事於大神有常時常日也小事無時日有筮有事於小神無常時常日有筮臨有事筮之外事用剛日内事用柔日順隂陽也陽為外隂為内事之外内別乎四郊表記凡卜筮日旬之外曰逺某日旬之内曰近某日旬卜日也喪事先逺日吉事先近日孝子之心䘮事葬與練祥也吉事祭祀冠娶之属也曰為日假爾泰龜有常假爾泰筮有常命龜筮辭龜筮於吉凶有常大事卜小事筮卜筮不過三求吉不過三魯四卜郊春秋譏之卜筮不相襲卜不吉則又筮筮不吉則又卜是瀆龜筮也晉獻公卜取驪姬不吉公曰筮之是也曲禮簭人凡國之大事先簭而後卜當用卜者先筮之即事有漸也於筮之凶即止不卜春官太宰祀五帝前期十日帥執事而卜日前期前所諏之日也十日容散齋七日致齋三日執事宗伯大史之属祀大神示亦如之享先王亦如之大神示謂天地天官大宗伯凡祀大神享大鬼祭大示帥執事而卜日執事諸有事於祭者大史大祭祀與執事卜日執事大卜之属與之者當視墨肆筮凡祭祀之卜日宿為期詔相其禮宿先卜祭之日龜人若有祭祀則奉龜以往旅亦如之奉猶送也送之於所當卜大卜大祭祀則眂髙命龜命龜告龜以所卜之事不親作龜者大祭祀輕於大貞也士喪禮曰宗人即席西面坐命龜並春官右時日卜筮不違龜筮子曰牲牷禮樂齊盛是以無害乎鬼神無怨乎百姓牷猶純也表記天子将祭必先習射於澤澤者所以擇士也已射於澤而后射於射宫射中者得與於祭不中者不得與於祭澤宮名也士謂諸侯朝者及所貢士也皆先令習射於澤已乃射於射宫課中否也古者天子之制諸侯嵗獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭嵗嵗獻國事之事及計偕物也三嵗而貢士舊說云大國三人次國二人小國一人並射義右擇士大宰祀五帝則掌百官之誓戒與其具脩祀五帝謂四郊及明堂誓戒要之以刑重失禮也明堂位所謂各揚其職百官廢職服大刑是其辭之畧也具所當共脩埽除糞洒祀大神示亦如之享先王亦如之小宰以法掌祭祀之戒具法謂其禮法也戒具戒官有事者所當共宰夫以式法掌祭祀之戒具與其薦羞薦脯醢也羞庶羞内羞並天官射人諸侯在朝若有國事則掌其戒令詔相其事謂王有祭祀之事諸侯當助其薦獻者也戒令告以齊與期掌其治逹謂諸侯因與王射及助祭而有所治受而逹之於王王有命又受而下之司士凡祭祀掌士之戒令詔相其法事並夏官大史大祭祀戒及宿之日與羣執事讀禮書而恊事恊合也合謂習録所當共之事也故書恊作叶杜子春云叶恊也書亦或為恊或為汁春官遂師凡國祭祀審其誓戒審亦聽也地官條狼氏凡誓執鞭以趨于前且命之誓大夫曰敢不闗鞭五百誓師曰三百誓邦之大史曰殺誓小史曰墨前謂所誓衆之行前也有司讀誓辭則大言其刑以警所誓也誓者謂出軍及将祭祀時也郊特牲說祭祀之誓曰卜之日王立于澤親聽誓命受教諫之義也師樂師也大夫小史主禮之事者鄭司農云誓大夫曰敢不闗謂不闗於君也𤣥謂大夫自受命以出則其餘事莫不復請秋官右戒具王即齊宫百官御事各即其齊三日王乃淳濯饗禮及期鬱人薦鬯犧人薦醴王祼鬯饗醴乃行詳見朝廷禮膳夫王齊日三舉鄭司農云齊必變食王府王齊則共食玉玉是陽精之純者食之以禦水氣鄭司農云王齊當食玉屑並天官鬯人凡王之齊事共其秬鬯給淬浴春官大宰祀五帝前期十日帥執事而卜日遂戒既卜又戒百官以始齊祀大神亦如之享先王亦如之天官齊必有明衣布齊必沐浴浴竟即著明衣所以明潔其體也以布為之必有寢衣長一身有半齊主於敬不可解衣而寢又不可著明衣而寢故別有寢衣其半蓋以覆足齊必變食居必遷坐變食謂不飲酒不茹葷遷坐易常處也此一節記孔子謹齊之事楊氏曰齊所以交神故致潔變以盡敬論語鄉黨𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也言齊時所服比四命以上齊祭異冠玉藻周弁殷冔夏收齊所服而祭也郊特牲齊則綪結佩而爵韠綪屈也結又屈之思神靈不在事也玉藻司服士之服其齊服有𤣥端素端士齊有素端者亦為札荒有所請禱變素服言素端者明異制春官君羔幦虎犆幦覆芩也犆讀皆如直道而行之直犆謂縁也此君齊車之飾大夫鹿幦豹犆朝車士之齊車鹿幦豹犆臣之朝車與齊車同飾玉藻齊者不樂不弔為哀樂則失正散其思也曲禮君子非致齊也非疾也不晝夜居於内内正寢之中檀弓八十齊喪之事弗及也八十不齊則不祭也子代之祭是謂宗子不孤王制右齊戒齊之為言齊也齊不齊以致齊者也是故君子非有大事也非有恭敬也則不齊不齊則於物無防也嗜欲無止也及其将齊也防其邪物訖其嗜欲耳不聽樂心不苟慮必依於道手足不苟動必依於禮專致其精明之徳也故散齊七日以定之致齊三日以齊之詳見祭義七日戒三日宿慎之至也戒散齊也宿致齊也將有祭祀之事必先敬慎如此不敢切也禮器雖有惡人齊戒沐浴則可以祀上帝惡人醜貌者也孟子不飲酒不茹葷此祭祀之齊也莊子端衣𤣥裳絻而乘路志不在於食葷端衣𤣥裳即士𤣥端也絻與冕同鄭云端者衣之正也士之衣袂皆二尺二寸而属幅是廣袤等也其祛尺二寸大夫已上侈之侈之者蓋半而益一焉則袂三尺三寸祛尺八寸路人君之車亦車之通名舍人注爾雅云路車之大者葷葱韭之属也子荀齊之𤣥也以隂幽思也故君子三日齊必見其所祭者齊三日者思其居處思其笑語思其志意思其所樂則見之也郊特牲大古冠布齊則緇之齊則緇之者鬼神尚幽闇也唐虞以上曰大古也同上子之所慎齊論語季桓子将祭齊三日而二日鐘鼔之音不絶冉有問於孔子曰孝子之祭也散齊七日慎思其事三日致齊而一用之積一而用之也猶恐其不敬也而二日伐鼓何居焉家語孔郊特牲云子曰三日齊一日用之猶恐不敬二日伐鼔何居焉也鄭注居讀為姬語之助也何居怪之也伐猶擊齊者止樂而二日擊鼓則是成一日齊也鄉士大祭祀則各掌其鄉之禁令帥其屬夾道而蹕屬中士以下野廬氏凡國之大事比脩除道路者比較治道者名若今次金叙大功蜡氏凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野蠲讀如吉圭惟饎之圭潔也刑者黥劓之屬任人司圜所收教罷民也凶服衰絰也此所禁除者皆為不欲見人所薉惡也銜枚氏國之大祭祀令禁無囂令令主祭祀者並秋官射鳥氏祭祀以弓矢敺鳥鳶鳥鳶善鈔盜便汙人夏官右禁令夏后氏大事用昏昏時以黒此大事謂喪事也殷人大事用日中日中時亦白周人大事用日出日出時亦赤夏黄氏曰鄭注祭義殷人祭其闇云后氏大事以昏殷人大事以日中周人大事以日出亦謂此郊祭也彼疏亦云檀弓大事非止是喪亦兼諸祭與此不同當以祭義為正檀弓雞人大祭祀夜嘑旦以􅑧百官夜夜漏未盡雞鳴時也呼旦以警起百官使夙興凡國事為期則告之時象雞知時也告其有司主事者少牢曰宗人朝服北面曰請祭期主人曰比於子宗人曰旦明行事告時者至此旦明而告之巾車大祭祀鳴鈴以應雞人雞人主呼旦鳴鈴以和之聲且警衆必使鳴鈴者車有和鸞相應和之象故書鈴或作軨杜子春云當為鈴小宗伯祭之日告時于王告備于王時薦陳之早晚備謂饌具並春官右為期子路為季氏宰宰治邑吏也季氏祭逮闇而祭日不足繼之以燭謂舊時也雖有强立之容肅敬之心皆倦怠矣以其久也有司跛倚以臨祭其為不敬大矣偏任為跛依物為倚他日祭子路與室事交乎户堂事交乎階質明而始行事晏朝而退室事祭時堂事儐尸孔子聞之曰誰謂由也而不知禮乎多其知禮禮器大宗伯凡祀大神享大鬼祭大示宿眡滌濯涖玉鬯省牲鑊宿申戒也滌濯溉祭器也玉禮神之玉也始涖之祭又奉之鑊烹牲器也小宗伯大祭祀省牲眡滌濯祭之日逆齍省鑊逆齍受饎人之盛以入省鑊視烹腥熟官並春大宰及執事眡滌濯執事初為祭事祭前日之夕滌濯謂溉祭器及甑之属宰夫從大宰而眡滌濯並天官肆師眡滌濯詔相其禮祭之日表粢盛告潔展器陳告備粢六榖也在器曰盛陳陳列也故書表為剽剽表皆謂徽識也春官右省眡巾車王之五路一曰王路鍚樊纓十有再就建大常十有二斿以祀王在焉曰路玉路以玉餙諸末鍚馬面當盧刻金為之所謂鏤鍚也樊讀如鞶帶之鞶謂今馬大帶也鄭司農云纓謂當胸士喪禮下篇曰馬纓三就禮家說曰纓當胸以削革為之三就三重三匝也𤣥謂纓今馬鞅玉路之樊及纓皆以五采罽飾之十二就就成也大常九旗之畫日月者正幅為縿旒則屬焉典路若有大祭祀則出路賛駕說出路王當乗之賛駕說賛僕與趣馬也並春官校人凡大祭祀毛馬而頒之毛馬齊其色也頒授當乘之夏官司常日月為常交龍為旂通帛為旜雜帛為物通帛謂大赤從周正色無飾雜帛者以帛素飾其側白殷之正色凡旗之帛皆用絳王建大常諸侯建旂孤卿建旜大夫士建物自王以下治民者旂畫成物之象王畫日月象天明也諸侯畫交龍一象其升朝一象其下復也孤卿不畫言奉王之政教而已大夫士雜帛言以先王正道佐職也凡祭祀各建其旗王祭祀之車則玉路春官節服氏掌祭祀衮冕六人維王之大常服衮冕者從王服也維維之以縷王旌十二旒兩兩以縷綴連旁三人持之禮天子旌曳地鄭司農云維持之諸侯則四人其服亦如之夏官大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷逐驅之行山曰軷犯之者封土為山象以菩芻棘柏為神主既祭之以車轢之而去喻無險難也春秋傳曰䟦渉山川自由也王由左馭禁止馬使不行也故書軷作罰杜子春云罰當為軷軷讀為別異之別謂祖道轢軷磔犬也詩云載謀載惟取蕭祭脂取羝以軷詩家說曰将出左道犯軷之祭也聘禮云乃舍軷飲酒于其側禮家說亦謂道祭及祭酌僕僕左執轡右祭兩軹祭軌乃飲故書軹為軿軌為範杜子春云文當如此左不當重重非是書亦或如杜子春言又云斬當作軹軹謂兩轊也其或言軷亦非是又云軌當作軓謂車前軾也或讀􅛓為簪筓之笄同上旅賁氏凡祭祀則服而趨服而趨夾王車趨也王齊服服衮冕則此士之齊服服𤣥端齊右掌祭祀前齊車王乗則持馬行則陪乗齊車金路王自整齊之車也前之者已駕王未乘之時陪乗參乗謂車右也齊右則齊僕同車而有祭祀之事則兼玉路之右然則戎右兼田右與凡有牲事則前馬王見牲則拱而式居馬前却行備驚奔也曲禮曰國君下宗廟式齊牛並夏官師氏凡祭祀王舉則從舉猶行也故書舉為與杜子春云當為與謂王與祭祀之事保氏凡祭祀王舉則從並地官右出路大僕祭祀正王之服位詔法儀詔告也王出入則自左馭而前驅前驅如今道引也道而居左自馭不參乗辟王也亦有車右焉小臣大祭祀沃王盥小祭祀掌事如大僕之法御僕大祭祀相盥而登相盥者謂奉槃授巾與登謂王為登牲體於俎特牲饋食禮主人降盥出舉入乃匕載並夏官大祝辨九􅉔一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰褒􅉔九曰肅􅉔以享右祭祀注詳曲禮春官凡祭於室中堂上無跣祭不跣者主敬也天子諸侯祭有坐尸於堂之禮祭所尊在室少儀大史大祭祀祭之日執書以次位常謂校呼之敬其所當居之處辨事者攷焉不信者誅之謂扺冐其職事大宗伯凡祀大神享大鬼祭大示涖玉鬯奉玉齍治其大禮詔相王之大禮玉禮神之玉也始涖之祭又奉之治猶簡習也豫簡習大禮至祭當以詔相王羣臣禮為小禮並春官大宰祀五帝及納亨賛玉牲事及祀之日賛玉幣爵之事納亨納牲将告殺謂嚮祭之晨既殺以授亨人凡大祭祀君親牽牲大夫賛之日旦明也玉幣所以禮神玉與幣各如其方之色爵所以獻齊酒不用玉爵尚質也三者執以從王至而授之祀大神示亦如之享先王亦如之賛玉几玉爵玉几所以依神天子左右玉几宗廟獻用玉爵小宰凡祭祀賛玉幣爵之事又從大宰助王也並天官射人祭祀相孤卿大夫之法儀司士凡祭祀掌士之戒令詔相其法事並夏官肆師祭之日相治小禮誅其慢怠者大祝凡大禋祀肆享祭示隋釁逆牲逆尸令鐘鼔右亦如之隋釁謂薦血也凡血祭曰釁既隋釁後言逆牲容逆鼎右當讀為侑來瞽令皋舞臯讀為卒嘷呼之嘷来嘷者皆謂呼之入並春官封人歌舞牲反毛炮之豚謂君牽牲入時隨歌舞之言其肥香以歆神也毛炮豚者爛去其毛而炮之以備八珍鄭司農云封人主歌舞其牲云博碩肥腯充人展牲則告牷展牲若今夕牲也特牲饋食之禮曰宗人視牲則告充舉獸尾告備近之碩牲則賛賛助也君牽牲入將致之助持之也春秋傳曰故奉牲以告曰博碩肥腯並地官射人祭祀則賛射牲烝嘗之禮有射豕者國語曰禘郊之事天子必自射其牲今立秋有貙劉云大僕賛王牲事牲事殺割已載之属司士帥其屬而割牲羞俎豆割牲制體也羞進也並夏官鄉師大祭祀羞牛牲大司徒祀五帝奉牛牲羞其肆牛能任載地類也奉猶進也鄭司農云羞進也肆陳骨體也𤣥謂進所肆解骨體士喪禮曰肆解去蹄享先王亦如之小司徒凡小祭祀奉牛牲羞其肆小祭祀王𤣥冕所祭並地官羊人祭祀割羊牲登其首登升也升首報陽也升首于室小子掌祭祀羞羊肆羊殽肉豆鄭司農云羞進也羊肆體薦全烝也羊體體解節折也肉豆者切肉也𤣥謂肆讀為鬄羊鬄者所謂脉解也並夏官大司冦大祭祀奉犬牲奉猶進也小司冦小祭祀奉犬牲並秋官諸子大祭祀正六牲之體正謂載之大司馬大祭祀羞牲魚授其祭牲魚魚牲也祭謂司所以祭也鄭司農云大司馬主進魚牲小司馬小祭祀掌其事如大司馬之法小子祭祀賛羞量人凡祭祀制其從獻脯膰之數量鄭司農云從献者肉殽從酒也𤣥謂燔從於献酒之肉炙也數多少也量長短也並夏官小宗伯祭之日逆齍省鑊逆齍受饎人之盛以入省鑊視烹腥熟小祝大祭祀逆齍盛賛奠本文賛奠在賛徹之下者注云奠奠爵也祭祀奠先徹後反言之明所佐大祝非一官並春右臨祭保氏教國子六儀一曰祭祀之容少儀云祭祀之容濟濟皇皇地官祭祀之美齊齊皇皇美當為儀字之誤也少儀祭祀之志諭然思以和祭祀之容遂遂然粥粥然敬以婉祭祀之視視如有將祭祀之言文言有序賈誼容經凡祭容貌顔色如見所祭者如覩其人在此玉藻臨祭不惰為無神也祭事不言凶並曲禮堂上觀乎室堂下觀乎上謂祭時肅敬之威儀也坊記右容貌祭如在祭神如神在程子曰祭祭先祖也祭神祭外神也祭先主於孝祭神主於敬愚謂此門人記孔子祭祀之誠意論語仲尼嘗奉薦而進其親也慤其行也趨趨以數詳見祭義季氏祭有司跛倚以臨祭詳見期章大祝相尸禮延其出入詔其坐作小祝大祭祀逆尸沃尸盥賛隋隋尸之祭也並春官舉斝角詔妥尸妥安㘴也尸始入舉奠奠斝若奠角将祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜安之也天子奠斝諸侯奠角郊特牲其有折俎者取祭反之不坐燔亦如之亦為柄尺之類也燔炙也鄉射曰賓奠爵于薦西興取肺坐絶祭左手齊之興加于俎㘴帨手尸則坐尸尊也少牢饋食禮曰尸左執爵右兼取肺肺擩于俎鹽振祭嚌之加于俎豆少儀大祝辨九祭一曰命祭二曰衍祭三曰炮祭四曰周祭五曰振祭六曰擩祭七曰絶祭八曰繚祭九曰共祭杜子春云命祭祭有所主命也振祭振讀為慎禮家讀振為振旅之振擩祭擩讀為虞芮之芮鄭司農云衍祭羡之道中如今祭殤無所主命周祭四面為坐也炮祭燔柴也爾雅曰祭天曰燔柴擩祭以肝肺菹擩鹽醢中以祭也繚祭以手從肺本循之至於末乃絶以祭也絶祭不循其本直絶肺以祭也重肺賤肝故初祭絶肝以祭謂之絶祭至祭之末禮殺之後但擩肝鹽中振之擬之若祭狀弗祭謂之振祭特牲饋食禮曰取菹擩于醢祭于豆間鄉射禮曰取肺坐絶祭鄉飲酒禮曰右取肺左郤手執本坐弗繚右絶末以祭少牢曰取肝擩于鹽振祭𤣥謂九祭皆謂祭食者命祭者玉藻曰君若賜之食而君客之則命之祭然後祭是也衍字當為延炮字當為包聲之誤也延祭者曲禮曰客若降等執食興辭於客然後客坐主人延祭是也包猶兼也兼祭者有司曰宰夫賛者取白黒以授尸尸受兼祭于豆祭是也周猶徧也徧祭者曲禮曰殽之序徧祭之是也振祭擩祭本同不食者擩則祭之將食者既擩必振乃祭也絶祭繚祭亦本同禮多者繚之禮畧者絶則祭之共猶授也王祭食宰夫授祭孝經說曰共綏執授春官君與尸行接武尊者尚徐蹈半跡大夫繼武迹間容迹徐趨皆用是君大夫士之徐行也皆如尸行之節也玉藻右事尸古者尸無事則立有事而后坐也古謂夏時也牲郊特三代之禮一也民共由之周坐尸詔侑武方其禮亦然其道一也言此亦周所因於殷也武當為無聲之誤也方猶常也告尸行節勸尸飲食無常若孝子之為也孝子就養無方詔侑或為韶囿夏立尸而卒祭夏禮尸有事乃坐殷坐尸無事猶坐周旅酬六尸使之相酌也后稷之尸𤼵爵不受旅曾子曰周禮其猶醵與合錢飲酒為醵旅酬相酌似之也王后明堂之禮仲秋乃命國醵禮器有虞氏祭首夏后氏祭心殷祭肝周祭肺氣主盛也明堂位郊血大饗腥三献爓一献孰血腥爓祭用氣郊特牲一献質謂祭羣小祀也三献文謂祭社稷五祀五献察察明也謂祭四望山川也七献神謂祭先公器禮尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒尸飲五謂酳尸五献也大夫士祭三獻而獻賓祭統右獻數大祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰筴祝永長也貞正也求多福歴年得正命也鄭司農云順祝順豐年也年祝求永貞也吉祝祈福祥也化祝彌災兵也瑞祝道時雨寧風旱也筴祝逺罪疾辨六號一曰神號二曰鬼號三曰示號四曰牲號五曰齍號六曰幣號號謂尊其名更為美稱焉神號若云皇天上帝鬼號若云皇祖伯某祇號若云后土地祇幣號若玉云嘉玉幣云量幣鄭司農云牲號為犧牲皆有名號曲禮曰牛曰一元大武豕曰剛鬛羊曰柔毛雞曰翰音粢號謂黍稷皆有名號也曲禮曰黍曰薌合粱曰香萁稻曰嘉蔬少牢饋食禮曰敢用柔毛剛鬛士虞禮曰敢用絜牲剛鬛香合凡大禋祀肆享祭示則執明水火而號祝明水火司烜所共日月之氣以給烝亨執之如以六號祝明此圭潔也禮祀祭天神也肆享祭宗廟也建邦國頒祭號於邦國都鄙祭號六號春官踐阼臨祭祀内事曰孝王某外事曰嗣王某皆祝辭也唯宗廟稱孝天地社稷祭之郊内而曰嗣王不敢同内外諸侯臨祭祀内事曰孝子某侯某外事曰曽孫某侯某稱國者逺辟天子曲禮祭稱孝子孝孫雜記祭王父曰皇祖考王母曰皇祖妣父曰皇考母曰皇妣夫曰皇辟更設稱號尊神異於人也皇君也考成也言其徳行之成也妣之言嫓也嫓於考也辟法也妻所取法也曲禮凡祭宗廟之禮牛曰一元大武豕曰剛鬛豚曰腯肥羊曰柔毛雞曰翰音犬曰羮献雉曰疏趾兔曰明視脯曰尹祭槀魚曰商祭鮮魚曰脡祭水曰清滌酒曰清酌黍曰薌合粱曰香萁稷曰明粢稲曰嘉蔬韭曰豐本鹽曰鹹鹺玉曰嘉玉幣曰量幣號牲物者異於人用也元頭也武迹也腯亦肥也春秋傳作腯腯充貌也翰猶長也羮献食人之餘也尹正也商猶量也脡直也萁辭也嘉善也稻菰蔬之属也豐茂也大鹹曰鹺今河東云幣帛也同上凡祭不諱廟中不諱謂祝嘏之辭中有先君之名者也凡祭祭羣神廟中上不諱下玉藻大宗伯凡祀大神享大鬼祭大示詔大號大號六號之大者以詔大祝以為祝辭春官右祝號后稷之祀易富也其辭恭其欲儉其禄及子孫富之言備也以傳世之禄共儉者之祭易備也詩曰后稷兆祀庶無罪悔以迄于今兆四郊之祭處也迄至也言祀后稷于郊以配天庶幾其無罪悔乎福禄傳世以至于今表記祝嘏辭說藏於宗祝巫史非禮也是謂幽國藏於宗祝巫史言君不知有也幽闇也國闇者君與大夫俱不明也運禮隨季梁曰祝史正辭信也正辭不虚稱君美今祝史矯舉以祭臣不知其可也詐稱功徳以欺鬼神公曰吾牲牷肥腯粢盛豐備何則不信牲牛羊豕也牷純色完全也腯亦肥也黍稷曰粢在器曰盛對曰夫民神之主也言鬼神之情依民而行是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也博廣也碩大也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也雖告神以博碩肥腯其實皆當兼此謂民力適完則六畜既大而滋也皮毛無疥癬兼備而無有所闕奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也三時春夏秋奉酒醴以告曰嘉栗㫖酒嘉善也栗敬謹也謂其上下皆有嘉徳而無違心也所謂馨香無讒慝也馨香之逺聞氏桓六年左傳鬱人大祭祀與量人受舉斝之卒爵而飲之斝受福之斝聲之誤也王酳尸尸嘏王比其卒爵也少牢饋食禮主人受嘏詩懷之卒爵執爵以興出宰夫以籩受嗇黍主人嘗之乃還献祝此鬱人受王之卒爵亦王出房時也必與量人者鬱人賛祼尸量人制從献之脯㸋事相成春官量人凡宰祭與鬱人受斝歴而皆飲之言宰祭者家宰佐王祭亦容攝祭鄭司農云斝讀如嫁娶之嫁是器名明堂位曰爵夏后氏以琖殷以斝周以爵𤣥謂斝讀如嘏尸之嘏宰冢宰夏官右受爵膳夫凡王祭祀則徹王之胙俎膳夫親徹胙俎胙俎最尊也其餘則其属徹之官天大祝既祭令徹小祝大祭祀賛徹並春官小子祭祀受徹焉凡祭於公者必自徹其俎臣不敢煩君使也大夫以下或使人歸之祭於公助祭於君也曲禮右徹肆師先祭祀禮成則告事畢小祝大祭祀逆尸並春官右禮畢送尸司巫凡祭事守瘞謂若祭地祇有埋牲玉者也守之者以祭禮未畢若有事然祭禮畢則去之官春右守瘞大宗伯以脤膰之禮親兄弟之國脤脯社稷宗廟之肉以賜同姓之國同福祿也兄弟有共先王者魯定公十四年天王使石尚來歸脤春官大行人歸脤以交諸侯之福交或往或來者也秋官都宗人掌都祭祀之禮凡都祭祀致福於國都或有山川及因國無主九皇六十四氏之祀王子弟則立其祖王之廟其祭祀王皆賜禽焉主其禮者警戒之紏其戒具其來致福則帥而以造祭僕家宗人掌家祭祀之禮凡祭祀致福大夫采地之所祀與都同若先王之子孫亦有祖廟並春官為人祭曰致福為已祭而致膳於君子曰膳祔練曰告此皆致祭祀之餘於君子也攝主言致福申其辭也自祭言膳謙也祔練言告不敢以為福膳也凡膳告於君子主人展之以授使者于阼階之南展省具也南面再拜稽首送反命主人又再拜稽首其禮大牢則以牛左肩臂臑折九箇少牢則以羊左肩七箇犆豕則以豕左肩五箇折斷分之也皆用左者右以祭也羊豕不言臂臑因牛序之可知少儀祭僕凡祭祀致福者展而受之臣有祭事必致祭肉於君所謂歸胙也展謂録視其牲體數體數者大牢則以牛左肩臂臑折九箇少牢則以羊左肩七箇特牲則以豕左肩五箇夏官膳夫凡祭祀之致福者受而膳之致福謂諸臣祭祀進其餘肉歸胙于王鄭司農云膳夫受之以給王膳天官右致福定公十四年天王使石尚來脤脤祭肉天子祭畢以之賜同姓諸侯親兄弟之國與之共福脤者何也俎實也祭肉也生曰脤熟曰膰其辭石尚士也辭猶書也何以知其士也天子之大夫不名石尚欲書春秋欲著名於春秋諫曰乆矣周之不行禮於魯也請行脤貴復正也榖梁傳僖公九年夏㑹于葵丘王使宰孔賜齊侯胙胙祭肉尊之比二王後曰天子有事于文武有祭事也使孔賜伯舅胙天子謂異姓諸侯曰伯舅齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜七十曰耋級等也對曰天威不違顔咫尺言天鑒察不逺威嚴常在顔面之前八寸曰咫小白余敢貪天子之命無下拜小白齊侯名余身也恐隕越于下隕越顛隊也據天王在上故言恐顛隊于下以遺天子羞敢不下拜下拜登受拜堂下受胙於堂上左氏傳宋先代之後也於周為客天子有事膰焉有事祭宗廟也膰祭肉尊之故賜以祭胙僖二十四年左氏傳子産曰孔張君之昆孫子孔之嗣也喪祭有職有所主受脤歸脤受胙謂君祭以肉賜大夫歸脤謂大夫祭歸肉於公皆社之戎祭也傳昭十六年左氏孔子為魯司冦不用從而祭燔肉不至不脫冕而行不知者以為為肉也其知者以為為無禮也孟子祭於公不宿肉祭肉不出三日出三日不食之矣助祭於公所得胙肉歸即頒賜不俟經宿者不留神惠也家之祭肉則不過三日皆以分賜蓋過三日則肉必敗而人不食之是褻鬼神之餘也但比君所賜胙可少緩耳朋友之饋雖車馬非祭肉不拜朋友有通財之義故雖車馬之重不拜祭肉則拜者敬其祖考同於己親也此一節記孔子交朋友之義並論語大宗伯若王不與祭祀則攝位王有故代行其祭事凡大祭祀王后不與則攝而薦豆籩徹薦徹豆籩王后之事春官祭僕掌受命于王以眂祭祀而警戒祭祀有司糾百官之戒具謂王有故不親祭也祭祀有司有事於祭祀者糾謂校録所當具之牲物既祭帥羣有司而反命以王命勞之誅其不敬者凡祭祀王之所不與則賜之禽都家亦如之鄭司農云王之所不與謂非郊廟尊祭祀則王不與也則賜之禽公卿自祭其先祖則賜之禽也𤣥謂王所不與同姓有先王之廟夏官右不與祭君子之祭也必身親涖之有故則使人可也祭統孔子曰吾不與祭如不祭又記孔子之言以明之言已當祭之時或有故不得與而使他人攝之則不得致其如在之誠故雖已祭而此心缺然如未嘗祭也論語祭過時不祭曾子問曰天子嘗禘郊社五祀之祭簠簋既陳天子崩后之喪如之何孔子曰廢既陳謂夙興陳饌牲器時也天子七祀言五者闗中言之曾子問曰當祭而日食大廟火其祭也如之何孔子曰接祭而已矣如牲至未殺則廢接祭而已不迎尸也天子崩未殯五祀之祭不行既殯而祭其祭也尸入三飯不侑酳不酢而已矣自啟至於反哭五祀之祭不行已𦵏而祭祝獻畢而已既葬弥吉畢献祝而後止郊社亦然唯嘗禘宗廟俟吉也問並曾子喪三年不祭惟祭天地社稷為越紼而行事不敢以卑廢尊越猶躐也紼輴車索王制曾子問曰諸侯之祭社稷俎豆既陳聞天子崩后之喪君薨夫人之喪如之何孔子曰廢亦謂夙興陳饌牲器時也自薨比至於殯自啟至於反哭奉帥天子帥循也所奉循如天子者謂五祀之祭也社稷亦然曾子問曰大夫之祭鼎俎既陳籩豆既設不得成禮廢者幾孔子曰九請問之曰天子崩后之喪君薨夫人之喪君之大廟火日食三年之喪齊衰大功皆廢外喪自齊以下行也齊衰異門則祭其齊衰之祭也尸入三飯不侑酳不酢而已矣大功酢而已矣小功緦室中之事而已矣室中之事謂賓長献士之所以異者緦不祭然則士不得成禮者十一所祭於死者無服則祭謂若舅舅之子從母昆弟已上曾子問大夫士将與祭於公既視濯而父母死則猶是與祭也次於異宮既祭釋服出公門外哭而歸其他如奔喪之禮如未視濯則使人告告者反而后哭猶亦當為由次於異宫不可以吉與凶同處也使告反而後哭不敢専已於君命也如諸父昆弟姑姊妹之喪則既宿則與祭卒事出公門釋服而后歸其他如奔喪之禮如同宮則次于異宮宿則與祭出門乃解祭服皆謂差緩也雜記右廢祭宣公八年夏六月辛巳有事于大廟仲遂卒于垂壬午猶繹萬入去籥有事祭也仲遂卒與祭同日畧書有事為繹張本繹又祭陳昨日之禮所以賔尸萬舞名籥管也猶者可止之辭魯人知卿佐之喪不宜作樂而不知廢繹故内舞去籥惡其聲聞有事于大廟襄仲卒而繹非禮也春秋左氏傳仲尼曰非禮也卿卒不繹檀弓萬者何干舞也籥者何籥舞也其言萬入去籥何去其有聲者不欲令人聞之也廢其無聲者廢置也置者不去也齊人語存其心焉爾存其心焉爾者何知其不可而為之也明其心猶存于樂知其不可故去其有聲者而為之猶者何通可以已也禮大夫死為廢一時之祭有事于廟而聞之者去樂卒事卒事而聞之者廢繹日者起明日也言入者據未奏去籥時書凡祭自三年喪已下各以日月廢時祭唯郊社越紼而行事公羊傳聞大夫之喪則去樂卒事去籥萬卒祭事言今不然壬午猶繹猶者何可以已之辭也繹者祭之旦日之享賓也萬入去籥以其為之變譏之也内舞去籥惡其聲聞此為卿變于常禮是知其不可而為之穀梁傳昭公十五年二月癸酉有事于武宮籥入叔弓卒去樂卒事略書有事為叔弓卒起也武宫魯武公廟成六年復立之禘叔弓涖事籥入而卒去樂卒事禮也大臣卒故為之去樂左氏傳其言去樂卒事何禮也以加録卒事即非禮但當言去樂而已若去籥矣總言樂者明悉去也君有事于廟聞大夫之喪去樂恩痛不忍舉卒事畢其祭事大夫聞君之喪攝主而往主謂已主祭者臣聞君之喪義不可以不即行故使兄弟若宗人攝行主事而往不廢祭者古禮也古有分土無分民大夫不世己父未必為今君臣也孝經曰資於事父以事君而敬同大夫聞大夫之喪尸事畢而往賓尸事畢而往也公羊傳君在祭樂之中聞大夫之喪則去樂卒事禮也祭樂者君在廟中祭作樂君在祭樂之中大夫有變以聞可乎變謂死喪大夫國體也君之卿佐是謂股肱故曰國體古之人重死君命無所不通死者不可復生重莫大焉是以君雖在祭樂之中大夫死以聞可也榖梁傳衛有大史曰栁荘寢疾公曰若疾革雖當祭必告革急也公再拜稽首請於尸曰有臣栁荘也者非寡人之臣社稷之臣也聞之死請往急弔賢者不釋服而往遂以襚之與之邑裘氏與縣潘氏書而納諸棺曰世世萬子孫毋變也脫君祭服以襚臣親賢也所以此襚之者以其不用襲也凡襚以歛所以厚賢也裘縣潘邑名檀弓諸侯之宫縣而祭以白牡擊玉磬朱干設錫冕而舞大武乗大路諸侯之僭禮也言此皆天子之禮也宫縣四面縣也干盾也錫傅其背如龜也武萬舞也白牡大路天子之禮也郊特牲大夫具官祭器不假聲樂皆具非禮也是謂亂國臣之奢富擬於國君敗亂之國也孔子謂管仲官事不攝焉得儉祝嘏辭說藏於宗祝巫史非禮也是謂幽國藏於宗祝巫史言君不知有也幽闇也國闇者君與大夫俱不明也醆斝及尸君非禮也是謂僭君僭君之禮也醆斝先王之爵也唯魯與王者之後得用之耳其餘諸侯用時王之器而已禮運右失禮髙宗肜日越有雊雉肜祭明日又祭之名殷曰肜周曰繹雊鳴也於肜日雊雉之異蓋祭禰廟也序言湯廟者非是祖已曰惟先格王正厥事格正也猶格其非心之格詳下文髙宗祀豐于昵昵者禰廟也豐于昵失禮之正故有雊雉之異祖已自言當先格王之非心然後正其所失之事惟天監民以下格王之言王司敬民以下正事之言也乃訓於王曰惟天監下民典厥義降年有永有不永非天夭民民中絶命典主也義者理之當然行而宜之之謂言天監視下民其禍福予奪惟主義如何爾降年有永有不永者義則永不義則不永非天夭折其民民自以非義而中絶其命也意髙宗之祀必有祈年請命之事如漢武帝五時祀之類祖已言永年之道不在禱祠在於所行義與不義而已禱也祠非永年之道也言民而不言君者不敢斥民有不若徳不聽罪天既孚命正厥徳乃曰其如台不若徳不順於徳不聽罪不服其罪謂不改過也孚命者以妖孽為符信而譴告之也言民不順徳不服罪天既以妖孽為符信而譴告之欲其恐懼修省以正徳民乃曰孽祥其如我何則天必誅絶之矣祖已意謂髙宗當因雊雉以自省不可謂適然而恕夫數祭豐昵徼福於神不若徳也黷於祭祀傅說常以進戒意或吝改不聽罪也雊雉之異是天既孚命正厥徳矣其可謂妖孽其如我何耶嗚呼王司敬民罔非天𦙍典祀無豐于昵司主𦙍嗣也王之職主於敬民而已徼福于神非王之事也况祖宗莫非天之嗣主祀其可獨豐於昵廟乎髙宗肜日初平王之東遷也周幽王為犬戎所殺平王嗣位故東遷洛邑辛有適伊川見被髮而祭於野者辛有周大夫伊川周地伊水也曰不及百年此其戎乎其禮先亡矣被髮而祭有象夷狄春秦晉遷陸渾之戎于伊川允姓之戎居陸渾在秦晉西北誘而徙之伊川遂從戎號至今為陸渾縣也計此去辛有過百年而云不及百年傳舉其事驗不必其年信僖二十二年左氏傳孔子曰昔臧文仲安知禮夏父弗綦逆祀而不止燔柴於竈以祀焉夫竈者老婦之所祭謂祭竈報其功老婦主祭也盛於瓮尊於瓶非所祭也家語孔子曰晏平仲祀其先人豚肩不揜豆賢大夫也而難為下也言其偪士庶人也豚俎實豆徑尺言并豚兩肩不能覆豆喻小也雜記禮書綱目卷四十四
