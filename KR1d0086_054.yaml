body:
  text: 禮書綱目卷五十二婺源江永撰田役軍禮五補大宗伯以軍禮同邦國大田之禮簡衆也古者因田習兵閲其車徒之數大役之禮任衆也築宫邑所以事民力强弱春官小宰以官府之六聨合邦治五曰田役之聨事以法掌祭祀之戒具田役亦如之令百官府共其財用治其施舍聽其治訟詳見通禮職官下篇宰夫凡禮事贊小宰比官府之具同上士師以五戒先後刑罰三曰禁用諸田役禁則軍禮曰無干車無自後射此其類也秋官右通言田役春獵為蒐搜索取不任者夏獵為苗為苗稼除害秋獵為獮順殺氣也冬獵為狩得獸取之無所擇宵田為獠管子曰獠獵畢弋今江東亦呼獵為獠或曰即今夜獵載鑪照也火田為狩放火燒草獵亦為狩爾雅大司馬中春教振旅司馬以旗致民平列陳如戰之陳以旗者立旗期民於其下也兵者守國之備孔子曰以不教民戰是謂棄之兵者凶事不可空設因蒐狩而習之凡師出曰治兵入曰振旅皆習戰也四時各教民以其一焉春習振旅兵入收衆專於農平猶正也辨鼓鐸鐲鐃之用王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲鼔人職曰以路鼓鼓鬼享以賁鼓鼓軍事以晉鼓鼓金奏以金鐃止鼓以金鐸通鼓以金鐲節鼓鄭司農云辨鼓鐸鐲鐃之用謂鉦鐸之屬鐲讀如濁其源之濁鐃讀如讙嘵之嘵提讀如攝提之提謂馬上鼔有曲木提持立馬髦上者故謂之提杜子春云公司馬謂五人為伍伍之司馬也𤣥謂王不執賁鼓尚之於諸侯也伍長謂之公司馬者雖卑同其號以教坐作進退疾徐疏數之節習戰法遂以蒐田有司表貉誓民鼔遂圍禁火弊獻禽以祭社春田為蒐有司大司徒也掌大田役治徒庶之政令表貉立表而貉祭也誓民誓以犯田法之罰也誓曰無干車無自後射立旌遂圍禁旗弊爭禽而不審者罰以假馬禁者虞衡守禽之厲禁也既著令鼓而圍之遂蒐田火弊火止也春田主用火因焚萊除陳草皆殺而火止獻猶致也屬也田止虞人植旌衆皆獻其所獲禽焉詩云言私其豵獻豜于公春田主祭社者土方施生也鄭司農云貉讀為禡禡謂師祭也書亦或為禡中夏教茇舍如振旅之陳羣吏撰車徒讀書契辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事其他皆如振旅茇讀如萊沛之沛茇舍草止之也軍有草止之法撰讀曰算算車徒謂數擇之也讀書契以簿書校録軍實之凡要號名者徽識所以相别也鄉遂之屬謂之名家之屬謂之號百官之屬謂之事在國以表朝位在軍又象其制而為之被之以備死事帥謂軍將及師帥旅舍至伍長也以門名者所被徽識如其在門所樹者也凡此言以也象也皆謂其制同耳軍將皆命卿古者軍將蓋為營治於國門魯有東門襄仲宋有桐門右師皆上卿為軍將者也縣鄙謂縣正鄙師至鄰長也家謂食采地者之臣也鄉以州名亦謂州長至比長也野謂公邑大夫百官以其職從王者此六者皆書其官與名氏焉門則襄仲右師明矣鄉則南鄉甀東鄉為人是也其他象此云某某之名某某之號某某之事而已未盡聞也鄉遂大夫文錯不見以其素信於民不為軍將或為諸帥是以闕焉夜事戒夜守之事草止者慎於夜於是主别其部職遂以苗田如蒐之法車弊獻禽以享礿夏田為苗擇取不孕任者若治苗去不秀實者云車弊驅獸之車止也夏田主用車示所取物希者皆殺而車止王制曰天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵礿宗廟之夏祭也冬夏田主於祭宗廟者隂陽始起象神之在内中秋教治兵如振旅之陳辨旗物之用王載大常諸侯載旂軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅軍吏諸軍帥也師都遂大夫也鄉遂鄉大夫也或載旜或載物衆屬軍吏無所將也郊謂鄉遂之州長縣正以下也野謂公邑大夫載旐者以其將羡卒也百官鄉大夫也載旟者以其屬衛王也凡旌旗有軍衆者書異物無者帛而已書當如畫事也號也皆畫以雲氣遂以獮田如蒐田之法羅弊致禽以祀祊秋田為獮獮殺也羅弊罔止也秋田主用罔中殺者多也皆殺而罔止祊當為方聲之誤也秋田主祭四方報成萬物詩曰以社以方中冬教大閲春辨鼓鐸夏辨號名秋辨旗物至冬大閲簡軍實凡頒旗物以出軍之旗則如秋以尊卑之常則如冬司常佐司馬時也大閲備軍禮而旌旗不如出軍之時空辟實前期羣吏戒衆庶脩戰法羣吏鄉師以下虞人萊所田之野為表百歩則一為三表又五十歩為一表田之日司馬建旗于後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐鄭司農云虞人萊所田之野芟除其草萊令車得驅馳詩曰田卒汚萊𤣥謂萊芟除可陳之處後表之中五十歩表之中央表所以識正行列也四表積二百五十歩左右之廣當容三軍歩數未聞致致之司馬質正也弊仆也皆坐當聽誓羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之羣吏諸軍帥也陳前南面鄉表也月令季秋天子執於田獵以習五戎司徒搢朴北面以誓之此大閲禮實正歲之中冬而説季秋之政於周為中冬為月令者失之矣斬牲者小子也凡誓之大略耳誓湯誓之屬是也中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐中軍中軍之將也天子六軍三三而居一徧羣吏既聽誓各復其部曲中軍之將令鼓鼓以作其士衆之氣也鼓人者中軍之將師帥旅帥也司馬兩司馬也振鐸以作衆作起也既起鼓人擊鼓以行之伍長鳴鐲以節之伍長一曰公司馬及表自後表前至第二表也三鼔者鼓人也鄭司農云摝讀如弄𤣥謂如涿鹿之鹿掩上振之為摝摝者止行息氣也司馬法曰鼓聲不過閶鼙聲不過闒鐸聲不過琅又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初趨者赴敵尚疾之漸也春秋傳曰先人有奪人之心及表自第二前至第三乃鼓車馳徒走及表乃止及表自第三前至前表鼓戒三闋車三發徒三刺鼓戒戒攻敵鼓壹闋車壹轉徒壹刺三而止象服敵乃鼓退鳴鐃且郤及表乃止坐作如初鐃所以止鼔軍退卒長鳴鐃以和衆鼓人為止之也退自前表至後表鼓鐸則同習戰之禮出入一也異者廢鐲而鳴鐃遂以狩田以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗居卒閒以分地前後有屯百歩有司廵其前後險野人為主易野車為主冬田為狩言守取之無所擇也軍門曰和今謂之壘門立兩旗以為之叙和出用次第出和門也左右或出而左或出而右有司平之鄉師居門正其出入之列也旗軍吏所載分地謂其部曲疏數前後有屯百歩車徒異羣相去之數也車徒畢出和門鄉師又巡其行陳鄭司農云險野人為主人居前易野車為主車居前既陳乃設驅逆之車有司表貉于陳前驅驅出禽獸使趨田者也逆逆要不得令走設此車者田僕也中軍以鼙令鼓鼓人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小禽私之獲者取左耳羣司馬謂兩司馬也枚如箸銜之有繣結項中軍法止語為相疑惑也進行也鄭司農云大獸公之輸之於公小禽私之以自畀也詩云言私其豵獻肩于公一歲為豵二歲為豝三歲為特四歲為肩五歲為慎此明其獻大者於公自取其小者𤣥謂慎讀為麎爾雅曰豕生三曰豵豕牡曰豝麋牝曰麎獲得也得禽獸者取左耳當以計功及所弊鼓皆駴車徒皆譟鄭司農云及所弊至所弊之處𤣥謂至所弊之處田所當於止也天子諸侯蒐狩有常至其常處吏士鼓譟象攻敵尅勝而喜也疾雷擊鼓曰駴譟讙也書曰前師乃鼓䵾譟亦謂喜也徒乃弊致禽饁獸于郊入獻禽以享蒸徒乃弊徒止也冬田主用衆物多衆得取也致禽饁獸于郊聚所獲禽因以祭四方神於郊月令季秋天子既田命主祠祭禽四方是也入又以禽祭宗廟夏官鄉師凡四時之田前期出田法于州里簡其鼓鐸旗物兵器脩其卒伍田法人徒及所當有及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟司徒致衆庶者以熊虎之旗此又以之明為司徒致之大夫致衆當以鳥隼之旟陳之以旗物以表正其行列辨别異也故書巡作述屯或為臀鄭大夫讀屯為課殿杜子春讀為在後曰殿謂前後屯兵也𤣥謂前後屯車徒異部也今書多為屯從屯地官山虞若大田獵則萊山田之野及弊田植虞旗於中致禽而珥焉萊除其草萊也弊田田者止也植猶樹也田止樹旗令獲者皆致其禽而校其耳以知獲數也山虞有旗以其主山得畫熊虎其仭數則短也鄭司農云珥者取禽左耳以效功也大司馬職曰獲者取左耳澤虞若大田獵則萊澤野及弊田植虞旌以屬禽屬禽猶致禽而珥焉澤虞有旌以其主澤澤鳥所集故得注析羽並同上牧師凡田事贊焚萊焚萊者山澤之虞夏官大司徒火田役以旗致萬民而治其徒庶之政令旗畫熊虎者也徴衆刻日樹旗期於其下地官小司徒惟田與追胥竭作詳見下章州長若國作民而師田行役之事則帥而致之掌其戒令與其賞罰黨正凡作民而師田行役則以其法治其政事族師若作民而師田行役則合其卒伍簡其兵器以鼔鐸旗物帥而至掌其治令戒禁刑罰縣師若將有田役之戒則受法於司馬以作其衆庶及牛馬車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至遂人若起野役則令各帥其所治之民而至以遂之大旗至之其不用令者誅之師田作野民帥而至掌其政治禁令遂師田獵平野民掌其禁令比叙其事而賞罰縣正若將用野民師田行役則帥而至治其政令鄙師凡作民則掌其戒令酇長若作其民而用之則以旗鼓兵革帥而至稍人若有師田行役之事則以縣師之法作其同徒輂輦帥而以至治其政令以聽於司馬已上注並見征伐篇司常凡軍事建旌旗及致民置旗弊之始置旗以致民民至仆之誅後至者甸亦如之春官幕人凡田役共其帷幕幄帟綬共之者掌次當以張官天掌次師田則張幕設重帟重案諸侯師田則張幕設案孤卿有邦事則張幕設案注見征伐司弓矢田弋充籠箙矢兵矰矢籠竹箙也矰矢不在箙者為其相繞亂將用乃共之夏官司常及國之大閲贊司馬頒旗物王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旗仲冬教大閲司馬主其禮自王以下治民者旗畫成物之象王畫日月象天明也諸侯畫交龍一象其升朝一象其下復也孤卿不畫言奉王之政教而已大夫士雜帛言以先王正道佐職也師都六鄉六遂大夫也謂之師都都民所聚也畫熊虎者鄉遂出軍賦象其守猛莫敢犯也州里縣鄙鄉遂之官互約言之鳥隼象其勇捷也龜蛇象其扞難辟害也道車象路也王以朝夕燕出入斿車木路也王以田以鄙全羽析羽五色象其文徳也大閲王乗戎路建大常焉玉路金路不出皆畫其象焉官府各象其事州里各象其名家各象其號事名號者徽識所以題别衆臣樹之於位朝各就焉覲禮曰公侯伯子男皆就其旂而立此其類也或謂之事或謂之名或謂之號異外内也三者旌旗之細也士喪禮曰為銘各以其物亡則以緇長半幅頳末長終幅廣三寸書名于末此蓋其制也徽識之書則云某某之事某某之名某某之號今大閲禮象而為之兵凶事若有死事者亦當以相别也杜子春云畫當為書𤣥謂畫畫雲氣也異於在國軍事之飾春官巾車木路前樊鵠纓建大麾以田詳見通禮名器下篇司服凡甸冠弁服甸由獵也冠弁委貌其服緇布衣亦積素以為裳諸侯視朝之服詩國風曰緇衣之宜兮謂王服此以田春官小子凡師田斬牲以左右徇陳示犯誓必殺之夏官鄉士凡國有大事則戮其犯命者遂士凡郊有大事則戮其犯命者縣士凡野有大事則戮其犯命者野距王城二百里以外及縣都掌戮掌斬殺凡田役斬殺刑戮亦如之戮謂膊焚辜肆禁暴氏凡國聚衆庶則戮其犯禁者以徇並秋官校人田獵則帥驅逆之車帥猶將也夏官田僕掌馭田路以田以鄙田路木路也田田獵也鄙循行縣鄙掌佐車之政佐亦副設驅逆之車驅驅禽獸使前趨獲逆衙還之使不出圍令獲者植旌以告獲也植樹也及獻比禽田弊獲者各獻其禽比種物相從次數也凡田王提馬而走諸侯晉大夫馳提猶舉也晉猶抑也使人扣而舉之抑之皆止奔也馳放不扣同上甸祝掌四時之田表貉之祝號杜子春讀貉為百爾所思之百書亦或為禡貉兵祭也甸以講武兵故有兵祭詩曰是類是禡爾雅曰是類是禡師祭也𤣥謂田者習兵之禮故亦禡祭禱氣執之十百而多獲舍奠于祖廟禰亦如之舍讀為釋釋奠者告將時田若時征伐鄭司農云禰父廟師甸致禽于虞中乃屬禽及郊饁獸舍奠于祖禰乃歛禽禂馬皆掌其祝號師田謂起大衆以田也致禽於虞中使獲者各以其禽來致於所表之處屬禽别其種類饁饋也以所獲獸饋於郊薦於四方羣兆入又以奠於祖禰薦且告反也歛禽謂取三十入腊人焉杜子春云禂禱也為馬禱無疾為田禱多獲禽牲詩云既伯既禱爾雅曰既伯既禱馬祭也𤣥謂禂讀如伏誅之誅今侏大字也為牲祭求肥充為馬祭求肥健春官肆師凡四時之大甸獵祭表貉則為位貉師祭也貉讀為十百之百於所立表之處為師祭造軍法者禱氣勢之増倍也其神蓋蚩尤或曰黄帝同上司几筵甸役則設熊席右漆几謂王甸有司祭表貉所設席同上小宗伯凡王之甸役之禱祠肄儀為位注見征伐肆師凡甸用牲于社宗則為位注見征伐大僕田役贊王鼓王通鼓佐擊其餘面夏官鼓人軍動則鼓其衆田役亦如之地官銜枚氏田役令銜枚為其言語以相誤秋官獸人時田則守罟備獸觸攫及弊田令禽注于虞中弊仆也仆而田止鄭司農云弊田讀春火弊夏車弊秋羅弊冬徒弊虞中謂虞人釐所田之野及弊田植虞旗於中致禽而珥焉獸人主令田衆得禽者置虞人所立虞旗之中當以給四時社廟之祭故曰春獻禽以祭社夏獻禽以享禴秋獻禽以祀祊冬獻禽以享烝又曰大獸公之小禽私之公之謂輸之於虞中珥焉者取左耳以致功若斬首折馘故春秋傳曰以數軍實天官小宗伯若大甸則帥有司而饁獸于郊遂頒禽甸讀曰田有司大司馬之屬饁饋也以禽饋四方之神於郊郊有羣神之兆頒禽謂以予羣臣詩傳曰禽雖多擇取三十焉其餘以予大夫士以習射於澤宫而分之春官肆師獮之日涖卜來歲之戒秋田為獮始習兵戒不虞也卜者問後歲兵冦之備同上迹人掌邦田之地政為之厲禁而守之田之地若今苑也凡田獵者受令焉令謂時與處也禁麛卵者與其毒矢射者為其夭物且害必多也麛麋鹿子地官天子諸侯無事則歲三田三田者夏不田蓋夏時也周禮春曰蒐夏曰苗秋曰獵冬曰狩一為乾豆二為賔客三為充君之庖乾豆謂腊之以為祭祀豆也庖今之厨也無事而不田曰不敬田不以禮曰暴天物不敬者簡祭祀畧賔客天子不合圍諸侯不掩羣為盡物也天子殺則下大綏諸侯殺則下小綏綏當為緌綏有虞氏之旌旗也下謂弊之大夫殺則止佐車佐車止則百姓田獵佐車驅逆之車豺祭獸然後田獵昆蟲未蟄不以火田取物必順時侯也昆明也明蟲者得陽而生得隂而藏不麛不卵不殺胎不殀夭重傷未成物殀斷殺少長曰夭王制王田不取羣不盡羣也易曰王用三驅失前禽也國語周語國君春田不圍澤大夫不掩羣士不取麛卵生乳之時重傷其類曲禮孟夏毋大田獵季秋天子乃教於田獵以習五戎班馬政命僕及七騶咸駕載旐授車以級整設於屏外司徒搢扑北面誓之天子乃厲飾執弓挾矢以獵命主祠祭禽于四方孟冬天子乃命將帥講武習射御角力注並見月令十一月王狩陳筋革嗇人不從夏小正大宰以八則治都鄙八曰田役以馭其衆詳見封建唯為社田國人畢作畢作人則盡行非徒羡也郊特牲右田以之田獵有禮故戎事閑也若無禮田獵戎事失其策策謀也居仲尼燕季春出火為焚也謂焚萊也凡出火以火出建辰之月火始出然後簡其車賦而歴其卒伍而君親誓社以習軍旅左之右之坐之起之以觀其習變也簡歴謂算具陳列之君親誓社誓吏士以習軍旅既而遂田以祭社也言祭社則此是仲春之禮也仲春以火田田止弊火然後獻禽至季春火出而民乃用火今云季春出火乃誓社記者誤也社或為省而流示之禽而鹽諸利以觀其不犯命也流猶行也行行田也鹽讀為豓行田示之以禽使歆豓之觀其用命不也謂禽為利者凡田大獸公之小禽私也求服其志不貪其得失伍而獲猶為犯命故以戰則克以祭則受福郊特牲因蒐狩以習用武事禮之大者也艾蘭以為防蘭香草也防謂田之大限置旃以為轅門旃旌旗之名周禮通帛為旃轅門卬車以其轅表門以葛覆質以為𣙗質椹也𣙗門中臬葛或為褐流旁握御轚者不得入流旁握謂車兩轊頭各去門邊空握握四寸也轚挂則不得入門車軌塵車不出塵馬候蹄發足相應遲疾相投揜禽旅揜取衆禽御者不失其馳然後射者能中不失馳騁之節過防弗逐不從奔之道也戰不逐奔之義面傷不獻嫌誅降不成禽不獻惡虐㓜小禽雖多天子取三十焉其餘與十衆以習射於射宫取三十以共乾豆賔客君之庖射宫澤宫射而中田不得禽則得禽田得禽而射不中則不得禽是以知古之貴仁義而賤勇力也射以不爭為仁揖讓為義于昭八年蒐紅榖梁傳田者大艾草以為防言田獵者必大芟殺野草以為防限作田獵之場擬殺圍之處或舍其中或復止舍其中謂未田之前誓士戒衆故發示戰法當在其間止舍也其防之廣狹無文褐纒旃以為門既為防院當設周衞而立門焉乃以織毛褐布纒通帛旃之竿以為門之兩傍其門蓋南開並為二門用四旃四褐也裘纒質以為又以裘纒椹質以為門中之闑闑車軌之裏兩邊約車輪者閒容握驅而入擊則不得入其門之廣狹兩軸頭去旃竿之間各容一握握人四指為四寸是門廣於軸八寸也入此門當馳走而入不得徐也以教戰試其能否故令驅焉若驅之其軸頭擊著門傍旃竿則不入也所以罰不工也左者之左右者之右然後焚而射焉以天子六軍分為左右雖同舍防内令三軍各在一方取左右相應其屬左者之左門屬右者之右門不得越離部伍以此故有二門也教戰既畢士卒出和乃分地為屯既陳車驅卒奔驅禽内之於防然後焚燒此防草在其中而射之天子發然後諸侯發諸侯發然後大夫士發天子發抗大綏諸侯發抗小綏獻禽於其下發謂發矢射之也其天子發則先抗舉其大綏諸侯發則舉其小綏必舉此綏為表天子諸侯殺時因獻其禽于其下也抗綏謂既射舉之因置虞旗於其中受而致禽焉受禽獵止則弊之故王制曰天子殺則下大綏諸侯殺則下小綏註云下謂弊之是殺禽巳訖田止而弊綏也各舉始終之一故與此不同也故戰不出頃田不出防不逐奔走古之道也戰不出所期之頃田不出所芟之防不逐奔走謂出於頃防者不逐之詩毛傳古之道五十不為甸徒頒禽隆諸長者而弟逹乎獀狩矣四井為邑四邑為㐀四丘為甸甸六十四井也以為軍田出役之法五十始衰不從力役之事也頒之言分也隆猶多也及田者分禽多其老者謂竭作未五十者春獵為獀冬獵為狩也祭義臧僖伯曰凡物不足以講大事臧僖伯公子彄也僖謚也大事祀與戎其材不足以備器用則君不舉焉材謂皮革齒牙骨角毛羽也器用軍國之器君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也言器用衆物不入法度則為不軌不物亂敗之所起故春蒐夏苗秋獮冬狩蒐索擇取不孕者苗為苗除害也獮殺也以殺為名順秋氣也狩圍守也冬物畢成獲則取之無所擇也皆於農隙以講事也各隨時事之間三年而治兵入而振旅雖四時講武猶復三年而大習出曰治兵始治其事入曰振旅治兵禮畢振旅而還振整也旅衆也歸而飲至以數軍實飲於廟以數車徒器械及所獲也昭文章車服旌旗明貴賤辨等列等列行伍順少長出則少者在前還則在後所謂順也習威儀也鳥獸之肉不登於爼爼祭宗廟器皮革齒牙骨角毛羽不登於器謂以飾法度之器則君不射古之制也若夫山林川澤之實器用之資皁𨽻之事官司之守非君所及也士臣皁皁臣輿輿臣𨽻言取此雜猥之物以資器備是小臣有司之職非諸侯之所親也隠五年左氏傳出為治兵尚威武也㓜賤在前貴勇力入為振旅反尊卑也尊老在前復常儀也雅爾已有三牲必田狩者孝子之意以為巳之所養不如天地自然之牲逸豫肥羙禽獸多則傷五榖因習兵事又不空設故因以捕禽獸所以共承宗廟示不忘武備又因以為田除害鮮者何也秋取嘗也取禽嘗祭秋取嘗何以也習鬭也習鬭也者男子之事也然而戰鬭不可不習故於搜狩閑之也閑之者貫之也貫之也者習之也已祭取餘獲陳於澤澤射宫也然後卿大夫相與射命中者雖不中取也命不中者雖中不取何以也所以貴揖讓之取而賤勇力之取也曏之取於囿中勇力之取也今之取於澤揖讓之取也尚書大傳春曰蒐夏曰苗秋曰獮冬曰狩苗者謂何曰苗者毛也取之不圍澤不揜羣取大禽不麛不卵不殺孕重者春蒐者不殺小麛及孕重者冬狩皆取之百姓皆出不失其時不扺禽不詭遇逐不出防此苗獮蒐狩之義也故苗獮蒐狩之禮簡其戎事也故苗者毛取之蒐者搜索之狩者守留之夏不田何也曰天地隂陽盛長之時猛獸不攫鷙鳥不搏蝮蠆不螫鳥獸蟲虵且知應天而况人乎哉是以古者必有豢牢其謂之畋何聖人舉事必反本五榖者以奉宗廟養萬民也去禽獸害稼穡者故以田言之聖人作名號而事義可知也賈誼新書湯見祝網者置四面其祝曰從天墜者從地出者從四方來者皆離吾網湯曰嘻盡之矣非桀其孰為此湯乃解其三面置其一面更教之祝曰昔蛛蝥作網今之人循序欲左者左欲右者右欲高者高欲下者下吾取其犯命者其憚害物也如是漢南之國聞之曰湯之徳及禽獸矣四十國歸之同上昔周辛甲之為大史也命百官官箴王闕辛甲周武王太史闕過也使百官各為箴辭戒王過於虞人之箴虞人掌田獵曰芒芒禹迹畫為九州芒芒逺貌畫分也經啓九道啓開九州之道民有寢廟獸有茂草各有攸處徳用不擾人神各有所歸故徳不亂在帝夷羿冒於原獸冒貪也亡其國恤而思其麀牡言但念獵武不可重重猶數也用不恢於夏家羿以好武雖有夏家而不能恢大之獸臣司原敢告僕夫獸臣虞人告僕夫不敢斥尊襄四年左氏傳虢文公諫宣王曰三時務農而一時講武故征則有威守則有財詳通禮朝廷禮車攻宣王復古也宣王能内修政事外攘夷狄復文武之竟土修車馬備器械復㑹諸侯於東都因田獵而選車徒焉詩序我車既攻我馬既同四牡龐龐駕言徂東攻堅同齊也傳曰宗廟齊豪尚純也戎事齊力尚强也田獵齊足尚疾也龐龐充實也東東都洛邑也衰周廢公相成王營洛邑為東都以朝諸侯周室既久其禮至於宣王内修政事外攘夷狄復文武之境車土修車馬備器械復會諸侯於東都因田獵而選徒焉故詩人作此以羙之首章汛言將往東都也田車既好四牡孔阜東有甫草駕言行狩田車田獵之車好善也阜盛大也甫草甫田也後為鄭地今開封府中牟縣西圃田澤是也宣王之時未有鄭國圃田屬東都畿内故往田也此章指言將往狩于圃田也之子于苗選徒囂囂建旐設旄搏獸于敖之子有司也苗狩獵之通名也選數也囂囂聲衆盛也數車徒者其聲囂囂則車徒之衆可知且車徒不譁而惟數者有聲又見其静治也敖近滎陽地名也此章言至東都而選徒以獵也駕彼四牡四牡奕奕赤芾金舄㑹同有繹奕奕連絡布散之貌赤芾諸侯之服金舄赤舄而加金飾亦諸侯之服也時見曰㑹殷見曰同繹陳列聨屬之貌也此章言諸侯來㑹朝於東都也決拾既佽弓矢既調射夫既同助我舉柴決以象骨為之著於左手大指所以鉤弦開體拾以皮為之著於左臂以遂弦故亦名遂佽比也調謂弓强弱與矢輕重相得也射夫蓋諸侯來㑹者同協也柴説文作㧘謂積禽也使諸侯之人助而舉之言獲多也也此章言既㑹同而田獵四黄既駕兩驂不猗不失其馳舍矢如破猗偏倚不正也馳馳驅之法也舍矢如破巧而力也蘓氏曰不善射御者詭遇則獲不然不能也今御者不失其馳驅之法而射者舍矢如破則可謂善射御矣此章言田獵而見其射御之善也蕭蕭馬鳴悠悠旆旌徒御不驚大庖不盈蕭蕭悠悠皆閑暇之貌徒歩卒也御御車也驚如漢書夜軍中驚之驚不驚言比卒事不喧譁也大庖君庖也不盈言取之有度不極欲也盖古者田獵獲禽面傷不獻踐毛不獻不成禽不獻擇取三等自左膘而射之逹于右腢為上殺以為乾豆奉宗廟逹右耳本者次之以為賔客射左髀逹于右䯚為下殺以充君庖毎禽取三十焉毎等得十其餘以與士大夫習射於澤宫中者取之是以獲雖多而君庖不盈也張子曰饌雖多而無餘者均及於衆而有法耳凡事有法則何患乎不均也舊説不驚驚也不盈盈也亦通此章言其終事嚴而頒禽均也之子于征有聞無聲允矣君子展也大成允信展誠也聞師之行而不聞其聲言至肅也信矣其君子也誠哉其大成也此章總叙其事之始終而深羙之也小雅吉日羙宣王田也詩序吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其羣醜戊剛日也伯馬祖也謂天駟房星之神也醜衆也謂禽獸之羣衆也馬此亦宣王之詩言田獵將用馬力故以吉日祭祖而禱之既祭而車牢馬徤於是可以歴險而從禽也以下章推之是日也其戊辰與吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所庚午亦剛日也差擇齊其足也同聚也鹿牝曰麀麌麌衆多也漆沮水名在西都畿内涇渭之北所謂洛水今自延韋流入鄜坊至同州入河也戊辰之日既禱矣越三日庚午遂擇其馬而乗之視獸之所聚麀鹿最多之處而從之惟漆沮之旁為盛宜為天子田獵之所也瞻彼中原其祁孔有儦儦俟俟或羣或友悉率左右以燕天子中原原中也祁大也趨則儦儦行則俟俟獸三曰羣二曰友燕樂也言從王者視彼禽獸之多於是率其同事之人各共其事以樂天子也既張我弓既挾我矢發彼小豝殪此大兕以御賔客且以酌醴發發矢也豕牝曰豝一矢而死曰殪兕野牛也言能中㣲而制大也御進也醴酒名周官五齊二曰醴齊注曰醴成而汁滓相將如今甜酒也東言射而獲禽以為爼實進於賓客而酌醴也萊吕氏曰車政吉日所以為復古者何也蓋蒐狩之禮可以見王賦之復焉可以見軍實之盛焉可以見師律之嚴焉可以見上下之情焉可以見綜理之周焉欲明文武之功業者此亦足以觀矣同上桓公四年春正月公狩于郎冬獵曰狩行三驅之禮得田狩之時故傳曰書時禮也周之春夏之冬也田狩從夏時郎非國内之狩地故書地書時禮也郎非狩地故唯時合禮傳左氏狩者何田狩也田者蒐狩之總名也古者肉食衣皮服捕禽者故謂之田取獸于田故曰狩易曰結繩罔以田魚春曰苗苗毛也明當見物取未懐妊者秋曰蒐蒐簡擇也簡擇㓜穉取其大者冬曰狩狩猶獸也冬時禽獸長大遭獸可取不以夏田者春秋制也以為飛鳥未去於巢走獸未離於穴恐傷害於幼穉故於苑囿中取之常事不書此何以書譏何譏爾逺也以其地逺禮諸侯田狩不過郊諸侯曷為必田狩據有囿也一曰乾豆二曰賔客三曰充君之庖一者第一之殺也自左膘射之逹於右腢中心死疾鮮潔故乾而豆之以薦於宗廟豆祭器名狀如鐙天子二十有六諸公十有六諸侯十有二卿上大夫八下大夫六士二二者第二之殺也自左膘射之逹於右脾遠心死難故以為賔客充備也庖廚也三者第三之殺也自左膘射之逹於右􅠛中腸􅠛汚泡死遲故以充君之庖廚已有三牲必田狩者孝子之意以為巳之所養不如天地自然之牲逸豫肥羙禽獸多則傷五榖因習兵事又不空設故因以捕禽獸所以共承宗廟示不忘武備又因以為田除害狩例時此月者譏不時也周之正月夏之十一月陽氣始施鳥獸懐任草木萌芽非所以養㣲公羊傳四時之田皆為宗廟之事也春曰田取獸於田夏曰苖因為苖除害故曰苗秋曰蒐蒐擇之舍小取大冬曰狩狩圍狩也冬物畢成獲則取之無所擇四時之田用三焉唯其所先得一為乾豆上殺中心死速乾之以為豆實可以祭祀二為賔客次殺射髀骼死差遲三為充君之庖下殺中腸汚泡死最遲先宗廟次賔客後庖廚尊神敬客之義穀梁傳桓公六年秋八月壬午大閲齊為大國以戎事徵諸侯之戌嘉羙鄭忽而忽欲以有功為班怒而訴齊魯人懼之故以非時簡車馬簡車馬也左氏傳大閲者何簡車徒也大簡閲兵車使可任用而習之何以書蓋以罕書也罕希也孔子曰以不教民戰是謂棄之故比年簡徒謂之蒐三年簡車謂之大閲五年大簡車徒謂之大蒐存不忘亡安不忘危公羊傳大閲者何簡兵車也閲為簡練修教明諭國道也修先王之教以明逹於民治國之道平而修戎事非正也邵曰禮因四時田獵以習用戎事存不忘亡安不忘危之道平謂不因田獵無事而修之榖梁傳莊公八年春王正月甲午治兵治兵於廟習號令將以圍郕公羊作祠兵治兵于廟禮也左氏傳出曰祠兵禮兵不徒使故將出必祠于近郊陳兵習戰殺牲饗士卒入曰振旅五百人曰旅其禮一也皆習戰也言與祠兵禮如一將出不嫌不習故以祠兵言之將入者嫌於廢之故以振訊士衆言之互相見也祠兵壯在前難在前振旅壯者在後復長㓜且衛後也公羊傳晉侯始入而教其民二年欲用之子犯曰民未知禮未生其共於是乎大蒐以示之禮蒐順少長明貴賤傳僖二十七年左氏昭公八年秋蒐于紅革車千乗不言大者經文闕也紅魯地大蒐于紅自根牟至于商衛革車千乗大蒐數軍實簡車馬也根牟魯東界琅邪陽都縣有牟鄉商宋地魯西境接宋衞也言千乗明大蒐且見魯衆之大數也左氏傳蒐者何簡車徒也徒衆傳公羊秋蒐于紅正也常事不書而此書者以後比年大蒐失禮因此以見正穀梁傳餘見上昭公十一年五月齊歸薨大蒐于北蒲非禮也蒐非存亡之由故臨喪不宜為之叔向曰魯公室其卑乎君有大喪國不廢蒐不忌君也忌畏也傳左氏二十二年大蒐于昌閒秋而曰蒐此春也其曰蒐何也以蒐事也穀梁傳小司徒稽國中及四郊都鄙之夫家九比之數以辨其貴踐老㓜廢疾凡征役之施舍稽猶考也夫家猶言男女也鄭司農云九比謂九夫為井𤣥謂九比者冢宰職出九賦者之人數也貴謂為卿大夫賤謂占㑹販賣者廢疾謂癃病也施當為弛乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羡惟田與追胥竭作一家男女七人已上則授之以上地所養者衆也男女五人已下則授之以下地所養者寡也可任謂丁强任力役之事者鄭司農云羡饒也田謂獵也追追㓂賊也竭作盡行凡用衆庶則掌其政教與其戒禁聽其辭訟施其賞罰誅其犯命者命所以誓告之鄉師以國比之法以時稽其夫家衆寡辨其老㓜貴賤廢疾馬牛之物辨其可任者與其施舍者大役則帥民徒而至治其政令既役則受州里之役要以攷司空之辟以逆其役事而至至作部曲也既巳也役要所遣民徒數辟功作章程逆猶鈎攷也鄭司農云辟法也凡邦事令作秩叙事功力之事秩常也叙猶次也事有常次則不偪匱鄉大夫以歲時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍以歲時入其書登成也定也國中城郭中也晚賦税而早免之以其所居復多役少野早賦税而晚免之以其復少役多鄭司農云征之者給公上事也舍者謂有復除舍不收役事也貴者謂若今宗室及關内侯皆復也服公事者謂若令吏存復除也老者謂若今八十九十復羡卒也疾者謂若今癃不可事者復之𤣥謂入其書者言於大司徒族師以邦比之法帥四閭之吏以時屬民而校登其族之夫家衆寡辨其貴賤老㓜廢疾可任者及其六畜車輦均人均人民牛馬車輦之力政力征人民則治城郭涂巷溝渠牛馬車輦則轉委積之屬凡均力政以歲上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉豐年人食四鬴之歲也人食三鬴為中歲人食二鬴為無歲歲無贏儲也公事也旬均也讀為㽦㽦原隰之㽦易坤為均今書亦有作旬者凶札則無力政無力政恤其勞也三年大比則大均有年無年大平許之若久不脩則數或闕遂人凡治野以下劑致甿變民言甿異外内也甿猶懵懵無知貌也致猶㑹也民雖受上田中田下田及㑹之以下劑為率謂可任者家二人以歲時登其夫家之衆寡及其六畜車輦辨其老㓜廢疾與其施舍者以起政役政役出士徒役若起野役則令各帥其所治之民而至以遂之大旗致之其不用命者誅之役謂師田若有功作也遂之大旗熊虎凡事致野役帥而至掌其政治禁令遂師以時登其夫家之衆寡六畜車輦辨其施舍與其可任者施亦讀為弛作役事則聽其治訟遂大夫以歲時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者施亦讀為弛縣正若將用野民移執事則帥而至治其政令移執事移用其民鄭司農云謂轉相佐助既役則稽功㑹事而誅賞載師凡民無職事者出夫家之征詳見通禮財賦篇鼓人以鼛鼓鼓役事鼛鼓長丈二尺並地官大司馬大役與慮事屬其植受其要以待攷而賞誅大役築城邑也鄭司農云國有大役大司馬與謀慮其事也植謂部曲將吏故宋城春秋傳曰華元為植巡功屬謂聚㑹之也要者簿書也攷謂攷校其功𤣥謂慮事者封人也於有役司馬與之植築城楨也屬賦丈尺與其用人數夏官用民之力歲不過三日治宫室城郭道渠制王凡使民任老者之事食壯者之食寛其力饒其食同上五十不從力政力稍衰也力政城道之役也八十者一子不從政九十者其家不從政按内則云瞽亦如之廢疾非人不養者一人不從政廢廢於人事父母之喪三年不從政齊衰大功之喪三月不從政將徙於諸侯三月不從政自諸侯來徙家期不從政自從也同上旅師凡新甿使無征役新民新徙來者也使無征役復之也王制曰自諸侯來徙家期不從政地官孟夏毋起土功毋發大衆季夏不可以興土功毋舉大事以揺養氣毋發令而待以妨神農之事也水潦盛昌神農將持功舉大事則有天殃孟秋脩宫室坏牆垣補城郭仲秋可以築城郭建都邑穿竇窖脩囷倉季秋命有司曰寒氣總至民力不堪其家入室季冬歲且更始專而農民毋有所使注並見通禮月令右役單子曰夫辰角見而雨畢天根見而水涸火見而清風戒寒故先王之教曰雨畢而除道水涸而成梁清風至而修城郭宫室故夏令曰九月除道十月成梁其時儆曰收而場功偫而畚挶營室之中土功其始火之初見期於司里詳見通禮夏小正篇隠公七年夏城中丘書不時也左氏傳莊公二十九年春新延廏古之君人者必時視民之所勤民勤於力則功築罕罕希民勤於財則貢賦少民勤於食則百事廢矣凶荒殺禮冬築㣲春新延廏以其用民力為已悉矣悉盡傳穀梁冬十有二月城諸及防書時也凡土功龍見而畢務戒事也謂今九月周十一月龍星角亢晨見東方三務始畢戒民以土功事火見而致用大火心星次角亢見者致築作之物水昏正而栽謂今十月定星昏而中於是樹板幹而興作日至而畢日南至㣲陽始動故土功息左氏傳僖公二十年春新作南門書不時也失土功之時凡啟塞從時門户道橋謂之啟城郭牆塹謂之塞皆官門之開閉不可一日而闕故特随壊時而始之今僖公修飾城門非開閉之急故以土功之制譏之傳嫌啟塞皆從土功之時故别起從時之例同上襄公十三年冬城防書事時也土功雖有常節通以事間為時於是將早城臧武仲請俟畢農事禮也同上宋皇國父為大宰為平公築臺妨於農收周十一月今九月收歛時子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役澤門宋東城南門也皇國父白晳而居近澤門邑中之黔實慰我心子罕黒色而居邑中子罕聞之親執扑扑杖以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑闔謂門戸閉塞今君為一臺而不速成何以為役役事也謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也傳善子罕分謗年襄十七左氏傳昭公九年冬築郎囿書時也季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來詩大雅言文王始經營靈臺非急疾之衆民自以子義來勸樂為之焉用速成其以勦民也勦勞也無囿猶可無民其可乎左氏傳士彌牟營成周計丈數計所當城之丈數揣高卑度高曰揣度厚薄仭溝洫度深曰仭物土方議逺邇物相也相取土之方面逺近之宜量事期知事幾時畢計徒庸知用幾人功慮材用知費幾財用書餱糧知用幾糧食以命役于諸侯屬役賦丈付所當城尺丈書以授帥帥諸侯之大夫而效諸劉子效致也韓簡子臨之以為成命臨履其事以命諸侯經所以不書魏舒昭三十二年左氏傳楚令尹蒍艾獵城沂艾獵孫叔敖也沂楚邑使封人慮事封人其時主築城者慮事謀慮計功以授司徒司徒掌役量功命日命作日數分財用財用築作具平板榦榦楨也稱畚築量輕重畚盛土器程土物為作程限議逺邇均勞逸略基趾趾城足略行也具餱糧餱乾食也度有司謀監主事三旬而成十日為旬不愆於素不過素所慮之期也傳言叔敖之能使民氏宣十一年左傳時使薄斂所以勸百姓也中庸孔子曰擇可勞而勞之又誰怨論語子夏曰君子信而後勞其民未信則以為厲巳也同上大宗伯以軍禮同邦國大均之禮恤衆也均其地政地守地職之賦所以憂民大封之禮合衆也正封疆溝塗之固所以合聚其民春官均人三年大比則大均注見上章右大均大封禮書綱目巻五十二
