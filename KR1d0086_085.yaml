body:
  text: 禮書綱目卷八十三婺源江永撰樂器樂四補大師掌六律六同以合隂陽之聲皆文之以五聲宫商角徴羽皆播之以八音金石土革絲木匏竹詳見鍾律典同掌六律六同之和以辨天地四方隂陽之聲以為樂器陽聲屬天隂聲屬地天地之聲布於四方為作也故書同作銅鄭司農云陽律以竹為管隂律以銅為管竹陽也銅隂也各順其性凡十二律故大師職曰執同律以聽軍聲玄謂律述氣者也同助陽宣氣與之同皆以銅為之凡聲髙聲䃂正聲緩下聲肆陂聲散險聲斂逹聲贏微聲韽回聲衍侈聲筰弇聲鬱薄聲甄厚聲石故書䃂作硍杜子春讀䃂為鏗鏘之鏗髙謂鍾形容髙也韽讀為暗不明之暗筰讀為行扈唶唶之唶石如磬石之聲鄭大夫讀䃂為衮冕之衮陂讀為人短罷之罷韽讀為鶉䳺之䳺鄭司農云鍾形下當蹕正者不髙不下鍾形上下正傭玄謂髙鍾形大上上大也髙則聲上藏衮然旋如裏正謂上下正直則聲緩無所動下謂鍾形大下下大也下則聲出去放肆陂讀為險陂之陂陂謂偏侈陂則聲離散也險謂偏弇也險則聲斂不越也逹謂其形微大也逹則聲有餘若大放也微謂其形微小也韽讀為飛鉆涅韽之韽韽聲小不成也回謂其形微圍也回則其聲淫衍無鴻殺也侈謂中央約也侈則聲迫筰出去疾也弇謂中央寬也弇則聲鬱勃不出也甄讀為甄耀之甄甄猶掉也鍾微薄則聲掉鍾大厚則如石叩之無聲凡為樂器以十有二律為之數度以十有二聲為之齊量數度廣長也齊量侈弇之所容凡和樂亦如之和謂調其故器也小師掌教鼓鼗柷敔塤簫管弦歌教教瞽曚也出音曰鼓注詳見後瞽矇掌播鼗柷敔塤簫管弦歌播謂發揚其音眂瞭掌凡樂事播鼗擊頌磬笙磬視瞭播鼗又擊磬注詳見後磬師掌教擊磬擊編鍾教教視瞭也注詳見後笙師掌教吹竽笙塤籥簫箎􅐟管舂牘應雅以教祴樂教教視瞭也注詳見後典庸器掌藏樂器春並官仲夏命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鍾磬柷敔詳見月令右總要八音者何謂也土曰塤竹曰管皮曰鼓匏曰笙絲曰絃石曰磬金曰鍾木曰柷敔此謂八音也法易八卦也樂記曰塤坎音也管艮音也鼓震音也絃離音也鍾兑音也柷敔乾音也一説笙柷鼓簫琴塤鍾磬也如其次笙在北方柷在東北方鼓在東方簫在東南方琴在南方塤在西南方鍾在西方磬在西北方也聲五音八何聲為本出於五行音為末象八風也白虎通聲樂之象鼓大麗鍾統實磬廉制竽笙簫和管籥發猛塤篪􅡇博瑟易良琴婦好歌清盡舞意天道兼鼓其樂之君耶故鼓似天鍾似地磬似水竽簫管籥似星辰日月鞉柷拊􅙯椌楬似萬物曷以知舞之意曰目不自見耳不自聞也然而治俯仰詘信進退遲速莫不廉制盡筋骨之力以要鍾鼓拊會之節而靡有悖逆者衆積謘謘乎苟子垂作鍾世本黃山海經云炎帝之孫鼓延始為鍾音又傳曰帝作五聲以正五鍾一曰青鍾大二曰赤鍾心聲三曰黃鍾洫光四曰景鍾昧其眀五曰黑鍾隱黃帝五聲既調然後作五行黃帝令伶倫與榮猿鑄十二鍾和五音詳見樂制垂之和鍾垂堯之共工也和謂次序其聲縣也世本作曰垂作鍾眀堂位天子左五鍾右五鍾出撞黃鍾左五鐘皆應告出也入撞蕤賔右五鍾皆應告入也詳樂縣章笙鏞以問詳樂制大鍾謂之鏞書曰笙鏞以間亦名鑮音博其中謂之剽小者謂之棧爾雅六分其金而錫居一謂之鍾鼎之齊考工記鳧氏為鍾兩欒謂之銑故書欒作樂杜子春云當為欒書亦或為欒銑鍾口兩角銑間謂之于于上謂之鼓鼓上謂之鉦鉦上謂之舞此四名者鐘體也鄭司農云於鍾脣之上袪也鼓所擊處舞上謂之甬甬上謂之衡此二名者鍾柄鍾縣謂之旋旋蟲謂之幹旋屬鍾柄所以縣之也鄭司農云旋蟲者旋以蟲為飾也玄謂今時旋有蹲熊盤龍獸名辟邪鍾帶謂之篆篆間謂之枚枚謂之景帶所以介其名也介在於鼓鉦舞甬衡之間凡四鄭司農云枚鍾乳也玄謂今時鍾乳俠鼓與舞每處有九面三十六於上之攠謂之隧攠所擊之處攠弊也隧在鼓中窒而生㶢有似夫隧十分其銑去二以為鉦以其鉦為之銑間去二分以為之鼓間以其鼓間為之舞修去二分以為舞廣此言鉦之徑居銑徑之八而銑間與鉦之徑相應鼓間又居銑徑之六與舞修相應舞修舞徑也舞上下促以橫為修從為廣舞廣四分今亦去徑之二分以為之間則舞間之方恆居銑之四也舞間方四則鼓間六亦其方也鼓六鉦六舞四此鍾口寸者其長十六也鍾之大數以律為度廣長與圜徑假設之耳其鑄之則各隨鍾之制為長短大小也凡言間者亦為從篆以介之鉦間亦當六今時鍾或無鉦間以其鉦之長為之甬長并衡數也以其甬長為之圍參分其圍去一以為衡圍衡居甬上又小參分其甬長二在上一在下以設其旋今衡居一分則參分旋亦二在上一在下以旋當甬之中央是其正薄厚之所震動清濁之所由出侈弇之所由興有説説猶意也故書侈作移鄭司農云當為侈鐘已厚則石大厚則聲不發已薄則播大薄則聲散侈則柞柞讀為咋咋然之咋聲大外也弇則鬱聲不舒揚長甬則震鍾掉則聲不正是故大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚言若此則不石不播也鼓鉦之間同方六而今宜異又十分之一猶大厚皆非也若言鼓外鉦外則近之鼓外二鉦外一鐘大而短則其聲疾而短聞淺則躁躁易竭也鍾小而長則其聲舒而逺聞深則安安難息為遂六分其厚以其一為之深而圜之厚鍾厚深謂窐之也其窐圍故書圜或作圍杜子春云當為圜同上鍾師掌金奏金奏擊金以為奏樂之節金謂鍾及鎛鎛師掌金奏之鼓詳革之屬磬師掌教擊編鍾磬亦編於鍾言之者鍾有不編不編者鍾師擊之杜子春讀編書之編並春官細鈞有鍾無鎛昭其大也大鈞有鎛無鍾甚大無鎛鳴其細也詳鍾律義徒鼓鍾謂之修爾雅鼓人掌教六鼓四金之音聲以金錞和鼓以金鐲節鼓以金鐃止鼓以金鐸通鼓錞錞于也圜如碓頭大上小下樂作鳴之與鼓相和鐲鉦也形如小鍾軍行鳴之以為鼓節司馬職曰軍行鳴鐲鐃如鈴無舌有秉執而鳴之以止擊鼓司馬職曰鳴鐃且卻鐸大鈴也振之以通鼓司馬職曰司馬振鐸地官小師掌六樂聲音之節與其和和錞于春官天子夾振之而駟伐詳樂記大司馬教振旅卒長執鐃兩司馬執鐸公司馬執鐲教大閲司馬振鐸鼓行鳴鐲三鼓摝鐸鼓退鳴鐃且卻詳田役右金之屬鍾之為言動也陰氣用事萬物動成鍾為氣用金聲也鎛者時之氣聲也節度之所生也君臣有節度則萬物昌無節度則萬物亡亡與昌正相迫故謂之鎛白虎通子夏曰鍾聲鏗鏗以立號號以立橫橫以立武君子聽鍾聲則思武臣詳樂記景王二十三年王將鑄無射問律於伶州鳩對曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾百官軌儀紀之以三平之以六成於十二天之道也詳鍾律義王將鑄無射而為之大林賈侍中云無射鍾名律中無射也大林無射之覆也作無射而為大林以覆之其律中林鍾也或説云鑄無射而加以林鍾之數益之昭謂下言細抑大陵又曰聽聲逺越如此則賈言無射有覆近之矣單穆公曰不可夫鍾不過以動聲動聲謂合樂以金奏而八音從之若無射有林耳不及也若無射復有大林以覆之無射陽聲之細者林鍾隂聲之大者細抑大陵故耳不能聽及也夫鍾聲以為耳也耳所不及非鍾聲也非法鍾之聲也猶目所不見不可以為目也若目之精眀所不能見亦不可以施目也耳目所不能及而強之則有眩惑之失以生疾也夫目之察度也不過步武尺寸之間六尺為步賈君以半步為武其察色也不過墨丈尋常之間五尺為墨倍墨為丈八尺為尋倍尋為常耳之察和也在清濁之間清濁律吕之變黃鍾為宫則濁大吕為角則清其察清濁也不過一人之所勝勝舉也是故先王之制鍾也大不出鈞重不過石釣所以鈞音之法也以木長七尺有弦繫之以為釣法百二十斤為石律度量衡於是乎生律五聲隂陽之法也度丈尺也量斗斛也衡有斤兩之數生於黃鍾黃鍾之管容秬黍千二百粒粒百為銖是為一籥籥二為合合重一兩故曰律度量衡於是乎生也小大器用於是乎出出於鍾也易曰制器者尚其象小謂錙銖分寸大謂斤兩丈尺故聖人慎之今王作鍾也聽之弗及耳不及聽其清濁也比之不度不度不中釣石之數鍾聲不可以知和耳不能聽故不可以知和制度不可以出節節謂法度量衡之節無益於樂而鮮民財將焉用之夫樂不過以聽耳而美不過以觀目若聽樂而震觀美而眩患莫甚焉夫耳目心之樞機也樞機發動也心有所欲耳目為之發動故必聽和而視正聽和則聰視正則眀習於和正則不眩惑也聰則言聽明則德昭聽言昭德則能思慮純固以言德於民民歆而德之則歸心焉歆猶喜服也言德以言發德教也是以作無不濟求無不獲然後能樂若視聽不和而有震眩則味入不精不精則氣佚氣佚則不和不和無射大林也若聽樂而震視色而眩則味入不精美味入不精美則氣放佚不行於身體於是乎有狂悖之言有眩惑之明有轉易之名有過慝之度慝惡也此四者氣佚之所生狂悖眩惑説子朝寵賔孟也轉易過惡嬖子配適將殺大臣也出令不信有轉易也刑政放紛動不順時民無據依不知所力各有離心不知所為盡力也上失其民作則不濟求則不獲其何以能樂王弗聽問之伶州鳩伶司樂官州鳩名也對曰臣聞之琴瑟尚宫凡樂輕者從大重者從細故琴瑟尚宫也鍾尚羽鍾聲大故尚羽也石尚角石磬也輕於鍾故尚角角清濁之中也匏竹利制匏笙也竹簫管也利制以聲音調利為制無所尚也大不踰宫細不過羽夫宫音之主也第以及羽宫聲大故為主第次也故樂器重者從細重謂金石也從細尚細聲謂鍾尚羽石尚角也輕者從大輕瓦絲也從大謂瓦絲尚宫也是以金尚羽石尚角瓦絲尚宫匏竹尚議議議從其調利革木一聲革鼗鼓也木柷敔也一聲無清濁之變夫政象樂樂從和和從平和八音克諧也平細大不踰也故可以平民樂和則諧政和則平也聲以和樂律以平聲謂五聲也以式八音而調樂也賈侍中云律黃鍾為宫林鍾為徴太簇為商南吕為羽姑洗為角所以平五聲也金石以動之鍾磬所以發動五聲絲竹以行之管弦所以行之詩以道之道己志也誦之曰詩書曰詩言志歌以詠之詠詠詩也書曰歌永言聲依永匏以宣之宣發揚也瓦以贊之贊助也革木以節之物得其常曰樂極物事也極中也極之所集曰聲聲會也言中和之所會集曰正聲聲應相保曰和保安也細大不踰曰平細大之聲不相踰越曰平今無射有大林是不平也如是而鑄之金鑄金以為鍾也磨之石磨石以為磬也繫之絲木繫絲木以為琴瑟也越之匏竹越匏竹以為笙管也越謂之孔也樂記曰朱絃而疏越節之鼓節其長短大小而行之以遂八風遂順也傳曰所以節八音而行八風也正西曰兌為金為閭合風西北曰乾為石為不周風正北曰坎為革為廣莫風東北曰艮為匏為融風正東曰震為竹為明庶風東南曰巽為木為清明風正南曰離為絲為景風西南曰坤為瓦為涼風於是乎氣無滯隂亦無散陽滯積也積隂而發則夏有雷雹散陽陽不藏冬無氷李梅實之類也隂陽序次風雨時至嘉生繁祉人民和利物備而樂成上下不罷罷勞也故曰樂正今細過其主妨於正細謂無射也主正也言無射有大林是作細而大過其律妨於正聲用物過度妨於財過度用金多也正害財匱妨於樂樂從和今正害財匱故妨於樂細抑大陵不容於耳非和也細無射也大大林也言大聲陵之細聲抑而不聞不容于耳耳不能容别也聽聲越逺非平也越迃也言無射之聲為大林所陵聽之微細迃逺非平也夫有和平之聲則有蕃殖之財樂以殖財也於是乎道之以中德詠之以中音中德中庸之德舞也中音中和之音也德音不愆以合神人合神人謂祭祀享宴也神是以寧民是以聽聽從也若夫匱財用罷民力以逞淫心逞快也聽之不和比之不度無益於教而離民怒神非臣之所聞也財匱故民離樂不和故神怒也王不聽卒鑄大鍾國語周語王將鑄無射無射鍾名律中無射伶州鳩曰王其以心疾死乎夫樂天子之職也職所主也夫音樂之輿也樂因音而行而鍾音之器也音由器以發天子省風以作樂省風俗作樂以移之器以鍾之鍾聚也以器聚音輿以行之樂須音而行小者不窕窕細不滿大者不摦摦橫大不入則和於物物和則嘉成嘉樂成也故和聲入於耳而藏於心心億則樂億安也窕則不咸不充滿人心摦則不容心不堪容心是以感感實生疾今鍾摦矣王心弗堪其能久乎為明年王崩傳傳昭二十一年左氏二十四年鍾成伶人告和伶人樂人也二十五年王崩鍾不和崩而言鍾不和者明樂人之諛國語鄭人賂晉侯歌鍾二肆肆列也縣鍾十六為一肆二肆三十二枚及其鎛磬鎛磬皆樂器襄十一年左氏傳鍾晉語云鄭伯嘉納歌鍾二肆及其寶鎛注云歌歌時所奏肆列也凡縣鍾磬全為肆半為堵鎛小鍾也寶鄭所寶無句作磬世本叔之離叔未聞也離謂次序其聲縣也世木作曰無句作磬明堂位堯命質為樂乃拊石擊石以象上帝玉磬之音以致舞百獸見樂制夔曰戛擊鳴球球玉磬又曰於豫擊石拊石百獸率舞庶尹允諧詳見樂制徐州厥貢泗濵浮磬浮磬石露水濵若浮於水然或曰非也泗濵非必水中泗水之旁近浮者石浮生土中不根著者也今下邳有石磬山或以為古取磬之地豫州錫貢磬錯磬錯治磬之錯也非所常用之物故非常貢必待錫命而後納也梁州厥貢璆磬璆玉磬磬石磬也林氏曰徐州貢浮磬此州既貢玉磬又貢石磬豫州又貢磬錯以此觀之則知當時樂器磬最為重豈非以其聲角而在清濁小大之間最難得其和者哉禹貢大磬謂之毊毊形似犁錧以玉石為之爾雅磬氏為磬倨句一矩有半必先度一矩為句一矩為服而求其弦既而以一矩有半觸其弦則磬之倨句也磬之制有大小此假矩以定倨句非用其度耳其博為一博謂服博也博廣也股為二鼓為三參分其股博去一以為鼓博參分其鼓博以其一為之厚鄭司農云股磬之上大者鼓其下小者所當擊者也玄謂股外面鼓內面也假令磬股廣四寸半者股長九寸也鼓廣三寸長尺三寸半厚一寸已上則摩其旁鄭司農云磬聲太上則摩鑢其旁玄謂太上聲清也薄而廣則濁已下則摩其專大下聲濁也短而厚則清考工記磬師掌教擊磬磬亦編視瞭擊頌磬笙磬磬在東方曰笙笙生也在西方曰頌頌或作庸庸功也大射禮曰樂人宿縣於阼階東笙磬西面其南笙鍾其南鎛皆南陳又曰西階之西頌磬東面其南鍾其南鎛皆南陳並春官大射樂人宿縣於阼階東笙磬西面西階之西頌磬東面詳樂縣天球在東序球雍州所貢命顧玉磬四代之樂器也明堂位諸侯擊玉磬諸侯之僭禮也郊特牲集大成也者金聲而玉振之也成者樂之一終書所謂簫韶九成是也金鍾屬聲宣也玉磬也振收也八音之中金石為重故特為衆聲之綱紀又金始振而玉終詘然也故並奏八音則於其未作而先擊鎛鍾以宣其聲俟其既閎而後擊玉磬以收其韻孟子徒鼓磬謂之寋未見義所出爾雅右石之屬磬者夷則之氣也象萬物之盛也其氣磬故曰磬有貴賤焉有親疏焉有長幼焉朝廷之禮貴不讓賤所以有尊卑也鄉黨之禮長不讓幼所以眀有年也宗廟之禮親不讓疏所以眀有親也此三者行然後王道得王道得然後萬物成天下樂用磬也白虎通子夏曰石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣詳樂記伏羲作琴琴操俊又世本云神農作琴或謂帝使晏龍作琴未知孰是朱襄氏使士逹作五弦瑟堯時鼓乃柈五弦之瑟作以為十五弦之瑟舜立仰延乃拌瞽叟之所為瑟益之八絃以為二十三絃之瑟見樂制使又世本云庖羲作五十絃瑟黃帝素鼓瑟哀不自勝乃破為二十五絃具二均聲或謂神農晏龍作瑟未知孰是舜作五絃之琴以歌南風樂記琴瑟以詠詳樂制大琴大瑟中琴小瑟四代之樂器也四代虞夏殷周也明堂位大瑟謂之灑長八尺一寸廣一尺八寸二十七弦大琴謂之離或曰琴大者二十七弦未詳長短廣雅曰琴長三尺六寸六分五弦爾雅大琴練弦逹越大瑟朱絃逹越練弦朱弦互文也越下孔也尚書大傳清廟之瑟朱弦而疏越清廟謂作樂歌清廟也朱弦練朱弦練則聲濁越瑟底孔也畫疏之使聲遲也樂記大司樂雲和之琴瑟冬日至於地上之圜丘奏之空桑之琴瑟夏日至於澤中之方丘奏之龍門之琴瑟於宗廟之中奏之詳樂制小師掌教弦歌弦謂琴瑟也歌依詠詩也瞽矇掌弦歌並春官徒鼓瑟謂之步獨作之雅爾士無故不徹琴瑟憂樂不相干也故謂災患喪病曲禮右絲之屬瑟者嗇也間也所以懲忿宫商角則宜君父有節臣子有義然後四時和四時和然後萬物生故謂之瑟也琴者禁也所以禁止淫邪正人心也白虎通琴長八尺一寸朱子曰八尺一寸者是京房內凖正度也弦大者為宫而居中央君也商張右傍其餘大小相次不失其次序則君臣之位正矣史記子夏曰絲聲哀哀以立廉廉以立志君子聽琴瑟之聲則思志義之臣詳樂記君子之近琴瑟以儀節也非以慆心也同上孔子學琴於師襄子師襄子曰吾雖以擊磬為官然能於琴今子於琴已習可以益矣孔子曰丘未得其數也有間曰已習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰丘未得其為人也有間孔子有所繆然思焉繆然深思貌有所睪然髙望而逺眺焉眺見曰丘逮得其為人矣逮近也黮而黑頎然長曠如望羊曠用志廣逺望羊逺視也奄有四方奄同也文王之時三分天下有其二後周有四方文王之功也非文王其孰能為此師襄子避席葉拱而對曰葉拱兩手薄其心也君子聖人也其傳曰文王操家語子路鼓琴孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以為節流入於南不歸於北夫南者生育之鄉北者殺伐之域故君子之音溫柔居中以養生育之氣憂愁之感不加於心也暴厲之動不在於體也夫然者乃所謂治安之風也小人之音則不然亢麗微末以象殺伐之氣中和之感不載於心溫和之動不存於體夫然者乃所以為亂之風昔者舜彈五絃之琴造南風之詩其詩曰南風之熏兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮得其時阜盛也唯修此化故其興也勃焉德如泉流至于今王公大人述而弗忘殷紂好為北鄙之聲其廢也忽然至于今王公大人舉以為誡夫舜起布衣積德含和而終以帝紂為天子荒淫為亂而終以亡非各所修之致乎由今也匹夫之徒曽無意于先王之制而習亡國之聲豈能保其六七尺之體哉冉有以告子路子路懼而自悔靜思不食以至骨立夫子曰過而能改其進矣乎同上舜作簫世本大簫謂之言編二十三管長尺四寸小者謂之筊十六管長尺二寸簫一名籟大管謂之簥管長尺圍寸併漆之有底賈氏以為如箎六孔其中謂之篞小者謂之篎爾雅大司樂孤竹之管冬日至於地上之圜丘奏之孫竹之管夏日至於澤中之方丘奏之隂竹之管於宗廟之中奏之詳見樂制大射簜在建鼓之間詳樂縣聖人作塤篪此德音之音也詳樂記大篪謂之沂篪以竹為之長尺四寸圍三寸一孔上出一寸三分名翹橫吹之小者尺二寸廣雅云八孔爾雅小師掌教簫管簫編小竹管如今賣飴餳所吹者鄭司農云管如篪六空玄謂管如笛而小併兩而吹之今大子樂官有焉瞽矇掌播簫管笙師掌教吹籥簫篪笛管鄭司農云篪七孔杜子春讀笛為蕩滌之滌今時所吹五空竹笛玄謂籥如笛三空春並官葦籥伊耆氏之樂也詳見樂制大籥謂之産籥如笛三孔而短小廣雅云七孔其中謂之仲小者謂之箹徒吹謂之和爾雅籥師掌教國子舞羽吹籥詳見樂舞籥章掌土鼓豳籥鄭司農云豳籥豳國之地竹豳詩亦如之玄謂豳籥豳人吹籥之聲章明堂位曰土鼓蒯桴葦籥伊耆氏之樂中春晝擊土鼓吹豳詩以逆暑中秋夜逆寒亦如之凡國祈年於田祖吹豳雅擊土鼓以樂田畯國祭蠟則吹豳頌擊土鼓以息老物豳詩豳風七月也吹之者以籥為之聲豳雅豳頌亦七月也注詳見吉禮並春官笙師春牘應雅以教祴樂鄭司農云春牘以竹大五六寸長七尺短者一二尺其端有兩孔髤畫以兩手築地應長六尺五寸其中有椎雅狀如漆筒而弇口大二圍長五尺六寸以羊韋鞔之有兩紐疏畫玄謂祴樂祴夏之樂牘應雅教其春者謂以築地笙師教之則三器在庭可知矣賔醉而出奏祴夏以此三器築地為之行節明不失禮同上古樂訊疾以雅雅亦樂器名也如漆筒中有椎樂記右竹之屬簫者中吕之氣萬物生於無聲見於無形僇也肅也故謂之簫簫者以祿為本言承天繼物為民本人力加地道化然後萬物戮也故謂之簫也白虎通子夏曰竹聲濫濫以立會會以聚衆君子聽竽笙簫管之聲則思畜聚之臣詳樂記隨作笙女媧作笙簧世本女媧之笙簧女媧三皇承宓義者世本作曰女媧作笙簧明堂位大笙謂之巢列管匏中施簧管端大者十九簧小者謂之和十三簧者鄉射記曰三笙一和而成聲爾雅笙師掌教吹竽笙鄭司農云竽三十六簧笙十三簧凡祭祀享射共其鍾笙之樂鍾笙與鍾聲相應之笙春官三笙一和而成聲三人吹笙一人吹和凡四人也爾雅曰笙小者謂之和鄉射記右匏之屬匏之言施也在十二月萬物始生而勞笙者太簇之氣象萬物之生故曰笙有七政之節焉有六合之和焉天下樂之故謂之笙白虎通聖人作為塤篪此德音之音也樂記伯按詩小雅何人斯云氏吹塤仲氏吹篪其序云蘇公刺暴公也鄭氏曰暴蘇皆幾內國名世本云暴辛公作塤蘇成公作篪譙周古史考云古有塤篪尚矣周幽王時二公特善其事耳朱子曰此序不知何所據而得此事世本説尤紕繆譙周又從而傳會之不知適所以章其謬耳大塤謂之器塤燒土為之大如鵝子鋭上平底形如稱錘六孔小者如雞子爾雅小師掌教塤塤燒土為之大如鴈卵瞽矇掌塤笙師掌教吹塤並春官堯命質為樂乃以麋􅛘置缶而鼓之見樂制坎其擊缶缶瓦器可以節樂鼓陳風宛丘又易離卦不缶而歌禮之初蕢桴而土鼓猶若可以致其敬於鬼神蕢讀為凷聲之誤也凷堛也謂摶土為桴也土鼓築土為鼓也禮運土鼓蕢桴伊耆氏之樂也詳見樂制籥章掌土鼓杜子春云土鼓以瓦為匡以革為兩面可擊也中春晝擊土鼓以逆暑中秋夜逆寒亦如之凡國祈年於田祖擊土鼓以樂田畯國祭蠟擊土鼓以息老物詳竹之屬壺涿氏掌除水蟲以炮土之鼓驅之炮土之鼓瓦鼓也秋官右土之屬塤在十一月塤之為言勳也陽氣於黃泉之下勳蒸而萌白虎通夷作鼓世本帝嚳命垂作鞀鞞帝王世紀聖人作為鞉鼓此德音之音也詳樂記夏后氏之鼓足殷楹鼓周縣鼓足謂四足也楹謂之柱貫中上出也縣縣之簨簴也殷頌曰植我鼗鼓周頌曰應朄縣鼓眀堂位下管鼗鼓詳樂制置我鼗鼓周頌應田縣鼓詳樂制大鼓謂之鼖鼖長八尺小鼓謂之應詩曰應朄縣鼓在大鼓側徒擊鼓謂之咢詩云或歌或咢大鼗謂之麻小者謂之料麻者音概而長也料者聲清而不亂爾雅鼓人掌教六鼓四金之音聲以節聲樂以和軍旅以正田役音聲五聲合和者教為鼓而辨其聲用教為鼓教擊鼓者大小之數又别其聲所用之事以靁鼓鼓神祀以靈鼓鼓社祭以路鼓鼓鬼享以鼖鼓鼓軍事以鼛鼓鼓役事以晉鼓鼓金奏雷鼓八面鼓也神祀祀天神也靈鼓六面鼓也社祭祭地祇也路鼓四面鼓也鬼享享宗廟也大鼓謂之鼖鼖鼓長八尺鼛鼓長丈二尺晉鼓長六尺六寸金奏謂樂作擊編鍾地官韗人為臯陶鄭司農云韗書或為鞠臯陶鼓木也玄謂鞠者以臯陶名官也鞠則陶字從革長六尺有六寸左右端廣六寸中尺厚三寸版中廣頭狹為穹隆也鄭司農云謂鼓木一判者其兩端廣六寸而其中更廣尺也如此乃得有腹穹者三之一鄭司農云穹讀為志無空邪之空謂鼓木腹穹隆者居鼓三之一也玄謂穹讀如穹蒼之穹穹隆者居鼓面三分之一則其鼓四尺者版穹一尺三寸三分寸之一也倍之為二尺六寸三分寸之二加鼓四尺穹之徑六尺六寸三分寸之二也此鼓合二十版上三正鄭司農云謂兩頭一平中央一平也玄謂三當為參正直也參直者穹上一直兩端又直各居二尺二寸不弧曲也此鼓兩面以六鼓差之賈侍中云晉鼓大而短近晉鼓也以晉鼓鼓金奏鼓長八尺鼓四尺中圍加三之一之鼖鼓中圍加三之一者加於面之圍以三分之一也面四尺其圍十二尺加以三分一四尺則中圍十六尺徑五尺三寸三分寸之一也今亦合二十版則版穹六寸三分寸之二耳大鼓謂之鼖以鼖鼓鼓軍事鄭司農云鼓四尺謂革所蒙者廣四尺鼓長尋有四尺鼓四尺倨句磬折以臯鼓鼓役事磬折中曲之不參正也中圍與鼖鼓同以磬折為異凡冒鼓必以啓蟄之日啓蟄孟春之中也蟄蟲始聞雷聲而動鼓所取象也冒蒙鼓以革良鼓瑕如積環革調急也鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞考工記大司樂靁鼓靁鼗冬日至於地上之圜丘奏之靈鼓靈鼗夏日至於澤中之方丘奏之路鼓路鼗於宗廟之中奏之詳樂制大師下管播樂器令奏鼓朄同上小師掌教鼓鼗鼗如鼓而小持其柄搖之旁耳還自擊大祭祀大饗下管擊應鼓凡小祭祀小樂事鼓朄瞽矇掌播鼗視瞭掌凡樂事播鼗賔射皆奏其鍾鼓鼜愷獻亦如之鍾師掌鼙鼓縵樂並詳樂制鎛師掌金奏之鼓謂主晉鼓以奏其鍾鏄也然則擊鎛者亦視瞭也並春官廟堂之下縣鼓在西應鼓在東禮樂之器尊西也小鼓謂之應禮器大射建鼓在阼階西南鼓應鼙在其西南鼓西階一建鼓在其南東鼓朔鼙在其北一建鼓在西階之東南面詳樂縣鼖鼓在西房鼖鼓長八尺商周傳寶之顧命大僕建路鼓於大寢之門外以待逹窮者與遽令詳朝廷禮大司馬教振旅王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅帥執鼙鄭司農云提謂馬上鼓有曲木提持鼓立馬髦上者故謂之提詳見田役鎛師凡軍之夜三鼜皆鼓之守鼜亦如之詳見武備掌固夜三鼜以戒號同上冥氏攻猛獸以靈鼓驅之秋官鼉鼓逢逢矇瞍奏公鼉似蜥蜴長丈餘皮可冒鼓逢逢和也大雅靈臺天子賜伯子男樂則以鼗將之詳樂制搏拊搏拊以韋為之實之以粳以節樂益稷拊搏四代之樂器也拊搏以韋為之充之以粳形如小鼓明堂位以韋為鼓謂之搏拊尚書大傳架一鍾而尚拊荀子架一磬而尚拊大戴禮大師帥瞽登歌令奏擊拊小師登歌擊拊並詳樂制右樂會守拊鼓治亂以相相即拊也亦以節樂拊者以韋為表裝之以粳粳一名相因以名焉今齊人或謂粳為相詳見樂記右革之屬鼓無當於五聲五聲弗得不和學記鼓震音煩氣也萬物憤悶震動而生雷以動之溫以暖之風以散之雨以濡之奮至德之聲感和平之氣也同聲相應同氣相求神眀報應天地祐之其本乃在萬物之始耶故謂鼓也鞀者震之氣也上應昴星以通王道故謂之鞀也白虎通子夏曰鼓鼙之聲歡歡以立動動以進衆君子聽鼓鼙之聲則思將帥之臣詳樂記聖人作為椌楬此德音之音也椌楬謂柷敔也樂記揩擊四代之樂器也揩擊謂柷梧皆所以節樂者也明堂位戞擊戞擊柷敔所以作止樂此舜廟堂之樂合止柷敔堂下樂也上下合止樂各有柷敔益稷所以鼓柷謂之止柷如漆桶方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊止者其椎名所以鼓敔謂之籈敔如伏虎背上有二十七鉏鋙刻以木長尺櫟之籈者其名爾雅小師掌教柷敔鄭司農云柷如漆筒中有椎敔木虎也瞽矇掌柷敔並春官天子賜諸侯樂則以柷將之詳樂制右木之屬柷敔者終始之聲萬物之所生也隂陽順而復故曰柷承順天地序迎萬物天下樂之故樂用柷柷始也敔終也白虎通夏后氏之龍簨虡殷之崇牙周之璧翣簨虡所以縣鍾磬也橫曰簨飾之以鱗屬植曰虡飾之以裸屬羽屬簨以大版為之謂之業殷又於龍上刻畫之為重牙以挂縣紘也周又畫繪為翣戴以璧垂五采羽於其下樹於簨之角上飾彌多也周頌曰設業諟虡崇牙樹羽明堂位梓人為筍虡樂器所縣橫曰筍植曰虡鄭司農云筍讀為竹筍之筍天下之大獸五脂者膏者裸者羽者鱗者脂牛羊屬膏豕屬裸者謂虎豹貔􅣝為獸淺毛者之屬羽鳥屬鱗龍蛇之屬宗廟之事脂者膏者以為牲致美味也裸者羽者鱗者以為筍虡貴野聲也外骨內骨卻行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胸鳴者謂之小蟲之屬以為雕琢刻畫祭器博庶物也外骨龜屬內骨蟞屬卻行蚓衍之屬仄行蟹屬連行魚屬紆行蛇屬脰鳴鼁黽屬注鳴精列屬旁鳴蜩霓屬翼鳴發皇屬股鳴蚣蝑動股屬胸鳴榮原屬厚脣弇口出目短耳大胸耀後大體短脰若是者謂之裸屬恆有力而不能走其聲大而宏有力而不能走則於任重宜聲大而宏則於鍾宜若是者以為鍾虡是故擊其所縣而由其虡鳴耀讀為哨頎小也鄭司農云宏讀為紘綎之紘謂聲音大也由若也鋭喙決吻數目顅脰小體騫腹若是者謂之羽屬恆無力而輕其聲清陽而逺聞無力而輕則於任輕宜其聲清陽而逺聞於磬宜若是者以為磬虡故擊其所縣而由是虡鳴吻口腃也顅長脰貌故書顅或作牼鄭司農云牼讀為鬝頭無髮之鬝小首而長搏身而鴻若是者謂之鱗屬以為筍摶圜也鴻傭也凡攫閷援簭之類必深其爪出其目作其鱗之而謂筍虡之獸也深猶藏也作猶起也之而頰頌也深其爪出其目作其鱗之而則於眂必撥爾而怒苟撥爾而怒則於任重宜且其匪色必似鳴矣匪采色也故書撥作廢匪作飛鄭司農云廢讀為撥飛讀為匪以似為發爪不深目不出鱗之而不作則必頽爾如委矣苟頽而如委則加任焉則必如將廢措其匪色必似不鳴矣措猶頓也故書措作厝杜子春云當為措考工記虡業維樅虡植木以懸鍾磬其橫者曰枸業栒上大板刻之􅚃業如鋸齒者也樅業上懸鍾磬處以采色為崇牙其狀樅樅然者也大雅靈臺設業設虡崇牙樹羽詳樂制典庸器祭祀饗食賔射帥其屬而設筍虡春官天子左五鍾右五鍾天子將出則撞黃鍾右五鍾皆應然後大師奏登車告出也入則撞蕤賔左五鍾皆應然後少師奏登堂就席告入也詳樂記大司樂大祭祀宿縣遂以聲展之詳樂制小胥正樂縣之位王宫縣諸侯軒縣卿大夫判縣士特縣辨其聲樂縣謂鍾磬之屬縣於筍虡者鄭司農云宫縣四面縣軒縣去其一面判縣又去其一面特縣又去其一面四面象宫室四面有牆故謂之宫縣軒縣三面其形曲故春秋傳曰請曲縣繁纓以朝諸侯之禮也故曰唯器與名不可以假人玄謂軒縣去南面辟王也判縣左右之合又空北面恃縣縣於東方或於階間而已凡縣鐘磬半為堵全為肆鍾磬者編縣之二八十六枚而在一虡謂之堵鍾一堵磬一堵謂之肆半之者謂諸侯之卿大夫士也諸侯之卿大夫半天子之卿大夫西縣鍾東縣磬士亦半天子之士縣磬而已鄭司農云春秋傳曰歌鍾二肆並春官大射樂人宿縣于阼階東笙磬西面其南笙鍾其南鑮皆南陳笙猶生也東為陽中萬物以生春秋傳曰太簇所以金奏贊陽出滯姑洗所以修潔百物考神納賔是以東方鍾磬謂之笙皆編而縣之周禮曰凡縣鍾磬半為堵全為肆有鍾有磬為全鑮如鍾而大奏樂以鼓鑮為節建鼓在阼階西南鼓應鼙在其東南鼓建猶樹也以木貫而載之樹之跗也南鼓謂所伐面也應鼙應朔鼙也先擊朔鼙應鼙應之鼙小鼙也在東便其先擊小後擊大也鼓不在東縣南為君也西階之西頌磬東面其南鍾其南鑮皆南陳一建鼓在其南東鼓朔鼙在其北言成功曰頌西為隂中萬物之所成春秋傳曰夷則所以詠歌九則平民無忒無射所以宣布哲人之令德示民軌義是以西方鍾磬謂之頌朔始也奏樂先擊西鼙樂為賔所由來也鍾不言頌鼙不言東鼓義同省文也古文頌為庸一建鼓在西階之東南面言面者國君於其羣臣備三面爾無鍾磬有鼓而已其為諸侯則軒縣簜在建鼓之間簜竹也謂笙簫之屬倚於堂鼗倚于頌磬西紘鼗如鼓而小有柄賔至搖之以奉樂也紘編磬繩也設鼗於磬西倚於紘也王制曰天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之諸侯之宫縣諸侯之僭禮也郊特牲大司樂大札大凶大災大臣死凡國之大憂令弛縣春官疾病君大夫徹縣喪大記大夫無故不徹縣曲禮右樂縣戰于新築新築人仲叔于奚救孫桓子衛人賞之以邑辭請曲縣軒縣也周禮天子樂宫縣四周諸侯軒縣闕南方許之仲尼聞之曰惜也不如多與之邑唯器與名不可以假人成二年左氏傳詳見名器上禮書綱目卷八十三
