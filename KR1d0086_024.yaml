body:
  text: 禮書綱目卷二十二婺源江永撰喪服義凶禮五補凡禮之大體體天地法四時則隂陽順人情故謂之禮訾之者是不知禮之所由生也禮之言體也故謂之禮言本有法則而生也口毀曰訾夫禮吉凶異道不得相干取之隂陽也吉禮凶禮異道謂衣服容貌及器物也喪有四制變而從宜取之四時也有恩有理有節有權取之人情也恩者仁也理者義也節者禮也權者知也仁義禮知人道具矣取之四時謂其數也取之人情謂其制也其恩厚者其服重故為父斬衰三年以恩制者也服莫重斬衰也門内之治恩揜義門外之治義斷恩資于事父以事君而敬同貴貴尊尊義之大者也故為君亦斬衰三年以義制者也資猶操也貴貴為大夫君也尊尊謂為天子諸侯也三日而食三月而沐期而練毁不滅性不以死傷生也喪不過三年苴衰不補墳墓不培祥之日鼓素琴告民有終也以節制者也資于事父以事母而愛同天無二日土無二王國無二君家無二尊以一治之也故父在為母齊衰期者見無二尊也食食粥也沐謂将虞祭時也補培猶治也鼓素琴始存樂也三年不為樂樂必崩杖者何也爵也三日授子杖五日授大夫杖七日授士杖或曰擔主或曰輔病婦人童子不杖不能病也百官備百物具不言而事行者扶而起言而後事行者杖而起身自執事而後行者面垢而已秃者不髽傴者不袒跛者不踊老病不止酒肉凡此八者以權制者也五日七日授杖謂為君喪也扶而起謂天子諸侯也杖而起謂大夫士也面垢而已謂庶民也髽婦人也男子免而婦人髽髽或為免始死三日不怠三月不解期悲哀三年憂恩之殺也聖人因殺以制節不怠哭不絶聲也不解不解衣而居不倦息也此喪之所以三年賢者不得過不肖者不得不及此喪之中庸也王者之所常行也書曰髙宗諒闇三年不言善之也諒古作梁楣曰梁闇讀如鶉䳺之䳺闇謂廬也廬有梁者所謂柱楣也王者莫不行此禮何以獨善之也曰髙宗者武丁武丁者殷之賢王也繼世即位而慈良于喪當此之時殷衰而復興禮廢而復起故善之善之故載之書中而髙之故謂之髙宗三年之喪君不言書云髙宗諒闇三年不言此之謂也然而曰言不文者謂臣下也言不文者謂喪事不辨所當共也孝經説曰言不文者指士民也禮斬衰之喪唯而不對齊衰之喪對而不言大功之喪言而不議緦小功之喪議而不及樂此謂與賔客也唯而不對侑者為之應耳言謂先發口也父母之喪衰冠繩纓菅屦三日而食粥三月而沐期十三月而練冠三年而祥比終兹三節者仁者可以觀其愛焉知者可以觀其理焉强者可以觀其志焉禮以治之義以正之孝子弟弟貞婦皆可得而察焉仁有恩者也理義也察猶知也喪服四制再期之喪三年也期之喪二年也九月七日之喪三時也五月之喪二時也三月之喪一時也言喪之節應嵗時之氣故期而祭禮也期而除喪道也祭不為除喪也此謂練祭也禮正月存親親亡至今而期期則宜祭期天道一變哀惻之情益衰衰則冝除不相為也喪服小記三年之喪何也曰稱情而立文因以飾羣别親疏貴賤之節而弗可損益也故曰無易之道也稱情而立文稱人之情輕重而制其禮也羣謂親之黨也無易猶不易也創鉅者其日久痛深者其愈遲三年者稱情而立文所以為至痛極也斬衰苴杖居倚廬食粥寝苫枕塊所以為至痛飾也飾情之章表也三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有已復生有節也哉復生除喪反生者之事也凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是大鳥獸則失喪其羣匹越月踰時焉則必反廵過其故鄉翔回焉鳴號焉蹢䠱焉踟蹰焉然後乃能去之小者至于燕雀猶有啁噍之頃焉然後乃能去之故有血氣之屬者莫知于人故人于其親也至死不窮匹偶也言燕雀之恩不如大鳥獸大鳥獸不如人含血氣之類人最有知而恩深也于其五服之親念之至死無止己也将由夫患邪滛之人與則彼朝死而夕忘之然而從之則是曽鳥獸之不若也夫焉能相與羣居而不亂乎言惡人薄于恩死則忘之其相與聚處必失禮也将由夫修飾之君子與則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也駟之過隙喻疾也遂之謂不時除也故先王焉為之立中制節壹使足以成文理則釋之矣立中制節謂服之年月也釋猶除也去也然則何以至期也言三年之義如此則何以有降至于期也期者謂為人後者父在為母也曰至親以期斷言服之正雖至親皆期而除也是何也謂服斷于期之義也曰天地則已易矣四時則已變矣其在天地之中者莫不更始焉以是象之也法此變易可以期也然則何以三年也言法此變易可以期何以乃三年為曰加隆焉爾也焉使倍之故再期也言于父母加隆其恩使倍期也下焉猶然由九月以下何也曰焉使弗及也言使其恩不若父母故三年以為隆緦小功以為殺期九月以為閒上取象于天下取法于地中取則于人人之所以羣居和壹之理盡矣取象于天地謂法其變易也自三年以至緦皆嵗時之數也言既象天地又足以盡人聚居純厚之恩也故三年之喪人道之至文者也夫是之謂至隆言三年之喪喪禮之最隆盛也是百王之所同古今之所壹也未有知其所由来者也不知其從來喻此三年之喪前世行之久矣孔子曰子生三年然後免于父母之懐夫三年之喪天下之逹喪也逹謂自天子至于庶人三年問滕定公薨世子謂然友曰昔者孟子甞與我言於宋於心終不忘今也不幸至于大故吾欲使子問于孟子然後行事定公文公父也然友世子之傅也大故大喪也事謂喪禮然友之鄒問于孟子孟子曰不亦善乎親喪固所自盡也曽子曰生事之以禮死葬之以禮祭之以禮可謂孝矣諸侯之禮吾未之學也雖然吾甞聞之矣三年之喪齊疏之服飦粥之食自天子逹于庶人三代共之當時諸侯莫能行古喪禮而文公獨能以此為問故孟子善之又言父母之喪固人子之心所自盡者盖悲哀之情痛疾之意非自外至冝乎文公于此有所不能自己也但所引曽子之言本孔子告樊遲者豈曽子甞論之以告其門人歟三年之喪者子生三年然後免于父母之懐故父母之喪必以三年也齊衣下縫也不緝曰斬衰緝之曰齊衰疏粗也粗布也飦麋也喪禮三日始食粥既葬乃疏食此古今貴賤通行之禮也然友反命定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行吾先君亦莫之行也至于子之身而反之不可且志曰喪祭從先祖曰吾有所受之也父兄同姓老臣也滕與魯俱文王之後而魯祖周公為長兄弟宗之故滕謂魯為宗國也然謂二國不行三年之喪者乃其後世之失非周公之法本然也志記也引志之言而釋其意以為所以如此者盖為上世以来有所傳受雖或不同不可改也然志所言本謂先王之世舊俗所傳禮文小異而可以通行者耳不謂後世失禮之甚者也謂然友曰吾他日未甞學問好馳馬試劍今也父兄百官不我足也恐其不能盡于大事子為我問孟子然友復之鄒問孟子孟子曰然不可以他求者也孔子曰君薨聴于冢宰歠粥面深墨即位而哭百官有司莫敢不哀先之也上有好者下必有甚焉者矣君子之徳風也小人之徳草也草尚之風必偃是在世子不我足謂不以我滿足其意也然者然其不我足之言不可他求者言當責之于己冢宰六卿之長也歠飲也深墨甚黒色也即就也尚加也論語作上古字通用偃仆也孟子言但在世子自盡其哀而已然友反命世子曰然是誠在我五月居廬未有命戒百官族人可謂曰知及至葬四方来觀之顔色之戚哭泣之哀弔者大悦諸侯五月而葬未葬居倚廬于中門之外居喪不言故未有命令教戒也可謂曰知疑有闕誤或曰皆謂世子之知禮也林氏曰孟子之時喪禮既壊然三年之喪惻忍之心痛疾之意出于人心之所固有者初未甞忘也惟其溺于流俗之弊是以喪其良心而不自知耳文公見孟子而聞堯舜性善之説則固有以啟發其良心矣是以至此而哀痛之誠心發焉及其父兄百官皆不欲行則亦反躬自責悼其前行之不足以取信而不敢有非其父兄百官之心雖其資質有過人者而學問之力亦不可誣也及其斷然行之而逺近見聞無不悦服則以人心之所同然者自我發之而彼之心悦誠服亦有所不期然而然者人性之善豈不信哉孟子宰我問三年之喪期已久矣期周年也君子三年不為禮禮必壊三年不為樂樂必崩恐居喪不習而崩壊也舊榖既沒新榖既升鑚燧改火期可已矣沒盡也升登也燧取火之木也改火春取榆栁之火夏取棗杏之火夏季取桑柘之火秋取柞楢之火冬取槐檀之火亦一年而周也已止也言期年則天運一周時物皆變喪至此可止也尹氏曰短喪之説下愚且耻言之宰我親學聖人之門而以是為問者有所疑于心而不敢强焉爾子曰食夫稻衣夫錦于女安乎曰安禮父母之喪既殯食粥粗衰既葬疏食水飲受以成布期而小祥始食菜果練冠縓縁要絰不除無食稻衣錦之理夫子欲宰我反求諸心自得其所以不忍者故問之以此而宰我不察也女安則為之夫君子之居喪食㫖不甘聞樂不樂居處不安故不為也今女安則為之此夫子之言也㫖亦甘也初言女安則為之絶之之辭又發其不忍之端以警其不察而再言汝安則為之以深責之宰我出子曰予之不仁也子生三年然後免于父母之懐夫三年之喪天下之通喪也予也有三年之愛于其父母乎宰我既出夫子懼其真以為可安而遂行之故深探其本而斥之言由其不仁故愛親之薄如此也懐抱也又言君子所以不忍于親而喪必三年之故使之間之或能反求而終得其本心也范氏曰喪雖止于三年然賢者之情則無窮也特以聖人為之中制而不敢過故必俯而就之非以三年之喪為足以報其親也所謂三年然後免于父母之懐特以責宰我之無恩欲其有以跂而及之爾論語齊宣王欲短喪公孫丑曰為朞之喪猶愈于已乎已猶止也孟子曰是猶或紾其兄之臂子謂之姑徐徐云爾亦教之孝弟而已矣紾戾也教之以孝弟之道則彼當自知兄之不可戾而喪之不可短矣孔子曰子生三年然後免于父母之懐予也有三年之愛于其父母乎所謂教之以孝弟者如此盖示之以至情之不能已者非强之也王子有其母死者其傅為之請數月之喪公孫丑曰若此者何如也陳氏曰王子所生之母厭于嫡母而不敢終喪其傅為請于王欲使得行數月之喪也時又適有此事丑問如此者是非何如按儀禮公子為其母練冠麻衣縓縁既葬除之疑當時此禮已廢或既葬而未忍即除故請之也曰是欲終之而不可得也雖加一日愈于已謂夫莫之禁而弗為者也言王子欲終喪而不可得其傅為請雖止得加一日猶勝不加我前所譏乃謂夫莫之禁而自不為者耳此章言三年通喪天經地義不容私意有所短長示之至情則不肖者有以企而及之矣孟子喪父三年喪君三年示民不疑也不疑于君之尊也君無骨肉之親不重其服至尊不明坊記天子之與后猶父之與母也故為天王服斬衰服父之義也后服資衰服母之義也父母者施教令于婦子者也故其服同資當為齊聲之誤也昏義君之喪所以取三年何也曰君者治辨之主也文理之原也情貌之盡也相率而致隆之不亦可乎治辨謂能治人使人辨别也文理法理條貫也原本也情忠誠也貌恭敬也致志也言人所施忠敬無盡于君者則臣下相率服喪而至于三年不亦可乎詩曰愷悌君子民之父母彼君子者固有為民父母之説焉父能生之不能養之養謂哺乳之也養或為食母能食之不能教誨之君者已能食之矣又善教誨之者也食謂禄廪教誨謂制命也三年畢矣哉君者兼父母之恩以三年報之猶未畢也乳母飲食之者也而三月慈母衣被之者也而九月君曲備之者也三年畢乎哉曲備謂兼飲食衣被得之則治失之則亂文之至也文謂法度也治亂所繫是有法度之至也得之則安失之則危情之至也情謂忠厚又使人去危就安是忠厚之至也兩至者俱積焉以三年事之猶未足也直無由進之耳直但也荀子穆公問于子思曰為舊君反服古與仕焉而已者穆公魯哀公之曽孫子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若将加諸膝退人若将隊諸淵母為戎首不亦善乎又何反服之禮之有言放逐之臣不服舊君也為兵主来攻伐曰戎首檀弓子思居衛魯穆公卒縣子使乎衛謂子思曰子雖未臣魯父母之國也先君宗廟在焉奈何不服子思曰吾豈愛乎禮不得也臣而去國君不歸其宗廟則為之服寄公寓乎是國而為國服吾既無列于魯而祭在衛吾何服哉是寄臣而服所寄之君則舊君無服明不二君之義也孔叢子齊宣王曰禮為舊君有服何如斯可為服矣儀禮曰以道去君而未絶者服齊衰三月王疑孟子之言太甚故以此禮為問曰諫行言聴膏澤下於民有故而去則君使人導之出疆又先于其所徃去三年不反然後収其田里此之謂三有禮焉如此則為之服矣導之出疆防剽掠也先于其所徃稱道其賢欲其收用之也三年而後収其田禄里居前此猶望其歸也今也為臣諫則不行言則不聽膏澤不下于民有故而去則君摶執之又極之于其所徃去之日遂収其田里此之謂冦讎冦讎何服之有極窮也窮之于其所徃之國如晋錮欒盈也而潘興嗣曰孟子告齊王之言猶孔子對定公之意也其言有迹不若孔子之渾然也盖聖賢之别如此楊氏曰君臣以義合者也故孟子為齊王深言報施之道使知為君者不可不以禮遇其臣耳若君子之自處則豈處其薄乎孟子曰王庶㡬改之予日望之君子之言盖如此孟子親親尊尊長長男女之有别人道之大者也言報之所以隆殺喪服小記親親以三為五以五為九上殺下殺旁殺而親畢矣已上親父下親子三也以父親祖以子親孫五也以祖親髙祖以孫親𤣥孫九也殺謂親益疏者服之則輕同上𫝊曰罪多而刑五喪多而服五上附下附列也列等比也服問服術有六一曰親親二曰尊尊三曰名四曰出入五曰長㓜六曰從服術猶道也親親父母為首尊尊君為首名世母叔母之屬也出入女子子嫁者及在室者長㓜成人及殤也从服若夫為妻之父母妻為夫之黨服從服有六有屬從子為母之黨有徒從臣為君之黨有從有服而無服公子為其妻之父母有從無服而有服公子之妻為公子之外兄弟有從重而輕夫為妻之父母有從輕而重公子之妻為其皇姑自仁率親等而上之至於祖名曰輕自義率祖順而下之至于禰名曰重一輕一重其義然也自猶用也率循也用恩則父母重而祖輕用義則祖重而父母輕恩重者為之三年義重者為之齊衰然如是也大𫝊有從輕而重公子之妻為其皇姑皇君也諸侯妾子之妻為其君姑齊衰與為小君同舅不厭婦也有從重而輕為妻之父母妻齊衰而夫從緦麻不降一等言非服差有從無服而有服公子之妻為公子之外兄弟謂為公子之外祖父母從母緦麻有從有服而無服公子為其妻之父母凡公子厭于君降其私親女君之子不降也服問從服者所從亡則己謂若為君母之父母昆弟从母也屬從者所從雖沒也服謂若自為己之母黨妾從女君而出則不為女君之子服妾為女君之黨服得與女君同而今俱出女君猶為子期妾于義絶無施服小記庶子不為長子斬不繼祖與禰故也尊先祖之正體不二其統也言不繼祖禰則長子不必五世同上庶子不得為長子三年不繼祖也大傳為父後者為出母無服無服也者喪者不祭故也適子正體于上當祭祀也小記子上之母死而不喪子上孔子曽孫子思伋之子名白其母出門人問諸子思曰昔者子之先君子喪出母乎曰然禮為出母期父卒為父後者不服耳子之不使白也喪之何也子思曰昔者吾先君子無所失道道隆則從而隆道汚則從而汚汚猶殺也有隆有殺進退如禮伋則安能自予不能及為伋也妻者是為白也母不為伋也妻者是不為白也母故孔子之不喪出母自子思始也記禮所由廢非之檀弓喪服兄弟之子猶子也盖引而進之也嫂叔之無服也盖推而逺之也或引或推重親逺别姑姊妹之薄也盖有受我而厚之者也欲其一心于厚之者姑姊妹嫁大功夫為妻期同上四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣四世共髙祖五世髙祖昆弟六世以外親盡無屬大傳絶族無移服族昆弟之子不相為服親者屬也有親者服各以其屬親疏同上喪紀以服之輕重為序不奪人親也紀猶事也公族之罪刑于隠者不與國人慮兄弟也弗弔弗為服哭于異姓之廟為忝祖逺之也素服居外不聽樂私喪之也骨肉之親無絶也文王世子弟子為師服者弟子有君臣父子朋友之道也故生則尊敬而親之死則哀痛之恩深義重故為之隆服入則絰出則否白虎通哀公問曰紳委章甫委曲貌章甫冠名也有益于仁乎孔子作色而對曰君胡然焉衰麻苴杖者志不存乎樂非耳弗聞服使然也家語斬衰三升齊衰四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升去其半有事其縷無事其布曰緦此哀之發于衣服者也詳見喪服制度斬衰何以服苴苴惡貌也所以首其肉而見諸外也間傳絰也者實也所以表哀戚檀弓或問曰冠者不肉袒何也怪冠衣之相為也曰冠至尊也不居肉袒之體也故為之免以代之也言身無飾者不敢冠冠為䙝尊服肉袒則著免免状如冠而廣一寸然則秃者不免傴者不袒跛者不踊非不悲也身有錮疾不可以備禮也故曰喪禮唯哀為主矣女子哭泣悲哀擊胸傷心男子哭泣悲哀稽顙觸地無容哀之至也将踊先袒先免此三疾俱不踊不袒不免頋其所以否者各為一耳擊胸傷心稽顙觸地不踊者若此而可或曰男女哭踊或問曰免者以何為也怪本所為施也曰不冠者之所服也禮曰童子不緦唯當室緦緦者其免也當室則免而杖矣不冠者猶未冠也當室謂無父兄而主家者也童子不杖不杖者不免當室則杖而免免冠之細别以次成人也緦者其免也言免乃有緦服也問喪男子冠而婦人笄男子免而婦人髽其義為男子則免為婦人則髽别男女也小記或問曰杖者何也怪其各異義曰竹桐一也故為父苴杖苴杖竹也為母削杖削杖桐也言所以杖者義一也頋所用異耳或問曰杖者以何為也怪所為施曰孝子喪親哭泣無數服勤三年身體病羸以杖扶病也言得杖乃能起也數或為時則父在不敢杖矣尊者在故也堂上不杖辟尊者之處也堂上不趨示不遽也此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而已矣父在不杖辟尊者之處不杖有事不趨皆為其感動使之憂戚也問喪裘之裼也見美也弔則襲不盡飾也喪非所以見美玉藻𤣥冠不以弔者不以吉服臨人凶示助哀也白虎通凡見人無免絰雖朝于君無免絰唯公門有稅齊衰傳曰君子不奪人之喪亦不可奪喪也見人謂行求見人也無免絰絰重也稅猶免也古者説或作稅有免齊衰謂不杖齊衰也于公門有免齊衰則大功有免絰也服問男子除乎首婦人除乎帶男子何為除乎首也婦人何為除乎帶也男子重首婦人重帶詳見變除練受服除服章不能三年之喪而緦小功之察此之謂不知務孟子禮書綱目卷二十二
