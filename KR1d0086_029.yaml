body:
  text: 禮書綱目卷二十七婺源江永撰喪大記下凶禮十補世婦掌喪紀之事帥女宫而濯溉為齍盛溉式也為猶差擇天官內豎若有喪紀之事則為內人蹕內人從世婦于廟者內豎為六宫蹕者以其掌內小事几同上夕小斂章有封人等七官大斂章有司几筵設席朝奠章有司服共奠衣服朔月月半奠章有籩人共薦籩羞籩外饔實鼎俎天子喪斬衰者奠諸侯喪齊哀者奠皆此章通用此兩條祖奠遣奠通用右陳朝祖奠喪祝及辟令啓鄭司農云辟謂除菆塗椁也令啓謂喪祝主命役人開之也檀弓曰天子之殯也菆塗龍輴加斧于椁上畢塗屋天子之禮也小喪亦如之春官右啓閽人喪紀之事設門燎蹕宫門廟門燎地燭也蹕止行者廟在中門之外氏地官燭設燎章內有委人共薪蒸司烜共墳庭燎君堂上二燭並此章通用士師諸侯為賓則帥其屬而蹕於王宫大喪亦如之秋官內豎王后之喪遷於宫中則前蹕喪遷者將葬朝于廟天官大司冦前王大喪亦如之大喪所前或嗣王小司冦大賓客前王而辟后世子之喪亦如之並秋官閭胥凡喪紀之數聚衆庶喪紀大喪之事大司徒大喪帥六鄉之衆庶屬其六引而治其政令衆庶所致役也鄭司農云六引謂喪車索也六鄉主六引六遂主六紼遂人大喪帥六遂之役而致之及葬帥而屬六綍及窆陳役致役致于司徒給墓上事及竁也綍舉棺索也葬舉棺者謂載與説時也用綍旁六執之者天子其千人與陳役者主陳列之耳匠師帥監之鄉師以斧涖焉大喪之正棺殯啓朝及引六鄉役之載及窆六遂役之亦即逺相終始也鄭司農云窆謂下棺時遂人主陳役也禮記謂之封春秋謂之塴皆葬下棺也聲相似小司徒大喪帥邦役治其政教喪役正棺引窆覆土鄉師大喪用役則帥其民而至遂治之治謂監督其事用並地官小已上五條柩行通內遂人司徒二條並窆通用喪祝及朝御匶鄭司農云朝謂將葬朝于祖考之廟而後行則喪祝為御柩也檀弓曰喪之朝也順死者之孝心也其哀離其室也故至于祖考之廟而後行殷朝而殯于祖周朝而遂葬故春秋傳曰凡夫人不殯于廟不祔于姑則弗致也晉文公卒將殯于曲沃就宗廟晉宗廟在曲沃故曰曲沃君之宗也又曰丙牛入于曲沃丁未朝于武宫小喪亦如之春官升正柩諸侯執綍五百人四綍皆銜枚司馬執鐸左八人右八人匠人執羽葆御柩大夫之喪其升正柩也執引三百人執鐸者左右各四人御柩以茅升正柩者謂將葬朝于祖正棺于廟也五百人謂一黨之民諸侯之大夫邑有三百户之制綍引同耳廟中曰綍在塗曰引互言之御柩者居前道正之大夫士皆二綍二雜記喪祝乃奠玄謂乃奠朝廟奠小喪亦如之春官天府凡吉凶之事祖廟之中沃盥執燭吉事四時祭也凶事王后喪朝于祖廟之奠同上遂師大喪共蜃車之役蜃車柩路也柩路載栁四輪造地而行有似于蜃因取名焉稍人大喪帥蜃車與其役以至掌其政令以聼於司徒蜃車及役遂人共之稍人者野監是以帥而致之既夕禮曰既正柩賓出遂匠納車于階間則天子以至于士柩路皆從遂來並地官巾車小喪共匶路柩路載柩車也春官祥車曠左空神位也祥車葬之乘車至曲禮已上四條柩行通用又壙章陳車窆章喪不以制此章通用圉人凡喪紀牽馬而入陳喪紀之馬啓後所薦馬廞馬亦如之廞馬遣車之馬人捧之亦牽而入陳通夏官柩行通用廞馬一節陳明器用士喪有與天子同者三其終夜燎其乘人専道而行詳見士喪禮朝祖右朝祖奠薦車馬叔孫豹卒杜泄將以路葬且盡卿禮季孫使杜泄舍路不可曰夫子受命於朝而聘於王在襄二十四年王思舊勳而賜之路感其有禮以念其先人復命而致之君豹不敢自乘君不敢逆王命而復賜之使三官書之吾子為司徒實書名謂季孫也書名定位號夫子為司馬與工正書服謂叔孫也服車服之器工正所書孟孫為司空以書勳勳功也今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之遂使以葬昭四年左氏傳鄭公孫蠆卒赴於晉晉侯善於伐秦也六月晉侯請於王王追賜之大路使以行禮也大路天子所賜車之總名以行葬禮傳言大夫有功則賜服路傳襄十九年左氏喪禮及祖飾棺乃載祖為行始其序載而後飾小喪亦如之春官右載縫人喪縫棺飾焉孝子既啓見棺猶見親之身既載飾而以行遂以葬若存時居于帷幕而加文繡喪大記曰飾棺君龍帷云云故書焉為馬杜子春云當為焉衣翣柳之材必先纒衣其材乃以張飾也栁之言聚諸飾之所聚書曰分命和仲度西曰栁穀天官飾棺君龍帷三池振容黼荒火三列黻三列素錦褚加偽荒纁紐六齊五采五貝黼翣二黻翣二畫翣二皆戴圭魚躍拂池君纁戴六纁披六大夫畫帷二池不振容畫荒火三列黻三列素錦褚纁紐二玄紐二齊三采三貝黻翣二畫翣二皆戴綏魚躍拂池大夫戴前纁後玄披亦如之士布帷布荒一池揄絞纁紐二緇紐二齊三采一貝畫翣二皆戴綏士戴前纁後緇二披用纁飾棺者以華道路及壙中不欲衆惡其親也荒蒙也在旁曰帷在上曰荒皆所以衣栁也士布帷布荒者白布也君大夫加文章焉黼荒緣邉為黼文畫荒緣邉為雲氣火黻為列于其中耳偽當為帷或作于聲之誤也大夫以上有褚以襯覆棺乃加帷荒于其上紐所以結連帷荒者也池以竹為之如小車笭衣以青布栁象宫室縣池于荒之爪端若承霤然云君大夫以銅為魚縣于池下揄揄翟也青質五色畫之于絞繒而垂之以為振容象水草之動搖行則又魚上拂池雜記曰大夫不揄絞屬于池下是不振容也士則去魚齊象車蓋㽔縫合雜采為之形如瓜分然綴貝落其上及旁戴之言值也所以連繫棺束與栁材使相值因而結前後披也漢禮翣以木為筐廣三尺髙二尺四寸方兩角髙衣以白布畫者畫雲氣其餘各如其象柄長五尺車行使人持之以從既窆樹于壙中檀弓曰周人牆置翣是也綏當作緌讀如冠㽔之蕤蓋五采羽注于翣首也喪大記大夫不揄絞屬於池下謂栁飾也揄揄翟也采青黃之間曰絞屬猶繫也人君之栁其池繫絞繒于下而畫雉翟焉名曰振容又有銅魚在其間大夫去振容士去魚此無人君及士亦爛脫雜記天子七月而葬五重八翣諸侯五月而葬三重六翣大夫三月而葬再重四翣注見陳明器章禮器有虞氏之綏夏后氏之綢練殷之崇牙周之璧翣綏亦旌旗之緌也夏綢其杠以練為之旒殷又刻繒為重牙以飾其側亦飾彌多也湯以武受命恆以牙為飾也此旌旗及翣皆喪葬之飾周禮大喪葬巾車執蓋從車持旌御僕持翣旌從遣車翣夾柩路左右前後天子八翣皆戴璧垂羽諸侯六翣皆戴圭大夫四翣士二翣皆戴緌孔子之喪公西赤為志亦用此焉爾雅説旌旌曰素錦綢杠纁帛縿素升龍于縿練旒九明堂位巾車小喪共匶路與其飾匶路載柩車也飾棺飾也春官喪祝凡卿大夫之喪掌事而飾棺焉詳見小斂章右飾棺翣披旌旗孔子之喪公西赤為志焉公西赤孔子弟子志謂章飾飾棺牆牆之障柩猶垣牆障家置翣牆栁衣翣以布衣木如褶與設披周也設崇殷也綢練設旐夏也夫子雖殷人兼用三王之禮尊之披柩行夾引棺者崇牙旗旌飾也綢練以練綢旌之杠此旌葬乘車所建者旌之旐緇飾廣充幅長尋曰旒爾雅説旌旗曰素錦綢杠檀弓司服大喪共其廞衣服故書廞為淫鄭司農云淫讀為廞廞陳也玄謂廞衣服所藏于椁中並春官器自衣服以下獻明章通用司常大喪建廞車之旌及葬亦如之葬云建之時行廞車解説之車僕大喪廞革車言興革車則遣車不徒戎路廣闕蘋輕皆有焉巾車大喪飾遣車遂廞之行之廞興也謂陳駕之行之使人以次舉之以如墓也遣車一曰鸞車並春官司裘大喪廞裘飾皮車皮車遣車之革路故書廞為淫鄭司農云淫裘陳裘也玄謂廞與也若詩之興謂象似而作之凡為神之偶衣物必沽而小耳天官校人大喪飾遣車之馬及葬埋之言埋之則是馬塗車之芻靈人夏官通柩行章內有冢人鸞車象此章用圉人凡喪紀廞馬詳見朝祖奠章遣車視牢具言車多少各如所包遣奠牲體之數也然則遣車載所包遣奠而藏之者與遣奠天子大牢包九箇諸侯亦大牢包七箇大夫亦大牢包五箇士少牢包三箇大夫以上乃有遣車雜記君之適長殤車三乘公之庶長殤車一乘大夫之適長殤車一乘皆不成人也自士而下降殺以兩成人遣車五乘長殤三乘下殤一乘尊卑以此差之庶子言公卑逺之傳曰大功之殤中從上檀弓天子五重諸侯三重大夫再重天子葬五重者謂抗木與茵也葬者抗木在上茵在下士喪禮下篇陳器曰抗木橫三縮二加抗席三加茵用疏布緇翦有幅亦縮二橫三此士之禮一重者以此差之上公四重禮器澤虞喪紀共其葦蒲之事葦以闉壙蒲以為席掌荼掌以時聚荼以共喪事共喪事者以著物也既夕禮曰茵著用荼並地官司兵大喪廞五兵故書廞為淫鄭司農云淫陳也淫讀為廞玄謂廞興也興作明器之役器五兵也士喪禮下篇有甲胄干笮司弓矢大喪共明弓矢弓矢明器之用器也士喪禮下篇曰用器弓矢官並夏司干大喪廞舞器樂司凡喪陳樂器則帥樂官帥樂官往陳之大司樂大喪涖廞樂器涖臨也廞興也臨笙師鎛師之屬興謂作之也視瞭大喪廞樂器笙師大喪廞其樂器廞興也興謂作之鎛師大喪廞其樂器籥師大喪廞其樂器典庸器大喪廞筍虡廞興也興謂作之並春官右陳明器曽子曰晏子可謂知禮也已恭敬之有焉言禮者敬而已矣有若曰晏子一狐裘三十年遣車一乘及墓而反國君七個遣車七乘大夫五個遣車五乘晏子焉知禮言其大儉逼下非之及墓而反言其既窆則歸不留賓客有事也人臣賜車馬者乃得有遣車遣車之差大夫五諸侯七則天子九諸侯不以命數喪數略也個謂所包遣奠牲體之數也雜記曰遣車視牢具曽子曰國無道君子恥盈禮焉國奢則示之以儉國儉則示之以禮時齊方奢矯之是也檀弓宋襄公葬其夫人醯醢百甕曽子曰既曰明器矣而又實之言名之為明器而與祭器皆實之是亂鬼器與人器上同喪祝及祖飾棺遂御鄭司農云祖謂將葬祖于庭象生時出則祖也故曰事死如事生禮也檀弓曰飯于牖下小斂于户內大斂于阼殯于客位祖于庭葬于墓所以即逺也祝時喪祝主飾棺乃載遂御之喪祝為柩車御也或謂及祖至祖廟也玄謂祖為行始飾棺設栁池紐之屬其序載而後御既飾當還車鄉外喪祝御之御之者執翿居前卻行為節度小喪亦如之春官等小斂章有封人七官大斂章司几筵設葦席朝夕奠章司服共奠衣服朔月月半奠章籩人共薦籩羞籩外饔實鼎俎天子喪斬衰者奠諸侯喪齊衰者奠啓章世婦濯溉為齍盛內堅為內人蹕皆祖奠所通用右祖奠大師大喪帥瞽而廞作匶諡廞興也興言王之行謂諷誦其治功之詩故書廞為淫鄭司農云淫陳也陳其生時行迹為作諡瞽矇諷誦詩世奠繫鼓琴瑟玄謂諷誦詩主謂廞作柩諡時也諷誦王治功之詩以為諡世之而定其繫謂書于世本也雖不歌猶鼓琴瑟以播其音美之小師大喪與廞從大師大祝作六辭以通上下親疏逺近六曰誄鄭司農云誄謂積纍生時德行以賜之命主為其辭也春秋傳曰孔子卒哀公誄之旻天不弔不憖遺一老俾屏余一人以在位煢煢豫在疚嗚呼哀哉尼父無自律此皆有文雅辭令難為者也故大祝主作六辭或曰誄論語所謂誄曰禱爾於上下神祗大史大喪遣之日讀誄遣謂祖廟之庭大奠將行時也人之道終于此纍其行而讀之大師又帥瞽廞之而作諡瞽史知天道使共其事言王之誄諡成于天道凡喪事考焉為有得失小喪賜諡小喪卿大夫也小史大喪佐大史卿大夫之喪賜諡讀誄其讀誄亦以大史賜諡為節事相成也並春官惟周公旦太公望開嗣王業建功於牧野及終將葬乃制諡遂敘諡法諡者行之迹號者功之表古者有大功則賜之善號以為稱也車服者位之章也是以大行受大名細行受細名行出於己名生於人名謂諡號民無能名曰神不名一善一德不懈曰簡一不委曲靖民則法曰皇靖安平易不訾曰簡不信訾毁德象天地曰帝同于天帝尊賢貴義曰恭尊事賢人寵貴義士仁義所往曰王民往歸之敬事供上曰恭供奉也立志及衆曰公志無私也尊賢敬讓曰恭敬有德讓有功執應八方曰侯所執行八方應之既過能改曰恭言自知也賞慶刑威曰君能行四者執事堅固曰恭守正不移從之成羣曰君民從之愛民悌長曰恭順長自下揚善賦簡曰聖所稱得人所善得實所敷得簡執禮御賓曰恭迎待賓也敬祀享禮曰聖既敬于祀能通神道芘親之闕曰恭修德以益之照臨四方曰明以明照之尊賢讓善曰恭不専已善推之于人譛訴不行曰明逆知之故不行威儀悉備曰欽威則可畏儀則可象經緯天地曰文成其道大慮慈民曰定思樹德道德博聞曰文無不知純行不差曰定行一不傷勤學好問曰文不恥下問安民大慮曰定以慮安民慈惠愛民曰文惠以成政安民法古曰定不失舊意愍民惠禮曰文惠而有禮闢土有德曰襄取之以義賜民爵位曰文與同升甲胄有勞曰襄亟征伐綏柔士民曰德安民以居安土以事小心畏忌曰僖思所當忌諫爭不威曰德不以威距諫有伐而還曰釐知難而退剛強直理曰武剛無欲強無撓直正直理忠恕質淵受諫曰僖深故能受威強敵德曰武與有德者敵溫柔賢善曰懿性能純善克定禍亂曰武以兵往故能定心能制義曰度制事得宜刑民克服曰成法以正民能使服也聰明睿哲曰獻有通知之聰夸志多窮曰武大志行兵多所窮極智質有聖曰獻有所通而無蔽安民立政曰成政以安民五宗安之曰孝五世之宗淵源流通曰康性無忌慈惠愛親曰孝周愛親族溫年好樂曰康好豐年勤民事協時肇享曰孝協和肇始當如初秉德不回曰孝順于德而不違安樂撫民曰康無四方之虞令民安樂曰康富而教之執心克莊曰齊能自嚴布德執義曰穆舜典四門穆穆輕輶供就曰齊輶有所輕而供成輔輕輶周書作輔輕史記正義作資就共曰齊注云資輔佐而共成中情見貌曰穆性心露也甄心動懼曰頃甄情甄史注作精容儀恭美曰昭有儀可象行恭可美敏以敬慎曰頃疾于所敬昭德有勞曰昭能勞謙柔德考衆曰靜成衆使安聖善周聞曰宣通于善道聲教宣聞周按此句後有之周書及史記正義云聖聞達曰昭注聖聖通合恭己鮮言曰靖恭己正身少言而中治而無青曰平無災罪也寬樂令終曰靖性寬樂義以善自終執事有制曰平不任意威德剛武曰圉禦亂患布綱治紀曰平施之政事彌年夀考曰胡久其年由義而濟曰景用義而成保民耆艾曰胡六十耆七十艾耆意大慮曰景耆強也強毅果敢曰剛釐于義致志固布義行剛曰景以剛行義追補前過曰剛勤善以補過清白守節曰貞行清白執志固猛以剛果曰威猛則少寬果敢行大慮克就曰貞幹事能成正史注能大慮非而何不隱無屏曰貞史屏作屈注恆然無私又此句上有猛以強果曰威注強甚于剛強毅執正曰威史注問正言無邪注有誤字又周書執作信亦非闢土服逺曰桓以武力征四夷治典不殺曰祈秉常不衰史作祁克敬勤民曰桓敬以使之大慮行節曰孝言成其節闢土兼國曰桓兼人故啓土治民克盡曰使克盡恩惠能思辨衆曰元别之使各有次好和不爭曰安坐在少斷少史注作生而斷行義説民曰元民説其義道德純一曰思道大而德一始建國都曰元非善之長何以始之大省兆民曰思大親民而不侈主義行德曰元以義為主德史注有行政字外內思索曰思言求義聖善周聞曰宣聞謂所聞善事追悔前過曰思思而能改兵革亟作曰壯以數征為嚴行見中外曰慤表裏如一睿圉克服曰壯禁圉敵人能使服之能睿字誤史注通邉圉使服狀古述今曰譽史注立言之稱勝敵克亂曰壯勝敵故能克亂不史作勝敵志強曰莊注撓故勝又上下諸壯字皆作莊昭功寧民曰商商度事宜所以安民史注明有功者死於原野曰壯非嚴何以死難克殺秉正曰夷秉正不任賢史正作政屢征殺伐曰壯以嚴整之安民好靜曰夷周書史記民皆作心注不爽政武而不遂曰壯武功不成執義揚善曰懷稱人之善柔質慈民曰惠賑孤惸加施惠知史注云其性慈仁短折曰懷短未六十折未三十愛民好與曰惠與謂施述義不克曰丁欲立志義而弗能成夙夜敬戒曰敬敬身急戒周書史記作警戒述事不弟曰丁不孫弟夙興恭事曰敬敬以蒞事有功安民曰烈以武立功象方益平曰敬法常而知秉德尊業曰烈業以通德為而能尊令善典法曰敬非敬何以善之剛克為伐曰翼伐功也剛德克就曰肅成其敬使為終思慮深逺曰翼好逺思不任亂史注小心翼翼執心決斷曰肅言嚴果外內貞復曰白正而復約始一一史注正而復始終不生其國曰聲生于外家不勤成名曰靈任本性不見賢思齊未家短折曰傷未嫁未娶死而志成曰靈上志不吝命命史注志事不吝愛民好治曰戴愛治其民天下戴仰死見神能曰靈有鬼不為厲典禮不倦曰戴倦過云史作不愆注無過亂治不損曰靈不能以治損亂而周書史記作亂短折不成曰殤幼稚而夭殤好祭鬼交曰靈瀆鬼神不致逺記周書交作神史作怪隱拂不成曰隱不以隱拂改其性極知鬼事曰靈其智能聰徹之史事作神不顯尸國曰隱以間主國見美堅長曰隱美過其令殺戮無辜曰厲官人應實曰知能官人愎很遂過曰刺去諫曰愎反是曰很肆行勞祀曰悼放心勞于淫祀言不修德也不思忘愛曰刺忌甚忌史注其愛已者本注忌甚字即忘其之誤年中蚤夭曰悼年不稱志早孤短折曰哀早未知人事云周書史記此下云恐懼從處曰悼注從處言險圯又恭仁短折曰哀注體恭質仁功未施凶年無穀曰粳不務稼穡史粳作荒好變動民曰躁好改舊以勞動民史注數移徙外內從亂曰荒家不治官不治不悔前過曰戾知而不改好樂怠政曰荒淫于聲樂怠于政事怙威肆行曰醜肆意行威在國遭憂曰愍仍多大喪雍遏不通曰幽權臣擅命故令不達在國逢難曰愍兵冦之事早孤銷位曰幽銷位即位而卒作銷當作殞周書作有史記鋪皆誤也禍亂方作曰愍史注國無政動長亂動祭亂常曰幽易神之班使民悲傷曰愍妨政賊害苛史注妨作柔質受諫曰慧或作惠注受諫以為慧史以虛受人貞心大度曰匡心正而名察察史注心正而用少名實不爽曰質名實內外相應不差德正應和曰莫史注正其德應其和溫良好樂曰良言其人可好可樂施勤無私曰惠史惠作類注無私唯義所在周書云勤政無私曰類慈和遍服曰順史注能使人皆服其慈和思慮果敢曰蹕周書無此句史記云思慮果逺曰明注自任多近于専博聞多能曰憲雖多能不至于大道周書無此句嗇於施與曰愛史注言貪吝滿志多窮曰惑自足者必不足危身奉上曰忠險不辭難思慮不爽曰原不差所思而得厚周書作願史記作克威捷行曰魏有威而敏行好內逺禮曰煬淫于家不奉禮克威順禮曰魏雖威不逆禮作周書史記順惠好內怠政曰煬內則淫朋外則怠政怠政外交曰攜不自明而博外交去禮逺衆曰煬史注不率禮不親長教誨不倦曰長史注以道教之疏逺繼位曰逺周書史逺作紹肇敏行成曰直史注始疾行成言不深彰義掩過曰堅史注明義以蓋前過內外賓服曰正史注言以正服之華言無實曰夸史注恢誕好廉自克曰節廉儉不傷財不害民史注自勝其情欲逆天虐民曰炕史作抗注背尊大而逆之好更改舊曰易變故改常名與實爽曰繆史注言名美而實傷愛民在刑曰克道之以政齊之以法擇善而從曰比比方善而從之除害去虐曰湯亂而不損為靈貪亂宜亡而神靈之曲也隱哀之方也景武之方也施德為文除惡為武辟地為襄服逺為桓剛克為發柔克為懿履正為莊有過為僖施而不私為宣雲行雨施日月無私鄉惠無內德為獻無內德謂惠不成也史作惠無內德為平由義而濟為景失志無輔則以其明餘皆象也以其明所及為諡象其事也諡法解賤不誄貴幼不誄長禮也誄纍也纍列生時行述讀之以作諡諡當由尊者成唯天子稱天以誄之以其無尊焉春秋公羊説以為讀誄制諡于南郊若云受之于天然諸侯相誄非禮也禮當言誄于天子也天子乃使大史賜之諡曽子問幼名冠字五十以伯仲死諡周道也檀弓古者五十而后爵死而諡今也古者生無爵死無諡古謂殷以前也大夫以上乃謂之爵死有諡也周制爵及命士雖及之猶不諡耳今記時死則諡之非禮也郊特牲諸侯言諡曰類詳見喪通禮名位章右諡誄人臣之喪有錫命附見于下莊公元年王使榮叔來錫桓公命追命桓公褒稱其德若昭七年王追命衛襄之比左氏春秋衛侯惡卒告喪于周且請命王使成簡公如衛弔簡公王卿士也且追命襄公曰叔父陟恪在我先王之左右以佐事上帝陟降也恪敬也帝天也叔父謂襄公如今之哀册余敢忘髙圉亞圉二圉周之先也為殷諸侯亦受殷王追命者昭七年左氏傳楚子疾告大夫曰不穀不德少主社稷生十年而喪先君未及習師保之教訓而應受多福多福謂為君是以不德而亡師于鄢鄢在成十六年以辱社稷為大夫憂其𢎞多矣𢎞大也若以大夫之靈獲保首領以沒于地唯是春秋窀穸之事窀厚也穸夜也厚夜猶長夜春秋謂祭祀長夜謂葬埋所以從先君于禰廟者從先君代為禰廟請為靈若厲欲受惡諡以歸先君也亂而不損曰靈戮殺不辜曰厲大夫擇焉莫對及五命乃許秋卒子囊謀諡大夫曰君有命矣子囊曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂恭乎請諡之共大夫從之傳言子囊之善傳襄十三年左氏閔馬甫曰周共王能庇昭穆之闕而為恭恭王周昭王之孫穆王之子也昭王南征而不反穆王欲肆其心皆有闕失言恭王能庇覆之故為恭也楚恭王能知其過而為恭國語魯語公叔文子卒文子衛獻公之孫名拔或作發其子戍請諡于君曰日月有時將葬矣請所以易其名者諡者行之迹有時猶言有數也大夫士三月而葬君曰昔者衛國凶飢夫子為粥與國之餓者是不亦惠乎君靈公也昔者衛國有難夫子以其死衛寡人不亦貞乎難謂魯昭公二十年盜殺衛侯之兄縶也時齊豹作亂公如死焉夫子聽衛國之政修其班制以與四鄰交衛國之社稷不辱不亦文乎班制謂尊卑之差故謂夫子貞惠文子後不言貞惠者文足以兼之也檀弓魯哀公誄孔丘曰天不遺耆老莫相豫位焉嗚呼哀哉尼父誄其行以為諡也莫無也相佐也言孔子死無佐助我處位者尼父因其字以為之諡上同孔丘卒公誄之曰旻天不弔不憖遺一老俾屏余一人以在位煢煢余在疚嗚呼哀哉尼父無自律疚病也律法也言喪尼父無以自為法子貢曰夫子之言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱一人非名也君兩失之哀十六年左氏傳魯莊公及宋人戰于乘丘十年夏縣賁父御卜國為右縣卜皆氏也凡車右勇力者為之馬驚敗績驚奔失列公隊佐車授綏戎車之二曰佐受綏秉公公曰末之卜也末之猶微哉言卜國無勇縣賁父曰他日不敗績而今敗績是無勇也公他日戰其御馬未嘗驚奔遂死之二人赴敵而死圉人浴馬有流矢在白肉圉人掌馬者白肉股裏肉公曰非其罪也流矢中馬非御與右之罪遂誄之誄其赴敵之功以為諡士之有誄自此始也記禮失所由來也周雖以士為爵猶無諡也殷大夫以上為爵檀弓大司馬喪祭奉詔馬牲王喪之以馬祭者蓋遣奠也奉猶送也送之至墓告而藏之小司馬小喪紀掌其事如大司馬之法並夏官司尊彛大喪存奠彛存省也謂大遣時奠者朝夕乃徹也鬱人大喪及葬共其祼器遂貍之遣奠之彛與瓉也貍之于祖廟階間明奠終于此小祝大喪及葬設道齎之奠分禱五祀杜子春云齎當為粢道中祭也漢武每街路輒祭玄謂齎猶送也送道之奠猶遣奠也分其牲體以祭五祀告王去此宫中不復反故興祭祀也王七祀五者司命大厲平生出入不以告奠並春官凡祖奠所通用者皆遣通用右大遣奠量人掌喪祭奠竁之俎實竁亦有俎實謂所包遣奠士喪禮下篇曰藏苞筲于旁夏官大夫之喪既薦馬薦馬者哭踊出乃包奠而讀書嫌與士異記之也既夕禮曰包牲取下體又曰主人之史請讀賵雜記右包奠讀賵遂師大喪帥其屬以幄帟先道野役使以幄帟先者大宰也其餘司徒也幄帟先所以為葬窆之間先張神坐也道野役帥以至墓也地官陳殯具章幕人掌次此章通用朝祖章閭胥聚衆庶大司徒帥六鄉屬六引遂人屬六綍小司徒帥邦役鄉師帥民又薦車馬陳明器兩章並此章通用鄉士大喪紀各掌其鄉之禁令帥其屬夾道而蹕屬中士以下秋官方相氏大喪先匶葬使之道夏官喪祝及葬御匶出宫乃代喪祝二人相與更也小喪亦如之春官鄉師及葬執纛以與匠師御匶而治役匠師事官之屬其于司空若鄉師之于司徒也鄉師主役匠師主衆匠共主葬引翿羽葆幢也爾雅曰纛翳也以指麾挽柩之役正其行列進退地官司士作六軍之士執披作謂使之也披柩車行所以披持棺者有紐以結之謂之戴鄭司農云披者扶持棺險者也天子旁十二諸侯旁八大夫六士四玄謂結披必當棺東于束繫紐天子諸侯戴柩三束大夫士二束喪大記曰君纁披六大夫披四前纁後玄士二披用纁人君禮文欲其數多圍數兩旁言六耳其實旁三夏官喪祝掌大喪勸防之事鄭司農云勸旁引柩也杜子春云防當為披玄謂勸猶倡帥前引者防謂執披備傾虧小喪亦如之大史大喪執法以涖勸防鄭司農云勸防引六紼巾車大喪及葬執蓋從車持旌從車隨柩路持蓋與旌者王平生時車建旌兩則有蓋今蜃車無蓋執而隨之所執者銘旌並春官御僕大喪持翣翣棺飾也持之者夾蜃車夏官女御后之喪持翣翣棺飾也持而從柩車天官冡人大喪及葬言鸞車象人鸞車巾車所飾遣車也亦設鸞旗鄭司農云象人謂以芻為人言言問其不如法度者玄謂言猶語也語之者告當行若于生存者于是巾車行之孔子謂為芻靈者善謂為俑者不仁非作象人者不殆于用生乎春官虎賁氏及葬從遣車而哭遣車王之魂魄所馮依夏官內豎王后之喪及葬執褻器以從遣車褻器振飾頮沐之器天官君葬用輴四綍二碑御棺用羽葆大夫葬用輴二綍二碑御棺用茅士葬用國車二綍無碑比出宫用功布大夫廢輴此言輴非也輴皆當為載以輇車之輇聲之誤也輇字或作團是以又誤為國輇車柩車也尊卑之差也在棺曰綍行道曰引至壙將窆又曰綍而設碑是以連言之碑桓楹也御棺居前為節度也士言比出宫用功布則出宫而止至壙無矣綍或為率車喪大記祥朝祖為車章遂師共蜃車稍人帥蜃車巾共匶路車曠左此章通用此條四綍二碑窆章通用鄉士三公若有邦事則為之前驅而辟其喪亦如之遂士六卿有邦事則為之前驅而辟其喪亦如之縣士大夫有邦事則為之前驅而辟其喪亦如之並秋官士喪有與天子同者三其終夜燎及乘人専道而行詳見士喪朝祖章右柩行鄭簡公卒將為葬除除葬道及遊氏之廟遊氏子太叔族將毁焉子大叔使其除徒執用以立而無庸毁用毁廟具曰子産過女而問何故不毁乃曰不忍廟也諾將毁矣教毁廟者之辭既如是子産乃使辟之司墓之室有當道者簡公别營葬地不在鄭先君舊墓故道有臨時迃直也司墓之室鄭之掌公墓大夫徙屬之家毁之則朝而塴弗毁則日中而塴子太叔請毁之曰無若諸侯之賓何不欲久留賓子産曰諸侯之賓能來會吾喪豈憚日中無損于賓而民不害何故不為遂弗毁日中而葬君子謂子産於是乎知禮禮無毁人以自成也昭十二年左氏傳葬敬嬴旱無麻始用葛茀記禮變之所由茀所以引柩殯則有之以備火葬則以下柩氏宣八年左傳叔孫豹卒公使杜泄葬叔孫叔仲子謂季孫曰帶受命于子叔孫曰葬鮮者自西門不以夀終為鮮西門非魯朝正門季孫命杜泄命使從西門杜泄曰卿喪自朝魯禮也從生存朝覲之正路吾子為國政未改禮而又遷之遷易也羣臣懼死不敢自也自從也既葬而行善杜泄能辟禍昭五年左氏傳季子臯葬其妻犯人之禾季子臯孔子弟子髙柴孟氏之邑成宰或氏季犯躐也申祥以告曰請庚之申祥子張子庚償也子臯曰孟氏不以是罪豫時僣侈朋友不以是棄豫言非大故以吾為邑長于斯也買道而葬後難繼也恃寵虐民非也檀弓吳伐齊將戰公孫夏命其徒歌虞殯虞殯送葬歌曲哀十一年左傳巾車大喪及墓呼啓關陳車關墓門也車二車也士喪禮下篇曰車至道左北面立東上春官方相氏大喪及墓入壙以戈擊四隅驅方良壙穿地中也方良罔兩也天子之椁柏黃腸為裏而表以石焉國語曰木石之怪夔罔兩夏官喪祝及壙説載除飾鄭司農云壙謂穿中也説載下棺也除飾去棺飾也四歰之屬令可舉移安錯之玄謂除飾便其窆爾周人之葬牆置歰小喪亦如之春官掌蜃掌斂互物蜃物以共闉壙之蜃互物蚌蛤之屬闉猶塞也將井椁先塞下以蜃禦濕也鄭司農説以春秋傳曰始用蜃炭言僣天子也稻人喪紀共其葦事葦以闉壙禦濕之物澤虞喪紀共其葦蒲之事詳見陳明器章並地官右至壙冡人共喪之窆器下棺豐碑之屬喪大記凡封用綍去碑負引君封以衡大夫士以咸春官人朝祖章小司徒帥邦役遂及窆陳役並此章通用凡封用綍去碑負引君封以衡大夫士以咸君命毋譁以鼓封大夫命毋哭士哭者相止也封周禮作窆窆下棺也此封或皆作斂檀弓曰公輸若方小斂般請以機封謂此斂也然則棺之入坎為斂與斂尸相似記時同之耳咸讀為緘凡柩車及壙説載除飾而屬紼於棺之緘又樹碑於壙之前後以紼繞碑間之鹿盧挽棺而下之此時棺下窆使挽者皆繫紼而繞要負引舒縱之備失脫也用紼去碑者謂縱下之時也衡平也人君之喪又以木橫貫緘耳居旁持而平之又擊鼓為縱舍之節大夫士旁牽緘而已庶人縣窆不引紼也禮唯天子葬有隧今齊人謂棺屬為緘繩咸或為緘喪大記柩行章君葬四綍二碑此章通用鼓人大喪詔大僕鼓詳見戒臣民章大僕大喪始崩戒鼓窆亦如之鄭司農云窆謂葬下棺也春秋傳所謂日中而􅽞禮記謂之封皆葬下棺也音相似窆讀如慶封汜祭之汜夏官遂師大喪及窆抱磨共丘籠及蜃車之役丘籠之役竁復主也其器曰籠蜃車柩路也柩路載栁四輪迫地而行有似于蜃因取名焉行至壙乃説更復載以龍輴蜃禮記或作榑或作輇役謂執綍者鄭司農云抱磨磨下車也玄謂磨者適厯執綍者名也遂人主陳之而遂師以名行校之鄉師及窆執斧以涖匠師匠師主豐碑之事執斧以涖之使成其事也故書涖作立立讀為涖涖謂臨視並地官冡人及窆執斧以涖臨下棺也遂入藏凶器凶器明器正墓位蹕墓域守墓禁位謂丘封所居前後也禁所為塋限司常建廞車之旌及葬亦如之詳更陳明器章樂師凡喪陳樂器則帥樂官及序哭亦如之哭此樂器亦帥之大司樂涖廞樂器及葬藏樂器亦如之笙師廞其樂器及葬奉而藏之奉猶送鎛師廞其樂器奉而藏之籥師廞其樂器奉而藏之司干廞舞器及葬奉而藏之並春官校人飾遣車之馬及葬埋之詳見陳明器章典瑞大喪共贈玉贈玉蓋璧也贈有束帛六幣璧以帛春官大宰大喪贊贈玉助王為之也贈玉既窆所以送先王天官小宗伯成葬而祭墓為位成葬丘已封也天子之冢蓋不一日而畢位壇位也先祖形體託于此地祀其神以安之冡人職曰大喪既有日請度甫竁遂為之尸冢人凡祭墓為尸祭墓為尸或禱祈焉鄭司農云為尸冢人為尸凡諸侯及諸臣葬于墓者為之蹕均其禁並春官大夫廢其事終身不仕死以士禮葬之以不任大夫也王制右窆晉文公既定襄王于郟郟洛邑王城之地王勞之以地辭辭不受也請隧焉賈侍中云隧王之葬禮闕地路通曰隧王弗許曰昔我先王之有天下也亦惟是死生之服物采章采章采色文章也以臨長百姓而輕重布之王何異之有輕重布之貴賤各有等也王何異之有言帝王皆然若不然叔父有地而隧焉自制以為隧也余安能知之文公遂不敢請受地而還國語許又僖二十五年左氏傳曰晉侯朝王請隧弗曰王章也未代德而有二王亦叔父之所惡也宣公八年冬十月己丑葬我小君敬嬴雨不克葬禮也禮卜葬先逺日辟不懷也懷思也左氏傳葬既有日不為雨止禮也雨不克葬喪不以制也徐邈曰案經文是己丑之日葬喪既出而遇雨若未及己丑而卻期無為逆書此日禮喪事有進無退又士喪禮未潦車載簑笠則人君之張設固兼備矣禮先遷柩于廟其明昧爽而引既及葬日之晨則祖行遣奠之禮設矣故雖雨猶終事不敢停柩久次穀梁傳定公十有五年秋九月丁巳葬我君定公雨不克襄事禮也襄成也雨而成事若汲汲于欲葬左氏傳葬既有日不為雨止禮也雨不克葬喪不以制也戊午日下稷乃克葬稷昃也下昃乃晡時乃急辭也不足乎日之辭也穀梁傳昭公之喪至自乾侯季孫使役如闞公氏將溝焉闞魯羣公墓所在也季孫惡昭公欲溝絶其兆域不使與先君同榮駕鵝曰生不能事死又離之以自旌也駕鵝魯大夫榮成伯也旌章也乃止葬昭公于墓道南孔子之為司冦也溝而合諸墓明臣無貶君之義左定元年氏傳許穆公卒于師葬之以侯禮也詳見喪變禮道有喪宋文公卒始厚葬用蜃炭益車馬始用殉重器備椁有四阿棺用翰檜燒蛤為炭以瘞壙多埋車馬用人從葬四阿四注椁也翰旁飾檜上飾皆王禮君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑死又益其侈是棄君于惡也何臣之為成二年左氏傳臧僖伯卒公曰叔父有憾于寡人諸侯稱同姓大夫長曰伯父少曰叔父有恨恨誎觀魚不聽寡人弗敢忘葬之加一等加命服之等傳隱五年左氏季康子之母死公輸若方小公輸若匠師方小言尚幼未知禮也斂般請以機封斂下棺于椁般若之族多技巧者見若掌斂事而年尚幼請代之而欲嘗其技巧將從之時人服般之巧公肩假曰不可夫魯有初初謂故事公室視豐碑言視者時僣天子也豐碑斫大木為之形如石碑于椁前後四角樹之穿中于間為鹿盧下棺以繂繞天子六繂四碑前後各重鹿盧也三家視桓楹時僣諸侯諸侯下天子也斫之形如大楹耳四植謂之桓諸侯四繂二碑碑如桓矣大夫二繂二碑士二繂無碑般爾以人之毋嘗巧則豈不得以以己字言寧有強使女者與僣于禮有似作機巧非也以與己字本同其毋以嘗巧者乎則病者乎毋無也于女寧有病苦與止之噫不寤之聲弗果從檀弓陳乾昔寢疾屬其兄弟而命其子尊己曰如我死必大為我棺使吾二婢子夾我婢子妾也陳乾昔死其子曰以殉葬非禮也况又同棺乎弗果殺善尊己不陷父于不義同上陳子車死于衛其妻與其家大夫謀以殉葬子車齊大夫定而后陳子亢至以告曰夫子疾莫養于下請以殉葬子亢子車之弟孔子弟子下地下子亢曰以殉葬非禮也雖然則彼疾當養者孰若妻與宰得已則吾欲已不得已則吾欲以二子者之為之也度諫之不能止以斯言拒之已猶止也於是弗果用果決也同上秦伯任好卒任好秦穆公名以子車氏之三子奄息仲行針虎為殉子車秦大夫氏也以人從葬為殉皆秦之良也國人哀之為之賦黃鳥君子曰秦穆公之不為盟主也宜哉死而棄民先王違世猶詒之法而况奪之善人乎君子是以知秦之不復東征也文十年左氏傳周反哭而弔檀弓禮詳見喪義右反哭君氏卒不反哭于寢詳見命赴章士三虞大夫五諸侯七尊卑恩之差也天子至士葬則反虞雜記小宗伯王崩既葬詔相喪祭之禮喪祭虞祔也檀弓曰葬日虞弗忍一日離也是日也以虞易奠卒哭曰成事是日也以吉祭易喪祭明日祔于祖父春官職喪掌諸侯之喪及卿大夫士凡有爵者之喪凡其喪祭詔其號治其禮鄭司農云號謂諡號玄謂告以牲號齍號之屬當以祝之凡公有司之所共職喪令之趣其事令令其當供物者給事之期也有司或言公或言國言國者由其君所來居其官曰公上同司巫祭祀則共蒩館館所以承蒩謂若今筐也士虞禮苴刌茅長五寸實于筐饌于西坫上同上甸師祭祀共蕭茅詳見祭物薪茅章鄉師大祭祀共茅蒩同上庖人共喪紀之庶羞喪紀喪事之祭謂虞祔也天官月陳小斂奠章囿人獸人臘人魚人醢人所共祭物朔月半奠章籩人共籩外饔實鼎俎並此章通用上大夫之虞也少牢卒哭成事祔皆大牢下大夫之虞也犆牲卒哭成事祔皆少牢卒哭成事祔言皆則卒哭成事祔與虞異矣下大夫虞以犆牲與士虞禮同與雜記喪祝掌喪祭祝號喪祭虞也檀弓曰葬日虞不忍一日離也是日也以虞易奠卒哭曰成事是日也以吉祭易喪祭春官右虞祭曽子問曰小功可以與於祭乎祭謂虞卒哭時孔子曰何必小功耳自斬衰以下與祭禮也曽子曰不以輕喪而重祭乎怪使重者執也孔子曰天子諸侯之喪祭也不斬衰者不與祭大夫齊衰者與祭士祭不足則取於兄弟大功以下者曽子問措之廟立之主曰帝同之天神春秋傳曰凡君卒哭而祔祔而作主曲禮右作主殷主綴重焉周主重徹焉詳喪禮義文公元年夏四月丁巳葬僖公緩按此下傳文誤在僖公三十三年之末作主非禮也文二年乃作主遂因葬文通譏之凡君薨卒哭而祔祔而作主特祀於主既葬反虞則免喪故曰卒哭哭止也以新死者之神祔之於祖尸柩已逺孝子思慕故造木主立几筵特用喪禮祭祀于寢不同之于宗廟凡君者謂諸侯以上不通于卿大夫蒸嘗禘於廟冬祭曰蒸秋祭曰嘗新主既特祀于寢則宗廟四時常祀自如舊也三年禮畢又大禘乃皆同于吉二年二月丁丑作僖公主書不時也過葬十月故曰不時左氏傳作僖公主者何為僖公作主也主狀正方穿中央達四方天子長尺二寸諸侯長一尺主者曷用虞主用桑禮平明而葬日中而反反虞猶安神也用桑者取其名與其粗粗所以副孝子之心禮虞祭天子九諸侯七卿大夫五士三其奠處猶吉祭練主用栗謂期年練祭也埋虞主于兩階之間易用栗也夏后氏以松殷人以柏周人以栗松猶容也想見其容貌而事之主人正之意也柏猶迫也親而不逺主地正之意也栗猶戰栗謹敬貌主天正之意也禮士虞記曰桑主不文吉主皆刻而諡之蓋為禘祫時别昭穆也虞主三代同者用意尚粗粗未暇别也用栗者藏主也藏于廟室中堂所當奉事也質家藏于室作僖公主何以書譏何譏爾不時也其不時奈何欲久喪而後不能也禮作練主當以十三月文公亂聖人制欲服喪三十六月十九月作練主又不能卒竟故以二十五月也日者重失禮鬼神公羊傳立主喪主於虞其主用桑吉主於練其主用栗作僖公主譏其後也僖公薨至此已十五月作主壞廟有時日於練焉壞廟壞廟之道易簷可也改塗可也祖過髙祖則毁其廟以次而遷將納新神故示有所加穀梁傳禮書綱目卷二十七
