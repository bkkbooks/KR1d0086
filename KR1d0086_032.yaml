body:
  text: 禮書綱目卷三十婺源江永撰奔喪凶禮十三補經鄭目録云名曰奔喪者以其居他國聞喪奔赴之禮此于别録屬喪服之禮實逸曲禮之正篇也漢興後得古文而禮家又貪其說因合于禮記耳奔喪禮屬凶禮也奔喪之禮始聞親喪以哭答使者盡哀問故又哭盡哀親父母也以哭答使者驚怛之哀無辭也問故問親喪所由也雖非父母聞喪而哭其禮亦然也遂行日行百里不以夜行雖有哀戚猶辟害也晝夜之分别于昏明哭則遂行者不為位唯父母之喪見星而行見星而舍侵晨冒昏彌益促也言唯著異也若未得行則成服而后行謂以君命有為者也成喪服得行則行過國至竟哭盡哀而止感此念親哭辟市朝為驚衆也望其國竟哭斬衰者也自是哭且遂行至于家入門左升自西階殯東西面坐哭盡哀括髮袒括髮袒者去飾也未成服者素委貌深衣已成服者固自喪服矣降堂東即位西鄉哭成踊已殯者位在下襲絰于序東絞帶反位拜賓成踊襲服衣也不于又哭乃絰者發喪已踰日節于是可也其未小斂而至與在家同耳不散帶者不見尸柩凡拜賓者就其位既拜反位哭踊送賓反位有賓後至者則拜之成踊送賓皆如初衆主人兄弟皆出門出門哭止闔門相者告就次次倚廬也于又哭括髮袒成踊于三哭猶括髮袒成踊又哭至明日朝也三哭又其明日朝也皆升堂括髮袒如始至必又哭三哭者象小斂大斂時也雜記曰士三踊其夕哭從朝夕哭不括髮不袒不踊不以為數三日成服拜賓送賓皆如初三日三哭之明日也既哭成其喪服杖于序東右奔親喪記老聃曰見星而行者唯罪人與奔父母之喪者乎曽子問奔父之喪括髮于堂上袒降踊襲絰于東方詳見奔母喪章凡奔喪有大夫至袒拜之成踊而后襲于士襲而后拜之主人袒降哭而大夫至因拜之不敢成已禮乃禮尊者或曰大夫後至者袒拜之為之成踊本篇記奔喪者非主人則主人為之拜賓送賓奔喪者自齊衰以下入門左中庭北面哭盡哀免麻于序東即位袒與主人哭成踊不升堂哭者非父母之喪統于主人也麻亦絰帶也于此言麻者明所奔喪雖有輕者不至喪所無改服也凡袒者于位襲于序東袒襲不相因位此麻乃袒變于為父母也於又哭三哭皆免袒有賓則主人拜賓送賓又哭三哭亦入門左中庭北面如始至時也丈夫婦人之待之也皆如朝夕哭位無變也待奔喪者無變嫌賓客之也于賓客以哀變為敬此骨肉哀則自哀矣于此乃言待之明奔喪者至三哭猶不以序入也右奔齊衰以下喪記凡喪父在父為主與賓客為禮宜使尊者父沒兄弟同居各主其喪各為其妻子之喪為主也祔則宗子主之親同長者主之父母沒如昆弟之喪宗子主之不同親者主之從父昆弟之喪本篇記齊衰望鄉而哭大功望門而哭小功至門而哭緦麻即位而哭奔喪哭親疏逺近之差也同上聞兄弟之喪大功以上見喪者之鄉而哭雜記凡異居始聞兄弟之喪唯以哭對可也惻怛之情不以辭言為禮也其始麻散帶絰與居家同也凡喪小斂而麻未服麻而奔喪及主人之未成絰也疏者與主人皆成之親者終其麻帶絰之日數疏者謂小功以下也親者大功以上也疏者及主人之節則用之其不及者亦自用其日數同上有殯聞逺兄弟之喪雖緦必往親骨肉也檀弓奔母之喪西面哭盡哀括髮袒降堂東即位西鄉哭成踊襲免絰于序東拜賓送賓皆如奔父之禮于又哭不括髮為母于又哭而免輕于父也其他則同右奔母喪記奔父之喪括髮于堂上袒降踊襲絰于東方奔母之喪不括髮袒于堂上降踊襲免于東方絰即位成踊出門哭止三日而五哭三袒凡奔喪謂道逺已殯乃來也為母不括髮以至成服一而已貶于父也即位以下于父母同也三日五哭者始至訖夕反位哭乃出就次一哭也與明日又明日之朝夕而五哭三袒者始至袒與明日又明日之朝而三也喪服小記婦人奔喪升自東階殯東西面坐哭盡哀東髽即位與主人拾踊婦人謂姑姊妹女子子也東階東面階也婦人入者由闈門東髽髽于東序不髽于房變于在室者也去纚大紒曰髽拾更也主人與之更踊賓客之右婦人奔喪記婦人非三年之喪不踰封而弔如三年之喪則君夫人歸奔父母喪也夫人其歸也以諸侯之弔禮其待之也若待諸侯然謂夫人行道車服主國致禮夫人至入自闈門升自側階君在阼其他如奔喪禮然女子子不自同于女賓也宫中之門曰闈門為相通者也側階亦旁階也他謂哭踊髽麻闈門或為帷門雜記奔喪者不及殯先之墓北面坐哭盡哀主人之待之也即位于墓左婦人墓右成踊盡哀括髮東即主人位絰絞帶哭成踊拜賓反位成踊相者告事畢主人之待之謂在家者也哭于墓為父母則袒告事畢者于此後無事也遂冠歸入門左北面哭盡哀括髮袒成踊東即位拜賓成踊賓出主人拜送有賓後至則拜之成踊送賓如初衆主人兄弟皆出門出門哭止相者告就次于又哭括髮成踊于三哭猶括髮成歸三日成服于五哭相者告事畢又哭三哭不袒者哀戚已久殺之也逸奔喪禮說不及殯日于又哭猶括髮即位不袒告事畢者五哭而不復哭也成服之朝為四哭此謂既期乃後歸至者也其未期猶朝夕哭不止于五哭為母所以異于父者一括髮其餘免以終事他如奔父之禮一括髮者謂婦入門哭時也于此乃言為母異于父者明及殯不及殯其異者同右奔喪不及殯齊衰以下不及殯先之墓西面哭盡哀不北面者亦統于主人免麻于東方即位與主人哭成踊襲有賓則主人拜賓送賓賓有後至者拜之如初相者告事畢不言袒言襲者容齊衰親者或袒可遂冠歸入門左北面哭盡哀免袒成踊東即位拜賓成踊賓出主人拜送于又哭免袒成踊于三哭猶免袒成踊三日成服于五哭相者告事畢于父于又哭括髮而不袒此又哭三哭皆言袒袒衍字也右奔齊衰以下喪不及殯記奔兄弟之喪先之墓而後之家為位而哭所知之喪則哭于宫而後之墓兄弟先之墓骨肉之親不由主人也宫故殯宫也小記聞喪不得奔喪哭盡哀問故又哭盡哀乃為位括髮袒成踊襲絰絞帶即位聞父母喪而不得奔謂以君命有事不然者不得為位位有鄼列之處如于家朝夕哭位矣不于又哭乃絰者喪至此踰日節于是可也拜賓反位成踊賓出主人拜送于門外反位若有賓後至者拜之成踊送賓如初于又哭括髮袒成踊于三哭猶括髮袒成踊三日成服于五哭拜賓送賓如初不言就次者當從其事不可以喪服廢公職也其在宫亦告就次言五哭者以迫公事五日哀殺亦可以止右聞親喪不得奔記凡為位不奠以其精神不存乎是本篇記通後凡為位用晉獻公之喪秦穆公使人弔公子重耳獻公殺其世子申生重耳辟難出奔是時在翟就弔之且曰寡人聞之亡國恆于斯得國恆于斯言在喪代之際雖吾子儼然在憂服之中喪亦不可久也時亦不可失也孺子其圖之勸其反國意欲納之喪謂亡失位孺稚也以告舅犯舅犯重耳之舅狐偃也字子犯舅犯曰孺子其辭焉喪人無寶仁親以為寶寶謂善道可守者仁親親行仁義父死之謂何又因以為利欲反國求為後是利父死而天下其孰能說之孺子其辭焉說猶解也公子重耳對客曰君惠弔亡臣重耳身喪父死不得與于哭泣之哀以為君憂謝之父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私他志謂利心子顯以致命于穆公使者公子縶也盧氏云古者名字相配顯當作韅穆公曰仁夫公子重耳夫稽顙而不拜則未為後也故不成拜哭而起則愛父也起而不私則逺利也檀弓曽子與客立于門側其徒趨而出徒謂客之旅曽子曰爾將何之曰吾父死將出哭于巷以為不可發凶于人館曰反哭于爾次次舍也禮館人使専之若其自有然曽子北面而弔焉同上若除喪而后歸則之墓哭成踊東括髮袒絰拜賓成踊送賓反位又哭盡哀遂除于家不哭東東即主人位如不及殯者也遂除除于墓而歸主人之待之也無變于服與之哭不踊無變于服自若時服也亦即位于墓左婦人墓右自齊衰以下所以異者免麻右除喪後奔喪凡為位非親喪齊衰以下皆即位哭盡哀而東免絰即位袒成踊謂無君事又無故可得奔喪而以己私未奔者也唯父母之喪則不為位其哭之不離聞喪之處齊衰以下更為位而哭皆可行乃行襲拜賓反位哭成踊送賓反位相者告就次三日五哭卒主人出送賓衆主人兄弟皆出門哭止相者告事畢成服拜賓卒猶止也三日五哭者始聞喪訖夕為位乃出就次一哭也與明日又明日之朝夕而五哭不五朝哭而數朝夕備五哭而止者亦為急奔喪己私事當畢亦明日乃成服凡云五哭者其後有賓亦與之哭而拜之若所為位家逺則成服而往謂所當奔者外喪也外喪緩而道逺成服乃行容待齎也右齊衰以下為位記凡為位者一袒謂于禮正可為位而哭也始聞喪哭而袒其明日則否父母之哭自若三袒也本篇記子思之母死于衛嫁母也姓庶氏赴于子思子思哭于廟門人至曰庶氏之母死何為哭于孔氏之廟乎門人弟子也嫁母與廟絶子思曰吾過矣吾過矣遂哭于他室檀弓曽子曰小功不為位也者是委巷之禮也詳見哭無服章有殯聞逺兄弟之喪哭于側室嫌哭殯無側室哭于門內之右近南者為之變位檀弓有殯門外喪哭之他室明所哭者異也哭之為位入奠卒奠出改服即位如始即位之禮謂後日之哭朝入奠于其殯乃更即位就他室如始哭之情雜記聞逺兄弟之喪既除喪而后聞喪免袒成踊拜賓則尚左手小功緦麻不稅者也雖不服猶免袒尚左手吉拜也逸奔喪禮曰凡拜吉喪皆尚左手本篇記哭父之黨于廟母妻之黨于寢師于廟門外朋友于寢門外所識于野張帷此因五服聞喪而哭列人恩諸所當哭者也黨謂族類無服者也逸奔喪禮曰哭父族與母黨于廟妻之黨于寢朋友于寢門外一哭而已不踊言一哭而已則不為位矣所識者弔先哭于家而后之墓皆為之成踊從主人北面而踊從主人而踊拾踊也北面自外來便也主人墓在西面無服而為位者唯嫂叔及婦人降而無服者麻雖無服猶弔服加麻袒免為位哭也正言嫂叔尊嫂也兄公于弟之妻則不能也婦人降而無服族姑姊妹嫁者也逸奔喪禮曰無服袒免為位者唯嫂與叔凡為其男子服其婦人降而無服者麻右哭無服記妻之昆弟為父後者死哭之適室以其正也子為主袒免哭踊親者主之夫入門右北面辟正主使人立于門外告來者狎則入哭狎相習知者父在哭于妻之室不以私喪干尊非為父後者哭諸異室檀弓曽子曰小功不為位也者是委巷之禮也譏之也位謂以親疏叙别哭也委巷猶街里委曲所為也子思之哭嫂也為位善之也禮嫂叔無服婦人倡踊有服者娣姒婦小功倡先也申祥之哭言思也亦然說者曰言思子遊之子申詳妻之昆弟亦無服過此以往獨哭不為位同上哭朋友者于門外之右南面變于有親者也門外寢門外小記伯髙死于衛赴于孔子赴告也凡有舊恩者則使人告之孔子曰吾惡乎哭諸以其交㑹尚新兄弟吾哭諸廟父之友吾哭諸廟門之外别親疏也師吾哭諸寢朋友吾哭諸寢門之外所知吾哭諸野别輕重也于野則已疏于寢則已重已猶大也夫由賜也見我吾哭諸賜氏本于恩哭于子貢寢門之外遂命子貢為之主明恩所由曰為爾哭也來者拜之知伯髙而來者勿拜也異于正主檀弓孔子哭子路于中庭寢中庭也與哭師同親之有人弔者而夫子拜之為之主也既哭進使者而問故使者自衛來赴者故謂死之意狀使者曰醢之矣時衛世子蒯聵篡輒而立子路死之醢之者示欲啖食以怖衆遂命覆醢覆弃之不忍食同上曽子曰朋友之墓有宿草而不哭焉宿草謂陳根也為師心喪三年于朋友期可同上陳莊子死赴于魯魯人欲勿哭君無哭鄰國大夫之禮陳莊子齊大夫陳恆之後名伯繆公召縣子而問焉縣子曰古之大夫束修之問不出竟雖欲哭之安得而哭之以其不外交今之大夫交政于中國雖欲勿哭焉得而弗哭言時君弱臣强政在大夫専盟㑹以交接且臣聞之哭有二道有愛而哭之有畏而哭之以權微勸之公曰然然則如之何而可縣子曰請哭諸異姓之廟明不當哭于是與哭諸縣氏同上哭天子九諸侯七卿大夫五士三此臣聞君喪而未奔為位而哭尊卑日數之差也士亦有屬吏賤不得君臣之名大夫哭諸侯不敢拜賓此謂在他國聞喪者哭其舊君不敢拜賓辟為主諸臣在他國為位而哭不敢拜賔謂大夫士使于列國右臣哭君與諸侯為兄弟亦為位而哭族親婚姻在異國者右哭諸侯天子哭諸侯附見此下周禮大宗伯朝覲㑹同則為上相哭諸侯亦如之相詔王禮也哭諸侯者謂薨于國為位而哭之檀弓曰天子之哭諸侯也爵辨絰䊷衣春官記天子之哭諸侯也爵辨絰䊷衣詳見補服或曰使有司哭之非也哀戚之事不可虛為之不以樂食蓋謂殯斂之間檀弓吳子夀夢卒臨于周廟禮也文王廟也周公出文王魯立其廟凡諸侯之喪異姓臨于外于城外向其國同姓于宗廟所出王之廟同宗于祖廟始封君之廟同族于禰廟父廟也同族謂髙祖以下是故魯為諸姬臨于周廟諸姬同姓國為邢凡蔣茅胙祭臨于周公之廟即祖廟也六國皆周公之支子别封為國共祖周公襄十二年左氏傳喪變禮補大夫聞君之喪攝主而往臣聞君之喪義不可以不行故使兄弟若宗人攝行主事而往不廢祭大夫聞大夫之喪尸事畢而往賓尸事畢而往也昭十五年公羊傳君在祭樂之中大夫有變以聞可乎大夫國體也古之人重死君命無所不通詳喪通禮哀戚右聞喪諸親聞喪或奔或否已見上篇曽子問曰並有喪如之何何先何後並謂父母若親同者同月死孔子曰葬先輕而後重其奠也先重而後輕禮也自啓及葬不奠不奠務于當葬者行葬不哀次不哀次輕于在殯者反葬奠而后辭于殯遂修葬事殯當為賓聲之誤也辭于賓謂告將葬啓期也其虞也先重而后輕禮也曾子問父母之喪偕先葬者不虞祔待後事其葬服斬衰詳見變除並有喪變服章有父之喪如未沒喪而母死其除父之喪也服其除服卒事反喪服同上如三年之喪則既顈其練祥皆行同上曽子問曰君未殯而臣有父母之喪則如之何孔子曰歸殯反于君所有殷事則歸朝夕否其哀雜主于君大夫室老行事士則子孫行事大夫士其在君所之時則攝其事大夫內子有殷事亦之君所朝夕否謂夫之君既殯而有舅姑之喪者內子大夫妻也妻為夫之君如婦為舅姑服齊衰曽子問曰君薨既殯而臣有父母之喪則如之何孔子曰歸居于家有殷事則之君所朝夕否居家者因其哀後隆于父母殷事朔月月半薦新之奠也君既啓而臣有父母之喪則如之何孔子曰歸哭而反送君言送君則既葬而歸也歸哭者服君服而歸不敢私服也曽子問曰君之喪既引聞父母之喪如之何孔子曰遂既封而歸不俟子遂遂送君也封當為窆子嗣君也曽子問曰父母之喪既引及塗聞君薨如之何孔子曰遂既封改服而往封亦當為窆改服括髮徒跣布深衣扱上衽不以私喪包至尊曽子問曰犬夫士有私喪可以除之矣而有君服焉其除之也如之何孔子曰有君喪服于身不敢私服又何除焉重喻輕也私喪家之喪也喪服四制曰門外之治義斷恩于是乎有過時而弗除也君之喪服除而後殷祭禮也謂主人也支子則否曽子曰父母之喪弗除可乎以其有終身之憂孔子曰先王制禮過時弗舉禮也非弗能勿除也患其過于制也故君子過時不祭禮也言制禮以為民中過其時則不成禮並曽子問雖諸父昆弟之喪如當父母之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服詳見變除父母之喪將祭而昆弟死既殯而祭如同宫則雖臣妾葬而後祭祭主人之升降散等執事者亦散等雖虞祔亦然詳見卒哭祔練祥禫記練章有殯聞外喪哭之他室入奠卒奠出改服即位如始即位之禮詳見奔喪有殯聞逺兄弟之喪雖緦必往非兄弟雖鄰不往詳見弔禮王父死未練祥而孫又死猶是附于王父也詳見卒哭祔練祥禫記右並有喪周人有喪魯人有喪周人弔魯人不弔詳見弔禮諸侯行而死于館則其復如于其國如于道則升其乘車之左轂以其綏復館主國所致舍復招魂復魂如于其國主國館賓與使有之得升屋招魂用褒衣也如于道道上廬宿也升車左轂象升屋東榮綏當為緌讀如㽔賓之㽔字之誤也緌謂旌旗之旄也去其旒而用之異于生也其輤有裧緇布裳帷素錦以為屋而行輤載柩將殯之車飾也輤取名于襯與蒨讀如蒨斾之蒨襯棺也蒨染赤色者也將葬載柩之車飾曰栁裧謂鱉甲邊緣緇布裳帷圍棺者也裳帷用緇則輤用赤矣輤象宫室屋其中小帳襯覆棺者若未大斂其載尸而歸車飾皆如之至于廟門不毁牆遂入適所殯唯輤為說于廟門外廟所殯宫牆裳帷也適所殯謂兩楹之間去輤乃入廟門以其入自有宫室也毁或為徹凡柩自外來者正棺于兩楹之間尸亦侇之于此皆因殯焉異者柩入自闕升自西階尸入自門升自阼階其殯必于兩楹之間者以其死不于室而自外來留之于中不忍逺也大夫死于道則升其乘車之左轂以其綏復如于館死則其復如于家綏亦緌也大夫復于家以𤣥冕士以爵辨服大夫以布為輤而行至于家而說輤載以輲車入自門至于阼階下而說車舉自阼階升適所殯大夫輤言用布白布不染也言輤者逹名也不言裳帷俱用布無所别也至門亦說輤乃入言載以輲車入自門明車不易也輲讀為軫或作摶許氏說文解字曰有輻曰輪無輻曰輇周禮又有唇車天子以載柩唇輇聲相近其制同乎輇崇蓋半乘車之輪諸侯言不毁牆大夫士言不易車互相明也不易者不易以輴也廟中有載柩以輴之禮此不耳士輤葦席以為屋蒲席以為裳帷言以葦席為屋則無素錦為帳雜記其為賓則公館復私館不復其在野則升其乘車之左轂而復私館卿大夫之家也不于之復為生人之惡喪大記為君使而死公館復私館不復公館者公宫與公所為也私館者自卿大夫以下之家也公宫謂君所作離宫别館也雜記曽子問曰為君使而卒于舍禮曰公館復私館不復凡所使之國有司所授舍則公館已何謂私館不復也復始死招魂孔子曰善乎問之也善其問難明也自卿大夫士之家曰私館公館與公所為曰公館公館復此之謂也公館若今縣官宫也公所為君所命使舍已者曽子問曰君出疆以三年之戒以椑從君薨其入如之何其出有喪備疑喪入必異也戒猶備也謂衣衾親身棺曰椑其餘可死乃具也孔子曰共殯服此謂君已斂殯服謂布深衣苴絰散帶垂殯時主人所服共之以待其來也其餘殯事亦皆具焉則子麻辨絰疏衰菲杖棺柩未安不忍成服于外也麻辨絰者布辨而加環絰也布辨如爵辨而用布杖者為已病入自闕升自西階闕謂毁宗也棺毁宗而入異于生也升自西階亦異于生也所毁宗殯宫門西也于此正棺而服殯服既塗而成服殷柩出毁宗周柩入毁宗禮相變也如小斂則子免而從柩謂君已小斂也主人布深衣不括髮者行逺不可無飾入自門升自阼階親未在棺不忍異于生使知生來反君大夫士一節也並曽子問掌客凡賓客死致禮以喪用死則主人為之具而殯矣喪用者饋奠之物秋官右道有喪許穆公卒于師葬之以侯禮也男而以侯禮加一等凡諸侯薨于朝㑹加一等諸侯命有三等公為上等侯伯為中等子男為下等死王事加二等謂以死勤王事于是有以衮斂衮衣公服也謂加二等僖七年左氏傳曽子問曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何孔子曰內喪則廢外喪則冠而不醴徹饌而掃即位而哭如冠者未至則廢如將冠子而未及期日而有齊衰大功之喪則因喪服而冠曽子曰除喪不改冠乎孔子曰天子賜諸侯大夫冕辨服于大廟歸設奠服賜服于斯乎有冠醮無冠醴父沒而冠則已冠掃地而祭于禰已祭而見伯父叔父而后饗冠者注見冠昏記曽子問曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母父母不在則稱伯父世母壻已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也壻免喪女之父母使人請壻弗取而后嫁之禮也女之父母死壻亦如之曽子問曰親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪女在塗而女之父母死則女反如壻親迎女未至而有齊衰大功之喪則如之何孔子曰男不入改服于外次女入改服于內次然後即位而哭曽子問曰除喪則不復昏禮乎孔子曰祭過時不祭禮也又何反于初曽子問曰女未廟見而死則如之何孔子曰不遷于祖不祔于皇姑壻不杖不菲不次歸葬于女氏之黨示未成婦也曽子問曰取女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之注並見冠昏記曽子問曰天子嘗禘郊社五祀之祭簠簋既陳天子崩后之喪如之何孔子曰廢曽子問曰諸侯之祭社稷爼豆既陳聞天子崩后之喪君薨夫人之喪如之何孔子曰廢自薨比至于殯自啓至于反哭奉帥天子曽子問曰大夫之祭鼎爼既陳籩豆既設不得成禮廢者幾孔子曰九請問之曰天子崩后之喪君薨夫人之喪君之大廟火日食三年之喪齊衰大功皆廢外喪自齊衰以下行也其齊衰之祭也尸入三飯不侑酳不酢而已矣大功酢而已矣小功緦室中之事而已矣士之所以異者緦不祭所祭于死者無服則祭注並見祭通禮廢祭章大夫士將與祭于公既視濯而父母死則猶是與祭也次于異宫既祭釋服出公門外哭而歸其他如奔喪之禮如未視濯則使人告告者反而后哭猶亦當為由次于異宫不可以吉與凶同處也使者反而后哭不敢専已于君命也如諸父昆弟姑姊妹之喪則既宿則與祭卒事出公門釋服而后歸其他如奔喪之禮如同宫則次于異宫宿則與祭出門乃解祭服皆為差緩也雜記曽子問曰卿大夫將為尸于公受宿矣而有齊衰內喪則如之何孔子曰出舍于公館以待事禮也吉凶不可以同處宿曽子問哭雜記作出舍乎公宫注重受則不得內喪同宫也曽子問曰諸侯旅見天子入門不得終禮廢者幾孔子曰四請問之曰太廟火日食后之喪雨霑服失容則廢曽子問曰諸侯相見揖讓入門不得終禮廢者幾孔子曰六請問之曰天子崩大廟火日食后夫人之喪雨霑服失容則廢注見覲禮及諸侯相朝禮聘君若薨于後入竟則遂赴者未至則哭于巷衰于館受禮不受饗食赴者至則衰而出唯稍受之歸執圭復命于殯升自西階不升堂子即位不哭辨復命如聘子臣皆哭與介入北鄉哭出袒括髮入門右即位踊若有私喪則哭于館衰而居不饗食歸使衆介先衰而從之注見聘禮掌客賓客有喪唯芻稍之受同上大夫以君命出聞喪徐行而不反同上聘遭喪入竟則遂也不郊勞不筵几不禮賓主人畢歸禮賓唯饔餼之受不賄不禮玉不贈遭夫人世子之喪君不受使大夫受于廟其他如遭君喪遭喪將命于大夫主人長衣練冠以受同上掌客遭主國之喪不受饗食受牲禮同上賓入竟而死遂也主人為之具而殯介攝其命君弔介為主人主人歸禮幣必以用介受賓禮無辭也不饗食歸介復命柩止于門外介卒復命出奉柩送之君弔卒殯若大夫介卒亦如之士介死為之棺斂之君不弔焉若賓死未將命則既斂于棺造于朝介將命若介死歸復命唯上介造于朝若介死雖士介賓既復命往卒殯乃歸注並見聘禮右因吉而凶冠昏祭朝聘仲遂卒于垂壬午猶繹萬入去籥春秋經在宣八年仲遂魯莊公之子東門襄仲先日辛已有事于大廟而仲遂卒明日而繹非也萬干舞也籥籥舞也傳曰去其有聲者廢其無聲者仲尼曰非禮也卿卒不繹檀弓季文子將聘于晉求遭喪之禮以行季孫行父也聞晉侯疾故其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難難卒得過求何害所謂文子三思八月晉侯歡卒文六年左氏傳公孫歸父襄仲子欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨逐東門氏襄仲居東門故曰東門氏子家還及笙子家歸父字壇帷復命于介除地為壇而張帷介副也將去使介反命于君既復命袒括髮以麻約髮即位哭三踊而出依在國喪禮設哭位公薨故遂奔齊宣十八年左氏傳楚子西子期伐吳陳侯使公孫貞子弔焉及良而卒將以尸入吳子使大宰嚭勞且辭曰以水潦之不時無乃廩然隕大夫之尸以重寡君之憂寡君敢辭上介芋尹蓋對曰寡君聞椘為不道荐伐吳國寡君使弔君之下吏無祿使人逢天之戚大命隕隊絶世于良廢日共積廢行道之日以共具殯斂所積聚之用一日遷次一日便遷次不敢留君命今君命逆使人曰無以尸造于門是我寡君之命委于草莽也且臣聞之曰事死如事生禮也於是乎有朝聘而終以尸將事之禮朝聘道死以尸行事又有朝聘而遭喪之禮若不以尸將命是遭喪而還也無乃不可乎吳人內之傳言芋尹蓋知禮哀十五年左氏傳以喪冠者雖三年之喪可也既冠于次入哭踊三者三乃出言雖者明齊衰以下皆可以喪冠也始遭喪以其冠月則喪服因冠矣非其冠月待變除卒哭而冠次廬雖或為唯雜記大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以取婦已雖小功既卒哭可以冠取妻下殤之小功則不可此皆謂可用吉禮之時父大功卒哭而可以冠子嫁子小功卒哭而可以取婦已大功卒哭而可以冠子小功卒哭而可以取妻必偕祭乃行也下殤小功齊衰之親除喪而後可為昏禮凡冠者其時當冠則因喪而冠之同上喪三年不祭唯祭天地社稷為越紼而行事不敢以卑廢尊越猶躐也紼輴車索王制天子崩未殯五祀之祭不行既殯而祭其祭也尸入三飯不侑酳不酢而已矣自啓至于反哭五祀之祭不行已葬而祭祀畢獻而已其齊衰之祭也尸入三飯不侑酳不酢而已矣大功酢而已矣小功緦室中之事而已矣士之所以異者緦不祭所祭于死者無服則祭並曽子問曽子問曰相識有喪服可以與于祭乎問已有喪服可以助相識者祭否孔子曰緦不祭又何助于人曽子問曰廢喪服可以與于饋奠之事乎謂新除喪服也孔子曰說衰與奠非禮也執事于人之神為其忘哀戚也以擯相可也曽子問曰君薨而世子生如之何孔子曰卿大夫士從攝主北面于西階南變于朝夕哭位也攝主上卿代君聽國政大祝裨冕執束帛升自西階盡等不升堂命毋哭將有事冝清淨也裨冕者接神則祭服也諸侯之卿大夫所服裨冕絺飾也𤣥冕也士服爵辨服大祝裨冕則大夫祝聲三告曰某之子生敢告聲噫歆警神也某夫人之氏也升奠幣于殯東几上哭降几筵于殯東明繼體也衆主人卿大夫士房中皆哭不踊衆主人君之親也房中婦人盡一哀反位遂朝奠反朝夕哭位小宰升舉幣所主也舉而下埋之階間三日衆主人卿大夫士如初位北面三日負子日也初告生時大宰大宗大祝皆裨冕少師奉子以衰祝先子從宰宗人從入門哭者止宰宗人詔贊君事者子升自西階殯前北面祝立于殯東南隅祝聲三曰某之子某從執事敢見子拜稽顙哭奉子者拜哭祝宰宗人衆主人卿大夫士哭踊三者三降東反位皆袒子踊房中亦踊三者三襲衰杖踊襲哀杖成子禮也奠出亦為朝奠大宰命祝史以名遍告于五祀山川因負子名之喪于禮略也曽子問曰如已葬而世子生則如之何孔子曰大宰大宗從大祝而告于禰告生也三月乃名于禰以名遍告及社稷宗廟山川並曽子問右因凶而吉冠昏祭世子生文公二年公子遂如齊納幣納幣不書此何以書譏何譏爾譏喪娶也娶在三年之外則何譏乎喪娶據逆在四年三年之內不圖婚僖公以十二月薨至此未滿二十五月又禮必先納采問名問吉乃納幣此四者皆在三年之內故云爾娶者大吉也以為有人心焉者則宜于此焉變矣變者變慟哭泣也公羊傳禮書綱目卷三十
