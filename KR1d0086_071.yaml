body:
  text: 禮書綱目卷六十九婺源江永撰五宗通禮二十一補别子為祖諸侯之世子别為後世為始祖也謂之别子者公子不得禰先君大傳注云别子謂公子若始來在此國者後世以為祖也繼别為宗别子之世長子為其族人為宗所謂百世不遷之宗人大傳注别子之世適也族尊之謂之大宗是宗子也繼禰者為小宗别子庶子之長子為其昆弟為宗也謂之小宗者以其將遷也記大傳注父之適也兄弟尊之謂之小宗喪服小大傳同有百世不遷之宗有百世則遷之宗遷猶變易也大傳右宗法百世不遷者别子之後也宗其繼别子之所自出也百世不遷者也宗其繼高祖者五世則遷者也尊祖故敬宗敬宗尊祖之義也繼别子别子之世適也繼高祖者亦小宗也先言繼禰者據别子子弟之子也以高祖與禰皆有繼者則曾祖亦有也則小宗四與大宗凡宗大傳有五世而遷之宗其繼高祖者也謂小宗也小宗有四或繼高祖或繼曾祖或繼祖或繼禰皆至五世則遷是故祖遷於上宗易於下尊祖故敬宗敬宗所以尊祖禰也宗者祖禰之正體小記有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也公子有此三事也公子謂先君之子今君昆弟公子有宗道公子之公為其士大夫之庶者宗其士大夫之適者公子之宗道也公子不得宗君君命適昆弟為之宗使之宗之是公子之宗道也所宗者適則如大宗死為之齊衰九月其母則小君也為其妻齊衰三月無適而宗庶則如小宗死為之大功九月其母妻無服公子唯己而已則無所宗亦莫之宗大傳宗者何謂也宗尊也為先祖主也宗人之所尊也古者所以必有宗何也所以長和睦也大宗能率小宗小宗能率羣弟通其有無所以統理族人者也宗其為始祖後者為大宗此百世不遷之宗也宗其為高祖後者五世而遷者也高祖遷於上宗則易於下宗其為曾祖後者為曾祖宗宗其為祖後者為祖宗宗其為父後者為父宗以上至高祖宗皆為小宗以其轉遷别於大宗也别子者自與其子孫為祖繼别者各自為宗小宗有四大宗有一凡有五宗人之親所以備矣白虎通諸侯奪宗明尊者宜之大夫不得奪宗何曰諸侯世世傳子孫故奪宗大夫不傳子孫故不奪宗也同上丈夫婦人為宗子宗子之母妻婦人女子子在室及嫁歸宗者也宗子繼别之後百世不遷所謂大宗也喪服齊衰三月章宗子孤為殤大功衰小功衰皆三月親則月算如邦人言孤有不孤者不孤則族人不為殤服服之也不孤謂父有廢疾若年七十而老子代主宗事者也孤為殤長殤中殤大功衰下殤小功衰皆如殤服而三月謂與宗子絶屬者也親謂在五屬之內算數也月數如邦人者與宗子有期之親者成人服之齊衰期長殤大功衰九月中殤大功衰七月下殤小功衰五月有大功之親者成人服之齊衰三月卒哭受以大功衰九月其長殤中殤大功衰五月下殤小功衰三月有小功之親者成人服之齊衰三月卒哭受以小功衰五月其殤與絶屬者同有緦麻之親者成人及殤皆與絶屬者同喪服記大夫為宗子三齊衰月章女子子適人者為其昆弟之為父後者杖齊衰不期章為人後者三斬衰年章為殤後者以其服服之言為後者據承之也殤無為人父之道以本親之服服之小記為人後者為其父母報杖齊衰不期章為人後者為其昆弟九大功月章為人後者於兄弟降一等報言報者嫌其為宗子不降喪服記庶子不為長子斬小記右宗支服制丈夫婦人為宗子宗子之母妻傳曰何以服齊衰三月也尊祖也尊祖故敬宗敬宗者尊祖之義也宗子之母在則不為宗子之妻服也大夫為宗子何以服齊衰三月也大夫不敢降其宗也女子子適人者為昆弟之為父後者何以亦期也婦人雖在外必有歸宗曰小宗故服期也歸宗者父雖卒猶自歸宗其為父後服重者不自絶於其族類也曰小宗者言是乃小宗也小宗明非一也小宗有四丈夫婦人之為小宗各如其親之服辟大宗為人後者何以三年也受重者必以尊服服之何如而可為之後同宗則可為之後何如而可以為人後支子可也為所後者之祖父母妻妻之父母昆弟昆弟之子若子若子者為所為後之親如親子為人後者為其父母報何以期也不二斬也何以不二斬也特重於大宗者降其小宗也為人後者孰後後大宗也曷為後大宗大宗者尊之統也禽獸知母而不知父野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其大祖天子及其始祖之所自出尊者尊統上卑者尊統下大宗者尊之統也大宗者收族者也不可以絶故族人以支子後大宗也適子不得後大宗都邑之士則知尊禰近政化也大祖始封之君始祖者感神靈而生若稷契也自由也及始祖之所由出謂祭天也上猶逺也下猶近也收族者謂别親疏序昭穆大傳曰繼之以姓而弗别綴之以食而弗殊雖百世而昏姻不通者周道然也為人後者為其昆弟何以大功也為人後者降其昆弟也並喪服傳庶人不為長子斬不繼祖與禰故也尊先祖之正體不二其統也言不繼祖禰别長子不必五世小記庶人不得為長子三年不繼祖也大傳支子不祭祭必告於宗子不敢自專謂宗子有故支子當攝而祭者也五宗皆然曲禮庶人不祭殤與無後者殤與無後者從祖祔食不祭殤者父之庶也不祭無後者祖之庶也此二者當從祖祔食而已不祭祖無所食之也共其牲物而宗子主其禮焉祖庶之殤則自祭之凡所祭殤者唯適子耳無後者謂昆弟諸父也宗子之諸父無後者為墠祭之小記右宗支祭法庶子不祭明其宗也明猶尊也一統焉族人上不戚君下又辟宗乃後能相序大傳庶子不祭祖者明其宗也明其尊宗以為本也禰則不祭矣言不祭祖者主謂宗子庶子俱為適士得立祖禰廟者也凡正體在乎上者謂下正猶為庶也小記庶子不祭禰者明其宗也謂宗子庶子俱為下士得立禰廟也雖庶人亦然同上曾子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家貴祿重宗也上牲大夫少牢祝曰孝子某為介子某薦其常事外副也不言庶使若可以祭然若宗子有罪居于他國庶子為大夫其祭也祝曰孝子某使介子某執其常事此之謂宗子攝大夫攝主不厭祭不旅不假不綏祭不配皆辟正主厭厭飫神也厭有隂有陽迎主之前祝酌奠奠之且饗是隂厭也尸謖之後徹薦俎敦設於西北隅是陽厭也此不厭者不陽厭也不旅不旅酬也假讀為嘏不嘏不嘏主人也不綏祭謂今主人也綏周禮作墮不配者祝辭不言以某妃配某氏布奠於賔賔奠而不舉布奠謂主人酬賔奠觶於薦北賔奠謂取觶奠於薦南也此酬之始也奠之不舉止旅不歸肉肉俎也謂與祭者留之共燕其辭於賔曰宗兄宗弟宗子在他國使某辭辭猶告也宿賔之辭與宗子為列則曰宗兄若子弟昭穆異者曰宗子而已其辭若云宗兄某在他國使某執其常事使某告曾子問曾子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉有子孫存不可以乏先祖之祀請問其祭如何孔子曰望墓而為壇以時祭不祭於廟無爵者賤逺辟正主若宗子死告於墓而後祭於家言祭於家容無廟也宗子死稱名不言孝孝宗子之稱不敢與之同其辭但言子某薦其常事身沒而已至子可以稱孝子游之徒有庶子祭者以此以用也用此禮祭也若義也若順今之祭者不首其義故誣於祭也首本也誣猶妄也同上孔子曰有隂厭有陽厭言祭殤之禮有於隂厭之者有於陽厭之者曾子問曰殤不祔祭何謂隂厭陽厭祔當為備聲之誤也言殤乃不成人祭之不備禮而云隂厭陽厭乎此失孔子指也祭成人始設奠於奧迎尸之前謂之隂厭尸謖之後改饌於西北隅謂之陽厭殤則不備孔子曰宗子為殤而死庶子弗為後也族人以其倫代之明不序昭穆立之廟其祭之就其祖而已代之者主其禮其吉祭特牲尊宗子從成人也凡殤則特豚自卒哭成事之後為吉祭祭殤不舉肺無肵俎無𤣥酒不告利成此其無尸及所降也其他始成人舉肺脊肵俎利成禮之施於尸者是謂隂厭是宗子而殤祭之於奧之禮小宗為殤其祭禮亦如之凡殤與無後者祭於宗子之家當室之白尊于東房是謂陽厭凡殤與庶子之適也或昆弟之子或從父昆弟無後者如有昆弟及諸父此則今死者皆宗子大功之內親共祖禰者言祭於宗子之家者為有異居之道也無廟者為墠祭之親者共其牲物宗子皆主其禮當室之白尊於東房異於宗子之為殤當室之白謂西北隅得戶明者也明者白陽凡祖廟在小宗之家小宗祭之亦然宗子之適亦為凡殤過此以往則不祭也祭適者天子不祭五諸侯不祭三大夫下祭二士以下祭子而止同上適子庶子祗事宗子宗婦祗敬也宗子大宗雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入入謂入宗子家子弟猶歸器衣服裘衾車馬則必獻其上而后敢服用其次也猶若也子弟若有功德以物見饋賜當以善者與宗子也若非所獻則不敢以入於宗子之門謂非宗子之爵所當服也不敢以貴富加於父兄宗族加猶高也若富則具二牲獻其賢者於宗子賢猶善也夫婦皆齊而宗敬焉當助祭於宗子之家終事而後敢私祭祭其祖禰內則右事宗之禮孔子曰宗子雖七十無無主婦族人之婦不可無統非宗子雖無主婦可也曾子問傳曰子不私其父則不成為子故有東宫有西宫有南宫有北宫異居而同財有餘則歸之宗不足則資之宗宗者世久為小宗典宗事者也資取也喪服傳宗室有事族人皆待終日大宗已待於賔奠然後燕私謂卿大夫以下宗室大宗子之家也禮志云别子為祖繼别為大宗繼禰為小宗賔僚友助祭也燕私者何也祭已而與族人飲不醉而出是不親也醉而不出是泄宗也出猶去也出而不止是不忠也忠厚親而甚敬忠而不倦若是則兄弟之道備備者成也成者成於宗室也故曰飲而醉者宗室之意也德將無醉族人之志也是故祀禮有讓德施有復義之至也復反大尚書傳大宰以八統詔王馭萬民一曰親親親親若堯親九族也以九兩繫邦國之民五曰宗以族得民宗繼别為大宗收族者天官大宗伯以嘉禮親萬民以飲食之禮親宗族兄弟親者使之相親人君有食宗族飲酒之禮所以親之也文王世子曰族食世降一等大傳曰繫之以姓而弗别綴之以食而弗殊百世而昏姻不通者周道然也春官小宗伯掌三族之别以辨親踈其正室皆謂之門子掌其政令三族謂父子孫人道之正名喪服小記曰親親以三為五以五為九正室適子也將代父當門者也政令謂後守之事同上大司徒以本俗六安萬民二曰族墳墓三曰聨兄弟族猶類也同宗者生相近死相迫聨猶合也兄弟昏姻嫁娶也地官小司冦以八辟麗邦法附刑罰一曰議親之辟鄭司農云若今時宗室有罪先請是也凡王之同族有罪不即市鄭司農云刑諸甸師氏禮記曰刑于隱者不與國人慮兄弟秋官庶子之正於公族者教之以孝弟睦友子愛明父子之義長幼之序正者故也庶子司馬之屬掌國子之倅為政於公族者其朝於公內朝則東面北上臣有貴者以齒內朝路寢庭其在外朝則以官司士為之外朝路寢門之外庭司士亦司馬之屬也掌羣臣之班正朝儀之位也其在宗廟之中則如外朝之位宗人授事以爵以官宗人掌禮及宗廟也以爵貴賤異位也以官官各有所掌也若司徒奉牛司馬奉羊司空奉豕其登餕獻受爵則以上嗣上嗣君之適長子以特牲饋食禮言之受謂上嗣舉奠也獻謂舉奠洗爵酌入也餕謂宗人遣舉奠盥祝命之餕也大夫之嗣無此禮辟君也庶子治之雖有三命不踰父兄治之治公族之禮也唯於內朝則然其餘㑹聚之事則與庶姓同一命齒於鄉里再命齒於父族三命不齒不齒者特為位不在父兄行列中其公大事則以其喪服之精粗為序雖於公族之喪亦如之以次主人大事謂死喪也其為君雖皆斬衰序之必以本親也主人主喪者次主人者主人恆在上主人雖有父兄猶不得不齒若公與族燕則異姓為賔同宗無相賔客之道膳宰為主人君尊不獻酒公與父兄齒親親也族食世降一等親者稠踈者稀其在軍則守於公禰謂從軍者公禰行主也所以遷主言禰在外親也公若有出疆之政謂朝覲㑹同也庶子以公族之無事者守於公宫正室守大廟正室適子也大廟大祖之廟諸父守貴宫貴室謂守路寢諸子諸孫守下宫下室下宫親廟也下室燕寢或言宫或言廟通異語五廟之孫祖廟未毁雖為庶人冠取妻必告死必赴練祥則告赴告於君也實四廟孫而言五廟者容顯考為始封子也族之相為也宜弔不弔宜免不免有司罰之弔謂六世以往免謂五世至于賵賻承含皆有正焉承讀為贈聲之誤也正正禮也公族其有死罪則磬于甸人不於市朝者隱之也甸人掌郊野之官縣縊殺之曰磬其刑罪則纖剸亦告於甸人纖讀為殱刺也剸割也宫割臏墨劓刖皆以刀鋸刺割人體也告讀為鞠讀書用法曰鞠公族無宫刑宫割淫刑獄成有司讞于公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟成平也讞之言白也辟亦罪也公曰宥之宥寬也欲寬其罪出於刑也有司又曰在辟公又曰宥之又復也有司又曰在辟及三宥不對走出致刑于甸人對答也先者君每言宥則答之以將更寬之至於三罪定不復答走往刑之為君之恩無已公又使人追之曰雖然必赦之有司對曰無及也罪既正不可宥乃欲赦之重刑殺其類也反命於公白已刑殺公素服不舉為之變如其倫之喪無服素服於凶事為吉於吉事為凶非喪服也君雖不服卿大夫死則皮辨錫衰以居往弔當事則辨絰於士蓋疑衰同姓則緦衰以弔之今無服者不往弔也倫謂親踈之比也素服亦皮辨矣親哭之不往弔為位哭之而已君於臣使有司哭之文王世子君有合族之道族人不得以其戚戚君位也君恩可以下施而族人皆臣也不得以父兄子弟之親自戚於君伍謂齒列也所以尊君别嫌也大傳諸侯之尊兄弟不得以屬通禮非始封之君則臣諸父昆弟兄弟匹敵之稱人臣不可以敵君故不得以屬通所以逺别貴賤尊君卑臣之義隱七年穀梁傳右親親帝堯克明峻德以親九族九族既睦九族高祖至元孫之親舉近以該逺五服異姓之親亦在其中也堯典凡為天下國家有九經曰親親也親親則諸父昆弟不怨尊其位重其祿同其好惡所以勸親親也中庸上治祖禰尊尊也下治子孫親親也旁治昆弟合族以食序以昭繆别之以禮義人道竭矣治猶正也繆讀為穆聲之誤也竭盡也立權度量考文章改正朔易服色殊徽號異器械别衣服此其所得與民變革者也權稱也度丈尺也量斗斛也文章禮法也服色車馬也徽號旌旗之名也器械禮樂之器及甲兵也衣服吉凶之制也徽或作輝其不可得變革者則有矣親親也尊尊也長長也男女有别此其不可得與民變革者也四者人道之常大傳四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣四世其高祖五世高祖昆弟六世以外親盡無屬名其庶姓别於上而戚單於下昏姻可以通乎問之也元孫之子姓别於高祖五世而無服姓世所由生繫之以姓而弗别綴之以食而弗殊雖百世而昏姻不通者周道然也周之禮所建者長也姓正姓也始祖為正姓高祖為庶姓繫之弗别謂若今宗室屬籍也周禮小史定繫世辨昭穆同上親親以三為五以五為九上殺下殺旁殺而親畢矣已上親父下親子三也以父親祖以子親孫五也以祖親高祖以孫親元孫九也殺謂親益踈者服之益輕喪服小記自仁率親等而上之至於祖自義率祖順而下之至于禰是故人道親親也言先有恩親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷重社稷故愛百姓愛百姓故刑罰中刑罰中故庶民安庶民安故財用足財用足故百志成百志成故禮俗刑禮俗刑然後樂收族序以昭穆也嚴猶尊也孝經曰孝莫大於嚴父百志人之志意所欲也刑猶成也詩云不顯不承無斁於人斯此之謂也斁厭也言文王之德不顯乎不承成先人之業乎言其顯且承之人樂之無厭也大傳諸侯之子稱公子公子不得禰先君公子之子稱公孫公孫不得祖諸侯此自卑别於尊者也若公子之子孫有封為國君者别世世祖是人也不祖公子此自尊别於卑者也是故始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟封君之孫盡臣諸父昆弟喪服子夏傳公族朝於內朝內親也謂以宗族事㑹雖有貴者以齒明父子也外朝以官體異姓也體猶連結也宗廟之中以爵為位崇德也崇高也宗人授事以官尊賢也官各有能登餕受爵以上嗣尊祖之道也上嗣祖之正統喪紀以服之輕重為序不奪人親也紀猶事也公與族燕則以齒而孝弟之道逹矣以至尊不自異於親之列其族食世降一等親親之殺也殺差也戰則守於公禰孝愛之深也行主君父之象正室守太廟尊宗室而君臣之道著矣以其不敢以庶守君所重諸父諸兄守貴室子弟守下室而讓道逹矣以其貴者守貴賤者守賤上言父子孫此言兄弟互相備也五廟之孫祖廟未毁雖及庶人冠取妻必告死必赴不忘親也親未絶而列於庶人賤無能也敬弔臨賻賵睦友之道也古者庶子之官治而邦國有倫邦國有倫而衆鄉方矣鄉方言知所鄉公族之罪雖親不以犯有司正術也所以體百姓也犯猶干也術法也刑于隱者不與國人慮兄弟也弗弔弗為服哭於異姓之廟為忝祖逺之也素服居外不聽樂私喪之也骨肉之親無絶也公族無宫刑不翦其類也翦割截也文王世子魯人有同姓死而弗弔者人曰在禮當免不免當弔不弔有司罰之如之何子之無弔也答曰吾以其疏逺也子思聞之曰無恩之甚也昔者季孫問於夫子曰百世之宗有絶道乎子曰繼之以姓義無絶也故同姓為宗合族為屬雖國子之尊國子諸侯卿大夫之子不廢其親所以崇愛也是以綴之以食序列昭穆萬世婚姻不通忠篤之道然也孔叢子有若問於孔子曰國君之於同姓如之何孔子曰皆有宗道焉故雖國君之尊猶百世不廢其親所以崇愛也雖於族人之親而不敢戚君所以謙也戚親也尊敬君不敢如其親也家語宣王欲得國子之能導訓諸侯者賈侍中云國子諸侯之嗣子或云國子諸侯之子欲使訓導子也昭謂國子同姓諸姬也凡王子弟謂之國子導訓諸侯謂為州伯者也樊穆仲曰魯侯孝穆仲仲山甫之諡猶魯叔孫穆子謂之穆叔王曰何以知之對曰肅恭明神而敬事耉老耉凍梨也賦事行刑必問於遺訓遺訓先王之教也而咨於故實咨謀也故實故事之是者不干所問不犯所咨王曰然則能訓治其民矣乃命魯孝公於夷宫命為侯伯也夷宫宣王祖父夷王之廟古者爵命必於祖廟國語魯語周襄王將以狄伐鄭富辰諫曰不可富辰周大夫大上以德撫民無親踈也其次親親以相及也先親以及踈推恩以成義昔周公弔二叔之不咸故封建親戚以藩屏周弔傷也咸同也周公傷夏殷之叔世踈其親戚以至滅亡故廣封其兄弟管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也十六國皆文王子也管國在滎陽京縣東北蔡在今汝南上蔡縣郕國東平剛父縣西南有郕鄉霍國今在永安縣東北有霍太山魯在兖州曲阜縣衛國在汲郡朝歌縣郜國濟隂城武縣東南有北郜城雍國在河內山陽縣西曹國在今濟隂定陶縣滕國在沛國公丘縣東南畢國在長安縣西北原國在沁水縣西酆國在始平鄠縣東郇國解縣西北有郇城毛聃闕邘晉應韓武之穆也四國皆武王子河內野王縣西北有邘城晉國在太原晉陽縣河東聞喜縣應國在襄王城父縣西南韓國在河東郡界凡蔣邢茅胙祭周公之𦙍也𦙍嗣也凡汲郡共縣東南有凡城蔣在弋陽期思縣邢國在東平襄國縣高平昌邑縣西有茅鄉東郡燕縣西南有胙亭祭闕召穆公思周德之不類故糾合宗族于成周而作詩類善也糾收也召穆公周卿士名虎召采地扶風雍縣東南有召亭周厲王之時周德衰微兄弟道缺召穆公于東都收㑹宗族特作此周公之樂歌常棣詩屬小雅曰常棣之華鄂不韡韡凡今之人莫如兄弟常棣棣也不豈不也鄂鄂然華外發韡韡光明貌此燕兄弟之樂歌故言常棣之華則其鄂然而外見者豈不韡韡乎凡今之人則豈有如兄弟者乎此朱子說其四章曰兄弟鬩於墻外禦其侮䦧訟爭貌言內雖不和猶宜外扞異族之侵侮如是則兄弟雖有小忿不廢懿親懿美也今天子不忍小忿以棄鄭親其若之何庸勳親親昵近尊賢德之大者也庸用也昵親也即聾從昧與頑用嚚姦之大者也棄德崇姦禍之大者也崇聚也鄭有平惠之勳平王東遷晉鄭是依惠王出奔虢鄭納之是其勳也又有厲宣之親鄭始封之祖桓公友周厲王之子宣王之母弟棄嬖寵而用三良七年殺嬖臣申侯十六年殺寵子子華也三良叔詹堵叔師叔所謂尊賢於諸姬為近道近當昵之四德具矣耳不聽五聲之和為聾目不别五色之章為昧心不則德義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿德也猶曰莫如兄弟故封建之當周公時故言周之有懿德其懷柔天下也猶懼有外侮扞禦侮者莫如親親故以親屏周召穆公亦云周公作詩召公歌之故言亦云今周德既衰於是乎又渝周召以從諸姦無乃不可乎變周召親兄弟之道民未忘禍王又興之前有子頽之亂中有叔帶召狄故曰民未忘禍其若文武何言將廢文武之功業王弗聽僖二十四年左氏傳晉麗姬之亂詛無畜羣公子詛盟誓自是晉無公族無公子故廢公族之官及成公即位乃宦卿之適而為之田以為公族宦位也為置田邑以為公族大夫又宦其餘子亦為餘子餘子適子之母弟也亦治餘子之政其庶子為公行庶子妾子也掌率公戎行晉於是有公族餘子公行皆官名氏宣二年左傳欒伯請公族大夫欒伯欒武子公族大夫掌公族與卿之子弟公曰荀家惇惠荀家晉大夫荀㑹文敏荀㑹荀家之族黶也果敢黶欒書之子桓子無忌鎮靜無忌韓厥之子公族穆子鎮重也靜安也使兹四人者為之兹此也夫膏粱之性難正也膏肉之肥者粱食之精者言食肥美者率多驕放其性難正故使惇惠者教之教之道藝使文敏者導之導其志行使果敢者諗之諗告也告得失使鎮靜者修之修治其氣性惇惠者教之則遍而不倦倦懈也文敏者導之則婉而入婉順也果敢者諗之則過不隱鎮靜者修之則一一均一也使兹四人者為公族大夫國語晉語宋昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇䕃矣葛藟猶能庇其本根葛之能藟蔓繁滋以本支䕃庇之多故君子以為比謂詩人取以喻九族兄弟况國君乎此諺所謂庇焉而縱尋斧焉者也縱放也必不可君其圖之親之以德皆股肱也誰敢擕二若之何去之不聽穆襄之族率國人以攻公穆公襄公之子孫昭公所欲去者文七年左氏傳錫土姓錫之土以立國錫之姓以立宗左傳所謂天子建德因生以賜姓胙之土而命之氏者也禹貢天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之詳見下右姓氏仲山父曰古者司商協名姓司商掌賜族受姓之官商金聲清謂人始生吹律合之定其姓名國語周語司空季子曰黃帝之子二十五人其同姓者二人而已唯青陽與夷鼓皆為己姓其二人相與同德故俱為己姓青陽金天氏帝少昊也青陽方雷氏之甥也夷鼓彤魚氏之甥也方雷西陵氏之姓也彤魚國名帝繫曰黃帝要於西陵氏之子曰嫘祖實生青陽姊妹之子曰甥其同生而異姓者四母之子别為十二姓凡黃帝之子二十五宗唐尚書曰繼别為小宗非也繼别為大宗别子之庶姓乃為小宗耳其得姓者十四人為十二姓得姓以德居官而賜之姓也謂十四人而二人為姬二人為己故十二姓姬酉祁已滕葴任荀僖姞儇依是也唯青陽與倉林氏同於黃帝故皆為姬姓二十五宗唯青陽與倉林德及黃帝同姓為姬也同德之難也如是言德自黃帝同之難也如是昔少典取於有蟜氏生黃帝炎帝賈侍中云少典黃帝炎帝之先有蟜諸侯也炎帝神農也虞唐云少典黃帝炎帝之父昭謂神農三皇也在黃帝前黃帝滅炎帝滅其子孫耳明非神農可知也言生者謂二帝本所生出也內傳高陽高辛氏各有才子八人謂其裔子耳賈君得之黃帝以姬水成炎帝以姜水成姬姜水名也成謂所生長以成功也成而異德故黃帝為姬炎帝為姜二帝用師以相濟也異德之故也濟當為擠擠滅也傳曰黃帝戰於阪泉是也異姓則異德異德則異類雖近男女相及以生民也近謂有屬名也相及相嫁取也同姓則同德同德則同心同心則同志同志雖逺男女不相及畏黷敬也畏褻瀆其類也國語晉語無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德立有德以為諸侯因生以賜姓因其所由生以賜姓謂若舜由媯汭故陳為媯姓胙之土而命之氏報之以土而命氏曰陳諸侯以字諸侯位卑不得賜姓故其臣因氏其王父字為諡因以為族或便即先人之諡稱以為族官有世功則有官族邑亦如之謂取其舊官舊邑之稱以為族皆稟之時君公命以字為展氏諸侯之子稱公子公子之子稱公孫公孫之子以王父字為氏無駭公子展之孫故為展氏隱八年左氏傳人所以有姓者何所以崇恩愛厚親親逺禽獸别婚姻也故世别類使生相愛死相哀同姓不得相娶者皆為重人倫也姓生也人所禀天氣以生者也尚書曰平章百姓姓所以百何以為古者聖人吹律定姓以記其族人含五常而生身有五音宫商角徴羽轉而相雜五五二十五轉生四時故百而異也所以有氏者何所以貴功德賤伎力或氏其官或氏其事問其氏則可知其德所以勉人為善也或氏王父字何所以别諸侯之後為興滅國繼絶世也諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字為氏故魯有仲孫季孫叔孫楚有昭屈景齊有高國崔也人必有名何所以吐情自紀尊事人者也子生三月則父名之於祖廟於祖廟者謂子之親廟也明當為宗廟主也一說名之於燕寢名者幼少卑賤之親也寡略故於燕寢人所以有字何冠德明功敬成人也所以五十乃稱伯仲者長幼之序也稱號所以有四何法四時用事先後長幼兄弟之象也故以時長幼號曰伯仲叔季也適長稱伯伯禽是也庶長稱孟魯大夫孟氏是也男女異長各自有伯仲法隂陽各自有終始也婦姓以配字何明不娶同姓也白虎通親屬記通禮二十二補即爾雅釋親篇父為考母為妣禮記云生曰父母妻死曰考妣嬪今世學者從之按書曰大傷厥考心事厥考厥長聰聽祖考之彛訓蒼頡篇曰考妣延年書曰嬪于虞詩曰聿嬪于京周禮有九嬪之官明此非死生之異稱矣其義猶今謂兄為晜妹為媦即是此例也父之考為王父父之妣為王母加王者尊之王父之考為曽祖王父王父之妣為曽祖王母曽猶重也曽祖王父之考為高祖王父曽祖王父之妣為高祖王母高者言最在上父之世父叔父為從祖祖父父之世母叔母為從祖祖母從祖而别世統異故父之晜弟先生為世父後生為叔父世有為嫡者嗣世統故也男子先生為兄後生為弟男子謂女子先生為姊後生為妹父之姊妹為姑父之從父晜弟為從祖父父之從祖晜弟為族父從祖父之子相謂為從祖晜弟族父之子相謂為族晜弟族兄弟之子相謂為親同姓同姓之親無服屬兄之子弟之子相謂為從父晜弟從父而别子之子為孫孫猶後也孫之子為曽孫曽猶重也曽孫之子為元孫元者言親屬微昧也元孫之子為來孫言有往來之親來孫之子為晜孫晜後也汲冡竹書曰不窟之晜孫晜孫之子為仍孫仍亦重也仍孫之子為雲孫言輕逺如浮雲王父之姊妹為王姑曽祖王父之姊妹為曽祖王姑高祖王父之姊妹為高祖王姑父之從父姊妹為從祖姑父之從祖姊妹為族祖姑父之從父晜弟之母為從祖王母父之從祖晜弟之母為族祖王母父之兄妻為世母父之弟妻為叔母父之從父晜弟之妻為從祖母父之從祖晜弟之妻為族祖母父之從祖祖父為族曽王父父之從祖祖母為族曽王母父之妾為庶母祖王父也晜弟也今江東人通言晜右宗族母之考為外王父母之妣為外王母母之王考為外曽王父母之王妣為外曽王母異姓故言外母之晜弟為舅母之從父晜弟為從舅母之姊妹為從母從母之男子為從母晜弟其女子子為從母姊妹右母黨妻之父為外舅妻之母為外姑謂我舅者吾謂之甥然則亦宜呼壻為甥孟子田帝館甥于二室是也姑之子為甥舅之子為甥妻之晜弟為甥姊妹之夫為甥四人體敵故更相為甥甥猶生也今人相呼蓋依此妻之姊妹同出為姨同出謂俱已嫁詩曰邢侯之姨女子謂姊妹之夫為私詩衛風碩人篇曰覃公維私男子謂姊妹之子為出春秋公羊傳曰蓋舅出女子謂晜弟之子為姪春秋左氏傳曰姪其從姑謂出之子為離孫謂姪之子為歸孫女子子之子為外孫女子同出謂先生為姒後生為娣同出謂俱嫁事一夫公羊傳曰諸侯娶一國二國往媵之以姪娣從娣者何弟也此即其義也女子謂兄之妻為嫂弟之妻為婦猶今言新婦也長婦謂稚婦為娣婦娣婦謂長為姒婦今相呼先後或云妯娌右妻黨婦稱夫之父曰舅稱夫之母曰姑姑舅在則曰君舅君姑沒則曰先舅先姑國語魯語曰吾聞之先姑謂夫之庶母為少姑夫之兄為兄弟今俗呼兄鍾語之誤耳夫之弟為叔夫之姊為女公夫之女弟為女妹今謂之女妹是也子之妻為婦長婦為嫡婦衆婦為庶婦女子子之夫為壻壻之父為姻婦之父為婚父之黨為宗族母與妻之黨為兄弟婦之父母壻之父母相謂為婚姻兩壻相謂為亞詩曰瑣瑣姻亞今江東人呼為僚壻婦之黨為婚兄弟壻之黨為姻兄弟古者皆謂婚姻為兄弟嬪婦也書曰嬪于虞謂我舅者吾謂之甥也右婚姻同姓從宗合族屬異姓主名治際㑹名著而男女有别合合之宗子之家序昭穆也異姓謂來嫁者也主於母與父之名耳際㑹婚禮交接之㑹也著明也母婦之名不明則人倫亂也亂者若衛宣公楚平王為子取而自納焉其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也言母婦無昭穆於此統於夫耳母焉則尊之婦焉則卑之尊之卑之明非已倫以厚别也謂弟之妻婦者是嫂亦可謂之母乎言不可也謂之婦與嫂者以其在己之列以名逺之耳復謂嫂為母則令昭穆不明昆弟之妻夫之昆弟不相為服不成其親也男女無親則逺於相見名者人治之大者也可無慎乎人治所以正人大傅族者何也族者湊也聚也謂恩愛相流湊也生相親愛死相哀痛有㑹聚之道故謂之族族所以九何九之為言究也親踈恩愛究竟也謂父族四母族三妻族二父族四者謂父之姓一族也父女昆弟適人有子為二族也身女昆弟適人有子為三族也身女子適人有子為四族也母族三者母之父母一族也母之昆弟二族也母昆弟子三族也妻族二者妻之父為一族妻之母為二族妻之親略故父母各一族禮曰惟是三族之不虞尚書曰以親九族義同也白虎通三綱者何謂也謂君臣父子夫婦也六紀者何謂也謂諸父兄弟族人諸舅師長朋友也故君為臣綱父為子綱夫為妻綱敬諸父兄六紀道行諸舅有義族人有序昆弟有親師長有尊朋友有舊何謂綱紀綱者張也紀者理也大者為綱小者為紀所以張理上下整齊人道也人皆懷五常之性有親愛之心是以綱紀為化若羅網之有綱紀而萬目張也君臣父子夫婦六人也所以稱三綱何一隂一陽謂之道陽得隂而成隂得陽而序剛柔相配故六人為三綱六紀者為三綱之紀者也師長君臣之紀也以其皆成己也諸父兄弟父子之紀也以其有親恩連也諸舅朋友夫婦之紀也以其皆有同志為紀助也君臣者何謂也君羣也下之所歸心臣者繵堅也屬志自堅固父子者何謂也父者矩也以法度教子子者孶孶無已也夫婦者何謂也夫者扶也以道扶接也婦者服也以禮屈服朋友者何謂也朋者黨也友者有也同門曰朋同志曰友謂之舅姑何舅者舊也姑者故也舊故之者老人之稱也謂之姊妹何姊者恣也妹者末也謂之兄弟何兄者况也况父法也弟者悌也心順行篤也稱夫之父母謂之舅姑何尊如父而非父者舅也親如母而非母者姑也故稱夫之父母為舅姑也同上禮書綱目卷六十九
