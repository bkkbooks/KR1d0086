body:
  text: 禮書綱目卷二十三婺源江永撰士喪禮上凶禮六經鄭目録云士喪其父母自始死至于既殯之禮士喪于五禮屬凶士喪禮右篇目周禮黨正凡其黨之喪紀教其禮事掌其戒禁地官記恤由之䘮哀公使孺悲之孔子學士喪禮士喪禮于是乎書時人轉而僣上士之喪禮已廢矣孔子以教孺悲國人乃復書而存之雜記死於適室幠用歛衾適室正寝之室也疾者齊故于正寝焉疾時處北庸下死而遷之南牖下有牀衽幠覆也歛衾大歛所并用之衾衾被也小歛之衾當陳䘮大記曰始死遷尸于牀幠用歛衾去死衣右始死記士處適寝寝東首于北庸下将有疾乃寝于適室今文處為居于為於有疾疾者齊正情性也適寝者不齊不居其室飬者皆齊徹琴瑟去樂疾病外内皆埽為有賔客来問也疾甚曰病徹䙝衣加新衣故衣垢汚為来人穢惡之御者四人皆坐持體為不能自轉側御者今時侍从之人男女改服為賔客来問病亦朝服庻人深衣屬纊以俟絶氣為其氣微難節也纊新絮男子不絶於婦人之手婦人不絶于男子之手備褻乃行禱于五祀盡孝子之情五祀博言之士二祀曰門曰行夕本經記按本經記本在既篇末疾病廢牀御者持體體一人詳見喪大記士疾君一問之同上乃卒卒終也主人啼兄弟哭哀有甚有否于是始去冠而笄纚服深衣檀弓曰始死羔裘𤣥冠者易之本經記婦人哭踊凡哭尸于室者主人二手承衾而哭詳見喪大記親始死雞斯徒跣扱上祍交手哭詳見䘮禮義始死充充如有窮詳見喪通禮哀戚章始死皇皇如有求而弗得同上三日而食詳見喪禮義水漿不入于口者三日同上士之妻皆死于寝詳見喪大記衾死而後制詳見本篇陳小歛衣章孔子蚤作作起負手曵杖消搖于門欲人之怪己歌曰泰山其頽乎泰山衆山所仰梁木其壊乎梁木衆木所放哲人其萎乎哲人亦衆人所仰放也以上二句喻之萎病也詩云無木不萎既歌而入當户而坐蚤作急見人也子貢聞之曰泰山其頽則吾将安仰梁木其壊哲人其萎則吾将安放夫子殆将病也覺孔子歌意殆㡬也遂趨而入夫子曰賜爾来何遲也坐則望之夏后氏殯于東階之上則猶在阼也殷人殯於兩楹之間則與賔主夹之也周人殯于西階之上則猶賔之也以三王之禮占已夢而丘也殷人也予疇昔之夜夢坐奠于兩楹之間是夢坐兩楹之間而見饋食也言奠者以為凶象疇發聲也昔猶前也夫明王不興而天下其孰能宗予予殆将死也孰誰也宗尊也兩楹之間南面鄉明人君聽治正坐之䖏今無明王誰能尊我以為人君乎是我殷家奠殯之衆以此自知将死盖寝疾七日而沒明聖人知命檀弓曽子有疾召問弟子曰啓予足啓予手詩云戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子啓開也曽子平日以為身體受于父母不敢毁傷故于此使弟子開其衾而視之詩小旻之篇戰戰恐懼兢兢戒謹臨淵恐隊履氷恐陷也曽子以其所保之全示門人而言其所以保之之難如此至于将死而後知其得免于毁傷也小子門人也語畢而又呼之以致反覆丁寕之意其警之也深矣論語曽子有疾孟敬子問之孟敬子魯大夫仲孫氏名㨗問之者問其疾也曽子言曰鳥之将死其鳴也哀人之将死其言也善言自言也鳥畏死故鳴哀人窮反本故言善此曽子之謙辭欲敬子知其所言之善而識之也君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存貴猶重也容貌舉一身而言暴粗厲也慢放肆也信實也正顔色而近信則非色荘也辭言語氣聲氣也鄙凡陋也倍與背同謂背理也籩竹豆豆木豆言道雖無所不在然君子所重者在此三事而已是皆修身之要為政之本學者所當操存省察而不可有造次顛沛之違者也若夫籩豆之事器數之末道之全體固無不該然其分則有司之守而非君子之所重矣同上曽子疾病疾困曰病曽元抑首曽華抱足元華其子曽子曰人之生也百嵗之中有疾病焉有老㓜焉故君子思其不可復者而先施焉親戚既歿雖欲孝誰為孝年既耆艾雖欲弟誰為弟故孝有不及弟有不時其此之謂與大戴記曽子寝疾病病謂疾困樂正子春坐于牀下子春曽子弟子曽元曽申坐于足元申曽参之子童子隅坐而執燭隅坐不與成人坐童子曰華而睆大夫之簀與華畫也簀謂牀笫也説者以睆為刮節目字或為刮子春曰止以病困不可動曽子聞之瞿然曰呼呼虚憊之聲曰華而睆大夫之簀與曽子曰然斯季孫之賜也我未之能易也元起易簀未之能易以病故也曾元曰夫子之病革矣不可以變幸而至于旦請敬易之言夫子者曾子親歿之後齊甞聘以為卿而不為也革意也變動也幸覬也曽子曰爾之愛我也不如彼彼童子也君子之愛人也以徳成已之徳細人之愛人也以姑息息猶安也言苟容取安也吾何求乎哉吾得正而斃焉斯已矣斃仆也舉扶而易之反席未安而沒言病雖困猶勤于禮檀弓子張病召申祥而語之曰君子曰終小人曰死申祥子張子欲使執喪成己志也死之言澌也事卒為終消盡為澌大史公傳曰子張姓顓孫今曰申祥周秦之聲二者相近未聞孰是吾今日其庶㡬乎言易成也同上復者一人以爵弁服簮裳于衣左何之扱領于帶復者有司招魂復魄也天子則夏采祭僕之属諸侯則小臣為之爵弁服純衣纁裳也禮以冠名服簮連也升自前東榮中屋北面招以衣曰臯某服三降衣于前北面招求諸幽之義也皐長聲也某死者之名也復反也降衣下之也喪大記曰凡復男子稱名婦人稱字受用篚升自阼階以衣户受者受之于庭也復者其一人招則受衣亦一人也人君則司服受之衣尸者覆之若得魂反之復者降自後西榮不由前降不以虚反也降因徹西北厞若云此室凶不可居然也自是行死事右復記復者朝服左執領右執要招而左衣朝服服未可以變本經記士以爵弁士妻以税衣皆升自東榮中屋履危北面三號捲衣投于前司服受之降自西北榮復衣不以衣尸不以歛婦人復不以袡凡復男子稱名婦人稱字唯哭先復復而後行死事詳見喪大記復與書銘自天子逹于士其辭一也男子稱名婦人書姓與伯仲不知姓則書氏同上邾婁復之以矢盖自戰于升陘始也戰于升陘魯僖二十二年秋也時師雖勝死傷亦甚無衣可以招魂檀弓復楔齒綴足飯設飾帷堂並作設飾謂遷尸又加新衣同上楔齒用角柶為将含恐其口閉急也綴足用燕几綴猶拘也為将屦恐其辟戾也今文綴為對右楔齒綴足案復與楔齒綴足之間有遷尸一節經文不具以附記見于下記設牀笫當牖衽下莞上簟設枕病卒之間廢牀至是設之事相變衽卧席古文笫為茨遷尸徙于牖下也于是無用歛衾本經記始死遷尸于牀幠用歛衾去死衣小臣楔齒用角柶綴足用燕几君大夫士一也詳見喪大記楔貌如軶上兩末事便也今文軶作厄綴足用燕几挍在南御者坐持之挍脛也尸南首凡脛在南以拘足則不得辟戾矣古文挍為枝本經記掘中霤而浴毁竈以綴足及葬毁宗躐行出于大門殷道也明不復有事于此周人浴不掘中霤葬不毁宗躐行毁宗毁廟門之西而出行神之位在廟門之外學者行之學于孔子者行之傚殷禮檀弓奠脯醢醴酒升自阼階奠于尸東鬼神無象設奠以憑依之帷堂事小訖也右始死奠帷堂記即牀而奠當腢用吉器若醴若酒無巾柶腢肩頭也用吉器器未變也或卒無醴用新酒本經記曽子曰始死之奠其餘閣也與不容改新閣庋藏食物檀弓乃赴于君主人西階東南面命赴者拜送赴告也臣君之股肱耳目死當有恩有賔則拜之賔僚友羣士也其位猶朝夕哭矣右命赴拜賔記赴曰君之臣某死赴母妻長子則曰君之臣某之某死赴走告也今文赴作訃本經記士訃于同國大夫曰某死訃于士亦曰某死訃于他國之君曰君之外臣某死訃于大夫曰吾子之外私某死訃于士亦曰吾子之外私某死詳見喪大記五廟之孫祖廟未毁雖為庶人死必赴練祥則告赴告于君也實四庙孫而言五廟者容顕考為始封子也文王世子入坐于牀東衆主人在其後西面婦人侠牀東面衆主人庶昆弟也婦人謂妻妾子姓也亦適妻在前親者在室謂大功以上父兄姑姊妹子姓在此者衆婦人户外北面衆兄弟堂下北面衆婦人衆兄弟小功以下右室中位記室中唯主人主婦坐兄弟有命夫命婦在焉亦坐别尊卑也本經記既正尸主人父兄子姓皆坐于東方主婦姑姊妹子姓皆坐于西方詳見喪大記君使人弔徹帷主人迎于寝門外見賔不哭先入門右北面使人士也禮使人必以其爵使者至使人入将命乃出迎之寝門内門也徹帷㧁之事畢則下之弔者入升自西階東面主人進中庭弔者致命主人不升賤也致命曰君聞子之喪使某如何不淑主人哭拜稽顙成踊稽顙頭觸地成踊三者三賔出主人拜送于外門外右君使人弔記尸在室有君命衆主人不出不二主記本經凡主人之出也徒跣扱衽拊心降自西階詳見喪大記出以下君使人禭凡主人並通用君使人禭徹帷主人如初禭者左執領右執要入升致命禭之言遺也衣被曰禭致命曰君使某禭主人拜如初禭者入衣尸出主人拜送如初唯君命出升降自西階遂拜賔有大夫則特拜之即位于西階下東面不踊大夫雖不辭入也唯君命出以明大夫以下時來弔禭不出也始喪之日哀戚甚在室故不出拜賔也大夫則特拜别于士旅拜也即位西階下未忍在主人位也不踊但哭拜而已不辭而主人升入明本不為賔出不成禮也右君使人禭記士于大夫親弔則與之哭不逆于門外詳見喪大記己以下凡大夫弔並通用几主人之出見君使人弔章當互考親者禭不将命以即陳大功以上有同財之義也不将陳命不使人将之致于主人也即陳在房中庶兄弟禭使人以将命于室主人拜于位委衣于尸東牀上庶兄弟即衆兄弟也将命曰某使某禭拜于位室中位也朋友禭親以進主人拜委衣如初退哭不踊親以進親之恩也退下堂反賔位也主人徒哭不踊别于君禭也徹衣者執衣如禭以適房凡于禭者出有司徹衣右親友禭記禭者委衣于牀不坐牀髙由便其禭于室户西北面致命始死時也本經記為銘各以其物亡則以緇長半幅䞓末長終幅廣三寸書銘于末曰某氏某之柩銘明旌也雜帛為物大夫之所建也以死者為不可别故以其旗識識之愛之斯録之矣亡無也無旌不命之士也半幅一尺終幅二尺在棺為柩今文銘皆為名物為斾也竹杠長三尺置于宇西階上杠銘橦也宇梠也右為銘記復與書銘自天子逹于士其辭一也詳見本篇復章甸人掘坎于階間少西為垼于西牆下東鄉甸人有司主田野者垼塊灶西牆中庭之西今文鄉為面新盆槃瓶廢敦重鬲皆濯造于西階下新此瓦器五種者重死事盆以盛水槃承渜濯瓶以汲水也廢敦敦無足者所以盛米也重鬲鬲将縣于重者也濯滌溉也造至也猶饌也以造言之喪事遽陳襲事于房中西領南上不綪襲事謂衣服也綪讀為䋫䋫屈也襲事少上陳而下不屈江沔之間謂縈收䋲索為䋫古文綪皆為精明衣裳用布所以親身為圭絜也鬠䈂用桑長四寸纋中桑之為言喪也用為笄取其名也長四寸不冠故也纋笄之中央以安髪布巾環幅不鑿環幅廣袤等也不鑿者士之子親含反其巾而已大夫以上賔為之含當口鑿之嫌有惡古文環作還掩練帛廣終幅長五尺析其末掩裹首也析其末為将結于頥下又還結于項中瑱用白纊瑱充耳纊新綿幎目用緇方尺二寸䞓裏著組繫螟目用覆面者也幎讀若詩曰葛藟縈之之縈䞓赤也箸充之以絮也組繫為可結也古文幎為涓握手用𤣥纁裏長尺二寸廣五寸牢中旁寸著組繫牢讀為楼楼謂削約掘之中央以安手也今文楼為纋旁為方决用正王棘若檡棘組繫纊極二决猶闓也挾弓以横執弦詩云决拾既佽正善也王棘與檡棘善理堅刃者皆可以為决極猶放弦也以沓指放弦令不挈指也生者以朱韋為之而三死用纊又二明不用也古文王為三今文檡為澤世俗謂王棘矺䑕冐緇質長與手齊䞓殺掩足冐韜尸者制如直囊上曰質下曰殺質正也其用之先以殺韜足而上後以質韜首而下齊手上𤣥下纁象天地也喪大記曰君錦冐黼殺綴旁七大夫𤣥冐黻殺綴旁五士緇冐䞓殺綴旁三凡冐質長與手齊殺三尺爵弁服純衣謂生時爵弁所衣之服也純衣者纁裳古者以冠名服死者不冠皮弁服皮弁所衣之服也其服白布衣素裳也褖衣黒衣裳赤縁之謂之縁褖之言縁也所以表袍者也喪大記曰衣必有裳袍必有表不禅謂之一稱古文褖為縁緇帶黒繒之帶韎韐一命縕韍竹笏笏所以書思對命者玉藻曰笏天子以璆玉諸侯以象大夫以魚湏文竹士以竹夲象可也又曰笏度二尺有六寸其中博三寸其殺六分而去一又曰天子搢珽方正于天下也諸侯荼前詘後直讓于天下也大夫前詘後詘無所不讓今文笏作忽夏葛屦冬白屦皆繶緇純組綦繫于踵冬皮屨變言白者明夏時用葛亦白也此皮弁之屦士冠禮曰素積白屦以魁祔之緇絇繶純純博寸綦屦係也所以拘止屦也綦讀如馬絆綦之綦庶禭繼陳不用庶衆也不用不用襲也多陳之為榮少納之為貴貝三實于笄貝水物古者以為貨江水出焉笲竹器名稻米一豆實于筐豆四升沐巾一浴巾二皆用綌于笄巾所以拭汚垢浴巾二者上體下體異也綌粗葛櫛于簞簞葦笥浴衣于箧浴衣已浴所衣之衣以布為之其制如今通裁皆饌于西序下南上皆者皆貝以下東西牆謂之序中以南謂之堂右陳沐浴襲飯含之具記掘坎南順廣尺輪二尺深三尺南其壤南順統于堂輪从也今文掘為坅垼用塊塊堛也古文垼為役明衣裳用幕布袂屬幅長下膝幕布帷幕之布升數未聞也屬幅不削幅也長下膝又有裳于蔽下體深也有前後裳不辟長及觳不辟積也觳足跗也凡他服短無見膚長無被土縓綼緆一染謂之縓今紅也飾裳在幅曰綼在下曰緆緇純七入為緇緇黒色也飾衣曰純謂領與袂衣以緇裳以縓象天地也本經記掘中霤而浴殷道也詳見楔齒綴足章士緇冐䞓殺綴旁三凡冐質長與手齊殺三尺詳見喪大記冐死而後制詳見陳小歛衣章袍必有表不禅衣必有裳謂之一稱詳見喪大記率帶士二采同上士飯三貝同上士併瓦盤無冰設牀䄠笫有枕含一牀襲一牀遷尸于堂又一牀皆有枕席君大夫士一也同上管人汲不説繘屈之管人有司主館舍者不説繘将以就祝濯米屈縈也祝淅米于堂南面用盆祝夏祝也淅沃也管人盡階不升堂受潘煑于垼用重鬲盡階三等之上喪大記曰管人受沐乃煑之甸人取所徹廟之西北厞薪用㸑之祝盛米于敦奠于貝北復于筐處也士有氷用夷槃可也謂夏月而君加賜氷也夷槃承尸之槃喪大記曰君設大槃造氷焉大夫設夷槃造氷焉士併瓦槃無氷設牀襢笫有枕外御受沐入外御小臣侍从者沐管人所煑潘也主人皆出户外北面象平生沐浴裸裎子孫不在旁主人出而襢笫乃沐櫛挋用巾挋晞也清也古文挋皆作振浴用巾挋用浴衣用巾用拭之也喪大記曰御者二人浴浴水用盆沃水用枓渜濯棄于坎沐浴餘潘水巾櫛浴衣亦并棄之古文渜作縁荆沔之間語蚤揃如他日蚤讀為爪斷爪揃鬚也人君則小臣為之他日平生時鬠用組乃笄設明衣裳用組組束髪也古文鬠皆為括右沐浴記夏祝淅米差盛之差擇之御者四人抗衾而浴䄠笫抗衾為其祼裎蔽之也䄠袒也袒簣去席盝水便其母之喪則内御者浴鬠無笄内御女御也無笄猶丈夫之不冠也設明衣婦人則設中帶中帶者今之禈襂本經記管人汲不説繘屈之盡階不升堂授御者御者入浴小臣四人抗衾御者二人浴浴水用盆沃水用枓浴用絺巾挋用浴衣如他日小臣爪足浴餘水棄于坎其母之喪則内御者抗衾而浴管人汲授御者御者差沐于堂上君沐粱大夫沐稷士沐粱甸人為垼于西牆下陶人出重鬲管人授沐乃煑之甸人取所徹廟西北厞薪用㸑之管人授御者沐乃沐沐用瓦盤挋用巾如他日小臣爪手翦須濡濯棄于坎詳見喪大記曽子之喪浴于㸑室見曽元之辭易簀矯之以謙讓也禮死于適室弓檀主人入即位已設明衣可以入也商祝襲祭服褖衣次商祝祝習商禮者商人教之以敬于接神冝襲布衣牀上祭服爵弁服皮弁服皆从君助祭之服大蜡有皮弁素服而祭送終之禮也襲衣于牀牀次含牀之東衽如初也喪大記曰含一牀襲一牀遷尸于堂又一牀主人出南面左袒扱諸面之右盥于盆上洗貝執以入宰洗柶建于米執以從俱入户西鄉也今文宰不言執商祝執巾從入當牖北面徹枕設巾徹楔受貝奠于尸西當牖北面值尸南也設巾覆面為飯之遺落米也如商祝之事位則尸南首明矣主人由足西牀上坐東面不敢从首前也祝受貝米奠之口實不由足也祝又受米奠于貝北宰從立于牀西在右米在貝北便扱者也宰立牀西在主人之右當佐飯事主人左扱米實于右三實于貝左中亦如之又實米唯盈于右尸口之右唯盈取滿而已主人襲反位襲復衣也位在尸東商祝掩瑱設幎目乃屨綦結于跗連絇掩者先結頥下既瑱幎目乃還結項也跗足上也絇屨飾如刀衣鼻在屨頭上以餘組連之止足坼也乃襲三稱遷尸于襲止而衣之凡衣死者左衽不紐襲不言設牀又不言遷尸于襲上以其俱當牖無大異明衣不在算算數也不在數明衣禅衣不成稱也設韐帶搢笏韐帶韎韐緇帶不言韎緇者省文亦欲見韐自有帶韐帶用革搢揷也揷于帶之右旁古文韐為合也設決麗于掔自飯持之設幄乃連掔麗施也掔手後節中也飯大擘指本也决以韋為之籍有彄彄内端為紐外端有横帶設之以紐擐大擘本也因呇其彄以横帶貫紐結于掔之表也設幄者以綦繫鉤中指由手表與决帶之餘連結之此謂右手也古文麗亦為連掔作捥設冐櫜之撫用衾櫜韜盛物者取事名焉衾者始死時歛衾今文櫜為櫜巾柶鬊蚤埋于坎坎至此築之也将襲辟奠既則反之右飯含襲記飯于牖下詳見喪禮義卒洗貝反于笲實貝柱右齻左齻象齒堅夏祝徹餘飯徹去鬻瑱塞耳塞充窒本經記設握裏親膚繫鉤中指結于掔掔掌後節中也手無决者以握擊一端繞掔還从上自貫反與其一端結之甸人築坅坎築實土其中堅之穿坎之名又曰坅𨽻人湼厠隸人罪人也今之徒役作者也湼塞也為人復徃䙝之又亦鬼神不用同上鬊爪士埋之詳見喪大記司士賁告于子㳺曰請襲于牀子㳺曰諾縣子聞之曰汰哉叔氏専以禮許人叔氏子㳺别字檀弓鑿巾以飯公羊賈為之也記士失禮之所由始也士親飯必發其巾大夫以上賓為飯焉則有鑿巾記雜既襲宵為燎于中庭宵夜記本經重木刋鑿之甸人置重于中庭叁分庭一在南木也縣物焉曰重刋斵治鑿之為縣簮孔也士重木長三尺夏祝鬻餘飯用二鬲于西牆下夏祝祝習夏禮者也夏人教以忠其于飬冝鬻餘飯以飯尸餘米為鬻也重主道也士二鬲則大夫四諸侯六天子八與簋同差幂用疏布久之繫用靲縣于重幂用葦席北面左衽帶用靲賀之結于後久讀為灸謂以盖塞鬲口也靲竹蔤也以席覆重辟屈而反兩端交于後左衽西端在上賀加也今文幕皆作宻祝取銘置于重祝習周禮者也右設重置銘厥明陳衣于房南領西上綪絞横三縮一廣終幅析其末綪屈也絞所以収束衣服為堅急者也以布為之縮從也横者三幅從者一幅析其末者令可結也喪大記曰絞一幅為三緇衾赬裏無紞紞被識也歛衣或倒被無别于前後也衾制同皆五幅也祭服次爵弁服皮弁服散衣次禒衣以下袍繭之屬凡十有九稱祭服與散衣陳衣繼之庶禭不必盡用取稱而已不務多饌于東堂下脯醢醴酒幂奠用功布實于簞在饌東功布鍜濯灰治之布也凡在東西堂下者南齊坫古文奠為尊設盆盥于饌東有巾為奠設盥也喪事畧故無洗也苴絰大鬲下本在左要絰小焉散帶垂長三尺牡麻絰右本在上亦散帶垂皆饌于東方苴絰斬衰之絰也苴麻者其貌苴以為絰服重者尚粗惡絰之言實也鬲搤也中人之手搤圍九寸絰帶之差自此出焉下本在左重服統于内而本陽也要絰小焉五分去一牡麻絰者齊衰以下之絰也牡麻絰者其貌易服輕者冝差好也右本在上輕服本于隂而統于外散帶之垂者男子之道文多變也饌于東方東坫之南苴絰為上婦人之帶牡麻結本在房婦人亦有苴絰但言帶者記其異此齊衰婦人斬衰婦人亦苴絰也牀笫夷衾饌于西坫南笫簣也夷衾覆尸之衾喪大記曰自小歛以徃用夷衾夷衾質殺之裁猶冐也西方盥如東方為舉者設盥也如東方者亦用盆布巾饌于西堂下陳一鼎于寝門外當東塾少南西面其實特豚四鬄去蹄兩胉脊肺設扄鼏鼏西末素俎在鼎西西順覆匕東柄鬄解也四解之殊肩髀而已喪事畧去蹄去其甲為不絜清也胉脅也素俎喪尚質既饌将小歛則辟襲奠今文鬄為剔胉為迫古文鼏為宻右陳小歛衣絰帶奠記小歛于户内大歛于阼士以葦席詳見喪大記厥明滅燎陳衣記節凡絞紟用布倫如朝服凡凡小歛大歛也倫比也今文無紟古文倫為輪本經記小歛布絞縮者一横者三士緇衾一衣十有九稱士陳衣于房中皆西領北上絞紟不在列小歛之衣祭服不倒君無禭大夫士畢主人之祭服親戚之衣受之不以即陳君大夫士皆用複衣複衾詳見喪大記袍必有表不禅衣必有裳謂之一稱凡陳衣者實之箧取衣者亦以箧升降自西階凡陳衣不詘非列采不入絺綌紵不入同上絞紟衾冒死而後制王制用大歛章通設棜于東堂下南順齊于坫饌于其上兩甒醴酒酒在南篚在東南順實角觶四木柶二素勺二豆在甒北二以並籩亦如之棜今之轝也角觶四木柶二素勺二為夕進醴酒兼饌之也勺二醴酒各一也豆籩二以併則是大歛饌也記于此者明其他與小歛同陳古文角觶為角柶凡籩豆實具設皆巾之籩豆偶而為具具則于饌巾之巾之加飾也明小歛一豆一籩不巾觶俟時而酌柶覆加之面枋及錯建之時朝夕也檀弓曰朝奠日出夕奠逮日本經記陳大歛奠通用喪不剥奠也與祭肉也與剥猶倮也有牲肉則中之為其久設塵埃加也脯醢之奠不巾檀弓後殷奠通用喪服先散帶詳見喪禮義批以桑長三尺或曰五尺批所以載牲體者此謂喪祭也吉祭批用棘畢用桑長三尺刋其柄與末畢所以助主人載者刋猶削也雜記陳大歛及凡喪祭鼎者通用奠以素噐詳見喪禮義後凡奠通用士盥二人以並東面立于西階下立俟舉尸也今文並為併布席于户内下莞上簟有司布歛席也商祝布絞衾散衣祭服祭服不倒美者在中歛者趨方或傎倒衣裳祭服尊不倒之也美善也善衣後布于歛則在中也既後布祭服而又言善者在中明每服非一稱也士舉遷尸反位遷尸于服上設牀笫于兩楹之間衽如初有枕衽亦寝之席也亦下莞上簟卒歛徹帷尸已飾主人西面馮尸踊無算主婦東面馮亦如之馮服膺之主人髺髪袒衆主人免于房始死将斬衰者雞斯将齊衰者素冠今至小歛變又将初變服也髺髪者去笄纚而紒衆主人免者齊衰将袒以免代冠冠服之尢尊不以袒也免之制未聞舊説以為如冠状廣一寸喪服小記曰斬衰髺髮以麻免而以布此用麻布為之状如今之著惨頭矣自項中而前交于額上卻繞紒也于房于室釋髺髪冝于隠者今文免皆作絻古文髺作括婦人髽于室始死婦人将斬衰者去笄而纚将齊衰者骨笄而纚今言髽者亦去笄纚而紒也齊衰以上至笄猶髽髽之異于髺髪者既去纚而以髪為大紒如今婦人露紒其象也檀弓曰南宫縚之妻之姑之喪夫子誨之髽曰爾母縱縱爾爾母扈扈爾其用麻布亦如著幓頭然右小歛髺髮髽記夏后氏尚黒以建寅之月為正物生尚黒大事歛用昏昏時亦黒此大事謂喪事也殷人尚白以建丑之月為正物牙色白大事斂用日中日中時亦白周人尚赤以建子之月為正而物萌色赤大事歛用日出日出時亦赤通檀弓大歛章用小歛辟奠不出室未忍神逺之也辟襲奠以辟歛既歛則不出于室設于序西南畢事而去本經記小歛而徹帷詳見喪禮義無踊節其喪未可節也既馮尸主人袒髺髪絞帶衆主人布帶衆主人齊衰以下本經記小歛主人即位于户内主婦東面乃歛卒歛主人馮之踊主婦亦如之主人袒脫髦括髪以麻婦人髽帶麻于房中凡歛者袒遷尸者襲士之喪胥為侍士是歛小歛大歛祭服不倒皆左衽結絞不紐歛者既歛必哭士與其執事則歛歛焉則為之壹不食凡歛者六人鋪絞紟踊鋪衾踊鋪衣踊遷尸踊歛衣踊歛衾踊歛絞紟踊士馮父母妻長子庶子庶子有子則父母不馮其尸凡馮尸者父母先妻子後父母于子執之子于父母馮之婦于舅姑奉之舅姑于婦撫之妻于夫拘之夫于妻于昆弟執之馮尸不當君所凡馮尸興必踊詳見喪大記嫂不撫叔叔不撫嫂逺别也雜記君不撫僕妾同上袒凡歛者至此大歛章通用士舉男女奉尸侇于堂幠用夷衾男女如室位踊無算侇之言尸也夷衾覆尸柩之衾也堂謂楹間牀笫上也今文侇作夷主人出于足降自西階衆主人東即位婦人阼階上西面主人拜賔大夫特拜士旅之即位踊襲絰于序東復位拜賔鄉賔位拜之也即位踊東方位襲絰于序東東夹前右奉尸侇于堂拜賔襲絰記徹帷男女奉尸夷于堂降拜士拜卿大夫于位于士旁三拜士妻特拜命婦汜拜衆賔于堂上主人即位襲帶絰踊母之喪即位而免哭尸于堂上主人在東方由外来者在西方諸婦南鄉婦人迎客送客不下堂下堂不哭男子出寝門見人不哭其無女主則男主拜女賔于寝門内其無男主則女主拜男賔於阼階下子㓜則以衰抱之人為之拜在竟内則俟之在竟外則殯葬可也喪有無後無無主詳見喪大記大夫弔當事而至則辭焉辭猶告也擯者以主人有事告也主人無事則為大大出檀弓士之喪於大夫不當歛則出詳見喪大記士妻不當歛則為命婦出同上當袒大夫至雖當踊絶踊而拜之反改成踊乃襲尊大夫至則拜之不待事已也更成踊者新其事也于士既事成踊襲而后拜之不改成踊于士士至也事謂大小歛之屬雜記大夫弔之雖緦必稽顙小記小歛大歛啓皆辯拜嫌當事来者終不拜故明之也此既事皆拜雜記大夫弔以下大歛章通用乃奠祝與執事為之舉者盥右執七卻之左執俎横攝之入阼階前西面錯錯俎北面舉者盥出門舉鼎者右人以右手執七左人以左手執俎因其便也攝持也西面錯錯鼎于此冝西面錯俎北面俎宜西順之右人左執匕抽扄予左手兼執之取鼏委于鼎北加扄不坐抽扄取鼏加扄于鼏上皆右手今文扄為鉉古文予為于鼏為宻乃朼載兩髀于兩端兩肩亞兩胉亞脊肺在于中皆覆進柢執而俟乃朼以朼次出牲體右人也載受而載于俎左人也亞次也凡七體皆覆為塵柢本也進本者未異于生也骨有本末古文朼為匕髀為脾今文胉為廹柢皆為胝夏祝及執事盥執醴先酒脯醢俎從升自阼階丈夫踊甸人徹鼎巾待于阼階下執事者諸執奠事者巾功布也執者不升已不設祝既錯醴将受之奠于尸東執醴酒北面西上執醴酒者先升尊也立而俟後錯要成也豆錯俎錯于豆東立于俎北西上醴酒錯于豆南祝受巾巾之由足降自西階婦人踊奠者由重南東丈夫踊巾之為塵也東反其位賔出主人拜送于門外廟門外也乃代哭不以官代更也孝子始有親喪悲哀憔悴禮防其以死傷生使之更哭不絶聲而已入君以官尊卑士賤以親踈為之三日之後哭無時周禮挈壺氏凡喪縣壺以代哭右小歛奠記小歛之奠子㳺曰于東方曾子曰于西方歛斯席矣曾子以俗説非又大歛奠于堂乃有席小歛之奠在西方魯禮之末失也末世失禮之為檀弓士代哭不以官詳見喪大記有襚者則将命擯者出請入告主人待于位喪禮畧于威儀既小歛擯者乃用辭出請之辭曰孤某使某請事擯者出告須以賔入須亦待也出告之辭曰孤某須矣賔入中庭北面致命主人拜稽顙賔升自西階出于足西面委衣如于室禮降出主人出拜送朋友親襚如初儀西階東北面哭踊三降主人不踊朋友既委衣又還哭于西階上不背主人襚者以褶則必有裳執衣如初徹衣者亦如之升降自西階以東帛為褶無絮雖複與禪同有裳乃成稱不用表也以東藏以待事也古文褶為襲右有襚者宵為燎于中庭宵夜也燎大燋右設燎記士堂上一燭下一燭詳見喪大記厥明滅燎陳衣于房南領西上綪絞紟衾二君襚祭服散衣庶襚凡三十稱紟不在算不必盡用紟單被也衾二者始死歛衾今又復制也小歛衣數自天子逹大歛則異矣喪大記曰大歛布絞縮者三横者五東方之饌兩瓦甒其實醴酒角觶木柶毼豆兩其實葵菹芋蠃醢兩籩無縢布巾其實栗不擇脯四脡此饌但言東方則亦在東堂下也毼白也齊人或名全菹為芋縢縁也詩云竹柲緄縢布巾籩巾也籩豆具而有巾盛之也特牲饋食禮有籩巾今文蠃為蜗古文謄為甸奠席在饌北歛席在其東大歛奠而有席彌神之掘肂見衽肂埋棺之坎也掘之于西階上衽小要也喪大記曰君殯用楯攅至于上畢塗屋大夫殯以幬攅置于西序塗不暨于棺士殯見衽塗上幃之又曰君盖用漆三衽三束大夫盖用漆二衽二束士盖不用漆二衽二束棺入主人不哭升棺用軸盖在下軸輁軸也輁状如牀軸其輪輓而行熬黍稷各二筐有魚腊饌于西坫南熬所以惑蚍蜉令不至棺旁也為舉者設盆盥于西陳三鼎于門外北上豚合升魚鱄鮒九腊左胖髀不升其他皆如初合升合左右體升于鼎其他皆如初謂豚體及匕俎之陳如小歛時合升四鬄亦相互耳右陳大歛衣奠及殯具記生與来日死與徃日與猶数也生數来日謂成服杖以死明日數也死數徃日謂殯歛以死日數也此士禮貶于大夫者大夫以上皆以来日數士喪禮曰死日而襲厥明而小歛又厥明大歛而殯則死三日而更言三日成服杖似異日矣喪大記曰士之喪二日而殯三日之朝主人杖二者相推其然明矣曲禮大歛於阼士以葦席詳見喪大記大歛布絞縮者三横者五布紟二衾君大夫士一也士陳衣于序東三十稱西領南上絞紟如朝服絞一幅為三不辟紟五幅無紞大歛君大夫士祭服無算君褶衣褶衾大夫士猶小歛也同上士棺六寸裹棺不緑盖不用緑二衽二束同上后木曰喪吾聞諸縣子曰夫喪不可不深長思也后木魯孝公子恵伯鞏之後買棺外内易我死則亦然此孝子之事非所托檀弓有虞氏瓦棺始不用薪也有虞氏尚陶夏后氏堲周火熟曰堲燒土冶以周于棺也或謂之土周田是也弟子職曰右手折堲殷人棺椁椁大也以木為之言椁大于棺也殷人上梓周人牆置翣翣栁衣也凡此言後王之制文周人以殷人之棺椁葬長殤以夏后氏之堲周葬中殤下殤以有虞氏之瓦棺葬無服之殤畧未成人同上孔子初仕為中都宰中都魯邑制為飬生送死之節為四寸之棺五寸之椁因丘陵為墳不封不聚土以起墳不樹不樹松栢行之一年而西方之諸侯則焉魯國在東方故西方諸侯皆法則家語案陳小歛衣章𫀆必有表陳衣取衣絞衾死而後制棜酒醴籩豆喪不剥奠批以桑奠以素噐凡六條並此章通用當互考燭俟于饌東燭燋也饌東方之饌有燭者堂雖明室有闇大在地曰燎執之曰燭祝徹盥于門外入升自阼階丈夫踊祝徹祝與有司當徹小歛之奠者小歛設盥于饌東有巾大歛設盥于門外彌有威儀祝徹巾授執事者以待授執巾者于尸東使先待于阼階下為大歛奠又将巾之祝還徹醴也徹饌先取醴酒北面北面立相待俱降其餘取先設者出于足降自西階婦人踊設于序西南當西榮如設于堂為求神于庭孝子不忍使其親湏臾無所憑依也堂謂尸東也凡奠設于序西南者畢事而去之醴酒位如初執事豆北南面東上如初者如其醴酒北面西上也執醴尊不為便事變位乃適饌東方之新饌帷堂徹事畢右徹小歛奠帷堂婦人尸西東面主人及親者升自西階出于足西面袒袒大歛變也不言髽免髺髮小歛以來自若矣士盥位如初亦既盥並立西階下布席如初亦下莞上簟鋪于阼階上于楹間為少南商祝布絞紟衾衣美者在外君禭不倒至此乃用君禭主人先自盡有大夫則告後来者則告以方歛非歛時則當降拜之士舉遷尸復位主人踊無算卒歛徹帷主人馮如初主婦亦如之右大歛記大歛于阼未忍便離主人位也主人奉尸歛于棺則西階上賔之記本經士之喪将大歛君不在其餘禮猶大夫也詳見喪大記大夫升自西階階東北面東上視歛既馮尸大夫逆降復位中庭西面位氏本經記條案小歛章夏后尚黒一及凡歛者袒至君不撫僕妾又奉尸夷于堂章大夫弔當事而至則辭皆此章通用當互考主人奉尸歛于棺踊如初乃盖棺在肂中歛尸焉所謂殯也檀弓曰殯于客位主人降拜大夫之後至此北面視肂北面于西階東衆主人復位婦人東復位阼階上下之位設熬旁一筐乃塗踊無算以木覆棺上而塗之為火備卒塗祝取銘置于肂主人復位踊襲為銘設柎樹之肂東右殯記死三日而殯詳見卒哭祔練祥禫記士庶人三日而殯王制士殯見衽塗上帷之熬二種四筐加魚腊焉詳見喪大記君于士有賜帟帟幕之小者所以承塵賜之則張于殯上大夫以上幕人職供焉檀弓既殯主人說髦既殯置銘于肂復位時也今文説皆作税兒生三月翦髪為鬌男角女覊否則男左女右長大猶為飾存之謂之髦所以順父母㓜小之心至此尸柩不見喪無飾可以去之髦之形象未聞本經記親沒不髦去為子之飾玉藻乃奠燭升自阼階祝執巾席從設于奥東面執燭者先升堂照室自是不復奠于尸祝執巾與執席者從入為安神位室中西南隅謂之奥執燭南面巾委于席右祝反降及執事執饌東方之饌士盥舉鼎入西面北上如初載魚左首進鬐三列腊進柢如初如小歛舉鼎執匕俎扃鼏朼載之儀魚左首設而在南鬐脊也左首進鬐亦未異于生也凡未異于生者不致死也古文首為手鬐為耆祝執醴如初酒豆籩俎從升自阼階丈夫踊甸人徹鼎如初祝先升奠由楹内入于室醴酒北面亦如初設豆右菹菹南栗栗東脯豚當豆魚次腊特于俎北醴酒在籩南巾如初右菹菹在醢南也此左右之異于魚者載者統于執設者統于席醴當栗南酒當脯南既錯者出立于户西西上祝後闔户先由楹西降自西階婦人踊奠者由重南東丈夫踊為神馮依之也賔出婦人踊主人拜送于門外入及兄弟北面哭殯兄弟出主人拜送于門外小功已下至此可以歸異門大功亦存焉衆主人出門哭止皆西面于東方闔門右大歛奠記巾奠執燭者㓕燭出降自阼階由主人之北東巾奠而室事已本經記曽子問曰大功之喪可以與於饋奠之事乎饋奠在殯時也孔子曰豈大功耳自斬衰以下皆可禮也曽子曰不以輕服而重相為乎怪以重服而為人執事孔子曰非此之謂也非謂為人謂于其所為服也天子諸侯之喪斬衰者奠為君服者皆斬衰唯主人不奠大夫齊衰者奠服斬衰者不奠辟正君也齊衰者其兄弟士則朋友奠不足則取大功以下者不足則反之服齊衰者不奠辟大夫也言不足者謂殷奠時通曽子問朔月奠等用主人揖就次次謂斬衰倚廬齊衰堊室也大功有帷帳小功緦麻有牀笫可也右喪次記居倚廬倚牀為廬在中門外東方北户寝苫枕塊苫編藁塊堛也不說絰帶衰戚不在於安哭晝夜無時哀至則哭非必朝夕非喪事不言不㤀所以為親歠粥朝一溢米夕一溢米不食菜果不在于飽與滋味粥麋也二十兩曰溢為米一升二十四合升之一實在木曰果在地曰蓏記本經記别凡䘮次居處之節它所見者見喪通禮居處章君有賜焉則視歛既布衣君至賜恩恵也歛大歛君視大歛皮弁服襲裘主人成服之後往則錫衰主人出迎于外門外見馬首不哭還入門右北面及衆主人袒不哭厭于君不敢伸其私恩巫止于廟門外祝代之小臣二人執戈先二人後小臣掌正君之法儀者周禮男巫王弔則與祝前喪祝王弔則與巫前檀弓曰君臨臣喪以巫祝桃茢執戈以惡之所以異于生也皆天子之禮諸侯臨臣之喪則使祝代巫執茢居前下天子也小臣君行則在前後君升則侠阼階北面凡宫有鬼神曰廟君釋采入門主人辟釋采者祝為君禮門神也必禮門神者明君無故不来也禮運曰諸侯非問疾弔喪而入諸臣之家是謂君臣為謔君升自阼階西鄉祝負墉南面主人中庭祝南面房中東鄉君牆謂之墉主人中庭進益北君哭主人哭拜稽顙成踊出出不敢必君之卒歛事君命反行事主人復位大歛事君升主人主人西楹東北面命主人使之升升公卿大夫繼主人東上乃歛公大國之孤四命也春秋傳曰吾公在壑谷卒公卿大夫逆降復位主人降出逆降者後升者先降位如朝夕哭弔之位君反主人主人中庭君坐撫當心主人拜稽顙成踊出撫手案之凡馮尸興必踊今文無成君反之復初位衆主人辟于東壁南面以君将降也南面則當坫之東君降西鄉命主人馮尸主人升自西階由足西面馮尸不當君所踊主婦東面馮亦如之君必降者欲孝子盡其情奉尸歛于棺乃盖主人降出君反之入門左視塗肂在西階上入門左由便趨疾不敢久㽞君君升即位衆主人復位卒塗主人出君命之反奠入門右亦復中庭位乃奠升自西階以君在阼君要節而踊主人從踊節謂執奠始升階及既奠由重南東時也卒奠主人出哭者止以君将出不敢讙嚻聒尊者也君出門廟中哭主人不哭辟君式之辟逡遁辟位也古者立乗式謂小俛以禮主人也曲禮曰立視五嶲式視馬尾二車畢乘主人哭拜送二車副車也其數各視其命之等君出使異姓之士乘之在後君弔盖乘象路曲禮曰乘君之乘車不敢曠左左必式襲人即位衆主人襲拜大夫之後至者成踊後至布衣而後來者賔出主人拜送自賔出以下如君不在之儀右君視歛記君于士既殯而徃為之賜大歛焉詳見喪大記君視歛若不待奠加盖而出不視歛則加盖而至卒事為有他故及辟忌也本經記大夫士若君不戒而徃不具殷奠君退必奠詳見喪大記三日成服杖既殯之明日全三日始歠粥矣曲禮曰生與来日右成服記生與来日詳見上陳大歛章三日絞垂成服日絞要絰之散垂者冠六升外縪纓條属厭縪謂縫著于武也外之者外其餘也纓條属者通屈一條䋲為武垂下為纓属之冠厭伏也衰三升衣與裳也屨外納納収餘也杖下本竹桐一也順其性也本經記拜君命及衆賔不拜棺中之賜禮尊者加恵明日必徃拜謝之棺中之賜不施已也右拜君命及賔記主人乗惡車拜君命拜衆賔及有故行所乗也雜記曰端衰喪車皆無等然則此惡車王喪之木車也古文惡作堊白狗幦未成豪狗幦覆笭也以狗皮為之取其臑也白于喪飾冝古文幦為幂蒲蔽蔽藩御以蒲菆不在于驅馳蒲菆牡蒲莖也古文菆作騶犬服笭間兵服以犬皮為之取堅也亦白木錧取少聲今文錧為鎋約綏約轡約䋲綏所以引升車木鑣亦取少聲古文鑣為苞馬不齊髦齊翦也今文髦為毛主人之惡車如王之木車則齊衰以下其乘素車繅車駹車漆車與主婦之車亦如之疏布裧裧者車裳幃于蓋弓垂之貳車白狗攝服貳副也攝猶縁也狗皮緑服差飾其他皆如乘車如所乗惡車記本經端衰喪車皆無等詳見喪服制度喪公弔之必有拜者徃謝之雖朋友州里舍人可也謂無主後檀弓朝夕哭不辟子夘既殯之後朝夕及哀至乃哭不代哭也子夘桀紂亡日凶事不辟吉事闕焉婦人即位于堂南上哭丈夫即位于門外西面北上外兄弟在其南南上賔繼之北上門東北面西上門西北面東上西方東面北上主人即位辟門外兄弟異姓有服者也辟開也凡廟門有事則開無事則閉婦人拊心不哭方有事止讙囂主人拜賔旁三右還入門哭婦人踊先西面拜乃南面拜東面拜也主人堂下直東序西面兄弟皆即位如外位卿大夫在主人之南諸公門東少進他國之異爵者門西少進敵則先拜他國之賔凡異爵者拜諸其位賔皆即此位乃哭盡哀止主人乃右還拜之如外位矣兄弟齊哀大功者主人哭則哭小功緦麻亦即位乃哭上言賔此言卿大夫明其亦賔爾少進前于列異爵卿大夫也他國卿大夫亦前于列尊之拜諸其位就其位特拜右朝夕哭記朝夕哭不帷縁孝子之心欲見殯肂也既出則施其廬鬼神尚幽闇也雜記帷殯非古也自敬姜之哭穆伯始也穆伯魯大夫季悼子之子公甫靖也敬姜穆伯之妻文伯歜之母也禮朝夕哭不帷檀弓徹者盥于門外燭先入升自阼階丈夫踊徹者徹大歛之宿奠祝取醴北面取酒立于其東取豆籩俎南面西上祝先出酒豆籩俎序從降自西階婦人踊序次也設于序西南直西榮醴酒北面西上豆西面錯立于豆北南面籩俎既錯立于執豆之西東上酒錯復位醴錯于西遂先由主人之北適饌遂先者明祝不復位也適饌適新饌将復奠右徹大歛奠乃奠醴酒脯醢升丈夫踊入如初設不巾入入于室也如初設者豆先次籩次酒次醴也不巾無菹無栗也菹栗具則有俎有俎乃巾之錯者出立于户西西上㓕燭出祝闔户先降自西階婦人踊奠者由重南東丈夫踊賔出婦人踊主人拜送哭止乃奠奠則禮畢矣今文無拜衆主人出婦人踊出門哭止皆復位闔門主人卒拜送賔揖衆主人乃就次右朝夕奠記朝奠日出夕奠逮日隂陽之交庶㡬遇之檀弓朔月奠用特豚魚腊陳三鼎如初東方之饌亦如之朔月月朔日也自大夫以上月半又奠如初者謂大歛時無籩有黍稷用瓦敦有盖當籩位黍稷併于甒北也于是始有黍稷死者之于朔月月半猶平常之朝夕大祥之後則四時祭焉主人拜賔如朝夕哭卒徹徹宿奠也舉鼎入升皆如初奠之儀卒朼釋匕于鼎俎行朼者逆出甸人徹鼎其序醴酒菹醢黍稷俎俎行者俎後執執俎者行鼎可以出其序升入之次其設于室豆錯俎錯腊特黍稷當籩位敦啟㑹郤諸其南醴酒位如初當籩位俎南黍黍東稷㑹盖也今文無敦祝與執豆者巾乃出共為之也主人要節而踊皆如朝夕哭之儀月半不殷奠殷盛也士月半不復如朔盛奠下尊者有薦新如朔奠薦五穀若時果物新出者徹朔奠先取醴酒其餘取先設者敦啟㑹面足序出如入啟㑹徹時不復盖也面足執之令足間鄉前也敦有足則敦之形如今酒敦其設于外如于室外序西南右朔月奠薦新記朔月童子執帚郤之左手奉之童子隷子弟若内䜿寺人之屬執用左手郤之示未用從徹者而入童子不専禮事比奠舉席埽室聚諸窔布席如初卒奠埽者執帚垂末内鬛從執燭者而東比猶先也室東南隅謂之窔燕飬饋羞湯沐之饌如他日燕養平常所用供養也饋朝夕食也羞四時之珍異湯沐所以洗去汙垢内則曰三日具沐五日具浴孝子不忍一日廢其事親之禮于下室日設之如生存也進徹之時如其頃朔月若薦新則不饋于下室以其殷奠有黍稷也下室如今之内堂正寝聽朝事本經記有薦新如朔奠重新物謂之殷奠奠檀弓器陳小歛章喪不剥奠枇畢用桑以素大歛奠章曽子問條當互考筮宅冡人營之宅葬居也冢人有司掌墓地兆域者營猶度也詩云經之營之掘四隅外其壤掘中南其壤為葬将北首故也既朝哭主人皆徃兆南北面免絰兆域也新營之處免絰者求吉不敢純凶命筮者在主人之右命尊者冝由右出也少儀曰賛幣自左詔辭自右筮者東面抽上韇兼執之南面受命韇藏䇲之器也兼與䇲執之今文無兼命曰哀子某為其父某甫筮宅度兹幽宅兆基無有後艱某甫某字也若言山甫孔甫矣宅居也度謀也兹此也基始也言為其父筮葬居今謀此以為幽冥居北域之始得無後将有艱難乎艱難謂有非常若崩壊也孝經曰卜其宅兆而安厝之古文無兆基作期筮人許諾不述命右還北面指中封而筮卦者在左述循也既受命而申言之曰述不述者士禮畧凡筮因㑹命筮為述命中封中央壤也卦者識爻卦畫地者古文述皆作術卒筮執卦以示命筮者命筮者受視反之東面旅占卒進告于命筮者與主人占之曰從卒筮卦者冩卦示主人乃受而執之旅衆也反與其屬共占之謂掌連山歸藏周易者从猶吉也主人絰哭不踊若不從筮擇如初儀更擇地而筮之歸殯前北面哭不踊易位而哭明非常右筮宅記筮宅冢人物土物猶相也相其地可葬者乃營之本經記如筮則史練冠長衣以筮占者朝服筮者筮宅也長衣深衣之純以素也長衣練冠純凶服也朝服純吉服也大夫士日朝服以朝也雜記祔葬者不筮宅宅葬地也前人葬既筮之小記大司徒以本俗六安萬民二曰族墳墓族猶類也同宗者生相近死相廹地官墓地不請受于公民不得私也請求也王制既井椁主人西面拜工左還椁反位哭不踊婦人哭于堂既已也匠人為椁刋治其材以井構于殯門外也反位拜位也既哭之則徃施之竁中矣主人還椁亦以既朝哭矣右井椁記既殯甸而布材與明噐木工宜乾腊且豫成材椁材也檀弓士雜木椁棺椁之間容甒不虞筐詳見喪大記有子問于曽子曰問喪于夫子乎有子孔子弟子有若也夫子卒後問此庶有異聞也喪謂仕失位也魯昭公孫于齊曰喪人其何稱曰聞之矣喪欲速貧死欲速朽有子曰是非君子之言也貧朽非人所欲曾子曰參也聞諸夫子也有子又曰是非君子之言也曽子曰参也與子㳺聞之有子曰然然則夫子有為言之也曽子以斯言告于子游子游曰甚哉有子之言似夫子也昔者夫子居于宋見桓司馬自為石椁三年而不成桓司馬宋向戌之孫向魋夫子曰若是其靡也靡侈也死不如速朽之愈也死之欲速朽為桓司馬言之也南宫敬叔反必載寳而朝敬叔魯孟僖子之子仲孫閲盖甞失位去魯得反載其寶来朝于君夫子曰若是其貨也喪不如速貧之愈也喪之欲速貧為敬叔言之也曽子以子游之言告于有子有子曰然吾固曰非夫子之言也曽子曰子何以知之有子曰夫子制于于中都四寸之棺五寸之椁以斯知不欲速朽也中都魯邑也孔子甞為之宰為民作制孔子由中都宰為司空由司空為司冦昔者夫子失魯司冦将之荆将應聘于楚盖先之以子夏又申之以冉有以斯知不欲速貧也言汲汲於仕得禄檀弓顔淵死顔路請子之車以為之椁子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可徒行也胡氏曰孔子遇舊館人之喪曽脱驂以賻之矣今乃不許顔路之請何也葬可以無棺驂可以脱而復求大夫不可以徒行命車不可以與人而鬻諸市也且為所識窮乏者得我而勉强以副其意豈誠心與直道哉論語獻材于殯門外西面北上綪主人徧視之如哭椁獻素獻成亦如之材明器之材視之亦拜工左還形法定為素飾治畢為成右獻明噐記既殯旬而布材與明器詳見上章竹不成用瓦不成味木不成斵琴瑟張而不平竽笙備而不和有鐘磬而無簨簴詳見喪禮義夏后氏用明噐殷人用祭器周人兼用之同上卜日既朝哭皆復外位卜人先奠龜于西塾上南首有席楚焞置于燋在龜東楚荆也荆焞所以鑚灼龜者燋炬也所以燃火者也周禮菙氏掌共燋挈以待卜事凡卜以明火爇燋遂灼其焌契以授卜師遂以役之族長涖卜及宗人吉服立于門西東面南上占者三人在其南北上卜人及執燋席者在塾西族長有司掌族人親疏者也涖臨也吉服服𤣥端也占者三人掌玉兆瓦兆原兆者也在塾西者南面東上闔東扉主婦立于其内扉門扉也席于闑西閾外為卜者也古文闑作𣙗閾作蹙宗人告事具主人北面免絰左擁之涖卜即位于門東西面涖卜族長也更西面當代主人命卜卜人抱龜燋先奠龜西首燋在北既奠燋又執龜以待之宗人受卜人龜示髙以龜腹甲髙起所當灼處示涖卜也涖卜受視反之宗人還少退受命受涖卜命授龜冝近受命冝郤也命曰哀子某来日卜葬某父某甫考降無有近悔考登也降下也言卜此日葬魂神上下得無近于咎悔者乎許諾不述命還即席西面坐命龜興授卜人龜負東扉宗人不述命亦士禮畧凡卜述命命龜異龜重威儀多也負東扉俟龜之兆也卜人坐作龜興作猶灼也周禮卜人凡卜事示髙揚火以作龜致其墨興起也宗人受龜示涖卜涖卜受視反之宗人退東面乃旅占卒不釋龜告于涖卜與主人占曰某日從不釋龜復執之也古文曰為日授卜人龜告于主婦主婦哭不執龜者下主人也告于異爵使人告于衆賔衆賔僚友不来者也卜人徹龜宗人告事畢主人絰入哭如筮宅賔出拜送若不從卜擇如初儀右卜葬日記大夫士庶人三月而葬王制凡卜筮日旬之外曰逺某日喪事先逺日喪事葬與練祥也曲禮祝稱卜葬虞子孫曰哀夫曰乃兄弟曰某卜葬其兄弟曰伯子某祝稱卜葬虞者卜葬卜虞祝稱主人之辭也孫謂為祖後者稱曰哀孫某卜葬其祖某甫夫曰乃某卜葬其妻某氏兄弟相為卜稱名而已雜記卜日吉告從于主婦主婦哭主婦升堂哭者皆止事畢本經記禮書綱目卷二十三
