body:
  text: 禮書綱目卷六十六婺源江永撰學制通禮十五補有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊皆學名也異者四代相變耳或上西或上東或貴在國或貴在郊上庠右學大學也在西郊下庠左學小學也在國中王宫之東東序東膠亦大學在國中王宫之東西序虞庠亦小學也在西郊膠之言糾也庠之言養也周之小學為有虞氏之庠制是以名庠云其立鄉學亦如之膠或作絿王制天子設四學四學謂周四郊之虞庠也祭義夏曰校殷曰序周曰庠學則三代共之詳見學記天子命之教然後為學小學在公宫南之左大學在郊學所以學士之宫尚書傳曰百里之國二十里之郊七十里之國九里之郊五十里之國三里之郊此小學大學殷之制天子曰辟雍諸侯曰頖宫尊卑學異名辟明也雍和也所以明和天下頖之言班也所以班政教也朱子曰辟與璧同雍和也天子之學水旋丘如璧故謂之辟雍頖亦作泮諸侯之學東西南方有水形如半璧以其半於辟雍故曰泮宫詩曰鎬京辟雍記曰泮宫周學也王制米廩有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也庠序亦學也庠之言詳也於以考禮詳事也魯謂之米廩虞帝上孝今藏粢盛之委焉序次王事也瞽宗樂師瞽矇之所宗也古者有道德者使教焉死則以為樂祖于此祭之頖之言班也于以班政教也明堂位古之教者家有孰黨有庠術有序國有學詳見學記右設學學禮曰帝入東學上親而貴仁則親疏有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴德則聖智在位而功不匱矣帝入北學上貴而尊爵則貴賤有等而下不踰矣成王年十五亦入諸學觀禮布政四學者東序瞽宗虞庠及四郊之學也春氣溫養故上親夏物盛小大殊故上齒秋物成實故貴德冬時物藏於地唯象於天半見也故尚爵帝入太學承師問道退習而考於太傅太傅罰其不則而逹其不及則法也則德智長而治道得矣此五學者既成於上則百姓黎民化輯於下矣大戴禮於論鼓鐘於樂辟雍辟璧通雍澤也辟雍天子之學大射行禮之處也水旋丘如璧以節觀者故曰辟雍大雅靈臺鎬京辟雍自西自東自南自北無思不服鎬京武王所營也張子曰靈臺辟雍文王之學也鎬京辟雍武王之學也至此始為天子之學也此言武王徙居鎬京講學行禮而天下自服也王大雅文有聲思樂泮水薄采其芹魯侯戾止言觀其旗泮水泮宫之水也諸侯之學鄉射之宫謂之泮宫其東西南方有水形如半璧以其半於辟雍故曰泮水而宫亦以名也既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚矯矯武貌馘所割者之左耳也淑善也問訊囚也囚所虜獲者蓋古者出兵受成於學及其反也釋奠於學而以訊囚告故詩人因魯侯在泮而願其有是功也魯頌泮水天子立辟雍何所以行禮樂宣德化也辟者璧也象璧圓又以法天於雍水側象教化流行也諸侯曰泮宫者半於天子宫也明尊卑有差所以少也半者象璜也獨南面禮儀之方有水耳明不得化四方也鄉曰庠里曰序庠者庠禮義也序者序長幼也白虎通鄭人遊于鄉校鄉之學校以論執政論其得失然明謂子産曰毁鄉校如何患人於中謗議國政子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之襄三十一年左氏傳帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和胄長也自天子至卿大夫之適子也栗莊敬也上二無字與毋同凡人直者必不足於溫故欲其溫寬者必不足於栗故欲其栗所以慮其偏而輔翼之也剛者必至於虐故欲其無虐簡者必至於傲故欲其無傲所以防其過而戒禁之也教胄子者欲其如此而其所以教之之具則又專在於樂如周禮大司樂掌成均之法以教國子弟而孔子亦曰興於詩成於樂蓋所以蕩滌邪穢斟酌飽滿動蕩血脈流通精神養其中和之德而救其氣質之偏者也舜典朴作教刑夏楚二物學校之刑也同上使公卿之大子大夫元士之適子十有三年始入小學見小節焉踐小義焉二十入大學見大節焉踐大義焉故入小學知父子之道長幼之序入大學知君臣之義上下之位故為君則君為臣則臣為父則父為子則子尚書大傳師氏以三德教國子一曰至德以為道本二曰敏德以為行本三曰孝德以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長德行內外之稱在心為德施之為行至德中和之德覆燾持載含容者也孔子曰中庸之為德其至矣乎敏德仁義順時者也説命曰敬孫務時敏厥修乃來孝德尊祖愛親守其所以生者也孝在三德之下三行之上德有廣於孝而行莫尊焉國子公卿大夫之子弟師氏教之而世子亦齒焉學君臣父子長幼之道朱子曰至德者誠意正心端本清原之事道則天人性命之理事物當然之則修身齊家治國平天下之術也敏德者強志力行蓄德廣業之事行則理之所當為日可見之迹也孝德者尊祖愛親不忘其所由生之事知逆惡則以得於己者篤實深固有以真知彼之逆惡而自不忍為者也居虎門之左司王朝虎門路寢門也王日視朝於路寢門外畫虎焉以明勇猛於守宜也司猶察也察王之視朝若有善道可行者則當前以詔王掌國中失之事以教國子弟教之者使識舊事也中中禮者也失失禮者也故書中為得杜子春云當為得記君得失若春秋是也凡國之貴遊子弟學焉貴遊子弟王公之子弟遊無官師者地官保氏養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賔客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容養國子以道者以師氏之德行審諭之而後教之以藝儀也五禮吉凶賔軍嘉也六樂雲門大咸大韶大夏大濩大武也鄭司農云五射白矢參連剡注襄尺井儀也五馭鳴和鸞逐水曲過君表舞交衢逐禽左六書象形會意轉注處事假借諧聲也九數方田粟米差分少廣商功均輸方程贏不足旁要今有重差夕桀句股也玄謂祭祀之容齊齊皇皇賔客之容穆穆皇皇朝廷之容濟濟翔翔喪紀之容纍纍顛顛軍旅之容暨暨詻詻車馬之容匪匪翼翼同上大司樂掌成均之法以治建國之學政而合國之子弟焉鄭司農云均調也樂師主調其音大司樂主受此成事已調之樂玄謂董仲舒云成均五帝之學成均之法者其遺禮可法也國之子弟公卿大夫之子弟當學者謂之國子文王世子曰於成均以及取爵於上尊則周人立此學之宫凡有道者有德者使教焉死則以為樂祖祭於瞽宗道多才藝者德能躬行者若舜命夔典樂教胄子是也死則以為樂之祖神而祭之鄭司農云瞽樂人樂人所共宗也或曰祭於瞽宗祭於廟中明堂位曰瞽宗殷學也泮宫周學也以此觀之祭於學宫中以樂德教國子中和祗庸孝友中猶忠也和剛柔適也祗敬庸有常也善父母曰孝善兄弟曰友以樂語教國子興道諷誦言語興者以物喻事道讀曰導導者言古以剴今也倍文曰諷以聲節之曰誦發端曰言答述曰語以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武此周所存六代之樂黃帝曰雲門大卷黃帝能成名萬物以明民共財言其德如雲之所出民得以有族類大咸咸池堯樂也堯能殫均刑法以儀民言其德無所不施大㲈舜樂也言其德能紹堯之道也大夏禹樂也禹治水敷土言其德能大中國也大濩湯樂也湯以寬治民而除其邪言其德能使天下得其所也大武武王樂也武王伐紂以除其害言其德能成武功樂師掌國學之政以教國子小舞謂以年幼少時教之舞內則曰十三舞勺成童舞象二十舞大夏大胥掌學士之版以待致諸子鄭司農云學士謂卿大夫諸子學舞者版籍也今時鄉戶籍世謂之户版大胥主此籍以待當召聚學舞者卿大夫之諸子則案此籍以召之漢大樂律曰卑者之子不得舞宗廟之酎除吏二千石到六百石及關內侯到五大夫子先取適子高七尺已上年二十到年三十顔色和順身體修治者以為舞人與古用卿大夫子同義春入學合采合舞春始以學士入學宫而學之合舞等其進退使應節奏鄭司農云采謂舞者皆持芬香之采或曰古者士見於君以雉為摯見於師以菜為摯菜直謂疏食菜羮之菜月令仲春之月上丁命樂正習舞釋采仲丁又命樂正入學習樂玄謂舍即釋也采讀為菜始入學必釋菜禮先師也菜蘋藻之屬秋頒樂合聲春使入學秋頒其才藝所為合聲亦等其曲折使應節奏小胥掌學士之徴令而比之觥其不敬者比猶校也不敬謂慢期不時至也觥罰爵也詩云兕觥其觩巡舞列而撻其怠慢者撻猶抶也抶以荆撲籥師掌教國子舞羽吹籥文舞有持羽吹籥者所謂籥舞也文王世子曰秋冬學羽籥詩云左手執籥右手秉翟並春官凡學世子及學士必時四時各有宜學士謂司徒論俊選所升於學者春夏學干戈秋冬學羽籥皆於東序干盾也戈勾子戟也干戈萬舞象武也用動作之時學之籥舞象文也用安靜之時學之詩云左手執籥右手秉翟小樂正學干大胥贊之籥師學戈籥師丞贊之四人皆樂官之屬也通職秋冬亦學以羽籥小樂正樂師也周禮樂師掌國學之政教國子小舞大胥掌學士之版春入學舍菜合舞秋頒學合聲籥師掌教國子舞羽吹籥胥鼓南南南夷之樂也胥掌以六樂之會正舞位旄人教夷樂則以鼓節之詩云以雅以南以籥不僭春誦夏弦大師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠誦謂歌樂也弦謂以絲播詩陽用事則學之以聲隂用事則學之以事因時順氣於功易成也立三代之學學書於有虞氏之學典謨之教所興也學舞於夏后氏之學文武中也學禮樂於殷之學功成治定與已同也凡祭與養老乞言合語之禮皆小樂正詔之於東序學以三者之威儀也養老乞言養老人之賢者因從乞善言可行者也合語謂鄉射鄉飲酒大射燕射之屬也鄉射記曰古者於旅也語大樂正學舞干戚語説命乞言皆大樂正授數學以三者之義也戚斧也語説合語之説也數篇數大司成論説在東序論説課其義之深淺才能優劣此云樂正司業父師司成則大司成司徒之屬師氏也師氏掌以美詔王教國子以三德三行及國中失之事也凡侍坐於大司成者逺近間三席可以問間猶容也容三席則得指畫相分别也席之制廣三尺三寸三分則是所謂亟丈也終則負牆卻就後席相辟列事未盡不問錯尊者之語不敬也文王世子樂正崇四術立四教樂正樂官之長掌國子之教虞書曰夔命汝典樂教胄子崇高也高尚其術以作教也幼者教之於小學長者教之於大學尚書傳曰年十五始入小學十八入大學順先王詩書禮樂以造士順此四術而教以成是士也春秋教以禮樂冬夏教以詩書春夏陽也詩樂者聲聲亦陽也秋冬隂也書禮者事事亦隂也互言之者皆以其術相成王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉皆以四術成之王子王之庶子也羣后公及諸侯凡入學以齒皆以長幼受學不用尊卑王制諸子掌國子之倅掌其禁令與其教治故書倅為卒鄭司農云卒讀如物有副倅之倅國子謂諸侯卿大夫士之子也燕義曰古者周天子之官有庶子官與周官諸子職同文玄謂四民之業而士者亦世焉國子者是公卿大夫士之副二戒令致於大子之事教治修德學道也凡國之政事國子在遊倅使之修德學道春合諸學秋合諸射以考其藝而進退之遊倅倅之未仕者學大學射射宫也王制曰春秋教以禮樂冬夏教以詩書王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉夏官庶子之正於公族者教之以孝弟睦友子愛明父子之義長幼之序詳見五宗都司馬掌都之士庶子庶子卿大夫士之子以國法掌其政學政謂賦稅也學修德學道夏官比年入學中年考校一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通逹強立而不反謂之大成詳見學記將出學小胥大胥小樂正簡不帥教者以告於大樂正大樂正以告於王出學謂九年大成而出也此所簡者謂王太子王子羣后之太子卿大夫元士之適子也大胥小胥皆樂官屬也王命三公九卿大夫元士皆入學不變王親視學亦謂使習禮以化之不變王又親為之臨視重棄賢者子孫此習禮皆於大學也不變王三日不舉去食樂重棄人屏之逺方西方曰棘東方曰寄終身不齒棘當為僰僰之言逼使之逼寄於夷戎不屏於南北謂其大逺王制右國學之教凡始立學者必釋奠于先聖先師及行事必以幣謂天子命之教始立學宫者也先聖周公若孔子凡釋奠者必有合也國無先聖先師則所釋奠者當與鄰國合也有國故則不若唐虞有夔伯夷周有周公魯有孔子則各自奠之不合也世文王子始立學者既興器用幣興當為釁字之誤也禮樂之器成則釁之又用幣告先聖先師以器成然後釋菜告先聖先師以器成有時將用也不舞不授器釋菜禮輕也釋奠則舞舞則授器司馬之屬司兵司戈司盾祭祀授舞者兵也乃退儐于東序一獻無介語可也言乃退者謂得立三代之學者釋菜於虞庠則儐賔於東序魯之學有米廩東序瞽宗也同上大學始教皮辨祭菜詳見學記凡學春官釋奠于其先師秋冬亦如之官謂禮樂詩書之官周禮曰凡有道者有德者使教焉死則以為樂祖祭於瞽宗此之謂先師之類也若漢禮有高堂生樂有制氏詩有毛公書有伏生億可以為之也不言夏夏從春可知也釋奠者設薦饌酌奠而已無迎尸以下之事文王世子大胥春入學舍采合舞詳見上章孟春命樂正入學習舞為仲春將釋菜仲春上丁命樂正習舞釋菜樂正樂官之長也合習舞者順萬物始出地鼓舞也將舞必釋菜於先師以禮之夏小正曰丁亥萬用入學天子乃帥三公九卿諸侯大夫親往視之順時逹物也月令天子視學大昕鼓徴衆至然後天子至乃命有司行事興秩節祭先師先聖焉有司卒事反命始之養也適東序釋奠於先老詳見嘉禮養老出征執有罪反釋奠于學以訊馘告釋菜奠幣禮先師也訊馘所生獲斷耳者詩曰執訊獲醜又曰在頖獻馘馘或為國王制大司樂凡有道者有德者使教焉死則以為樂祖祭於瞽宗詳見上章祀先賢於西學西學周小學也先賢有道德王所使教國子者祭義右釋奠釋菜放勳曰勞之來之匡之直之輔之翼之使自得之又從而振德之放勳本史臣贊堯之辭孟子因以為堯號也德猶惠也堯言勞者勞之來者來之邪者正之枉者直之輔以立之翼以行之使自得其性矣又從而提撕警覺以加惠焉不使其放逸怠惰而或失之蓋命契之辭也孟子帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬親相親睦也五品父子君臣夫婦長幼朋友五者之名位等級也遜順也司徒掌教之官敷布也五教父子有親君臣有義夫婦有别長幼有序朋友有信以五者當然之理而為教令也敬敬其事也聖賢之於事雖無所不敬而此又事之大者故特以敬言之寬裕以待之也蓋五者之理出於人心之本然非有強而後能者自其拘於氣質之偏溺於物欲之蔽始有昧於其理而不相親愛不相遜順者於是因禹之讓又申命契仍為司徒使之敬以敷教而又寬裕以待之使之優柔浸漬以漸而入則其天性之真自然呈露不能自己而無無恥之患矣舜典大宰以九兩繫邦國之民三曰師以賢得民四曰儒以道得民詳見政事上大夫七十而致仕老其鄉里大夫為父師士為少師所謂里庶尹也鄭曰古者仕焉而己者歸教於閭里耰鉏已藏祈樂已入歲事已畢祈樂當為新穀餘子皆入學年十五始入小學見小節踐小義焉年十八始入大學見大節踐大義焉餘子猶衆子也古者適子恆代父而仕也距冬至四十五日始出學傅農事立春學止上老平明坐於右孰庶老坐於左孰餘子畢出然後皆歸夕亦如之上老父師也庶老少師也餘子皆入父之齒隨行兄之齒雁行朋友不相踰輕任并重任分頒白者不提擕出入皆如之尚書大傳公宣十四年羊傳何休注云在邑曰里一里八十戶八家共一巷中里為校室選其耆老有高德者名曰父老十月事訖父老教於校室八歲者學小學十五者學大學乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國教所以親百姓訓五品有虞氏五而周十有二焉擾亦安也言饒衍之大司徒辨五地之物生山林川澤丘陵墳衍原隰詳見制國因此五物者民之常而施十有二教焉一曰以祀禮教敬則民不苟二曰以陽禮教讓則民不爭三曰以隂禮教親則民不怨四曰以樂禮教和則民不乖五曰以儀辨等則民不越六曰以俗教安則民不偷七曰以刑教中則民不暴八曰以誓教恤則民不怠九曰以度教節則民知足十曰以世事教能則民不失職十有一曰以賢制爵則民慎德十有二曰以庸制祿則民興功陽禮謂鄉射飲酒之禮也隂禮謂男女之禮婚姻以時則男不曠女不怨儀謂君南面臣北面父坐子伏之屬俗謂土地所生習也偷謂朝不謀夕恤謂災危相憂民有凶患憂之則民不懈怠度謂宫室車服之制世事士農工商之事少而習焉其心安焉因教以能不易其業慎德謂矜其善德勸為善也庸功也爵以顯賢祿以賞功故書儀或為義杜子春讀為儀謂九儀正月之吉始和布教于邦國都鄙乃縣教象之法于象魏使萬民觀教象挾日而斂之乃施教法于邦國都鄙使之各以教其所治民正月之吉周正月朔日也司徒以布五穀至正歲又書教法而縣焉令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔詳政事上以鄉三物教萬民而賔興之一曰六德知仁聖義忠和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數物猶事也興猶舉也民三事教成鄉大夫舉其賢者能者以飲酒之禮聖賔客之既則獻其書於王矣知明於事仁愛人以及物通而先識義能斷時宜忠言以中心和不剛不柔善於父母為孝善於兄弟為友睦親於九族姻親於外親任信於友道恤振憂貧者禮五禮之義樂六樂之歌舞射五射之法御五御之節書六書之品數九數之計以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不姻之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑糾猶割察也不弟不敬師長造言訛言惑衆亂民亂名改作執左道以亂政也鄭司農云任謂朋友相任恤謂相憂以五禮防萬民之偽而教之中禮所以節止民之侈偽使其行得中鄭司農云五禮謂吉凶軍賔嘉以六樂防萬民之情而教之和樂所以蕩正民之情思使其心應和也鄭司農云六樂謂雲門咸池大韶大夏大濩大武小司徒之職掌建邦之教法與其祭祀飲食喪紀之禁令詳政事上鄉師之職各掌其所治鄉之教而聽其治聽謂平察之鄉大夫之職各掌其鄉之政教禁令正月之吉謂建子之月一日也受教法於司徒退而頒之於其鄉吏使各以教其所治以考其德行察其道藝其鄉吏州長以下州長各掌其州之教治政令之法正月之吉各屬其州之民而讀法以考其德行道藝而勸之以糾其過惡而戒之屬猶合也聚也因聚衆而勸戒之者欲其善若以歲時祭祀州社則屬其民而讀法亦如之春秋以禮會民而射於州序序州黨之學也會民而射所以正其志也射義曰射之為言繹也繹者各繹己之志正歲則讀教法如初雖以正月讀之至正歲猶復讀之因此四時之正重申之黨正各掌其黨之政令教治及四時之孟月吉日則屬民而讀邦法以糾戒之以四孟之月朔日讀法者彌親民者於教亦彌數春秋祭禜亦如之禜謂雩禜水旱之神蓋亦為壇位如祭社稷云國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位一命齒於鄉里再命齒於父族三命而不齒詳見嘉禮嘉事雜記凡其黨之祭祀喪紀昏冠飲酒教其禮事掌其禁戒其黨之民正歲屬民讀法而書其德行道藝書記之族師各掌其族之戒令政事月吉則屬民而讀邦法書其孝弟睦姻有學者月吉每月朔日也故書上句或無事字杜子春云當為正月吉書亦或為戒令政事月吉則屬民而讀邦法春秋祭酺亦如之酺者為人物災害之神也故書酺或為步杜子春云當為酺玄謂校人職又有冬祭焉步則未知此世所云蝝螟之酺與人鬼之步與蓋亦為壇位如雩禜云族長無飲酒之禮因祭酺而與其民以長幼相獻酬焉閭胥凡春秋之祭祀役政喪紀之數聚衆庶既比則讀法書其敬敏任恤者祭祀謂州社黨禜族酺也役田役也政若州社黨飲酒也喪紀大喪之事也四者及比皆會聚衆民因以讀法以敕戒之故書既為暨杜子春讀政為征暨為既凡事掌其比觥撻罰之事觥撻者失禮之罰也觥用酒其爵兕角為之撻撲也比長各掌其比之治五家相受相和親有罪竒邪則相及邪猶惡也司諫掌糾萬民之德而勸之朋友正其行而強之道藝巡問而觀察之以時書其德行道藝朋友相切磋以善道也強猶勸也學記曰強而弗抑則易巡問行問民間也司救掌萬民之邪惡過失而誅讓之以禮防禁而救之邪惡謂侮慢長老語言無忌而未麗于罪者過失亦由邪惡酗醟好訟若抽拔兵器誤以行傷害人麗于罪者誅誅責也古者重刑且責怒之未即罪也並地官司徒修六禮以節民性明七教以興民德齊八政以防淫一道德以同俗養耆老以致孝恤孤獨以逮不足上賢以崇德簡不肖以絀惡司徒地官卿掌邦教者逮及也簡差擇也六禮冠昏喪祭鄉相見鄉鄉飲酒鄉射七教父子兄弟夫婦君臣長幼朋友賔客八政飲食衣服事為異别度量數制飲食為上衣服次之事為謂百工技藝也異别五方用器不同也度丈尺也量斗斛也數百十也制布帛幅廣狹也命鄉簡不帥教者以告帥循也不循者謂敖狠不孝弟者司徒使鄉簡擇以告者鄉屬司徒耆老皆朝於庠元日習射上宫習鄉上齒大司徒帥國之俊士與執事焉將習禮以化之使之觀焉耆老致仕及鄉中老賢者朝猶會也此庠謂鄉學也鄉謂飲酒也鄉禮春秋射國蠟而飲酒養老不變命國之右鄉簡不帥教者移之左命國之左鄉簡不帥教者移之右如初禮中年考校而又不變使轉徙其居覬其見新人有所化也亦復習禮於鄉學使之觀焉不變移之郊如初禮郊鄉界之外者也稍出逺之後中年又為之習禮於郊學不變移之遂如初禮逺郊之外曰遂遂大夫掌之又中年復移之使居遂又為之習禮於遂學不變屏之逺方終身不齒逺方九州之外齒猶録也並王制右鄉學之教敷納以言明庶以功車服以庸敷納以言而觀其藴明庶以功而考其成旌能命德以厚其報益稷鄉大夫三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之賢者有德行者能者有道藝者衆寡謂鄉人之善能者無多少也鄭司農云興賢者謂若今舉孝廉興者謂若今舉茂才賔敬也敬所舉賢者能者玄謂變舉言興者謂合衆而尊寵之以鄉飲酒之禮禮而賔之厥明鄉老及鄉大夫羣吏獻賢能之書於王王再拜受之登於天府內史二之厥其也其賔之明日也獻猶進也王拜受之重得賢者王上其書於天府天府掌祖廟之寶藏者內史副寫其書者當詔王爵祿之時退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞以用也行鄉射之禮而以五物詢於衆庶鄭司農云詢謀也問于衆庶寧復有賢能者和謂閨門之內行也容謂容貌也主皮謂善射射所以觀士也故書舞為無杜子春讀和容為和頌謂能為樂也無讀為舞謂能為六舞玄謂和載六德容包六行庶民無射禮因田獵分禽則有主皮主皮者張皮射之無侯也主皮和容興舞則六藝之射與禮樂與當射之時民必觀焉因詢之也孔子射於矍相之圃蓋觀者如堵墻射至於司馬使子路執弓矢出誓射者又使公罔之裘序點揚觶而語詢衆庶之儀若是乎此謂使民興賢出使長之使民興能入使治之言為政以順民為本也州長三年大比則大考州里以贊鄉大夫廢興廢興所廢退所興進也遂大夫三歲大比則帥其吏而興氓興氓舉民賢者能者如六鄉之為也司諫辨其能而可任於國事者可任於國事任吏職並地官命鄉論秀士升之司徒曰選士移名於司徒也秀士鄉大夫所考有德行道藝者司徒論選士之秀者而升之學曰俊士可使習禮者學大學升於司徒者不征於鄉升於學者不征於司徒曰造士不征不給其繇役造成也能習禮則為成士大樂正論造士之秀者以告於王而升諸司馬曰進士移名於司馬司馬夏官卿主邦政者進士可進受爵祿也司馬辨論官材辨其論官其材觀其所長論進士之賢者以告於王而定其論各署其所長論定然後官之使之世守任官然後爵之命之位定然後祿之王制大宰以八則治都鄙四曰祿位以馭其士鄭司農云士謂學士天官禮諸侯三年一貢士於天子命與諸侯輔助為政所以通賢共治示不獨專重民之至大國舉三人次國舉二人小國舉一人一適謂之好德再適謂之賢賢三適謂之有功一不適謂之過謂三年時也再不適謂之傲謂六年時也三不適謂之誣謂九年時也尚書大傳古者天子之制諸侯歲獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓則削地詳見射義有宣十一年公羊傳何休注云其秀者移於鄉學鄉學之秀者移於庠序庠序之秀者移於國學學於小學諸侯歲貢小學之秀者於天子學於大學其有秀者命曰造士行同而能偶别之以射然後爵之司士凡邦國三歲則稽士任而進退其爵祿任其所掌治夏令季春聘名士禮賢者孟春命大尉贊傑俊遂賢良舉長大行爵出祿必當其位並詳月令凡語於郊者語謂論説於郊學必取賢斂才焉或以德進或以事舉或以言揚大樂正論造士之秀者升諸司馬曰進士謂此矣曲藝皆誓之曲藝為小技能也誓謹也皆使謹習其事以待又語又語為後復論説也三而一有焉三説之中有一善則取之以有曲藝不必盡善乃進其等進於衆學者以其序又以其藝為次謂之郊人逺之俟事官之缺者以待之逺之者不曰俊選曰郊人賤技藝於成均以及取爵於上尊也董仲舒曰五帝名大學曰成均則虞庠近是也天子飲酒於虞庠則郊人亦得酌于上尊以相旅文王世子右選舉正月之朝鄉長復事鄉長鄉大夫也復白也周禮正月之吉鄉大夫受法於司徒退班于鄉吏以考其行君親問焉曰於子之鄉有居處好學慈孝於父母聰慧質仁慧解瞭也質性也發聞於鄉里者有則以告有而不以告謂之蔽明其罪五有司已於事而竣竣退伏也公又問焉曰於子之鄉有拳勇股肱之力秀出於衆者脛本曰股肱臂也大勇為拳詩云無拳無勇有則以告有而不以告謂之蔽賢其罪五有司已於事而竣桓公又問曰於子之鄉有不慈孝於父母不長弟於鄉里驕躁淫暴不用上令者上君長也有則以告有而不以告謂之下比比阿黨也其罪五有司已於事而竣是故鄉長退而修德進賢桓公親見之遂使役官役為也令官長期而書伐官長長官也期期年也伐功也書其所掌在官有功者也以告且選其官之賢者而復用之復白也公召而與之語訾相其質訾量也相視也足以比成事比輔也足以輔其官成其事也升以為上卿之贊贊佐也謂之三選三選謂鄉長所進官長所造公所訾相也國子高子退而修鄉鄉退而修連連退而修里里退而修軌軌退而修伍伍退而修家及五屬大夫復事公問之如初五屬大夫於是退而修屬屬退而修縣縣退而修鄉鄉退而修卒卒退而修邑邑退而修家是故匹夫有善可得而舉也匹夫有不善可得而誅也國語齊語禮書綱目卷六十六
