body:
  text: 禮書綱目卷三十二婺源江永撰喪禮義凶禮十六補喪者亡人死謂之喪言其亡不可復得見也不直言喪何為孝子心不忍言尚書曰武王既喪知據死者稱喪也生者哀痛之亦稱喪孝經曰孝子之喪親也是施生者也天子下至庶人俱言喪何欲言身體髮膚俱受之父母其痛一也白虎通夫禮必本于天殽于地列于鬼神達于喪祭禮運喪祭之禮所以明臣子之恩也喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣經解凡不孝生于不仁愛也不仁愛生于喪祭之禮不明喪祭之禮所以教仁愛也致愛故能致喪祭春秋祭祀之不絶致思慕之心也夫祭祀致饋飬之道也死且思慕饋飬况于生而孝乎故曰喪祭之禮明則民孝矣故有不孝之獄則飭喪祭之禮大戴記曽子曰慎終追逺民德歸厚矣論語先王有大事必有禮以哀之哀樂之分皆以禮終大事謂死喪也樂記先王之制禮樂人為之節衰麻哭泣所以節喪紀也同上喪禮忠之至也謂哭踊袒襲也備服器仁之至也謂小斂大斂之衣服葬之明器賔客之用幣義之至也謂來賻賵禮器孟子曰飬生者不足以當大事惟送死可以當大事事生固當愛敬然亦人道之常耳至於送死則人道之大變孝子之事親舍是無以用其力矣故尤以為大事而必誠必信不使少有後日之悔也子路曰吾聞諸夫子喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也喪主哀檀弓禮也者反本修古不忘其初者也故凶事不詔哭泣由中非由人也禮器親始死雞斯徒跣扱上祍交手哭惻怛之心痛疾之意傷腎乾肝焦肺水漿不入口三日不舉火故鄰里為之糜粥以飲食之親父母也雞斯當為笄纚聲之誤也親始死去冠三日乃去笄纚括髮也今時始喪者邪巾貊頭笄纚之存象也徒猶空也上祍深衣之裳前五藏者腎在下肝在中肺在上舉三者之焦傷而心脾在其中矣五家為鄰五鄰為里夫悲哀在中故形變於外也痛疾在心故口不甘味身不安美也言人情之中外相應三日而斂在牀曰尸在棺曰柩動尸舉柩哭踊無數惻怛之心痛疾之意悲哀志憊氣盛故袒而踊之所以動體安心下氣也婦人不冝袒故發胸擊心爵踊殷殷田田如壞牆然悲哀痛疾之至也故曰辟踊哭泣哀以送之送形而往迎精而反也故袒而踊之言聖人制法故使之然也爵踊足不絶地辟拊心也哀以送之謂葬時也迎其精神而反謂反哭及日中虞也其往送也望望然汲汲然如有追而弗及也其反哭也皇皇然若有求而弗得也故其往送也如慕其反也如疑望望瞻望之貌也慕者以其親之在前疑者不知神之來否求而無所得之也入門而弗見也上堂又弗見也入室又弗見也亡矣喪矣不可復見已矣故哭泣辟踊盡哀而止矣說反哭之義也心悵焉愴焉惚焉愾焉心絶志悲而已矣祭之宗廟以鬼饗之徼幸復反也說虞之義成壙而歸不敢入處室居于倚廬哀親之在外也寢苫枕塊哀親之在土也言親在外在土孝子不忍反室自安也入處室或為入宫故哭泣無時服勤三年思慕之心孝子之志也人情之實也勤謂憂勞問喪喪禮哀戚之至也節哀順變也君子念始之者也始猶生也念父母生己不欲傷其性復盡愛之道也有禱祠之心焉復謂招魂且分禱五祀庶幾其精氣之反望反諸幽求諸鬼神之道也鬼神處幽暗望其從鬼神所來北面求諸幽之義也鄉其所從來也禮復者升屋北面拜稽顙哀戚之至隱也稽顙隱之甚也隱痛也稽顙者觸地無容飯用米貝弗忍虛也不以食道用美焉耳尊之也食道䙝米貝美銘明旌也神明之旌以死者為不可别已故以其旗識之不可别形貌不見愛之斯録之矣敬之斯盡其道焉耳謂重與奠重主道也始死未作主以重主其神也重既虞而埋之乃後作主春秋傳曰虞主用喪練主用栗殷主綴重焉綴猶聫也殷人作主而聫其重縣諸廟也去顯考乃埋之周主重徹焉周人作主徹重埋之奠以素器以生者有哀素之心也哀素言哀痛無飾也凡物無飾曰素唯祭祀之禮主人自盡焉爾豈知神之所饗亦以主人有齊敬之心也哀則以素敬則以飾禮由人心而已辟踊哀之至也有算為之節文也算數也袒括髮變也愠哀之變也去飾去美也袒括髮去飾之甚也有所袒有所襲哀之節也辨絰葛而葬與神交之道也接神之道不可以純凶天子諸侯變服而葬冠素辨以葛為環絰既虞卒哭乃服受服也雜記曰凡辨絰其衰侈𬒮有敬心焉踰時哀衰而敬生敬則服有飾大夫士三月而葬未踰時周人辨而葬殷人冔而葬周辨殷冔俱象祭冠而素禮同也啜主人主婦室老為其病也君命食之也尊者奪人易也啜啜粥也反哭升堂反諸其所作也親所行禮之處主婦入于室反諸其所養也親所饋食之處反哭之弔也哀之至也反而亡焉失之矣于是為甚哀痛甚殷既封而弔周反哭而弔封當為窆謂下棺也孔子曰殷已慤吾從周慤者得哀之始未見其甚葬于北方北首三代之達禮也之幽之故也北方國北也既封主人贈而祝宿虞尸贈以幣送死者于壙也于主人贈祝先歸既反哭主人與有司視虞牲日中捋虞省其牲有司以几筵舍奠于墓左反日中而虞所使奠墓有司來歸乃虞也舍奠墓左為父母形體在此禮其神也周禮冢人凡祭墓為尸葬日虞弗忍一日離也弗忍其無所歸是日也以虞易奠虞喪祭也卒哭曰成事既虞之後卒哭而祭其辭蓋曰哀薦成事成祭事也祭以吉為成是日也以吉祭易喪祭卒哭吉祭明日祔于祖父祭告于其祖之廟其變而之吉祭也比至于祔必於是日也接不忍一日末有所歸也末無也日有所用接之虞禮所謂他用剛日者其祭祝曰哀薦曰成事殷練而祔周卒哭而祔孔子善殷期而神之人情檀弓子曰孝子之喪親也哭不偯氣竭而息聲不委曲禮無容觸地無容言不文不為文飾服美不安不安美飾故服縗麻聞樂不樂悲哀在心故不樂也食㫖不甘㫖美也不甘美味故疏食水飲此哀戚之情也謂上五句三日而食教民無以死傷生毁不滅性此聖人之政也不食三日哀毁過情滅性而死皆虧孝道故聖人制禮施教不令其殞滅喪不過三年示民有終也三年之喪天下達禮使不肖企及賢者俯從夫孝子有終身之憂聖人以三年為制者使人知有愛敬之限也為之棺椁衣衾而舉之周尸為棺周棺為椁衣謂斂衣衾被也舉謂舉尸內于棺也陳其簠簋而哀戚之簠簋祭器也陳奠素器而不見親故哀戚也劈踊哭泣哀以送之男踊女劈祖載送之卜其宅兆而安厝之宅墓穴也兆塋域也葬事大故卜之為之宗廟以鬼饗之立廟祔祖之後則以鬼禮饗之春秋祭祀以時思之生事愛敬死事哀戚生民之本盡矣死生之義備矣孝子之事親終矣愛敬哀戚孝敬之始終也偹陳死生之義以盡孝子之情孝經禮者謹于治生死者也謹嚴生人之始也死人之終也終始俱善人道畢矣故君子敬始而慎終終始如一是君子之道禮義之文也夫厚其生而薄其死是敬其有知而慢其無知也是姦人之道而倍叛之心也君子以倍叛之心接臧榖猶且羞之而况以事其所隆親乎莊子曰臧與榖相與牧羊音義云孺子曰穀或曰穀讀為鬭穀於莵之榖穀乳也謂哺乳小兒也所隆親所厚之親也故死之為道也一而不可得再復也臣之所以致重其君子之所以致重其親于是盡矣以其死不可再復臣子于極重之道不可不盡也故事生不忠厚不敬文謂之野忠厚忠心篤厚敬文恭敬有文飾野野人不知禮者也送死不忠厚不敬文謂之瘠瘠薄君子賤野而羞瘠故天子棺椁十重諸侯五重大夫三重士再重禮記云天子之棺四重今云十重蓋以棺椁與抗木合為十重也諸侯已下與禮記多少不同未詳也然後皆有衣衾多少厚薄之數皆有翣菨文章之等翣菨當為蔞翣鄭康成云蔞翣棺之牆飾也以敬飾之使生死終始若一足以為人願是先王之道忠臣孝子之極也生死如一則人願皆足忠孝之極在此也天子之喪動四海屬諸侯諸侯之喪動通國屬大夫大夫之喪動一國屬修士修士之喪動一鄉屬朋友屬謂付託之使主喪也通國謂通好之國也一國謂同在朝之人也修士士之進修者謂上士也一鄉謂一鄉內之姻族也春秋傳曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至庶人之喪合族黨動州里刑餘罪人之喪不得合族黨獨屬妻子棺椁三寸衣衾三領不得飾棺不得書行以昏殣凡緣而往埋之墨子曰桐棺三寸葛以為緘趙簡子亦云然則厚三寸刑人之棺也喪大記云陳衣于序東三十稱今云三領亦貶損之甚也殣道死人也詩曰行有死人尚或殣之以昏殣如掩道路之死人惡之甚也凡常也緣因也言其妻子如常日所服而埋之不更絰杖也反無哭泣之節無衰麻之服無親疏月數之等夫是之謂至辱此蓋論墨子薄葬是以至辱之道奉君父也荀子禮論禮者謹于吉凶不相厭者也紸纊聼息之時則夫忠臣孝子亦知其閔已紸讀為注注纊即屬纊也言此時知其必至于憂閔也然而殯斂之具未有求也垂涕恐懼然而幸生之心未已持生之事未輟也卒矣然後作具之作之具之故雖備家必踰日然後能殯三日而成服備豐足也然後告逺者出矣備物者作矣故殯久不過七十日速不損五十日此皆據士喪禮首尾三月也損减也是何也曰逺者可以至矣百求可以得矣百事可以成矣其忠至矣其節大矣其文備矣忠誠也節人子之節也文器用儀制也然後月朝卜日月夕卜宅然後葬也月朝月初也月夕月末也先卜日知其期然後卜宅此大夫之禮也士喪禮先筮宅後卜日此云月朝卜日月夕卜宅未詳也當是時也其義止誰得行之其義行誰得止之聖人為之節制使賢者抑情不肖者企及故三月之葬其貌以生設飾死者也殆非直留死者以安生也貌象也言其象以生之所設器用飾死者三月乃能備也是致隆思慕之義也同上喪禮者以生者飾死者也大象其生以送其死也故如死如生如存如亡終始一也不以死異于生亡異于存始卒沐浴鬠體飲含象生執也儀禮鬠用組體謂爪揃之屬象生時所執持之事不沐則濡櫛三律而止不浴則濡巾三式而止律理髮也今秦俗猶以批髮為栗濡濕也式與拭同士喪禮尸無有不沐浴者此云蓋末世多不備禮也充耳而設瑱士喪禮瑱用白纊飯以生稻含以槁骨反生術矣生稻米也槁枯也槁骨貝也術法也前說象其生此以下說反于生之法設䙝衣襲三稱搢紳而無鈎帶矣縉與搢同扱也紳大帶也搢紳謂扱笏于帶鈎鈎帶帶之鈎所用弛張也今不復解脫故不設鈎也設衣親身之衣也士喪禮飯含後乃襲三稱明衣不在算設韐帶搢笏禮記曰季康子之母死陳䙝衣鄭𤣥云䙝衣非上服陳之將以斂設掩面儇目鬠而不冠笄矣士喪禮掩用練帛廣終幅長五尺儇與還同繞也士喪禮幎目用緇幎讀如縈縈與還義同但鬠髮而已不加冠及笄也書其名置于其重則名不見而柩獨明矣士喪禮記取銘置于重案銘皆有名而此云無蓋後世禮變今猶然也薦器則冠有鍪而無縱明器之冠有加兜鍪加首之形而無韜髮之縱也甕廡虛而不實有簟席而無牀笫此言棺中不施牀笫大斂小斂則皆有也木器不成斫陶器不成物薄器不成內薄器竹葦之器不成內謂有其外形內不可用也竽笙具而不和琴瑟張而不均輿藏而馬反告不用也禮記君葬用輴四綍二碑大夫葬用輴二綍二碑士葬用國車皆至葬時埋之具生器以適墓象徙之道也生器用器也弓矢盤盂之屬徙遷改也徙道其生時之道器當在家今以適墓以象人行不徙常行之道更徙他道也略而不盡貌而不功趨輿而藏之金革轡靷而不入明不用也略而不盡謂簡略而不盡備也貌形也但有形貌不加功精好也趨輿而藏之謂以輿趨于墓而藏之趨者速也速藏之意也金謂和鸞革車鞅也說文云靷所以引軸者也杜元凱云靷在馬胸或曰貌讀為邈象也象徙道又明不用也是皆所以重哀也故生器文而不功明器貌而不用凡禮事生飾歡也送死節哀也祭祀飾敬也師旅飾威也是百王之所同古今之所一也未有知其所由來者也故壙壟其貌象室屋也壙墓中壟冢也禮記曰適墓不登壟貌猶意也言其意以象生時也或音邈棺椁其貌象版蓋斯象拂也版謂車上障蔽者蓋車蓋也斯未詳象衍字拂即茀也爾雅釋器云輿革前謂之革後謂之茀郭云以葦為車軾及後戶也無帾絲歶縷翣其貌以象菲帷幬尉也無讀為幠幠覆也所以覆尸者也士喪禮幠用夷衾是也帾與禇同禮記曰素錦禇又曰禇幕丹質鄭云所以覆棺也絲歶未詳蓋亦喪車之飾也或曰絲讀為緌禮記曰畫翣二皆載緌鄭云以采羽注于翣首也歶讀為魚謂以銅魚懸于池下禮記曰魚躍拂池縷讀為桞蔞字誤為縷耳菲謂編草為蔽蓋古人所用障蔽門戶者今貧者猶然或曰菲當為厞隱也謂隱奧之處也或曰菲讀為扉戶扇也幬讀為幬帳之幬尉讀為罻罻網也帷帳如網也抗折其貌以象摱茨番閼也既夕禮陳明器于乘車之西折橫復之抗木橫三縮者五無簀窆車畢加之壙上以承抗席抗禦也所以禦止土者槾扞也茨蓋屋也摱茨猶塈茨也番讀為藩籬也閼為門户壅閼風塵者抗所以禦土折所以承抗者皆不使外物侵內有象于槾茨藩閼也故喪禮者無他焉明死生之義送以哀敬而終周藏也故葬埋敬葬其形也祭祀敬事其神也其銘誄繫世敬傳其名也事生飾始也送死飾終也終始具而孝子之事畢聖人之道備矣刻死而附生謂之墨刻生而附死謂之惑刻損减附增益也墨子之法惑謂惑亂其法也殺生而送死謂之賊大象其生以送其死使死生終始莫不稱冝而好善是禮之法式也儒者是矣同上喪禮之凡凡謂常道變而飾謂殯斂每加飾動而逺禮記子遊曰飯于牖下小斂于戶內大斂于阼殯于客位祖于庭葬于墓所以即逺也久而平久則哀殺如平常也故死之為道也不飾則惡惡則不哀爾則玩爾與邇同玩戲狎也玩則厭厭則忘忘則不敬一朝而喪其嚴親而所以送葬之者不哀不敬則嫌于禽獸矣君子耻之故變而飾所以滅惡也動而逺所以遂敬也遂成也邇則懼敬不成也久而平所以優生也優生飬生也謂送死有禮復生有節也同上穆公之母卒穆公魯哀公之曾孫使人問于曽子曰如之何問居喪之禮曾子曽參之子名申對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子逹子喪父母尊卑同布幕衛也縿幕魯也幕所以覆棺上也縿縑也縿讀如綃衛諸侯禮魯天子禮兩言之者僣已久矣幕或為幦檀弓君子行禮不求變俗求猶務也不務變其故俗重本也謂去先祖之國居他國祭祀之禮居喪之服哭泣之位皆如其國之故謹修其法而審行之其法謂其先祖之制度若夏殷曲禮孔子在衛司徒敬子卒夫子弔焉主人不哀夫子哭不盡聲而退􅕋伯玉請曰衛鄙俗不習喪禮煩吾子辱相焉孔子許之掘中霤而浴室中毁竈而綴足襲于牀及葬毀宗而行也明不復有事于此也綴足不欲令僻戾葬毁宗廟而出行神位在廟門之外也出于大門及墓男子西面婦人東面既封而歸殷道也孔子行之子游問曰君子行禮不求變俗夫子變之矣孔子曰非此之謂也喪事則從其質而已矣家語人死必沐浴于中霤何示潔净反本也禮檀弓曰死于牖下沐浴于中霤飯唅于牖下小斂于戶內大斂于阼階殯于客位祖于庭葬于墓所以即逺奪孝子之恩以漸也所以有飯含何緣生食今死不欲虛其口故含用珠寶物何也有益死者形體故天子飯以玉諸侯以珠大夫以米士以貝也並白虎通冒者何也所以掩形也自襲以至小斂不設冒則形是以襲而後設冒也言設冒者為其形人將惡之也襲而設冒言后衍字耳雜記曾子曰尸未設飾故帷堂小斂而徹帷仲梁子曰夫婦方亂故帷堂小斂而徹帷斂者動搖尸帷堂為人䙝之言方亂非也仲梁子魯人也檀弓子曰饋奠之禮所以仁死喪也仲尼燕居貴本之謂文親用之謂理文謂修飾理謂合冝始卒之未小斂也一也一謂一于古也此以象太古時貴本之意故云一也謂未有威儀節文象太古時也喪服之先散麻也一也士喪禮始死主人散帶垂長三尺三年之喪哭之不文也一也不文謂無曲折也禮記曰斬衰之哭長往而不反荀子或問曰死三日而後斂者何也曰孝子親死悲哀志憊故匍匐而哭之若將復生然安可奪而斂之也故曰三日而後斂者以俟其生也三日而不生亦不生矣孝子之心亦盡哀矣家室之計衣服之具亦可以成矣親戚之逺者亦可以至矣是故聖人為之斷决以三日為之禮制也匍匐猶顛蹙或作扶服問喪崩薨三日乃小斂何奪孝子之恩以漸也一日之時屬纊于口上以候氣絶二日之時尚冀其生三日之時魂氣不還終不可奈何故禮曰天子諸侯三日小斂大夫士二日小斂尸柩者何謂也尸之為言失也陳也失氣亡神形體獨陳柩之為言究也久也不復章也夏后氏殯于阼階殷人殯于兩楹之間周人殯于西階之上何夏后氏教以忠忠者厚也曰生吾親也死亦吾親也主人冝在阼殷人教以敬曰死者將去又不敢容也故置之兩楹之間賓主共夾而敬之周人教以文曰死者將去不可又得故賓客之也天子七日而殯諸侯五日而殯事有大小所供者不等所以必居倚廬何孝子哀不欲聞人之聲又不欲居故處居中門之外倚木為廬質反古也不在門外何戒不虞故也王者崩臣下服之有先後何恩有深淺逺近故制有日月禮庶人國君服齊衰三月王者崩京師之民喪三月何民賤故思淺故三月而已禮不下庶人所以為民制何禮不下庶人者尊卑制度也服者恩從內發故為之制也喪禮必制衰麻何以副意也服以飾情情貌相配中外相應故吉凶不同服歌哭不同聲所以表中誠也腰絰者以代紳帶也所以結之何思慕腸若結也必再結之何明思慕無已所以必杖者孝子失親悲哀哭泣三日不食身體羸病故杖以扶身明不以死傷生也以竹杖何取其名也竹者蹙也桐者痛也父以竹母以桐何竹者陽也桐者隂也竹何以為陽竹斷而用之質故為陽桐削而用之加人功文故為隂也並白虎通孔子曰拜而后稽顙頽乎其順也此殷之喪拜也頽順也先拜賓順于事也稽顙而后拜頎乎其至也此周之喪拜也頎至也先觸地無容哀之至三年之喪吾從其至者重其尚哀戚自期如殷可明檀弓焉按家語子張有父之喪公儀相問稽顙于孔子孔子答之如此有子與子游立見孺子慕者有子謂子游曰豫豈不知夫喪之踊也豫欲去之久矣情在于斯其是也夫喪之踊猶孺子之號慕子游曰禮有微情者節哭踊有以故興物者衰絰之制有直情而徑行者戎狄之道也哭踊無節衣服無制禮道則不然與戎狄異人喜則斯陶陶鬱陶也陶斯咏咏謳也咏斯猶猶當為搖聲之誤也秦人猶搖聲相近猶斯舞手舞之舞斯愠愠猶怒也愠斯戚戚憤恚戚斯歎歎吟息歎斯辟辟拊心辟斯踊矣踊躍品節斯斯之謂禮舞踊皆有節乃成禮人死斯惡之矣無能也斯倍之矣無能心謂之無所復能是故制絞衾設蔞翣為使人勿惡也絞衾尸之飾蔞翣棺之牆飾周禮蔞作栁始死脯醢之奠將行遣而行之既葬而食之將行將葬也葬有遣奠食反虞之祭未有見其饗之者也自上世以來未之有舍也為使人勿倍也舍猶廢也故子之所刺于禮者亦非禮之訾也訾病也辨人有其母死而孺子泣者言聲無節孔子曰哀則哀矣此誠哀而難為繼也失禮中夫禮為可傳也為可繼也故哭踊有節曽子謂子思曰伋吾執親之喪也水漿不入于口者七日言已以疾時禮而不如子思曰先王之制禮也過之者俯而就之不至焉者跂而及之故君子之執親之喪也水漿不入于口者三日杖而后能起為曽子言難繼以禮抑之並檀弓天子大斂之後稱王者明臣不可一日無君也故尚書曰王麻冕黼裳此斂之後也何以知從後加王也以尚書言迎子釗不言迎王王者既殯而即繼體之位何緣民臣之心不可一日無君故先君不可得見則後君繼體矣尚書曰再拜興對乃受同明為繼體君也緣始終之義一年不可有二君也故尚書曰王釋冕反喪服吉冕受同稱王以接諸侯明已繼體為君也釋冕藏同反喪明未稱王以統事也不曠年無君故逾年乃即位改元名元年年以紀事君統其事矣而未發號令也何以言逾年即位謂改元位春秋傳曰以諸侯逾年即位亦知天子逾年即位也春秋曰元年春王正月公即位改元位也王者改元年即事天地諸侯改元即事社稷王制曰夫喪三年不祭唯祭天地社禝為越紼而行事春秋傳曰天子三年而後稱王者謂稱王統事發號令也尚書高宗諒隂三年是也論語君薨百官總已聽於冢宰三年緣孝子之心則三年不當也故三年除喪乃即位統事即位踐祚為主南面朝臣下稱王以發號令也故天子諸侯凡三年即位終始之義乃備白虎通子張曰書云高宗諒隂三年不言何謂也高宗商王武丁也諒隂天子居喪之名未詳其義子曰何必高宗古之人皆然君薨百官總已以聽于冢宰三年言君薨則諸侯亦然總已謂總攝已職冢宰大宰也百官聽于冢宰故君得以三年不言也胡氏曰位有貴賤而生于父母無以異者故三年之喪自天子達子張非疑此也殆以為人君三年不言則臣下無所禀命禍亂或由以起也孔子告以聽于冢宰則禍亂非所憂矣論語書曰高宗梁暗三年不言何謂梁暗也傳曰髙宗居凶廬三年不言百官總已以聽于冢宰而莫之違此之謂梁暗子張曰何謂也孔子曰古者君薨王世子聽于冢宰三年不敢服先王之服履先王之位而聽焉以民臣之義則不可一日無君矣不可一日無君猶不可一日無天也以孝子之隱乎則孝子三年弗居矣故曰義者彼也隱者此也逺彼而近此則孝子之道備矣尚書大傳喪禮不言者何思慕盡情也言不文者指謂士民不言而事成者國君卿大夫杖而謝賓財少恃力靣垢作身不言而事具者故號哭盡情白虎通春秋不稱楚越之王喪禮君不稱天大夫不稱君恐民之惑也楚越之君僣號稱王不稱其喪謂不書葬也春秋傳曰吳楚之君不書葬辟其僣號也記坊子云升自客階受弔于賓位教民追孝也謂反哭時既葬矣猶不由阼階不忍即父位也未沒喪不稱君示民不爭也故魯春秋記晉喪曰殺其君之子奚齊及其君卓沒終也春秋傳曰諸侯于其封內三年稱子至其臣子踰年則謂之君矣奚齊與卓子皆獻公之子也獻公卒其年奚齊殺明年而卓子殺矣同上臣死亦赴告于君何此君哀痛于臣子也欲聞之加賻賵之禮諸侯薨赴告鄰國何緣鄰國欲有禮也諸侯夫人薨告天子者不敢自廢政事天子亦欲知之當有禮也諸侯薨使臣歸瑞圭於天子何諸侯以瑞圭為信今死矣嗣子諒暗三年之後乃當更爵命故歸之推讓之義禮曰諸侯薨使臣歸瑞圭于天子天子聞諸侯薨哭之何慘怛發中哀痛之至也使大夫弔之追逺重終之義也故禮檀弓曰天子哭諸侯爵辨純衣又曰遣大夫弔詞曰皇天降災子遭離之難嗚呼哀哉天王使臣某弔臣子死君往弔之何親與之共治民恩深義重厚欲躬見之並白虎通君臨臣喪以巫祝桃茢執戈惡之也為有凶邪之氣在側君聞大夫之喪去樂卒事而往來襲也其已襲則止喪用桃茢桃鬼所惡茢萑苕可掃不祥所以異于生也生人無凶邪喪有死之道焉言人之死有如鳥獸死之狀鳥獸之死人賤之先王之所難言也聖人不明說為人甚惡之弓檀三年之喪與新有昏者期不使以衰裳入朝非禮也是謂君與臣同國臣有喪昏之事而不歸反服其衰裳以入朝是謂君臣共國無尊卑也有喪昏不歸唯君耳臣有喪昏當致仕而歸諸侯非問疾弔喪而入諸臣之家是謂君臣為謔無故而相之是戲謔也陳靈公與孔寧儀行父數如夏氏以取殺焉運禮郊之祭也喪者不敢哭凶服者不敢入國門敬之至也祭者吉禮不欲聞見凶人祭義大夫使受命而出聞父母之喪非君命不反者蓋重君也凶服不敢入公門者明尊朝廷吉凶不相干臣下有大喪不呼其門者使得終其孝道成其大禮並白虎通貨財曰賻輿馬曰賵衣服曰襚玩好曰贈玉貝曰含此與公羊穀之說同玩好謂明器琴瑟笙竽之屬何休曰此皆春秋之制也賻猶覆也賵猶助也皆助生送死之禮襚猶遺也遺是助死者之禮也知生則賵賻知死則襚含之也賻賵所以佐生也贈襚所以送死也送死不及柩尸弔生不及悲哀非禮也皆謂葬事故吉行五十奔喪百里賵贈及事禮之大也即說弔贈及事因明奔喪亦冝行遠也禮記奔喪曰日行百里不以夜行荀子贈襚何謂也贈之為言稱也玩好曰贈襚之為言遺也衣被曰襚知死者則贈襚所以助生送死追恩重終副至意也贈賵者助也所以相佐給不足也故弔辭曰知死則賻貨財曰賻車馬曰賵有不弔三何為人臣子常懷恐懼深思逺慮志在全身今乃畏厭溺死用為不義故不弔也檀弓曰不弔三畏厭溺也畏者兵死也禮曽子記曰大辱加于身皮體毁傷即君不臣士不交祭不得為昭穆之尸食不得昭穆之牲死不得葬昭穆之域也並白虎通三月之殯何也此殯謂葬也曰大之也重之也所致隆也所致親也將舉錯之遷徙之離宫室而歸丘陵也先王恐其不文也是以繇其期足之日也所至厚至親將徙而歸丘陵不可急遽無文飾故由其期足之日然後葬也繇讀為由由從也故天子七月諸侯五月大夫士三月皆使其須足以容事事足以容成成足以容文文足以容備曲容備物之謂道矣須待也謂所待之期也事喪具也道者委曲容物備物者也齊衰苴杖居廬食粥席薪枕塊是君子之所以為愅詭其所哀痛之文也愅變也詭異也感動其所哀痛而不可無文飾故制為齊衰苴杖之屬言本皆因于感動也卜筮視日齊戒修塗几筵饋薦告祝如或饗之賓出主人拜送反易服即位而哭如或去之此雜說喪祭也易服易祭服反喪服也賓出祭事畢即位而哭如神之去然也哀夫敬夫事死如事生事亡如事存狀乎無形影然而成文狀類也言祭祀不見鬼神有類乎無形影者然而足以成人道之節文也子荀子思曰喪三日而殯凡附于身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣言其日月欲以盡心修備之附于身謂衣衾附于棺謂明器之屬三年以為極亡去已久逺而除其喪則弗之忘矣則之言㑹故君子有終身之憂念其親而無一朝之患毁不滅性故忌日不樂謂死日言忌日不用舉吉事檀弓喪之朝也順死者之孝心也朝為遷柩于廟其哀離其室也故至于祖考之廟而后行殷朝而殯於祖周朝而遂葬孔子謂為明器者知喪道矣備物而不可用也神與人異道則不相傷哀哉死者而用生者之器也不殆于用殉乎哉殆幾也殺人以衛死者曰殉用其器者漸幾于用人其曰明器神明之也神明死者異于生人塗車芻靈自古有之芻靈束茅為人馬謂之靈者神之類明器之道也言與明器同孔子謂為芻靈者善謂為俑者不仁不殆于用人乎哉俑偶人也有面目機發有似生人孔子善古而非周孔子曰之死而致死之不仁而不可為也之死而致生之不知而不可為也之往也死之生之謂無知與有知也為猶行也是故竹不成用瓦不成味木不成斫成猶善也竹不可善用謂邉無縢味當作沫沫靧也琴瑟張而不平竽笙備而不和無宫商之調有鐘磬而無簨簴不縣之也橫曰簨直曰簴其曰明器神明之也言神明死者也神明者非人所知故其器如此仲憲言于曽子曰仲憲孔子弟子原憲夏后氏用明器示民無知也所謂致死之殷人用祭器示民有知也所謂致生之周人兼用之示民疑也言使民疑于無知與有知曽子曰其不然乎其不然乎非其說之非也夫明器鬼器也祭器人器也夫古之人胡為而死其親乎言仲憲之言三者皆非此或用鬼器或用人器並同上或問于曽子曰夫既遣而包其餘猶既食而裹其餘與君子既食則裹其餘乎言遣既奠而又包之是與食于人已而裹其餘將去何異與君子寧為是乎言傷亷也曽子曰吾子不見大饗乎夫大饗既饗卷三牲之爼歸于賓館父母而賓客之所以為哀也子不見大饗乎既饗歸賓爼所以厚之也言父母家之主今賓客之是孝子哀親之去也雜記曽子弔于負夏負夏衛地主人既祖填池祖謂移柩車去載處為行始也填池當為奠徹聲之誤也奠徹謂徹遣奠設祖奠推柩而反之反于載處榮曾子弔欲更始降婦人而後行禮禮既祖而婦人降今反柩而婦人辟之復升堂矣柩無反而反之而又降婦人蓋欲矜賓于此婦人皆非從者曰禮與怪之曽子曰夫祖者且也且未定之辭且胡為其不可以反宿也從者又問諸子游曰禮與疑曽子言非子游曰飯于牖下小斂于戶內大斂于阼殯于客位祖于庭葬于墓所以即逺也故喪事有進而無退明反柩非曽子聞之曰多矣乎豫出祖者善子游言且服檀弓子云喪禮每加以逺浴于中霤飯于牖下小斂于戶大斂于阼殯于客位祖于庭葬于墓所以示逺也逺之所以崇敬也阼或為堂殷人弔于壙周人弔于家示民不偝也既葬哀而哭踊于是弔之子云死民之卒事也吾從周周于送死尤備以此坊民諸侯猶有薨而不葬者坊記喪祭械用皆有等冝械器也皆有等級各當其可也夫是之謂復古是王者之制也荀子祖于庭何盡孝子之恩也祖者始也始載于庭也乘軸車辭祖禰故名為祖載也白虎通禮有以多為貴者天子崩七月而葬五重八翣諸侯五月而葬三重六翣大夫三月而葬再重四翣此以多為貴也詳見喪大記飾棺章有以大為貴者棺椁之厚丘封之大此以大為貴也禮器死乃諡之何言人行終始不能若一故據其終始後可知也士冠經曰死而諡之今也所以臨葬而諡之何因衆㑹欲顯揚之也天子崩臣下至南郊諡之者何以為人臣之義莫不欲褒大其君掩惡揚善者也故之南郊明不得欺天也諸侯薨世子赴告天子天子遣大夫㑹其葬而諡之何幼不誄貴諸侯相誄非禮也臣當受諡于君也卿大夫老歸死有諡何諡者别尊卑彰有德也卿大夫歸無過猶有祿位故有諡也夫人無諡者何無爵故無諡或曰夫人有諡夫人一國之母修閨門之內羣下亦化之故設諡以彰其善惡春秋傳曰葬宋恭姬傳曰其稱諡何賢也傳曰哀姜者何莊公夫人也卿大夫妻無諡何賤也八妾所以無諡何卑賤無所能務猶士卑小不得有諡也太子夫人無諡何本婦人隨夫太子無諡其夫人不得有諡也天子太子元士也士無諡知太子亦無諡也附庸所以無諡何卑小無爵也王制曰爵祿凡五等附庸本非爵也后夫人于何所諡之以為于朝廷朝廷本所以治政之處臣子共審諡白之于君然後加之婦人天夫故但白君而已王者巡狩崩于道歸葬何夫太子當為喪主天下皆來奔喪京師四方之中也即如是舜葬蒼梧禹葬㑹稽于時尚質故死則止葬不重煩擾也並白虎通古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁蓋取之大過取其過厚易孟子自齊葬于魯反于齊止于嬴充虞請曰前日不知虞之不肖使虞敦匠事嚴虞不敢請今願竊有請也木若以美然充虞孟子弟子嘗董治作棺之事者也嚴急也木棺木也以已通以美太美也曰古者棺椁無度中古棺七寸椁稱之自天子達于庶人非直為觀美也然後盡于人心度厚薄尺寸也中古周公制禮也椁稱之與棺相稱也欲其堅厚久逺非特為人觀視之美而已不得不可以為恱無財不可以為恱得之為有財古之人皆用之吾何為獨不然不得謂法制所不當得得之為有財言得之而又為有財也或曰為當作而且比化者無使土親膚于人心獨無恔乎比猶為也化者死者也恔快也言為死者不使土近其肌膚于人子之心豈不快然無所恨乎吾聞之也君子不以天下儉其親送終之禮所當得為而不自盡是為天下愛惜此物而薄於吾親也孟子魯平公將見孟子嬖人臧倉曰孟子之後喪踰前喪君無見焉公曰諾孟子前喪父後喪母踰過也言其厚母薄父也樂正子入見曰君奚為不見孟軻也曰或告寡人曰孟子之後喪踰前喪是以不往見也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與曰否謂棺椁衣衾之美也曰非所謂踰也貧冨不同也同上喪不慮居謂賣宅舍以奉喪毁不危身謂憔悴將滅性喪不慮居為無廟也毁不危身為無後也檀弓子游問喪具夫子曰稱家之有無子游曰有無惡乎齊惡乎齊問豐省之比夫子曰有毋過禮苟無矣斂首足形形體還葬還之言便也言已斂即葬不待三月縣棺而封不設碑繂不備禮封當為窆窆下棺也春秋傳作塴人豈有非之者哉不責于人所不能子思之母死于衛子思孔子孫伯魚之子伯魚卒其妻嫁于衛栁若謂子思曰子聖人之後也四方于子乎觀禮子蓋慎諸栁若衛人也見子思欲為嫁母服恐其失禮戒之嫁母齊衰期子思曰吾何慎哉吾聞之有其禮無其財君子弗行也謂時可行而財不足以備禮有其禮有其財無其時君子弗行也謂財足以備禮而時不得行者吾何慎哉時所止則止時所行則行無所疑也喪之禮如子贈襚之屬不踰主人子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之謂孝斂首足形還葬而無椁稱其財斯之謂禮還猶疾也謂不足其日月並檀弓墨者夷之因徐辟而求見孟子孟子曰吾聞夷子墨者墨之治喪也以薄為其道也夷子思以易天下豈以為非是而不貴也然而夷子葬其親厚則是以所賤事親也莊子曰墨子生不歌死無服桐棺三寸而無椁是墨之治喪以薄為道也易天下謂移易天下之風俗也夷子學于墨氏而不從其教其心必有所不安者故孟子因以詰之徐子以告夷子夷子曰儒者之道古之人若保赤子此言何謂也之則以為愛無差等施由親始徐子以告孟子孟子曰夫夷子信以為人之親其兄之子為若親其鄰之赤子乎彼有取爾也赤子匍匐將入井非赤子之罪也且天之生物也使之一本而夷子二本故也若保赤子周書康誥篇文此儒者之言也夷子引之蓋欲援儒而入于墨以拒孟子之非已又曰愛無差等施由親始則推墨而附于儒以釋已所以厚葬其親之意皆所謂遁辭也孟子言人之愛其兄子與鄰之子本有差等書之取譬本為小民無知而犯法如赤子無知而入井耳且人物之生必各本于父母而無二乃自然之理若天使之然也故其愛由此立而推以及人自有差等今如夷子之言則是視其父母本無異于路人但其施之之序姑自此始耳非二本而何哉然其于先後之間猶知所擇則又其本心之明有終不得而息者此所以卒能受命而自覺其非也蓋上世嘗有不葬其親者其親死則舉而委之于壑他日過之狐狸食之蠅蚋姑嘬之其顙有泚睨而不視夫泚也非為人泚中心達于面目蓋歸反虆梩而掩之掩之誠是也則孝子仁人之掩其親亦必有道矣因夷子厚葬其親而言此以深明一本之意上世謂太古也委棄也壑山水所趨也蚋蚊屬姑語助聲或曰螻姑也嘬攢共食之也顙額也泚泚然汗出之貌睨邪視也視正視也不能不視而又不忍止視哀痛迫切不能為心之甚也非為人泚言非為他人見之而然也所謂一本者于此見之尤甚親切蓋惟至親故如此在他則雖有不忍之心而其哀痛迫切不至若此之甚矣反覆也虆土籠也梩土輿也于是歸而掩覆其親之尸此葬埋之禮所由起也此掩其親者若所當然則孝子仁人所以掩其親者必有其道而不以薄為貴矣徐子以告夷子夷子憮然為間曰命之矣憮然茫然自失之貌為間者有頃之間也孟子古之喪禮貴賤有儀上下有等天子棺椁七重諸侯五重大夫三重士再重今墨子獨生不歌死不服桐棺三寸而無椁以為法式以此教人恐不愛人以此自行固不愛也物皆以任力稱情為愛今以勤儉為法而為之太過雖欲饒天下更非所以為愛也未敗墨子道墨子是一家之事故不可以敗也崔云未壞其道雖然歌而非歌哭而非哭樂而非樂是果類乎其生也勤其死也薄其道大觳觳郭李皆云無閠也使人憂使人悲其行難為也恐其不可以為聖人之道反天下之心天下不堪墨子雖獨能任奈天下何離于天下其去王逺矣莊子世俗之為說者曰太古薄葬棺厚三寸衣衾三領葬田不妨田故不掘也此蓋言古之人君也三領三稱也禮記君陳衣于序東西領南上故以領言葬田不妨田言所葬之地不妨農耕也殷已前平葬無丘隴之識亂今厚葬飾棺故掘也是不及知治道而不察于抇不抇者之所言也謂發冢也凡人之盜也必以有為其意必有云為也聖王之生民也皆使厚優而不得有餘過度皆使寬泰知足又不得以有餘過度故曰天下有道盜其先變乎衣食足知榮辱夫亂今而後反是上以無法使下以無度行知者不得慮能者不得治賢者不得使于是桀紂羣居而盜賊擊奪以危上矣言在上位者如桀紂也若是則有何尤抇人之墓抉人之口而求利矣哉抉挑也抉人口取其珠也夫太古薄葬故不抇也亂今厚葬故抇也是特姦人之誤于亂說以欺愚者夫是之謂大姦是時墨子之徒說薄葬以惑當世故以此譏之荀子國子高曰葬也者藏也藏也者欲人之弗得見也是故衣足以飾身棺周于衣椁周于棺土周于椁言皆所以為深邃人難發見之也國子高成子高也成諡也反壤樹之哉反復也怪不如太古也而又封樹之意在于儉非周禮也檀弓葬于城郭外何死生别處終始異居易曰葬之中野所以絶孝子之思慕也傳曰作樂于廟不聞于墓哭泣于墓不聞于廟所以于北方何就隂也有虞氏瓦棺今以木何虞尚質故用瓦夏后氏益文故易之以堲周謂堲木相周無膠漆之用也殷人棺椁有膠漆之用周人浸文牆置翣加巧飾喪葬之禮緣生以事死生時無死亦不敢造太古之時穴居野處衣皮帶革故死衣之以薪內藏不飾中古之時有宫室衣服故衣之幣帛藏以棺椁封樹識表體以象生夏殷彌文齊之以器械至周大文緣夫婦生時同室死同葬之合葬者所以固夫婦之道也並白虎通大公封于營丘比及五世皆反葬于周齊太公受封留為太師死葬于周子孫生焉不忍離也五世之後乃葬于齊齊曰營丘君子曰樂樂其所自生禮不忘其本言其似禮樂之義古之人有言曰狐死正丘首仁也正丘首正首丘也仁恩也延陵季子適齊于其反也其長子死葬于嬴博之間季子名札魯昭二十七年吳公子札聘于上國是也季子讓國居延陵因號焉春秋傳謂延陵延州來嬴博齊地今泰山縣是也孔子曰延陵季子吳之習于禮者也往而觀其葬焉往弔之其坎深不至于泉以生恕死其斂以時服以行時之服不改制節既葬而封廣輪掩坎其高可隱也亦節也輪從也隱據也封可手據謂高四尺所既封左袒右還其封且號者三曰骨肉歸復于土命也若魂氣則無不之也無不之也還圍也號哭且言也命猶性也而遂行行去也孔子曰延陵季子之于禮也其合矣乎並檀弓子貢問于孔子曰殷人既定而弔于壙周人反哭而弔于家如之何孔子曰反哭之弔也喪之至也反而忘矣失之矣于斯為盛故弔之死人卒事也殷以慤吾從周殷人既練之明日而祔于祖周既卒哭之明日祔于祖祔祭神之始事也周以戚吾從殷戚猶促也家語子夏問曰三年之喪卒哭金革之事無辟也者禮與初有司與疑有司初使之然孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事致事還其職位于君周卒哭而致事記曰君子不奪人之親亦不可奪親也此之謂乎二者恕也孝也子夏曰金革之事無辟也者非與疑禮當有然孔子曰吾聞諸老聃曰昔者魯公伯禽有為為之也伯禽周公子封于魯有徐作難喪卒哭而征之急王事也征之作費誓今以三年之喪從其利者吾弗知也時多攻取之兵言非禮也曽子問子夏問于夫子曰凡喪小功以上虞祔練祥之祭皆沐浴于三年之喪子則盡其情矣孔子曰豈徒祭而已哉三年之喪身有瘍則浴首有瘡則沭病則飲酒食肉毁瘠而病君子不為也毁則死者君子謂之無子且祭之沐浴為齊潔也非為飾也家語子路問于孔子曰魯大夫練而牀禮邪孔子曰吾不知也練小祥也禮記曰期而小祥居堊室寢有席又期而大祥居復寢中月而禫禫而牀也子路出謂子貢曰吾以夫子為無所不知夫子徒有所不知子貢曰女何問哉子路曰由問魯大夫練而牀禮邪夫子曰吾不知也子貢曰吾將為汝問之子貢問曰練而牀禮邪孔子曰非禮也子貢出謂子路曰女為夫子為有所不知乎夫子徒無所不知汝問非也禮居是邑不非其大夫懼于訕上荀子免喪之外行于道路見似目瞿聞名心瞿弔死而問疾顔色戚容必有以異于人也如此而后可以服三年之喪其餘則直道而行之是也惻隱之心能如是則其餘齊衰以下直道而行盡自得也似謂容貌似其父母也名與親同雜記子夏既除喪而見見于孔子豫之琴和之而不和彈之而不成聲樂由人心作而曰哀未忘也先王制禮而弗敢過也作起子張既除喪而見豫之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉雖情異善同按家語云子夏三年之喪畢見于孔子孔子與之琴使之絃侃侃而樂作而曰先王制禮不敢不及子曰君子也閔子三年之喪畢見于孔子孔子與之琴使之絃切切而悲作而曰先王制禮弗敢過也子曰君子也子貢曰閔子哀未盡夫子曰君子也子夏哀已盡又曰君子也二者殊情而俱曰君子賜也惑敢問之孔子曰閔子哀未忘能斷之以禮子夏哀已盡能引之及禮雖均之君子不亦可乎孔子曰無體之禮敬也無服之喪哀也無聲之樂歡也子路有姊之喪可以除之矣而弗除也孔子曰何弗除也子路曰吾寡兄弟而弗忍也孔子曰先王制禮行道之人皆弗忍也行道猶行仁義子路聞之遂除之檀弓子夏喪其子而喪其明明目精曾子弔之曾子哭子夏亦哭曰天乎豫之無罪也怨天罰無罪曽子怒曰商乎女何無罪也吾與女事夫子於洙泗之間言有師也洙泗魯水名退而老于西河之上西河龍門至華隂之地使西河之民疑女于夫子爾罪一也言其不稱師也喪爾親使民未有聞焉爾罪二也言居親喪無異稱喪爾子喪爾明爾罪三也言隆于妻子而曰女何無罪與子夏投其杖而拜曰吾過矣吾過矣謝之且服罪也吾離羣而索居亦已久矣羣謂同門朋友也索猶散也同上君子有終身之喪忌日之謂也忌日不用非不祥也言夫日志有所至而不敢盡其私也忌日親亡之日忌日者不用舉他事如有時日之禁也祥善也志有所至至于親以此日亡其哀心如喪時祭義曽子曰父母既沒慎行其身不遺父母惡名可謂能終矣又曰父母既沒必求仁者之粟以祀之此之謂禮終祭義詳見孝經附禮書綱目卷三十二
