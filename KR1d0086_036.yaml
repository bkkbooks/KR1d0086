body:
  text: 禮書綱目卷三十四婺源江永撰祭法吉禮一補祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圜丘也祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗祖宗通言爾下有禘郊祖宗孝經曰宗祀文王於明堂以配上帝明堂月令春曰其帝太昊其神句芒夏曰其帝炎帝其神祝融中央曰其帝黃帝其神后土秋曰其帝少昊其神蓐收冬曰其帝顓頊其神玄冥有虞氏以上尚德禘郊祖宗配用有德者而已自夏以下稍用其姓代之先後之次有虞氏夏后氏宜郊顓頊殷人宜郊契郊祭一帝而明堂祭五帝小德配寡大德配衆亦禮之殺也燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢壇折封土為祭處也壇之言坦也坦明貌也折照晢也必為照明之名尊神也地隂祀用黝牲與天俱用犢連言爾埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭昭明也亦謂壇也時四時也亦謂陰陽之神也埋之者陰陽出入於地中也凡此以下皆祭用少牢相近當為禳祈聲之誤也禳猶郤也祈求也寒暑不時則或禳之或祈之寒於坎暑於壇王宫日壇王君也日稱君宫壇營域也夜明亦謂月壇也宗皆當為禜字之誤也幽禜亦為星壇也星以昏始見禜之言禜也雩禜亦為水旱壇也雩之言吁嗟也春秋傳曰日月星辰之神則雪霜風雨之不時于是乎禜之山川之神則水旱厲疫之不時于是乎禜之四方即謂山林川谷丘陵之神也祭山林丘陵於壇川谷於坎每方各為坎為壇怪物雲氣非常見者也有天下謂天子也百者假成數也大凡生於天地之間者皆曰命其萬物死皆曰折人死曰鬼此五代之所不變也生時形體異可同名至死腐為野土異其名嫌同也折棄敗之言也鬼之言歸也五代謂黃帝堯舜禹湯周之禮樂所存法也七代之所更立者禘郊宗祖其餘不變也七代通數顓頊及嚳也所不變者則數其法而已變之則通數所不法為記者之微意也少昊氏修黃帝之書後王無所取焉祭法大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國建立也立天神地祗人鬼之禮者謂祀之祭之享之禮吉禮是也保安也所以佐王立安邦國者主謂凶禮賓禮軍禮嘉禮也目吉禮于上承以立安邦國者互以相成明尊鬼神重人事以吉禮事邦國之鬼神示事謂祀之祭之享之故書吉或為告杜子春云書為告禮者非是當為吉禮書亦多為吉禮吉禮之别十有二以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師禋之言煙周人尚臭煙氣之臭聞者槱積也詩曰芃芃棫朴薪之槱之三祀皆積柴實牲體焉或有玉帛燔燎而升煙所以報陽也鄭司農云昊天天也上帝玄天也昊天上帝樂以雲門實柴實牛柴上也故書實柴或為賔柴司中三能三階也司命文昌宫星風師箕也雨師畢也玄謂昊天上帝冬至於圜丘所祀天皇大帝星謂五緯辰謂日月所會十二次司中司命即文昌第五第四星或曰中能上能也祀五帝亦用實柴之禮云以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物不言祭地此皆地祗祭地可知也陰祀自血起貴氣臭也社稷土穀之神有德者配食焉共工氏之子曰句龍食於社有厲山氏之子曰柱食於稷湯遷之而祀棄故書祀作祀疈為罷鄭司農云祀當為祀書亦或作祀五祀五色之帝於王者宫中曰五祀罷辜披磔牲以祭若今時磔狗祭以止風玄謂此五祀者五官之神在四郊四時迎五行之氣於四郊而祭五德之帝亦食此神焉少昊氏之子曰重為句芒食於木該為蓐收食於金修及熙為玄冥食於水顓頊氏之子曰犂為祝融后土食於火土五嶽東曰岱宗南曰衡山西曰華山北曰恆山中曰嵩髙山不見四竇者四竇五嶽之匹或省文祭山林曰貍川澤曰沈順其性之含藏疈疈牲胸也疈而磔之謂磔攘及蠟祭郊特牲曰八蠟以祀四方四方年不順成八蠟不通以謹民財也又曰蠟之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王宗廟之祭有此六享肆獻祼饋食在四時之上則是祫也禘也肆者進所解牲體謂薦孰時也獻獻醴謂薦血腥也祼之言灌灌以鬱鬯謂始獻尸求神時也郊特牲曰魂氣歸於天形魄歸於地故祭所以求諸陰陽之義也殷人先求諸陽周人先求諸陰灌是也祭必先灌乃後薦腥薦孰於祫逆言之者與下共文明六享俱然祫言肆獻祼禘言饋食者著有黍稷互相備也魯禮三年喪畢而祫於太祖明年春禘於羣廟自爾以後五年而再殷祭一祫一禘春官天子祭天地祭四方祭山川祭五祀嵗遍諸侯方祀祭山川祭五祀嵗遍大夫祭五祀歲遍士祭其先祭四方謂祭五官之神於四郊也句芒在東祝融后土在南蓐收在西玄冥在北詩云來方禋祀方祀者各祭其方之官而已五祀户竈中霤門行也此蓋殷時制也祭法曰天子立七祀諸侯立五祀大夫立三祀士立二祀謂周制也曲禮天子祭天地諸侯祭社稷大夫祭五祀五祀謂司命也中霤也門也行也厲也此祭謂大夫有地者其無地祭三耳天子祭天下名山大川五嶽視三公四瀆視諸侯視視其牲器之數諸侯祭名山大川之在其地者魯人祭泰山晉人祭河是也天子諸侯祭因國之在其地而無主後者謂所因之國先王先公有功德宜享世祀今絶無後為之祭主者昔夏后氏郊鯀至杞為夏後而更郊禹晉侯夢黃熊入國而祀夏郊此其禮也王制禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其大祖大夫士有大事省于其君于祫及其髙祖大傳詳見天子諸侯廟享篇天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疏多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼諸侯立五廟一壇二墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼祭法詳見宗廟篇天子七廟三昭三穆與大祖之廟而七諸侯五廟二昭二穆與大祖之廟而五大夫三廟一昭一穆與大祖之廟而三士一廟庶人祭於寢王制詳見宗廟篇天子犆礿祫禘祫嘗祫蒸諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不礿諸侯礿犆禘一犆一祫嘗祫蒸祫王制詳見廟享篇武王末受命周公成文武之德追王大王王季上祀先公以天子之禮斯禮也達乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫末猶老也追王大王王季者以王迹起焉先公組紺以上至后稷也斯禮達于諸侯大夫士庶人者謂葬之從死者之爵祭之用生者之祿也中庸父為士子為天子諸侯則祭以天子諸侯其尸服以士服祭以天子諸侯養以子道也尸服士服父本無爵子不敢以己爵加之嫌於卑之父為天子諸侯子為士祭以士其尸服以士服謂父以罪誅尸服以士服不成為君也天子之子當封為王者後以祀其受命之祖云為士則擇其宗之賢者若微子者不必封其子為王者後及所立為諸侯者祀其先君以禮卒者尸服天子諸侯之服如遂無所封立則尸也祭也皆如士不敢僭用尊者衣物喪服小記自天子達於庶人喪從死者祭從生者支子不祭從死者謂衣衾棺椁從生者謂奠祭之牲器王制支子不祭祭必告於宗子不敢自専謂宗子有故支子當攝而祭者也五宗皆然曲禮庶子不祭祖小兒詳見祭義庶子不祭禰同上庶子不祭殤與無後者殤與無後者從祖祔食不祭殤者父之庶也不祭無後者祖之庶也此二者當從祖祔食而已不祭祖無所食之也共其牲物而宗子主其禮焉祖庶之殤則自祭之凡所祭殤者惟適子耳無後者謂昆弟諸父也宗子之諸父無後者為墠祭之小記若富則具二牲獻其賢者於宗子賢猶善也夫婦皆齊而宗敬焉當助祭於宗子之家終事而后敢私祭祭其祖禰內則曾子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家貴祿重宗也上牲大夫少牢祝曰孝子某為介子某薦其常事介副也不言庶使若可以祭然若宗子有罪居於他國庶子為大夫其祭也祝曰孝子某使介子某執其常事此之謂宗子攝大夫攝主不厭祭不旅不假不綏祭不配皆辟正主厭厭飫神也厭有陰有陽迎尸之前祝酌奠奠之且饗是陰厭也尸謖之後徹薦爼敦設於西北隅是陽厭也此不厭者不陽厭也不旅不旅酬也假讀為嘏不嘏不嘏主人也不綏祭謂今主人也綏周禮作墮不配者祝辭不言以某妃配某氏布奠於賓賔奠而不舉布奠謂主人酬賓奠觶於薦北賔奠謂取觶奠於薦南也此酬之始也奠之不舉止旅不歸肉且爼也諸與祭者留之共燕其辭於賔曰宗兄宗弟宗子在他國使某辭辭猶告也宿賔之辭與宗子為列則曰宗兄若宗弟昭穆異者曰宗子而已其辭若云宗兄某在他國使某執其常事使某告子曾問曾子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉有子孫存不可以乏先祖之祀請問其祭如之何孔子曰望墓而為壇以時祭不祭於廟無爵者賤逺辟正主若宗子死告於墓而後祭於家言祭於家容無廟也宗子死稱名不言孝孝宗子之稱不敢與之同其辭但言子某薦其常事身沒而已至子可以稱孝子遊之徒有庶子祭者以此以用也用此禮祭也若義也若順今之祭者不首其義故誣於祭也首本也誣猶妄也同上王下祭殤五適子適孫適曽孫適玄孫適來孫諸侯下祭三大夫下祭二適士及庶人祭子而止祭適殤者重適也祭適殤於廟之奧謂之陰厭王子公子祭其適殤於其黨之廟大夫以下庶子祭其適殤於宗子之家皆當室之白謂之陽厭凡庶殤不祭祭法孔子曰有陰厭有陽厭言祭殤之禮有於陰厭之者有於陽厭之者曽子問曰殤不附祭何謂陰厭陽厭祔當為備聲之誤也言殤乃不成人祭之不備禮而云隂厭陽厭乎此失孔子指也祭成人始設奠於奧迎尸之前謂之陰厭尸謖之後改饌於西北隅謂之陽厭殤則不備孔子曰宗子為殤而死庶子弗為後也族人以其倫代之明不序昭穆立之廟其祭之就其祖而已代之者主其禮其言祭特牲尊宗子從成人也凡殤則特豚自卒哭成事之後為吉祭祭殤不舉無肵爼無玄酒不告利成此其無尸及所降也其他如成人舉肺脊肵爼利成禮之施於尸者是謂陰厭是宗子而殤祭之於奧之禮小宗為殤其祭禮亦如之凡殤與無後者祭於宗子之家當室之白尊於東房是謂陽厭凡殤謂庶子之適也或昆弟之子或從父昆弟無後者如有昆弟及諸父此則今死者皆宗子大功之內親共祖禰者言祭於宗子之家者為有異居之道也無廟者為墠祭之親者共其牲物宗子皆主其禮當室之白尊於東房異於宗子之為殤當室之白謂西北隅得户明者也明者曰陽凡祖廟在小宗之家小宗祭之亦然宗子之適亦為凡殤過此以往則不祭也祭適者天子下祭五諸侯下祭三大夫下祭二士以下祭子而止曽子問慈母與妾母不世祭也以其非正春秋傳曰於子祭於孫止小記王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社詳見地示篇王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰户曰竈王自為立七祀諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自為立五祀大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士庶人立一祀或立户或立竈同上夫聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之是故厲山氏之有天下也其子曰農能殖百穀夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社帝嚳能序星辰以著衆堯能賞均刑法以義終舜勤衆事而野死鯀障鴻水而殛死禹能修鯀之功黃帝正名百物以明民共財顓頊能修之契為司徒而民成冥勤其官而水死湯以寬治民而除其虐文王以文治武王以武功去民之災此皆有功烈於民者也及夫日月星辰民所瞻仰也山陵川谷丘陵民所取財用也非此族也不在祀典春秋傳曰封為上公祀為大神厲山氏炎帝也起於厲山或曰有烈山氏棄后稷名也共工氏無録而王謂之霸在大昊炎帝之間著衆謂使民興事知休作之期也賞賞善謂禪舜封禹稷等也能刑謂去四凶義終於既禪二十八載乃死也野死謂征有苗死於蒼梧也殛死謂不能成其功也明民謂使之衣服有章也民成謂知五教之禮也冥契六世之孫也其官玄冥水官也虐災謂桀紂也烈業也族猶類也祀典謂祭祀也祭法凡祭有其廢之莫敢舉也有其舉之莫敢廢也為其瀆神也廢舉謂若殷廢農祀棄後不可復廢棄祀農也後有德者繼之不嫌也非其所祭而祭之名曰淫祀淫祀無福妄祭神不饗曲禮海鳥曰爰居止於魯東門之外二日爰居雜縣也東門城東門也臧文仲使國人祭之文仲不知以為神也展禽曰越哉臧孫之為政也越迂也言其迂濶不知政要夫祀國之大節也節制也而節政之所成也言節所以成政故慎制祀以為國典典法也今無故而加典非政之宜也加益也謂以祭鳥益國法也夫聖人之制祀也法施於民則祀之謂五帝殷契周文也以死勤事則祀之殷冥水死周棄山死是也以勞定國則祀之虞幕夏杼殷上甲微周髙圉大王也能禦大災則祀之夏禹是也能扞大患則祀之殷湯周武是也非是族也不在祀典族類也昔烈山氏之有天下也烈山氏炎帝之號也起於烈山祭法以烈山為厲山其子曰柱能殖百穀百蔬柱為后稷自夏以上祀之草實曰蔬夏之興也周棄繼之故祀以為稷夏之興謂禹也棄能繼柱之功自商以來祀之共工氏之伯九有也共工氏伯者在戲農之間有域也其子曰后土能平九土其子共工之裔子勾龍佐黃帝為土官九土九州之土也后君也使君土官故曰后土故祀以為社社后土之神也黃帝能成命百物以明民共財黃帝少典之裔子帝軒轅也命名也顓頊能修之顓頊黃帝之孫昌意之子帝髙陽也能修黃帝之功帝嚳能序三辰以固民固安也帝嚳黃帝之曽孫玄囂之孫蟜極之子帝髙辛也三辰日月星也謂能次序三辰以治歷明時教民稼穡以安之堯能單均刑法以儀民堯帝嚳之庶子陶唐氏放勳也單盡也均平也儀善也舜勤民事而野死舜顓頊之後六世有虞帝重華也野死謂征有苗死於蒼梧之野鯀障洪水而殛死殛誅也鯀顓頊之後禹之父也堯使治水障防百川績用不成堯用殛之於羽山禹為天子而郊之取其勤事而死禹能以德修鯀之功鯀功雖不成禹亦有所因故曰修鯀之功契為司徒而民輯契殷之祖為堯司徒能敬敷五教輯和也冥勤其官而水死冥契後六世孫根圉之子也為夏水官勤於其職而死於水湯以寬治民而除其邪湯冥後九世主癸之子為夏諸侯以寬得民除其邪謂放桀扞大患也稷勤百穀而山死稷周棄也勤播百穀死於黑水之山毛詩傳云文王以文昭文王演易又有文德周語曰文王質文武王去民之穢穢謂紂也故有虞氏禘黃帝而祖顓頊郊堯而宗舜賈侍中云有虞氏舜後在夏殷為二主後故有禘郊宗祖之禮也昭謂此上四者謂祭天以配饗也祭昊天於圜丘曰禘祭五帝於明堂曰祖宗祭上帝於南郊曰郊有虞氏出自黃帝顓頊之後故禘黃帝而祖顓頊舜受禪於堯故郊堯禮祭法有虞氏郊嚳而宗堯與此異者舜在時則宗堯舜崩而子孫宗舜郊堯夏后氏禘黃帝而祖顓頊郊鯀而宗禹虞夏俱黃帝顓頊之後也故禘祖之禮同虞以上上德夏以下親親故夏郊鯀也商人禘舜而祖契郊冥而宗湯舜當為嚳字之誤也禮祭法曰商人禘嚳嚳契父商之先故禘之鄭後司農云商人宜郊契也周人禘嚳而郊稷嚳稷之父稷周始祖也祖文王而宗武王此與孝經異者商家祖契周公初時亦祖后稷而宗文王至武王雖承文王之業有伐紂定天下之功其廟不可以毁故先推后稷以配天而後更祖文王而宗武王幕能帥顓頊者也有虞氏報焉幕舜之後虞思也為夏諸侯帥循也顓頊有虞氏之祖也報報德之祭也杼能帥禹者也夏后氏報焉杼禹後七世少康之子季杼也能興夏道者上甲微能帥契者也商人報焉上甲微契後八世湯之先也髙圉大王能帥稷者也周人報焉髙圉后稷後十世公非之子也大王髙圉之曽孫古公亶父也凡禘郊宗祖報此五者國之典祀也典法也加之以社稷山川之神皆有功烈於民者也及前哲令德之人所以為明質也質信也以其有德於民而祭之所以信之於民心及天之三辰民所以瞻仰也及地之五行所以生殖也殖長也五行五祀金木水火土及九州名山川澤所以出財用也非是不在祀典今海鳥至已不知而祀之以為國典難以為仁且智矣夫仁者講功講論也仁者心平故可論功也而知者處物處名也無功而祀之非仁也言鳥無功不知而不問非知也今兹海其有災乎夫廣川之鳥獸恆知而避其災也是嵗也海多大風冬暖爰居之所避也文仲聞栁下季之言栁下展禽之邑季字也曰信吾過也季子之言不可不法也使書以為三策策簡書也三策三卿卿一通謂司馬司徒司空也國語魯語衛遷於帝丘衛成公夢康叔曰相奪豫享相夏后啓之孫居帝丘享祭也公命祀相寧武子不可曰鬼神非其族類不歆其祀歆猶饗也杞鄫何事言杞鄫夏後自當祀相相之不享於此久矣非衛之罪也言帝丘久不祀相非衛所絶不可以間成王周公之命祀諸侯受命各有常祀請改祀命改祀相之命氏僖三十一年左傳九月考仲子之宫考者成之也成之為夫人也立其廟世祭之成夫人之禮禮庶子為君為其母築宫使公子主其祭也公當奉宗廟故不得自主也公子者長子之弟及妾之子於子祭於孫止貴賤之序仲子者惠公之母隱孫而修之非隱也非責也梁隱五年穀傳禮書綱目卷三十四
