body:
  text: 禮書綱目卷三婺源江永撰冠昏記嘉禮五補大宗伯以嘉禮親萬民以昏冠之禮親成男女親其恩成其性官春黨正凡其黨之昏冠教其禮事掌其禁戒其黨之民官地男子二十而冠冠而列丈夫三十而娶女子十五而許嫁二十而嫁禮二十而冠冠而在丈夫之列譙周曰國不可久無儲二故天子諸侯十五而冠十五而娶娶必先冠以夫婦之道王教之本不可以童子之道治之禮十五而成童以次成人欲人君之早有繼體故因之以為莭書稱成王十五而冠著在金縢周禮媒氏曰令男三十而娶女二十而嫁內則曰女子十五而笄説曰許嫁也是故男自二十以及三十女自十五以及二十皆得以嫁娶先是則速後是則晚凡人嫁娶或以賢淑或以方類豈但年數而已若必差十年乃為夫婦是廢賢淑方類苟比年數而已禮何為然哉則三十而娶二十而嫁説嫁娶之限蓋不得復過此爾故舜年三十無室書稱曰鰥周禮云女子年二十未有嫁者仲春之月奔者不禁奔者不待禮聘因媒請嫁而已矣寧謂禮為夫之姊妹服長殤年十九至十六如此男不必三十而娶女不必二十而嫁明矣此又士大夫之禮文十二年穀梁傳五廟之孫祖廟未毁雖為庶人冠娶妻必告告於君也文王世子右通論二月綏多士女綏安也冠子娶婦之時也夏小正始冠緇布冠自諸侯下逹冠而敝之可也本太古耳非時王之法服也玄冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也皆始冠之冠也玄冠委貌也諸侯緇布有緌尊者飾也繢或作繪緌或作㽔玉藻公冠自為主家語作公冠則以卿為賓無介公自為主迎賓揖升自阼立於席公堂深異於士下家語席有北字既醴降自阼君尊故其降也不使就賓階也家語此句上有其醴也則如士饗之以三獻之禮字其餘自為主者其降也自西階以異不敢終於正者家語作諸侯非公而自為主其所以異皆降自西階其餘皆公同也為迎賓升阼之等此家語無句公玄端與皮辨皆韠玄端緇布冠及玄冠之服也家語無公皆韠字下有異字疑是韠字之誤朝服素韠玄端諸侯之服皮辨天子朝服韠從裳色皆素也公冠四加玄冕四當為三玄當為衮字之誤家語冕下有祭字饗之以三獻之禮饗賓也士於賓以一獻之禮家語屬上文無介於饗而贊冠者退為衆賓者君禮於臣本無介矣為家語在卿賓之下無樂亦饗時也冠者成人代父始宜盡孝子之感不可以歡樂取之孔子曰取婦之家三日不舉樂思嗣親也然則冠禮一舉樂可也春秋左氏傳曰以金石之樂莭之為冠時為莭也注一下疑脫日不二字皆玄端君臣同服玄家語無無樂皆端字其酬幣朱錦采四馬其慶也其慶賓也如是馬家語作其酬幣於賓則束帛乘無其慶也字天子擬焉擬公禮也太子與庶子其冠皆自為主王侯自主之重言天子誤也天子以下家語作王太子庶子之冠擬焉皆天子自為主按鄭注重言天子恐皆下本有天子字一本作重言太子其禮與士同饗賓也皆同家禮作其禮與士無變饗下有食字大戴禮公冠近本作公符誤也以家語冠頌萹懿子問諸侯之冠其所為賓主何也孔子答之如此右天子諸侯冠禮邾隱公既即位將冠使大夫因孟懿子問禮於孔子孔子曰其禮如世子之冠雖天子之元子猶士也其禮無變天子無生而貴者故也懿子曰天子未冠即位長亦冠乎孔子曰古者王世子雖幼其即位則尊為人君人君治成人之事者何冠之有懿子曰然則諸侯之冠異天子與怪天子無冠禮而諸侯之冠如世子之冠故問之孔子曰君薨而世子主喪是亦冠也已人君無殊也諸侯亦人君與天子無異懿子曰今邾君之冠非禮也懿子言諸侯無冠則邾君之冠非也孔子曰諸侯之有冠禮也夏之末造也有自來矣今無譏焉言有所從來故今無所譏天子冠者武王崩成王年十有三而嗣立周公居冡宰攝政以治天下明年夏六月既葬周書曰嵗十有二月武王崩元年六月葬冠成王而朝於祖以見諸侯示有君也周公命祝雍作頌曰逹而勿多也家語勿多作未幼字誤今從大戴鄭曰辭多則史少則不逹祝雍辭曰使王近於民常得民之心也逺於年言夀長嗇於時嗇愛也愛於時不以無事棄日也惠於財施舍不吝也親賢而任能其頌曰令月吉日王始加元服去王幼志心是衮職朱子曰衮天子之盛服衮職謂天子之職業也是字本闕今補或曰當作一心欽若昊天欽敬若順六合是式天地四方謂之六合言為之法式率爾祖考永永無極此周公之制也家語冠頌襄公九年十二月晉悼公以諸侯之師伐鄭而還公送晉侯晉侯以公宴於河上問公年季武子對曰會於沙隨之嵗寡君以生沙隨在成十六年晉侯曰十二年矣是謂一終一星終也嵗星十二嵗而一周天國君十五而生子冠而生子禮也冠成人之服故必冠而後生子君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之祼謂灌鬯酒也享祭先君行將也以金石之樂節之以鐘磬為舉動之節以先君之祧處之諸侯以始祖之廟為祧今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠於成公之廟成公今衛獻公之曽祖從衛所處假鐘磬焉禮也左氏傳曽子問曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何冠者賓及贊者孔子曰內喪則廢內喪同門也外喪則冠而不醴不醴不醴子也徹饌而掃即位而哭如冠者未至則廢其廢者喪成服因喪而冠如將冠子而未及期日而有齊衰大功小功之喪則因喪服而冠廢吉禮而因喪冠俱成人之服及至也除喪不改冠乎孔子曰天子賜諸侯大夫冕辨服於太廟歸設奠服賜服於斯乎有冠醮無冠醴酒為醮冠禮醴重而醮輕此服賜服酌用酒尊賜也不醴明不為改冠改冠當醴之父沒而冠則已冠掃地而祭於禰已祭而見伯父叔父而后饗冠者饗謂禮之曽子問以喪冠者雖三年之喪可也既冠於次入哭踊三者三乃出言雖者明齊衰以下皆可以喪冠也始遭喪以其冠月則喪服因冠矣非其冠月待變除卒哭而冠次廬也雖或為唯大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以取婦已雖小功既卒哭可以冠取妻下殤之小功則不可此皆為可用吉禮之時父大功卒哭而可以冠子嫁子小功卒哭而可以取婦已大功卒哭而可以冠子小功卒哭而可以取妻必偕祭乃行也下殤小功齊衰之親除喪而後可為昏禮凡冠者其時當冠則因喪而冠之雜記右冠變禮女子十有五年而笄謂應年許嫁者女子許嫁笄而字之其未許嫁者二十則笄內則女子許嫁笄而字以許嫁為成人曲禮女子許嫁笄而醴之稱字許嫁已受納徴禮也笄女之禮猶冠男也使主婦女賓執其禮士昏記女雖未許嫁年二十而笄禮之婦人執其禮雖未許嫁年二十亦為成人矣禮之酌以成人言婦人執其禮明非許嫁之笄也燕則鬈首既笄之後去之猶若女有鬌紒也雜記右女子笄子三十而有室室猶妻也女子二十而嫁有故二十三年而嫁故謂父母之喪聘則為妻聘問也妻之言齊也以禮見問則得與夫敵體奔則為妾妾之言接也聞彼有禮走而往焉以得接見於君子也奔或為衒內則婦人謂嫁曰歸婦人生以父母為家嫁以夫為家故謂嫁曰歸明有二歸之道隱二年公羊傳右嫁娶繫之以姓而弗别綴之以食而弗殊雖百世而昏姻不通者周道然也周之禮所建者長也姓正姓也始祖為正姓髙祖為庶姓繫之弗别謂若今宗室屬籍也周禮小史掌定世繫辨昭穆大傳取妻不取同姓故買妾不知其姓則卜之為其近禽獸也妾賤或時非媵取之於賤者世無本繫曲禮右不取同姓司空季子曰昔少典娶於有蟜氏生黃帝炎帝賈侍中曰少典黃帝之先有蟜諸侯也炎帝神農也虞唐云少典黃帝炎帝之父昭謂申農三皇也在黃帝前黃帝滅其子孫耳明非神農可知也言生者謂二帝本所出也內傳髙陽髙辛各有才子八人謂其裔子耳賈君得之黃帝以姬水成炎帝以薑水成姬薑水名成謂所生長以成功也成而異德故黃帝為姬炎帝為薑異姓則異類雖近男女相及以生民也謂有屬名相及嫁取也同姓雖逺男女不相及畏黷敬也畏褻黷其類黷則生怨怨亂育災災育滅性育生也是故娶妻避其同姓畏亂災也國語晉語衛公使其大夫求婚於季氏桓子問禮於孔子孔子曰同姓為宗有合族之義故繫之以姓而弗别綴之以食而弗殊君有食族人之禮親盡不異之殊食多少也雖百世婚姻不得通周道然也桓子曰魯衛之先雖寡兄弟今已絶逺矣可乎孔子曰固非禮也夫上治祖禰以尊尊也下治子孫以親親也旁治昆弟所以敦睦也此先王不易之教也家語晉侯有疾子産曰僑聞之內官不及同姓內官嬪御其生不殖殖長也美先盡矣則相生疾同姓之相與先美矣美極則盡盡則生病君子是以惡之故志曰買妾不知其姓則卜之男女辨姓禮之大司也辨别也今君內實有四姬焉同姓姬四人其無乃是也乎昭元年左氏傳取妻不取同姓以厚别也厚猶逺也故買妾不知其姓則卜之妾言買者以其賤同之於衆物也士庶之妾恆多凡庸有不知其姓故也以此坊民魯春秋猶去夫人之姓曰吳其死曰孟子卒吳太伯之後魯同姓也昭公取焉去姬曰吳而已至其死亦略云孟子卒不書夫人某氏薨孟子蓋其且字坊記陳司敗問昭公知禮乎孔子曰知禮陳國名司敗官名即司寇也昭公魯君名稠習於威儀之莭當時以為知禮故司敗以為問而孔子答之如此孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬姓期名孔子弟子名施司敗揖而進之也相助匿非曰黨禮不娶同姓而魯與吳皆姬姓謂之吳孟子者諱之使若宋女子姓者然巫馬期以告子曰丘也幸苟有過人必知之孔子不可自謂諱君之惡又不可以娶同姓為知禮故受以為過而不辭論語天子有后有夫人有世婦有嬪有妻有妾妻八十一御妻周禮謂之女御以其御序於王之燕寢妾賤者公侯有夫人有世婦有妻有妾貶於天子也無后與嬪去上中曲禮王御不參一族御婦官也參三也一族一父子也故取姪娣以備三不參一族之女國語周語典瑞穀圭以聘女穀圭亦王使之瑞節穀善也其飾若粟文然其聘女則以納徴焉春官榖圭七寸天子以聘女納徴加於束帛邉璋七寸射四寸天子以巡守射琰出者也大璋亦如之諸侯以聘女亦納徴加于束帛也大璋者以大璋之文飾之也亦如之者如邉璋七寸射四寸考工記玉人國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷言玉女者美言之也君子於玉比德焉祭統納女於天子曰備百姓於國君曰備酒漿於大夫曰備掃灑納女猶致女也壻不親迎則女之家遣人致之此其辭也姓之言生也天子皇后以下百二十人廣子姓也酒漿掃灑賤人之職也曲禮大昏既至冕而親迎詳見昏義親迎其禮奈何曰諸侯以屨三兩加琮大夫庶人以屨二兩加束修二曰某國寡小君使寡人奉不珍之琮不珍之履禮夫人貞女夫人曰有幽室數辱之産未諭於傅姆之教得承執衣裳之事敢不敬拜祝祝答拜夫人受琮取一兩履以履女正笄衣裳而命之曰往矣善事爾舅姑以順為宫室無二爾心無敢回也女拜乃親引其手授夫於户夫引手出户夫行女從拜辭父於堂拜諸母於大門夫先升輿執轡女乃升輿轂三轉然後夫下先行大夫士庶人稱其父曰某之父某之師友使某執不珍之屨不珍之束修敢不敬禮某氏貞女母曰有草茅之産未習於織紝紡績之事得奉箕帚之事敢不敬拜説苑右天子諸侯大夫昏禮桓公八年冬祭公來遂逆王后於紀祭公諸侯為天子三公者王使魯主昏故祭公來受命而迎也天子無外故因稱王后卿不書舉重略輕禮也天子娶於諸侯使同姓諸侯為之主祭公來受命於魯故曰禮氏春秋左傳祭公者何天子之三公也天子置三公九卿二十七大夫八十一元士凡百二十官下應十二子祭者采也天子三公氏采稱爵何以不稱使據宰周公稱使婚禮不稱主人時王者有母也遂者何生事也生猶造也專事之辭大夫無遂事此其言遂何成使乎我也以上來無事知遂成使於我其成使乎我奈何使我為媒可則因用是往逆矣婚禮成於五先納采問名納吉納徴請期然後親迎時王者遣祭公來使魯為媒可則因用魯往逆之不復成禮疾王者不重妃匹逆天下之母若逆婢妾將謂海內何哉故譏之女在其國稱女此其稱王后何王者無外其辭成矣公羊傳其不言使焉何也不正其以宗廟之大事即謀於我故弗與使也時天子命祭公就魯共卜擇紀女可中后者便逆之不復反命遂繼事之辭也其曰遂逆王后故略之也以其遂逆無禮故不書逆女而曰王后略之不以禮稱之或曰天子無外王命之則成矣四海之濱莫非王臣王命紀女為后則已成王后不如諸侯入國乃稱夫人或説是公春秋左氏説曰王者至尊無敵無親迎之禮祭逆王后未致京師不稱后知天子不行而禮成也鄭君釋之曰大姒之家在郃之陽在渭之涘文王親迎於渭即天子親迎之明文矣天子雖尊其於后猶夫婦夫婦判合禮同一體所謂無敵豈施此哉禮記哀公問曰冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗社之主君何謂已重乎此言親迎繼先聖之後為天地宗廟社稷之主非天子則誰乎穀梁傳九年春紀季薑歸於京師季薑桓王后也書字者申父母之尊薑紀姓為之中者歸之也中謂關與昏事春秋榖梁傳其辭成矣則其稱紀季薑何自我言紀父母之於子雖為天王后猶曰吾季薑明子尊不加於父母書紀薑歸者明魯為媒當有送迎之禮公羊傳靈王求后於齊齊侯問對於晏桓子桓子對曰先王之禮有之天子求后於諸侯諸侯對曰夫婦所生若而人不敢譽亦不敢毁故曰若而人妾婦之子若而人言非適也無女而有姊妹及姑姊妹則曰先守某公之女若而人齊侯許昏王使隂里結之隂里周大夫結成也為十五年劉夏逆王后傳襄公十二年左氏傳劉夏逆王后於齊劉采地夏名也天子卿書字劉夏非卿故書名天子無外所命則成故不言逆女官師從單靖公逆王后於齊卿不行非禮也官師劉夏也天子官師非卿也劉夏獨過魯告昏故不書單靖公天子不親昏使上卿逆而公監之故曰卿不行非禮襄十五年春秋左氏傳嶽曰有鰥在下曰虞舜帝曰我其試哉女於時觀厥刑於二女釐降二女於媯汭嬪於虞帝曰欽哉女以女與人也時是刑法也二女堯二女娥皇女英也此堯言其將試舜之意也釐理降下也媯水名水北曰汭蓋舜所居之地嬪婦也虞舜氏也史言堯治裝下降二女於媯水之北使為舜婦於虞氏之家也欽哉堯戒二女之辭即禮所謂往之女家必敬必戒者况以天子之女嫁於匹夫尤不可不深戒之也典堯何彼穠矣美王姬也雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德也詩序莊公元年夏單伯逆王姬逆之者何使我主之也逆者魯自往之文方使魯為父母主嫁之故與魯使自逆之不言於京師者使魯主之故使若自魯女無使受之天子嫁女於諸侯必使諸侯同姓者主之諸侯與天子同姓者諸侯嫁女於大夫必使大夫同姓者主之大夫與諸侯同姓者不自為主者尊卑不敵其行昏姻之禮則傷君臣之義行君臣之禮則廢昏姻之好故必使同姓有血脈之屬宜為父道與所適敵體者主之禮尊者嫁女於卑者必特風旨為卑者不敢先求亦不可斥與之者申陽倡隂和之道天子嫁女於諸侯偹姪娣如諸侯之禮義不可以天子之尊絶人繼嗣之路公羊傳秋築王姬之館於外公在諒隂慮齊侯當親迎不忍便以禮接於廟又不敢逆王命故築舍於外為外禮也齊強魯弱又委罪於彭生魯不能讐齊然喪制未闋故異其禮得禮之變春秋左氏傳築之禮也于外非禮也以言外知有築內之道也于外非禮也禮同姓本有主嫁女之道必闕地於夫人之下羣公子之上也時魯以將嫁女於讐國故築於外其築之何以禮據禮當豫設主王姬者必為之改築於路寢則不可於寢則嫌皆所以逺别也羣公子之舍謂女公子也則以卑矣以為大卑其道必為之改築者也以上傳言爾知當築夫人之下羣公子之上公羊傳主王姬者必自公門出公門朝之外門主王姬當設几筵於宗廟以俟迎者故在公門之內築王姬之館於廟則已尊於寢則已卑為之築莭矣築之外變之正也築之外變之為正何也仇讐之人非所以接昏姻也衰麻非所以接辨冕也親迎服祭服者重昏姻也公時有桓之喪穀梁傳文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子載年合配也洽水名嘉婚禮也大邦莘國也子大姒也言天於文王之初年而默定其配所以洽陽渭涘當文王將昏之期而大邦有子也蓋曰非人之所能為也大邦有子俔天之妹文定厥祥親迎於渭造舟為梁不顯其光俔磬也韓詩作磬説文云俔譬也文禮祥吉也言卜得吉而以納幣之禮定其祥也造作梁橋也作船兩兩比之而加版於其上以通行者即今之浮橋也傳曰天子造舟諸侯維舟大夫方舟士特舟張子曰造舟為梁文王所制而周世遂以為天子之禮也大雅大明韓侯取妻汾王之甥蹶父之子韓侯迎止於蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門此言韓侯既覲而還遂以親迎也汾王厲王也蹶父周之卿士姞姓也諸娣諸侯一娶九女二國媵之皆有娣姪也祁祁徐靚也如雲衆多也大雅韓奕隱公二年九月紀履緰來逆女紀履緰者何紀大夫也以逆女不稱使知為大夫何以不稱使婚禮不稱主人為飬亷逺耻也然則曷稱稱諸父兄師友宋公使公孫夀來納幣則其稱主人何辭窮也辭窮者何無母也禮有母母當命諸父兄師友稱諸父兄師友以行宋公無母莫使命之辭窮故自命之自命之則不得不稱使然則紀有母乎曰有以不稱使知有母有則何以不稱母據非主人何不稱母通使文母不通也禮婦人無外事但得命諸父兄師友稱諸父兄師友以行耳母命不得逹故不得稱母通使文所以逺别也外逆女不禮書此何以書據伯姬歸於宋不書逆人譏何譏爾譏始不親迎也禮所以必親迎者所以示男先女也於廟者告本也夏后氏逆於庭殷人逆於堂周人逆於户始不親迎昉於此乎前此矣以惠公妃匹不以正嫌無前也前此則曷為始乎此託始焉爾焉爾猶於是也曷為託始焉爾據納幣不托始春秋之始也春秋正夫婦之始也夫婦正則父子親父子親則君臣和君臣和則天下治故夫婦者人道之始王教之端內逆女常書外逆女但疾始不常書者明當先自正躬自厚而薄責於人故略外也女曷為或稱女或稱婦或稱夫人女在其國稱女未離父母之辭紀履緰來逆女是也在塗稱婦在塗見夫服從之辭公子結媵陳人之婦是也入國稱夫人入國則尊尊有臣子之辭夫人薑氏入國也紀無大夫書紀履緰者重昏禮也公羊傳逆女親者也親者謂自逆之也使大夫非正也穀梁傳桓公三年秋公子翬如齊逆女禮君有故則使卿逆修先君之好故曰公子昏禮雖奉時君之命其言必稱先君以為辭故公子翬逆女傳稱修先君之好公子遂逆女傳稱尊君命互舉其義九月齊侯送薑氏於歡歡魯地已去齊國故不言女未至於魯故不稱夫人齊侯送薑氏非禮也凡公女嫁於敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之春秋左傳諸侯越境送女非禮也以言薑氏也禮送女父母不下堂姑姊妹不出門公羊傳禮送女父不下堂母不出祭門諸母兄弟不出闕門祭門廟門也闕兩觀也在祭門之外父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般申之曰謹慎從爾父母之言般囊也所以盛朝夕所須以偹舅姑之用送女踰竟非禮也公會齊侯於歡無譏乎齊侯送女踰竟逺至於歡嫌會非禮之人當有譏曰為禮也齊侯來也公會逆而會之可也為親迎之禮子貢曰冕而親迎不已重乎冕祭服孔子曰合二姓之好以繼萬世之後何謂已重乎穀梁傳冬齊仲年來聘致夫人也古者女出嫁又使大夫隨加聘問存謙敬序殷勤也在魯而出則曰致女在他國而來則總曰聘故傳以致夫人釋之左氏傳齊孝公夫人孟姬華氏長女也齊國稱其貞孝公聞之修禮親迎於華氏之室父母送之不下堂母醮之房中父戒之東階之上諸母戒之兩階之間姑姊妹戒之門內可謂能行禮矣列女傳公子結媵陳人之婦於鄄媵者何諸侯娶一國則二國往媵之以姪娣從言往媵女者禮君不求媵二國自往媵夫人所以一夫人之尊姪者何兄之子也娣者何弟也諸侯一聘九女諸侯不再娶必以姪娣從之者欲使一人有子二人喜也所以防嫉妬令重繼嗣也因以備尊尊親親也九者極陽數也不再娶者所以莭人情開媵路莊十九年公羊傳莊公二十二年冬公如齊納幣納幣者納徴禮也禮曰主人受幣士受儷皮昏是也禮言納徴春秋言納幣者春秋質也凡禮皆用鴈取其知時候唯納徴用玄纁束帛儷皮玄纁取其順天地也儷皮者鹿皮所以重吉也親納幣非禮也時莊公實以淫佚大惡不可言故因其有事於納幣以無亷耻為譏不譏喪娶者舉淫為重也春秋公羊傳納幣大夫之事也禮有納采采擇女之德性也其禮用鴈為贄者取順隂陽往來有問名問女名而卜之知吉凶也其禮如納采有納徴徴成也納幣以成昏有告期告迎期四者偹而後娶禮也公之親納幣非禮也故譏之公母喪未再期而圖昏傳無譏文但譏親納幣者喪昏不待貶絶而罪惡見穀梁傳二十四年夏公如齊逆女親迎恆事也不志此其志何也不正其親迎於齊也秋公至自齊迎者行見諸舍見諸諸之也言瞻望夫人乘車先至非正也春秋穀梁傳八月丁丑夫人薑氏入戊寅大夫宗婦覿用幣宗婦同姓大夫之婦禮小君至大夫執贄以見明臣子之道莊公欲奢夸夫人故使大夫宗婦同贄俱見哀薑至公使宗婦覿用幣非禮也傳不言大夫唯舉非常御孫曰男贄大者玉帛公侯伯子男執玉諸侯世子附庸孤卿執帛小者禽鳥卿執羔大夫執鴈士執雉以章物也章所執之物别貴賤女贄不過榛栗棗修以告虔也榛小栗修脯虔敬也皆取其名以示敬今男女同贄是無别也男女之别國之大莭也而由夫人亂之無乃不可乎春秋左氏傳用者不宜用也不宜用幣為贄也見用幣非禮也以文在覿下不使齎見知非禮也然則曷云棗栗云乎腵修云乎腵修者脯也禮婦人見舅姑以棗栗為贄見女姑以腵修為贄見夫人至尊兼而用之云乎辭也棗栗取其自謹敬脯修取其斷斷自修正執此者若其辭云爾所以敘情配志也日者禮夫人至大夫皆郊迎明日大夫宗婦皆見故著其明日也大夫妻言宗婦者大夫為宗子者也公羊傳禮大夫不見夫人不言及不正其行婦道故列數之也男子之贄羔鴈雉腒贄所以至者也上大夫用羔取其從羣帥而不黨也下大夫用鴈取其知時飛翔有行列也士冬用雉夏用腒取其耿介交有時别有倫也腒臘也雉必用死為其不可生服也夏用腒偹腐臭也婦人之贄棗栗腵修棗取其蚤自矜莊栗取其敬栗腵修取斷斷自修整用幣非禮也榖梁傳文公二年冬公子遂如齊納幣傳曰禮也僖公喪終此年十一月則納幣在十二月也士昏六禮其一納采納徴始有玄纁束帛諸侯則謂之納幣其禮與士禮不同蓋公為太子時已行昏禮禮也凡君即位好舅甥修昏姻娶元妃以奉粢盛孝也謂諒暗既終嘉好之事通於外內外內之禮始偹此除凶之即位也於是遣卿申好舅甥之國修禮以昏姻也元妃嫡夫人奉粢盛共祭祀孝禮之始也春秋左氏傳納幣不書此何以書譏何譏爾譏喪娶也娶在三年之外則何譏乎喪娶據逆在四年三年之內不圖婚僖公以十二月薨至此未滿二十五月又禮先納采問名納吉乃納幣此四者皆在三年之內故云爾娶者大吉也合二姓之好傳之於無窮故為大吉以為有人心焉者則宜於此焉變矣變者變慟哭泣也有人心念親者聞有欲為已圖婚則當變慟哭泣矣况乃至於納幣成婚哉公羊傳四年夏迎婦薑于齊稱婦有姑之辭卿不行非禮也禮諸侯有故則使卿逆君子是以知出薑之不允於魯也允信也始來不見尊貴故終不為國人所敬信也文公薨而見出故曰出薑曰貴聘而賤逆之公子遂納幣是貴聘也君而卑之立而廢之君小君也不以夫人禮迎是卑廢之不允宜哉春秋左氏傳成公八年春宋公使華元來聘昏聘不使卿今華元將命故特書之宋公無主昏者自命之故稱使也聘共姬也穆薑之女成公姊妹為宋共公夫人聘不應使卿故傳發其事而已夏宋公使公孫夀來納幣禮也納幣應使卿也冬衛人來媵古者諸侯娶適夫人及左右媵各有姪娣皆同姓之國國三人凡九女所以廣繼嗣也魯將嫁伯姬於宋故衛來媵之衛人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否必以同姓者參骨肉至親所以息隂訟九年二月伯姬歸於宋宋不使卿逆非禮夏季孫行父如宋致女女嫁三月又使大夫隨加聘問謂之致女所以致成婦禮篤昏姻之好晉人來媵媵伯姬也禮也同姓故姓又明年齊人來媵注異來媵非禮也春秋左氏傳晉韓須如齊逆女須韓起之子逆少薑齊陳無宇送女致少薑少薑有寵於晉侯晉侯謂之少齊為立别號所以寵異之謂陳無宇非卿欲使齊以適夫人禮送少薑執諸中都中都晉邑少薑為之請曰送從逆班班列也畏大國也猶有所易是以亂作韓須公族大夫陳無宇上大夫言齊畏晉改易禮制使上大夫送遂致此執辱之罪蓋少薑謙以示譏昭二年左氏傳鄭公子忽如陳逆婦媯陳針子送女先配而後祖針子曰是不為夫婦誣其祖矣非禮也何以能育針子陳大夫禮逆婦必先告祖廟而後行故楚公子圍稱告莊共之廟鄭忽先逆婦而後告廟故曰先配而後祖隱八年左氏傳莊公二十七年莒慶來逆叔姬大夫越竟逆女非禮也禮大夫任重為越竟逆女於政事有所損曠故竟內乃得親逆所以屈私赴公也言叔姬者婦人以字通言叔通賤故略與婦同文重乖離也春秋公羊傳諸侯之嫁子於大夫主大夫以與之君不敵臣人宣五年注云婚禮主設几筵於廟以待迎者諸侯大夫尊卑不敵故使大夫為之主來者接內也不正其接納故不與夫婦之稱也接內謂與君為禮也夫婦之稱當言迎女穀梁傳來宣五年齊髙固逆子叔姬傳同宣公五年秋九月齊髙固來迎叔姬髙固齊大夫不書女歸降於諸侯自為也適諸侯稱女適大夫稱字所以别尊卑也冬齊髙固及子叔姬來反馬也禮送女留其送馬謙不敢自安三月廟見遣使反馬髙固遂與叔姬俱寧故經傳具見以示譏春秋左氏傳楚公子圍聘於鄭且娶於公孫段氏將以衆逆以兵入逆婦子産患之使子羽辭曰以敝邑褊小不足以容從者請墠聼命欲於城外除地為墠行昏禮令尹命太宰伯州犁對曰君辱貺寡大夫圍謂圍將使豐氏撫有而室豐氏公孫段也圍布几筵告於莊共之廟而來莊王圍之祖共王圍之父若野賜之是委君貺於草莾也是寡大夫不得列於諸卿也言不得從卿禮不寧唯是又使圍蒙其先君蒙欺也告先君而來不得成禮於女氏之廟故以為欺先君將不得為寡君老大臣稱老懼辱命而黜退其蔑以復矣昭元年左氏傳俟我於著乎而充耳以素乎而尚之以瓊華乎而賦也俟待也我嫁者自謂也著門屏之間也充耳以纊縣瑱所謂紞也尚加也瓊華美石似玉者即所以為瑱也東萊吕氏曰昏禮壻往婦家親迎既奠鴈御輪而先歸俟於門外婦至則揖以入時齊俗不親迎故女至壻門始見其俟已也俟我於庭乎而充耳以青乎而尚之以瓊瑩乎而庭在大門之內寢門之外瓊瑩亦美石似玉者吕氏曰此昏禮所謂壻道婦及寢門揖入之時也俟我於堂乎而充耳以黃乎而尚之以瓊英乎而瓊英亦美石似玉者吕氏曰升階而後至堂此昏禮所謂升自西階之時也齊風著大司徒施十有二教三曰以隂禮教親則民不怨隂禮謂男女之禮婚姻以時則男不曠女不怨地官媒氏掌萬民之判判半也得偶為合主合其半成夫婦也喪服傳曰夫妻判合鄭司農云主萬民之判合凡男女自成名以上皆書年月日名焉鄭司農云成名謂子生三月父名之令男三十而娶女二十而嫁二三者天地相承覆之數也易曰參天兩地而倚數凡娶判妻入子者皆書之書之者以别未成昏禮者鄭司農云入子者謂嫁女者也玄謂言入子者容媵姪娣不聘之者仲春之月令會男女中春隂陽交以成昏禮順天時也於是時也奔者不禁重天時權許之也若無故而不用令者罰之無故謂無喪禍之變也有喪禍者娶得用非中春之月雜記曰已雖小功既卒哭可以冠子娶妻司男女之無夫家者而會之司猶察也無夫家謂男女之鰥寡者凡嫁子娶妻入幣純帛無過五兩純實緇字也納幣用緇婦人隂也凡于娶禮必用其類五兩十端也必言兩言欲得其配合之名十者象五行十日相成也士大夫乃以玄纁束帛天子加以穀圭諸侯加以大璋同上黨正凡其黨之昏教其禮事掌其禁戒詳見首章五廟之孫祖廟未毁雖為庶人娶妻必告同上大司徒荒政十有二聚萬民十曰多昏鄭司農云多昏不偹禮而娶昏者多也地官右庶人昏禮雍雍鳴鴈旭日始旦士如歸妻逮氷未泮賦也雍雍聲之和也鴈鳥名似鵝畏寒秋南春北旭日初出貌昏禮納采用鴈親迎以昏而納采請期以旦歸妻以氷泮而納采請期逮未泮之時邶風匏有苦葉倉庚于飛熠耀其羽之子于歸皇駁其馬親結其縭九十其儀倉庚飛昏姻時也熠耀鮮明也黃白曰皇駵白曰駁縭婦人之褘也母戒女而為之施襟結縭也九其儀十其儀言其儀之多也豳風東山篇曽子問曰昏禮既納幣有吉日女之父母死則如之何吉日取女之吉日孔子曰壻使人弔如壻之父母死則女之家亦使人弔必使人弔者未成兄弟父喪稱父母喪稱母禮宜各以其敵者也父使人弔之辭云某子聞某之喪某子使某如何不淑母則若云宋蕩伯姬聞薑之喪伯姬使某如何不淑凡弔辭一耳父母不在則稱伯父世母弔禮不可廢也伯父母又不在則稱叔父母也壻已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也必致命者不敢以纍年之喪使人失嘉會之時壻免喪女之父母使人請壻弗取而后嫁之禮也請請成昏女之父母死壻亦如之女免喪壻之父母亦使人請其已葬時亦致命曽子問曰親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪布深衣縞總婦人始喪未成服之服女在塗而女之父母死則女反奔喪服期如壻親迎女未至而有齊衰大功之喪則如之何孔子曰男不入改服於外次女入改服於內次然後即位而哭不聞喪即改服者昏禮重于齊衰以下曽子問曰除喪則不復昏禮乎復猶償也孔子曰祭過時不祭禮也又何反於初重踰輕也同牢及饋饗相飲食之道曽子問曰女未廟見而死則如之何孔子曰不遷於祖不祔於皇姑壻不杖不菲不次歸葬於女氏之黨示未成婦也遷朝廟也壻雖不偹喪禮猶為之服齊衰也曽子問曰取女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之未有期三年之恩也女服斬衰曽子問大功之末可以嫁子父小功之末可以嫁子可以取婦已雖小功既卒哭可以取妻下殤之小功則不可詳見冠變禮章右昏變禮一與之齊終身不改故夫死不嫁詳見昏義右不改嫁柏舟共薑自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作詩以絶之共伯僖侯之世子詩序泛彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡他母也天只不諒人只興也中河中于河也髧髮垂貌兩髦者剪髮夾囱子事父母之飾親死然後去之蓋指共伯也我共薑自稱也儀匹之至矢誓靡無也只語助辭諒信也言柏舟則在彼中河兩髦則實我之匹雖至於死誓無他心母之于我覆育之恩如天罔極而何其不諒我之心乎不及父者疑時獨母在或非父意耳泛彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝母也天只不諒人只興也特匹也慝邪也以是為慝則其絶之甚矣鄘風魯寡陶嬰者魯門之女也少寡飬幼孤無強昆弟紡績為産魯人或聞其義將求焉嬰聞之恐不得免作歌明已之不更二也其歌曰悲夫黃鵠之早寡兮七年不雙宛頸獨宿兮不與衆同夜半悲鳴兮想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行嗚呼哀哉兮死者不可忘飛鳥尚然兮况于貞良雖有賢雄兮終不重行魯人聞之曰斯女不可得已遂不敢復求嬰寡終身不改列女傳梁寡髙行者梁之寡婦也其為人榮於色而美於行夫死早寡不嫁梁貴人多爭欲娶之者不能得梁王聞之使相聘焉髙行曰妾聞婦人之義一往而不改以全貞信之節今忘死而趨生是不信也貪貴而忘賤是不貞也棄義而從利無以為人乃援鏡持刀以割其鼻曰妾已刑矣所以不死者不忍幼弱之重孤也於是相以報王大其義而髙其行乃復其身尊其號曰髙行同上凡諸侯之女歸寧曰來夫人歸寧曰如某莊二十七年左氏傳右歸寧言告師氏言告言歸薄汚我私薄浣我衣害浣害否歸寧父母言辭也師女師也薄猶少也汚煩撋之以去其汚猶治亂而曰亂也浣則濯之而已私燕服衣禮服也害何也寧安也謂問安也上章既成綌絺之服矣此章遂告其師氏使告於君子以將歸寧之意且曰盍治其私服之汚而浣其禮服之衣乎何者當浣而何者可以未浣乎我將服之以歸寧于父母矣周南葛覃莊公二十七年冬杞伯姬來歸寧也寧問父母安否春秋左氏傳泉水衛女思歸也嫁於諸侯父母終思歸寧而不得故作詩以自見也鄭箋云國君夫人父母在則歸寧沒則使大夫寧于兄弟詩序秦嬴歸於楚秦景公妹為楚共王夫人楚司馬子庚聘於秦為夫人寧禮也子庚莊王子午也諸侯夫人父母既沒歸寧使卿故曰禮襄十二年左氏傳婦有七出不順父母無子淫僻嫉妬惡疾多口舌竊盜詳見昏義諸侯出夫人夫人比至於其國以夫人之禮行至以夫人入行道以夫人之禮者棄妻致命其家乃義絶不用此為始使者將命曰寡君不敏不能從而事社稷宗廟使使臣某敢告於執事主人對曰寡君固前辭不教矣寡君敢不敬須以俟命前辭不教謂納采時也此辭賓在門外擯者傳焉賓入致命如初主人卒辭曰敢不聼命有司官陳器皿主人有司亦官受之器皿本其所賫物也律棄妻畀所賫妻出夫使人致之曰某不敏不能從而共粢盛使某也敢告於侍者主人對曰某之子不肖不敢辟誅敢不敬須以俟命使者退主人拜送之肖似也不肖言不如人誅猶罰也如舅在則稱舅舅沒則稱兄無兄則稱夫言棄妻者父兄在則稱之命當由尊者出也唯國君不稱兄主人之辭曰某之子不肖如姑姊妹亦皆稱之姑姊妹見棄亦曰某之姑某之姊若妹不肖雜記凡諸侯之女出曰來歸夫人出曰歸於某莊二十七年左氏傳大歸曰來歸大歸者廢棄來歸也莊二十七年公羊傳子甚宜其妻父母不説出宜猶善也內則婦有三不去有所取無所歸一也與共更三年之喪二也先貧賤後富貴三也詳見昏義右出妻曽參後母遇之無恩而供飬不衰及其妻以蒸藜不熟因出之人曰非七出也參曰藜蒸小物耳吾欲使熟而不用吾命况大事乎遂出之終身不娶妻其子元請焉參告其子曰髙宗以後妻殺孝已尹吉甫以後妻放伯竒吾上不及髙宗中不比吉甫庸知其得免于非乎家語禮書綱目卷三
