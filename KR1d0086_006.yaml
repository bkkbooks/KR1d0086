body:
  text: 禮書綱目卷四婺源江永撰鄉飲酒禮嘉禮六經鄭目録云諸侯之鄉大夫三年大比獻賢者能者於其君以禮賓之與之飲酒鄉飲酒於五禮屬嘉禮鄉飲酒之禮右篇目周禮鄉大夫三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之賢者有德行者能者有道藝者衆寡謂鄉人之善者無多少也鄭司農云興賢者謂若今舉孝亷興能者謂若今舉茂才賓敬也敬所舉賢者能者玄謂變舉言興者謂合衆而尊寵之以鄉飲酒之禮禮而賓之地官主人就先生而謀賓介主人謂諸侯之鄉大夫也先生鄉中致仕者賓介處士賢者周禮大司徒之職以鄉三物教萬民而賓興之一曰六德知仁聖義中和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數鄉大夫以正月之吉受法于司徒退而須之于其鄉吏使各以教其所治以考其德行察其道藝及三年大比而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之厥明獻賢能之書于王是禮乃三年正月而一行也諸侯之鄉大夫貢士于其君蓋如此云古者年七十而致仕老于鄉里大夫名曰父師士名曰少師而教學焉恆知鄉人之賢者是以大夫就而謀之賢者為賓其次為介又其次為衆賓而與之飲酒是亦將獻之以禮禮賓之也今郡國十月行此飲酒禮以黨正每嵗邦索鬼神而祭祀則以禮屬民而飲酒于序以正齒位之説然此篇無正齒位之事焉凡鄉黨飲酒必于民聚之時欲其見化知尚賢尊長也孟子曰天下有逹尊三爵也德也齒也右謀賔介記鄉朝服而謀賓介皆使能鄉鄉人謂鄉大夫也朝服冠玄端緇帶素韠白屨今郡國行鄉飲酒之禮玄冠而衣皮辨服與禮異主人戒賓賓拜辱主人答拜乃請賓賓禮辭許主人再拜賓答拜戒警也告也拜辱出拜其自屈辱至己門也請告以其所為來之事不固辭者素所有志主人退賓拜辱退猶去也去又拜辱者以送謝之介亦如之如戒賓也右戒賓介記不宿戒再戒為宿戒禮將有事先戒而復宿戒乃席賓主人介席敷席也夙興往戒歸而敷席賓席牖前南面主人席阼階上西面介席西階上東面衆賓之席皆不屬焉席衆賓于賓席之西不屬者不相續也皆獨坐明其德各特尊兩壺於房户間斯禁有玄酒在西設篚於禁南東肆加二勺於兩壺斯禁禁切地無足者玄酒在西上也肆陳也設洗於阼階東南南北以堂深東西當東榮水在洗東篚在洗西南肆榮屋翼右設席陳器記蒲筵緇布純筵席也純緣也尊綌幂賓至徹之綌葛也幂覆尊巾也羮定肉謂之羮定猶熟也主人速賓賓拜辱主人答拜還賓拜辱速召也還猶退介亦如之如速賓也賓及衆賓皆從之從猶隨也言及衆賓介亦在其中右速賓記其牲狗也狗取擇人亨於堂東北祖陽氣之所始也陽氣主飬易曰天地飬萬物聖人飬賢以及萬民主人一相迎於門外再拜賓賓答拜拜介介答拜相主人之吏贊傳命者揖衆賓差益卑也拜介揖衆賓皆西南面主人揖先入揖揖賓也先入門而西面賓厭介入門左介厭衆賓入衆賓皆入門左北上皆入門西東面賓之屬相厭變于主人也推手曰揖引手曰厭今文皆作揖又曰衆賓皆入左無門主人與賓三揖至於階三讓主人升賓升主人阼階上當楣北面再拜賓西階上當楣北面答拜三揖者將進揖當陳揖當碑揖楣前梁也復拜拜賓至此堂尊之右迎賓記立者東面北上若有北面者則東上賢者衆寡無常也或統于堂或統于門主人坐取爵於篚降洗將獻賓也賓降從主人也主人坐奠爵於階前辭重以已事煩賓也事同曰讓事異曰辭賓對對答也賓主之辭未聞主人坐取爵興適洗南面坐奠爵於篚下盥洗已盥乃洗爵致潔敬也今文無奠賓進東北靣辭洗必進東行示情主人坐奠爵于篚興對賓復位當西序東面言復位者明始降時位在此主人坐取爵沃洗者西北面沃洗者主人之羣吏卒洗主人一揖一讓升俱升古文一作一賓拜洗主人坐奠爵遂拜降盥復盥為手坌汙賓降主人辭賓對復位當西序卒盥揖讓升賓西階上疑立疑讀為仡然從于趙盾之仡疑然立自定之貌主人坐取爵實之賓之席前西北面獻賓獻進也進酒于賓賓西階上拜主人少退少退少辟賓進受爵以復位主人阼階上拜送爵賔少退復位復西階上位薦脯醢薦進也進之者主人有司賓升席自西方升由下也升必中席乃設折爼牲體枝解莭折右爼主人阼階東疑立賓坐左執爵祭脯醢坐坐于席祭脯醢者以右手奠爵於薦西興右手取肺卻左手執本坐弗繚右絶末以祭尚左手嚌之興加于爼興起也肺離之本端厚大者繚猶紾也大夫以上威儀多紾絶之尚左手者明垂紾之乃絶其末嚌嘗也坐挩手遂祭酒挩拭也古文挩作説興席末坐啐酒啐亦嘗也降席坐奠爵拜告旨執爵興主人阼階上答拜降席席西也旨美也賓西階上北面坐卒爵興坐奠爵遂拜執爵興主人阼階上答拜卒盡也于此盡酒者明此席非専為飲食起右獻賓記獻用爵其他用觶爵尊不褻用之凡舉爵三作而不徒爵謂獻賓獻大夫獻工皆有薦者按此條後樂賓章獻上及有遵章通用當互考薦脯五挺橫祭于其上出自左房挺猶膱也鄉射禮曰祭半膱膱長尺有二寸左在東陽也陽主飬房饌陳處也冠禮之饌脯醢南上曲禮曰以脯修置者左朐右末後凡祭脯醢通用爼由東壁自西階升亨狗既孰載之爼饌于東方賓爼脊脅肩肺主人爼脊脅臂肺介爼脊脅胳肺肺皆離皆右體進腠凡牲前脛骨三肩臂臑也後脛骨二膊胳也尊者爼尊骨卑者爼卑骨祭統曰凡為爼者以骨為主骨有貴賤凡前貴後賤離猶刲也腠理也進理謂前其本也今文胳作骼後印本胳上有肫字朱子據音疏刪去今從之賓酢主人主人獻介其爼實當于此考之以爵拜者不徒作作起也言拜既爵者不徒起起必酢主人獻介章通用坐卒爵者拜既爵立卒爵者不拜既爵降殺各從其宜不使相錯唯工不從此禮用坐卒爵者拜既爵獻介及賓介酢主人通立卒爵者不拜既爵見獻衆賓章賓降洗將酢主人主人降亦從賓也降降立阼階東西面賓坐奠爵興辭西階前也主人對賓坐取爵適洗南北面主人阼階東南面辭洗賓坐奠爵於篚興對主人復阼階東西面賓東北面盥坐取爵卒洗揖讓如初升主人拜洗賓答拜興降盥如主人禮賓實爵主人之席前東南面酢主人主人阼階上拜賓少退主人進受爵復位賓西階上拜送爵薦脯醢主人升席自北方設折爼祭如賓禮祭者祭薦爼及酒亦嚌啐不告旨酒已物也自席前適阼階上北面坐卒爵興坐奠爵遂拜執爵興賓西階上答拜自席前者啐酒席末因從北方降由便也主人坐奠爵於序端阼階上北面再拜崇酒賓西階上答拜東西牆謂之序崇充也言酒惡相充實右賓酢主人記曰主人介凡升席自北方降自南方席南上升由下降由上由便北凡主介升席降席通用主人唯此章降自方後皆降自南方又主人之爼見獻賓章介爵酢爵僎爵皆居右三爵皆飲爵也介賓之輔也酢所以酢主人也僎謂鄉人為卿大夫來觀禮者酢或為作僎或為馴古文禮僎作遵有少儀章獻介章遵者通用主人坐取觶於篚降洗賓降主人辭降賓不辭洗立當西序東面不辭洗者以其將自飲卒洗揖讓升賓西階上疑立主人實觶酬賓阼階上北面坐奠觶遂拜執觶興賓西階上答拜酬勸酒也酬之言周忠信為周坐祭遂飲卒觶興坐奠觶遂拜執觶興賓西階上答拜主人降洗賓降辭如獻禮升不拜洗不拜洗殺于獻賓西階上立主人實觶賓之席前北面賓西階上拜主人少退卒拜進坐奠觶於薦西賔已拜主人奠其觶賓辭坐取觶復位主人阼階上拜送賓北面坐奠觶於薦東復位酬酒不舉君子不盡人之歡不竭人之忠以全交也右主人酬賓記凡奠者於左不飲者不欲其妨將舉於右便也舉將舉于右見下一人觶二人舉觶章客爵居左其飲居右客爵謂主人所酬賓之爵也以優賓耳不舉奠于薦東是居左也少儀其飲居右見下一人舉觶二人舉觶章主人揖降賓降立於階西當序東面主人將與介為禮賓謙不敢居堂上主人以介揖讓升拜如賓禮主人坐取爵於東序端降洗介降主人辭降介辭洗如賓禮升不拜洗介禮殺也介西階上立不言疑者省文主人實爵介之席前西南面獻介介西階上北面拜主人少退介進北面受爵復位主人介右北面拜送爵介少退主人拜於介右降尊以就卑也今文無北面主人立於西階東薦脯醢介升席自北方設折爼祭如賓禮不嚌肺不啐酒不告旨自南方降席北面坐卒爵興坐奠爵遂拜執爵興主人介右答拜不嚌啐下賓右主人獻介介爼見獻賓章介爵居右見賓酢主人章介降洗主人復阼階降辭如初如賓酢之時卒洗主人盥盥者當為介酌介揖讓升授主人爵於兩楹之間就尊南授之介不自酌下賓酒者賓主共之介西階上立主人實爵酢於西階上介右坐奠爵遂拜執爵興介答拜主人坐祭遂飲卒爵興坐奠爵遂拜執爵興介答拜主人坐奠爵於西楹南介右再拜崇酒介答拜奠爵西楹南以爵獻衆賓主人復阼階揖降介降立於賓南右介酢主人主人西南面三拜衆賓衆賓皆答一拜三拜一拜示遍不偹禮也不升拜賤也主人揖升坐取爵於西楹下降洗升實爵於西階上獻衆賓衆賓之長升拜受者三人長其老者言三人則衆賓多矣主人拜送于衆賓右坐祭立飲不拜既爵授主人爵降復位既卒也卒爵不拜立飲立授賤者禮簡衆賓獻則不拜受爵坐祭立飲次三人以下也不拜禮彌簡每一人獻則薦諸其席謂三人也衆賓辨有脯醢亦每獻薦于其位位在下今文辨皆作遍主人以爵降奠於篚不復用也右主人獻衆賓記衆賓之長一人辭洗如賓禮于三人之中復差有尊者餘二人雖為之洗不敢辭其下不洗立卒爵者不拜既爵見獻賓章樂正與立者皆薦以齒謂其飲之次也尊樂正同于賓黨不言飲而言薦以明飲也既飲皆薦于其位樂正位西階東北面主人之贊者西面北上不與贊佐也謂主人之屬佐助主人禮事徹冪沃盥設薦俎者西面北上統於堂也與及也不及謂不獻酒無算爵然後與燕乃及之揖讓升賓厭介升介厭衆賓升衆賓序升即席序次也即就也今文厭皆為揖一人洗升舉觶於賓一人主人之吏發酒端曰舉實觶西階上坐奠觶遂拜執觶興賓席末答拜坐祭遂飲卒觶興坐奠觶遂拜執觶興賓答拜降洗升實觶立於西階上賓拜賓拜拜將受觶進坐奠觶於薦西賓辭坐受以興舉觶不授下主人也言坐受者明行事相接若親受謙也舉觶者西階上拜送賓坐奠觶於其所所薦西也舉觶者降事已右一人舉觶記將舉于右其飲居右見酬賓章樂作大夫不入後樂賢者禮賓若有尊者一人舉觶後乃入其詳見篇末及鄉射篇設席於堂亷東上為工布席也側邉曰亷燕禮曰席工于西階上少東樂正先升北面此言樂正先升立于西階東則工席在階東工四人二瑟瑟先相者二人皆左何瑟後首挎越內弦右手相四人大夫制也二瑟二人鼓瑟則二人歌也瑟先者將入序在前也相扶工也衆賓之少者為之每工一人鄉射禮曰弟子相工如初入天子相工使視瞭者凡工瞽矇也故有扶之者師冕見及階子曰階也及席子曰席也固相師之道後首者變于君也挎持也相瑟者則為之持瑟其相歌者徒相也越瑟下孔也內弦側擔之者樂正先升立於西階東正長也工入升自西階北面坐相者東面坐遂授瑟乃降降立于西方近其事工歌鹿鳴四牡皇皇者華三者皆小雅篇也鹿鳴君與臣下及四方之賓燕講道修政之樂歌也此采其已有旨酒以召嘉賓嘉賓既來示我以善道又樂嘉賓有孔昭之明德可則效也四牡君勞使臣之來樂歌也此采其勤苦王事念將父母懷歸傷悲忠孝之至以勞賓也皇皇者華君遣使臣之樂歌也此采其更是勞苦自以為不及欲咨謀于賢知而以自光明也卒歌主人獻工工左瑟一人拜不興受爵主人阼階上拜送爵一人工之長也凡工賤不為之洗薦脯醢使人相祭使人相者相其祭酒祭薦工飲不拜既爵授主人爵坐授之衆工則不拜受爵祭飲辨有脯醢不祭祭飲獻酒重無不祭也今文辨為遍大師則為之洗賓介降主人辭降工不辭洗大夫若君賜之樂謂之大師則為之洗尊之也賓介降從主人也工大師也上既言獻工矣乃言大師者大師或瑟或歌也其獻之瑟則先歌則後笙入堂下磬南北面立樂南陔白華華黍笙吹笙者也以笙吹此詩以為樂也南陔白華華黍小雅篇也今亡其義未聞昔周之興也周公制禮作樂采時世之詩以為樂歌所以通情相風切也其有此篇明矣後世衰微幽厲尤甚禮樂之書稍稍廢棄孔子曰吾自衛反魯然後樂正雅頌各得其所謂當時在者而復重雜亂者也惡能存其亡者乎且正考父校商之名頌十二篇于周大師歸以祀其先王至孔子二百年之間五篇而已此其信也主人獻之於西階上一人拜盡階不升堂受爵主人拜送爵階前坐祭立飲不拜既爵升授主人爵一人笙之長者也笙三人和一人凡四人鄉射禮曰笙一人拜于下衆笙則不拜受爵坐祭立飲辨有脯醢不祭亦受爵于西階上薦之皆于其位磬南今文辨為遍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀間代也謂一歌則一吹六者皆小雅篇也魚麗言太平年豐物多也此采其物多酒旨所以優賓也南有嘉魚言太平君子有酒樂與賢者共之也此采其能以禮下賢者賢者纍蔓而歸之與之燕樂也南山有臺言太平之治以賢者為本此采其愛友賢者為邦家之基民之父母既欲其身之夀考又欲其名德之長也由庚崇丘由儀今亡其義未聞乃合樂周南關雎葛覃卷耳召南鵲巢采繁采蘋合樂謂歌樂與衆聲俱作周南召南國風篇也王后國君夫人房中之樂歌也關雎言后妃之德葛覃言后妃之職卷耳言后妃之志鵲巢言國君夫人之德采繁言國君夫人不失職采蘋言卿大夫之妻能循其法度昔大王王季居於岐山之陽躬行召南之教以興王業及文王而行周南之教以受命大雅云刑于寡妻至于兄弟以御于家邦謂此也其始一國耳文王作邑于豐以故地為卿士之采地乃分為二國周周公所食召召公所食於時文王三分天下有其二德化被于南土是以其詩有仁賢之風者屬之召南焉有聖人之風者屬之周南焉夫婦之道生民之本王政之端此六篇者其教之原也故國君與其臣下及四方之賓燕用之合樂也鄉樂者風也小雅為諸侯之樂大雅頌為天子之樂鄉飲酒升歌小雅禮盛者可以進取也燕合鄉樂禮輕者可以逮下也春秋傳曰肆夏繁遏渠天子所以享元燕侯也文王大明綿兩君相見之樂也然則諸侯相與升歌大雅合小雅天子與次國小國之君燕亦如之與大國之君燕升歌頌合大雅其笙問之篇未聞工告於樂正曰正歌偹樂正告於賓乃降樂正降者以正歌偹無事也降立西階東北面右樂賓記獻工與笙取爵於上篚既獻奠於下篚明其異器敬也如是則獻大夫亦然上篚三爵其笙則獻諸西階上謂主人拜送爵也于工拜于阼階上者以其坐于西階東也古文無上獻賓章舉爵三作而不徒爵此章通用磬階間縮霤北面鼓之縮從也霤以東西為從鼓猶擊也大夫而特縣方賓鄉人之賢者從士禮也射則磬在東古文縮為蹙主人降席自南方不由北方由便也側降賓介不從作相為司正司正禮辭許諾主人拜司正答拜作使也禮樂之正既成將留賓為有懈惰立司正以監之拜拜其許主人升復席右立司正司正洗觶升自西階阼階上北面受命於主人主人曰請安於賓司正告於賓賓禮辭許為賓欲去留之告賓于西階司正告于主人主人阼階上再拜賓西階上答拜司正立于楹間以相拜皆揖復席再拜拜賓許也司正既以賓許告主人遂立楹間以相拜賓主人既拜揖就席司正實觶降自西階階間北面坐奠觶退共少立階間北面東西節也其南北當中庭共拱手也少立自正慎其位也已帥以正孰敢不正燕禮曰右還北面坐取觶不祭遂飲卒觶興坐奠觶遂拜執觶興洗北面坐奠于其所退立于觶南洗觶奠之示潔敬立于其南以察衆右司正舉觶記司正既舉觶而薦諸其位司正主人之屬也無獻因其舉觶而薦之賓北面坐取爼西之觶阼階上北面酬主人主人降席立于賓東初起旅酬也凡旅酬者少長以齒終于沃盥者皆弟長而無遺矣賓坐奠觶遂拜執觶興主人答拜不祭立飲不拜卒觶不洗實觶東南面授主人賓立飲卒觶因更酌以鄉主人將授主人阼階上拜賓少退主人受觶賓拜送於主人之西旅酬同階禮殺賓揖復席酬主人訖主人西階上酬介介降席自南方立于主人之西如賓酬主人之禮主人揖復席其酌實觶西南面授介自此以下旅酬酌者亦如之司正升相旅曰某子受酬受酬者降席旅序也于是介酬衆賓衆賓又以次序相酬某者衆賓姓也同姓則以伯仲别之又同則以其字别之司正退立于序端東面辟受酬者又便其贊上贊下也始升相西階西北面受酬者自介右由介東也尊介使不失故位衆受酬者受自左後將受酬者皆由西變于介也今文無衆酬者拜興飲皆如賓酬主人之禮嫌賓以下異也辨卒受者以觶降坐奠于篚辨辨衆賓之在下者鄉射禮曰辨遂酬在下者皆升遂受酬于西階上司正降復位觶南之位右旅酬記凡旅不洗敬禮殺也不洗者不祭不甚潔也既旅士不入後正禮也既旅則將燕矣使二人舉觶于賓介洗升實觶于西階上皆坐奠觶遂拜執觶興賓介席末答拜皆坐祭遂飲卒觶興坐奠觶遂拜執觶興賓介席末答拜二人亦主人之吏若有大夫則舉觶于賓與大夫燕禮曰媵爵者立于洗南西面北上序進盥洗逆降洗升實觶皆立于西階上賓介皆拜于席末拜皆進薦西奠之賓辭坐取觶以興介則薦南奠之介坐受以興退皆拜送降賓介奠于其所賓言取介言受尊卑異文今文曰賓受右二人舉觶將舉于右其飲居右見主人酬賓章司正升自西階受命于主人主人曰請坐于賓賓辭以爼至此盛禮俱成酒清肴乾賓主百拜強有力者猶倦焉張而不弛弛而不張非文武之道請坐者將以賓燕也爼者肴之貴者辭之者不敢以禮殺當貴者主人請徹爼賓許亦司正傳請告之司正降階前命弟子俟徹爼西階前也弟子賓之少者爼者主人之吏設之使弟子俟徹者明徹爼賓之義司正升立于席端待事賓降席北面主人降席阼階上北面介降席西階上北面遵者降席東南面皆立相須徹爼也遵者謂此鄉之人仕至大夫者也今來助主人樂賓主人所榮而遵法者也因以為名或有無來不來用時事耳今文遵為僎或為全賓取爼還授司正司正以降賓從之主人取爼還授弟子弗子以降自西階主人降自阼階介取爼還授弟子弟子以降介從之若有諸公大夫則使人受爼如賓禮衆賓皆降取爼者皆鄉其席既授弟子皆降復初入之位右徹爼記徹爼賓介遵者之爼受者以降遂出授從者送之主人之爼以東藏于東方説屨揖讓如初升坐説屨者謂安燕當坐也必説于下者屨賤不空居堂説屨主人先左賓先右今文説為稅乃羞羞進也所進者狗胾醢也鄉設骨體所以致敬也今進羞所以盡愛也敬之愛之所以厚賢也無算爵算數也賓主燕飲爵行無數醉而止也鄉射禮曰使二人舉觶于賓與大夫又曰執觶者洗升實觶反奠于賓與大夫皆是無算樂燕樂亦無數或間或合盡歡而止也春秋襄二十九年吳公子札來聘請觀于周樂此國君之無算右燕主人之贊者無算爵然後與見獻衆賓章賓出奏陔陔陔夏也陔之言戒也終日燕飲酒罷以陔為莭明無失禮也周禮鐘師以鐘鼓奏九夏是奏陔夏則有鐘鼓矣鐘鼓者天子諸侯偹用之大夫士鼓而已蓋建於阼階之西南鼓鄉射禮曰賓興樂正命奏陔賓降及階陔作賓出衆賓皆出主人送于門外再拜門東西面拜也賓介不答拜禮有終也右賓出記樂正命奏陔賓出至于階陔作賓若有遵者諸公大夫則既一人舉觶乃入不干主人正禮也尊者諸公大夫也謂之賓者同從外來耳大國有孤四命謂之公席于賓東公三重大夫再重席此二者于賓東尊之不與鄉人齒也天子之國三命者不齒于諸侯之國爵為大夫則不齒矣不言遵者遵者亦卿大夫公如大夫入主人降賓介降衆賓皆降復初位主人迎揖讓升公升如賓禮辭一席使一人去之如讀若今之若主人迎之于門內也辭一席謙自同于大夫大夫則如介禮有諸公則辭加席委于席端主人不徹無諸公則大夫辭加席主人對不去加席加席上席也大夫席再重右有遵者記若有諸公則大夫於主人之北西面其西面者北上統于公右舉爵三作而不徒爵見獻賓章僎爵居見賓酢主人章明日賓鄉服以拜賜拜賜謝恩惠鄉服昨日與鄉大夫飲酒之朝服也不言朝服未服以朝也今文曰賓服鄉服主人如賓服以拜辱拜賓復自屈辱也鄉射禮曰賓朝服以拜賜于門外主人不見如賓服遂從之拜辱于門外乃退右拜禮主人釋服釋服釋朝服更玄端也古釋作舍乃息司正息勞也勞賜昨日贊執事者獨云司正司正庭長也無介勞禮略也司正為賓不殺市買若因所有可也不殺則無爼薦脯醢羞同也羞唯所有在有何物徴唯所欲徴召也以告于先生君子可也告請也先生不以筋力為禮于是可以來君子國中有盛德者可者召不召唯所欲賓介不與禮瀆則褻古文與為預鄉樂唯欲鄉樂周南召南六篇之中唯所欲作不從次也不歌鹿鳴魚麗者辟國君也右息司正鄉飲酒義嘉禮七鄉飲酒之義主人拜迎賓于庠門之外入三揖而后至階三讓而后升所以致敬讓也庠鄉學也州黨曰序盥洗揚觶所以致潔也揚舉也今禮皆作騰拜至拜洗拜受拜送拜既所以致敬也拜至謂始升時拜拜賓至尊讓潔敬也者君子之所以相接也君子尊讓則不爭潔敬則不慢不慢不爭則逺于鬭辨矣不鬭辨則無暴亂之禍矣斯君子之所以免於人禍也故聖人制之以道道謂此禮鄉人士君子尊于房戶之間賓主共之也尊有玄酒貴其質也鄉人鄉大夫也士州長黨正也君子謂卿大夫士也卿大夫士飲國中賢者亦用此禮也共尊者人臣卑不敢專大惠羞出自東房主人共之也羞燕私可以自專也洗當東榮主人之所以自潔而以事賓也潔猶清也賓主象天地也介僎象隂陽也三賓象三光也讓之三也象月之三日而成魄也四面之坐象四時也隂陽助天地飬成萬物之氣也三賓象天三光者係于天也古文禮僎皆作遵天地嚴凝之氣始於西南而盛於西北此天地之尊嚴氣也此天地之義氣也天地溫厚之氣始於東北而盛於東南此天地之盛德氣也天地之仁氣也凝猶成也主人者尊賓故坐賓於西北而坐介於西南以輔賓賓者接人以義者也故坐於西北賓者接人以義言賓來以成主人之德主人者接人以仁以德厚者也故坐于東南而坐僎于東北以輔主人也以僎輔主人以其仕在官也仁義接賓主有事爼豆有數曰聖聖立而將之以敬曰禮禮以體長幼曰德聖通也所以通賓主之意也將猶奉也德也者得於身也故曰古之學術道者將以得身也是故聖人務焉術藝也得身者謂成已今名免于刑罰也言學術道則此説賓賢能之禮祭薦祭酒敬禮也嚌肺嘗禮也啐酒成禮也于席末言是席之正非專為飲食也為行禮也此所以貴禮而賤財也卒觶致實於西階上言是席之上非專為飲食也此先禮而後財之義也先禮而後財則民作敬讓而不爭矣非專為飲食言主於相敬以禮也致實謂盡酒也酒為觴實祭薦祭酒嚌肺席中唯啐酒于席末也鄉飲酒之禮六十者坐五十者立侍以聽政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明飬老也民知尊長飬老而后乃能入孝弟民入孝弟出尊長飬老而后成教成教而后國可安也君子之所謂孝者非家至而日見之也合諸鄉射教之鄉飲酒之禮而孝弟之行立矣此説鄉飲酒謂黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位之禮也其鄉射則州長春秋以禮會民而射于州序之禮也謂之鄉者州黨鄉之屬也或則鄉之所居州黨鄉大夫親為主人焉如今郡國下令長於鄉射飲酒從太守相臨之禮也孔子曰吾觀於鄉而知王道之易易也鄉鄉飲酒也易易謂教化之本尊賢尚齒而已主人親速賓及介而衆賓自從之至於門外主人拜賓及介而衆賓自入貴賤之義别矣速謂即家召之别猶明也三揖至於階三讓以賓升拜至獻酬辭讓之莭繁及介省矣至於衆賓升受坐祭立飲不酢而降隆殺之義辨矣繁盛也小減曰省辨别也尊者禮降卑者禮殺尊卑别也工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工告樂偹遂出一人揚觶乃主司正焉知其能和樂而不流也工謂樂正也樂正既告偹而降言遂出者自此至去不復升也流猶失禮也立司正以正禮則禮不失可知一人或為二人賓酬主人主人酬介介酬衆賓少長以齒終於沃洗者焉知其能弟長而無遺矣遺脫也忘也降説屨升坐修爵無數飲酒之莭朝不廢朝莫不廢夕賓出主人拜送莭文終遂焉知其能安燕而不亂也朝夕朝暮聽事也不廢之者既朝乃飲先夕則罷其正也終遂猶克偹也貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂此五行者足以正身安國矣彼國安而天下安故曰吾觀於鄉而知王道之易易也鄉飲酒之義立賓以象天立主以象地設介僎以象日月立三賓以象三光古之制禮也經之以天地紀之以日月參之以三光政教之本也日出于東僎所在也月生于西介所在也三光三大辰也天之政教出于大辰焉亨狗于東方祖陽氣之發于東方也祖猶發也狗所以飬賓陽氣生飬萬物洗之在阼其水在洗東祖天地之左海也海水之委也尊有玄酒教民不忘本也太古無酒用水而已賓必南鄉東方者春春之為言蠢也産萬物者聖也南方者夏夏之為言假也飬之長之假之仁也西方者秋秋之為言愁也愁之以時察守義者也北方者冬冬之為言中也中者藏也是以天子之立也左聖鄉仁右義偝藏也春猶蠢也蠢動生之貌也聖之言生也假大也愁讀為揫揫斂也察猶察察嚴殺之貌也南鄉鄉仁貴長大萬物也察或為殺介必東鄉介賓主也獻酬之禮主人將西賓將南介覸其間也主人必居東方東方者春春之為言蠢也産萬物者也主人者造之産萬物者也言禮之所共由主人出也月者三日則成魄三月則成時是以禮有三讓建國必立三卿三賓者政教之本禮之大參也言禮者隂也大數取象法於月也鄉飲酒義射鄉之禮所以仁鄉黨也仁猶存也射鄉食饗存生之善者也仲尼燕居鄉飲酒之禮所以明長幼之序也鄉飲酒之禮廢則長幼之序失而爭鬭之獄繁矣經解鬭變者生於相陵相陵者生於長幼無序而遺敬讓鄉飲酒之禮者所以明長幼之序而崇敬讓也長幼必序民懷敬讓故雖有鬭變之獄而無陷刑之民其有犯鬭變之獄者則飭鄉飲酒之禮家語所以十月行鄉飲酒之禮何所以復尊卑長幼之義春夏事急浚井次牆至有子使父弟使兄故以事間暇復長幼之序也白虎通禮書綱目卷四
