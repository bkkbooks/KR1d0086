body:
  text: 禮書綱目卷六十三婺源江永撰政事下通禮十二補神農氏日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑日中為市上明而下動又借噬為市嗑為合也繫辭傳古者市廛而不稅詳見財賦匠人營國面朝後市市朝一夫詳見制國內宰凡建國佐后立市設其次置其叙正其肆陳其貨賄出其度量淳制祭之以隂禮市朝者君所以建國也建國者必面朝後市王立朝而后立市隂陽相承之義次思次也敘介次也陳猶處也度丈尺也量豆區之屬鄭司農云佐后立市者始立市后立之也祭之以隂禮者市中之社先后所立杜也故書淳為敦杜子春讀敦為純純謂幅廣也制謂四長𤣥謂純制天子巡守禮所云制幣丈八尺純四􅡥與隂禮婦人之祭禮天官大宰以九職任萬民六曰商賈阜通貨賄詳見上篇司市掌市之治教政刑量度禁令量豆區斗斛之屬度丈尺也以次敘分地而經市次謂吏所治舍思次介次也若今市亭然敘肆行列也經界也以陳肆辨物而平市陳猶列也辨物物異肆也肆異則市平以政令禁物靡而均市物靡者易售而無用禁之則市均鄭司農云靡謂侈靡也以商賈阜貨而行布通物曰商居賣物曰賈阜猶盛也鄭司農云布謂泉也以量度成賈而徴儥徴召也儥買也物有定賈則買者來也以質劑結信而止訟質劑謂兩書一札而别之也以賈民禁僞而除詐賈民胥師賈師之屬必以賈民為之者知物之情僞與實詐以刑罰禁暴而去盜刑罰憲徇撲以泉府同貨而斂賖同共也同者謂民貨不售則為斂而買之民無貨則賖貰而豫之大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主市雜聚之處言主者謂其多者也百族必容來去商賈家於市城販夫販婦朝資夕賣因其便而分為三時之市所以了物極衆鄭司農云百族百姓也凡市入則胥執鞭度守門市之羣吏平肆展成奠賈上旌於思次以令市市師涖焉而聽大治大訟胥師賈師涖於介次而聽小治小訟凡市入謂三時之市市者入也胥守門察僞詐也必執鞭度以威正人衆也度謂殳也因刻丈尺耳羣吏胥師以下也平肆平賣物者之行列使之正也展之言整也成平也㑹平成市物者也奠讀為定整飭㑹者使定物價防誑豫也上旌者以為衆望也見旌則知當市也思次若今市亭也市師司市也介次市亭之屬别小者也鄭司農云思辭也次市中侯樓也𤣥謂思當為司聲之誤也凡萬民之期於市者辟布者量度者刑戮者各於其地之敘期謂欲賣買期决於市也量度者若今處斗斛及丈尺也故書辟為辭鄭司農云辭布辭訟泉物者也𤣥謂辟布市之羣吏考實諸泉入及有遺忘凡得貨賄六畜者亦如之三日而舉之得遺物者亦使置其地貨於貨之肆馬於馬之肆則主求之易也三日而無識認者舉之沒入官凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使微利利於民謂物實厚者害害於民謂物行苦者使有使阜起其賈以徴之也使亡使微抑其賈以郤之也侈靡細好使富民好奢微之而已鄭司農云亡者使有無此物則開利其道使之有凡通貨賄以璽節出入之璽節印章如今斗檢封矣使人執之以通商國凶荒札喪則市無征而作布有災害物貴市不稅為民之乏困也金銅無凶年因物貴大鑄泉以饒民凡市僞飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二𤣥謂王制曰用器不中度不粥於市兵車不中度不粥於市布帛精粗不中數幅廣狹不中量不粥於市姦色亂正色不粥於市五榖不時果實未熟不粥於市木不中伐不粥於市禽獸魚鱉不中殺不粥於市亦其類也市刑小刑憲罰中刑徇罰大刑撲罰其附於刑者歸於士徇舉以示其地之衆也朴撻也鄭司農云憲罰播其肆也國君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷謂諸侯及夫人世子過其國之市大夫內子過其都之市也市者人所交利而行刑之處君子無故不遊觀焉若遊觀則施惠以為說也國君則赦其刑人夫人世子命夫命婦則使之出罰異尊卑也此王國之市而說國君以下過市者諸侯之於其國與王同以其足以互明之凡㑹同師役市司帥賈師而從治其市政掌其賣儥之事市司司市也儥買也㑹同師役必有市者大衆所在來物以備之質人掌成市之貨賄人民牛馬兵器珍異成平也㑹者平物賈而來主成其平也人民奴婢也珍異四時食物凡賣儥者質劑焉大市以質小市以劑𤣥謂質劑者為之劵藏之也大市人民牛馬之屬用長劵小市兵器珍器之物用短劵掌稽市之書契同其度量一其淳制巡而考之犯禁者舉而罰之稽猶考也治也書契取豫市物之劵也其劵之象書兩扎刻其側杜子春云淳當為純純謂幅廣制謂匹長也皆當中度量凡治質劑者國中一旬郊二旬野三旬都三月邦國朞期內聽期外不聽謂齎劵契者來訟也以期內來則冶之後期則不治所以絶民之好訟且息文書也郊逺郊也野甸稍也都小都大都廛人掌斂市絘布總布質布罰布而入於廛府布泉也鄭司農云絘布列肆之稅布杜子春云總當為儳謂無肆立持者之稅𤣥謂總讀如租􅖽之􅖽􅖽布謂守斗斛銓衡者之稅也質布者質人之所罰犯質劑者之泉也罰布者犯市令者之泉也廛布者貨賄諸物邸舍之稅凡屠者斂其皮角筋骨入於玉府以當稅給作器物也凡珍異之有滯者斂而入於膳府珍異四時食物也不售而在廛久則將瘦臞腐敗為買之入膳夫之府所以紓民事而官不失實胥師各掌其次之政令而平其貨賄憲刑禁焉憲表縣之察其詐僞飾行儥慝者而誅罰之鄭司農云儥賣也慝惡也謂行且賣姦僞惡物者𤣥謂飾行儥慝謂使人行賣惡物于市巧飾之令欺誑置者聽其小治小訟而斷之賈師各掌其次之貨賄之治辨其物而均平之展其成而奠其賈然後令市凡天患禁貴儥者使有恆賈恆常也謂若米穀棺木而睹久雨疫病者貴賣之因天災害厄民使之重困四時之珍異亦如之薦宗廟之物凡國之賣儥各帥其屬而嗣掌其月儥買也故書賣為買鄭司農云謂官有所斥賣賈師帥其屬而更相代直月為官賣之均勞逸凡師役㑹同亦如之司暴掌憲市之禁令禁其鬭嚻者與其暴亂者出入相陵犯者以屬遊飲食於市者若不可禁則搏而戮之嚻歡也鄭司農云屬遊飲食羣飲食者司稽掌巡市而察其犯禁者與其不物者而搏之不物衣冠視瞻不與衆同及其操物不如品式掌執市之盜賊以徇且刑之胥各掌其所治之政執鞭度而巡其前掌其坐作出入之禁令襲其不正者杜子春云當為襲謂掩捕其不正者凡有罪者撻戮而罰之罰之使出布肆長各掌其肆之政令陳其貨賄名相近者相逺也實相近者相邇也而平正之邇亦近也俱是物也使惡者逺善善自相近鄭司農云謂若珠玉之屬俱名為珠俱名為玉而賈或百萬或數萬恐農夫愚民見欺故别異令相逺使賈人不得雜亂以欺人斂其總布掌其戒禁杜子春云總當為泉府掌以市之征布斂市之不售貨之滯於民用者以其賈買之物楬而書之以待待不時而買者買者各從其抵都鄙從其主國人郊人從其有司然後豫之鄭司農云不時買者謂急求者也抵故買也主者别治大夫也然後豫之為封符信然後豫之𤣥謂抵實抵字抵本也本謂所屬吏主有司是也凡賖者祭祀無過旬日喪紀無過三月鄭司農云賖貰也以祭祀喪紀故從官賖買物凡民之貸者與其有司辨而授之以國服為之息有司所屬吏也與之别其貸民之物定其賈以與之鄭司農云貸者謂從官借本賈也故有息使民弗利以其所賈之國所出為息也假令其國出絲絮則以絲絮償其國出絺葛則以絺葛償𤣥謂以國服為之息以其於國服事之稅為息也於國事受園廛之田而貸萬泉者則朞出息五百王莽時民貸以治産業者但計贏所得受息無過嵗什一凡國之財用取具焉嵗終則㑹其出入而納其餘㑹計也納入也入餘於職幣並地官遺人凡國野之道三十里有市市有侯館侯館有積詳下道路章有圭璧金璋不粥於市命服命車不粥於市犧牲不粥於市戎器不粥於市尊物非民所宜有戎器軍器也粥賣也用器不中度不粥於市兵車不中度不粥於市布帛精粗不中數幅廣狹不中量不粥於市姦色亂正色不粥於市凡以其不可用也用器弓矢耒耜飲食器也度丈尺也數升縷多少錦文珠玉成器不粥於市衣服飲食不粥於市不示民以奢與貪也成猶善也五榖不時果實未孰不粥於市物未成不利人木不中伐不粥於市伐之非時不中用周禮仲冬斬陽木仲夏斬隂木禽獸魚鱉不中殺不粥於市殺之非時不中用月令季冬始漁周禮春獻鱉蜃王制右布政衛莊公改舊制易朝市髙子睪問於孔子曰周禮前朝而後市今衛君更之如何孔子曰朝市於西方失之矣家語孟子曰市廛而不征法而不廛則天下之商皆悅而願藏於其市矣廛市宅也張子曰或賦其市地之廛而不征其貨或治之以市官之法而不賦其廛蓋逐末者多則廛以抑之少則不必廛也孟子古者關譏而不征詳見財賦關執禁以譏禁異服識異言關竟上門譏呵察王制司門掌授管鍵以啓閉國門鄭司農云鍵讀為蹇管謂籥也鍵謂牡幾出入不物者正其貨賄凡財物犯禁者舉之不物衣服視瞻不與衆同及所操物不如品式者正讀為征征稅也犯禁謂商所不資者舉之沒入官以其財養死政之老與其孤財所謂門關之委積也死政之老死國事者之父母也孤其子司關掌國貨之節以聫門市貨節謂商本所發司市之璽節也自外來者則案其節而書其貨之多少通之國門國門通之司市自內出者司市為之璽節通之國門國門通之關門參相聫以檢猾商司貨賄之出入者掌其治禁與其征廛征廛者貨賄之稅與所止邸舍也關下亦邸有客舍其出布如市之廛凡貨不出於關者與其貨罰其人不出於關謂從私道出辟稅者則沒其貨而撻其人凡所達貨賄者則以節傳出之商或取貨於民間無璽節者至關關為之璽節及傳出之其有璽節亦為之傳傳如今移過所文書國凶札則無關門之征猶幾無租稅猶幾猶苛察不得令奸人出入有外內之送令則以節傳出內之有送令謂奉貢獻及文書以常事往來環人之職所送迎通賓客來至關則為之節與傳以通之掌節門關用符節詳名器下並地官仲夏門閭毋閉關市無索仲秋易關市來商旅納貨賄以便民事四方來集逺鄉皆至則財不匱上無乏用百事乃遂孟冬戒門閭修鍵閉慎管籥謹關梁並詳月令右門關之政文王之治岐也關市譏而不征孟子仲尼曰臧文仲不仁者三廢六關不仁也塞關陽關之屬凡六關所以禁絶末遊而廢之關按家語作置六關王注云六關關名魯本無此文仲置之以稅行者故為不仁傳曰廢六關非也二說未知孰是文二年左氏傳孟子曰關譏而不征則天下之旅皆悅而願出於其路矣又曰古之為關也將以禦暴譏察非常今之為關也將以為暴征稅出入之范氏曰古之耕者什一後世或收大半稅此以賦斂為暴也文王之囿與民同之齊宣王之囿為阱國中此以園囿為暴也後世為暴不止於關若使孟子用於諸侯必行文王之政凡此之類皆不終目而改也刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸涣木在水上也致逺以利天下疑衍繫辭傳天子造舟比船為橋諸侯維舟維連四船大夫方舟併兩船士特舟單船庶人乘泭併木以渡爾雅匠人營國經涂九軌環涂七軌野涂五軌環涂以為諸侯經涂野涂以為都經涂詳見制國司險掌九州之圖以周知其山林川澤之阻而達其道路設國之五溝五涂而樹之林以為阻固皆有守禁而達其道路詳軍禮武備合方氏掌達天下之道路津梁相湊不得陷絶夏官野廬氏掌達國道路至於四畿達謂巡行通之使不陷絶也去王城五百里為畿比國郊及野之道路宿息井樹比猶較也宿息廬之屬賓客所宿及晝止者也井共飲食樹為藩蔽若有賓客則令守涂地之人聚柝之有相翔者誅之守涂地之人道所出廬宿旁民也相翔猶昌翔觀伺者也鄭司農云聚柝聚擊柝以宿衛之也有姦人相翔於賓客之側則誅之不得令寇盜賓客凡道路之舟車轚互者序而行之舟車轚互謂於迫隘處也車有轘轅坻閣舟有砥柱之屬其過之者使以次叙之凡有節者及有爵者至則為之辟辟辟行人亦使守涂地者禁野之橫行徑踰者皆為防姦也橫行妄繇田中徑踰射邪趣疾越隄渠也凡國之大事比修除道路者比校治道者名若今次金叙大功掌凡道禁禁謂若今絶蒙布巾持兵杖之屬秋官掌節道路用旌節凡通達於天下者必有節以傳輔之無節者有幾則不達詳名器下候人各掌其方之道治與其禁令以設候人道治治道也國語曰候不在竟譏不居其方也禁令猶姦寇也以設候人者選士卒以為之詩云彼候人兮何戈與祋若有方治則帥而致於朝及歸送之於竟方治其方來治國事者也春秋傳曰晉欒盈過周王使候人出諸轘轅是其送之官夏遺人野鄙之委積以待羈旅羈旅過行寄止者凡國野之十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積廬若今野候徒有庌也宿可止宿若今亭有室矣候館樓可以觀望者也一市之間有三廬一宿地官委人以甸聚待羈旅聚凡畜聚之物也同上季春命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞詳月令柔逺人則四方歸之柔逺人則天下之旅皆悅而願出於其塗故四方歸送往迎來嘉善而矜不能所以柔逺人也往則為之授節以送之來則豐其委積以迎之中庸右道路之政單襄公假道于陳以聘于楚火朝覿矣道茀不可行也火心星也覿見也草穢塞路謂茀朝見謂夏正十月晨見於辰候不在疆候候人也掌送迎賓客也疆境也司空不視塗司空鄉官掌道路也澤不陂陂障也古不竇澤故障之川不梁流曰川梁渠梁古不防川故梁之野有庾積唐尚書云十六㪷曰庾昭謂此庾露積穀也詩云曽孫之庾如坻如京是也場功未畢治場未畢也詩云九月築場圃道無列樹古者列樹以表道且為城守之用墾田若藝發田曰墾藝猶蒔也言其稀少猶若藝物膳宰不致餼膳宰膳夫也掌賓客之牢禮生曰餼司里不授館司里里宰也掌授客館國無寄寓寓亦寄也無寄寓者不為廬舍可以寄羈旅之客縣無施舍四甸為縣縣方六十里施舍者所以施舍賓客負任之處單子歸告王曰陳侯不有大咎國必亡夫辰角見而雨畢辰角大辰蒼龍之角角星名也見者朝見東方建戌之初寒露節也雨畢者殺氣日盛雨氣盡也天根見而水涸天根亢氏之間也涸竭也謂寒露雨畢之後五日天根朝見水潦盡竭也月令仲秋水始涸天根見乃盡竭也本見而草木節解本氐也謂寒露之後十日陽氣盡草木之枝節皆理解之駟見而隕霜駟天馬房星也隕落也謂建戌之中霜始降火見而清風戒寒謂霜降之後清風先至所以戒人為寒備也故先王之教曰雨畢而除道水涸而成梁教謂月令之屬也九月雨畢十月水涸草木節解而備藏備收藏也月令季秋農事畢收隕霜而冬裘具孟冬則天子始裘故九月可以具之清風至而修城郭宫室謂火見之後建亥之初也故夏令曰九月除道十月成梁夏令夏后氏之令周所因也除道所以便行旅成梁所以便民使不涉也其時警曰收而場功偫而畚挶時警時所以警告其民也收而場功使人修囷倉也偫具也畚器名土籠也挶舁土之器具汝畚挶將以築作也營室之中土功其始定謂之營室謂建亥小雪之中定星昏正於午土功可以始也詩定之方中作於楚宫火之初見期於司里期㑹也致其築作之具㑹於司里之官此先王之所以不用財賄而廣施德於天下者也施德謂因時警戒謹蓋藏成築功也今陳國火朝覿矣而道路若塞野場若棄澤不陂障川無舟梁舟梁以舟為梁也是廢先王之教也周制有之曰列樹以表道立鄙食以守路制法也表識也鄙四鄙十里有廬廬有飲食國有郊牧國外曰郊牧放牧之地疆有寓望疆境也境界之上有寄寓之舍候望之人藪有圃草澤無水曰藪圃大也必有茂大之草以備財用囿有林池囿苑也林積木也池積水也所以禦灾也禦備也灾飢兵也今陳國道路不可知上下文互見農政章是棄先王之法制者也國語周語子産聽鄭國之政以其乘輿濟人於湊洧子産鄭大夫公孫僑也湊洧二水名也子産見人有徒涉此水者以其所乘之車載而渡之孟子曰惠而不知為政惠謂私恩小利政則有公平正大之體綱紀法度之施焉嵗十一月徒杠成十二月輿梁成民未病涉也杠方橋也徒杠可通徒行者梁亦橋也輿梁可通車輿者周十一月夏九月也周十二月夏十月也夏令曰十月成梁蓋農功已畢可用民力又時將寒沍水有橋梁則民不患於徒涉亦王政之一事也君子平其政行辟人可也焉得人人而濟之辟辟除也如周禮閽人為之辟之辟言能平其政則出行之際辟除行人使之辟已亦不為過况國中之水當涉者衆豈能悉以乘輿濟之哉故為政者每人而悅之日亦不足矣言每人皆欲致私恩以悅其意則人多日少亦不足於用矣諸葛武侯嘗言治世以大德不以小惠得孟子之意矣孟子葵丘之㑹三命曰無忘賓旅賓賓客也旅行旅也皆當有以待之不可忽忘也同上懷方氏掌來逺方之民致方貢致逺物而送逆之達之以節逺方之民四夷之民也諭德延譽以來之逺物九州之外無貢法而王者達民以旌節達貢物以璽節治其委積館舍飲食續食其往來夏官中國戎夷五方之民皆有性也不可推移地氣使之然東方曰夷被髮文身有不火食者矣南方曰蠻雕題交趾有不火食者矣雕文謂刻其肌以丹青涅之交趾足相鄉然浴則同川卧則僢不火食地氣暖不為病西方曰戎被髮衣皮有不粒食者矣北方曰狄衣羽毛穴居有不粒食者矣不粒食地氣寒少五穀中國夷蠻戎狄皆有安居和味宜服利用備器其事雖異各自足五方之民言語不通嗜欲不同達其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯皆俗間之名依其事類耳鞮之言知也今冀部有言狄鞮者王制右懷逺之政三旬苗民逆命班師振旅帝乃誕敷文德舞干羽于兩階七旬有苗格班還振整也謂振旅以歸也誕大也文德文命德教也干楯羽翳也皆舞者所執也兩階賓主之階也七旬七十日也格至也禹大謨大司徒以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盜賊荒凶年也鄭司農云救飢之政十有二品散利貸種食也弛力息繇役也去幾關市不幾也眚禮掌客職所謂凶荒殺禮者也多昏不備禮而娶昏者多也索鬼神求廢祀而修之雲漢之詩所謂靡神不舉靡愛斯牲者也除盜賊急其刑以除之饑饉則盜賊多不可不除也杜子春讀蕃樂為藩樂謂閉藏樂器而不作𤣥謂去幾去其稅耳舍禁若公無禁利眚禮謂殺吉禮也殺哀謂省凶禮大荒大札則令邦國移民通財舍禁弛力薄征緩刑大荒大凶年也大札大疫病也移民辟災就賤其有守不可移者則輸之榖春秋定五年夏歸粟於蔡是也遺人縣都之委積以待凶荒均人凶札則無力政無財賦無力政恤其勞也無財賦恤其乏困也財賦九賦也不收地守地職不均地政不收山澤及地稅亦不平計地稅也非凶札之嵗當收稅乃均之耳司救凡嵗時有天患民病則以節巡國中及郊野而以王命施惠天患謂烖害也節旌節也施惠賙恤之司市國凶荒札喪則市無征而作布賈師凡天患禁貴儥者使有恆賈並詳市政章司關國凶札則無門關之征猶幾詳門關章廩人若食不能人二釜則令邦移民就榖詔王殺邦用倉人若榖不足則止餘法用有餘則藏之以待凶而頒之並詳財賦並地官士師若邦凶荒則以荒辨之法治之鄭司農云辨讀為風别之别救荒之政十有二而士師别受其教條是為荒别之法𤣥謂辨當為貶聲之誤也遭飢荒則刑罰國事有所貶損作權時法也朝士職曰若邦凶荒札喪冦戎之故則令邦國都家縣鄙慮刑貶令移民通財糾守緩刑移民就賤救困也通財補不足也糾守衛盜賊也緩刑紓民心也秋官朝士若邦凶荒札喪寇戎之故則令邦國都家縣鄙慮刑貶故書慮為憲貶為窆杜子春云窆當為禁憲為幡書以明之𤣥謂慮謀也貶猶减也謂當圖謀緩刑且减國用為民困也所貶視時為多少之法同上古者有災者謂之厲君一時素服使有司弔死問疾憂以巫醫匍匐以救之湯粥以方之善者先乎矜寡孤獨及疾不能相養死無以葬埋者葬埋之右凶札之政凶札之禮詳災變禮因凶札祈禳詳因祭莊公二十八年冬大無麥禾臧孫辰告糴於齊春秋魯饑臧文仲言於嚴公曰夫為四鄰之援援所攀援以為助也結諸侯之信重之以婚姻申之以盟誓申重也固國之艱急是為艱難也是為為難急也鑄名器名器鍾鼎也藏寶財寶財玉帛也固民之殄病是待殄絶也病飢也今國病矣君盍以名器請糴於齊盍何不也市榖曰糴公曰誰使對曰國有饑饉卿出告糴古之制也告請也辰也備卿辰諸如齊文仲以鬯圭與玉磬如齊告糴鬯圭祼鬯之圭長尺二寸有瓉以祀廟玉磬鳴璆也曰天灾流行戾於敝邑饑饉荐降民羸幾卒戾至也荐重也降下也羸病也幾近也卒盡也大懼殄周公太公之命祀賈唐二君云周公為太宰太公為太師皆掌命諸侯之國所當祀也或云命祀謂命祀二公也昭謂傳曰衛成公祀夏后相寧武子曰不可以間成王周公之命祀如此賈唐得之職貢業事之不共而獲戾戾罪也不腆先君之敝器腆厚也敢告滯積以紓執事滯久也紓緩也執事齊有司也榖久積則將朽敗執事所憂也請之所以緩執事以救敝邑使能共職豈唯寡君與二三臣實受君賜其周公太公及百辟神祗實永饗而賴之辟君也賴蒙也天曰神地曰祗百辟謂百君卿士有益於民者齊人歸其玉而豫之糴魯語國無三年之畜曰國非其國也一年不升告糴諸侯告請也不正故舉臧孫辰以為私行也為內諱故不稱使使若私行國無九年之畜曰不足無六年之畜曰急無三年之畜曰國非其國也諸侯無粟諸侯相歸粟正也臧孫辰告糴于齊告然後與之言內之無外交也古者稅什一豐年補敗敗謂凶年不外求而上下皆足也雖纍凶年民弗病也一年不艾而百姓饑君子非之榖梁傳僖公二十一年夏大旱公欲焚巫尩巫尩女巫也主祈禱請雨者或以為尩非巫也瘠病之人其面上向俗謂天哀其病恐雨入其鼻故為之旱是以公欲焚之臧文仲曰非旱備也修城郭貶食省用務穡勸分穡儉也勸分有無相濟此其務也巫尩何為天欲殺之則如勿生若能為旱焚之滋甚公從之是嵗也飢而不害不傷害民左氏傳大司徒以保息六養萬民三曰賑窮四曰恤貧五曰寬疾詳見上篇朝士掌建邦外朝之法右肺石達窮民焉詳朝廷禮大司寇以肺石達窮民肺石赤石也窮民天民之窮而無告者凡逺近惸獨老幼之欲有復於上而其長弗達者立於肺石三日士聽其辭以告於王而罪其長無兄弟曰惸無子孫曰獨復猶報也上謂王與六卿也報之者若上書詣公府言事矣長謂諸侯若鄉遂大夫秋官大僕建路鼓於大寢之門外而掌其政以待達窮者與遽令聞鼓聲則速逆僕與御庶子詳朝廷禮少而無父者謂之孤老而無子者謂之獨老而無妻者謂之矜老而無夫者謂之寡此四者天民之窮而無告者也皆有常餼餼廩也瘖聾跛躃斷者侏儒百工各以其器食之斷謂支節絶也侏儒短人也器能也王制鄉師以嵗時巡國及野而賙萬民之囏厄以王命施惠嵗時者隨其事之時不必四時也囏厄飢乏也鄭司農云賙讀為周急之周遺人鄉里之委積以恤民之囏厄門關之委積以養老孤鄉里鄉所居也囏厄猶困乏也門關以養老孤人所出入易以取餼廩也旅師掌聚野之鋤粟屋粟間粟注見財賦而用之以質劑致民平頒其興積施其惠散其利而均其政令而讀為若聲之誤也若用之謂恤民之囏厄委積於野如道人於鄉里也以質劑致民案入稅者名㑹而貸之興積所興之積謂三者之粟也平頒之不得偏頗有多少縣官徴聚物曰興今云軍興是也是粟縣師徴之旅師斂之而用之以賙衣食曰惠以作事業曰利均其政令者皆以國服為之息凡用粟春頒而秋斂之困時施之饒時收之司稼掌均萬民之食而賙其急而平其興均謂度其多少賙廩其囏厄興所徴賦官並地季春天子布德行惠命有司發倉廩賜貧窮振乏絶詳月令右恤窮之政老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤此四者天下之窮民而無告者也文王發政施仁必先斯四者詩云哿矣富人哀此煢獨孟子文公曰奈夫八疾何八疾籧篨至僮昏胥臣曰官師之所材也師長也材古裁字戚施直鎛戚施僂人直主擊鎛鎛鍾也籧篨蒙璆籧篨偃人蒙戴也璆玉磬也不能俯故使之戴磬侏儒扶盧侏儒短者扶緣也盧戈㦸之柲緣之以為戲矇瞍修聲有眸子而無見曰矇無眸子曰瞍無目於音聲審故使修之聾聵司火耳不别五聲之和曰聾生而聾曰聵耳無聞於視則審故使主火僮昏僮無知也昏暗亂也嚚瘖口不道忠信之言為嚚瘖不能言者僬僥長三尺官師所不材也所不能材用也以實裔土裔荒裔也國語晉語齊師將興陳成子屬孤子三日朝屬㑹死事者之子使朝三日以禮之哀二十七年左氏傳晏子曰春省耕而補不足秋省斂而助不給景公說大戒於國出舍於郊於是始興發補不足戒告命也出舍自責以省民也興發發倉廩也孟子醫師掌醫之政令聚毒藥以共醫事毒藥藥之辛苦者藥之物恆多毒孟子曰若藥不瞑眩厥疾不瘳凡邦之有疾病者疕瘍者造焉則使醫分而治之疕頭瘍亦謂秃也身傷曰瘍分之者醫各有能嵗終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下食祿也全猶愈也以失四為下者五則半矣或不治自愈疾醫掌養萬民之疾病四時皆有癘疾春時有痟首疾夏時有癢疥疾秋時有瘧寒疾冬時有嗽上氣疾癘疾氣不和之疾痟酸削也首疾頭痛也嗽咳也上氣逆喘也五行傳曰六癘作見以五味五榖五藥養其病養猶治也病由氣勝負而生攻其贏養其不足者五味醯酒蝕蜜薑盬之屬五榖麻黍稷麥豆五藥草木蟲石榖也其治合之齊則存乎神農子儀之術云以五氣五聲五色眂其死生三者劇易之徴見於外者五氣五藏所出氣也肺氣熱心氣次之肝氣凉脾氣溫腎氣寒五聲言語宫商角徴羽也五色面貌青赤白黑黃也察其盈虛休王吉凶可知審用此者莫若扁鵲倉公兩之以九竅之變參之以九藏之動兩參之者以觀其死生之驗竅之變謂開閉非常陽竅七隂竅二藏之動謂脉至與不至正藏五藏又有胃膀胱大腸小腸脉之大候要在陽明寸口能專是者其唯秦和乎岐伯榆則兼彼數術者凡民之有疾病者分而治之死終則各書其所以而入於醫師少者曰死老者曰終所以謂治之不愈之狀也醫師得以制其祿且為後治之戒瘍醫掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之齊腫瘍癰而上生創者潰瘍癰而含膿血者金瘍刀創也折瘍踠跌者祝當為注讀如注病之注聲之誤也注謂附著藥劀刮去膿血殺謂以藥食其惡肉凡療瘍以五毒攻之止病曰療攻治也五毒五藥之有毒者今醫方有五毒之藥作之合黃堥置石膽丹砂雄黃礜石慈石其中燒之三日夜其煙上著以雞羽掃取之以注創惡肉破骨則盡出以五氣養之以五藥療之以五味節之既刮殺而攻盡其宿肉乃養之也五氣當為五穀節節成其藥之力凡藥以酸養骨以辛養筋以醎養脉以苦養氣以甘養肉以滑養竅以類相養也酸木味木根立地中似骨辛金味金之纒合異物似筋鹹水味水之流行地中似脉苦火味火出入無形似氣甘土味土含載四者似肉滑滑石也凡諸滑物通利往來似竅凡有瘍者受其藥焉並天官孟夏聚畜百藥詳月令右醫藥之政蠟氏掌除胔曲禮四足死者曰漬故書胔作脊鄭司農云脊讀為漬謂死人骨也月令曰掩骼埋胔胔骨之尚有肉者也及禽獸之骨皆是若有死於道路者則令埋而置楬焉書其日月焉縣其衣服任器於有地之官以待其人有地之官主此地之吏也其人其家人也鄭司農云楬欲令其識取之今時楬櫫是也有地之官有郡界之吏今時鄉亭是也掌凡國之胔禁禁謂孟春掩骼埋胔之屬秋官孟春掩骼埋胔詳月令右恤死之政墓地不請王制大司徒以本俗六安萬民二曰族墳墓五族為黨使之相葬地官墓大夫掌凡邦墓之地域為之圖令國民族葬而掌其禁令正其位掌其度數使皆有私地域凡爭墓地者聽其獄訟帥其屬而巡墓厲居其中之室以守之春官喪注並見士禮下孟冬飭喪紀辨衣裳審棺椁之厚薄塋丘壟之大小髙卑厚薄之度貴賤之等級詳月令右墳墓之政管仲曰聖王治天下定民之居成民之事陵為之終以為葬也齊語孔子初仕為中都宰制為養生送死之節為四寸之棺五寸之椁因丘陵為墳不封不樹家語夏小正九月內火主夫出火大戴禮司爟掌行火之政令四時變國火以救時疾行猶用也變猶易也鄭司農云以鄹子曰春取榆栁之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火季春出火民咸從之季秋內火民亦如之火所以用陶冶民隨國而為之鄭人鑄刑書火星未出而出火後有災鄭司農云以三月本時昏心星見於辰上使民出火九月本黃昏心星伏在戍上使民內火故春秋傳曰以出內火時則施火令焚萊之時凡國失心野焚萊則有刑罰焉野焚萊民擅放火夏官司烜氏中春以木鐸修火禁於國中為季春將出火也火禁謂用火之處及備風燥秋官宫正春秋以木鐸修火禁火星以春出以秋入因天時而以戒天官右火政火正曰祝融祝融明貌其祀犁焉顓頊氏有子曰犁為祝融犁為火正氏昭二十九年左傳宋災晉侯問於士弱曰吾聞之宋災於是乎知有天道何故問宋何故自知天道將災對曰古之火正或食於心或食於咮以出內火是故咮為鶉火心為大火謂火正之官配食於火星建辰之月鶉火星昏在南方則令民放火建戍之月大火星伏在日下夜不得見則令民內火禁放火陶唐氏之火正閼伯居商丘陶唐堯有天下號閼伯髙辛氏之子傳曰遷閼伯於商丘主辰辰大火也今為宋星然則商丘在宋地祀大火而火紀時焉謂出內火時相土因之故商主大火相土契孫商之柤也始代閼伯之後居商丘祀大火商人閲其禍敗之釁必始於火是以日知其有天道也閲猶數也商人數所更歷恆多火災宋是殷商之後故知天道之災必火襄九年左氏傳三月鄭人鑄刑書士文伯曰火見鄭其火乎火心星周五月昏見火未出而作火以鑄刑器刑器鼎也藏爭辟焉火如象之不火何為象類也同氣相求火未出而用火相感而致災六月丙戌鄭災終士文伯之言昭六年左氏傳凌人掌冰正嵗十有二月令斬冰三其凌正嵗季冬火星中大寒冰方盛之時春秋傳曰火星中而寒暑退凌冰室也三之者為消釋度也故書正為政鄭司農云掌冰政主藏冰之政也杜子春讀掌冰為主冰也政當為正謂夏正三其凌三倍其冰春始治鑑鑑如甀大口以盛冰置食物以禦溫氣春始治之為二月將獻羔而啓冰凡外內饔之膳羞鑑焉凡酒漿之酒醴亦如之酒醴見溫氣亦失味酒漿酒人漿人也祭祀共冰鑑賓客共冰不以鑑往嫌使停膳羞大喪共夷盤冰夷之言尸也實冰於夷盤中置尸牀之下所以寒尸尸之槃曰夷盤牀曰夷牀衾曰夷衾移尸曰夷於堂皆依尸而為言者也漢禮器制度大槃廣八尺長丈二尺深三尺漆赤中夏頒冰掌事暑氣盛王以冰頒賜則主為之春秋傳曰古者日在北陸而藏冰西陸朝覿而出之秋刷刷清也鄭司農云刷除冰室當更納新氷𤣥謂秋凉冰不用可以清除其室天官季冬冰方盛水澤腹堅命取冰冰以入仲春天子乃鮮羔開冰並詳月令右冰政二之日鑿冰冲冲三之日納于凌隂四之日其蚤獻羔祭韭鑿冰謂取冰于山也冲冲鑿冰之意周禮正嵗十二月令斬冰是也納藏也藏冰所以避暑也凌隂冰室也豳土寒多正月風未解凍故氷猶可藏也蚤蚤朝也韭菜名獻羔祭韭而後啓之月令仲春獻羔開冰先薦寢廟是也蘇氏曰古者藏氷發氷以節陽氣之盛夫陽氣之在天地譬如火之著于物也故常有以解之十二月陽氣藴伏涸而未發其盛在下則納氷於地中至於二月四陽作蟄蟲起陽始用事則亦始啓氷而廟薦之至於四月陽氣畢達隂氣將絶則氷于是大發食肉之祿老病喪浴氷無不及是以冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無災霜雹癘疾不降民不夭札也胡氏曰藏氷開氷亦聖人輔相調變之一事耳不専恃此以為治也豳風七月昭公四年大雨雹季武子問於申豐曰雹可禦乎禦止也申豐魯大夫對曰聖人在上無雹雖有不為災古者日在北陸而藏冰陸道也謂夏十二月曰在虛危冰堅而藏之西陸朝覿而出之謂夏三月日在昴畢蟄蟲出而用冰春分之中奎星朝見東方其藏冰也深山窮谷固隂沍寒於是乎取之沍閍也必取積隂之冰所以道達其氣使不為災其出之也朝之祿位賓食喪祭於是乎用之言不獨共公其藏之也黑牡秬黍以享司寒黑牡黑牲也秬黑黍也司寒𤣥冥北方之神故物皆用黑有事於冰故祭其神其出之也桃弧棘矢以除其災桃弧棘箭所以禳除凶邪將御至尊故其出入也時食肉之祿冰皆與焉食肉之祿謂在朝廷治其職事就官食者大夫命婦喪浴用冰命婦大夫妻祭寒而藏之享司寒獻羔而啓之謂二月春分獻羔祭韭始開冰室公始用之公先用優尊火出而畢賦火星昏見東方謂三月四月中自命夫命婦至於老疾無不受冰老致仕在家者山人取之縣人傳之山人虞官縣人遂屬輿人納之隸人藏之輿隸皆賤官夫冰以風壯冰因風寒而堅而以風出順春風而散用其藏之也周周密也其用之也遍及老疾則冬無愆陽愆過也謂冬寒夏無伏隂伏隂謂夏寒春無凄風凄寒也秋無苦雨霖雨為人所患苦雷出不震震霆也無災霜雹癘疾不降癘惡氣也民不夭札短折為夭夭死為札今藏川池之冰棄而不用既不藏深山窮谷之冰又火出不畢賦有餘則棄之風不越而殺雷不發而震越散也言隂陽失序雷風為害雹之為災誰能禦之七月之卒章藏冰之道也七月詩豳風卒章曰二之日鑿冰冲冲謂十二月鑿而取之三之日納於凌隂凌隂氷室也四之日其蚤獻羔祭韭謂二月春分蚤開冰室以薦宗廟左傳萍氏幾酒苛察沽買過多及非時者謹酒使民節用酒也書酒誥曰有政有事無彛酒秋官右酒政王若曰明大命於妹邦商受酗酒天下化之妹土商之都邑其染惡尤甚武王以其地封康叔故作書誥教之妹土即詩所謂沫鄉篇首稱妹邦者誥命専為妹邦發也乃穆考文王肇國在西土厥誥毖庶邦庶士越少正御事朝夕曰祀兹酒惟天降命肇我民惟元祀穆敬也詩曰穆穆文王是也或曰文王世次為穆亦通毖戒謹也少正官之副二也文王朝夕勑戒之曰惟祭祀則用此酒天始令民作酒者為大祭祀而已西土庶邦逺去商邑文王誥毖亦諄諄以酒為戒則商邑可知矣文王為西伯故得誥毖庶邦云天降威我民用大亂喪德亦罔非酒惟行越小大邦用喪亦罔非酒惟辜酒之禍人也而以為天降威者禍亂之成是亦天爾箕子言受酗酒亦曰天毒降災正此意也民之喪德君之喪邦皆由於酒喪德故言行喪邦故言辜文王誥教小子有正有事無彛酒越庶國飲惟祀德將無醉小子少子之稱以其血氣未定尤易縱酒喪德故文王専誥教之有正有官守者有事有職業者無毋同􅉓常也毋常於酒其飲惟于祭祀之時然亦必以德將之無至于醉也惟曰我民迪小子惟土物愛厥心臧聰聽祖考之彛訓越小大德小子惟一文王言我民亦常訓導其子孫惟土物之愛勤稼穡服田畝無外慕則心之所守者正而善日生為子孫者亦當聰聽其祖父之常訓不可以謹酒為小德小德大德小子惟一視之可也妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒此武王教妹土之民也嗣續純大肇敏服事也言妹土民當嗣續汝四肢之力無有怠惰大修農功服勞田畝奔走以事其父兄或敏於貿易牽車牛逺事賈以孝養其父母父母喜慶然後可自洗腆致用酒洗以致其潔腆以致其厚也庶士有正越庶伯君子其爾典聽朕教爾大克羞耉惟君爾乃飲食醉飽丕惟曰爾克永觀省作稽中德爾尚克羞饋祀爾乃自介用逸兹乃永惟王正事之臣兹亦惟天若元德永不忘在王家此武王教妹土之臣也伯長也曰君子者賢之也典常也羞養也言其大能養老也惟君未詳丕惟曰大言也介助也用逸者用以宴樂也言爾能常常反觀內省使念慮之發營為之際悉稽乎中正之德而無過不及之差則德全於身而可以交於神明矣如是則庶幾能進饋祀爾亦可自副而用宴樂也如此則信為王治事之臣如此亦惟天順元德而永不忘在王家矣按上文父母慶則可飲酒克羞耉則可飲酒羞饋祀則可飲酒本欲禁絶其飲今乃反開其端者不禁之禁也聖人之教不迫而民從者此也孝養羞耉饋祀皆因其良心之發而利導之人果能盡此三者且為成德之士矣而何憂其湎酒也哉王曰封我西土棐徂邦君御事小子尚克用文王教不腆于酒故我至于今克受殷之命徂往也輔佐文王往日之邦君御事小子也言文王毖酒之教其大如此王曰封我聞惟曰在昔殷先哲王迪畏天顯小民經德秉哲自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲以商君臣之不暇逸者告康叔也殷先哲王湯也迪畏者畏之而見於行也畏天之明命畏小民之難保經其德而不變所以處已也秉其哲而不惑所以用人也湯之垂統如此故自湯至於帝乙賢聖之君六七作雖世代不同而皆能成就君德敬畏輔相故當時御事之臣亦皆盡忠輔翼而有責難之恭自暇自逸猶且不敢况曰其敢尚飲乎越在外服侯甸男衛邦伯越在內服百僚庶尹惟亞惟服宗工越百姓里居罔敢湎于酒不惟不敢亦不暇惟助成王德顯越尹人祗辟自御事而下在外服則有侯甸男衛諸侯與其長伯在內服則有百僚庶尹惟亞惟服宗工國中百姓與夫里居者亦皆不敢沈湎于酒不惟不敢亦不暇不敢者有所畏不暇者有所勉惟欲上以助成君德而使之昭著下以助尹人祗辟而使之益不怠耳成王顧上文成王而言祗辟顧上文有恭而言吕氏曰尹人者百官諸侯之長也指上文御事而言我聞亦惟曰在今後嗣王酣身厥命罔顯于民祗保越怨不易誕惟厥縱淫佚于非彝用燕喪威儀民罔不䀌傷心惟荒腆于酒不惟自息乃逸厥心疾很不克畏死辜在商邑越殷國滅無罹弗惟德馨香祀登聞於天誕惟民怨庶羣自酒腥聞在上故天降喪於殷罔愛於殷惟逸天非虐惟民自速辜以商受荒腆于酒者告康叔也後嗣王受也受沈酣其身昏迷于政命令不著于民其所祇保者惟在于作怨之事不肯悛改大惟縱淫佚于非彝泰誓所謂竒技淫巧也燕安也用安逸而喪其威儀史記受為酒池肉林使男女裸而相逐其威儀之喪如此此民所以無不痛傷其心悼國之將亡也而受方且荒怠益厚于酒不思自息其逸力行無度其心疾很雖殺身而不畏也辜在商邑雖滅國而不憂也弗事上帝無馨香之德以格天大惟民怨惟群酗醒穢之德以聞于上故上天降喪於殷無有眷愛之意者亦惟受縱逸故也天豈虐殷惟殷人􅒬酒自速其辜爾曰民者猶曰先民君臣之通稱也王曰封豫不惟若兹多誥古人有言曰人無于水監當于民監今惟殷墜厥命我其可不大監撫於時我不惟如此多言所以言湯言受如此其詳者古人謂人無于水監水能監人之妍醜而已當于民監則其得失可知今殷民自速辜既墜厥命矣我其可不以殷民之失為大監戒以撫安斯時乎豫惟曰汝劼毖殷獻臣侯甸男衛矧太史友內史友越獻臣百宗工矧惟爾事服休服采矧惟若疇圻父薄違農父若保宏父定辟矧汝剛制于酒劼用力也汝當用力戒謹殷之賢臣與鄰國之侯甸男衛使之不湎于酒也毖殷獻臣侯甸男衛與文王毖庶邦御士同義殷之賢臣諸侯固欲知所謹矣况太史掌六典八法八則內史掌八柄之法汝之所友者及其賢臣百僚大臣可不謹于酒乎太史內史獻臣百宗工固欲知所謹矣况爾之所事服休坐而論道之臣服采起而作事之臣可不謹於酒乎曰友曰事者國君有所友有所事也然盛德有不可友者故孟子曰古之人曰事之云乎豈曰友之云乎服休服采固欲知所謹矣况爾之疇匹而位三卿者若圻父迫逐違命者乎若農父之順保萬民者乎若宏父之制其經界以定法者乎皆不可不謹於酒也圻父政官司馬也主封圻農父教官司徒也主農宏父事官司空也主廓地居民謂之父者尊之也先言圻父者制殷人湎酒以政為急也圻父農父宏父固欲知所謹矣况汝之身所以為一國之視效者可不謹于酒乎故曰矧汝剛制于酒剛制亦劼毖之意剛果用力以制之也此章自逺而近自卑而尊等而上之則欲其自康叔之身始以是為治孰能禦之而况毖於酒德也哉厥或誥曰羣飲汝勿佚盡執拘以歸于周豫其殺羣飲者商民羣聚而飲為姦惡者也佚失也其者未定辭也蘇氏曰豫其殺者未必殺也猶今法曰當斬者皆具獄以待命不必死也然必立法者欲人畏而不敢犯也羣飲蓋亦當時之法有羣聚飲酒謀為大姦者其詳不可得而聞矣如今之法有曰夜聚曉散者皆死罪蓋聚而為妖逆者也使後世不知其詳而徒聞其名凡民夜相過者輒殺之可乎又惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之殷受導迪為惡之諸臣百工雖湎于酒未能遽革而非羣聚為姦惡者無庸殺之且惟教之有斯眀享乃不用我教辭惟我一人弗恤弗蠲乃事時同于殺有者不忘之也斯此也指教辭而言享上享下之享言殷諸臣百工不忘教辭不湎于酒我則明享之其不用我教辭惟我一人不恤于汝弗潔汝事時則同汝於羣飲誅殺之罪矣王曰封汝典聽朕毖勿辨乃司民湎于酒辨治也乃司有司也即上文諸臣百工之類言康叔不治其諸臣百工之湎酒則民之湎酒者不可禁矣酒誥帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首讓於朱虎熊羆帝曰俞往哉汝諧上下山林澤藪也虞掌山澤之官周禮分為虞衡屬于地官朱虎熊羆四臣名也舜典大宰以九職任萬民二曰園圃育草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸詳上篇山虞掌山林之政令物為之厲而為之守禁物為之厲每物有蕃界也為之守禁為守者設禁令也守者謂其地之民占伐林木者也鄭司農云厲遮列守之仲冬斬陽木仲夏斬隂木鄭司農云陽木春夏生者隂木秋冬生者若松柏之屬𤣥謂陽木生山南者隂木生山北者冬斬陽夏斬隂堅濡調凡服耜斬季材以時入之季猶稚也服與耜宜用稚材尚柔刃也服牝服車之材令萬民時斬材有期日時斬材斬材之時也有期日入出有日數為久盡物凡邦工入山林而掄材不禁掄猶擇也不禁者山林國之有不拘入也春秋之斬木不入禁非冬夏之時不得入所禁之中斬木也斬四野之木可凡竊木者有刑罰竊盜也林衡掌巡林麓之禁令而平其守平其守者平其地之民守林麓之部分以時計林麓而賞罰之計林麓者計其守之功也林麓蕃茂民不盜竊則有賞不則罰之若斬木材則受法於山虞而掌其政令法萬民入出時日之期川衡掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之舍其守者時按視守者於其舍申戒之澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之於玉府頒其餘於萬民其地之人占取澤物者因以部分使守之以時入之於玉府謂皮革珠貝也入之以當邦賦然後得取其餘以自為也入出亦有時日之期並地官獸人掌罟田獸辨其名物罟網也以網搏所當田之獸冬獻狼夏獻麋春秋獻獸物狼膏聚麋膏散聚則溫散則凉以救時之苦也獸物凡獸皆可獻也及狐狸凡獸入於臘人當乾之皮毛筋角入於玉府給作器物凡田獸者掌其政令􅘋人掌以時􅘋為梁月令季冬命漁師為梁鄭司農云梁水偃也偃水為關空以笱承其空詩云敝笱在梁春獻王鮪王鮪鮪之大者月令季春薦鮪于寢廟凡漁者掌其政令凡漁征入於玉府鄭司農云漁征漁者之租稅漁人主收之入于玉府鱉人掌取互物鄭司農云互物謂有甲䓣胡龜鱉之屬以時簎魚鱉龜蜃凡貍物蜃大蛤鄭司農云簎謂以杈刺泥中摶取之貍物龜鱉之屬自貍藏伏于泥中者𤣥謂貍物亦謂鱴刀含漿之屬春獻鱉蜃秋獻龜魚此其在淺處可得之時魚亦謂自貍藏掌凡邦之簎事獸醫掌療獸病療獸瘍畜獸之疾病及瘍療同醫凡療獸病灌而行之以莭之以動其氣觀其所發而養之療畜獸必灌行之者為其病狀難知灌以緩之且强其氣也節趨聚之莭也氣謂脈氣既行之乃以脈視之以知所病凡療獸瘍灌而劀之以發其惡然後藥之養之食之亦先攻之而後養之凡獸之有病者有瘍者使療之死則計其數以進退之並天官迹人禁麛卵者與其毒矢射者為其夭物且害必多也麛麋鹿子囿人掌囿遊之獸禁囿遊囿之離宫小苑觀處也養獸以宴樂視之禁者其蕃衛也鄭司農云囿遊之獸囿牧之獸牧百獸備養衆物也今掖庭有鳥獸自熊虎孔雀至於狐狸鳬鶴備焉埸人掌國之埸圃而樹之果蓏珍異之物以時斂而藏之果棗李之屬蓏瓜瓠之屬珍異蒲萄枇杷之屬並地官服不氏掌養猛獸而教擾之猛獸虎豹熊羆之屬擾馴也教習使之馴服王者之教無不服射鳥氏掌射鳥鳥謂中膳羞者鳧雁鴇梟之屬羅氏掌羅烏鳥鳥謂卑居鵲之屬蠟則作羅襦作猶用也鄭司農云蠟謂十二月大祭萬物也郊特牲曰天子大蠟謂嵗十二月合聚萬物而索饗之襦細密之羅襦讀為繻有衣袽之繻𤣥謂蠟建亥之月此時火伏蟄者畢矣豺既祭獸可以羅網圍取禽也王制曰豺祭獸然後田又曰昆蟲已蟄可以火田今俗放火張羅其遺教中春羅春鳥獻鳩以養國老行羽物春鳥蟄而始出者若今南郡黃雀之屬是時鷹化為鳩鳩與春鳥變舊為新宜以養老助生氣行謂賦賜掌畜掌養鳥而阜蕃教擾之阜猶盛也蕃蕃息也鳥之可養使盛大番息者謂鵝鶩之屬嵗時貢鳥物梟鷹之屬以四時來夏並官閩隸掌役畜養鳥而阜蕃教擾之掌子則取隸焉杜子春云子當為祀𤣥謂掌子者王立世子置臣使掌其家事而以閩隸役之按王氏云子謂鳥所生也夷隸掌役牧人養牛馬與鳥言鄭司農云夷狄之人或曉鳥獸之言故春秋傳曰介葛盧聞牛鳴曰是生三犧皆用之矣貉隸掌役服不氏而養獸而教擾之掌與獸言不言阜蕃者猛獸不可服又不生乳于圈檻也雍氏禁山之為苑澤之沈者為其就禽獸魚鱉自然之居而害之鄭司農云不得擅為苑囿於山也澤之沉者謂毒魚及水蟲之屬萍氏掌國之水禁水禁謂水中害人之處及入水捕魚龞不時冥氏掌設弧張弧張罿罦之屬所以扄絹禽獸為阱擭以攻猛獸以靈鼓驅之靈鼓六面鼓驅之使驚趨阱擭若得其獸則獻其皮革齒須備鄭司農云須謂頤下須備謂搔也庶氏掌除毒蠱以攻說禬之嘉草攻之毒蠱毒物而病害人者賊律曰敢蠱人及教令者棄市攻說祈名祈其神求去之也嘉草藥物其狀未聞攻之謂燻之鄭司農云禬除也𤣥謂此禬謂如潰癰之潰凡驅蠱則令之比之使為之又校次之穴氏掌攻蟄獸各以其物火之蟄獸熊羆之屬冬藏者也將攻之必先燒其所食之物於穴外以誘出之乃可得之以時獻其珍異皮革翨氏掌攻猛鳥各以其物為媒而掎之猛鳥鷹隼之屬置其所食之物於絹中鳥下來則掎其腳以時獻其羽翮柞氏掌攻草木及林麓林人所養者山足曰麓夏日至令刋陽木而火之冬日至令剝隂木而水之刋剝互言耳皆謂斫去次地之皮生山南為陽木生山北為隂木火之水之則使其肄不生若欲其化也則春秋變其水火化猶生也謂時以種榖也變其水火者乃所火則水之所水則火之則其土和美凡攻木者掌其政令除木有時剃氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之故書萌作甍杜子春云甍當為萌謂耕反其萌芽書亦或為萌𤣥謂萌之者以鎡基斫所生者夷之以鉤鐮迫地芟之也若今取芟矣含實曰繩芟其繩則實不成􅍄耜之以耜側凍土剗之若欲其化也則以水火變之謂以火燒其所芟萌之草己而水之則其土亦和美矣月令季夏燒剃行水利以殺草如以熱湯是其一時著之掌凡殺草之政令哲蔟氏掌覆夭鳥之巢覆猶毀也夭鳥惡鳴之鳥若梟鵩以方書十日之號十有二辰之號十有二月之號十有二嵗之號二十有八星之號縣其巢上則去之方版也日謂從甲至癸辰謂從子至亥月謂從娵至荼嵗謂從攝提格至赤奮若星謂從角至軫夭鳥見此五者而去其詳未聞翦氏掌除蠧物以攻禜攻之以莽草熏之蠧物穿食人器物者蠧魚亦是也攻禜祈名莽草藥物殺蟲者以熏之則死故書蠧為櫜杜子春云櫜當為蠧凡庶蠱之事庶除蟲毒者蠱亦蠧之類也或熏以莽草則去赤叐氏掌除墻屋以蜃炭攻之灰灑毒之灑灑也除牆屋者除蟲豸藏逃其中者蜃大蛤也搗其炭以坌之則走淳灰以灑之則死故書蜃為晨鄭司農云晨當為蜃書亦或為蜃凡隙屋除其貍蟲貍蟲䗪肌蛷之屬蟈氏掌去蛙黽焚牡蘜以灰灑之則死牡蘜蘜不華者齊魯之間謂蛙為蟈黽耿黽也蟈與耿黽尤怒鳴為聒人耳去之以其煙被之則凡水蟲無聲杜子春云假令風從東方來則於水東面為煙令煙西行被之水上壺涿氏掌除水蟲以炮土之鼓驅之以焚石投之水蟲狐蜮之屬故書炮作泡杜子春讀炮為苞有苦葉之苞𤣥謂燔之炮之炮土之鼓瓦鼓也焚石投之使驚去若欲殺其神則以牡橭午貫象齒而沈之則其神死淵為陵神謂水神龍罔象故書橭為梓午為五杜子春云梓當為橭橭讀為枯枯榆木名或為樗又云五貫當為午貫庭氏掌射國中之夭鳥若不見其鳥獸則以救日之弓與救月之矢射之不見鳥獸謂夜來鳴呼為怪者獸狐狼之屬鄭司農云救日之弓救月之矢謂日月食所作弓矢𤣥謂日月之食隂陽相勝之變也於日食則射大隂月食則射大陽與若神也則以大隂之弓與枉矢射之神謂非鳥獸之聲若或叫于宋太廟嘻嘻出出者大隂之弓救月之弓枉矢救日之矢與不言救月之弓與救日之矢者互言之救日用枉矢則救月以恆矢可知也並秋官獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田取物必順時候也梁絶水取魚者罻小網也昆明也明蟲者得陽而生得隂而藏不麛不卵不殺胎不夭夭重陽未成物夭斷殺少長曰夭不覆巢覆敗也王制孟春命祀山林川澤犧牲毋用牝禁止伐木毋覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵仲春安萌芽養幼少存諸孤毋竭川澤毋漉波池毋焚山林季春生氣方盛陽氣發泄句者畢出萌者盡達不可以內田獵罝罘羅網畢翳餧獸之藥毋出九門孟夏毋伐大樹毋大田獵季夏命漁師伐蛟取鼉登龜取黿樹木方盛命虞人入山行木毋有斬伐季秋草木黃落乃伐薪為炭仲冬山林藪澤有能取蔬食田獵禽獸者野虞教道之其有相侵奪者罪之不赦季冬命漁師始漁並詳月令路馬死埋之以帷路馬君所乘者其他狗馬不能以帷蓋檀弓右草木禽獸之政文王之治岐也澤梁無禁澤謂瀦水梁謂漁梁與民同利不設禁也孟子莊公二十八年冬築微微魯邑山林藪澤之利所以與民共也虞之非正也虞典禽獸之官言規固而築之又置官司以守之是不與民同利也穀梁傳成十八年築鹿囿傳同注云築牆為鹿地之苑宣公夏濫於泗淵濫漬也漬罟於泗水之淵以取魚也泗在魯城北又曰在南門里革斷其罟而棄之罟網也曰古者大寒降土蟄發降下也寒氣初下謂季冬建丑之月大寒之後也土蟄發謂孟春建寅之月蟄始震也月令孟春蟄蟲始震魚上氷獺祭魚水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也水虞漁師也掌川澤之禁令講習也罛漁網也罶笱也名漁大魚也川禽鱉蜃之屬諸之也是時陽氣起魚涉負氷故令國人取之所以助宣氣也月令季冬始漁乃嘗魚先薦寢廟唐云孟春誤矣鳥獸孕水蟲成孕懷子也此謂春時獸虞於是乎禁罝羅矠魚鱉以為夏槁獸虞掌鳥獸之禁令罝兔罟網鳥罟也禁禁不得施也矠􅝷也槁乾也夏不得取故於此時􅝷刺魚鱉以為夏儲助生阜也阜長也鳥獸方孕故取魚鱉助生物也鳥獸成水蟲孕水虞於是乎禁罝䍡設穽鄂罝當為罣罣䍡小網也鄂作格所以誤獸也謂立夏鳥獸已成水蟲懷孕之時禁魚鱉之網設取獸之物也以實廟庖畜功用也以獸實宗廟庖厨也而長魚鱉畜四時功足國財用也且夫山不槎蘖槎斫也以株生曰蘖澤不伐夭草木未成曰夭魚禁鯤鮞鯤魚子也鮞未成魚也獸長麑䴠鹿子曰麑麋子曰䴠鳥翼鷇卵翼成也生哺曰鷇未乳曰卵蟲舍蚳蝝蚳蟻子也可以為醢蝝蝠蜪也可食舍不取也蕃庶物也古之訓也蕃息也今魚方别孕不教魚長又行網罟貪無藝也别别於雄而懷子也藝極也國語魯語定公以孔子為司空乃别五土之性而物各得其所生之宜咸得厥所家語晏子曰山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞侯守之海之鹽蜃祈望守之衡鹿舟鮫虞侯祈望皆官名也言公専守山澤之利不與民共左昭二十年氏傳孟子曰不違農時穀不可勝食也數罟不入汙池魚鱉不可勝食也斧斤以時入山林材木不可勝用也榖與魚鱉不可勝食材木不可勝用是使民養生喪死無憾也養生喪死無憾王道之始也農時謂春耕夏耘秋收之時凡有興作不違此時至冬乃役之也不可勝食言多也數密也罟網也汙窊下之地水所聚也古者網罟必用四寸之目魚不滿尺市不得粥人不得食山林川澤與民共之而有厲禁草木零落然後斧斤入焉此皆為治之初法制未備且因天地自然之利而樽莭愛養之事也然飲食宫室所以養生祭祀棺椁所以送死皆民所急而不可無者今皆有以資之則人無所恨矣王道以得民心為本故以此為王道之始孟子禮聖主之於禽獸也見其生不食其死聞其聲不嘗其肉𨼆弗忍也故逺庖厨仁之至也不合圍不掩羣不射宿不涸澤豺不祭獸不田獵獺不祭魚不設網罟鷹隼不鷙睦而不逮不出潁羅草木不零落斧斤不入山林昆蟲不蟄不以火田不麛不卵不刳胎不夭魚肉不入廟門鳥獸不成毫毛不登庖厨取之有時用之有節則物莫不多詩曰王在靈囿麀鹿攸伏麀鹿濯濯白鳥皓皓王在靈沼於仞魚躍言德志也聖主所以在魚鱉禽獸猶得其心况於人民乎故仁人行其禮則天下安而萬理得矣逮至德渥澤洽調和大暢則天清徹地富煴物時熟民心不挾詐賊氣脉淳化攫齧搏繫之獸鮮毒蠚猛虭之蟲密毒山不蕃草木少薄矣鑠乎大仁之化也並賈誼新書重門擊柝以待暴客蓋取諸豫豫備之意繫辭傳司寤氏掌夜時以星分夜以詔夜士夜禁夜時謂夜晚早若今甲乙至戊夜士主行夜徼候者如今都候之屬禦晨行者禁宵行者夜遊者備其遭寇害及謀非公事禦亦禁也謂遏止之無刑法也晨先明也宵定昏也書曰宵中星虛春秋傳曰夜中星隕如雨秋官修閭氏掌比國中宿互柝者與其國粥而比其追胥者而賞罰之國中城中也粥養也國所遊養謂羡卒也追逐寇也胥讀為偦故書互為巨鄭司農云宿謂宿衛也巨當為互謂行馬所以障互禁止人也柝謂夜行擊柝禁徑逾者與以兵革趨行者與馳騁於國中者皆為其惑衆銜枚氏掌司嚻察嚻歡者為其聒亂在朝者之言語禁􅑧呼歎鳴於國中者行歌哭於國中之道者為其惑衆相感動嗚吟也野廬氏禁野之橫行徑踰者皆為防姦也橫行妄繇田中徑逾射邪趨疾越隄渠也萍氏禁川遊者備波洋卒至沈溺也並秋官媒氏禁遷葬者與嫁殤者遷葬謂生時非夫婦死既葬遷之使相從也殤十九已下未嫁而死者生不以禮相接死而合之是亦亂人倫者也鄭司農云嫁殤者謂嫁死人也今時娶㑹是也地官馬質禁原𧖟者原再也天文辰為馬𧖟書𧖟為龍精月直大火則浴其種是𧖟與馬同氣物莫能兩大禁原𧖟者為傷馬與夏官朝士凡得獲貨賄人民六畜者委於朝告於士旬而舉之大者公之小者庶民私之俘而取之曰獲委於朝十日待來識之者人民謂刑人奴𨽻逃亡者鄭司農云若今時得遺物及放失六畜持諸鄉亭縣庭大者公之大物沒入公家也小者私之小物自畀也𤣥謂人民之小者未齓七嵗以下凡民同貨財者令以國法行之犯令者刑罰之鄭司農云同貨財者謂合錢共賈者也以國法行之司市為節以遺之𤣥謂同貨財者富人蓄積者多時收斂之乏時以國服之法出之雖有騰躍其嬴不得過此以利出者與取者過此則罰之若今時加貴取息坐贓並秋官右雜禁令禮書綱目卷六十三
