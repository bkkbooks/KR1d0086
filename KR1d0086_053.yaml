body:
  text: 禮書綱目卷五十一婺源江永撰軍通禮軍禮四補大宗伯以軍禮同邦國同謂威其不協僭差者軍禮之别有五小宰以官府之六聨合邦治四曰軍旅之聨事以法掌軍旅之戒具令百官府共其財用治其施舍聽其治訟天官班朝治軍涖官行法非禮威嚴不行曲禮以之軍旅有禮故武功成也若無禮軍旅武功失其制仲尼燕居右總要帝曰臯陶蠻夷猾夏冦賊姦宄汝作士舜典大戰于甘乃召六卿六卿六鄉之卿也按周禮鄉大夫每鄉卿一人六鄉六卿平居無事則各掌其鄉之政教禁令而屬於大司徒有事出征則各率其鄉之一萬二千五百人而屬于大司馬所謂軍將皆卿者是也意夏制亦如此甘誓惟仲康肇位四海𦙍侯命掌六師仲康太康之弟𦙍侯𦙍國之侯命掌六師命為大司馬也仲康始即位即命𦙍侯以掌六師次年方有征羲和之命必本始而言者蓋史臣善仲康肇位之時已能收其兵權故羲和之征猶能自天子出也𦙍征司馬掌邦政統六師平邦國詳見職官乃立夏官司馬使帥其屬而掌邦政以佐王平邦國大司馬卿一人小司馬中大夫二人軍司馬上士八人行司馬中士十有六人萬有二千五百人為軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫同上大司馬以九伐之法正邦國諸侯有違王命即出兵以征伐之所以正之也諸侯之於國如樹木之有根本是以言伐云馮弱犯寡則眚之馮猶乘陵也言不字小而侵侮之眚猶人眚瘦也王霸記曰四面削其地賊賢害民則伐之春秋傳曰粗者曰侵精者曰伐又曰有鐘鼓曰伐則伐者兵入其境鳴鐘鼓以往所以聲其罪暴內陵外則壇之內謂其國外謂諸侯壇讀如同墠之墠王霸記曰置之空墠之地鄭司農云壇讀從憚之以威之憚書亦或為墠𤣥謂置之空墠以出其君更立其次賢者野荒民散則削之荒蕪也田不治民不附削其地明其不能有負固不服則侵之負猶恃也固險可依以固者也不服不事大也侵之者兵加其竟而已用兵淺者詩曰密人不恭敢距大邦賊殺其親則正之正之者執而治其罪王霸記曰正殺之也春秋僖公二十八年冬晉人執衛侯歸之於京師坐殺其弟叔武放殺其君則殘之放逐也殘殺也王霸記曰殘滅其為惡犯令陵政則杜之令猶命也王霸記曰犯令者違命也陵政者輕政法不循也杜之者杜塞使不得與鄰國交通外內亂鳥獸行則滅之王霸記曰悖人倫外內無以異于禽獸不可親百姓則誅滅去之也曲禮曰夫唯禽獸無禮故父子聚麀小司馬之職掌闕軍司馬闕輿司馬闕行司馬闕都司馬掌都之士庶子及其衆庶車馬兵甲之戒令庶子卿大夫士之子車馬兵甲備軍發卒家司馬亦如之大夫家臣為司馬者春秋傳曰叔孫氏之司馬鬷戾並夏官右兵柄孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出論語孟子曰天下討而不伐諸侯伐而不討五霸者摟諸侯以伐諸侯者也故曰五霸者三王之罪人也討者出命以討其罪而使方伯連帥帥諸侯以伐之也伐者奉天子之命聲其罪而伐之也摟牽也五霸牽諸侯以伐諸侯不用天子之命也孟春不可以稱兵稱兵必天殃兵戎不起不可從我始毋變天之道毋絶地之理毋亂人之紀仲春毋作大事以妨農之事季夏不可以起兵動衆孟秋立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊還反賞軍帥武人於朝天子乃命將帥選士厲兵簡練桀俊專任有功以征不義詰誅暴慢以明好惡順彼逺方仲秋凡舉大事毋逆大數必順其時慎因其類並詳月令伐不踰時戰不逐奔誅不填服來服者不復填壓之苞人民驅牛馬曰侵斬樹木壞宫室曰伐制其人民驅其牛馬賊去之後則可還反樹木斬不復生宫室壞不自成故其為害重也隱五年穀梁傳凡師有鐘鼓曰伐聲其罪無曰侵鐘鼓無聲輕曰襲掩其不備氏莊二十九年左傳師出不正反戰不正勝不正者不正自謂出當復反戰當必勝僖二十六年公羊傳善為國者不師道之以德齊之以禮江熙曰鄰國望我歡若親戚何師之為善師者不陳師衆素嚴不須耀軍列陳江熙曰上兵伐謀何乃至陳善陳者不戰軍陳嚴整敵望而畏之莫敢戰善戰者不死投兵勝地故無死者江熙曰辟實攻虛則不死善死者不亡民盡其命無奔背散亡者也江熙曰見危授命義存君親雖沒猶存莊八年穀梁傳戎昭果毅以聽之之謂禮聽謂常存於耳著於心想聞其正令殺敵為果致果為毅易之戮也易反易氏宣二年左傳見可而進知難而退軍之善政也兼弱攻昧武之善經也昧昏亂經法也傳宣十二年左氏仁人之兵聚則成卒散則成列卒卒伍列行列言動皆有備也延則若莫邪之長刃嬰之者斷兌則若莫邪之利鋒當之者潰兌猶聚也與隊同謂聚之使短潰壞散也新序作鋭則若莫邪之利鋒也圜居而方正則若盤石然觸之者角摧圜居方正謂不動時也則如大石之不可移動也王者之軍制將死鼓死謂不棄之而奔亡也左傳曰師之耳目在吾旗鼓也御死轡百吏死職士大夫死行列聞鼓聲而進聞金聲而退順命為上有功次之軍之所重在順命故有功次之令不進而進猶令不退而退也其罪惟均令教令也言使之不進而進猶令不退而退其罪同也不殺老弱不獵禾稼獵與躐同踐也服者不禽格者不舍奔命者不獲服謂不戰而退者不追禽之格謂相拒捍者奔命謂奔走來歸其命者不獲之為囚俘也凡誅非誅其百姓也誅其亂百姓者也百姓有扞其賊則是亦賊也謂為賊之扞蔽也以故順刃者生蘇刃者死奔命者貢順刃謂不戰偝之而走者蘇讀為傃傃向也謂相向格鬭者貢謂來歸命者獻於上將也王者有誅而無戰城守不攻兵革不擊德義未加所以敵人不服故不攻擊也且恐傷我之士卒也上下相喜則慶之敵人上下相愛悅即慶賀之况侵我乎不屠城屠謂毁其城殺其民若屠者然也不潛軍不留衆不久留暴露于外也師不越時古者行役不踰時也故亂者樂其政不安其上欲其至也東征西怨之意並荀子古者戍軍三年不興覩民之勞也上下相報若此和之至也得意則愷歌示喜也偃伯靈臺答民之勞示休也古者以仁為本以義治之之謂正正不獲意則權權出於戰不出於中人是故殺人安人殺之可也攻其國愛其民攻之可也以戰止戰雖戰可也故仁見親義見說智見恃勇見方信見信內得愛焉所以守也外得威焉所以戰也戰道不違時不歷民病所以愛吾民也不加喪不困凶所以愛夫其民也冬夏不興師所以兼愛民也故國雖大好戰必亡天下雖安亡戰必危天下既平天子大愷春搜秋獮諸侯春振旅秋治兵所以不忘戰也古者逐奔不過百步縱綏不過三舍是以明其禮也不窮不能而哀憐傷病是以明其仁也成列而鼓是以明其信也爭義不爭利是以明其義也又能舍服是以明其勇也知終知始是以明其智也六德以時合教以為民紀之道也自古之政也天子之義必純取法天地而觀於先聖士庶之義必奉於父母而正於君長故雖有明君士不先教不可用也古之教民必立貴賤之倫經使不相陵德義不相踰材技不相掩勇力不相犯故力同而意和也古者國容不入軍軍容不入國故德義不相踰上貴不伐之士不伐之士上之器也苟不伐則無求無求則不爭國中之聽必得其情軍旅之聽必得其宜故材技不相掩從命為士上賞犯命為士上戮故勇力不相犯既致教其民然後謹選而使之事極修則百官給矣教極省則民興良矣習貫成則民體俗矣教化之至也古者逐奔不逺縱綏不及不逺則難誘不及則難陷以禮為固以仁為勝既勝之後其教可復是以君子貴之也並司馬法古者師出不踰時者為怨思也王者有三年之喪夷狄有內侵伐之者重天誅為宗廟社稷也誅不避親戚何所以明善善惡惡之義也諸侯有三年之喪有罪且不誅何君子恕己哀孝子之思慕不忍加刑罰也白虎通右用兵穆王將征犬戎穆王周康王之孫昭王之子穆王滿也征正也上討下之稱犬戎西戎之别名在荒服祭公謀父諫曰祭畿內之國周公之後為王卿士謀父字也傳曰凡蔣邢茅胙祭周公之𦙍也先王耀德不觀兵耀明也觀示也明德尚道化也不示兵者有大罪惡然後致誅不以小小而示威武夫兵戢而時動動則威戢聚也威畏也時動謂三時務農一時講武守則有財征則有威觀則玩玩則無震玩黷也震懼也夫先王之制邦內甸服邦外侯服侯衛賔服蠻夷要服戎翟荒服甸服者祭侯服者祀賔服者享要服者貢荒服者王日祭月祀時享歲貢終王先王之訓也注見封建及財賦篇有不祭則修意意志意也謂邦甸之內有違闕不供日祭者先修意以自責畿內近知王意也有不祀則修言言號令也有不享則修文文典法也有不貢則修名名謂尊卑職貢之名號晉語曰信於名則上下不干有不王則修德逺人不服則修文德以來之序成而有不至則修刑序成謂上五者次序也已成而有不至則有刑誅於是乎有刑不祭伐不祀征不享讓不貢讓譴責也告不王謂以文辭告曉之地逺者罪輕也於是乎有刑罰之辟刑不祭也有攻伐之兵伐不祀也有征討之備征不享也有威讓之令讓不貢也有文告之辭告不王也布令陳辭而又不至則又增修於德無勤民於逺勤勞也是以近無不聽逺無不服今自大畢伯仕之終也大畢伯仕犬戎氏之二君終卒也犬戎氏以其職來王以其職謂其嗣子以其貴珤來見王也天子曰豫必以不享征之且觀之兵享賔服之禮以責犬戎而示之兵非也其無乃廢先王之訓而王幾頓乎幾危也頓敗也王不聽遂征之得四白狼四白鹿以歸白狼白鹿犬戎所貢自是荒服者不至穆王責犬戎以非禮暴兵露師傷威毁信故荒服者不至周語宋襄公及楚人戰于泓宋人既成列楚人未既濟未盡渡泓水司馬曰子魚也彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉門官守門者師行則在君左右殱盡也國人皆咎公公曰君子不重傷不禽二毛二毛頭白有二色古之為軍也不以阻隘也不因阻隘以求勝寡人雖亡國之餘宋商紂之後不鼓不成列耻以詐勝子魚曰君未知戰勍敵之人隘而不列天贊我也勍强也言楚在險隘不得陳列天所以佐宋阻而鼓之不亦可乎猶有懼焉雖因阻擊之猶恐不勝且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛今之勍者謂與吾競者胡耉元老之稱明耻教戰求殺敵也明設刑罰以耻不果傷未及死如何勿重言尚能害己若愛重傷則如勿傷愛其二毛則如服焉言苟不欲傷殺敵人則本可不須鬭三軍以利用也為利興金鼓以聲氣也鼓以佐士衆之聲氣利而用之阻隘可也聲盛致志鼓儳可也儳巖未整陳氏僖二十二年左傳吳侵陳斬祀殺厲祀神位有屋樹者厲疫病吳侵陳以魯哀元年秋師還出竟陳太宰嚭使於師夫差謂行人儀曰是夫也多言盍嘗問焉師必有名人之稱斯師也者則謂之何大宰行人官名也夫差吳子光之子盍何不也嘗猶試也夫差修舊怨庶幾其師有善名大宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛獲謂係虜之二毛鬢髮斑白今斯師也殺厲與其不謂之殺厲之師與欲微切之故其言似若不審然正言殺厲重人曰反爾地歸爾子則謂之何子謂所獲民臣曰君王討敝邑之罪又矜而赦之師與有無名乎又微勸之終其意吳楚僭稱王號檀弓工尹商陽與陳弃疾追吳師及之工尹楚官名弃疾楚公子弃疾也以魯昭八年帥師滅陳縣之楚人善之因號之焉至十二年楚子狩于州來使蕩侯潘子司馬督囂尹午陵尹喜圍徐以懼吳於時有吳師陳或作陵楚人聲陳弃疾謂工尹商陽曰王事也子手弓而可手弓子射諸商陽仁不忍傷人以王事勸之射之斃一人韔弓不忍復射斃仆也韔韜也又及謂之又斃二人每斃一人掩其目止其御曰朝不坐燕不與殺三人亦足以反命矣朝燕於寢大夫坐於上士立於下然則商陽與御者皆士也兵車參乘射者在左戈盾在右御在中央孔子曰殺人之中又有禮焉善之同上子路拂然進曰人臣之節當君大事唯力所及死而後已夫子何善此子曰然如汝言也吾取其有不忍殺人之心而已家語晉士丐帥師侵齊至穀聞齊侯卒乃還詳録所至及還者善得禮聞喪而還禮也禮之常不必待君命襄十九年左氏傳還者何善辭也何善爾大其不伐喪也此受命乎君而伐齊則何大乎其不伐喪大夫以君命出進退在大夫也禮兵不從中御外臨事制宜當敵為帥唯義所在士丐聞齊侯卒引師而去恩動孝子之心義服諸侯之君是後兵寢數年故起時善之言乃者士丐有難重廢君命之心故見之言至穀者未侵齊也言聞者在竟外舉侵者張本公羊傳受命而誅生死無所加其怒不伐喪善之也榖梁傳保氏養國子以道教六儀五曰軍旅之容軍旅之容暨暨詻詻地官戎容暨暨果毅貌也言容詻詻教令嚴也色容厲肅儀形貌也視容清明察於事也玉藻軍旅之志怫然愠然精以厲軍旅之容湢然肅然固以猛軍旅之視固植虎張屏氣折聲軍旅之言也賈誼新書容經介胄則有不可犯之色貌與事宜相配介甲也曲禮勃然充滿者兵革之色介者不拜為其拜而蓌拜蓌則失容節蓌猶詐也曲禮乘兵車出先刃入後刃不以刃鄉國也軍尚左左陽也陽主生將軍有廟勝之䇿左將軍為上貴不敗績卒尚右右隂也隂主殺卒之行伍以右為上示有死志少儀兵車不式尚威武不崇敬武車綏旌盡飾也綏謂垂舒之也武車亦兵車曲禮禮介者不拜兵車不式不顧不言反抑式以應武容也兵車之容也容經野外軍中無摯以纓拾矢可也非為禮之處用時物相禮而已纓馬繁纓也拾謂射韝曲禮軍旅什伍同爵則尚齒而弟逹乎軍旅矣什伍士卒部曲也少儀曰軍尚左卒尚右祭義軍旅思險隱情以虞險阻出竒覆諼之處也隱意也思也虞度也當思念已情之所能以度彼之將然否少儀古者國容不入軍軍容不入國軍容入國則民德廢國容入軍則民德弱故在國言文而語溫在朝恭以遜修己以待人不召不至不問不言難進易退在軍抗而立在行遂而果介者不拜兵車不式城上不趨危事不齒故禮與法表裏也文與武左右也司馬法右軍容卻至三遇楚子之卒見楚子必下免胄而趨風疾如風楚子使工尹襄問之以弓問遺也曰方事之殷也殷盛也有韎韋之跗注君子也韎赤色跗注戎服若袴而屬於跗與袴連識見不穀而趨無乃傷乎恐其傷卻至見客免胄承命曰君之外臣至從寡君之戎事以君之靈閒䝉甲胄閒猶近也不敢拜命介者不拜敢告不寧君命之辱以君辱賜命故不敢自安為事之故敢肅使者言君辱命來問以有軍事不得答故肅使者肅手至地若今撎三肅使者而退成十六年左氏傳用命賞于祖不用命戮于社詳征伐誓禁章司勳掌六卿賞地之法以等其功戰功曰多尅敵出竒若韓信陳平司馬法曰上多前虜夏官古者賢王明民之德盡民之善故無廢德無簡民賞無所生罰無所試有虞不賞不罰而民可用至德也夏賞而不罰至教也殷罰而不賞至威也周以賞罰德衰也賞不踰時欲民速得為善之利也罰不遷列欲民速覩為不善之害也大捷不賞上下皆不伐善上苟不伐善則不驕矣下苟不伐善必亡等矣上下不伐善若此讓之至也大敗不誅上下皆以不善在已上苟以不善在已必悔其過下苟以不善在已必逺其罪上下分惡若此讓之至也司馬法右賞罰桓公二年冬公至自唐告於廟也凡公行告于宗廟反行飲至舍爵策勳焉禮也爵飲酒器也既飲置爵則書勳勞於䇿言速紀有功也左氏傳晉侯入曹令無入僖負羈之宫而免其族魏犫顛頡爇僖負羈氏爇燒也殺顛頡以徇于師立舟之僑以為戎石舟之僑故虢臣閔二年奔晉以代魏犫為先歸張本城濮之戰晉中軍風于澤牛馬因風而走皆失之亡大旆之左旃大斾旗名繫旐曰斾通帛曰旃祁瞞奸命掌此三事而不修為奸軍令司馬殺之以徇于諸侯師還濟河舟之僑先歸秋七月丙申振旅愷以入于晉愷樂也獻俘授馘飲至大賞授數也獻楚俘于廟殺舟之僑以徇于國民於是大服君子謂文公其能刑矣三罪而民服三罪顛頡祁瞞舟之僑詩云惠此中國以綏四方不失刑賞之謂也詩大雅言賞刑不失則中國受惠四方安靖僖二十八年左氏傳晉侯之弟揚干亂行於曲梁行陳次魏絳戮其僕僕御也晉侯怒魏絳至授僕人書僕人晉侯御僕將伏劒公讀其書曰日君乏使使臣斯司馬斯此也臣聞師衆以順為武順莫敢違軍士有死無犯為敬守官行法雖死不敢有違君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪懼自犯不正不敬之罪不能致訓至於用鉞用鉞斬揚干之僕臣之罪重敢有不從以怒君心言不敢不從戳請歸死於司冦致尸於司寇使戮之公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也子毋重寡人之過聽絳死為重過敢以為請請使無死晉侯以魏絳為能以刑佐民矣反役與之禮食使佐新軍羣臣旅㑹今欲顯絳故特為設禮食左襄三年氏傳子路問於孔子曰臧武仲率師與邾人戰于狐鮐遇敗焉師人多喪而無罰古之道然與孔子曰凡謀人之軍師敗則死之謀人之國邑危則亡之利已亡衆非忠也言亡之者雖辟賢非義退古之正也其君在焉者有詔則無討詔君之教也有君教則臣無討古之為軍也軍有左右闕從補之左右左右部也闕缺也成而不知是以寡敗不知敵不知有闕若以下二上闕而不變敗弗補也變更也變非聲章弗能移也聲金鼓也章旌旗也移動也聲章過數則有釁有釁則敵入釁隙也軍法進退旗鼓有數過則有隙敵見隙而犯已也敵入而凶救敗不暇誰能退敵敵之如志國之憂也可以陵小難以征大以下二上可以侵陵小國難以征大國孔叢子鄭伯賞入陳之功享子展賜之先路三命之服先路次路皆王所賜車之總名蓋請之于王先八邑以路及命服為邑先八邑三十二井賜子産次路再命之服先六邑子産辭邑曰自上以下隆殺以兩禮也臣之位在四上卿子展次卿子西十一年良霄見經十九年乃立子産為卿故位在四且子展之功也臣不敢及賞禮請辭邑賞禮以禮見賞謂六邑也公固豫之乃受三邑位次當受二邑以公固豫之故受三邑襄二十六年左氏傳晉趙鞅帥師及鄭罕逹帥師戰于鐵簡子誓曰克敵者上大夫受縣下大夫受郡周書作雒篇千里百縣縣有四郡士田十萬十萬畝也庶人工商遂得遂進仕人臣𨽻圉免去厮役志父無罪君實圖之志父趙簡子之一名也言巳事濟君當圖其賞若其有罪絞縊以戮絞所以縊人物桐棺三寸不設屬辟屬辟棺之重數王棺四重君再重大夫一重素車朴馬以載柩無入于兆兆葬域下卿之罰也為衆設賞自設罰所以能克敵哀二年左氏傳禮書綱目卷五十一
