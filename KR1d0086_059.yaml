body:
  text: 禮書綱目卷五十七婺源江永編職官上通禮六補郯子來朝叔孫昭子問焉曰少皥氏鳥名官何故也少皥金天氏黄帝之子己姓之祖也問何故以鳥名官郯子曰吾祖也我知之昔者黄帝氏以雲紀故為雲師而雲名黄帝軒轅氏姫姓之祖也黄帝受命有雲瑞故以雲紀事百官師長皆以雲為名號縉雲氏蓋其一官也炎帝氏以火紀故為火師而火名炎帝神農氏姜姓之祖也亦有火瑞以火紀事名百官共工氏以水紀故為水師而水名共工氏以諸侯霸有九州者在神農前大皥後亦受水瑞以水名官大皥氏以龍紀故為龍師而龍名大皥伏羲氏風姓之祖也有龍瑞故以龍命官我髙祖少皥氏之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正也鳯鳥知天時故以名厯正之官𤣥鳥氏司分者也𤣥鳥燕也以春分来秋分去伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止青鳥氏司啟者也青鳥鶬鴳也以立春鳴立夏止丹鳥氏司閉者也丹鳥鷩雉也以立秋來立冬去入大水為蜃上四鳥皆厯正之屬官祝鳩氏司徒也祝鳩鷦鳩也鷦鳩孝故為司徒主教民鴡鳩氏司馬也鴡鳩王鳩也鷙而有别故為司馬主法制鳲鳩氏司空也鳲鳩鴶鵴也鳲鳩平均故為司空平水土爽鳩氏司寇也爽鳩鷹也鷙故為司寇主盜賊鶻鳩氏司事也鶻鳩鶻鵰也春來冬去故為司事五鳩鳩民者也鳩聚也治民生聚故以鳩為正五雉為五工正五雉雉有五種西方曰鷷雉東方曰鶅雉南方曰翟雉北方曰鵗雉伊洛之南曰翬雉利器用正度量夷民者也夷平也九扈為九農正扈有九種也春扈鳻鶞夏扈竊𤣥秋扈竊藍冬脂扈竊黄棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊老扈鷃鷃以九扈為九農之號各隨其宜以教民事扈民無滛者也扈止也止氏使不滛放自顓頊以来不能紀逺乃紀於近為民師而命以民事則不能故也顓頊氏代少皡氏徳不能致逺瑞而以民事命官昭十七年左氏傳蔡墨曰有五行之官是謂五官實列受氏姓封為上公爵上公祀為貴神社稷五祀是尊是奉五官之君長能修其業者死皆配食於五行之神為王者所尊奉木正曰句芒正官長也取木生句曲而有芒角也其祀重焉火正曰祝融祝融明貌其祀犂焉金正曰蓐收秋物槯蓐而可收也其祀該焉水正曰𤣥冥水正而幽冥其祀修及熈焉土正曰后土土為羣物主故稱后也其祀句龍焉在家則祀中霤在野則為社昭二十九年左氏傳右上古官仲尼聞之見於郯子而學之於是仲尼年二十八既而告人曰吾聞之天子失官學在四夷猶信失官官不修其職也傳言聖人無常師昭十七年左氏傳蔡墨曰少皥氏有四叔少皥金天氏曰重曰該曰修曰熈實能金木及水能治其官使重為句芒木正該為蓐收金正修及熈為𤣥㝠二子相代為水正世不失職遂濟窮桑窮桑少皥之號也四子能治其官使不失職濟成少皥之功死皆為民所祀窮桑地在魯北顓頊氏有子曰犂為祝融犂為火正共工氏有子曰句龍為后土共工在大皥後神農前以水名官者其子句龍能平水土故死而見祀稷田正也掌播殖也有烈山氏之子曰柱為稷烈山氏神農世諸候周棄亦為稷棄周之始祖年昭二十九左氏傳觀射父曰觀射父楚大夫古者民神不雜雜㑹也謂司民司神之官各異民之精爽不􅠬貳者而又能齊肅𠂻正爽明也􅠬離也貳二也齊一也肅敬也𠂻中也其知能上下比義義宜也其聖能光逺宣朗聖通也朗明也其明能光昭之其聰能聴徹之徹逹也如是則神明降之降下也在男曰覡在女曰巫巫覡見鬼者周禮男亦曰巫是使制神之處位次主處居也位祭位也次主次其尊卑先後也而為之牲器時服牲牲之毛色大小也器所當用也時服四時服色所宜也而後使先聖之後之有光烈烈明也而能知山川之號號名位也高祖之主髙祖廟之先也宗廟之事昭穆之世父昭子穆先後之次也春秋齊僖公謂之逆祀齊敬之勤齊莊也禮節之宜威儀之則容貌之崇崇飾也忠信之質質誠也禋服之服潔祀曰禋而敬恭明神者以為之祝祝太祝也掌其福祥使名姓之後能知四時之生名姓謂舊族若伯夷炎帝之後為堯秩宗生嘉榖韭卵之屬犧牲之物玊帛之類采服之儀彝器之量彞六彞器俎豆量大小也次主之度疏數之度屛攝之位周氏云屏者并攝主人之位昭謂屏屏風也攝形如今要扇皆所以分别尊卑為祭祀之位近漢亦然壇場之所除地曰場上下之神氏姓之出所自出也而心率舊典者為之宗宗宗伯也掌祭祀之官於是乎有天地神民類物之官謂之五官類物謂别善惡利器用之官各司其序不相亂也及少皥之衰也九黎亂徳少皥黄帝之子金天氏也九黎黎氏九人也民神雜糅不可方物同位故雜糅方猶別也物名也顓頊受之少皥氏没顓頊氏作受承也乃命南正重司天以屬神南陵位正長也司主也屬㑹也所以㑹羣神使各有分序不相干亂也周禮則宗伯掌祭祀命火正黎司地以屬民唐尚書云火當為北北隂位也周禮則司徒掌土地人民也其後三苗復九黎之徳其後高卒氏之季年也三苗九黎之後也高辛氏衰三苗為亂行其凶徳如九黎之為也堯興而誅之堯復育重黎之後不忘舊者使復典之育長也堯繼高辛氏平三苗之亂繼育重黎之後使復典天地之官羲氏和氏是也以至於夏商故重黎氏世叙天地而别其分主者也叙次也分位也其在周程伯休父其後也當宣王時失其官守而為司馬氏程國也伯爵也休父名也失官守謂失天地之官而以諸侯為大司馬詩曰王謂尹氏命程伯休父是也國語楚語古者大撓作甲子黔如作慮首容成作厯羲和作占日尚儀作占月后益作占嵗胡曹作衣夷羿作弓祝融作市狄儀作酒高元作室虞姁作舟伯益作井赤冀作臼乘雅作駕寒衰作御王冰作服牛史皇作圖巫彭作醫巫咸作筮此二十官者聖王之所以治天下也聖王不能二十官之事然而使二十官盡其巧畢其能聖王在上故也聖王在上官使人人故盡畢其巧能也聖王之所不能也所以能之也用其人得其任故所以能其不知也所以知之也老子曰不知乃知之此之謂也養其神修其徳而已矣無所思慮勞神是養神也無狀而能化育萬物謂之徳豈必勞形愁弊耳目哉吕氏春秋唐虞稽古建官惟百内有百揆四岳外有州牧侯伯堯舜考古以建百官内置百揆四岳象天之有五行外置州牧十二及五國之長上下相維外内咸治言有法庶政惟和萬國咸寜官職有序故衆政惟和萬國皆安所以為至治夏商官倍亦克用乂禹湯建官二百亦能用治言不及唐虞之清要周官有虞氏官五十夏后氏官百殷二百周三百周之六卿其屬各六十周三百六十官也此云三百者記時冬官亡矣昏義曰天子立六官三公九卿二十七大夫八十一元士凡百二十蓋謂夏時也以夏周推前後之差有虞氏官宜六十夏后氏宜百二十殷宜二百四十不得如此記也明堂位記曰虞夏商周有師保有疑丞記所云謂天子也取以成記設四輔及三公不必備唯其人語使能也語言也得能則用之無則已不必備其官也小人處其位不如且闕文王世子古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其禄視次國之君也尚書大傳天子三公九卿二十七大夫八十一元士此夏制也明堂位曰夏后氏之官百舉成數也王制古者天子后立六宫三夫人九殯二十七世婦八十一御妻以聴天下之内治天子立六官三公九卿二十七大夫八十一元士以聴天下之外治天子六寢而六宫在後六官在前所以承副施外内之政也三夫人以下百二十人周制也三公以下百二十人似夏時也合而言之取其相應有象天數也昏義天子建天官先六大曰大宰大宗大史大祝大士大卜典司六典典法也此葢殷時制也周則大宰為天官大宗曰宗伯宗伯為春官大史以下屬焉大士以神士者天子之五官曰司徒司馬司空司士司㓂典司五衆衆謂羣臣也此亦殷時制也周則司士屬司馬大宰司徒宗伯司馬司宼司空為六官天子之六府曰司土司木司水司草司器司貨典司六職府主藏六物之稅者此亦殷時制也周則皆屬司徒司土土均也司木山虞也司水川衡也司草稻人也司器角人也司貨丱人也天子之六工曰土工金土石工木工獸工草工典制六材此亦殷時制也周則皆屬司空土工陶旊也金工築冶鳬㮚鍜桃也石工玉人磬人也木工輪輿弓廬匠車梓也獸工函鮑韗韋裘也唯草工職亡葢謂作萑葦之噐曲禮五官之長曰伯謂為三公者周禮九命作伯是職方職主也是伯分主東西者春秋傳曰自陜以東周公主之自陜以西召公主之一相處乎内是或為氏同上詳見名器上千里之外設方伯八伯各以其屬屬於天子之老二人分天下以為左右曰二伯老謂上公周禮曰九命作伯春秋傳曰自陜以東周公主之自陜以西召公主之詳見封建天子使其大夫為三監監於方伯之國國三人使佐方伯領諸侯王制立太師太傅太保茲惟三公論道經邦燮理隂陽師天子所師法傅傅相天子保保安天子於徳義者此惟三公之任佐王論道以經緯國事和理隂陽言有德乃堪之官不必備惟其人三公之官不必備員惟其人有徳乃以處之少師少傅少保曰三孤此三官名曰三孤孤特也言卑於公尊於卿特置此三者貳公𢎞化寅亮天地弼予一人副貳三公𢎞大道化敬信天地之教以輔我一人之治冡宰掌邦治統百官均四海天官卿稱大宰主國政治統理百官均平四海之内邦國言任大司徒掌邦治敷五典擾兆民地官卿司徒主國教化布五常之教以安和天下衆民使小大恊和宗伯掌邦禮治神人和上下春官卿宗廟官長主國禮治天地神祗人鬼之事及國之吉凶軍賓嘉五禮以和上下尊卑等列司馬掌邦政統六師平邦國夏官卿主戎馬之事掌國征代統正六軍平治王邦四方國之亂者司宼掌邦禁詰姦慝刑暴亂秋官卿主宼賊法禁治姦惡刑强暴作亂者夏司馬討惡助長物秋司宼刑姦順時殺司空掌邦土居四民時地利冬官卿主國邦土以居民士農工商四人使順天時分地利授之土能吐生百榖故曰土六卿分職各率其屬以倡九牧阜成兆民六卿各率其屬官大夫士治其所分之職以倡道九州牧伯為政大成兆民之性命皆能其官則政治周官内有九室九嬪居之外有九室九卿朝焉内路寢之裏也外路門之表也九室如今朝堂諸曹治事處九嬪掌婦學之法以教九御六卿三孤為九卿九分其國以為九分九卿治之九分其國分國之職也三孤佐三公論道六卿治六官之屬考工記匠人大宰乃施法於官府而建其正立其貳設其攷陳其殷置其輔正謂冡宰司徒宗伯司馬司宼司空也貳謂小宰小司徒小宗伯小司馬小司宼小司空也考成也佐成事者謂宰夫鄉師肆師軍司馬士師也司空亡未聞其考天官右厯代官制之略堯命羲和欽若昊天羲氏和氏主厯象授時之官堯命舜以位慎徽五典慎美也五典五常也此葢使為司徒之官也納于百揆百揆者揆度庶政之官惟唐虞有之猶周之冡宰也賓于四門四門四方之門古者以賓禮親邦國諸侯各以方至而使主焉故曰賓此葢又兼四岳之官也典舜舜咨十有二牧牧養民之官十二牧十二州之牧也咨四岳有能奮庸熈帝之載使宅百揆亮采恵疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉四岳官名一人而聰四岳諸侯之事也舜言有能奮起事功以廣帝堯之事者使居百揆之位以明亮庶事而順成庶類也四岳及諸侯言伯禹作司空可宅百揆舜然其舉而咨禹使仍作司空而兼行百揆之事以司空兼百揆如周以六卿兼三公後世以他官平章事知政事者亦此類也棄汝后稷后君也有爵土之稱稷田正官契汝作司徒臯陶汝作士士理官也咨垂汝共工共工官名咨益汝作朕虞虞掌山澤之官周禮分為虞衡屬於地官咨伯汝作秩宗秩宗主釵次百神之官而專以秩宗名之者葢以宗廟為主也䕫命汝典樂教胄子龍命汝作納言納言官名舜典大戰于甘乃召六卿六卿六鄉之卿也甘誓實維阿衡實左右商王阿衡伊尹官號也商頌長發薛之皇祖奚仲居薛以為夏車正奚仲為夏掌掌車服大夫仲虺居薛以為湯左相仲虺奚仲之後左定元年氏傳成王幼在襁褓之中召公為大保周公為大傅大公為大師保保其身體傅傅之徳義師道之教訓所謂三公也於是為置三少皆上大夫也曰少保少傅少師是與大子宴也詳見保𫝊天子三公稱公王者之後稱公天子三公者何天子之相也相助也天子之相則何以三據經但有祭公周公自陜而東者周公主之自陜而西者召公主之一相處乎内陜者葢今𢎞農陜縣是也禮司馬主兵司徒主教司空主土春秋撥亂世以黜陟為本故舉絀陟以所主者言之五年公羊傳隱古者天子三公毎一公三卿佐之毎一卿三大夫佐之毎一大夫三士佐之故天子三公九卿二十七大夫八十一元士所與為天下者若此而已自三公至元士凡百二十此夏時之官周之官三百六十禮志曰有虞氏之官五十夏后百殷二百周三百近之未得其實也據夏周推其差則有虞氏之官六十夏后氏百二十殷二百四十周三百六十為有所法尚書大傳王者所以立三公九卿何曰天雖至神必因日月之光地雖至靈必有山川之化聖人雖有萬人之徳必須俊賢三公九卿二十七大夫八十一元士以順天成其道司馬主兵司徒主人司空主地王者受命為天地人之職故分職以置三公各主其一以効其功一公置三卿故九卿也天道莫不成於三三公九卿二十七大夫八十一元士凡百二十官下應十二子白虎通襄王曰内官不過九御九御九嬪外官不過九品九品九卿周禮内有九室九嬪居之外有九室九卿朝焉足以供給神祇而已言卿與嬪主祭祀也魯語曰日入監九御使潔奉禘郊之粢盛國語周語觀射父曰民之徹官百徹逹也自以名逹於上者有百官也王公之子弟之質能言能聴徹其官者質有賢質也能言能言其官職也而物賜之姓以監其官是為百姓物事也以功事賜之姓官有世功則有官族若司馬太史之屬是也姓有徹品十於王謂之千品謂一官之職其寮屬徹於王者有十品百官故有千品也五物之官陪屬萬為萬官五物謂天地神民類物之官也臣之臣為陪屬謂有寮屬轉陪貳相佐助復有十等千品故萬官也官有十醜為億醜醜類也以十醜承萬為十萬十萬曰億古數也今人乃以萬萬為億天子之田九畡以食兆民九畡九州之内有畡數也食兆民耕而食其中也天子曰兆民王取經入焉以食萬官經常也常入征税也楚語芋尹無宇曰天有十日甲至癸人有十等王至臺下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣隸隸臣僚僚臣僕僕臣臺馬有圉牛有牧養馬曰圍養牛曰牧以待百事昭七年左氏傳惟王建國辨方正位體國經野設官分職以為民極注詳見制國乃立天官冡宰使帥其屬而掌邦治以佐王均邦國掌主也邦治主佐王治邦國也佐猶助也鄭司農云邦治謂總六官之職也故大宰職曰掌建邦之六典以佐王治邦國六官皆總屬於冡宰故論語曰君薨百官總已以聴於冡宰言冡宰於百官無所不主爾雅曰冡大也冡宰大宰也天天官冡宰鄭目録云象天所立之官冡大也宰者官也者統理萬物天子立冡宰使掌邦治亦所以總御衆官使不失職不言司者大宰總御衆官不主一官之事也治官之屬大宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人變冡言大進退異名也百官總馬則謂之冡列職於王則稱大冡大之上也山項曰冡旅衆也下士治衆事者自大宰至旅下士轉相副貳皆王臣也王之卿六命其大夫四命士以三命而下為差府六人史十有二人府治藏史掌書者凡府史皆其官長所自辟除胥十有二人徒百有二十人此民給徭役者若今衞士矣胥讀如諝謂其有才知為什長宫正上士二人中士四人下士八人府二人史四人胥四人徒四十人正長也宫正主宫中官之長宫伯中士二人下士四人府一人史二人胥二人徒二十人伯長也膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人膳之言善也今時美物曰珍膳膳夫食官之長也鄭司農以詩說之曰仲允膳夫庖人中士四人下士八人府二人史四人賈八人胥四人徒四十人庖之言苞也裹肉曰苞苴賈主市買知物賈内饔中士四人下士八人府二人史四人胥十人徒百人饔割亨煎和之稱内饔所主在内外饔中士四人下士八人府二人史四人胥十人徒百人外饔所主在外亨人下士四人府一人史二人胥五人徒五十人主為外内饔煮肉者甸師下士二人府一人史二人胥三十人徒三百人郊外曰甸師猶長也甸師主共野物官之長獸人中士四人下士八人府二人史四人胥四人徒四十人䱷人中士二人下士四人府二人史四人胥三十人徒三百人鼈人下士四人府二人史二人徒十有六人腊人下士四人府二人史二人徒二十人腊之言夕也醫師上士二人下士四人府二人史二人徒二十人醫師衆醫之長食醫中士二人食有和齊藥之類疾醫中士八人瘍醫下士四人瘍創癰也獸醫下士四人獸牛馬之類酒正中士四人下士八人府二人史八人胥八人徒八十人酒正酒官之長酒人奄十人女酒三十人奚三百奄精氣閉藏者今謂之宦人月令仲冬其器閎以奄女洒女奴曉酒者古者從坐男女没入縣