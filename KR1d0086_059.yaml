之量次主之度屏攝之位壇場之所上下之神祗氏姓之所出而率舊典者為之宗春秋禘于大廟躋僖公而傳曰夏父弗忌為宗人又曰使宗人釁夏獻其禮禮特牲曰宗人升自西階視壺濯及豆籩然則唐虞厯三代以宗官典國之禮與其祭祀漢之大常是也也春官宗伯鄭目錄云象春所立之官也宗尊也伯長春者出生萬物天子立宗伯使掌邦禮典禮以事神為上亦所以使天下報本反始不言司者鬼神示人之所尊不敢主之故也禮官之屬大宗伯卿一人小宗伯中大夫二人肆師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人徒百有二十人肆猶陳也肆師佐宗伯陳列祭祀之位及牲器粢盛鬰人下士二人府二人史一人徒八人鬰鬰金香草宜以和鬯鬯人下士二人府二人史一人徒八人鬯釀秬為酒芬芳條暢於上下也秬如黑黍一稃二米雞人下士一人史一人徒四人司尊彝下士二人府四人史二人胥二人徒二十人彝亦尊也鬰鬯曰彝彝法也言為尊之法也司几筵下士二人府二人史一人徒八人筵亦席也鋪陳曰筵藉之曰席然其言之筵席通矣天府上士一人中士二人府四人史二人胥二人徒二十人府物所藏言天府尊此所藏若天物然典瑞中士二人府二人史二人胥一人徒十人瑞節信也典瑞若今符璽郎典命中士二人府二人史二人胥一人徒十人命謂王遷秩羣臣之書司服中士二人府二人史一人胥一人徒十人典祀中士二人下士四人府二人史二人胥四人徒四十人守祧奄八人女祧毎廟二人奚四人逺廟曰祧周為文王武王廟遷主藏焉奄如今之宦者女祧女奴有才知者天子七廟三昭三穆奚女奴也世婦毎宫卿二人下大夫四人中士八人女府二人女史二人奚十有六人世婦后宫官也王后六宫漢使大長秋詹事中内宗凡内女之有爵者内女王同姓之女謂之内宗有爵其嫁於大夫及士者凡無常數之言外宗凡外女之爵者外女王諸姑姊妹之女謂之外宗冡人下大夫二人中士四人府二人史四人胥十有二人徒百有二十人冡封上為丘壠象冡而為之墓大夫下大夫二人中士八人府二人史四人胥二十人徒二百人墓冡塋之地孝子所思慕之處職喪上士二人中士四人下士八人府二人史四人胥四人徒四十人職主也大司樂中大夫二人樂師下大夫四人上士八人下士十有六人府四人史八人胥八人徒八十人大司樂樂官之長大胥中士四人小胥下士八人府二人史四人徒四十人胥有才知之稱禮記文王世子曰小樂正學干大胥贊之大師下大夫二人小師上士四人瞽矇上瞽四十人中瞽百人下瞽百有六十人眡瞭三百人府四人史八人胥十有二人徒百有二十人凡樂之歌必使瞽矇為焉命其賢知者以為大師小師晉杜蒯云曠也大師也眡讀為虎眡之眂瞭目明者鄭司農云無目眹謂之瞽有目眹而無見謂之矇有目無眸子謂之瞍典同中士二人府一人史一胥二人徒二十人同隂律也不以陽律名官者因其先言耳書曰恊時月正日同律度量衡大師職曰執同律以聴軍聲磬師中士四人下士八人府四人史二人胥四人徒四十人鍾師中士四人下士八人府二人史二胥六人徒六十人笙師中士二人下士四人府二人史二人胥一人徒十人鎛人中士二人下士四人府二人史二人胥二人徒二十人鏄如鍾而大韎師下士二人府一人史一人舞者十有六人鄭司農云以明堂位曰韎東夷之樂讀如味飲食之味杜子春云韎為菋莖著之菋𤣥讀謂如韎韐之韎旄人下士四人舞者衆寡無數府二人史二人胥二人徒二十人旄旄牛尾舞者所持以指麾籥師中士四人府二人史二人胥二人徒二十人籥舞者所吹春秋宣八年壬午猶繹萬入去籥傳曰去其有聲者廢其無聲者詩云左手執籥右手秉翟籥章中士二人下士四人府一人史一人胥二人徒二十人籥章吹籥以為詩章鞮鞻氏下士四人府一人史一人胥二人徒二十人鞻讀如屨也鞮屨四夷舞者所屝也今時倡蹋鼔沓行者自有屝典庸器下士四人府四人史二人胥八人徒八十人庸功名鄭司農云庸器有功者鑄器銘其功春秋傳曰以所得於齊之兵作林鍾而銘魯功焉司干下士二人府二人史二人徒二十人干舞者所持謂楯也春秋傳曰萬者何干舞也大卜下大夫二人卜師上士四人卜人中士八人下士十有六人府二人史二人胥四人徒四十人問龜曰卜大卜卜筮官之長龜人中士二人府二人史二人工四人胥四人徒四十人工取龜攻龜菙氏下士二人史一人徒八人燋焌用荆菙之類占人下士八人府一人史二人徒八人占蓍龜之卦兆吉凶簭人中士二人府一人史二人徒四人問蓍曰筮其占易占夢中士二人史二人徒四人眂祲中士二人史二人徒四人祲隂陽彘相侵漸成祥者魯史梓慎曰吾見赤黒之祲大祝下大夫二人上士四人小祝中士八人下士十有六人府二人史四人胥四人徒四十人大祝祝官之長喪祝上士二人中士四人下士八人府二人史二人胥四人徒四十人甸祝下士二人府一人史一人徒四人甸之言田也田狩之祝詛祝下士二人府一人史一人徒四人詛謂祝之使沮敗也司巫中士二人府一人史一人胥一人徒十人司巫巫官之長男巫無數女巫無數其師中士四人府二人史四人胥四人徒四十人巫能制神之處位次主者大史下大夫二人上士四人小史中士八人下士十有六人府四人史八人胥四人徒四十人大史史官之長馮相氏中士二人下士四人府二人史四人徒八人馮乘也相視也世登高臺以視天文之次序天文屬大史月令曰乃命大史守典奉法司天日月星辰之行宿離不貸保章氏中士二人下士四人府二人史四人徒八人保守也世守天文之變内史中大夫一人下大夫二人上士四人中士八人下士十有六人府四人史八人胥四人徒四十人外史上士四人中士八人下士十有六人胥二人徒二十人御史中士八人下士十有六人其史百有二十人府四人胥四人徒四十人御猶侍也進也其史百有二十人以掌贊書人多也巾車下大夫二人上士四人中士八人下士十有六人府四人史八人工百人胥五人徒五十人巾猶衣也巾車車官之長典路中士二人下士四人府二人史二人胥二人徒二十人路王之所乘車車僕中士二人下士四人府二人史二人胥二人徒二十人司常中士二人下士四人府二人史二人胥四人徒四十人司常主王旌旗都宗人上士二人中士四人府二人史四人胥四人徒四十人都謂王子弟所封及公卿所食邑家宗人如都宗人之數家謂大夫所食采邑凡以神士者無數以其藝為之貴賤之等以神士者男巫之後有學問才知者藝謂禮樂射御書數高者為上士次之為中士又次之為下士右春官之屬惟王建國辨方正位體國經野設官分職以為民極乃立夏官司馬使帥其屬而掌邦政以佐王平邦國政正也政所以正不正者也孝經説曰政者正也正徳名以行道夏官司馬鄭日錄云象夏所立之官馬者武也言為武者也夏整齊萬物天子立司馬共掌邦政政可以平諸侯正天下故曰統六師平邦國政官之屬大司馬卿一人小司馬中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人嶼衆也行謂軍行列晉作穴軍而有三行取名於此凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長軍師旅卒兩伍皆衆名也伍一比两一閭卒一旅旅一黨師一州軍一鄉家所出一人將帥長司馬者其帥吏也言軍將皆命卿則凡軍帥不特置選於六官六卿之吏自卿以下徳任者使兼官焉鄭司農云王六軍大國三軍次國二軍小國一軍故春秋傳有大國次國小國又曰成國不過半天子之軍周為六軍諸候之大者三軍可也詩大雅常武曰赫赫明明王命卿士南仲大祖大師皇父整我六師以修我戎既敬既戒惠此南國大雅文王曰周王于邁六師及之此周為六經之見於經也春秋傳曰王使虢公命曲沃伯以一軍為晉侯此小國一軍之見於傳也百人為卒二十五人為两故春秋傳曰廣有一卒卒偏之两一軍則二府六史胥十人徒百人司勲上士二人下士四人府二人史四人胥二人徒二十人故書勲作勛鄭司農云勛讀為勲勲功也此官主功賞故曰掌六卿賞地之法以等其功馬質中士二人府一人史二人賈四人徒八人質平也主買馬平其大小之賈直量人下士二人府一人史四人徒八人量猶度也謂以丈尺度地小子下士二人史一人徒八人小子主祭祀之小事羊人下士二人史一人賈二人徒八人司爟下士二人徒六人故書爟為燋杜子春云燋當為爟書或亦為爟爟為私火𤣥謂爟讀如予若觀火之觀今燕俗名湯熱為觀則爟火謂熱火與掌固上士二人下士八人府二人史四人胥四人徒四十人固國所依阻者也國曰固野曰險易曰王公設險以守其國司險中士二人下士四人史二人徒四十人掌疆中士八人史四人胥十有六人徒百有六十人疆界也侯人上士六人下士十有二人史六人徒百有二十人侯侯迎賓客之来者環人下士六人史二人徒十二人環猶卻也以勇力卻敵挈壺氏下士六人史二人徒十有二人挈讀如絜髪之絜壺盛水器也世主絜壺水以為漏射人下大夫二人上士四人下士八人府二人史四人胥二人徒二十人服不氏下士一人徒四人服不服不服之獸者射鳥氏下士一人徒四人羅氏下士一人徒八人能以羅罔搏鳥者郊特牲曰大羅氏天子之掌鳥獸者掌畜下士二人史二人胥二人徒二十人畜謂歛而養之司士下大夫二人中士六人下士十有二人府二人史四人胥四人徒四十人諸子下大夫二人中士四人府二人史二人胥二人徒二十人諸子主公卿大夫士之子者或及庶子司右上士二人下士四人府四人史四人胥八人徒八十人右謂有勇力之士充王軍右虎賁氏下大夫二人中士十有二人府二人史八人胥八十人虎士八百人不言徒曰虎士則虎士徒之選有勇力者旅賁氏申士二人下士十有六人史二人徒八人節服氏下士八人徒四人世為王節所衣服方相氏狂夫四人方相猶言放想可畏怖之貌大僕下大夫二人小臣上士四人祭僕中士六人御僕下士十有二人府二人史四人胥二人徒二十人僕侍御於尊者之名大僕其長也隸僕下士二人府一人史二人胥四人徒四十人此吏而曰隸以其事䙝弁師下士二人工四人史二人徒四人弁者古冠之大稱委貌緇布曰冠司甲下大夫二人中士八人府四人史八人胥八人徒八十人甲今之鎧也司甲兵戈盾官之長司兵中士四人府二人史四人胥二人徒二十人司戈盾下士二人府一人史二人徒四人戈今時句子㦸司弓矢下大夫二人中士八人府四人史八人胥八人徒八十人司弓矢弓弩矢箙官之長繕人上士二人下士四人府一人史二人胥二人徒二十人繕之言勁也善也槀人中士四人府二人史四人胥二人徒二十人鄭司農云槀讀為芻槀之槀箭幹謂之槀此官主弓弩箭矢故謂之槀人戎右中大夫二人上士二人右者參乗此充戎路之右田獵亦為之右焉齊右下大夫二人充玉路金路之右道右上士二人充象路之右大馭中大夫二人馭之最尊戎僕中大夫二人馭言僕者此亦侍御於車齊僕下大夫二人古者王將朝覲會同必齊所以敬宗廟及神明道僕上士十有二人王朝夕在朝主御王以與諸臣行先王之道田僕上士十有二人馭夫中士二十人下士四十人校人中大夫二人上士四人下士十有六人府四人史八人胥八人徒八十人校之為言校也主馬者必仍校視之校人馬官之長趣馬下士皂一人徒四人趣馬趣養馬者也鄭司農説以詩曰蹶維趣馬巫馬下士二人醫四人府一人史二人賈二人徒二十人巫馬知馬祖先牧馬社馬歩之神者馬疾若有犯馬則知之是以使與醫同職牧師下士四人胥四人徒四十人主牧放馬而養之廋人下士閑二人史二人徒二十人廋之言數圉師乗一人徒二人圉人良馬匹一人駑馬麗一人養馬曰圉四馬為乘良善也麗耦也職方氏中大夫四人下大夫八人中士十有六人府四人史十有六人胥十有六人徒百有六十人職主也主四方之職貢者職方氏主四方官之長土方氏上士五人下士十人府二人史五人胥五人徒五十人土方氏主四方邦國之土地懷方氏中士八人府四人史四人胥四人徒四十人懷來也主來四方之民及其物合方氏中士八人府四人史四人胥四人徒四十人合方氏主合同四方之事訓方氏中士四人府四人史四人胥四人徒四十人訓道也主教道四方之氏形方氏士察也主察獄訟之事者鄭司農説以論語曰桞下惠為士師鄉士主六鄉之獄府六人史十有二人胥十有二人徒百有二十人遂士中士十有二人府六人史十有二人胥十有二人徒百有二十人遂士主六遂之獄者縣士中士三十有二人府八人史十有六人胥十有六人徒百有六十人距王城三百里至四百里曰縣縣士主縣之獄者方士中士十有六人府八人史十有六人胥十有六人徒百有六十人方士主四方都家之獄者訝士中士八人府四人史八人胥八人徒八十人訝迎也士官之迎四方賓客朝士中士六人府三人史六人胥六人徒六十人朝士主外朝之法司民中士六人府三人史六人胥三人徒三十人司民主氏數司刑中士二人府一人史二人胥二人徒二十人司刺下士二人府一人史二人徒四人刺殺也三訊罪定則殺之司約下士二人府一人史二人徒四人約言語之約束司盟下士二人府一人史二人徒四人盟以約辭告神殺牲㰱血明著其信也曲禮曰涖牲曰盟職金上士二人下士四人府二人史四人胥八人徒八十人職主也司厲下士二人史一人徒十有二人犯政為惡曰厲厲士主盜賊之兵器及其奴者犬人下士二人府一人史二人賈四人徒十六人司圜中士六人下士十有二人府三人史六人胥十有六人徒百有六十人鄭司農云圜謂圜土也圜土謂獄城也今獄城圜司圜職中言凡圜土之刑人也以此知圜謂圜土也又大司冦職曰以圜土聚教罷民故司圜職曰掌收教罷民掌囚下士十有二人府六人史十有二人徒百有二十人囚拘也主拘繋當刑殺之者掌戮下士二人史一人徒十有二人戮猶辱也既斬殺又辱之司隸中士二人下士十有二人府五人史十人胥二十人徒二百人隸給勞辱之役者漢始置司隸亦使將徒治道溝渠之役後稍尊之使主官府及近郡罪隸百有二十人盜賊之家為奴者蠻隸百有二十人征南夷所獲閩隸百有二十人閩南蠻之別夷隸百有二十人征東夷所獲貉隸百有二十人征東北夷所獲凡隸衆矣此其選以為役員其餘謂之隸布憲中士二人下士四人府二人史四人胥四人徒四十人憲表也主表形禁者禁殺戮下士二人史一人徒十有二人禁殺戮者禁民不得相殺戮禁暴氏下士六人史三人胥六人徒六十人野廬氏下士六人胥十有二人徒百有二十人盧賓客行道所舎蜡氏下士四人徒四十人蜡骨肉腐臭蠅蟲所蜡也月令曰揜骼埋骴此官之職也蜡讀如狙司之狙雍氏下士二人徒八人雍謂隄防止水者也萍氏下士二人徒八人鄭司農云萍讀為蛢或為蓱號起雨之蓱𤣥謂今天問蓱號作萍爾雅曰萍蓱其大者蘋讀如小子言平之平萍氏主水禁萍之草無根而浮取名於其不沈溺司寤氏下士二人徒八人寤覺也主夜覺者司烜氏下士六人徒十有六人烜火也讀如衛侯燬之燬故書燬為垣鄭司農云當為烜條狼氏下士六人胥六人徒六十人杜子春云條當為滌器之滌𤣥謂滌除也狼狼扈道上修閭氏下士二人史一人徒十有二人閭謂里門冥氏下士二人徒八人鄭司農云冥讀謂冥氏春秋之冥𤣥謂冥方之冥以繩縻取禽獸之名庶氏下士一人徒四人庶讀如藥煮之煮驅除毒蠱之言書不作蠱者字從聲穴氏下士一人徒四人穴搏蟄獸所藏者翨氏下士二人徒八人翨鳥翮也鄭司農云翨讀謂翅翼之翅柞氏下士二人徒八人柞除木之名除木者必先枝剥之鄭司農云柞讀為聲音唶唶之唶屋笮之笮薙氏下士二人徒二十人書薙或作夷鄭司農云掌殺草故春秋傳曰如農夫之務去草芟夷藴崇之又今俗間謂麥下為夷下言芟夷其麥以其下種禾豆也𤣥謂薙讀如鬀小兒頭之鬀書或作夷此皆剪草也字從類耳月令曰燒薙行水謂燒所芟草乃水之硩蔟氏下士一人徒二人鄭司農云硩讀為擿蔟讀為爵蔟之蔟謂巢也𤣥謂硩古字從石折聲剪氏下士一人徒二人剪斷滅之言也主除蠱蠧者詩云實始剪啇赤叐氏下士一人徒二人赤叐猶言捇㧞也主除蟲豸自埋者蟈氏下士一人徒二人鄭司農云蟈讀為蜮蜮蝦蟇也月令曰螻蟈鳴故曰掌去鼁黽鼁黽蝦國蟇屬書或為掌去蝦蟇𤣥謂蟈今御所食蛙也字從虫聲也蜮乃短狐輿壺涿氏下士一人徒二人壺謂瓦鼔涿擊之也故書涿為獨鄭司農云獨讀為濁其源之濁音與涿相近書亦或為濁庭氏下士一人徒二人庭氏主射妖鳥令國中絜清如庭者也銜枚氏下士二人徒八人銜枚止言語囂讙也枚狀如箸横銜之為之繣結於項伊耆氏下士一人徒二人伊耆古王者號始為蜡以息老物此主王者之齒枤使王識伊耆氏之舊徳而以名官與今姓有伊耆氏大行人中大夫二人小行人下大夫四人司儀上士八人中士十有六人行夫下士三十有二人府四人史八人胥八人徒八十人行夫主國使之禮環人中士四人史四人胥四人徒四十人環猶圍也主圍賓客任器為之守衛象胥毎翟上士一人中士二人下士八人徒二十人通夷狄之言者曰象胥其有才知者也此類之本名東方曰寄南方曰象西方曰狄鞮北方曰譯今總名曰象者周之徳先致南方也掌客上士二人下士四人府一人史二人胥二人徒二十人掌訝中士八人府二人史四人胥四人徒四十人訝迎也賓客來主迎之鄭司農云訝讀為跛者訝跛者之訝掌交中士八人府二人史四人徒三十有二人主交通結諸侯之合掌察四方中士八人史四人徒十有六人掌貨賄下士十有六人史四人徒三十有二人朝大夫每國上士二人下士四人府一人史二人庶子八人徒二十人此王之士也使主都家之國治而命之朝大夫云都則中士一人下士二人府一人史二人庶子四人徒八十人都則主都家之八則者也當言毎都如朝大夫及都司馬云都士中士二人下士四人府二人史四人胥四人徒四十人家士亦如之都家之士主治都家吏民之獄訟以告方士者也亦當言毎都右秋官之屬冬官其屬六十掌邦事天官小宰右冬官冬官考工記鄭目錄云象冬所立官也是官名司空者冬閉藏萬物天子立司空使掌邦事亦所以富國家使民無空者也司空之篇亡漢興購求千金不得此前世識其事者記錄以備大數古周禮六篇畢矣古周禮六篇者天子所專秉以治天下諸侯不得用焉六官之記可見者堯育重黎之後羲和及其仲叔四子掌天地四時夏書亦云乃召六卿商周雖稍増改其職名六官之數則同矣攻木之工輪輿弓廬匠車梓攻金之工築冶鳧㮚段桃攻皮之工函鮑韗韋裘設色之工畫繢鍾筐㡛刮摩之工玉楖雕矢磬搏埴之工陶旊事官之屬六十此識其五材三十工畧記其事耳其曰某人者以其事名官也其曰某氏者官有世功若族有世業以氏名官者也考工記詳見政事上篇工政章禮書綱目卷五十七
