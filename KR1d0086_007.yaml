body:
  text: 禮書綱目卷五婺源江永撰燕禮嘉禮八經鄭目録云諸侯無事若卿大夫有勤勞之功與羣臣燕飲以樂之燕禮于五禮屬嘉禮燕禮小臣戒與者小臣相君燕飲之法戒與者謂留羣臣也君以燕禮勞使臣若臣有功故與羣臣樂之小臣則警戒告語焉飲酒以合㑹為歡也右戒羣臣膳宰具官饌于寢東膳宰天子曰膳夫掌君飲食膳羞者也具官饌具其官之所饌謂酒也牲也脯醢也寢路寢樂人縣縣鐘磬也國君無故不徹縣官縣者為燕新之設洗篚於阼階東南當東霤罍水在東篚在洗西南肆設膳篚在其北西面設此不言其官賤也當東霤者人君為殿屋也亦南北以堂深肆陳也膳篚者君象觚所饌也亦南陳言西面尊之異其文司宫尊于東楹之西兩方壺左𤣥酒南上公尊瓦大兩有豐幂用綌若錫在尊南南上尊士旅食于門西兩圜壺司宫天子曰小宰聽酒人之成要者也尊方壺為卿大夫士也臣道直方于東楹之西豫君專此酒也玉藻曰唯君面尊𤣥酒在南順君之面瓦大有虞氏之尊也禮器曰君尊瓦甒豐形似豆卑而大幂用綌若錫冬夏異也在尊南在方壺之南也尊士旅食者用圜壺變于卿大夫也旅衆也士衆食謂未得正祿所謂庶人在官者也今文錫為緆司宫筵賓于戶西東上無加席也筵席也席用蒲筵緇布純無加席燕私禮臣屈也諸侯之官無司几筵也右陳饌器記燕朝服于寢朝服者諸侯與其羣臣日視朝之服也謂冠𤣥端緇帶素韠白屨也燕於路寢相親昵也今辟雍十月行此燕禮𤣥冠而衣皮辨服與禮異也亨于門外東方享于門外臣所掌也本經記唯君面尊面猶鄉也燕禮曰司宫尊于東楹之西兩方壺左𤣥酒公尊瓦大兩有豐在尊南南上玉藻射人告具告事具于君射人主此禮以其或射也小臣設公席于阼階上西鄉設加席公升即位于席西鄉周禮諸侯酢席莞筵紛純加繅席畫純後設公席者凡禮卑者先即事尊者後也小臣納卿大夫卿大夫皆入門右北面東上士立于西方東面北上祝史立于門東北面東上小臣師一人在東堂下南面士旅食者立于門西東上納者以公命引而入也自士以下從而入即位耳師長也小臣之長一人猶天子太僕正君之服位者也凡入門而右由闑東左則由闑西公降立于阼階之東南南鄉爾卿卿西面北上爾大夫大夫皆少進爾近也移也揖而移之近之也大夫猶北面少前射人請賓命當由君出也公曰命某為賓某大夫也射人命賓賓少進禮辭命賓者東面南顧禮辭辭不敏也反命射人以賓之辭告于君又命之賓再拜稽首許諾又復射人反命告賓許賓出立于門外東面當更以賓禮入公揖卿大夫乃升就席揖之人之也小臣自阼階下北面請執幂者與羞膳者執幂者執瓦大之幂也方圜壺無幂羞膳羞于公謂庶羞乃命執幂者執幂者升自西階立于尊南北面東上以公命于西階前命之也東上𤣥酒之幂為上也羞膳者從而東由堂東升自北階房中西面南上不言之者不升堂略之也膳宰請羞于諸公卿者小臣不請而使膳宰于卑者彌略也禮以異為敬右即位命賓及執事者記與卿燕則大夫為賓與大夫燕亦大夫為賓不以所與燕者為賓者燕為序歡心賓主敬也公父文伯飲南宫敬叔酒以露堵父為客此之謂也君但以大夫為賓者大夫卑雖尊之猶逺于君今文無則下無燕羞膳者與執幂者皆士也尊君也膳宰卑于士羞卿者小膳宰也膳宰之佐也凡薦與羞者小膳宰也謂於卿大夫以下也上特言羞卿者小膳宰者欲絶于賓羞賓者亦士射人納賓射人為擯者也今文曰擯者賓入及庭公降一等揖之及至也至庭謂既入而左北面時公升就席以其將與主人為禮不參之也賓升自西階主人亦升自西階賓右北面至再拜賓答再拜主人宰夫也宰夫大宰之屬掌賓客之獻飲者也其位在洗北西面君于其臣雖為賓不親獻以其尊莫敢抗禮也至再拜者拜賓來至也天子膳夫為獻主右納賓若以樂納賓見樂賓後章主人降洗洗南西北面賓將從降鄉之賓降階西東面主人辭降賓對對答主人北面盥坐取觚洗賓少進辭洗主人坐奠觚于篚興對賓反位賓少進者又辭宜違其位也獻不以爵辟正主也古文觶字非觚字主人卒洗賓揖乃升賓每先升尊也主人升賓拜洗主人賓右奠觚答拜降盥主人復盥為拜手坌塵也賓降主人辭賓對卒盥賓揖升主人升坐取觚取觚將就瓦大酌膳執幂者舉幂主人酌膳執幂者反幂君物曰膳膳之言善也酌君尊者尊賓也主人筵前獻賓賓西階上拜筵前受爵反位主人賓右拜送爵賓既拜前受觚退反位膳宰薦脯醢賓升筵膳宰設折爼折爼牲體骨也鄉飲酒記曰賓爼脊脅肩肺賓坐左執爵右祭脯醢奠爵于薦右興取肺坐絶祭嚌之興加于爼坐挩手執爵遂祭酒興席末坐啐酒降席坐奠爵拜告㫖執爵興主人答拜降席席西也㫖美也賓西階上北面坐卒爵興坐奠爵遂拜主人答拜遂拜拜既爵也右主人獻賓記惟公與賓有爼主于燕其餘可以無爼賓以虛爵降將酢主人主人降賓洗南坐奠觚少進辭降主人東面對上既言爵矣復言觚者嫌易之也大射禮曰主人西階西東面少進對今文從此以下觚皆為爵賓坐取觚奠于篚下盥洗篚下篚南主人辭洗謙也今文無洗賓坐奠觚于篚興對卒洗及階揖升主人升拜洗如賓禮賓降盥主人降賓辭降卒盥揖升酌膳執幂如初以酢主人于西階上主人北面拜受爵賓主人之左拜送爵賓既南面授爵乃之左主人坐祭不啐酒辟正主也未薦者臣也不拜酒不告㫖主人之義遂卒爵興坐奠爵拜執爵興賓答拜主人不崇酒以虛爵降奠于篚崇充也不以酒惡謝賓甘美君物也賓降立于西階西既受獻矣不敢安盛射人升賓賓升立于序內東面東西牆謂之序大射禮曰擯者以命升賓右賓酢主人主人盥洗象觚升實之東北面獻于公象觚觚有象骨飾也取象觚者東面公拜受爵主人降自西階阼階下北面拜送爵士薦脯醢膳宰設折爼升自西階薦進也大射禮曰宰胥薦脯醢由左房公祭如賓禮膳宰贊授肺不拜酒立卒爵坐奠爵拜執爵興凡異者君尊變于賓也主人答拜升受爵以降奠于膳篚右主人獻公記獻公曰臣敢奏爵以聽命授公釋此辭不敢必受之見賓媵爵于公通用若以樂樂賓後章更爵洗升酌膳酒以降酢于阼階下北面坐奠爵再拜稽首公答再拜更爵者不敢襲至尊也古文更為受主人坐祭遂卒爵再拜稽首公答再拜主人奠爵于篚右主人受公酢主人盥洗升媵觚于賓酌散西階上坐奠爵拜賓賓降筵北面答拜媵送也讀或為揚揚舉也酌散者酌方壺酒也于膳為散今文媵皆作騰主人坐祭遂飲賓辭卒爵拜賓答拜辭者辭其代君行酒不立飲也此降于正主酬也主人降洗賓降主人辭降賓辭洗卒洗揖升不拜洗不拜洗酬而禮殺主人酌膳賓西階上拜拜者拜其酌已受爵于筵前反位主人拜送爵賓升席坐祭酒遂奠于薦東遂者因坐而奠不北面也奠之者酬不舉也主人降復位賓降筵西東南面立賓不立于序內位彌尊也位彌尊者其禮彌卑記所謂一張一弛者是之謂與右主人酬賓小臣自阼階下請媵爵者公命長命長使選卿大夫之中長幼可使者小臣作下大夫二人媵爵作使也卿為上大夫不使之者為其尊媵爵者阼階下皆北面再拜稽首公答再拜再拜稽首拜君命也媵爵者立于洗南西面北上序進盥洗角觶升自西階序進酌散交于楹北降阼階下皆奠觶再拜稽首執觶興公答再拜序次第也猶代也楹北西楹之北也交而相待于西階上既酌右還而反往來以右為上媵爵者皆坐祭遂卒觶興坐奠觶再拜稽首執觶興公答再拜媵爵者執觶待于洗南待君命也小臣請致者請使一人與二人與優君也若君命皆致則序進奠觶于篚阼階下皆再拜稽首公答再拜媵爵者洗象觶升實之序進坐奠于薦南北上降阼階下皆再拜稽首送觶公答再拜序進往來由尊北交于東楹之北奠于薦南不敢必君舉也大射禮曰媵爵者皆退反位右媵爵于公公坐取大夫所媵觶興以酬賓賓降西階下再拜稽首公命小臣辭賓升成拜興以酬賓就其階而酬之也升成拜復再拜稽首也先時君辭之于禮若未成然公坐奠觶答再拜執觶興立卒觶賓下拜小臣辭賓升再拜稽首不言成拜者為拜故下實未拜也下不輒拜禮殺也此賓拜于君之左不言之者不敢敵偶于君公坐奠觶答再拜執觶興賓進受虛爵降奠于篚易觶洗君尊不酌故也凡爵不相襲者也于尊者言更自敵以下言易更作新易有故之辭進受虛爵尊君也不言公酬賓于西階上及公反位者亦尊君空其文也公有命則不易不洗反升酌膳觶下拜小臣辭賓升再拜稽首下拜下亦未拜凡下未拜有二或禮殺或君親辭君親辭則聞命即升升乃拜是以不言成拜公答再拜拜于阼階上也于是賓請旅侍臣賓以旅酬於西階上旅序也以次序勸卿大夫飲酒射人作大夫長升受旅言作大夫則卿存矣長者尊先而卑後賓大夫之右坐奠觶拜執觶興大夫答拜賓在右者相飲之位賓坐祭立飲卒觶不拜酬而禮殺若膳觶也則降更觶洗升實散大夫拜受賓拜送言更觶卿尊也大夫辨受酬如受賓酬之禮不祭卒受者以虛觶降奠于篚卒猶後也大射禮曰奠于篚復位今文辨皆作遍右公為賓舉旅記凡公所辭皆栗階栗蹙也謂越等急趨君命也凡栗階不過二等其始升猶聚足連步越二等左右足各一發而升堂升凡小臣辭拜通用凡公所酬既拜請旅侍臣既拜謂自酌升拜時也擯者阼階下告于公還西階下告公許旅行也請行酒于羣臣必請者不專惠也公為卿大夫士舉旅通用主人洗升實散獻卿于西階上酬而後獻卿别尊卑也飲酒成于酬也司宫兼卷重席設于賓左東上言兼卷則每卿異席也重席重蒲筵緇布純也卿坐東上統于君也席自房來卿升拜受觚主人拜送觚卿辭重席司宫徹之徹猶去也重席雖非加猶為其重纍去之辟君也乃薦脯醢卿升席坐左執爵右祭脯醢遂祭酒不啐酒降席西階上北面坐卒爵興坐奠爵拜執爵興主人答拜受爵卿降復位不酢辟君也卿無爼者燕主于羞辨獻卿主人以虗爵降奠于篚今文無奠于篚射人乃升卿卿皆升就席若有諸公則先卿獻之如獻卿之禮諸公者謂大國之孤也孤一人言諸者容牧有三監席于阼階西北面東上無加席席孤北面為其大尊屈之也亦因阼階西位近君近君則屈親寵苟敬私昵之坐右主人獻孤卿小臣又請媵爵者二大夫媵爵如初又復請致者若命長致則媵爵者奠觶于篚一人待於洗南長致致者阼階下再拜稽首公答再拜命長致者公或時未能舉自優暇也古文云阼階下北面再拜洗象觶升實之坐奠于薦南降與立于洗南者二人皆再拜稽首送觶公答再拜奠于薦南者于公所用酬賓觶之處二人俱拜以其共勸君右再媵爵公又行一爵若賓若長唯公所酬一爵先媵者之下觶也若賓若長則賓禮殺矣長公卿之尊者也賓則以酬長長則以酬賓以旅於西階上如初大夫卒受者以虗觶降奠于篚右公為卿舉旅主人洗升獻大夫于西階上大夫升拜受觚主人拜送觚大夫坐祭立卒爵不拜既爵主人受爵大夫降復位既盡也不拜之者禮又殺胥薦主人于洗北西面脯醢無脀胥膳宰之吏也主人大夫之下先大夫薦之尊之也不于上者上無其位也脀爼實辨獻大夫遂薦之繼賓以西東上遍獻之乃薦略賤也亦獻而后布席也卒射人乃升大夫大夫皆就席右主人獻大夫席工于西階上少東樂正先升北面立於其西工瞽矇也謂歌諷誦詩者也凡執技藝者稱工少牢饋食禮曰皇尸命工祝樂記師乙曰乙賤工也樂正于天子樂師也凡樂掌其序事樂成則告偹小臣納工工四人二瑟小臣左何瑟面鼓執越內弦右手相入升自西階北面東上坐小臣坐授瑟乃降工四人者燕禮輕從大夫制也面鼓者燕尚樂可鼓者在前也越瑟下孔也內弦弦為主也相扶工也後二人徒相天子大僕二人也小臣四人祭僕六人御僕十二人皆同官工歌鹿鳴四牡皇皇者華三者皆小雅篇也鹿鳴君與臣下及四方之賓宴講道修政之樂歌也此采其已有㫖酒以召嘉賓嘉賓既來示我以善道又樂嘉賓有孔昭之明德可則效也四牡君勞使臣之來樂歌也此采其勤苦王事念將父母懷歸傷悲忠孝之至以勞賓也皇皇者華君遣使臣之樂歌也此采其更是勞苦自以為不及欲咨謀于賢知而以自光明也卒歌主人洗升獻工工不興左瑟一人拜受爵主人西階上拜送爵工歌乃獻之賤者先就事也左瑟便其右一人工之長者也工拜于席薦脯醢輒薦之變于大夫也使人相祭使扶工者相其祭薦祭酒卒爵不拜賤不偹禮主人受爵將復獻衆工故也衆工不拜受爵坐祭遂卒爵辨有脯醢不祭主人受爵降奠于篚遂猶因也古文曰卒爵不拜右樂賓升歌公又舉奠觶唯公所賜以旅于西階上如初言賜者君又彌尊賓長彌卑卒旅畢也右公為大夫舉旅笙入立于縣中奏南陔白華華黍以笙播此三篇之詩縣中縣中央也鄉飲酒禮曰磬南北面奏南陔白華華黍皆小雅篇也今亡其義未聞昔周之興也周公制禮作樂采時世之詩以為樂歌所以通情相風切也其有此篇明矣後世衰微幽屬尤甚禮樂之書稍稍廢棄孔子曰吾自衛反魯然後樂正雅頌各得其所謂當時在者而復重雜亂也惡能存其亡者乎且正考父校商之名頌十二篇于周大師歸以祀其先王至孔子二百年之間五篇而已此其信也主人洗升獻笙于西階上一人拜盡階不升堂受爵降主人拜送爵階前坐祭立卒爵不拜既爵升授主人一人笙之長者也鄉射禮曰笙一人拜于下衆笙不拜受爵降坐祭立卒爵辨有脯醢不祭乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀間代也謂一歌則一吹也六者皆小雅篇也魚麗言太平年豐物多也此采其物多酒㫖所以優賓也南有嘉魚言太平君子有酒樂與賢者共之也此采其能以禮下賢者賢者纍蔓而歸之與之宴樂也南山有臺言太平之治以賢者為本也此采其愛友賢者為邦家之基民之父母既欲其身之夀考又欲其名德之長也由庚崇丘由儀今亡其義未聞遂歌鄉樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋周南召南國風篇也王后國君夫人房中之樂歌也關雎言后妃之德葛覃言后妃之職卷耳言后妃之志鵲巢言國君夫人之德采蘩言國君夫人不失職也采蘋言卿大夫之妻能修其法度也昔大王王季居于岐山之下躬行召南之教以興王業及文王而行周南之教以受命大雅云刑于寡妻至于兄弟以御于家邦謂此也其始一國耳文王作邑于豐以故地為卿士之采地乃分為二國周周公所食也召召公所食也于時文王三分天下有其二德化被于南土是以其詩有仁賢之風者屬之召南焉有聖人之風者屬之周南焉夫婦之道者生民之本王政之端此六篇者其教之原也故國君與其臣下及四方之賓燕用之合樂也鄉樂者風也小雅為諸侯之樂大雅頌為天子之樂鄉飲酒升歌小雅禮盛者可以進取燕合鄉樂者禮輕者可以逮下也春秋傳曰肆夏繁遏渠天子所以享元侯也文王大明綿兩君相見之樂也然則諸侯之相與燕升歌大雅合小雅也天子與次國小國之君燕亦如之與大國之君燕升歌頌合大雅其笙問之篇未聞大師告樂正曰正歌偹大師上工也掌合隂陽之聲教六詩以六律為之音者也子貢問師乙曰吾聞聲歌各有宜也如賜者冝何歌也是明其掌而知之也正歌者升歌及笙各三終間歌三終合樂三終為一偹偹亦成也樂正由楹內東楹之東告于君乃降復位言由楹內者以其立于堂亷也復位位在東縣之北右樂賓笙間合記若以樂納賓則賓及庭奏肆夏賓拜酒主人答拜而樂闋公拜受爵而奏肆夏公卒爵主人升受爵以下而樂闋肆夏樂章也今亡以鐘鏄播之鼓磬應之所謂金奏也記曰入門而縣興示易以敬也卿大夫有王事之勞則奏此樂焉升歌鹿鳴下管新宫笙入三成新宫小雅逸篇也管之入三成謂三終也遂合鄉樂鄉樂周南召南六篇言遂者不間也若舞則勺勺頌篇告成大武之樂歌也其詩曰於鑠王師遵飬時晦又曰實維爾公允師既合鄉樂萬舞而奏之所以美王侯勸有功也射人自阼階下請立司正公許射人遂為司正君許其請因命用為司正君三舉爵樂偹作矣將留賓飲酒更立司正以監之察儀法也射人俱相禮其事同司正洗角觶南面坐奠于中庭升東楹之東受命西階上北面命卿大夫君曰以我安卿大夫皆對曰諾敢不安洗奠角觶于中庭明其事以自表威儀多也君意殷勤欲留賓飲酒命卿大夫以我故安或亦其實不主意于賓也司正降自西階南坐取觶升酌散降南面坐奠觶右還北面少立坐取觶興坐不祭卒觶奠之興再拜稽首右還將適觶南先西面也必從觶西為君之在東也少立者自嚴正慎其位也左還南面坐取觶洗南面反奠于其所反奠虛觶不空位也右立司正升自西階東楹之東請徹爼降公許告于賓賓北面取爼以出膳宰徹公爼降自阼階以東膳宰降自阼階以賓親徹若君親徹然卿大夫皆降東面北上以將坐降待賔反也右徹爼賓反入及卿大夫皆說屨升就席公以賓及卿大夫皆坐乃安凡燕坐必說屨屨賤不在堂也禮者尚敬敬多則不親燕安坐相親之心也羞庶羞謂􅍧肝膋狗胾醢也骨體所以致敬也庶羞所以盡愛也敬之愛之厚賢之道大夫祭薦燕乃祭薦不敢于盛成禮也司正升受命皆命君曰無不醉賓及卿大夫皆興對曰諾敢不醉皆反坐皆命者命賓命卿大夫也起對必降席司正退立西序端右燕記有內羞謂羞豆之實酏食糝食羞籩之實糗餌粉餈主人洗升獻士于西階上士長升拜受觶主人拜送觶獻士用觶士賤也今文觶作觚士坐祭立飲不拜既爵其他不拜坐祭立飲他謂衆士也亦升受爵不拜乃薦司正與射人一人司士一人執幂二人立于觶南東上天子射人司士皆下大夫二人諸侯則上士其人數亦如之司正為上辨獻士士既獻者立于東方西面北上乃薦士每已獻而即位于東方蓋尊之畢獻薦于其位祝史小臣師亦就其位而薦之次士獻之已不變位位自在東方主人就旅食之尊而獻之旅食不拜受爵坐祭立飲北面酌南鄉獻之于尊南不洗者以其賤略之也亦畢獻乃薦之主人執虛爵奠子篚復位右主人獻士若射則大射正為司射如鄉射之禮大射正射人之長者也如鄉射之禮者燕為樂卿大夫宜從其禮也如者如其告弓矢既具至退中與算也納射器而張侯其告請先于君乃以命賓及卿大夫其為司正者亦為司馬君與賓為耦鄉射記曰自君射至龍旃亦其異者也薦旅食乃射者是燕射主于飲酒右射記君與射則為下射袒朱襦樂作而后就物君尊小臣以巾授矢稍屬君尊不搢矢不以樂志辟不敏也既發則小臣受弓以授弓人俟復發也不使大射正燕射禮上射退于物一笴既發則答君而俟若飲君燕則夾爵謂君在不勝之黨賓飲之如燕媵觚則又夾爵君在大夫射則肉袒不纁襦厭于君記本經君國中射則皮樹中以翿旌獲白羽與朱羽糅國中城中也謂燕射也皮樹獸名以翿旌獲尚文德也今文皮樹為繁樹糅為縚古文無以三鄉射記詳見射記賓降洗升媵觚于公酌散下拜公降一等小臣辭賓升再拜稽首公答再拜此當言媵觶酬之禮皆用觶言觚者字之誤也古者觶字或作角旁氏由此誤耳賓坐祭卒爵再拜稽首公答再拜賓降洗象觶升酌膳坐奠于薦南降拜小臣辭賓升成拜公答再拜賓反位反位反席也今文曰洗象觶右賓媵爵于公公坐取賓所媵觶興唯公所賜至此又言興者明公崇禮不倦也今文觶又為觚受者如初受酬之禮降更爵洗升酌膳下拜小臣辭升成拜公答拜乃就席坐行之坐行之若今坐相勸酒有執爵者士有盥升主酌授之者唯受于公者拜公所賜者也其餘則否司正命執爵者受辨卒受者興以酬士欲令惠均大夫卒受者以爵興西階上酬士士升大夫奠爵拜士答拜興酬士者士立堂下無坐位大夫立卒爵卒爵不拜實之士拜受大夫拜送士旅于西階上辨祝史小臣旅食皆及焉士旅酌旅序也士以次序自酌相酬無執爵者卒右公為士舉旅主人洗升自西階獻庶子于阼階上如獻士之禮辨降洗遂獻左右正與內小臣皆于阼階上如獻庶子之禮庶子掌正六牲之體及舞位使國子修德學道世子之官也而與膳宰樂正聨事樂正亦學國子以舞左右正謂樂正僕人正也小樂正立于西縣之北僕人正僕人師僕人士立于其北北上大樂正立于東縣之北若射則僕人正僕人士陪于工後內小臣奄人掌君隂事隂令后夫人之官也皆獻于阼階上别于外內臣也獻正下及內小臣則磬人鐘人鑮人鼓人僕人之屬盡獻可知也凡獻皆薦也右主人獻庶子以下無算爵算數也爵行無次無數唯意所勸醉而止士也有執膳爵者有執散爵者執膳爵者酌以進公公不拜受執散爵者酌以之公命所賜所賜者興受爵降席下奠爵再拜稽首公答拜席下席西也古文曰公答再拜受賜爵者以爵就席坐公卒爵然後飲不敢先虛爵明此勸惠從尊者來也執膳爵者受公爵酌反奠之宴歡在于飲酒成其意受賜爵者興授執散爵執散爵者乃酌行之豫其所勸者唯受爵於公者拜卒受爵者興以酬士于西階上士升大夫不拜乃飲實爵乃猶而也士不拜受爵大夫就席士旅酌亦如之公有命徹幂則卿大夫皆降西階下北面東上再拜稽首公命小臣辭公答再拜大夫皆辟命徹幂者公意殷勤必盡酒也小臣辭不升成拜明雖醉正臣禮也不言賓賓彌臣也君答拜于上示不虛受也遂升反坐士終旅于上如初卿大夫降而爵止于其反席卒之無算樂升歌間合無數也取歡而已其樂章亦然宵則庶子執燭於阼階上司宫執燭於西階上甸人執大燭於庭閽人為大燭於門外宵夜也燭燋也甸人掌共薪蒸者庭大燭為位廣也閽人門人也為作也作大燭以俟賓客出右無算爵賓醉北面坐取其薦脯以降取脯重得君賜奏陔陔陔夏樂章也賓出奏陔夏以為行莭也凡夏以鐘鼓奏之賓所執脯以賜鐘人於門內霤遂出必賜鐘人鐘人掌以鐘鼓奏九夏今奏陔以莭已用賜脯以報之明雖醉不忘禮古文賜作錫卿大人皆出隨賓出也公不送賓禮訖是臣也右賓出此後有君與客燕一章及記與四方之賓燕二條見饗食燕記篇燕義嘉禮九諸侯燕禮之義君立阼階之東南南鄉爾卿大夫皆少進定位也君席阼階之上居主位也君獨升立席上西面特立莫敢適之義也定位者為其始入踧踖揖而安定也設賓主飲酒之禮也使宰夫為獻主臣莫敢與君亢禮也不以公卿為賓而以大夫為賓為疑也明嫌之義也賓入中庭君降一等而揖之禮之也設賓主者飲酒致歡也宰夫主膳食之官也天子使膳宰為主人公孤也疑自下上至之辭也公卿尊矣復以為賓則尊與君大相近君舉旅於賓及君所賜爵皆降再拜稽首升成拜明臣禮也君答拜之禮無不答明君上之禮也臣下竭力盡能以立功於國君必報之以爵祿故臣下皆務竭力盡能以立功是以國安而君寧禮無不答言上之不虗取于下也上必明正道以道民民道之而有功然後取其什一故上用足而下不匱也是以上下和親而不相怨也和寧禮之用也此君臣上下之大義也故曰燕禮者所以明君臣之義也言聖人制禮因事以託政臣再拜稽首是其竭力也君答拜之是其報以祿惠也席小卿次上卿大夫次小卿士庶子以次就位于下獻君君舉旅行酬而后獻卿卿舉旅行酬而后獻大夫大夫舉旅行酬而后獻士士舉旅行酬而后獻庶子俎豆牲體薦羞皆有等差所以明貴賤也牲體爼實也薦謂脯醢也羞庶羞也古者周天子之官有庶子官庶子官職諸侯卿大夫士之庶子之卒掌其戒令與其教治别其等正其位職主也庶子猶諸子也周禮諸子之官司馬之屬也卒讀皆為倅諸子副代父者也戒令致于大子之事教治修德學道位朝位也國有大事則率國子而致於大子唯所用之若有兵甲之事則受之以車甲合其卒伍置其有司以軍法治之司馬弗正國子諸子也軍法百人為卒五人為伍弗不也國子屬大子司馬雖有軍事不賦也凡國之政事國子存遊卒使之修德學道春合諸學秋合諸射以考其藝而進退之遊卒未仕卒也學大學也射射宫也燕禮有庶子官是以義載此以為說篇燕義依古者以下本在首今通解移篇末禮書綱目卷五
