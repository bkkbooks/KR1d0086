body:
  text: 禮書綱目卷七十二婺源江永撰刑辟通禮二十五補象以典刑流宥五刑鞭作官刑撲作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉象如天之垂象以示人而典者常也示人以常刑所謂墨劓剕官大辟五刑之正也所以待夫元惡大憝殺人傷人穿窬淫放凡罪之不可宥者也流宥五刑者流造之使遠去如下文流放竄殛之類也宥寬也所以待夫罪之稍輕雖入于五刑而情可矜法可疑與夫親貴勳勞而不可加以刑者則以此而寬之也鞕作官刑者本末垂革官府之刑也撲作教刑者夏楚二物學校之刑也皆以待夫罪之輕者金作贖刑者金黃金贖贖其罪也蓋罪之極輕雖入於鞭撲之刑而情法猶有可議者也此五句者從重入輕各有條理法之正也肆縱也眚災肆赦者眚謂過誤災謂不幸若人有如此而入於刑則又不待流宥金贖而直赦之也賊殺也怙終賊刑者怙謂有恃終謂再犯若人有如此而入於刑則雖當宥當贖亦不許其宥不聽其贖而必刑之也此三句者或由重而即輕或由輕而即重蓋用法之權衡所謂法外意也聖人立法制刑之本末此七言者大略盡之矣雖其輕重取舍陽舒陰慘之不同然欽哉欽哉惟刑之恤之意則未始不行乎其間也蓋其輕重毫釐之間各有攸當者乃天討不易之定理而欽恤之意行乎其間則可以見聖人好生之本心也據此經文則五刑有流宥而無金贖周禮秋官亦無其文至吕刑乃有五等之罰疑穆王始制之非法之正也蓋當刑而贖則失之輕疑赦而贖則失之重且使富者幸免貧者受刑又非所以為法也舜典帝曰臯陶蠻夷猾夏冦賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允猾亂夏明而大也劫人曰冦殺人曰賊在外曰姦在內曰宄士理官也服服其罪也吕刑所謂上服下服是也三就孔氏以為大罪於原野大夫於朝士於市不知何據竊恐惟大辟棄之于市宫辟則下蠶室餘刑亦就屛處蓋非死刑不欲使風中其瘡誤而至死聖人之仁也五流五等象刑之當宥者也五宅三居者流雖有五而宅之但為三等之居如列爵惟五分土惟三也孔氏以為大罪居於四裔次則九州之外次則千里之外雖亦未見其所據然大槩當略近之同上夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑詳見下湯制官刑而警于有位曰敢有恆舞于宫酣歌于室時謂巫風敢有徇于貨殖恆于遊畋時謂淫風敢有侮聖言逆忠直遠耆德比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士官刑官府之刑也巫風者常歌常舞若巫覡然也淫過也過而無度也比昵也倒置悖理曰亂好人之所惡惡人之所好也風風化也三風愆之綱也十愆風之目也卿士諸侯十有其一已喪其家亡其國矣墨墨刑也臣下而不能匡正其君則以墨刑加之具詳悉也童蒙始學之士則詳悉以是訓之欲其入官而知所以正諌也劉侍講曰墨即叔向所謂夏書昏墨賊殺臯陶之刑貪以敗官為墨伊訓周公作誓命曰毁則為賊誓要信也毁則壞法也掩則為藏掩匿也竊賄為盜賄財也盜器為姦器國用也主藏之名以掩賊為名賴姦之用用姦器也為大凶德有常無赦刑有常在九刑不忘誓命以下皆九刑之書九刑之書今亡文十八年左氏傳太宰掌建邦之六典五曰刑典以詰邦國以刑百官以糾萬民天官乃立秋官司冦使帥其屬而掌邦禁以佐王刑邦國禁所以防姦者也刑正人之法孝經説曰刑者侀也過出罪死大司寇之職掌建邦之三典以佐王刑邦國詰四方典法也詰謹也書曰王耄荒度作祥刑以詰四方一曰刑新國用輕典新國者新辟地立君之國用輕法者為其民未習于教二曰刑平國用中典平國平承守成之國也用中典者常行之法三曰刑亂國用重典亂國篡弒叛逆之國用重典者以其化惡伐滅之以五刑糾萬民刑亦法也糾猶察異之一曰野刑上功糾力功農功力勤力二曰軍刑上命糾守命將命也守不失部伍三曰鄉刑上德糾孝德六德也善事父母為孝四曰官刑上能糾職能能其事也職職事修理五曰國刑上願糾暴原慤慎也暴當為恭字之誤也正月之吉始和布刑于邦國都鄙乃縣刑象之法于象魏使萬民觀刑象挾日而斂之正月朔日布五刑於天下正嵗又縣其書重之秋官小司冦正嵗帥其屬而觀刑象令以木鐸曰不用法者國有常刑令羣士羣士遂士以下乃宣布于四方憲刑禁宣遍也憲表也謂縣之也刑禁士師之五禁同上士師之職掌國之五禁之法以左右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁皆以木鐸徇之于朝書而縣于門閭左右助也助刑罰者助其禁民為非也宫王宫也官官府也國城中也古之禁書亡矣今宫門有簿籍官府有無故擅入城門有離載下帷野有田律軍有嚻歡夜行之禁其粗可言者以五戒先後刑罰毋使罪麗于民一曰誓用之于軍旅二曰誥用之于會同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙先後猶左右也誓誥于書則甘誓湯誓大誥康誥之屬禁則軍禮曰無干車無自後射比其類也糾憲未有聞焉掌官中之政令大司寇之官府中也掌士之八成鄭司農云八成者行事有八篇若今時法事比一曰邦汋鄭司農云汋讀如酌酒尊中之酌國汋者斟汋盜取國家密事若今時刺探尚書事二曰邦賊為逆亂者三曰邦諜為異國反間四曰犯邦令干冒王教令者五曰嬌邦令稱詐以有為者六曰為邦盜竊取國之寶藏者七曰為邦朋朋黨相阿使政不平者故書朋作傰鄭司農云朋讀如朋友之朋八曰為邦誣誣罔君臣使事失實正歲帥其屬而憲禁令于國及郊野去國百里為郊郊外謂之野上同司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百墨黥也先刻其面以墨窒之劓截其鼻也今東西夷或以墨劓為俗古刑人亡逃者之世類與宫者丈夫則割其勢女子閉於宮中若今官男女也刖斷足也周改臏作刖殺死刑也書傳曰決關梁踰城郭而略盜者其刑臏男女不以義交者其刑宫觸易君命革輿服制度姦軌盜攘傷人者其刑劓非事而事之出入不以道義而誦不祥之辭者其刑墨降畔冦賊劫略奪攘嬌虔者其刑死此二千五百罪之目略也其刑書則亡夏刑大辟工百臏辟三百宫辟五百劓墨各千周則變焉所謂刑罰世輕世重者也鄭司農云漢孝文帝十三年除肉刑同上布憲掌憲邦之刑禁正月之吉執旌節以宣布于四方而憲邦之刑禁以詰四方邦國及其都鄙達於四海憲表也謂縣之也刑禁者國之五禁所以左右刑罰者司冦正月布刑於天下正嵗又縣其書於象魏布憲於司冦布刑則以旌節出宣令之于司冦縣書則亦縣之于門閭及都鄙邦國刑者王政所重故屢丁寧焉詰謹也使四方詳行之爾雅曰九夷八蠻六戎五狄謂之四海凡邦之大事合衆庶則以刑禁號令同上小宰之職掌建邦之宫刑以治王宫之政令凡宫之糾禁杜子春云宮皆當為官玄謂宫刑在王宫中者之刑建明布告之糾猶割也察也若今御史中丞官天大宰以八法治官府七曰官刑以糾邦治官刑司冦之職五刑其四曰官刑上能糾職以八則治都鄙七曰刑賞以馭其威以八柄詔王馭羣臣六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過奪謂臣有大罪沒入家財者六極四曰貧廢猶放也舜殛鯀于羽山是也誅責讓也曲禮曰齒路馬有誅同上大司徒以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不姻之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑糾猶割察也不弟不敬師長造言訛言惑衆亂民亂名改作執左道以亂政也鄭司農云任謂朋友相任恤謂相憂地官析言破律亂名改作執左道以亂政殺析言破律巧賣法令者也亂名改作謂變易官與物之名更造法度左道若巫蠱及俗禁作淫聲異服奇技奇器以疑衆殺淫聲鄭衛之屬也異服若聚鷸冠瓊辨也奇技竒器若公輸般請以機窆行偽而堅言偽而辨學非而博順非而澤以疑衆殺皆謂虛華捷給無誠者也假於鬼神時日卜筮以疑衆殺今時持喪葬築蓋嫁取卜數文書使民倍禮違制此四誅者不以聽為其為害大而辭不可習王制禁殺戮掌司斬殺戮者凡傷人見血而不以告者攘獄者遏訟者以告而誅之司猶察也察此四者告於司冦罪之也斬殺戮謂吏民相斬相殺相戮者傷人見血見血乃為傷人耳鄭司農云攘獄者距當獄者也遏訟者遏止欲訟者也玄謂攘猶郤也郤獄者言不受也秋官禁暴氏掌禁庶民之亂暴力正者嬌誣犯禁者作言語而不信者以告而誅之民之好為侵陵稱詐謾誕此三者亦刑所禁也力正以力強得正也凡奚隸聚而出入者則司牧之戮其犯禁者奚隸女奴男奴也其聚出入有所使同上掌戮掌斬殺賊諜而搏之斬以欽鉞若今要斬也殺以刀刃若今棄市也諜謂姦賊反間者賊與諜罪大者斬之小者殺之搏當為膊諸城上之膞字之誤也膊謂去衣磔之凡殺其親者焚之殺王之親者辜之親緦服以內也焚燒也易曰焚如死如棄如辜之言枯也謂磔之凡殺人者踣諸市肆之三日刑盜于市踣僵尸也肆猶申也陳也几言刑盜罪惡莫大焉凡罪之麗於法者亦如之罪二千五百條上附下附刑五而已於刑同科者其刑殺之一也凡軍旅田役斬殺刑戮亦如之戮謂膞焚辜肆墨者使守門黥者無妨於禁御劓者使守關截鼻亦無妨以貌醜遠之宫者使守內以其人道絶也今世或然刖者使守囿斷足驅衛禽獸無急行髡者使守積鄭司農云髡當為完謂但居作三年不虧體者也玄謂此出五刑之中而髡者必王之同族不宫者宮之為翦其類髡頭而已守積積在隱者宜也同上掌囚掌守盜賊凡囚者上罪梏拲而桎中罪桎梏下罪梏王之同族拲有爵者桎以待弊罪凡囚者謂非盜賊自以他罪拘者也鄭司農云拲者兩手共一木也桎梏者兩手各一木也玄謂在手曰梏在足曰桎中罪不拲手足各一木耳下罪又去桎王同族及命士以上雖有上罪或拲或桎而已弊猶斷也同上凡盜賊軍鄉邑及家人殺之無罪鄭司農云謂盜賊羣輩若軍共攻盜鄉邑及家人者殺之無罪若今時無故入人室宅廬舍上人車船牽引人欲犯法者其時格殺之無罪秋官朝士調人凡過而殺傷人者以民成之過無本意也成平也鄭司農云以鄉里之民共解和之春秋傳曰惠伯成之鳥獸亦如之過尖殺傷人之畜産者凡有鬭怒者成之不可成者則書之先動者誅之鬭怒辨訟者也不可成不可平也地官司市以刑罰禁暴而去盜刑罰憲徇撲市刑小刑憲罰中刑徇罰大刑撲罰徇舉以示其地之衆也撲撻也鄭司農云憲罰播其肆也同上司稽掌執市之盜賊以徇且刑之同上胥凡有罪者撻戮而罰之罰之使出布同上司厲掌盜賊之任器貨賄辨其物皆有數量賈而楬之入于司兵鄭司農云任器貨賄謂盜賊所用傷人兵器及所盜財物貨賄也入于司兵若今時傷殺人所用兵器賊盜贓加責沒入縣官其奴男子入于罪隸女子入於舂稿鄭司農云謂坐為盜賊而為奴者輸于罪隸舂人稿人之官也由是觀之今之為奴婢古之罪人也故書曰豫則奴戮汝論語曰箕子為之奴罪隸之奴也故春秋傳曰裴豹隸也著於丹書請焚丹書我殺督戎恥為奴欲焚其籍也玄謂奴從坐而沒入縣官者男女同名凡有爵者與七十者與未齓者皆不為奴有爵謂命士以上也齓毁齒也男八歲女七嵗而毁齒秋官司隸掌五隸之法辨其物而掌其政令五隸謂罪隸四翟之隸也物衣服兵器之屬帥其民而搏盜賊役國中之辱事為百官積任器凡囚執人之事民五隸之民也鄭司農云百官所當任持之器物此官主為積聚之也玄謂任猶用也邦有祭祀賓客喪紀之事則役其煩辱之事煩猶劇也士喪禮下篇曰隸人涅廁同上罪隸掌役百官府與凡有守者掌使令之小事役給其小役同上大司冦以圜土聚教罷民圜土獄城也聚罷民其中困苦以教之為善也民不愍作勞有似於罷凡害人者填之圜土而施職事焉以明刑恥之害人謂為邪惡已有過失麗于法者以其不故犯法置之圜土繫教之庶其困悔而能改也置置也施職事以所能役使之明刑書其罪惡於大方版著其背其能改者反于中國不齒三年反于中國謂舍之還於故鄉里也司圜職曰上罪三年而舍中罪二年而舍下罪一年而舍不齒者不得以年次列於平民其不能改而出圜土者殺出謂逃亡以嘉石平罷民嘉石文石也樹之外朝門左平成也成之使善凡萬民之有罪過而未麗于法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐期役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之有罪過謂邪惡之人所罪過者也麗附也未附於法未著於法也木在足曰桎在手曰梏役諸司空坐日訖使給百工之役也役月訖使其州里之人任之乃赦之宥寬也上同司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒弗使冠飾也著墨幪若古之象刑與舍釋之也鄭司農云罷民謂惡人不從化為百姓所患苦而未入五刑者也故曰凡害人者不使冠飾任之以事也若今時罰作罪矣凡圜土之刑人也不虧體其罰人也不虧財言其刑人但加以明刑罰人但任之以事耳鄭司農云以此知其為民所苦而未入刑者也故大司冦職曰凡萬民之有罪過而未麗于法而害於州里者桎梏而坐諸嘉石役諸司空又曰以嘉石平罷民國語曰罷士無伍罷女無家言為惡無所容入也玄謂圜土所收教者過失害人已麗于法者同上司救凡民之有邪惡者三讓而罰三罰而士加明刑恥諸嘉石役諸司空罰謂撻擊之也加明刑者去其冠飾而書其邪惡之狀著之背也嘉石朝士所掌在外朝之門左使坐焉以恥辱之既而役諸司空使事官作之也坐役之數存于司冦其有過失者三讓而罰三罰而歸于圜土圜土獄城也過失近罪晝日任之以事而收之夜藏於獄亦加明刑以恥之不使坐嘉石其罪已著未忍刑之地官職金掌受士之金罰貨罰入于司兵給治兵及工直也貨泉貝也罰罰贖也書曰金作贖刑秋官右刑制臯陶曰天討有罪五刑五用哉皋陶謨惟呂命王享國百年耄荒度作刑以詰四方惟吕命與惟説命語意同先此以見訓刑為呂刑之言也耄老而昏亂之稱荒忽也穆王享國百年車轍馬迹遍于天下故史氏以耄荒二字發之亦以見贖刑為穆王耄荒所訓耳王曰若古有訓蚩尤惟始作亂延及于平民罔不冦賊鴟義姦宄奪攘矯虔言鴻荒之世渾厚敦龎蚩尤始開暴亂之端驅扇熏炙延及平民無不為冦為賊鴟義者以鴟張跋扈為義矯虔者矯詐虔劉也苖民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刵椓黥越兹麗刑並制罔差有辭苗民承蚩尤之暴不用善而制以刑惟作五虐之刑名之曰法以殺戮無罪於是始過為劓鼻刵耳椓竅黥面之法於麗法者必刑之并制無罪不復以曲直之辭為差别皆刑之也民興胥漸泯泯棼棼罔中于信以覆詛盟虐威庶戮方告無辜于上上帝監民罔有馨香德刑發聞惟腥泯泯昏也棼棼亂也民相漸染為昏為亂無復誠信相與反覆詛盟而已虐政作威衆被戮者方各出無罪于天天視苗民無有馨香德而刑戮發聞莫非腥穢皇帝哀矜庶戮之不辜報虐以威遏絶苗民無世在下皇帝舜也以書考之治苗民命伯夷禹稷皋陶皆舜之事報苗之虐以我之威絶滅也謂竄與分北之類遏絶之使無繼世在下國乃命重黎絶地天通罔有降格羣后之逮在下明明棐常鰥寡無蓋重少昊之後黎高陽之後重即羲黎即和也吕氏曰治世公道昭明為善得福為惡得禍民曉然知其所由則不求之眇茫冥昧之間當三苖昏虐民之得罪者莫知其端無所控訴相與聽於神祭非其鬼天地人神之典雜揉瀆亂此妖誕之所以興人心之所以不正也在舜當務之急奠先于正人心首命重黎修明祀典天子然後祭天地諸侯然後祭山川高卑上下各有分限絶地天之通嚴幽明之分焄蒿妖誕之説舉皆屏息羣后及在下之羣臣皆精白一心輔助常道民卒善而得福惡而得禍雖鰥寡之微亦無有蓋蔽而不得自伸者也為按國語曰少皞氏之衰九黎亂德民神雜揉家巫史民瀆齊盟禍災荐臻顓頊受之乃命南正重司天以屬神北正黎司地以屬民使無相侵瀆其後三苖復九黎之德堯復育重黎之後不忘舊者使復典之皇帝清問下民鰥寡有辭于苗德威惟畏德明惟明清問虛心而問也有辭聲苗之過也苗以虐為威以察為明帝反其道以德威而天下無不畏以德明而天下無不明也乃命三后恤功于民伯夷降典折民為刑禹平水土主名山川稷降播種農殖嘉穀三后成功惟殷于民恤功致憂民之功也典禮也伯夷降天地人之三禮以折民之邪妄蘇氏曰失禮則入刑禮刑一物也伯夷降典以正民心禹平水土以定民居稷降播種以厚民生三后成功而致民之殷盛富庶也吳氏曰二典不載有兩刑官蓋傳聞之謬也愚按皋陶未為刑官之時豈伯夷實兼之歟下文又言伯夷播刑之迪不應如此謬誤士制百姓于刑之中以教祗德命皋陶為士制百姓于刑辟之中所以檢其心而教以祗德也吳氏曰皋陶不與三后之列遂使後世以刑官為輕後漢楊賜拜廷尉自以代非法家言曰三后成功惟殷于民皋陶不與蓋吝之也是後世非獨人臣以刑官為輕人君亦以為輕矣觀舜之稱皋陶曰刑期于無刑民協于中時乃功又曰俾豫從欲以治四方風動惟乃之休其所繫乃如此是可輕哉吕氏曰吕刑一篇以刑為主故歷敘本末而歸之于皋陶之刑勢不得與伯夷禹稷雜稱言固有賓主也穆穆在上明明在下灼于四方罔不惟德之勤故乃明于刑之中率乂于民棐彝穆穆者和敬之容也明明者精白之容也灼于四方者穆穆明明輝光發越而四達也君臣之德昭明如是故民皆觀感動蕩為善而不能自已也如是而猶有未化者故士師明于刑之中使無過不及之差率乂于民輔其常性所謂刑罰之精華也典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天德自作元命配享在下訖盡也威權勢也富賄賂也當時典獄之官非惟得盡法于權勢之家亦惟得盡法于賄賂之人言不為威屈不為利誘也敬忌之至無有擇言在身大公至正純乎天德無毫髮不可舉以示人者天德在我則大命自我作而配享在下矣在下者對天之辭蓋推典獄用刑之極功而至於與天為一者如此吕刑商王受罪人以族焚炙忠良刳剔孕婦泰誓紂為炮烙之刑醢九侯脯鄂侯周西伯獻洛西之地以請除炮烙之刑紂許之史記文王治岐罪人不孥孟子臧文仲言於僖公曰刑五而已無有隱者隱巧諱也隱謂鴆也大刑用甲兵賈侍中云謂諸侯不式王命以六師移之昭謂甲兵謂臣有大逆則被甲聚兵而誅之若今隊軍也其次用斧鉞斧鉞軍戮也書曰後至者斬中刑用刀鋸割劓用刀斷截用鋸亦有大辟故周語曰兵在其頸其次用鑽笮鑽臏刑也笮黥刑也薄刑用鞭撲以威民也鞭官刑也撲教刑也故大者陳之原野謂甲兵斧鉞也小者致之市朝刀鋸以下也其死刑大夫以上尸諸朝士以下尸諸市五刑三次是無隱也五刑甲兵斧鉞刀鋸鑽鑿鞭撲也次處也三處朝野市也婦人無刑無黥刖之刑雖有刑不在市朝謂犯死刑者猶不暴尸魯國語語鄭人鑄刑書鑄刑書於鼎以為國之常法叔向使詔子産書曰詒遺也始吾有虞於子虞度也言準度子産以為己法今則已矣已止也昔先王議事以制不為刑辟懼民之有爭心也猶不可禁禦是故間之以義間防也糾之以政糾舉也行之以禮守之以信奉之以仁秦養也制為祿位以勸其從勸從教嚴斷刑罰以威其淫淫放也懼其未也故誨之以忠聳之以行聳懼也教之以務時所急使之以和臨之以敬涖之以強施之於事為涖斷之以剛義斷恩猶求聖哲之上明察之官上公王也官卿大夫也忠信之長慈惠之師民於是乎可任使也而不生禍亂民知有辟則不忌於上權移於法故民不畏上並有爭心以徴于書而徼幸以成之因危文以生爭緣徼幸以成其巧偽弗可為矣為治也夏有亂政而作禹刑商有亂政而作湯刑夏商之亂著禹湯之法言不能議事以制周有亂政而作九刑周之衰亦為刑書謂之九刑三碎之興皆叔世也言刑書不起於始盛之世今吾子相鄭國作封洫在襄三十年立謗政作丘賦在四年制參辟鑄刑書制參辟謂用三代之末法將以靖民不亦難乎詩曰儀式型文王之德日靖四方又曰儀型文王萬邦作孚如是何辟之有言詩唯以德與信不以刑也民知爭端矣將棄禮而徴於書以刑書為徴錐刀之末將盡爭之錐刀末喻小事亂獄滋豐賄賂並行終子之世鄭其敗乎肸聞之國將亡必多制數改法其此之謂乎復書曰若吾子之言復報也僑不才不能及子孫吾以救世也既不承命敢忘大惠以見針戒為惠昭六年左氏傳子産有疾謂子大叔曰我死子必為政唯有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之狎輕也則多死焉故寬難難以治疾數月而卒大叔為政不忍猛而寬鄭國多盜取人於萑符之澤萑符澤名於澤中劫人大叔悔之曰吾早從夫子不及此興徒兵以攻萑符之盜盡殺之盜少止仲尼曰善哉政寬則民慢慢則糾之以猛糾猶攝也猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寬也詩大雅汔其也康綏皆安也周厲王暴虐民勞於苛政故詩人刺之欲其施之以寬毋從詭隨詭人隨人無正心不可從以謹無良謹敕慎也式遏冦虐慘不畏明糾之以猛也式用也遏止也憎曾也言為冦虐曾不畏明法者亦當用猛政糾治之柔逺能邇以定我王平之以和也柔安也邇近也逺者懷附近者各以能進則王室定又曰不競不絿不剛不柔詩殷頌言湯政得中和競強也絿急也布政優優百祿是遒優優和也遒聚也和之至也及子産卒仲尼聞之出涕曰古之遺愛也子産之愛有古人之遺風昭二十年左氏傳鄭駟歂嗣子大叔為政殺鄭析而用其竹刑歂駟乞子子然也鄧析鄭大夫欲改鄭所鑄舊制不受君命而私造刑法書之于竹簡故言竹刑定九年左氏傳晉趙鞅荀寅帥師城汝濱遂賦晉國一鼓鐵以鑄刑鼎令晉國各出功力共鼓石為鐵計令一鼓而足因軍役而為之故言遂著范宣子所為刑書焉仲尼曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之序位次也民是以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法僖二十七年文公搜被廬修唐叔之法以為盟主今棄是度也而為刑鼎民在鼎矣何以尊貴棄禮徴書故不尊貴貴何業之守民不奉上則上失業貴賤無序何以為國且夫宣子之刑夷之搜也晉國之亂制也范宣子所用刑乃夷搜之法也夷搜在文六年一搜而三易中軍帥賈季箕鄭之徒遂作亂故曰亂制若之何以為法蔡史墨曰范氏中行氏其亡乎蔡史墨即蔡墨中行寅為下卿而干上令擅作刑器以為國法是法姦也又加范氏焉易之亡也范宣子刑書中既廢矣今復興之是成其咎其及趙氏趙孟與焉然不得已若德可以免鑄刑鼎本非趙鞅意不得已而從之若能修德可以免禍為定十三年荀寅士吉射入朝歌以叛昭二十九年左氏傳楚無宇曰周文王之法曰有亡荒閲荒大也閲搜也有亡人當大搜其衆所以得天下也吾先君文王楚文王作僕區之法僕區刑書名曰盜所隱器隱盜所得器與盜同罪所以封汝也行善法故能欲強北至汝水昭七年左氏傳冉有問於孔子曰古者三皇五帝不用五刑信乎孔子曰聖人之設防貴其不犯也制五刑而不用所以為至治也凡民之所以為姦邪竊盜靡法妄行者生於不足不足生於無度無度則小者偷惰大者侈靡各不知節是以上有制度則民知所止民知所止則不犯故雖有姦邪賊盜靡法妄行之獄而無陷刑之民不孝者生於不仁不仁者生於喪祭之禮也明喪祭之禮所以教仁愛也能致仁愛則服喪思慕祭祀不懈人子饋養之道言孝子奉祭祀不敢懈與生時饋養之道同之也喪祭之禮明則民孝矣故雖有不孝之獄而無陷刑之民殺上者生於不義義所以别貴賤明尊卑也貴賤有别尊卑有序則民莫不尊上而敬長朝聘之禮者所以明義也義必明則民不犯故雖有殺上之獄而無陷刑之民鬭變者生於相陵相陵者生於長幼無序而遺敬讓遺忘也鄉飲酒之禮者所以明長幼之序而崇敬讓也長幼必序民懷敬讓故雖有鬭變之獄而無陷刑之民淫亂者生於男女無别男女無别則夫婦失義婚禮聘享者所以别男女明夫婦之義也男女既别夫婦既明故雖有淫亂之獄而無陷刑之民此五者刑獄之所從生各有源焉不豫塞其源而輒繩之以刑是謂為民設穽而陷之也刑罰之源生於嗜欲不節夫禮度者所以禦民之嗜欲而明好惡順天道禮度既陳五教畢修而民猶或未化尚必明其法典以申固之尚猶也申令固其教也其犯姦邪靡法妄行之獄者則飭制量之度有犯不孝之獄者則飭喪祭之禮有犯殺上之獄者則飭朝覲之禮有犯鬭變之獄者則飭鄉飲酒之禮有犯淫亂之獄者則飭婚聘之禮三皇五帝之所以化民者如此雖有五刑不用不亦可乎家語子曰道之以政齊之以刑民免而無恥道猶引導謂先之也政謂法制禁令也齊所以一之也道之而不從者有刑以一之也免而無恥謂苟免刑罰而無所羞愧蓋雖不敢為惡而為惡之心未嘗忘也道之以德齊之以禮有恥且格禮謂制度品節也格至也言躬行以率之則民固有所觀感而興起矣而其淺深厚薄之不一者又有禮以一之則民恥於不善而又有以至于善也一説格至也書曰格其非心以愚謂政者為治之具刑者輔治之法德禮則所出治之本而德又禮之本也此其相為終始雖不可以偏廢然政刑能使民逺罪而已德禮之效則有以使民日遷善而不自知故治民者不可徒恃其末又當深探其本也論語仲弓問於孔子曰雍聞至刑無所用政至政無所用刑至刑無所用政桀紂之世是也至政無所用刑成康之世是也信乎孔子曰聖人之治化也必政刑相參焉太上以德化民而以禮齊之其次以政言導民以刑禁之刑不刑也化之弗變導之弗從傷義以敗俗於是乎用刑矣家語仲弓問古之刑教與今之刑教孔子曰古之刑省今之刑繁其為教古有禮然後有刑是以刑省今無禮以教而齊之以刑刑是以繁書曰伯夷降典折民惟刑書呂刑之文言堯命伯夷下禮典以教民而斷折以法謂下禮以教之然後維以刑折之也夫無禮則民無恥而正之以刑故民苟免孔叢子孔子適衛衛將軍文子問曰文子衛卿名彌牟吾聞魯公父氏公父氏魯大夫季氏不能聽獄信乎孔子答曰不知其不能也夫公父氏之聽獄有罪者懼無罪者恥文子曰有罪者懼是聽之察刑之當也無罪者恥何乎孔子曰齊之以禮則民恥矣刑以止刑則民懼矣文子曰今齊之以刑刑猶弗勝何禮之齊孔子曰以禮齊民譬之於御則轡也以刑齊民譬之於御則鞭也執轡於此而動於彼御之良也無轡而用䇿則馬失道矣捨轡而用䇿則馬失道去禮而任刑則民忘生文子曰以御言之左手執轡右手運䇿不亦速乎若徒轡無䇿馬何懼哉孔子曰吾聞古之善御者執轡如組兩驂如舞非䇿之助也是以先王盛於禮而薄於刑故民從命今也廢禮而尚刑故民彌暴文子曰吳越之俗無禮而亦治何也孔子曰夫吳越之俗男女無别同川而浴民輕相犯故其刑重而不勝由無禮也中國之教為外內以别男女異器服以殊等類故其民篤而法其刑輕而勝由有禮也同上孔子曰大罪有五而殺人為下逆天地者罪及五世誣文武者罪及四世逆人倫者罪及三世誣鬼神者罪及二世殺人者罪止其身故曰大罪有五而殺人為下矣家語孔子曰五刑之屬三千而罪莫大於大孝要君者無上非聖人者無法非孝者無親此大亂之道也孝經傳曰罪多而刑五喪多而服五上附下附列也列等比也服商小宰以官府之八成經邦治一曰聽政役以比居二曰聽師田以簡稽三曰聽閭里以版圖四曰聽稱責以傅别五曰聽祿位以禮命六曰聽取豫以書契七曰聽賣買以質劑八曰聽出入以要會鄭司農云政謂軍政也役謂發兵起徒役也比居謂伍籍也比地為伍因內政寄軍令以伍籍發軍起役者平而無遺脫也簡稽士卒兵器薄書簡猶閲也稽猶計也合也合計其士之卒伍閲其兵器為之要簿也故遂人職曰稽其人民簡其兵器國語曰黃池之會吳陳其兵皆官師擁鐸拱稽版户籍圖地圖也聽人訟地者以版圖決之司書職曰邦中之版土地之圖稱責謂貸豫傅别謂券書也聽訟責者以券書決之傅傅著約束於文書别别為兩兩家各得一也禮命禮九賜也書契符書也質劑謂市中平賈今時月平是也要會謂計最之簿書月計曰要歲計曰會故宰夫職曰歲終則令羣吏正歲會月終則令正月要傅别故書作傅辨鄭大夫讀為符别杜子春讀為傅别玄謂政謂賦也凡其字或作政或作正或作征以多言之宜從征如孟子交征利云傅别謂為大手書於一札中字别之書契謂出豫受入之凡要凡簿書之最目獄訟之要辭皆曰契春秋傳曰王叔氏不能舉其契質劑謂兩書一札同而别之長曰質短曰劑傅别質劑皆今之券書也事異異其名耳禮命禮之九命之差等天官小司徒凡民訟以地比正之鄭司農云以田畔所與比正斷其訟地訟以圖正之地訟爭疆界者圖謂邦國本圖地官大史凡辨法者考焉不信者刑之謂邦國官府都鄙以法爭訟來正之者春官大司冦以兩造禁民訟入束矢於朝然後聽之訟謂以財貨相告者造至也使訟者兩至既兩至使入束矢乃治之也不至不入束矢則是自服不直者也必入矢者取其直也詩曰其直如矢古者入弓百矢束矢其百個與以兩劑禁民獄入鈞金三日乃致於朝然後聽之獄謂相告以罪名者劑今券書也使獄者各齎券書既兩券書使入鈞金又三日乃治之重刑也不券書不入金則是亦自服不直者也必入金者取其堅也三十斤曰鈞凡諸侯之獄訟以邦典定之邦典六典也以六典待邦國之治凡卿大夫之獄訟以邦法斷之邦法八法也以八法待官府之治凡庶民之獄訟以邦成弊之邦成八成也以官成待萬民之治故書弊為憋鄭司農云憋當為弊邦成謂若今時決事比也弊之斷其獄訟也故春秋傳曰弊獄邢侯小司冦以五刑聽萬民之獄訟附於刑用情訊之至於旬乃弊之讀書則用法附猶著也故書附作付訊言也用情理言之冀有可以出之者十日乃斷之王制曰刑者侀也侀者成也一成而不可變故君子盡心焉鄭司農云讀書則用法如今時讀鞫已乃論之以五聲聽獄訟求民情一曰辭聽觀其出言不直則煩二曰色聽觀其顔色不直則赧然三曰氣聽觀其氣息不直則喘四曰耳聽觀其聽聆不直則惑五曰目聽觀其眸子視不直則毦然以三刺斷庶民獄訟之中中謂罪正所定一曰訊羣臣二曰訊羣吏三曰訊萬民刺殺也三訊罪定則殺之訊言也聽民之所刺宥以施上服下服之刑宥寬也民言殺殺之言寬寬之上服劓墨也下服宮刖也嵗終則令羣士計獄弊訟登中於天府上其所斷獄訟之數乃命其屬入會乃致事得其屬之計乃令致之於王士師察獄訟之辭以詔司冦斷獄弊訟致邦令詔司冦若今曰聽正法解也致邦令者以法報之凡以財獄訟者正之以傅别約劑傅别中别手書也約劑各所持券也故書别為辨鄭司農云傅或為符辨讀為風别之别若今時市買為券書以别之各得其一故訟則案券以正之嵗終則令正要會定計簿鄉士掌國中鄭司農云謂國中至百里郊也玄謂其地則距王城百里內也言掌國中此主國中獄也六鄉之獄在國中各掌其鄉之民數而糾戒之鄉士八人言各者四人而分主三鄉聽其獄訟察其辭察審也辨其獄訟異其死刑之罪而要之旬而職聽於朝辨異謂殊其文書也要之為其罪法之要辭如今劾矣十日乃以職事治之於外朝容其自反覆司冦聽之斷其獄弊其訟於朝羣士司刑皆在各麗其法以議獄訟麗附也各附致其法以成議也獄訟成士師受中協日刑殺肆之三日受中謂受獄訟之成也鄭司農云士師受中若今二千石受其獄也中者刑罰之中也故論語曰刑罰不中則民無所措手足協日刑殺協合也和也和合支幹善日若今時望後利日也肆之三日故春秋傳曰三日棄疾請尸論語曰肆諸市朝玄謂士師既受獄訟之成鄉士則擇可刑殺之日至其時而往涖之尸之三日乃反也若欲免之則王會其期免猶赦也期謂鄉士職聽於朝司冦聽之日王欲赦之則用此時親往議之遂士掌四郊鄭司農云謂百里外至三百里也玄謂其地則距王城百里以外至二百里言掌四郊者此主四郊獄也六遂之獄在四郊各掌其遂之民數而糾其戒令遂士十二人言各者二人而分主一遂聽其獄訟察其辭辨其獄訟異其死刑之罪而要之二旬而職聽於朝司冦聽之斷其獄弊其訟於朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日就郊而刑殺各於其遂肆之三日就郊而刑殺者遂士也遂士擇刑殺日至其時往涖之如鄉士為之矣言各於其遂者四郊六遂遂處不同若欲免之則王令三公會其期令猶命也王欲赦之則用遂士職聽之時命三公往議之縣士掌野鄭司農云掌三百里至四百里大夫所食晉韓須為公族大夫食縣玄謂地距王城二百里以外至三百里曰野三百里以外至四百里曰縣四百里以外至五百里曰都都縣野之地其邑非王子弟公卿大夫之采地則皆公邑也謂之縣縣士掌其獄焉言掌野者郊外曰野大總言之也獄居近野之縣獄在二百里上縣之縣獄在三百里上都之縣獄在四百里上各掌其縣之民數糾其戒令而聽其獄訟察其辭辨其獄訟異其死刑之罪而要之三旬而職聽於朝司冦聽之斷其獄弊其訟於朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺各就其縣肆之三日刑殺各就其縣者亦謂縣士也若欲免之則王命六卿會其期期亦謂縣士職聽之時方士掌都家鄭司農云掌四百里至五百里公所食魯季氏食於都玄謂都王子弟及公卿之采地家大夫之采地大都在疆地小都在縣地家邑在稍地不言掌其民數民不純屬王聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟於國三月乃上要者又變朝言國以其自有君異之司冦聽其成於朝羣士司刑皆在各麗其法以議獄訟成平也鄭司農説以春秋傳曰晉邢侯與雍子爭鄐田久而無成獄訟成士師受中書其刑殺之成與其聽獄訟者都家之吏自協日刑殺但書其成與治獄之吏姓名備反覆有失實者凡都家之士所上治則主之都家之士都士家士也所上治者謂獄訟之小事不附罪者也主之告于司冦聽平之訝士掌四方之獄訟鄭司農云四方諸侯之獄訟諭罪刑於邦國告曉以麗罪及制刑之本意凡四方之有治於士者造焉謂讞疑辨事先來詣乃通之於士也士主謂士師也如今郡國亦時遣主者吏詣廷尉議者四方有亂獄則往而成之亂獄謂若君臣宣淫上下相虐者也往而成之猶吕步舒使治淮南獄朝士凡士之治有期日國中一旬郊二旬野三旬都三月邦國期期內之治聽期外不聽凡有責者有判書以治則聽判半分而合者鄭司農云謂别券也玄謂古者出責之息亦如其國服與凡屬責者以其地傅而聽其辭鄭司農云謂訟地畔界者田地町畔相比屬故謂之屬責以地傅而聽其辭以其比畔為證也玄謂屬責轉責使人歸之而本主死亡歸受之數相扺冒者也以其地之人相比近能為證者來乃受其辭為治之司刑若司冦斷獄弊訟則以五刑之法詔刑罰而以辨罪之輕重詔刑罰者處其所應不如今律家所署法矣官並秋大司徒凡萬民之不服教而有獄訟者與有地治者聽而斷之其附於刑者歸於士不服教不厭服於十二教貪冒者也爭罪曰獄爭財曰訟有地治者謂鄉州及治都鄙者也士司冦士師之屬鄭司農云與有地治者聽而斷之與其地部界所屬吏共聽斷之士謂主斷刑之官春秋傅曰士榮為大士或謂歸於圜土圜土謂獄也獄城圜媒氏凡男女之陰訟聽之於勝國之社其附於刑者歸之於士陰訟爭中冓之事以觸法者勝國亡國也亡國之社奄其上而棧其下使無所通就之以聽陰訟明不當宣露其罪不在赦宥者直歸士而刑之不復以聽士司冦之屬也詩云牆有茨不可掃也中冓之言不可道也所可道也言之醜也司市上旌于思次以令市市師涖焉而聽大治大訟胥師賈師涖于介次而聽小治小訟思次若今市亭也市師司市也介次市亭之屬别小者也鄭司農云思辭也次市中候樓也玄謂思當為司聲之誤也其附於刑者歸於士質人凡治質劑者國中一旬郊二旬野三旬都三月邦國期期內聽期外不聽謂齎券契者來訟也以期內來則治之後期則不治所以絶民之好訟且息文書也郊逺郊也野甸稍也都大都小都並地官掌囚及刑殺告刑於王奉而適朝士加明梏以適市而刑殺之告刑於王告王以今日當行刑及所刑姓名也其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟奉而適朝者重刑為王欲有所赦且當以付士士鄉士也鄉士加明梏者謂書其姓名及其罪於梏而著之也囚時雖有無梏者至於刑殺皆設之以適市就衆也庶姓無爵者皆刑殺於市秋官司冦正刑明辟以聽獄訟司冦秋官卿掌刑者辟罪也必三刺以求民情斷其獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民有旨無簡不聽簡誠也有其意無其誠者不論以為罪附從輕附施刑也求出之使從輕赦從重雖有罪可重猶赦之凡制五刑必即天論制斷也即就也必即天論言與天意合閔子曰古之道不即人心即或為則論或為倫郵罰麗於事郵過也麗附也過人罰人當各附於其事不可假他以喜怒凡聽五刑之訟必原父子之親立君臣之義以權之權平也意論輕重之序慎測淺深之量以别之意思念也淺深謂俱有罪本心有善惡悉其聰明致其忠愛以盡之盡其情疑獄泛與衆共之衆疑赦之必察小大之比以成之小大猶輕重己行故事曰比成獄辭史以獄成告於正正聽之史司冦吏也正於周鄉師之屬入漢有正平丞秦所置正以獄成告於大司冦大司冦聽之棘木之下周禮鄉師之屬辨其獄訟異其死刑之罪而要之職聽於朝司冦聽之朝王之外朝也左九棘孤卿大夫位焉右九棘公侯伯子男位焉面三槐三公位焉大司冦以獄之成告於王王命三公參聽之王使三公復與司冦及正共平之重刑也周禮王欲免之乃命公會其期三公以獄之成告於王王三又然後制刑又當作宥寬也一宥曰不識再宥曰過失三宥曰遺忘王制右聽斷舜流共工於幽州放歡兜於崇山竄三苗於三危殛鯀於羽山四罪而天下咸服流遣之逺去如水之流也放置之於此不得他適也竄則驅逐禁錮之殛則拘囚困苦之隨其罪之輕重而異法也共工歡兜鯀事見上篇三苗國名在江南荆揚之間恃險為亂者也幽州北裔之地水中可居曰洲崇山南裔之山在今澧洲三危兩裔之地即雍之所謂三危既宅者羽山東裔之山即徐之蒙羽其藝者服者天下皆服其用刑之當罪也程子曰舜之誅四凶怒在四凶舜何與焉蓋因是人有可怒之事而怒之聖人之心本無怒也聖人以天下之怒為怒故天下咸服之春秋傳所記四凶之名與此不同説者以窮奇為共工渾敦為歡兜叨餮為三苗檮杌為鯀不知其果然否也舜典昔帝鴻氏有不才子帝鴻黃帝掩義隱賊好行凶德醜類惡物頑嚚不友是與比周醜亦惡也比近也周密也天下之民謂之渾敦謂歡兜淳敦不開通之貌少皥氏有不才子少皥金天氏之號次黃帝毁信廢忠崇飾惡言靖譖庸回服讒搜慝以誣盛德崇聚也靖安也庸用也回邪也服行也搜隱也慝惡也盛德賢人也天下之民謂之窮奇謂共工其行窮其好奇顓頊氏有不才子不可教訓不知話言話善也告之則頑德義不入心舍之則嚚不道忠信傲狠明德以亂天常天下之民謂之檮杌謂鯀檮杌頑凶無儔匹之類此三族也世濟其凶增其惡名以至於堯堯不能去方以宣公比堯行父比舜故言堯亦不能去須賢臣而除之縉雲氏有不才子縉雲黃帝時官名貪於飲食冒於貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱冒亦貪也盈滿也實財也天下之民以比三凶非帝王者子孫故别以比三凶謂之叨餮貧財為叨貪食為餮舜臣堯為堯臣賓於四門闢四門達四聰以賓禮衆賢流四凶族按四凶罪狀而流放之渾敦窮奇檮杌叨餮投諸四裔以禦魑魅投棄也裔逺也放之四遠使當魑魅之災魑魅山林異氣所生為人害者文十八年左氏傳帝曰臯陶惟兹臣庶罔或干豫正汝作士明於五刑以弼五教期于豫治刑期于無刑民協于中時乃功懋哉干犯正政弼輔也聖人之治以德為化民之本而刑特以輔其所不及而已期者先事取必之謂舜言惟此臣庶無或有干犯我之政者以爾為士師之官能明五刑以輔五品之教而期我以至於治其始雖不免於用刑而實所以期至於無刑之地故民亦皆能協於中道初無有過不及之差則刑果無所施矣凡此皆汝之功也臯陶曰帝德罔愆臨下以簡御衆以寬罰弗及嗣賞延于世有過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽於民心兹用不犯于有司愆過也簡者不煩之謂上煩密則下無所容御者急促則衆擾亂嗣世皆謂子孫然嗣親而世疏也延逺及也父子罪不相及而賞則遠延于世其善善長而惡惡短如此過者不識而誤犯也故者知之而故犯也過誤所犯雖大必宥不忌故犯雖小必刑即上篇所謂眚災肆赦怙終賊刑者也罪已定矣而于法之中有疑其可重可輕者則從輕以罰之功已定矣而于法之中有疑其可輕可重者則從重以賞之辜罪經常也謂法可以殺可以無殺殺之則恐陷於非辜不殺之恐失於輕縱二者皆非聖人至公至平之意而殺不辜者尤聖人之所不忍也故與其殺之而害彼之生寧姑全之而自受失刑之責此其仁愛忠厚之至皆所謂好生之德也蓋聖人之法有盡而心則無窮故其用刑行賞或有所疑則常屈法以申恩而不使執法之意有以勝其好生之德此其本心所以無所壅遏而得行於常法之外及其流衍洋溢漸涵浸漬有以入于民心則天下之人無不愛慕感悅興起於善而自不犯于有司也臯陶以舜美其功故言此以歸功于其上蓋不敢當其褒美之意而自謂己功也大禹謨王曰嗚呼封敬明乃罰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺此下謹罰也式用適偶也人有小罪非過誤乃其固為亂常之事用意如此其罪雖小乃不可不殺即舜典所謂刑故無小也人有大罪非是故犯乃其過誤出於不幸偶爾如此既自稱道盡輸其情不敢隱匿罪雖大時乃不可殺即舜典所謂宥過無大也諸葛孔明治蜀服罪輸情者雖重必釋其既道極厥辜時乃不可殺之意歟王曰嗚呼封有敘時乃大明服惟民其勑懋和若有疾惟民其畢棄咎若保赤子惟民其康乂有敘者刑罰有次序也明者明其罰服者服其民也左氏曰乃大明服已則不明而殺人以逞不亦難乎勑戒勑也民其戒勑而勉於和順也若有疾者以去疾之心去惡也故民皆棄咎若保赤子者以保子之心保善也故民其安治非汝封刑人殺人無或刑人殺人非汝封又曰劓刵人無或劓刵人刑殺者天之所以討有罪非汝封得以刑之殺之也汝無或以己而刑殺之刵截耳也刑殺刑之大者劓刵刑之小者兼舉小大以申戒之也又曰當在無或刑人殺人之下又按則周官五刑所無呂刑以為苗民所制王曰外事汝陳時臬司師兹殷罰有倫外事未詳陳氏曰外事有司之事也臬去也為準限之義言汝於外事但陳列是法使有司師此殷罰之有倫者用之爾呂氏曰外事衛國事也史記言康叔為周司冦司冦王朝之官職任內事故以衛國對言為外事今按篇中言往敷求往盡乃心篇終曰往哉封皆令其之國之辭而未見其留王朝之意但詳此篇康叔蓋深於法者異時成王或舉以任司冦之職而此則未必然也又曰要囚服念五六日至于旬時丕蔽要囚要囚獄詞之要者也服念服膺而念之旬十日時三月為囚求生道也蔽斷也王曰汝陳時臬事罰蔽殷彝用其義刑義殺勿庸以次汝封乃汝盡遜曰時敘惟曰未有遜事義宜也次次舍之次遜順也申言敷陳是法與事罰斷以殷之常法矣又慮其泥古而不通又謂其刑其殺必察其宜於時者而後用之既又慮其趨時而徇已又謂刑殺不可以就汝封之意既又慮其刑殺雖已當罪而矜喜之心乘之又謂使法刑殺盡順於義雖曰是有次敘汝當惟謂未有順義之事蓋矜喜之心生乃怠惰之心起刑殺之所由不中也可不戒哉已汝惟小子未其有若汝封之心朕心朕德惟乃知己者語辭之不能已也小子幼小之稱言年雖少而心獨善也爾心之善固朕知之朕心朕德亦惟爾知之將言用罰之事故先發其良心焉凡民自得罪冦攘姦宄殺越人于貨暋不畏死罔弗憝越顚越也盤庚云顚越不恭暋強憝惡也自得罪非為人誘陷以得罪也凡民自犯罪為盜賊姦宄殺人顚越人以取財貨強狠亡命者人無不憎惡之也用罰而加是人則人無不服以其出乎人之同惡而非即乎吾之私心也特舉此以明用罰之當罪王曰封元惡大憝矧惟不孝不友子弗祇服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔兹不于我政人得罪天惟與我民彝大泯亂曰乃其速由文王作罰刑兹無赦大憝即上文之罔弗憝言冦攘姦宄固為大惡而大可惡矣况不孝不友之人而尤為可惡者當商之季禮義不明人紀廢壞子不敬事其父大傷父心父不能愛子乃疾惡其子是父子相夷也天顯猶孝經所謂天明尊卑顯然之序也弟不念尊卑之序而不能敬其兄兄亦不念父母鞠養之勞而大不友其弟是兄弟相賊也父子兄弟至於如此苟不於我為政之人而得罪焉則天之與我民彛必大泯滅而紊亂矣曰者言如此則汝其速由文王作罰刑此無赦而懲戒之不可緩也不率大戛矧惟外庶子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝已汝乃其速由兹義率殺戛法也言民之不率教者固可大置之法矣况外庶子以訓人為職與庶官之長及小臣之有符節者乃别布條教違道干譽弗念其君弗用其法以病君上是乃長惡於下我之所深惡也臣之不忠如此刑其可已乎汝其速由此義而率以誅戮之可也赦按上言民不孝不友則速由文王作罰刑兹無此言外庶子正人小臣背上立私則速由兹義率殺其曰刑曰殺若用法峻急者蓋殷之臣民化紂之惡父子兄弟之無其親君臣上下之無其義非繩之以法示之以威殷民孰知不孝不義之不可干哉周禮所謂刑亂國用重典者是也然曰速由文王曰速由兹義則其刑其罰亦仁厚而已矣康誥乃惟成湯以至於帝乙罔不明德慎罰亦克用勸要囚殄戮多罪亦克用勸開釋無辜亦克用勸言辟與宥皆足以使人勉於善也方多周公曰今文子文孫孺子王矣其勿誤於庶獄惟有司之牧夫始言和我庶獄庶慎時則勿有間之繼言其勿誤於庶獄庶慎惟正是又之至是獨曰其勿誤於庶獄惟有司之牧夫蓋刑者天下之重事挈其重而獨舉之使成王尤知刑獄之可畏必專有司牧夫之任而不可以己誤之也又曰太史司寇蘇公式敬爾由獄以長我王國兹式有慎以列用中罰此周公因言愼罰而以蘇公敬獄之事告之太史使其并書以為後世司獄之式也蘇國名也左傳蘇忿生以溫為司冦周公告太史以蘇忿生為司冦用能敬其所由之訟培植基本以長我王國令於此取法而有謹焉則能以輕重條列用其中罰而無過差之患矣立政王曰君陳殷民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中言殷民之在刑辟者不可徇君以為生殺惟當審其輕重之中也有弗若于汝政弗化于汝訓辟以止辟乃辟其有不順于汝之政不化于汝之訓刑之可也然刑期無刑刑而可以止刑者乃刑之狃于姦宄敗常亂俗三細不宥狃習也常典常也俗風俗也狃於姦宄與夫毁敗典常壞亂風俗人犯此三者雖小罪亦不可宥以其所關者大也君陳王曰嗟四方司政典獄非爾惟作天牧今爾何監非時伯夷播刑之迪其今爾何懲惟時苗民匪察于獄之麗罔擇吉人觀於五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苗苗民無辭于罰乃絶厥世司政典獄漢孔氏曰諸侯也為諸侯主刑獄而言非爾諸侯為天牧養斯民乎為天牧民則今爾何所監懲所當監者非伯夷乎所當懲者非有苗乎伯夷布刑以啓迪斯民捨臯陶而言伯夷者探本之論也麗附也苗民不察於獄辭之所麗又不擇吉人俾觀於五刑之中惟是貴者以威亂政富者以貨奪法斷制五刑亂虐無罪上帝不蠲貨而降罰于苗苗民無所辭其罰而遂殄滅之也王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命今爾罔不由慰日勤爾罔或戒不勤天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三德一人有慶兆民賴之其寧惟永此告同姓諸侯也格至也參錯訊鞠極天下之勞者寞若獄苟有豪髮怠心則民有不得其死者矣罔不由慰日勤者爾所用以自慰者無不以日勤故職舉而刑當也爾罔或戒不勤者刑罰之用一成而不可變者也苟頃刻之不勤則刑罰失中雖深戒之而已施者亦無及矣戒固善心也而用刑豈可以或戒也哉且刑獄非所恃以為治也天以是整齊亂民使我為一日之用而已非終即康誥大罪非終之謂言過之當宥者惟終即康誥小罪惟終之謂言過之當辟者非終惟終皆非我得輕重惟在夫人所犯耳爾當敬逆天命以承我一人畏威古通用威辟之也休宥之也我雖以為辟爾惟勿辟我雖以為宥爾惟勿宥惟敬乎五刑之用以成剛柔正直之德則君慶於上民賴于下而安寧之福其永久而不替矣王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及有民社者皆在所告也夫刑凶器也而謂之祥者刑期無刑民協于中其祥莫大焉及逮也漢世詔獄所逮有至數萬人者審度其所當逮者而後可逮之也曰何曰非問答以發其意以明三者之決不可不盡心也兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過兩造者兩爭者皆至也周官以兩造聽民訟具備者詞證皆在也師衆也五辭麗於五刑之辭也簡核其實也孚無可疑也正質也五辭簡核而可信乃質于五刑也不簡者辭與刑參差不應刑之疑者也罰贖也疑于刑則質于罰也不服者辭與罰又不應也罰之疑者也過誤也疑于罰則質于過而宥免之也五過之疵惟官惟反惟內惟貨惟來其罪惟均其審克之疵病也官威勢也反報德怨也內女謁也貨賄賂也來干請也惟此五者之病以出入人罪則以人之所犯坐之審克者察之詳而盡其能也下文屢言以見其丁寧忠厚之至疵於刑罰亦然但言於五過者舉輕以見重也五刑之疑有赦五罰之疑有赦其審克之簡孚有衆惟貌有稽無簡不聽具嚴天威刑疑有赦正于五罰也罰疑有赦正于五過也簡核情實可信者衆亦惟考察其容貌周禮所謂色聽是也然聽獄以簡核為本苟無情實在所不聽上帝臨汝不敢有毫髮之不盡也墨辟疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪剕辟疑赦其罰倍差閲實其罪宫辟疑赦其罰六百鍰閲實其罪大辟疑赦其罰千鍰閲實其罪墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千上下比罪無僭亂辭勿用不行惟察惟法其審克之墨刻顙而涅之也劓割鼻也剕則足也宫淫刑也男子割勢婦人幽閉大辟死刑也六兩曰鍰閲視也倍二百鍰也倍差倍而又差五百鍰也屬類也三千總計之也周禮司刑所掌五刑之屬二千五百刑雖增舊然輕罪比舊為多而重罪比舊為減也比附也罪無正律則以上下刑而比附其罪也無僭亂辭勿用不行未詳或曰亂辭辭之不可聽者不行舊有是法而令不行者戒其無差誤於僭亂之辭勿用今所不行之法惟詳明法意而審克之也今按臯陶所謂罪疑惟輕者降一等而罪之耳今五刑疑赦而直罰之以金是大辟宫剕劓墨皆不復降等用矣蘇氏謂五刑疑各入罰不降當因古制非也舜之贖刑宮府學校鞭撲之刑耳夫刑莫輕于鞭撲入于鞭撲之刑而又情法猶有可議者則是無法以治之故使之贖特不欲遽釋之也而穆王之所謂贖雖大辟亦贖也舜豈有是制哉之又按漢張敞以討羌兵食不繼建為入穀贖罪法初亦未嘗及夫殺人及盜之罪而蕭望之等猶以為如此則富者得生貧者獨死恐開科路以傷治化曾謂唐虞之世而有是贖法哉穆王巡遊無度財匱民勞至其末年無以為計乃為此一切權宜之術以斂民財夫子録之蓋亦示戒然其一篇之書哀矜惻怛猶可以想見三代忠厚之遺意云爾上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要事在上刑而情適輕則服下刑舜之宥過無大康誥所謂大罪非終者是也事在下刑而情適重則服上刑舜之刑故無小康誥所謂小罪非眚者是也若諸罰之輕重亦皆有權焉權者進退推移以求其輕重之宜也刑罰世輕世重者周官刑新國用輕典刑亂國用重典刑平國用中典隨世而為輕重者也輕重諸罰有權者權一人之輕重也刑罰世輕世重者權一世之輕重也惟齊非齊者法之權也有倫有要者法之經也言刑罰雖惟權變是適而齊之以不齊焉至其倫要所在蓋有截然而不可紊者矣此兩句總結上意罰懲非死人殛于病非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄明啓刑書胥占咸庶中正其刑其罰其審克之獄成而孚輸而孚其刑上備有并兩刑罰以懲過雖非致人於死然民重出贖亦甚病矣佞口才也非口才辨給之人可以折獄惟溫良長者視民如傷者能折獄而無不在中也此言聽獄者當擇其人也察辭于差者辭非情實終必有差聽獄之要必於其差而察之非從惟從者察辭不可偏主猶曰不然而然所以審輕重而取中也哀敬折獄者惻怛敬畏以求其情也明啓刑書胥占者言詳明法律而與衆占度也咸庶中正者皆庶幾其無過忒也於是刑之罰之又當審克之也此言聽獄者當盡其心也若是則獄成于下而民信之獄輸于上而君信之其刑上備有并兩刑者言上其斷獄之書當備情節一人而犯兩事罪雖從重亦并兩刑而上之也此言讞獄者當備其辭也王曰嗚呼敬之哉官伯族姓朕言多懼朕敬于刑有德惟刑今天相民作配在下明清于單辭民之亂罔不中聽獄之兩辭無或私家于獄之兩辭獄貨非寶惟府辜功報以庶尤永畏惟罰非天不中惟人在命天罰不極庶民罔有令政在于天下此總告之也官典獄之官也伯諸侯也族同族姓異姓也朕之于刑言且多懼况用之乎朕敬于刑者畏之至也有德惟刑厚之至也今天以刑相治斯民汝實任責作配在下可也明清以下敬刑之事也獄辭有單有兩單辭者無證之辭也聽之為尤難明者無一毫之蔽清者無一點之汚曰明曰清誠敬篤至表裏洞徹無少私曲然後能察其情也亂治也獄貨鬻獄而得貨也府聚也辜功猶云罪狀也報以庶尤者降之百殃也非天不中惟人在命者非天不以中道待人惟人自取其殃禍之命爾此章文有未詳者姑缺之王曰嗚呼嗣孫今往何監非德于民之中尚明聽之哉哲人惟刑無疆之辭屬于五極咸中有慶受王嘉師監于兹祥刑此詔來世也嗣孫嗣世子孫也言今往何所監視非用刑成德而能全民所受之中者乎下文哲人即所當監者五極五刑也明哲之人用刑而有無窮之譽蓋由五刑咸得其中所以有慶也嘉善師衆也諸侯受天子良民善衆當監視于此祥刑申言以結之也呂刑溫之會晉人執衛成公歸之于周溫晉之河陽成公衛文公之子成公鄭也晉文公討不服衛成公恃楚而不從聞楚師敗于城濮衛侯懼出奔使元咺奉弟叔武以受盟于踐土或訴元咺曰立叔武矣衛侯殺其子角咺不廢命奉叔武以守國晉人復衛侯先期入叔武將沐聞君至喜捉髮走出前驅射而殺之元咺出奔晉會于溫討不服衛侯與元咺訟不勝故晉侯執之歸之于京師在魯僖公二十八年晉侯請殺之王言不可夫政自上下者也當從王出也上作政而下行之不逆故上下無怨言君臣不相怨今叔父作政而不行無乃不可乎不行謂不順也言晉侯不行德政而聽元咺之訴欲殺衛侯也夫君臣無獄獄訟也無是非曲直之義也今元咺雖直而不可聽也君臣皆獄父子將獄是無上下也而叔父聽之一逆矣又為臣殺其君其安庸刑庸用也刑法也布刑而不庸再逆矣一合諸侯而有再逆政余懼其無後無後無以復合諸侯也不然余何私於衛侯晉人乃歸衛侯在魯僖三十年也晉侯使醫衍鴆衛侯不死魯僖為請納玉於王與晉侯皆十瑴於是歸之也周語晉邢侯與雍子爭鄐田邢侯楚申公巫臣之子也雍子亦故楚人久而無成士景伯如楚士景伯晉理官叔魚攝理攝代景伯韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯蔽斷也邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也施行罪也雍子自知其罪而賂以買直鮒也鬻獄邢侯敷殺其罪一也己惡而掠美為昏掠取也昏亂也貪以敗官為墨墨不潔之稱殺人不忌為賊忌畏也夏書曰昏墨賊殺逸書三者皆死刑臯陶之刑也請從之乃施邢侯而尸雍子與叔魚於市仲尼曰叔向古之遺直也言叔向之直有古人遺風治國制刑不隱於親謂國之大問己所答當也至于他事則宜有隱三數叔魚之惡不為末減末薄也減輕也皆以正言之曰義也夫可謂直矣於義未安直則有之平丘之會數其賄也謂言瀆貨無厭以寬衛國晉不為暴歸魯季孫稱其詐也謂言鮒也能以寬魯國晉不為虐邢侯之獄言其貪也以正刑書晉不為頗三言而除三惡加三利三惡暴虐頗也三惡除則三利加殺親益榮榮名益已猶義也夫三罪唯答宣子問不可以不正其餘則以直傷義故重疑之昭十四年左氏傳邾婁定公之時有弒其父者定公貜且也魯文十四年即位有司以告公瞿然失席曰是寡人之罪也民之無禮教之罪曰寡人嘗學斷斯獄矣臣弒君凡在官者殺無赦子弒父凡在宫者殺無赦言諸臣子孫無尊卑皆得殺之其罪無赦殺其人壞其室汙其宫而豬焉明其大逆不欲人復處之豬都也南方謂都為豬蓋君踰月而后舉爵自貶損檀弓孔子為魯司冦朝政七日而誅亂政大夫少正卯戮之于兩觀之下尸於朝三日子貢進曰夫少正卯魯之聞人也今夫子為政而始誅之或者為失乎孔子曰天下有大惡者五而竊盜不與焉一曰心逆而險二曰行僻而堅三曰言偽而辨四曰記醜而博五曰順非而澤此五者有一於人則不免君子之誅而少正卯皆兼有之其居處足以撮徒成黨其談説足以飾褒榮衆其強禦足以反是獨立此乃人之姦雄者也不可以不除夫殷湯誅尹諧文王誅潘正周公誅管蔡太公誅華士管仲誅付乙子産誅史何是此七子皆異世而同誅者以七子異世而同惡故不可赦也家語孔子為魯司冦有父子訟者孔子同狴執之三月不别其父請止孔子赦之季孫聞之不説曰司冦欺豫曩告余曰國家必先以孝余今戮一不孝以教民孝不亦可乎而又赦何哉冉子以告孔子慨然歎曰嗚呼上失其道而殺其下非理也不教其民而聽其訟殺不辜也三軍大敗不可斬也獄犴不治不可刑也何者上教之不行罪不在民故也夫慢令謹誅賊也徴斂無時暴也不教而責成功虐也政無此三者然後刑可即也書云義刑義殺勿庸以即汝心惟曰未有順事言必教而後刑也既陳道德以先服之而猶不可尚賢以勸之又不可即廢之又不可而後以威憚之若是三年而百姓正矣邪民不從然後俟之以刑則民知罪矣詩云天子是毗俾民不迷是以威厲而不試刑錯而不用今世則不然亂其教煩其刑使民迷惑而陷焉又從而制之故刑彌煩而盜不勝也夫三尺之限空車不能登者何哉峻故也百仞之山重載陟焉何哉陵遲故也合世俗之陵遲久矣雖有刑法民能勿踰乎同上孔子為魯司冦斷獄訟皆進衆議者而問之曰子以為奚若某以為何若皆曰云云如是然後夫子曰嘗從某子幾是同上孟氏之臣叛武伯問孔子曰如之何答曰臣人而叛天下所不容也其將自反子姑待之三旬果自歸孟氏武伯將執之訪於夫子夫子曰無也子之於臣禮意不至是以去子夫禮不交則意不通意不通則疑所生以疑生則去矣今其自反罪以反除又何執焉子修禮以待之則臣去子將安往武伯乃止孔叢子孔子曰民之所以生者衣食也上不教民民匱其生飢寒切於身而不為非者寡矣故古之於盜惡之而不殺也今不先其教而一殺之是以罰行而善不反刑張而罪不省夫赤子知慕其父母由審故也况為政奪其賢者而與其不賢以化民乎知審此二者則上盜先息上盜猶大盜同上書曰兹殷罰有倫周書康誥之文言此殷家刑罰有倫理者亦當兼用之子張問曰何謂也孔子曰不失其理之謂也今諸侯不同德每君異法折獄無倫以意為限是故知法之難也子張曰古之知法者與今之知法者異乎孔子曰古之知法能逺能逺者謂能正其源以禮教先之也今之知法者不失有罪不失有罪其於恕寡矣既不先禮復不以情惟法為得能遠則於獄其防深矣寡恕近乎濫防深治乎本書曰惟敬五刑以成三德言敬刑所以為德矣周書吕刑之文言教以惟敬五刑所以成剛柔正直之三德同上書曰非從惟從周書呂刑云察辭于差非從惟從言察囚辭當差錯不可從其偽辭必審從所本之意孔子曰君子之於人也有不語也無不聽也有不語則已語則無不聽在審其真偽焉况聽訟乎必盡其辭矣夫聽訟者或從其情或從其辭辭不可從必斷以情書曰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺周書康誥之文眚過也災害也典常也式用也適從也既盡也言人有小罪過誤乃惟終自作不常用犯汝厥罪雖小乃不可不殺也乃有大罪非終乃惟過誤雖有其害從汝盡聽訟之道以極其罪是亦不可殺必以罰有倫焉同上曽子問聽獄之術孔子曰其大法有三焉治必以寬寬之之術歸於察大寬則民慢慢則姦偽生焉故明之以察察之之術婦於義夫察甚則或過乎暴故以義為質是故聽而不寬是亂也夫聽太亟則失於詳故事之是否亂焉寬而不察是慢也察而不中義是私也私謂刑失其正若私曲然私則民怨故善聽者雖不越辭辭不越情情不越義夫善聽者得辭則審之以情得情則斷之以義書曰上下比罰無僭亂辭周書吕刑之文言上下比方其罪聽僭亂之辭以自疑也同上書曰若保赤子周書康誥之文言愛民若安嬰孩赤子然不使失其欲子張問曰聽訟可以若此乎孔子曰可哉古之聽訟者惡其意不惡其人非喜怒其人但疾其意之有險害求所以生之不得其所以生乃刑之君必與衆共焉愛民而重棄之也是所謂刑人于市與衆棄之也今之聽訟者不惡其意而惡其人求所以殺是反古之道也同上雷電皆至豐君子以折獄致刑取其威照並行之象山上有火旅君子以明愼用刑而不留獄愼刑如山不留如火澤上有風中孚君子以議獄緩死風感水受中孚之象議獄緩死中孚之意並易刑者侀也侀者成也一成而不可變故君子盡心焉變更也王制子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本猶人不異於人也情實也引夫子之言而言聖人能使無實之人不敢盡其虛誕之辭蓋我之明德既明自然有以畏服民之心志故訟不待聽而自無也觀于此言可以知本末之先後矣大學子曰片言可以折獄者其由也與片言半言折斷也子路忠信明決故言出而人信服之不待其辭之畢也子路無宿諾宿留也急於踐言不留其諾也記者因夫子之言而記此以見子路之所以取信於人者由其養之有素也論語孟氏使陽膚為士師問於曽子曽子曰上失其道民散久矣如得其情則哀矜而勿喜陽膚曽子弟子民散謂情義乖離不相維繫謝氏曰民之散也以使之無道教之無素故其犯法也非迫於不得已則陷于不知也故得其情則哀矜而勿喜同上蔡聲子曰善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人若不幸而過寧僭無濫與其失善寧其利淫無善人則國從之詩曰人之云亡邦國殄瘁無善人之謂也詩大雅殄盡也瘁病也故夏書曰與其殺不辜寧失不經懼失善也不經不用常法商頌有之曰不僭不亂不敢怠遑命于下國封建厥福詩商頌言殷湯賞不僭差刑不溢濫不敢怠解自寬假故能為下國所命為天子此湯所以獲天福也古之治民者勸賞而畏刑樂行賞而憚用刑恤民不倦賞以春夏刑以秋冬順天時是以將賞為之加膳加膳則飫賜飫饜也酒食賜下無不饜足所謂加膳也此以知其勸賞也將刑為之不舉不舉則徹樂不舉盛饌此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也襄公二十六年左氏傳孟子謂齊宣王曰左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也此言非獨以此進退人才至于用刑亦以此道蓋所謂天命天討皆非人君所得私也並孟子刑人於市與衆棄之是故公家不畜刑人大夫弗養士遇之塗弗與言也屏之四方唯其所之不及以政示弗故生也屏猶放去也已施刑則放棄之役賦不與亦不授之以田困乏及無賙餼也虞書曰五流有宅五宅三居是也周則墨者使守門劓者使守關宫者使守內刖者使守囿髡者使守積王制眚災肆赦詳首章宥過無大詳前章凡作刑罰輕無赦法雖輕不赦之為人易犯凡執禁以齊衆不赦過亦為人將易犯王制司刺掌三刺三宥三赦之法以贊司冦聽獄訟刺殺也訊而有罪則殺之宥寬也赦舍也一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民訊言一宥曰不識再宥曰過失三宥曰遺忘鄭司農云不識謂愚民無所識則宥之過失若今律遇失殺人不坐死玄謂識審也不審若今仇讐當報甲見乙識以為甲面殺之者過失若舉刃欲砍伐而軼中人者遺忘若間帷薄忘有在焉而以兵矢投射之一赦曰幼弱再赦曰老旄三赦曰憃愚憃愚生而癡騃童昏者鄭司農云幼弱老旄若今律令年未滿八歲八十以上者非手殺人他皆不坐以此三法者求民情斷民中而施上服下服之罪然後刑殺上服殺與墨劓下服宮刖也司約職曰其不信者服墨刑凡行刑必先規識所刑之處乃後行之秋官八十九十曰耄耄惛忘也春秋傳曰謂老將知耄又及之七年曰悼悼憐愛也悼與耄雖有罪不加刑焉愛幼而尊老曲禮小司冦以八辟麗邦法附刑罰辟法也杜子春讀麗為羅玄謂麗附也易曰日月麗乎天故書附作付附猶著也一曰議親之辟鄭司農云若今時宗室有罪先請是也二曰議故之辟故謂舊知也三曰議賢之辟鄭司農云若今時廉吏有罪先請是也玄謂賢有德者四曰議能之辟能謂有道藝者春秋傳曰夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎五曰議功之辟謂有大勳勞立功者六曰議貴之辟鄭司農云若今時吏墨綬有罪先請是也七曰議勤之辟謂憔悴以事國八曰議賓之辟謂所不臣者三恪二代之後與凡命夫命婦不躬坐獄訟為治獄吏褻尊者也躬身也不身坐者必使其屬若子弟也喪服傳曰命夫者其男子之為大夫者命婦者其婦人之為大夫之妻者春秋傳曰衛侯與元咺訟寧武子為輔針莊子為坐士榮為大理凡王之同族有罪不即市鄭司農云刑諸甸師氏禮記曰刑于隱者不與國人慮兄弟秋官掌囚凡有爵者與王之同族奉而適甸師氏以待刑殺適甸師氏亦由朝乃往也待刑殺者掌戮將自市來也文王世子曰雖親不以犯有司正術也所以體異姓也刑于隱者不與國人慮兄弟也同上掌戮唯王之同族與有爵者殺之于甸師氏同上甸師王之同姓有罪則死刑焉鄭司農云王同姓有罪當刑者斷其獄於甸師之官也文王世子曰公族有死罪則磬於甸人又曰公族無官刑獄成致刑於甸人又曰公族無官刑不踐其類也刑于隱者不與國人慮兄弟天官司烜氏邦若屋誅則為明竁焉鄭司農云屋誅謂夷三族無親屬收葬者故為葬之也三夫為屋一家田為一夫以此知三家也玄謂屋讀如其刑剭之剭剭誅謂所殺不於市而以適甸師氏者也明竁若今揭頭明書其罪法也司烜掌明竁則罪人瘞葬與秋官公族其有死罪則磬於甸人其刑罪則纖剸亦告于甸人公族無宮刑獄成有司讞于公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟公曰宥之有司又曰在辟公又曰宥之有司又曰在辟及三宥不對走出致刑于甸人公又使人追之曰雖然必赦之有司對曰無及也反命于公公素服不舉為之變如其倫之喪無服親哭之詳見五宗篇刑不上大夫不與賢者犯法其犯法則在公議輕重不在刑書曲禮右赦宥八議雷雨作解君子以赦過宥罪易禹大謨康誥君陳呂刑論赦宥之法已見上章書曰哀敬折獄周書呂刑之文言當哀人之所犯而敬斷其獄仲弓問曰何謂也孔子曰古之聽訟者察貧哀窮孤獨及鰥寡老弱不肖而無告者雖得其情必哀矜之死者不可生斷者不可屬屬續也若老而刑之謂之悖弱而刑之謂之剋不赦過謂之逆臯陶云宥過無大刑故無小是則過雖大可宥焉此云不赦過為逆德是逆於道矣率過以小罪謂之枳枳猶傷也夫過則宜宥若率以為小罪亦傷乎義焉况為之大罪耶故宥過赦小罪老弱不受刑先王之道也書曰大辟疑赦又曰與其殺不辜寧失不經孔叢子公族之罪雖親不以犯有司正術也所以體百姓也刑于隱者不與國人慮兄弟也公族無宫刑不翦其類也詳見五宗篇冉有問於孔子曰先王制法使刑不上於大夫然則大夫犯罪不可以加刑乎孔子曰不然凡治君子以禮御其心所以厲之以亷恥之節也故古之大夫其有坐不亷汙穢而退放之者不謂之不亷汙穢而退放則曰簠簋不飭飭整齊也有坐淫亂男女無别者不謂之淫亂男女無别則曰帷薄不修也有坐罔上不忠者不謂之罔上不忠則曰臣節未著有坐罷軟不勝任者不謂之罷軟不勝任則曰下官不職言其下官不稱於其職不斥其身也有坐干國之紀者不謂之干國之紀則曰行事不請言不請而檀行此五者大夫既自定有罪名矣而猶不忍斥然正以呼之也既而為之諱所以愧恥之是故大夫之罪其在五刑之域者聞而譴發譴譴讓也發發始露則白冠釐纓盤水如劒造乎闕而自請罪君不使有司執縳牽制而加之也其有大罪者聞命則北面再拜跪而自裁君不使人捽引而刑殺之也曰子大夫自取之耳吾遇子有禮矣以刑不上大夫而大夫亦不失其罪者教使然也家語春王正月肆大眚肆失也眚災也易稱赦過宥罪書稱眚災肆赦經稱肆大眚皆放赦罪人蕩滌衆故有時而用之非經國之常制莊三十二年穀梁傳晉欒盈出奔楚宣子殺羊舌虎羊舌虎叔向弟囚叔向於是祁奚老矣老去公族大夫聞之乘馹而見宣子曰詩曰惠我無強子孫保之詩周頌也言文武有惠訓之德加於百姓故子孫保賴之書曰聖有謨勳明徴定保逸書謨謀也勳功也言聖哲有謀功者當明信定安之夫謀而鮮過惠訓不倦者叔向有焉謀鮮過有謨勳也惠訓不倦惠我無強也社稷之固也猶將十世宥之以勸能者今一不免其身一以弟故以棄社稷不亦惑乎鯀殛而禹與言不以父罪廢其子伊尹放大甲而相之卒無怨色大甲湯孫也荒淫失度伊尹放之桐官三年改悔而復之而無恨心言不以一怨妨大德管蔡為戮周公右王言兄弟罪不相及若之何其以虎也棄社稷宣子説與之乘以言諸公而免之共載入見公氏襄二十一年左傳仲春命有司省囹圄去桎梏毋肆掠止獄訟順陽寬也省減也囹圄所以禁守繫者若今别獄矣桎梏今械也在手曰梏在足曰桎肆謂死刑暴尸也周禮曰肆之三日掠謂捶治人孟夏斷薄刑決小罪祭統曰草艾則墨謂立秋後也刑無輕于墨者令以純陽之月斷刑決罪與毋有壞墮自相違似非出輕繫崇寬仲夏挺重囚益其食挺猶寬也百官靜事毋刑罪罰之事不可以聞令月令刑為徑以定晏隂之所成晏安也隂猶安孟秋命有司修法制繕囹圄具桎梏禁止姦愼罪邪務摶執順秋氣政尚嚴命理瞻傷察創視折理治獄官也有虞氏曰士夏曰大理周曰大司冦創之淺者曰傷審斷決獄訟必端平戮有罪嚴斷刑端猶正也仲秋命有司申嚴百刑斬殺必當毋或枉撓枉橈不當反受其殃申重也當謂值其罪季秋乃趣獄刑毋留有罪殺氣已至有罪者即決也孟冬是察阿黨則罪無有掩徹阿黨謂治獄吏以私恩曲橈相為也仲冬築囹圄順時氣也並月令草艾則墨草艾謂艾取草也秋草木成可芟艾給爨亨時則始行小刑也祭統右順時令司約掌邦國及萬民之約劑治神之約為上治民之約次之治地之約次之治功之約次之治器之約次之治摯之約次之此六約者諸侯以下至於民皆有焉劑謂券書也治者理其相抵冒上下之差也神約謂命祀郊社羣望及所祖宗也夔子不祀祀融楚人伐之民約謂征稅遷移仇讐既和若懷宗九姓在晉殷民六族七族在魯衛皆是也地約謂經界所至田萊之比也功約謂王功國功之屬賞爵所及也器約謂禮樂吉凶車服所得用也摯約謂玉帛禽鳥相與往來也凡大約劑書於宗彛小約劑書于丹圖大約劑邦國約也書于宗廟之六彛欲神監焉小約劑萬民約也丹圖未聞或有雕器簠簋之屬有圖象者與春秋傳曰斐豹隸也著於丹書今俗語有鐵券丹書豈此舊典之遺與若有訟者則珥而辟藏其不信者服墨刑鄭司農云謂有爭訟罪罰刑書謬誤不正者為之開藏取本刑書以正之當開時先祭之玄謂訟訟約若宋仲幾薛宰者也辟藏開府視約書不信不如約也珥讀曰衈謂殺雞取血爨其户若大亂則六官辟藏其不信者殺大亂謂僭約若吳楚之君僭稱王請隧以葬者六官辟藏明罪大也六官初受盟約之二秋官大史凡邦國都鄙及萬民之有約劑者藏焉以二六官六官之所登約劑要盟之載辭及劵書也二猶副也藏法與約劑之書以為六官之副其有後事六官又登焉若約劑亂則辟法其不信者刑之謂抵冒盟誓者辟法者考按讀其然否官春司盟凡民之有約劑者其二在司盟二之者檢其自相違約有獄訟者則使之盟詛不信則不敢聽此盟詛所以省獄訟秋官右約劑調人掌司萬民之難而諧和之難相與為仇讐諧猶調也凡和難父之讐辟諸海外兄弟之讐辟諸千里之外從父兄弟之讐不同國君之讐眂父師長之讐眂兄弟主友之讐眂從父兄弟和之使辟於此不得就而仇之主大夫君也弗辟則與之瑞節而以執之瑞節玊節之琰圭也和之而不肯辟者是不從王命也王以剡圭使調人執之治其罪凡殺人有反殺者使邦國交讐之反復也復殺之者此欲除害弱敵也邦國交讐之明不和諸侯得者即誅之凡殺人而義者不同國令勿讐讐之則死義宜也謂父母兄弟師長嘗辱焉而殺之者如是為得其宜雖所殺者人之父兄不得讎也使之不同國而已地官朝士凡報仇讐者書於士殺之無罪謂同國不相辟者將殺之必先言之於士秋官父之讎弗與共戴天父者子之天殺己之天與共戴天非孝子也行求殺之乃止兄弟之讐不反兵恆執殺之備交遊之仇不同國讐不吾辟則殺之交遊或為朋友曲禮右復讎子夏問於孔子曰居父母之仇如之何夫子曰寢苫枕干不仕雖除喪居處猶若喪也干盾也弗與共天下也不可以並生遇諸市朝不反兵而鬬言雖適市朝不釋兵曰請問居昆弟之仇如之何曰仕弗與共國銜君命而使雖遇之不鬬為負而廢君命曰請問居從父昆弟之仇如之何曰不為魁主人能則執兵而陪其後魁猶首也為其負當成之檀弓父不受誅不受誅罪不當誅也子復讎可也孝經曰資於事父以事君而敬同本取事父之敬以事君而父以無罪為君所殺諸侯之君與王者異於義得去君臣已絶故可也孝經云資於事父以事母莊公不得執讐文薑者母所生雖輕於父重於君也易曰天地之大德曰生故得絶不得殺父受誅子復讎推刃之道也子復非當讎復討其子一往一來曰推刃復讎不除害取讎身而已不得兼讎子復將恐害己而殺之朋友相衛而不相迿古之道也同門曰朋同志曰友相衛不使為讎所勝迿出表辭猶先也不當先相擊刺所以伸孝子之恩定四年公羊傳子得為父報讎者臣子於君父其義一也忠臣孝子所不能已以恩義不可奪也故曰父之讎不與共天下兄弟之讎不與共國朋友之讎不與同朝族人之讎不共鄰故春秋傳曰子不復讎非子父母以義見殺子不復讎者為往來不止也白虎通紀侯大去其國不言齊滅之為襄公諱也春秋為賢者諱何賢乎襄公復讎也何讎爾遠祖也哀公亨乎周亨煮而殺之紀侯譖之襄公將復讎乎紀卜之曰師喪分焉龜曰卜蓍曰筮分半也師喪亡其半寡人死之襄公答卜者之辭不為不吉也逺祖者幾世乎九世矣九世猶可以復讎乎雖百世可也百世大言之耳猶詩云嵩高維嶽峻極于天君子萬年家亦可乎家謂大夫曰不可國何以可據家不可國君一體也先君之恥猶今君之恥也今君之恥猶先君之恥也先君謂哀公今君謂襄公言其恥同也今紀無罪今紀侯也此非怒與怒遷怒齊人語也此非怒其先祖遷之于子孫與曰非也古者有明天子則紀侯必誅必無紀者紀侯之不誅至今有紀者猶無明天子也古者諸侯必有會聚之事相朝聘之道號辭必稱先君以相接然則齊紀無説焉不可以並立乎天下無號無説懌也故將去紀侯者不得不去紀也有明天子則襄公得為若行乎若如也猶曰得為如此行乎曰不得也不得則襄公曷為為之上無天子下無方伯有而無益曰無猶易曰閴其無人緣恩疾者可也疾痛也羊莊四年公傳禮書綱目卷七十二
