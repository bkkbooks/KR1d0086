body:
  text: 禮書綱目卷首上婺源江永撰朱子乞修三禮劄子臣聞之六經之道同歸而禮樂之用為急遭秦滅學禮樂先壞漢晉以來諸儒補緝竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義疏耳前此猶有三禮通禮學究諸科禮雖不行而士猶得以誦習而知其説熙寧以來王安石變亂舊制廢罷儀禮而獨存禮記之科棄經任傳遺本宗末其失已甚而博士諸生又不過誦其虚文以供應舉至于其間亦有因儀法度數之寔而立文者則咸幽㝠而莫知其源一有大議率用耳學臆斷而已若乃樂之為教則又絶無師授律尺短長聲音清濁學士大夫莫有知其説者而不知其為闕也故臣頃在山林嘗與一二學者攷訂其説欲以儀禮為經而取禮記及諸經史雜書所載有及於禮者皆以附於本經之下具列註疏諸儒之説略有端緒而私家無書檢閲無人抄寫久之未成㑹䝉除用學徒分散遂不能就而鐘律之制則士友間亦有得其遺意者竊欲更加叅考别為一書以補六藝之闕而亦未能具也欲望聖明特詔有司許臣就秘書省關借禮樂諸書自行招致舊日學徒十餘人踏逐空閑官屋數間與之居處令其編類雖有官人亦不繫銜請俸但乞逐月量支錢米以給飲食紙札油燭之費其抄寫人即乞下臨安府差撥貼書二十餘名候結局日量支犒設别無推恩則于公家無甚費用而可以興起廢墜垂之永久使士知寔學異時可為聖朝制作之助則斯文幸甚取進止按光宗熙寧五年朱子為侍講草此奏未幾去國不果上寧宗慶元二年始修禮書又越五年而朱子卒朱子考定漢書藝文志見儀禮經傳目錄漢書藝文志禮古經五十六卷經十七篇后氏戴氏此朱子曰按即今儀禮也十七本作七十臨江劉敞云當作十七計其篇數則然今從之永嘉張淳曰漢初未有儀禮之名疑後漢學者見十七篇中有儀有禮遂合而召之也記百三十一篇七十子後學者所記也明堂隂陽三十三篇古明堂之遺事王史氏二十一篇七十子後學者曲臺后倉九篇如淳曰行禮射于曲臺后倉為記故名曰曲臺記明堂隂陽説五篇周官六篇傳四篇王莽時劉㪚置博士師古曰即今周官禮也亡其冬官以考工記充之傳即周官傳劉歆曰易曰有夫婦父子君臣上下然後禮義有所錯而帝王質文世有損益至周曲為之防事為之制故曰禮經三百威儀三千朱子曰按禮經威儀禮器作經禮曲禮而中庸以禮經為禮儀鄭𤣥等皆曰經禮即周禮三百六十官曲禮即今儀禮冠婚吉凶其中事儀三千以其有委曲威儀故有二名按臣瓉曰周禮三百特官名耳經禮謂冠婚吉凶蓋以儀禮為經禮也而近世括蒼葉夢得曰禮經制之凡也曲禮文之目也先王之世二者蓋皆有書藏于有司祭祀朝覲㑹同則大史執之以蒞事小史讀之以喻衆而卿大夫受之以教萬民保氏掌之以教國子者亦此書也愚意禮篇三説禮器為勝諸儒之説瓉葉為長蓋周禮乃制治立法設官分職之書于天下事無不該攝禮典固在其中而非專為禮設也故此志列其經傳之目但曰周官而不曰周禮自不應指其官目以當禮篇之目又況其中或以一官兼掌衆禮或以數官通行一事亦難計其官數以充禮篇之數至于儀禮則其中冠婚喪祭燕射朝聘自為經禮大目亦不容專以曲禮名之也但曲禮之篇末見于今何書為近而三百三千之數又将何以充之耶又嘗考之經禮固今之儀禮其存者十七篇而其逸見于他書者猶有投壺奔喪遷廟釁廟中霤等篇其不可見者又有古經增多三十九篇而明堂隂陽王史氏記數十篇及河間獻王所輯禮樂古事多至五百餘篇倘或猶有逸在其間者大率且以春官所領五禮之目約之則其初固當有三百餘篇亡疑矣所謂曲禮則皆禮之徴文小節如今曲禮少儀内則玉藻弟子職篇所記事親事長起居飲食容貎辭氣之法制器偹物宗廟宮室衣冠車旗之等凡所以行乎經禮之中者其篇之全數雖不可知然條而析之亦應不下三千有餘矣若或者專以經禮為常禮曲禮為變禮則如冠禮之不醴而醮用酒殺牲而有折爼若孤子冠母不在之類皆禮之變而未嘗不在經禮篇中坐如尸立如齋毋放飯毋流歠之類雖在曲禮之中而不得謂之變禮其説誤也及周之衰諸侯將踰法度惡其害已皆滅去其籍自孔子時而不具至秦大壞漢興魯髙堂生傳士禮十七篇訖孝宣世后倉最明戴德戴聖慶普皆其弟子三家立于學官朱子曰此節即上文誤作七十篇者禮古經者出于魯淹中及孔氏蘇林曰淹中里名也得朱子曰按及孔氏舊註屬下句劉敞云孔氏安國所壁中書也當屬上句今按此即上文五十六巻者其讀當從劉氏與十七篇文相似多三十九篇朱子曰按與本作學十七本作七十劉敞云學當作與七十當作十七五十六巻除十七正多三十九其説是也蓋上文經七十篇本註后氏戴氏又言髙堂生傳士禮十七篇后倉二戴皆其弟子則彼所謂后戴之禮即是傳此髙堂生之所得而今號儀禮者也況劉氏所考于所増多篇數適合而上文經目又别無髙堂生十七篇之禮其證甚明賈公彦䟽亦云古文十七篇與髙堂生所傳相似是唐初時漢志猶未誤也故知此誤錯三字皆當從劉氏説及明堂隂陽王史氏記所見多天子諸侯卿大夫之制雖不能偹猶瘉倉等推士禮而致於天子之説師古曰瘉與愈同愈勝也相朱子曰按諸記自一百三十一篇以下與經文本不雜疑今亦多見于本篇後記及二戴之記孔子家語等書特不可考其所自耳又張淳云如歆所言則髙堂生所得獨為士禮而今儀禮乃有天子諸侯大夫之禮居其大半疑今儀禮非髙堂生之書但數篇偶同耳此則不深考于劉説所訂之誤人不察其所謂士禮者特畧舉首篇以明之其曰推而致于天子者蓋耑指冠婚喪祭而言若燕射朝聘則士豈有是禮而可推耶孔頴達禮記正義序略夫禮者經天地理人倫本其所起在天地未分之前禮者理也其用以治則與天地俱興但於時質畧物生則自然而有尊卑若羊羔跪乳鴻雁飛有行列豈由教之者哉是三才既判尊卑自然而有但天地初分之後即應有君臣治國但年代緜逺無文以言案譙周古史考云伏羲制嫁娶以儷皮為禮則嫁娶嘉禮始于伏羲也案帝王世紀云神農始教天下種穀故號曰神農案禮運云夫禮之初始諸飲食燔黍捭豚蕢桴土鼓又明堂位云土鼓葦籥伊祁氏之樂又郊特牲云伊耆氏始為蜡蜡即田祭與種穀相協土鼓葦籥又與蕢桴土鼓相當故熊氏云伊耆氏即神農也既云始諸欽食致敬鬼神則祭祀吉禮起于神農也又史記云黄帝與蚩尤戰於涿鹿則有軍禮也易繫辭黄帝九事章云古者葬諸中野則有凶禮也又論語撰考云軒知地利九牧倡教既有九州之牧當有朝聘是賔禮也若然自伏羲以後至黄帝吉凶賔軍嘉五禮始具其唐堯則舜典云修五禮其文亦見經類于上帝則吉禮也百姓如喪考妣則凶禮也羣后四朝則賔禮也舜征有苖則軍禮也嬪於虞則嘉禮也虞夏商周各有當代之禮夏商亦有五禮但書篇散亡故據周禮有文者而言明堂位云周公攝政六年制禮作樂所制之禮則周官儀禮也儀禮今行於世者唯十七篇而已故漢書藝文志云漢初髙堂生傳禮十七篇是也至武帝時河間獻王得古禮五十六篇獻之又鄭康成六藝論云後得孔子壁中古文禮凡五十六篇其十七篇與髙堂生所傳同而字多異其十七篇外則逸禮是也其周禮漢書説河間獻王開獻書之路得周官有五篇失其冬官一篇乃購千金不得取考工記以補其闕禮記出自孔氏但正禮殘缺無復能明至孔子没後七十二之徒共撰所聞以為此記或錄舊禮之義或錄變禮所由或兼記體履或雜序得失中庸是子思伋所作緇衣公孫尼子所撰鄭康成云月令呂不韋所修盧植云王制漢文時博士所錄其餘衆篇未能盡知所記之人也賈公彦儀禮篇次說戴德戴聖與劉向别錄十七篇次第皆冠禮第一婚禮第二士相見第三自兹以下則異劉向别錄即此十七篇之次是也按十七篇之次士冠士婚士相見鄉飲鄉射燕禮大射聘禮公食覲禮喪服士喪既夕士虞特牲少牢有司徹皆尊卑吉凶次第倫叙故鄭用之至大戴即以士喪第四既夕第五士虞第六特牲第七少牢第八有司第九鄉欵第十鄉射第十一燕禮第十二大射第十三聘禮第十四公食第十五覲禮第十六喪服第十七小戴於鄉飲鄉射燕大射四篇亦依别錄次第而以士虞第八喪服第九特牲第十少牢第十一有司第十二士喪第十三既夕第十四聘禮第十五公食第十六覲禮第十七皆尊卑吉凶雜亂故鄭皆不從之儀禮見行事之法賤者為先故以士冠為先無大夫冠禮諸侯冠禮次之天子冠又次之婚禮亦士為先大夫次之諸侯次之天子為後諸侯鄉飲酒為先天子鄉飲酒次之鄉射燕禮以下皆然又以冠婚士相見為先後者以二十而冠三十而娶四十强而仕即有贄見鄉大夫見己君之等又為鄉大夫州長行鄉飲鄉射之事已下先吉後凶凶盡則行祭祀吉禮次序之法其義可知賈公彦序周禮廢興錄略周公制禮之日禮教興行後至幽王禮儀紛亂至于孔子更脩而定之時已不具孔子卒後復更散亂故藝文志云禮經三百威儀三千及周之衰諸侯將踰法度惡其害已滅去其籍自孔子時而不具至秦大壞漢興至髙堂生博士傳十七篇孝宣世后倉最明禮戴德戴聖慶普皆其弟子三家立于學官案儒林傳漢興髙堂生傳禮十七篇而魯徐生善為容孝文時徐生以容為禮官大夫而瑕丘蕭奮以禮至淮陽太守孟卿東海人也事蕭奮以授后倉后倉説禮數萬言號曰后氏曲臺記授戴德戴聖鄭云五傳弟子則髙堂生蕭奮孟卿后倉戴德戴聖是為五也此所傳者謂十七篇即儀禮也周官孝武時始出秘而不傳周禮後出者以其始皇特惡之故也是以馬融傳云秦用商君之法其政酷烈與周官相反故始皇禁挾書搜求焚燒之獨悉是以隠藏百年孝武時始除挾書之律開獻書之路既出于山巖屋壁復入于秘府五家之儒莫得見焉至孝成皇帝達才通人劉向子歆校理秘書始得列序著于錄略然亡其冬官一篇以考工記足之時衆儒並出共排以為非是唯歆獨識其年尚幼末年乃知其周公致太平之迹迹具在斯遭天下兵革並起弟子死喪有里人河南緱氏杜子春年且九十能通其讀鄭衆賈逵往受業焉衆逵以經書記轉相證明為解多所遺闕融年六十有六念前業未畢者唯周官自力補之鄭𤣥序云大中大夫鄭少贛名興及子大司農仲師名衆故議郎衛次仲侍中賈君景伯南郡太守馬季長皆作周禮解詁竊觀二三君子之文章其所變易灼然如晦之見明其所彌縫奄然如合符復析然猶有參錯同事相違則就其原文字之聲類考訓詁捃祕逸二鄭同宗之大儒明理于典籍存古字發疑正讀亦信多善今讃而辨之庶成此家世所訓也然則周禮起于成帝劉歆而成於鄭𤣥附離之者大半故林孝存以為武帝知周官末世凟亂不驗之書作十論七難以排棄之何休亦以為六國隂謀之書唯有鄭𤣥徧覧羣書知周禮乃周公致太平之迹故能答林碩之論難使周禮義得條通是以周禮大行陳祥道禮書序略先王之治以禮為本其宮室衣服車旗械用有等其冠婚喪祭朝聘射御有儀即器以觀禮無非法象之所寓即文以觀義無非道義之所藏使人思之而知所以教守之而知所以禁奢者不得逞無度之心儉者不得就苟難之節奇者不得以亂常衺者不得以害正此上下所以辨而民志所以定也晚周而下道散於異政之國法亡於殊俗之家君子不得以行禮小人得以行非禮故兩觀大輅朱干玉磬天子之禮在諸侯塞門反坫素衣朱襮諸侯之禮在大夫由是先王之制浸以埽地天下學者亦失其傳故隨武子不知殽烝孟僖子不知相禮范獻子不知問諱曽子不知奠方魯不知尚羔衛不知立市則時之知禮者蓋亦鮮矣漢興叔孫通制禮儀徒規當時之近功而其法失于太卑齊魯二生之論禮樂必期百年然後興其言失于太髙賈誼有修禮之志而困於絳灌曹褒有定禮之議而沮於酺畋傅咸極論於晉而誚於流俗劉蕡發䇿於唐而棄于一時由漢以來千有餘載其間欲起禮法於上者非一君欲成禮法於下者非一臣有是君而下之人不足以副之則禮之道終不明有是臣而上之人不能任之則禮之事終不行此龎政薄俗所以繼作而唐虞三代之治不復見也楊復序喪祭禮通解昔文公朱先生既修家鄉邦國王朝禮以喪祭二禮屬勉齋先生編之迨文公屬纊之前所與手書尤拳拳以修正禮書為言先生服膺遺訓不敢少忘然其書久未脱藁嘉定己夘先生歸自建鄴奉祠家居先取向來喪禮稿本精專修改至庚辰之夏而書成凡十有五卷復嘗伏而讀之大哉書乎秦漢而下未嘗有也復何足以闚其閫奥然竊聞其略曰禮時為大要當以儀禮為本今儀禮唯有喪服士喪士虞僅存而王侯大夫之禮皆缺近世以來儒生誦習知有禮記而不知有儀禮士大夫好古者知有唐開元以後之禮而不知有儀禮昔之僅存者皆廢矣今因其篇目之僅存者為之分章句附傳記使條理明白而易攷後之言禮者有所依據不至於棄經而任傳遺本而宗末故總包尊卑上下之服則有喪服明士禮之節文次序則有士喪禮上士喪禮下士虞禮凡上下通用之禮有與士喪禮士虞禮相闗者亦附于此王侯大夫之禮闗于綱常者為尤重儀禮既缺其書後世以來處此大變者咸幽㝠而莫知其原取具臨時沿襲鄙陋不經特甚可為慨嘆余因小戴喪大記一篇合周禮禮記諸書以補其缺而王侯大夫之禮于是粲然可考故有喪大記上喪大記下本經士喪士虞補經喪大記皆至虞禮而止而王侯大夫士卒哭附練祥禫之禮又無所稽決故有卒哭附練祥禫記本經喪服之外凡服之散見于傳記註疏者莫得而推尋故有補服哀殺有漸則變除有節其文錯出于經傳者不可不表而出之故有喪服變除喪服當辨其名物衰與其不當物也寧無衰故有喪服制度聖人制服之意文理密察不可以不明故有喪服義喪禮之外三年通行之禮其目不一有喪通禮變禮非常情文尤密故有喪變禮賔吊主人之禮不可以無所考故有弔禮禮之數可陳也其義難知也故有喪禮義于是喪禮之本末經緯莫不悉偹既而又念禮條目散闊欲撰儀禮喪服圖式一卷以提其要而附古今沿革於其後草具甫就而先生没矣嗚呼此千古之遺憾也先生所修祭禮本經則特牲少牢有司徹大戴禮則遷廟釁廟已上四巻未分章句入注疏所補者則自天神地祗百神宗廟以至因事而祭者如建國遷都廵狩師田行役祈禳及祭服祭器事序始終其綱目尤為詳偹先生嘗為復言祭禮用力甚久規模已定每取其書翻閲而推明之間一二條方欲加意修定而未遂也嗚呼禮莫重於喪祭文公以二書屬之先生其責任至不輕也先生於二書也推明文王周公之典辨正諸儒異同之論掊擊後世蠧壞人心之邪説以示天下後世其正人心扶世教其功至逺也而喪服圖式祭禮遺稿尚有未及訂定之遺憾後之君子有能繼先生之志者出而成之是先生之所望也抑復又聞之先生曰始余創二禮粗就奉而質之先師先師喜謂余曰君所立喪祭禮規模甚善他日取吾所編家鄉邦國王朝禮其悉用此規模更定之嗚呼又文公拳拳之意先生欲任斯責而卒不果也豈不痛哉同門之士以復預聞次輯之略不可以無言也復因敬識其始末如此以告來者喪禮十五卷前已繕寫喪服圖式今别為一卷附于正卷帖之外以俟君子亦先生平日之志云嘉定辛巳七月日門人三山楊復謹序張虙刋喪祭二禮序南康舊刋朱文公儀禮經傳與集傳集註而喪禮祭禮俄空焉蓋以屬門人勉齋黄幹俾之類次而未成也虙來南康聞勉齋已下世深恨文公之志不終士友間有言勉齋固嘗脱藁今在南劍陳史君處欲全此書索之南劍可也南劍知之果以其書來且併遣刻者數軰至于是鋟木更一年而後畢是雖喪祭二門而卷帙多前書三之一以是刋造之日長㸃勘之功鄉貢進士楊用為多又助以王鎮圭童居欽黄嵩三君披閲精彊錯簡脱字往往無之虙生不為晚而不能一識文公文公不可得而見得見勉齋者斯可矣又復失之分符星渚乃文公遺愛之地髙山仰止惓惓興懷兹又得全其所欲述之書以畢其平日傳愛之志豈非幸歟苐閑習禮度不如式瞻儀刑諷咏遺言不如親承音旨誠有如古人之論撫卷為之三歎也嘉定癸未孟秋上澣四明張虙識禮書綱目卷首上
