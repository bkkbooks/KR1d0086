body:
  text: 禮書綱目卷六十四婺源江永撰井田通禮十三補昔黄帝始經土設井以塞爭端立步制𤱔以防不足使八家為井井開四道而分八宅鑿井於中一則不洩地氣二則無費一家三則同風俗四則齊巧拙五則通財貨六則存亡更守七則出入相司八則嫁娶相媒九則無有相貸十則疾病相救是以性情可得而親生産可得而均均則欺陵之路塞親則鬭訟之心弭既牧之於邑故井一為鄰鄰三為朋朋三為里里五為邑邑十為都都十為師師七為州夫始分於井則地著計之於州則數詳及乎夏殷不易其制杜氏通典禹曰予决九川距四海濬畎澮距川九川九州之川也距至濬深也周禮一𤱔之間廣尺深尺曰畎一同之間廣二尋深二仞曰澮畎澮之間有遂有溝有洫皆通田間水道以小注大言畎澮而不及遂溝洫者舉大小以包其餘也先決九川之水使各通於海次濬畎澮之水使各通於川也益稷周文王在岐用平土之法以為治人之道地著為本地著謂安土也故建司馬法六尺為步步百為𤱔𤱔百為夫夫三為屋屋三為井井十為通通十為成成十為終終十為同同方百里同十為封封十為畿畿方千里通典小司徒乃經土地而牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡税斂之事此謂造都鄙也采地制井田異於鄉遂重立國小司徒為經之立其五溝五塗之界其制似井之字因取名焉孟子曰夫仁政必自經界始經界不正井地不均榖禄不平是故暴君姦吏必慢其經界經界既正分田制禄可坐而定也鄭司農云井牧者春秋傳所謂井衍沃牧隰臯者也𤣥謂隰臯之地九夫為牧二牧而當一井今造都鄙授民田有不易有一易有再易通率二而當一是之謂井牧昔夏少康在虞思有田一成有衆一旅一旅之衆而田一成則井牧之法先古然矣九夫為井者方一里九夫所治之田也此制小司徒經之匠人為之溝洫相包乃成耳邑丘之屬相連比以出田税溝洫為除水害四井為邑方二里四邑為丘方四里四丘為甸甸之言乗地讀如𠂻甸之甸甸方八里旁加八里則方十里為一成積百井九百夫其中六十四井五百七十六夫出田税三十六井三百二十四夫治洫四甸為縣方二十里四縣為都方四十里四都方八十里旁加二十里乃得方百里為一同地積萬井九萬夫其四千九十六井三萬六千八百六十四夫出田税二千三百四井二萬七百三十六夫治洫三千六百井三萬二千四百夫治澮井田之法備於一同今止於都者采地食者皆四之一其制三等百里之國凡四都一都之田税入於王五十里之國凡四縣一縣之田税入於王二十五里之國凡四甸一甸之田税入於王地事謂農牧衡虞也貢謂九榖山澤之材也賦謂出車徒給徭役也司馬法曰六尺為步步百為畮畮百為夫夫三為屋屋三為井井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乗士十人徒二十人十成為終終千井三千家革車十乗士百人徒二百人十終為同同方百里萬井三萬家革車百乗士千人徒二千人地官遂人凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達於畿十夫二鄰之田百夫一鄼之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水於川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仞徑畛涂道路皆所以通車徒於國都也徑容牛馬畛容大車涂容乗車一軌道容二軌路容三軌都之野涂與環涂同可也萬夫者方三十三里少半里九而方一同以南畆圖之則遂從溝横洫從澮横九澮而川周其外焉去山陵林麓川澤溝瀆城郭宫室涂巷三分之制其餘如此以至於畿則中雖有都鄙遂人盡主其地同上匠人為溝洫主通利田間之水道耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂古者耜一金兩人併發之其壟中曰􅍒􅍒上曰伐伐之言發也􅍒畎也今之耜岐頭兩金象古之耦也田一夫之所佃百畆方百步地遂者夫間小溝遂上亦有徑九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二㝷深二仞謂之澮此畿内采地之制九夫為井井者方一里九夫所治之田也采地制井田異於鄉遂及公邑三夫為屋屋具也一井之中三屋九夫三三相具以出賦税共治溝也方十里為成成中容一甸甸方八里出田税縁邉一里治洫方百里為同同中容四都六十四成方八十里出田税縁邉十里治澮采地者在三百里四百里五百里之中載師職曰園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二謂田税也皆就夫税之輕近重逺耳滕文公問為國於孟子孟子曰夏后氏五十而貢殷人七十而助周人百畆而徹其實皆什一也徹者徹也助者藉也龍子曰治地莫善於助莫不善於貢貢者校數嵗之中以為常文公又問井田孟子曰請野九一而助國中什一使自賦卿以下必有圭田圭田五十畆餘夫二十五畆死徙無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦方里而井井九百畆其中為公田八家皆私百畆同養公田公事畢然後敢治私事所以别野人也又曰詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也魯哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也春秋宣公十五年秋初税畆傳曰非禮也榖出不過藉以豐財也此數者世人謂之錯而疑焉以載師職及司馬法論之周制畿内用夏之貢法税夫無公田以詩春秋論語孟子論之周制邦國用殷之助法制公田不税夫貢者自治其所受田貢其税榖助者借民之力以治公田又使収斂焉畿内用貢法者鄉遂及公邑之吏旦夕從民事為其促之以公使不得恤其私邦國用助法者諸侯専一國之政為其貪暴税民無蓺周之畿内税有輕重諸侯謂之徹者通其率以什一為正孟子云野九夫而税一國中什一是邦國亦異外内之法耳圭之言珪潔也周謂之士田鄭司農説以春秋傳曰有田一成又曰列國一同専達於川各載其名達猶至也謂澮直至于川復無所注入載其名者識水所從出凡天下之地埶兩山之間必有川焉大川之上必有涂焉通其壅塞凡溝逆地阞謂之不行水屬不理孫謂之不行溝謂造溝阞謂脉理屬讀為注孫順也不行謂决溢也禹鑿龍門播九河為此逆阞與不理孫也稍溝三十里而廣倍謂不懇地之溝也鄭司農云稍讀為桑螵蛸之蛸蛸謂水潄齧之溝故三十里而廣倍凡行奠水磬折以參伍坎為弓輪水行欲紆曲也鄭司農云奠讀為停謂行停水溝形當為磬直行三折行五以引水者疾焉欲為淵則句於矩大曲則流轉流轉則其下成淵凡溝必因水埶防必因地埶善溝者水潄之善防者水淫之潄猶齧也鄭司農云淫讀為廞謂水淤泥土留著助之為厚𤣥謂淫讀為淫液之滛凡為防廣與崇方其閷參分去一崇髙也方猶等也閷者薄其上大防外閷又薄其上厚其下凡溝防必一日先深之以為式程人功也溝防為冓為防也里為式然後可以傅衆力里讀為己聲之誤也凡任索約大汲其版謂之無任故書汲作沒杜子春云當為汲𤣥謂約縮也汲引也築防若墻者以䋲縮其版大引之言板橈也板橈築之則鼔土不堅矣詩云其繩則直縮版以載又曰約之格格椓之槖槖考工記稍人掌令丘乗之政令丘乗四丘為甸甸讀如維禹敶之之敶同其訓曰乗由是改云是掌令都鄙修治井邑丘甸縣都之溝涂云丘甸者舉中言之溝涂之人名井别邑異則民之家數存焉地官方一里者為田九百畆一里方三百步方十里者為方一里者百為田九萬畆方百里者為方十里者百為田九十億畆億今十萬方千里者為方百里者百為田九萬億畆萬億今萬萬也凡四海之内斷長補短方三千里為田八十萬億一萬億畆九州之大計方百里者為田九十億畆山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畆以一大國為率其餘所以授民也山足曰麓古者以周尺八尺為步今以周尺六尺四寸為步古者百畆當今東田百四十六畆三十步古者百里當今百二十一里六十步四尺二寸二分周尺之數未詳聞也案禮制周以十寸為尺盖六國時多變亂法度或言周尺八寸則步更為八八六十四寸以此計之古者百畆當今百五十六畆二十五步古者百里當今百二十五里王制右經界禹卑宫室而盡力乎溝洫溝洫田間水道以正疆界備旱潦者也論語少康逃奔有虞而邑諸綸綸虞邑有田一成有衆一旅方十里為成五百人為旅哀元年左氏傳畇畇原隰曽孫田之我疆我理南東其畆畇畇懇闢貌疆者為之大界也理者定其溝塗也畆壟也長樂劉氏曰其遂東入于溝則其畆南矣其遂南入于溝則其畆東矣小雅信南山晉人欲使齊之封内盡東其畆使壟畆東西行對曰先王疆理天下物土之宜而布其利疆界也理正也物土之宜播殖之物各從土宜故詩曰我疆我理南東其畆詩小雅或南或東從其土宜今吾子疆理諸侯而曰盡東其畆而已唯吾子戎車是利晉之伐齊循壟東行易無顧土宜其無乃非先王之命也乎成公二年左氏傳楚蒍掩書土田書土地之所宜度山林度量山林之材以共國用鳩藪澤鳩聚也聚成藪澤使民不得焚燎之欲以備田獵之處辨京陵辨别也絶髙曰京大阜曰陵别之以為冢墓之地表淳鹵淳鹵埆薄之地表異輕其賦税數疆潦疆界有流潦者計數减其租入規偃豬偃豬下濕之地規度其受水多少町原防廣平曰原防隄也隄防間地不得方正如井田别為小頃町牧隰皐隰皐水涯下濕為芻牧之地井衍沃衍沃平美之地則如周禮制以為井田六尺為步步百為畆畆百為夫九夫為井襄二十五年左氏傳鄭子駟為田洫司氏堵氏侯氏子師氏皆喪田焉洫田畔也子駟為田洫以正封疆而侵四族田襄十年左氏傳子産為政田有封洫封疆也洫溝也廬井有伍廬舍也九夫為井使五家相保襄三十年左氏傳滕文公使畢戰問井地孟子曰夫仁政必自經界始經界不正井地不均榖禄不平是故暴君汙吏必慢其經界經界既正分田制禄可坐而定也井地即井田也經界謂治地分田經畫其溝塗封植之界也此法不修則田無定分而豪彊得以兼并故井地有不均賦無定法而貪暴得以多取故穀禄有不平此欲行仁政者之所以必從此始而暴君汙吏則必欲慢而廢之也有以正之則分田制禄可不勞而定矣請野九一而助國中什一使自賦此分田制禄之常法所以治野人使養君子也野郊外都鄙之地也九一而助為公田而行助法也國中郊門之内鄉遂之地也田不井授但為溝洫使什而自賦其一盖用貢法也周所謂徹法者盖如此以此推之當時非惟助法不行其貢亦不止什一矣卿以下必有圭田圭田五十畆此世禄常制之外又有圭田所以厚君子也圭潔也所以奉祭祀也不言世禄者滕已行之但此未備耳餘夫二十五畆程子曰一夫上父母下妻子以五口八口為率受田百畆如有弟是餘夫也年十六别受田二十五畆俟其壮而有室然後更受百畆之田愚按此百畆常制之外又有餘夫之田以厚野人也死徙無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦死謂𦵏也徙謂徙其居也同井者八家也友猶伴也守望防冦盜也方里而井井九百畆其中為公田八家皆私百畆同養公田公事畢然後敢治私事所以别野人也此詳言井田形體之制乃周之助法也公田以為君子之禄而私田野人之所受先公後私所以别君子野人之分也不言君子據野人而言省文耳上言野及國中二法此獨詳於治野者國中貢法當世已行但取之過於什一耳孟子秦孝公用商鞅廢井田開阡陌漢志夏后氏五十而貢殷人七十而助周人百畆而徹孟子大司徒凡造都鄙制其地域而封溝之以其室數制之不易之地家百畮一易之地家二百畮再易之地家三百畮都鄙王子弟公卿大夫采地其界曰都鄙所居也王制曰天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三此盖夏時采地之數周未聞矣春秋傳曰遷鄭焉而鄙留城郭之宅曰室詩云嗟我婦子曰為改嵗入此室處以其室數制之謂制五甸之屬王制曰凡居民量地以制邑度地以居民地邑民居必参相得鄭司農云不易之地嵗種之地羙故家百畮一易之地休一嵗乃復種地薄故家二百畮再易之地休二嵗乃復種故家三百畮乃分地職奠地守制地貢而頒職事焉以為地法而待政令分地職分其九職所宜也定地守謂衡麓虞候之属制地貢謂九職所税也頒職事者分命使各為其所職之事地官小司徒上地家七人中地家六人下地家五人一家男女七人已上則授之以上地所養者衆也男女五人已下則授之以下地所養者寡也詳見軍禮田役篇遂人掌邦之野郊外曰野此野為甸稍縣官以土地之圖經田野以嵗時稽其人民而授之田野辨其野之土上地中地下地以頒田里上地夫一廛田百畮萊五十畮餘夫亦如之中地夫一廛田百畮萊百畮餘夫亦如之下地夫一廛田百畮萊二百畮餘夫亦如之萊謂休不耕者鄭司農云户計一夫一婦而賦之田其一户有數口者餘夫亦受此田也廛居也揚子雲有田一廛謂百畮之居也𤣥謂廛城邑之居孟子所云五畮之宅樹之以桑者也六遂之民竒受一廛雖上地皆有萊皆所以饒逺也王莽時城郭中宅不樹者為不毛出三夫之布地官大司馬上地食者參之二中地食者半下地食者參之一鄭司農云上地謂肥羙田也食者參之二假令一家有三頃嵗種二頃休其一頃下地食者參之一田薄惡者所休多兵詳見軍禮制制農田百畆百畆之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人農夫皆受田於公田肥磽有五等収入不同也王制耕者之所獲一夫百畆百畆之糞上農夫食九人上次食八人中食七人中次食六人下食五人獲得也一夫一婦佃田百畆加之以糞糞多而力勤者為上農其所収可供九人其次用力不齊故有此五等孟子民受田上田夫百畮中田夫二百畮下田夫三百畮嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田三嵗更耕之自爰其處孟康曰爰於也更互也農民户人已受田其家衆男為餘夫亦以口受田如比師古曰比例也士農商家受田五口乃當農夫一人此謂平土可以為法者也若山林藪澤原陵淳鹵之地晉灼曰淳盡也舄鹵之田不生五穀也各以肥磽多少為差民年二十受田六十歸田七十以上上所養也十嵗以下上所長也十一以上上所强也師古曰勉强勸之令習事也前漢食貨志載師以廛里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任畺地鄭司農云廛市中空地未有肆城中空地未有宅者民宅曰宅宅田者以備益多也士田者士大夫之子得而畊之田也賈田者吏為縣官賣財與之田官田者公家之所耕田牛田者以養公家之牛賞田者賞賜之田牧田者牧六畜之田司馬法曰王國百里為郊二百里為州三百里為野四百里為縣五百里為都杜子春云五十里為近郊百里為逺郊𤣥謂廛里者若今云邑里居矣廛民居之區域也里居也圃樹果蓏之屬季秋於中為場樊圃謂之園宅田致仕者之家所受田也士相見禮曰宅者在邦則曰市井之臣在野則曰草茅之臣士讀為仕仕者亦受田所謂圭田也孟子曰自卿以下必有圭田圭田五十畮賈田在市賈人其家所受田也官田庶人在官者其家所受田也牛田牧田畜牧者之家所受田也公邑謂六遂餘地天子使大夫治之自此以外皆然二百里三百里其上大夫如州長四百里五百里其下大夫如縣正是以或謂二百里為州四百里為縣云遂人亦監焉家邑大夫之采地小都卿之采地大都公之采地王子弟所食邑也畺五百里王畿界也皆言任者地之形實不方平如圖受田邑者逺近不得盡如制其所生育賦貢取正於是爾以廛里任國中而遂人職授民田夫一廛田百畮是廛里不謂民之邑居在都城者與凡王畿内方千里積百同九百萬夫之地也有山陵林麓川澤溝瀆城郭宫室涂巷三分去一餘六百萬夫又以不易一易再易上中下相通定受田者三百萬之家也逺郊之内地居四同三十六萬夫之地也三分去一其餘二十四萬夫六鄉之民七萬五千家通不易一易再易一家受二夫則十五萬夫之地其餘九萬夫廛里也場圃也宅田也士田也賈田也官田也牛田也賞田也牧田也九者亦通受一夫焉則半農人也定受田十二萬家也食貨志云農民户一人己受田其家衆男為餘夫亦以口受田如比士工商家受田五口乃當農夫一人今餘夫在遂地之中如此則士工商以事入在官而餘夫以力出耕公邑甸稍縣都合居九十六同八百六十四萬夫之地城郭宫室差少涂巷又狹於三分所去六而存一焉以十八分之十三率之則其餘六百二十四萬夫之地通上中下六家而受十三夫定受田二百八十八萬家也其在甸七萬五千家為六遂餘則公邑地官旅師凡新甿之治皆聴之使無征役以地之􅍇惡為之等新民新徙來者也治謂有所求乞也使無征役復之也王制曰自諸侯來徙家期不從政以地羙惡為之等七人以上授以上地六口授以中地五口以下授以下地與舊民同旅師掌斂地税而又施恵散利是以屬用新民焉同上夫圭田無征夫猶治也征税也孟子曰卿以下必有圭田治圭田者不税所以厚賢也此則周禮之士田以任近郊之地税什一王制司勲唯加田無國正加田既賞之又加賜以田所以厚恩也鄭司農云正謂税也禄田亦有給公家之賦貢若今時侯國有司農少府錢穀矣獨加賞之田無正耳夏官田里不粥皆受於公民不得私也粥賣也王制右授田禮書綱目卷六十四
