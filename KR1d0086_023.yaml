body:
  text: 禮書綱目卷二十一喪服制度凶禮四補小宗伯王崩縣衰冠之式于路門之外制色冝齊同春官大僕縣喪首服之法于宫門首服之法謂免髽笄總廣狹長短之數縣其書于宫門示四方夏官肆師禁外內命男女之衰不中法者且授之杖不中法違升數與裁制者章春官詳見喪大記成服司服掌王之吉凶衣服辨其名物與其用事同上衰與其不當物也寧無衰惡其亂禮不當物謂精粗廣狹不應法制檀弓右總要司服凡凶事服辨服服辨喪冠也其服斬衰齊衰自又按辨師注云不言服辨服辨天子以下無飾無等春此一條總言服制官斬衰冠六升受冠七升義服正服其冠皆同齊衰冠七升受冠八升喪服記齊衰大功冠其受也緦麻小功冠其衰也喪服疏衰杖期傳繐衰冠八升喪服記已上言冠之升數斬衰冠煆而勿灰詳見喪服傳齊衰冠傳曰冠者沽功也詳見喪服本章公子為其母練冠為其妻縓冠公子君之庶子也其或為母謂妾子也之詳見喪服父在為母條已上言冠制人功異斬衰冠右縫外畢右縫小功以下左外畢者冠前後屈而出縫于武也詳見喪服本章冠六升外縪詳見士喪禮成服章三年之練冠亦右縫右縫者又辟而縫之小功以下左左辟象吉輕也雜記古者冠縮縫今也衡縫縮從也今禮制衡讀為橫今冠橫縫以其辟積多故喪冠之反吉非古也解時人之惑喪冠縮縫古冠耳之檀弓已上論冠縫制斬衰冠繩纓喪服本章疏衰冠布纓喪服本章緦冠繅纓繅當為澡麻帶絰之澡聲之誤也謂有事共布以為纓雜記冠纓條屬厭纓條屬者通屈一條繩為武垂下為纓屬之冠厭伏也詳見士喪禮成服章喪冠條屬以别吉凶三年之練冠亦條屬别吉凶者吉冠不條屬也條屬者通屈一條繩若布為武垂下為纓屬之冠象大古喪事略也吉冠則纓武異材馬雜記喪冠不緌去飾纓檀弓之已上論武緌制委武玄縞而后蕤委武冠卷也秦人曰委齊東曰武玄玄冠縞縞冠也雜記縞冠玄武子姓之冠也謂父有喪服子為之不純吉也玉藻縞冠素紕既詳之冠也詳見變除大祥除服章縞已上論玄冠制右冠制斬衰苴絰傳曰苴絰者麻之有蕡者也喪服本章疏衰牡麻絰傳曰牡麻者枲麻也本章疏衰期牡麻絰本章不杖者本章疏衰牡麻絰無受本章大功牡麻絰無受本章大功牡麻絰本章繐衰牡麻絰本章小功澡麻帶絰本章小功牡麻絰本章公子為其母麻為其妻葛絰麻者緦麻之絰帶也葛絰者以葛為絰帶條詳見喪服父在為母章受以上十一論首絰所用之材及有無受之别苴絰大搹去五分一以為帶齊衰之絰斬衰之帶也去五分一以為帶大功之絰齊衰之帶也去五分一以為帶小功之絰大功之帶也去五分一以為帶緦麻之絰小功之帶也去五分一以為帶詳見喪服斬衰傳之此一條論首絰大小異苴絰大搹左本在下盈手曰搹搹扼也中人之扼圍九寸同上牡麻絰右本在上詳見喪服齊衰傳苴絰大搹下本在左牡麻絰右本在上苴絰斬衰之絰也牡麻絰者齊衰以下之絰也詳見士喪禮已上論首絰左右本其長殤皆九月纓絰其中殤皆七月不纓絰絰有纓者謂其重也自大功已上絰有纓以一條繩為之小功以下絰無纓也詳見喪服大功章大功牡麻絰纓本章論此兩條首絰有纓無纓之别右首絰制司服凡弔事辨絰服辨絰者如爵辨而素加環絰絰大如緦之絰春官錫衰緦衰疑衰其首服皆辨絰詳見錫衰緦衰疑衰章辨師王之辨絰辨而加環絰辨絰王弔所服也其辨如爵辨而素所謂素冠也而加環絰環絰者大如緦之麻絰纒而不糾司服職曰凡弔事辨絰服諸侯及孤卿大夫之辨絰各以其等為之而掌其禁令各以其等如其命數也辨絰之辨其辟積如冕繅之就然庶人弔者素委貌士辨絰之辨不辟積夏官右辨絰制親始死雞斯雞斯當為笄纚聲之誤也此條論笄纚小斂卒斂主人括髮以麻詳見變除卒斂主人髺髮髺髮去笄纚而紒條詳見士喪禮此兩論括髮男子冠而婦人笄男子免而婦人髽别男女也條小記此論笄免髽斬衰括髮以麻為母括髮以麻免而以布母服輕至免可以布代麻也為母又哭而免小記卒斂衆主人免于房衆主人免者齊衰將袒以免代冠冠服之尢尊不以袒也免之制未聞舊説以為如冠狀廣一寸喪服小記曰斬衰括髮以麻免而以布此用麻布為之狀如今之著幓頭矣自項中而前交于額上卻繞紒也士喪禮此兩條論括髮免卒斂主人説髦喪大記既殯主人説髦既殯置銘于肂復位時也兒生三月鬋髮為鬌男角女羈否則男左女右長大猶為飾存之謂之髦所以順父母幼小之心至此尸柩不見喪無飾可以去之髦之形象未聞士喪禮親沒不髦去為子之飾論玉藻此三條髦右笄纚髺髮免髦之制女改服布深衣縞總以趨喪詳見變除始死變服章布總箭笄髽此妻妾女子子喪服之異于男子者總束髮謂之總者既束其本又總其末箭笄篠竹髽露紒也猶男子之括髮斬衰括髮以麻則髽亦用麻以麻者自項而前交于額上卻繞紒如著幓頭焉小記曰男子冠而婦人笄男子免而婦人髽傳曰總六升長六寸箭笄長尺吉笄尺二寸總六升者首飾象冠數長六尺謂出紒後所垂為飾也喪服齊衰帶惡笄以終喪笄所以卷髮帶所以持身也婦人質于喪所以自卷持者有除無變小記箭笄終喪三年亦于喪所以自卷持者有除無變同上女子子適人者為其父母婦為舅姑惡笄有首以髽言以髽則髽有著笄者明矣傳曰笄有首者惡笄之有首也惡笄者櫛笄也櫛笄者以櫛之木為笄或曰榛笄喪服妾為女君君之長子惡笄有首布總詳見齊衰母為長子條南宫縚之妻之姑之喪南宫縚孟僖子之子南宫閲也字子容其妻孔子兄女夫子誨之髽曰爾母從從爾爾母扈扈爾誨教也爾女也從從謂大髙扈扈謂大廣爾語助蓋榛以為笄長尺而總八寸總束髮垂為飾齊衰之總八寸檀弓男子冠而婦人笄男子免而婦人髽小記右婦人笄總髽制司服掌王之吉凶衣服凡凶事服辨服其服斬衰齊衰詳見冠制章衰三升三升有半其冠六升以其冠為受受冠七升衰斬也或曰三升半者義服也其冠六升齊衰之下也斬衰正服變而受之此服也三升三升半其受冠皆同以服至尊冝少差也齊衰四升其冠七升以其冠為受受冠八升言受以大功之上也此謂為母也齊衰正服五升其冠八升義服六升其冠九升亦以其冠為受凡不著之者服之首主于父母繐衰四升有半其冠八升此謂諸侯之大夫為天子繐衰也服在小功之上者欲著其縷之精粗也升數在齊衰之中者不敢以兄弟之服服至尊也功八升若九升小功十升若十一升此以小功受大功之差也不言七升者主于受服欲其文相值言服降而在大功者衰七升正服衰八升其冠皆十升義服九升其冠十一升亦皆以其冠為受也斬衰受之以下大功受之以正者重者輕之輕者從禮聖人之意然也其降而在小功者衰十升正服衰十一升義服衰十二升皆以即葛及緦麻無受也此大功不言受者其章既著之喪服記斬衰三升齊衰四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升去其半有事其縷無事其布曰緦此齊衰多二等大功小功多一等服主于受是極列衣服之差也間傳斬衰裳凡服上曰衰下曰裳傳曰衰三升喪服本章疏衰裳齊三年疏猶粗也疏衰裳齊期本章不杖者本章疏衰裳齊無受者本章大功布衰裳無受者本章大功布衰裳本章繐衰裳傳曰繐衰者何以小功之繐也本章小功布衰裳五月者本章小功布衰裳本章緦麻三月者傳曰緦者十五升抽其半有事其縷無事其布曰緦謂之緦者治其縷細如絲也抽猶去也本章朝服十五升去其半而緦加灰錫也緦精粗與朝服同去其半則六百縷而疏也又無事其布不灰焉雜記已上論衣裳升數之異公子為其母麻衣為其妻麻衣此麻衣者如小功布深衣為不制衰裳變也詩云麻衣如雪練冠而麻衣縓緣三年練之受飾也檀弓練練衣黃裏縓緣諸侯之妾子厭于父為母不得伸權為制此服不奪其恩也詳見喪服父在為母條斬衰裳傳曰斬者何不緝也本章疏衰裳齊傳曰齊者緝也本章凡衰外削幅裳內削幅幅三袧削猶殺也大古冠布衣布先知為上外殺其幅以便體也後知為下內殺其幅稍有飾也後世聖人易之以此為喪服袧者謂辟兩側空中央也祭服朝服辟積無數凡裳前三幅後四幅也若齊裳內衰外齊緝也凡五服之衰一斬四緝緝裳者內展之緝衰者外展之負廣出于適寸負在背上者也適辟領也負出于辟領外旁一寸適博四寸出于衰博廣也辟領廣四寸則與濶中八寸也兩之為尺六寸也出于衰者旁出衰外不著寸數者可知也衰長六寸博四寸廣袤當心也前有衰後有負版左右有辟領孝子哀戚無所不在衣帶下尺衣帶下尺者要也廣尺足以掩裳上際也衽二尺有五寸衽所以掩裳際也二尺五寸與有司紳齊也上正一尺燕尾二尺五寸凡用布三尺五寸袂屬幅屬猶連也連幅謂不削衣二尺有二寸此謂袂中也言衣者明與身參齊二尺二寸其袖足以容中人之肱也衣自領至腰二尺二寸倍之四尺四寸加辟領八寸而又倍之凡衣用布一丈四寸袪尺二寸袪袖口也尺二寸足以容中人之併兩手也吉時拱尚左手喪時拱尚右手裳喪服記已上論裁造衣之制端衰喪車皆無等喪者衣衰及所乘之車貴賤同孝子于親一也衣衰言端者玄端吉時當服喪之衣衰當如之雜記苴衰不補喪服四制裳此兩條通論衰之制縣子曰綌衰繐裳非古也非時尚輕涼慢禮非檀弓此論衰裳古練練衣黃裏縓緣鹿裘衡長袪袪裼之可也詳見變除練受服章此論練衣裳之制右衰裳制女子子在室為父衰三年凡服上曰衰下曰裳此但言衰不言裳婦人不殊裳衰如男子衰下如深衣深衣則衰無帶下又無衽喪服右婦人衰制斬衰苴絰傳曰苴絰大搹去五分一以為帶齊衰之絰斬衰之帶也去五分一以為帶大功之絰齊衰之帶也去五分一以為帶小功之絰大功之帶也去五分一以為帶緦麻之絰小功之帶也去五分以為帶詳見首絰章疏衰牡麻絰本章小功澡麻帶絰澡者治去莩垢不絶其本也本章絰殺五分而去一小記公子為其母麻為其妻葛絰麻者緦麻之絰帶也其為妻葛絰帶妻輕材詳見喪服父在為母條此已上論腰絰所用之及大小制苴絰大鬲下本在左要絰小焉散帶垂長三尺牡麻絰右本在上亦散帶垂苴絰斬衰之絰也牡麻絰者齊衰以下之絰也士喪禮大功牡麻絰傳曰殤之絰不樛垂蓋未成人也樛垂者不絞其帶之垂者雜記曰大功以上散帶本章大功以上散帶詳見變除下殤小功帶澡麻不絶本詘而反以報之報猶合也下殤小功本齊衰之親其絰帶澡率治麻為之帶不絶其本屈而上至要中合而糾之明親重也凡殤散帶垂小記已上論腰絰制造之異也斬衰苴絞帶傳曰絞帶者繩帶也本章疏衰布帶本章疏衰期傳曰齊衰大功冠其受也緦麻小功冠其衰也帶緣各視其冠詳見冠制章公士大夫之衆臣為其君布帶詳見喪服斬衰章已上論絞帶之制斬衰疏衰既虞卒哭去麻服葛葛帶三重詳見變除既虞卒哭受服章練葛要絰詳見練受服章右要絰帶制婦人之帶牡麻結本婦人亦有苴絰但言帶者記其異此齊衰婦人斬衰婦人亦苴絰也婦士喪禮之此論人要絰制婦人葛絰而麻帶詳見變除既虞卒哭受服章此論婦人虞卒哭要絰之制右婦人要絰帶制司服王為三公六卿錫衰為諸侯緦衰為士大夫疑衰君為臣服弔服也鄭司農云錫麻之滑易者十五升去其半有事其布無事其縷緦亦十五升去其半有事其縷無事其布疑衰十四升衰玄謂無事其縷哀在內無事其布哀在外疑之言擬也擬于吉春官此條論錫緦疑衰之等凡辨絰其衰侈袂侈猶大也辨絰服者弔服也其衰錫也緦也疑也袂之言小者二尺二寸大者半而益之則侈袂三尺三寸雜記此論弔服之制錫者何也麻之有錫者也錫者十五升抽其半無事其縷有事其布曰錫謂之錫者治其布使之滑易也錫者不治其縷哀在內也緦者不治其布哀在外也詳見補弔服衰此條論錫之制布錫衰緦衰疑衰之制曽子問曰親迎女在塗而壻之父母死則如之何曰女改服布深衣縞總以趨喪詳見變除夫子曰始死羔裘玄冠者易之而已詳見變除之此論始死深衣服齊衰大功冠其受也緦麻小功冠其衰也帶緣各視其冠緣如深衣之緣喪服傳此論齊衰大小功緦麻初喪中衣之制公子為其母麻衣縓緣為其妻麻衣縓緣麻衣者如小功布深衣為不制衰裳變也麻詳見喪服父在為母條此論公子為母妻衣之制大祥素縞麻衣麻衣十五升布深衣也謂之麻者純用布無采飾也詳見變除此論大祥麻衣之制右深衣麻衣長衣中衣之制斬衰苴杖傳曰苴杖竹也削杖桐也喪服本章疏衰削杖本章母為長子削杖嫌服男子當杖竹也母為長子服不可以重于子為己也小記杖各齊其心皆下本喪服傳杖下本竹桐一也順其性也士喪記絰殺五分而去一杖大如絰如要絰也所小記大此言杖體用及小之制右杖制斬衰菅屨傳曰菅屨者菅菲也外納喪服本章屨外納喪服記疏衰疏屨三年傳曰疏屨者藨蒯之菲也本章疏衰疏屨期本章不杖麻屨此亦齊衰言其異于上本章齊衰三月與大功同者繩屨小記小功舊説小功以下吉屨無絇也本章公士大夫之衆臣為其君布帶繩屨傳曰繩屨者繩菲也繩菲今時不借也屨喪服斬衰章以上八條論制輕重之别練繩屨無絇檀弓練此論屨之制屨人掌王及后之服屨素屨葛屨屨有絇有繶有純者飾也素屨者非純吉有凶去飾言葛屨明有用皮時辨外內命夫命婦之散屨散屨亦謂去飾凡四時之祭祀以冝服之祭祀而有素屨散屨者唯大祥時此條論大祥素屨官天不屨繐屨繐屨喪屨也縷不灰治曰繐之士冠禮此條因冠禮見繐屨制右屨制巾車王之喪車五乘木車蒲蔽犬䄙尾􅐤疏飾小服皆疏木車不􅃮者鄭司農云蒲蔽謂嬴蘭車以蒲為蔽天子喪服之車漢儀亦然犬䄙以犬皮為覆笭故書疏為揟杜子春讀揟為沙玄謂蔽車旁禦風塵者犬白犬皮既以皮為覆苓又其尾為戈戟之韜粗布飾二物之側為之緣若挕服云服讀為箙小箙刀劍短兵之衣此始遭喪所乘為君之道尚微備姦臣也書曰以虎賁百人逆子釗亦為備焉素車棼蔽犬䄙素飾小服皆素素車以白土堊車也棼讀為薠薠麻以為蔽其䄙服以素繒為緣此卒哭所乘為君之道益著在車可去戈戟薻車薻蔽鹿淺䄙革飾故書藻作􅠘杜子春讀􅠘為華藻之藻玄謂藻水草蒼色以蒼土堊車以蒼繒為蔽也鹿淺䄙以鹿夏皮為覆笭又以所治去毛者緣之此既練所乘駹車雚蔽然􅍜髤飾故書駹作龍髤為杜子春云龍讀為駹讀為黍垸之黍直謂髤黍也玄謂駹車邊側有漆飾也雚細葦席也以為蔽者漆則成藩即吉也然果然也髤赤多黑少之色韋也此大祥所乘漆車藩蔽犴􅍜雀飾漆車黑車也藩今時小車藩漆席以為之犴胡犬雀黑多赤少之色韋也此禫所乘春官主人乘惡車詳見士喪禮端衰喪車皆無等喪車惡車也喪者衣衰及所乘之車貴賤同孝子于親一也雜記右喪車之制禮書綱目卷二十一
