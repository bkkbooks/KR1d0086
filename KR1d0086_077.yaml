body:
  text: 禮書綱目卷七十五婺源江永撰禮樂記通禮二十八補大宗伯以天産作隂德以中禮防之以地産作陽德以和樂防之鄭司農云隂德謂男女之情天性生而自然者過時則奔隨先時則血氣未定聖人為制其中令民三十而娶女二十而嫁以防其淫泆令無失德情性隱而不露故謂之隂德陽德謂分地科以致富富者之失不驕奢則吝嗇故以和樂防之樂所以滌蕩邪穢道人之正性者也一説地産謂土地之性各異若齊性舒緩楚性急悍則以和樂防其失令無失德樂所以移風易俗者也此皆露見於外故謂之陽德陽德隂德不失其正則民和而物各得其理故曰以諧萬民以致百物玄謂天産者動物謂六牲之屬地産者植物謂九穀之屬隂德隂氣在人者隂氣虛純之則劣故食動物作之使動過則傷性制中禮以節之陽德陽氣在人者陽氣盈純之則躁故食植物作之使靜過則傷性制和樂以節之如是然後隂陽平性情和而能育其類以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物禮濟虛樂損益並行則四者乃得其和能生非類曰化生其種曰産春官大司徒以五禮防萬民之偽而教之中禮所以節止民之侈偽使其行得中鄭司農云五禮謂吉凶賓軍嘉以六樂防萬民之情而教之和禮所以蕩正民之情思使其心應和也鄭司農云六樂謂雲門咸池大韶大夏大濩大武地官人生而靜天之性也感於物而動性之欲也言性不見物則無欲物至知知然後好惡形焉至來也知知每物來則又有知也言見物多則欲益衆形猶見也好惡無節於內知誘於外不能反躬天理滅矣節法度也知猶欲也誘猶道也引也躬猶已也理猶性也夫物之感人無窮而人之好惡無節則是物至而人化物也人化物也者滅天理而窮人欲者也窮人欲言無所不為於是有悖逆詐偽之心有淫泆作亂之事是故強者脅弱衆者暴寡知者詐愚勇者苦怯疾病不養老幼孤獨不得其所此大亂之道也是故先王之制禮樂人為之節言為作法度以遏其欲衰麻哭泣所以節喪紀也鐘鼓干戚所以和安樂也昏姻冠笄所以别男女也射鄉食饗所以正交接也男二十而冠女許嫁而笄成人之禮射鄉大射鄉飲酒也禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道備矣樂者為同禮者為異同則相親異則相敬同謂協好惡也異謂别貴賤也樂勝則流禮勝則離流謂合行不敬也離謂析居不和也合情飾貌者禮樂之事也欲其並行斌斌然禮義立則貴賤等矣樂文同則上下和矣好惡著則賢不肖别矣刑禁暴爵舉賢則政均矣仁以愛之義以正之如此則民治行矣等階級也樂由中出和在心也禮自外作敬在貌也樂由中出故靜禮自外作故文文猶動也大樂必易大禮必簡易簡若於清廟大饗然樂至則無怨禮至則不爭揖讓而治天下者禮樂之謂也至猶達也行也暴民不作諸侯賓服兵革不試五刑不用百姓無患天子不怒如此則樂達矣合父子之親明長幼之序以敬四海之內天子如此則禮行矣賓協也試用也大樂與天地同和大禮與天地同節言順天地之氣與其數和故百物不失不失其性節故祀天祭地成物有功報焉明則有禮樂教人者幽則有鬼神助天地成物者也易曰是故知鬼神之情狀與天地相似五帝德説黃帝德曰死而民畏其神者百年春秋傳曰若敖氏之鬼然則聖人之精氣謂之神賢知之精氣謂之鬼如此則四海之內合敬同愛矣禮者殊事合敬者也樂者異文合愛者也禮樂之情同故明王以相沿也沿猶因述也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也沿或作緣故事與時並舉事在其時也禮器曰堯授舜舜授禹湯放桀武王伐紂時也名與功偕為名在其功也偕猶俱也堯作大章舜作大韶禹作大夏湯作大濩武王作大武各因其得天下之功故鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也簠簋俎豆制度文章禮之器也升降上下周還裼襲禮之文也綴謂酇舞者之位也兆其外營域也故知禮樂之情者能作識禮樂之文者能述述謂訓其義也作者之謂聖述者之謂明明聖者述作之謂也樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆别化猶生也别謂形體異也樂由天作禮以地制言法天地也過制則亂過作則暴過猶誤也暴失文武之意明於天地然後能興禮樂也論倫無患樂之情也欣喜勸愛樂之官也倫猶類也患害也官猶事也中正無邪禮之質也莊敬恭順禮之制也質猶本也若夫禮樂之施於金石越於聲音用於宗廟社稷事乎山川鬼神則此所與民同也言情官質制先王所專也王者功成作樂治定制禮功成治定同時耳功主於王業治主於教民明堂位説周公曰治天下六年朝諸侯于明堂制禮作樂其功大者其樂備其治辨者其禮具辨遍也干戚之舞非備樂也樂以文德為備若咸池者孔子曰韶盡美矣又盡善也謂武盡美矣未盡善也孰亨而祀非達禮也達具也郊特牲曰郊血太饗腥三獻爓一獻孰至敬不饗味而貴氣臭也五帝殊時不相沿樂三王異世不相襲禮言其有損益也樂極則憂禮粗則偏矣樂人之所好也害在淫誇禮人之所勤也害在倦略及夫敦樂而無憂禮備而不偏者其唯大聖乎敦厚也天高地下萬物散殊而禮制行矣禮為異也流而不息合同而化而樂興焉樂為同也春作夏長仁也秋斂冬藏義也仁近於樂義近於禮言樂法陽而生禮法隂而成樂者敦和率神而從天禮者别宜居鬼而從地敦和樂貴同也率循也從順也别宜禮尚異也故聖人作樂以應天制禮以配地禮樂明備天地官矣官猶事也各得其事天尊地卑君臣定矣卑高已陳貴賤位矣動靜有常小大殊矣方以類聚物以羣分則性命不同矣在天成象在地成形如此則禮者天地之别也卑高謂山澤也位矣尊卑之位象山澤也動靜隂陽用事小大萬物也大者常存小者隨陽出入方謂行蟲也物謂殖生者也性之言生也命生之長短也象光耀也形體貌也地氣上齊天氣下降隂陽相摩天地相蕩鼓之以雷霆奮之以風雨動之以四時暖之以日月而百化興焉如此則樂者天地之和也齊讀為躋躋升也摩猶迫也蕩猶動也奮迅也百化百物化生也化不時則不生男女無辨則亂升天地之情也辨别也升成也樂失則害物禮失則亂人及夫禮樂之極乎天而蟠乎地行乎隂陽而通乎鬼神窮高極遠而測深厚極至也蟠猶委也高遠三辰也深厚山川也言禮樂之道上至于天下委于地則其間無所不之樂著大始而禮居成物著之言處也大始百物之始生也著不息者天也著不動者地也著猶明白也息猶休止也易曰天行健君子以自強不息一動一靜者天地之間也間謂百物也故聖人曰禮樂云言禮樂之法天地也樂靜而禮動其並用事則亦天地之間爾是故樂之隆非極音也食饗之禮非致味也清廟之瑟朱絃而疏越一唱而三歎有遺音者矣大饗之禮尚玄酒而俎腥魚太羮不和有遺味者矣是故先王之制禮樂也非以極口腹耳目之欲也將以教民平好惡而反人道之正也夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也以穀食犬豕曰豢為作也言豢豕作酒本以享祀養賢而小人飲之善酗以致獄訟是故先王因為酒禮一獻之禮賓主百拜終日飲酒而不得醉焉此先王之所以備酒禍也一獻士飲酒之禮百拜以喻多故酒食者所以合歡也樂者所以象德也禮者所以綴淫也綴猶止也是故先王有大事必有禮以哀之有大福必有禮以樂之哀樂之分皆以禮終大事謂死喪也樂也者聖人之所樂也而可以善民心其感人深其移風易俗故先王著其教焉著猶立也謂立司樂以下使教國子樂也者施也禮也者報也言樂出而不反而禮有往來也樂樂其所自生而禮反其所自始樂章德禮報情反始也自由也樂也者情之不可變者也禮也者理之不可易者也理猶事也樂統同禮辨異統同同和合也辨異異尊卑也禮樂之説管乎人情矣管猶包也窮本知變樂之情也著誠去偽禮之經也禮樂偩天地之情達神明之德降興上下之神而凝是精粗之體領父子君臣之節偩猶依象也降下也興猶出也凝成也精粗謂萬物大小也領猶理治也是故大人舉禮樂則天地將為昭焉言天地將為之昭然明矣天地欣合隂陽相得煦嫗覆育萬物然後草木茂區萌達羽翼奮角觡生蟄蟲昭蘇羽者嫗伏毛者孕鬻胎生者不殰而卵生者不殈則樂之道歸焉耳欣讀為熹熹猶蒸也氣曰煦體曰嫗屈生曰區無䚡曰觡昭曉也蟄蟲以發出為曉更息曰蘇孕任也鬻生也內敗曰殰殈裂也今齊人語有殈者也樂者非謂黃鍾大吕弦歌干揚也樂之末節也故童者舞之鋪筵席陳尊俎列籩豆以升降為禮者禮之末節也故有司掌之言禮樂之本由人君也禮本著誠去偽樂本窮本知變樂師辨乎聲詩故北面而弦宗祝辨乎宗廟之禮故後尸商祝辨乎喪禮故後主人辨猶别也正也弦謂鼓瑟琴也後尸居後贊禮儀此言知本者尊知末者卑是故德成而上藝成而下行成而先事成而後德三德也行三行也藝才技也先謂位在上也後謂位在下也是故先王有上有下有先有後然後可以有制於天下也言尊卑備乃可制作以為治法君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致樂以治心者也致猶深審也子讀如不子之子油然新生好貌也善心生則寡於利欲寡於利欲則樂矣樂由中出故治心神朱子曰韓詩外傳子諒作慈良近是天謂禮性自然謂神妙不測致禮以治躬則莊敬莊敬則嚴威躬身也禮自外作故治身心中斯須不和不樂而鄙詐之心入之矣鄙詐入之謂利欲生外貌斯須不莊不敬而易慢之心入之矣易輕易也故樂也者動於內者也禮也者動於外者也樂極和禮極順內和而外順則民瞻其顔色而弗與爭也望其容貌而民不生易慢焉故德輝動於內而民莫不承聽理發諸外而民莫不承順德輝顔色潤澤也理容貌之進止也故曰致禮樂之道舉而錯之天下無難矣樂也者動於內者也禮也者動於外者也故禮主其減樂主其盈禮主其減人所倦也樂主其盈人所欲也禮減而進以進為文樂盈而反以反為文進謂自勉強也反謂自抑止也文猶美也善也禮減而不進則銷樂盈而不反則放故禮有報而樂有反放淫於聲樂不能止也報讀曰褒猶進也禮得其報則樂樂得其反則安得謂曉其義知其吉凶之歸禮之報樂之反其義一也俱趨立於中不銷不放也並樂記禮也者反其所自生自由也制禮者本已所由得民心也樂也者樂其所自成作樂緣民所樂於已之功舜之民樂其紹堯而作大韶湯武之民樂其濩伐而作濩武是故先王之制禮也以節事動反本也修樂以道志勸之善也故觀其禮樂而治亂可知也國亂禮慢而樂淫也蘧伯玊曰君子之人達觀其禮樂則知治亂也蘧伯玊衛大夫也名瑗故觀其器而知其工之巧觀其發而知其人之知禮樂亦猶是也故曰君子慎其所以與人者將以是觀禮器孔子曰移風易俗莫善於樂安上治民莫善於禮孝經子曰先進於禮樂野人也後進於禮樂君子也先進後進猶言前輩後輩野人謂郊外之民君子謂賢士大夫也程子曰先進於禮樂文質得宜今反謂之質朴而以為野人後進之於禮樂文過其質今反謂之彬彬而以為君子蓋周末文勝故時人之言如此不自知其過於文也如用之則吾從先進用之謂用禮樂孔子既述時人之言又自言其如此蓋欲損過以就中也論語子曰禮云禮云玊帛云乎哉樂云樂云鐘鼓云乎哉敬而將之以玊帛則為禮和而發之以鐘鼓則為樂遺其本而專事其末則豈禮樂之謂哉蓄程子曰禮只是一箇序樂只是一箇和只此兩字含多少義理天下無一物無禮樂且如置此兩椅一不正便是無序無序便乖乖便不和又如盜賊至為不道然亦有禮樂蓋必有總屬必相聽順乃能為盜不然則叛亂無統不能一日相聚而為盜也禮樂無處無之學者要須識得同上子曰人而不仁如禮何人而不仁如樂何遊氏曰人而不仁則人心亡矣其如禮樂何哉言雖欲用之而禮樂不為之用也程子曰仁者天下之正理失正理則無序而不和李氏曰禮樂待人而後行苟非其人則雖玉帛交錯鐘鼓鏗鏘亦將如之何哉然記者序此於八佾雍徹之後疑其為僭禮樂者發也同上子曰禮也者理也樂也者節也君子無理不動無節不作不能詩於禮繆不能樂於禮素薄於德於禮虛繆誤也素猶質也歌詩所以通禮意也作樂所以同成禮文也崇德所以實禮行也王制曰樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉則古之人皆知諸侯之禮樂仲尼燕居子張問政子曰君子明於禮樂舉而錯之而已言禮樂足以為政也錯猶施行也子張復問子曰師爾以為必鋪几筵升降酌獻酬酢然後謂之禮乎爾以為必行綴兆興羽籥作鐘鼓然後謂之樂乎言而履之禮也行而樂之樂也君子力此二者以南面而立夫是以天下太平也諸侯朝萬物服體而百官莫敢不承事矣禮之所興衆之所治也禮之所廢衆之所亂也目巧之室則有奧阼席則有上下車則有左右行則有隨立則有序古之義也室而無奧阼則亂於堂室也席而無上下則亂於席上也車而無左右則亂於車也行而無隨則亂於塗也立而無序則亂於位也昔聖帝明王諸侯辨貴賤長幼遠近男女外內莫敢相踰越皆由此塗出也服體體服也謂萬物之符長皆來為瑞應也衆之所治衆之所以治也衆之所亂衆之所以亂也目巧謂但用巧目善意作室不由法度猶有奧阼賓主之處也自目巧以下古今常事不可廢改也同上大史公曰夫禮由外入樂自內出故君子不可須臾離禮須臾離禮則暴慢之行窮外不可須臾離樂須臾離樂則姦邪之行窮內史記禮書綱目卷七十五
