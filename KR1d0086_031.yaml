body:
  text: 禮書綱目卷二十九婺源江永撰喪通禮凶禮十二補凡喪父在父為主與賓客為禮宜使尊者父沒兄弟同居各主其喪各為其妻子之喪為主也祔則宗子主之親同長者主之父母沒如昆弟之喪宗子主之不同親者主之從父昆弟之喪奔喪君所主夫人妻大子適婦言妻見大夫以下亦為此三人為喪主也服問諸侯弔於異國之臣則其君為主君為之主弔臣恩為己也子不敢當主中庭北面哭不拜喪服小記士之子為大夫則其父母弗能主也使其子主之無子則為之置後大夫之子得用大夫之禮而于士不得也置猶立也雜記婦之喪虞卒哭其夫若子主之祔則舅主之詳見士虞禮主妾之喪則自祔至於練祥皆使其子主之其殯祭不於正室詳見卒哭祔練祥禫記祔章大功者主人之喪有三年者則必為之再祭朋友虞祔而已謂死者之從父昆弟来為喪主有三年者謂妻若子幼少大功為之再祭則小功緦麻為之練祭可也小記凡主兄弟之喪雖疏亦虞之詳見士虞禮男主必使同姓婦主必使異姓謂為無主後者為主也異姓同宗之婦也婦人外成小記其無女主則男主拜女賓於寢門内其無男主則女主拜男賓於阼階下子幼則以衰抱之人為之拜為後者不在則有爵者辭無爵者人為之拜在竟内則俟之在竟外則殯葬可也喪有無後無無主詳見喪大記奉尸夷于堂拜賓章姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親弗主此謂姑姊妹無子寡而死也夫黨無兄弟無緦之親也其主喪不使妻之親而使夫之族人婦人外成主必宜得夫之姓類夫若無族人則前後家東西家無有則里尹主之喪無無主也里尹閭胥里宰之屬王度記曰百户為里里一尹其禄如庶人在官者里或為士諸侯弔于異國之臣則其君為主里尹主之亦斯義也或曰主之而附於夫之黨妻之黨自主之非也夫之黨其祖姑也雜記大夫不主士之喪士之喪雖無主不敢攝大夫以為主小記士不攝大夫士攝大夫唯宗子士之喪雖無主不敢攝大夫以為主宗子尊可攝之同上大夫之喪庶子不受弔詳見喪大記未小斂受弔章宗子為殤而死庶子弗為後也詳見喪服為人後者條養有疾者不喪服遂以主其喪非養者入主人之喪則不易己之喪服詳見變除改服章右主後曽子問曰喪有二孤廟有二主禮與怪時有之孔子曰天無二日土無二王嘗禘郊社尊無二上尊踰卑也神雖多猶一一祭之未知其為禮也昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始也偽猶假也舉兵以遷廟主行無則主命為假主非也喪之二孤則昔者衛靈公適魯遭季桓子之喪衛君請弔哀公辭不得命公為主客入弔康子立於門右北面公揖讓升自東階西鄉客升自西階弔公拜興哭康子拜稽顙於位有司弗辨也今之二孤自季康子之過也辨猶正也若康子者君弔其臣之禮也鄰國之君弔君為之主主人拜稽顙非也當哭踊而已靈公先桓子以魯哀公二年夏卒桓公以三年秋卒是出公也曽子問公儀仲子之喪檀弓免焉故為非禮以非仲子也禮朋友皆在他邦乃袒免仲子舍其孫而立其子此其所立非也公儀盖魯同姓周禮適子死立適孫為後檀弓曰何居我未之前聞也居讀為姬姓之姬齊魯之間語助也前猶故也趨而就子服伯子於門右曰仲子舍其孫而立其子何也去賓位就主人兄弟之賢者而問之子服伯子盖仲孫蔑之𤣥孫子服景伯蔑魯大夫伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王微子舍其孫腯而立衍也夫仲子亦猶行古之道也伯子為親者隠耳立子非也文王之立武王權也微子適子死立其弟衍殷禮也子游問諸孔子孔子曰否立孫㨿周禮檀弓司冦恵子之喪恵子衛将軍文子彌牟之弟恵叔蘭也生虎者子游為之麻衰牡麻絰恵子廢適立庶為之重服以譏之麻衰以吉服之布為衰文子辭曰子辱與彌牟之弟游謝其存時又辱為之服敢辭止之服也子游曰禮也文子退反哭子游名習禮文子亦以為當然未覺其所譏子游趨而就諸臣之位深譏之大夫之家臣位在賓後文子又辭曰子辱與彌牟之弟游又辱為之服又辱臨其喪敢辭止之在臣位子游曰固以請再不從命文子退扶適子南面而立曰子辱與彌牟之弟游又辱為之服又辱臨其喪虎也敢不復位覺所譏也虎適子名文子親扶而辭敬子游也南面而立則諸臣位在門内北面明矣子游趨而就客位所譏行同上石駘仲卒駘仲衛大夫石碏之族無適子有庶子六人卜所以為後者莫適立也曰沐浴佩玉則兆言齊絜則得吉兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉心正且知禮石祁子兆衛人以龜為有知也同上成公十有五年仲嬰齊卒仲孫嬰齊者何疑仲遂後故問之公孫嬰齊也未見于經為公孫嬰齊今為大夫死見于經為仲嬰齊曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊㨿本公孫為人後者為之子也更為公孫之子故不得復氏公孫其稱仲何孫以王父字為氏也謂諸侯子也顧興㓕繼絶故紀族明所出嬰齊孰後後歸父也歸父使于晉而未反何以後之叔仲恵伯傅子赤公子遂殺叔仲恵伯弑子赤而立宣公宣公死成公幼臧宣叔者相也君死不哭聚諸大夫而問焉曰昔者叔仲恵伯之事孰為之皆曰仲氏也於是遣歸父之家然後哭歸父使晉還至檉聞君薨家遣墠帷哭君成踊反命於介自是走之齊魯人徐傷歸父之無後也於是使嬰齊後之也弟無後兄之義為亂昭穆之序失父子之親故不言仲孫明不與子為父孫春秋公羊傳商祝辨乎喪禮故後主人辨猶别也正也樂記大宗伯大喪則為上相詳見喪大記總要章小宗伯既喪詔相喪祭之禮詳見喪大記虞祭章世婦大喪凡王后有􅉔事於婦人則詔相詳見喪大記受弔章大行人若有大喪則詔相諸侯之禮詔相左右教告之也秋官象胥凡國之大喪詔相國客之禮儀而正其位客謂諸侯使臣来弔者秋官内小臣若有喪紀則擯詔后之禮事相九嬪之禮事正内人之禮事為后傳辭有所求為詔相正者異尊卑也官天肆師凡卿大夫之喪相其禮相其適子春官右祝相有若之喪悼公弔焉悼公魯哀公之子子游擯由左擯相侑喪禮者喪禮廢亡時人以為此儀當如詔辭而皆由右相是善子游正之孝經說曰以身擯侑檀弓泄柳之母死相者由左泄柳死其徒由右相由右相泄柳之徒為之也亦記失禮所由始也泄柳魯繆公時賢人也相相主人之禮雜記杜橋之母之喪宫中無相以為沽也沽猶略也同上孔子在衛司徒敬子卒夫子弔焉主人不哀夫子哭不盡聲而退蘧伯玉請曰衛鄙俗不習喪禮煩吾子辱相焉孔子許之詳見喪禮義君天下曰天子崩曰天王崩史書䇿辭復曰天子復矣始死時呼魄辭也不呼名臣不名君也諸侯呼字告喪曰天王登假告赴也登上也假已也上己者若仙去云爾措之廟立之主曰帝詳見喪大記天子未除喪曰予小子謙未敢稱一人春秋傳曰以諸侯之踰年即位亦知天子之踰年即位以天子三年然後稱王亦知諸侯于其封内三年稱子生名之死亦名之生名之曰小子王死亦曰小子王也晉有小子侯是僣取天子號也諸侯在凶服曰適子孤凶服亦謂未除喪死曰薨亦史書䇿辭復曰某甫復矣某甫且字既葬見天子曰類見代父受國類猶象也執皮帛象諸侯之禮見也其禮亡言諡曰類使大夫行象聘問之禮也言諡者序其行及諡所宜其禮亡天子死曰崩諸侯曰薨大夫曰卒士曰不禄庻人曰死異死名者為人䙝其無知若猶不同然也自上顛壞曰崩薨顛壞之聲卒終也不禄不終其禄死之言凘也精神凘盡也在牀曰尸尸陳也言形體在在棺曰柩柩之言究也死冦曰兵異于凡人當饗禄其後生曰父曰母曰妻死曰考曰妣曰嬪嬪婦人有法度之稱也周禮九嬪掌婦學之法教九御婦徳婦言婦容婦功壽考曰卒短折曰不禄謂有徳行任為大夫士而不為者老而死從大夫之稱少而死從士之稱並曲禮髙曰崩梁山崩厚曰崩沙鹿崩尊曰崩天子之崩以尊也隠三年穀梁傳大凡生於天地之間皆曰命其萬物死皆曰折人死曰鬼此五代之所不變也祭法復與書銘自天子達於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏詳見喪大記復章君存稱世子明當世父位為君君薨稱子某縁民臣之心不可一日無君故稱子某明繼父也名者尸柩尚存猶以君前臣名也既葬稱子不名者無所屈也縁始終之義一年不二君故稱子也踰年稱公不可曠年無君年莊三十二公羊傳君薨大子號稱子待猶君也謂未踰年也雖稱子與諸侯朝㑹如君矣春秋魯僖公九年夏葵丘之㑹宋襄公稱子而與諸侯序待或為侍雜記未沒喪不稱君示民不爭也故魯春秋記晉喪曰殺其君之子奚齊及其君卓沒終也春秋傳曰諸侯于其封内三年稱子至臣子踰年則謂之君矣記坊春秋不稱楚越之王喪禮君不稱天大夫不稱君恐民之惑也楚越之君僣號稱王不稱其喪記不書葬也春秋傳曰吴楚之君不書葬辟其僣號也坊記祭稱孝子孝孫喪稱哀子哀孫詳見卒哭祔練祥禫記有父母之喪尚功衰而附兄弟之殤則練冠附於殤稱陽童某甫不名神也詳見附練祥禫記祝稱卜葬虞子孫曰哀夫曰乃兄弟曰某卜葬其兄弟曰伯子某詳見士喪禮卜葬日章既正尸子坐於東方卿大夫父兄子姓立於東方有司庶士哭於堂下北面夫人坐於西方内命婦姑姊妹子姓立於西方外命婦率外宗哭於堂上北面詳見喪大記庶子之正於公族者其公大事則以其喪服之精麤為序雖於公族之喪亦如之以次主人正者政也庶子司馬之屬掌國子之倅為政于公族者大事謂死喪也其為君雖皆斬哀序之必以本親也主人主喪者次主人者主人恒在上主人雖有父兄猶不得下齒文王世子喪紀以服之輕重為序不奪人親也紀猶事也同上哭泣之位皆如其國之故謹脩其法而審行之詳見喪禮義大夫之庶子為大夫則為其父母服大夫服其位與未為大夫者齒詳見喪服斬衰章父條凡婦人從其夫之爵位婦人無専制生禮死事以夫為尊卑雜記右名位宋桓公卒未葬而襄公㑹諸侯故曰子凡在喪王曰小童公侯曰子在喪未葬也小童者童蒙幼末之稱子者繼父之辭公侯位尊上連王者下絶伯子男周康王在喪稱予一人釗禮稱亦不言小童或所稱之辭各有所施此謂王自稱之辭非諸下所得書故經無其事傳通取舊典之文以事相接僖九年左氏傳葬蔡平公葬大子朱失位位在卑不在適子位以長幼齒大夫送葬者歸見昭子昭子問蔡故以告昭子昭子歎曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸塈詩大雅塈息也今蔡侯始即位而適卑身將從之為蔡侯朱出奔傳傳昭二十一年左氏曽子曰小功不為位也者是委巷之禮也譏之也位謂以親疏叙别哭也委巷猶街里委曲所為也子思之哭嫂也為位善之也禮嫂叔無服婦人倡踊有服者娣姒婦小功倡先也申祥之哭言思也亦然檀弓喪用三年之仂喪大事用三嵗之什一喪祭用不足曰暴有餘曰浩暴猶耗也浩猶饒也王制大宰以九式均節財用三曰喪荒之式式謂用財之節度荒凶年也天官小宰以法掌祭祀朝覲㑹同賓客之戒具喪荒亦如之令百官府共其財用法謂其禮法也戒具戒官有事者所當共同上大府山澤之賦以待喪紀同上外府喪紀共其財用同上封人凡喪紀則飾其牛牲牛人喪事共其奠牛囿人喪紀共其生獸死獸之物獸人凡喪紀共其死獸生獸腊人喪紀共其脯腊凡乾肉之事䱷人喪紀共其魚之鱻槀醢人凡祭祀共薦羞之豆實喪紀亦如之詳見喪大記陳小斂奠章籩人喪事共其薦籩羞籩外饔凡小喪紀陳其鼎俎而實之詳見喪大記朔月月半殷奠章掌客凡禮賓客札喪殺禮凡賓客死致禮以喪用詳見變禮道有喪章六十嵗制七十時制八十月制九十日脩唯絞紟衾冒死而後制絞紟衾冒一日二日而可為者王制喪具君子恥具辟不懷也喪具棺衣之屬一日二日而可為也者君子弗為也謂絞紟衾冒弓檀大司徒以荒政十有二聚萬民八曰殺哀殺哀謂省凶禮地官鄉師正嵗稽其鄉器比其吉凶二服族共喪器鄉共吉凶禮樂之器吉服祭服也凶服弔服也比長主集為之喪器者夷槃素俎楬豆輁軸之屬族師主集為之此三者民所以相共也凶器若族喪器者也此鄉器者旁使相共則民無廢事上下相補則禮行而教成同上閭師凡庶民不樹者無椁不績者不衰同上司市國凶荒札喪則市無征而作布同上泉府凡賖者喪紀無過三月鄭司農云賖貰也以祭祀喪紀故從官貰買物同上鄼長以時校登其夫家比其衆寡以治其喪紀祭祀之事同上土均禮俗喪紀祭祀皆以其地媺惡為輕重之法而行之掌其禁令同上朝士若邦凶荒札喪則令邦國都家縣鄙慮刑貶慮謀也貶猶减也謂當謀緩刑且减國用為民困也所貶視時為多少之法秋官小行人若國札喪則令賻補之謂賻喪家補助其不足也上同右財用武氏子來求賻喪事無求求賻非禮也詳見弔禮賻章毛伯來求金求金以共葬事非禮也天子不私求財故曰非禮不書王命未葬也文九年左氏傳子思曰有其禮無其財君子弗行也有其禮有其財無其時君子弗行也詳見喪禮義孔子曰斂手足形還葬而無椁稱其財斯之謂禮同上子柳之母死子碩請具具葬之器用子栁魯叔仲皮之子子碩兄子柳曰何以哉言無其財子碩曰請粥庶弟之母粥謂嫁之也妾賤取之曰買子柳曰如之何其粥人之母以葬其母也不可忠恕既葬子碩欲以賻布之餘具祭器古者謂錢為泉布所以通布貨財子柳曰不可吾聞之也君子不家於喪惡因死者以為利請班諸兄弟之貧者以分死者所矜地禄多財與鄰里鄉黨檀弓孟獻子之喪獻子魯大夫仲孫蔑司徒旅歸四布旅下士也司徒使下士歸四方之賻布夫子曰可也時人皆貪善其能㢘同上喪事主哀少儀君子以喪過乎哀易小過子曰喪與其易也寧戚論語曽子曰吾聞諸夫子人未有自致者也必也親喪乎致盡其極也盖人之真情所不能自己者子游曰喪致乎哀而止致極其哀不尚文飾也並論語子路曰吾聞諸夫子喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也詳見喪禮義子曰臨喪不哀吾何以觀之哉論語始死充充如有窮既殯瞿瞿如有求而弗得既葬皇皇如有望而弗至練而慨然祥而廓然皆憂悼在心之貌也求猶索物檀弓縣子曰三年之喪如斬期之喪如剡言其痛之惻怛有淺深也雜記子貢曰請問兄弟之喪子曰兄弟之喪則存乎書䇿矣言疏者如禮行之未有加也齊斬之喪哀容之體經不能載矣君子不奪人之喪重喪禮也亦不可奪喪也不可以輕之于已也同上居喪不言樂居喪者居父母之喪也曲禮聞樂不樂論語孔子曰衰麻苴杖者志不存乎樂非耳弗聞服使然也家語父有服宫中子不與於樂母有服聲聞焉不舉樂妻有服不舉樂於其側宫中子與父同宫者也禮由命士以上父子異宫不與于樂謂出行見之不得觀也大功將至辟琴瑟亦所以助哀也至来也小功至不絶樂雜記大司樂諸侯薨令去樂大臣死凡國之大憂令弛縣弛釋之若今休兵鼔之為春官天子哭諸侯為之不以樂食盖謂殯斂之間檀弓君於卿大夫比卒哭不舉樂為士比殯不舉樂雜記節哀順變也詳見喪禮義毁不滅性同上右哀戚孔子曰少連大連善居喪三日不怠三月不解期悲哀三年憂東夷之子也言其生于夷狄而知禮也怠惰也解倦也雜記顔丁善居喪顔丁魯人始死皇皇然如有求而弗得及殯望望然如有從而弗及既葬慨然如不及其反而息從隨也慨憊貌檀弓髙子臯之執親之喪也子臯孔子弟子名柴泣血三年言泣無聲如血出未嘗見齒言笑之微君子以為難言人不能然同上孟獻子禫縣而不樂比御而不入夫子曰獻子加於人一等矣詳見卒哭祔練祥禫記孔子既祥五日彈琴而不成聲十日而成笙歌同上衛定公卒夫人姜氏既哭而息見大子之不哀也不内酌飲歎曰是夫也將不唯衛國之敗其必始於未亡人定姜言獻公行無禮必從已始成十四年左氏傳立公子裯昭公名穆叔不欲曰是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患武子不聽卒立之比及葬三易衰哀衽如故哀言其嬉戲無度於是昭公十九年矣猶有童心君子是以知其不能終也為昭二十五年公孫于齊傳襄三十一年左氏傳九月葬齊歸公不戚晉士之送葬者歸以語史趙史趙曰不思親祖不歸也言不思親則不為祖考所歸祜叔向曰魯公室其卑矣君有大喪國不廢蒐謂蒐比蒲有三年之喪而無一日之慼國不恤喪不忌君也忌畏也君無慼容不顧親也國不忌君君不顧親能無卑乎殆其失國為二十五年公孫于齊傳昭十一年左氏傳衛石共子卒石買悼子不哀買之子石惡孔成子曰是謂蹷其本蹷猶拔也必不有其宗為二十八年石惡出奔傳襄十九年左氏傳孔子之故人曰原壤其母死夫子助之沐椁沐治也原壤登木曰久矣予之不託于音也木椁材也託寄也謂叩木以作音歌曰貍首之斑然執女手之卷然說人辭也夫子為弗聞也者而過之佯不知從者曰子未可以己乎己猶止也夫子曰丘聞之親者毋失其為親也故者毋失其為故也檀弓六月王大子夀卒秋八月王穆后崩大子夀之母也晉荀躒如周葬穆后籍談為介既葬除喪以文伯宴樽以魯壺文伯荀躒也魯壺魯所獻壺樽王曰伯氏諸侯皆有以鎮撫王室晉獨無有何也感魯壺而言也鎮撫王室謂貢獻之物籍談歸以告叔向叔向曰王其不終乎王一嵗而有三年之喪二焉天子絶期唯服三年故后雖期通謂之三年喪於是乎以喪賓宴又求彞器樂憂甚矣且非禮也三年之喪雖貴遂服禮也天子諸侯除喪須在卒哭今王既葬而除故譏其不遂王雖弗遂宴樂以早亦非禮也言今雖不能遂服猶當靜嘿而便宴樂又失禮也左昭十五年氏傳呉公子札自衛如晉宿于戚戚孫文子之邑聞鐘聲焉曰夫子獲罪于君以在此孫文子以戚畔懼猶不足而又何樂夫子之在此猶燕之巢於幕上言至危君又在殯而可以樂乎獻公卒未葬遂去之不止宿文子聞之終身不聽琴瑟聞義能改氏襄二十九年左傳知悼子卒未葬悼子晉大夫荀盈魯昭九年卒平公飲酒與羣臣宴平公晉侯彪師曠李調侍侍與君飲也燕禮記曰請旅侍臣鼓鐘樂作也燕禮賓入門奏肆夏既獻而樂闋獻君亦如之杜蕢自外来聞鐘聲曰安在怪之也杜蕢或作屠蒯曰在寢燕于寝杜蕢入寢厯階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出三酌皆罰平公呼而進之曰爾飲曠何也曰子卯不樂紂以甲子死桀以乙卯亡王者謂之疾日不以舉樂為吉事所以自戒懼知悼子在堂斯其為子卯也大矣言大臣喪重于疾日也雜記曰君于卿大夫比葬不食肉比卒哭不舉樂曠也大師也不以詔是以飲之也詔告也大師典奏樂爾飲調何也曰調也君之䙝臣也為一飲一食㤀君之疾是以飲之也言調貪酒食䙝嬖也近臣亦當規君疾憂爾飲何也曰蕢也宰夫也非刀七是共又敢與知防是以飲之也防禁放溢平公曰寡人亦有過焉酌而飲寡人聞義則復杜蕢洗而揚觶舉爵于君也禮揚作騰揚舉也騰送也揚近得之公謂侍者曰如我死則必毋廢斯爵也欲後世以為戒至于今既畢獻斯揚觶謂之杜舉此爵遂因杜蕢為名畢獻獻賓與君檀弓昭公十五年二月癸酉有事于武宫籥入叔弓卒去樂卒事君在祭樂之中聞大夫之喪則去樂卒事禮也祭樂者君在廟中祭作樂君在祭樂之中大夫有變以聞可乎變謂死喪大夫國體也君之卿佐是謂股肱故曰國體古之人重死君命無所不通死者不可復生重莫大焉是以君雖在祭樂之中大夫死以聞可也穀梁傳襄公三十一年公薨于楚宫立胡女敬歸之子子野胡歸姓之國敬歸襄公妾次于季氏秋九月癸巳卒毁也過哀毁瘠以致滅性左氏傳居倚廬哭晝夜無時既虞朝一哭夕一哭而已既練哭無時詳見喪服斬衰傳父母之喪哭無時使必知其反也謂既練或時為君服金革之事反必有祭檀弓斬衰之哭若往而不反齊衰之哭若往而反大功之喪三曲而偯小功緦麻哀容可也此哀之發于聲音者也三曲一舉聲而三折也偯聲餘從容也間傳曽申問于曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有嬰猶鷖彌也言其若小兒亡母啼號安得常聲乎所謂哭不偯雜記無事不辟廟門鬼神尚幽闇也廟殯宫哭皆于其次無時哭也有事則入即位記小童子哭不偯不踊不杖不菲不廬未成人者不得備禮也當室則杖雜記祥而外無哭者禫而内無哭者詳見卒哭祔練祥禫記國禁哭則止朝夕之奠即位自因也禁哭謂大祭祀時不哭猶朝夕奠自因自用故事雜記祭之日喪者不哭郊特牲孔子惡野哭者為其變衆周禮銜枚氏掌禁野呌呼歎嗚于國中者行歌哭于國中之道者檀弓公七踊大夫五踊婦人居間士三踊婦人皆居間公君也始死及小斂大斂而踊君大夫士一也則皆三踊矣君五日而殯大夫三日而殯士二日而殯士小斂之朝不踊君大夫大斂之朝乃不踊婦人居間者踊必拾主人踊婦人踊賓乃踊雜記士備入而後朝夕踊備禮盡也國君之喪嫌主人哭入則踊檀弓孔子曰伯母叔母疏衰踊不絶地姑姊妹之大功踊絶於地如知此者由文矣哉由文矣哉由用也言如此踊絶地不絶地之情者能用禮文哉能用禮文哉美之也伯母叔母義也姑姊妹骨肉也雜記戚斯嘆嘆斯辟辟斯踊矣品節斯斯之謂禮詳見喪禮義跛者不踊詳見喪服義右哭踊弁人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也夫禮為可傳也為可繼也故哭踊有節詳見喪禮義子蒲卒哭者呼滅滅盖子蒲名子臯曰若是野哉非之也唯復呼名子臯孔子弟子髙柴哭者改之檀弓伯魚之母死期而猶哭伯魚孔子子也名鯉猶尚也夫子聞之曰誰與哭者門人曰鯉也夫子曰嘻其甚也嘻悲恨之聲伯魚聞之遂除之同上穆伯之喪敬姜晝哭文伯之喪晝夜哭孔子曰知禮矣喪夫不夜哭嫌思情性也同上文伯之喪敬姜據其牀而不哭曰昔者吾有斯子也吾以將為賢人也盖見其有才藝吾未嘗以就公室未嘗與到公室觀其行也季氏魯之宗卿敬姜有㑹見之禮今及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠于禮矣夫内人妻妾同上華周杞梁之妻善哭其夫而變國俗孟子保氏養國子以道教六儀四曰喪紀之容鄭司農云喪紀之容涕涕翔翔𤣥謂喪紀之容纍纍顛顛地官斬衰貌若苴齊衰貌若枲大功貌若止小功緦麻容貌可也此哀之發于容聲者也有大憂者面必深黑止謂不動于喜樂之事枲或為似間傳喪容纍纍羸憊貌也色容顛顛憂思貌也視容瞿瞿梅梅不審貌也言容繭繭聲氣微也玉藻君子衰絰則有哀色表記喪紀之志漻然憂以愀喪紀之容怮然懾然若不還喪紀之視下㳅垂綱賈誼容經喪事欲其縱縱爾趨事貌縱讀如總領之總吉事欲其折折爾安舒貌詩云好人提提故喪事雖遽不陵節吉事雖止不怠陵躐也止立俟事時也怠惰也故騷騷爾則野謂大疾鼎鼎爾則小人謂大舒君子盖猶猶爾疾舒之中檀弓居喪之禮毁瘠不形視聽不衰為其廢喪事形謂骨見曲禮視不明聽不聰行不正不知哀君子病之詳見飲食章孔子曰身有瘍則浴首有創則沐病則飲酒食肉毁瘠為病君子弗為也毁而死君子謂之無子毁而死是不重親雜記子貢問喪子曰敬為上哀次之瘠為下顔色稱其情戚容稱其服問喪問居父母之喪也喪尚哀言敬為上者疾時尚不能敬也容威儀也孝經曰容止可觀同上毁不危身詳見喪禮義毁不㓕性同上五十不致毁六十不毁詳見飲食章三月而沐詳見喪服義凡喪小功以上非虞祔練祥無沐浴詳見士虞禮妻視叔父母姑姊妹視兄弟長中下殤視成人視猶比也所比者哀容居處也記雜右容貌大祝辨九拜五曰吉拜六曰凶拜吉拜拜而後稽顙謂齊衰不杖以下者言吉者此殷之凶拜周以其拜與頓首相近故謂之吉拜凶拜稽顙而後拜謂三年服者春官為父母長子稽顙喪尊者及正體不敢不盡禮大夫弔之雖緦必稽顙尊大夫不敢以輕待之婦人為夫與長子稽顙其餘則否恩殺于父母小記為妻父母在不杖不稽顙尊者在不敢盡于私喪也母在不稽顙稽顙者其贈也拜言獨母在于贈拜得稽顙則父在贈拜不得稽顙雜記婦人吉事雖有君賜肅拜為尸坐則不手拜肅拜為喪主則不手拜肅拜拜低頭也手拜手至地也婦人以肅拜為正凶事乃手拜耳為尸為祖姑之尸也士虞禮曰男男尸女女尸為喪主不手拜者為夫與長子當稽顙也其餘亦手拜而已雖或為唯或曰喪為主則不手拜肅拜也少儀非為人喪問與賜與此上滅脫未聞其首云何三年之喪以其喪拜非三年之喪以吉拜謂受問受賜者也稽顙而後拜曰喪拜拜而後稽顙曰吉拜雜記孔子曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也三年之喪吾從其至者詳見喪禮義右拜拱秦穆公使人弔公子重耳重耳稽顙而不拜穆公曰稽顙而不拜則未為後也故不成拜詳見奔喪孔子與門人立拱而尚右二三子亦皆尚右傚孔子也孔子曰二三子之嗜學也嗜貪我則有姊之喪故也二三子皆尚左復正也喪尚右右陰也吉尚左左陽也檀弓斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂此哀之發于言語者也議謂陳說非時事也間傳三年之喪言而不語對而不問言言己事也為人説為語雜記父母之喪寢苫枕塊非喪事不言既葬與人立君言王事不言國事大夫士言公事不言家事既練君謀國政大夫謀家事此常禮也喪大記言容繭詳見容貌章言若不足喪紀之言也賈誼容經居喪不言樂非其時也曲禮子張問曰書云髙宗三年不言言乃讙有諸時人君無行三年之喪禮者問有此與怪之也讙喜說也言乃喜說則臣民望其言乆仲尼曰胡為其不然也古者天子崩王世子聽于冡宰三年冡宰天官卿貮王事者三年之喪使之聽朝弓檀三年之喪君不言書云髙宗諒闇三年不言此之謂也然而曰言不文者謂臣下也詳見喪服義百官備百物具不言而事行者扶而起言而後事行者杖而起身自執事而後行者面垢而已同上子夏問于孔子曰居君之母與妻之喪如之何孔子曰居處言語飲食衎爾於喪所則稱其服而已家語右言語斬衰蕳屨杖而歠粥者志不在于飲食大戴禮歠粥朝一溢米夕一溢米既虞疏食水飲既練始食菜果飯素食詳見喪服斬衰章斬衰三日不食齊衰二日不食大功三不食小功緦麻再不食士與斂焉則一不食故父母之喪既殯食粥朝一溢米莫一溢米齊衰之喪疏食水飲不食菜果大功之喪不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也父母之喪既虞卒哭疏食水飲不食菜果期而小祥食菜果又期而大祥有醯醤中月而禫禫而飲醴酒始飲酒者先飲醴酒始食肉者先食乾肉先飲醴酒食乾肉者不忍發御厚味間傳三日而食詳見喪服義功衰食菜果飲水漿無鹽酪不能食食鹽酪可也功衰斬衰之末也酪酢酨雜記膳夫王日一舉大喪則不舉天官君之喪子大夫公子衆士皆三日不食子大夫公子衆士食粥納財朝一溢米莫一溢米食之無算士疏食水飲食之無算夫人世婦諸妻皆疏食水飲食之無算納財謂食穀也二十兩曰溢于粟米之法一溢為米一升二十四分升之一諸妻御妾也同言無算則是皆一溢米或粥或飯大夫之喪主人室老子姓皆食粥衆士疏食水飲妻妾疏食水飲室老其貴臣也衆士所謂衆臣士亦如之如其子食粥妻妾疏食水飲既葬主人疏食水飲不食菜果婦人亦如之君大夫士一也練而食菜果祥而食肉果𤓰桃之屬食粥於盛不盥食於篹者盥食菜以醯醤始食肉者先食乾肉始飲酒者先飲醴酒盛謂今時杯杅也篹竹筥也歠者不盥手飯者盥篹或作簨期之喪三不食食疏食水飲不食菜果三月既葬食肉飲酒期終喪不食肉不飲酒父在為母為妻九月之喪食飲猶期之喪也食肉飲酒不與人樂之食肉飲酒亦謂既葬五月三月之喪壹不食再不食可也比葬食肉飲酒不與人樂之叔母世母故主宗子食肉飲酒義服恩輕也故主謂舊君也主故主者闗大夫及君也不能食肉羮之以菜可也謂性不能者可食飯菜羮有疾食肉飲酒可也為其氣微五十不成喪成猶備也所不能備謂不致毁不散送之屬也七十唯衰麻在身言其餘居處飲食與吉時同也喪大記居喪之禮頭有創則沐身有瘍則浴有疾則飲酒食肉疾止復初不勝喪乃比於不慈不孝勝任也五十不致毁六十不毁七十唯衰麻在身飲酒食肉處于内所以養衰老人五十始衰也曲禮喪食唯惡必充饑饑而廢事非禮也飽而忘哀亦非禮也視不明聽不聰行不正不知哀君子病之故有病飲酒食肉五十不致毁六十不毁七十飲酒食肉皆為疑死病猶憂也疑猶恐也雜記曽子曰喪有疾食肉飲酒必有草木之滋焉増以香味為其疾不嗜食以為薑桂之謂也為記者正曽子所云草木之滋者謂薑桂檀弓既葬若君食之則食之大夫父之友食之則食之矣不辟粱肉若有酒醴則辭尊者之前可以食美也變于顔色亦不可喪大記有服人召之食不往大功以下既葬適人人食之其黨也食之非其黨弗食也往而見食則可食也為食而往則不可黨猶親也非親而食則食于人無數也雜記三年之喪如或遺之酒肉則受之必三辭主人衰絰而受之受之必正服明不苟于滋味如君命則不敢辭受而薦之薦于廟貴君之禮喪者不遺人人遺之雖酒肉受也從父昆弟以下既卒哭遺人可也言齊斬之喪重志不在施恵于人同上視君之母與妻比諸兄弟發諸顔色者亦不飲食也言小君服輕亦内除也發于顔色謂醲美飲食使人醉飽同上居君之母與妻之喪飲食衎爾詳見言語章君於卿大夫葬不食肉雜記右飲食曽子謂子思曰伋吾執親之喪也水漿不入於口者七日言己以疾時禮之不如子思曰先王之制禮也過之者俯而就之不至焉者跂而及之故君子之執親之喪也水漿不入於口者三日杖而後能起為曽子言難繼以禮抑之檀弓樂正子春之母死五日而不食曰吾悔之勉强過禮子春曽子弟子自吾母而不得吾情吾惡乎用吾情惡乎猶於何也同上悼公之喪季昭子問於孟敬子曰為君何食悼公魯哀公之子昭子康子之曽孫名强敬子武伯之子名捷敬子曰食粥天下之達禮也吾三臣者之不能居公室也四方莫不聞矣言鄰國皆知吾等不能居公室以臣禮事君也三臣仲孫叔孫季孫氏勉而為瘠則吾能毋乃使人疑夫不以情居瘠者乎哉我則食食傷時不盡忠喪又不盡禮非也孔子曰喪事不敢不勉同上三月鄭簡公卒夏齊侯衛侯鄭伯如晉朝嗣君也晉昭公新立晉侯享諸侯子産鄭伯辭於享請免喪而後聽命簡公未葬晉人許之禮也善晉不奪孝子之情昭十二年左氏傳宫正大喪則授廬舍辨其親疏貴賤之居詳見喪大記射人比其廬不敬者苛罰之苛謂詰問之夏官哭皆於其次詳見哭踊章居倚廬寢苫枕塊既虞翦屏拄楣寢有席既練舍外寢詳見喪服斬衰傳童子不廬詳見哭踊章父母之喪居倚廬寢苫枕塊不說絰帶齊衰之喪居堊室芐剪不納大功之喪寢有席小功緦麻牀可也此哀之發於居處者也父母之喪既虞卒哭拄楣翦屏芐剪不納期而小祥居堊室寢有席又期而大祥居復寝中月而禫禫而牀芐若今之蒲苹也間傳三年之喪廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門在堊室之中以時事見乎母乃復入門則居廬時不入門疏衰皆居堊室不廬廬嚴者也言廬哀敬之處非有其實則不居雜記父母之喪居倚廬不塗寢苫枕凷非喪事不言君為廬宫之大夫士襢之宫謂圍障之也襢袒也謂不障既葬拄楣塗廬不於顯者君大夫士皆宫之不於顯者不塗見面凡非適子者自未葬以於隠者為廬不欲人屬目盖廬于東南角既葬猶然既練居堊室不與人居既祥黝堊黝堊堊室之飾也地謂之黝牆謂之堊禫而從御吉祭而復寢從御御婦人也復寝不復宿殯宫也期居廬終喪不御於内者父在為母為妻齊衰期者大功布衰九月者皆三月不御於内婦人不居廬不寢苫喪父母既練而歸期九月者既葬而歸歸謂歸夫家也公之喪大夫俟練士卒哭而歸此公公士大夫有地者也其大夫士歸者謂素在君所食都邑之臣大夫士父母之喪既練而歸朔月忌日則歸哭於宗室諸父兄弟之喪既卒哭而歸歸謂歸其宫也忌日死日也宗室宗子之家謂殯宫也禮命士以上父子異宫父不次於子兄不次於弟謂不就其殯宫為次而居喪大記父不為衆子次於外于庶子略自若居寝小記大夫次於公館以終喪士練而歸士次於公館公館公宫之舍也練而歸之士謂邑宰也練而猶處公館朝廷之士也唯大夫三年無歸也大夫居廬士居堊室謂未練時也士居堊室亦謂邑宰也朝廷之士亦居廬雜記有憂者側席而坐側猶特也憂不在接人不布他面席有喪者専席而坐降居處也専猶單也曲禮夫晝居於内問其疾可也似有疾夜居於外弔之可也似有喪是故君子非有大故不宿於外大故謂喪憂非致齊也非疾也不晝夜居於内内正寝之中弓檀居君之母與妻之喪居處衎爾詳見言語章右居處居喪之禮升降不由阼階出入不當門隧常若親存隧道也曲禮齊衰不以邉坐大功不以服勤為䙝喪服邉偏倚也檀弓居喪未葬讀喪禮既葬讀祭禮喪復常讀樂章為禮各于其時曲禮大功廢業或曰大功誦可也許其口習故也檀弓男女非祭非喪不相授器祭嚴喪遽不嫌也内則疏衰之喪既葬人請見之則見不請見人小功請見人可也大功不以執摯唯父母之喪不辟涕泣而見人言重喪不行求見人爾人来求見已亦可以見之矣不辟涕泣言至哀無飾也雜記既練君謀國政大夫士謀家事練後漸輕故得自謀已國家事也喪大記君既葬王政入於國既卒哭而服王事大夫士既葬公政入於家既卒哭弁絰帶金革之事無辟也此權禮也弁絰帶者變喪服而弔服輕可以即事也同上父母之喪使必知其反也詳見哭踊章庶人喪不貳事貮之言二也庶人終事無二事不使從政也喪大記曰大夫士既葬公政入于家既卒哭弁絰帶金革之事無辟也王制父母之喪三年不從政齊衰大功之喪三月不從政同上三年之喪祥而從政期之喪卒哭而從政九月之喪既葬而從政小功緦之喪既殯而從政以王制言之此謂庶人也從政從為政者教令謂給繇役雜記右動作僖公九年公㑹齊侯宋子衛侯鄭伯許男曹伯于葵丘宋其稱子何也未葬之辭也禮柩在堂上孤無外事今背殯而出㑹以宋子為無哀矣櫕木如椁塗之曰殯殷人殯于兩楹之間周人殯于西階之上宋殷後也穀梁傳文公十六年秋八月夫人姜氏薨僖公夫人毁泉臺喪不貮事貮事緩喪也喪事主哀而復毁泉臺是以喪為緩同上昭公十一年五月齊歸薨大蒐于比蒲非禮也孟僖子㑹邾莊公盟于祲祥脩好禮也蒐非存亡之由故臨喪不宜為之盟㑹以安社稷故喪盟謂之禮左氏傳子夏曰金革之事無辟也者非與孔子曰吾聞諸老耼曰昔者魯公伯禽有為為之也詳見喪禮義子墨衰絰敗秦師于殽詳見變除古者臣有大喪則君三年不呼其門已練可以弁冕服金革之事君使之非也臣行之禮也閔子要絰而服事既而曰若此乎古之道不即人心退而致仕孔子盖善之也詳見變除禮書綱目卷二十九
