body:
  text: 禮書綱目卷十八婺源江永撰喪禮㓙禮一經鄭目録云天子以下死而相喪衣服年月親疎隆殺之禮不忍言死而言喪喪者棄亡之辭若全存居於彼焉已亡之耳喪服於五禮屬㓙子夏傳疏曰傳者不知是誰人所作人皆云孔子弟子卜商字子夏所為按公羊傳是公羊髙所為公羊髙是子夏弟子今案公羊傳有云者何何以曷為孰為之等今此傳亦有之必為子夏作也其傳内更云傳者是子夏引他舊傳以證已義喪服右篇目小宗伯辨吉㓙之服五服王及公卿大夫士之服春官斬衰裳苴絰杖絞帶冠繩纓菅屨者者者明為下出也凡服上曰衰下曰裳麻在首在腰皆曰絰絰之言實也明孝子有忠實之心故為制此服焉首絰象緇布冠之缺項腰絰象大帶又有絞帶象苹帶齊衰以下用布傳曰斬者何不緝也苴絰者麻之有蕡者也苴絰大搹左本在下去五分一以為帶齊衰之絰斬衰之帶也去五分一以為帶大功之絰齊衰之帶也去五分一以為帶小功之絰大功之帶也去五分一以為帶緦麻之絰小功之帶也去五分一以為帶苴杖竹也削杖桐也杖各齊其心皆下本杖者何爵也無爵而杖者何擔主也非主而杖者何輔病也童子何以不杖不能病也婦人何以不杖亦不能病也盈手曰搹搹抗也中人之㧖圍九寸以五分一為殺者象五服之數也爵謂天子諸侯卿大夫士也無爵謂庶人也擔猶假也無爵者假之以杖尊其為主也非主謂衆子也絞帶者繩帶也冠繩纓條屬右縫冠六升外畢鍜而勿灰衰三升菅屨者菅菲也外納屬猶著也通屈一條繩為武垂下為纓著之冠也布八十縷為升升字當為登登成也今之禮皆以登為升俗誤己行久矣雜記曰喪冠條屬以别吉凶三年之練冠亦條屬右縫小功以下左縫外畢者冠前後屈而出縫于武也居倚廬寢苫枕塊哭晝夜無時歠粥朝一溢米夕一溢米寢不脱絰帶既虞剪屏拄楣寝有席疏食水飲朝一哭夕一哭而已既練舍外寝始食菜果飯素食哭無時二十四兩曰溢為米一升二十四分升之一楣謂之梁拄楣所謂梁闇舍外寝于中門之外屋下壘墼為之不塗塈所謂堊室也素猶故也謂復平生時食也斬衰不書受月者天子諸侯卿大夫既虞卒哭異數三年之喪二十五月而畢詳見喪服義三年之喪達乎天子父母之喪無貴賤一也中庸父傳曰為父何以斬衰父至尊也記事親有隠而無犯隠謂不稱揚其過失也無犯不犯顔而諫論語曰事父母幾諫左右就養無方左右謂扶持之方猶常也子則然無常人服勤至死致喪三年勤勞辱之事也致謂戚容稱其服也凡此以恩為制卒檀弓通本章為人後者齊衰三年章父為母用父母之喪無貴賤一也詳見上又本章為人後者齊衰三年章父卒為母齊衰杖期章父在為母通用大夫為其父母兄弟之未為大夫者之喪服如士服士為其父母兄弟之為大夫者之喪服如士服大夫雖尊不以其服服父母兄弟嫌若踚之也士謂大夫庶子為士者也已卑又不敢服尊者之服今大夫喪禮逸與士異者未得而備聞也春秋傳曰齊晏桓子卒晏嬰麄衰斬苴絰帶杖菅履食粥居倚廬寢苫枕草其老曰非大夫禮也曰唯卿為大夫此平仲之謙也言已非大夫故為父服士服耳麤衰斬者其縷在齊斬之間謂縷如三升半而三升不緝也斬衰以三升為正微細則屬于麤也然則士與大夫為父服異者有麤衰斬枕草矣其為母五升縷而四升為兄弟六升縷而五升乎唯大夫以上乃能備儀盡餙士以下則以臣服君之斬衰為其父以臣从君而服之齊衰為其母與兄弟亦以勉人為髙行也大夫以下大夫士服同大夫之適子服大夫之服仕至大夫賢著而徳成適子得服其服亦尊其適象賢大夫之庶子為大夫則為其父母服大夫服其位與未為大夫者齒雖庻子得服其服尚徳也使齒于士不可不宗適雜記母本章為人後者齊衰三年章父卒為齊衰杖期章父在為母通用大夫降其庶子其孫不降其父祖不厭孫也大夫為庶子大功喪服小記齊晏桓子卒晏嬰麤縗斬斬不緝之也縗在胸前麤三升布苴絰帶杖菅屨以苴為絰及帶杖竹杖也禮記云苴杖竹也食鬻居倚廬寢苫枕草此禮與士喪禮略同其異唯枕草耳然枕草亦非喪服正文其老曰非大夫之禮也時之所行士及大夫衰服各有不同晏子為大夫而行士禮其家臣不解故語之曰唯卿為大夫晏子惡直已以斥時失禮故孫辭略答家老哀十七年左氏傳諸侯為天子傳曰天子至尊也記方喪三年詳見君條君為天子三年夫人如外宗之為君也外宗君外親之婦也其夫與諸侯為兄弟服斬妻從服期諸侯為天子服斬夫人亦從服期喪大記曰外宗中南面世子不為天子服逺嫌也不服與畿外之民同也服問司服凡喪為天王斬衰疏曰云凡喪者諸侯諸臣皆為天王斬衰春官君傳曰君至尊也天子諸侯及卿大夫有地者皆曰君事君有犯而無隠既諫人有問其國政者可以語其得失若齊晏子為晉叔向言之左右就養有方不可侵官服勤至死方䘮三年方䘮資于事父凡此以義為制檀弓公之䘮諸達官之長杖謂君所命雖有官職不達于君則不服斬同上與諸侯為兄弟者服斬諸卿大夫以下也與尊者為親不敢以輕服服之言諸侯者明雖在異國猶來為三年也小記大夫之適子為君夫人大子如士服大夫不世子不嫌也士為國君斬小君期大子君服斬臣从服期服問外宗為君夫人猶内宗也皆謂嫁于國中者也為君服斬夫人齊衰不敢以其親服服至尊也外宗謂姑姊妹之女舅之女及从母皆是也内宗五屬之女也其無服而嫁于諸臣者从為夫之君嫁于庶人者从為國君章雜記為不杖朝章為夫之君齊衰三月庶人國君通用父為長子不言嫡子通上下也亦言立嫡以上傳曰何以三年也正體于上又乃將所傳重也庶子不得為長子三年不繼祖也此言為父後者然後為長子三年重其當先祖之正體又以其將代已為宗廟主也庻子為父後者之弟言庶者逺別之也小記曰不繼祖與禰此但言祖不言禰容祖禰共廟記庶子不為長子斬不繼祖與禰也詳見䘮服義又大傳庶子不得為長子三年一條亦同為人後者傳曰何以三年也受重者必以尊服服之何如而可為之後同宗則可為之後何如而可以為人後支子可也為所後者之祖父母妻妻之父母昆弟昆弟之子若子若子者為所為後之親如親子記於所為後之兄弟之子若子本經記為人後者為之子詳見䘮通禮主後章父條致䘮三年父母之䘮無貴賤一也大夫為其父母並此條通用當互考為殤後者以其服服之言為後者據承之也殤無為人父之道以本親之服服之小記孔子曰宗子為殤而死庶子弗為後也族人以其倫代之明不序昭穆立之廟其祭之就其祖而巳代之者主其禮曽子問妻為夫傳曰夫至尊也記婦人不為主而杖者姑在為夫杖姑不厭婦小記妾為君傳曰君至尊也妾謂夫為君者不得體之加尊也雖士亦然女子子在室為父女子子者子女也别于男子也言在室者闗已許嫁布總箭笄髽衰三年此妻妾女子子䘮服之異于男子者總束髪謂之總者既束其本又總其末箭笄篠竹髽露紒也猶男子之括髮斬衰栝髮以麻則髽亦用麻也以麻者自項而前交于額上郤繞紒如著幓頭焉小記曰男子冠而婦人笄男子免而婦人髽凡服上曰衰下曰裳此但言衰不言裳婦人不殊裳衰如男子衰下如深衣深衣則衰無帶下又無衽傳曰總六升長六寸箭笄長尺吉笄尺二寸總六升者首飾象冠數長六寸謂出紒後所垂為飾也記女子子在室為父母其主䘮者不杖則子一人杖女子子在室亦童子也無男昆弟使同姓為攝主不杖則子一人杖謂長女也許嫁及二十而笄笄為成人成人正杖也小記齊衰三年章父卒為母齊衰杖期章父在為母通用子嫁反在父之室為父三年謂遭䘮後而出者始服齊衰期出而虞則受以三年之䘮受既虞而出則小祥亦如之既除䘮而出則已凡女行於大夫以上曰嫁行于士庶人曰適人記為父母䘮未練而出則三年既練而出則已未練而反則期既練而反則遂之小記卒齊衰三年章父為母通用公士大夫之衆臣為其君布帶繩屨士卿士也公卿大夫厭于天子諸侯故降其衆臣布帶繩屨貴臣得伸不奪其正傳曰公卿大夫室老士貴臣其餘皆衆臣也君謂有地者也衆臣杖不以即位近臣君服斯服矣繩屨者繩菲也室老家相也士邑宰也近臣閽寺之屬君嗣君也斯此也近臣从君喪服無所降也繩菲今時不借也右斬衰三年疏衰裳齊牡麻絰冠布纓削杖布帶疏屨三年者疏猶麤也傳曰齊者何緝也牡麻者枲麻也牡麻絰右本在上冠者沽功也疏屨者藨蒯之菲也沽猶粗也冠尊加其麤麤功大功也齊衰之絰斬衰之帶也去五分一以為帶見斬衰章削杖桐也同上父卒則為母尊得伸也記穆公之母卒穆公魯哀公之曽孫使人問于曽子曰如之何問居喪之禮曽子曽參之子名申對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子逹子喪父母尊卑同檀弓齊衰杖期章父在為母通用繼母如母傳曰繼母何以如母繼母之配父與因母同故孝子不敢殊也因猶親也慈母如母傳曰慈母者何也傳曰妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母若是則生養之終其身慈母死則喪之三年如母貴父之命也此主謂大夫士之妾妾子之無母父命為母子者其使養之不命為母子則亦服庶母慈已者之服可也大夫之妾子父在為母大功則士之妾子為母期矣父卒則皆得伸也記為慈母後者為庶母可也為祖庶母可也謂父命之為子母者也即庶子為後此皆子也傳重而已不先命之與適妻使為母子也緣為慈母後之義父之妾無子者亦可命已庶子為後小記子㳺問曰喪慈母如母禮與如母謂父卒三年也子㳺意以為國君亦當然禮所云者乃大夫以下父所使妾養妾子孔子曰非禮也古者男子外有傅内有慈母君命所使教子也何服之有言無服也此指諸國君之子也大夫士之子為庶母慈已者服小功父卒乃不服昔者魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服據國君也良善也謂之慈母固謂之善國君之妾子于禮不服也昭公年三十乃喪齊歸猶無慼容是不少孤又安能不忍于慈母此非昭公明矣未知何公也今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以遺後世無乃不可乎公曰古者天子練冠以燕居公弗忍也遂練冠以喪慈母喪慈母自魯昭公始也公之言又非也天子練冠以燕居蓋謂庻子王為其母曽子問母為長子傳曰何以三年也父之所不降母亦不敢降也不敢降者不敢以已尊降祖禰之正體記母為長子削杖嫌服男子當杖竹也母為長子服不可重于子為已也小記妾為君之長子與女君同不敢以恩輕輕服君之正統同上妾為女君君之長子惡笄有首布總本經記妾從女君而出則不為女君之子服妾為女君之黨服得與女君同而今俱出女君猶為子期妾于義絶無施服小記右齊衰三年疏衰裳齊牡麻絰冠布纓削杖布帶疏屨期者傳曰問者曰何冠也曰齊衰大功冠其受也緦麻小功冠其衰也帶縁各視其冠問之者見斬衰有三其冠同今齊衰有四章不知其冠之異同爾縁如深衣之縁今文無冠布纓父在為母傳曰何以期也屈也至尊在不敢伸其私尊也父必三年然後娶達子之志也貴斬衰父條父母之喪無賤一也大夫為其父母為人後者條為所後者之妻若子女子子在室為父條為父母主喪者不杖則子一人杖齊衰三年章穆公之母卒並此條通用當互考記公子為其母練冠麻麻衣縓縁為其妻縓冠葛絰帶麻衣縓縁皆既葬除之公子君之庶子也其或為母謂妾子也麻者緦麻之絰帶也此麻衣者如小功布深衣為不制衰裳變也詩云麻衣如雪縓淺絳也一染謂之縓練冠而麻衣縓縁三年練之受飾也檀弓曰練練衣黄裏縓縁諸侯之妾子厭于父為母不得伸權為制此服不奪其恩也為妻縓冠葛絰帶妻輕傳曰何以不在五服之中也君之所不服子亦不敢服也君之所為服子亦不敢不服也君之所不服謂妾與庶婦也君之所為服謂夫人與適婦也諸侯之妾貴者視卿賤者視大夫皆三月而葬本經記王子有其母死者其傅為之請數月之喪公孫丑曰若此者何如也曰是欲終之而不可得也雖加一日愈于已謂夫莫之禁而弗為者也詳見喪服義妻傳曰為妻何以期也妻至親也適子父在則為妻不杖以父為之主也服問曰君所主夫人妻大子適婦父在子為妻以杖即位謂庶子記為妻父母在不杖尊者在不敢盡禮于私喪也詳見喪通禮拜拱章世子不降妻之父母其為妻也與大夫之適子同見不杖期章大夫之適子為妻條公子為其妻縓冠葛絰帶麻衣縓縁既葬除之詳見上條出妻之子為母出猶去也傳曰出妻之子為母期則為外祖父母無服傳曰絶族無施服親者屬在旁而及曰施親者屬母子至親無絶道出妻之子為父後者則為出母無服傳曰與尊者為一體不敢服其私親也記為父後者為出母無服不敢以已私廢父所傳重之祭祀小記孔氏之不喪出母自子思始也詳見喪服義父卒繼母嫁從為之服報傳曰何以期也貴終也嘗為母子貴終其思右齊衰杖期不杖麻屨者此亦齊衰言其異于上記期之喪達乎大夫期之喪達乎大夫者謂旁親所降在大功者其正統之期天子諸侯猶不降也大夫所降天子諸侯絶之不為服所不臣乃服之也中庸祖父母傳曰何以期也至尊也記父卒然後為祖父後者服斬詳見本章為君之祖父母條祖父卒而后為祖母後者三年祖父在則其服如父在為母也小記世父母叔父母傳曰世父叔父何以期也與尊者一體也然則昆弟之子何以亦期也旁尊也不足以加尊焉故報之也父子一體也夫妻一體也昆弟一體也故父子首足也夫妻牉合也昆弟四體也故昆弟之義無分然而有分者則辟子之私也子不私其父則不成為子故有東宫有西宫有南宫有北宫異居而同財有餘則歸之宗不足則資之宗世母叔母何以亦期也以名服也宗者世父為小宗典宗事者也資取也為姑在室亦如之為人後者為所後者之昆弟若子詳見斬衰章為人後者條記縣子瑣曰吾聞之古者不降上下各以其親古謂殷時也上不降逺下不降卑滕伯文為孟虎齊衰其叔父也為孟皮齊衰其叔父也伯文殷時滕君也爵為伯名文檀弓大夫之適子為妻傳曰何以期也父之所不降子亦不敢降也何以不杖也父在則為妻不杖大夫不以尊降適婦者重適也凡不降者謂如其親服服之降有四品君大夫以尊降公子大夫之子以厭降公之昆弟以旁尊降為人後者女子子嫁者以出降記世子不降妻之父母其為妻也與大夫之適子同世子天子諸侯之適子也不降妻之父母為妻故親之也為妻亦齊衰不杖者君為之主子不得伸也主言與大夫之適子同據喪服之成文也本所以正見父在為妻不杖于大夫適子者明大夫以上雖尊猶為適婦為主小記昆弟昆兄也為姊妹在室亦如之記大夫為其兄弟之未為大夫者士為其兄弟之為大夫者如士服詳見斬衰父條成人有其兄死而不為衰者聞子臯將為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰嗤兄死者言其衰之不為兄死如蟹有匡蟬有緌不為蠶之績范之冠也范蜂也蟬蜩也緌為蜩喙長在腹下檀弓為衆子衆子者長子之弟及妾子女子在室亦如之士謂之衆子未能逺别也大夫則謂之庶子降之為大功天子國君不服之内則曰冢子未食而見必執其手適子庶子已食而見必循其首記大夫降其庶子詳見斬衰章父條昆弟之子傳曰何以期也報之也檀弓曰喪服兄弟之子猶子也蓋引而進之記喪服兄弟之子猶子也詳見喪服義古者不降滕伯文為孟皮齊衰其叔父也詳見上世父母叔父母條大夫之庶子為適昆弟兩言之者適子或為兄或為弟傳曰何以期也父之所不降子亦不敢降也大夫雖尊不敢降其適重之也適子為庶昆弟庶兄弟相為亦如大夫為之適孫傳曰何以期也不敢降其適也有適子者無適孫孫婦亦如之周之道適子死則立適孫是適孫將上為祖後者也長子在則皆為庶孫耳孫婦亦如之適婦在亦如庶孫之婦凡父于將為後者非長子皆期也為人後者為其父母報傳曰何以期也不貳斬也何以不貳斬也特重于大宗者降其小宗也為人後者孰後後大宗也曷為後大宗大宗者尊之統也禽獸知母而不知父野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其大祖天子及其始祖之所自出尊者尊統上卑者尊統下大宗者尊之統也大宗者收族者也不可以絶故族人以支子後大宗也適子不得後大宗都邑之士則知尊禰近政化也大祖始封之君始祖者咸神靈而生若稷契也自由也及始祖之所由出謂祭天也上猶逺也下猶近也收族者謂别親疎序昭穆大傳曰繼之以姓而弗别綴之以食而弗殊雖百世昏姻不通者周道然也記夫為人後者其妻為舅姑大功不二降小記女子子適人者為其父母昆弟之為父後者傳曰為父何以期也婦人不貳斬也婦人不貳斬者何也婦人有三從之義無專用之道故未嫁從父既嫁從夫夫死從子故父者子之天也夫者妻之天也婦人不貳斬者猶曰不貳天也婦人不能二尊也為昆弟之為父後者何以亦期也婦人雖在外必有歸宗曰小宗故服期也从者从其教令歸宗者父雖卒猶自歸宗其為父後特重者不自絶于其族類也曰小宗者言是乃小宗也小宗明非一也小宗四丈夫婦人之為小宗各如其親之服辟大宗記女子子適人者為其父母婦為舅姑惡笄有首以髽卒哭子折笄首以笄布總言以髽則髽有著笄者明矣傳曰笄有首者惡笄之有首也惡笄者櫛笄也折笄首者折吉笄之首也吉笄者象笄也何以言子折笄首而不言婦終之也櫛笄者以櫛之木為笄或曰榛笄有首者若今時刻鏤摘頭矣卒哭而喪之大事畢女子子可以歸于夫家而著吉笄折其首者為其大飾也吉笄尊變其尊者婦人之義也據在夫家宜言婦終之者終子道于父母之恩女君死則妾為女君之黨服攝女君則不為先女君之黨服妾于女君之親若其親然雜記之後凡女君黨通用繼父同居者傳曰何以期也傳曰夫死妻穉子㓜子無大功之親與之適人而所適者亦無大功之親所適者以其貨財為之築宫廟嵗時使之祀焉妻不敢與焉若是則繼父之道也同居則服齊衰期異居則服齊衰三月必嘗同居然後為異居未嘗同居則不為異居妻穉謂年未滿五十子㓜謂年十五以下子無大功之親謂同財者也為之築宮廟于家門之外神不歆非族妻不敢與馬恩雖至親族已絶矣天不可二此以恩服爾未嘗同居則不服之記繼父不同居也者必嘗同居皆無主後同財而祭其祖禰為同居有主後者為異居録恩服深淺也見同財則期同居異財故同居今異居及繼父有子亦為異居則服齊衰三月未嘗同居則不服小記為夫之君傳曰何以期也從服也人斬衰章君條外宗為君夫猶内宗也此條通用當互考姑姊妹女子子適人無主者姑姊妹報傳曰無主者謂其無祭主者也何以期也為其無祭主故也無主後者人之所哀憐不忍降之為君之父母妻長子祖父母傳曰何以期也從服也父母長子君報斬妻則小君也父卒然後為祖後者服斬此為君矣而有父若祖之喪者謂始封之君也若是繼體則其父若祖有廢疾不立父卒者父為君之孫冝嗣位而早卒今君受國于曽祖司服凡喪為王后齊衰王后小君也諸侯為之不杖期春官記大夫之適子為君夫人大子如士服詳見斬衰章君條外宗為夫人猶内宗也同上君之母非夫人則羣臣無服唯近臣及僕驂乗從服唯君所服服也妾先君所不服也禮庶子為後為其母緦言唯君所服伸君也春秋之義有以小君服之者時若小君在則益不可服問妾為女君傳曰何以期也妾之事女君與婦之事舅姑等女君君適妻也女君于妾無服報之則重降之則嫌記妾為女君惡笄有首布總詳見齊衰母為長子條婦為舅姑傳曰何以期也從服也記婦為舅姑惡笄有首以髽詳見上女子子適人者為其父母昆弟之為父後者條婦當喪而出則除之當䘮當舅姑之喪也出除喪絶族也小記叔仲皮學子桞叔仲皮魯叔孫氏之族學教也子桞仲皮之子叔仲皮死其妻魯人也衣衰而繆絰衣當為齊壊字也繆讀為木樛垂之樛士妻為舅姑之服也言雖魯頓其于禮勝學叔仲衍以告告子桞言此非也衍蓋皮之弟衍或為皮請繐衰而環絰繐衰小功之縷而四升半之衰環絰弔服之絰時婦人好輕細而多服此者衍既不知禮之本子桞亦以為然使其妻為舅服之曰昔者吾喪姑姊妹亦如斯末吾禁也衍答子桞也姑姊妹在室齊衰與婦為舅姑同末無也言無禁我欲其言行退使其妻繐衰而環絰婦以諸侯之大夫為天子之衰弔服之絰服其舅非檀弓夫為人後者其妻為舅姑大功詳見為人後者為其父母降有從輕而重公子之妻為其皇姑詳見喪服義為妾服見大功章大夫之妾君之庶子條夫之昆弟之子男女皆是傳曰何以期也報之也之妾服見大功章大夫妾為君之庶子條公妾大夫之妾為其子傳曰何以期也妾不得體君為其子得遂也此言二妾不得从于女君尊降其子也女君與君一體唯為長子三年其餘以尊降之與妾子同也女子子為祖父母傳曰何以期也不敢降其祖也經似在室傳似巳嫁明雖有出道猶不降大夫之子為世父母叔父母子昆弟昆弟之子姑姊妹女子子無主者為大夫命婦者唯子不報命者加爵服之名自士至上公凡九等君命其夫則后夫人亦命其妻矣此所為者凡六命夫六命婦傳曰大夫者其男子之為大夫者也命婦者其婦人之為大夫妻者也無主者命婦之無祭主者也何以言唯子不報也女子子適人者為其父母期故言不報也言其餘皆報也何以期也父之所不降子亦不敢降也大夫曷為不降命婦也夫尊於朝妻貴于室矣無主者命婦之無祭主謂姑姊妹女子子也其有祭主者如衆人唯子不報男女同不報爾傳唯據女子子似失之矣大夫曷為不降命婦據大夫于姑姊妹女子子既以出降大功其適士者又以尊降在小功也夫尊于朝與已同妻貴于室从夫爵也大夫為祖父母適孫為士者傳曰何以期也大夫不敢降其祖與適也不敢降其祖與適則可降其旁親也公妾以及士妾為其父母傳曰何以期也妾不得體君得為其父母遂也然則女君有以尊降其父母者與春秋之義雖為天王后猶曰吾季姜是言子尊不加于父母此傳似誤矣禮妾从女君而服其黨服是嫌不自服其父母故以明之右齊衰不杖期疏衰裳齊牡麻絰無受者無受者服是服而除不以輕服受之不著月數者天子諸侯葬異月也小記曰齊衰三月與大功同者繩屨記齊衰三月與大功同者繩屨雖尊卑異于恩有可同也小記寄公為所寓寓亦寄也為所寄之國君服傳曰寄公者何也失地之君也何以為所寓服齊衰三月也言與民同也諸侯五月而葬而服齊衰三月者三月而藏其服至葬又反服之既葬而除之丈夫婦人為宗子宗子之母妻婦人女子子在室及嫁歸宗者也宗子繼別之後百世不遷所謂大宗也傳曰何以服齊衰三月也尊祖也尊祖故敬宗敬宗者尊祖之義也宗子之母在則不為宗子之妻服也記宗子孤為殤大功衰小功衰皆三月親則月算如邦人言孤有不孤者不孤則族人不為殤服服之也不孤謂父有廢疾若年七十而老子代主宗事者也孤為殤長殤中殤大功衰下殤小功衰皆如殤服而三月謂與宗子絶屬者也親謂在五屬之内算數也月數如邦人者與宗子有期之親者成人服之齊衰期長殤大功衰九月中殤大功衰七月下殤小功衰五月有大功之親者成人服之齊衰三月卒哭受以大功衰九月其長殤中殤大功衰五月下殤小功衰三月有小功之親者成人服之齊衰三月卒哭受以小功衰五月其殤與絶屬者同有緦麻之親者成人及殤皆與絶屬者同本經記為舊君君之母妻傳曰為舊君者孰謂也仕焉而已者也何以服齊衰三月也言與民同也君之母妻則小君也仕焉而已者謂老若有廢疾而致仕者也為小君服者恩深于民庶人為國君不言民而言庶人庶人或有在宫者天子畿内之民服天子亦如之斬衰君條外宗為君夫人猶内宗也此條通用當互考大夫在外其妻長子為舊國君在外待放已去者傳曰何以服齊衰三月也妻言與民同也長子言未去也妻雖從夫而出古者大夫不外娶婦人歸宗徃來猶民也春秋傳曰大夫越境逆女非禮君臣有合離之義長子去可以無服記違諸侯之大夫不反服違大夫之諸侯不反服其君尊卑異也違猶去也去諸侯仕諸侯去大夫仕大夫乃得為舊君服記雜仕而未有禄者違而君薨弗為服也以其恩輕也違去也檀弓孔子曰管仲遇盗取二人焉上以為公臣曰其所與逰辟也可人也言此人可也但居惡人之中使之犯法管仲死桓公使為之服宦于大夫者之為之服也自管仲始也有君命焉爾也亦記失禮所由也善桓公不忘賢者之舉宦猶仕也此仕于大夫更升于公與違大夫之諸侯同爾禮不反服雜記繼父不同居者嘗同居今不同記異居則服齊衰三月必嘗同居然後為異居未嘗同居則不為異居詳見不杖期章繼父同居條有主後者為異居同上曽祖父母傳曰何以齊衰三月也小功者兄弟之服也不敢以兄弟之服服至尊也正言小功者服之數盡于五則髙祖宜緦麻曽祖宜小功也據祖期則曽祖宜大功髙祖宜小功也髙祖曽祖皆有小功之差則曽孫𤣥孫為之服同也重其衰麻尊尊也减其日月恩殺也為所後者之祖父母若子詳見斬衰章為人後者條大夫為宗子傳曰何以服齊衰三月也大夫不敢降其宗也舊君大夫待放未去者傳曰大夫為舊君何以服齊衰三月也大夫去君歸其宗廟故服齊衰三月也言與民同也何大夫之謂乎言其以道去君而猶未絶也以道去君謂三諫不從待放于郊未絶者言爵禄尚有列于朝出入有詔于國妻子自若民也曽祖父母為士者如衆人傳曰何以齊衰三月也大夫不敢降其祖也女子子嫁者未嫁者為曽祖父母傳曰嫁者其嫁于大夫者也未嫁者其成人而未嫁者也何以服齊衰三月不敢降其祖也言嫁于大夫者明雖尊猶不降也成人謂年二十已笄者也此著不降明有所降妾為女君之黨服見不枤期章女子子適人者為其父母條右齊衰三月大功布衰裳牡麻絰無受者大功布者其鍜治之功麤沽之子女子子之長殤中殤殤者男女未冠笄而死可殤者女子子許嫁不為殤也傳曰何以大功也未成人也何以無受也喪成人者其文縟喪未成人者其文不縟故殤之絰不樛垂蓋未成人也年十九至十六為長殤十五至十二為中殤十一至八嵗為下殤不滿八嵗以下為無服之殤無服之殤以日易月以日易月之殤殤而無服故子生三月父名之死則哭之未名則不哭也縟猶數也其文數者謂變除之節也不樛垂者不絞其帶之垂者雜記曰大功以上散帶以日易月謂生一月者哭之一日也殤而無服者哭之而已為昆弟之子女子子亦如之凡言子者可以兼男女又云女子子者殊之以子闗適庶也附凡傳記言殤者于下記丈夫冠而不為殤婦人笄而不為殤言成人也婦人許嫁而笄未許嫁與丈夫同小記伯姬卒此未適人何以卒據叔姬不卒許嫁矣婦人許嫁字而笄之字者尊而不泄所以逺别也笄者簮也所以繫持髮象男子飾也服此者明繫屬于人所以養貞一也婚禮曰女子許嫁笄而醴之稱字死則以成人之喪治之不以殤禮降也許嫁卒者當為諸侯夫人有即貴之漸子僖九年公羊傳又丈十六年叔姬卒傳同許嫁笄而字之死則以成人之喪治之女子許嫁不為殤死則以成人之喪治之謂許嫁于諸侯尊同則服大功九月吉笄以象為之刻鏤其首以為飾成人著之穀梁傳戰于郎郎魯近邑也哀十一年齊國書帥師伐我是也公叔禺人遇負杖入保者息遇見也見走辟齊師将入保罷倦加其杖項上兩手掖之休息者保縣邑小城禺人昭公之子春秋傳曰公叔務人曰使之雖病也謂時繇役任之雖重也謂時賦税君子不能為謀也士弗能死也不可君子謂卿大夫也魯政既惡復無謀臣士又不能死難禺人耻之我則既言矣欲敵齊師踐其言與其鄰重汪踦徃皆死焉奔敵死齊冦鄰鄰里也重皆當為童童未冠者之稱姓汪名踦春秋傳曰童汪踦魯人欲勿殤童汪踦見其死君事有士行欲以成人之喪治之言魯人者死君事國為葬歛問于仲尼仲尼曰能執干戈以衛社稷雖欲勿殤也不亦可乎善之檀弓叔父之長殤中殤姑姊妹之長殤中殤昆弟之長殤中殤夫之昆弟之子女子子之長殤中殤大妾服見大功章夫之妾為君之庶子條適孫之長殤中殤大夫之庶子為適昆弟之長殤中殤公為適子之長殤中殤大夫為適子之長殤中殤公君也諸侯大夫不降適殤者重適也天子亦如之其長殤皆九月纓絰其中殤七月不纓絰絰有纓者為其重也自大功以上絰有纓以一條繩為之小功以下絰無纓也右殤大功九月七月大功布衰裳牡麻絰纓布帶三月受以小功衰即葛九月者受猶承也凡天子諸侯卿大夫既虞士卒哭而受服正言三月者天子諸侯無大功主于大夫士也此雖有君為姑姊妹女子子嫁于國君者非内喪也傳曰大功布九升小功布十一升此受之下也以發傳者明受盡于此也又受麻絰以葛絰間傳曰大功之葛與小功之麻同司服卿大夫其凶服加以大功小功士其凶服亦如之喪服天子諸侯齊斬而已卿大夫加以大功小功士亦如之又加緦焉春官姑姊妹女子子適人者傳曰何以大功也出也出必降之者蓋有受我而厚之者記姑姊妹之薄也蓋有受我而厚之者也詳見喪服義從父昆弟世父叔父之子也其姊妹在室亦如之記于所為後之兄弟之子若子本經記為人後者為其昆弟傳曰何以大功也為人後者降其昆弟也記為人後者于兄弟降一等報言報者言其為宗子不降本經記庶孫男女皆是下殤小功章曰為姪庶孫丈夫婦人同適婦適婦適子之妻傳曰何以大功也不降其適也婦言適者从夫名記適婦不為舅後者則姑為之小功謂夫有廢疾他故若死而無子不受重者小功庶婦之服也凡父母于子舅姑于婦将不傳重于適及将所傳重者非適服之皆如衆子庶婦也小記女子子適人者為衆昆弟父在則同父沒乃為父後者服期也記凡妾為私兄弟如邦人嫌厭降之也私兄弟目其族親也然則女君有以尊降其兄弟者謂士之女為大夫妻與大夫之女為諸侯夫人諸侯之女為天王后者父卒昆弟之為父後者宗子亦不敢降也女本經記人妻為女君之黨服見不杖期章子子適者為其父母條姪丈夫婦人報為姪男女服同傳曰姪者何也謂吾姑者吾謂之姪妾為女君黨服見不杖期章女子子適人者為其父母條夫之祖父母世父母叔父母傳曰何以大功也從服也夫之昆弟何以無服也其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也謂弟之妻婦者是嫂亦可謂之母乎故名者人治之大者也可無慎乎道猶行也言婦人棄姓無常秩嫁于父行則為母行嫁于子行則為婦行謂弟之妻為婦者卑逺之故謂之婦嫂者尊嚴之稱是嫂亦可謂之母乎言不可也嫂猶傁也傁老人稱也是為序男女之别爾若已以母婦之服服兄弟之妻兄弟之妻以舅子之服服已則是亂昭穆之序也治猶理也父母兄弟夫婦之理人倫之大者可不慎乎大傳曰同姓从宗合族屬異姓主名治際會名著而男女有别之妾服見大功章大夫之妾為君庶子條大夫為世父母叔父母子昆弟昆弟之子為士者子謂庶子傳曰何以大功也尊不同也尊同則得服其親服尊同謂亦為大夫者親服期記大夫降其庶子詳見斬衰父條大夫公之昆弟大夫之子于兄弟降一等兄弟猶言族親也凡不見者以此求之記本經君之所為兄弟服室老降一等公士大夫之君同上公之庶昆弟大夫之庶子為母妻昆弟公之庶昆弟則父卒也大夫之庶子則父在也其或為母謂妾子也傳曰何以大功也先君餘尊之所厭不得過大功也大夫之庶子則從乎大夫而降也父之所不降子亦不敢降也言从乎大夫而降則于父卒如國人也昆弟庶昆弟也舊讀昆弟在下其于厭降之義宜蒙此傳也是以上而同之父所不降謂適也皆為其從父昆弟之為大夫者皆者言其互相為服尊同則不相降其為士者降在小功適子為之亦如之為夫之昆弟之婦人子適人者婦人子者女子子也不言女子子者因出見恩疏下妾服見條大夫之妾為君之庶子下傳曰何以大功也妾為君之黨服得與女君同指為此也妾為君之長子亦三年自為其子期異于女君也士之妾為君之衆子亦期女子子嫁者未嫁者為世父母叔父母姑姊妹舊讀合大夫之妾為君之庶子女子子嫁者未嫁者言大夫之妾為此三人之服也傳曰嫁者其嫁于大夫者也未嫁者成人而未嫁者也何以大功也妾為君之黨服得與女君同下言為世父母叔父母姑姊妹者謂妾自服其私親也此不辭即實為妾遂自服其私親當言其以明之齊衰三月章曰女子子嫁者未嫁者為曾祖父母經與此同足以見之矣傳所云何以大功也妾為君之黨服得與女君同文爛在下爾女子子成人者有出道降旁親及将出者明當及時也同内條内妾為君之黨服得與女君夫黨服通用記妾從女君而出則不為女君之子服詳見齊衰三年章母為長子條大夫大夫之妻大夫之子公之昆弟為姑姊妹女子子嫁于大夫者君為姑姊妹女子子嫁于國君者傳曰何以大功也尊同也尊同則得服其親服諸侯之子稱公子公子不得禰先君公子之子稱公孫公孫不得祖諸侯此自卑别于尊者也若公子之子孫有封為國君者則世世祖是人也不祖公子此自尊别于卑者也是故始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟封君之孫盡臣諸父昆弟故君之所為服子亦不敢不服也君之所不服子亦不敢服也不得禰不得祖者不得立其廟而祭之也卿大夫以下祭其祖禰則世世祖是人不復祖公子者後世為君者祖此受封之君不復祀别子也公子若在髙祖以下則如其親服後世遷之乃毁其廟爾因國君以尊降其親故終説此義云右大功正服九月繐衰裳牡麻絰既葬除之者傳曰繐衰者何以小功之繐也治其縷如小功而成布四升半細其縷者以恩輕也升數少者以服至尊也凡布細而疏者謂之繐今南陽有鄧繐諸侯之大夫為天子傳曰何以繐衰也諸侯之大夫以時接見乎天子接猶會也諸侯之大夫以時會見于天子而服之則其士庶民不服可知右繐衰既葬除之小功布衰裳澡麻帶絰五月者澡者治去莩垢不絶其本也小記曰下殤小功帶澡麻不絶其本屈而反以報之殤大功殤章大夫冠而不為殤婦人笄而不為此條通用叔父之下殤適孫之下殤昆弟之下殤大夫庶子為適昆弟之下殤為姑姊妹女子子之下殤為人後者為其昆弟從父昆弟之長殤傳曰問者曰中殤何以不見也大功之殤中從上小功之殤中從下問者據从父昆弟其下殤在緦麻也大功小功皆謂服成人也大功之殤中从上則齊衰之殤亦中從上也此主謂丈夫之為殤者服也凡不見者以此求之也為夫之叔父之長殤不見中殤者中從下也之妾服見大功章大夫之妾為君庶子條昆弟之子女子子夫之昆弟之子女子子之下殤服妾見大功章大夫之妾為君之庶子條為姪庶孫丈夫婦人之長殤大夫公之昆弟大夫之子為其昆弟庶子姑姊妹女子子之長殤大夫為昆弟之長殤小功謂為士者若不仕者也以此知為大夫無殤服也公之昆弟不言庶者此庶服無所見也大夫之子不言庶者闗適子亦服此殤也云公之昆弟為庶子之長殤則知公之昆弟猶大夫大夫之妾為庶子之長殤君之庶子右小功殤五月小功布衰裳牡麻絰即葛五月者即就也小功輕三月變麻因改衰以就葛絰帶而五月也閒傳曰小功之葛與緦之麻同舊説小功以下吉屨無絇也司服卿大夫凶服加以大功小功士凶服亦如之詳見大功章從祖祖父母從祖父母報祖父之昆弟之親從祖昆弟父之从父昆弟之子記兄弟皆在他邦加一等不及知父母與兄弟居加一等皆在他邦謂行仕出逰若辟讐不及知父母父母早卒傳曰何如則可謂之兄弟傳曰小功以下為兄弟于此發兄弟傳者嫌大功以上又加也大功以上若皆在他國則親自親矣若不及知父母則固同財矣本經記從父姊妹父之昆弟之女孫適人者孫者子之子女孫在室亦大功也為人後者為其姊妹適人者不言姑者舉其親者而恩輕者降可知為外祖父母傳曰何以小功也以尊加也為所後者妻之父母若子詳見斬衰章為人後者條記庶子為後者為其外祖父母從母舅無服不為後如邦人本經記為母之君母母卒則不服母之君母外祖適母徒从也所从亡則已小記傳曰母出則為繼母之黨服母死則為其母之黨服為其母之黨服則不為繼母之黨服雖外親亦無二統章服問之此條本章从母緦舅舅子通用出妻之子為外祖父母無服詳見齊衰杖期章出妻之子為母條為慈母之父母無服恩不相及小記從母丈夫婦人報从母母之姊妹傳曰何以小功也以名加也外親之服皆緦也外親異姓正服不過緦丈夫婦人姊妹之子男女同當外祖父母條母出則為繼母之黨服此條通用互考記庶子為後者為其從母無服不為後如邦人詳見上條夫之所為兄弟服妻降一等疏曰妻從夫服其族親即上經夫之諸祖父母見于緦麻章夫之世叔見于大功章夫之昆弟之子不降嫂叔又無服今言从夫降一等記其不見者當是夫之从母之類乎本經記夫之姑姊妹娣姒婦報夫之姑姊妹不殊在室及嫁者因恩輕略从降妾服見大功章大夫之妾為君庶子條傳曰娣姒婦者弟長也何以小功也以為相與居室中則生小功之親焉娣姒婦者兄弟之妻相名也長婦謂穉婦為娣婦娣婦謂長婦為姒婦大夫大夫之子公之昆弟為從父昆弟庶孫姑姊妹女子子適士者从父昆弟及庶孫亦謂為士者記大夫公之昆弟大夫之子于兄弟降一等詳見大功章大夫為昆弟為士者條大夫之妾為庶子適人者君之庶子女子子也庶女子子在室大功其嫁于大夫亦大功庶婦夫將不受重者記適婦不為舅後者則姑為之小功詳見大功章適婦條君母之父母從母君母父之適妻也从母君母之姊妹傳曰何以小功也君母在則不敢不從服君母不在則不服不敢不服者恩實輕也凡庶子為君母如適子記為君母後者君母卒則不為君母之黨服徒从也所从亡則已小記君子子為庶母慈已者君子子者大夫及公子之適妻子傳曰君子子者貴人之子也為庶母何以小功也以慈已加也云君子子者則父在也父沒則不服之矣以慈已加則君子子亦以士禮為庶母緦也内則曰異為孺子室于宫中擇于諸母與可者必求其寛裕慈惠温良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室他人無事不徃又曰大夫之子有食母庶母慈已者此之謂也其不慈已則緦可矣不言師保慈母居中服之可知也國君世子生卜士之妻大夫之妾使食子三年而出見于公宫則劬非慈母也士之妻自養其子右小功正服五月緦麻三月者緦麻布衰裳而麻絰帶也不言衰絰略輕服省文傳曰緦者十五升抽其半有事其縷無事其布曰緦謂之緦者治其縷細如緦也或曰有絲朝服用布何衰用絲乎抽猶去也雜記曰緦冠繰纓記童子唯當室緦童子未冠之稱也當室者為父後承家事者為家主與族人為禮於有親者雖恩不至不可以無服也傳曰不當室則無緦服也本經記童子無緦服聽事不麻為㓜少不備禮也雖不服緦猶免深衣無麻徃給事也玉藻童子不緦唯當室緦緦者其免也當室則免而杖矣詳見喪服義族曽祖父母族祖父母族父母族昆弟族曽祖父者曽祖昆弟之親也族祖父者亦髙祖之孫則髙祖有服明矣庶孫之婦庶孫之中殤庶孫者成人大功其殤中从上此當為下殤言中殤者字之誤爾又諸言中者皆連上下也從祖姑姊妹適人者報從祖父從祖昆弟之殤不見中殤者中從下外孫女子子之子從父昆弟姪之下殤夫之叔父之中殤下殤言中殤者中从下君妾服見大功章大夫之妾為之庶子條從母之長殤報庶子為父後者為其母傳曰何以緦也傳曰與尊者為一體不敢服其私親也然則何以服緦也有死于宫中者則為之三月不舉祭因是以服緦也君卒庶子為母大功大夫卒庶子為母三年士雖在庶子為母皆如衆人士為庶母傳曰何以緦也以名服也大夫以上為庶母無服貴臣貴妾此謂公士大夫之君也殊其臣妾貴賤而為之服貴臣室老士也貴妾姪娣也天子諸侯降其臣妾無服士卑無臣則士妾又賤不足殊有子則為之緦無子則已傳曰何以緦也以其貴也記悼公之母死母哀公之妾哀公為之齊衰有若曰為妾齊衰禮與譏而問之妾之貴者為之緦耳公曰吾得已乎哉魯人以妻我言國人皆名之為我妻重服嬖妾文過非也檀弓乳母謂養子者有他故賤者代之慈已傳曰何以緦也以名服也從祖昆弟之子族父母為之服曽孫孫之子父之姑歸孫為祖父之姊妹從母昆弟傳曰何以緦也以名服也母小功章為外祖父母條出則為繼母之黨服此條通用當互考甥姊妹之子傳曰甥者何也謂吾舅者吾謂之甥何以緦也報之也壻女子子之夫也傳曰何以緦報之也妻之父母傳曰何以緦從服也从于妻而服之記有從重而輕為妻之父母詳見喪服義世子不降妻之父母詳見齊衰不杖期章大夫之適子為妻條有從有服而無服公子為其妻之父母詳見喪服義姑之子外兄弟也傳曰何以緦報之也舅母之昆弟傳曰何以緦從服也从于母而服之為小功章為外祖父母條母出則繼母之黨服此條通用當互考為所後者之妻之昆弟若子詳見斬衰章為人後者條記庶子為後者為其舅無服不為後如邦人詳見小功章外祖父母條舅之子内兄弟也傳曰何以緦從服也則小功章為外祖父母條母出為繼母之黨服此條通用當互考為所後者妻之昆弟之子若子詳見斬衰章為人後者條夫之姑姊妹之長殤之妾服見大功章大夫妾為君之庶子條夫之諸祖父母報諸祖父母夫之所為小功从祖祖父母外祖父母或曰曽祖父母曽祖于曽孫之婦無服而云報乎曽祖父母正服小功妻从服緦妾服見大功章大夫之妾為君之庶子條君母之昆弟傳曰何以緦從服也从于君母而服緦也君母在則不敢不从服君母卒則不服也為小功章君母之父母條君母卒不君母之黨服此條通用當互考從父昆弟之子之長殤昆弟之孫之長殤為夫之從父昆弟之妻傳曰何以緦也以為相與同室則生緦之親焉長殤中殤降一等下殤降二等齊衰之殤中從上大功之殤中從下同室者不如居室之親也衰齊大功皆明其成人也大功之殤中从下則小功之殤亦中从下也此主謂妻為夫之親服也凡不見者以此求之妾服見大功章大夫之妾為君之庶子條右緦麻三月禮書綱目卷十八
