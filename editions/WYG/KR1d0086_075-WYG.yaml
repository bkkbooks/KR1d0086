body:
  text: 禮書綱目卷七十三婺源江永撰卜筮通禮二十六補洪範九疇次七曰明用稽疑稽疑曰明所以辨惑也七稽疑擇建立卜筮人乃命卜筮稽考也有所疑則卜筮以考之龜曰卜蓍曰筮蓍龜者至公無私故能紹天之明卜筮者亦必至公無私而後能傳蓍龜之意必擇是人而建立之然後使之卜筮也曰雨曰霽曰䝉曰驛曰克此卜兆也雨者如雨其兆為水霽者開霽其兆為火䝉者䝉昧其兆為木驛者絡繹不屬其兆為金克者交錯有相勝之意其兆為土曰貞曰悔此占卦也内卦為貞外卦為悔左傳蠱之貞風其悔山是也又有以遇卦為貞之卦為悔國語貞屯悔豫皆八是也凡七卜五占用二衍忒凡七雨霽蒙驛克貞悔也卜五雨霽蒙驛克也占二貞悔也衍推忒過也所以推人事之過差也立時人作卜筮三人占則從二人之言凡卜筮必立三人三相參考舊説卜有玉兆瓦兆原兆筮有連山歸藏周易者非是謂之三人非三卜筮也汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作内吉作外凶龜筮共違于人用静吉用作凶稽疑以龜筮為重人與龜筮皆從是之謂大同固吉也人一從而龜筮不違者亦吉龜從筮逆則可作内不可作外内謂祭祀等事外謂征伐等事龜筮共違則可靜不可作靜謂守常作謂動作也然有龜從筮逆而無筮從龜逆者龜尤聖人所重也故禮記大事卜小事筮傳謂筮短龜長是也自夫子贊易極著蓍卦之德蓍重而龜書不傳云洪範大卜掌三兆之灋一曰玊兆二曰瓦兆三曰原兆兆者灼龜𤼵于火其形可占者其象似玉瓦原之舋鏬是用名之焉上古以來作其法可用者有三原原田也杜子春云玉兆帝顓頊之兆瓦兆帝堯之兆原兆有周之兆其經兆之體皆百有二十其頌皆千有二百頌謂繇也三法體繇之數同其名占異耳百二十謂體十繇體有五色又重之以墨圻五色者洪範所謂曰雨曰濟曰圛曰蟊曰尅掌三易之灋一曰連山二曰歸藏三曰周易易者揲蓍變易之數可占者也名曰連山似山出内氣變也歸藏者萬物莫不歸而藏于其中杜子春云連山宓戲歸藏黃帝其經卦皆八其别皆六十有四三易卦别之數亦同其名占異也每卦八别者重之數以邦事作龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳國之大事待蓍龜而決者有八定作其辭於将卜以命龜也鄭司農云征謂征伐人也象謂災變雲物如衆赤烏之屬有所象似易曰天垂象見吉凶春秋傳曰天事恒象皆是也與謂予人物也謀謂謀議也果謂事成與不也至謂至不也雨謂雨不也瘳謂疾瘳不也𤣥謂征亦云行巡守也象謂有所造立也易曰以制器者尚其象與謂所與共事也果謂以勇決為之若呉伐楚楚司馬子魚卜戰令龜曰鮒也以其屬死之楚師繼之尚大克之吉是也以八命者贊三兆三易三夢之占以觀國家之吉凶以詔救政鄭司農云以此八事命卜筮蓍龜參之以夢故曰以八命者贊三兆三易三夢之占春秋傳曰筮襲於夢武王所用𤣥謂贊佐也詔告也非徒占其事吉則為否則止又佐明其繇之占演其意以視國家餘事之吉凶凶則告王救其政凡國大貞卜立君卜大封則眂高作龜卜立君君無冢適卜可立者卜大封謂竟界侵削卜以兵征之若魯昭元年秋叔弓帥師疆鄆田是也視高以龜骨高者可灼處示宗伯也大事宗伯涖卜卜用龜之腹骨骨近足者其部高鄭司農云貞問也國有大疑問於蓍龜作龜謂鑿龜令可爇也𤣥謂貞之為問問於正者必先正之乃從問焉易曰師貞丈人吉作龜謂以火灼之以作其兆也春灼後左夏灼前左秋灼前右冬灼後右士喪禮曰宗人受卜人龜示高涖卜受視反之又曰卜人坐作龜大祭祀則眂高命龜命龜告龜以所卜之事不親作龜者大祭祀輕於大貞也士䘮禮曰宗人即席西面坐命龜凡小事涖卜代宗伯國大遷大師則貞龜正龜於卜位也士喪禮曰卜人抱龜燋先奠龜西面是也又不親命龜亦大遷大師輕于大祭祀也凡旅陳龜陳龜於饌處也士喪禮曰卜人先奠龜于西塾上南首是也不親貞龜亦以卜旅祭非常輕于大遷大師也凡喪事命龜重喪禮次大祭祀也士喪禮則筮宅卜曰天子卜葬兆凡大事大卜陳龜貞龜命龜視高其他以差降焉春官卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆開開出其占書也經兆百二十體今言四兆者分之為四部若易之二篇書金縢曰開籥見書是謂與其云方功義弓之名未聞凡卜事眂高示涖卜也揚火以作龜致其墨揚猶熾也致其墨者孰灼之明其兆凡卜辨龜之上下左右隂陽以授命龜者而詔相之所卜者當各用其龜也大祭祀喪事大卜命龜則大貞小宗伯命龜其他卜師命龜卜人作龜卜人作龜則亦辨龜以授卜師上仰者也下俯者也左左倪也右右倪也隂後弇也陽前弇也詔相告以其辭及威儀龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之屬言非一也色謂天龜𤣥地龜黃東龜青西龜白南龜赤北龜黑龜俯者靈仰者繹前弇果後弇獵左倪靁右倪若是其體也東龜南龜長前後在陽象經也西龜北龜長左右在隂象緯也天龜俯地龜仰東龜前南龜郤西龜左北龜右各從其耦也杜子春讀果為羸凡取龜用秋時攻龜用春時各以其物入于龜室六龜各異室也秋取龜及萬物成也攻治也治龜骨以春是時乾解不𤼵傷也上春釁龜祭祀先卜釁者殺牲以血之神之也鄭司農云祭祀先卜者卜其日與其牲𤣥謂先卜始用卜筮者言祭言祀尊焉天地之也世本作曰巫咸作筮卜未聞其人也是上春者夏正建寅之月月令孟冬云釁祠龜䇿相互矣秦以十月建亥為歳首則月令秦世之書亦或欲以歳首釁龜耳若有祭事則奉龜以往奉猶送也送之所當於卜旅亦如之喪亦如之菙氏掌共燋契以待卜事杜子春云燋讀為細目燋之燋或曰如薪樵之樵謂所爇灼龜之木也故謂之樵契謂契龜之鑿也詩云爰始爰謀爰契我龜𤣥謂士喪禮曰楚焞置于燋在龜東楚焞即契所用灼龜也燋謂炬其存火凡卜以明火爇燋遂龡其焌契以授卜師遂役之杜子春云明火以陽燧取火於日焌讀為英俊之俊書亦或為俊𤣥謂焌讀如戈鐏之鐏謂以契柱燋火而吹之也契既然以授卜師用作龜也役之使助之占人掌占龜以八簭占八頌以八卦占簭之八故以眂吉凶占人亦占筮言掌占龜者筮短龜長主於長者以八筮占八頌謂将卜八事先以筮筮之言頌者同於龜占也以八卦占筮之八故謂八事不卜而徒筮之也其非八事則用九筮占人亦占焉凡卜簭君占體大夫占色史占墨卜人占坼體兆象也色兆氣也墨兆廣也坼兆釁也體有吉凶色有善惡墨有大小坼有㣲明尊者視兆象而已卑者以次詳其餘也周公卜武王占之曰體王其無害凡卜象吉色善墨大坼明則逢吉凡卜簭既事則繋幣以比其命歳終則計其占之中否杜子春云繋帛者以帛書其占繋之于龜也𤣥謂既卜筮史必書其命龜之事及兆于䇿繋其禮神之幣而合藏焉書曰王與大夫盡弁開金縢之書乃得周公所自以為功代武王之説是命龜書簭人掌三易以辨九簭之名一曰連山二曰歸藏三曰周易九簭之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶此九巫讀皆當為筮字之誤也更謂筮遷都邑也咸猶僉也謂筮衆心歡不也式謂筮制作法式也目謂事衆筮其要所當也易謂民衆不説筮所改易也此謂筮與民和比也祠謂筮牲與日也參謂筮御與右也環謂筮可致師不也凡國之大事先簭而後卜當用卜者先筮之即事有漸也於筮之凶則止不卜上春相簭相謂更選擇其蓍也蓍龜歳易者與凡國事共簭並春官卜人定龜謂靈射之屬所當用者史定墨視兆坼也君定體視兆所得也周公曰體王其無害玉藻小宗伯若國大貞則奉玊帛以詔號號神號幣號鄭司農云大貞謂卜立君卜大封官春天府季冬陳玉以貞來歳之媺惡問事之正曰貞問歳之媺惡謂問於龜大卜職大貞之屬陳玊陳禮神之玉凡卜筮實問於鬼神龜筮能出其卦兆之占耳龜有天地四方則玊有六器者與言陳者既事藏之不必貍之也鄭司農云貞問也易曰師貞丈人吉問於丈人國語曰貞於陽卜同上孟冬命大史釁龜筴占兆審卦吉凶筴蓍也占兆龜之繇文也周禮龜人上春釁龜謂建寅之月也秦以其歳首使大史釁龜筴與周異矣卦吉凶謂易也審省録之而不釁筮筮短賤於兆也今月令曰釁祠祠衍字月令外事以剛日順其出為陽也出郊為外事春秋傳曰甲午祠兵内事以柔日順其居内為隂凡卜筮日旬之外曰逺某日旬之内曰近某日旬十日也喪事先逺日吉事先近日孝子之心喪事葬與練祥也吉事祭祀冠取之屬也曰為日假爾㤗龜有常假爾㤗筮有常命龜筮辭龜筮於吉凶有常大事卜小事筮卜筮不過三求吉不過三魯四卜郊春秋譏之卜筮不相襲卜不吉則又筮筮不吉則又卜是瀆龜筴也晉獻公卜取驪姬不吉公曰筮之是也曲禮天子無筮謂征伐出師若巡守也天子至尊大事皆用卜也春秋傳曰先王卜征五年歳襲其祥諸侯有守筮守筮守國之筮國有事則用之天子道以筮始将出卜之道有小事則用筮諸侯非其國不以筮卜宅寢室入他國則不筮不敢問吉凶於人之國也諸侯受封乎天子因國而國惟宫室欲改易者得卜之耳天子不卜處大廟卜可建國之處吉則宫廟吉可知表記不貳問當正已之心以問吉凶於蓍龜不得於正凶則卜筮其權也問卜筮曰義與志與義則可問志則否大卜問來卜筮者也義正事也志私意也少儀諸侯以龜為寶家不寶龜古者貨貝寶龜大夫以下有貨耳易曰十朋之龜禮器龜筴敝則埋之不欲人䙝之也埋之不知鬼神之所為曲禮右卜筮龜為卜筴為筮卜筮者先聖王之所以使民信時日敬鬼神畏法令也所以使民決嫌疑定猶與也故曰疑而筮之則弗非也日而行事則必踐之弗非無非之者日所卜筮之吉日也踐讀曰善聲之誤也筴或為蓍曲禮子言之昔三代明王皆事天地之神明無非卜筮之用不敢以其私䙝事上帝言動任卜筮也神明謂羣神也是故不犯日月不違卜筮日月謂冬夏至正月及四時也所不違者日與牲尸也卜筮不相襲也襲因也大事則卜小事則筮大事有時日大事有事於大神有常時常日也小事無時日有筮有事於小神無常時常日有筮臨有事筮之外事用剛日内事用柔日順隂陽也陽為外隂為内事之外内别乎四郊不違龜筮子曰牲牷禮樂齊盛是以無害乎鬼神無怨乎百姓牷猶純也表記昔者聖人建隂陽天地之情立以為易易抱龜南面天子卷冕北面雖有明知之心必進斷其志焉示不敢專以尊天也立以為易易作易易抱龜易官名周禮曰大卜大卜主三兆三易三夢之占祭義天子下至士皆有蓍龜者重事決疑示不自專也禮三正記曰天子龜長一尺二寸諸侯一尺大夫八寸士六寸龜隂故數偶也天子蓍長九尺諸侯七尺大夫五尺士三尺蓍陽故數奇也所以先謀及卿士何先盡人事念而不能得思而不能知然後問於蓍龜聖人獨見先睹必問蓍龜何示不自專也或曰清微無端緒非聖人所及聖人亦疑之乾草枯骨衆多非一獨以蓍龜何此天地之間壽考之物故問之也龜之為言久也蓍之為言耆也久長意也不見吉凶于蓍復以卜何蓍者陽道多變變乃成也白虎通懿氏卜妻敬仲懿氏陳大夫龜曰卜其妻占之曰吉懿氏妻是謂鳯皇于飛和鳴鏘鏘雄曰鳯雌曰皇雄雌俱飛相和而鳴鏘鏘然猶敬仲夫妻相随適齊有聲譽有媯之後将育于姜媯陳姓姜齊姓五世其昌並于正鄉八世之後莫之與京京大也陳厲公生敬仲其少也周史有以周易見陳侯者周大史也陳侯使筮之蓍曰筮遇觀坤下巽上觀之否坤下乾上否觀六四爻變而為否曰是謂觀國之光利用賓于王此周易觀卦六四爻辭易之為書六爻皆有變象又有互體聖人随其義而論之此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也坤土也巽風也乾天也風為天于土上山也巽變為乾故曰風為天自二至四有艮象艮為山有山之材而照之以天光於是乎居土上山則材之所生上有乾下有坤故言居土上照之以天光故曰觀國之光利用賓于王四為諸侯變而之乾有國朝王之象庭實旅百奉之以玊帛天地之美具焉故曰利用賓于王艮為門庭乾為金玉坤為布帛諸侯朝王陳贄幣之象旅陳也百言物備猶有觀焉故曰其在後乎因觀文以博占故言猶有觀非在已之言故知其子孫風行而著於土故曰其在異國乎若在異國必姜姓也姜大嶽之後也姜姓之先為堯四嶽山嶽則配天物莫能兩大陳衰此其昌乎變而象艮故知當興於大嶽之後得大嶽之權則有配天之大功故知陳必衰及陳之初亡也昭八年楚滅陳陳桓子始大於齊桓子敬仲五世孫陳無宇其後亡也哀十七年楚復滅陳成子得政成子陳常也敬仲八世孫陳完有禮於齊子孫世不亡德德協于卜故傳備言其終始卜筮者聖人所以定猶豫決疑似因生義敎者也尚書洪範通龜筮以同卿士之數南蒯卜亂而遇元吉惠伯答以忠信則可臧㑹卜僭遂獲其應丘明故舉諸縣騐於行事者以示來世而君子志其善者逺者他皆倣此荘二十二年左氏傳成季之之将生也桓公使卜楚丘之父卜之卜楚丘魯掌卜大夫曰男也其名曰友在公之右在右言用事間于兩社為公室輔兩社周社亳社兩社之間朝廷執政所在季氏亡則魯不昌又筮之遇大有乾下離上大有之乾乾下乾上乾大有六五變而為乾曰同復于父敬如君所筮者之辭也乾為君父離變為乾故曰同復于父見敬與君同及生有文在其手曰友遂以命之遂以為名閔二年左氏傳晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長物生而後有象象而後有滋滋而後有數龜象筮數故象長數短且其繇曰專之渝攘公之羭繇卜兆辭變也攘除也羭變也言變乃除公之美一薰一蕕十年尚猶有臭薰香草蕕臭草十年有臭言善易消惡難除必不可弗聽僖四年左氏傳狐偃言於晉侯曰求諸侯莫如勤王勤納王也使卜偃卜之曰吉遇黃帝戰于阪泉之兆黃帝與神農之後姜氏戰于阪泉之野勝之今得其兆故以為吉公曰吾不堪也文公自以為已當此兆故曰不堪對曰周禮未改今之王古之帝也言周德雖衰其命未改今之周王自當帝兆不謂晉公曰筮之筮之遇大有乾下離上大有之暌兑下離上暌大有九三變而為暌曰吉遇公用享于天子之卦大有九三爻辭也三為三公而得位變而為兑兑為説得位而説故能為王所宴饗也戰克而王饗吉孰大焉言卜筮協吉且是卦也方更總言二卦之義不繫于一爻天為澤以當日天子降心以逆公不亦可乎乾為天兑為澤乾變為兑而上當離離為日日之在天垂曜在澤天子在上説心在下是降心逆公之象大有去暌而復亦其所也言去暌卦還論大有亦有天子降心之象乾尊離卑降尊下同亦其義也僖二十五年左氏傳晉趙鞅卜救鄭遇水適火水火之兆占諸史趙史墨史龜皆晉史史龜曰是謂沈陽火陽得水故沈可以興兵兵隂類也故可以興兵利以伐姜不利子商姜齊姓子商謂宋伐齊則可敵宋不吉史墨曰盈水名也子水位也趙鞅姓盈宋姓子水盈坎乃行子姓又得北方水位名位敵不可干也二水俱盛故言不可干炎帝為火師神農有火瑞以火名官姜姓其後也水勝火伐姜則可史趙曰是謂知川之滿不可游也既盈而得水位故為如川之滿不可馮游言其波流盛鄭方有罪不可救也鄭以嬖寵伐人故以為有罪救鄭則不吉不知其他救鄭則當伐宋故不吉也陽虎以周易筮之遇泰乾下坤上泰之需乾下坎上需泰六五變曰宋方吉不可與也不可與戰泰六五曰帝乙歸妹以祉元吉帝乙紂父立為天子故稱帝乙隂而得中有似王者嫁妹得如其願受福禄而大吉微子啟帝乙之元子也宋鄭甥舅也宋鄭為婚姻甥舅之國宋為微子之後今卜得帝乙卦故以為宋吉祉禄也若帝乙之元子歸妹而有吉禄我安得吉焉乃止吉在彼則我伐之為不吉卜哀九年左氏傳已上兼言筮獻公卜伐驪戎獻公晉武公之子獻公詭諸也驪戎西戎之别在驪山者也其君男爵姬姓也秦曰驪邑漢高帝徙豐民于驪邑更曰新豐在京兆史蘇占之史蘇晉大夫占卜之史也曰勝而不吉公曰何謂也對曰遇兆挾以銜骨齒牙為猾遇見也挾猶㑹也骨所以鯁刺人也猾㺯也齒牙謂兆端左右釁折有似齒牙中有從畫故銜骨在口中齒牙㺯之以象讒口之為害也禮卜卜師作龜大夫占色史占墨也戎夏交捽兆有一畫外象戎内象諸夏夏謂晉也兆端㑹齒牙交有似捽捽交對也交捽是交勝也臣故云言晉勝戎戎復勝晉且懼有口齒牙銜骨皆在口也懏民國移焉懏離也公不聽遂伐驪戎克之獲驪姬以歸有寵立以為夫人驪姬驪戎君之女也史蘇告大夫曰夫有男戎必有女戎戎兵也女兵言其禍猶兵也且其兆云挾以銜骨齒牙為猾我卜伐驪龜往離散以應我應答也往令告龜辭往伐驪也其兆離散不吉夫若是賊之兆也非吾宅也賊賊敗國家之兆也宅居也非吾所安居也離則有之國分離也不跨其國可謂挾乎跨猶據也言驪姬不據有晉國可謂内外挾乎不得其君能銜骨乎言驪姬不得志於其君不能銜骨以害人也若跨其國而得其君雖逢齒牙以猾其中其誰云弗從言驪姬若能跨據晉國而得志於君齒牙之猾雖為中害國人逢之其誰有不從言必從也諸夏從戎非敗而何從政者不可以不戒國語晉語鄭皇耳帥師侵衞孫文子卜追之獻兆於定姜姜氏問繇繇兆辭曰兆如山陵有夫出征而喪其雄姜氏曰征者喪雄禦冦之利也衞人追之獲鄭皇耳襄卜年左氏傳臧昭伯如晉臧㑹竊其寶龜僂句僂句龜所出地名以卜為信與僭僭吉僭不信也臧氏老将如晉問問昭伯起居㑹諸往代家老行昭伯問家故盡對故事也及内子與母弟叔孫則不對内子昭伯妻不對若有他故再三問不對歸及郊㑹逆問又如初又不對至次于外而察之皆無之執而戮之逸奔郈郈魴假使為賈正焉計於季氏送計簿於季氏臧氏使五人以戈楯伏諸桐汝之門桐汝里名㑹出逐之反奔執諸季氏中門之外平子怒曰何故以兵入吾門拘藏氏老季臧有惡相怨惡及昭伯從公平子立臧㑹立以為臧氏後㑹曰僂句不余欺也傳言卜筮之騐善惡由人左昭二十五年氏傳衞侯貞卜正卜夢之吉凶其繇曰如魚竀尾竀赤也魚勞則尾赤衡流而方羊裔焉橫流方羊不能自安裔水邊言衞侯将若此魚大國滅之将亡闔門塞竇乃自後踰此皆繇辭晉復伐衞衞人出莊公而與晉平衞侯入欲逐石圃未及而難作公閉門而請弗許踰于北方而隊折股終如卜言乃自後踰哀十七年左氏傳楚右司馬子國之卜也觀瞻曰如志子國未為令尹時卜為右司馬得吉兆如其志觀瞻楚開卜大夫觀從之後故命之命以為右司馬及巴師至将卜帥王曰寧如志何卜焉寧子國也使帥師而行敗巴師君子曰惠王知志知用其意夏書曰官占惟能蔽志昆命于元龜逸書也官占卜筮之官蔽斷也昆後也言當先斷意後用龜也其是之謂乎志曰聖人不煩卜筮惠王其有焉不疑故不卜也已哀十八年左氏傳上卜畢萬筮仕於晉遇屯震下坎上屯之比坤下坎上比屯初九變而為比辛廖占之曰吉辛廖晉大夫屯固比入吉孰大焉其必蕃昌屯險難所以為堅固比親密所以得入震為土震變為坤率從馬震為車坤為馬足居之震為足兄長之震為長男母覆之坤為母衆歸之坤為衆六體不易初一爻變有此六義不可易也合而能固安而能殺公侯之卦也比合屯固坤安震殺故曰公侯之卦公侯之子孫必復其始畢萬公高之後傳為魏之子孫衆多張本閔元年左氏傳秦伯伐晉卜徒父筮之吉徒父秦之掌龜卜者卜人而用筮不能通三易之占故據其所見雜占而言之渉河侯車敗詰之秦伯之軍渉河則晉侯車敗也秦伯不解謂敗在已故詰之對曰乃大吉也三敗必獲晉君其卦遇蠱巽下艮上蠱曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也於周易利渉大川往有事也亦秦勝晉之卦也今此所言蓋卜筮書雜辭以狐蠱為君其義欲以喻晉惠公其象未聞蠱之貞風也其悔山也内卦為貞外卦為悔巽為風秦象艮為山晉象歳云秋矣我落其實而取其材所以克也周九月夏之七月孟秋也艮為山山有木今歳已秋風吹落山木之實則材為人所取實落材亡不敗何待僖十五年左氏傳初晉獻公筮嫁伯姬於秦遇歸妹兑下震上歸妹之暌兑下離上暌歸妹上六變而為暌史蘇占之曰不吉史蘇晉卜筮之史其繇曰士刲羊亦無衁也女承筐亦無貺也周易歸妹上六爻辭也衁血也貺賜也刲羊士之功承筐女之職上六無應所求不獲故下刲無血上承無實不􅁻之象也離為中女震為長男故稱士女西鄰責言不可償也将嫁女于西而遇不吉之卦故知有責讓之言不可報償歸妹之暌猶無相也歸妹女嫁之卦暌乖離之象故曰無相相助也震之離亦離之震二卦變而氣相通為雷為火為嬴敗姬嬴秦姓姬晉姓震為雷離為火火動熾而害其母女嫁反害其家之象故曰為嬴敗姬車説其輹火焚其旗不利行師敗于宗丘輹車下縳也丘猶邑也震為車離為火上六爻在震則無應故車脱輹在離則失位故火焚旗言皆失車火之用也車敗旗焚故不利行師火還害母故敗不出國近在宗邑歸妹暌孤冦張之弧此暌上九爻辭也處暌之極故曰暌孤失位孤絶故遇冦難而有弓矢之警皆不吉之象姪其從姑震為木離為火火從木生離為震妹於火為姑謂我姪者我謂之姑謂子圉質秦六年其逋逃歸其國而棄其家逋亡也家謂子圉歸懐嬴明年其死於高梁之墟惠公死之明年文公入殺懐公于高梁高梁晉地在平陽楊氏縣西南凡筮者用周易則其象可推非此而往則臨時占者或取于象或取于氣或取于時日王相以成其占若盡附㑹以爻辭則搆虚而不經故略言其歸趣他皆放此及惠公在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及可數乎史蘇是占勿從何益言龜以象示筮以數告象數相因而生然後有占占所以知吉凶不能變吉凶故先君敗德非筮數所生雖復不從史蘇不能益祸同上公子重耳親筮之曰尚有晉國蓍曰筮尚上也命筮之辭也禮曰某子尚享之得貞屯悔豫皆八也内曰貞外曰悔震下坎上屯坤下震上豫得此兩卦震在屯為貞在豫為悔八謂震兩隂爻在貞在悔皆不動故曰皆八謂爻無為也筮史占之皆曰不吉筮史筮人掌以三易辨九筮之名一夏連山二殷歸藏三周易以連山歸藏占此兩卦皆不吉閉而不通爻無為也閉壅也震為動動遇坎坎為險阻閉塞不通無所為也司空季子曰吉是在易皆利建侯建立也以周易占之二卦皆吉也屯初九曰利建侯豫大象曰利建侯行師吉不有晉國以輔王室安能建侯我命筮曰尚有晉國筮告我曰利建侯得國之務也吉孰大焉務猶趨也震車也易坤為大車震為動今云車者車亦動聲象雷其為小車乎坎水也坤土也屯厚也豫樂也車班外内順以訓之車雷也班徧也徧外内者謂屯之内有震豫之外亦有震坤順也豫内為坤屯二與四亦為坤泉原以資之資財也屯三至五豫二至四皆有艮象豫三至五皆有坎象艮山坎水水在山上為泉源流而不竭也土厚而樂其實不有晉國何以當之屯豫皆有坤象重坤故厚豫為樂當應也震雷也車也坎勞也水也衆也易以坤為衆坎為水水亦衆之類故云主雷與車内為主也而尚水與衆坎象皆在上故尚水與衆車有震武也震威也東聲軒隆象有威武衆而順文也坤為衆為順為文象有文德為衆所歸文武具厚之至也故曰屯屯厚也其繇曰元亨利貞勿用有攸往利建侯繇卦辭也亨通也貞正也攸所也往之也小人勿用有所之君子則利建侯行師主震雷長也故曰元内為主震為長男為雷雷為諸侯故曰元元善之長也衆而順嘉也故曰亨嘉善也衆順服善故曰亨亨嘉之㑹也内有震雷故利貞屯内有震也賈侍中云震以動之利也侯以正國貞也利義之和也貞事之幹也車上水下必伯車震也水坎也車動而上威也水動而下順也有威而衆從故必伯也小事不濟壅也故曰勿用有攸往濟成也小事小人之事也壅震動而遇坎坎為險阻故曰勿用有所往一夫之行也一夫一人也易曰震一索而得男故曰一夫又曰震為足故為行也衆順而有武威故曰利建侯覆述上事坤母也震長男也母老子彊故曰豫豫樂也其繇曰利建侯行師居樂出威之謂也居樂母在内也出威震在外也居樂故利建侯出威故利行師是二者得國之卦也二者屯豫也董因迎公於河董因晉大夫公問焉曰吾其濟乎對之臣筮之得㤗之八乾下坤上㤗遇秦無動爻筮為侯㤗三至五震為侯隂爻不動其數皆八故得㤗之八與貞屯悔豫皆八義同曰是謂天地配享小往大來陽下隂升故曰配享小喻子圉大喻文公隂在外為小往陽在内為大來今及之矣何不濟之有晉語晉成公之歸也晉筮之成公晉文之庶子成公黑臀也歸者自周歸于晉趙穿殺靈公趙盾逆公子黑臀于周而立之蓍曰筮筮立成公遇乾之否曰配而不終君三出焉乾上乾下乾坤下乾上否乾初九九二九三變而之否也乾天也君也故曰配配先君也不終子孫不終為君也乾下變為坤坤地也臣也天地不交曰否變有臣象三爻故三世而終上有乾乾天子也五亦天子五體不變因天子國也三爻有三變故君三出于國周語晉楚遇於鄢陵公筮之史曰吉其卦遇復震下坤上復無變曰南國䠞射其元王中厥目此卜者辭也復陽長之卦陽氣起子南行推隂故曰南國䠞也南國勢䠞則離受其咎離為諸侯又為目陽氣激南飛矢之象故曰射其元王中厥目國䠞王傷不敗何待成十六年左氏傳穆姜薨於東宮大子宮也穆姜淫僑如欲廢成公故徙居東宮事在成十六年始往而筮之遇艮之八艮下艮上艮周禮大卜掌三易然則雜用連山歸藏周易二易皆以七八為占故言遇艮之八史曰是謂艮之随震下兑上随史疑占易遇八為不利故更以周易占變爻得随卦而論之随其出也史謂随非閉固之卦君必速出姜曰亡亡猶無也是於周易曰随元亨利貞無咎易筮皆以變者占遇一爻變義異則論彖故姜亦以彖為占也史據周易故指言周易以折之元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事然固不可誣也是以雖随無咎言不誣四德乃遇随無咎明無四德者則為淫而相随非吉事今我婦人而與於亂固在下位婦人卑於丈夫而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣姣淫之别名不可謂貞有四德者随而無咎我皆無之豈随也哉我則取惡能無咎乎必死於此弗得出矣傳言穆姜辯而不德襄九年左氏傳齊棠公之妻東郭偃之姊也棠公死崔武子弔焉見棠姜而美之使偃取之為已取也武子筮之遇困坎下兑上困之大過巽下兑上大過困六三變為大過史皆曰吉阿崔子示陳文子文子曰夫從風坎為中男故曰夫變而為巽故曰從風風隕妻不可娶也風能隕落物者變而隕落故曰妻不可娶且其繇曰困于石據于蒺藜入于其宮不見其妻凶困六三爻辭困于石往不濟也故為險為水水之險者石不可以動據于蒺藜所恃傷也坎為險兑為澤澤之生物而險者蒺藜恃之則傷入于其宮不見其妻凶無所歸也易曰非所困而困名必辱非所據而據自必危既辱且危死其将至妻其可得見耶今卜昏而遇此卦六三失位無應則喪其妻失其所歸也崔子曰嫠也何害先夫當之矣寡婦曰嫠言棠公已當此凶遂取之襄二十五年左氏傳穆子之生也莊叔以周易筮之荘叔穆子父得臣也遇明夷離下坤上明夷之謙艮下坤上謙明夷初九變為謙以示卜楚丘楚丘卜人姓名曰是將行行出奔而歸為子祀奉祭祀以讒人入其名曰牛卒以餒死明夷日也離為明夷傷也日明傷日之數十甲至癸故有十時亦當十位自王已下其二為公其三為卿日中當土食時當公平旦為卿雞鳴為士夜半為皁人定為輿黃昏為隸日入為僚晡時為僕日昳為臺隅中日出闕不在第尊王公曠其位日上其中日中盛明故以當王食日為二公位旦日為三卿位明夷之謙明而未融其當旦乎融朗也離在坤下日在地中之象又變為謙謙道卑退故曰明而未融日明未融故曰其當旦乎故曰為子祀莊叔卿也卜豹為卿故知為子祀日之謙當鳥故曰明夷于飛離為日為鳥離變為謙日光不足故當鳥鳥飛行故曰于飛明而未融故曰垂其翼於日為未融於鳥為垂翼象日之動故曰君子于行明夷初九得位有應君子象也在明傷之世居謙下之位故将辟難而行當三在旦故曰三日不食旦位在三又非食時故曰三日不食離火也艮山也離為火火焚山山敗離艮合體故於人為言艮為言敗言為讒為離所焚故言敗故曰有攸往主人有言言必讒也離變為艮故言有所往往而見焚故主人有言言而見敗故必讒言純離為牛易離上離下離畜牝牛吉故言純離為牛世亂讒勝勝將適離故曰其名曰牛離焚山則離勝譬世亂則讒勝山焚則離獨存故知名牛也豎牛非牝牛故不吉謙不足飛不翔謙道冲退故飛不遠翔垂不峻翼不廣峻高也翼垂下故不能廣遠故曰其為子後乎不遠翔故知不遠去吾子亞卿也抑少不終旦日正卿之位莊叔父子世為亞卿位不足以終盡卦體葢引而致之昭五年左氏傳衛襄公夫人姜氏無子嬖人婤姶生孟縶孔成子夢康叔謂已立元成子衛卿孔達之孫烝鉏也元孟縶弟夢時元未生余使羈之孫圉與史苟相之羈烝鉏子苟史朝子史朝亦夢康叔謂已余將命而子苟與孔烝鉏之曽孫圉相元史朝見成子告之夢夢協協合也婤姶生子曰元孟縶之足不良弱行跛也孔成子以周易筮之曰元尚享衛國主其社稷令蓍辭遇屯震下坎上屯又曰余尚立縶尚克嘉之嘉善也遇屯之比坤下坎上比屯初九爻變以示史朝史朝曰元亨又何疑焉周易曰屯元亨成子曰非長之謂乎言屯之元亨謂年長非謂名元對曰康叔名之可謂長矣善之長也孟非人也將不列於宗不可謂長足跛非全人不可列為宗主且其繇曰利建侯繇卦辭嗣吉何建建非嗣也嗣子有常位故無所卜又無所建今以位不定卜嗣得吉則當從吉而建之也二卦皆云謂再得屯卦皆有建侯之文子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為外傳曰大誓曰朕夢協朕卜襲于休祥戎商必克此武王辭弱足者居跛則偏倚居其家不能行侯主社稷臨祭祀奉民人事鬼神從㑹朝又焉得居各以所利不亦可乎孟跛利居元吉利建故孔成子立靈公昭七年左氏傳南蒯將叛枚筮之不指其事汎卜吉凶遇坤坤下坤上坤之比坤下坎上比坤六五爻變曰黃裳元吉坤六五爻辭以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾甞學此矣忠信之事則可不然必敗外彊内温忠也坎險故彊坤順故温彊而能温所以為忠和以率貞信也水和而土安正和正信之本也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色言非黃下不共不得其飾不為裳事不善不得其極失中德外内倡和為忠不相違也率事以信為共率猶行也供養三德為善三德謂正直剛克柔克也非此三者弗當非忠信善不當此卦且夫易不可以占險將何事也且可飾乎夫易猶此易謂黃裳元吉之卦問其何事欲令從下之師中美能黃上姜為元下美則裳參成可筮參美盡備吉可如筮猶有闕也筮雖吉未也有闕謂不參成傳昭十二年左氏已上筮大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸奇于扐以象閏故再扐而後掛四營而成易十有八變而成卦八卦而小成詳見下右筮法天一地二天三地四天五地六天七地八天九地十此簡本在第十章之首程子曰宜在此今從之此言天地之數陽奇陰偶即所謂河圖者也其位一六居下二七居上三八居左四九居右五十居中就此章而言之則中五為衍母次十為衍子次一二三四為四象之位次六七八九為四象之數二老位于西北二少位于東南其數則各以其類交錯於外也天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此簡本在大衍之後今按宜在此天數五者一三五七九皆奇也地數五者二四六八十皆耦也相得謂一與二三與四五與六七與八九與十各以奇耦為類而自相得有合謂一與六二與七三與八四與九五與十皆兩相合二十有五者五奇之積也三十者五耦之積也變化謂一變生水而六化成之二化生火而七變成之三變生水而八化成之四化生金而九變成之五變生土而十化成之鬼神謂凡奇耦生成之屈伸往來者大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸奇于扐以象閏五嵗再閏故再扐而後掛大衍之數五十蓋以河圖中宮天五乘地十而得之至用以筮則又止用四十有九葢皆出於理勢之自然而非人之知力所能損益也兩謂天地也掛懸其一于左手小指之間也三三才也揲閒而數之也奇所揲四數之餘也扐勒于左手中三指之兩間也閏積月之餘日而成月者也五歳之間再積日而再成月故五嵗之中凡有再閏然後别起積分如一掛之後左右各一揲而一扐故五者之中凡有再扐然後别起一掛也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日凡此策數生于四象葢河圖四面太陽居一而連九少陰居二而連八少陽居三而連七太隂居四而連六揲蓍之法則通計三變之餘去其初掛之一凡四為奇凡八為耦奇圓圍三耦方圍四三用其全四用其半積而數之則為六七八九而第三變揲數䇿數亦皆符㑹葢餘三奇則九而其揲亦九䇿亦四九三十六是為居一之大陽餘二奇一耦則八而其揲亦八䇿亦四八三十二是為居二之少隂二耦一奇則七而其揲亦七䇿亦四七二十八是為居三之少陽三耦則六而其揲亦六策亦四六二十四是為居四之老隂是其變化往來進退離合之妙皆出自然非人之所能為也少隂退而未極乎虚少陽進而未極乎盈故此獨以老陽老隂計乾坤六爻之策數餘可推而知也期周一嵗也凡三百六十五日四分日之一此特舉成數而槩言之二篇之策萬有一千五百二十當萬物之數也二篇謂上下經凡陽爻百九十二得六千百九一十二策隂爻百九十二得四千六百八策合之得此數是故四營而成易十有八變而成卦四營謂分二掛一揲四歸奇也易變易也謂一變也三變成爻十八變則成六爻也八卦而小成謂九變而成三畫得内卦也引而伸之觸類而長之天下之能事畢矣謂已成六爻而視其爻之變與不變以為動靜則一卦可變而為六十四以定吉凶凡四千九十六卦也顯道神德行是故可與酬酢可與佑神矣道因辭顯行以數神酬酢謂應對祐神謂助神化之功子曰知變化之道者其知神之所為手變化之道即上文數法是也皆非人之所能為故夫子歎之而門人加子曰以别上文也矣此章言天地大衍之數揲蓍求卦之法然亦略意其詳具于大卜筮人之官而今不可考耳其可推者啟䝉備之易繋辭傳朱子曰大衍之數五十而蓍一根百莖可當大衍之數者二故揲蓍之法取五十莖為一握置其一不用以象大極而其當用之策凡四十有九葢兩儀體具而未分之象也四十有九蓍信手中分各置一手以象兩儀而掛右手一策于左手小指之間以象三才遂以四揲左手之策以象四時而歸其餘數於左手第四指間以象閏又以四揲右手之策而再歸其餘數於左手第三指間以象再閏五嵗之象掛一一也揲左二也扐左三也揲右四也扐右五也是謂一變其掛扐之數不五則九得五者三所謂奇也五除掛一即四以四約之為一故為奇即兩儀之陽數也得九者一所謂偶也九除掛一即八以四約之為二故為偶即兩儀之隂數也一變之後除前餘數復合其見存之策或四十或四十四分掛揲歸如前法是謂再變其掛扐者不四則八得四者二所謂奇也不去掛一餘同前義得八者二所謂偶也不去掛一餘同前義再變之後除前兩次餘數復合其見存之策或四十或三十六或三十二分掛揲歸如前法是謂三變其掛扐者如再變例三變既畢乃合三變視其掛扐之奇偶以分所遇隂陽老少是為一爻三奇為老陽者十有二掛扐之數十有三除初掛之一為十有二以四約而三分之為一者三一奇象圓而圍三故三一之中各復有三而積三三之數則為九過揲之數三十有六以四約之亦得九焉掛扐除一四分四十有八而得其一也一其十二而三其四也九之母也過揲之數四分四十八而得其三也三其十二而九其四也九之子也皆徑一而圍三也即四象太陽居一含九之數也兩奇一偶以偶為主為少隂者凡二十有八掛扐之數十有七除初掛之一為十有六以四約而三分之為一者二為二者一一奇象圓而用其全故二一之中各復有三一偶象方而用其半故一二之中復有二焉而積二三一二之數則為八過揲之數三十有二以四約之亦得八焉掛扐除一四其四也自一其十二者而進四也八之母也過揲之數八其四也自三其十二者而退四也八之子也即四象少隂居二含八之數也兩偶一奇以奇為主為少陽者凡二十掛扐之數二十有一除初掛之一為二十以四約而三分之為二者二為一者一二偶象方而用其半故二二之中各復有二一奇象圓而用其全故一一一之中復有三焉而積二二一三之數則為七過揲之數二十有八以四約之亦得七焉掛扐除一五其四也自兩其十二者而退四也七之母也過揲之數七其四也自兩其十二者而進四也七之子也即四象少陽居三含七之數也三偶為老隂者四掛扐之數二十有五除初掛之一為二十有四以四約而三分之為二者三二偶象方而用其半故三二之中各復有二而積三二之數則為六過揲之數亦二十有四以四約之亦得六焉掛扐除一六之母也過揲之數六之子也四分四十有八而各得其二也兩其十二而六其四也皆圍四而用半也即四象大隂居四含六之數也一爻已成再合四十九策復分掛揲歸以成一變每三變而成一爻並如前法易學啟䝉凡卦六爻皆不變則占本卦彖辭而以内卦為貞外卦為悔彖辭為卦下之辭孔成子筮立衛公子元遇屯曰利建侯秦伯伐晉筮之遇蠱曰貞風也其悔山也一爻變則以本卦變爻辭占沙隨程氏曰畢萬遇屯之比初九變也蔡墨曰乾之同人九二變也晉文公遇大有之暌九三變也陳敬仲遇觀之否六四變也南蒯遇坤之比六五變也晉獻公遇歸妹之暌上六變也二爻變則以本卦二變爻辭占仍以上爻為主經傳無文今以例推之當如此三爻變則占本卦及之卦之彖辭而以本卦為貞之卦為悔前十卦主貞後十卦主悔凡三爻變者通二十卦皆沙隨程氏曰晉公子重耳筮得國遇貞屯悔豫八葢初與四五凡三爻變也初與五用九變四用六變其不變者二三上在兩卦皆為八故云皆八而司空季子占之曰皆利建侯四爻變則以之卦二不變爻占仍以下爻為主經傳亦無文今以例推之當如此五爻變則以之卦不變爻占穆姜往東宮筮遇艮之八史曰是謂艮之隨葢五爻皆變惟二得八故不變也法宜以係小子失丈夫為占而史妄引隨之彖辭以對則非也六爻變則乾坤占二用餘卦占之卦彖辭蔡墨曰乾之坤曰見羣龍无首吉是也然羣龍无首即坤之牝馬先迷也坤之利永貞即乾之不言所利也於是一卦可變六十四卦而四千九十六卦在其中矣同上大卜掌三夢之法一曰致夢二曰觭夢三曰咸陟夢者人精神所寤可占者致夢言夢之所至夏后氏作焉咸皆也陟之言得也讀如王德翟人之德言夢之皆得周人作焉杜子春云觭讀為奇偉之奇其字直當為奇𤣥謂觭讀如諸戎掎之之掎亦得也亦言夢之所得殷人作焉其經運十其别九十運或為緷當為煇是眂祲所掌十煇也王者於天日也夜有夢則畫視日旁之氣以占其吉凶凡所占者十煇每煇九變此術今亡以八命者贊三兆三易三夢之占春官占夢掌其歳時觀天地之㑹辨隂陽之氣其嵗時今嵗四時也天地之㑹建厭所處之日辰隂陽之氣休王前後以日月星辰占六夢之吉凶日月星辰謂日月之行及合辰所在春秋昭三十一年十二月辛亥朔日食之是夜也晉趙簡子夢童子倮而轉以歌旦而日食占諸史墨對曰六年及此月也吳其入郢手終亦弗克入郢必以庚辰日月在辰尾庚午之日月始有適火勝金故弗克此以日月星辰占夢者其術則今八㑹其遺象也用占夢則亡一曰正夢無所感動平安自夢二曰噩夢杜子春云噩當為驚愕之愕謂驚愕而夢三曰思夢覺時所思念之而夢四曰寤夢覺時道之而夢五曰喜夢喜悦而夢六曰懼夢恐懼而夢季冬聘王夢獻吉夢于王王拜而受之聘問也季冬日窮于次月窮于紀星回于天數将幾終於是發幣而問焉若休慶之云爾因獻羣臣之吉夢於王歸美焉詩云牧人乃夢衆維魚矣旐維旟矣此所獻吉夢乃舎萌于四方以贈惡夢杜子春讀萌為明又云其字當為明明謂敺疫也謂嵗竟逐疫置四方書亦或為明𤣥謂舎讀為釋舎萌猶釋菜也古書釋菜釋奠多作舎字萌菜始生也贈送也欲以新善去舊惡同上右占夢王曰朕夢協朕卜襲于休祥戎商必克襲重也言我之夢協我之卜重有休祥之應知伐商而必勝之也㤗誓乃寢乃興乃占我夢吉夢維何維熊維羆維虺維蛇祝其君安其室居夢兆而有祥亦頌禱之辭也大人占之維熊維羆男子之祥維虺維蛇女子之祥大人大卜之屬占夢之官也熊羆陽物在山彊力壯毅男子之祥也虺蛇隂物穴處柔弱隠伏女子之祥也流或曰夢之有占何也曰人之精神與天地隂陽通故晝之所為夜之所夢其善惡吉凶各以類至是以先王建官設屬使之觀天地之㑹辨隂陽之氣以日月星辰占六夢之吉凶獻吉夢贈惡夢其於天人相與之際察之詳而敬之至矣故曰王前巫而後史宗祝瞽侑皆在左右王中心無為也以守至正小雅斯干牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱占夢之説未詳溱溱衆也或曰衆謂人也旐郊野所建統人少旟州里所建統人多葢人不如魚之多旐所統不如旟所統之衆故夢人乃是魚則為豐年旐乃是旟則為人衆小雅斯干禮書綱目卷七十三
