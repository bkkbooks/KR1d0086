body:
  text: 禮書綱目巻三十一婺源江永撰弔禮凶禮十五補宰夫凡邦之弔事掌其戒令詳見贈喪章喪祝王弔則與巫前鄭司農云喪祝與巫以桃茢執戈在王前檀弓曰君臨臣喪以巫祝桃茢執戈惡之也所以異于生也春秋傳曰楚人使公親禭公使巫以桃茢先祓殯楚人弗禁既而悔之君臨臣喪之禮故悔之春官男巫王弔則與祝前巫祝前王也故書前為先鄭司農云為先非也典路凡弔于四方以路從王乘一路典路亦以餘路從行亦以華國並春官大司馬若師不功王弔勞士庻子則相師敗王親弔士庻子之死者勞其傷者則相王之禮庻子卿大夫之子從軍者或謂之庻士大僕掌三公孤卿之弔勞王使徃小臣掌士大夫之弔勞此亦王使徃御僕掌羣吏之逆及庻民之復與其弔勞羣吏府史以下並夏官女巫若王后弔則與祝前女巫與祝前后如王禮春官女御從世婦而弔于卿大夫之喪從之数盖如使者之介云天官鬯人凡王弔臨共介鬯以尊適卑曰臨春秋傳曰照臨敝邑鄭司農云鬯香草王行弔喪被之故曰介𤣥謂曲禮曰摯天子鬯王至尊介為摯致之以禮于鬼神與檀弓曰臨諸侯畛于鬼神曰有天王某甫此王適四方舍諸侯祖廟祝告其神之辭介于是進鬯内宗凡卿大夫之喪掌其弔臨王后弔臨諸侯而已是以言掌卿大夫云並春官世婦掌弔臨于卿大夫之喪王使徃弔天官寺人凡内人弔臨于外則帥而徃立于其前而詔相之從世婦所弔若哭其族親立其前者賤也賤而必詔相之者出入于王宫不可以闕于禮同上内宗大喪序哭者次序外内宗及命婦哭王哭諸侯亦如之外宗大喪則叙外内朝莫哭者哭諸侯亦如之内内外宗及外命婦並春官君臨臣喪以巫祝桃茢執戈詳見喪禮義先王之制諸侯之喪士弔大夫送葬詳見㑹葬章弔者即位于門西東面其介在其東南北靣西上西于門主孤西面上客臨客立于門西介立于其左東上孤降自阼階拜之並雜記在黄氏曰諸侯使人弔含襚賵臨同日畢事其序則弔前臨在後今以弔臨為哀死者之事含襚賵是贈死者之事故舉弔臨两條之略于此其全文則詳見贈喪章列于含襚賵之先後庻有以見禮之序云君使人弔徹帷主人迎于寝門外見賓不哭詳見士喪禮大夫之喪將大斂既鋪絞紟衾衣君至詳見喪大記大斂章士之喪将大斂君不在其餘禮猶大夫也同上君于大夫世婦大斂焉為之賜則小斂焉詳見喪大記殯後受弔章大夫士既殯而君徃焉同上君若有賜則視斂詳見士喪禮君視斂章君弔見尸柩而后踊詳見喪大記殯後受弔章諸侯非問疾弔喪而入諸臣之家是謂君臣為謔詳見喪禮義喪公弔之曰寡君承事示亦為執事来主人曰臨君辱臨其臣之喪檀弓諸侯弔于異國之臣則其君為主君為之主弔臣恩為己也子不敢當主中庭北面哭不拜小記賓入竟而死遂也主人為之具而殯君弔介為主人詳見喪變禮君遇柩于路必使人弔之君于臣民有父母之恩檀弓夫人弔于大夫士主人出迎于門外詳見喪大記大夫君不迎于門外入即位于堂下同上五廟之孫祖廟未毁雖為庻人死必赴練祥則告族之相為也宜弔不弔宜免不免有司罰之弔謂六世以徃免謂五世至于賵賻承含皆有正焉承讀為贈聲之誤也正正禮也文王世子敬弔臨賻賵睦友之道也同上賵二條含襚通用公族之罪刑于隠者弗弔弗為服哭于異姓之廟為忝祖逺之也同上知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔人恩各施于所知也弔傷皆謂致命辭也雜記曰諸侯使人弔辭曰寡君聞君之喪寡君使某如何不淑此施于生者傷辭未聞也説者有弔辭云皇天降灾子遭罹之如何不淑此施于死者盖本傷辭辭畢退皆哭曲禮弔於人是日不樂君子哀樂不同日子扵是日哭則不歌行弔之日不飲酒食肉焉以全哀也檀弓弔生不及哀非禮也詳見賵章凡非弔喪非見國君無不答拜者禮尚徃来喪賓不答拜不自賓客也國君見士不答其拜士賤曲禮入臨不翔哀傷之無容樂同上有殯聞逺兄弟之喪同國則徃哭之喪無外事檀弓哭日不歌曲禮喪俟事不犆弔亦不敢故煩動也事朝夕哭時少儀齊者不樂不弔為哀樂則失正散其思也檀弓三年之喪雖功衰不弔自諸侯達諸士如有服而將徃哭之則服其服而徃功衰既練之服諸侯服新死者之服而徃哭謂所不臣也雜記練則弔父在為母功衰可以弔人者以父在故輕于出也然則凡齊衰十一月皆可以出矣同上既葬大功弔哭而退不聼事焉聼猶待也事謂襲斂執綍之属期之喪未葬弔于鄉人哭而退不聼事焉功衰弔待事不執事謂為姑姊妹無主殯不在己族者小功緦執事不與于禮禮具奠也同上曽子問曰三年之喪弔乎子曰三年之喪練不羣立不旅行為其苟語忘哀也君子禮以飾情三年之喪而弔哭不亦虚乎為彼哀則不専于親也為親哀則是妄弔曾子問有殯聞逺兄弟之喪雖緦必徃親骨肉也非兄弟雖鄰不徃疏無親也所識其兄弟不同居者皆弔就其家弔之成恩舊也檀弓婦人不越疆而弔人不通于外檀弓婦人非三年之喪不踰封而弔詳見奔喪五十無車者不越疆而弔人氣力始衰弓檀死而不弔者三謂輕身忘孝也畏人或時以非罪攻己己不能有以說而死之者孔子畏于匡壓行止危險之下溺不乗橋船同上其國有君喪不敢受弔辟其痛傷己之親如君雜記大夫之喪庻子不受弔不以賤者為有爵者主檀弓右弔臨哭附周人有喪魯人有喪周人弔魯人不弔周人曰固吾臣也使人可也魯人曰吾君也親之者也使大夫則不可也故周人弔魯人不弔以其下成康為未乆也周道尚明無愧于不徃定元年穀梁傳邾婁子来奔喪奔喪非禮也禮天子崩諸侯奔喪會葬諸侯薨有服者奔喪無服者㑹葬魯與邾娄無服故以非禮書定十五年公羊傳卒孝公卒有齊怨不廢喪紀禮也弔贈之数不有廢傳僖二十七年左氏文襄之覇也君薨大夫弔卿共葬事夫人士弔大夫送葬詳見㑹葬章滕成公之喪使子叔敬叔弔進書子叔敬叔魯宣公弟叔肸之曽孫叔弓也進書奉公弔書子服惠伯為介惠伯慶父𤣥孫之子名椒介副也及郊為懿伯之忌不入郊滕之近郊也懿伯惠伯之叔父忌怨也敬叔有怨于懿伯難惠侑也春秋傳曰敬叔不入惠伯曰政也不可以叔父之私不將公事政君命所為敬叔于昭穆以懿伯為叔父遂入惠伯強之乃入弓檀衛穆公卒晉三子自役弔焉哭于大門之外師還過衛故因弔之未復命故不敢成禮衛人逆之逆于門外設喪位婦人哭于門内喪位婦人哭于堂賓在門外故移在門内送亦如之遂常以葬至葬行此禮傳成二年左氏季康子卒公弔焉降禮禮不備也言公之多妄氏哀二十七年左傳季文子卒大夫入斂公在位在阼階西鄉傳襄五年左氏公子益師卒公不與小斂故不書日禮卿佐之喪小斂大斂君皆親臨之崇恩厚也始死情之所篤禮之所崇故以小斂為文左隠元年氏傳季孫之母死哀公弔焉曾子與子貢弔焉閽人為君在弗内也閽人守門者曾子與子貢入于其廄而脩容焉更荘飾子貢先入閽人曰郷者已告矣既不敢止以言下之曾子後入閽人辟之見兩賢相隨彌益敬也渉内霤卿大夫皆辟位公降一等而揖之禮之君子曰盡飾之道斯其行者逺矣檀弓公行子有子之喪右師徃弔入門有進而與右師言者有就右師之位而與右師言者公行子齊大夫右師王驩也孟子不與右師言右師不恱曰諸君子皆與驩言孟子獨不與驩言是簡驩也簡略也孟子聞之曰禮朝廷不厯位而相與言不踰階而相揖也我欲行禮子敖以我為簡不亦異乎是時齊卿大夫以君命弔各有位次若周禮凡有爵者之喪禮則職喪涖其禁令序其事故云朝廷也厯更涉也位他人之位也右師未就位而進與之言則右師厯已之位矣右師已就位而就與之言則已厯右師之位矣孟子右師之位又不同階孟子不敢失此禮故不與右師言也孟子顏回死魯定公弔焉使人訪于孔子孔子對曰凡在封内皆臣子也禮君弔其臣升自東階向尸而哭其恩賜之施不有笇也笇計也又竹器也語家衛靈公適魯遭季桓子之喪衛君請弔哀公辭不得命公為主客入弔康子立于門右北面公揖讓升自東階西鄉客升自西階弔公拜興哭康子拜稽顙于位有司弗辯也今之二孤自季康子之過也曽子問哀公使人弔蕢尚遇諸道辟于路畫宫而受弔焉哀公魯君也畫宫畫地為宫象曾子曰蕢尚不如杞梁之妻之知禮也行弔禮于野非齊荘公襲莒于奪杞梁死焉魯襄二十一年齊侯襲莒是也春秋傳曰杞殖華還載甲夜入且于之襚襚奪聲近或為兌梁即殖也其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免于罪則将肆諸市朝而妻妾執肆陳尸也大夫以上于朝士以下于市執拘也君之臣免于罪則有先人之敝廬在君無所辱命無所辱命辭不受也春秋傳曰齊侯弔諸其室檀弓魯人有同姓死而弗弔者人曰在禮當免不免當弔不弔有司罰之如之何子之無弔也答曰吾以其疏逺也子思聞之曰無恩之甚也昔者季孫問于夫子曰季孫季康子肥百世之宗有絶道乎子曰繼之以姓義無絶也故同姓為宗合族為属雖國子之尊國子諸侯卿大夫之子不廢其親所以崇愛也是以綴之以食序列昭穆萬世婚姻不通忠篤之道然也孔叢子顏淵死子曰噫天喪予天喪予噫傷痛聲悼道無傳若天喪已也顏淵死子哭之慟從者曰子慟矣曰有慟乎哀傷之至不自知也非夫人之為慟而誰為夫人謂顏淵言其死可惜哭之宜慟非他人之比也胡氏曰痛惜之至施當其可皆性情之正也子張死曽子有母之喪齊衰而徃哭之或曰齊衰不以弔以其無服非之曽子曰我弔也與哉于朋友哀痛甚而徃哭之非若凡事檀弓琴張聞宗魯死将徃弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉言齊豹所以為盗孟縶所以見賊皆由宗魯氏昭二十年左傳齊人歸公孫敖之喪為孟氏且國故也孟氏公孫敖家慶父為長庻故或稱孟氏敖卒則惠叔請之至今期年而猶未已為惠叔毁請且國之公族故聼其歸殯而書之襄仲欲勿哭怨敖取其妻惠伯曰喪親之終也雖不能始善終可也史佚有言曰兄弟致美各盡其美義乃終救乏賀善弔災祭敬喪哀情雖不同毋絶其愛親之道也襄仲說帥兄弟以哭之文十五年左氏傳鄭人殺良霄伯有死于羊肆羊肆市列子產襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城斗城鄭地名子駟氏欲攻子產子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止斂葬伯有為有禮襄三十年左氏傳陽門之介夫死陽門宋國門名介夫甲衛士司城子罕入而哭之哀宋以武公諱司空為司城子罕戴公子樂甫衎之後樂喜也晉人之覘宋者反報于晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也覘闚視也孔子聞之曰善哉覘國乎善其知微詩云凡民有疾扶服救之救猶助也雖㣲晉而已天下其孰能當之㣲猶非也弓檀小宰受其含禭幣玉之事詳見喪大記大宗伯以喪禮哀死亡哀謂親者服焉疏者含禭春官宰夫凡邦之弔事掌其戒令與其幣器財用凡所共者弔事弔諸侯諸臣幣所用賻也器所致明器也凡喪始死弔而含禭葬而賵贈其間加恩厚則有賻焉春秋譏武氏子来求賻天官大府凡邦國之貢以待弔用此九貢之財所給也給弔用給凶禮之五事同上職喪凡國有司以王命有事焉則詔賛主人有事謂含禭贈賻之屬詔賛者以告主人佐其受之鄭司農云凡國謂諸侯國有司謂王有司也以王命有事職喪主詔賛主人𤣥謂凡國有司有司從王國以王命佐凡公有司之所共職喪令之趣其事令令其當共物者給事之期也有司或言公或言國言國者由其君所来居其官曰公謂遣使奉命有贈之物各從其官出職喪當催督也春官諸侯使人弔其次含禭賵臨皆同日而畢事者也其次如此也言五者相次同時雜記弔者即位于門西東面其介在其東南北面西上西于門賔立門外不當門主孤西面主于阼階下相者受命曰孤某使某請事客曰寡君使某如何不淑受命受主人命以出也不言擯者喪無接賔也淑善也如何不善言君痛之甚使某弔相出入告出曰孤某須矣稱其君名者君薨稱子某使人知適嗣也湏矣不出迎也弔者入主人升堂西面弔者升自西階東面致命曰寡君聞君之喪寡君使某如何不淑子拜稽顙弔者降反位子孤子也出反位者出反門外位無出字脫含者執璧将命曰寡君使某含相者入告出曰孤某須矣含玉為璧制其分寸大小未聞含者入升堂致命子拜稽顙含者坐委于殯東南有葦席既葬蒲席降出反位言降出反位則是介也春秋有既葬歸含賵襚無譏焉皆受之于殯宫宰夫朝服即喪屦升自西階西面坐取璧降自西階以東朝服告鄰國之禮也即就也以東藏于内也襚者曰寡君使某襚相者入告出曰孤某須矣襚者執冕服左執領右執要入升堂致命曰寡君使某襚子拜稽顙委衣于殯東亦于席上所委璧之北順其上下襚者降受爵弁服于門内霤将命子拜稽顙如初受皮弁服于中庭自西階受朝服自堂受𤣥端将命子拜稽顙皆如初襚者降出反位授襚者以服者賈人宰人五人舉以東降自西階其舉亦西面亦西面者亦襚者委衣時上介賵執圭将命曰寡君使某賵相者入告反命曰孤某須矣陳乗黄大路于中庭北輈執圭將命客使自下由路西子拜稽顙坐委于殯東南隅宰舉以東輈轅也自率也下謂馬也馬在路之下覲禮曰路下四亞之客給使者也入設乗黃于大路之西客入則致命矣使或為史凡将命郷殯将命子拜稽顙西面而坐委之宰舉璧與圭宰夫舉襚升自西階西面坐取之降自西階凡者説不見者也鄉殯將命則将命時立于殯之西南宰夫宰之佐也此言宰舉璧與圭則上宰夫朝服衍夫字賵者出反位于門外乃著言門外明禮畢将更有事上客臨曰寡君有宗廟之事不得承事使一介老某相執綍上客弔者也臨視也言欲入視喪所不足而給助之謙也其實為哭耳相者反命曰孤某須矣臨者入門右介者皆從之立于其左東上入門右不自同于賓客宗人納賓升受命于君降曰孤敢辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賓客敢辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賓客敢固辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君命使臣某毋敢視賓客是以敢固辭固辭不獲命敢不敬從賓三辭而稱使臣為恭也為恭者將從其命客立于門西介立于其左東上孤降自阼階拜之升哭與客拾踊三拜客謝厚意客出送于門外拜稽顙不迎而送喪無接賓之禮雜記族之相為也賵賻承含皆有正焉敬弔臨賵賻睦友之道也並詳見弔章貨財曰賻輿馬曰賵衣服曰襚玩好曰贈玉貝曰含賻賵所以佐生也贈襚所以送死也送死不及柩尸弔生不及悲哀非禮也故賵贈及事禮之大也荀子喪詳見禮義諸侯相襚以後路與冕服先路與襃衣不以襚不以己之正者施于人以彼不以為正服所用也後路貳車貳車行在後也雜記臣致襚于君則曰致廢衣于賈人言廢衣不必其以斂也賈人知物善惡也周禮玉府掌凡王之獻金玉兵器文織良貨賄之物受而藏之有賈八人敵者曰襚少儀君無襚大夫士畢主人之祭服親戚之衣受之不以即陳詳見喪大記君使人襚徹帷主人如初襚者左執領右執要入升致命詳見士喪禮親者襚不將命以即陳同上庶兄弟襚使人以将命于室主人拜于位委衣于尸東牀上同上朋友襚親以進同上親者兄弟不以襚進不執将命者以即陳而已少儀有禭者則将命擯者出請入告主人待于位朋友親襚如初儀襚者以褶則必有裳執衣如初升降自西階以東詳見士喪禮臣為君喪納貨貝于君則曰納甸扵有司甸謂田野之物少儀賵馬入廟門以其主于死者賻馬與其幣大白兵車不入廟門以其主于生人也兵車革路也雖為死者來陳之于外戰伐田獵之服非盛者也周禮革路建大白以即戎賻者既致命坐委之擯者舉之主人無親受也喪者非尸柩之事不親也舉之舉以東同上若賻入告主人出門主西面賓東面将命主人拜賓坐委之詳見士喪禮知生者賻同上弔喪弗能賻不問其所費曲禮公賵𤣥纁束馬两擯者出請入告主人釋杖迎于廟門外不哭賓賵者将命擯者出請入告出告須馬入設賓奉幣兄弟賵奠可也所知則賵而不奠書賵于方若九若七若五主人之史請讀賵若奠入告出以賓入将命如初士受羊如受馬贈者将命擯者出請納賓如初賓奠幣如初若就器則坐奠于陳凡将禮必請而後拜送至于邦門公使宰夫贈𤣥纁束主人去杖不哭由左聴命賓由右致命知死者贈凡贈幣無常並詳見士喪禮右贈喪含襚賻賵奠贈文公四年夫人風氏薨五年春王正月王使榮叔歸含且賵珠玉曰含含口實車馬曰賵禮也成風莊公之妾天子以夫人禮賵之明毋以子貴故曰禮春秋左氏傳含者何口實也孝子所以實親口也縁生以事死不忍虚其口天子以珠諸侯以玉大夫以碧士以貝春秋之制也文家加飯以稻米其言歸含且賵何㩀宰咺歸两賵不言且也連賵何之者嫌㩀賵言歸兼之兼之非禮也且兼辭以言且知譏兼之也含言歸者時主持含来也去天者含者臣子職以至尊行至卑事失尊之義也不從含晚言来者本不當含也主書者從含也公羊傳含一事也賵一事也兼歸之非正也禮含賵襚各異人其曰且志兼也其不言來不周事之用也何休曰四年夫人風氏薨九年秦人来歸僖公成風之襚最晚矣何以言来鄭君釋之曰秦自敗于殽之後與晉為仇兵無休時乃始免繆公之喪而来君子原情不責晚用或作辭賵以早乘馬曰賵乘馬所以助葬成風未葬故書早而含已晚已殯故言晚國有逺近皆令及事理不通也雜記曰含者執璧将命曰寡君使某含相者入告出曰孤某須矣含者入升堂致命子拜稽顙含者坐委于殯東南明君之于臣有含賵之義所以助喪盡恩含不必用示有其禮傳榖梁諸侯伐秦曹桓公卒于㑹魯成十三年曹伯廬卒于師廬諡宣言桓聲之誤也諸侯請含以朋友有相啖食之道使之襲非也襲賤者之事襄公朝于荆康王卒在襄二十八年楚言荆者州言之荆人曰必請襲欲使襄公衣之魯人曰非禮也荆人強之欲尊康王巫先拂柩荆人悔之巫祝桃茢君臨臣喪之禮邾婁考公之喪考公隠公益之曽孫考或為定徐君使容居来弔弔且含曰寡君使容居坐含進侯玉其使容居以含欲親含非也含不使賤者君行則親含大夫歸含耳言侯玉者時徐僣稱王自比天子有司曰諸侯之来辱敝邑者易則易于則于易于雜者未之有也容居以臣欲行君禮徐君自比天子使大夫敵諸侯有司拒之並檀弓王有姻喪晉使趙成如周弔且致襚昭九年左氏傳秦人來歸僖公成風之襚禮也秦慕諸夏欲通敬于魯因有翟泉之盟故追贈僖公并及成風本非魯方嶽同盟無有相赴弔之制故不譏其緩而以接好為禮諸侯相弔賀也雖不當事苟有禮焉書也以無忘舊好送死不及尸故曰不當事氏文九年左傳其言僖公成風何兼之兼之非禮也禮主于敬當各使一使所以别尊卑公羊傳衛有大史曰栁莊寢疾獻公曰若疾革雖當祭必告革急也公再拜稽首請于尸曰有臣栁荘也者非寡人之臣社稷之臣也聞之死請徃急弔賢者不釋服而徃遂以襚之脫君祭服以襚臣親賢也所以此襚之者以其不用襲也凡襚以歛檀弓齊侯伐晉夷儀敝無存先登求自門出死于霤下既入城夷儀人不服故鬬死于門屋霤下也得其尸公三襚之襚衣也比殯三加襚深禮厚之與之犀軒與直盖犀軒卿車直盖髙盖而先歸之坐引者以師哭之停喪車以盡哀也君方為位而哭故挽喪者不敢立親推之三齊侯自推喪車輪三轉左定九年氏傳武氏子来求賻喪事無求求賻非禮也盖通于下嫌天子財多不當求下財少可求之故明皆不當求之隠三年公羊傳歸死者曰賵歸生者曰賻曰歸之者正也求之者非正也周雖不求魯不可以不歸魯雖不歸周不可以求之求之為言得不得未可知之辭也交譏之榖梁傳伯髙之喪孔氏之使者未至謂賻賵者冉子攝束帛乘馬而将之孔子曰異哉徒使我不誠于伯髙徒猶空也禮所以副忠信也忠信而無禮何傳乎孔子之衛遇舊館人之喪前日君所使舍己入而哭之哀出使子貢說驂而賻之賻助喪用也騑馬曰驂子貢曰扵門人之喪未有所說驂說驂于舊館無乃已重乎言說驂大重比于門人恩為偏頗夫子曰予鄉者入而哭之遇于一哀而出涕遇見也舊館人恩雖輕我入哭見主人為我盡一哀是以厚恩待我我為出涕㤙重冝有施惠予惡夫涕之無從也小子行之客行無他物可以易之者使遂以徃並檀弓隠公元年秋七月天王使宰咺来歸惠公仲子之賵宰官咺名仲子者桓公之母婦人無諡故以字配姓贈死不及尸尸未葬之通稱弔生不及哀諸侯已上既葬則縗麻除無哭位諒閽終喪豫凶事非禮也仲子在而来贈故曰豫凶事左氏傳仲子者桓之母也喪事有賵賵者盖以馬以乗馬束帛此道周制也以馬者謂士不備四也禮既夕曰公賵𤣥纁两馬是也乗馬者謂大夫以上備四也禮大夫以上至天子皆乗四馬所以通四方也天子馬曰龍髙七尺以上諸侯曰馬髙六尺以上卿大夫士曰駒髙五尺以上束帛謂𤣥三纁二𤣥三法天纁二法地因取足以共事車馬曰賵貨財曰賻衣被曰襚此道春秋制也賵猶覆也贈猶助也皆助生送死之禮襚遺也遺是助死之禮知生者賵賻知死者贈襚公羊傳賵者何也乗馬曰賵衣衾曰襚貝玉曰含錢財曰賻四馬曰乗含口實榖梁傳宋景曹卒景曹宋元公夫人小邾女季桓子外祖母季康子使冉有弔且送葬曰以肥之得備彌甥也彌逺也康子父之舅氏故稱彌孫有不腆先人之產焉使求薦夫人之宰其可以稱旌繁乎求冉有名稱舉也繁馬飾繁纓也哀二十三年左氏傳天子諸侯之喪斬衰者奠大夫齊衰者奠士則朋友奠不足則取于大功以下者不足則反之詳見士喪禮陳大斂奠章曽子問曰廢喪服可以與于饋奠之事乎孔子曰說衰與奠非禮也以擯相可也詳見喪變禮天子諸侯之喪祭也不斬衰者不與祭大夫齊衰者與祭士祭不足則取扵兄弟大功以下者詳見喪大記虞祭章卒哭獻畢尸出門入徹主人不與詳見卒哭祔練祥禫記賓執事者如弔服皆即位于門外如朝夕臨位詳見士虞禮朋友虞祔而退詳見㑹葬章曽子問曰相識有喪服可以與于祭乎孔子曰緦不祭又何助于人詳見喪變禮凡侍祭喪者告賓祭薦而不食薦脯醢也吉祭告賓祭薦賓既祭而食之喪祭賓不食雜記宰夫三公六卿之喪與職喪帥官有司而治之凡諸大夫之喪使其旅帥有司而治之詳見喪大記戒臣民章適有喪者曰比適之也曰某願比于将命者比猶比方俱給事童子曰聴事曰某願聼事于将命者童子未成人不敢當相見之禮適公卿之喪則曰聼役于司徒喪憂戚無賓主之禮皆為執事来也少儀童子無緦服聴事不麻無事則立主人之北南面皆為㓜少不備禮也雖不服緦猶免深衣無麻徃給事也玉藻士之喪胥為侍士是斂詳見喪大記助葬必執紼曲禮右執事助奠助祭治事孔子之故人曰原壤其母死夫子助之沐椁檀弓孔子之喪公西赤為志焉子張之喪公明儀為志焉同上送葬不由徑送葬不辟塗潦曲禮㑹葬之禮于鄙上從竟至墓主為送葬来文五年榖梁傳相趨也出宫而退相揖也哀次而退相問也既封而退相見也反哭而退朋友虞祔而退此弔者恩厚薄去遲速之節也相趨謂相聞姓名来㑹喪事也相揖嘗㑹于他也相問嘗相惠遺也相見嘗執摯相見也附當為祔雜記天子七月而葬同軌畢至言同軌以别四夷之國諸侯五月同盟至同在方嶽之盟大夫三月同位至古者行役不踰時士踰月外姻至姻猶親也傳隠元年左氏君若載而後弔之則主人東面而拜門右北面而踊待反而後奠詳見士喪禮君于大夫将葬弔于宫及出命引之三歩則止如是者三君退朝亦如之哀次亦如之以義奪孝子宫殯宫出謂柩已在路退去也三命引之凡移九歩君弔不必于宫朝喪朝廟也次他日賓客所受大門外舍也孝子至此而哀君或于是弔焉檀弓適兄弟之送葬者弗及遇主人于道則遂之扵墓詳見奔喪望柩不歌曲禮弔于葬者必執引若從柩及壙皆執紼示助之以力車曰引棺曰紼從柩贏者檀弓臨喪則必有哀色執紼不笑曲禮助葬必執紼同上臨喪不笑同上弔非從主人也四十者必執綍言弔者必助主人之事從猶隨也成人二十以上至四十丁壮時鄉人五十者從反哭四十者待盈坎非鄉人則長少皆反優逺也雜記乃反哭賓弔自西階曰如之何詳見士喪禮右㑹葬文公九年二月叔孫得臣如京師辛丑葬襄王王者不書葬此何以書不及時書過時書重録失時我有徃者則書謂使大夫徃也惡文公不自徃故書葬以起大夫㑹之公羊傳天子志崩不志葬舉天下而葬一人其道不疑也志葬危不得葬也不得備禮葬穀梁傳文公四年冬夫人風氏薨五年王使榮叔歸含且賵葬我小君成風王使召伯来㑹葬禮也成風荘公之妾天子以夫人禮賵之明母以子貴故曰禮左氏傳襄公三十有一年滕子来㑹葬葬晉頃公鄭㳺吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔之蟜送葬在襄十五年今吾子無貳何故弔葬共使對曰先王之制諸侯之喪士弔大夫送葬唯嘉好聘享之事于是乎使卿晉之喪事敝邑之間先君有所助執紼矣紼輓索也禮送葬必執紼若其不間雖士大夫有所不獲数矣不得如先王禮数靈王之喪在襄二十九年我先君簡公在楚我先大夫印叚實徃敝邑之少卿也少年少也王吏不討恤所無也今大夫曰女盍從舊舊有豐有省不知所從從其豐則寡君幼弱是以不共從其省則吉在此矣唯大夫圖之晉人不能詰傳言大叔之敏傳昭三十年左氏文襄之覇也其務不煩諸侯君薨大夫弔卿共葬事夫人士弔大夫送葬先王之制諸侯之喪士弔大夫送葬盖時俗過制故文襄雖節之猶過于古昭三年左氏傳齊姜薨齊侯使諸姜宗婦来送葬宗婦同姓大夫之婦婦人越疆送葬非禮襄二年左氏傳葬楚康王公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓襄二十九年左氏傳凡民有喪匍匐救之箋云匍匐言盡力也凡民于有凶禍之事鄰里尚盡力徃救之况我于君子家事之難易乎邶風谷風凡民有喪扶服救之無服之喪也孔子閒居親始死三日不舉火故鄰里為之糜粥以飲食之詳見喪禮義鄰有喪舂不相里有殯不巷歌助哀也相謂送杵聲謂檀弓註皆所以助哀也相以音聲相勸曲禮檀弓有死于宫中者則為之三月不舉祭詳見喪服緦麻章適墓不登壟為其不敬壟冢也墓塋域曲禮適墓不歌非樂所也同上右哀有喪子食于有喪者之側未嘗飽也臨喪哀不能甘也子于是日哭則不歌哭謂弔哭一日之内餘哀未忘自不能歌也謝氏曰學者于此二者可見聖人性情之正也能識聖人之情性然後可以學道論語子見齊衰者雖狎必變孔子曰狎者素親狎凶服者式之凶服送死之衣服子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨並論語襄公十九年晉士匄帥師侵齊至榖聞齊侯卒乃還還者何善辭也何善爾大其不伐喪也此受命乎君而伐齊則何大乎其不伐喪大夫以君命出進退在大夫也公羊傳杞孝公卒晉悼夫人喪之悼夫人晉平公母杞孝公姊妹平公不徹樂非禮也徹去也禮為鄰國闕禮諸侯絶期故以鄰國責之襄二十三年左氏傳季武子之喪曽㸃倚其門而歌明已不興也檀弓禮書綱目卷三十一
