body:
  text: 禮書綱目卷三十九婺源江永撰特牲饋食禮吉禮六經鄭目録云特牲饋食之禮謂諸侯之士祭祖禰非天子之士而于五禮屬吉禮特牲饋食之禮祭祀自孰始曰饋食饋食者食道也右篇目記士祭其先曲禮適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼王制曰大夫士有田則祭無田則薦適士上士也官師中士下士庶士府史之屬此適士云顯考無廟非也當為皇考字之誤見祭法詳宗廟篇士一廟謂諸侯之中士下士名曰官師者上士二廟王制士以羊豕疏曰天子之士也若諸侯之士則用特牲曲禮大夫士宗廟之祭有田則祭無田則薦有田者既祭又薦新祭以首時薦以仲月士薦牲用特豚牲王制詳見祭物犧章惟士無田則亦不祭孟子父為天子諸侯子為士祭以士其尸服以士服詳見祭法父為大夫子為士葬以大夫祭以士中庸不諏日諏謀也士賤職䙝時至事暇可以祭則筮其日矣不如少牢大夫先與有司于廟門諏丁巳之日及筮日主人冠端𤣥即位于門外西面冠端𤣥𤣥冠𤣥端下言𤣥者𤣥冠有不𤣥端者門謂廟門子姓兄弟如主人之服立于主人之南西面北上所祭者之子孫言子姓者子之所生小宗祭而兄弟皆來與焉宗子祭則族人皆侍有司羣執事如兄弟服東面北上士之屬吏也席于門中闑西閾外為筮人設之也古文闑作􅈏閾作蹙筮人取筮于西塾執之東面受命于主人筮人官名也筮問也取其所用問神明者謂蓍也宰自主人之左贊命命曰孝孫某筮來日某諏此某事適其皇祖某子尚饗宰羣吏之長自由也贊佐也達也贊命由左者為神求變也士祭曰嵗事此言某事又不言妃者容大祥之後禫月之吉祭皇君也言君祖者尊之也某子者祖字也伯子仲子也尚庶幾也筮者許諾還即席西面坐卦者在左卒筮寫卦筮者執以示主人士之筮者坐蓍短由便卦者主畫地識爻爻備以方寫之主人受視反之反還筮者還東面長占卒告于主人占曰吉長占以其年之長幼旅占之若不吉則筮逺日如初儀逺日旬之外日宗人告事畢右筮日記凡卜筮日旬之外曰逺某日旬之内曰近某日吉事先近日吉事祭祀冠娶之屬也曲禮前期三日之朝筮尸如求日之儀命筮曰孝孫某諏此某事適其皇祖某子筮某之某為尸尚饗三日者容宿賔視濯也某之某者字尸父而名尸連言其親庶幾其馮依之也大夫士以孫之倫為尸右筮尸記祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則取于同姓可也詳見祭通禮尸章乃宿尸宿讀為肅肅進也進之者使知祭日當來凡宿或作速記作肅周禮亦作宿主人立于尸外門外子姓兄弟立于主人之後北面東上不東面者來不為賔客子姓立于主人之後上當其後尸如主人服出門左西面不敢南面當尊主人辟皆東面北上順尸主人再拜尸答拜主人先拜尊尸宗人擯辭如初卒曰筮子為某尸占曰吉敢宿宗人擯者釋主人之辭如初者如宰贊命筮尸之辭卒曰者著其辭所見祝許諾致命受宗人辭許之傳命于尸始宗人祝北面至于傳尸皆西面受命東面釋尸許諾主人再拜稽首其許亦宗人受于祝而告主人尸入主人退相揖而去尸不拜送尸尊右宿尸宿賓賓如主人服出門左西面再拜主人東面答再拜宗人擯曰某薦嵗事吾子將涖之敢宿薦進也涖臨也言吾子將臨之知賓在有司中今特宿之尊賓耳賓曰某敢不敬從主人再拜賓答拜主人退賓拜送右宿賓厥明夕陳鼎于門外北面北上有鼏厥其也宿賓之明日夕門外北面當門也古文鼏為密棜在其南南順實獸于其上東首順猶從也棜之制如今大木舉矣上有四周下無足獸腊也牲在其西北首東足其西棜西也東足者尚右也牲不用棜以其生設洗于阼階東南壺禁在東序豆籩鉶在東房南上几席兩敦在西堂東房房中之東當夾北西堂西夾室之前近南耳主人及子姓兄弟即位于門東如初初筮位也賓及衆賓即位于門西東面北上不言如初者以宰在而宗人祝不在宗人祝立于賓西北東面南上事彌至位彌異宗人祝於祭宜近廟主人再拜賓答再拜三拜衆賓衆賓答再拜衆賓再拜者士賤旅之得備禮也主人揖入兄弟従賓及衆賓從即位于堂下如外位為視濯也宗人升自西階視壺濯及豆籩反降東北面告濯具濯溉也不言敦鉶者省文也東北面告縁賓意欲聞也言濯具不言絜以有几席賓出主人出皆復外位為視牲也宗人視牲告充雍正作豕充猶肥也雍正官名也北面以䇿動作豕視聲氣宗人舉獸尾告備舉鼎鼏告絜備具請期曰羮飪肉謂之羮飪孰也謂明日質明時而曰肉孰重豫勞賓宗人既得期西北面告賓有司告事畢賓出主人拜送右視濯視牲告期記設洗南北以堂深東西當東榮榮屋翼也水在洗東祖天地之左海篚在洗西南順實二爵二觚四觶一角一散順從也言南従統於堂也二爵者為賓獻爵止主婦當致也二觚長兄弟酬衆賓長為加爵二人班同迎接並也四觶一酌奠其三長兄弟酬賓卒受者與賓弟子兄弟弟子舉觶於其長禮殺事相接禮器曰貴者獻以爵賤者獻以散尊者舉觶卑者舉角舊説云爵一升觚二升觶三升角四升散五升壺棜禁饌于東序南順覆兩壺焉蓋在南明日卒奠冪用綌即位而徹之加勺覆壺者盠瀝水且為其不宜塵冪用綌以其堅絜禁言棜者祭尚厭飫得與大夫同器不為神戒也本經記夙興主人服如初立于門外東方南面視側殺夙早也興起也主人服如初則其餘有不𤣥端者側殺殺一牲也主婦視饎爨于西堂下炊黍稷曰饎宗婦為之爨竈也西堂下者堂之西下也近西壁南齊于坫古文饎作糦周禮作􅐪亨于門外東方西面北上亨煮也煮豕魚腊以鑊各一爨詩云誰能亨魚溉之釜鬵右視殺記特牲饋食其服皆朝服𤣥冠緇帶緇韠於祭服此也皆者謂賓及兄弟筮日筮尸視濯亦𤣥端至祭而朝服朝服者諸侯之臣與其君日視朝之服大夫以祭今賓兄弟縁孝子欲得嘉賓尊客以事其祖禰故服之緇韠者下大夫之臣夙興主人服如初則固𤣥端唯尸祝佐食𤣥端𤣥裳黄裳雜裳可也皆爵韠與主人同服周禮士之齊服有𤣥端素端然則𤣥裳上士也黄裳中士雜裳下士本經記牲爨在廟門外東南魚腊爨在其南皆西面饎爨在西壁饎炊也西壁堂之西牆下舊説云南北直屋梠稷在南同上羮飪實鼎陳于門外如初初視濯也尊于户東𤣥酒在西户東室户東𤣥酒在西尚之凡尊酌者在左實豆籩鉶陳于房中如初如初者取而實之既而反之執事之俎陳于階間二列北上執事謂有司及兄弟二列者因其位在東西祝主人主婦之俎亦存焉不升鼎者異於神盛兩敦陳于西堂藉用萑几席陳于西堂如初盛黍稷者宗婦也萑細葦古文用為于尸盥匜水實于槃中簞巾在門内之右設盥水及巾尸尊不就洗又不揮門内右象洗在東統于門東西上凡鄉内以入為左右鄉外以出為左右祝筵几于室中東面為神敷席也至此使祝接神主婦纚筓宵衣立于房中南面主婦主人之妻雖姑存猶使之主祭祀纚笄首服宵綺屬也此衣染之以黒其繒本名曰宵詩有素衣朱宵記有𤣥宵衣凡婦人助祭者同服也内則曰舅没則姑老冢婦所祭祀賓客每事必請於姑主人及賓兄弟羣執事即位于門外如初宗人告有司具具猶辯也主人拜賓如初揖入即位如初初視濯也佐食北面立于中庭佐食賓佐尸食者立于宗人之西右陳設即位記籩巾以綌也纁裹棗烝栗擇籩有巾者果實之物多皮核優尊者可烝裹之也烝擇互文舊説云纁裹者皆𤣥被鉶芼用苦若薇皆有滑夏葵冬荁苦苦荼也荁堇屬乾之冬滑於葵詩云周原膴膴堇荼如飴本經記佐食當事則户外南面無事則中庭北面當事將有事而未至同上主人及祝升祝先入主人従西面于户内祝先入接神宜在前也少牢饋食禮曰祝盥于洗升自西階主人盥升自阼階祝先入南面主婦盥于房中薦兩豆葵菹蝸醢醢在北主婦盥盥于内洗昏禮婦洗在北堂直室東隅宗人遣佐食及執事盥出命之盥出當助主人及賓舉鼎主人降及賓盥出主人在右及佐食舉牲鼎賓長在右及執事舉魚腊鼎除鼏及與也主人在右統於東主人與佐食者賓尊不載少牢饋食禮魚用鮒腊用麋士腊用兔宗人執畢先入當阼階南面畢狀如又蓋為其似畢星取名焉主人親舉宗人則執畢導之既錯又以畢臨匕載備失脱也雜記曰枇用桑長三尺畢用桑三尺刋其本與末枇畢同材明矣今此朼用棘心則畢亦用棘心鼎西面錯右人抽扃委于鼎北右人謂主人及賓既錯皆西面俟也贊者錯俎加匕贊者執俎及匕從鼎入者其錯俎東縮加匕東柄既則退而左人北面也乃朼右人也尊者於事指使可也左人載之佐食升肵俎鼏之設于阼階西肵謂心舌之俎也郊特牲曰肵之為言敬也言主人之所以敬尸之俎古文鼏皆作密卒載加匕于鼎卒已也已載畢亦加焉主人升入復位俎入設于豆東魚次腊特于俎北入設俎載者腊特饌要方也凡饌必方者明食味人之牲所以正主婦設兩敦黍稷于俎南西上及兩鉶芼設于豆南南陳宗婦不贊敦鉶者以其少可親之芼菜也祝洗酌奠奠于鉶南遂命佐食啓㑹佐食啓㑹卻于敦南出立于西南面酌奠奠其爵觶少牢饋食禮啓㑹乃奠之主人再拜稽首祝在左稽首服之甚者祝在左當為主釋辭於神也祝祝曰孝孫某敢用剛鬛嘉薦普淖用薦某事於皇祖某子尚饗卒祝主人再拜稽首右設陰厭記棘心匕刻刻若今龍頭本經記肵俎心舌皆去本末午割之實于牲鼎載心立舌縮俎午割從横割之亦勿没立縮順其性心舌知食味者欲尸之饗此祭是以進之同上凡祝呼佐食許諾呼猶命也同上祝迎尸于門外尸自外來代主人接之就其次而請不拜不敢與尊者為禮周禮掌次凡祭祀張尸次主人降立于阼階東主人不迎尸成尸尊尸所祭者之孫也祖之尸則主人乃宗子禰之尸則主人乃父道事神之禮廟中而已出迎則為厭尸入門左北面盥宗人授巾待盥者執其器就之執簞者不授巾賤也宗人授巾庭長尊少牢饋食禮曰祝先入門右尸入門左尸至于階祝延尸尸升入祝先主人従延進在後詔侑曰延禮器所謂詔宥武方者也少牢饋食禮曰尸升自西階入祝従主人升自阼階祝先入主人従尸即席坐主人拜妥尸妥安坐也尸答拜執奠祝饗主人拜如初饗勸彊之也其辭取于士虞記則宜云孝孫某圭為孝薦之饗舊説云明薦之祝命挼祭尸左執觶右取菹㨎于醢祭于豆間命詔尸也挼祭祭神食也士虞禮古文曰祝命佐食隨祭周禮曰既祭則藏其墮墮與挼讀同耳㨎醢者染於醢佐食取黍稷肺祭授尸尸祭之祭酒啐酒告旨主人拜尸奠觶答拜肺祭刌肺也旨美也祭酒穀味之芬芳者齊敬共之唯恐不美告之美達其心明神享之祭鉶嘗之告旨主人拜尸答拜鉶肉味之有菜和者曲禮曰客絮羮主人辭不能亨祝命爾敦佐食爾黍稷于席上爾近也近之便尸之食也設大羮湇于醢北大羮湇煮肉汁也不和貴其質設之所以敬尸也不祭不嚌大羮不為神非盛者也士虞禮曰太羮湆自門入今文湇皆為汁舉肺脊以授尸尸受振祭嚌之左執之肺氣之主也脊正體之貴者先食啗之所以導食通氣乃食食舉舉言食者明凡解體皆連肉主人羞肵俎于腊北肵俎主於尸主人親羞敬也神俎不親設者貴得賓客以神事其先尸三飯告飽祝侑主人拜三飯告飽禮一成也侑勸也或曰又勸之使又食少牢饋食禮侑辭曰皇尸未實侑也佐食舉幹尸受振祭嚌之佐食受加于肵俎舉獸幹魚一亦如之幹長脅也獸腊其體數與牲同尸實舉于菹豆為將食庶羞舉謂肺脊佐食羞庶羞四豆設于左南上有醢庶衆也衆羞以豕肉所以為異味四豆者膮炙胾醢南上者以膮炙為上以有醢不得䋫也尸又三飯告飽祝侑之如初禮再成也舉骼及獸魚如初尸又三飯告飽祝侑之如初禮三成獸魚如初者獸骼魚一也舉肩及獸魚如初不復飯者三三者士之禮大成也舉先正脊後肩自上而卻下䋫而前終始之次也佐食盛肵俎俎釋三个佐食取牲魚腊之餘盛于肵俎將以歸尸俎釋三个為改饌于西北隅遺之所釋者牲腊則正脊一骨長脅一骨及臑也魚則三頭而已个猶枚也今俗言物數有若干個者此讀然舉肺脊加于肵俎反黍稷于其所尸授佐食佐食受而加之反之也肺脊初在菹豆右迎尸正祭記尸入主人及賓皆辟位辟位逡遁本經記沃尸盥者一人奉槃者東面執匜者西面淳沃執巾者在匜北匜北執匜之北亦西面每事各一人淳沃稍注之今文淳作激宗人東面取巾振之三南面授尸卒執巾者受宗人代授巾庭長尊同上尸俎右肩臂臑肫胳正脊二骨横脊長脅二骨短脅尸俎神俎也士之正祭禮九體貶於大夫有併骨二亦得十一之名合少牢之體數此所謂放而不致者凡俎實之數竒脊無中脅無前貶於尊者不貶正脊不奪正也正脊二骨長脅二骨者將舉於尸尸食未飽不欲空神俎膚三為籑用二厭飫一也離肺一離猶㨒也小而長午割之亦不提心謂之舉肺刌肺三為尸主人主婦祭今文刌為切魚十有五魚水物以頭枚數陰中之物取數於月十有五日而盈少牢饋食禮亦云十有五而俎尊卑同此所謂經而等也腊如牲骨不但言體以有一骨二骨者同上尸卒食而祭饎爨雍爨雍孰肉以尸享祭竈有功也舊説云宗婦祭饎爨亨者祭雍爨用黍肉而已無籩豆俎禮器曰燔燎于爨夫爨者老婦之祭盛於盆尊於瓶同上主人洗角升酌酳尸酳猶衍也是獻尸衍也云酳者尸既卒食又欲頥衍養樂之不用爵者下大夫也因父子之道質而用角角加人事略者今文酳皆為酌尸拜受主人拜送尸祭酒啐酒賔長以肝従尸左執角右取肝㨎于鹽振祭嚌之加于菹豆卒角祝受尸角曰送爵皇尸卒爵主人拜尸答拜曰送爵者節主人拜右主人酳尸祝酌授尸尸以醋主人醋報也祝酌不洗尸不親酌尊尸也古文醋作酢主人拜受角尸拜送主人退佐食授挼祭退者進受爵反位尸將嘏主人佐食授之挼祭亦使祭尸食也其授祭亦取黍稷肺祭主人坐左執角受祭祭之祭酒啐酒進聽嘏聽猶待也受福曰嘏嘏長也大也待尸授之以長大之福也佐食摶黍授祝祝授尸尸受以菹豆執以親嘏主人獨用黍者食之主其辭則少牢饋食禮有焉主人左執角再拜稽首受復位詩懐之實于左袂挂于季指卒角拜尸答拜詩猶承也謂奉納之懷中季小也實于左袂挂祛以小指者便卒角也少牢饋食禮曰興受黍坐振祭嚌之主人出寫嗇于房祝以籩受變黍言嗇因事託戒欲其重稼嗇嗇者農力之成功右尸醋主人親嘏筵祝南面主人自房還時主人酌獻祝祝拜受角主人拜送設菹醢俎行神恵也先獻祝以接神尊之菹醢皆主婦設之佐食設俎祝左執角祭豆興取肺坐祭嚌之興加于俎坐祭酒啐酒以肝従祝左執角右取肝㨎于鹽振祭嚌之加于俎卒角拜主人答拜受角酌獻佐食佐食北面拜受角主人拜送佐食坐祭卒角拜主人答拜受角降反于篚升入復位右主人獻祝佐食記祝俎髀脡脊二骨脅二骨凡接於神及尸者俎不過牲三體以特牲約加其可併者二亦得竒名少牢饋食禮羊豕各三體膚一離肺一佐食俎觳折脊脅三體卑者従正膚一離肺一主婦洗爵于房酌亞獻尸亞次也文猶貳主婦貳獻不夾拜者士祭儀簡耳尸拜受主婦北面拜送北面拜者辟内子也大夫之妻拜於主人北西面宗婦執兩籩戸外坐主婦受設于敦南兩籩棗栗棗在西祝贊籩祭尸受祭之祭酒啐酒籩祭棗栗之祭其祭之亦於豆祭兄弟長以燔従尸受振祭嚌之反之燔炙肝也羞燔者受加于肵出出者俟後事也尸卒爵祝受爵命送如初送者送卒爵右主婦亞獻尸記宗婦贊薦者執以坐于户外授主婦酢如主人儀尸酢主婦如主人儀者自祝酌至尸拜送如酢主人也不易爵辟内子主婦適房南面佐食挼祭主婦左執爵右撫祭祭酒啐酒入卒爵如主人儀撫挼祭示親祭佐食不授而祭于地亦儀簡也入室卒爵於尊者前成禮明受恵也右尸酢主婦獻祝籩燔従如初儀及佐食如初卒以爵入于房及佐食如初如其獻佐食則拜主人之北西面也右主婦獻祝佐食賓三獻如初燔従如初爵止初亞獻也尸止爵者三獻禮成欲神恵之均於室中是以奠而待之右賓三獻尸尸奠爵席于户内為主人鋪之西面席自房來主婦洗爵酌致爵于主人主人拜受爵主婦拜送爵主婦拜拜於北面也今文曰主婦洗酌爵宗婦贊豆如初主婦受設兩豆兩籩初贊亞獻也主婦薦兩豆籩東面也俎入設佐食設之主人左執爵祭薦宗人贊祭奠爵興取肺坐絶祭嚌之興加于俎坐捝手祭酒啐酒絶肺祭之者以離肺長也少儀曰牛羊之肺離而不提心豕亦然捝拭也捝手者為絶肺染汙也忖肺不捝手古文捝皆作説肝従左執爵取肝㨎于鹽坐振祭嚌之宗人受加于俎燔亦如之興席末坐卒爵拜於席末坐卒爵敬也一酌而備再從而次之亦均主婦答拜受爵酌醋左執爵拜主人答拜坐祭立飲卒爵拜主人答拜右主婦致爵于主人記阼俎臂正脊二骨横脊長脅二骨短脅主人尊欲其體得祝之加數五體又於加其可併者二亦得竒名臂左體臂膚一離肺一主婦出反于房主人降洗酌致爵于主婦席于房中南面主婦拜受爵主人西面答拜宗婦薦豆俎従獻皆如主人主人更爵酌醋卒爵降實爵于篚入復位主人更爵自酢男子不承婦人爵也祭統曰夫婦相授受不相襲處酢必易爵明夫婦之别右主人致爵于主婦記主婦俎觳折觳後足折分後右足以為佐食俎不分左臑折辟大夫妻其餘如阼俎餘謂脊脅膚肺三獻作止爵賓也謂三獻者以事命之作起也舊説云賓入尸北面向皇尸請舉爵尸卒爵酢酌獻祝及佐食洗爵酌致于主人主婦燔従皆如初更爵酌于主人卒復位洗乃致爵為異事新之燔従皆如初者如亞獻及主人主婦致爵也凡獻佐食皆無従其薦俎獻兄弟以齒設之賓更爵自酢亦不承婦人爵右賓終三獻主人降阼階西面拜賓如初洗拜賓而洗爵為將獻之如初視濯時主人再拜賓答拜三拜衆賓衆賓答再拜賓辭洗卒洗揖讓升酌西階上獻賓賓北面拜受爵主人在右答拜就賓拜者此禮不主於尊也賓卑則不専階主人在右統於其位薦脯醢設折俎凡節解者皆曰折俎不言其體畧云折俎非貴體也上賓骼衆賓儀公有司設之賓左執爵祭豆奠爵興取肺坐絶祭嚌之興加于俎坐捝手祭酒卒爵拜主人答拜受爵酌酢奠爵拜賓答拜主人酌自酢者賓不敢敵主人主人達其意主人坐祭卒爵拜賓答拜揖執祭以降西面奠于其位位如初薦俎従設位如初復其位東面少牢饋食禮宰夫執薦以従設于祭東司士執俎以從設于薦東是則皆公有司為之與衆賓升拜受爵坐祭立飲薦俎設于其位辯主人備答拜焉降實爵于篚衆賓立飲賤不備禮鄉飲酒記曰立卒爵者不拜既爵備盡盡人之答拜右主人獻賓及衆賓記賓與長兄弟之薦自東房其餘在東堂東堂東夾之前近南賓骼長兄弟及宗人折其餘如佐食俎骼左骼也賓俎全體尊賓不用尊體為其已甚卑而全之其宜可也長兄弟及宗人折不言所分略之衆賓及衆兄弟内賓宗婦若有公有司私臣皆殽脀又略此所折骨直破折餘體可殽者升之俎一而已不備三者賤祭禮接神者貴凡骨有肉曰殽祭統曰凡為俎者以骨為主貴者取貴骨賤者取賤骨貴者不重賤者不虚示均也俎者所以明恵之必均也善為政者如此故曰見政事之均焉公有司亦士之屬命於君者也私臣自已所辟除者膚一離肺一宗人獻與旅齒於衆賓尊庭長齒從其長幼之次公有司門西北面東上獻次衆賓私臣門東北面西上獻次兄弟升受降飲獻在後者賤也祭祀有上事者貴之亦皆與旅尊兩壺于阼階東加勺南枋西方亦如之為酬賓及兄弟行神恵不酌上尊卑異之就其位尊之兩壺皆酒優之先尊東方示恵由近禮運曰澄酒在下主人洗觶酌于西方之尊西階前北面酬賓賓在左先酌西方者尊賓之義主人奠觶拜賓答拜主人坐祭卒觶拜賓答拜主人洗觶賓辭主人對卒洗酌西面賓北面拜西面者鄉賓位立於西階之前賓所答拜之東北主人奠觶于薦北奠酬於薦左非為其不舉行神恵不可同於飲酒賓坐取觶還東面拜主人答拜卒奠觶于薦南揖復位還東面就其位薦西奠觶薦南明將舉右主人酬賓主人洗爵獻長兄弟于阼階上如賓儀酬賓乃獻長兄弟者獻之禮成於酬先成賓禮此主人之義亦有薦脀設于位私人為之與洗獻衆兄弟如衆賓儀獻卑而必為之洗者顯神恵此言如衆賓儀則如衆賓洗明矣右主人獻兄弟記賓與長兄弟之薦自東房其餘在東堂詳見上獻賓章長兄弟折其餘如佐食俎衆兄弟私臣皆殽脀膚一離肺一同上私臣門東北面西上獻次兄弟同上洗獻内兄弟于房中如獻衆兄弟之儀内兄弟内賓宗婦也如衆兄弟如其拜受坐祭立飲設薦俎于其位而立内賓位在房中之尊北不殊其長略婦人者也有司徹曰主人洗獻内賓于房中南面拜受爵主人西面答拜更爵酢卒爵降實爵于篚入復位爵辯乃自酢以初不殊其長也内賓之長亦南面答拜右主人獻内賓宗婦記内賓宗婦皆殽脀膚一離肺一詳見獻賓章酬内賓宗婦之位見下旅無算爵章長兄弟洗觚為加爵如初儀不及佐食洗致如初無従大夫士三獻而禮成多之為加也不及佐食無従殺也致致於主人主婦右長兄弟為加爵衆賓長為加爵如初爵止尸爵止者欲神恵之均於在庭右衆賓長為加爵尸奠爵嗣舉奠盥入北面再拜稽首嗣主人將為後者舉猶飲也使嗣子飲奠者將傳重累之者大夫之嗣子不舉奠辟諸侯尸執奠進受復位祭酒啐酒尸舉肝舉奠左執觶再拜稽首進受肝復位坐食肝卒觶拜尸備答拜焉食肝受尊者賜不敢餘也備猶盡也每拜答之以尊者與卑者為禮略其文耳古文備為復舉奠洗酌入尸拜受舉奠答拜尸祭酒啐酒奠之舉奠出復位啐之者答其欲酢已也奠之者復神之奠觶嗣齒於子姓凡非主人升降自西階右嗣舉奠記嗣舉奠佐食設豆鹽肝宜鹽也本經記兄弟弟子洗酌于東方之尊阼階前北面舉觶于長兄弟如主人酬賓儀弟子後生也右弟子舉觶于長兄弟宗人告祭脀脀俎也所告者衆賓兄弟内賓也獻時設薦俎于其位至此禮又殺告之祭使成禮也其祭皆離肺不言祭豆可知乃羞羞庶羞也下尸胾醢豆而已此所羞者自祝主人至於内賓無内羞右告祭設羞賓坐取觶阼階前北面酬長兄弟長兄弟在右薦南奠觶賓奠觶拜長兄弟答拜賓立卒觶酌于其尊東面立長兄弟拜受觶賓北面答拜揖復位其尊長兄弟尊也此受酬者拜亦北面長兄弟西階前北面衆賓長左受旅如初旅行也受行酬也初賓酬長兄弟長兄弟卒觶酌于其尊西面立受旅者拜受長兄弟北面答拜揖復位衆賓及衆兄弟交錯以辯皆如初儀交錯猶言東西為加爵者作止爵如長兄弟之儀於旅酬之間言作止爵明禮殺並作長兄弟酬賓如賓酬兄弟之儀以辯卒受者實觶于篚長兄弟酬賓亦坐取其奠觶此不言交錯以辨賓之酬不言卒受者實觶于篚明其相報禮終於此其文省賓弟子及兄弟弟子洗各酌于其尊中庭北面西上舉觶于其長奠觶拜長皆答拜舉觶者祭卒觶拜長皆答拜舉觶者洗各酌于其尊復初位長皆拜舉觶者皆奠觶于薦右奠觶進奠之于薦右非神恵也今文曰奠于薦右長皆執以興舉觶者皆復位答拜長皆奠觶于其所皆揖其弟子弟子皆復其位復其位者東西面位弟子舉觶于其長所以序長幼教孝弟凡堂下拜亦皆北面爵皆無算算數也賓取觶酬兄弟之黨長兄弟取觶酬賓之黨唯已所欲亦交錯以辯無次第之數因今接㑹使之交恩定好優勸之右旅酬無算爵旅酬間衆賓長終加爵記宗人獻與旅齒於衆賓見獻賓章佐食於旅齒於兄弟本經記尊兩壺于房中西墉下南上為婦人旅也其尊之節亞西方内賓立于其北東面南上宗婦北堂東面北上二者所謂内兄弟内賓姑娣妹也宗婦族人之婦其夫屬于所祭為子孫或南上或北上宗婦宜統於主婦主婦南面北堂中房而北主婦及内賓宗婦亦旅西面西面者異於獻也男子獻于堂上旅於堂下婦人獻於南面旅於西面内賓象衆賓宗婦象兄弟其節與其儀依男子也主婦酬内賓之長酌奠于薦左内賓之長坐取奠于右宗婦之娣婦舉觶於其姒婦亦如之内賓之長坐取奠觶酬宗婦之姒交錯以辯宗婦之姒亦取奠觶酬内賓之長交錯以辯内賓之少者宗婦之娣婦各舉奠於其長並行交錯無算其拜及飲者皆西面主婦之東南同上利洗散獻于尸酢及祝如初儀降實散于篚利佐食也言利以今進酒也更言獻者以利事尸禮將終宜一進酒嫌於加酒亦當三也不致爵禮又殺也右利獻尸及祝主人出立于户外西面事尸禮畢祝東面告利成利猶養也供養之禮成不言禮畢於尸間之嫌尸謖祝前主人降謖起也前猶導也少牢饋食禮曰祝入尸謖主人降立于阼階東西面祝先尸従遂出于廟門前尸之儀士虞禮備矣祝反及主人入復位命佐食徹尸俎俎出于廟門俎所以載肵俎少牢饋食禮曰有司受歸之右告利成尸出記尸入主人及賓皆辟位出亦如之賓従尸俎出廟門乃反位賓従尸送尸也士之助祭終其事也俎尸俎也賓既送尸復入乃反位者宜與主人為禮乃去之徹庶羞設于西序下為將餕去之庶羞主為尸非神饌也尚書傳曰宗室有事族人皆侍終日大宗已侍於賔奠然後燕私燕私者何也已祭而與族人飲也此徹庶羞置西序下者為將以燕飲與然則自尸祝至於兄弟之庶羞宗子以與族人燕飲於堂内賓宗婦之庶羞主婦以燕飲於房筵對席佐食分簋鉶為將餕分之也分簋者分敦黍於㑹為有對也敦有虞氏之器也周制士用之變敦言簋容同姓之士得従周制耳祭統曰餕者祭之末也不可不知也是故古之人有言曰善終者如始餕其是已是故古之君子曰尸亦餕鬼神之餘恵術也可以觀政矣宗人遣舉奠及長兄弟盥立于西階下東面北上祝命嘗食􅅪者舉奠許諾升入東面長兄弟對之皆坐佐食授舉各一膚命告也士使嗣子及兄弟􅅪其恵不過族親古文􅅪皆作餕主人西面再拜祝曰􅅪有以也兩􅅪奠舉于俎許諾皆答拜以讀如何其乆也必有以也之以祝告􅅪釋辭以戒之言女􅅪此當有所以也以先祖有徳而享于此祭其坐餕其餘亦當以之也少牢饋食禮不戒者非親昵也舊説曰主人拜下􅅪席南若是者三丁寧戒之皆取舉祭食祭舉乃食祭鉶食舉食乃祭鉶禮殺卒食主人降洗爵宰贊一爵主人升酌酳上􅅪上􅅪拜受爵主人答拜酳下􅅪亦如之少牢饋食禮曰贊者洗三爵酌主人受于户内以授次􅅪舊説云主人北面授下􅅪爵主人拜祝曰酳有與也如初儀主人復拜為戒也與讀如諸侯以禮相與之與言女酳此當有所與也與者與兄弟也既知似先祖之徳亦當與女兄弟謂教化之兩􅅪執爵拜答主人也祭酒卒爵拜主人答拜兩􅅪皆降實爵于篚上􅅪洗爵升酌酢主人主人拜受爵下􅅪復兄弟位不復升也上􅅪即位坐答拜既授爵戸内乃就坐主人坐祭卒爵拜上􅅪答拜受爵降實于篚主人出立于户外西面事餕者禮畢右􅅪祝命徹阼俎豆籩設于東序下命命佐食阼俎主人之俎宗婦不徹豆籩徹禮略各有為而已設于東序下亦將燕也祝執其俎以出東面于户西俟告利成少牢下篇曰祝告利成乃執俎以出宗婦徹祝豆籩入于房徹主婦薦俎宗婦既並徹徹其卑者士虞禮曰祝薦席徹入于房右徹俎佐食徹尸薦俎敦設于西北隅几在南厞用筵納一尊佐食闔牖户降厞隠不知神之所在或諸逺人乎尸謖而改饌為幽闇庶其饗之所以為厭飫少牢饋食禮曰南面如饋之設此所謂當室之白陽厭也則尸未入之前為陰厭矣曽子問曰殤不備祭何謂陰厭陽厭也祝告利成降出主人降即位宗人告事畢賓出主人送于門外再拜拜送賓也凡去者不答拜佐食徹阼俎堂下俎畢出記俎出節兄弟及衆賓自徹而出唯賓俎有司徹歸之尊賓者右陽厭事畢禮書綱目卷三十九
