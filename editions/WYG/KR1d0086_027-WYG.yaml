body:
  text: 禮書綱目卷二十五婺源江永撰士虞禮凶禮六經鄭目録云虞安也士既葬父母迎精而反日中而祭之于殯宫以安之虞于五禮屬凶士虞禮右篇目記士三虞詳見喪大記虞祭章始虞用柔日再虞如初三虞卒哭他用剛日詳見本篇饗神章既封主人贈而祝宿虞尸既反哭主人與有司視虞牲有司以几筵舍奠于墓左反日中而虞葬日虞是日也以虞易奠詳見喪禮義婦之喪虞卒哭其夫若子主之祔則舅主之婦謂凡適婦庶婦也虞卒哭祭婦非舅事也祔于祖廟尊者冝主焉小喪服記凡主兄弟之喪雖疏亦虞之喪事虞祔乃畢雜記士祭不足則取于兄弟大功以下者詳見喪大記祭章虞沐浴不櫛沐浴者将祭自潔清不櫛未在于飾也唯三年之喪不櫛期以下櫛可也今文曰沐浴本經記凡喪小功以上非虞祔練祥無沐浴言不有飾事則不沐浴雜記自天子逹于庶人喪從死者祭從生者詳見喪大記篇首報葬者報虞三月而后卒哭報讀為赴疾之赴謂不及期而葬也既葬即虞虞即安神也卒哭之祭待哀殺也小記並有喪虞先重而後輕詳見喪變禮父母之喪偕先葬者不虞祔待後事其葬服斬衰詳見喪服變除並有喪服章父母之喪将祭而昆弟死既殯而祭如同宫則雖臣妾葬而后祭祭主人之升降散等執事者亦散等雖虞祔亦然詳見卒哭祔練祥禫記練章朋友虞祔而已詳見喪通禮主後章朋友虞祔而退詳弔禮㑹葬章特豕饋食饋猶歸也側亨于廟門外之右東面側亨亨一胖也亨于㸑用鑊不于門東未可以吉也是日也以虞易奠祔而以吉祭易喪祭鬼神所在則曰廟尊言之魚腊㸑亞之北上㸑灶饎㸑在東壁西面炊黍稷曰饎饎北上上齊于屋宇于虞有亨饎之㸑彌吉設洗于西階西南水在洗西篚在東反吉也亦當西榮南北以堂深尊于室中北牖下當户兩甒醴酒酒在東無禁幂用絺布加勺南枋酒在東上醴也絺布葛屬素几葦席在西序下有几始鬼神也苴刌茅長五寸束之實于篚饌于西坫上苴猶藉也饌兩豆菹醢于西楹之東醢在西一鉶亞之醢在西南面取之得左取菹右取醢便其設之從獻豆兩亞之四籩亞之北上豆從王人獻祝籩从主婦獻尸祝北上菹與棗不東陳别于正饌黍稷二敦于階間西上藉用葦席藉猶薦也古文藉為席匜水錯于盤中南流在西階之南簞巾在其東流匜吐水口也陳三鼎于門外之右北面北上設扄鼏門外之右門西也今文扄為鉉匕爼在西塾之西不饌於塾上統於鼎也塾有西者是室南鄉羞燔俎在内西塾上南順南順于南面取縮執之便也肝俎在燔東右陳饌具記虞而立尸有几筵䟽曰有几筵者未葬之前殯宫雖有酺醢之奠不立几筵其大歛之奠雖有殯宫但有席而已亦無几也此席素席故前云奠以素噐其下室之内有吉几筵今葬訖既設虞祭有素几筵雖大歛之時已有至于虞祭更立筵與几相配弓檀陳牲于廟門外北首西上寝右言牲腊在其中西上變吉寝右者當升左胖也腊用棜檀弓曰既反哭主人與有司視虞牲日中而行事朝葬日中而虞君子舉事必用辰正也再虞三虞皆質明殺于廟門西主人不視豚解主人視牲不視殺凡為喪事畧也豚解解前後脛脊脅而已孰乃體解升于鼎也今文無廟羮飪升左肩臂臑肫骼脊脅離肺膚祭三取諸左膉上肺祭一實于上鼎肉謂之羮飪熟也脊脅正脊正脅也喪祭畧七體耳離肺舉肺也少牢饋食禮曰舉肺一長終肺祭肺三皆刌膉脰肉也古文曰左股上字从肉从殳殳矛之殳聲升魚鱄鮒九實于中鼎差减之升腊左胖髀不升實于下鼎腊亦七體牲之類皆設扄鼏陳之嫌既陳乃設扄鼏也今文扄作鉉古文鼏作宻鉶芼用苦若薇有滑夏用葵冬用荁有柶苦苦荼也荁菫類也乾則滑夏秋用生葵冬春用乾荁古文苦為楛今或作笇豆實葵菹菹以西蠃醢籩棗蒸栗擇棗烝栗擇則菹刌也棗蒸栗擇則豆不揭籩有籐也桑並本經記小士喪禮上篇陳小歛奠章批畢用大歛奠章功與饋奠以下當互考祝俎髀脰脊脅離肺陳于階間敦東不升于鼎賤也統于敦明神惠也祭以離肺下尸同上主人及兄弟如葬服賔執事者如弔服皆即位于門外如朝夕臨位婦人及内兄弟服即位于堂亦如之葬服者既夕曰丈夫髽散帶垂也賔執事者賔客来執事也祝免澡葛絰帶布席于室中東面右几降出及宗人即位于門西東面南上祝亦執事免者者祭祀之禮祝所親也澡治也治葛以為首絰及帶接神宜變也然則士之屬官為其長弔服如麻矣至于既卒哭主人變服則除右几于席近南也右門外位布席室中宗人告有司具遂請拜賔如臨入門哭婦人哭臨朝夕哭主人即位于堂衆主人及兄弟賔即位于西方如反哭位既夕曰哭反哭入門升自西階東面衆主人堂下東面北上異于朝夕祝入門左北面不與執事同位接神尊也宗人西階前北面當詔主人及賔之事右門内位祝盥升取苴降洗之升入設于几東席上東縮降洗觶升止哭縮从也古文縮為蹙主人倚杖入祝從在左西面主人北旋倚杖西序乃入喪服小記曰虞杖不入于室賛薦菹醢醢在北主婦不薦齊斬之服不執事也曽子問曰士祭不足則取于兄弟大功以下者佐食及執事盥出舉長在左舉舉鼎也長在左在西方位也凡事宗人詔之鼎入設于西階前東面北上匕俎從設左人抽扄鼏匕佐食及右人載載載于俎佐食載則亦在右矣今文扄為鉉古文鼏為宻卒朼者逆退復位復賔位也俎入設于豆東魚亞之腊特亞次也今文無之賛設二敦于俎南黍其東稷簋實尊黍也設一鉶于豆南鉶菜羮也佐食出立于户西饌已也今文無于户西賛者徹鼎反于門外祝酌醴命佐食啓㑹佐食許諾啓㑹郤于敦南復位㑹合也謂敦蓋也復位出立于户西今文啟為開祝奠觶于鉶南復位復位復主人之左右設饌記虞杖不入于室祔杖不升于室哀益衰敬彌多也虞于寝祔于祖廟小記載猶進柢魚進鬐猶猶士喪既夕言未可以吉也柢本也鬐脊也今文柢為眡古文鬐為耆本經記主人在室則宗人升户外北面當詔主人室事佐食無事則出户負依南面室中尊不空立户牖之間謂之依同上主人再拜稽首祝饗命佐食祭饗告神饗也此祭祭于苴也饗神辭記所謂哀子某哀顯相夙興夜處不寧下至適爾皇祖某甫饗是也佐食許諾鉤􅃝取黍稷祭于苴三取膚祭祭如初祝取奠觶祭亦如之不盡益反奠之主人再拜稽首鉤􅃝如今擐衣也苴所以藉祭也孝子始将納尸以事其親為神疑于其位設苴以定之耳或曰苴主道也則特牲少牢當有主象而無可乎祝祝卒主人拜如初哭出復位祝祝者釋孝子祭辭右饗神謂隂厭周禮喪祝掌喪祭祝號喪祭虞也記始虞用柔日葬之日日中虞欲安之柔日隂取其静曰哀子某哀顯相夙興夜處不寧曰辭也祝祝之辭也喪祭稱哀顯相助祭者也顯明也相助也詩云於穆清廟肅雍顯相不寜悲思不安敢用絜牲剛鬛敢昧冐之辭豕曰剛鬛香合黍也大夫士于黍稷之號合言普淖而已此言香合盖記者誤耳辭次黍又不得在薦上嘉薦普淖嘉薦菹醢也普淖黍稷也普大也淖和也徳能大和乃有黍稷故以為號云明齊溲酒明齊新水也言以新水溲釀此酒也郊特牲曰明水涗齊貴新也或曰當為明視謂兎腊也今文曰明粢粢稷也皆非其次今文溲為醙哀薦祫事始虞謂之祫事者主欲其祫先祖也以與先祖合為安今文曰古事適爾皇祖某甫爾女也女死者告之以適皇祖所以安之也皇君也某甫皇祖字也若言尼甫饗勸强之也再虞皆如初曰哀薦虞事丁日葬則已日再虞其祝辭異者一言耳三虞卒哭他用剛日亦如初曰哀薦成事當祔于祖廟為神安于此後虞改用剛日剛日陽也陽取其動也士則庚日三虞壬日卒哭其祝辭異者亦一言耳他謂不及時而葬者䘮服小記曰報葬者報虞三月而後卒哭然則虞卒哭之間有祭事者亦用剛日其祭無名謂之他者假設言之文不在卒哭上者以其非常也令正者自相亞也檀弓曰葬日中而虞弗忍一日離也是日也以虞易奠卒哭曰成事是日也以吉祭易喪祭明日祔于祖父如是虞為喪祭卒哭為吉祭今文他為它記本經喪稱哀子哀孫詳見卒哭祔練祥禫記祝迎尸一人衰絰奉篚哭從尸尸主也孝子之祭不見親之形象心無所繋立尸而主意焉一人主人兄弟檀弓曰既封主人贈而祝宿虞尸尸入門丈夫踊婦人踊踊不同文者有先後也尸入主人不降者喪事主哀不主敬淳尸盥宗人授巾淳沃也沃尸盥者賔執事者也尸及階祝延尸延進也告之以升尸升宗人詔踊如初言詔踊如初則凡踊宗人詔之尸入户踊如初哭止哭止尊尸婦人入于房辟執事者主人及祝拜妥尸尸拜遂坐妥安坐也右迎尸記尸服卒者之上服上服者如特牲士𤣥端也不以爵弁服為上者祭于君之服非所以自配鬼神士之妻則宵衣耳男男尸女女尸必使異姓不使賤者異姓婦也賤者謂庶孫之妾也尸配尊者必使適也尸入祝從尸祝在主人前也嫌如初時主人倚杖入祝从之初時主人之心尚若親存冝自親之今既接神視當詔侑尸也尸坐不説屨侍神不敢燕惰也今文説為稅淳尸盥執槃西面執匜東面執巾在其北東面宗人授巾南面槃以盛棄水為淺汚人也執巾不授巾早也本經記祭成喪者必有尸尸必以孫孫㓜則使人抱之無孫則取于同姓可也人以有子孫為成人子不殤父義由此也曽子問從者錯篚于尸左席上立于其北北席北也尸取奠左執之取菹擩于醢祭于豆間祝命佐食墮祭下祭曰墮墮之猶言墮下也周禮曰既祭則藏其堕謂此也今文墮為綏特牲少牢或為羞失古正矣齊魯之間謂祭為墮佐食取黍稷肺祭授尸尸祭之祭奠祝祝主人拜如初尸甞醴奠之如初亦祝祝卒乃再拜稽首佐食舉肺脊授尸尸受振祭嚌之左手執之右手将有事也尸食之時亦奠肺脊于豆祝命佐食邇敦佐食舉黍錯于席上邇近也尸祭鉶甞鉶右手也少牢曰以柶祭羊鉶遂以祭豕鉶甞羊鉶泰羮湇自門入設于鉶南胾四豆設于左博異味也湇肉汁也胾切肉也尸飯播餘于篚不反餘也古者飯用手吉時播餘于會古文播為半三飯佐食舉幹尸受振祭嚌之實于篚飯間㗖肉安食氣又三飯舉胳祭如初佐食舉魚腊實于篚尸不受魚腊以䘮不備味又三飯舉肩祭如初後舉肩者貴要成也舉魚腊俎俎釋三个釋猶遺也遺之者君子不盡人之歡不竭人之忠个猶枚也今俗或名枚曰個音相近此腊亦七體如其牲也尸卒食佐食受肺脊實于篚反黍如初設九飯而已士禮也篚猶吉祭之有肵俎右尸食記饗辭曰哀子某圭為而哀薦之饗饗辭勸强尸之辭也圭潔也詩曰吉圭為饎凡吉祭饗尸曰孝子本經記主人洗廢爵酌酒酳尸尸拜受爵主人北面答拜尸祭酒嘗之爵無足曰廢爵酳安食也主人北面以酳酢變吉也凡異者皆變吉古文酳作酌賓長以肝從實于俎縮右塩縮从也從實肝炙于俎也䘮祭進柢右塩于俎近北便尸取之也縮執俎言右塩則肝鹽併也尸左執爵右取肝擩塩振祭嚌之加于俎賔降反俎于西墊復位取肝右手也加于俎从其牲體也以䘮不志于味尸卒爵祝受不相爵主人拜尸答拜不相爵喪祭于禮畧相爵者特牲曰送爵皇尸卒爵右主人酳尸祝酌授尸尸以醋主人主人拜受爵尸答拜醋報主人坐祭卒爵拜尸答拜右尸醋主人筵祝南面祝接神尊也筵用萑席主人獻祝祝拜坐受爵主人答拜獻祝因反西南位薦菹醢設俎祝左執爵祭薦奠爵興取肺坐祭嚌之興加于俎祭酒甞之肝從祝取肝擩塩振祭嚌之加于俎卒爵拜主人答拜祝坐授主人今文無擩塩右主人獻祝主人酌獻佐食佐食北面拜坐受爵主人答拜佐食祭酒卒爵拜主人答拜受爵出實于篚升堂復位篚在庭不復入事已也亦因取杖乃東面立右主人獻佐食主婦洗足爵于房中酌亞獻尸如主人儀爵有足輕者飾也昏禮曰内洗在北堂直室東隅自反兩籩棗栗設于㑹南棗在西尚棗棗美尸祭籩祭酒如初賔以燔從如初尸祭燔卒爵如初右主婦亞獻酌獻祝籩燔從獻佐食皆如初以虚爵入于房初主人儀右主婦獻祝佐食賔長洗繶爵三獻燔從如初儀繶爵口足之間有篆又彌飾婦人復位復堂上西面位事已尸将出當哭踊右賔長三獻祝出户西面告利成主人哭西面告告主人也利猶飬也成畢也言飬禮畢也不言飬禮畢于尸間嫌皆哭丈夫婦人于主人哭斯哭矣右祝告利成祝入尸謖祝入而無事尸則知起矣不告尸者無遣尊者之道也古文謖或為休從者奉篚哭如初初哭從尸祝前尸出户踊如初降堂踊如初出門亦如之前道也如初者出如入降如升三者之節悲哀同右尸出記尸謖祝前鄉尸前道也祝道尸必先鄉之為之節還出户又鄉户還過主人又鄉尸還降階又鄉尸過主人則西階上不言及階明主人見尸有踧踖之敬降階還及門如出户及至也言還至門明其間無節也降階如升時将出門如出户時皆還向尸也毎将還必有辟退之容凡前尸之禮儀在此本經記祝反入徹設于西北隅如其設也几在南厞用席改設饌者不知鬼神之節改設之庶㡬歆饗所以為厭飫也几在南變吉文明東面不南面漸也厞隠也于厞隠之處從其幽暗祝薦席徹入于房祝自執其俎出徹薦席者執事者祝薦席則自房来賛闔牖户鬼神尚居幽闇或者逺人乎賛佐食者右陽厭記尸出祝反入門左北面復位然後宗人詔降謂祝復位宗人乃詔主人降以其無事故也本經記主人降賔出宗人詔主人降賔則出廟門主人出門哭止皆復位門外未入位宗人告事畢賔出主人送拜稽顙送拜者明于大門外也賔執事畢者皆去即徹室中之饌者兄弟也右事畢案經言立尸之禮記有無尸之文經載其常記述其變今附見于下記無尸則禮及薦饌皆如初無尸謂無孫列可使者也殤亦是也禮謂衣服即位升降既饗祭于苴祝祝卒記異者之節不綏祭無泰羮湆胾從獻不綏言獻記終始也事尸之禮始于綏祭終于从獻綏當為墮主人哭出復位于祝祝卒祝闔牖户降復位于門西門西北面位也男女拾踊三拾更也三更踊如食間隠之如尸一食九飯之頃也祝升止哭聲三啓户聲者噫歆也将啟户驚覺神也今文啟為開主人入親之祝從啓牖鄉如初牖先闔後啓扇在内也鄉牖一名也如初者主人入祝从在左主人哭出復位堂上位也卒徹祝佐食降復位祝復門西北面位佐食復西方位不復設西北隅者重閉牖户䙝也宗人詔降如初初賛闔牖户宗人詔主人降之記本經重既虞而埋之就所倚處埋之雜記禮書綱目卷二十五
