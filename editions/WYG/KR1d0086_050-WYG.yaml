body:
  text: 禮書綱目巻四十八婺源江永撰兵制軍禮一補黄帝始立丘井之法因以制兵李靖語殷周以兵定天下天下既定戢蔵干戈教以文徳而猶立司馬之官設六軍之衆顔師古曰司馬夏官卿掌邦政軍旅屬焉萬二千五百人為軍王則六軍也因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有税有賦税者田租也賦謂發賦歛財也税以足食賦以足兵故四井為邑四邑為丘丘十六井也有戎馬一匹牛三頭四丘為甸六十四井也有戎馬四匹兵車一乗牛十二頭甲士三人歩卒七十二人干戈備具是謂乗馬之法鄭氏曰甲士在車上也一同百里提封萬井李竒曰提舉也舉四封之内也除山川沈斥城池邑居園囿術路三千六百井臣瓚曰沈斥水田舄鹵也如淳曰術大道也顔曰川謂水之通流者也沈謂居深水之下也斥鹹鹵之地定出賦六千四百井戎馬四百匹兵車百乗此卿大夫采地之大者也采官也因官食地故曰采地爾雅曰采寮官也是謂百乗之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乗此諸侯之大者也是謂千乗之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乗故稱萬乗之主戎馬車徒干戈素具五國為屬屬有長十國為連連有帥三十國為卒卒有正二百一十國為州州有牧連帥比年簡車比年頻年也卒正三年簡徒徒人衆羣牧五載大簡車徒此先王為國立武足兵之大略也前漢刑法志小司徒乃㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦用謂使民事之伍兩卒旅師軍皆衆之名兩二十五人卒百人旅五百人師二千五百人軍二萬千五百人此皆先王所因農事而定軍令者也欲其恩足相恤義足相救服容相别音聲相識作為也役功力之事追逐冦也胥伺捕盗賊也鄉之田制與遂同乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羡惟田與追胥竭作一家男女七人以上則授之以上地所養者衆也男女五人以下則授之以下地所養者寡也可任謂丁彊任力役之事者鄭司農云羡饒也田謂獵也追追冦賊也竭作盡行乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦此謂造都鄙也賦謂出車徒給繇役也司馬法曰六尺為歩歩百為畮畮百為夫夫三為屋屋三為井井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乗士十人徒二十人十成為終終千井三千家革車十乗士百人徒二百人十終為同同方百里萬井三萬家革車百乗士千人徒二千人注詳見井田地官大司馬凡令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人賦給軍用者也令邦國之賦亦以地之羙惡民之衆寡為制如六遂矣鄭司農云上地謂肥羙田也食者參之二假令一家有三頃嵗種二頃休其一頃下地食者參之一田薄惡者所休多夏官凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長軍師旅卒兩伍皆衆名也伍一比兩一閭卒一旅旅一黨師一州軍一鄉家所出一人將帥長司馬者其師吏也言軍將皆命卿則凡軍帥不特置選於六官六鄉之吏自卿以下徳任者使兼官焉鄭司農云王六軍大國三軍次國二軍小國一軍春秋傳曰成國不過半天子之軍周為六軍諸侯之大者三軍可也詩大雅常武曰赫赫明明王命卿士南仲大祖大師皇父整我六師以脩我戎既儆既戒惠此南國大雅文王曰周王于邁六師及之此周為六軍之見於經也春秋傳曰王使虢公命曲沃伯以一軍為晉侯此小國一軍之見於傳也百人為卒二十五人為兩故春秋傳曰廣有一卒卒偏之兩同上六十不與服戎與及也王制右民兵篤公劉其軍三單三單未詳大雅公劉五伍二十五曰元卒伍兵名一卒居前曰開一卒居後曰敦開謂啟敦謂服左右一卒曰閭四卒成衞曰伯皆陣名伯卒名三伯一長曰佐三佐一長曰右右伯卒也三右一長曰正三正一長曰卿三卿一長曰辟伯卒則右千卒則正三千卒則卿萬卒舉令之於君辟君也此謂諸侯三軍數起於伍故不正相當也汲冢周書武順解司徒司馬司空三卿也武王是時尚為諸侯故未備六卿牧誓泰誓王乃大廵六師集傳曰是時武王未備六軍牧誓叙三卿可見此曰六師者史臣之辭也已上周初兵制成王以周公為有勲勞於天下是以封周公於曲阜地方七百里革車千乗革車兵車也千乗成國之賦也明堂位魯人三郊三遂國外曰郊郊外曰遂天子六軍則六鄉六遂大國三軍故魯三郊三遂也費誓公車千乗朱英綠縢二矛重弓公徒三萬貝胄朱綅烝徒増増千乗大國之賦也成方十里出革車一乗甲士三人左持弓右持矛中人御歩卒七十二人將重車者二十五人千乗之地則三百十六里有竒也朱英所以飾矛綠榺所以約弓也二矛夷矛酋矛也重弓備折壊也徙歩卒也三萬舉成數也車千乗法當用十萬人而為歩卒者七萬二千人然大國之賦適滿千乗苟盡用之是舉國而行也故其用之大國三軍而已三軍為車三百七十五乗三萬七千五百人其為歩卒不過二萬七千人舉其中而以成數言故曰三萬也貝胄貝飾胄也朱綅所以綴也増増衆也魯頌閟宫成公元年三月作丘甲周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸六十四井出長轂一乗戎馬四匹牛十二頭甲士三人歩卒七十二人此甸所賦今魯使丘出之譏重歛故書為齊難故作丘甲前年魯乞師於楚欲以伐齊楚師不出故懼而作丘甲春秋左氏傳襄公十一年春王正月作三軍増立中軍萬二千五百人為軍季武子將作三軍魯本無中軍唯上下二軍皆屬於公有事三卿更帥以征伐季氏欲專其民人故假立中軍因以改作告叔孫穆子曰請為三軍各征其軍征賦税也三家各征其軍之家屬穆子曰政將及子子必不能政者霸國之政令禮大國三軍魯次國而為大國之制貢賦必重故憂不能堪武子固請之穆子曰然則盟諸穆子知季氏將復變易故盟之乃盟諸僖閎僖宫之門詛諸五父之衢五父衢道名在魯國東南詛以禍福之言相要正月作三軍三分公室而各有其一三分國民衆三子各毁其乗壊其軍乗分以足成三軍季氏使其乗之人以其役邑入者無征使軍乗之人率其邑役入季氏者無公征不入者倍征不入季氏者則使公家倍征之設利病欲驅使入己故昭五年傳曰季氏盡征之民辟倍征故盡屬季氏孟氏使半為臣若子若弟取其子弟之半也四分其乗之人以三歸公而取其一叔孫氏使盡為臣盡取子弟以其父兄歸公不然不舍制軍分民不如是則三家不舍其故而改作也此蓋三家盟詛之本言傳春秋左氏季武子為三軍為作也武子魯卿季文子之子季孫夙也周禮天子六軍諸侯大國三軍魯伯禽之封舊有三軍其後削弱二軍而已武子欲專公室故益中軍以為三三家各征其一事在魯襄十一年叔孫穆子曰不可天子作師公帥之以征不徳師謂三軍之衆也公謂諸侯為王卿士者也周禮軍將皆命卿詩云周公東征周公時為二伯而東征則亦上公為元帥也元侯作師卿帥之以承天子元侯大國之君也師三軍之衆也大國三卿皆命於天子承天子謂從王師征不義也孔子曰天下有道則禮樂征伐自天子出諸侯有卿無軍帥教衞以贊元侯諸侯謂次國之君也有卿有命卿也二卿命於天子一卿命於其君無軍無三軍也若元侯有事則令卿帥其所教武衞之士以佐元侯禮所謂次國二軍小國一軍謂以賦出軍從征伐也贊佐也自伯子男有大夫無卿無卿無命卿也王制曰小國二卿皆命於其君帥賦以從諸侯賦國中出兵車甲士以從大國諸侯也是以上能征下下無姦慝征正也慝惡也今我小侯也言小侯者削弱之日久矣處大國之間大國齊楚也繕貢賦以共從者猶懼有討猶懼以不給見誅討也若為元侯之所之所謂作三軍元侯所為以怒大國無乃不可乎弗從遂作中軍言中者明已有上下軍也自是齊楚代討於魯代更也襄昭皆如楚襄襄公昭昭公也如楚朝事楚也事在襄二十九年昭七年國語魯語作三軍非正也昭五年經曰舍中軍傳曰貴復正也然則魯有二軍今云作三軍增置中軍爾魯為次國於此為明梁穀傳昭公五年春王正月舍中軍卑公室也罷中軍季氏稱左師孟氏稱右師叔孫氏則自以叔孫為軍名毁中軍于施氏成諸臧氏季氏不欲親其議勑二家會諸大夫發毁置之計又取其令名初作中軍三分公室而各有其一三家各有一軍家屬季氏盡征之無所入於公叔孫氏臣其子弟以父兄歸公孟氏取其半焉復以子弟之半歸公及其舍之也四分公室季氏擇二簡擇取二分二子各一皆盡征之而貢於公國人盡屬三家三家隨時獻公而已春秋左氏傳舍中軍貴復正也魯次國舊二軍襄十一年立三軍今毁之故曰復正傳穀梁八年秋大蒐于紅自根牟至于商衞革車千乗言千乗明大蒐且見魯衆之大數也左氏傳哀公十二年春用田賦詳見通禮財賦篇已上魯兵制齊桓公曰定民之居若何管子對曰制國以為二十一鄉桓公曰善管子於是制國以為二十一鄉二千家為一鄉二十一鄉凡四萬二千家此管仲所制非周法也工商之鄉六工商各三也二者闕役也士鄉十五唐尚書云士與農共十五鄉昭謂此士軍士也十五鄉合三萬人是為三軍農野處而不暱不在都邑之數則下所云五鄙是也公帥五鄉焉五鄉萬人是謂中軍公所帥也國子帥五鄉焉高子帥五鄉焉國子高子皆齊上卿各帥五鄉為左右軍也政詳見通禮事上篇桓公曰吾欲從事於諸侯其可乎欲行伯道討不義也管子對曰未可君若正卒伍脩甲兵周禮五人為伍伯人為卒今管子亦以五人為伍而以二百人為卒則大國亦將正卒伍脩甲兵則難以速得志矣君有攻伐之器小國諸侯有守禦之備則難以速得志矣君若欲速得志於天下諸侯則事可以隠令可以寄政事戎事也隠匿也寄託也匿軍令託於國政若有征伐鄰國不知也桓公曰為之若何管子曰作内政而寄軍令焉内政國政也因治政以寄軍令也桓公曰善管子於是制國五家為軌軌為之長軌中一人為之長也十軌為里里有司為立有司四里為連連為之長十連為鄉鄉有良人焉賈侍中云良人鄉士也昭謂良人鄉大夫也以為軍令為軍掌令五家為軌故五人為伍軌長帥之居則為軌出則為伍所謂寄政也十軌為里故五十人為小戎里有司帥之小戎兵車也此有司之所乗故曰小戎詩云小戎俴收古者戎車一乗歩卒七十二人今齊五十人四里為連故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之帥帥之五鄉每一軍為五鄉也鄉帥鄉也萬人為軍齊制也周則萬二千五百人為軍帥長也三軍故有中軍之鼓有國子之鼓有高子之鼓春以獀振旅春田曰獀振整也旅衆也周禮仲春教振旅遂以獀田也秋以獮治兵秋田曰獮周禮仲秋教治兵遂以獮田也是故卒伍整於里軍旅整於郊内教既成令勿使遷徙遷徙猶改更也伍之人祭祀同福死喪同恤恤憂也禍災共之人與人相疇家與家相疇疇匹也世同居少同游故夜戰聲相聞足以不乖晝戰目相視足以相識其歡欣足以相死致死以相救也居同樂行同和死同哀是以守則同固戰則同彊君有此士也三萬人以方行於天下方猶横也以誅無道以屛周室屛猶蕃也天下大國之君莫之能禦也禦當也齊語齊有革車八百乗賈侍中云謂一國之賦八百乗也乗七十五人凡甲士六萬人昭謂此周制耳齊法五十人為小戎車八百乗有四萬人又上管仲制齊為三軍軍萬人下又曰君有是士三萬人以方行於天下而車數多者其副貳陪從之車乎或者八當為六同上齊侯伐衞先驅穀榮御王孫揮召揚為右先驅前鋒軍申驅成秩御莒恒申鮮虞之傅摯為右申驅次前車傅摯申鮮虞之子曹開御戎晏父戎為右公御右也貳廣上之登御邢公盧蒲癸為右貳廣公副軍啟牢成御襄罷師狼遽疏為右左翼曰啟胠商子車御侯朝桓跳為右右翼曰胠大殿商子游御夏之御㓂崔如為右大殿後軍燭庸之越駟乗四人共乗殿車也傳具載此言莊公廢舊臣任武力已襄二十三年左氏傳上齊兵制王使虢公命曲沃伯以一軍為晉侯曲沃武公遂并晉國僖王因就命為晉侯小國一軍莊十六年左氏傳晉獻公十六年公作二軍獻公十六年魯閔之元年魯嚴十六年王命晉武公以一軍為晉侯至此初作二軍軍有上下公將上軍大子將下軍士蒍言於公曰夫大子君之貳也而帥下軍無乃不可乎公曰下軍上軍之貳也寡人在上申生在下不亦可乎士蒍對曰下不可以貳上猶足不可以貳手也手足左右各自為貳也故古之為軍也軍有左右闕從補之左右左右部也闕缺也成而不知是以寡敗不知敵不知有闕也若以下貳上闕而不變敗弗能補也變更也變非聲章弗能移也聲金鼓也章旌旗也移動也聲章過數則有釁有釁則敵入釁隙也軍法進退旗鼓有數過數則有隙敵見隙而犯己敵入而凶救敗不暇誰能退敵凶猶凶凶恐懼也退郤也敵之如志國之憂也可以陵小難以征大以下軍貳上可以侵陵小國難以征伐大國也晉語秦獲晉惠公吕甥曰征繕以輔孺子征賦也繕治也孺子大子圉庶有益乎衆説晉於是乎作州兵五黨為州州二千五百家也因此又使州長各繕甲兵僖十五年左氏傳晉文公蒐于被廬晉常以春蒐禮改政令敬其始也被廬晉地作三軍閔元年晉獻公作二軍今復大國之禮使郤穀將中軍郤溱佐之使狐偃將上軍讓於狐毛而佐之狐毛偃之兄使欒枝將下軍先軫佐之僖二十七年左氏傳戰於城濮晉軍七百乗韅靷鞅靽五萬二千五百人在背曰韅在胷曰靷在腹曰鞅在後曰靽言駕乗脩備僖二十八年左氏傳晉侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行晉置上中下三軍今復増置三行以辟天子六軍之名三行無佐疑大夫帥左同上年氏傳晉蒐于清原作五軍以禦狄二十八年晉作三行今罷之更為上下新軍河東聞喜縣北有清原僖三十一年左氏傳晉蒐于夷舍二軍僖三十一年晉蒐清原作五軍今舍二軍復三軍之制夷晉地前年四卿卒故蒐以謀軍帥傳文六年左氏晉作六軍為六軍僭王也萬二千五百人為軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿韓厥為新中軍趙括佐之鞏朔為新上軍韓穿佐之荀騅為新下軍趙旃佐之晉舊自有三軍今増此故為六軍成三年左氏傳戰于鄢陵郤至佐新軍於是郤犨代趙旃將新軍新上下軍罷矣年成十六左氏傳晉侯蒐於緜上以治兵為將命軍帥也必蒐而命之所以與衆共新軍無帥將佐皆遷晉侯難其人使其什吏率其卒乗官屬以從於下軍禮也得慎舉之禮傳襄十三年左氏晉師歸自伐秦晉侯舍新軍禮也成國不過半天子之軍成國大國周為六軍諸侯之大者三軍可也於是新軍無帥故舍之襄十四年左氏傳楚蒍啟彊曰韓賦七邑皆成縣也成縣賦百乗也羊舌四族皆彊家也四族銅鞮伯華叔向叔魚叔虎兄弟四人十家九縣韓氏七羊舌氏四而言十家舉大數也羊舌四家共二縣故但言彊家長轂九百長轂戎車也縣百乗其餘四十縣遺守四千計遺守國者尚有四千乗昭五年左氏傳晉治兵于邾南甲車四千乗三十萬人遂合諸侯于平􅉌昭十三年左氏傳兵已上晉制楚武王荆尸授師孑焉以伐隨尸陳也荆亦楚也更為楚陳兵之法揚雄方言孑者㦸也然則楚始於此參用㦸為陳荘四年左氏傳楚子使子玉去宋曰無從晉師子玉請戰王怒少與之師唯西廣東宫與若敖之六卒實從之楚有左右廣又大子有宫甲分取以給之若敖楚武王之祖父𦵏若敖者子玉之祖也六卒子玉宗人之兵六百人言不悉師以益之子玉以若敖之六卒將中軍子西將左子上將右戰於城濮楚師敗績僖二十八年左氏傳隨武子曰楚蒍敖為宰擇楚國之令典宰令尹蒍敖孫叔敖軍行右轅左追蓐在車之右者挾轅為戰備在左者追求草蓐為宿備傳曰令尹南轅又曰改乗轅楚陳以轅為主前茅慮無慮無如今軍行前有斥候蹋伏皆持以絳及白為幡見騎賊舉絳幡見歩賊舉白幡備慮有無也茅明也或曰時楚以茅為旌識中權後勁中軍制謀後以精兵為殿百官象物而動軍政不戒而備物猶類也戒勅令欒武子曰其君之戎分為二廣君之親兵廣有一卒卒偏之兩十五乗為一廣司馬法百人為卒二十五人為兩車十五乗為大偏今廣十五乗亦用舊偏法復以二十五人為承副右廣初駕數及日中左則受之以至于昏宣十二年左氏傳楚子為乗廣三十乗分為左右右廣鷄鳴而駕日中而説説舍也左則受之日入而説邲之戰王乗左廣遂出陳工尹齊將右拒卒以逐下軍工尹齊楚大夫右拒陳名使潘黨率游闕四十乗游車補闕者從唐侯以為左拒以從上軍王見右廣將從之乗屈蕩尸之曰君以此始亦必以終尸止軍中易乗則恐軍人惑自是楚之乗廣先左以乗左得勝故同上年左氏傳楚蒍掩為司馬子木使庀賦庀治數甲兵閲數之蒍掩書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰臯井衍沃注見通禮井田篇量入脩賦量九土之所入而治理其賦税賦車籍馬籍疏其毛色歲齒以備軍用賦車兵車兵甲士徒兵歩卒甲楯之數使器杖有常數既成以授子木禮也得治國之禮傳言楚之所以興襄二十五年左氏傳楚子使然丹簡上國之兵於宗丘且撫其民上國在國都之西西方居上流故謂之上國分貧振窮分與也振救也長孤㓜養老疾収介特介特單身民也収養不使流散救災患宥孤寡寛其賦税赦罪戾詰姦慝詰責問也舉淹滯淹滯有才徳而未效者禮新叙舊新羇旅也禄勲合親勲功也親九族任良物官物事也使屈罷簡東國之兵於召陵兵在國都之東者亦如之如然丹已昭十四年左氏傳上楚兵制王以諸侯伐鄭鄭伯禦之鄭子元請為左拒以當蔡人衞人拒方陳為右拒以當陳人曼伯為右拒祭仲足為左拒原繁高渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫司馬法車戰二十五乗為偏以車居前以伍次之承偏之隙而彌縫闕漏也五人為伍此蓋魚麗陳法戰于繻葛繻葛鄭地命二拒曰旝動而鼓旝㫋也通帛為之蓋今大將之麾也執以為號令王卒大敗桓五年左氏傳鄭子産作丘賦丘十六井當出馬一匹牛三頭今子産别賦其田如魯之田賦國人謗之子産曰苟利社稷死生以之以用也渾罕曰國氏其先亡乎君子作法於涼其敝猶貪涼薄也作法於貪敝将若之何言不可久行傳昭四年左氏鄭已上兵制楚申公巫臣適晉請使於吳吳子夀夢説之乃通吳於晉夀夢季札父以兩之一卒適吳舍偏兩之一焉司馬法百人為卒二十五人為兩車九乗為小偏十五乗為大偏蓋留九乗車及一兩二十五人令吳習之與其射御教吳乘車教之戰陳教之叛楚前是吳常屬楚吳是以始大通吳於上國上國諸夏成七年左氏傳吳王夫差㑹晉公午于黄池事在魯哀十三年昬乃戒令秣馬食士夜中乃令服兵擐甲夜中夜半也服執也擐貫也甲鎧也係馬舌出火竈係縛也縛馬舌恐有聲也出火於竈外以自燭陳士卒百人以為徹行百行徹通也以百人通為一行百行為萬人謂之方陳行頭皆官帥􅗙鐸拱稽􅗙即擁字官帥大夫也昭謂下言十行一嬖大夫此一行宜為士周禮百人為卒卒長皆上士􅗙抱也拱執言抱鐸者亦恐有聲也唐尚書云稽􅯆㦸也鄭後司農以為稽計兵民籍也周禮聽師田以簡稽建肥胡奉文犀之渠肥胡幡也文犀之渠謂楯也文犀犀之有文理者十行一嬖大夫十行千人嬖下大夫也子産謂子南曰子晳上大夫汝嬖大夫建旌提鼓折羽為旌提挈也挾經秉枹在掖曰挾經兵書也秉執也十旌一將軍十旌萬人也將軍命卿也載常建鼓挾經秉枹日月為常鼓晉鼓也周禮將軍執晉鼓建謂為之楹而樹之為萬人以為方陳百行故曰萬人正四方也皆白常白旂素甲白羽之矰望之如荼交龍為旂素申白甲也矰矢名以白羽為衛荼茅秀也王親秉鉞載白旗以中陳而立熊虎為旗此王所御中軍左軍亦如之亦如中軍載常建鼓挾經秉枹之屬皆赤常赤旟丹甲朱羽之矰望之如火鳥隼為旟尚赤左陽也丹彤也朱羽染為朱色右軍亦如之皆𤣥常𤣥旗黒甲烏羽之矰望之如墨黒漆甲也尚黒右隂也為帶甲三萬帶甲衿鎧以勢攻雞鳴乃定吳語已上吳兵制越王勾踐伐吳中分其師以為左右軍以其私卒君子六千人為中軍私卒君子王所親近有志行者猶吳所謂賢良齊所謂士也制吳語此條越兵王法年二十受兵何重不絶人嗣也師行不必勝故須其有世嗣年六十歸兵者何不忍並鬭人父子也白虎通宫正掌王宫之戒令糾禁以時比宫中之官府次舎之衆寡時四時比校次其人之在否官府之在宫中者若膳夫王府内宰内史之屬次諸吏直宿若今部署諸廬者舎其所居守為之版以待版其人之名籍待待戒令及比夕擊柝而比之夕莫也莫行夜以比直宿者為其有懈惰離部署鄭司農云柝戒守者所擊也國有故則令宿其比亦如之鄭司農云故謂禍灾令令宿衞王宫春秋傳曰忘守必危况有災乎𤣥謂故凡非常也文王世子曰公有出疆之政庶子以公族之無事者守於公宫正室守大廟諸父守貴宫貴室諸子諸孫守下宫下室此謂諸侯也王之庶子職掌國子之倅國有大事則帥國子而致於大子唯所用之者令宿之事蓋亦存焉㑹其什伍而教之道藝五人為伍二伍為什㑹之者使之輩作輩學相勸帥且寄宿衞之令篇詳見通禮内治凡邦之大事令于王宫之官府次舎無去守而聽政令使居其處待所為天官宫伯掌王宫之士庶子凡在版者鄭司農云庶子宿衞之官版名籍也以版為之今時鄉户籍謂之户版𤣥謂王宫之士謂王宫中諸吏之適子也庶子其支庶也掌其政令行其秩叙作其徒役之事秩祿廪也叙才等也作徒役之事大子所用授八次八舎之職事衞王宫者必居四角曰中於徼候便也鄭司農云庶子衛王宫在内為次在外為舎𤣥謂次其宿衞所在舎其休沐之處若邦有大事作宫衆則令之謂王宫之士庶子於邦有大事或選當行月終則均秩歲終則均叙以時頒其衣裘掌其誅賞頒讀為班班布也衣裘若今賦冬夏衣同上小司徒大故致餘子大故謂災㓂也鄭司農云餘子謂羡也𤣥謂餘子卿大夫之子當守於王宫者也地官已上官吏士庶子之衛虎賁氏掌先後王而趨以卒伍王出將虎賁士居前後雖羣行亦有局分軍旅㑹同亦如之舎則守王閑舎王出所止宿處閑梐枑王在國則守王宫為周衛國有大故則守王門大喪亦如之非常之難要在門適四方使則則從士大夫虎士從使者若道路不通有徴事則奉書以使於四方不通逢兵㓂若泥水奉書徴師役也春秋隱七年冬戎伐凡伯于楚􅉌以歸虎士八百人見通禮設官上篇夏官旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪夾王車者其下士也下士十有六人中士為之帥焉凡祭祀㑹同賔客則服而趨服而趨夾王車趨也㑹同賔客王亦齊服服衮冕則此士之齊服服𤣥端喪紀則衰葛執戈盾葛葛絰武士尚輕軍旅則介而趨介被甲同上天子有虎賁習武訓諸侯有旅賁禦灾害訓教也虎賁掌先後王而趨舍則守王閑在國則守宫門所以習武教也禦禁也旅賁掌執戈盾夾車而趨車止則持輪所以備非常禁灾害也賁國語魯語已上虎賁旅之衞師氏使其屬帥四夷之𨽻各以其兵服守王之門外且蹕兵服旃布弓劔不同也門外中門之外蹕止行人不得廹王宫也故書𨽻或作肆鄭司農云讀為𨽻朝在野外則守内列内列藩營之在内者也其屬亦帥四夷之𨽻守之如守王宫地官保氏使其屬守王闈闈宫中之巷門同上司𨽻掌五𨽻之法辨其物而掌其政令五𨽻謂罪𨽻四翟之𨽻也物衣服兵器之屬掌帥四翟之𨽻使之皆服其邦之服執其邦之兵守王宫與野舎之厲禁野舎王者所止舎也厲遮列也官秋罪𨽻其守王宫與其厲禁者如蠻𨽻之事今按此文當屬閩𨽻蠻𨽻其在王宫者執其國之兵以守王宫在野外則守厲禁閩𨽻今按此職當有其守王宫與其厲禁者如蠻𨽻之事十四字誤脱在罪𨽻之下夷𨽻其守王宫者與其守厲禁者如蠻𨽻之事貉𨽻其守王宫者與其守厲禁者如蠻𨽻之事並同上已上夷翟四𨽻之衛右衛兵武王戎車三百乘虎賁三百人與受戰于牧野書序三孟子作虎賁千人裨冕搢笏而虎賁之士説劔也裨冕衣裨衣而冠冕也裨衣衮之屬也搢猶插也賁憤怒也樂記周公戒于王曰王左右常伯常任準人綴衣虎賁周公曰嗚呼休兹知恤鮮哉言五等官職之羙而知憂其得人者少也虎賁周禮之虎賁氏也文王武王虎賁綴衣庶常吉士言在文武之廷無非常徳吉士也立政成王不懌乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事同召六卿下至御治事者師氏大夫官虎臣虎賁士王崩太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗於南門之外延入翼室恤宅宗桓毛二臣名伋太公望子為天子虎賁氏太保以冢宰攝政命桓毛二臣使齊侯吕伋以二干戈虎賁百人逆太子釗於路寢門外引入路寢翼室為憂居宗主也二人雀弁執惠立于畢門之内四人綦弁執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階弁士服雀弁赤色弁也綦弁以文鹿子皮為之惠三隅矛路寢門一名畢門上刃刃外嚮也堂㢘曰戺冕大夫服劉鉞屬戣瞿皆㦸屬鋭當作鈗説文曰鈗侍臣所執兵從金允聲周書曰一人冕執鈗讀若允東西堂路寢東西廂之前堂也東西垂路寢東西序之階上也側階北陛之階上也吕氏曰古者執戈㦸以宿衛王宫皆士大夫之職無事而奉燕私則從容養徳而有膏澤之潤有事而司禦侮則堅明守義而無腹心之虞下及秦漢陛楯執㦸尚餘一二此制既廢人主接士大夫者僅有視朝數刻而周廬陛楯或環以椎埋嚚悍之徒有志於復古者當深繹也顧命晉文公獻楚俘於王王策命晉侯為侯伯賜之虎賁三百人僖二十八年左氏傳秦伯送衞於晉三千人實紀綱之僕新有吕卻之難國未輯睦故以兵衛文公諸門户僕𨽻之事皆秦卒共之為之紀綱僖二十四年左氏傳楚穆王立潘崇為大師且掌環列之尹環列之尹宫衛之官列兵而環王宫文元年左氏傳大司馬中春教振旅平列陳如戰之陳若大師及戰廵陳眂事而賞罰事謂戰功也夏官右陳法風后握機文曰天陳地陳風陳雲陳虎翼陳蛇蟠陳飛龍陳鳥翔陳八陳四為正四為竒公孫𢎞曰世有八卦陳法其中既不用竒正似非風后所傳未可參用餘竒為握竒或總稱之先出遊軍定兩端天有衝圓地有軸前後有衝風附於天雲附於地衝有重列各四隊前後之衝各二隊風居四維故有圓軸單列各三隊前後之衝各三隊雲居四角故有方天居兩端地居中間總為八陳陳訖遊軍從後躡敵或驚其左或驚其右聽音望麾以出四竒天地之前衝為虎翼風為蛇蟠圍繞之義也虎居於中張翼以進蛇居兩端向敵而蟠以應之天地之後衝為飛龍雲為鳥翔突擊之義也龍居於中張翼以進鳥掖兩端向敵而翔以應之虚實二壘皆逐天文氣候向背山川利害隨時而行以正合以竒勝金鼓旌旗數角音二初警衆末收衆革音五一持兵二結陳三行四趨走五急鬭金音五一緩鬭二止鬭三退四背五急背麾法五一𤣥二黄三白四青五赤旗法八一天𤣥二地黄三風青四雲白五天前上𤣥下赤六天後上𤣥下白七地前上𤣥下赤八地後上黄下青二革二金為天三革三金為地二革三金為風三革二金為雲四革三金為龍三革四金為虎四革五金為鳥五革四金為蛇此八陳各用金鼓之制其金革之間加一角音者在天為兼風在地為兼雲在龍為兼鳥在虎為兼蛇加二角音者全師進東加三角音者全師進南加四角音者全師進西加五角音者全師進北鞉音不止者行伍不整金革既息而角音不止者師並旋三十二隊天衝八隊天前衝八隊天後衝十六隊風二十四隊地軸十二隊地前衝十二隊地後衝十六隊雲以天地前衝為虎翼天地後衝為飛龍風為蛇蟠雲為翔鳥天地以下八重以列或曰握機望敵即引其後以掎角前列不動公孫𢎞曰傳項氏陳㳒依此而前列先進以次之或合而為一因離而為八各隨師之多少觸類而長天或圓布不動前為右後為左天地四望之屬是也天居兩端其次風其次雲左右相向是也公孫𢎞曰此為静地方布風雲各在前後衝之前天居兩端其次地居中間兩地為北是也公孫𢎞曰此為動為從天陳變為地陳或即張形布軌破敵攻圍不定其形故為動也縱布天一天二次之縱布地四次於天後縱布四風挾天地之左右天地前衝居其右後衝居其左雲居兩端虛實二壘則此是也公孫𢎞曰人多傳韓信註釋天或圓布以下與此㣲有差異而范蠡樂毅之說相雜今亦錯綜於其中其部隊或三或五或三十或五十陳之如此變通由人一本自或五十以下云變通之理寄之明哲不復偹載近古以來其文不滿尺多憑口訣以相傳授予今於難解之處増字以發明之握機經朱子曰按此㳒六十四陳天衡十六陳居兩端地軸十二陳居中間天前衝四陳居右後衝四陳居左地前衝六陳居前後衝六陳居後風八陳附天雲八陳附地合為八陳天衡并前後衝二十四陳合風八陳為三十二陽地軸并前後衝二十四陳合雲八陳為三十二隂遊軍二十四陳在六十四陳之後凡行軍結陳合戰設疑補闕全在遊兵天地之前衝為虎翼風為蛇蟠兵家先隂以右為前又風從虎虎與蛇皆隂類同位西北也天地之後衝為飛龍雲為鳥翔兵家後陽以左為後又雲從龍龍與鳥皆陽類同位東南也以天地風雲為四正以龍虎與蛇為四竒所謂八陳也每以二陳相從一陳之中又有兩陳一戰一守故又有三十二隊天衡二十四隊地軸等數也中外有輕重之權隂陽有剛柔之節彼此有虛實之地主客有先後之數輕重之權剛柔之節者家計也以實擊虚以先奪後者合變也我易而敵常險我簡而敵常繁兵法所謂致人而不致於人此其機要也王以諸侯伐鄭鄭伯禦之為魚麗之陳先偏後伍伍承彌縫詳見民兵章楚子田孟諸宋公為右盂鄭伯為左盂盂田獵陳名期思公復遂為右司馬復遂楚期思邑公子朱及文之無畏為左司馬將獵張兩甄故置二左司馬然則右司馬一人當中央左文十年氏傳晉中行穆子敗無終及羣狄于大原無終山戎崇卒也崇聚也將戰魏舒曰彼徒我車所遇又阨地險不便車以什共車必克更増十人以當一車之用困諸阨又克車每困於阨道今去車故為必克請皆卒去車為歩卒自我始乃毁車以為行魏舒先自毁其屬車為歩陳五乗為三伍乗車者車三人五乗十五人今改去車更以五人為伍分為三伍荀吳之嬖人不肯即卒斬以徇魏舒輙斬之荀吳不恨所以能立功為五陳以相離兩於前伍於後專為右角參為左角偏為前拒皆臨時處置之名以誘之翟人笑之笑其失常未陳而薄之大敗之傳言荀吳能用善謀氏昭元年左傳公子城以晉師救宋與華氏戰于赭兵鄭翩願為鸛其御願為鵞鄭翩華氏黨鸛鵞皆陳名昭二十一年左氏傳禮書綱目巻四十八
