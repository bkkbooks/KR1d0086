body:
  text: 禮書綱目卷十三婺源江永撰士相見禮賓禮一經鄭目録云士以職位相親始承摯相見之禮雜記㑹葬禮曰相見也反哭而退朋友虞祔而退士相見於五禮屬賓禮士相見之禮贄冬用雉夏用腒左頭奉之曰某也願見無由達某子以命命某見贄所執以至者君子見於所尊敬必執贄以將其厚意也士贄用雉者取其耿介交有時别有倫也雉必用死者為其不可生服也夏用腒備腐臭也左頭頭陽也無由達言久無因縁以自達也某子今所因縁之姓名也以命者稱述主人之意今文頭為脰主人對曰某子命某見吾子有辱請吾子之就家也某將走見有又也某子命某往見今吾子又自辱來序其意也走猶往也今文無走賓對曰某不足以辱命請終賜見命謂請吾子之就家主人對曰某不敢為儀固請吾子之就家也某將走見不敢為儀言不敢外貌為威儀忠誠欲往也固如故也今文不為非古文云固以請也賓對曰某不敢為儀固以請言如故請終賜見也今文不為非主人對曰某也固辭不得命將走見聞吾子稱贄敢辭贄不得命者不得見許之命也走猶出也稱舉也辭其贄為其大崇也古文曰某將走見賓對曰某不以贄不敢見見於所尊敬而無贄嫌大簡主人對曰某不足以習禮敢固辭言不足習禮者不敢當其崇禮來見已賓對曰某也不依於贄不敢見固以請言依於贄謙自卑也今文無也主人對曰某也固辭不得命敢不敬從出迎于門外再拜賓答再拜主人揖入門右賓奉贄入門左主人再拜受賓再拜送贄出右就右也左就左也受贄於庭既拜受送則出矣不受贄於堂下人君也今文無也主人請見賓反見退主人送于門外再拜請見者為賓崇禮來相接以矜莊歡心未交也賓反見則燕矣下云凡燕見於君至凡侍坐于君子博記反見之燕義臣初見於君再拜奠贄而出右請見凡賓主相見之儀附載於下記聞始見君子者辭曰某固願聞名於將命者君子卿大夫若有異德者固如故也將猶奉也即君子之門而云願以名聞於奉命者謙逺之也重則云固奉命傳辭出入不得階主階上進者言賓之辭不得指斥主人敵者曰某固願見敵當也願見願見於將命者謙也罕見曰聞名罕希也希相見雖於敵者猶為尊主之辭如於君子亟見曰朝夕亟數也於君子則曰某願朝夕聞名於將命者於敵者則曰某願朝夕見於將命者瞽曰聞名瞽無目也以無目辭不稱見少儀同國始相見主人拜其辱自外來而拜拜見也自内來而拜拜辱也曲禮凡非弔喪非見國君無不答拜者禮尚往來喪賓不答拜不自賓客也國君見士不答其拜士賤上同凡與客入者每門讓於客下賓也敵者迎于大門外聘禮曰君近賓於大門内客至於寢門則主人請入為席為猶敷也雖君亦然然後出迎客客固辭又譲先入主人肅客而入肅進也進客謂道之主人入門而右客入門而左右就其右左就其左主人就東階客就西階客若降等則就主人之階降下也謂大夫於君士於大夫也不敢輙由其階卑統於尊不敢自專主人固辭然後客復就西階復其正主人與客讓登主人先登客從之拾級聚足拾當為涉聲之誤也級等也涉等聚足謂前足躡一等後足從之併連步以上重蹉跌也連步謂足相隨不相過也上於東階則先右足上於西階則先左足近於相鄉敬同上席南鄉北鄉以西方為上東鄉西鄉以南方為上布席無常此其順之也上謂席端也坐在陽則上左坐在隂則上右若非飲食之客則布席席間函丈謂講問之客也函猶容也講問宜相對容丈足以指畫也飲食之客布席於牖前丈或為杖主人跪正席雖來講問猶以客禮待之異於弟子客跪撫席而辭撫之者答主人之親正席客徹重席主人固辭徹去也去重席謙也再辭曰固客踐席乃坐客安主人乃敢安也講問宜坐主人不問客不先舉客自外來宜問其安否無恙及所為來故同上始入而辭曰辭矣即席曰可矣可猶止也謂擯者為賓主之節也始入則告之辭至就席則止其辭少儀氾埽曰埽埽席前曰拚拚席不以鬛執箕膺擖鬛謂帚也帚恒埽地不㓗清也膺親也擖舌也持箕将去糞者以舌自鄉同上其未有燭而後至者則以在者告道瞽亦然為其不見意欲知之也師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯同上請見不請退去止不敢自由同上主人復見之以其贄曰曏者吾子辱使某見請還贄於將命者復見之者禮尚往來也以其贄謂曏時所執來者也曏曩也將猶傳也傳命者謂擯相者主人對曰某也既得見矣敢辭讓其來答已也賓對曰某也非敢求見請還贄於將命者言不敢求見嫌褻主人不敢當也今文無也主人對曰某也既得見矣敢固辭固如故也賓對曰某不敢以聞固以請於將命者言不敢以聞又益不敢當主人對曰某也固辭不得命敢不從許受之也異日則出迎同日則否賓奉贄入主人再拜受賓再拜送贄出主人送于門外再拜右復見士見於大夫終辭其贄於其入也一拜其辱也賓退送再拜終辭其贄以將不親答也凡不答而受其贄唯君於臣耳大夫於士不出迎入一拜正禮也送再拜尊賓右士見大夫記大夫士相見雖貴賤不敵主人敬客則先拜客客敬主人則先拜主人尊賢士見於大夫大夫拜其辱曲禮士於尊者先拜進面答之拜則走士往見卿大夫卿大夫出迎答拜亦辟也玊藻若嘗為臣者則禮辭其贄曰某也辭不得命不敢固辭禮辭一辭其贄而許也將不答而聴其以贄入有臣道也賓入奠贄再拜主人答壹拜奠贄尊卑異不親授也古文壹為一賓出使擯者還其贄于門外曰某也使某還贄還其贄者辟正君也賓對曰某也既得見矣敢辭辭君還其贄也今文無也擯者對曰某也命某某非敢為儀也敢以請還贄者請使受之賓對曰某也夫子之賤私不足以踐禮敢固辭家臣稱私踐行也言某臣也不足以行賓客禮賓客所不答者不受贄擯者對曰某也使某不敢為儀也固以請言使某尊君也或言命某傳言耳賓對曰某固辭不得命敢不從再拜受受其贄而去之右嘗為臣者見記大夫於其臣雖賤必答拜之辟正君曲禮下大夫相見以鴈飾之以布維之以索如執雉鴈取知時飛翔有行列也飾之以布謂裁縫衣其身也維謂繫聮其足上大夫相見以羔飾之以布四維之結于面左頭如麛執之上大夫卿也羔取其從帥羣而不黨也面前也繫聮四足交出背上於胸前結之也如麛執之者秋獻麛有成如之或曰麛孤之摯也其禮盖謂左執前足右執後足今文頭為脰如士相見之禮大夫雖贄異其儀猶如士右大夫相見本文此下有始見於君若他邦之人及燕見於君三條今並入曲禮臣禮篇凡言非對也妥而後傳言凡言謂已為君言事也妥安坐也傳言猶出言也若君問可對則對不待安坐也古文妥為綏與君言言使臣與大人言言事君與老者言言使弟子與幼者言言孝弟于父兄與衆言言忠信慈祥與居官者言言忠信博陳燕見言語之儀也言使臣者使臣之禮也大人卿大夫也言事君者臣事君以忠也祥善也居官謂士以下右言凡與大夫言始視面中視抱卒視面毋改衆皆若是始視面謂觀其顔色可傳言未也中視抱容其思之且為敬也卒視面察其納己言否也毋改謂傳言見答應之間當正容體以待之毋自變動為嫌解惰不虚心也衆謂諸卿大夫同在此者皆若是其視之儀無異也古文毋作無今文衆為終若父則遊目毋上於面毋下於帶子於父主孝不主敬所視廣也因觀安否何如也今文父為甫古文毋為無若不言立則視足坐則視膝不言則伺其行起而已右視凡賓主飲食之禮本經不具今以他記附于下記凡進食之禮左殽右胾食居人之左羮居人之右皆便食也殽骨體也胾切肉也食飯屬也居人左右明其近也殽在俎胾在豆膾炙處外醯醬處内殽胾之外内也近醯醤者食之主膾炙皆在豆蔥㳿處末㳿烝蔥也處醯醬之左言末者殊加也㳿在豆酒漿處右處羮之右此言若酒若漿耳兩有之則左酒右漿此大夫士與賓客燕食之禮其禮食則宜放公食大夫禮云以脯脩置者左朐右末亦便食也屈中曰朐曲禮羞濡魚者進尾擗之由後鯁肉易離也乾魚進首擗之由前理易析也冬右腴陽氣在下腴腹下也夏右鰭陽氣在上鰭脊也祭膴膴大臠謂刳魚腹讀如冔少儀客若降等執食興辭辭者辭主人之臨已食若欲食於堂下然主人興辭於客然後客坐復坐主人延客祭延道也祭祭先也君子有事不忘本也客不降等則先祭祭食祭所先進主人所先進先祭之所後進後祭之如其次殽之序徧祭之謂胾炙㑹也以其本出于牲體也公食禮魚腊湇醤不祭也曲禮凡羞有俎者則於俎内祭俎於人為横不得祭於間也少儀唯水漿不祭若祭為已偞卑水漿非盛饌也已猶大也祭之為大有所畏廹臣於君則祭之玉藻三飯主人延客食胾然後辯殽先食胾後食殽殽尊也凡食殽辯於肩食肩則飽也主人未辯客不虚口俟主人也虚口謂酳也客自敵以上其酳不待主人飽主人不先飽也侍食於長者主人親饋則拜而食勸長者食耳雖賤不得執食興辭拜而己示敬也主人不親饋則不拜而食以其禮於已不隆共食不飽謙也謂共羮飯之大器也共飯不澤手謂汗生不㓗也澤謂捼莎也禮飯以手澤或為擇毋摶飯為欲致飽不謙毋放飯去手餘飯於器中人所穢毋流歠大歠嫌欲疾毋咤食嫌薄之毋齧骨為有聲響不敬毋反魚肉為已厯口人所穢毋投與狗骨為其賤飲食之物毋固獲為其不亷也欲專之曰固爭取曰獲毋揚飯飯黍毋以箸毋嚃羮亦嫌欲疾也嚃為不嚼菜毋絮羮為其詳於味也絮猶調也毋刺齒為其㺯口也口容止毋歠醢亦嫌詳於味也歠者為其淡故客絮羮主人辭不能亨客歠醢主人辭以窶優賓濡肉齒決決猶㫁也乾肉不齒決堅宜用手毋嘬炙為其貪食甚也嘬謂一舉盡臠特牲少牢嚌之加于俎卒食客自前跪徹飯齊以授相者謙也自從也齊醤屬也相者主人賛饌者公食大夫禮賓卒食北面取粱與醤以降也主人興辭於客然後客坐不聴親徹曲禮侍食於先生異爵者後祭先飯謙也客祭主人辭曰不足祭也祭者盛主人之饌也客飱主人辭以疏飱者美主人之食也疏之言麤也主人自置其醬則客自徹之敬主人也徹奠於序端玉藻客自徹辭焉則止主人辭其徹少儀凡侑食不盡食食於人不飽謙也玉藻孔子食於季氏不辭不食肉而飱以其待已及饌非禮也同上孔子曰吾食於少施氏而飽少施氏食我以禮言貴其以禮待己而為之飽也時人倨慢若季氏則不以禮矣少施氏魯惠公子施父之後吾祭作而辭曰疏食不足祭也吾飱作而辭曰疏食也不敢以傷吾子雜記食案家語孔子食於季氏食祭主人不辭不亦不飲而飱子夏問曰禮也孔子曰非禮也從主人也吾食於少施氏而飽云云主人不以禮客不敢盡禮主人盡禮則客不敢不盡禮也有盛饌必變色而作敬主人之禮非以其饌也鄉黨凡飲酒為獻主者執燭抱燋客作而辭然後以授人為宵言也主人親執燭敬賓示不倦也言獻主者客君使宰夫也未爇曰燋執燭不讓不辭不歌以燭繼晝禮殺少儀凡侍坐於君子君子欠伸問日之早晏以食具告改居則請退可也君子謂卿大夫及國中賢者也志倦則欠體倦則伸問日晏近於久也具猶辯也改居謂自變動也古文伸作信早作蚤夜侍坐問夜膳葷請退可也問夜問其時數也膳葷謂食之葷辛物蔥薤之屬食之以止卧古文葷作薰右請退本文此下有君賜之食一條今入臣禮篇若先生異爵者請見之則辭辭不得命則曰某無以見辭不得命將走見先見之先生致仕者也異爵謂卿大夫也辭辭其自降而來走猶出也先見之者出先拜也曲禮曰主人敬賓則先拜賓右長者請見本文此下有非以君命使一條今入通禮名器上篇凡執幣執玉一條今入曲禮篇記士於大夫不敢拜迎而拜送禮不敵始來拜則士辟也玉藻士相見義賓禮二補記自天子至于庶人皆有摯摯者致也所以致其志也天子之摯鬯諸侯玉卿羔大夫鴈士雉鬯也者言德之逺聞也玉也者言一度不易也羔也者言柔而有禮也鴈也者言進退知時也雉也者言死其節也故天子以遠德為志諸侯以一度為志卿以有禮為志大夫以進退為志士以死節為志明乎志之義而天下治矣故執斯摯者致志者也君之摯以事神臣之摯以養人唯君受摯者唯君受養也非其君則辭摯不敢當養也古者非其君不仕非其師不學非其人不友非其大夫不見士相見之禮必依於介紹以言其不苟合者也必依於摯以言其道可親也苟而合唯小人無恥者能之君子可見也不可屈也可親也不可狎也可遠也不可疎也賓至門主人三辭見賓稱摯主人三辭摯所以致尊嚴也大夫以禮相接士以禮相諭庶人以禮相同然而爭奪興於末者未之有也人苟悦而相若者末必爭苟簡而相親者末必怨是故士相見禮者人道之大也所以使人重其身而毋邇於辱也所以使人慎其交而毋邇於祸也唯仕於君者召而往未仕而見於君者冠而奠摯在邦曰市井之臣在野曰草莽之臣君雖召不往也是故雖有南面之貴千乘之富士之所以結者禮義而已矣利不足稱焉刑罰行於國所誅者好利之人未有好利而其俗不亂者也無介而相見君子以為諂故諸侯大國九介次國七介小國五介劉敞補禮白虎通義見邇名器下子曰無辭不相接也無禮不相見也欲民之毋相䙝也辭所以通情也禮謂摯也春秋傳曰古者諸侯有朝聘之事號辭必稱先君以相接也表記子云禮之先幣帛也欲民之先事而後禄也此禮謂所執之贄以見者也既相見乃奉幣帛以修好也或云禮之先辭而後幣帛先財而後禮則民利財幣帛也利猶貪也無辭而行情則民爭辭辭讓也情主利欲也故君子於有饋者弗能見則不視其饋饋遺也不能見謂有疾也不視猶不内也以此坊民民猶貴禄而賤行行猶事也言務得其禄不務其事坊記禮書綱目卷十三
