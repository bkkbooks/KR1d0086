body:
  text: 禮書綱目卷五十婺源江永撰征伐軍禮三補大宗伯以軍禮同邦國同謂威其不協僣差者軍禮之别有五大師之禮用衆也用其義勇春官一不朝則貶其爵再不朝則削其地三不朝則六師移之是故天子討而不伐孟子先王之治順天之道設地之宜官民之徳而正名治物立國辨職以爵分禄諸侯説懐海外來服獄弭而兵寢聖徳之至也其次賢王制禮樂法度乃作五刑興甲兵以討不義巡狩省方㑹諸侯考不同其有失命亂常背徳逆天之時而危有功之君徧告於諸侯彰明有罪乃告於皇天上帝日月星辰禱於后土四海神祗山川塜社乃造於先王然後冢宰徴師于諸侯曰某國為不道征之以某年月日師至於某國㑹天子正刑冢宰與百官布令于軍曰入罪人之地無暴神祇無行田獵無毁土功無燔牆屋無伐林木無取六畜禾黍器械見其老㓜奉歸勿傷雖遇壯者不校勿敵敵若傷之醫藥歸之既誅有罪王及諸侯修正其國舉賢立明正復厥職司馬法天下有道禮樂征伐自天子出必以歲之孟秋賞軍帥武人於朝簡練傑俊任用有功命將選士以誅不義於是孟冬以級授軍司徒搢扑北面而誓之以等級授其鞭扑誓于社以習其事先期五日大史誓於祖廟擇吉日齋戒告於郊社稷宗廟既筮則獻兆於天子天子使有司以特牲告社告以所征之事而受命焉舍奠于帝學以受成成謂師律已成定然後乃類上帝柴于郊以出以齊車遷廟之主及社主行大司馬職奉之言以大司馬奉所遷廟社之主無遷廟主則以幣帛皮圭告于祖禰謂之主命亦載齊車凡行主皮圭幣帛皆每舍奠焉而後就館言廟社行主及皮圭幣帛之主命每所至之地則先舍奠而後就館示有尊也舍當作釋音與釋同主車止于中門之外外門之内廟主居於道左社主居於道右其所經名山大川皆祭告焉及至敵所將戰太史卜戰日卜右御先期三日有司明以敵人罪狀告之史史定誓命戰日將帥陳列車甲卒伍于軍門之前有司讀誥誓使周定三令五申既畢遂禱戰祈克于上帝然後即敵將士戰全已克敵史擇吉日復禡於所征之地禡師祭名也柴於上帝祭社奠祖以告克者不頓兵傷士也戰不克則不告也凡類禡皆用甲丙戊庚壬之剛日有司簡功行賞不稽于時其用命者則加爵受賜于祖奠之前其奔北犯令者則加刑罸戮于社主之前書稱用命則賞于祖弗用命則戮于社然後鳴金振旅有司徧告㨗于時所有事之山川既至舍于國外三日齊以特牛親格於祖禰然後入設奠以反主設奠反其主於廟於社若主命則卒奠歛玉埋之于廟兩階間言埋玉則幣帛焚之反社主如初迎之禮舍奠於帝學以訊馘告大享於羣吏用備樂饗有功於祖廟舍爵策勲焉謂之飲至此天子親征之禮也孔叢子問軍禮右天子親征總叙大卜大師則貞龜正龜於卜位也士䘮禮曰卜人抱龜燋先奠龜西面是也又不親命龜大師輕於大祭祀也春官大司馬若大師則掌其戒令涖大卜大師王出征伐也涖臨也臨大卜卜出兵吉凶也司馬法曰上卜下謀是謂參之夏官右卜出軍典瑞牙璋以起軍旅鄭司農云牙璋瑑以為牙牙齒兵象故以牙璋發兵若今時以銅虎符發兵𤣥謂牙璋亦王使之瑞節春官玉人牙璋中璋七寸射二寸厚寸以起軍旅二璋皆有鉏牙之飾於琰側先言牙璋有文飾也考工記大司徒大軍旅以旗致萬民而治其徒庶之政令旗畫熊虎者也徴衆刻日樹旗期于其下小司徒凡國之大事致民大事謂戎事也鄭司農云國有大事當徴召㑹聚百姓則小司徒召聚之大軍旅帥其衆庶帥帥而致於大司徒鄉師大軍旅正治其徒役與其輂輦戮其犯命者輂駕馬輦人輓行所以載任器也止以為藩營司馬法曰夏后氏謂輦曰余車殷曰胡奴車周曰輜輦輦一斧一斤一鑿一梩一鋤周輦加二版二築又曰夏后氏二十人而輦殷十八人而輦周十五人而輦州長若國作民而師田行役之事則帥而致之掌其戒令與其賞罸致之致之於司徒也掌其戒令賞罰則是於軍因為師帥黨正凡作民而師田行役則以其法治其政事亦於軍因為旅帥族師若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至掌其治令戒禁刑罰亦於軍因為卒長縣師若將有軍旅之戒則受法於司馬以作其衆庶及牛馬車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至受法於司馬者知所當徴衆寡遂人若起野役則令各帥其所治之民而至以遂之大旗致之其不用命者誅之役謂師田若有功作也遂之大旗熊虎凡事致野役而師田作野民帥而至掌其政治禁令遂師軍旅平野民掌其禁令比叙其事而賞罰平謂正其行列部伍也鄭司農云比讀為庀縣正若將用野民師田行役則帥而至治其政令鄙師凡作民則掌其戒令作民謂起役也酇長若作其民而用之則以旗鼓兵革帥而至稍人若有師田行役之事則以縣師之法作其同徒輂輦帥而以至治其政令以聽於司馬有軍旅㑹同田役之戒縣師受法於司馬邦國都鄙稍甸郊里唯司馬所調以其法作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至是以書令之耳其所謂若在家邑小都大都則稍人用縣師所受司馬之法作之帥之以致於司馬也同徒司馬所調之同凡用役者不必一時皆徧以人數調之使勞逸遞焉並地官大司馬及致建大常比軍衆誅後至者比或作庀鄭司農云致謂聚衆也庀具也𤣥謂致鄉師致民於司馬比校次之也夏官司常凡軍事建旌旗及致民置旗弊之始置旗以致民民至仆之誅後至者春官都司馬掌都之士庶子及其衆庶車馬兵甲之戒令庶子卿大夫士之子車馬兵甲備軍發卒以聽國司馬聽者受行其所徴為也國司馬大司馬之屬皆是家司馬亦如之大夫家臣為司馬者春秋傳曰叔孫氏之司馬鬷戾夏官宫伯掌王宫之士庶子若邦有大事作宫衆則令之謂王宫之士庶子於邦有大事或選當行天官諸子掌國子之倅國有大事則帥國子而致於大子唯所用之若有兵甲之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正軍法百人為卒五人為伍弗不也國子屬大子司馬雖有軍事不賦之凡國正弗及夏官有發則命大司徒教士以車甲乗兵車衣甲之儀有發謂有軍師發卒王制右起師天子將出征類乎上帝宜乎社造乎禰禡於所征之地禡師祭也為共禱其禮亦亡受命於祖告祖也受成於學定兵謀也王制大祝大師宜於社造于祖設軍社類上帝則前祝鄭司農説設軍社以春秋傳曰所謂君以師行祓社釁鼓祝奉以從者也則前祝大祝自前祝也𤣥謂前祝者王出也歸也將有事於此神大祝居前先以祝辭告之春官起大事動大衆必先有事乎社而後出謂之宜有事祭也周官所謂宜乎社爾雅右告祭敢用𤣥牡敢昭告于上天神后請罪有夏𤣥牡夏尚黒未變其禮也神后后土也湯誥司兵掌五兵五盾及授兵從司馬之法以頒之從司馬之法令師旅卒兩人數所用多少也司戈盾掌戈盾之物而頒之分與受用軍旅授貳車戈盾建乗車之戈盾授旅賁及虎士戈盾乗車王所乗車也軍旅則革路司弓矢凡師役頒弓弩各以其物從授兵至之儀物弓弩矢箙之屬大司馬帥執事涖釁主及軍器主謂遷廟之主及社主在軍者也軍器鼓鐸之屬凡師既受甲迎主於廟及社主祝奉以從殺牲以血塗主及軍器皆神之並夏官小祝大師掌釁祈號祝鄭司農云釁謂釁鼓也春秋傳曰君以軍行祓社釁鼓祝奉以從春官右授兵釁主器野廬氏凡國之大事比修除道路者比校治道者名若今次金叙大功邦之大師則令埽道路且以幾禁行作不時者不物者不時謂不夙則暮者也不物謂衣服操持非比常人也幾禁之者備姦人内賊及反間蜡氏凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野大師亦如之注見天神並秋官牛人軍旅行役共其兵車之牛與其牽徬以載公任器牽徬在轅外輓牛也人御之居其前曰牽居其旁曰徬任猶用也地官校人凡軍事物馬而頒之物馬齊其力夏官車僕掌戎路之萃廣車之萃闕車之萃革車之萃輕車之萃注見武備凡師共革車各以其萃五戎者共其一以為王優尊者所乗也而萃各從其元焉春官司兵軍事建車之五兵詳武備雞人大祭祀夜嘑旦以􅑧百官軍旅亦如之注見祭通禮伊耆氏軍旅授有爵杖别吏卒且以扶尊者將軍杖鉞秋官小宗伯若大師則帥有司而立軍社奉主車有司大祝也王出軍必先有事於社及遷廟而以其主行社主曰軍社遷主曰祖春秋傳曰軍行祓社釁鼓祝奉以從曽子問曰天子巡守以遷廟主行載於齊車言必有尊也書曰用命賞於祖不用命戮於社社之主蓋用石為之奉謂將行大師大師執同律以聽軍聲而詔吉凶大師大起軍師兵書曰王者行師出軍之日授將弓矢士卒振旅將張弓大呼大師吹律合音商則戰勝軍士疆角則軍擾多變失士心宫則軍和士卒同心徴則將急數怒軍士勞羽則兵弱少威明鄭司農云以師曠曰吾驟歌北風又歌南風南風不競多死聲楚必無功大史大師抱天時與大師同車鄭司農云大出師則大史主抱式以知天時處吉凶史官主知天道故國語曰吾非瞽史焉知天道春秋傳曰楚有雲如衆赤鳥夾日以飛楚子使問諸周大史大史主天道小史大軍旅佐大史𤣥謂瞽即大師大師瞽官之長司服凡兵事􅅊弁服􅅊弁以韎􅅊為弁又以為衣裳春秋傳曰晉郤至衣韎􅅊之跗注是也今時五伯緹衣古兵服之遺色巾車革路龍勒條纓五就建大白以即戎詳名器下並春官前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅載謂舉於旌首以警衆也禮君行師從卿行旅從前驅舉此則士衆知所舉各以其類象青青雀水鳥鳶鳴則將風鴻取飛有行列也士師謂兵衆虎取其有威勇也貔貅亦摯獸也書曰如虎如貔士或為仕行前朱鳥而後𤣥武左青龍而右白虎招揺在上急繕其怒以此四獸為軍陳象天也急猶堅也繕讀曰勁又畫招揺星於旌旗上以起居堅勁軍之威怒象天帝也招揺星在北斗杓端主指者曲禮戎僕掌馭戎車戎車革路也師出王乗以自將掌王倅車之政正其服倅副也服謂衆乗戎車者之衣服犯軷如王路之儀掌凡戎車之儀凡戎車衆之兵車也書序曰武王戎車三百輛射人大師令有爵者乗王之倅車倅車戎車之副虎賁氏掌先後王而趨以卒伍軍旅亦如之王出將虎賁士居前後雖羣行亦有局分旅賁氏軍旅則介而趨介被甲並夏官典路凡軍旅以路從王出於事無常王乗一路典路以其餘路從行亦以華國春官司右掌羣右之政令羣右戎右齊右道右凡軍旅合其車之卒伍而比其乗屬其右合比屬謂次第相安習也車亦有卒伍凡國之勇力之士能用五兵者屬焉掌其政令勇力之士屬焉者選右當於中司馬法曰弓矢圍殳矛守戈㦸助凡五兵長以衛短短以救長夏官師氏軍旅王舉則從舉猶行也保氏軍旅王舉則從並地官鄉士大軍旅則各掌其鄉之禁令帥其屬夾道而蹕屬中士以下遂士若邦有大事聚衆庶則各掌其遂之禁令帥其屬而蹕大事王所親也並秋官右師行曽子問曰古者師行必以遷廟主行乎孔子曰天子巡守以遷廟主行載於齊車言必有尊也今也取七廟之主以行則失之矣齊車全路曽子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行每舍奠焉而后就舍以酺醢禮神乃敢即安也所告而不以出即埋之反必告設奠卒歛幣玉藏諸兩階之間乃出蓋貴命也曽子問武王載木主號為文王東伐紂史記王升舟入水鐘鼓亞觀臺亞將舟亞宗廟亞惡皆謂亞亞次也觀臺大史知天時占候者也宗廟廟主尚書大傅王者征伐所以必皮弁素積何伐者凶事素服示有悽愴也伐者質故依古服白虎通大祝大師國將有事于四望則前祝疏曰謂軍行所過山川造祭乃過春官右祭告山川厎商之罪告于皇天后土所過名山大川致商之罪謂伐紂之時后土社也名山華岳大川河曰惟有道曽孫周王發將有大正于商告天地山川之辭大正以兵征之也今商王受無道無道徳暴殄天物害虐烝民暴絶天物言逆天也逆天害民所以為無道為天下逋逃主萃淵藪逋亡也天下罪人逃亡者而紂為魁主窟聚淵府藪澤言大姦予小子既獲仁人敢祗承上帝以遏亂略仁人謂太公周召之徒略路也言誅紂敬承天意以絶亂路華夏蠻貊罔不率俾集傳曰俾廣韻曰從也仁人既得則可以敬承上帝而遏絶亂謀内而華夏外而蠻貊無不率從矣惟爾有神尚克相予以濟兆民無作神羞神庶幾助我渡民危害無為神羞辱武成量人營軍之壘舍量其市朝州涂軍社之所里軍璧曰壘鄭司農云量其市朝州涂還市朝而為道也𤣥謂州一州之衆二千五百人為師每師一處市也朝也州也皆有道以相之軍社社主在軍者里居也夏官鼓人凡軍旅夜鼓鼜鼜夜戒守鼓也司馬法曰昏鼓四通為大鼜夜半三通為晨戒旦明五通為發昫地官鎛師凡軍之夜三鼜皆鼓之鼓之以鼖鼓春官挈壺氏掌挈壺以令軍井挈轡以令舍挈畚以令糧鄭司農云挈壺以令軍井謂為軍穿井井成挈壺縣其上令軍中士衆皆望見知此下有井壺所以盛飲故以壺表井挈轡以令舍亦縣轡於所當舍止之處使軍望見知當舍止於此轡所以駕舍故以轡表舍挈畚以令糧亦縣畚于所當禀假之處令軍望見知當禀假於此下也畚所以盛糧之器故以畚表禀軍中人多車騎雜㑹讙囂號令不能相聞故各以其物為表省煩趨疾於事便也凡軍事縣壺以序聚􅈀鄭司農云縣壺以為漏以序聚􅈀以次更聚擊􅈀備守也𤣥謂擊􅈀兩木相敲行夜時也夏官環人察軍慝慝隂姦也視軍中有為慝者則執之環四方之故卻其以事謀來侵伐者所謂折衝禦侮巡邦國搏諜賊諜賊反間為國賊同上司烜氏軍旅修火禁秋官右軍中士師五禁五曰軍禁今軍有囂讙夜行之禁秋官大宰作大事則戒於百官贊王命助王為教令春秋傳曰國之大事在祀與戎天官士師五戒一曰誓用之於軍旅於書則甘誓湯誓秋官幕人軍旅共其帷幕幄帟綬共之者掌次當以張掌次師田則張幕設重帟重案不張幄者於是臨誓衆王或回顧占察諸侯師田則張幕設案鄭司農云師田謂諸侯相與師田𤣥謂此掌次張之諸侯從王而師田者孤卿有邦事則張幕設案有邦事謂以事從王告以王命出也孤王之孤三人副三公論道者不言公公如諸侯禮從王師田亦張幕設案官並天訝士凡邦之大事聚衆庶則讀其誓禁布憲凡邦之大事合衆庶則以刑禁號令條狼氏凡誓執鞭以趨於前且命之誓僕右曰殺誓馭曰車轘誓大夫曰敢不關鞭五百誓師曰三百誓邦之大史曰殺誓小史曰墨前謂所誓衆之行前也有司讀誓辭則大言其刑以警所誓也誓者謂出軍及將祭祀時也出軍之誓誓左右及馭則書之甘誓備矣郊特牲説祭祀之誓曰卜之日王立于澤親聽誓命受教諫之義也車轘謂車裂也師樂師也大史小史主禮事者鄭司農云誓大夫曰敢不關謂不關於君也𤣥謂大夫自受命以出則其餘事莫不復請鄉士大軍旅則各掌其鄉之禁令遂士若邦有大事聚衆庶則各掌其遂之禁令縣士若邦有大役聚衆庶則各掌其縣之禁令方士凡都家之大事聚衆庶則各掌其方之禁令方士十六人言各掌其方者四人而主一方也其方以王之事動衆則為班禁令焉並秋官右誓禁有虞氏戒于國中欲民體其命也夏后氏誓于軍中欲民先成其慮也殷誓於軍門之外欲民先意以待事也周將交刃而誓之致以民志也夏后氏正其徳也未用兵之刃故其兵不雜殷義也始用兵之刃矣周力也盡用兵之刃矣司馬法帝曰咨禹惟時有苗弗率汝徂征禹乃㑹羣后誓于師曰濟濟有衆咸聽朕命蠢兹有苗昏迷不恭侮慢自賢反道敗徳君子在野小人在位民棄不保天降之咎肆予以爾衆士奉辭伐罪爾尚一乃心力其克有勲㑹徴㑹也誓戒也軍旅曰誓有㑹有誓自唐虞時已然禮言商作誓周作㑹非也大禹謨大戰于甘乃召六卿甘地名有扈氏國之南郊也六卿六鄉之卿也按周禮鄉大夫每鄉卿一人六鄉六卿平居無事則各掌其鄉之政教禁令而屬于大司徒有事出征則各率其鄉之一萬二千五百人而屬於大司馬所謂軍將皆卿者是也意夏制亦如此古者四方有變專責之方伯方伯不能討然後天子親征之天子之兵有征無戰今啓既親率六軍以出而又書大戰于甘則有扈之怙强稔惡敢與天子抗衡豈特孟子所謂六師移之者書曰大戰蓋所以深著有扈不臣之罪而為天下後世諸侯之戒也王曰嗟六事之人予誓告汝重其事故嗟歎而告之六事者非但六卿有事於六軍者皆是也有扈氏威侮五行怠棄三正天用𠞰絶其命今予惟恭行天之罰威暴殄之也侮輕忽之也鯀汨五行而殛死况於威侮之者乎三正子丑寅之正也夏正建寅怠棄者不用正朔也有扈氏暴殄天物輕忽不敬廢棄正朔虐下背上獲罪于天天用𠞰絶其命今我伐之惟敬行天之罰而已左不攻于左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命左車左右車右也攻治也古者車戰之法甲士三人一居左以主射一居右以主擊刺御者居中以主馬之馳驅也左傳宣公十二年楚許伯御樂伯攝叔為右以致晉師樂伯曰吾聞致師者左射以菆是車左主射也攝叔曰吾聞致師者右入壘折馘執俘而還是車右主擊刺也御非其馬之正猶王良所謂詭遇也盖左右不治其事與御非其馬之正皆足以致敗故各指其人以責其事而欲各盡其職而不敢忽也用命賞于祖不用命戮于社予則孥戮汝戮殺也禮曰天子巡守以遷廟主行左傳軍行祓社釁鼓然則天子親征必載其遷廟之主與其社主以行以示賞戮之不敢專也祖左陽也故賞于左社右隂也故戮于社孥子也孥戮與上戮字同義言若不用命不但戮及汝身將并汝妻子而戮之戰危事也不重其法則無以整肅其衆而使赴功也或曰戮辱也孥戮猶秋官司厲孥男子以為罪𨽻之孥古人以辱為戮謂戮辱之以為孥耳古者罰弗及嗣孥戮之刑非三代之所宜有也按此説固為有理然以上句考之不應一戮而二義盖罰弗及嗣者常刑也予則孥戮者非常刑也常刑則愛克厥威非常刑則威克厥愛盤庚遷都尚有劓殄滅之無遺育之語則啓之誓師豈為過哉甘誓王曰格爾衆庶悉聽朕言非台小子敢行稱亂有夏多罪天命殛之夏桀暴虐湯徃征之亳衆憚於征役故湯諭以弔伐之意蓋興師之時而誓於亳都者也王曰者史臣追述之稱也格至台我稱舉也以人事言之則臣伐君可謂亂矣以天命言之則所謂天吏非稱亂也今爾有衆汝曰我后不恤我衆舍我穡事而割正夏予惟聞汝衆言夏氏有罪予畏上帝不敢不正穡刈穫也割斷也亳邑之民安于湯之徳政桀之虐熖所不及故不知夏氏之罪而憚伐桀之勞反謂湯不恤亳邑之衆舍我刈穫之事而斷正有夏湯言我亦聞汝衆論如此然夏桀暴虐天命殛之我畏上帝不敢不往正其罪也今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷喪予及汝皆亡夏徳若兹今朕必往遏絶也割劓割夏邑之割時是也湯又舉商衆言桀雖暴虐其如我何湯又應之曰夏王率為重役以窮民力嚴刑以殘民生民厭夏徳亦率皆怠于奉上不和于國疾視其君指日而曰是日何時而亡乎若亡則吾寜與之俱亡蓋苦桀之虐而欲其亡之甚也桀之惡徳如此今我之所以必往也桀嘗自言吾有天下如天之有日日亡吾乃亡耳故民因以日目之爾尚輔予一人致天之罰予其大賚汝爾無不信朕不食言爾不從誓言予則孥戮汝罔有攸赦賚與也食言言已出而反吞之也禹之征苗止曰爾尚一乃心力其克有勲至啓則曰用命賞于祖不用命戮于社予則孥戮汝此又益以朕不食言罔有攸赦亦可以觀世變矣湯誓惟十有三年春大㑹于孟津泰誓上惟戊午王次于河朔羣后以師畢㑹王乃狥師而誓泰誓中時厥明王乃大巡六師明誓衆士泰誓下時甲子昧爽王朝至于商郊牧野乃誓王左杖黄鉞右秉白旄以麾曰逖矣西土之人甲子二月四日也昧㝠爽明也昧爽將明未明之時也牧地名在朝歌南即今衛州治之南也鉞斧也以黄金為飾王無自用鉞之理左杖以為儀耳旄軍中指麾白則見逺麾非右手不能故右秉白旄也按武成言癸亥陳于商郊則癸亥之日周師已陳牧野矣甲子昧爽武王始至而誓師焉曰者武王之言也逖逺也以其行役之逺而慰勞之也王曰嗟我友邦冢君御事司徒司馬司空亞旅師氏千夫長百夫長司徒司馬司空三卿也武王是時尚為諸侯故未備六卿唐孔氏曰司徒主民治徒庶之政令司馬主兵治軍旅之誓戒司空主土治壘壁以營軍亞次旅衆也大國三卿下大夫五人士二十七人亞者卿之貳大夫是也旅者卿之屬士是也師氏以兵守門者猶周禮師氏王舉則從者也千夫長統千人之帥百夫長統百人之帥也及庸蜀羌髳㣲盧彭濮人左傳庸與彭濮伐楚庸濮在江漢之南羌在西蜀髳㣲在巴蜀盧彭在西北武王伐紂不期㑹者八百國今誓師獨稱八國者蓋八國近周西都素所服役乃受約束以戰者若上文所言友邦冢君則泛指諸侯而誓者也稱爾戈比爾干立爾矛予其誓稱舉戈㦸干楯矛亦㦸之屬長二丈唐孔氏曰戈短人執以舉之故言稱楯則並以扞敵故言比矛長立之於地故言立器械嚴整則士氣精明然後能聽誓命王曰古人有言曰牝雞無晨牝雞之晨惟家之索索蕭索也牝雞而晨則隂陽反常是為妖孽而家道索矣將言紂惟婦言是用故先𤼵此今商王受惟婦言是用昬棄厥肆祀弗答昬棄厥遺王父母弟不迪乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄于商邑肆陳答報也婦妲己也列女傳云紂好酒淫樂不離妲己妲己所舉者貴之所憎者誅之惟妲己之言是用故顛倒昬亂祭所以報本也紂以昬亂棄其所當陳之祭祀而不報昆弟先王之􅏷也紂以昬亂棄其王父母弟而不以道遇之廢宗廟之禮無宗族之義乃惟四方多罪逃亡之人尊崇而信使之以為大夫卿士使暴虐于百姓姦宄于商邑蓋紂惑于妲己之嬖背常亂理遂至流毒如此也今予發惟恭行天之罰今日之事不愆于六歩七歩乃止齊焉夫子朂哉愆過朂勉也歩進趨也齊齊整也今日之戰不過六歩七歩乃止而齊此告之以坐作進退之法所以戒其輕進也不愆于四伐五伐六伐七伐乃止齊焉朂哉夫子伐擊刺也少不下四五多不過六七而齊此告之以攻殺擊刺之法所以戒其輕殺也上言夫子朂哉此言朂哉夫子者反覆成文以致丁寜勸勉之意下倣此尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土朂哉夫子桓桓威武貌貔執夷也虎屬欲將士如四獸之猛而奮擊于商郊也迓迎也能奔來降者勿迎擊之以勞役我西土之人此勉其武勇而戒其殺降也爾所弗朂其于爾躬有戮弗朂謂不勉于前三者愚按此篇嚴肅而温厚與湯誓誥相表裏真聖人之言也泰誓武成一篇之中以非盡出于一人之口豈獨此為全書乎讀者其味之牧誓小宗伯若軍將有事則與祭有司將事于四望軍將有事將與之合戰也鄭司農云則與祭謂軍祭表禡軍社之屬小宗伯與其祭事𤣥謂與祭有司謂大祝之屬蓋司馬之官實典焉凡王之軍旅之禱祠肄儀為位肄習也春官封人凡軍旅則飾其牛牲地官肆師凡師用牲于社宗則為位社軍社也尚書傳曰王升舟入水鼓鐘亞觀臺亞將舟亞宗廟亞故書位為涖杜子春云涖當為位書亦或為位宗謂宗廟春官禡於所征之地詳見告祭章小祝掌釁祈號祝詳授兵章右祈禱環人掌致師致師者致其必戰之志古者將戰先使勇力之士犯敵焉春秋傳曰楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下􅧇馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復之訟敵國敵國兵來則往之與訟曲直若齊國佐如師揚軍旅為之威武以觀敵詩云維師尚父時維鷹揚降圍邑圍邑欲降者受而降之春秋傳曰齊人降障戎右掌戎車之兵革使使謂王使以兵有所誅斬也春秋傳曰戰于殽晉梁𢎞御戎萊駒為右戰之明日襄公縳秦囚使萊駒以戈斬之詔贊王鼓既告王當鼓之節又助擊之傳王命於陳中為王大言之也大僕凡軍旅贊王鼓王通鼓佐擊其餘面並夏官鼓人以鼖鼓鼓軍事以金錞和鼓以金鐲節鼓以金鐃止鼓以金鐸通鼓注見武備軍動則鼓其衆動且行地官銜枚氏軍旅令銜枚為其言語以相誤秋官小子凡師斬牲以左右徇陳示犯誓必殺之大司馬及戰巡陳眂事而賞罰事謂戰功也並夏官進退有度度謂伐與歩數左右有局各司其局局部分也曲禮右戰陳肆師凡師用牲于社宗則為位類造上帝封于大神祭兵于山川亦如之造猶即也為兆以類禮即祭上帝也類禮依郊祀而為之者封謂壇也大神社及方嶽也山川蓋軍之所依止大傳曰牧之野武王之大事也既事而退柴於上帝祈於社設奠於牧室官春右告克牧之野武王之大事也既事而退柴於上帝祈於社設奠於牧室柴祈奠告天地及先祖也牧室牧野之室也古者郊關皆有館焉先祖者行主也遂率天下諸侯執豆籩逡奔走逡疾也疾奔走言勸事也周頌曰逡奔走在廟大傳丁未祀于周廟邦甸侯衞駿奔走執豆籩越三日庚戌柴望大告武成武王以克商之事祭告祖廟近而邦甸逺而侯衛皆駿奔走執事以助祭祀既告祖廟燔柴祭天望祀山川以告武功之成由近而逺由親而尊也武成司勲掌六鄉賞地之法以等其功戰功曰多尅敵出奇若韓信陳平司馬法曰上多前虜夏官大司冦大軍旅涖戮于社社謂社主在軍者也鄭司農説以書曰用命賞于祖不用命戮于社士師大師帥其屬而禁逆軍旅者與犯師禁者而戮之逆軍旅反將命也犯師禁干行陳也鄉士凡國有大事則戮其犯命者遂士凡郊有大事則戮其犯命者縣士凡野有大事則戮其犯命者野距王城二百里以外及都鄙掌戮掌斬殺凡軍旅斬殺刑戮亦如之戮謂膊焚辜肆禁暴氏凡國聚衆庶則戮其犯禁者以徇並秋官右賞戮大司馬若師有功則左執律右秉鉞以先愷樂獻于社功勝也律所以聽軍聲鉞所以為將威也先猶道也兵樂曰愷獻于社獻功于社也司馬法曰得意則愷樂愷歌示喜也鄭司農云故城濮之戰春秋傳曰振旅愷以入于晉夏官大祝及軍歸獻于社則前祝注見告祭章大司樂王師大獻則令奏愷樂大獻獻捷于祖愷樂獻功之樂鄭司農説以春秋晉文公敗楚于城濮傳曰振旅以入于晉樂師凡軍大獻教愷歌遂倡之故書倡為昌鄭司農云樂師主倡也昌當為倡書亦或為倡眂瞭賔射皆奏其鐘鼓鼜愷獻亦如之愷獻獻功愷樂也杜子春云讀鼜為憂戚之戚謂戒守鼓也擊鼔聲疾數曰戚鎛師軍大獻則鼓其愷樂並春官出征執有罪反釋奠于學以訊馘告釋菜奠幣禮先師也訊馘所生獲斷耳者詩曰執訊獲醜又曰在頖獻馘馘或為國王制右師有功歸常武宣王自將以伐淮北之夷詩人作此以羙之大雅大司馬若師不功則厭而奉主車鄭司農云厭謂厭冠喪服也軍敗則以喪禮故秦伯之敗于殽也春秋傳曰秦伯素服郊次向師而哭𤣥謂厭伏冠也奉猶送也送主歸於廟與社王弔勞士庶子則相師敗王親弔士庶子之死者勞其傷者則相王之禮庶子卿大夫之子從軍者或謂之庶士夏官肆師凡師不功則助牽主車助助大司馬也故書功為工鄭司農云工讀為功古者工與功同字謂師無功肆師助牽之恐為敵所得春官軍有憂則素服哭于庫門之外憂謂為敵所敗也素服者縞冠也赴車不載櫜韔兵不戢示當報也以告喪之辭言之謂還告於國櫜甲衣韔弓衣檀弓右師不功歸天子命將出征親絜齊盛服設奠于祖以詔之詔告之大將先入軍吏畢從皆北面再拜稽首而受受所命天子當階南面命授之節鉞大將受謂受所賜節鉞天子乃東向西面而揖之謂轉南面自東遂西面而揖示弗御也謂既揖己則不御坐然後告太社冢宰執蜃宜於社之右左傳云戎有受脤脤祭社之肉盛以蜃器南面授大將大將北面稽首再拜而受之承所頒賜于軍吏其出不類其克不禡戰之所在有大山川則祈焉禱克于五帝捷則報之振旅復命簡異功勤親告廟告社而後適朝孔叢子師帥者受命於廟受脤於社脤宜社之肉盛以蜃器閔二年左氏傳小司徒小軍旅巡役治其政令巡役小力役之事則巡行之官地小祝小軍旅掌事焉春官小司馬小師掌其事如大司馬之法夏官小司冦小師涖戮小師王不自出之師秋官將居軍中之禮介胄在身執銳在列雖君父不拜若不幸軍敗則馹騎赴告不載櫜韔大雅曰載櫜弓矢櫜韜也韔弓衣天子素服哭于庫門之外三日大夫素服哭于社亦如之亡將失城則皆哭七日軍敗三日哭將亡城失則七日哭蓋輕重之差天子使使迎于軍命將帥無請罪然後將帥結草自縛袒右肩而入蓋喪禮也孔叢子右命將出征大夫將兵出必不御者欲盛其威使士卒一意繫心也故但聞將軍令不聞君命也明進退在大夫也春秋傳曰此受命于君如伐齊則還何大其不伐喪也何大其不伐喪大夫以君命出進退在大夫也天子遣將軍必於廟何示不敢自專也獨於祖廟何制法度者祖也白虎通惟仲康肇位四海𦙍侯命掌六師羲和廢厥職酒荒于厥邑𦙍侯承王命徂征註見軍通禮六月玁狁内侵逼近京邑宣王命尹吉甫帥師伐之有功而歸詩人作歌以叙其事采芑宣王之時蠻荆背叛王命方叔南征軍行采芑而食故賦其事以起興並小雅江漢宣王命召穆公平淮南之夷詩人羙之大雅諸侯賜弓矢然後征得其器乃敢為其事王制諸侯賜弓矢者得專征不得專征者以兵屬於得專征之國諸侯得專征者鄰國有臣弑其君孽伐其宗雖有請於天子而征之可也征而歸其地於天子孽支子也宗適子也征伐也尚書大傳祈勝之禮命勇謀之將以禦敵先使之迎于適所從來之方為壇祈克於五帝衣服隨其方色執事人數從其方之數從其方之數則北方七人南方九人東方十一人西方十三人牲則用其方之牲祝史告于社稷宗廟邦域之内名山大川君親素服誓衆于太廟曰某人不道侵犯大國二三子尚皆同心比力死而守將帥稽首再拜受命既誓將帥勒士卒陳于廟之右君立太廟之庭祝史立于社百官各警其事御于君以待命乃大鼓于廟門詔將帥命卒習射三發擊刺三行告廟用兵于敵也五兵備效乃鼓而出以即敵此諸侯應敵之禮也孔叢子君以軍行祓社釁鼓師出先有事祓禱於社謂之宜社於是殺牲以血塗鼓鼙為釁鼓禮奉以從奉社主也傳定四年左氏公族其在軍則守於公禰謂從軍者公禰行主也行以遷主言禰在外親也文王世子凡侯伯救患分災討罪禮也侯伯州長也分榖帛僖元年左氏傳右諸侯伐國應敵公曰嗟人無譁聽命徂兹淮夷徐戎並興漢孔氏曰徐戎淮夷並起冦魯伯禽為方伯帥諸侯之師以征歎而敇之使無喧譁欲其靜聽誓命蘇氏曰淮夷叛已久矣及伯禽就國又脅徐戎並起故曰徂兹淮夷徐戎並興徂兹者猶曰往者云善糓乃甲胄敿乃干無敢不弔備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善糓縫完也縫完其甲胄勿使斷毁敿鄭氏云猶繫也王肅云敿楯當有紛繫持之弔精至也鍛淬礪磨也甲胄所以衞身弓矢戈矛所以克敵先自衞而後攻人亦其序也今惟淫舍牿牛馬杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑淫大也牿閑牧也擭機檻也敜塞也師既出牛馬所舍之閑牧大布于野當窒塞其擭穽一或不謹而傷閑牧之牛馬則有常刑此令軍在所之居民也舉此例之凡川梁藪澤險阻屏医有害于師屯者皆在矣此除道路之事馬牛其風臣妾逋逃無敢越逐祗復之我商賚汝乃越逐不復汝則有常刑無敢冦攘踰垣牆竊馬牛誘臣妾汝則有常刑謂人賤者男曰臣女曰妾馬牛風逸臣妾逋亡不得越軍壘而逐之失主雖不得逐而人得風馬牛逃臣妾者又當敬還之我商度多寡以賞汝如或越逐而失伍不復而攘取皆有常刑有故竊奪踰垣牆竊人牛馬誘人臣妾者亦有常刑此嚴部伍之事甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨榦甲戌我惟築無敢不供汝則有無餘刑非殺魯人三郊三遂峙乃芻茭無敢不多汝則有大刑甲戌用兵之期也峙儲備也糗糧食也不逮若今之乏軍興淮夷徐戎並起今所攻獨徐戎者蓋量敵之堅瑕緩急而攻之也國外曰郊郊外曰遂天子六軍則六鄉六遂大國三軍故魯三郊三遂也楨榦板築之木題曰楨牆端之木也旁曰榦牆兩邊障土者也以是日征是日築者彼方禦我之攻勢不得擾我之築也無餘刑非殺者刑之非一但不至於殺耳芻茭供軍牛馬之用軍以期㑹芻糧為急故皆服大刑楨榦芻茭獨言魯人者地近而致便也費誓鄭伯將伐許五月甲辰授兵於大宫大宫鄭祖廟傳隠十一年左宋人弑昭公趙宣子請師於靈公以伐宋發令於太廟召軍吏而戒樂正正長也軍吏主師旅樂正主鐘鼓令三軍之鐘鼓必備趙同曰國有大役不鎮撫民而備鐘鼓何也宣子曰大罪伐之小罪憚之憚懼也襲侵之事陵也輕曰襲無鐘鼓曰侵陵以大陵小也是故備鐘鼓聲其罪也以聲張其罪戰以錞于丁寜儆其民也錞于形如碓頭與鼓角相和丁寜者謂鉦也儆戒也唐尚書云錞于鐲也非也鐲與錞于各異物襲侵宻聲為蹔事也蹔其無備也今宋人弑其君罪莫大焉明聲之猶恐其不聞也吾備鐘鼓為君故也為欲尊明君道乃使旁告于諸侯治兵振旅鳴鐘鼓以至于宋國語晉語齊侯來獻戎捷非禮也凡諸侯有四夷之功則獻于王王以警于夷以警懼夷狄中國則否諸侯不相遺俘雖夷狄俘猶不以相遺莊三十一年左氏傳晉侯及楚人戰于城濮楚師敗績獻楚俘于王駟介百乗徒兵千駟介四馬被甲徒兵走卒僖二十八年左氏傳晉侯使鞏朔獻齊捷于周王弗見使單襄公辭焉曰蠻夷戎狄不式王命式用也淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略兄弟同姓國甥舅異姓國略經略法度王命伐之告事而已不獻其功所以敬親暱告伐事而不厭囚俘禁淫慝也淫慝謂虣掠百姓取囚俘也今叔父克遂有功于齊克能也而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室鞏朔上軍大夫非命卿名位不逹於王室又奸先王之禮謂獻齊捷余雖欲於鞏伯欲受其獻其敢廢舊典以忝叔父夫齊甥舅之國也而大師之後也齊世與周昏故曰甥舅寜不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對莊伯鞏朔傳成二年左氏戰于邲晉師敗績楚潘黨曰君盍築武軍築軍營以彰武功而收晉尸以為京觀積尸封土其上謂之京觀楚子曰古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝鯨鯢大魚名以喻不義之人吞食小國今罪無所晉罪無所犯也而民皆盡忠以死君命又可以為京觀乎祀于河作先君宫告成事而還傳言楚莊有禮所以遂興宣十二年左氏傳禮書綱目卷五十
