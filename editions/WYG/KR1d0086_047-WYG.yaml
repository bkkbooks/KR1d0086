body:
  text: 禮書綱目卷四十五􅄔源江永撰因祭補小宗伯國大貞則奉玉帛以詔號號神號幣號鄭司農云大貞謂卜立君卜大封大祝建邦國先告后土用牲幣后土神社神也大宗伯王大封則先告后土后土土神也黎所食者並春官内宰凡建國佐后立市祭之以隂禮市朝者君所以建國也建國者必面朝後市王立朝而後立市隂陽相成之義鄭司農云佐后立市者始立市后立之也祭之以隂禮者市中之社先后所立社也隂禮婦人之祭禮天官右立君建國正月上日受終于文祖上日朔日也終謂堯終帝位之事文祖者堯文徳之祖廟肆類于上帝堯不聽舜譲使之攝位舜察天文考齊七政而當天心故行其事肆遂也類謂攝位事類遂以攝告天及五帝禋于六宗精意以享謂之禋宗尊也所尊祭者其祀有六謂四時也寒暑也日也月也星也水旱也祭亦以攝告望于山川徧于羣神九州名山大川五岳四瀆之屬皆一時望祭之羣神謂丘陵墳衍古之聖賢皆祭之舜典正月朔旦受命于神宗受命終事之命神宗文祖之宗廟言神尊也率百官若帝之初順舜初攝帝位故事奉行之謨大禹惟一月癸巳王朝步自周于征伐商一月周之正月步行也武王以正月三日行自周往征伐商二十八日渡孟津厥四月哉生明王來自商至于豐其四月哉始也始生明月三日與死魄互言丁未祀于周廟邦甸侯衛駿奔走執豆籩四月丁未告祭后稷以下文考文王以上七世之祖駿大也邦國甸侯衛服諸侯皆大奔走於廟執事越三日庚戌柴望大告武成燔柴郊天望祀山川先祖後郊自近始武成惟二月既望周公攝政七年二月十五日日月相望因紀之越六日乙未王朝步自周則至于豐於已望後六日二十一日成王朝行從鎬京則至于豐以遷都之事告文王廟告文王則告武王可知以見祖考惟太保先周公相宅太保三公官名召公也召公於周公前相視洛居周公後往越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅朏明也月三日明生之名於順來三月丙午朏於朏三日三月五日召公早朝至于洛邑相卜所居厥既得卜則經營其已得吉卜則經營規度城郭郊廟朝市之位處越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成於戊申三日庚戌以衆殷之民治都邑之位於洛水北今河南城也於庚戌五日所治之位皆成言衆殷本其所由来若翼日乙夘周公朝至于洛周公順位成之明日而朝至于洛汭則逹觀于新邑營周公通達觀新邑所營言周徧越三日丁巳用牲于郊牛二於乙夘三日用牲告立郊位于天以后稷配故二牛后稷貶於天有羊豕不見可知越翼日戊午乃社于新邑牛一豕一羊一告立社稷之位用太牢也共工氏子曰句龍能平水土祀以為社周祖后稷能殖百穀祀以為稷共牢誥召周公曰王肇稱殷禮祀于新邑咸秩無文言王當始舉殷家祭祀以禮典祀於新邑皆次秩不在禮文者而祀之洛誥歲二月東廵守至于岱宗岱宗東嶽柴而望祀山川柴祭天告至也五月南巡守至于南嶽如東巡守之禮八月西巡守至于西嶽如南巡守之禮十有一月北巡守至于北嶽如西巡守之禮歸假于祖禰用特詳見巡守天子將出類乎上帝宜乎社造乎禰同上天子適四方先柴同上祭山丘陵升祭川沈祭地瘞同上校人凡將事于四海山川則飾黄駒同上玉人大璋中璋九寸邊璋七寸射四寸厚寸黄金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬同上臨諸侯畛於鬼神曰有天王某甫同上天子遊不出封圻不告祖廟周禮方千里曰王圻詩曰邦圻千里維民所止傳尚書大右巡守維元祀巡守四嶽八伯壇四奥沈四海封十有二山兆十有二州元祀代泰山貢兩伯之樂焉中祀大交霍山貢兩伯之樂焉秋祀桺榖華山貢兩伯之樂焉幽都𢎞山祀貢兩伯之樂焉歸假于禰祖用特詳見巡守時邁巡守告祭柴望也詩序般巡守而祀四岳河海也詩序隠公八年鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也成王營王城有遷都之志故賜周公許田以為魯國朝宿之邑後世因而立周公別廟焉鄭桓公周宣王之母弟封鄭有助祭泰山湯沐之邑在祊鄭以天子不能復巡守故欲以祊易許田各從本國所近之宜恐魯以周公別廟為疑故云已廢泰山之祀而欲為魯祀周公孫辭以有求也許田近許之田左氏傳邴者何鄭湯沐之邑也天子有事于泰山諸侯皆從泰山之下諸侯皆有湯沐之邑焉有事者巡守祭天告至之禮也當沐浴潔齋以致其敬故謂之湯沐邑也所以尊待諸侯而供其費也禮四井為邑邑方二里東方二州四百里十國凡為邑廣四十里袤四十二里取足舍止共槀穀而已歸邴書者甚惡鄭伯無尊事天子之心専以湯沐浴歸魯背叛當誅也錄使者重尊湯沐邑也王者所以必巡守者天下雖平自不親見猶恐逺方獨有不得其所故三年一使三公黜陟五年親自巡守巡猶循也守猶守也循行守視之辭亦不可國至人見為煩擾故至四嶽足以知四方之政而已公羊傳許田者魯朝宿之邑也邴者鄭伯之所受命而祭泰山之邑也用見魯之不朝于周而鄭之不祭泰山也朝天子所宿之邑謂之朝宿泰山非鄭境内從天王巡守受命而祭也擅相換易則知朝祭並廢桓元年穀梁傳大祝大㑹同造于廟宜于社過大山川則用事焉反行舍奠詳見會同小宗伯凡王之會同之禱祠肄儀為位同上諸侯將出宜乎社造乎禰王制孔子曰諸侯適天子必告于祖奠于禰冕而出視朝命祝史告于社稷宗廟山川乃命國家五官而後行道而出告者五日而徧過是非禮也凡告用牲幣反亦如之諸侯相見必告于禰朝服而出視朝命祝史告于五廟所過山川亦命國家五官道而出反必親告于祖禰乃命祝史告至于前所告者而後聽朝而入詳見覲禮及諸侯相朝禮諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行毎舍奠焉而后就舍反必告設奠卒斂幣玉藏諸兩階之間乃出蓋貴命也詳見覲禮覲禮侯氏禆冕釋幣于禰詳見覲禮諸侯覲于天子為宫方三百歩四門壇十有二㝷深四尺加方明于其上方明者木也方四尺設六色東方青南方赤西方白北方黒上𤣥下黄設六玉上圭下璧南方璋西方琥北方璜東方圭天子乗龍載大斾象日月升龍降龍出拜日於東門之外反祀方明禮日於南門外禮月與四瀆於北門外禮山川丘陵於西門外詳見會同聘禮賓朝服釋幣于禰有司筵几于室中祝先入主人從入主人在右再拜祝告又再拜釋幣制𤣥纁束奠于几下出主人立于户東祝立于牖西又入取幣降卷幣實于笲埋于西階東又釋幣于行上介釋幣亦如之詳見聘禮賜饔唯羮飪筮一尸若昭若穆僕為祝祝曰孝孫某孝子某薦嘉禮于皇祖某甫皇考某子如饋食之禮假器於大夫朌肉及廋車詳見聘禮使者歸及郊請反命禳乃入同上釋幣于門乃至于禰筵几于室薦脯醢觴酒陳席于阼薦脯醢三獻一人舉爵獻從者行酬乃出上介至亦如之同上右朝㑹大夫聘桓公二年冬公至自唐告于廟也凡公行告于宗廟反行飲至舍爵䇿勲焉禮也爵飲酒器也既飲置爵則書勲勞於䇿言速紀有功也左氏傳襄公十三年公至自晉孟獻子書勞於廟禮也書勲勞于䇿也桓公二年傳曰公至自唐告于廟也凡公行告於宗廟反行飲至舍爵䇿勲焉禮也桓十六年傳又曰公至自伐鄭以飲至之禮也然則還告廟及飲至及書勞三事徧行一禮則亦書至悉闕乃不書傳因獻子之事以發明凡例釋例詳之左氏傳天子將出征類乎上帝宜乎社造乎禰禡於所征之地受命於祖受成於學出征執有罪反釋奠于學以訊馘告詳見征伐大祝大師宜于社造于祖設軍社類上帝國將有事于四望及軍歸獻于社則前祝同上小宗伯若大師則帥有司而立軍社奉主車若将軍有事則與祭有司将軍于四望凡王之軍旅之禱祀肄儀為位同上大司馬若師有功則左執律右秉鉞以先愷樂獻于社若師不功則厭而奉主車同上肆師凡師用牲于社宗則為位類造上帝封于大神祭兵于山川亦如之凡師不功則助牽主車同上小祝大師掌釁祈號祝詳征伐有寇戎之事則保郊祀于社詳祭通禮神位章曾子問曰古者師行必以遷廟主行乎孔子曰天子巡狩以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣曾子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯将出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行每舍奠焉而后就舍反必告設奠卒歛幣玉藏諸兩階之間乃出蓋貴命也詳見征伐興兵以討不義乃告于皇天上帝日月星辰禱于后土四海神祇山川冡社乃造于先王詳見征伐先期五日大史誓于祖廟擇吉日齊戒告于郊社稷宗廟既筮則獻兆于天子使有司以特牲告社告以所征之事而受命焉舍奠于帝學以受成然後乃類上帝柴於郊以出以齊車載遷廟之主及社主行大司馬職奉之無遷廟主則以幣帛皮圭告于祖禰謂之主命亦載齊車凡行主皮圭幣帛皆每舍奠焉而後就館主車止于中門之外外門之内廟主居於道左社主居於道右其所經名山大川皆告祭焉戰日有司讀誥誓既卒遂禱戰祈克於上帝然後即敵己克敵史擇吉日復禡于所征之地柴於上帝祭社奠祖以告克者不頓兵傷士也戰不克則不告也凡類禡皆用甲丙戊庚壬之剛日鳴金振旅有司徧告捷于時所有事之山川既至舍于國外三日齊以特牛親格于祖禰然後入設奠以反主若主命則卒歛玉埋之于廟兩階間反社主如初迎之禮舍奠于帝學以訊馘告大享于羣吏用備樂享有功于祖廟舍爵䇿勲焉謂之飲至此天子親征之禮也詳見征伐天子命将出征親絜齊盛服設奠于祖以詔之然後告大社冡宰執蜃宜于社之右南面授大将大将北面稽首再拜而受承所頒賜于軍吏其出不類其克不禡戰之所在有大山川則祈焉禱克于五帝捷則報之振旅復命簡異功勤親告廟告社而後適朝祈勝之禮命勇謀之将以禦敵先使迎於適所從来之方為壇祈克于上帝衣服隨其方色服事人數從其方之數牲則用其方之牲祝史告于社稷宗廟邦域之内名山大川君親素服誓衆于大廟既誓將帥勤士卒陳于廟之右君立大廟之庭祝史立于社百官各警其事御于君以待命乃大鼓于廟門詔将帥命卒習射三發擊刺三行告廟用兵于敵也五兵備効乃鼓而出以即敵此諸侯應敵之禮也並孔叢子帥師者受命于廟受脤于社脤宜社之肉盛以脤器左閔二年氏傳公族其在軍則守於公禰謂從軍者公禰行主也行以遷主言禰在外親也文王世子是類是禡師祭也師出征伐類於上帝禡於所征之地雅爾右行師敢用𤣥牡敢昭告于上天神后請罪有夏明告天問桀百姓有何罪而加虐乎湯誥王曰予小子夙夜祇懼受命文考類于上帝宜于冡土以爾有衆㡳天之罰祭社曰宜冢土地也言我畏天之威告文王廟以事類告天祭社用汝衆致天罰於紂泰誓㡳商之罪告于皇天后土所過名山大川致商之罪謂伐紂之時后土社也名山華岳大川河曰惟有道曾孫周王發將有大正於商告天地山川之辭大正以兵征之也今商王受無道無道徳暴殄天物害虐烝民暴絶天物言逆天也逆天害民所以為無道為天下逋逃主萃淵藪逋亡也天下罪人逃亡者而紂為魁主窟聚淵府藪澤言大姦予小子既獲仁人敢祇承上帝以遏亂略仁人謂太公周召之徒略路也言誅紂敬承天意以絶亂路華夏蠻貊罔不率俾惟爾有神尚克相予以濟兆民無作神羞神庶幾助我渡民危害無為神羞辱武成王升舟入水鐘鼓亞觀臺亞將舟亞宗廟亞惡皆謂亞亞次也觀臺大史知天時占候者也宗廟行主尚書大傳牧之野武王之大事也既事而退柴於上帝祈於社設奠於牧室柴祈奠告天地及先祖也牧室牧野之室也古者郊關皆有館焉先祖者行主也遂率天下諸侯執豆籩逡奔走逡疾也疾奔走言勸事也周頌曰逡奔走在廟追王大王亶父王季厯文王昌不以卑臨尊也不用諸侯之號臨天子也文王稱王早矣於周猶為諸侯於是著焉大傳桓講武類禡也詩序莊公八年春王正月甲午治兵治兵于廟禮也治兵于廟習戰令将以圍郕春秋左氏傳諸侯從劉康公成肅公會晉侯伐秦成子受脤于社不敬脤宜社之肉也盛以脤噐故曰脤宜出兵祭社之名劉子曰國之大事在祀與戎祀有執膰膰祭肉戎有受脤神之大節也交神之大節今成子惰棄其命矣惰則失中和之氣其不反乎為成肅公卒于瑕張本成十三年左氏傳秦伯伐晉以璧祈戰于河禱求勝氏文十二年左傳晉侯伐齊将濟河獻子以朱絲係玉二㲄雙玉曰㲄而禱曰齊環怙恃其衆負其衆庶環齊靈公名負依也棄好背盟陵虐神主神主民也謂數伐魯殘民人曾臣彪將率諸侯以討焉彪晉平公名稱臣者明上有天子以謙告神曾臣猶末臣其官臣偃實先後之守官之臣偃獻子名苟㨗有功無作神羞羞恥也官臣偃無敢復濟偃信巫言故以死自誓唯爾有神裁之沈玉而濟㐮十八年左氏傳晉伐鄭楚子救鄭遇於鄢陵楚子登巢車以望晉軍大宰伯州犂侍于王後王曰乘而左右皆下矣曰戰禱也禱請於鬼神左成十六年氏傳晉趙鞅帥師及鄭罕達帥師戰于鐵將戰衛太子禱曰曽孫蒯聵敢昭告皇祖文王周文王皇大也烈祖康叔烈顯也文祖襄公繼業守文故曰文祖蒯聵襄公之孫鄭勝亂從勝鄭聲公名釋君助臣為從於亂晉午在難午晋定公名不能治亂使鞅討之蒯聵不敢自佚備持矛焉戎右持矛敢告無絶筋無折骨無面傷以集大事無作三祖羞集成也大命不敢請佩玉不敢愛不敢愛故以祈禱哀公二年左氏傳楚子敗晉師于邲祀于河作先君宮告成事而還傳言楚荘有禮所以遂興宣十二年左氏傳大司馬中春教振旅遂以蒐田有司表貉獻禽以祭社中夏教茇舍遂以苗田獻禽以享礿中秋教治兵遂以獮田致禽以祀祊中冬教大閲遂以狩田有司表貉于陳前致禽饁獸于郊入獻禽以享烝詳田役篇肆師凡四時之大甸獵祭表貉則為位凡甸用牲于社宗則為位同上司几筵甸役則設熊席右漆几同上甸祝掌四時之田表貉之祝號舍奠于祖廟禰亦如之師甸致禽于虞中乃屬禽及郊饁獸舍奠於祖禰乃斂禽禂牲禂馬皆掌其祝號同上小宗伯若大甸則帥有司而饁獸于郊遂頒禽凡王之甸役之禱祠肄儀為位同上季秋天子乃教於田獵命主祠祭禽於四方同上右田獵吉日維戊既伯既禱戊剛日也伯馬祖也謂天駟房星之神也此亦宣主之詩言田獵将用馬力故以吉日祭馬祖而禱之小雅太子生有司齊肅端冕見之南郊見於天也詳教太子立世子太史以告太祝太祝以告太祖太宗與社稷賈誼新書右生子立嗣婦人先嫁三月祖廟未毁教于公宮祖廟既毁教于宗室教成祭之牲用魚芼之以蘋藻詳昏義士昏禮凡行事受諸禰廟士昏記主納采章主人筵於户西西上右几注云人女父也筵為神布席也将以先祖之遺體許人故受其禮於禰廟親迎章主人筵于户西西上右几疏云以先祖之遺體許人将告神故女父先於廟設神席乃迎壻也齊戒以告鬼神以厚其別也詳昏義遣女於禰廟者重先人之遺支體也不敢自専故告禰也同上三月而廟見稱來婦也擇日而祭於禰成婦之義也同上右婚嫁鄭公子忽如陳逆婦媯陳鍼子送女先配而後祖鍼子曰是不為夫婦誣其祖矣非禮也何以能育詳冠昏記楚公子圍聘于鄭且妻於公孫叚氏伯州犂曰君辱貺寡大夫圍謂圍將使豐氏撫有而室圍布几筵告于莊公之廟而來同上大祝掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰說祈嘄也謂為有災變號呼告神以求福天神人鬼也祇不和則六癘作見故以祈禮同之故書造作竈杜子春讀竈為造次之造書亦或為造造祭於祖也鄭司農云類造禬禜攻說皆祭名也類祭於上帝詩曰是類是禡爾雅曰是類是禡師祭也又曰乃立冢土戎醜攸行爾雅曰起大事動大衆必先有事乎社而後出謂之宜故曰大師宜於社造於祖設軍社類上帝司馬法曰將用師乃告於皇天上帝日月星辰以禱於后土四海神祗山川冢社乃造于先王然後冢宰徴師於諸侯曰某國為不道征之以某年某月某日師至某國禜日月星辰山川之祭也春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之災於是乎禜之𤣥謂類造加誠肅求如志禬禜告之以時有災變也攻說則以辭責之禜如日食以朱絲縈社攻如其鳴鼔然董仲舒救日食祝曰昭昭大明瀸滅無光奈何以隂侵陽以卑侵尊是之謂說也禬未聞焉造類禬禜皆有牲攻說用幣而已作六辭五曰禱鄭司農云禱謂禱於天地社稷宗廟主為其辭也春秋傳曰鐵之戰衛太子禱曰曽孫蒯聵敢昭告皇祖文王烈祖康叔文祖㐮公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無破骨無面夷無作三祖羞大命不敢請佩玉不敢愛若此之屬𤣥謂禱賀慶言福祚之辭晉趙文子成室晉大夫發焉張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也北面再拜稽首君子謂之善頌善禱是祝辭小祝掌小祭祀將事侯禳禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌烖兵逺辠疾侯之言候也候嘉慶祈祥之屬禳禳郤凶咎寧風旱之屬順豐年而順為之祝辭逆迎也彌讀曰敉敉安也詛祝掌盟詛類造攻說禬禜之祝號詳盟詛大宗伯國有大故則旅上帝及四望故謂凶災旅陳也陳其祭事以祈焉禮不如祀之備也上帝五帝也鄭司農云四望日月星海𤣥謂四望五嶽四鎮四瀆典瑞四圭有邸以旅上帝兩圭有邸以旅四望大宗伯職曰國有大故則旅上帝及四望官並春玉人兩圭五寸有邸以旅四望邸謂之抵有邸僢共本也工考記職金旅于上帝則共其金版金鉼謂之版此版所施未聞秋官掌次王大旅上帝則張氈案設皇邸大旅上帝祭天於圓丘國有故而祭亦曰旅此以旅見祀也張氈案以氈為床於幄中鄭司農云皇羽覆上邸後版也𤣥謂後版屏風與染羽象鳯皇羽色以為之天官典瑞大旅共其玉器而奉之玉器謂圭祼圭之屬春官司尊彛大喪存奠彜大旅亦如之旅者國有大故之祭也亦存其奠彜則陳之不即徹眡瞭大喪廞樂器大旅亦如之旅非常祭於時乃興造其樂器笙師大喪廞其樂器大旅則陳之陳於饌處而已不涖其縣龜人若有祭事則奉龜以往旅亦如之大卜凡旅陳龜陳龜於饌處也士喪禮曰卜人先奠龜于西輕塾上南首是也不親貞龜亦以卜旅祭非常於大遷大師小宗伯大烖及執事禱祠于上下神示執事大祝及男巫女巫也求福曰禱得求曰祠讄曰禱爾于上下神祇鄭司農云小宗伯與執事共禱祠大祝國有大故天烖彌祀社稷禱祠大故兵冦也天烖疫癘水旱也彌猶徧也徧祀社稷及諸所禱既則祠之以報焉喪祝掌勝國邑之社稷之祝號以祭祀禱祠焉勝國邑所誅討者社稷者若亳社是矣存之者重神也蓋奄其上而棧其下為北牖小宗伯凡王之㑹同軍旅甸役之禱祠肄儀為位有禍烖亦如之謂有所禱祠肄習也肆師與祝侯禳于畺及郊侯禳小祝職也畺五百里逺郊百里近郊五十里若國有大故則令國人祭大故謂水旱凶荒所令祭者社及禜酺都宗人國有大故則令禱祠反命祭亦如之以王命令禱祠歸白王於獲福又以王命令祭之還又反命並春官小子凡侯禳飾其牲侯禳者候四時惡氣禳去之也羊人凡侯禳共其羊牲並夏官牧人凡毁事用尨可也尨謂雜色不純毁謂副辜侯禳毁除殃咎之屬官地雞人凡面禳共其雞牲面禳四面禳也男巫掌望祀望衍授號旁招以茅杜子春云望衍謂衍祭也授號以所祭之名號授之旁招以茅招四方之所望祭者𤣥謂衍讀為延聲之誤也望祀謂有牲粢盛者延進也謂但用幣致其神二者詛祝所授類造攻說禬禜之神號男巫為之招冬堂贈無方無算杜子春云堂贈謂逐疫也無方四方為可也無算道里無數逺益善也𤣥謂冬嵗終以禮送不祥及惡夢皆是也其行必由堂始巫與神通言當東則東當西則西可近則近可逺則逺無常數女巫掌歳時祓除釁浴歳時祓除如今三月上已如水上之類釁浴謂以香薰草藥沐浴占夢季冬乃舍萌于四方以贈惡夢杜子春讀萌為明又云其字當為明明謂敺疫也謂歳竟逐疫置四方書亦或為明𤣥謂舍讀為釋舍萌猶釋采也古書釋采釋奠多作舍字萌采始生也贈送也欲以新善去故惡眡祲掌安宅叙降宅居也降下也人見妖祥則不安主安其居處也次叙其凶禍所下謂禳移之正歳則行事占夢以季冬贈惡夢此正月而行安宅之事所以順民竝春官庶氏掌除毒蠱以攻說禬之毒蠱毒物而害病人者攻說祈名祈其神求去之也鄭司農云禬除也𤣥謂此禬讀如潰癰之潰翦氏掌除蠧物以攻禜攻之蠧物穿食人噐物者蠧魚亦是也攻禜祈名並秋官右祈禳梁州蔡蒙旅平蔡蒙二山名祭山曰旅旅平者治功畢而旅祭也雍州荆岐既旅荆岐二山名九州攸同九山刋旅九州之山槎木通道已可祭告禹貢昭公十八年夏五月鄭火子産使祝史徙主祏於周廟告於先君祏廟主石函周廟厲王廟也有火災故合羣主於祖廟易救護明日使郊人助祝史除於國北為祭處於國北者就大隂禳火禳火于𤣥冥回禄𤣥冥水神回禄火神祈于四鄘鄘城也城積土隂氣所聚故祈祭之以禳火之餘災七月子産為火故大為社為治也祓禳於四方振除火災禮也振棄也左氏傳宋災二師令四鄉正敬享二師左右師也鄉正鄉大夫享祀也祝宗用馬于四墉祝盤庚于西門之外祝大祝宗宗人墉城也用馬祭于四城以禳火盤庚殷王宋之逺祖城積隂之氣故祀之凡天災有幣無牲用馬祀盤庚皆非禮氏襄九年左傳惠王十五年有神降于莘惠王十五年魯莊公二十二年降下也下者言自上而下有聲象以接人莘虢地王問于内史過曰是何故固有之乎故事也固猶常也對曰有之國之將興明神降之觀其政徳而均布福焉國之將亡神亦往焉觀其苛慝而降之禍是以或見神以興亦或以亡昔夏之興也融降于崇山融祝融也崇崇髙山也夏居陽城崇髙所近其亡也回禄信於聆遂回禄火神再宿為信聆遂地名商之興也檮杌次於丕山檮杌鯀也過信曰次丕大邳山在河東其亡也夷羊在牧夷羊神獸牧商郊牧野周之興也鸑鷟鳴於岐山三君云鸑鷟鳯之別名也詩云鳯皇鳴矣于彼髙岡其在岐山之脊乎其衰也杜伯射王于鄗鄗鄗京也杜國伯爵陶唐氏之後周春秋曰宣王殺杜伯而不辜後三年宣王會諸侯田于圃日中杜伯起於道左衣朱衣朱冠操朱弓朱矢射宣王中心折脊而死是皆明神之志者也志記也見記録在史籍者王曰今是何神也對曰昔昭王娶於房曰房后房國名實有爽徳恊于丹朱爽二也協合也丹朱堯子丹朱馮身以儀之生穆王焉馮依也儀匹也詩云實維我儀言房后之行有似丹朱馮依其身而匹偶之生穆王滿若由是觀之其丹朱之神乎王曰其誰受之對曰在虢土言神在虢虢其受之王曰吾其若之何對曰使大宰以祝史帥狸姓奉犧牲粢盛玉帛往獻焉大宰上卿掌祭祀之式玉幣之事祝大祝掌祈福祥史大史掌次主位狸姓丹朱之後神不歆非類故帥以往也純色曰犧無有祈也祈求也勿有求請禮之而已其左氏傳云對曰以其物享之其至之日亦物也彼注云享祭也若以甲乙日至祭先脾玉用蒼服上青以此類祭之王使大宰忌父帥傅氏及祝史傅氏狸姓也在周為傅氏奉犧牲玉鬯往獻焉玉鬯鬯酒之圭長尺二寸有瓚所以灌地降神之器内史過從至虢虢公亦使祝史請事焉内史過歸告王曰虢必亡矣不禋於神而求福焉神必禍之十九年晉取虢國語周語楚共王無冢適冢大也有寵子五人無適立焉乃大有事于羣望羣望星辰山川而祈曰請神擇於五人者使主社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬宻埋璧於大室之庭巴姬共王妾大室祖廟昭十三年左氏傳小宗伯凡天地之大烖類社稷宗廟則為位詳災變禮鼓人救日月則詔王鼓同上大僕軍旅旬役贊王鼔救日月亦如之同上右天地大烖莊公二十五年六月辛未朔日有食之鼓用牲于社非常也唯正月之朔慝未作日有食之於是乎用幣于社伐鼓于朝詳災變禮日食則曷為鼓用牲于社求乎隂之道也以朱絲營社或曰脅之或曰為闇恐人犯之故營之同上言日言朔食正朔也鼓用牲于社鼓禮也用牲非禮也天子救日置五麾陳五兵五鼓諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也同上文公十五年六月辛丑朔日有食之鼓用牲于社非禮也日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝以昭事神訓民事君示有等威古之道也同上昭公十七年六月甲戌朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否大史曰在此月也日過分而未至三辰有災于是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗從昭子退曰夫子將有異志不君君矣同上昭公十七年冬有星孛於大辰西及漢夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢鄭禆竈言於子産曰宋衛陳鄭将同日火若我用瓘斝玉瓚鄭必不火瓘圭也斝玉爵也瓚勺也欲以禳火子産弗與以為天災流行非禳所息故也十八年夏五月火始昏見火心星壬午宋衛陳鄭皆火禆竈曰不用吾言鄭又将火前年禆竈欲用瓘斝禳火子産不聽今復請用之鄭人請用之子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信多言者或時有中遂不與亦不復火傳言天道難明雖禆竈猶不足以盡知之左氏傳哀公六年有雲如衆赤鳥夾日以飛三日楚子使問諸周大史周大史曰其當王身乎日為人君妖氣守之故以為當王身雲在楚上唯楚見之故禍不及他國若禜之可移於令尹司馬禜禳祭王曰除腹心之疾而寘諸股肱何益不糓不有大過天其夭諸有罪受罰又焉移之遂弗禜左氏傳昭公二十六年齊有彗星出齊之分野不書魯不見齊侯使禳之祭以禳除之晏子曰無益也祗取誣焉誣欺也天道不謟謟疑也不貳其命若之何禳之且天之有彗也以除穢也若無穢徳又何禳焉若徳之穢禳之何損公說乃止左氏傳梁山崩梁山晉望也崩在魯成五年以傳召伯宗傳驛也伯宗晋大夫孫伯糾之子絳人曰夫國主山川主為山川之主也孔子曰夫顓臾為東蒙主故川涸山崩君為之降服出次涸竭也川竭則山崩降服縞素也出次出於郊也乘縵不舉䇿於上帝縵車無文也不舉不舉樂也䇿於上帝以簡䇿之文告於上帝周禮曰鎮五嶽崩命去樂國三日哭以禮焉以禮於神也周禮國有大災三日哭案成五年左氏傳云山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉與此小異雖伯宗亦然如是而已伯宗及絳以告君從之國語晉語維王后元祀王謂禹也后君也祀年也禹始居攝為君之年也帝命大禹步于上帝帝舜也步推也于於也上帝天也帝令禹推演天道謂觀得失反覆也維時洪祀六沴用咎於下用此時禹始大祀六沴之用咎于下者用極昭格神靈以明其祀之盛大也是用知不畏而神之怒而乃也舜任禹禹能治其民撫其神舜知其弭神之怒可知也若六沴作見若是共禦帝用不差神則不怒若是順也共讀曰恭禦止也差疑也舜見禹知人善任故命之無復疑也五福乃降用章于下降下也章明也若六沴作見若不共禦六伐既侵六極其下侵陵也庶幾奉天行罰殺萬物也極凶也不共禦則必見凶也禹乃共辟厥德受命休令辟明也厥其也休美也禹於是恭明其徳維日孳孳受舜之美令奉行之爰用五事建用王極王極或皆為皇極也長事長猶君也一曰貎貎之不恭是為不肅肅敬也君貎不恭則是不能敬其事也厥咎狂君臣不敬則倨慢如狂矣厥罰恒雨貎曰木木主春春氣生生氣失則踰其節故恒雨也厥咎惡生氣失故於人則為惡時則有服妖服貎之飾時則有龜孽龜蟲之生於水而游於春者也屬木時則有雞禍雞畜之有冠翼者也屬木時則有下體生於上之痾痾病也貎氣失之病也時則有青𤯝青祥青木色也𤯝生於此祥自外來也唯金沴水沴殄也凡貎言視聽思忿一事失則逆人之心人心逆則怨木金水土火氣為之傷傷則衝勝來乗殄之於是神怒人怨将為禍亂故五行先見變異以譴告人也及妖孽禍痾𤯝祥皆其氣類暴作非常時為怪者也各以物象為之占也二曰言言之不從是謂不又厥咎僭厥罰恒晹厥極憂時則有詩妖時則有介蟲之孽時則有大禍時則有口舌之痾時則有白𤯝白祥唯木沴金三曰視視之不明是謂不哲厥咎舒厥罰恒燠厥極疾時則有草妖時則有臝蟲之孽時則有羊禍時則有目痾時則有赤𤯝赤祥唯水沴火四曰聽聽之不聰是謂不謀厥咎急厥罰恒寒厥極貧時則有鼓妖時則有魚孽時則有豕禍時則有耳痾時則有黑𤯝黑祥唯火殄水五曰思思之不睿是謂不聖厥咎霿厥罰恒風厥極凶短折時則有脂夜之妖時則有華孽時則有牛禍時則有心腹之痾時則有黄𤯝黄祥維金木水火沴土六月王極王之不極是謂不建厥咎眊厥罰恒隂厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有下人伐上之痾夏侯勝説伐宜為代書亦或作代隂陽之神曰魂魄君行不由常侜張無度則魂魄傷也王氣失之病也不中之人恒耆其味厚其毒增以為病将以開賢代之也春秋傳所謂奪伯有魄者是也不名疾疾不著於身體也時則有日月亂行星辰逆行亂謂薄食鬭並是逆謂盈縮反明經天守舍之類也不言沴天天至尊無能沴之者離逢非沴維鮮之功謂此也維五位復建辟厥沴人君失五事則五行相沴違其位復立之者當明其變異則知此為貎邪輒改過以共禦之至司之月又必齊肅祭祀以撫其神則咎除矣不言六位天不違其位曰二月三月維貎是司四月五月維視是司六月七月維言是司八月九月維聽是司十月十一月維思心是司十二月與正月維王極是司司主也此盖用夏數也夏數得天之正𤣥或疑焉此用王事之次則四月五月主視六月七月主言非也用五行王相之次則八月九月主聴十月十一月主思心亦非也子駿傳曰二月三月維貎是司四月五月維視是司六月七月維思心是司八月九月維言是司十月十一月維聽是司十二月與正月維王極是司於四時之氣以近其正也凡六沴之作歲之朝月之朝日之朝則后王受之歲之中月之中日之中則公卿受之歲之夕月之夕日之夕則庶民受之自正月盡四月為歲之朝自五月盡八月為歲之中自九月盡十二月為歲之夕上旬為月之朝中旬為月之中下旬為月之夕平旦至食時為日之朝禺中至日昳為日之中晡時至黄昏為日之夕受之受其凶咎也其二辰以次相将其次受二辰謂日月也假令歲之朝也日月中則上公受之日月夕則下公受之日月朝大夫受之歲之夕也日月朝則上士受之日月中則下士受之其餘差以尊卑多少則悉矣星辰莫同莫夜也星辰之變夜見亦與晝同初昏為朝夜半為中将晨為夕或曰将晨為朝初昏為夕也是離逄非沴維鮮之功離憂也逄見也是謂憂見之象非沴也言王行事能沴天者也鮮殺也功成也維凶咎之殺已成故天垂變異以示人也禦貎於喬忿止貎之失者在於去驕忿也驕忿者不恭之刑也驕忿謂若傲很明德忿類無期之類也以其月從其禮祭之參乃從從順也三祭之其神乃順不怒也禦言於訖衆以其月從其禮祭之參乃從訖止也止言之失者在於去止衆止衆者是不從之刑也止衆謂若周厲王弭謗以障民口之類也禦視於忽似以其月從其禮祭之叁乃從止視之失者在於去忽似忽似者是不明之刑也忽似謂若亂於是非象恭滔天及不辨鹿馬之類也禦聽於怵攸以其月從其禮祭之叁乃從怵讀曰獸不狘之狘攸讀為風雨所漂颻之颻止聽之失者在於去怵攸者是不聰之刑也怵攸謂若老夫嚾嚾小子蟜蟜誨爾純純聽我眊眊之類禦思心於有尤以其月從其禮祭之叁乃從尤過也止思心之失者在於去欲有所過欲者是不睿之刑也欲有所過欲若昭公不知禮而習小儀不脩政而欲誅季氏之類也禦王極於宗始以其月從其禮祭之叁乃從宗尊也止王極之失者在於尊用始祖之法度不言其惡者人性備於五德得失在斯王不極則五事皆失非一惡也大者易姓小者滅身其能宗始則錄延其受命之君承天制作猶天之教命也故掌祖廟之藏者謂之天府也六沴之禮散齊七日致齊新器絜祀用赤黍三日之朝於中庭祀四方從東方始卒於北方禮志致齊三日周禮凡祭祀前期十日宗伯帥執事卜日是為齊一旬乃祀也今此致齊即祀者欲得容三祀也蓋八日為致齊明九日朝而初祀者一旬有一日事乃畢也新器赤黍改過之宜也中庭明堂之庭也或曰朝庭之庭也此祀五精之神其器牲粢盛有常禮記其異者也不祀天非正月亦以此禮祀此神也其祀禮曰格祀篇名也今亡曰某也方祀曰播國率相行祀篇中大祝贊主人辭也某也天子名也方祀祀四方也播讀曰藩藩國謂諸侯相助也言諸侯率其常事來即助行祭之禮也其祀也大祝告神以君悔過之辭也周禮大祝掌六祝之辭以事鬼神祗祈福祥求永貞也曰若爾神靈洪祀六沴是作神靈謂木精靈威仰火精赤熛怒土精含樞紐金精白招拒水精叶光紀及木帝大皥火帝炎帝土帝黄帝金帝少皥水帝顓頊木官勾芒火官祝融土官后土金官蓐收水官𤣥冥皆是也生勤其事死在祀典配其神而食作猶為也六沴是神靈所為無差無傾無有不正言神靈正直無比類所謂沴皆是也若民有不敬事則㑹批之六沴言民廣及天下有過者也事六事也㑹合也批推也言天下有過神靈亦合推内于六沴天子以天下為任者六事之機以縣示我六事貌言視聴思心王極也機天文也天文運轉以縣見六事之變異示我我謂天子我民人無敢不敬事上下王祀我與民人無敢不敬畏六事上下君祀之所縣示變異者言皆悔過也上君祀靈威仰下君祀大皥之屬也尚書大傳右六沴大司徒荒政十有二聚萬民十有一曰索鬼神荒凶年也鄭司農云救饑之政十有二品索鬼神求廢祀而修之雲漢之詩所謂靡神不舉靡受斯牲者也地官司巫若國有大旱則帥巫而舞雩雩旱祭也天子於上帝諸侯於上公之神鄭司農云魯僖公欲焚巫尫以其舞雩不得雨國有大烖則帥巫而造巫恒杜子春云司巫帥巫官之屬㑹聚常處以待命也𤣥謂恒久也巫久者先巫之故事造之當案視所施為女巫旱暵則舞雩使女巫舞旱祭崇隂也鄭司農云求雨以女巫故檀弓曰歲旱繆公召縣子而問焉曰吾欲暴巫而奚若曰天則不雨而望之愚婦人無乃已疏乎凡邦之大烖歌哭而請有歌者有哭者冀以悲哀感神靈也竝春官舞師教皇舞帥而舞旱暵之事旱暵之事謂雩也暵熱氣也鄭司農云皇舞䝉羽舞皇或為䍿𤣥謂皇析五采羽為之亦如帗稻人旱暵共其雩斂稻人共雩斂稻急水者也鄭司農云雩事所發斂竝地官右凶旱湯之時大旱七年雒坼川竭煎沙爛石於是使人以三足鼎祝山川教之祝曰政不節耶使人疾耶苞苴行耶謀夫昌耶宮室營耶女謁盛耶何不雨之極也蓋言未巳而天大雨夫天之應人如影之隨形響之効聲者也東漢鍾離意傳注云帝王紀曰成湯大旱七年齊戒翦髮斷𤓰以已為犠牲禱於桑林以六事自責説苑倬彼雲漢昭囘于天王曰於乎何辜今之人天降喪亂饑饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽賦也雲漢天河也昭光囘轉也于天其光隨天而轉也薦荐通重也臻至也靡神不舉所謂國有凶荒則索鬼神而祭之也圭璧禮神之玉也卒盡寧猶何也舊説以為宣王承厲王之烈内有撥亂之志遇烖而懼側身修行欲消去之天下喜於王化復行百姓見憂故仍叔作此詩以美之言雲漢者夜晴則天河明故述王仰訴於天之辭如此也旱既大甚藴隆蟲蟲不殄禋祀自郊徂宮上下奠瘞靡神不宗后稷不克上帝不臨耗斁下土寧丁我躬賦也蘊蓄隆盛也蟲蟲熱氣也殄絶也郊祀天地也宮宗廟也上祭天下祭地奠其禮瘞其物宗尊也克勝也言后稷欲救此旱災而不能勝也臨享也稷以親言帝以尊言也斁敗丁當也何以當我之身而有是災也或曰與其耗斁下土寧使烖害當我身也亦通大雅雲漢齊大旱景公召羣臣問曰天不雨久矣吾使人卜之祟在高山廣水寡人欲少賦斂以祠靈山可乎晏子曰不可夫靈山以石為身以草木為髮天久不雨髮将焦身将熱彼獨不欲雨乎祠之無益景公曰吾欲祠河伯可乎晏子曰不可夫河伯以水為國以魚鼈為民天久不雨水泉将下百川竭國将亡民将滅矣彼獨不用雨乎祠之何益景公曰今為之奈何晏子曰君誠避宮殿暴露與靈山河伯共憂其幸而雨乎於是景公出野暴露三日天果大雨説苑衛大旱卜有事於山川不吉有祭事也甯荘子曰昔周饑克殷而年豐今郉方無道諸侯無伯伯長也天其或者欲使衛討郉乎從之師興而雨僖十九年左氏傳鄭大旱使屠擊祝款豎柎有事於桑山三子鄭大夫有事祭也斬其木不雨子産曰有事於山蓺山林也蓺養護令繁植而斬其木其罪大矣奪之官邑昭十六年左氏傳歲旱穆公召縣子而問然然之言焉也凡穆或作繆曰天久不雨吾欲暴尩而奚若奚若何如也尩者面鄉天覬天哀而雨之曰天則不雨而暴人之疾子虐毋乃不可與錮疾人之所哀暴之是虐然則吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃已疏乎已猶甚也巫主接神亦覬天哀而雨之春秋傳説巫曰在女曰巫在男曰覡周禮女巫旱暵則舞雩徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎徙市者庶人之喪禮今徙市是憂戚於旱若喪檀弓荘公二十五年秋大水鼔用牲于社于門亦非常也失常禮凡天災有幣無牲天災日月食大水也祈請而已不用牲也非日月之眚不鼓眚猶災也月侵日為眚隂陽逆順之事賢聖所重故特鼔之春秋左氏傳高下有水災曰大水既戒鼓而駭衆用牲可以已矣救日以鼓兵救水以鼓衆穀梁傳于社禮也于門非禮也公羊傳鄭大水龍鬭于時門之外洧淵時門鄭城門也洧水出滎陽密縣東南至潁川長平入潁國人請為禜焉子産弗許曰我鬭龍不我覿也覿見也龍鬭我獨何覿焉禳之則被其室也淵龍之室吾無求於龍龍亦無求於我乃止也傳言子産之知傳昭十九年左氏女祝掌王后之内祭祀凡内禱祠之事内祭祀六宮之中竈門户禱疾病求瘳也祠報福掌以時招梗禬禳之事以除疾殃鄭大夫讀梗為亢𤣥謂梗禦未至也除災害曰禬禬猶刮去也郤變異曰禳禳攘也四禮唯禳其遺象今存天官男巫春招弭以除疾病招招福也杜子春讀弭如彌兵之彌𤣥謂弭讀為敉字之誤也敉安也安凶禍也招敉皆有祀衍之禮春官疾病乃行禱五祀盡孝子之情五祀博言之士二祀曰門曰行士喪禮記右疾病既克商二年王有疾弗豫伐紂明年武王有疾不悦豫二公曰我其為王穆卜集傳二公太公召公也李氏曰穆卜猶言敬卜也周公曰未可以戚我先王戚憂惱之意未可以武王之疾而憂惱我先王也蓋郤二公之卜公乃自以為功為三壇同墠為壇於南方北面周公立焉植璧秉珪乃告太王王季文王功事也築土曰壇除地曰壇三壇三王之位皆南向三壇之南别為一壇北向周公所立之地也植置也珪璧所以禮神史乃冊祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身元孫某武王也遘遇厲惡虐暴也丕子元子也武王為天元子三王當任其保護之責于天不可命其死也予仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神今我即命于元龜爾之許我我其以璧與珪歸俟爾命爾不許我我乃屏璧與珪即就也屏藏也乃卜三龜一習吉啟籥見書乃并是吉卜筮必立三人以相參考三龜者三人所卜之龜也習重也公曰體王其罔害體兆之體也公歸乃納冊于金縢之匱中王翼日乃瘳匱藏卜書之匱金縢以金緘之也金縢夷王愆于厥身夷王厲王父也愆惡疾也諸侯莫不竝走其望以祈王身昭二十六年左氏傳宋公享晉侯于楚丘請以桑林桑林殷天子之樂名荀罃辭辭讓之荀偃士㑹曰諸侯宋魯於是觀禮魯有禘樂賓祭用之宋以桑林享君不亦可乎言其天子樂也舞師題以旌夏師樂師也旌夏大旌也題識也以大旌表識其行列晉侯懼而退入于房旌夏非常卒見之人心偶有所畏去旌卒享而還及著雍疾晉侯疾也著雍晉地卜桑林見祟見於卜兆荀偃士匄欲奔請禱焉奔走還宋禱謝荀罃不可曰我辭禮矣彼則以之以用之猶有鬼神於彼加之言自當加罪於宋晉侯有間間疾差也左襄十年氏傳鄭簡公使公孫成子來聘成子子産之諡平公有疾韓宣子贊授客館贊導也客問君疾對曰寡君之疾久矣上下神祗無不徧諭也諭謂祭祀告謝也而無除今夢黄熊入于寝門夢公夢也注云熊似羆不知人殺乎抑厲鬼邪人殺主殺人厲鬼惡鬼也子産曰以君之明子為大政其何厲之有大政美大之政僑聞之昔者鯀違帝命殛之於羽山帝堯也殛放而殺之化為黄熊以入于羽淵羽山之淵鯀既死而神化也實為夏郊禹有天下而郊祀之三代舉之舉謂不廢其祀夫鬼神之所及吉凶所及非其族類則紹其同位紹繼也殷周祀之是也是故天子祀上帝上帝天也公侯祀百辟以死勤事功施於民者自卿以下不過其族族親族也今周室少卑晉實繼之謂為盟主統諸侯也其或者未與夏郊邪宣子以告祀夏郊為周祀也董伯為尸董伯晉大夫神不歆非類則董伯其姒姓乎尸主也語國語晉晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟史莫之知敢問此何神也子産曰昔高辛氏有二子伯曰閼伯季曰實沈高辛帝嚳居于曠林不相能也曠林地闕日尋干戈以相征討尋用也后帝不臧后帝堯也臧善也遷閼伯于商丘主辰商丘宋地主祀辰星辰大火也商人是因故辰為商星商人湯先相土封商丘因閼伯故國祀辰星遷實沈于大夏主參大夏今晉陽縣唐人是因以服事夏商唐人若劉累之等累遷魯縣此在大夏其季世曰唐叔虞唐人之季世其君曰叔虞當武王邑姜方震大叔邑姜武王后齊太公之女懷胎為震大叔成王之弟叔虞夢帝謂己余命而子曰虞帝天取唐君之名将與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封大叔焉故參為晉星叔虞封唐是為晉侯由是觀之則實沈參神也昔金天氏有裔子曰昧為𤣥冥師生允格臺駘金天氏帝少皥裔逺也𤣥冥水官昧為水官之長臺駘能業其官纂昧之業宣汾洮宣猶通也汾洮二水名障大澤陂澤障之以處大原大原晉陽也臺駘之所居帝用嘉之封諸汾川帝顓頊沈姒蓐黄實守其祀四國臺駘之後今晉主汾而滅之矣滅四國由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱厲疫之災於是乎禜之有水旱之災則禜祭山川之神若臺駘者周禮四曰禜祭為營攢用幣以祈福祥日月星辰之神則雪霜風雨之不時於是乎禜之星辰之神若實沈者若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉言實沈臺駘不為君疾昭元年左氏傳齊侯疥遂痁痁瘧疾期而不瘳諸侯之賔問疾者多在多在齊梁丘據與裔款二子齊嬖大夫言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賔欲殺嚚固以辭謝來問疾之賔公説告晏子晏子曰若有德之君外内不廢無廢事上下無怨動無違事其祝史薦信無愧心矣君有功徳祝史陳説之無所愧是以鬼神用饗國受其福祝史與焉與受國福其所以蕃祉老壽者為信君使也其言忠信於鬼神其適遇淫君外内頗邪上下怨疾動作辟違從欲厭私使私情厭足高臺深池撞鐘舞女斬刈民力輸掠其聚掠奪取也以成其違不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也以實白神是為言君之罪其蓋失數美是矯誣也蓋掩也進退無辭則虚以求媚作虚辭以求媚於神是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僭嫚於鬼神公曰然則若之何對曰不可為也言非誅祝史所能治民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東聊攝東西界也平原聊城縣東北有攝城姑尤以西姑尢齊東界也姑水尤水皆在城陽郡東南入海其為人也多矣雖其善祝豈能勝億兆人之詛萬萬曰億萬億曰兆君若欲誅於祝史脩德而後可公説使有司寛政毁闗去禁薄歛已責除逋責十二月齊侯田于沛言疾愈行獵沛澤名昭二十年左氏傳楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望諸侯望祀竟内山川星辰江漢睢漳楚之望也四水在楚界禍福之至不是過也不穀雖不徳河非所獲罪也遂弗祭哀六年左氏傳子疾病子路請禱子曰有諸子路對曰有之誄曰禱爾于上下神祇子曰丘之禱久矣禱謂禱於鬼神有諸問有此理否誄者哀死而述其行之辭也上下謂天地天曰神地曰祇禱者悔過遷善以祈神之佑也無其禮則不必禱既曰有之則聖人未嘗有過無善可遷其素行固已合於神明故曰丘之禱久矣又士喪禮疾病行禱五祀蓋臣子廹切之至情有不能自己者初不請於病者而後禱也故孔子之於子路不直拒之而但告以無所事禱之意論語小祝大喪及葬設道齎之奠分禱五祀杜子春云齎當為粢道中祭也漢儀毎街路輒祭𤣥謂齎猶送也送道之奠謂遣奠也分其牲體以祭五祀告王去此宮中不復反故興祭祀也王七祀祀五者司命大厲平生出入不以告春官右喪祭詛祝作盟詛類造攻説禬禜之祝號八者之辭皆所以告神明也盟詛主於要誓大事曰盟小事曰詛作盟詛之載辭以叙國之信用以質邦國之劑信載辭為辭而載之於䇿坎用牲加書於其上也國謂王之國邦國諸侯國也質正也成也文王脩德而虞芮質厥成鄭司農云載辭以春秋傳曰使祝為載書春官司盟掌盟載之灋載盟辭也盟者書其辭於䇿殺牲取血坎其牲加書於上而埋之謂之載書春秋傳曰宋寺人惠牆伊戾坎用牲加書為世子痤與楚客盟凡邦國有疑㑹同則掌其盟約之載及其禮儀北面詔明神既盟則貳之有疑不協也明神神之明察者謂日月山川也覲禮加方明于壇上所以依之也詔之者讀其載書以告之也貳之者寫副當以授六官盟萬民之犯命者詛其不信者亦如之盟詛者欲相與共惡之也犯命犯君教令也不信違約者也春秋傳曰臧紇犯門斬闗以出乃盟臧氏又曰鄭伯使卒出豭行出犬雞以詛射頴考叔者凡民之有約齊者其貳在司盟貳之者檢其自相違約有獄訟者則使之盟詛不信則不敢聽此盟詛所以省獄訟凡盟詛各以其地域之衆庶共其牲而致焉既盟則為司盟共祈酒脯使其邑閭出牲而來盟己又使出酒脯司盟為之祈明神使不信者必凶秋官封人大盟則飾其牛牲大盟㑹同之盟地官戎右盟則以玉敦辟盟遂役之鄭司農云敦器名也辟法也𤣥謂将歃血者先執其器為衆陳其載辭使心皆開辟也役之者傳歃血授當歃者贊牛耳桃茢鄭司農云贊牛耳春秋傳所謂執牛耳者故書茢為滅杜子春云滅當為厲𤣥謂尸盟者割牛耳取血助為之及血在敦中以桃茢拂之又助之也耳者盛以珠盤尸盟者執之桃鬼所畏也茢苕帚所以埽不祥夏官右盟詛涖牲曰盟涖臨也次用牲臨而讀其盟書盟禮亡曲禮成王盟諸侯于岐陽岐山之陽楚為荆蠻荆州之蠻也置茅蕝設望表與鮮卑守燎置立也蕝謂束茅而立之所以縮酒望表謂望祭山川立木以為表表其位也鮮卑東夷國燎庭燎也國語晉語隠公八年秋七月庚午宋公齊侯衛侯盟于瓦屋外盟不日此其日何也諸侯之參盟於是始故謹而日之也世道交喪盟詛滋彰非可以經世軌訓故存日以記惡蓋春秋之始也誥誓不及五帝五帝謂黄帝顓頊帝嚳帝堯帝舜也誥誓尚書六誓七誥是其遺文五帝之世道化淳備不須誥誓而信自著盟詛不及三王三王謂夏殷周也夏啟有鈞臺之享商湯有景亳之命周武有盟津之㑹衆所歸信不盟詛也交質子不及二伯二伯謂齊桓晉文齊桓有召陵之師晉文有踐土之盟諸侯率服不質任也穀梁傳五伯桓公為盛葵丘之㑹諸侯束牲載書而不歃血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有德三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸于好按春秋傳僖公九年葵丘之㑹陳牲而不殺讀書加于牲上壹明天子之禁孟子晉文公伐衛楚師救衛戰于城濮楚師敗績晉師還至于衡雍作王宮于踐土王子虎盟于王庭踐土宮之庭書踐土别于京師要言曰皆奨王室無相害也有渝此盟明神殛之俾隊其師無克祚國及而𤣥孫無有老幼奨助也渝變也殛誅也俾使也隊隕也克能也僖二十八年左氏傳諸侯伐鄭鄭人恐乃行成與晉成也同盟于戲将盟鄭六卿公子騑子駟公子發子國公子嘉子孔公孫輒子耳公孫蠆子蟜公孫舍之子展及其大夫門子皆從鄭伯門子卿之適子晉士莊子為載書荘子士弱載書盟書曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟如違盟之罰公子騑趨進曰天禍鄭國使介居二大國之間介猶間也大國不加德音而亂以要之謂以兵亂之力強要鄭使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告墊隘猶委頓底至也自今日既盟之後鄭國而不唯有禮與彊可以庇民者是從而敢有異志者亦如之亦如此盟荀偃曰改載書子駟亦以所言載於䇿故欲改之公孫舍之曰昭大神要言焉要誓以告神若可改也大國亦可叛也知武子謂獻子曰我實不德而要人以盟豈禮也哉非禮何以主盟姑盟而退脩德息師而來終必獲鄭何必今日乃盟而還遂兩用載書楚子伐鄭與晉成故子駟将及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯彊是從今楚師至晉不我救則楚彊矣盟誓之言豈敢背之且要盟無質神弗臨也質主也所臨唯信信者言之瑞也瑞符也善之主也是故臨之神臨也明神不蠲要盟蠲潔也背之可也乃及楚平襄九年左氏傳諸侯伐鄭鄭人懼乃行成同盟于亳載書曰凡我同盟毋藴年藴積年榖而不分災毋壅利專山川之利毋保姦藏罪人毋留慝速去惡救災患恤禍亂同好惡奨王室奨助也或間兹命司慎司盟名山名川二司天神羣臣羣祀羣祀在祀典者先王先公先王諸侯之大祖宋祖帝乙鄭祖厲王之比也先公始封君七姓十二國之祖七姓晉魯衛鄭曹縢姬姓邾小邾曹姓宋子姓齊姜姓莒己姓杞姒姓薛任姓實十三國言十二誤也明神殛之殛誅也俾失其民隊命亡氏踣其國家襄十一年左氏傳宋華元克合晉楚之成晉士燮㑹楚公子罷許偃盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤菑危備救凶患若有害楚則晉伐之在晉楚亦如之交贄徃來道路無壅贄幣也謀其不協而討不庭討背叛不來在王庭者有渝此盟明神殛之俾隊其師無克胙國成十二年左氏傳崔杼弑齊君立景公而相之慶封為左相盟國人於大宫大宫大公廟曰所不與崔慶者晏子仰天歎曰嬰所不唯忠於君利社稷者是與有如上帝乃歃盟書云所不與崔慶者有如上帝讀書未終晏子抄荅易其辭因自歃襄二十五年左氏傳晉師將盟衛侯于鄟澤衛人請執牛耳盟禮尊者涖牛耳主次盟者衛侯與晉大夫盟自以當涖牛耳故請成何曰衛吾温原也焉得視諸侯言衛小可比晉縣不得從諸侯禮左定八年氏傳公㑹齊侯于夾谷孔丘相相㑹儀也将盟齊人加於載書曰齊師出竟而不以兵車三百乗從我者有如此盟如此盟詛之禍孔丘使兹無還揖對無還魯大夫曰而不反我汶陽之田吾以共命者亦如之須齊歸汶陽田乃當共齊命於是孔子以公退賤者終其事要盟不絜故略不書齊人來歸鄆讙龜隂之田定十年左氏傳哀公㑹呉于橐臯呉子使大宰嚭請尋盟公不欲使子貢對曰盟所以周信也周固故心以制之制其義玉帛以奉之奉贄明神言以結之結其信明神以要之要以禍福寡君以為苟有盟焉弗可改也己若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也尋重也寒歇也乃不尋盟哀十二年左氏傳哀公㑹齊侯盟于䝉武伯問於髙柴曰諸侯盟誰執牛耳執牛耳尸盟者季羔曰鄫衍之役呉公子姑曹季羔髙柴也鄫衍在七年發陽之役衛石魋發陽鄖也在十二年石魋石曼姑之子武伯曰然則彘也彘武伯名也鄫衍則大國執發陽則小國執據時執者無常故武伯自以為可執哀十七年左氏傳鄭伯将伐許授兵於大宫大宫鄭祖廟公孫閼與潁考叔爭車公孫閼鄭大夫潁考叔挾輈以走輈車轅也子都拔棘以逐之子都公孫閼棘㦸也及大逵弗及子都怒逵道方九軌也傅于許傅于許城下潁考叔取鄭伯之旗蝥弧以先登蝥旗名子都自下射之顛顛隊而死鄭伯使卒出豭行出犬雞以詛射潁考叔者百人為卒二十五人為行行亦卒之行列疾射潁考叔者故令卒及行間皆詛之君子謂鄭莊公失政刑矣政以治民刑以正邪既無德政又無威刑是以及邪大臣不睦又不能用刑於邪人邪而詛之将何益矣隠十一年左氏傳季武子将作三軍盟諸僖閎僖宮之門詛諸五父之衢五父衢道名在魯國東南詛以禍福之言相要襄十一年左氏傳成廟則釁之以羊門夾室皆用雞宗廟之器其名者成則釁之以豭豚雜記廟詳見釁篇肆師以歲時序其祭祀及其祈珥序次第其先後大小故書祈為幾杜子春讀幾當為祈珥當為餌𤣥謂祈當為進禨之禨珥當為衈禨衈者釁禮之事雜記曰成廟則釁之雍人舉羊升屋自中中屋南面刲羊血流於前乃降門夾室皆用雞其衈皆於屋下割雞門當門夾室中室然則是禨謂羊血也小子職曰掌珥于社稷祈于五祀是也亦謂其宮兆始成時也春秋僖十九年夏邾人執鄫子用之傳曰用之者何蓋叩其鼻以衈社也春官小子掌珥于社稷祈于五祀故書祀作禩鄭司農云禩讀為祀書亦或為祀珥社稷以牲頭祭也𤣥謂珥讀為衈祈或為刉刉衈者釁禮之事也用毛牲曰刉羽牲曰衈衈刉社稷五祀謂始成其宫兆時也春官肆師職祈或作畿秋官士師職曰凡刉珥則奉大牲此刉衈正字與釁邦器及軍器邦器謂禮樂之器及祭器之屬雜記曰凡宗廟之器其名者成則釁之以豭豚圉師春除蓐釁廐蓐馬兹也馬既出而除之新釁焉神之也竝夏官始立學者既興器用幣興當為釁字之悞也禮樂之器成則釁之又用幣告先聖先師以器成文王世子天府上春釁寳鎮及寳器上春孟春也釁謂殺牲以血血之鄭司農云釁讀為徽或曰釁鼓之釁龜人上春釁龜釁者殺牲以血之神之也𤣥謂上春者夏正建寅之月月令孟冬云釁祠龜䇿相互矣秦以十月建亥為歲首則月令秦世之書亦或欲以歲首釁龜耳並春官孟冬命大史釁龜筴占兆審卦吉凶筴蓍也占兆龜之繇文也周禮龜人上春釁龜謂建寅之月也秦以其歲首使大史釁龜筴與周禮異矣卦吉凶謂易也審省錄之而不釁筮筮短賤於兆也今月令曰釁祠祠衍字月令大司馬若大師帥執事涖釁主及軍器大師王出征伐也涖臨也主謂遷廟之主及社主在軍者也軍器鼔鐸之屬凡師旣受甲迎主于廟及社主祝奉以從殺牲以血塗主及軍器皆神之夏官君以軍行故社釁鼓師出先有事祓禱於社謂之宜社於是殺牲以血塗鼓鼙為釁鼓祝奉以從奉社主也傳定四年左氏小祝大師掌釁祈號祝鄭司農云釁謂釁鼓也春秋傳曰君以軍行祓社釁鼓祝奉以從春官司約若有訟者則珥而辟藏鄭司農云謂有爭訟罪罰刑書謬誤不正者為之開藏取本刑書以正之當開時先祭之𤣥謂訟訟約若宋仲幾薛宰者也辟藏開府視約書珥讀為衈謂殺雞取血釁其户秋官羊人凡祈珥釁積共其羊牲共猶給也夏官士師凡刉珥則奉大牲珥讀為衈刉衈釁禮之事用牲毛者曰刉羽者曰衈犬人凡幾珥用駹可也鄭司農云駹謂不純色也𤣥謂幾讀為刉珥當為衈刉衈者釁禮之事並秋官雞人凡釁共其雞牲釁釁廟之屬釁廟以羊門夾室皆用雞春官右釁齊宣王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰将以釁鐘王曰舍之吾不忍其觳觫若無罪而就死地對曰然則廢釁鐘與曰何可廢也以羊易之釁鐘新鑄鐘成而殺牲取血以塗其釁郄也觳觫恐懼貎子孟邾人執鄫子用之用之者叩其鼻以衈社也衈者釁也取鼻血以釁祭社器僖十九年穀梁傳禮書綱目卷四十五
