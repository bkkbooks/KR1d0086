錄或雜以秦漢儒之言純駁不一其冠昏等義則儀禮之義疏耳自三禮而外殘編逸義亦或頗見於他經論語孟子爾雅春秋内外傳大戴家語孔叢等書諸子則管子荀況漢儒則伏生賈誼劉向班固之徒亦能記其一二然皆紛綸散出無統紀至於聲律器數則又絶無完篇樂記但能言其義已失其數矣夫禮樂之全雖不可復見然以周禮大宗伯攷之禮之大綱有五吉凶軍賓嘉皆有其目其它通論制度之事與夫雜記威儀之細者尚不在此數樂則統于大司樂其律同度數鏗鏘鼓舞亦必别有一經與禮相輔竊意制作之初當如儀禮之例事别為篇綱以統目首尾倫貫條理秩然所謂經禮三百曲禮三千者此也散逸之餘儀禮正篇猶存二戴之記者如投壺奔喪遷廟釁廟之類已不可多覯其他一篇之中雜錄吉凶一事之文散見彼此又或殷周異制傳聞互殊學者末由觀其聚則亦不能㑹其通夫禮樂之全已病其闕略而存者又疾其紛繁此朱子儀禮經傳通解所為作也朱子之書以儀禮為經以周官戴記及諸經史雜書補之其所自編者曰家禮曰鄉禮曰學禮曰邦國禮曰王朝禮而喪祭二禮屬之勉齋黄氏其編類之法因事而立篇目分章以附傳記宏綱細目於是粲然秦漢而下未有此書也顧朱子之書修於晚歲前後體例亦頗不一王朝禮編自衆手節目闊疎且未入疏義黄氏之書喪禮固詳宻亦間有漏落祭禮未及精專修改較喪禮疎宻不倫信齋楊氏有祭禮通解議論詳贍而編類亦有未精者蓋纂述若斯之難也永竊謂是書規模極大條理極宻别立門目以統之更為凡例以定之蓋裒集經傳欲其該偹而無遺釐析篇章欲其有條而不紊尊經之意當以朱子為宗排纂之法當以黄氏喪禮為式竊不自揆為之增損櫽括以成此編其門凡八曰嘉禮十九篇十二卷曰賔禮十篇五卷曰凶禮十七篇十六卷曰吉禮十五篇十四巻皆因儀禮所有者而附益之曰軍禮五篇五巻曰通禮二十八篇二十三卷曰曲禮六篇五卷皆補儀禮之所不備樂一門居後六篇五卷總百有六篇八十有五卷凡三代以前禮樂制度散見經傳雜書者蒐羅略備而篇章次第較通解尤詳宻焉又采漢唐以來諸家序論與朱子所以欲編禮書論列綱領者别為首三卷以提其要深衣為古人法服先儒沿疏有誤别為考誤一巻律學精深有鍾律正篇存古制復為律呂管見二卷皆附書末将俟當世君子論定焉屢易稿成書總九十一巻名曰禮書綱目蓋八門為總綱而八篇則綱中之綱也篇分章叚為目而事之繁碎者又有細目則目中之目也依朱子例當入釋文音疏與後儒論説依黄氏楊氏例當增喪服圖式喪服古今沿革及宮廟器服儒節儀制等圖其書甚鉅非私家所能就姑繕寫本文及舊註弆藏之異日聖朝有制作命儒臣重加纂輯庶成大備完書是書或可為粉本耳夫禮樂精微廣大所以安上治民移風易俗者在是先儒於煨燼亡軼之餘勤勤補綴具有深指膚學何敢與知顧敢以其謭陋之識輙更已成之緒蓋欲卒朱子晚年惓惓之志兼備他時採擇雖僣妄有不辭也世之君子取通解正續三書參之是編攷其本末究其詳略異同之故或亦諒永之心也夫婺源後學江永序
