body:
  text: 禮書綱目采輯羣書目禮類五通禮之屬正經十三部儀禮鄭康成注賈公彦疏周禮鄭康成注賈公彦疏禮記鄭康成注孔頴達疏易程子傳朱子本義書孔安國傳孔頴達疏蔡沈集傳詩毛萇傳鄭康成箋朱子集傳春秋左氏傳杜預注孔頴達疏春秋公羊傳何休注長孫無忌疏春秋穀梁傳范寗注楊士勛疏論語何晏集解邢昺疏朱子集注孝經唐明皇注邢昺疏朱子刋誤孟子趙岐注孫奭疏朱子集注爾雅郭璞注邢昺疏附經四種大戴禮鄭康成注國語韋昭注孔子家語王肅注伏生尚書大傳鄭康成注雜書八種汲冡周書孔晁注呂氏春秋髙誘注賈誼新書劉向説苑劉向新序劉向列女傳劉向世本班固白虎通子書五種管子房𤣥齡注莊子郭象注荀子楊倞注淮南子髙誘注孔叢子兵書五種握機經三略六韜司馬法李靖對史書四種史記司馬貞索隠漢書顔師古注後漢書資治通鑑類書一種杜氏通典字書算書各一種許慎説文解字九章算術宋儒集六種儀禮經傳通解朱子編勉齋黄氏續編朱子文集朱子語類朱子易學啓䝉陳祥道禮書蔡氏律呂新書凡四十八種欽定四庫全書卷禮書綱目目錄卷首上朱子乞修三禮劄子朱子考定漢書藝文志孔頴達禮記正義序略賈公彦儀禮篇次説賈公彦序周禮廢興錄略陳祥道禮書序略楊復序喪祭禮通解張宓刋喪祭二禮卷首中朱子論編禮書卷首下朱子論禮綱領朱子儀禮釋宮卷一士冠禮嘉禮一筮日戒賔筮賔宿賔為期陳器服即位迎賓始加再加三加醴冠者冠者見母字冠者賓出就次冠者見兄弟賛者及姑姊奠摯於君及卿大夫鄉先生醴賓醮殺牲醮孤子冠庶子冠母不在冠義嘉禮二卷二士昏禮嘉禮三納采問名醴賓納吉納徵請期陳器饌親迎婦至婦見醴婦婦饋饗婦饗送者廟見壻見婦之父母記補昏義嘉禮四卷三冠昏禮記嘉禮五通論天子諸侯冠禮冠變禮女子笄嫁娶不娶同姓天子諸侯大夫昏禮庶人昏禮昏變禮不改嫁歸寧出妻卷四鄉飲酒禮嘉禮六篇目謀賓介戒賓介設席陳器速賓迎賓獻賓賓酢主人主人酬賓主人獻介介酢主人主人獻衆賓一人舉觶樂賓立司正司正舉觶旅酬二人舉觶徹爼燕賓出有遵者拜禮息司正鄉飲酒義嘉禮七卷五燕禮嘉禮八戒群臣陳器饌即位命賓及執事者納賓主人獻賓賓酢主人主人獻公主人受公酢主人酬賓媵爵於公公為賓舉旅主人獻孤卿再媵爵公為卿舉旅主人獻大夫樂賔升歌公為大夫舉旅樂賓笙間合立司正徹俎燕主人獻士射賓媵爵於公公為士舉旅主人獻庶子以下無算爵賓出燕義嘉禮九卷六公食大夫禮嘉禮十戒賓賓從陳器饌迎賓即位拜至舉鼎載俎設正饌賓祭正饌設加饌賓祭加饌賓正食侑幣卒食賓出拜賜食上大夫禮不親食公食大夫義嘉禮十一卷七饗食燕記嘉禮十二總言饗食燕服王朝饗食禮陳設廟饗食之饌饗食之饗食之車入即位及法儀侯薦羞獻酬之節饗樂舞徹俎歸俎合諸饗禮王不親食王朝燕禮夫后夫人致飲大諸侯饗食燕賓人致饗食夫相饗食卷八養老嘉禮十三通論歴代養老養老禮尚齒卷九鄉射禮嘉禮十四篇目戒賓設席陳器張侯速賓迎賓獻賓賓酢酬賓獻衆賓一人舉觶獻大夫大夫酢樂賓立司正司正舉觶請射誘射初射獲而未釋獲取矢再請射再射釋獲賓主大夫衆賓射取矢視算飲不勝者獻獲者及釋獲者三請射三射用樂取矢視算飲不勝者三射畢旅酬二人舉觶徹俎燕賓出拜賜息司正卷十大射儀嘉禮十五戒百官張侯設樂陳設器席即位講立賓及執事者納賓主人獻賓賓酢主人主人獻公主人受公酢主人酬賓媵爵於公公為賓舉旅主人獻孤卿再媵爵公為賓若孤卿舉旅主人獻大夫樂賔立司正請射誘射初射獲而未釋獲取矢再請射公及諸公卿大夫射取矢視算飲不勝者獻服不獻釋獲者三請射三射用樂取矢視算飲不勝者三射畢公為大夫舉旅徹俎燕主人獻士及祝史等賓媵爵於公公為士舉旅復射獻庶子左右正内小臣無算爵賓出公入卷十一三射記嘉禮十六總要總論三射侯制以下大射之侯論天子大射天天子天子賓射子以下賓射之法節天子以下燕射之侯天天子以下樂天子以下弓制子以下中及獲旌之制天子射儀諸侯以下射儀武射射義嘉禮十七卷十二投壺嘉禮十八請投就筵設壺中請賓及主人命奏樂投數算飲不勝者三投慶多馬嘉事雜記嘉禮十九鄉飲正篇外凡鄉飲酒禮在此飲酎大飲燕食宗族飫饗食雜事歸脤賀慶卷十三士相見禮賓禮一請見凡主賓相見之儀附見于下復見士見大夫嘗為臣者見大夫相見言視凡賓主飲食之禮本經不具今以他記附于下請退長者請見士相見義賓禮二卷十四聘禮賓禮三篇目圖事命使介具齎幣授使幣釋幣于禰及行受命於朝遂行過他國習儀及竟三展幣致積禮附見于下郊勞至朝致館設飱聘享聘享夫人有言禮賓私覿介私覿公送賓問勞卿大夫勞歸饔餼問卿賓私面于卿介私面于卿賓問嘗使者主國大夫有故夫人歸禮大夫餼介賓食饗燕羞獻大夫饗食賓介還玉賄禮主君就賓館拜賜遂行贈送歸反命禮門及禰遭主國喪聘君薨私喪賓介卒小聘聘義賓禮四卷十五王朝邦國遣使禮賓禮五邦國遣使於王朝王朝遣使於邦國諸侯相見禮賓禮六相朝㑹遇卷十六覲禮賓禮七篇目凡言朝見之期與待賓客之禮皆附于下至郊諸侯出行及逆積問勞之禮皆附于下郊勞賜舍戒日受舍凡王朝戒令皆附于下釋幣於禰覲享請事王禮賓事附于下王勞賜車服饗禮致饔餼等附見于下乃歸還圭附見于下朝事義賓禮八卷十七㑹同禮賔禮九總要戒令戒具起徒役從行儀衛祭告禱祠止舍誥戒㑹同盟約禮賓反行小㑹同廵守賓禮十卷十八喪服凶禮一篇目斬