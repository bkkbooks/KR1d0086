body:
  text: 禮書綱目卷十二婺源江永撰投壺嘉禮十八補經鄭目録云名曰投壺者以其記主人與客燕飲講論才藝之禮此於别録屬吉禮亦實曲禮之正篇宜疏曰投壺與射為類此於五禮屬嘉禮也或云宜屬賓禮投壺之禮主人奉矢司射奉中使人執壺矢所以投者也中士則鹿中也射人奉之者投壺射之類也其奉之西階上北面主人請曰某有枉矢哨壺請以樂賓賓曰子有旨酒嘉肴某既賜矣又重以樂敢辭燕飲酒既脱屨升坐主人乃請投壺也否則或射所謂燕射也枉哨不正貌為謙辭大戴禮投壺篇曰請樂賔無以字又無某既賜矣哨皆作峭主人曰枉矢哨壺不足辭也敢固以請賓曰某既賜矣又重以樂敢固辭固之言如故也言如故辭者重辭也矣大戴無上固字某既賜作某賜旨酒嘉肴主人曰枉矢哨壺不足辭也敢固以請賓曰某固辭不得命敢不敬從不得命不以命見許大戴作賓對曰賓再拜受主人般還曰辟賔再拜受拜受矢也主人既辟進授矢兩楹之間也避大戴辟皆作主人阼階上拜送賓般還曰辟拜送送矢也辟亦於其階上右請投記籌室中五扶堂上七扶庭中九扶籌矢也鋪四指曰扶一指案寸春秋傳曰膚寸而合投壺者或於室或於堂或於庭其禮䙝隨晏早之宜無常處堂大戴云籌八分堂上七扶中五扶庭下九扶壺頸脩七寸腹脩五寸口徑二寸半容斗五升壺中實小豆焉為其矢之躍而出也壺去席二矢半脩長也腹容斗五升三分益一則為二斗得圜囷之象積三百二十四寸也以腹脩五寸約之所得求其圜周二尺七寸有竒是為腹徑九寸有餘也實以小豆取其滑且堅受大戴云壺脰脩七寸口徑二寸半壺高一尺三寸豆五升壺腹修五寸又實作置無焉字之字出作去矢以柘若棘毋去其皮取其堅且重也舊説云矢大七分或言去其皮節大戴毋作無皮下有大七分字已拜受矢進即兩楹間退反位揖賔就筵主人既拜送矢又自受矢進即兩楹間者言將有事於此也退乃揖賓即席欲與偕進明為偶也賓席主人席皆南鄉閒相去如射物右就筵司射進度壺間以二矢半反位設中東面執八算興度壺度其所設之處也壺去坐二矢半則堂上去賔席主人席邪行各七尺也反位西階上位也設中東面既設中亦實八算於中横委其餘於中西執算而立以請賔俟投大戴無間以二矢半五字又無東面及興字右設壺中記算多少視其坐算用當視坐投壺者之衆寡為數也投壺者人四矢亦人四算大戴算上有既算字算長尺二寸其節三扶可也或曰算長尺有握握素也請賓曰順投為入比投不釋勝飲不勝者正爵既行請為勝者立馬一馬從二馬三馬既立請慶多馬請主人亦如之請猶告也順投矢本入也比投不拾也勝飲不勝言以能養不能也正爵所以正禮之爵也或以罰或以慶馬勝算也謂之馬者若云技藝如此任為將帥乘馬也射投壺皆所以習武因為樂大戴請下有於字曰下有奏投壺之令曰字釋下有算字不勝下無者字立馬下無一馬從二馬字慶上無請字右請賓及主人記魯令弟子辭曰毋幠毋敖毋偝立毋踰言偝立踰言有常爵薛令弟子辭曰毋憮毋敖毋偝立毋踰言若是者浮弟子賓黨主黨年穉者也為其立堂下相䙝慢司射戒令之記魯薛者禮衰乖異不知孰是也憮敖慢也偝立不正鄉前也踰言逺談語也常爵常所以罰人之爵也浮亦謂罰也晏子春秋曰酌者奉觴而進曰君令浮晏子時以罰梁丘據浮或作匏或作符踰或作遥若大戴魯命弟子辭曰無荒無慠無倨立無踰言是者有常爵無薛令弟子以下命弦者曰請奏貍首間若一大師曰諾弦鼔瑟者也貍首詩篇名也今逸射義所云詩曰曾孫侯氏是也間若一者投壺當以為志取節焉按大戴禮曾孫侯氏今曰泰射於一張侯參之曰今日泰射四正具舉大夫君子凡以庶士小大莫處御於君所以燕以射則燕則譽質參既設執旌既戴大侯既亢中獲既置弓既平張四侯且良決拾有常既順乃譲乃揖乃譲乃躋其堂乃節其行既志乃張射夫命射射者之聲御車之旌既獲卒莫疑此即貍首詩然其文亦頗有缺誤右命奏樂記鼔半魯鼓半薛鼔此魯薛擊鼔之節也圜者擊鼙方者擊鼔古者舉事鼓各有節聞其節則知其事矣取半以下為投壺禮盡用之為射禮投壺之鼔半射節者投壺射之細也射謂燕射魯鼓半薛鼓半此二者記兩家之異故兼列之左右告矢具請拾投有入者則司射坐而釋一算焉賓黨於右主黨於左拾更也告矢具請更投者司射也司射東面立釋算則坐以南為右北為左也巳投者各反其位右投記司射庭長及冠士立者皆屬賓黨樂人及使者童子皆屬主黨庭長司正也使者主人所使薦羞者樂人國子能為樂者此皆與於投壺在大戴司射上有堂下司正字使者童子之下降揖其阼階及樂事皆與射同節大戴禮侍投則擁矢不敢釋於地也投投壺也投壺坐少儀卒投司射執算曰左右卒投請數二算為純一純以取一算為竒遂以竒算告曰某賢於某若干純竒則曰竒鈞則曰左右鈞卒巳也賓主之黨畢巳投司射又請數其所釋左右算如數射算一純以取實於左手十純則縮而委之毎委異之有餘則横諸純下一算為竒竒則縮諸純下兼斂左算實於左手一純以委十則異之其他如右獲畢則司射執竒算以告於賓與主人也若告云某賢於某者未斥主黨勝與賓黨勝與以勝為賢尚技藝也鈞猶等也等則左右手各執一算以告大戴執下有餘字遂以竒算告作有勝則司射以其算告某下皆有黨字右數算命酌曰請行􅜠酌者曰諾司射又請於賓與主人以行正爵酌者勝黨之弟子大戴無命酌至行􅜠六字别云舉手曰請諸勝者之弟子為不勝者酌當飲者皆跪奉觴曰賜灌勝者跪曰敬養酌者升酌奠於豐上不勝者坐取乃退而跪飲之灌猶飲也言賜灌者服而為尊敬辭也周禮曰以灌賓客賜灌敬養各與其偶於西階上如飲射爵大戴當上有以酌皆請舉酒六字觴作觚右飲不勝者記勝則洗而以請洗爵請行觴不敢直飲之客亦如之客射若投壺不勝主人亦洗而請之不角角謂觥罰爵也於尊長與客如獻酬之爵少儀正爵既行請立馬馬各直其算一馬從二馬以慶慶禮曰三馬既備請慶多馬賓主人皆曰諾飲不勝者畢司射又請為勝者立馬當其所釋算之前三立馬者投壺如射亦三而止也三者一黨不必三勝其一勝者并其馬於再勝者以慶之明一勝不得慶也飲慶爵者偶親酌不使弟子無豐大戴正上有司正曰字請下有為勝者字備作立正爵既行請徹馬投壺禮畢可以去其勝算也既徹馬無算爵乃行大戴此下有周則復始字右三投慶多馬春秋傳有諸侯投壺事附見於下記不擢馬擢去也謂徹也巳徹馬嫌勝故薄之少儀晉侯以齊侯宴中行穆子相穆子荀呉投壺晉侯先穆子曰有酒如淮有肉如坻淮水名坻山名寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵澠水出齊國臨淄縣北入時水陵大阜也寡人中此與君代興代更也亦中之伯瑕謂穆子伯瑕士文伯曰子失辭吾固師諸侯矣壺何為焉其以中儁也言投壺中不足為儁異齊侯弱吾君歸弗來矣欲與晉君代興是弱之公孫傁趨進曰日旰君勤可以出矣以齊侯出傁齊大夫傳言晉之衰氏昭十二年左傳嘉事雜記補鄉大夫三年則大比考其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之注見鄉飲酒大司徒施十有二教二曰以陽禮教譲則民不爭陽禮謂鄉射飲酒之禮也地官小司徒掌建邦之教灋與其飲食之禁令同上黨正國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位壹命齒於鄉里再命齒於父族三命而不齒國索鬼神而祭祀謂嵗十二月大蜡之時建亥之月也正齒位者鄉飲酒義所謂六十者坐五十者立侍六十者三豆七十者四豆八十者五豆九十者六豆是也必正之者為民三時務農將闕於禮至此農隙而教之尊長養老見孝弟之道也黨正飲酒禮亡以此事屬於鄉飲酒之義微失少矣凡射飲酒此鄉民雖為鄉大夫必來觀禮鄉飲酒鄉射記大夫樂作不入士既旅不入是也齒於鄉里者以年與衆賔相次也齒於父族者父族有為賔者以年與之相次異姓雖有老者居於其上不齒者席於尊東所謂遵凡其黨之飲酒教其禮事掌其戒禁其黨之民云同上無又族師春秋祭酺注族長飲酒之禮因祭酺而與其民以長㓜相獻酬焉鄉飲酒之禮六十者坐五十者立侍以聽政役六十者三豆七十者四豆八十者五豆九十者六豆此説鄉飲酒謂黨正國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位之禮也詳見鄉飲酒義孟冬天子乃祈來年於天宗大割祠於公社及門閭臘先祖五祀此周禮所謂蜡祭也勞農以休息之黨正屬民飲酒正齒位是也月令司徒命鄉簡不帥教者以告耆老皆朝於庠元日習射上功習鄉尚齒大司徒帥國之俊士與執事焉將習禮以化之使之觀焉朝猶㑹也此庠謂鄉學也鄉謂飲酒也鄉禮春秋射國蜡而飲酒養老王制鄉師正歳稽其鄉噐州共賔噐鄉共吉凶禮樂之器賔噐者尊俎笙瑟之屬州長主集為之為鄉大夫或時賔賢能於此州也禮樂之噐若州黨賔射之噐者官地酒正以式灋授酒材式法作酒之灋式鄭司農云授酒人以其材凡為公酒者亦如之謂鄉射飲酒以公事作酒者亦以式法及酒材授之使自釀之天官卿大夫士之射也必先行鄉飲酒之禮射義右鄉飲正篇外凡鄉飲酒禮在此子貢觀於蜡孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也蜡也者索也歳十二月合聚萬物而索饗之祭也國索鬼神而祭祀則黨正以禮屬民而飲酒於序以正齒位於是時民無不醉者如狂矣曰未知其樂怪之子曰百日之蜡一日之澤非爾所知也蜡之祭主先嗇也大飲烝勞農以休息之言民皆勤穡有百日之勞喻乆也今一日使之飲酒燕樂是君之恩澤非女所知言其義大張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也張弛以弓弩喻人也弓弩乆張之則絶其力乆弛之則失其體雜記鄉人飲酒杖者出斯出矣杖者老人也六十杖於鄉未出不敢先既出不敢後此記孔子居鄉之事鄉黨孟夏天子飲酎用禮樂酌之言醇也謂重釀之酒也春酒至此始成與羣臣以禮樂飲之於朝正尊卑也孟冬云大飲烝此言用禮樂互其文月令孟冬大飲烝十月農事畢天子諸侯與其羣臣飲酒於大學以正齒位謂之大飲别之於他其禮亡今天子以燕禮郡國以鄉飲酒禮代之烝謂有牲體為俎也黨正職曰國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位亦謂此時也詩云十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觵受福無疆是頌大飲之詩同上右飲酎大飲大宗伯以嘉禮親萬民以飲食之禮親宗族兄弟親者使之相親人君有食宗族飲酒之禮所以親之也文王世子曰族食世降一等大傳曰繫之以姓而弗别綴之以食而弗殊百世而婚姻不通者周道然也春官繫之以姓而弗别綴之以食而弗殊姓正姓也始祖為正姓髙祖為庶姓繫之弗别謂若今宗室屬籍也周禮小史掌定繫世辨昭穆傳大燕以食好時宴不滛一時之間必有宴禮不至於滛湎國語周語燕毛所以序齒也燕毛既祭而燕也燕以髮色為坐祭時尊賢也至燕親親也齒亦年也中庸親戚宴饗則有殽烝殽烝升體解節折之俎謂之折俎也國語周語膳夫王燕飲酒則為獻主注見饗食燕記季冬命樂師大合吹而罷嵗將終與族人大飲作樂於大寢以綴恩也言罷者此用禮樂於族人最盛後年若時乃復然也凡用樂必有禮用禮則有不用樂者王居明堂禮季冬命國為酒以合三族君子説小人樂月令公與族燕則異姓為賔同宗無相賔客之道膳宰為主人君尊不獻酒公與父兄齒親親也族食世降一等親者稠疏者稀文王世子右燕食宗族公與族燕則以齒而孝弟之道逹矣以至尊不自異於親之列其族食世降一等親親之殺也殺差也世文王子因其酒肉聚其宗族以教民睦也言祭有酒肉羣昭羣穆皆至而獻酬之咸有薦俎坊記宗室有事族人皆侍終日大宗巳侍於賔奠然後燕私謂卿大夫以下宗室大宗子之家也禮志云别子為祖繼别為大宗繼禰為小宗賔僚友助祭也燕私者何也祭已而與族人飲不醉而出是不親也醉而不出是渫宗也出猶去也出而不止是不忠也忠厚親而甚敬忠而不倦若是則兄弟之道備備者成也成者成於宗室也故曰飲而醉者宗室之意也徳将無醉族人之志也是故祀禮有讓徳族有復義之至也復反也尚書大傳敦彼行葦牛羊勿踐履方苞方體維葉泥泥戚戚兄弟莫逺具爾或肆之筵或授之几興也敦聚貌萌之時也行道也勿戒止之辭也苞甲而未拆也體成形也泥泥柔澤貌戚戚親也莫猶無也具俱也爾與邇同肆陳也而疑此祭畢而燕父兄耆老之詩故言敦彼行葦牛羊勿踐履則方苞方體而葉泥泥矣戚戚兄弟而莫逺具爾則或肆之筵而或授之几矣此方言其開燕設席之初而慇懃篤厚之意藹然已見於言語之外矣讀者詳之肆筵設席授几有緝御或獻或酢洗爵奠斝醓醢以薦或燔或炙嘉殽脾臄或歌或咢賦也設席重席也緝續御侍也有相續代而侍者言不乏使也進酒於客曰獻客答之曰酢主人又洗爵醻客客受而奠之不舉也斝爵也夏曰醆殷曰斝周曰爵醓醢之多汁者也燔用肉炙用肝臄口上肉也歌者比於琴瑟也徒擊鼓曰咢言侍御獻醻飲食歌樂之盛也敦弓既堅四鍭既鈞舎矢既均序賔以賢敦弓既句既挾四鍭四鍭如樹序賔以不侮賦也敦雕通畫也天子雕弓堅猶勁也鍭金鍭翦羽矢也鈞參亭也謂參分之一在前二在後三訂之而平者前有鐵重也舎釋也謂發矢也均皆中也賢射多中也投壺曰某賢於某若干純竒則曰竒均則曰左右均是也句彀通謂引滿也射禮搢三挾一既挾四鍭則徧釋矣如樹如手就樹之言貫革而堅正也不侮敬也令弟子辭所謂無幠無敖無偝立無踰言者也或曰不以中病不中者也射以中多為雋以不侮為徳為言既燕而射以樂也曾孫維主酒醴維醹酌以大斗以祈黄耉黄耉台背以引以翼夀考維祺以介景福賦也曾孫主祭者之稱今祭畢而燕故因而稱之也醹厚也大斗柄長三尺祈求也黄耉老人之稱以祈黄耉猶曰以介眉夀云耳古器物欵識云用蘄萬夀用蘄眉夀永命多福用蘄眉夀萬年無疆皆此類也台鮐也大老則背有鮐文引導翼輔祺吉也此頌禱之辭欲其飲此酒而得老夀又相引𨗳翼輔以享夀祺介景福也大雅行葦鼓鐘送尸神保聿歸諸宰君婦廢徹不遲諸父兄弟備言燕私祭畢既歸賔客之俎同姓則留與之燕以盡私恩所以尊賔客親骨肉也樂具入奏以綏後禄爾殽既將莫怨具慶既醉既飽小大稽首神嗜飲食使君夀考孔惠孔時維其盡之子子孫孫勿替引之凡廟之制前廟以奉神後寝以藏衣冠祭於廟而燕於寝故於此將燕而祭時之樂皆入奏於寝也且於祭既受禄矣故以燕為將受後禄而綏之也爾殽既進與燕之人無有怨者而皆歡慶醉飽稽首而言曰向者之祭神既嗜君之飲食矣是以使君夀考也又言君之祭祀甚順甚時無所不盡子子孫孫當不廢而引長之也小雅楚茨小雅常棣此樂兄弟之樂歌伐木此燕朋友故舊之樂歌頍弁此燕兄弟親戚之詩王公立飫則有房烝王天子公諸侯也禮之立成者為飫房大俎也詩云籩豆大房謂半解其體升之房也飫以顯物示物備也歳飫不倦嵗行飫禮不至於解倦國語周語右飫定王曰夫王公諸侯之有飫也將以講事成章講講軍旅議大事也章章程也建大徳昭大物也大徳大功大物戎噐也故立成禮烝而已立成不坐也升其備物而已國語周語衛彪徯曰周詩有之曰天之所支不可壊也周詩飫時所歌支拄也其所壊亦不可支也昔武王克殷而作此詩也以為飫歌名之曰支以遺後之人使永監焉監觀也夫禮之立成者為飫立成立行禮不坐也昭明大節而已少曲與焉節體也曲章曲也與類也言飫禮所以教民敬戒昭明大體而已故其詩樂少章曲威儀少比類也是以為之日惕其欲教民戒也惕懼也是以日自恐懼欲民知戒慎也然則夫支之所道者必盡知天地之為也知天地之為謂所支壊也不然不足以遺後之人同上公父文伯之母季康子之從祖叔母也祭悼子康子與焉繹不盡飫則退繹又祭也立曰飫坐曰宴繹畢而飲不盡飫禮而退恐有醉飽之失所以逺嫌也魯語春饗孤子秋食耆老疏曰皇氏云春是生養之時故饗孤子取長養之義秋是成熟之時故食耆老取老成之義熊氏云春饗孤子亦饗耆老秋食耆老亦食孤子郊特牲酒正凡饗士庶子饗耆老孤子皆共其酒無酌數要以醉為度天官外饔邦饗耆老孤子則掌其割亨之事饗士庶子亦如之孤子者死王事者之子也士庶子衛王宫者若今時之饗衛士矣王制曰周人養國老於東膠養庶老於虞庠上同槀人若饗耆老孤子士庶子共其食士庶子卿大夫士之子弟宿衛王宫者地官惟饗野人皆酒飲賤者不備禮玉藻右饗食雜事大宗伯以嘉禮親萬民以脤膰之禮親兄弟之國脤膰社稷宗廟之肉以賜同姓之國同福禄也兄弟有共先王者魯定公十四年天王使石尚来歸脤春官大行人歸脤以交諸侯之福交或徃或来者也秋官右歸脤詳見吉禮祭通禮致福章此存其畧大宗伯以嘉禮親萬民以賀慶之禮親異姓之國異姓王昬姻甥舅春官大行人賀慶以贊諸侯之喜贊助也秋官小行人若國有福事則令慶賀之同上士於大夫不承賀下大夫於上大夫承賀承受也士有慶事不聴大夫親来賀已不敢變動尊也玉藻有慶非君賜不賀唯君賜為榮也同上賀取妻者曰某子使某聞子有客使某羞謂不在賔客之中使人徃者羞進也言進於客古者謂侯為進其禮葢壺酒束修若犬也不斥主人昏禮不賀曲禮右賀慶禮書綱目卷十二
