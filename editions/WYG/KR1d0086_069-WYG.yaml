body:
  text: 禮書綱目卷六十七婺源江永撰學記通禮十六補發慮憲求善良足以謏聞不足以動衆憲法也言發計慮當擬度於法式也謏之言小也材朱子曰動衆謂聳動衆聽蓋守常法用中其效不足以致大譽就賢體逺足以動衆未足以化民就謂躬下之體猶親也親朱子曰逺謂踈逺之士下賢逺足以聳動衆聽使知貴徳而尊士然未有聞導誘掖之方也故未足以化民君子如欲化民成俗其必由學乎所學者聖人之道在方册成朱子曰此言唯教學可以化民使美俗玉不琢不成器人不學不知道是故古之王者建國君民教學為先謂内則設師保以教使國子學焉外則有大學庠序之官兑命曰念終始典于學其此之謂乎典經也言學之不舍業也兑當為説字之誤也雖有嘉肴弗食不知其㫖也雖有至道弗學不知其善也㫖美也是故學然後知不足教然後知困學則覩己行之所短教則見己道之所未逹知不足然後能自反也知困然後能自强也故曰教學相長也自反求諸己也自强修業不敢倦知張子曰困者益之基也學之病正在於不困矣自以為知而問之不能答用之不能行者多矣兌命曰學學半其此之謂乎言學人乃益己之學半古之教者家有塾黨有庠術有序國有學術當為遂聲之誤也古者仕焉而己者歸教於閭里朝夕坐於門門側之堂謂之塾周禮五百家為黨萬二千五百家為遂黨屬於鄉遂在逺郊之外比年入學學者每歲來入也中年考校中猶間也鄉遂大夫間歲則考學者之徳行道藝周禮三歲大比乃考焉一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通逹强立而不反謂之大成離經斷句絶也辨志謂别其心意所趣向也知類知事義之比也强立臨事不惑也不反不違失師道張子曰離經離析經之章句也事師而至於親敬則學之篤而信其道也論學取友能講論其學而取友必端也知類通逹比物醜類是也九年者言其大畧人性有遲敏氣有昏明豈可齊也强立而不反可與立也學至於立則自能不息以至於聖人而教者可以無恨矣趨朱子曰按鄭注張説皆是也辨志者能分别其心所向如為善為利為君子為小人也敬業者專心致志以事其業也樂羣者樂於取益以輔其仁也博習者積累精專次第該徧也親師者道同徳合愛敬兼盡也論學者知言而能論學之是非取友者知人而能識人之賢否也知類通逹聞一知十而觸類貫通也强立不反知止有定而物不能移也蓋考較之法逐節之中先觀其學業之淺深徐察其志行之虛實讀者宜深味之乃見進學之驗夫然後足以化民易俗近者説服而逺者懐之此大學之道也懐來也安也記曰蛾子時術之其此之謂乎蛾蚍蜉也蚍蜉之子㣲蟲耳時術蚍蜉之所為其功乃復成大垤大學始教皮弁祭菜示敬道也皮弁天子之朝朝服也祭菜禮先聖先師菜謂芹藻之屬宵雅肄三官其始也宵之言小也肄習也習小雅之三謂鹿鳴四牡皇皇者華也此皆君臣宴樂相勞苦之詩為始學者習之所以勸之以官且取上下相和厚入學鼓篋孫其業也鼔篋擊鼔警衆乃發篋出所治經業也孫猶恭順也夏楚二物收其威也夏槄也楚荆也二者所以扑撻犯禮者收謂收歛整齊之威威儀也未卜禘不視學游其志也禘大祭也天子諸侯既祭乃視學考校以游暇學者之志意時觀而弗語存其心也使之悱悱憤憤然後啟發也語朱子曰觀示也謂示以所學之端緒告也㓜者聽而弗問學不躐等也學教也教之長穉此七者教之大倫也倫理也自大學始教至此其義七也記曰凡學官先事士先志其此之謂乎官居官者也士學士也大學之教也時教必有正業退息必有居有居有常居也學朱子曰上句鄭注孔疏讀時字居字句絶而學字自為一句恐非文意當以也字學字為句絶時教如春夏禮樂秋冬詩書之類居學謂居其所學如易之言居業蓋常時所習如下文操縵博依興藝藏修息遊之類所以學者能安其學而信其道不學操縵不能安弦操縵雜弄不學博依不能安詩博依廣譬喻也依或為衣張子曰依聲之依永者也不學雜服不能安禮雜服冕服皮弁之屬雜或為雅碎張子曰服事也雜服洒掃應對投壺沃盥細之事又曰道本至樂古之教人先使有以樂之者如操縵博依雜服如此己心樂樂則道義生今無此以致樂專義理自得以為樂然學者太苦思不從容苐恐進鋭退速苦其難而不知其益莫能安樂也不興其藝不能樂學興之言喜也歆也藝謂禮樂射御書數以張子曰禮樂之文如琴瑟笙磬古人皆能之中制節射御亦必合於禮樂之文如不失其馳舍矢如破騶虞和鸞動必相應也書數其用雖小但施於簡䇿然莫不出於學故人有倦時又用此以㳺其志所以使之樂學也故君子之於學也藏焉修焉息焉遊焉藏謂懐抱之修習也息謂作勞休止於之息游謂閒暇無事於之遊夫然故安其學而親其師樂其友而信其道是以雖離師輔而不反也兌命曰敬孫務時敏厥修乃來其此之謂乎敬孫敬道孫業也敏疾也厥其也學者務及時而疾其所修之業乃來張子曰孫其志於仁則得仁孫其志於義則得義惟其敏而已今之教者呻其佔畢多其訊呻吟也佔視也簡謂之畢訊猶問也言今之師自不曉經之義但吟誦其所法簡之文多其難問也呻或為慕訊或為訾言及於數其發言出説不首其義動云有所法象而已之朱子曰數謂刑名度數言及於數欲以是窮學者未知非求其本也注疏法象之説恐非若小學之教蓋將使之馴習乎埽灑應對之節與今之教言及於數者其意不同進而不顧其安務其所誦多不惟其未曉使人不由其誠由用也使學者誦之而為之説不用其誠教人不盡其材材道也謂師有所隱也易曰兼三材而兩之謂天地人之道此張子曰人未安之又進之未喻之又告之徒使人生節目不盡其材不顧安不由誠皆是施之妄也教人至難必盡人之材乃不誤人觀可及處然後告之聖人之明直若庖丁之解牛皆知其隙刄投餘地無全牛矣故使人必由其誠教人必盡其材人之材足以有為但以其不由於誠則不盡其材若曰勉率而為之則豈有由其誠者哉其施之也悖其求之也佛教者言非則學者失問夫然故隠其學而疾其師苦其難而不知其益也隠不稱揚也不知其益若無益然如朱子曰隠其學謂以其學為幽隱而難知曰二三子以我為隠之意雖終其業其去之必速速疾也學不心解則忘之易教之不刑其此之由乎刑猶成也大學之法禁於未發之謂豫未發情慾未生謂年十五時朱子曰此但謂預為之防其事不一不必皆謂十五時也當其可之謂時可謂年二十成人時朱子曰此當其可謂適當其可告之時事亦不一不當以年為斷不陵節而施之謂孫不陵節謂不教長者才者以小教㓜者鈍者以大也施猶教也孫順也相觀而善之謂摩不並問則教者思專也摩相切磋也物朱子曰此但謂觀人之能而於己有益如以兩相摩而各得其助也此四者教之所由興也興起也發然後禁則扞格而不勝教不能勝其情慾格讀如凍􅏖之􅏖扞堅不可入之貌時過然後學則勤苦而難成時過則思放也雜施而不孫則壊亂而不修小者不逹大者難識學者所惑也獨學無友則孤陋而寡聞不相觀也燕朋逆其師燕猶䙝也褻其朋友朱子曰大戴保傅篇作左右之習反其師朋此燕朋是私褻之友所謂損者三友之類注説非也燕辟廢其學䙝師之譬喻䙝朱子曰以上文推之注亦非是燕辟但謂私之談無益于學而反有所害也此六者教之所由廢也廢弛君子既知教之所由興又知教之所由廢然後可以為人師也故君子之教喻也道而弗牽强而弗抑開而弗逹道示之以道塗也抑猶推也開為發頭角道而弗牽則和强而弗抑則易開而弗逹則思和易以思可謂善喻矣思而得之則深學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也失於多謂才少者失於寡謂才多者失於易謂好問不識者失於止謂好思不問者張子曰為人則多好問則寡不察則易苦難則止知其心然後能救其失也救其失者多與易則抑之寡與止則進之教也者長善而救其失也善歌者使人繼其聲善教者使人繼其志言為之善者則後人樂放傚朱子曰注説非是繼聲繼志皆謂㣲發其端而不究其説使人有所玩索而自得之也其言也約而逹㣲而臧罕譬而喻可謂繼志矣師説之明則弟子好述之其言少而解臧善也朱子曰三者皆不務多言而使人自得之意君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君美惡説之是非也長逹官之長其張子曰知學者至於學之難易又知資質才性之羙惡也故師也者所以學為君也弟子學於師學為君朱子曰詳上文此但謂能為師以教人則能為君以治人耳是故擇師不可不慎也師善則善朱子曰此言能為師者其人難得故不可不擇也記曰三王四代唯其師此之謂乎四代虞夏商周凡學之道嚴師為難嚴尊敬也師嚴然後道尊道尊然後民知敬學是故君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也尸主也為祭主也大學之禮雖詔於天子無北面所以尊師也尊師重道焉不使處臣位也武王踐阼召師尚父而問焉曰昔黄帝顓頊之道存乎意亦忽不可得見與師尚父曰在丹書王欲聞之則齊矣王齊三日端冕師尚父亦端冕奉書而入負屏而立王下堂南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之從隨也庸功也功之受其道有功於己善問者如攻堅木先其易者後其節目及其久也相説以解不善問者反此言先易後難以漸入善待問者如撞鐘叩之以小者則小鳴叩之以大者則大鳴待其從容然後盡其聲不善答問者反此從讀如富父舂戈之舂舂容謂重撞擊也始者一聲而已學者既開其端意進而復問乃極説之如撞鐘之成聲矣從或為松朱子曰注説非是從容正謂聲之餘韻從容而將盡者也言必答盡所問之意然後止也此皆進學之道也此皆善問善答也記問之學不足以為人師記問謂豫誦雜難雜説至講時為學者論之此或時師不心解或學者所未能問必也其聽語乎必待其問乃説之力不能問然後語之語之而不知雖舍之可也舍之須後良冶之子必學為裘仍見其家錮補穿鑿之器也補器者其金柔乃合有似於為裘良弓之子必學為箕仍見其家撓角幹也撓角幹者其材宜調調乃三體相勝有似於為楊栁之箕始駕馬者反之車在馬前以言仍見則貫即事易也君子察於此三者可以有志於學矣仍讀先王之道則為來事不惑古之學者比物醜類以事相况而為之醜猶比也醜或為訃仍朱子曰詳文意此句合屬上章有闕文鼓無當於五聲五聲弗得不和水無當於五色五色弗得不章學無當於五官五官弗得不治師無當於五服五服弗得不親當猶主也五服斬衰至緦麻之親君子曰大徳不官謂君也言朱子曰注説非是但大徳者不但能專一官之事若荀子所謂精於道者兼物物也大道不器謂聖人之道不如器施於一物大信不約謂若胥命於蒲無盟約不朱子曰注説亦非此謂如天地四時言而信者也大時不齊或時以生或時以死察於此四者可以有志於本矣本立而道生言以學為本則其徳於民無不化於俗無不成三王之祭川也皆先河而後海或源也或委也此之謂務本源泉所出也委流所聚也始出一勺卒成不測朱子曰疏云源則河也委則海也申明先河後海之義也今詳此言所以先河後海者以其或是源故先之或是委故後之疏有二説此説是也並學記孟子曰人之有道也飽食煖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長㓜有序朋友有信人之有道言其皆有秉彛之性也然無教則亦放逸怠惰而失之故聖人設官而教以人倫亦因其固有者而道之耳書曰天叙有典勑我五典五惇哉此之謂也又曰設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也人倫明於上小民親於下庠以養老為義校以教民為義序以習射為義皆鄉學也學國學也共之無異名也倫序也父子有親君臣有義夫婦有别長㓜有序朋友有信此人之大倫也庠序學校皆以明此而已又曰謹庠序之教申之以孝悌之義頒白者不負戴於道路矣庠序皆學名也申重也丁寜反覆之意善事父母為孝善事兄長為悌頒與班同老人頭半白黒者也負任在背戴任在首夫民衣食不足則不暇治禮義而飽煖無教則又近於禽獸故既富而教以孝悌則人知愛親敬長而代其勞不使之負戴於道路矣孔子曰興於詩興起也詩本性情有邪有正其為言既易知而吟詠之間抑揚反覆其感人又易入故學者之初所以興起其好善惡惡之心而不能自己者必於此而得之立於禮禮以恭敬辭遜為本而有節文度數之詳可以固人肌膚之㑹筋骸之束故學者之中所以能卓然自立而不為事物之所摇奪者必於此而得之成於樂樂有五聲十二律更唱迭和以為歌舞八音之節可以養人之性情而蕩滌其邪穢消融其查滓故學者之終所以至於義精仁熟而自和順於道徳者必於此而得之是學之成也則按内則十歲學㓜儀十三學樂誦詩二十而後學禮此三者非小學傳授之次乃大學終身所得之難易先後淺深也程子曰天下之英才不為少矣特以道學不明故不得有所成就夫古人之詩如今之歌曲雖閭里童稚皆習聞之而知其説故能興起今雖老師宿儒尚不能曉其義况學者乎是不得興于詩也古人自洒埽應對以至冠昏喪祭莫不有禮今皆廢壊是以人倫不明治家無法是不得立於禮也古人之樂聲音所以養其耳采色所以養其目歌詠所以養其性情舞蹈所以養其血脈今皆無之是不得成於樂也是以古之成材也易今之成材也難子思曰夫子之教必始於詩書而終於禮樂雜説不與焉孔叢子葬曹平公往者見周原伯魯焉原伯魯周大夫與之語不説學歸以語閔子馬閔子馬曰周其亂乎夫必多有是説而後及其大人國亂俗壊言者適多漸以及大人大人在位者大人患失而惑又曰可以無學無學不害患有學而失道者以惑其意不害而不學則苟而可以為無害遂不學則皆懐苟且於是乎下陵上朁能無亂乎夫學殖也不學將落原氏其亡乎殖生長也言學之進徳如農之殖苗日新日益昭十八年左氏傳大學通禮十七補自有朱子章句今止存其篇目中庸通禮十八補自有朱子章句今亦但存其篇目禮書綱目卷六十七
