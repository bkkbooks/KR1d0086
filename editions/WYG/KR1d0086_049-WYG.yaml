body:
  text: 禮書綱目卷四十七婺源江永撰祭義夫禮必本于天殽于地列于鬼神聖人則天之明因地之利取法度于鬼神以制禮下教令也既又祀之教民嚴上也鬼者精魂所歸神者引物而出謂祖廟山川五祀之屬也達于喪祭民知嚴上則此禮達于下也禮運夫政必本于天殽以降下降下也殽天之氣以下教令天有運移之期隂陽之節也命降于社之謂殽地謂教令由社下者也社土地之主也周禮土㑹之法有五地之物生降于祖廟之謂仁義謂教令由祖下者大傳曰自禰率而上至于祖逺者輕仁也自祖率而下至于禰髙者重義也降于山川之謂興作謂教令由山川下者也山川有草木禽獸可作器物共國事降于五祀之謂制度謂教令由五祀下者五祀有霤門户灶行之神此始為宫室制度同上先王患禮之不達于下也患下不信也故祭帝于郊所以定天位也祀社于國所以列地利也祖廟所以本仁也山川所以儐鬼神也五祀所以本事也此所以達禮于下也教民尊神也故禮行于郊而百神受職焉禮行于社而百貨可極焉禮行于祖廟而孝慈服焉禮行于五祀而正法則焉言信得其禮則神物與天皆應之百神列宿也百物金玉之屬故自郊社祖廟山川五祀義之脩而禮之藏也脩猶飾也藏若其城郭然同上天地之祭宗廟之事倫也倫之言順也社稷山川之事鬼神之祭體也天地人之别體也禮器祀帝于郊敬之至也言就而祭之不敢致也宗廟之祭仁之至也仁恩也父子主恩也同上子曰郊社之義所以仁鬼神也嘗禘之禮所以仁昭穆也仁猶存也凡存此者所以善全之道也郊社嘗禘存死之善者也郊有后稷社有句龍明乎郊社之義嘗禘之禮治國其如指諸掌而已乎治國指諸掌言易知也郊社嘗禘尊卑之事有治國之象焉仲尼燕居昔先王之制禮也因其財物而致其義焉爾故作大事必順天時大事祭祀也春秋傳曰啟蟄而郊龍見而雩始殺而嘗閉蟄而烝為朝夕必放于日月日出東方月生西方為高必因丘陵謂冬至祭天于圓丘之上為下必因川澤謂夏至祭地于方澤之中是故天時雨澤君子達亹亹焉逹猶皆也亹亹勉勉也君子愛物見天雨澤皆勉勉勸樂是故昔先王尚有德尊有道任有能舉賢而置之聚衆而誓之古者将有大事必選賢誓衆重事也是故因天事天天髙因髙者以事也因地事地地下因下者以事也因名山升中于天名猶大也升上也中猶成也謂廵守至于方嶽燔柴祭天告以諸侯之成功也孝經説曰封乎泰山考績燔燎禅乎梁甫刻石紀號也因吉土以享帝于郊吉土王者所卜而居之土也饗帝于郊以四時所兆祭于四郊者也今漢亦四時迎氣其禮則簡升中于天而鳯凰降龜龍假功成而太平隂陽氣和而致象物饗帝于郊而風雨節寒暑時五帝主五行五行之氣和而庶徵得其序也五行木為雨金為暘火為燠水為寒土為風是故聖人南面而立而天下大治南面立者視朝禮器郊之祭也迎長日之至也易説曰三王之郊一用夏正夏正建寅之月也此言迎長日者建邜而晝夜分而日長也日家語王肅註曰周人始以至之月冬日至而日長大報天而主日也大猶徧也天之神日為尊兆于南郊就陽位也日太陽之精也陽家語云兆丘于南所以就位也于郊故謂之郊焉王曰兆丘于南謂之圜丘兆之于南郊也然則郊之名有三焉築為圜丘以象天自然故謂之圜丘圜丘人之所造故謂之泰壇于南郊在南説學者謂南郊與圜丘異若是則詩易尚書謂之圜丘也又不通泰壇之名或乃謂周官圜丘虚妄之言皆不通典制也掃地而祭於其質也王曰地圜丘之地掃焉而祭貴其質也器用陶匏以象天地之性也觀天下之物無可以稱其德取王曰人之作物無可稱之故天地之性以自然也于郊故謂之郊牲用騂尚赤也用犢貴誠也尚赤者周也之王曰犢質慤貴誠美也郊之用辛也周之始郊日以至言日以周郊天之月而至陽氣新用事順之而用辛日此説非也郊天之月而日至魯禮也三王之郊一用夏正魯以無冬至祭天于圜丘之事是以建子之月郊天示先有事也用辛日者凡為人君當齊戒自新耳周衰禮廢儒者見周禮盡在魯因推魯禮以言周事家語云周之始郊其月以日至其日用上辛至于啟蟄之月則又祈穀于上帝此二者天子之禮也魯無冬至大郊之事䧏殺于天子是以不同也王曰祈求也為農求穀于上帝月令孟春之月乃以元日祈穀于上帝魯無仲冬大郊之事至于祈農與天子同故春秋傳曰夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕而學者不知推經禮之指歸皮膚妄説乃至顛倒神祗變易時日遷改兆位良可痛心者也卜郊受命于祖廟作龜于禰宮尊祖親考之義也受命謂告之退而卜之王曰禰宮父廟也受祭天命于祖而作龜于父廟卜之日王立于澤親聽誓命受教諫之義也澤澤宮也所以擇賢之宮也既卜必到擇宮擇可與祭祀者因誓勅之以禮也禮器曰舉賢而置之聚衆而誓之是也親王曰誓命祭天所以威儀也王受之故曰受教諫之義獻命庫門之内戒百官也大廟之命戒百姓也王自澤宮而還以誓命重相申勑也庫門在雉門之外入庫門則至廟門外矣大廟者祖廟也百官公卿以下也百姓王之親也入廟戒親親也王自此還齊路寝之室庫或為廐祭之日王皮弁以聽祭報示民嚴上也報猶白也夙興朝服以待白祭事者乃後服祭服而行事也周禮祭之日小宗伯逆齍省鑊告時于王告備于王也喪者不哭不敢凶服氾埽反道鄉為田燭謂郊道之民為之也反道剗令新土在上也田燭田首為燭也弗命而民聽上化王嚴上祭之日王被衮以象天謂有日月星晨之章此魯禮也周禮王祀昊天上帝則服大裘而冕祀五帝亦如之魯侯之服自衮冕而下也王家語云天子大裘以黼之被裘象天又云既至泰壇脱裘矣服衮以臨燔柴王曰大裘為黼文也言被之大裘其有象天之文故被之道路至大壇而脱之戴冕璪十有二旒則天数也天之大數不過十二乗素車貴其質也旂十有二旒龍章而設日月以象天也設日月畫于旂上素車殷路也魯公之郊用殷禮也天垂象聖人則之郊所以明天道也明謂則之以示人也帝牛不吉以為稷牛飬牲必有二也帝牛必在滌三月稷牛唯具所以别事天神與人鬼也滌牢中所搜除處也唯具遭時又選可用也萬物本乎天人本乎祖此所以配上帝也言俱本可以配郊之祭也大報本反始也郊特牲有以下為貴者至敬不壇埽地而祭有以素為貴者至敬無文大路素而越席犧尊疏布鼏椫杓明堂位曰大路殷路也鼏或作幕椫木白理也禮器禮不盛服不充禮盛者服充大事不崇曲敬故大裘不裼乗路車不式謂祭天也周禮王祀昊天上帝則服大裘而冕乗玉路或曰乗兵車不式玉藻郊之祭也喪者不敢哭凶服者不敢入國門敬之至也祭者吉禮不欲聞見凶人祭義子曰孝莫大于嚴父萬物資始于乾人倫資父為天故孝行之大莫過于尊嚴其父也嚴父莫大於配天則周公其人也謂父為天雖無貴賤然以父配天之禮始自周公故曰其人也昔者周公郊祀后稷以配天后稷周之始祖也郊謂圜丘祀天也周公攝政因行郊天之祭乃尊始祖以配之也宗祀文王於明堂以配上帝明堂天子布政之堂也周公因祀五方上帝于明堂乃尊文王以配之也是以四海之内各以其職來祭君行嚴配之禮則徳教刑于四海海内諸侯各脩其職來助祭也孝經郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自内出者無匹不行自外至者無主不止公羊傳詳見天神篇祀乎明堂所以教諸侯之孝也祀乎明堂宗祀文王祭義古者先王既有天下又崇立于上帝明神而敬事之崇尊也立立其祀也上帝天也明神日月也于是乎有朝日夕月以教民事君禮天子以春分朝日以秋分夕月拜日于東門之外然則夕月在西門之外必矣國語周語古者帝王躬率有司百執事而以正月朝迎日于東郊所以為萬物先而尊事天也祀上帝于南郊所以報天德堯典曰寅賔出日此之謂也尚書大傳三代之禮天子春朝朝日秋暮夕月所以明有别也祭日東壇祭月西壇故以别内外以端其位大戴禮祭日于壇祭月于坎以别幽明以制上下幽明者謂日照晝月照夜祭日于東祭月于西以别外内以端其位端正日出于東月生于西隂陽長短終始相巡以致天下之和巡讀如沿漢之沿謂更相从道祭義雖為天子必有尊也貴為諸侯必有長也故天子朝日諸侯朝朔穀梁傳詳見天神篇天子冕而執鎮圭率諸侯而朝日東郊所以教尊尊也大戴禮社祭土而主隂氣也君南鄉于北墉下答隂之義也墻謂之墉北墉社内北墻日用甲日之始也國中之神莫貴于社天子大社必受霜露風雨以達天地之氣也大社王為群姓所立是故喪國之社屋之不受天陽也薄社北墉使隂明也絶其陽通其隂而已薄社殷之社殷始都薄社所以神地之道也地載萬物天垂象取財于地取法于天是以尊天而親地也故教民美報焉家主中霤而國主社宗本也中霤亦土神也唯為社事單出里唯為社田國人畢作唯社丘乗共粢盛所以報本反始也單出里皆徃祭社于都鄙二十五家為里畢作人則盡行非徒羡也丘十六井也四丘六十四井曰甸故謂之乗乗者以于車賦出長轂一乗乗或為鄰季春出火為焚也謂焚莱也凡出火以火出建辰之月火始出然後簡其車賦而厯其卒伍而君親誓社以習軍旅左之右之坐之起之以觀其習變也簡厯謂算具陳列之也君親誓社誓吏士以習軍旅既而遂田以祭社也言祭社則此是仲春之禮也仲春以火田田止弊火然後獻禽至季春出火而民乃用火今云季春出火乃誓社記者誤也社或為省而流示之禽而塩諸利以觀其不犯命也流猶行也行行田也塩讀為豓行田示之以禽使歆豓之觀其用命否也謂禽為利者凡田大獸公之小禽私也求服其志不貪其得失伍而獲猶為犯命故以戰則克以祭則受福郊特牲王者所以有社稷何為天下求福報功人非土不立非穀不食土地廣博不可徧敬也五穀衆多不可一一而祭也故封土立社示有土尊稷五穀之長故封稷而祭之也王者諸侯俱兩社何俱有土之君太社為天下報功王社為京師報功大夫有民其有社稷者亦為報功也社稷在中門之外外門之内何尊而親之與先祖同也不置中門内何敬之示不䙝瀆也社稷所以有樹何尊而識之使民人望見師敬之又所以表功也尚書亡篇曰太社唯松東社唯柏南社唯梓西社唯栗北社唯槐王者自親祭社稷何社者土地之神也土生萬物天下之所主也尊重之故自祭也其壇大何如春秋文義曰天子之社稷廣五丈諸侯半之其色如何春秋傳曰天子有太社焉東方青色南方赤色西方白色北方黑色上冐以黄土故将封東方諸侯青土苴以白茅謹敬潔清也王者諸侯必有誡社何示有存亡也明為善者得之惡者失之禮曰亡國之社稷必以為宗廟之屏示賦之也白虎通五祀者何謂也謂門户井灶中霤也所以祭何人之所處出入所飲食故為神而祭之祭五祀所以歲一徧何順五行也故春祭户户者人所出入春亦萬物始觸户而出也夏祭灶者火之生人所以自養也夏亦火王長養萬物秋祭門門以閉藏自固也秋亦萬物成熟内備自守也冬祭井井者水之生藏在地中冬亦水王萬物伏藏六月祭中霤中霤者象土在中央也六月亦土王也天子諸侯以牛卿大夫以羊因四時牲也一説户以羊灶以雉中霤以豚門以犬井以豕或曰中霤用牛其餘不得用豚井以魚同上王孫賈問曰與其媚于奥寜媚于竈何謂也王孫賈衞大夫媚親順也室西祭南隅為奥灶者五祀之一夏所也凡祭五祀皆先設主而祭于其所然後迎尸而祭于奥略如祭宗廟之儀如祀灶則設主于灶陘祭畢而更設饌于奥以迎尸也故時俗之語因以奥有常尊而非祭之主灶雖卑賤而當時用事喻自結于君不如阿附權臣也賈衞之權臣故以此諷孔子子曰不然獲罪于天無所禱也天即理也其尊無對非奥灶之可比也逆理則獲罪于天矣豈媚于奥灶所能禱而免乎言但當順理非特不當媚灶亦不可媚于奥也為謝氏曰聖人之言遜而不迫使王孫賈而知此意不無益使其不知亦非所以取禍論語五嶽者何謂也泰山東嶽也霍山南嶽也華山西嶽也常山北嶽也嵩髙山中嶽也五嶽何以視三公能大布雲雨也能大歛雲雨也雲觸石而出膚寸而合不崇朝而雨天下施德博大故視三公也四瀆者何謂也江河淮濟也四瀆何以視諸侯能蕩滌垢濁焉能遹百川于海焉能出雲雨千里焉為施甚大故視諸侯也山川何以視子男也能出物焉能潤澤物焉能生雲雨為恩多然品類以百數故視子男也説苑天子大蜡八所祭有八神也伊耆氏始為蜡伊耆氏古天子號也蜡也者索也謂求索也歲十二月合聚萬物而索饗之也歲十二月周之正數謂建亥之月也享者祭其神也萬物有功加于民者神使為之也祭之以報焉造者配之也蜡之祭也主先嗇而祭司嗇也先嗇若神農者司嗇后稷是也祭百種以報嗇也嗇所樹藝之功使盡饗之饗農及郵表畷禽獸仁之至義之盡也農田畯也郵表畷謂田畯所以督約百姓于井間之處也詩云為下國畷郵禽獸服不氏所教擾猛獸也古之君子使之必報之迎貓為其食田䑕也迎虎為其食田豕也迎而祭之也迎其神也祭坊與水庸事也水庸溝也曰土反其宅水歸其壑昆蟲毋作草木歸其澤此蜡祝辭也若辭同則祭同處可知矣壑猶坑也昆蟲暑生寒死螟螽之屬為害者也皮弁素服而祭素服以送終也葛帶榛杖喪殺也蜡之祭仁之至義之盡也送終喪殺所謂老物也素服衣裳皆素黄衣黄冠而祭息田夫也祭謂既蜡臘先祖五祀也于是勞農以休息之論語曰黄衣狐裘野夫黄冠黄冠草服也言祭以息民服象其時物之色季秋而草木黄落大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也諸侯于蜡使使者戴草笠貢鳥獸也詩云彼都人士臺笠緇撮又曰其餉伊黍其笠伊紏皆言野人之服也羅氏致鹿與女而詔客告也以戒諸侯曰好田好女者亡其國詔使者使歸以此告其君所以戒之天子樹𤓰華不歛藏之種也華果蓏也又詔以天子樹𤓰蓏而已戒諸侯以蓄藏藴財利也八蜡以記四方四方方有祭也四方年不順成八蜡不通以謹民財也其方穀不熟則不通于蜡者使民謹于用財蜡有八者先嗇一也司嗇二也農三也郵表畷四也貓虎五也坊六也水庸七也昆蟲八也順成之方其蜡乃通以移民也移之言羡也詩頌豐年曰為酒為醴烝畀祖妣以洽百禮此其羡之與既蜡而收民息已故既蜡君子不興功收謂收歛積聚也息民與蜡異則黄衣黄冠而祭為臘必矣郊特牲祀先賢于西學所以教諸侯之德也西學周小學也先賢有道德王所使教國子者祭義祭有祈焉祈猶求也謂祈福祥求永貞也有報焉謂若穫禾報也有由辟焉由用也辟讀為弭謂弭灾兵逺罪疾也郊特牲君子曰禮之近人情者非其至者也近人情者䙝而逺之者敬郊血大饗腥三獻爓一獻孰郊祭天也大饗祫祭先王也三獻祭社稷五祀一獻祭羣小祀也爓沈肉于湯也血腥爓孰逺近備古今也尊者先逺差降而下至小祀孰而已禮器郊血大饗腥三獻爓一獻孰至敬不饗而貴氣臭也血腥爓祭用氣郊特牲孔子曰誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝誦詩三百喻習多言而不學禮也大旅祭五帝也饗帝祭天母輕議禮謂若誦詩者不可以强言禮禮器禮有以多為貴者天子七廟諸侯五大夫三士一此以多為貴也同上王者天太祖諸侯不敢懷大夫士有常宗所以别貴始德之本也郊止天子社止諸侯道及士大夫所以别尊卑尊者事尊卑者事卑宜鉅者鉅宜小者小也故有天下者事七世有國者事五世有五乗之地者事三世有三乗之地者事二世待年而食者不得立宗廟所以别積厚積厚者流澤光也積薄者流澤卑也大戴禮清廟茅屋昭其儉也以茅飾屋著儉也清廟肅然清靜之稱桓二年左氏傳王者所以立宗廟何緣生以事死敬亡若存故以宗廟而事之此孝子之心也宗者尊也廟者貎也象先祖之尊貎也白虎通子羔問曰祭典云昔者有虞氏祖顓頊而宗堯夏后氏亦祖顓頊而宗禹殷人祖契而宗湯周人祖文王而宗武王此四祖四宗或乃異代或其考祖之有功德其廟可也若有虞宗堯夏祖顓頊皆異代之有功德者也亦可以存其廟乎孔子曰善如汝所問也如殷周之祖宗其廟可以不毁其他祖宗者功德不殊雖在殊代亦可以無疑矣詩云蔽芾甘棠勿剪勿伐召伯所憇周人之於召公也愛其人猶敬所舍之樹况祖宗其功德而可以不尊奉其廟乎家語親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷收族序以眧穆也嚴猶尊也孝經曰孝莫大于嚴父大傳庶子不祭明其宗也明猶尊也一統焉族人上不戚君下又辟宗乃後能相序同上庶子不祭祖者明其宗也明其尊宗以為本也禰則不祭矣言不祭祖者主謂宗子庶子俱為適士得立祖禰廟者也凡正體在乎上者謂下正猶為庶也記喪服小庶子不祭禰者明其宗也謂宗子庶子其為下士得立禰廟也雖庶人亦然同上或問禘之説子曰不知也知其説者之于天下也其如示諸斯乎指其掌先王報本追逺之意莫深于禘非仁孝誠敬之至不足與以此非或人之所及也而不王不禘之法又魯之所當諱者故以不知答之示與視同指其掌弟子記夫子言此而自指其掌言其明且易也蓋知禘之説則理無不明誠無不格而治天下不難矣聖人于此豈真有所不知也哉八佾禽獸知母而不知父野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其大祖天子及其始祖之所自出尊者尊統上卑者尊統下都邑之士則知尊禰近政化也大祖始封之君始祖者感神靈而生若稷契也自由也及始祖之所由出謂祭天也上猶逺也下猶近也周今案天子及其始祖之所自出謂若虞夏禘黄帝殷禘帝嚳是也注説非是喪服子夏傳三歲一祫五歲一禘祫者合也禘者諦也祫者大合祭于祖廟也禘者諦昭穆而差優劣也説苑大饗其王事與盛其饌與貢謂祫祭先王三牲魚腊四海九州之美味也籩豆之薦四時之和氣也此饌諸侯所獻内金示和也此所貢也内之庭實先設之金从革性和荆揚二州貢金三品束帛加璧尊德也貢享所執致命者君子于玉比德焉龜為前列先知也龜知事情者陳于庭在前荆州納鍚大龜金次之見情也金炤物金有兩義先入後設丹漆􅁝纊竹箭與衆共財也萬民皆存此物荆州貢丹兖州貢漆􅁝豫州貢纊揚州貢篠簜其餘無常貨各以其國之所有則致逺物也其餘謂九州之外夷服鎮服蕃服蕃服之國周禮九州之外謂之蕃國世一見以其所貴寳為摯周穆王征犬戎得白狼白鹿近之其出也肆夏而送之蓋重禮也出謂諸侯之賔也禮畢而出作樂以節之肆夏當為陔夏禮器大饗之禮尚𤣥酒而俎腥魚大􅃵不和有遺味者矣大享祫祭先王以腥魚為俎實不臑熟之大􅃵肉湇不調以塩菜遺猶餘也樂記大享尚𤣥尊俎生魚先大􅃵貴飲食之本也大享尚𤣥尊而用酒食先黍稷而飯稻粱祭嚌大􅃵而飽乎庶羞貴本而親用也大戴禮凡祭有四時春祭曰礿夏祭曰禘秋祭曰嘗冬祭曰烝謂夏殷時禮也礿禘陽義也嘗烝隂義也禘者陽之盛也嘗者隂之盛也故曰莫重于禘嘗夏者尊卑著而秋萬物成古者於禘也祭爵賜服順陽義也于嘗也出田邑發秋政順隂義也言爵命屬陽國地屬隂故記曰嘗之日發公室示賞也草艾則墨未發秋政則民弗敢草也發公室出賞物也草艾謂艾取草也秋草木成可艾艾給釁亨時則始行小刑也故曰禘嘗之義大矣治國之本也不可不知也明其義者君也能其事者臣也不明其義君人不全不能其事為臣不全全猶具也夫義者所以濟志也諸德之發也是故其德盛者其志厚其志厚者其義章其義章者其祭也敬祭敬則竟内之子孫莫敢不敬矣濟成也發謂機發也竟内之子孫萬人為子孫是故君子之祭也必身親涖之有故則使人可也雖使人也君不失其義者君明其義故也涖臨也君不失其義者言君雖不自親祭祭禮無闕于君德不損也其德薄者其志輕疑于其義而求祭使之必敬也弗可得已祭而不敬何以為民父母矣祭統享禘有樂而食嘗無樂隂陽之義也凡飲養陽氣也凡食養隂氣也故春禘而秋嘗春享孤子秋食耆老其義一也而食嘗無樂飲養陽氣也故有樂食養隂氣也故無聲凡聲陽也言義同而或用樂而或不用樂也此禘嘗為禴字之誤也王制曰春禴夏禘郊特牲祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘是故君子合諸天道春禘秋嘗忘與不敬違禮莫大焉合于天道因四時之變化孝子感時念親則以此祭之也春禘者夏殷禮也周以禘為殷祭更為春祭曰祠霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵愓之心如將見之非其寒之謂謂悽愴及怵􅅥皆為感時念親也霜露既降禮説在秋此無秋字蓋脫耳樂以迎來哀以送徃故禘有樂而嘗無樂迎來而樂樂親之将來也送去而哀哀其享否不可知也小言之則來為一祭之間孝子不知鬼神之期推而廣之放其去于隂陽祭義宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也氣謂嘘吸出入者也耳目之聰明為魄合鬼神而祭之聖人之教致之也衆生必死死必歸土此之謂鬼骨肉斃于下隂為野土隂讀為依䕃之䕃言人之骨肉䕃于地中為土壤其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也焄謂香臭也蒿謂氣烝出貌也上言衆生此言百物明其與人同也不如人貴爾蒿或為藨因物之精制為之極明命鬼神以為黔首則百衆以畏萬民以服明命謂尊名也尊極于鬼神不可復加也黔首謂民也則法也為民作法使民亦事其祖禰鬼神民所畏服聖人以是為未足也築為宮室設為宗祧以别親疏逺邇教民反古復始不忘其所由生也衆之服自此故聽且速也自由也言人由此服于聖人之教也聽謂順教令也速疾也二端既立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也此教衆反始也薦黍稷羞肝肺首心見間以俠甒加以鬰鬯以報魄也教民相愛上下用情禮之至也二端既立謂氣也魄也更有尊名云鬼神也二禮謂朝事與薦黍稷也朝事謂薦血腥時也薦黍稷所謂饋食也見及見間皆當為覸字之誤也羶當為馨聲之誤也燔燎馨香覸以蕭光取牲祭脂也光猶氣也有虞氏祭首夏后氏祭心殷祭肝周祭肺覸以俠甒謂雜之兩甒醴酒也相愛用情謂此以人道祭之也報氣以氣報魄以實各首其類君子反古復始不忘其所由生也是以致其敬發其情竭力從事以報其親不敢勿盡也從事謂脩薦可以祭者也是故昔者天子為藉千畝冕而朱紘躬秉耒諸侯為藉百畝冕而青紘躬秉耒以事天地山川社稷先古以為醴酪齊盛于是乎取之敬之至也藉藉田也先古先祖古者天子諸侯必有養獸之官及歲時齊戒沐浴而躬朝之犠牲祭牲必于是取之敬之至也君召牛納而視之擇其毛而卜之吉然後養之君皮弁素積朔月月半君廵牲所以致力孝之至也歲時齊戒沐浴而躬齊之謂將祭祀卜牲君朔月月半廵視之君召牛納而視之更本擇牲意古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘墻而外閉之及大昕之朝君皮弁素積卜三宫之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之大昕季春朔日之朝也諸侯夫人三宫半王后也風戾之者及早涼脆采之風戾之使露氣燥乃以食蠶蠶性惡濕歲既單矣世婦卒蠶奉繭以示于君遂獻繭于夫人夫人曰此所以為君服與遂副禕而受之因少牢以禮之歲單謂三月月盡之後也言歲者蠶歲之大功事畢于此也副禕王后之服而云夫人記者容二王之後與禮之禮奉繭之世婦古之獻繭者其率用此與問者之辭及良日夫人繅三盆手遂布于三宫夫人世婦之吉者使繅遂朱綠之𤣥黄之以為黼黻文章服既成君服以祀先王先公敬之至也三盆手者三淹也凡繅淹大總而手振之以出緒也同上凡治人之道莫急于禮禮有五經莫重于祭禮有五經謂吉禮凶禮賔禮軍禮嘉禮也莫重于祭謂之吉禮為首也大宗伯職曰以吉禮事邦國之鬼禮祇夫祭者非物自外至者也自中出生于心也心􅇶而奉之以禮是故唯賢者能盡祭之義􅇶感念親之貌也􅇶或為述賢者之祭也必受其福非世所謂福也福者備也備者百順之名也無所不順者之謂備言内盡于已而外順于道也忠臣以事其君孝子以事其親其本一也世所謂福者謂受鬼神之祐助也賢者之所謂福者謂受大順之顯名也其本一者言忠孝俱由順出也上則順于鬼神外則順于君長内則以孝于親如此之謂備唯賢者能備能備然後能祭是故賢者之祭也致其誠信與其忠敬奉之以物道之以禮安之以樂參之以時明薦之而已矣不求其為此孝子之心也明猶潔也為謂福祐為己之報祭者所以追養繼孝也孝者畜也順于道不逆于倫是之謂畜畜謂順于徳教是故孝子之事親也有三道焉生則養沒則喪喪畢則祭養則觀其順也喪則觀其哀也祭則觀其敬而時也盡此三道者孝子之行也没終也既内自盡又外求助昏禮是也故國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也言玉者美言之也君子于玉比德焉夫祭也者必夫婦親之所以備内外之官也官備則具備具謂所共衆物水草之菹陸産之醢小物備矣三牲之俎八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣水草之菹芹􅈋之屬陸産之醢蚳蝝之屬天子之祭八簋昆蟲謂濕生寒死之蟲也内則可食之物有蜩范草木之實菱芡榛栗之屬凡天之所生地之所長苟可薦者莫不咸在示盡物也外則盡物内則盡志此祭之心也咸皆也是故天子親耕于南郊以共齊盛王后蠶于北郊以共純服諸侯耕于東郊亦以共齊盛夫人蠶于北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也純服亦冕服也互言之爾純以見繒色冕以著祭服東郊少陽諸侯象也夫人不蠶于西郊婦人禮少變也齊盛作粢祭統天子親耕以共粢盛王后親蠶以共祭服國非無良農工女也以為人之所盡事其祖禰不若以己所自親者也穀梁傳詳見祭物粢盛章三月繫七日戒三日宿慎之至也繫繫牲于牢也戒散齊也宿致齊也将有祭祀之事必先敬慎如此不敢切也禮器齊之𤣥也以隂幽思也故君子三日齊必見其所祭者齊三日者思其居處思其笑語思其志意思其所樂則見之也郊特牲及時將祭君子乃齊齊之為言齊也齊不齊以致齊者也是故君子非有大事也非有恭敬也則不齊不齊則于物無防也嗜欲無止也及其將齊也防其邪物訖其嗜欲耳不聽樂故記曰齊者不樂言不敢散其志也心不苟慮必依于道手足不苟動必依于禮訖猶止也是故君子之齊也專致其精明之德也故散齊七日以定之致齊三日以齊之定之之謂齊齊者精明之至也然後可以交于神明也定者定其志意是故先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日宫宰守宫官也宿讀為肅肅猶戒也輕肅重也君致齊于外夫人致齊于内然後㑹于太廟君純冕立於阼夫人副禕立於東房君執圭瓉祼尸大宗報璋瓉亞祼及迎牲君執紖卿大夫從士執芻宗婦執盎從夫人薦涗水君執鸞刀羞嚌夫人薦豆此之謂夫婦親之大廟始祖廟也圭瓉璋瓉祼器也以圭璋為柄酌鬰鬯曰祼大宗亞祼容夫人有故攝焉紖所以牽牲也周禮作絼芻謂藁也殺牲時用薦之周禮封人祭祀飾牲共其水藁涗盎齊也盎齊涗酌也凡尊有明水因兼云水耳嚌嚌肺祭肺之屬也君以鸞刀割制之天子諸侯之祭禮先有祼尸之事乃後迎牲芻或為䅳祭統致齊于内散齊于外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者致齊思此五者也散齊七日不御不樂不弔耳見所為齊者思之孰也所嗜素所欲食也春秋傳曰屈到嗜芰祭之日入室僾然必有見乎其位周還出户肅然必有聞乎其容聲出户而聽愾然必有聞乎其歎息之聲周還出户謂薦設時也無尸者闔户若食間則有出户而聽之是故先王之孝也色不忘乎目聲不絶乎耳心志嗜欲不忘乎心致愛則存致慤則著著存不忘乎心夫安得不敬乎存著則謂其思念也君子生則敬養死則敬享思終身弗辱也享猶祭也享也義祭唯聖人為能享帝孝子為能享親謂祭之能使之饗也帝天也享者鄉也鄉之然後能享焉言中心鄉之乃能使其祭見享也上享或謂相是故孝子臨尸而不怍君牽牲夫人奠盎君獻尸夫人薦豆卿大夫相君命婦相夫人齊齊乎其敬也愉愉乎其忠也勿勿諸其欲其饗之也色不和曰怍奠盎設盎齊之奠也此時君牽牲将薦毛血君獻尸而夫人薦豆謂繹日也儐尸主人獻尸主婦自東房薦韭菹醢勿勿猶勉勉也慤愛之貌文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也如見親之所愛如欲色然其文王與思死者如不欲生言思親之深也如欲色者以時人于色厚假以喻之詩云明發不寐有懷二人文王之詩也祭之明日明發不寐享而致之又從而思之祭之日樂與哀半饗之必樂已至必哀明祭不寐謂夜而至旦也祭之明日謂繹日也言繹之夜不寐也二人謂父母容尸侑也仲尼嘗奉薦而進其親也慤其行也趨趨以數嘗秋祭也親為身親執事時也慤與趨趨言少威儀也趨讀如促數之言速也已祭子貢問曰子之言祭濟濟漆漆然今子之祭無濟濟漆漆何也子曰濟濟者容也逺也漆漆者容也自反也容以逺若容以自反也夫何神明之及交夫何濟濟漆漆之有乎漆漆讀如朋友切切自反猶言自脩整也容以逺言非所以接親親也容以自反言非孝子所以事親也及與也此皆非與神明交之道反饋樂成薦其薦俎序其禮樂備其百官君子致其濟濟漆漆夫何慌惚之有乎天子諸侯之祭或從血腥始至反饋是進熟也薦俎豆與俎也慌惚思念益深之時也言祭事既備使百官助已祭然而見其容而自反是無慌惚之思念夫言豈一端而已夫各有所當也豈一端言不可以一槩也禮各有所當行祭宗廟者賔客濟濟漆漆主人慤而趨趨並祭義孝子将祭慮事不可以不豫比時具物不可以不備虚中以治之比時猶先時也虚中言不兼念餘事宫室既脩牆屋既設百物既備夫婦齊戒沐浴盛服奉承而進之洞洞乎屬屬乎如弗勝如將失之其孝敬之心至也與脩設謂掃除及黝堊薦其薦俎序其禮樂備其百官奉承而進之百官助主人進之于是諭其志意以其慌惚以與神明交庶或饗之庶或饗之孝子之志也諭其志意謂使祝祝享及侑尸也或猶有也言想見其彷彿來孝子之祭也盡其慤而慤焉盡其信而信焉盡其敬而敬焉盡其禮而不過失焉進退必敬如親聽命則或使之也言當盡已而已如居父母前将受命而使之孝子之祭可知也其立之也敬以詘其進之也敬以愉其薦之也敬以欲退而立如将受命已徹而退敬齊之色不絶于面詘充詘形容喜貎也進之謂進血腥也愉顔色和貎也薦之謂進孰也欲婉順貎齊謂齊荘孝子之祭也立而不詘固也進而不愉疏也薦而不欲不愛也退立而不如受命敖也已徹而退無敬齊之色而忘本也如是而祭失之矣固猶質陋也而忘本而衍字孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容和氣謂立而詘孝子如執玉如奉盈洞洞屬屬然如弗勝如将失之嚴威儼恪非所以事親也成人之道也成人既冠者然則孝子不失其孺子之心也同上孝子將祭祀必有齊荘之心以慮事以具服物以脩宫室以治百事謂齊之前後也及祭之日顔色必温行必恐如懼不及愛然如懼不及見其所愛者其奠之也容貎必温身必詘如語焉而未之然奠之謂酌尊酒奠之及酳之屬也如語焉而未之然如有所以語親而未見答宿者皆出其立卑静以正如将弗見然宿者皆岀謂賔助祭者事畢出者也如将弗見然祭事畢而不知親所在思念之深如不見出也及祭之後陶陶遂遂如将復入然思念既深如覩親将復入也陶陶遂遂相隨行之貎是故慤善不違身耳目不違心思慮不違親結諸心形諸色而術省之孝子之志也術當為述聲之誤也同上聖主将祭必潔齊精思若親之在方興未登㥥㥥憧憧專一想親之容貎仿佛此孝子之誠也四方之助祭空而來者滿而反虚而至者實而還皆取法則焉説苑祭之為言察也察者至也至者人事至也人事至然後察禮志曰齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者祭之日入室懓然必有見乎其位周還其户肅然必有聞乎其容聲出户而聽愾然必有聞乎其歎息之聲是之謂至祭者薦者也薦之為言在也在也者在其道也禮志曰君子生則敬養死則致享思終身不忘是之謂在其道尚書大傳祭者志意思慕之情也愅詭唈僾而不能無時至焉愅變也詭異也皆謂變異感動之貎悒僾氣不舒憤鬰之貎爾雅云僾唈也郭云嗚唈短氣也言人感動與憤鬰不能無時而至言有時而至也故人之歡欣和合之時則夫忠臣孝子亦愅詭而有所至矣歡欣之時忠臣孝子則感動而思君親之不得同樂也彼其所至者甚大動也言所至之情甚大感動也案屈然已則其于志意之情者惆然不嗛其于禮節者闕然不具屈竭也屈然空然也惆然悵然也嗛足也言若無祭祀之禮空然而已則忠臣孝子之情悵然不足禮節又闕然不具也故先王案為之立文尊尊親親之義至矣文謂祭禮節文故曰祭者志意思慕之情也忠信愛敬之至矣禮節文貎之盛矣苟非聖人莫之能知也聖人明之士君子安行之官人以為守百姓以成俗其在君子以為人道也其在百姓以為鬼事也以為人道則安而行之以為鬼事則畏而奉之故鍾鼓管磬琴瑟竽笙韶夏濩武汋桓箾簡象是君子之所以為愅詭其所喜樂之文也因説祭遂廣言喜樂哀痛敦惡之意本皆因于感動而為之文飾也喜樂不可無文飾故制為鍾鼓韶夏之屬齊衰苴杖居廬食粥席薪枕塊是君子之所以為愅詭其所哀痛之文也感動其所哀痛而不可無文飾故制為齊衰苴杖之屬言本皆因于感動也師旅有制刑法有等莫不稱罪是君子之所以為愅詭其所敦惡之文也師旅所以討有罪制謂人數也有等輕重異也敦厚也厚惡深惡也或曰敦讀為頓困躓也本因感動敦惡故制師旅刑罰以為文飾卜筮視日齊戒脩塗几筵饋薦告祝如或饗之視日之吉凶史記周文為項燕視日脩塗謂脩自宮至廟之道途也几筵謂祝筵几于室中東面也饋獻牲體也薦進黍稷也告祝謂尸命祝以嘏于主人曰皇尸命工祝承致多福無疆于汝孝孫來汝孝孫使汝受祿于天宜稼于田眉夀萬年勿替引之如或歆饗其祝然也物取而皆祭之如或嘗之物取毎物皆取也謂祝命挼祭尸取菹㨎于醢祭于豆間佐食取黍稷肺授尸尸受嚌之又取肝㨎于塩坐振祭嚌之是也如或嘗之謂尸啐嚌之如神之親嘗然也母利舉爵當云無舉利爵即上文云利爵之不醮也主人有尊如或觴之謂主人設尊酌以獻尸尸飲之如神飲其觴然賔出主人拜送反易服即位而哭如或去之此雜説喪祭也易服易祭服反喪服也賔出祭事畢即位而哭如神哀之去然也哀夫敬夫事死如事生事亡如事存状乎無形影然而成文状類也言祭祀不見鬼神有類乎無形影者然而足以成人道之節文也荀子禮論夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致其敬于鬼神言其物雖質略有齊敬之心則可以薦羞于鬼神鬼神享德不享味也中古未有釡甑釋米捭肉加于燒石之上而食之耳今北狄猶然汙尊鑿地為尊也抔飲手掬之也蕢讀為􅤓聲之誤也􅤓堛也謂搏土為桴也土鼓築土為鼓也及其死也升屋而號告曰臯某復招之于天然後飯腥而苴孰飯以稻米上古未有火化苴孰取遣奠有火利也苴或為葅故天望而地藏也體魄則降和氣在上地藏為葬故死者北首首隂也生者南鄉鄉陽也皆從其初謂今行之然也昔者先王未有宫室冬則居營窟夏則居橧巢寒則累土暑則聚薪柴居其上未有火化食腥也食草木之實鳥獸之肉飲其血茹其毛未有麻􅁝衣其羽皮此上古之時也後聖有作作起然後脩火之利孰治萬物范金鑄作器用合土瓦瓴甓及甒大以為臺榭宫室牖户榭器之所藏也以炮裹燒之也以燔加于火上以亨煮之釡也以炙貫之火上以為醴酪烝醸之也酪酢酨治其麻􅁝以為布帛以養生送死以事鬼神上帝皆從其朔朔亦初也亦謂今行之然故𤣥酒在室醴醆在户粢醍在堂澄酒在下陳其犧牲備其鼎俎列其琴瑟管磬鍾鼓脩其祝嘏以降上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祐此言今禮饌具所因于古及其事義也粢讀為齊聲之誤也周禮五齊一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沈齊字雖異醆與盎澄與沈葢同物也奠之不同處重古畧近也祝祝為主人享神辭也嘏祝為尸致福于主人之辭也祐福也福之言備也作其祝號𤣥酒以祭薦其血毛腥其俎孰其殽與其越席疏布以幂衣其澣帛醴醆以獻薦其燔炙君與夫人交獻以嘉魂魄是謂合莫此謂薦上古中古之食也周禮祝號有六一曰神號二曰鬼號三曰祗號四曰牲號五曰齍號六曰幣號號者所以尊神顯物也腥其俎謂豚解而腥之及血毛皆所以法于大古也孰其殽謂體解而爓之此以下皆所以法于中古也越席剪蒲席也幂覆尊也澣帛練染以為祭服嘉樂也莫虚無也孝經説曰上通無莫然後退而合亨體其犬豕牛羊實其簠簋籩豆鉶􅃵祝以孝告嘏以慈告是謂大祥此謂薦今世之食也體其犬豕牛羊謂分别骨肉之貴賤以為衆俎也祝以孝告嘏以慈告各首其義也祥善也今世之食于人道為善也此禮之大成也解子游以禮所成也禮運祭之日君牽牲穆答君卿大夫序從祭謂祭宗廟也穆子姓也答對也序以次第从也序或為豫既入廟門麗于碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退爓祭祭腥而退敬之至也麗猶繫也毛牛尚耳以耳毛為上也膟膋血與腸間脂也爓祭祭腥祭爓肉腥肉也湯肉曰爓爓祭祭腥或為合祭腥泄腊孰也祭義大廟之内敬矣君親牽牲大夫賛幣而從納牲于庭時也當用幣告神而殺牲君親致祭夫人薦盎親制祭謂朝事進血膋時所制者制肝洗于鬰鬯以祭于室及主君親割牲夫人薦酒親割謂進牲孰體時卿大夫從君命婦從夫人洞洞乎其敬也屬屬乎其忠也勿勿乎其欲其饗之也勿勿猶勉勉也納牲詔于庭血毛詔于室􅃵定詔于堂三詔皆不同位蓋道求而未之得也肉謂之􅃵道猶言也設祭于堂設祭之饌于堂人君禮然為祊乎外祊祭之明日之繹祭也謂之祊者于廟門之旁因名焉其祭之禮既設祭于室而事尸于堂孝子求神非一處也周禮曰夏后氏世室門堂三之二室三之一詩頌􅁝衣曰自堂徂基故曰于彼乎于此乎不知神之所在也禮器有虞氏之祭也尚用氣血腥爓祭用氣也尚謂先薦之爓或為䐲殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告于天地之間也滌蕩猶摇動也周人尚臭灌用鬯臭鬰合鬯臭隂達于淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也蕭合黍稷臭陽達于牆屋故既奠然後焫蕭合羶薌灌謂以圭瓉酌鬯始獻神也已乃逆牲于庭殺之天子諸侯之禮也奠謂薦孰時也特牲饋食所云祝酌奠于鉶南是也蕭薌蒿也染以脂合黍稷燒之詩云取蕭祭脂羶當為馨聲之誤也奠或為薦凡祭慎諸此魂氣歸于天形魄歸于地故祭求諸隂陽之義也殷人先求諸陽周人先求諸隂此其所以先後異也詔祝于室坐尸于堂謂朝事時也朝廷延尸于户西南面布主席東面取牲膟膋燎于爐炭洗肝于鬰鬯而燔之入以詔神于室又出以墮于主前主人親制其肝所謂制祭也時尸薦以籩豆至薦孰乃更延主于室之奥尸來升席自北方坐于主北焉用牲于庭謂殺之時升首于室制祭之後升牲首于北牖下尊首尚氣直祭祝于主謂薦孰時也如特牲少牢饋食之為也直正也祭以孰為正則血腥之屬盡敬心耳索祭祝于祊索求神也廟門曰祊謂之祊者以于繹祭名也不知神之所在于彼乎于此乎室與堂與或諸逺人乎祭于祊尚曰求諸逺者與尚庶幾也祊之為言倞也倞猶索也倞或為諒肵之為言敬也為尸有肵俎此訓也富也者福也人君嘏辭有富此訓之也或曰福也者備也首也者直也訓所以升首祭也直或為犆也相饗之也相謂詔侑也詔侑尸者欲使饗此饌也特牲饋食禮曰主人拜妥尸尸答拜執奠祝饗嘏長也大也主人受祭福曰嘏此訓也尸陳也尸或詁為主此尸神象當從主訓之言陳非也毛血告幽全之物也幽謂血也告幽全之物者貴純之道也純謂中外皆善血祭盛氣也祭肺肝心貴氣主也氣主氣之所舍也周祭肺殷祭肝夏祭心祭黍稷加肺祭齊加明水報隂也祭黍稷加肺謂綏祭也明水司烜所取于月之水也齊五齊也五齊加明水則三酒加𤣥酒也取膟膋燔燎升首報陽也膟膋腸間脂也與蕭合燒之亦有黍稷也明水涗齊貴新也涗猶清也五齊濁泲之使清謂之涗齊乃取明水皆貴新也周禮慌氏以涗水漚􅁝涗齊或為汎齊凡涗新之也新之者敬也其謂之明水也由主人之潔著此水也著猶成也言主人齊潔此水乃成可得也君再拜稽首肉袒親割敬之至也敬之至也服也拜服也稽首服之甚也肉􅃝服之盡也割解牲體祭稱孝孫孝子以其義稱也謂事祖稱稱曾孫某謂國家也謂諸侯事五廟也于曽祖以上稱曽孫而已祭祀之相主人自致其敬盡其嘉而無與讓也相謂詔侑尸也嘉善也腥肆爓腍祭豈知神之所饗也主人自盡其敬而已矣治肉曰肆腍孰也爓或為䐲舉斚角詔妥尸古者尸無事則立有事而后坐也尸神象也祝將命也妥安坐也尸始入舉奠斚若奠角将祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜安之也天子奠斚諸侯角古謂夏時也縮酌用茅明酌也謂泲醴齊以明酌也周禮曰醴齊縮酌五齊醴尤濁和之以明酌泲之以茅縮去滓也明酌者事酒之上也名曰明者事酒今之醳酒皆新成也春秋傳曰爾貢包茅不入王祭不共無以縮酒酌猶斟也酒已泲則斟之以實尊彛昏禮曰酌𤣥酒三注于尊凡行酒亦為酌也醆酒涗于清謂泲醆酒以清酒醆酒盎齊差清和之以清酒泲之而已泲盎齊必和以清酒者皆久味相得汁獻涗于醆酒謂泲秬鬯以醆酒也獻讀當為莎齊語聲之誤也秬鬯者中有煮鬰和以盎齊摩莎泲之出其香汁因謂之汁莎不以三酒泲秬鬯者秬鬯尊也猶明清與醆酒于舊澤之酒也猶若也澤讀為醳舊醳之酒謂昔酒也泲醴齊以明酌泲醆酒以清酒泲汁獻以醆酒天子諸侯之禮也天子諸侯禮廢時人或聞此而不審也一若今明酌清酒與醆酒以舊醳之酒泲之矣就其所知以曉之也泲清酒以舊醳之酒者為其味厚腊毒也郊特牲天道至教聖人至德目下事也廟堂之上罍尊在阼犧尊在西廟堂之下縣鼓在西應鼓在東禮樂之器尊西也小鼓謂之應犧周禮作獻君在阼夫人在房人君尊東也天子諸侯有左右房大明生于東月生于西此隂陽之分夫婦之位也大明日也君西酌犧象夫人東酌罍尊象日出東方而西行也月出西方而東行也周禮曰春祠夏禴祼用雞彛鳥彛皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍臣之所酢禮交動乎上樂交動乎下和之至也言交乃和禮器夫祭有十倫焉見事鬼神之道焉見君臣之義焉見父子之倫焉見貴賤之等焉見親疏之殺焉見爵賞之施焉見夫婦之别焉見政事之均焉見長幼之序焉見上下之際焉此之謂十倫倫猶義也鋪筵設同几為依神也詔祝于室而出于祊此交神明之道也同之言詷也祭者以其妃配亦不特几也詔祝告事于尸也出于祊謂索祭也君迎牲而不迎尸别嫌也尸在廟門外則疑于臣在廟中則全于君君在廟門外則疑于君入廟門則全于臣全於子是故不出者明君臣之義也不迎尸者欲全其尊也尸神象也鬼神之尊在廟中人君之尊出廟門則伸夫祭之道孫為王父尸所使為尸者於祭者子行也父北面而事之所以明子事父之道也此父子之倫也子行猶子列也祭祖則用孫列皆取于同姓之適孫也天子諸侯之祭朝事延尸于户外是以有北面事尸之禮尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒明尊卑之等也尸飲五謂酳尸五獻也大夫士祭三獻而獻賔夫祭有昭穆昭穆者所以别父子逺近長幼親疏之序而無亂也是故有事于大廟則羣昭羣穆咸在而不失其倫此之謂親疏之殺也昭穆咸在同宗父子皆來古者明君爵有德而祿有功必賜爵祿于大廟示不敢專也故祭之日一獻君降立于阼階之南南鄉所命北面史由君右執䇿命之再拜稽首受書以歸而舍奠于其廟此爵賞之施也一獻酳尸也舍當為釋聲之誤也非時而祭曰奠君卷冕立于阼夫人副禕立于東房夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人受尸執足夫婦相授受不相襲處酢必易爵明夫婦之别也校豆中央直者也執醴授醴之人授夫人以豆則執鐙鐙豆下跗也凡為俎者以骨為主骨有貴賤殷人貴髀周人貴肩凡前貴于後俎者所以明祭之必有惠也是故貴者取貴骨賤者取賤骨貴者不重賤者不虚示均也惠均則政行政行則事成事成則功立功之所以立者不可不知也俎者所以明惠之必均也善為政者如此故曰見政事之均焉殷人貴髀為其厚也周人貴肩為其顯也凡前貴于後謂脊脅臂臑之屬凡賜爵昭為一穆為一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂長幼有序昭穆猶特牲少牢饋食之禮衆兄弟也羣有司猶衆賔下及執事者君賜之爵謂若酬之夫祭有畀煇胞翟閽者惠下之道也唯有德之君為能行此明足以見之仁足以與之畀之為言與也能以其餘畀其下者也煇者甲吏之賤者也胞者肉吏之賤者也翟者衆吏之賤者也閽者守門之賤者也古者不使刑人守門此四守者吏之至賤者也尸又至尊以至尊既祭之末而不忘至賤而以其餘畀之是故明君在上則竟内之民無凍餒者矣此之謂上下之際明足以見之見此卑者也仁足以與之與此卑者也煇周禮作韗謂韗磔皮革之官也翟謂教羽舞者也古者不使刑人守門謂夏殷時祭統祭祀之有尸也宗廟之有主也示民有事也脩宗廟敬祀事教民追孝也有事有所尊事也以此坊民民猶忘其親坊記尸飲三衆賔飲一示民有上下也上下猶尊卑也主人主婦主賔獻尸乃後主人降洗爵獻賔同上七日戒三日齊承一人焉以為尸過之者趨走以教敬也戒謂散齊也承猶事也醴酒在室醍酒在堂澄酒在下示民不淫也淫猶貪也澄酒清酒也三酒尚質不尚味因其酒肉聚其宗族以教民睦也言祭有酒肉羣昭羣穆皆至獻而酬之咸有薦俎同上宗廟之中以爵為位崇德也崇髙也宗人授事以官尊賢也官各有能登餕受爵以上嗣尊祖之道也上嗣之正統世文王子天子有善讓德於天諸侯有善歸諸天子卿大夫有善薦於諸侯士庶人有善本諸父母存諸長老祿爵慶賞成諸宗廟所以示順也薦進也成諸宗廟于宗廟命之祭統有十倫六曰見爵賞之施焉祭統及入舞君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸是故天子之祭也與天下樂之諸侯之祭也與竟内樂之冕而總干率其羣臣以樂皇尸此與竟内樂之之義也君為東上近主位也皇君也言君尸者尊也夫祭有三重焉獻之屬莫重於祼聲莫重于升歌舞莫重于武宿夜此周道也武宿夜武曲名也周道猶周之禮凡三道者所以假于外而以増君子之志也故與志進退志輕則亦輕志重則亦重輕其志而求外之重也雖聖人弗能得也是故君子之祭也必身自盡也所以明重也道之以禮以奉三重而薦諸皇尸此聖人之道也祭統夫祭有餕餕者祭之末也不可不知也是故古之人有言曰善終者如始餕其是已是故古之君子曰尸亦餕鬼神之餘也惠術也可以觀政矣術猶法也為政尚施惠盡美能知能惠詩云維此惠君民人所瞻是故尸謖君與卿四人餕君起大夫六人餕臣餕君之餘也大夫起士八人餕賤餕貴之餘也士起各執其具以出陳于堂下百官進徹之下餕上之餘也進當為餕聲之誤也百官謂有事于君祭者也既餕餕乃徹之而去所謂自卑至賤進徹或俱為凡餕之道毎變以衆所以别貴賤之等而興施惠之象也是故以四簋黍見其脩于廟中也廟中者竟内之象也鬼神之惠徧廟中如國君之惠徧竟内也祭者澤之大者也是故上有大澤則惠必及下顧上先下後耳非上積重而下有凍餒之民也是故上有大澤則民夫人待于下流知惠之必将至也由餕見之矣故曰可以觀政矣鬼神有祭不獨享之使人餕之恩澤之大者也國君有蓄積不獨食之亦以施惠于竟内也同上子曰武王周公其逹孝矣乎夫孝者善繼人之志善述人之事者也春秋脩其祖廟陳其宗器設其裳衣薦其時食脩謂掃糞也宗器祭器也裳衣先祖之遺衣服也設之當以授尸也時食四時祭也宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也序猶齒也爵謂公卿大夫士也事謂薦羞也以辨賢者以其事别所能也若司徒奉牛宗伯共雞牲矣文王世子曰宗廟之中以爵為位崇德也宗人授事以官尊賢也旅酬下為上者謂若特牲饋食之禮賔弟子兄弟之子各舉觶于其長也逮賤者宗廟之中以有事為榮也燕毛既祭而燕也燕以毛髮為坐祭時尊賢也至燕親親也齒亦年也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也踐猶升也其者其先祖也踐或為纉郊社之禮所以事上帝也宗廟之禮所以祀乎其先也社祭地神不言后土者節文明乎郊社之禮禘嘗之義治國其如示諸掌乎示讀如寘諸河干之寘寘置也物而在掌中易為寘力者也序爵辨賢尊尊親親治國之要中庸書曰乃女其悉自學功悉盡也學効也傳曰當其効功也於卜洛邑營成周改正朔立宗廟序祭祀易犧牲制禮樂一統天下合和四海而致諸侯皆莫不依紳端冕以奉祭祀者紳大帶也其下莫不自悉以奉其上者莫不自悉其祭祀者此之謂也盡其天下諸侯之志而効天下諸侯之功也廟者貎也其以貎言之也宫室中度衣服中制犧牲中辟辟法也殺者中死割者中理搙弁者為文搙弁或為振非當言帚埽㸑灶者有容㭬杙者有數杙者繫牲者也大廟之中繽乎其猶模繡也言文章之可觀也模所㭬文章之範天下諸侯之悉來進受命于周公而退見文武之尸者千七百七十三諸侯八州州二百一十國畿内九十三國此周所因于殷九州諸侯之數皆莫不磬折玉音金聲玉色玉音金聲言𢎞殺之調也然後周公與升歌而弦文武與諸侯升歌文王武王之德又以琴瑟播之侯在廟中者伋然淵其志和其情伋讀曰播播然變動貎愀然若復見文武之身然後曰嗟子乎此蓋吾先君文武之風也乎子成王也及執俎抗鼎執刀執匕者負廧而歌憤于其情發于中而樂節文卑賤者尚然而況尊貴者乎故周人追祖文王而宗武王也尚書大傳君子曰祭祀不祈祈求也祭祀不為求福也詩云自求多福福由已耳不麾蚤麾之言快也祭有時不以先之為快也齊人所善曰麾不樂葆大謂器幣也葆之言褒也不善嘉事嘉事之祭致大夫是也禮宜告見于先祖耳不善之而祭牲不及肥大薦不美多品以禮之義有以小少為貴也禮器郊特牲而社稷大牢天子適諸侯諸侯膳用犢諸侯適天子天子賜之禮大牢貴誠之義也故天子牲孕弗食也祭帝弗用也犢者誠慤未有牝牡之情是以小為貴也孕任子也易曰婦姙不育郊特牲羔豚而祭百官皆足大牢而祭不必有餘此之謂稱也足猶得也稱稱牲之大小而為俎此指謂助祭者耳而云百官喻衆也禮器君子大牢而祭謂之禮匹士大牢而祭謂之攘君子謂大夫以上攘盗竊也同上已有三牲必田狩者孝子之意以為己之所養不如天地自然之牲逸豫肥美尚書大傳子期祀平王子期楚平王之子結也平王恭王子昭父也祭以牛俎于王致牛俎于昭王王問于觀射父曰祀牲何及王感俎肉而問牲何所及對曰祀加于舉加増也舉人君朔望之盛饌天子舉以太牢祀以㑹太牢羊牛豕也會㑹三太牢舉四方之貢諸侯舉以特牛祀以太牢特一也卿舉以少牢祀以特牛少牢羊豕大夫舉以特牲祀以少牢特牲豕也士食魚炙祀以特牲庶人食菜祀以魚上下有序民則不慢王曰其小大何如對曰郊禘不過繭栗角如繭栗郊禘祭天也烝嘗不過把握握長不出把者王曰何其小也對曰夫神以精明臨民者也故求備物不求豐大備物體具而精潔者是以先王之祀也以一純二精一純心純一而潔二精玉帛也三牲四時五色六律七事八種七事天地民四時之務也八種八音九祭十日十二辰以致之九祭九州助祭也十日甲至癸也十二辰子至亥也擇其吉日令辰百姓千品萬官億醜兆民經入畡數以奉之百姓百官受氏姓也千品姓有徹品十為千品五物之官陪屬萬為萬官官有十醜為億醜天子之田九畡以食兆民王取經入以食萬官也明德以昭之昭昭孝敬也和聲以聽之中和之聲使神聽之以告徧至則無不受休至神至也休慶也毛以示物物色也血以告殺明不因故也接誠㧞取以獻具為齊敬也接誠于神也㧞毛取血獻其備物也齊潔也詩曰執其鸞刀以啟其毛取其血膋敬不可久民力不堪故齊肅以承之肅疾也承奉也王曰芻豢幾何草食曰芻糓食曰豢對曰逺不過三月近不過浹日逺謂三牲近謂雞鶩之屬浹日十日也王曰祀不可以己乎已止也對曰祀所以昭孝息民昭孝養使民蕃息也撫國家定百姓也不可以已夫民氣縱則底氣志氣也縱放也底著也底則滯滯久不震滯廢也震懼也言無祭祀則民無所畏忌無所畏忌則志放縱志放縱則遂廢滯難復恐懼也生乃不殖生人物也殖長也不長神不降以福也是用不從不從上令其生不殖不可以封封國也是以古者先王日祭月享時類歲祀以事類曰類日祭于祖考月祭于曽高時類于二祧歲祀于壇墠諸侯舍日有月享也卿大夫舍月有時祭也士庶人舍時歲乃祭也天子徧祀羣神品物品物謂若八蜡所祭貓虎昆蟲之類也諸侯祀天地三辰及其土之山川三辰日月星也祀天地謂二王後也非二王後祭分野星山川而已卿大夫祀其禮禮謂五祀及祖所自出士庶人不過其祖祖王父也日月㑹于龍􅔀􅔀龍尾也謂周十二月夏十月也日月合辰于尾上月令曰孟冬日在尾土氣含收含收收縮萬物含藏也天明昌作昌盛也作起也謂天氣上也是月純坤用事百嘉備舍嘉善也時物畢成舍入室也群神頻行頻並也並行欲求食也國于是乎烝嘗家于是乎嘗祀烝冬祭也嘗嘗百物也月令孟冬大飲烝傳曰閉蟄而烝百姓夫婦擇其令辰辰十二辰也奉其犧牲敬其齍盛潔其糞除慎其采服禋其酒醴帥其子姓禋潔也子姓同姓也從其時享䖍其宗祀宗主祭祀祀主祝祈也道其順辭以昭祀其先祖肅肅濟濟如或臨之于是乎合其州鄉朋友婚姻比爾兄弟親戚合㑹也比親也於是乎弭其百苛妎其䜛慝弭止也苛虐也妎覆也止覆謂解怨除恨之辭合其嘉好結其親暱合結也謂于此更深固之億其上下億安也以申固其姓上所以教民䖍也下所以昭事上也天子䄘郊之事必自射其牲牲牛也王后必自舂其粢器實曰粢諸侯宗廟之事必自射其牛刲羊繫豕刲刺也繫殺也夫人自舂其盛在器曰盛上言粢下言盛互其文也况其下之人其誰敢不戰戰兢兢以事百神天子親舂禘郊之盛帥后舂之王后親繰其服服祭服也祭義曰夫人繰三盆則王后其一盆與周語曰王耕一墢班三之自公以下至于庶人其誰敢不齊肅恭敬致力於神民所以攝固者也若之何其舍之也攝持也舍廢也國語楚語隨季梁曰夫民神之主也言鬼神之情依民而行是以聖王先成民而後致力于神故奉牲以告曰博碩肥腯謂民力之普存也博廣也碩大也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也雖告神以博碩肥腯其實皆當兼此謂民力適完則六畜既大而滋也皮毛無疥癬兼備而無有所闕奉盛以告曰絜粢豐盛謂其三時不害而民和年豐也三時春夏秋奉酒醴以告曰嘉栗旨酒嘉善也栗謹敬也謂其上下皆有嘉德而無違心也所謂馨香無䜛慝也馨香之逺聞故務其三時脩其五教父義母慈兄友弟恭子孝親其九族以致其禋祀禋絜敬也九族謂外祖父外祖母从母子及妻父妻母姑之子姊妹之子女子之子并己之同族皆外親有服而異族者也於是乎民和而神降之福桓六年左氏傳恒豆之菹水草之和氣也其醢陸産之物也加豆陸産也其醢水物也此謂諸侯也天子朝事之豆有昌本麇臡􅈋菹麇臡饋食之豆有蔡菹嬴醢豚拍魚醢其餘則有雜錯云也籩豆之薦水土之品也不敢用常䙝味而貴多品所以交于神明之義也非食味之道也言禮以異為敬先王之薦可食也而不可耆也卷冕路車可陳也而不可好也武壯而不可樂也宗廟之威而不可安也宗廟之器可用也而不可便其利也所以交于神明者不可以同于所安樂之義也武萬舞也酒醴之美𤣥酒明水之尚貴五味之本也黼黻文繡之美疏布之尚反女功之始也莞簟之安而蒲越槀鞂之尚明之也大羮不和貴其質也大圭不琢美其質也丹漆雕幾之美素車之乗尊其樸也貴其質而己矣所以交于神明者不可同于所安䙝之甚也如是而后宜尚質貴本其至如是乃得交于神明之宜也明水司烜以隂鑑所取于月之水也蒲越槀鞂藉神席也明之者神明之也琢當為字之誤也幾謂漆飾沂鄂也鼎俎奇而籩豆偶隂陽之義也牲陽也庶物隂也黄目鬰氣之上尊也黄者中也目者氣之清明者也言酌于中而清明于外也黄目黄彛也周所重于諸侯為上也祭天掃地而祭焉於其質而已矣醯醢之美而煎塩之尚貴天産也割刀之用而鸞刀之貴貴其義也聲和而后㫁也鼎俎奇而籩豆偶隂陽之義也籩豆之實水土之品也水土之品言非人之常食不敢用䙝味而貴多品所以交于旦明之義也旦當為神篆字之誤也並郊特牲王制曰賜圭瓉然後為鬯未賜鬯者資于天子圭瓉秬鬯宗廟之盛禮故孝道備而賜之秬鬯所以極著孝道孝道純備故内和外榮玉以象德金以配情芬香條鬯以通神靈玉飾其本君子之性金飾其中君子之道君子有黄中通理之道美素之徳金者精和之至也玉者美德之至也鬯者芬香之至也君子有玉瓉秬鬯者以配道德也其至矣合天下之極美以通其志也其為玉瓉秬鬯乎白虎通有以小為貴者宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角此以小為貴也凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散禮器夫鼎有銘銘者自名也自名以稱揚其先祖之美而明著之後世者也為先祖者莫不有美焉莫不有惡焉銘之義稱美而不稱惡此孝子孝孫之心也唯賢者能之銘謂書之刻之以識事者也自名謂稱揚其祖之德著已名于下銘者論譔其先祖之有德善功烈勲勞慶賞聲名列于天下而酌之祭器自成其名焉以祀其先祖者也顯揚先祖所以崇孝也身比焉順也明示後世教也烈業也王功曰勲事功曰勞酌之祭器言斟酌其美傳著於鍾鼎也身比焉謂自著名于下也順也自著名以稱揚先祖之德孝順之行也教也所以教後世夫銘者壹稱而上下皆得焉耳矣是故君子之觀于銘也既美其所稱又美其所為美其所為美此人為此銘為之者明足以見之仁足以與之知足以利之可謂賢矣賢而勿伐可謂恭矣明足以見之見其先祖之美也仁足以與之與其先祖之銘也非有仁恩君不使與之也知足以利之利己名得比于先祖故衞孔悝之鼎銘曰六月丁亥公假于大廟孔悝衞大夫也公衞荘公蒯聵也德孔悝之立已依禮褒之以静國人自固假至也至于大廟謂以夏之孟夏禘祭公曰叔舅乃祖荘叔左右成公成公乃命荘叔隨難于漢陽即宫于宗周奔走無射公曰叔舅者公為策書尊呼孔悝而命之也乃猶汝也荘叔悝七世之祖衞大夫孔達也隨難者謂成公為晉文公所伐出奔楚命荘叔從焉漢楚之川也即宫于宗周後反得國坐殺弟叔武晉人執而歸之于京師寘之深室也射厭也言荘叔常奔走至勞苦而不厭倦也周既去鎬京猶名王城為宗周也啟右獻公獻公乃命成叔纂乃祖服獻公衞侯衎成公曽孫也亦失國得反言荘叔之功流于後世啟右獻公使得反國也成叔荘叔之孫成子烝鉏也右助也纂繼也服事也獻公反國命成子繼女祖荘叔之事欲其忠如孔達也乃考文叔興舊耆欲作率慶士躬恤衞國其勤公家夙夜不解民咸曰休哉文叔者成叔之曽孫文子圉即悝父也作起也率循也慶善也士之言事也言文叔能興行先祖之舊德循其善事公曰叔舅予女銘若纂乃考服若乃猶女也公命悝予女先祖以銘以尊顯之女繼女父之事欲其忠如文子也成公獻公荘公皆失國得反言孔氏世有功焉寵之也悝拜稽首曰對揚以辟之對遂也辟明也言遂揚君命以明我先祖之德也勤大命施于烝彛鼎施猶著也言我将行君之命又刻著于烝祭之彛鼎彛尊也周禮大約劑書于宗彛此衞孔悝之鼎銘也言銘之類衆多也略取此一以言之古之君子論譔其先祖之美而明著之後世者也以比其身以重其國家如此如荘公命孔悝之為也荘公孔悝雖無令徳以終其事于禮是行之非子孫之守宗廟社稷者其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也昔者周公旦有勲勞于天下周公既沒成王康王追念周公之所以勲勞者而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也言此者王室所銘若周公之功夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也清廟頌文王之詩也管象吹管而舞武象之樂也朱干赤盾戚斧也此武象之舞所執也佾猶列也大夏禹樂文舞也執羽籥文武之舞皆八列互言之耳康褒大也易晉卦曰康侯用錫馬子孫纂之至於今不廢所以明周公之德而又以重其國也不廢不廢其此禮樂也重猶尊也祭統傅説曰黷于祭祀時謂弗欽禮煩則亂事神則難祭不欲數數則黷黷則不敬事神禮煩則亂而難行髙宗之祀特豐數近廟故説因以戒之命説子曰非其鬼而祭之諂也非其鬼謂非其所當祭之鬼諂求媚也為政季路問事鬼神子曰未能事人焉能事鬼先進子路曰吾聞諸夫子祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也祭主敬檀弓禮書綱目卷四十七
