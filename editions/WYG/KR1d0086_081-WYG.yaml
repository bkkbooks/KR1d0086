body:
  text: 禮書綱目巻七十九婺源江永撰少儀曲禮四補人生十年曰幼學名曰幼時始可學也内則曰十年出就外傅居宿於外學書計二十曰弱冠三十曰壯有室有室有妻也妻稱室四十曰强而仕五十曰艾服官政艾老也六十曰耆指使指事使人也六十不與服戎不親學七十曰老而傳傳家事任子孫是謂宗子之父八十九十曰耄耄惽忘也春秋傳曰謂老將至耄又及之七年曰悼悼憐愛也悼與耄雖有罪不加刑焉愛幼而尊老百年曰期頤期猶要也頤猶養也不知衣服食味孝子要盡養道而已朱子曰期當音居宜反論語期可已矣與朞字同周匝之義也期謂百年已周頤謂當養而已期如上句幼弱耄悼等字頤如上句學冠不刑等字曲禮幼名冠字五十以伯仲死諡周道也檀弓年長以倍則父事之謂年二十於四十者人年二十弱冠成人有為人父之端今四十於二十者有子道内則曰年二十惇行孝弟十年以長則兄事之五年以長則肩隨之肩隨者謂之並行差退羣居五人則長者必異席席以四人為節因宜有所尊曲禮右年齒差等幼子常視毋誑註見内則童子不衣裘裳裘大温消隂氣使不堪若不衣裳便易立必正方不傾聴習其自端正長者與之提攜則兩手奉長者之手習其扶持尊者提攜謂牽將行負劒辟咡詔之負謂置之于背劍謂挾之于旁辟咡詔之謂傾頭與語口旁曰咡則掩口而對習其鄉尊者屏氣也曲禮童子之節也緇布衣錦縁錦紳并紐錦束髮皆朱錦也童子未冠之稱也冠禮曰將冠者采衣紒也童子不裘不帛不屨絇無緦服聴事不麻無事則立主人之北南面見先生從人而入皆為幼小不備禮也雖不服緦猶免深衣無麻往給事也裘帛温傷壯氣也絇屨頭飾也玉藻小子走而不趨舉爵則坐祭立飲小子弟子也卑不得與賓介俱備禮容也尊長於己踰等不敢問其年踰等父兄黨也問年則已恭孫之心不全燕見不將命自不用賓主之正來則若子弟然遇於道見則面可以𨼆則𨼆不敢煩動也不請所之尊長所之或卑䙝喪俟事不犆弔亦不敢故煩動也事朝夕哭時侍坐弗使不執琴瑟不畫地手無容不翣也端慤所以為敬也尊長或使彈琴瑟則為之可寢則坐而將命命有所傳辭也坐者不敢臨之侍射則約矢不敢與之拾取也侍投則擁矢不敢釋於地也投投壺也投壺坐勝則洗而以請洗爵請行觴不敢直飲之客亦如之客射若投壺不勝主人亦洗而請之不角角謂觥罰爵也於尊長與客如獻酬之爵不擢馬擢去也謂徹也已徹馬嫌勝故薄之並少儀童子委摯而退不與成人為禮也曲禮適有喪者童子曰聽事曰某願聽事於將命者童子未成人不敢當相見之禮少儀右品節汜埽曰埽埽席前曰拚拚席不以鬛執箕膺擖詳見士相見禮凡為長者糞之禮必加帚於箕上如是得兩手奉箕㳟也謂初執而往時也弟子職曰執箕膺擖厥中有帚以袂拘而退其塵不及長者謂埽時也以袂擁帚之前埽而郤行之以箕自鄉而扱之扱讀曰吸謂収糞時也箕去棄物以鄉尊者則不㳟奉席如橋衡橫奉之令左昂右低如有首尾然橋井上㮮槔衡上低昂請席何鄉請衽何趾順尊者所安也衽臥席也坐問鄉臥問趾因於陰陽席南鄉北鄉以西方為上東鄉西鄉以南方為上布席無常此其順之也上謂席端也坐在陽則上左坐在陰則上右見父之執不謂之進不敢進不謂之退不敢退不問不敢對敬父同志如事父此孝子之行也謀於長者必操几杖以從之從猶就也長者問不辭讓而對非禮也當謝不敏若曽子之為從於先生不越路而與人言尊不二也先生老人教學者遭先生於道趨而進正立拱手為有教使先生與之言則對不與之言則趨而退為其不欲與己並行從長者而上丘陵則必鄉長者所視為逺視不察有所問將即席容毋怍怍謂顔色變也兩手摳衣去齊尺齊謂裳下緝也衣毋撥撥𤼵揚貌足毋蹶蹶行遽貌先生書䇿琴瑟在前坐而遷之戒勿越廣敬也在前謂當行之前虚坐盡後謙也食坐盡前為汙席坐必安執爾顏執猶守也長者不及毋儳言儳猶暫也非類雜正爾容聴必恭聴先生之言既説又敬毋勦説勦猶擥也謂取人之説以為己説毋雷同雷之𤼵聲物無不同時應者人之言當各由己不當然也孟子曰人無是非之心非人也必則古昔稱先王言必有依毋踐屨毋踖席摳衣趨隅必慎唯諾趨隅升席必由下也慎唯諾者不先舉見問乃應侍坐於先生先生問焉終則對不敢錯亂尊者之言請業則起請益則起尊師重道也起若今摳衣前請也業謂篇卷也益謂受説不解了欲師更明説之子路問政子曰先之勞之請益曰無倦父召無諾先生召無諾唯而起應辭唯恭于諾侍坐于所尊敬毋餘席必盡其所近尊者之端為有後來者見同等不起不為私敬燭至起異晝夜食至起為饌變上客起敬尊者燭不見跋跋本也燭盡則去之嫌若燼多有厭倦尊客之前不叱狗主人於尊客之前不敢倦嫌若風去之讓食不唾嫌有穢惡並曲禮洗盥執食飲者勿氣有問焉則辟咡而對示不敢歆􅆨也少儀侍坐於君子君子問更端則起而對離席對敬異事也君子必令復坐侍于君子不顧望而對非禮也禮尚謙也不顧望若子路率爾而對長者賜少者賤者不敢辭不敢亢禮也賤者僮僕之屬侍坐于君子若有告者曰少間願有復也則左右屏而待復白也言欲須少空閒有所白也屏猶退也𨼆也毋側聴嫌探人之私也側聴耳屬于垣毋噭應毋淫視毋怠荒遊毋倨立毋跛坐毋箕寝毋伏歛髮毋髢冠毋免勞毋袒暑毋褰裳皆為其不敬噭號呼之聲也淫視睇眄也怠荒放散身體也跛偏任也伏覆也髢髲也毋垂餘如髲也免去也褰或為肄侍坐於長者屨不上于堂屨賤空則不陳于尊者之側解屨不敢當階為妨後升者就屨跪而舉之屏於側謂獨退也就猶著也屏亦不當階鄉長者而屨跪而遷屨俯而納屨謂長者送之也不得屏遷之而已俯俛也納内也遷或為還並曲禮排闔説屨於户内者一人而已矣雖衆敵猶有所尊也有尊長在則否在在内也後來之衆皆説屨于户外少儀凡侍坐於君子君子欠伸問日之早晏以食具告改居則請退可也夜侍坐問夜膳葷請退可也詳見士相見禮侍坐於君子君子欠伸撰杖屨視日蚤莫侍坐者請出矣以君子有倦意也撰猶持也曲禮侍坐於君子君子欠伸運笏澤劒首還屨問日之蚤莫雖請退可也以此皆解倦之状伸頻伸也運笏謂玩㺯也金器㺯之易以汙澤少儀請見不請退去止不敢自由同上右灑埽應對進退燕侍食於君子則先飯而後已所以勸也毋放飯毋流歠小飯而亟之亟疾也備噦噎若見問也數噍毋為口容口容㺯口少儀侍食於先生異爵者後祭先飯謙也玉藻侍食於長者主人親饋則拜而食勸長者食耳雖賤不得執食興辭拜而已示敬也主人不親饋則不拜而食以其禮於已不隆曲禮凡食果食者後君子陰陽所成非人事也火食者先君子備火齊不得也玊藻食􅀥桃李弗致於核㳟也𤓰祭上環食中棄所操上環頭忖也同上侍飲于長者酒進則起拜受於尊所降席拜受敬也燕飲之禮鄉尊長者辭少者反席而飲長者舉未釂少者不敢飲不敢先尊者盡爵曰釂燕禮曰公卒爵而後飲也御同于長者雖貳不辭謂侍食于長者饌具與之同也貳謂重殽膳也辭之為長者嫌偶坐不辭盛饌不為己並曲禮右侍食弟子職曲禮五補出管子先生施敎弟子是則温恭自虚所受是極必虚其心然後能有所容極謂盡其本原也見善從之聞義則服温柔孝弟毋驕恃力驕而恃力則羝羊觸藩志無虚邪行必正直游居有常必就有德虚謂虚偽顔色整齊中心必式夙興夜寐衣帶必飭式法也朝益暮習小心翼翼一此不懈是謂學則右學則少者之事夜寐蚤作既拚盥潄執事有恪埽席前曰拚盥潔手潄滌口攝衣共盥先生乃作沃盥徹盥汛拚正席共盥謂共先生之盥器也徹盥謂既盥而徹盥器也汎拚謂廣拚内外不止席前也先生乃坐出入恭敬如見賓客危坐鄉師顔色毋怍怍謂變其容貌右蚤作受業之紀必由長始一周則然其餘則否謂先從長者教之一周之外則不必然始誦必作其次則已始誦而作以敬事端也至于次誦則不必然凡言與行思中以為紀古之將興者必由此始中者無過不及之名以此為紀綱然後可興也後至就席狹坐則起狹坐之人見後至者則當起若有賓客弟子駿作對客無讓應且遂行趨進受命所求雖不得必以反命駿作迅起也對客無讓者供給使令不敢亢禮也受命為先生命求雖不得必以反白反坐復業若有所疑捧手問之師出皆起至于食時右受業對客先生將食弟子饌饋攝衽盥潄跪坐而饋置醬醋食陳膳毋悖饋謂選具其食凡置彼食鳥獸魚鼈必先菜羹先菜後肉食之次也羹胾中别胾在醬前其設要方胾謂肉之細者遠胾近醬食之便也其陳設食器要令成方也飯是為卒既飯而食則卒也左酒右醬是謂胾也禮三反乃食胾而辯殽皆畢又用酒以酳用漿以潄故言飯胾而食終乃言酒漿明在胾外也鄭注二禮兩引此文皆作漿字又此上文已云胾在醬前則此醬不應復在胾外矣今文誤也告具而退捧手而立三飯二斗左執虚豆右執挾匕周還而貳唯嗛之視同嗛以齒周則有始柄尺不跪是謂貳紀三飯食必設二斗也挾猶箸也匕所以載鼎實者貳謂再益也食盡曰嗛視有盡者則益之齒次序也如菜肉同盡則先益菜後益肉也豆有柄長尺則立而進之此是再益之綱紀也先生已食弟子乃徹趨走進潄拚前斂祭既食畢埽席前并搜斂所祭也右饌饋先生有命弟子乃食以齒相要坐必盡席所謂食坐盡前恐汚席也飯必捧擥羹不以手亦有據膝無有𨼆肘既食乃飽循咡覆手不以手當以梜也隠肘則太伏也咡口也覆手而循之所以拭其不潔也振衽埽席已食者作摳衣而降旋而鄉席各徹其餽如於賓客既徹并器乃還而立振衽埽席謂振其衣祍以拂席之汚賓客食畢亦自徹其餽并謂藏去也右乃食凡拚之道實水于盤攘臂袂及肘堂上則播灑室中握手執箕膺揲厥中有帚攘袂者恐濕其􅃑且不便於事故也堂上寛故播散而灑室中隘握手為掬以灑揲舌也既灑水將拚之故執箕以舌自當而置帚于箕中也入户而立其儀不貸執帚下箕倚于户側謂倚箕于户側凡拚之紀必由奥始西南隅也俯仰磬折拚毋有徹徹動也不得觸動他物也拚前而退聚於户内從前埽而却退聚其所埽穢壤於户内也坐板排之以葉適已實帚于箕板穢時以手排之適已向已也先生若作乃興而辭以拚未畢故辭之令止也坐執而立遂出弃之既拚反立是協是稽協合也稽考也謂合書考義也右灑埽暮食復禮謂復朝食之禮昬將舉火執燭隅坐錯總之法橫于坐所櫛之逺近乃承厥火總束也古者束薪蒸以為燭故謂之總其未然者則橫于坐之所也櫛謂燭盡察其將盡之遠近乃更以燭承取火也居句如矩蒸閒容蒸然者處下捧椀以為緒句曲也舊燭既盡則更使人以新燭繼之一橫一直其兩端相接之處勢曲如矩則方正不邪也蒸細薪也言稍寛其束使其蒸間可以各容一蒸以通大氣又使已然者居下未然者居上則火易然也緒燭燼也椀所以貯緒也右手執燭左手正櫛有墮代燭交坐無倍尊者乃取厥櫛遂出是去先執燭者既捧椀以貯節之餘緒遂以左手正櫛而投其緒於椀中至其櫛漸短有墮而不可執者則後執燭者代之而交坐於其處前執燭者乃取櫛而出弃之也右執燭先生将息弟子皆起敬奉枕席問所欲趾俶衽則請有常則否俶始也變其祍席則當問其所趾若有常處則不請也右請祍先生既息各就其友相切相磋各長其儀周則復始是謂弟子之紀右退習事師無犯無𨼆左右就養無方服勤至死心喪三年心喪戚容如父而無服也凡此以恩義之間為制檀弓宦學事師非禮不親詳見曲禮禮書綱目卷七十九
