body:
  text: 禮書綱目卷二婺源江永撰士昬禮嘉禮三經鄭目録云士娶妻之禮以昬為期因而名焉必以昬者陽徃而隂来日入三商為昬於五禮屬嘉禮焉昬禮下逹納采用鴈逹通逹也将欲與彼合昬姻必先使媒氏下通其言女氏許之後乃使人納其采擇之禮詩云娶妻如之何匪媒不得昬必由媒交接設紹介皆所以飬亷恥納采而用鴈為摯者取其順隂陽徃來主人筵於戸西西上右几主人女父也筵為神布席也戸西者尊處将以先祖之遺體許人故受其禮于禰廟也席西上右設几神不統於人席有首尾使者𤣥端至使者夫家之屬若羣吏使徃来者𤣥端士莫夕之服又服以事其廟有司緇裳擯者出請事入告擯者有司佐禮者請問也禮不必事雖知猶問之重慎也主人如賓服迎於門外再拜賓不答拜揖入門外大門外不答拜者奉使不敢當其盛禮至於廟門揖入三揖至於階三讓入三揖者至内霤将曲揖既曲北面揖當碑揖主人以賓升西面賓升西階當阿東面致命主人阼階上北面再拜阿棟也入堂深示親親今文阿為庪授於楹間南面授於楹間明為合好其節同也南面並授也賓降出主人降授老鴈老羣吏之尊者右納采記士昬禮凡行事必用昬昕受諸禰廟用昕使者用昬壻也宗子無父母命之親皆沒已躬命之宗子者適長子也命之命使者母命之在春秋紀裂繻来逆女是也躬猶親也親命之則宋公使公孫壽来納幣是也言宗子無父是有有父者禮七十老而傳八十齊䘮之事不及若是者子代其父為宗子其取也父命之支子則稱其宗支子庶昆弟也稱其宗子命使者弟則稱其兄弟宗子母弟辭無不腆無辱腆善也賓不稱幣不善主人不謝来辱摯不用死摯鴈也昬辭曰吾子有惠貺室某也昬辭擯者請事告之辭吾子謂女父也稱有惠明下逹貺賜也室猶妻也某壻名某有先人之禮使某也請納采某壻父名也某也使名也對曰某之子惷愚又弗能教吾子命之某不敢辭對曰者擯出納賓之辭某女父名也吾子謂使者古文弗為不無能字致命曰敢納采擯者出請不必賓之事有無賓執鴈請問名主人許賓入授如初禮問名者将歸卜其吉凶古文禮為醴右問名記問名主人受鴈還西面對賓受命乃降受鴈於兩楹間南面還於阼階上對賓以女名問名曰某既受命将加諸卜敢請女為誰氏某使者名也誰氏者謙也不必其主人之女對曰吾子有命且以備數而擇之某不敢辭卒曰某氏不記之者明為主人之女擯者出請賓告事畢入告出請醴賓此醴亦當為禮禮賓者欲厚之賓禮辭許禮辭一辭主人徹几改筵東上側尊甒醴於房中徹几改筵者鄉為神今為人側尊亦言無𤣥酒側尊於房中亦有篚有籩豆如冠禮之設主人迎賓於廟門外揖讓如初升主人北面再拜賓西階上北面答拜主人拂几授挍拜送賓以几辟北面設於坐左之西階上答拜拂拭也拭几者尊賓新之也挍几足辟逡遁古文挍為枝賛者酌醴加角柶面葉出於房賛佐也佐主人酌事也賛者亦洗酌加迎角柶覆之如冠禮矣出房南面待主人受古文葉作擖主人受醴面枋筵前西北面賓拜受醴復位主人阼階上拜送主人西北面疑立待賓即筵也賓復位於西階上北面明相尊敬此筵不主為飲食起賛者薦脯醢薦進賓即筵坐左執觶祭脯醢以柶祭醴三西階上北面坐啐醴建柶興坐奠觶遂拜主人答拜即就也左執觶則祭以右手也凡祭於脯醢之豆間必所為祭者謙敬示有所先也啐嘗也嘗之者成主人意建猶扱也興起也奠停也賔即筵奠於薦左降筵北面坐取脯主人辭薦左籩豆之東降下也自取脯者尊主人之賜将歸執以反命辭者辭其親徹賓降授人脯出主人送於門外再拜人謂使者從者授於階下西面然後出去右醴賓記醴曰子為事故至於某之室某有先人之禮請醴從者言從者謙不敢斥也今文於為于對曰某既得将事矣敢辭将行先人之禮敢固以請主人辭固如故某辭不得命敢不從也賓辭也不得命者不得許已之命祭醴始扱壹祭又扱再祭賓右取脯左奉之乃歸執以反命反命謂使者問名納吉納徴請期還報於壻父凡使者歸反命曰某既得将事矣敢以禮告告禮所執脯主人曰聞命矣納吉用鴈如納采禮歸卜於廟得吉兆復使使者徃告婚姻之事於是定右納吉記納吉曰吾子有貺命某加諸卜占曰吉使某也敢告貺賜也賜命謂許以女名也某壻父名對曰某之子不教唯恐弗堪子有吉我與在某不敢辭與猶兼也古文與為豫納徴𤣥纁束帛儷皮如納吉禮徴成也使使者納幣以成昬禮用𤣥纁者象隂陽備也束帛十端也周禮曰凡嫁女娶妻入幣帛無過五兩儷兩也執束帛以致命兩皮為庭實皮鹿皮今文纁皆作熏右納徴記納徴執皮攝之内文兼執足左首隨入西上参分庭一在南攝猶辟也兼執足者左手執前兩足右手執後兩足左首象生曲禮曰執禽者左首随入為門中阨狹西上中庭位併賓致命釋外足見文主人受幣士受皮者自東出於後自左受遂坐攝皮逆退適東壁賓致命主人受幣庭實所用為節士謂若中士下士不命者以主人為官長自由也皮帛必可制皮帛儷皮束帛也納幣一束束五兩兩五㝷納幣謂昬禮納徴也十个為束貴成數兩兩者合其卷是謂五兩八尺曰尋五兩五㝷毎卷二丈也合之則四十尺今謂之匹猶匹偶之云與雜記納徴曰吾子有嘉命貺室某也某有先人之禮儷皮束帛使某請納徴致命曰某敢納徴對曰吾子順先典貺某重禮某不敢辭敢不承命典常也法也女子許嫁笄而醴之稱字許嫁已受納徴禮也笄女之禮猶冠男也使主婦女賓執其禮祖廟未毁教於公宫三月若祖廟已毁則教於宗室祖廟女髙祖為君者之廟也以有緦麻之親就尊者之宫教以婦徳婦言婦容婦功宗室大宗之家女子許嫁纓女子許嫁繫纓有從人之端也曲禮教以婦徳婦言婦容婦功教成祭之牲用魚芼之以蘋藻詳見昬義請期用鴈主人辭賓許告期如納徴禮主人辭者陽倡隂和期日宜由夫家来也夫家必先卜之得吉日乃使使者徃辭即告之右請期記請期曰吾子有賜命某既申受命矣惟是三族之不虞使某也請吉日三族謂父昆弟己昆弟子昆弟虞度也不億度謂卒有死䘮此三族者己及子皆為服期期服則踰年欲及今之吉也雜記曰大功之末可以冠子嫁子對曰某既前受命矣唯命是聽前受命者申前事也曰某命某聽命於吾子曰某壻父名也對曰某固唯命聽使者曰某使某受命吾子不許某敢不告期曰某日某吉日之甲乙對曰某敢不敬湏湏待也期初昬陳三鼎於寢門外東方北面北上其實特豚合升去蹄舉肺脊二祭肺二魚十有四腊一肫髀不升皆飪設扄鼏期取妻之日鼎三者升豚魚腊也寢壻之室也北面鄉内也特猶一也合升合左右胖升於鼎也去蹄蹄甲不用也舉肺脊者食時所先舉也肺者氣之主也周人尚焉脊者體之正也食時則祭之飯必舉之貴之也每皆二者夫婦各一耳凡魚之正十五而鼎減一為十四者欲其敵偶也腊兎腊也肫或作純純全也凡腊用全髀不升者近竅賤也飪孰也扄所以扛鼎鼏覆之古文純為鈞髀為脾今文扄作鉉鼏皆作密設洗於阼階東南洗所以承盥洗之器棄水者饌於房中醯醤二豆菹醢四豆兼巾之黍稷四敦皆盖醯醤者以醯和醤生人尚褻味兼巾之者六豆共巾也巾為禦塵盖為尚溫周禮曰食齊視春時大羮湇在㸑大􅃵湇煮肉汁也大古之􅃵無塩菜㸑火上周禮曰􅃵齊視夏時今文湇皆作汁尊於室中北墉下有禁𤣥酒在西綌幂加勺皆南枋墉牆也禁所以庪甒者𤣥酒不㤀古也綌粗葛今文枋作柄尊於房戸之東無𤣥酒篚在南實四爵合卺無𤣥酒者畧之也夫婦酌於内尊其餘酌於外尊合卺破匏也四爵兩卺凡六為夫婦各三酳一升曰爵右陳器饌記腊必用鮮魚用鮒必殽全殽全者不餒敗不剥傷主人爵弁纁裳緇袘從者畢𤣥端乗墨車從車二乗執燭前馬主人壻也壻為父主爵弁而纁裳𤣥冕之次大夫以上親迎冕服冕服迎者鬼神之鬼神之者所以重之親之纁裳者衣緇衣不言衣與帶而言袘者空其文明其與袘俱用緇袘謂緣袘之言施以緇緣裳象陽氣下施從者有司也乗二車從行者也畢猶皆也墨車漆車士而乗墨車攝盛也執燭前馬使從役持炬火居前照道婦車亦如之有裧亦如之者車同等士妻之車夫家共之大夫以上嫁女則自以車送之裧車裳幃周禮謂之容車有容則固有盖至於門外婦家大門之外主人筵於戸西西上右几主人女父也筵為神布席女次純衣纁袇立於房中南面次首餙也今時髲也周禮追師掌為副編次純衣絲衣女從者畢袗𤣥則此衣亦𤣥矣袇亦緣也袇之言任也以纁緣其衣象隂氣上任也凡婦人不常施袇之衣盛昬禮為此服䘮大記曰復衣不以袇明非常姆纚笄宵衣在其右姆婦人年五十無子出而不復嫁能以婦道教人者若今時乳母纚縚髮笄今時簮也纚亦廣充幅長六尺宵讀為詩素衣朱綃之綃魯詩以綃為綺屬也姆亦𤣥衣以綃為領因以為名且相别耳姆在女右當詔以婦禮女從者畢袗𤣥纚笄被顈黼在其後女從者謂姪娣也詩諸娣從之祁祁如雲袗同也同𤣥者上下皆𤣥也顈禪也詩云素衣朱襮爾雅云黼領謂之襮周禮曰白與黒謂之黼天子諸侯后夫人狄衣卿大夫之妻刺黼以為領如今偃領矣士妻始嫁施禪黼於領上假盛餙耳言被明非常服主人𤣥端迎於門外西面再拜賓東面答拜賓壻主人揖入賓執鴈從至於廟門揖入三揖至於階三讓主人升西面賓升北面奠鴈再拜稽首降出婦從降自西階主人不降送賓升奠鴈拜主人不答明主為授女耳主人不降送禮不参壻御婦車授綏姆辭不受壻御者親而下之綏所以引升車者曲禮曰僕人之禮必授人綏婦乗以几姆加景乃驅御者代乗以几者尚安舒也景之制盖如明衣加之以為行道禦塵令衣鮮明也景亦明也驅行也行車輪三周御者乃代壻今文景作憬壻乗其車先俟於門外壻車在大門外乗之先者道之也男率女女從男夫婦剛柔之義自此始也俟待也門外婿家大門外右親迎記父醮子子壻也命之辭曰徃迎爾相承我宗事相助也宗事宗廟之事朂帥以敬先妣之嗣若則有常朂勉也若猶女也勉帥婦道以敬其為先妣之嗣女之行則當有常深戒之詩曰大姒嗣徽音子曰諾唯恐弗堪不敢㤀命賓至擯者請對曰吾子命某以兹初昬使某将請承命賓壻也命某某壻父名兹此也将行也使某行昬禮來迎對曰某固敬具以湏父醴女而俟迎者母南面於房外女既次純衣父醴之於房中南面盖母薦焉重昬禮也女奠爵於薦東立於位而俟壻至父出使擯者請事母出南面房外示親授壻且當戒女也女出於母左父西面戒之必有正焉若衣若笄母戒諸西階上不降必有正焉者以託戒之使不㤀父送女命之曰戒之敬之夙夜無違命夙早也早起夜卧命舅姑之教命古文母為無母施衿結帨曰勉之敬之夙夜無違宫事帨佩巾庶母及門内施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸衿鞶庶母父之妾也鞶鞶嚢也男鞶革女鞶絲所以盛帨巾之屬為謹敬申重也宗尊也愆過也諸之也示之以衿鞶者皆託戒使識之也不示之以衣笄者尊者之戒不嫌㤀之視乃正字今文作示俗誤行之女子之嫁也母命之徃送之門戒之曰徃之女家必敬必戒無違夫子女家夫家也婦人内夫家以嫁為歸也夫子夫也孟子婿受綏姆辭曰未教不足與為禮也姆教人者婦乗以几從者二人坐持几相對持几者重慎之御婦車御輪三周詳見昬義婦至主人揖婦以入及寢門揖入升自西階媵布席於奥夫入於室即席婦尊西南面媵御沃盥交升自西階道婦入也媵送也謂女從者也御當為迓迓迎也謂壻從者也媵沃壻盥於南洗御沃婦盥於北洗夫婦始接情有亷耻媵御交道其志賛者徹尊幂舉者盥出除鼏舉鼎入陳於阼階南西面北上七爼從設執七者執爼者從鼎而入設之匕所以别出牲體也爼所以載也北面載執而俟執爼而立俟豆先設七者逆退復位於門東北面西上執匕者事畢逆退由便至此乃著其位畧賤也賛者設醤於席前菹醢在其北爼入設於豆東魚次腊特於爼北豆東且醢之東賛設黍於醤東稷在其東設湇於醤南饌要方也設對醤於東對醤婦醤也設之當特爼菹醢在其南北上設黍於腊北其西稷設湆於醤北御布對席賛啟㑹卻於敦南對敦於北啟發也今文啟作開古文卻為綌賛告具揖婦即對筵皆坐皆祭薦黍稷肺賛者西面告饌具也壻揖婦使即席薦菹醢賛爾黍授肺脊皆食以湆醤皆祭舉食舉也爾移也移置席上便其食也皆食食黍也以用也用者謂用口啜湇用指􅖾醤古文黍作稷三飯卒食卒已也同牢示親不主為食起三飯而成禮也賛洗爵酌酳主人主人拜受賛戸内北面答拜酳婦亦如之皆祭酳潄也酳之言演也安也潄所以潔口且演安其所食酳酌内尊賛以肝從皆振祭嚌肝皆實於菹豆肝肝炙也飲酒宜有肴以安之卒爵皆拜賛答拜受爵再酳如初無從三酳用卺亦如之亦無從也賛洗爵酌於户外尊入戸西北面奠爵拜皆答拜坐祭卒爵拜皆答拜興賛酌者自酢也主人出婦復位復尊西南面之位乃徹於房中如設於室尊否徹室中之饌設於房中為媵御餕之徹尊不設有外尊也主人說服於房媵受婦說服於室御受姆授巾巾所以自潔清今文說作稅御衽於奥媵衽良席在東皆有枕北止衽卧席也婦人稱夫曰良孟子曰將瞷良人之所之止足也古文止作趾主人入親說婦之纓入者從房還入室也婦人十五許嫁笄而禮之因著纓明有繫也盖以五采為之其制未聞燭出昬禮畢将卧息媵餕主人之餘御餕婦餘賛酌外尊酳之外尊房户外之東尊媵侍於戸外呼則聞為尊者有所徴求今文侍作待右婦至記婦入寢門賛者徹尊徹幂酌𤣥酒三屬於尊棄餘水於堂下階間加勺屬注也𤣥酒涗水貴新昬禮又貴新故事至乃取之三注於尊中夙興婦沭浴纚笄宵衣以俟見夙早也昬明日之晨興起也俟待也待見於舅姑寢門之外古者命士以上年十五父子異宫質明賛見婦於舅姑席於阼階舅即席席於房外南面姑即席質平也房外房戸外之西古文舅皆作咎婦執笄棗栗自門入升自西階進拜奠於席笄竹器而衣者其形盖如今之筥􅠚籚矣進拜者進東面乃拜奠之者舅尊不敢授也舅坐撫之興答拜婦還又拜還又拜者還於先拜處拜婦人與丈夫為禮則俠拜降階受笲腵脩升進北面拜奠於席姑坐舉以興拜授人人有司姑執笲以起答婦拜授有司徹舅則宰徹之右婦見記笲緇被纁裏加於橋舅答拜宰徹笲被表也笲有衣者婦見舅姑以飾為敬橋所以屐笲其制未聞今文橋為鎬婦見舅姑兄弟姑姊妹皆立於堂下西面北上是見己婦來為供飬也其見主於尊者兄弟以下在位是為已見不得特見見諸父各就其寢旁尊也亦為見時不来雜記賛醴婦醴當為禮賛禮婦者以婦道新成親厚之席於戸牖間室戸西牖東南面位側尊甒醴於房中婦疑立於席西疑正立自定之貎賛者酌醴加柶面枋出房席前北面婦東面拜受賛西階上北面拜送婦又拜薦脯醢婦東面拜賛北面答之變於丈夫始冠成人之禮婦升席左執觶右祭脯醢以柶祭醴三降席東面坐啐醴建柶興拜賛答拜婦又拜奠於薦東北面坐取脯降出授人於門外奠於薦東升席奠之取脯降出授人親徹且榮得禮人謂婦氏人右醴婦記婦席薦饌於房詳見饗婦章舅姑入於室婦盥饋饋者婦道既成成以孝養特豚合升側載無魚腊無稷並南上其他如取女禮側載者右胖載之舅爼左胖載之姑爼異尊卑並南上者舅姑共席於奥其饌各以南為上其他謂醤湇菹醢女謂婦也如取婦同牢時今文並當作併婦賛成祭卒食一酳無從賛成祭者授處之今文無成也席於北牖下牖牆也室中北牆下婦徹設席前如初西上婦餕舅辭易醤婦餕者即席将餕也辭易醤者嫌淬汙婦餕姑之饌御賛祭豆黍肺舉肺脊乃食卒姑酳之婦拜受姑拜送坐祭卒爵姑受奠之奠之奠於篚婦徹於房中媵御餕姑酳之雖無娣媵先於是與始飯之錯古者嫁女必姪娣從謂之媵姪兄之子娣女弟也娣尊姪卑若或無娣猶先媵客之也始飯謂舅姑錯者媵餕舅餘御餕姑餘也古文始為姑右婦饋舅姑共饗婦以一獻之禮舅洗於南洗姑洗於北洗奠酬以酒食勞人曰饗南洗在庭北洗在北堂設兩洗者獻酬酢以潔清為敬奠酬者明正禮成不復舉凡酬酒皆奠於薦左不舉其燕則更使人舉爵舅姑先降自西階婦降自阼階授之室使為主明代己歸婦俎於婦氏人言俎則饗禮有牲矣婦氏人丈夫送婦者使有司歸以婦爼當以反命於女之父母明其得禮也右饗婦記婦席薦饌於房醴婦饗婦之席薦也饗婦姑薦焉舅姑共饗婦舅獻爵姑薦脯醢婦洗在北堂直室東隅篚在東北面盥洗在北堂所謂北洗北堂房中半以北洗南北直室東隅東西直房戸與隅間婦酢舅更爵自薦更爵男女不相因也不敢辭洗舅降則辟於房不敢拜洗不敢與尊者為禮凡婦人相饗無降姑饗婦人送者於房無降者以北洗篚在上庶婦則使人醮之婦不饋庶婦庶子之婦也使人醮之不饗也酒不酬酢曰醮亦有脯醢適婦酌之以醴尊之庶婦酌之以酒卑之其儀則同不饋者共飬統於適也舅饗送者以一獻之禮酬以束錦送者女家有司也爵至酬賓又從之以束錦所以相厚古文錦皆作帛姑饗婦人送者酬以束錦婦人送者𨽻子弟之妻妾凡饗速之若異邦則贈丈夫送者以束錦贈送也就賓館右饗送者若舅姑既沒則婦入三月乃奠菜沒終也奠菜者以篚祭菜也蓋用堇席於廟奥東靣右几席於北方南面廟考妣之廟北方牖下祝盥婦盥於門外婦執笲菜祝帥婦以入祝告稱婦之姓曰某氏來婦敢奠嘉菜於皇舅某子帥道也入入室也某氏者齊女則曰姜氏魯女則曰姬氏來婦言來為婦嘉美也皇君也婦拜扱地坐奠菜於几東席上還又拜如初扱地手至地也婦人扱地猶男子稽首婦降堂取笲菜入祝曰某氏來婦敢告於皇姑某氏奠菜於席如初禮降堂階上也室事交乎戸今降堂者敬也於姑言敢告舅尊於姑婦出祝闔牖戸凡廟無事則閉之老醴婦於房中南面如舅姑醴婦之禮因於廟見禮之壻饗婦送者丈夫婦人如舅姑饗禮右廟見記婦入三月然後祭行入夫之室三月之後於祭乃行謂助祭也若不親迎則入三月然後壻見曰某以得為外昬姻請覿女氏稱昬婿氏稱姻覿見也主人對曰某以得為外昬姻之數某之子未得濯溉於祭祀是以未敢見今吾子辱請吾子之就宫某将走見主人女婦也以白造緇曰辱對曰某以非他故不足以辱命請終賜見非他故彌親之辭命謂将走見之言今文無終賜對曰某以得為昬姻之故不敢固辭敢不從不言外亦彌親之辭今文曰外昬姻主人出門左西面壻入門東面奠摯再拜出出門出内門入門入大門出内門不出大門者異於賓客也壻見於寢奠摯者壻有子道不敢授也摯雄擯者以摯出請受欲使以賓客禮相見也壻禮辭許受摯入主人再拜受壻再拜送出出已見女父見主婦主婦闔扉立於其内主婦主人之婦也見主婦者兄弟之道宜相親也闔扉者婦人無外事扉左扉壻立於門外東面主婦一拜壻答再拜主婦又拜壻出必先一拜者婦人於丈夫必俠拜主人請醴及揖讓入醴以一獻之禮主婦薦奠酬無幣及與也無幣異於賓客壻出主人送再拜右壻見婦之父母記補昬義嘉禮四昬禮者将合二姓之好上以事宗廟而下以繼後世也故君子重之是以昬禮納采問名納吉納徴請期皆主人筵几於廟而拜迎於門外入揖譲而升聼命於廟所以敬慎重正昬禮也聼命謂主人聼使者所傳壻家之命父親醮子而命之迎男先於女也子承命以迎主人筵几於廟而拜迎於門外壻執鴈入揖譲升堂再拜奠鴈盖親受之於父母也降出御婦車而壻授綏御輪三周先俟於門外婦至壻揖婦以入共牢而食合卺而酳所以合體同尊卑以親之也酌而無酬酢曰醮醮之禮如冠醮與其異者於寢耳壻御婦車輪三周御者代之壻自乗其車先道之歸也共牢而食合卺而酳成婦之義敬慎重正而后親之禮之大體所以成男女之别而立夫婦之義也男女有别而后夫婦有義夫婦有義而后父子有親父子有親而后君臣有正故曰昬禮者禮之本也言子受氣性純則孝孝則忠也夙興婦沭浴以俟見質明賛見婦於舅姑執笲棗栗腵脩以見賛醴婦婦祭脯醢祭醴成婦禮也成其為婦之禮也賛醴婦當作禮聲之誤也舅姑入室婦以特豚饋明婦順也以饋明婦順者供養之禮主於孝順厥明舅姑共饗婦以一獻之禮奠酬舅姑先降自西階婦降自阼階以著代也言既獻之而授之以室事也降者各還其燕寢婦見及饋饗於適寢昬禮不言厥明此言之者容大夫以上禮多或異日成婦禮明婦順又申之以著代所以重責婦順焉也婦順者順於舅姑和於室人而后當於夫以成絲麻布帛之事以審守委積盖藏室人謂女姑女叔諸婦也當猶稱也後言稱夫者不順舅姑不和室人雖有善者猶不為稱夫也是故婦順備而后内和理内和理而后家可長久也故聖王重之順備者行和當事成審也是以古者婦人先嫁三月祖廟未毁教於公宫祖廟既毁教於宗室教以婦徳婦言婦容婦功教成祭之牲用魚芼之以蘋藻所以成婦順也謂天子諸侯同姓者嫁女必就尊者教成之教成之者女師也祖廟女所出之祖也公君也宗室宗子之家也婦徳貞順也婦言辭令也婦容婉娩也婦功絲麻也祭之祭其所出之祖也魚蘋藻皆水物隂類也魚為爼寔蘋藻為菜􅃵祭無牲牢告事耳其齊盛用黍云君使有司告之宗子之家若其祖廟已毁則為壇而告焉昬義天地合而后萬物興焉夫昬禮萬世之始也取於異姓所以附遠厚别也同姓或取多相褻也幣必誠辭無不腆誠信也腆猶善也告之以直信直猶正也此二者所以教婦正直信也信事人也信婦徳也事猶立也壹與之齊終身不改故夫死不嫁齊謂共牢而食同尊卑也齊或為醮男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也先謂倡道也執摯以相見敬章别也言不敢相褻也摯所奠鴈也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安言人倫有别則氣性醇也無别無義禽獸之道也言聚麀之亂類也壻親御授綏親之也親之也者親之也言己親之所以使之親己敬而親之先王之所以得天下也先王若太王文王出乎大門而先男帥女女從男夫婦之義由此始也先者居車前也婦人從人者也㓜從父兄嫁從夫夫死從子從謂順其教令無違逆也夫也者夫也夫也者以智帥人者也夫之言丈夫也夫或為傅𤣥冕齊戒鬼神隂陽也将以為社稷主為先祖後而可以不致敬乎𤣥冕祭服也隂陽謂夫婦也共牢而食同尊卑也故婦人無爵從夫之爵坐以夫之齒爵謂夫命為大夫則妻為命婦器用陶匏尚禮然也此謂大古之禮器也三王作牢用陶匏言太古無共牢之禮三王之世作之而用大古之器重夫婦之始也厥明婦盥饋舅姑卒食婦餕餘私之也私之猶言㤙也舅姑降自西階婦降自阼階授之室也明當為家事之主也昬禮不用樂幽隂之義也樂陽氣也幽深也欲使婦深思其義不以陽散之也昬禮不賀人之序也序猶代也郊特牲日月以告君周禮凡取判妻入子者媒氏書之以告君謂此也齊戒以告鬼神昬禮凡受女之禮皆於廟為神席以告鬼神謂此也為酒食以召鄉黨僚友㑹賓客也以厚其别也厚重慎也曲禮孔子曰嫁女之家三夜不息燭思相離也親骨肉也取婦之家三日不舉樂思嗣親也重世變也三月而廟見稱來婦也擇日而祭於禰成婦之義也謂舅姑沒者也必祭成婦義者婦有共飬之禮猶舅姑存時盥饋特豚於室曽子問子云夫禮坊民所淫章民之别使民無嫌以為民紀者也滛猶貪章明也嫌嫌疑也故男女無媒不交無幣不相見恐男女之無别也重男女之㑹所以逺别之於禽獸也有幣者必有媒有媒者不必有幣仲春之月㑹男女之時不必待幣以此坊民民猶有自獻其身獻進也昏禮壻親迎見於舅姑舅姑承子以授壻恐事之違也舅姑妻之父母也妻之父為外舅妻之母為外姑父戒女曰夙夜無違命母戒女曰無違宫事以此坊民婦猶有不至者不至不親夫以孝舅姑也春秋成公九年春二月伯姬歸於宋夏五月季孫行父如宋致女是時宋共公不親迎恐其有違而致之也坊記昏姻之禮所以明男女之别也昬姻謂嫁取也壻曰昬妻曰姻昏姻之禮廢則夫婦之道苦而淫辟之罪多矣苦謂不至不答之屬經觧孔子曰凡民滛亂者生於男女無别男女無别則夫婦失義昬禮聘饗者所以别男女明夫婦之義也男女既别夫婦既明故雖有滛亂之獄而無䧟刑之民其有犯滛亂之獄者則飭昬聘之禮家語子張曰女子必漸乎二十而後嫁何也孔子曰十五許嫁而從夫是陽動而隂應男唱而女随之義也以為繢組紃織絍者女子之所有事也黼黻文章之美婦人之所有大功也必十五以徃漸乎二十然後可以通乎此事通乎此事然後乃能孝於舅姑下以事夫飬子也孔叢子哀公問於孔子曰禮男必三十而有室女必二十而有夫也豈不晚哉孔子對曰夫禮言其極也不是過也男子二十冠有為人父之端女子十五許嫁有適人之道於此而徃則為昬矣羣生閉藏乎隂而為化育之始隂謂冬也冬藏物而為化育始故聖人因時以合偶男女窮天數也窮極也霜降而婦功成嫁娶者行焉季秋霜降嫁娶者始於此詩云将子無怒秋以為期也氷泮而農桑起㛰禮而殺於此泮散也正月農事起蚕者採桑昬禮始殺言未止也至於二月農事始起㑹男女之無夫家者奔者期盡此月也詩云士如歸妻迨氷未泮言如欲使妻歸當及氷未泮散之時男子者任天道而長萬物者也知可為知不可為知可言知不可言知可行知不可行者也是故審其倫而明其别謂之知所以効匹夫之聼也聼宜作徳女子者順男子之教而長其理者也為男子長飬其理分是故無專制之義而有三從之道㓜從父兄既嫁從夫夫死從子言無再醮之端始嫁言醮禮無再醮之端言不改事人所以謂夫死不嫁教令不出於閨門事在供飲食而已無閫外之非儀也閫門限婦人以自專無閫外之威儀詩云無非無儀唯酒食是議孟子之母曰婦人之職精五飯幂五漿飬舅姑縫衣裳而已故有閨門之修而無閫外之志不越境而奔䘮事無擅為行無獨成参知而後動可騐而後言晝不遊庭夜行以火所以効匹婦之徳也孔子遂言曰女有五不取逆家子者謂其逆徳也何休曰廢人倫也亂家子者謂其亂倫何休曰類不正也世有刑人者謂其棄於人也有惡疾子者謂其棄於天也䘮父長子何休作䘮父長女謂其無受命也何休曰無教戒也婦有七出三不去七出者不順父母出者謂其逆徳也無子者謂其絶世也婬僻者謂其亂族嫉妬者謂其亂家惡疾者謂其不可供粢盛多口舌者謂其離親竊盗者謂其反義三不去者謂其有所取無所歸一也何休取作受又云不窮窮也與共更三年之䘮二也何休曰不㤀㤙也先貧賤後富貴三也何休曰賤取貴不去不背徳也凡此聖人所以順男女之際重昬姻之始也家語哀公曰敢問為政如之何孔子對曰夫婦别父子親君臣嚴三者正則庶物從之矣庶物猶衆物也古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昬為大大昬至矣大昬既至冕而親迎親之也親之也者親之也是故君子興敬為親舍敬是遺親也弗愛不親弗敬不正愛與敬其政之本與大昬國君取禮也至矣言至大也興敬為親言相敬則親公曰寡人願有言然冕而親迎不已重乎已猶太也怪親迎乃服祭服孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎先聖周公也孔子曰天地不合萬物不生大昬萬世之嗣也君何謂已重焉孔子遂言曰内以治宗廟之禮足以配天地之神明出以治直言之禮足以立上下之敬物耻足以振之國耻足以興之為政先禮禮其政之本與宗廟之禮祭宗廟也夫婦配天地有日月之象焉禮器曰君在阼夫人在房大明生於東月生於西此隂陽之分夫婦之位也直猶正也正言謂出政教也政教有夫婦之禮焉昬義曰天子聴外治后聽内治教順成俗外内和順國家理治此之謂盛徳物猶事也事耻臣耻也振猶救也國耻君耻也君臣之行有可耻者禮足以救之足以興復之孔子遂言曰昔三代明王之政必敬其妻子也有道妻也者親之主也敢不敬與子也者親之後也敢不敬與君子無不敬也敬身為大身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本傷其本枝從而亡三者百姓之象也身以及身子以及子妃以及妃君行此三者則愾乎天下矣大王之道也如此國家順矣愾猶至也大王居豳為狄所伐乃曰土地所以飬人也君子不以其所飬害所飬乃去之岐是言百姓之身猶吾身也百姓之妻子猶吾妻子也不忍以土地之故而害之去之岐而王迹興焉哀公問既内自盡又外求助昬禮是也故國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也言玉女者美言之也君子於玉比徳焉祭統娶妻不先告廟者示不必安也昬禮請期不敢必也遣女於禰廟者重先人之遺支體也不敢自專故告禰也去不辭戒不諾者盖耻之重去也婦入三月然後祭行舅姑既沒亦婦入三月奠菜於廟三月一時物有成者人之善惡可得知也然後可得事宗廟之禮未廟見而死歸葬於女氏之黨示未成婦也夫有惡行妻不得去者地無去天之義也天子諸侯一娶九女何重國家廣繼嗣也娶九女亦足以承君之施也九而無子百亦無益也王度記曰天子諸侯一娶九女娶一國則兩國媵之皆以姪娣從也或曰天子娶十二女法天有十二月萬物必生也必一娶何防淫佚也為其棄徳嗜色故一娶而已人君無再娶之義也備姪娣從者為其不相嫉妬也一人有子三人共之若已有之也不娶兩娣何傳異氣也娶三國女何異類也恐一國血􅍺相似俱無子也姪娣年少猶從適人者明人君無再娶之義還待年於父母之國未任答君子也娶妻如之何卜女之徳知相宜否人君及宗子無父母自定娶者卑不主尊賤不主貴也大夫功成受封得備八妾者重國家廣繼嗣也不更聘大國者不㤀本適也天子諸侯之世子皆以諸侯禮娶與君同示無再娶之義也不娶同姓者重人倫防淫佚耻與禽獸同也外屬小功以上亦不得娶也王者嫁女必使同姓諸侯主之何㛰禮貴和不可相答為傷君臣之義亦欲使女不以天子尊乗諸侯也必使同姓者以其同宗共祖可以主親故使攝父事也卿大夫一妻二妾者何尊賢重繼嗣也不備姪娣何北面之勢不足盡人骨肉之親士一妻一妾何下卿大夫也婦人所以有師何學事人之道也學一時足以成矣與君有緦麻之親者教於公宫三月與君無親者各教於宗廟宗婦之室國君取大夫之妾士之妻老無子而明於婦道者又禄之使教宗室五屬之女大夫士皆有宗族自於宗子之室學事人也女必有傅姆何尊之也白虎通魯師春姜曰夫婦人以順從為務貞慤為首故婦人事夫有五平旦纚笄而朝則有君臣之嚴沃盥饋食則有父子之敬報反而行則有兄弟之道受期必誠則有朋友之信寢席之交而後有夫婦之際列女傳白虎通云婦人學事舅姑不學事夫潄櫛縰笄縂而朝君臣之道也惻隱之㤙父子之道也㑹計有無兄弟之道也閨閫之内袵席之上朋友之道也與此小異禮書綱目卷二
