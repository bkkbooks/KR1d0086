body:
  text: 禮書綱目卷六十五婺源江永撰財賦通禮十四𥙷夏后氏五十而貢殷人七十而助周人百畆而徹其實皆什一也夏時一夫受田五十畆而毎夫計其五畆之入以為貢商人始為井田之制以六百三十畆之地畫為九區區七十畆中為公田其外八家各受一區但借其力以助耕公田而不復税其私田周時一夫授田百畆鄉遂用貢法十夫有溝都鄙用助法八家同井耕則通力而作収則計畆而分故謂之徹其實皆什一者貢法固以十分之一為常數惟助法乃是九一而商制不可考周制則公田百畆中以二十畆為廬舍一夫所耕公田實計十畆通私田百畆為十一分而取其一盖又輕於什一矣竊料商制亦當似此而以十四畆為廬􅃕一夫實耕公田七畆是亦不過什一也孟子古者公田藉而不税藉之言借也借民力治公田羙惡取於此不税民之所自治也孟子曰夏后氏五十而貢殷人七十而助周人百畆而徹則所云古者謂殷時王制右三代田税龍子曰治地莫善於助莫不善於貢貢者校數嵗之中以為常樂嵗粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然将終嵗勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母也龍子古賢人狼戾猶狼藉言多也糞壅也盈滿也盻恨視也勤動勞苦也稱舉也貸借也取物於人而出息以償之也益之以足取盈之數也稚幼子也孟子孟子曰徹者徹也助者藉也徹通也均也藉借也詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也詩小雅大田之篇雨降雨也言願天雨於公田而遂及私田先公而後私也當時助法盡廢典籍不存惟有此詩可見故引之也同上篤公劉度其隰原徹田為糧徹通也一井之田九百畆八家皆私百畆同養公田耕則通力而作収則計畆而分也周之徹法自此始其後周公盖因而修之耳大雅文王之治岐也耕者九一九一者井田之制也方一里為一井其田九百畆中畫井字界為九區一區之中為田百畆中百畆為公田外八百畆為私田八家各受私田百畆而同養公田是九分而税其一也孟子倬彼甫田嵗取十千倬明貌甫大也十千謂一成之田地方十里為田九萬畆而以其萬畆為公田盖九一之法也小雅秦許晉平晉於是乎作爰田分公田之税應入公者爰之於所賞之衆僖十五年左氏傳宣公十五年初税畆公田之法十取其一今又履其餘畆復十收其一故哀公曰二吾猶不足遂以為常故曰初非禮也榖出不過藉周法民耕百畆公田十畆借民力而治之税不過此以豐財也左氏傳譏始履畆而税也時宣公無恩信于民民不肯盡力於公田故履踐案行擇其善畆穀最好者税取之古者什一而藉什一以借民力以什與民自取其一為公田什一者天下之中正也多乎什一大桀小桀奢泰多取于民比於桀也寡乎什一大貉小貉蠻貊無社稷宗廟百官制度之費税薄什一者天下之中正也什一行而頌聲作矣頌聲者太平歌頌之聲帝王之髙致也公羊傳古者什一一夫一婦佃田百畆以共五口父母妻子也又受田十畆以為公田公田在内私田在外此一夫一婦為耕百一十畆藉而不税藉此公田而收其入言不税民初税畆非正也古者三百步為里名曰井田井田九百畆公田居一出除公田八十畆餘八百二十畆故井田之法八家共一井八百畆餘二十畆家各二畆半為廬舍私田稼不善則非吏非責也吏田畯也言吏急民使不得營私田公田稼不善則非民民勤私也初税畆者非公之去公田而履畆十取一也以公之與民為已悉矣悉謂盡其力古者公田為居八家共居井竈蔥韭盡取焉損其廬􅃕家作一園以種五菜外種楸桑以備養生送死穀梁傳季康子欲以田賦杜預曰丘賦之法因其田財通出馬一疋牛三頭今欲別其田及家財各為一賦故言田賦周韋昭曰田賦以田出賦也賈侍中云田一井也制十六井賦戎馬一疋牛三頭一井之田而欲出十六井之賦也昭謂此數甚多似非也下雖云収田一井凡數從夫井起故云井耳使冉有訪於仲尼仲尼曰丘不識也三發杜曰三發問卒曰杜曰卒終也子為國老待子而行若之何子之不言也仲尼不對杜曰不公荅而私於冉有曰以按此下外傳補求來汝不聞乎先王制土藉田以力而砥其逺邇韋曰制土制其肥磽以為差也藉田謂税也以力謂三十者受田百畆二十者受五十畆六十還田也砥平也平逺近逺近有差也周禮近郊十一逺郊二十而三甸稍縣都皆無過十二也賦里以入而量其有無里廛也謂商賈所居之區域也以入計其利入多少而量其財業有無以為差也周禮國宅無征園廛二十而一漆林二十而五任力以夫而議其老幼力謂徭役以夫以夫家為數也議其老幼則有復除也於是乎有鰥寡孤疾又議其鰥寡孤疾不役也疾癈疾也有軍旅之出則徴之無則已徴徴鰥寡孤疾之賦也已止也無軍旅之出則止不賦其嵗收田一井出稯米秉芻缶米不是過也其嵗有軍旅之嵗也缶􅁃也聘禮曰十六斗曰􅁃十􅁃曰秉秉一百六十斗也四秉曰筥十筥曰稯稯六百四十斛也先王以為足足供用也君子之行也杜曰行政事傳按此下從左施取其厚事舉其中斂從其薄如是則以丘亦足矣杜曰丘十六井出戎馬一疋牛三頭是賦之常法若不度於禮而貪冒無厭則雖以田賦将又不足且子季孫若欲行而法則周公之典在國語云則有周公之藉矣􅅊曰藉田之法周公所制若欲苟而行又何訪焉杜曰為明年用田賦傳左傳國語通修哀公十有二年春用田賦直書之者以示改法重賦春秋譏始用田賦也田謂一井之田賦斂取其財物也言用田賦者若今漢家斂民錢以田為率矣不言井者城郭里巷亦有井嫌悉賦之禮税民公田不過什一軍賦十井不過一乗言公外慕彊吳空盡國儲故復用田賦過什一公羊傳古者公田什一用田賦非正也古者五口之家受田百畆為官田十畆是為私得其什而官税其一故曰什一周謂之徹殷謂之助夏謂之貢其實一也皆通法也今乃棄中平之法而財田並賦言其賦民甚矣穀梁傳哀公問於有若曰年饑用不足如之何稱有若者君臣之辭用謂國用公意盖欲加賦以足用也有若對曰盍徹乎徹通也均也周制一夫受田百畆而與同溝共井之人通力合作計畆均収大率民得其九公取其一故謂之徹魯自宣公税畆又逐畆什取其一則為什而取二矣故有若請但専行徹法欲公莭用以厚民也曰二吾猶不足如之何其徹也二即所謂什二也公意有若不喻其㫖故言此以示加賦之意對曰百姓足君孰與不足百姓不足君孰與足民富則君不至獨貧民貧則君不能獨富有若深言君民一體之意以止公之厚斂為人生者所宜深念也楊氏曰仁政必自經界始經界正而後井地均穀禄平而軍國之需皆量是以為出焉故一徹而百度舉矣上下寕憂不足乎以二猶不足而教之徹疑若迂矣然什一天下之中正多則桀寡則貉不可改也後世不究其本而唯末之圖故征斂無藝費出無經而上下困矣又惡知盍徹之當務而不為迂乎論語孟子曰耕者助而不税則天下之農皆悦而願耕於其野矣但使出力以助耕公田而不税其私田也孟子白圭曰吾欲二十而取一何如白圭名丹周人也欲更税法二十分而取其一分林氏曰按史記白圭能薄飲食忍嗜欲與童僕同苦樂樂觀時變人棄我取人取我與以此居積致富其為此論盖欲以其術施之國家也孟子曰子之道貉道也貉北方夷狄之國名也萬室之國一人陶則可乎曰不可器不足用也孟子設喻以詰圭而圭亦知其不可也曰夫貉五榖不生惟黍生之無城郭宫室宗廟祭祀之禮無諸侯幣帛饔飱無百官有司故二十取一而足也北方地寒不生五穀黍早􅍄故生之饔飱以飲食饋客之禮也今居中國去人倫無君子如之何其可也無君臣祭祀交際之禮是去人倫無百官有司是無君子陶以寡且不可以為國况無君子乎因其辭而折之欲輕之於堯舜之道者大貉小貉也欲重之於堯舜之道者大桀小桀也什一而税堯舜之道也多則桀寡則貉今欲輕重之則是小貉小桀而已同上禹别九州隨山濬川任土作貢書序之蔡氏曰上之所取謂賦下之所供謂之貢是篇有貢有賦而獨以貢名篇者孟子曰夏后氏五十而貢貢者校數嵗之中以為常則貢又夏后氏田賦之總名冀州厥土惟白壤漢孔氏曰無塊曰壤顔氏曰柔土曰壤夏氏曰周官大司徒辨十有二壤之物而知其種以教稼穡樹藝以土均之法辨五物九等制天下之地征則夫教民樹藝與因地制貢固不可不先於辨土也然辨土之宜有二白以辨其色壤以辨其性也益草人糞壤之法騂剛用牛赤緹用羊墳壤用麋渇澤用鹿糞治田疇各因色性而辨其所當用也曽氏曰冀州之土豈皆白壤云然者土㑹之法從其多者論也厥賦惟上上錯厥田惟中中賦田所出穀米兵車之類錯雜也賦第一等而錯出第二等也田第五等也賦髙于田四等者地廣而人稠也林氏曰冀州先賦後田者冀王畿之地天子所自治併與場圃園田漆林之𩔖而征之如周官載師所載賦非盡出於田也故以賦屬于厥土之下餘州皆田之賦也故先田而後賦又按九等之賦皆毎州嵗入總數以九州多寡相較而為九等非以是等田而責其出是等賦也冀獨不言貢篚者冀天子封内之地無所事於貢篚也兖州厥土黒墳墳土脉墳起也如左氏所謂祭之地地墳是也厥田惟中下厥賦貞作十有三載乃同田第六等賦第九等貞正也兖賦最薄言君天下者以薄賦為正也作十有三載乃同者兖當河下流之衝水激而湍悍地平而土疎被害尤劇今水患雖平而卑濕沮洳未必盡去土曠人稀生理鮮少必作治十有三載然後賦法同於他州此為田賦而言故其文屬於厥賦之下先儒以為禹治水所歴之年且謂此州治水最在後畢州為第九成功因以上文厥賦貞者謂賦亦第九與州正為相當殊無意義其説非是青州厥土白墳海濱廣斥濱涯也海涯之地廣漠而斥鹵許慎曰東方謂之斥西方謂之鹵斥鹵鹹地可煑為鹽者也厥田惟上下厥賦中上田第三賦第四也徐州厥土赤埴墳土黏曰埴埴膩也黏泥如脂之膩也周有傳埴之工老氏言埏埴以為器惟土惟黏膩細宻故可搏可埏也厥田惟上中厥賦中中田第二等賦第五等也揚州厥土惟塗泥塗泥水泉濕也下地多水其土淖厥田惟下下厥賦下上上錯田第九等賦第七等雜出第六等也言下上上錯者以本設賦九等分為三品下上與中下異品故變文言下上上錯也荆州厥土惟塗泥厥田惟下中厥賦上下荆州之土與揚州同故田比揚只加一等而賦為第三等者地濶而人工修也豫州厥土惟壤下土墳壚土不言色者其色雜也壚疏也顔氏曰𤣥而疏者謂之壚其土有髙下之不同故别言之厥田惟中上厥賦錯上中田第四等賦第二等雜出第一等也梁州厥土青黎黎黒也厥田惟下上厥賦下中三錯田第七等賦第八等雜出第七等第九等也按賦雜出他等者或以為嵗有豐凶或以為户有増減皆非也意者地力有上下年分不齊如周官田一易再易之類故賦之等第亦有上下年分冀之正賦第一等而閒嵗第二等也揚之正賦第七等而間嵗第六等也豫之正賦第二等而間嵗第一等也梁之正賦第八等而間嵗出第七等第九等也當時必有條目詳具今不存矣書之所載特凡例若嵗之豐凶户之増减則九州皆然何獨於冀揚豫梁四州言哉雍州厥土惟黄壤黄者土之正色林氏曰物得其常性者最貴雍州之土最貴故其田非他州所及厥田惟上上厥賦中下田第一等而賦第六等者地狹而人功少也六府孔修庶土交正底慎財賦咸則三壤成賦中邦孔大也水火金木土穀皆大修治也土者財之自生謂之庶土則非特穀土也庶土有等當以肥瘠髙下名物交相正焉以任土事底致也因庶土所出之財而致謹其財賦之入如周大司徒以土宜之法辨十有二土之名物以任土事之類咸皆也則品節之也九州穀土又皆品節之以上中下三等如周大司徒辨十有二壤之名物以教稼穡之類中邦中國也盖土賦或及于四夷而田賦則止于中國而已故曰成賦中邦五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米甸服畿内之地也甸田服事也以皆田賦之事故謂之甸服五百里者王城之外四面皆五百里也禾全本曰總刈禾曰銍半藁也半藁去皮曰秸謂之服者三百里内去王城為近非惟納總銍秸而又使之服輸将之事也獨于秸言之者總前二者而言也粟穀也内百里為最近故并禾本總賦之外百里次之只刈禾半藁納也外百里又次之去藁麤皮納也外百里為逺去其穂而納穀外百里為尤逺去其穀而納米盖量其地之逺近而為納賦之輕重精麄也此分甸服五百里而為五等者也已上賦法冀州島夷皮服海曲曰島海島之夷以皮服來貢也夾右碣石入于河碣石地志在北平郡驪城縣西南河口之地今平州之南也冀州北方貢賦之來自北海入河南向西轉而碣石在其右轉屈之間故曰夾右也程氏曰冀為帝都東西南三面距河他州貢賦皆以逹河為至故此三方亦不必書而其北境則漢遼東西右北平漁陽上谷之地其水如遼濡滹易皆中髙不與河通故必自北海然後能逹河也兖州厥貢漆絲厥篚織文貢者下獻其土所有于上也兖地宜漆宜桑故貢漆絲也篚竹器筐屬也古者幣帛之屬則盛之以筐篚而貢焉經曰篚厥𤣥黄是也織文者織而有文錦綺之屬也以非一色故以織文總之林氏曰有貢又有篚者所貢之物入于篚也浮于濟漯達于河舟行水曰浮漯者河之支流也兖之貢賦浮濟浮漯以逹于河也帝都冀州三面距河達河則達帝都矣又按地志曰漯水出東郡東武陽至千乗入海程氏以為此乃漢河與漯殊異然亦不能明言漯河所在未詳其地也青州厥貢鹽絺海物惟錯岱畎絲枲鉛松怪石萊夷作牧厥篚檿絲鹽斥地所出絺細葛也錯雜也海物非一種故曰錯林氏曰既總謂之海物則固非一物矣此與揚州齒革羽毛惟木文勢正同錯盖别為一物如錫貢磬錯之錯理或然也畎谷也岱山之谷也枲麻也怪石怪異之石也林氏曰怪石之貢誠為可疑意其必湏以為器用之飾而有不可闕者非特貢其怪異之石以為玩好也萊夷顔師古曰萊山之夷齊有萊侯萊人即今萊州之地作牧者言可牧放夷人以畜牧為生也檿山桑也山桑之絲其靭中琴瑟之弦蘇氏曰惟東萊為有此絲以之為繒其堅靭異常萊人謂之山繭浮于汶達于濟汶水出泰山郡萊蕪縣原山今襲慶府萊蕪縣也西南入濟在今鄆州中都縣也盖淄水出萊蕪原山之隂東北而入海汶水出萊蕪原山之陽西南而入濟不言達河者因于兖也徐州厥貢惟土五色羽畎夏翟嶧陽孤桐泗濱浮磬淮夷蠙珠暨魚厥篚𤣥纎縞徐州之土雖赤而五色之土亦間有之故制以為貢周書作雒曰諸侯受命于周乃建大社于國中其壝東青土南赤土西白土北驪土中央舋以黄土将建諸侯鑿其方取面之土苞以黄土苴以白茅以為土封故曰受削土于周室此貢土五色意亦為是用也羽畎羽山之谷也夏翟雉具五色其羽中旌旄者也染人之職秋染夏鄭氏曰染夏者染五色也林氏曰古之車服器用以雉為飾者多不但旌旄也曽氏曰山雉具五色出于羽山之畎則其名山以羽者以此歟嶧山名地志云東海郡西有葛嶧山古文以為嶧山下邳今淮陽軍下邳縣也陽者山南也孤桐特生之桐其材中琴瑟詩曰梧桐生矣于彼朝陽盖草木之生以向日為貴也泗水名出魯國卞縣桃墟西北陪尾山源有泉四四泉俱𨗳因以為名西南過彭城又東南過下邳入淮卞縣今襲慶府泗水縣也濱水旁也浮磬石露水濱若浮于水然或曰非也泗濱非必水中泗水之旁近浮者石浮生土中不根著者也今下邳有石磬山或以為古取磬之地曽氏曰不謂之石者成磬而後貢也淮夷淮之夷也蠙蚌之别名也暨及也珠為服飾魚用祭祀今濠泗楚皆貢淮白魚亦古之遺制歟夏翟之出于羽畎孤桐之生于嶧陽浮磬之出于泗濱珠魚之出于淮夷各有所産之地非他處所有故詳其地而使貢也𤣥赤黒色幣也武成曰篚厥𤣥黄纎縞皆繒也禮曰及期而大祥素縞麻衣中月而禫禫而纎記曰有虞氏縞衣而養老則知纎縞皆繒之名也曽氏曰𤣥赤而有黒色以之為衮所以祭也以之為端所以齊也以之為冠以為首服也黒經白緯曰纎纎也縞也皆去凶即吉之所服也浮于淮泗達于河許慎曰汳水受陳留浚義隂溝至蒙為灉水東入于泗則淮泗之可以達于河者以灉至于泗也許慎又曰泗受泲水東入淮盖泗水至大野而合泲然則泗之上源自泲亦可以通河也揚州厥貢惟金三品瑶琨篠簜齒革羽毛惟木島夷卉服厥篚織貝厥包橘柚錫貢三品金銀銅也瑶琨玉石名詩曰何以舟之惟玉及瑶琨説文云石之羙似玉者取之可以為禮器篠之材中于矢之笴簜之材中于樂之管簜亦可為符節周官掌節有英簜象有齒犀兕有革鳥有羽獸有毛木楩梓豫章之屬齒革可以成車甲羽毛可以為旌旄木可以備棟宇器械之用也島夷東南海島之島卉草也葛越木綿之屬織貝錦名織為貝文詩曰貝錦是也今南夷木綿之精好者亦謂之吉貝海島之夷以卉服來貢而織貝之精者則入篚焉包裹也小曰橘大曰柚錫者必待錫命而後貢非嵗貢之常也張氏曰必錫命乃貢者供祭祀燕賓客則詔之口腹之欲則難于出令也􅆓于江海達于淮泗順流而下曰􅆓􅆓江入海自海而入淮泗不言達于河者因于徐也禹時江淮未通故沿于海至吳始開䢴溝隋人廣之而江淮舟船始通也孟子言排淮泗而注之江記者之誤也荆州厥貢羽毛齒革惟金三品杶榦栝栢礪砥砮丹惟箘簵楛三邦㡳貢厥名包匭菁茅厥篚𤣥纁璣組九江納錫大龜荆之貢與揚州大抵多同然荆先言羽毛者漢孔氏所謂善者為先也按職方氏揚州其利金錫荆州其利丹銀齒革則荆揚所産不無優劣矣杶栝柏三木名也杶木似樗而可謂弓幹栝木栢葉松身礪砥皆磨石砥以細宻為名礪以麤糲為稱砮者中矢鏃之用肅愼氏貢石砮者是也丹丹砂也箘簵竹名楛木名皆可以為矢董安于之治晉陽也公宫之垣皆以荻蒿苫楚廩之其髙丈餘趙襄子發而試之其堅則箘簵不能過也則箘簵盖竹之堅者其材中矢之笴楛肅慎氏貢楛矢者是也三邦未詳其地底致也致貢箘簵楛之有名者也匭匣也菁茅有刺而三脊所以供祭祀縮酒之用既包而又匣之所以示敬也齊桓公責楚貢包茅不入王祭不供無以縮酒又管子云江淮之間一茅而三脊名曰菁茅菁茅一物也孔氏謂菁以為葅者非也今辰州麻陽縣包茅山出包茅有刺而三脊纁周禮染人夏纁𤣥纁絳色幣也璣珠不圓者組綬類大龜尺有二寸所謂國之守龜非可常得故不為常貢若偶得之則使之納鍚于上謂之納錫者下與上之辭重其事也浮于江沱潜漢逾于洛至于南河江沱潜漢其水道之出入不可詳而大勢則自江沱而入潜漢也逾越也漢與洛不通故舍舟而陸以達于洛自洛而至于南河也程氏曰不逕浮江漢兼用沱潜者随其貢物所出之便或由經流或循枝𣲖期于便事而已豫州厥貢漆枲絺紵厥篚纎纊錫貢磬錯杜氏曰周官載師漆林之征二十有五周以為征而此乃貢者盖豫州在周為畿内故載師掌其征而不制貢禹時豫在畿外故有貢也推此義則冀不言貢者可知顔師古曰織紵以為布及練然經但言貢枲與紵成布與未成布不可詳也纊細綿也磬錯治磬之錯也非所常用之物故非常貢必待錫命而後納也與揚州橘柚同然揚州先言橘柚而此先言錫貢者橘柚言包則於厥篚之文無嫌故言錫貢在後磬錯則與厥篚之文嫌于相屬故言錫貢在前盖立言之法也浮于洛達于河豫州去帝都最近豫之東境徑自入河豫之西境則浮于洛而後至河也梁州厥貢璆鐡銀鏤砮磬熊羆狐貍織皮璆玉磬鐡柔鐡也鏤剛鐡可以刻鏤者也磬石磬也言鐡而先于銀者鐡之利多于銀也後世蜀之卓氏程氏以鐵冶富擬封君則梁之利尤在于鐵也織皮者梁州之地山林為多獸之所走熊羆狐貍四獸之皮製之可以為裘其毳毛織之可以為罽也林氏曰徐州貢浮磬此州既貢玉磬又貢石磬豫州又貢磬錯以此觀之則知當時樂器磬最為重豈非以其聲角而在清濁大小之間最難得其和者哉西傾因桓是來浮于潛逾于沔入于渭亂于河西傾山名地志在隴西郡臨洮縣西今洮州臨潭縣西南桓水名水經曰西傾之南桓水出焉蘇氏曰漢始出為漾東南流為沔至漢中東行為漢沔酈道元曰自西傾而至葭萌浮于西漢西漢即潜水也自西漢遡流而届于晉夀界阻様枝津南歴岡北迤邐接漢沔歴漢川至于褒水逾褒而暨于衙嶺之南溪灌于斜川届于武功而北以入于渭漢武帝時人有上書欲通褒斜道及漕事上下張湯問之云褒水通沔斜水通渭皆可以漕從南陽沔入褒褒絶水至斜間百餘里以車轉從斜下渭如此則漢中穀可致經言沔渭而不言褒斜者因大以見小也褒斜之間絶水百餘里故曰逾然于經文則當曰逾于渭今曰逾于沔此又未可暁也絶河而渡曰亂雍州厥貢惟球琳琅玕球琳羙玉也琅玕石之似珠者爾雅曰西北之羙者有崐崘虚之球琳琅玕今南海有青琅玕珊瑚屬也浮于積石至于龍門西河㑹于渭汭積石地志在金城郡河關縣西南羌中今鄯州龍支縣界也龍門山地志在馮翊夏陽縣今河中府龍門縣也西河冀之西河也雍之貢道有二其東北境則自積石至于西河其西南境則㑹于渭汭言渭汭不言河者蒙梁州之文也他州貢賦亦當不止一道發此例以互見耳織皮崐崘析支渠搜西戎即敘崐崘即河源所出在臨羌析支在河闗西千餘里渠搜水經曰河從朔方東轉經渠搜縣故城北盖近朔方之地也三國皆貢皮衣故以織皮冠之皆西方戎落故以西戎總之即就也雍州水土既平而餘功及于西戎故附于末道已上貢法及貢禹貢右虞夏賦貢古者謂殷時市廛而不税廛市物邸舍税其舍不税其物關譏而不征譏譏異服識異言征亦税也周禮國凶札則無門關之征猶譏也林麓川澤以時入而不禁麓山足也賦王制此條殷法大司徒以土均之法辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政均平也五物五地之物也九等騂剛赤緹之屬征税也民職九職也地貢貢地所生謂九穀財謂泉穀賦謂九賦及軍賦地官土均掌平土地之政以均地守以均地事政讀為征所平之税邦國都鄙也地守虞衡之屬地事農圃之職同上此二條財賦通制大宰以九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰闗市之賦八曰山澤之賦九曰幣餘之賦財泉穀也鄭司農云邦中之賦二十而税一各有差也幣餘百工之餘𤣥謂賦口率出泉也今之筭錢民或謂之賦此其舊名與鄉大夫以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之遂師之職亦云以徴其財征皆謂此賦也邦中在城郭者四郊去國百里邦甸二百里家削三百里邦縣四百里邦都五百里此平民也闗市山澤謂占㑹百物幣餘謂占賣國中之斥幣皆末作當増賦者若今賈人倍算矣自邦中以至幣餘各入其所有穀物以當賦泉之數毎處為一書所待異也天官等此條九賦法載師掌任土之法以物地事授地職而待其政令任土者任其力勢所能生育且以制貢賦也物物色之以知其所宜之事而授農牧衡虞使職之以廛里任國中之地以埸圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任畺地注見井田篇凡任地國宅無征園廛二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二惟其漆林之征二十而五征税也鄭司農云任地謂任土地以起税賦也𤣥謂國宅凡官所有宫室吏所治者也國税輕近而重逺近者多役也園㕓亦輕之者廛無穀園少利也古之宅必樹而畺埸有𤓰法地官此條任地定賦之閭師凡任民任農以耕事貢九榖任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物貢草木謂葵韭果蓏之屬凡無職者出夫布獨言無職者掌其九賦法同上此任民出賦之小司徒乃分地域而辨其守施其職而平其政分地域謂建邦國造都鄙制鄉遂也辨其守謂衡虞之屬職謂九職政當作征税也閭師掌國中及四郊之人民六畜之數以任其力以待其政令以時徴其賦國中及四郊是所主數六鄉之中自廛里至逺郊也掌六畜數者農事之本也賦謂九賦及九貢縣師以嵗時徴野之賦貢野謂甸稍縣都也所徴賦貢與閭師同遂師入野職野賦于玉府民所入貨賄以當九職九賦中玉府之用者里宰待有司之政令而徴斂其財賦旅師掌聚野之耡粟屋粟間粟野謂逺郊之外也耡粟民相助作一井之中所出九夫之税粟也屋粟民有田不耕所罰九夫之税粟間粟閒民無職事者所出一夫之征粟載師凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征鄭司農云宅不毛者謂不樹桑麻也布泉也𤣥謂宅不毛者罰以一里二十五家之泉空田者罰以三家之税粟以共吉凶二服及喪器也民有間無職事者出夫税家税也夫税者百畆之税家税者出士徒車輦給繇役以時徴其賦司稼巡野觀稼以年之上下出斂法斂法者豐年從正凶荒則損若今十傷二三實除減半並地官司書凢税斂掌事者受法焉及事成則入要貳焉法猶數也應當税者之數成猶畢也天官大宰以八則治都鄙五曰賦貢以馭其用賦口率出泉也貢功也九職之功所税也上同大司徒以荒政十有二聚萬民二曰薄征六曰去幾去幾去其税耳地官均人掌均地政均地守均地職政讀為征地征謂地守地職之税也地守衡虞之屬地職農圃之屬凶札則無財賦不收地守地職不均地政無財賦恤其乏困也財賦九賦也不収山澤及地税亦不平計地税也非凶札之嵗當収税乃均之耳同上年不順成闗梁不租山澤列而不賦闗梁不租此周禮也殷則闗恒譏而不征列之言遮列也雖不賦猶為之禁不得非時取也玉藻已上征免之法廛人掌斂市絘布總布質布罰布廛布而入於泉府凡屠者斂其皮角筋骨入於玉府肆長斂其總布司市國凶荒札喪則市無征而作布司闗司貨賄之出入者掌其治禁與其征廛凢貨不出於闗者舉其貨罰其人國凶札則無闗門之征註並見政事下篇已上闗市之賦委人掌斂野之賦斂薪芻凡疏材木材凡畜聚之物野謂逺郊以外也所斂野之賦謂野之園圃山澤之賦也凡疏材革木有實者也凡畜聚之物𤓰瓠葵芋禦冬之具也野之農賦旅師斂之工商嬪婦遂師以入玉府其牧則遂師又以共野牲山虞掌山林之政令物為之厲而為之守禁令萬民時斬材有期日春秋之斬木不入禁凡竊木者有刑罰林衡掌巡林麓之禁令而平其守以時計林麓而賞罰之若斬木材則受灋於山虞而掌其政令川衡掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之於玉府頒其餘於萬民並地官􅈄人凡􅈄者掌其政令凡􅈄征入于玉府天官事注並見政下篇卝人掌金玉錫石之地而為之厲禁以守之錫鈏也若以時取之則物其地圖而授之物地占其形色知鹹淡也授之教取者之處巡其禁令行其禁明其令地官職金掌凡金玉錫石丹青之戒令青空青也受其入征者辨其物之􅍇惡與其數量楬而璽之入其金錫於為兵器之府為兵器者攻金之工六也守藏者玉府内府也鄭司農云受其入征者謂主受采金玉錫石丹青者之租税也璽而楬之者楬書其數量以著其物也璽者印也既楬書揃其數量又以印封之今時之書有所表識謂之楬櫫入其要要凡數也入之於大府秋官角人掌以時徴齒角凡骨物於山澤之農以當邦賦之政令山澤出齒角骨物大者犀象其小者麋鹿以度量受之以共財用骨入漆浣者受之以量其餘以度度所中羽人掌以時徴羽翮之政於山澤之農以當邦賦之政令翮羽本凡受羽十羽為審百羽為摶十摶為縳審搏縳羽數束名也爾雅曰一羽謂之箴十羽為之縳百羽為之緷其名音相近也一羽則有名盖失之矣掌葛掌以時徴絺綌之材於山農凡葛征徴草貢之材於澤農以當邦賦之政令草貢出澤䔛紵之屬可緝績者以權度受之以知輕重長短也故書受或為授杜子春云當為受掌染草掌以春秋斂染草之物染草茅蒐槖蘆豕首紫茢之屬以權量受之以待時而頒之謹量以知輕重多少時染夏之時掌炭掌灰物炭物之徴令以時入之灰炭皆山澤之農所出也灰給澣練炭之所共多以權量受之以共邦之用凡炭灰之事掌荼掌以時聚荼以共喪事共喪事者以著物也既夕禮曰菌著用茶徴野疏材之物以待邦事凡畜聚之物荼茅莠疏材之類也因使掌焉徴者徴于山澤入于委人掌蜃掌斂互物蜃物互物蚌蛤之屬並地官孟冬乃命水虞漁師收水泉池澤之賦毋或敢侵削衆庶兆民以為天子取怨於下其有若此者行罪無赦因盛徳在水收其税賦月令已上山澤之右殷周賦法古之為市者以其所有易其所無者有司者治之耳有賤丈夫焉必求龍㫁而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣治之謂治其争訟左右望者欲得此而又取彼也罔謂罔羅取之也從而征之謂人惡其専利故就征其税後世縁此遂征商人也孟子文王之治岐也關市譏而不征澤梁無禁闗謂道路之關市謂都邑之市譏察也征税也闗市之吏察異服異言之人而不征商賈之税也澤謂瀦水梁謂魚梁與民同利不設禁也同上周公曰繼自今嗣王以萬民惟正之供無逸叔向曰齊其何如晏子曰此季世也民參其力二入於公而衣食其一言公重賦斂傳昭三年左氏齊侯疾不瘳欲誅祝史晏子曰不可為也言非誅祝史所能治山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之衡鹿舟鮫虞候祈望皆官名也言公専守山澤之利不與民共縣鄙之人入從其政偪介之闗暴征其私介隔也迫近國都之闗言邊鄙既入服政役又為近闗所征税枉暴奪其私物承嗣大夫强易其賄承嗣大夫世位者布常無藝藝法制也言布政無法制徴斂無度宫室日更淫樂不違違去也内寵之妾肆奪於市肆放也外寵之臣僣令於鄙詐為教令於邊鄙私欲養求不給則應養長也所求不給則應之以罪民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東聊攝齊西界也平原聊城縣東北有攝城也姑尤以西姑尤齊東界也姑水尤水皆在城陽郡東南入海其為人也多矣雖其善祝豈能勝億兆人之詛萬萬曰億萬億曰兆君若欲誅於祝史修德而後可公説使有司寛政毁闗去禁薄斂已責除逋責氏昭二十年左傳孟子曰有布縷之征粟米之征力役之征君子用其一緩其二用其二而民有殍用其三而父子離征賦之法嵗有常數然布縷取之于夏粟米取之於秋力役取之于冬當各以其時若并取之則民力有所不堪矣今兩税三限之法亦此意也尹氏曰言民為邦本取之無度則其國危矣又曰市廛而不征法而不廛則天下之商皆悦而願藏於其市矣闗譏而不征則天下之旅皆悦而願出於其路矣廛無夫里之布則天下之民皆悦而願為之氓矣周禮宅不毛者有里布民無職事者出夫家之征鄭氏謂宅不種桑麻者罰之使出一里二十五家之布民無常職者罰之使出一夫百畆之税一家力役之征也今戰國時一切取之市宅之民已賦其廛又令出此夫里之布非先王之法也氓民也孟子戴盈之曰什一去闗市之征今兹未能請輕之以待來年然後已何如盈之亦宋大夫也什一井田之法也闗市之征商賈之税也已止也孟子曰如知其非義斯速已矣何待來年同上大宰以九貢致邦國之用一曰祀貢二曰嬪貢三曰器貢四曰幣貢五曰材貢六曰貨貢七曰服貢八曰斿貢九曰物貢嬪故書作賓鄭司農云祀貢犧牲包茅之屬賓貢皮帛之屬器貢宗廟之器幣貢繡帛材貢木材也貨貢珠貝自然之物也服貢祭服斿貢羽物物貢九州之外各以其所貴為摯肅慎氏貢楛矢之屬是也𤣥謂嬪貢絲枲器貢銀鐵石磬丹漆也幣貢玉馬皮帛也材貢盹幹栝柏篠簜也貨貢金玉龜貝也服貢絺紵也斿讀如囿游之游斿貢燕好珠璣琅玕也物貢襍物魚鹽橘柚天官大行人邦畿方千里其外方五百里謂之侯服嵗壹見其貢祀物又其外方五百里謂之甸服二嵗壹見其貢嬪物又其外方五百里謂之男服三嵗壹見其貢器物又其外方五百里謂之采服四嵗壹見其貢服物又其外方五百里謂之衞服五嵗壹見其貢材物又其外方五百里謂之要服六嵗壹見其貢貨物九州之外謂之蕃國世壹見各以其所貴寳為摯秋官注見賓禮覲禮小行人令諸侯春入貢貢六服所貢也同上大司馬施貢分職以任邦國職謂職税也任猶事也事以其力之所堪夏官職方氏凢邦國制其貢各以其所有國之地物所有同上土均掌平土地之政以均地貢地貢諸侯之九貢地官掌貨賄職闕地官内府凢四方之幣獻之金玉齒革兵器凢良貨賄入焉諸侯朝聘所獻國珍天官山師掌山林之名辨其物與其利害而頒之於邦國使致其珍異之物山林之名與物若岱畎絲枲嶧陽孤桐矣利其中人用者害毒物及螫噬之蟲獸夏官川師掌川澤之名辨其物與其利害而頒之於邦國使致其珍異之物川澤之名與物若泗濱浮磬淮夷蠙珠暨魚澤之萑蒲同上懐方氏致方貢致逺物逺物九州之外無貢法而至者同上右貢法文王不敢盤于遊田以庶邦惟正之供遊田國有常制文王不敢盤遊無度上不濫費故下無過取而能以庶邦惟正之供於常貢正數之外無横斂也言庶邦則民可知文王為西伯所統庶邦皆有常供春秋貢于霸主者班班可見至唐猶有送使之制則諸侯之供方伯舊矣無逸祭公謀父曰先王之制邦内甸服邦外侯服侯衞賓服蠻夷要服戎狄荒服注見封建甸服者祭供日祭也此采地之君其見無數侯服者祀供月祀也堯舜及周侯服皆嵗見賓服者享供時享也享獻也周禮甸圻二嵗而見男圻三嵗而見采圻四嵗而見衞圻五嵗而見其見也皆以所貢助祭于廟孝經所謂四海之内各以其職來祭要服者貢供嵗貢也要服六嵗一見荒服者王王王事天子也周禮九州之外謂之蕃國世一見各以其所貴寳為摯詩曰自彼氐羌莫敢不來王日祭日祭祭于祖考謂上食也近漢亦然月祀月祀於曽髙時享時享於二祧嵗貢嵗貢於壇墠終王終謂垂終也朝嗣王及即位而來見先王之訓也國語周語惟克商遂通道于九夷八蠻西旅底貢厥獒大保乃作旅獒用訓于王九夷八蠻多之稱也職方言四夷八蠻爾雅言九夷八蠻但言其非一而已武王克商之後威徳廣被九州之外蠻夷戎狄莫不梯山航海而至曰通道云者盖蠻夷來王則道路自通非武王有意于開四夷而斥大境土也西旅西方蠻夷國名犬髙四尺曰獒按説文曰犬知人心可使者大保召公奭也此旅獒之本序曰明王慎徳四夷咸賓無有逺邇畢獻方物惟服食器用方物方土所生之物明王謹徳四夷咸賓其所貢獻惟服食器用而已言無異物也王乃昭徳之致于異姓之邦無替厥服分寳玉于伯叔之國時庸展親人不易物惟徳其物徳之致謂上文所貢方物也昭示方物于異姓之諸侯使之無廢其職分寳玉于同姓之諸侯使之益厚其親如分陳以肅慎氏之矢分魯以夏后氏之璜之類王者以其徳所致方物分賜諸侯故諸侯亦不敢輕易其物而以徳視其物也旅獒昔武王克商通道于九夷百蠻九夷東夷九國百蠻蠻有百邑也使各以其方賄來貢方賄各以所居之方所出貨賄為貢也使無忘職業於是肅慎氏貢楛矢石砮其長尺有咫肅慎北夷之國傳曰肅慎燕亳吾北土也楛木也砮鏃也以石為之八寸曰咫先王欲昭其令德之致逺也以示後之人使永監焉監視也故銘其栝曰肅慎氏之貢矢國語魯語齊桓公以諸侯之師伐楚管仲曰爾貢包茅不入王祭不供無以縮酒寡人是徴包裹束也茅菁茅也束茅而灌之以酒為縮酒尚書包匭菁茅茅之為異未審對曰貢之不入寡君之罪也敢不共給僖四年左氏傳齊侯脩禮於諸侯諸侯官受方物諸侯官司各于齊受其方所貢天子之物僖七年左氏傳同盟於平丘子産争承承貢賦之次曰昔天子班貢輕重以列列位也列尊貢重周之制也公侯地廣故所貢者多卑而貢重者甸服也甸服謂天子畿内共職貢者鄭伯男也而使從公侯之貢言鄭國在甸服外爵列伯子男不應出公侯之貢懼弗給也敢以為請諸侯靖兵好以為事靖息也行理之命行理使人通聘問者無月不至貢之無藝藝法制小國有闕所以得罪也諸侯脩盟存小國也貢獻無極亡可待也存亡之制将在今矣自日中以争至于昏晉人許之昭十三年左氏傳天子之六府曰司土司木司水司草司器司貨典司六職府主藏六物之稅者此亦殷時制也周則皆屬司徒司土土均也司木山虞也司水川衡也司草稻人也司器角人也司貨卝人也曲禮冡宰制國用必於嵗之杪五穀皆入然後制國用制國用如今度支經用杪末也用地小大視年之豐耗小國大國豐凶之年各以嵗之收入制其用多少多不過禮少有所殺以三十年之通制國用量入以為出通三十年之率當有九年之蓄出謂所當給者祭用數之仂算今年嵗一經用之數用其什一喪用三年之仂喪大事用三嵗之什一喪祭用不足曰暴有餘曰浩暴猶耗也浩猶饒也祭豐年不奢凶年不儉常用數之仂國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂菜色食菜之色民無食菜之飢色天子乃日舉樂以食王制大宰以九職任萬民一曰三農生九榖二曰園圃毓草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚斂疏材九曰閒民無常職轉移職事注見政事上篇以九賦斂財賄詳見上賦法章以九式均節財用一曰祭祀之式二曰賓客之式三曰喪荒之式四曰羞服之式五曰工事之式六曰幣帛之式七曰芻秣之式八曰匪頒之式九曰好用之式式謂用財之節度荒凶年也羞飲食之物也工作器物者幣帛所以贈勞賓客者芻秣養牛馬禾穀也鄭司農云匪分也頒讀為班布之班謂班賜也𤣥謂王所分賜羣臣也好用燕好所賜予以九貢致邦國之用詳見上章小宰執邦之九貢九賦九式之貳以均財節邦用以灋掌祭祀朝覲㑹同賓客之戒具軍旅田役喪荒亦如之法謂其禮法也戒具戒官有事者所當共七事者令百官府共其財用治其施舍聴其治訟七事謂先四如之者三也施舍不給役者宰夫掌治灋以攷百官府羣都縣鄙之治乗其財用之出入凢失財用物辟名者以官刑詔冡宰而誅之其足用長財善物者賞之羣都諸采邑也六遂五百家為鄙五鄙為縣言縣鄙而六鄉州黨亦存焉乗猶計也財泉穀也用貨賄也物畜獸也辟名詐為書以空作見文書與實不相應也官刑在司冦五刑第四者大府掌九貢九賦九功之貳以受其貨賄之入頒其貨於受藏之府頒其賄於受用之府九功謂九職也受藏之府若内府也受用之府若職内也凡貨賄皆藏以給用耳良者以給王之用其餘以給國之用或言受藏或言受用又雜言貨賄皆互文凡官府都鄙之吏及執事者受財用焉凡頒財以式法授之闗市之賦以待王之膳服邦中之賦以待賓客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜予待猶給也此九賦之財給九式者膳服即羞服也稍秣即芻秣也謂之稍稍用之物也喪紀即喪荒也賜予即好用也鄭司農云幣餘使者有餘來還也𤣥謂幣餘占賣國之斥幣凢邦國之貢以待弔用此九貢之財所給也給弔用給凶事之五禮凢萬民之貢以充府庫此九職之財充猶足凢式貢之餘財以共玩好之用謂先給九式及弔用足府庫而有餘則乃可以共玩好明玩好非治國之用言式言貢互文凢邦之賦用取具焉賦用用賦嵗終則以貨賄之入出㑹之玉府掌王之金玉玩好兵器凢良貨賄之藏良善也凡此皆式貢之餘財所作其不良又有受而藏之者凢王之獻金玉兵器文織良貨賄之物受而藏之謂百工為王所作可以獻遺諸侯古者致物于人尊之則曰獻通行曰饋春秋曰齊侯來獻戎捷尊魯也丈織畫及繡錦凡王之好賜共其貨賄内府掌受九貢九賦九功之貨賄良兵良器以待邦之大用大用朝覲之頒賜凡四方之幣獻之金玉齒革兵器凡良貨賄入焉諸侯朝聘所獻國珍凡適四方使者共其所受之物而奉之王所以遺諸侯者凡王及冢宰之好賜予則共之冢宰待四方賓客之小治或有所善亦賜予之外府掌邦布之入出以共百物而待邦之用凡有法者布泉也布讀為宣布之布其藏曰泉其行曰布取名于水泉其流行無不徧入出謂受之復出之共百物者或作之或買之待猶給也有法百官之公田也泉始盖一品周景王鑄大泉而有二品後數變易不復識本制至漢惟有五銖乆行王莽改貨而異作泉布多至十品今存於民間多者有貨布大泉貨泉貨布長二寸五分廣寸首長八分有竒廣八分其圜好徑二分半足枝長八分其右丈曰貨左丈曰布重二十五銖直貨泉二十五大原徑一寸二分重十二銖丈曰大泉直十五貨泉貨泉徑一寸重五銖右丈曰貨左丈曰泉直一也共王及后世子之衣服之用凡祭祀賔客喪紀㑹同軍旅共其財用之幣齎賜予之財用齎行道之財用也聘禮曰問幾月之齎鄭司農云齎或為資今禮家定齎作資𤣥謂齎資同耳其字以齊次為聲從貝變易古字亦多或凡邦之小用皆受焉皆來受嵗終則㑹唯王及后之服不㑹司㑹掌邦之六典八法八則之貳以逆邦國都鄙官府之治逆受而鉤考之以九貢之法致邦國之財用以九賦之法令田野之財用以九功之法令民職之財用以九式之法均節邦之財用掌國之官府郊野縣都之百物財用凡在書契版圖者之貳以逆羣吏之治而聴其㑹計郊四郊去國百里野甸稍也甸去國里二百里稍三百里縣四百里都五百書謂簿書契其最凡也版户籍也圖土地形象田地廣狹以參互考日成以月要考月成以嵗㑹考嵗成參互謂司書之要貳與職内之入職嵗之出故書互為巨杜子春讀為參互以周知四國之治以詔王及冡宰廢置周猶徧也言四國者本逆邦國之治亦鈎考以告司書掌邦之六典八法八則九職九正九事邦中之版土地之圖以周知入出百物以敘其財受其幣使入於職幣九正謂九賦九貢正税也九事謂九式變言之者重其職明本而掌之非徒相副貳也叙猶比次也謂鉤考其財幣所給及其餘見為之簿書故書受為授鄭司農云授當為受謂受財帛之簿書也𤣥謂亦受録其餘幣而為之簿書使之入于職幣幣物當以時用之久藏将朽蠧凡上之用財用必考於司㑹上謂王與冢宰王雖不㑹亦當知多少而闕之司㑹以九式均節邦之財用三嵗則大計羣吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆羣吏之徴令械猶兵也逆受而鉤考之山林川澤童枮則不税凡税斂掌事者受法焉及事成則入要貳焉法猶數也應當税者之數成猶畢也凡邦治考焉考其法於司書職内掌邦之賦入辨其財用之物而執其總以貳官府都鄙之財入之數以逆邦國之賦用辨財用之物處之使種類相從總謂簿書之種别與大凡官府之有財入若闗市之屬凡受財者受其貳令而書之受財受於職内以給公用者貳令謂若今御史所寫下本奏王所可者書之若言某月某日某甲詔書出其物若干給某官某事及㑹以逆職嵗與官府財用之出亦參互鉤考之而敘其財以待邦之移用亦鉤考今嵗中餘見為之簿移用謂轉運給他職嵗掌邦之賦出以貳官府都鄙之財出賜之數以待㑹計而考之以貳者亦如職内書其貳令而編存之凡官府都鄙羣吏之出財用受式法於職嵗百官之公用式法多少職嵗掌出之舊用事存焉凡上之賜予以敘與職幣授之叙受賜者之尊卑及㑹以式法賛逆㑹助司會鉤考羣吏之計職幣掌式法以斂官府都鄙與凡用邦財者之幣幣謂給公用之餘凡用邦財者謂軍旅振掌事者之餘財振猶抍也檢也掌事謂以王命有所作為先言斂幣後言振財互文皆辨其物而奠其録以書楬之以詔上之小用賜予奠定也故書録為禄杜子春云禄當為録定其録籍鄭司農云楬之若今時為書以著其幣嵗終則㑹其出凡邦之㑹事以式法賛之並天官遺人掌邦之委積以待施恵鄉里之委積以恤民之囏阨門闗之委積以養老孤郊里之委積以待賓客野鄙之委積以待羇旅縣都之委積以待凶荒委積者廩人倉人計九穀之數足國用以其餘共之所謂餘法用也職内邦之移用亦如此也皆以餘財共之少曰委多曰積鄉里鄉所居也囏阨猶困乏也門關以養老孤人所出入易以取餼廩也羇旅過行寄止者待凶荒謂邦國所當通給者也故書囏阨作槿阨羇作寄杜子春云槿阨當為艱阨寄當為羇凡委積之事巡而比之以時頒之委人以稍聚待賓客以甸聚待羇旅聚凡畜聚之物也凡其余聚以待頒賜余當為餘聲之誤也餘謂縣都畜聚之物廩人掌九榖之數以待國之匪頒賙賜稍食匪讀為分分頒謂委人之職諸委積也賙賜謂王所賜予給好用之式也稍食禄廩以嵗之上下數邦用以知足否以詔榖用以治年之凶豐數猶計也凡萬民之食食者人四鬴上也人三鬴中也人二鬴下也此皆謂一月食米也六斗四升曰鬴若食不能人二鬴則令邦移民就榖詔王殺邦用就榖就都鄙之有者殺猶減也舍人掌平宫中之政分其財守以法掌其出入政謂用穀之政也分其財守者計其用穀之數分送宫正内宰使守而頒之也而行出于廩人其有空缺則計之還入掌米粟之出入辨其物九穀六米别為書嵗終則㑹計其政政用穀之多少倉人掌粟入之藏九穀盡藏焉以粟為主辨九榖之物以待邦用若穀不足則止餘法用有餘則藏之以待凶而頒之止猶殺也殺餘法用謂道路之委積所以豐優賓客之屬舂人掌共米物米物言非一米掌凡米事稾人掌共外内朝冗食者之食外朝司冦斷獄弊訟之朝也今司徒府中有百官朝會之殿云天子與丞相舊决大事焉是外朝之存者與内朝路門外之朝也冗食者謂留治文書若今尚書之屬諸直上者並地官酒正掌酒之賜頒皆有法以行之法尊卑之差凡有秩酒者以書契授之鄭司農云有秩酒者給事中予之酒秩常也常受酒者國語曰至于今秩之𤣥謂所秩者謂老臣王制曰七十不俟朝八十月告存九十日有秩酒正之出日入其成月入其要小宰聴之出謂授酒材及用酒之多少也受用酒者日言其計于酒正酒正月盡言于小宰嵗終則㑹唯王及后之飲酒不㑹司裘凡邦之皮事掌之嵗終則㑹唯王之裘與其皮事不㑹掌皮掌秋斂皮冬斂革春獻之皮革踰嵗乾久乃可用獻之獻其良者于王以入司裘給王用遂以式法頒皮革於百工式法作物所用多少故事共其毳毛為氊以待邦事當用氊則共之毳毛毛細縟者嵗終則㑹其財齎財斂財本數及餘見者齎所給予人以物曰齎今時詔書或曰齎計吏鄭司農云齎或為資内宰嵗終則㑹内人之稍食内人主謂九御㑹内宫之財用計夫人已下所用財典絲掌絲入而辨其物以其賈楬之絲入謂九職之嬪婦所貢絲掌其藏與其出以待興功之時絲之貢少藏之出之可同官也時者若温暖宜縑帛清凉宜文繡頒絲於外内工皆以物授之外工外嬪婦也内工女御凡上之賜予亦如之王以絲物賜人及獻功則受良功而藏之辨其物而書其數以待有司之政令上之賜予良當為苦字之誤受其麄盬之功以給有司之公用其良功者典婦功受之以共王及后之用鄭司農云良功絲功縑帛凡飾邦器者受文織絲組焉謂茵席屏風之屬嵗終則各以其物㑹之種别為計鄭司農云各以其所飾之物計㑹傅著之典枲掌布緦縷紵之麻草之物以待時頒功而授齎緦十五升布抽其半者白而細疏曰紵雜言此數物者以著其類衆多草葛䔛之屬故書齎作資及獻功受苦功以其賈楬而藏之以待時頒其良功亦入於典婦功以共王及后之用鄭司農云苦功謂麻功布紵頒衣服授之賜予亦如之授之授受頒者帛言待有司之政令布言頒衣服互文嵗終則各以其物㑹之並天官天子百里之内以共官千里之内以為御謂此地之田税所給也官謂其文書財用也御謂衣食制王右財用厲王説榮夷公説好也榮國名夷諡也芮良夫曰芮良夫周大夫芮伯也王室其将卑乎卑㣲也夫榮公好専利而不知大難専擅也夫利百物之所生也利生於物也専利是専百物天地之所載也載成也地受天氣以成百物而或専之其害多矣害謂惡害榮公者多也孔子曰放於利而行多怨天地百物皆将取焉胡可専也天地成百物民皆将取用之何可専其利夫王人者将𨗳利而布之上下者也導開也布賦也上謂天神下謂人物使神人百物無不得其極極中也猶日怵惕懼怨之來也怵惕恐懼也今王學専利其可乎國語周語子云君子不盡利以遺民不與民争利也故君子仕則不稼田則不漁食時不力珍大夫不坐羊士不坐犬食時謂食四時之膳也力猶務也天子諸侯有秩膳古者殺牲食其肉坐其皮是不無故殺之以此坊民民猶忘義而争利以亡其身坊記君子先慎乎德有德此有人有人此有土有土此有財有財此有用先慎乎徳承上文不可不謹而言徳即所謂明徳有人謂得衆有土謂得國有國則不患無財用矣徳者本也財者末也本上文而言外本内末争民施奪人君以徳為外以財為内則是争鬭其民而施之以刼奪之教也盖財者人之所同欲不能絜矩而欲専之則民亦起而争奪矣是故財聚則民散財散則民聚外本内末故財聚争民施奪故民散反是則有徳而有人矣是故言悖而出者亦悖而入貨悖而入者亦悖而出悖逆也此以言之出入明貨之出入也自先慎乎徳以下又因財貨以明能絜矩與不能者之得失也生財有大道生之者衆食之者寡為之者疾用之者舒則財恒足矣吕氏曰國無遊民則生者衆矣朝無幸位則食者寡矣不奪農時則為之疾矣量入為出則用之舒矣愚按此因有土有財而言以明足國之道在乎務本而節用非必外本内末而後財可聚也自此以至終篇皆一意也仁者以財𤼵身不仁者以身𤼵財發猶起也仁者散財以得民不仁者亡身以殖貨未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也上好仁以愛其下則下好義以忠其上所以事必有終而府庫之財無悖出之患也孟獻子曰畜馬乗不察於雞豚伐冰之家不畜牛羊百乗之家不畜聚斂之臣與其有聚斂之臣寕有盜臣此謂國不以利為利以義為利也孟獻子魯之賢大夫仲孫蔑也畜馬乗士初試為大夫者也伐冰之家卿大夫以上䘮祭用冰者也百乗之家有采地者也君子寕亡已之財而不忍傷民之力故寕有盗臣而不畜聚斂之臣此謂以下釋獻子之言也長國家而務財用者必自小人矣彼為善之小人之使為國家菑害並至雖有善者亦無如之何矣此謂國不以利為利以義為利也自由也言由小人導之也此一節深明以利為利之害而重言以結之其丁寕之意切矣並大學孟子曰無政事則財用不足生之無道取之無度用之無節故也鬭且曰古者聚貨不妨民衣食之利聚馬不害民之財用貨珠玉之屬自然物也貨馬多則養求者衆妨財用力也國馬足以行軍國馬民馬也十六井為丘有戎馬一匹牛三頭足以行軍也公馬足以稱賦公馬公之戎馬稱舉也賦兵賦也不是過也公貨足以賓獻賓饗獻貢也家貨足以共用家大夫也不是過也楚語古者税什一豐年補敗敗謂凶年不外求而上下皆足也雖累凶年民弗病也荘二十八年穀梁傳天子不言多少諸侯不言利害大夫不言得喪皆謂言貨財也士不通貨財士賤雖得言之亦不得貿遷如商賈也有國之君不息牛羊息蕃育也錯質之臣不息雞豚錯置也質讀為贄孟子曰出疆必載質盖古字通耳置贄謂執贄而置于君士相見禮曰大夫奠贄于君再拜稽首禮記曰畜馬乗者不察於雞豚或曰置贄猶言委質也言凡委質為人臣則不得與下争利冢卿不脩幣大夫不為埸園冢卿上卿不修幣謂不修財幣販息之也治稼穡曰埸樹菜蔬曰園謂若公儀子不奪園夫工女之利也從士以上皆羞利而不與民争業樂分施而恥積藏然後民不困財貧窭者有所竄其手竄容也謂有所容其手而力作也多積財而羞無有羞貧重民任而誅不能使民不能勝任而復誅之此邪行之所以起刑罰之所以多也上好羞則民闇飾矣好羞貧而事奢侈則民闇自修飾也上好富則民死利矣二者亂之衢也衢道民語曰欲富乎忍恥矣傾絶矣絶故舊矣與義分背矣忍恥不顧亷恥傾絶謂傾身絶命而求也分背如人分背而行上好富則人民之行如此安得不亂荀子司市國凶荒札喪則市無征而作布詳見政事下外府掌邦布之入出以共百物而待邦之用凡有法者詳見上章廛人掌斂市絘布總布質布罰布廛布而入於泉府詳見政事下泉府掌以市之征布斂市之不售貨之滯於民用者同上右泉幣湯七年旱禹五年水人之無􅕷有賣子者湯以荘山之金鑄幣而贖人之無􅕷賣子者禹以歴山之金鑄幣以救人之困夫玉起於禺氏金起於汝漢珠起於赤墅東西南北去周七八千里水絶壤斷舟車不能通為其途之逺其至之難故託用於其重以珠玉為上幣以黄金為中幣以刀布為下幣三幣握之則非有補於暖也食之則非有補於飽也先王以守財物以御人事而平天下也是以命之曰衡衡者使物一髙一下不得有調也管子太公為周立九府圜法師古曰周官太府玉府内府外府泉府天府職内職金職幣皆掌財幣之官故云九府圜謂均而通也黄金方寸而重一斤錢圜函方孟康曰外圜而内孔方也輕重以銖師古曰言黄金以斤為名錢則以銖為重也布帛廣二尺二寸為幅長四丈為匹故貨寳於金利於刀如淳曰名錢為刀者以其利於民也流於泉如淳曰流行如泉也布於布如淳曰布於民間束於帛李竒曰束聚也太公退又行之於齊前漢食貨志景王二十一年将鑄大錢景王周靈王之子景王貴也二十一年魯昭之十八年也錢者金幣之名所以貿買物通財用也古曰泉後轉曰錢賈侍中云虞夏商周金幣三等或赤或白或黄黄為上幣銅鐡為下幣大錢者大于舊其賈重也唐尚書云大錢重十二銖文曰大泉五十鄭司農説周禮云錢始盖一品也周景王鑄大錢而有二品後數變易不識本制至漢唯五銖久行王莽時錢乃有十品今存于民多者有貨布大泉貨泉大泉徑寸二分重十二銖文曰大泉五十則唐君所謂大泉者乃莽時泉非景王所鑄明矣又景王至赧王十三世而周亡後有戰國秦漢幣物改轉不相因先師所不能紀或云大錢文曰寳貨皆非事實又單穆公云古者有母權子子權母而行然則二品之來古而然矣鄭君云錢始一品至景王有二品考之不詳耳單穆公曰不可穆公王卿士單靖公之曽孫古者天灾降戾降下也戾至也灾謂水旱蟲螟之類於是乎量資幣權輕重以振救民量猶度也資財也權稱也振拯也民患輕則為之作重幣以行之民患幣輕而物貴則作重幣以行其輕也於是乎有母權子而行民皆得焉重曰母輕曰子以子貿物物輕則子獨行物重則以母權而行之子母相通民皆得其欲若不堪重則多作輕以行之亦不廢重於是乎有子權母而行小大利之堪任也不任之者幣重物輕妨其用也故作輕幣雜而用之以重貿其貴以輕貿其賤子權母者母不足則以子平而行之故錢小大民皆以為利也今王廢輕而作重民失其資能無匱乎廢輕而作重則本竭而末寡故民失其資也若匱王用将有所乏民財匱無以供上故王用将乏也乏則将厚取於民厚取厚斂也民不給将有逺志是離民也給供也逺志逋逃也且絶民用以實王府絶民用謂廢小錢斂而鑄大也猶塞川原而為潢汚也其竭也無日矣大曰潢小曰汚竭盡也無日無日數也王其圖之王弗聴卒鑄大錢國語周語禮書綱目卷六十五
