body:
  text: 禮書綱目卷十九婺源江永撰補服凶禮二補黄氏曰補服有五有見本經傳記者有見它記者有見注疏者又有心喪有弔服悉類而分之以補經文之缺父卒為祖後者服斬詳見不杖期章為君之父母妻長子祖父母條傳與諸侯為兄弟者服斬喪服小記條見斬衰章君下女為父喪未練而出則三年既練而出則已既練而反則遂之小記衰詳見斬章子嫁反在父之室為父三年條下子又案不杖期章為君之父母妻長子祖父母疏云天諸侯父在為祖皆斬衰無期疏又云為曽祖後者服斬諸斬衰章子嫁反在父之室云天子之女嫁于諸侯侯之女嫁于大夫仍為父不降斬衰三年臣斬衰章諸侯為天子條下為天王斬衰疏云諸侯諸皆為王斬衰又斬衰章君條下與諸侯為兄弟者服斬疏云凡與諸侯有五屬之親者皆服斬衰諸侯之尊不可以本親輕服服之又不杖章為君之父母妻長子祖父母條下為王后齊衰疏云士為國君斬衰又云大夫之適子為君如士服斬衰天又云天子卿大夫適子為子當如士服斬衰右補斬衰祖父卒而後為祖母後者三年小記祖詳見不杖章父母條為所後者之妻若子詳見斬衰章為人後者傳女為母喪未練而出則三年既練而出則已既練而反則遂之詳見斬衰章章又按不杖期祖父母條祖父卒而后為祖母後者三年疏云若祖卒時父在已雖為祖期今父歿祖母亡亦為祖母三年緦麻章庶子為父後者為其母傳注云大夫卒庶子為母三年又云士雖在庶子為母皆如衆人斬衰章子嫁反在父之室疏云天子之女嫁于諸侯諸侯之女嫁于大夫仍為母齊衰三年右補齊衰三年為所後者之妻若子詳見斬衰章為人後者傳卒又案不杖章祖父母條下祖父而後為祖母後者三年注云祖父在適孫為祖母服如父在為母齊衰杖期不杖章大夫之適子為妻注云大夫之庶子為妻杖期為又云大夫之適子父沒後妻杖期右補齊衰杖期司服凡喪為王后齊衰王后小君也諸侯為之不杖期春官君為天子三年夫人如外宗之為君也詳見斬衰章諸侯為天子條外宗為君夫人猶内宗也見斬衰章君條大夫之適子為君夫人大子如士服見斬衰章君條女未練而反則期詳見斬衰章子嫁反在父之室為父三年條世子為妻與大夫之適子同見不杖期章大夫之適子為妻條公子之妻為其皇姑詳見喪服義叔又不杖期章世父父母父父母傳注及昆弟注並云為姑姊妹在室亦如之為衆子注云女子子在室亦如之黄氏曰姑姊妹女子子服經無明文見于注疏者有此三條葢姪之為姑兄弟之為姊妹父母之為女子子其服如此則在室姑之為姪在室姊妹之為兄弟在室女子子之為父母及其餘親其服並當與男子服同齊衰杖期妻傳注云適子父在則為妻不杖疏王為適孫適曽孫適𤣥孫適來孫皆齊衰出司服注又案喪服傳云始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟天子之義亦當然若虞舜之與漢髙皆庶人起為天子葢亦不臣諸父昆弟而有服也衰不杖章為君之父母妻長子祖父母條下為王后齊疏云諸侯諸臣皆為王后齊衰又云士為小君期人又云大子君服斬臣从服期卿又云大夫適子為夫大子如士服期又云天子大夫適子為王后大子如士服期俱又斬衰章君條下與諸侯為兄弟者服斬疏云兄弟作諸侯則各依本服不杖期大功章大夫之妾為君之庶子注云士之妾為君之衆子亦期大功章適婦條適婦不為舅後者注云凡父母于子將不傳重于適及將所傳重者非適服之皆如庶子不杖期右補齊衰不杖期宗子孤為殤大功衰小功衰皆三月親則月算如邦人詳見齊衰三月章丈夫婦人為宗子宗子之母妻條為所後者之祖父母若子詳見斬衰章為人後者傳衰又案齊衰三月章曽祖注疏云髙祖齊衰三月斬章君條外宗為君夫人猶内宗也疏云内宗五屬之女嫁于庶人从為國君齊衰三月齊衰三月章庶人為國君注疏云天子圻内之民為天子齊衰三月又繐衰章諸侯之大夫為天子疏云圻内為天子齊衰三月則圻外之民不服可知右補齊衰三月夫為人後者其妻為舅姑大功見齊衰不杖期章為人後者為其父母報條公叔木有同母異父之昆弟死問于子㳺木當為朱春秋作戍衛公叔文子之子定公十四年奔衛子㳺曰其大功乎疑所服也親者屬大功是狄儀有同母異父之昆弟死問于子夏子夏曰我未之前聞也魯人則為之齊衰狄儀行齊衰今之齊衰狄儀之問也檀弓齊榖王姬之喪榖當為告聲之誤也王姬周女齊襄公之夫人魯荘公為之大功或曰由魯嫁故為之服姊妹之服或曰外祖母也故為之服春秋周女由魯嫁卒服之如内女服姊妹是也天子為之無服嫁于王者之後乃服之荘公齊襄公女弟文姜之子當為舅之妻非外祖母也外祖母又小功也檀弓又案不杖期章大夫之庶子為適昆弟傳注云大夫適子為庶昆弟大功又云庶昆弟相為亦大功小功章大夫之妾為庶子適人者注云君之庶女子在室大功嫁于大夫亦大功大功章皆為从父昆弟之為大夫者注云適子于从父昆弟之為大夫者大功天大功章庶孫注疏云女孫在室大功又司服疏云子諸侯為適子之婦大功右補大功適婦不為舅後者則姑為之小功見大功章適婦條為所後者妻之父母若子詳見斬衰章為人後者傳舅又案大功章適婦條下適婦不為後者注云舅姑于婦将不傳重于適及将所傳重者非適服之如庶婦小功又司服疏云天子諸侯為適孫之婦小功右補小功公子之妻為公子之外兄弟謂為公子之外祖父母从母緦詳見喪服義為所後者之妻之昆弟若子詳見斬衰章為人後者傳為所後者之妻之昆弟之子若子同上從母之夫舅之妻二夫人相為服君子未之言也二夫人猶言此二人也時有此二人同居死相為服者甥居外家而非之或曰同㸑緦以同居生緦之親可檀弓士妾有子而為之緦無子則己士卑妾無男女則不服不别貴賤小記改葬緦為坟墓以他故崩壊将亡失屍柩也言改葬者明棺物毁敗改設之如葬時也其奠如大歛从廟之廟从墓之墓禮宜同也服緦者臣為君也子為父也妻為夫也必服緦者親見屍柩不可以無服緦三月而除之喪服記葬桓王改葬也改葬之禮緦舉下緬也緦者五服最下言舉下緬上从細皆反其故服因葬桓王記改葬之禮不謂改葬桓王當服緦也江熈曰葬稱公舉五等之上改葬禮緦舉五服之下以喪緬藐逺天子諸侯易服而葬以為交于神明者不可以純凶况其緬者乎是故改葬之禮其服惟輕言緬釋所以緦也从荘三年春秋穀梁傳又又按喪服小記以五為九疏父昆弟之孫緦麻云兄弟之曽孫緦麻報緦麻章夫之諸祖父母報注疏云夫之从祖祖父母緦麻又云夫之外祖父母報緦麻又案凡言報者皆兩相為服以夫之外祖父母報推之則外祖父母為女子子之子之妻緦麻又以夫之从祖祖父母報推之則兄弟之孫婦緦麻右補緦五世袒免詳見喪服義族之相為也冝免不免有司罰之詳見弔禮右補五世袒免事師服勤至死心喪三年心喪戚容如父而無服也凡此以恩義之間為制檀弓師無當於五服五服弗得不親當猶主也五服斬衰至緦麻之親學記孔子之喪門人疑所服子貢曰昔者夫子之喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服弔服而加麻心喪三年檀弓孔子之喪二三子皆絰而出尊師也出謂有所之適然則凡弔服加麻者出則變服羣居則絰出則否羣謂七十二弟子相為朋友服子夏曰吾離羣而索居絰檀弓否又案家語子㳺曰吾聞諸夫子喪朋友居則出則喪所尊雖絰而出可也孔子沒三年之外門人治任将歸入揖于子貢相嚮而哭皆失聲然後歸子貢反築室于場獨居三年然後歸三年古者為師心喪三年若喪父而無服也任擔也場冢上之壇場也孟子孔子葬于魯城北弟子皆家于墓行心喪之禮家語期又案齊衰杖章父在為母傳疏云父在為母杖期心喪三年右補心喪三年無服而為位者唯嫂叔及婦人降而無服者麻雖無服猶弔服加麻袒免為位哭也正言嫂叔尊嫂也兄之于弟之妻則不能也婦人降而無服族姑姊妹嫁者也逸奔喪禮曰無服袒免為位者唯嫂與叔凡為其男子服其婦人降而無服者麻奔喪傳曰夫之昆弟何以無服也其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也謂弟之妻婦者是嫂亦可謂之母乎故名者人治之大者也可無慎乎詳見大功夫之祖父母世叔父母條嫂叔之無服也葢推而逺之也見喪服義朋友麻朋友雖無親有同道之恩相為服緦之絰帶檀弓曰羣居則絰出則否其服弔服也周禮曰凡弔當事則弁絰其服有三錫衰也緦衰也疑衰也王為三公六卿錫衰為諸侯緦衰為大夫士疑衰諸侯及卿大夫亦以錫衰為弔服當事則弁絰否則皮弁辟天子也士以緦衰為喪服其弔服則疑衰也舊説以為士弔服布上素下或曰素委貌冠加朝服論語緇衣羔裘又曰羔裘𤣥冠不以弔何朝服之有乎然則二者皆有似也此實疑衰也其弁絰皮弁之時則如卿大夫然又改其裳以素辟諸侯也朋友之相為服即士弔服疑衰素裳庶人不爵弁則其冠素委貌喪服篇記秦荘子死孟武伯問于孔子曰古者同寮有服乎荅曰然同寮有相友之義貴賤殊等不為同官聞諸老聃昔者虢叔閎夭太顛散宜生南宫适五臣同寮比徳以賛文武虢叔死四人者為之服朋友之服古之達禮者行之也孔叢子朋友皆在他邦袒免歸則已謂無親者當為之主每至袒時則􅃝袒則去冠代之以免舊説云以為免象冠廣一寸已猶止也歸有主則止也主若㓜少則未止小記曰大功者主人之喪有三年者則必為之再祭朋友虞祔而已喪服記又案斬衰章君傳疏云士無臣故僕𨽻等為之弔服加麻右補弔服加麻司服凡弔事弁絰服弁絰者如爵弁而素加環絰論語曰羔裘𤣥冠不以弔絰大如緦之絰其服錫衰緦衰疑衰諸侯及卿大夫亦以錫衰為弔服喪服小記曰諸侯弔必皮弁錫衰則變其冠耳喪服舊説以為士弔服素委貌冠朝服此近庶人弔服而衣猶非也士當事弁絰疑衰變其裳以素耳國君于其臣弁絰他國之臣則皮弁大夫士有朋友之恩亦弁絰故書弁作􅩕鄭司農讀􅩕為弁弁而加環絰即弁絰服春官弁師王之弁絰弁而加環絰諸侯及孤卿大夫之弁絰各以其等為之而掌其禁令詳見制度凡弁絰其衰侈袂同上司服王為三公六卿錫衰為諸侯緦衰為大夫士疑衰其首服皆弁絰同上天子之哭諸侯也爵弁絰䊷衣服士之祭服以哭之明為變也天子至尊不見尸柩不弔服麻不加于采此言絰衍字也時人間有弁絰因云之耳周禮王弔諸侯弁絰緦衰也檀弓公為卿大夫錫衰以居出亦如之當事則弁絰大夫相為亦然為其妻徃則服之出則否弁絰如爵弁而素加絰也不當事則皮弁出謂以他事不至喪所服問諸侯弔必皮弁錫衰所弔雖已葬主人必免主人未喪服則君亦不錫衰必免者尊人君為之變也未喪服未成服也既殯成服小記大夫有私喪之葛則于其兄弟之輕喪則弁絰私喪妻子之喪也輕喪緦麻也大夫降焉弔服而徃不以私喪之末臨兄弟雜記大夫之哭大夫弁絰大夫與殯亦弁絰弁絰者大夫錫衰相弔之服也如爵弁而素加環絰曰弁絰同上大夫弔于命婦錫衰命婦弔于大夫亦錫衰弔于命婦命婦死也弔于大夫大夫死也小記曰諸侯弔必皮弁錫衰服問曰公為卿大夫錫衰以居出亦如之當事則弁絰大夫相為亦然為其妻徃則服之出則否傳曰錫者何也麻之有錫者也錫者十五升抽其半無事其縷有事其布曰錫謂之錫者治其布使之滑易也錫者不治其縷衰在内也緦者不治其布衰在外也君及卿大夫弔士雖當事皮弁錫衰而已士之相弔則如服友服疑衰素裳凡婦人相弔吉弁無首素總喪服記羔裘𤣥冠不以弔喪主素吉主𤣥吉凶異服論語季桓子死魯大夫朝服而弔子㳺問于孔子曰禮乎夫子不荅他日又問夫子曰始死羔裘𤣥冠者易之而已汝何疑焉家語曽子襲裘而弔子㳺裼裘而弔曽子指子㳺而示人曰夫夫也為習于禮者如之何其裼裘而弔也曽子蓋知臨喪無飾夫夫猶言此丈夫也子㳺于時名為習禮主人既小斂袒括髪子㳺趨而出襲裘帶絰而入曽子曰我過矣我過矣夫夫是也于主人變乃變也所弔者朋友檀弓衛司徒敬子死司徒官氏公子許之後子夏弔焉主人未小斂絰而徃子㳺弔焉主人既小斂子㳺出絰反哭皆以朋友之禮徃而二人異子夏曰聞之也與曰聞諸夫子主人未改服則不絰同上魯昭公夫人呉孟子已卒不赴于諸侯孔子既致仕而徃弔焉適于季氏季氏不絰孔子投絰而不拜以季氏無禮故已亦不成禮子㳺問曰禮與孔子曰主人未成服則弔者不絰焉禮也家語適又案春秋左氏傳云孔子與弔季氏季氏不絻放絰而拜魯婦人之髽而弔也自敗于臺鮐始也敗于臺鮐魯㐮公四年秋也臺當為壺字之誤也春秋傳作狐鮐時家家有喪髽而相弔去纚而紒曰髽禮婦人弔服大夫之妻錫衰士之妻則疑衰與皆吉笄無首素總檀弓右補弔服禮書綱目卷十九
