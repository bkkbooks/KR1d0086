body:
  text: 禮書綱目卷八婺源江永撰養老嘉禮十三補凡養老五帝憲憲法也養之為法其徳行三王有乞言有讀為又又從之求善言可施行也五帝憲養氣體而不乞言有善則記之為惇史三王亦憲既養老而后乞言亦㣲其禮皆有惇史惇史史惇厚者也㣲其禮者依違言之求而不切也内則有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊皆學名也異者四代相變耳或上西或上東或貴在國或貴在郊上庠右學大學也在西郊下庠左學小學也在國中王宫之東東序東膠亦大學在國中王宫之東西序虞庠亦小學也在西郊膠之言糾也庠之言養也周之小學為有虞氏之庠制是以名庠云其立鄉學亦如之膠或作絿有虞氏深衣而養老夏后氏燕衣而養老殷人縞衣而養老周人𤣥衣而養老凡養老之服皆其時與羣臣燕之服有虞氏質深衣而已夏而改之尚黒而黑衣裳殷尚白而縞衣裳周則兼用之𤣥衣素裳其冠則牟追章甫委貌也諸侯以天子之燕服為朝服燕禮曰燕朝服服是服也王者之後亦以燕服為之魯季康子朝服以縞僭宋之禮也天子皮弁以日視朝也王制凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之兼用之備隂陽也凡飲養陽氣食養隂氣陽用春夏隂用秋冬同上凡三王養老皆引年已而引户校年當行復除也若人衆多非賢者不可皆養同上右通論厯代養老五十養於鄉六十養於國七十養於學達於諸侯天子諸侯養老同也國國中小學在王宫之左學大學也在郊小學在國中大學在郊此殷制明矣王制天子視學大昕鼔徵衆至然後天子至乃命有司行事興秩節祭先師先聖焉有司卒事反命始之養也適東序釋奠於先老遂設三老五更羣老之席位焉適饌省醴養老之珍具遂發咏焉退修之反登歌清廟既歌而語下管象舞大武大合衆以事有司告以樂闋王乃命公侯伯子男及羣吏曰反養老幼於東序詳見下傳食三老五更於大學天子袒而割牲執醬而饋執爵而酳冕而總干詳見下傳凡養老乞言合語之禮皆小樂正詔之於東序養老乞言養老人之賢者因從乞善言可行者也合語謂鄉射鄉飲酒大射燕射之屬也鄉射記曰古者於旅也語語説命乞言皆大樂正授數語説合語之説也數篇數文王世子凡大合樂必遂養老大合樂謂春入學舍菜合舞秋頒學合聲於是時也天子則視學焉遂養老者謂用其明日也鄉飲酒鄉射之禮明日乃息司正徴唯所欲以告於先生君子可也是養老之象類同上羅氏中春羅春鳥獻鳩以養國老春鳥蟄而始出者若今南郡黄雀之屬是時鷹化為鳩鳩與春鳥變舊為新宜以養老助生氣夏官仲秋養衰老授几杖行糜粥飲食助老氣也行猶賜也月令外饔邦饗耆老則掌其割亨之事王制曰周人養國老於東膠飬庶老於虞庠天官酒正饗耆老共其酒無酌數要以醉為度同上槀人若饗耆老共其食地官遺人門闗之委積以養老孤門闗以養老孤人所出入易以取餼廪也同上司門以其財養死政之老與其孤財所謂門闗之委積也死政之老死國事者之父母也孤其子同上右養老禮天子視學大昕鼓徴所以警衆也早昧爽擊鼔以召衆也警猶起也周禮凡用樂大胥以鼓徴學士衆至然後天子至乃命有司行事興秩節祭先師先聖焉興猶舉也秩常也節猶禮也使有司攝其事舉常禮祭先師先聖不親祭之者視學觀禮耳非為彼報也有司卒事反命告祭畢也祭畢天子乃入始之養也又之養老之處凡大合樂必遂養老是以徃焉言始始立學也適東序釋奠於先老親奠之者已所有事也遂設三老五更羣老之席位焉三老五更各一人也皆年老更事致仕者也天子以父兄養之示天下之孝弟也名以三五者取象三辰五星天所因以照明天下者羣老無數其禮亡以鄉飲酒禮言之席位之處則三老如賔五更如介羣老如衆賔適饌省醴養老之珍具親視其所有也遂發咏焉退修之以孝養也發咏謂以樂納之退修之謂既迎而入獻之以醴獻畢而樂闋反登歌清廟反謂獻羣老畢皆升就席也反就席乃席工於西階上歌清廟以樂之既歌而語以成之也言父子君臣長㓜之道合徳音之致禮之大者也既歌謂樂正告正歌備也語談説也歌備而旅旅而説父子君臣長㓜之道説合樂之所美以成其意鄉射記曰古者於旅也語下管象舞大武大合衆以事達有神興有德也象周武王伐紂之樂也詩維清奏象舞是也以管播其聲又為之舞皆於堂下衆謂所合學士達有神明天授命周家之有神也興有徳美文王武王有德師樂為用前歌後舞正君臣之位貴賤之等焉而上下之義行矣由清廟與武也有司告以樂闋闋終也告君以歌舞之樂終此所告者謂無算樂王乃命公侯伯子男及羣吏曰反養老㓜於東序終之以仁也羣吏鄉遂之官王於燕之末而命諸侯時朝㑹在此者各反養老如此禮是終其仁心孝經説所謂諸侯歸各帥於國大夫勤於朝州里􅚮於邑是也是故聖人之記事也謂記序前代事也慮之以大謂先本於孝弟之道愛之以敬謂省其所以養老之具行之以禮謂親迎之如見父兄修之以孝飬謂親獻之薦之紀之以義謂既歌而語之終之以仁謂又以命諸侯歸於國復自行之是故古之人一舉事而衆皆知其徳之備也古之君子舉大事必愼其終始而衆安得不喻焉言其為之本末露見盡可得而知也喻猶曉也兌命曰念終始典於學兑當為説説命書篇名殷高宗之臣傅説之所作典常也念事之終始常於學學禮義之府文王世子食三老五更於大學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也割牲制俎實也酳食罷飲也干盾也冕而總干親在舞位以樂侑食也教諸侯之弟次事親樂記註云三老五更互言之耳皆老人更知三徳五事者也冕而總干親在舞位也周名大學曰東膠是故鄉里有齒而老窮不遺强不犯弱衆不暴寡此由大學來者也祭義王者父事三老兄事五更者何欲陳孝悌之徳以示天下也故雖天子必有尊也言有父也必有先也言有兄也天子臨辟雍親􅃝割牲尊三老父象也竭忠奉几杖授安車濡輪恭綏執授兄事五更寵接禮交加客謙敬順貎也白虎通饗禘有樂而食嘗無樂隂陽之義也凡飲養陽氣也凡食養隂氣也故春禘而秋嘗春饗孤子秋食耆老其義一也郊特牲伊耆氏共王之齒杖王之所以賜老者之杖鄭司農云謂年七十當以王命受杖者今時亦命之為王杖𤣥謂王制曰五十杖於家六十杖於鄉七十杖於國八十杖於朝秋官八十拜君命一坐再至瞽亦如之九十使人受命謂君不親饗食必以其禮致之五十異粻六十宿肉七十貳膳八十常珍九十飲食不離寢膳飲從於遊可也粻糧也貳副也遊謂出入上觀六十歳制七十時制八十月制九十日修唯絞紟衾冒死而后制絞紟衾冒一日二日而可為者五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣煖温五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從尊養之七十不俟朝大夫士之老者揖君則退八十月告存毎月致膳九十日有秩秩常也有常膳五十不從力政六十不與服戎七十不與賔客之事八十齊喪之事弗及也力稍衰也力政城道之役也與及也八十不齊則不祭也子代之祭是謂宗子不孤五十而爵賢者命為大夫六十不親學不能備弟子禮七十致政唯衰麻為䘮致政還君事王制八十者一子不從政九十者其家不從政同上父之齒隨行兄之齒鴈行朋友不相踰廣敬也謂於塗中輕任并重任分斑白者不提挈皆謂以與少者雜色曰斑君子耆老不徒行庶人耆老不徒食徒猶空也徒行謂無車徒食謂無肉同上天子廵守諸侯待於竟天子先見百年者問其國君以百年者所在而徃見之八十九十者東行西行者弗敢過西行東行者弗敢過欲言政者君就之可也弗敢過者謂道經之則見之壹命齒於鄉里再命齒於族三命不齒族有七十者弗敢先此謂鄉射飲酒時也齒者謂以年次立若坐也三命列國之卿也不復齒席之於賔東不敢先族之七十者謂既一人舉觶乃入也雖非族亦然承齒乎族故言族爾七十者不有大故不入朝若有大故而入君必與之揖譲而后及爵者謂致仕在家者其入朝君先與之為禮而后揖卿大夫士祭義大夫七十而致事致其所掌之事於君而告老若不得謝謝猶聽也君必有命勞苦辭謝之其有德尚壯則不聽耳則必賜之几杖行役以婦人適四方乘安車自稱曰老夫几杖婦人安車所以養其身體也安車坐乘若今小車也老夫老人稱也亦明君尊賢春秋傳曰老夫耄矣於其國則稱名君雖尊異之自稱猶若臣越國而問焉必告之以其制鄰國來問必問於老者以答之制法度曲禮右尚齒昔者有虞氏貴德而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒貴謂燕賜有加於諸臣也尚謂有事尊之於其黨也臣能世禄曰富舜時多仁聖有德後徳則在小官虞夏殷周天下之盛王也未有遺年者年之貴乎天下乆矣次乎事親也言其先老也是故朝廷同爵則尚齒七十杖於朝君問則席八十不俟朝君問則就之而弟達乎朝廷矣同爵尚齒老者在上也君問則席為之布席於堂上而與之言凡朝位立於庭魯哀公問於孔子命席不俟朝君揖之即退不待朝事畢也就之就其家也老而致仕君或不許異其禮而已行肩而不併不錯則隨見老者則車徒辟斑白者不以其任行乎道路而弟達乎道路矣錯鴈行也父黨隨行兄黨鴈行車徒辟乘車歩行皆辟老人也斑白者髪雜色也任所擔持也不以任少者代之居鄉以齒而老窮不遺强不犯弱衆不暴寡而弟達乎州巷矣老窮不遺以鄉人尊而長之雖貧且無子孫無棄㤀也一鄉者五州巷猶閭也古之道五十不為甸徒頒禽隆諸長者而弟達乎獀狩矣四井為邑四邑為丘四丘為甸甸六十四井也以為軍田出役之法五十始衰不從力役之事也頒之言分也隆猶多也及田者分禽多其老者謂竭作未五十者春獵曰獀冬獵曰狩也軍旅什伍同爵則尚齒而弟達乎軍旅矣什伍士卒部曲也少儀曰軍尚左卒尚右孝弟發諸朝廷行乎道路至乎州巷放乎獀狩修乎軍旅衆以義死之而弗敢犯也死之死此孝弟之禮曰祭義大按家語哀公問於孔子二三夫皆勸寡人使隆敬於高年何也孔子對之如此子云長民者朝廷敬老則民作孝長民謂天子諸侯也坊記齊宣王問於春子曰寡人欲行孝弟之義為之有道乎宣王齊君陳敬仲之後也春子曰昔者衛聞之樂正子樂正子曾子弟子也曰文王之治岐也五十者杖於家六十者杖於鄉七十者杖於朝見君揖杖朝當為國揖當為去八十者杖於朝見君揖杖揖挾也君曰趨見客無俟朝不欲乆停老者也古者七十致仕來者客之也以朝乘車輲輪御為僕送至於家而孝弟之行義達於諸侯乘車安車也言輲輪明其小也御君之御也九十杖而朝見君建杖建樹也君曰趣見無俟朝以朝車送之舍天子重鄉養舍館也重猶尊也養以禮食之也卜筮巫醫御於前祝咽祝哽以食乘車輲輪胥與就膳徹胥樂官也就成也胥成膳徹謂以樂食之也送至於家君如有欲問明日就其室以珍從而孝弟之義達於四海明日旦日此文王之治岐也君如欲行孝弟之大義盍反文王之治岐尚書大傳臣年七十懸車致仕者臣以執事趨走為職七十陽道極耳目不聰明是以退去避賢者所以長亷恥也懸車示不用也卿大夫老有盛徳者留賜之几杖不備之以筋力之禮在家者三分其禄以一與之所以厚賢也白虎通禮書綱目卷八
