body:
  text: 禮書綱目卷六十婺源江永撰内治通禮九補古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以眀章婦順故天下内和而家理天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教故外和而國治故曰天子聽男教后聽女順天子理陽道后治陰德天子聽外治后聽内治教順成俗外内和順國家理治此之謂盛徳天子六寢而六宫在後六官在前所以承嗣施外内之政也三夫人以下百二十人周制也三公以下百二十人似夏時也合而言之取其相應有象天數也内治婦學之法也陰徳謂主陰事陰令也是故男教不修陽事不得適見於天曰為之食婦順不修陰事不得適見於天月為之食是故日食則天子素服而修六官之職蕩天下之陽事月食則后素服而修六宫之職蕩天下之陰事故天子之與后猶日之與月陰之與陽相須而后成者也適之言責也食者見道有虧傷也蕩蕩滌去穢惡也天子修男教父道也后修女順母道也故曰天子之與后猶父之與母也故為天王服斬衰服父之義也為后服資衰服母之義也父母者施教令於婦子者也故其服同資當為齊聲之誤也昏義右通論小宰之職掌建邦之宫刑以治王宫之政令凡宫之糾禁杜子春云宫皆當為官𤣥謂宫刑在王宫中者之刑建明布告之糾猶割也察也若今御史中丞正歲以宫刑憲禁于王宫憲謂表縣之若令新有法令云天官宰夫正嵗則以灋警戒羣吏令修宫中之職事警戒勑之言鄭司農云正嵗夏之正月以法戒勑羣吏同上宫正掌王宫之戒令糾禁糾猶割也察也以時比宫中之官府次舍之衆寡時四時比校次其人之在否官府之在宫中者若膳夫玉府内宰内史之屬次謂吏直宿若今部署諸廬者舍其所居守為之版以待鄭司農云為官府次舍之版圖也待待比也𤣥謂板其人之名籍待待戒令及比夕擊柝而比之夕莫也莫行夜以比直宿者為其有解惰離部署鄭司農云柝戒守者所擊也易曰重門擊柝以待暴客春秋傳曰魯擊柝聞於邾國有故則令宿其比亦如之鄭司農云故謂禍灾令宿宿衞王宫春秋傳曰忘守必危况有災乎𤣥謂故凡非常也文王世子曰公有出疆之政庶子以公族之無事者守於公宫正室守大廟諸父守貴宫貴室諸子諸孫守下宫下室此謂諸侯也王之庶子職掌國子之倅國有大事則帥國子而致於大子唯所用之者令宿之事蓋亦存焉辨外内而時禁鄭司農云分别外人内人禁其非時出入稽其功緒糾其徳行稽猶考也計也功吏職也緒其志業幾其出入均其稍食鄭司農云幾其出入若今時宫中有罪禁止不能出亦不得入及無引籍不得入宫司馬殿門也𤣥謂幾呵其衣服持操及䟽數者稍食禄廩丢其淫怠與其奇衺之民民宫中吏之家人也滛放濫也怠懈慢也竒衺譎觚非常㑹其什伍而教之道藝五人為伍二伍為什㑹之者使之軰作軰學相勸帥且寄宿衛之令鄭司農云道謂先生所以教道民者藝謂禮樂射御書數月終則㑹其稍食嵗終則㑹其行事行事吏職也同上宫伯掌王宫之士庶子凡在版者鄭司農云庶子宿衞之官版名籍也以版為之今時鄉户籍謂之户版𤣥謂王宫之士謂王宫中諸吏之適子也庶子其支庶也同上士師掌國之五禁之灋一曰宫禁宫王宫也今宫門有簿籍秋官閽人掌守王宫之中門之禁中門於外内為中若今宫闕門鄭司農云王有五門外曰皋門二曰雉門三曰庫門四曰應門五曰路門路門一曰畢門𤣥謂雉門三門也春秋傳曰雉門灾及兩觀喪服凶器不入宫潜服賊器不入宫竒服怪民不入宫喪服衰絰也凶器明器也潜服若衷甲者賊器盜賊之任器兵物皆有刻識竒服衣非常春秋傳曰尨竒無常怪民狂易凡内人公器賓客無帥則幾其出入三者之出入當須使者符節乃行鄭司農云公器將持公家器出入者幾謂無將帥引之者則呵其出入以時啟閉時漏盡凡外内命夫命婦出入則為之闢辟行人使無干也内命夫鄉大夫士之在宫中者掌埽門庭門庭門相當之地天官宫人掌王之六寢之修六寢者路寢一小寢五玉藻曰朝辨色始入君日出而視朝退適路寢聽政使人視大夫大夫退然後適小寢釋服是路寢以治事小寢以時燕息焉春秋書魯莊公薨于路寢僖公薨于小寢是則人君非一寢明矣為其井匽除其不蠲去其惡臭井漏井所以受水潦蠲猶潔也詩云吉蠲為饎鄭司農云匽路廁也𤣥謂匽豬謂霤下之池受畜水而流之者共王之沐浴沐浴所以自潔清凡寢中之事埽除執燭共鑪炭凡勞事勞事勞䙝之事四方之舍事亦如之從王適四方及㑹同所舍同上玉府掌王之燕衣服衽席牀笫凡䙝器燕衣服者巾絮寢衣袍襗之屬皆良貨賄所成笫簀也鄭司農云衽席单席也䙝器清器虎子之屬同上隸僕掌蹕宫中之事宫中有事則蹕鄭司農云蹕謂止行者清道若今時儆蹕夏官右王宫内宰掌書版圖之灋以治王内之政令均其稍食分其人民以居之版謂宫中閽寺之屬及其子弟録籍也圖王及后世子之宮中吏官府之形象也政令謂施閽寺者稍食吏禄廩也人民吏子弟分之使衆者就寡均宿衞以陰禮教六宫鄭司農云陰禮婦人之禮六宫後五前一𤣥謂六宫謂后也婦人稱寢曰宫宫隱蔽之言后象王立六宫而居之亦正寢一燕寢五教者不敢斥言之謂之六宫若今稱皇后為中宫矣昏禮母戒女曰夙夜毋違宫事以陰禮教九嬪教以婦人之禮不言教夫人世婦者舉中省文以婦職之灋教九御使各有屬以作二事正其服禁其竒衺展其功緒婦職謂織紝組紃縫線之事九御女御也九九而御於王因以號焉使之九九為屬同時御又同事也正其服止踰侈竒衺若今媚道展猶録也緒業也故書二為三杜子春云當為二二事謂絲枲之事歳終則㑹内人之稍食稽其功事内人主謂九御佐后而受獻功者比其小大與其麤良而賞罰之獻功者九御之屬鄭司農云烝而獻功𤣥謂典婦功曰及秋獻功㑹内宫之財用計夫人以下所用財正嵗均其稍食施其功事憲禁令於王之北宫而糾其守均猶調度也施猶賦也北宫后之六宫謂之北宫者繋於王言之明用王之禁令令之守宿衞者天官内小臣掌王后之命正其服位命謂使令所為或言王后或言后通耳后出入則前驅道之后有好事於四方則使往有好令於卿大夫則亦如之后於其族親所善者使往問遺之掌王之陰令陰令王所求為於北宫同上寺人掌王之内人及女宫之戒令相道其出入之事而糾之内人女御也女宫刑女之在宫中者糾猶糾察也同上内豎掌内外之通令凡小事内后六宫外卿大夫也使童豎通王内外之命給小事者以其無與為禮出入便疾内外以大事聞王則俟朝而自復上同九嬪掌婦學之灋以教九御婦德婦言婦容婦功婦徳謂貞順婦言謂辭令婦容謂婉娩婦功謂絲枲自九嬪以下九九而御於王所九嬪者既習於四事又備於從人之道是以教女御也同上女御以嵗時獻功事絲枲成功之事同上女史掌王后之禮職掌内治之貳以詔后治内政内治之法本在内宰書而貳之逆内宫鉤攷六宫之計書内令后之令凡后之事以禮從亦如大史之從於王同上凡内事有達於外官者世婦掌之主通之使相共授春官世婦内宗王后有事則從春官典婦功掌婦式之灋以授嬪婦及内人女功之事齎婦式婦人事之模範法其用財舊數嬪婦九嬪世婦言及以殊之者容國中婦人賢善工於事者事齎謂以女功之事來取絲枲故書齎為資杜子春讀為資鄭司農云内人謂女御女功事資謂女功絲枲之事凡授嬪婦功及秋獻功辨其苦良比其小大而賈之物書而楬之授書為受聲之誤也國中嬪婦所作成即送之不須獻功時賈之者物不正齊當以泉計通功鄭司農苦讀為盬謂分别其縑帛與布紵之麄細皆比方其大小書其賈數而著其物若今時題署物以共王及后之用頒之於内府天官縫人掌王宫之縫線之事以役女御以縫王及后之衣服女御裁縫王及后之衣服則為役助之宫中餘裁縫事則專為焉鄭司農云線縷也掌凡内之縫事同上染人掌凡染事同上仲冬命奄尹申宫令審門閭謹房室必重閉奄尹主領奄豎之官也於周則為内宰掌治王之内政宫令譏出入及開閉之屬重閉外内閉也省婦事毋得滛雖有貴戚近習毋有不禁省婦事所以静陰類也滛謂女功奢偽怪好物也貴戚謂姑姊妹之屬近習天子所親幸者月令右内事公父文伯朝其母其母方績文伯曰以獨之家而主猶績言家有寵禄不當績懼干季孫之怒也季孫康子也位尊又為大宗其母曰王后親織𤣥紞説云紞冠之垂前後者昭謂紞所以縣瑱當耳者公侯之夫人加之以紘綖既織紞又加之以紘綖也冕曰紘紘纓之無緌者也從下而上不結綎冕上之覆也卿之内子為大帶鄉之適妻曰内子大帶緇帶也命婦成祭服命婦大夫之妻也祭服𤣥衣纁裳列士之妻加之以朝服列士元士也既成祭服又加之以朝服也朝服天子之士皮弁素積諸侯之士𤣥端委貌自庶士以下皆衣其夫庶士下士也下至庶人社而賦事烝而獻功社春分祭社也事農桑之屬也冬祭曰烝烝而獻五榖布帛之功也男女効績愆則有辟古之制也績功也辟罪也國語魯語内宰中春詔后帥外内命婦始蠶於北郊以為祭服蠶於北郊婦人以純陰為尊郊必有公桑蠶室焉天官季春鳴鳩拂其羽戴勝降於桑蠶將生之候也鳴鳩飛且翼相擊趨農急也戴勝織紝之鳥是時恒在桑言降者若時始自天來重之也具曲植籧筐時所以養蠶器也曲簿也植槌也后妃齊戒親東鄉躬桑禁婦女母觀省婦使以勸蠶事后妃親採桑示帥先天下也東鄉者鄉時氣也是明其不常畱養蠶也畱養者所卜夫人與世婦婦謂世婦及諸臣之妻也内宰職曰仲春詔后帥外内命婦始蚕于北郊女外内子女也夏小正曰妾子治蠶執養宫事母觀去容餙也婦使縫線組紃之事蠶事既登分繭稱絲効功以共郊廟之服無有敢惰登成也敕徃蠶者蠶畢將課功以勸戒之孟夏蠶事畢后妃獻繭乃収繭稅以桑為均貴賤長㓜如一以給郊廟之服后妃獻繭者内命婦獻繭於后妃收繭稅者収於外命婦外命婦雖就公桑蠶室而蠶其夫亦當有祭服以助祭収以近郊之稅耳貴賤長㓜如一國服同月令王后蠶於北郊以共純服夫人蠶於北郊以共冕服純服亦冕服也互言之爾純以見繒色冕以著祭服夫人不蠶於西郊婦人禮少變也祭統古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘牆而外閉之及大昕之朝君皮弁素積卜三宫之夫人世婦之吉者使入蠶於蠶室奉種浴於川桑於公桑風戾以食之大昕季春朔日之朝也諸侯夫人三宫半王后也風戾之者及早凉脆采之風戾之使露氣燥乃以食蠶蠶性惡濕嵗既單矣世婦卒蠶奉繭以示於君遂獻繭於夫人夫人曰此所以為君服與遂副褘而受之因少牢以禮之嵗單謂三月月盡之後也言嵗者蠶嵗之大功事畢於此也副褘王后之服而云夫人記者容二王之後與禮之禮奉繭之世婦古之獻繭者其率用此與問者之辭及良日夫人繅三盆手遂布於三宫夫人世婦之吉者使繅遂朱緑之𤣥黄之以為黼黻文章服既成君服以祀先王先公敬之至也三盆手者三淹也凡繅淹大總而手振之以出緒也祭義右親蠶君命屈狄再命褘衣一命襢衣士褖衣君女君也此子男之夫人及其卿大夫士之妻命服也禮天子諸侯命其臣后夫人亦命其妻以衣服所謂夫尊於朝妻榮於室唯世婦命於奠繭奠猶獻也凡世婦已下蠶事畢獻繭乃命之以其服玉藻詳見名器上右命臣妻夫人之不命於天子自魯昭公始也亦記魯失禮所由也周之制同姓百世昏姻不通吳大伯之後魯同姓昭公取於吳謂之吳孟子不告於天子自此後取者遂不告於天子天子亦不命之雜祀易曰正其本萬物理失之毫釐差之千里故君子慎始也春秋之元詩之闗雎禮之冠㛰易之乾巛皆愼始敬終云爾素誠繁成朱子曰四字未詳恐有闕誤賈誼新書無誠繁二字謹為子孫娶婦賈誼新書作㛰娶嫁女必擇孝悌世世有行義者如是則其子孫慈孝不敢婬暴黨無不善三族輔之故曰鳯皇生而有仁義之意虎狼生而有貪戾之心兩者不等各以其母嗚呼戒之哉無養乳虎將傷天下故曰素成胎教之道書之玉板藏之金匱置之宗廟以為後世戒大戴禮右愼始周襄王將以翟女為后富辰諌曰不可夫㛰姻禍福之階也階梯也利内則福由之利外則取禍今王外利矣樹利於翟其無乃階禍乎昔摯疇之國也由大任摯疇二國任姓奚仲仲虺之後大任之家也大任王季之妃文王之母詩云摯仲氏任又曰思齊大任文王之母杞繒由大姒杞繒二國姒姓夏禹之後大姒之家也大姒文王妃武王之母也齊許申吕由大姜四國皆姜姓四岳之後大姜之家也大姜大王之妃王季之母陳由大姬陳媯姓舜後大姬周武王之女成王之姊傳曰以元女大姬配虞胡公而封諸陳是皆能内利親親者也内利内行七徳親親以親固其家昔鄢之亡也由仲任鄢云姓之國仲任氏之女為鄢夫人唐尚書云鄢為鄭武公所滅非取任氏而亡也昭謂幽王為西戎所殺而詩言褒姒滅之明禍有所由也密湏由伯姞伯姞密湏之女也傳曰密湏之鼓闕鞏之甲此則文王所滅而獲鼓甲也大雅云密人不恭敢距大邦不由嫁女而亡世本云密湏姞姓鄶由叔妘鄶妘姓之國叔妘同姓之女為鄶夫人昭謂公羊傳曰先鄭伯有善乎鄶公者通於夫人以取其國此之謂也聃由鄭姬聃姬姓文王之子聃季之國鄭女為聃夫人同姓相娶猶魯公娶於呉亦其瀆姓所以亡也息由陳媯息姫姓之國陳媯陳女為息侯夫人蔡哀侯亦娶於陳息媯將歸過蔡蔡哀侯止而見之弗賓媯以告息侯導楚伐蔡蔡侯怨因稱息媯之美於楚子楚子遂滅息以息媯歸鄧由楚曼鄧曼姓楚曼鄧女為楚武王夫人生文王過鄧而利其國遂滅鄧而兼之羅由季姬羅熊姓之國季姬姬氏之女為羅夫人廬由荆媯廬媯姓之國荆媯廬女為荆夫人荆楚也是皆外利離親者也外利行滛辟求利於外不能親親以亡其國夫翟隗姓也無列於王室列位次也豺狼之德不可厭也禮新不聞舊間代也王以翟女間姜任非禮且棄舊也姜氏任氏之女世為王妃嬪今以翟女代之為棄舊也其無乃禍階乎王弗聽國語周語古者后夫人將侍君前息燭後舉燭至於房中釋朝服襲燕服然後入御於君朝服展衣君在堂雞鳴大師奏雞鳴於陛下奏白也陛階也然後夫人鳴佩玉於房中告去也然後應門擊柝告辟也應門朝門辟啓也然後少師奏質明於陛下質正也然後夫人入庭立君出朝尚書大傅庭内小臣掌王之陰事陰事羣妃御見之事若今掖庭令晝漏不盡八刻日録所記推當御見者天官九嬪各帥其屬而以時御叙於王所教各帥其屬者使亦九九相與從於王所息之燕寢御猶進也勸也進勸王息亦相次叙凡羣妃御見之法月與后妃其象也卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕亦十五日而徧云自望後反之孔子云日者天之明月者地之理陰契制故月上屬為天使婦從夫放月紀同上女御掌御叙於王之燕寢言掌御叙防上之專妒者於王之燕寢則王不就后宫息同上右后夫人侍君劉向曰自古聖王必正妃匹妃匹正則興不正則亂昔夏之興也以塗山其亡也以末喜殷之興也以有㜪其亡也以妲己周之興也以大姒其亡也以褒姒此其著者也詩云闗闗雎鳩在河之洲窈窕淑女君子好逑言后妃説樂君子之德無不和諧又不淫其色愼固幽湥若雎鳩之有别焉然後可以風化天下也夫雎鳩之鳥猶未嘗見其乘居而匹處也鳥獸尚然而况於人乎故夫婦有别則父子親父子親則君臣敬君臣敬則朝廷正朝廷正則王化成君臣父子夫婦三者天下之大綱紀也三者治則治三者亂則亂此闗雎以為詩首重人道之始於此也列女傳匡衡曰妃匹之際生民之始萬福之原㛰姻之禮正然後品物遂而天命全遂成也孔子論詩以闗雎為始言太上者民之父母太上居尊上之位者后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜侔等也故詩曰窈窕淑女君子好仇窈窕幽閒也仇匹也言能致其貞淑不貳其操情欲之感無介乎容儀介繋也言不以情欲繋心而著於容儀也宴私之意不形乎動静形見也夫然後可以配至尊而為宗廟主此綱紀之首王教之端也自上世以來三代興廢未有不由此者也匡衡傳周宣姜后賢而有德事非禮不言行非禮不動宣王嘗早卧而晏起后夫人不出於房姜后既出乃脱簮珥待罪於永巷使其傅母通言於王曰妾不才妾之淫心見矣至使君王失禮而晏朝以見君王之樂色而忘徳也夫苟樂色必好奢好奢必窮樂窮樂者亂之所興也原亂之興從婢子起婢子生亂當服其辜敢請婢子之罪唯君王之命王曰寡人不德寔自生過從寡人起非夫人之罪也遂復姜后而勤於政事早朝晏退繼文武之迹興周室之業卒成中興之名為周世宗列女傳雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲賦也言古之賢妃御於君所至於將旦之時必告君曰雞既鳴矣㑹朝之臣既已盈矣欲令君早起而視朝也然其實非雞之鳴也乃蒼蠅之聲也蓋賢妃當夙興之時心常恐晚故聞其似者而以為真非其心存警畏而不留於逸欲何以能此故詩人叙其事而羙之也東方明矣朝既昌矣匪東方則明月出之光賦也東方明則日將出矣昌盛也此再告也蟲飛薨薨甘與子同夢㑹且歸矣無庶於子憎賦也蟲飛夜將旦而百蟲作也甘樂㑹朝也此三告也言當此時我豈不樂與子同寢而夢哉然羣臣之㑹於朝者俟君不出將散而歸矣無乃以我之故而并以子為憎乎齊風雞鳴宋伯姬者魯宣公之女成公之妹也既嫁於恭公十年恭公卒伯姬寡三十五年至景公時伯姬之宫夜失火左右曰夫人少避火伯姬曰婦人之義保傅不俱夜不下堂待保傅來也保母至矣傅母未至也左右又曰夫人少避火伯姬曰婦人之義傅母不至夜不可下堂越義求生不如守義而死遂逮於火而死列女傳楚昭貞姜者齊侯之女楚昭王之夫人也王出遊畱夫人於漸臺之上而去王聞江水大至使使者迎夫人曰王與宫人約令召宫人必以符今使者不持符妾不敢行使者曰水方大至還而取符則恐後矣夫人曰妾聞之貞女之義不犯約勇者不畏死守一節而已妾知從使者必生畱必死也然棄約越義而求生不若畱而死耳於是使者反取符未還則水大至䑓崩夫人流而死同上齊孝孟姬者華氏之長女齊孝公之夫人也公遊於琅邪華孟姬從車奔姬墮車碎孝公使駟馬立車載姬以歸姬使侍御者舒帷以自障蔽而使傅母應使者曰妾聞妃后踰閾必乘安車輜軿下堂必從傅母保阿進退則鳴玉環珮内飾則結紐綢繆野處則帳裳壅蔽所以正心壹意自斂制也今立車無軿非所敢受命也野處無衞非所敢久居也二者失禮多矣夫無禮而生不若早死使者馳以告公更安車及則已自經矣同上青史氏之記曰古者胎教王后腹之七月而就宴室宴室夾室次宴寢也亦曰側室自王后已下有子曰震女史皆以金環止御王后比七月就宴室夫人婦嬪即以三月就其側室皆閉房而處也王后以七月為節者君聽天下之内政自諸侯以下同之也賈誼新書腹作有身宴室作蔞室太師持銅而御户左大宰持升而御户右太師瞽者宗伯之屬下大夫太宰膳夫也冡宰之屬上士二人言太宰因諸侯之稱也樂為陽故在左飲食為陰故在右升所以斟下新書升作斗此下有太卜持蓍龜而御堂諸官皆以其職御於門内二匀比及三月者王后所求聲音非禮樂則太師緼瑟而稱不習謂逆序若淫聲作新書緼瑟撫樂所求滋味者非正味則太宰倚升而言曰不敢以待王太子新書升作斗下有不敢煎調四字大戴禮保傳右胎教太任邑姜事見下章太子生而泣太師吹銅曰聲中其律太宰曰滋味上某太卜曰命云某然後為王太子大戴無太卜曰十二字賈誼新書懸弧之禮東方之弧以梧其牲以雞南方之弧以柳其牲以狗中央之弧以桑其牲以牛西方之弧以棘其牲以羊北方之弧以棗其牲以彘五弧五分矢東方射東方南方射南方中央射中央西方射西方北方射北方皆三射其四弧具其餘各二分矢懸諸國四通門之左中央之弧亦具餘二分矢懸諸社稷門之左大戴無此一段然後卜王太子名上毋取於天下毋取於地中毋取於名山通谷毋悖於鄉俗同上國君世子生告於君接以大牢宰掌具接讀為捷捷勝也謂食其母使補虚彊氣也三日卜士負之吉者宿齊朝服寢門外詩負之射人以桑弧蓬矢六射天地四方詩之言承也桑弧蓬矢本太古也天地四方男子所有事也保受乃負之代士也保保母宰醴負子賜之束帛醴當為禮聲之誤也禮以一獻之禮酬之以幣也卜士之妻大夫之妾使食子食之不使君妾適妾有敵義不相褻以勞辱事也士妻大夫之妾謂時自有子凡接子擇日雖三日之内尊卑必皆選其吉焉冢子則大牢天子世子也冢大也冢子猶言長子通於下也國君世子大牢皆謂長子其非冢子則皆降一等謂冢子之弟及衆妾之子生也天子諸侯少牢異為孺子室於宫中特埽一處以處之擇於諸母與可者必求其寛裕慈惠温良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室此人君養子之禮也諸母衆妾也可者傅御之屬也子師教示以善道者慈母知其嗜欲者保母安其居處者士妻食乳之而已他人無事不往為兒精氣微弱將驚動也三月之末擇日翦髪為鬌男角女羈否則男左女右鬌所遺髪也夾囱曰角午逹曰羈也世子生則君沐浴朝服夫人亦如之皆立于阼階西鄉世婦抱子升自西階君名之乃降子升自西階則人君見世子於路寢也見妾子就側室凡子生皆就側室諸侯夫人朝於君次而禒衣也適子庶子見於外寢撫其首咳而名之禮帥初無辭此適子謂世子弟也庶子妾子也外寢君燕寢也無辭辭謂欽有帥記有成也公庶子生就側室三月之末其母沐浴朝服見於君擯者以其子見君所有賜君名之衆子則使有司名之擯者傅姆之屬也人君尊雖妾不抱子有賜於君有恩惠也有司臣有事者也魯桓公名子問於申繻也内則冢子未食而見必執其右手適子庶子已食而見必循其首天子諸侯尊别世子雖同母禮則異矣未食已食急正緩庶之義也同上食子者三年而出見於公宫則劬劬勞也士妻大夫之妾食國君之子三年出歸其家君有以勞賜之同上養公者必以其子入養不離人母子因以娛公也昭三十一年公羊傳右生子天子太子使士負子於南郊以桑弧蓬矢六射者何也此男子之事也故先表其事然後食其禄保傅曰太子生舉之以禮使士負之有司齊肅綏之南郊見於天韓詩内傳曰太子生以桑弧蓬矢六射上下四方明當有事天地四方也白虎通周太姜者王季之母有邰氏之女也太王娶以為妃生太伯仲雍王季至於成童靡有過失太王謀事必於太姜遷徙必與太姜君子謂太姜廣於德教太任者文王之母摯任氏之中女也王季娶以為妃太任之性敦一誠莊惟德之行及其有娠目不視惡色耳不聽淫聲口不出敖言生文王而明聖太任教之以一而識百卒為周宗君子謂太任能胎教太姒者武王之母禹後有莘姒氏之女也在郃之陽在渭之涘仁而明道文王嘉之親迎于渭造舟為梁及入太姒思媚太姜太任旦夕勤勞以進婦道太姒號曰文母文王治外文母治内太姒生十男長曰伯邑考次曰武王發次周公旦次管叔鮮次蔡叔度次曹叔振鐸次霍叔武次成叔處次康叔封次珃季載太姒之所以教誨扶持十子者自少及長未嘗見邪僻之事常以正道檢押之及其長文王繼而教之卒成武王周公之德武王后曰邑姜太公之女也妊成王於身立而不跛坐而不差笑而不諠獨處而不倨雖怒而不詈胎教之謂也列女傳桓公六年九月丁卯子同生桓公子莊公也十二公唯子同是適夫人之長子備用太子之禮故史書之於䇿不稱太子者書始生也以大子生之禮舉之接以大牢大牢牛羊豕也以禮接夫人重適也卜士負之士妻食之禮世之生三日卜士負之射人以桑弧蓬矢射天地四方卜士之妻為乳母公與文姜宗婦命之世子生三月君夫人沐浴於外寢立於阼階西鄉世婦抱子升自西階君命之乃降蓋同宗之婦公問名於申繻對曰名有五有信有義有象有假有類申繻魯大夫以名生為信若唐叔虞魯公子友以德命為義若文王名昌武王名發以類命為象若孔子首象尼丘取於物為假若伯魚生人有饋之魚因名之曰鯉取於父為類若子同生有與父同者不以國國君之子不自以本國為名也不以官不以山川不以隱疾隱痛疾患辟不祥也不以畜牲畜牲六畜不以器幣幣玉帛周人以諱事神名終將諱之君父之名固非臣子所斥然禮既卒哭以木鐸徇曰舍故而諱新謂舍親盡之祖而諱新死者故言以諱事神名終將諱之自父至髙祖皆不敢斥言故以國則廢名國不可易故廢名以官則廢職以山川則廢主改其山川之名以畜牲則廢祀名豬則廢豬名羊則廢羊以器幣則廢禮晉以僖侯廢司徒僖公名司徒廢為中軍宋以武公廢司空武公名司空廢為司城先君獻武廢二山二山具敖也魯獻公名具武公名敖更以其鄉名山是以大物不可以命公曰是其生也與吾同物命之曰同物類也謂同日春秋左氏傳古之聖帝將立世子則帝自朝服升自阼階上西鄉妃抱世子自房出東鄉太史奉書而上堂當兩階之間北面立曰世子名曰某者三帝執禮稱辭命世子曰授太祖太宗與社稷於子者三其命也妃曰不敢者再於三命曰謹受命拜而退太史以告太祝太祝以告太祖太宗與社稷太史出以告太宰太宰以告州伯州伯命藏之州府凡諸貴以下至於百姓男女無敢與世子同者賈誼新書右立世子勢明則民定而出於一道故人皆争為宰相而不姦為世子非宰相尊而世子卑也不可以智求不可以力争也今以為知子莫如父故疾死置後者恣父之所以比使親戚不相親兄弟不相愛亂天下之紀使天下之俗失聞尊敬而不讓其道莫經於此疾死置後復以適長子如此則親戚相愛也兄弟不争此天下之至義也以此防民百姓猶有争為君者賈誼新書君在立太子者防簒煞壓臣子之亂也君薨嫡夫人無子有育遺腹必待其産立之何專適重正也曽子問曰立適以長不以賢何以言為賢不肖不可知也立子以貴不以長防愛憎也白虎通王子朝曰昔先王之命曰王后無適則擇立長年鈞以德德鈞以卜此所謂先王之經王不立愛公卿無私古之制也昭公十六年左氏傳穆公問於子思曰立太子有常乎答曰有之在周公之典言周典有之公曰昔文王舍適而立其次文王舍其適長伯邑考而立次子武王發微子舍孫而立其弟微子舍其孫腯而立其弟衍微仲是何法也子思曰殷人質而尊其尊故立弟周人文而親其親故立子亦各其禮也文質不同其禮則異文王舍適立次權也以武王賢故用權而立之公曰苟得行權豈唯聖人唯賢與愛立也子思曰聖人不以權教權者見機而作非可為常教故立制埀法順之為貴若必欲犯何有於異脱不順其法違而犯之亦何有異於用權公曰舍賢立聖舍愚立賢何如言或舍其賢子而立其聖子舍其愚子而立其賢子如何子思曰唯聖立聖其文王乎不及文王者則各賢其所愛不殊於適何以限之言有不及文王者能推其所愛之賢者而立之亦無殊於立適矣必不能審賢愚之分請父兄羣臣卜於祖廟亦權之可也脱不能審其賢愚則於廟卜其吉而立之亦權之義也子孔叢子野卒立敬歸之娣齊歸之子公子裯齊謚禂昭公名穆叔不欲曰大子死有母弟則立之無則立長立庶子則以年年鈞擇賢義鈞則卜古之道也先人事後卜筮也義鈞謂賢等非適嗣何必娣之子言子野非適嗣氏襄三十一年左傳世子之記曰朝夕至於大寢之門外問於内豎曰今日安否何如朝夕朝朝暮夕也日中又朝文王之為世子非禮之制也世子之禮亡言此存其義内豎曰今日安世子乃有喜色其有不安節則内豎以告世子世子色憂不滿容色憂憂淺也不及文王行不能正履内豎言復初然後亦復初朝夕之食上世子必在視寒煖之節食下問所膳羞必知所進以命膳宰然後退羞必知所進必知親所食若内豎言疾則世子親齊𤣥而養親猶自也養疾者齊𤣥𤣥冠𤣥端也膳宰之饌必敬視之疾者之食齊和所欲或異疾之藥必親嘗之試毒味也嘗饌善則世子亦能食善謂多於前嘗饌寡世子亦不能飽又不及武王一飯再飯以至于復初然後亦復初復常所膳文王世子右世子事君父文王之為世子朝於王季日三三皆曰朝以其禮同雞初鳴而衣服至於寢門外問内豎之御者曰今日安否何如内豎小臣之屬掌外内之通命者御如今小史直日矣内豎曰安文王乃喜孝子恒兢兢及日中又至亦如之又復也及莫又至亦如之莫夕也其有不安節則内豎以告文王文王色憂行不能正履節謂居處故事履蹈地也王季復膳飲食安也然後亦復初憂解食上必在視寒暖之節在察也食下問所膳間所食者命膳宰曰末有原應曰諾然後退末猶勿也原再也勿有所再進為其失飪臭味惡也退反其寢武王帥而行之不敢有加焉庶幾程式之帥循也文王有疾武王不説冠帶而養言常在側文王一飯亦一飯文王再飯亦再飯欲知氣力箴藥所勝旬有二日乃間間猶瘳也文王世子晉里克曰大子奉冢祀社稷之粢盛冢大也以朝夕視君膳者也膳厨膳故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也閔二年左氏傳許悼公瘧飲大子止之藥卒止獨進藥不由醫大子奔晉書曰弑其君君子曰盡心力以事君舍藥物可也藥物有毒當由醫非凡人所知譏止不舍藥物所以加弑君之名昭十九年左氏傳子云孝以事君弟以事長示民不貳也故君子有君不謀仕唯卜之日稱二君不貳不自貳於尊者也自貳謂若鄭叔叚者也君子有君謂君之子父在者也不謀仕嫌遲為政也卜之日謂君有故而為之卜也二當為貳唯卜之時辭得曰君之貳某爾晉惠公獲於秦命其大夫歸擇立君曰其卜二圉也坊記齊桓公葵丘之㑹諸侯初命曰誅不孝母易樹子毋以妾為妻僖公九年葵丘之㑹陳牲而不殺讀書加於牲上壹明天子之禁樹立也已立世子不得擅易初命三事所以修身正家之要也孟子右齊家周公欲弑莊王而立王子克莊王桓王大子王子克莊王弟子儀辛伯告王遂與王殺周公黒肩王子克奔燕辛伯周大夫初子儀有寵於桓王桓王屬諸周公辛伯諌曰竝后妾如后匹嫡庶如嫡兩政臣擅命耦國都如國亂之本也周公弗從故及及於難也氏桓十八年左傳晉獻公欲以驪姬為夫人卜之不吉弗聽立之生奚齊其娣生卓子及將立奚齊既與中大夫成謀姬謂大子曰君夢齊姜必速祭之齊姜太子母言求食大子祭於曲沃歸胙於公胙祭之酒肉公田姬寘諸宫六日公至毒而獻之毒酒經宿輒敗而經六日明公之惑公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由大子大子奔新城新城曲沃傳僖四年左氏公子重耳謂之曰子盍言子之志於公乎盍何不也重耳申生異母弟欲使言見譛之意世子曰不可君安驪姬是我傷公之心也言其意則驪姬必誅也曰然則盍行乎行猶去也世子曰不可君謂我欲弑君也天下豈有無父之國哉吾何行如之言人有父則皆惡欲弑父者使人辭於狐突曰申生有罪不念伯氏之言也以至於死申生不敢愛其死辭猶告也狐突申生之傳舅犯之父也前此者獻公使申生伐東山臯落氏狐突謂申生欲使之行今言此者謝之伯氏狐突别氏雖然吾君老矣子少國家多難子謂奚齊伯氏不出而圖吾君圖猶謀也不出為君謀國家之政然則自皋落氏反後狐突懼乃稱疾伯氏苟出而圖吾君申生受賜而死賜猶惠也再拜稽首乃卒既告狐突乃雉經是以為恭世子也言行如此可以為恭於孝則未之有檀弓魯公子荆之毋嬖荆哀公庶子將以為夫人使宗人釁夏獻其禮宗人禮官也對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛武公敖也孝惠娶於商孝公稱惠公弗皇商宋也自桓以下娶於齊桓公始娶文姜此禮也則有若以妾為夫人則固無其禮也公卒立之而以荆為大子國人始惡之惡公哀二十四年左氏傳僖公八年秋七月禘於大廟用致夫人劉白曰夫人成風也致之於大廟位之以為夫人用者不宜用者也致者不宜致者也言夫人必以其氏姓言夫人而不以氏姓非夫人也立妾之辭也非正也夫人者正嫡之稱謂非崇妾之嘉號以妾體君則上下無别雖尊其母是卑其父故曰非正也禮有君之母非夫人者又庶子為後為其母緦是妾不為夫人明矣一則以宗廟臨之而後貶焉臣無貶君之義故於大廟云夫人氏姓以明君之非正一則以外之弗夫人而見正焉秦人來歸僖公成風之禭不言夫人穀梁傅禮書綱目卷六十
