body:
  text: 禮書綱目卷四十六婺源江永撰祭物吉禮十四補冡宰制國用必於歲之杪制國用如今度支經用杪末也祭用數之仂筭今年一歲經用之數用其什一喪祭用不足曰暴有餘曰浩暴猶耗也浩猶饒也祭豐年不奢凶年不儉常用數之仂王制太宰以九式均節財用一曰祭祀之式式謂用財之節度以九貢致邦國之用一曰祀貢鄭司農云祀貢犧牲包茅之屬天官大行人侯服歲壹見其貢祀物男服三歲壹見其貢器物采服四歲壹見其貢服物祀物犧牲之屬器物尊彛之屬服物𤣥纁絺纊也秋官季冬凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寝廟山林名川之祀民非神之福不生雖有其邦國采地此賦要由民出月令大府邦都之賦以待祭祀邦都五百里賦口率出泉也天官小宰以法掌祭祀之戒具令百官府共其財用法謂其禮法也戒具戒官有事者所當共上同宰夫凡禮事賛小宰比官府之具同上外府凡祭祀共其財用疏曰祭祀財用皆外府供其帛也同上肆師之職掌立國祀之禮以佐大宗伯佐助也立大祀用玉帛牲牷立次祀用牲幣立小祀用牲鄭司農云大祀天地次祀日月星辰小祀司命已下𤣥謂大祀又有宗廟次祀又有社稷五祀五嶽小祀又有司中風師雨師山川百物春官小宗伯掌五禮之禁令與其用等用等牲器尊卑之差同上泉府凡賖者祭祀無過旬日鄭司農云賖貰也以祭祀故从官貰買物地官右總要孟子曰禮曰諸侯耕助以供粢盛夫人蠶繅以為衣服犧牲不成粢盛不㓗衣服不備不敢以祭惟士無田則亦不祭牲殺器皿衣服不備不敢以祭則不敢以宴禮曰諸侯為藉百畆冕而青紘躬秉耒以耕而庶人助以終畝收而藏之御廪以供宗廟之粢盛使世婦蠶于公桑蠶室奉繭以示于君遂獻于夫人夫人副禕受之繅三盆手遂布于三宮世婦使繅以為黼黻文章而服以祀先王先公又曰士有田則祭無田則薦黍稷曰粢在器曰盛牲殺牲必特殺也皿所以覆器者孟子祭公謀父曰甸服者祭侯服者祀賔服者享要服者貢荒服者王日祭月祀時享歲貢終王先王之訓也詳見財賦天子以犧牛諸侯以肥牛大夫以索牛士以羊豕犧純毛也肥飬于滌也索求得而用之曲禮天子社稷皆大牢諸侯社稷皆少牢大夫士宗廟之祭有田則祭無田則薦有田者既祭又薦新祭以首時薦以仲月士薦牲用特豚大夫以上用羔所謂羔豚而祭百官皆足詩曰四之日其早獻羔祭韭庶人春薦韭夏薦麥秋薦黍冬薦稲韭以卵麥以魚黍以豚稲以鴈庶人無常牲取與新物相宜而已祭天地之牛角繭栗宗廟之牛角握握謂長不出膚諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕庻人無故不食珍故謂祭饗王制夏后氏尚黑牲用𤣥𤣥黒類也殷人尚白牲用白周人尚赤牲用騂騂赤類檀弓夏后氏牲尚黒殷白牡周騂剛順正色也騂剛赤色位明堂季夏命四監大合百縣之秩芻以養犧牲令民無不咸出其力四監主山林川澤之官百縣鄉遂之屬地有山林川澤者也秩常也百縣給國飬犧牲之芻多少有常民皆當出力為艾之今月令四為田以共皇天上帝名山大川四方之神以祠宗廟社稷之靈以為民祈福牲以供祀神靈為民求福明使民艾蒭是不虚取也皇皇天北辰耀魄寳冬至所祭于圓丘也上帝大微五帝季冬乃命大史次諸侯之列賦之犧牲以共皇天上帝社稷之饗此所與諸侯共者也列國有大小也賦之犧牲大者出多小者出少饗獻也乃命同姓之邦共寝廟之芻豢此所以與同姓共也芻豢猶犧牲命宰歴卿大夫至于庶民土田之數而賦犧牲以共山林名川之祀此所與卿大夫庶民共者也歴猶次也卿大夫采地亦有大小其非采地以其邑之民多少賦之凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寝廟山林名川之祀民非神之福不生雖有其邦國采地此賦要由民出仲秋乃命宰祝循行犧牲視全具案芻豢瞻肥瘠察物色必比類量小大視長短皆中度五者備當上帝其饗於鳥獸肥充之時宜省羣牲也宰祝大宰大祝主祭祀之官也養牛羊曰芻犬豕曰豢五者謂所視也所案也所瞻也所察也所量也此皆得其正則上帝饗之上帝饗之而無神不饗也孟春命祀山林川澤犧牲毋用牝為傷妊生之類仲春祀不用犧牲用圭璧更皮幣為季春将選而合騰之也更猶易也當祀者告以玉帛而已並月令宗廟之事脂者膏者以為牲脂牛羊屬膏豕屬致美味也考工梓人牲不及肥大詳見祭義遂人凡國祭祀共野牲共野牲入于牧人以待事也遂師凡國祭祀共其野牲牧人掌牧六牲而阜蕃其物以共祭祀之牲牷六牲謂牛馬羊豕犬雞鄭司農云牷純也𤣥謂牲體完具凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之騂牲赤色毛之取純毛也隂祀祭地北郊及社稷也望祀五嶽四鎮四凟也鄭司農云陽祀春夏也黝讀為幽幽黒也𤣥謂陽祀祭天于南郊及宗廟凡時祀之牲必用牷物時祀四時所常祀謂山川以下至四方百物凡外祭毁事用尨可也外祭謂表貉及王行所過山川用事者故書毁為甈尨作庬杜子春云甈當為毀庬當為尨尨謂雜色不純毁謂副辜侯􅓙毁除殃咎之屬凡祭祀共其犧牲以授充人繫之犧牲毛羽完具也授充人者當殊養之周景王時賔起見雄雞自㫁其尾曰雞惮其為犧凡牲不繫者共奉之謂非時而祭祀者並地官羊人若牧人無牲則受布于司馬使其賈買牲而共之布泉夏官牛人掌養國之公牛以待國之政令公猶官也凡祭祀共其享牛求牛以授職人而芻之鄭司農云享牛前祭一日之牛也求牛禱于鬼神祈求福之牛也𤣥謂享獻也獻神之牛謂所以祭者也求終也牛事之牛謂所以繹者也宗廟有繹者孝子求神非一處職讀為樴樴謂之杙可以繫牛樴人者謂牧人充人與芻牲之芻牛人擇于公牛之中而以授養之凡祭祀共其牛牲之互與其盆簝以待事鄭司農云互謂楅衡之屬盆簝皆器名盆所以盛血簝受肉籠也𤣥謂互若今屠家縣肉格地官肆師大祭祀展犧牲繫于牢頒于職人展省閱也職讀為樴樴可以繫牲者此樴人謂充人及監門人春官充人掌繫祭祀之牲牷祀五帝則繫于牢芻之三月牢閑也必有閑者防禽獸觸齧養牛羊曰芻三月一時節氣成享先王亦如之凡散祭祀之牲繫于國門使養之散祭祀謂司中司命山川之屬國門謂城門司門之官鄭司農云使養之使守門者養之展牲則告牷鄭司農云展具也具牲若今時選牲也充人主以牲牷告展牲者也𤣥謂展牲若今夕牲也特牲饋食之禮曰宗人視牲告充舉獸尾告備近之碩牲則贊贊助也君牽牲入将致之助持之也春秋傳曰故奉牲以告曰博碩肥腯司門祭祀之牛牲繫焉監門養之監門門徒稾人掌豢祭祀之犬飬犬豕曰豢不于􅐪人言其共至尊雖其潘瀾戔餘不可䙝也並地官犬人掌犬牲凡祭祀共犬牲用牷物伏瘞亦如之鄭司農云牷純也物色也伏謂伏犬以王車轢之瘞謂埋祭也爾雅曰祭地曰瘞埋凡幾珥沈辜用駹可也故書駹作龍鄭司農云幾讀為庪爾雅曰祭山曰庪縣祭川曰浮沈大宗伯職曰以埋沈祭山林川澤以罷辜祭四方百物龍讀為駹謂不純色也𤣥謂幾讀為刏珥當為衈刉衈者釁禮之事秋官雞人掌共雞牲辨其物物謂毛色也辨之者陽祀用騂隂祀用黝凡祭祀面禳釁共其雞牲釁釁廟之屬釁廟以羊門夾室皆用雞鄭司農云面禳四面禳也釁讀為徵小宗伯毛六牲辨其名物而頒之于五官使共奉之毛擇毛也鄭司農云司徒主牛宗伯主雞司馬主馬及羊司寇主犬司空主豕大祭祀省牲祭之日省鑊省鑊視亨腥孰並春官封人凡祭祀餙其牛牲設其楅衡置其絼共其水稾飾謂刷治潔清之也鄭司農云楅衡所以楅持牛也絼著牛鼻䋲所以牽牛者今時謂之雉與古者名同皆謂夕牲時也杜子春云楅衡所以持牛令不得抵觸人𤣥謂楅設于角衡設于鼻如椵状也水稾給殺時洗薦牲也絼字當以豸為聲歌舞牲及毛炮之豚謂君牽牲入時隨歌舞之言其肥香以歆神也毛炮豚也爓去其毛而炮之以備八珍鄭司農云封人主歌舞其牲云博碩肥腯地官羊人掌羔牲凡祭祀飾羔羔小羊也詩曰四之日其早獻羔祭韭司弓矢凡祭祀共射牲之弓矢射牲示親殺也殺牲非尊者所親唯射為可國語曰禘郊之事天子必自射其牲並夏官古者天子諸侯必有養牲之官及歲時齊戒沐浴而躬朝之犧牷祭牲必於是取之君召牛納而視之擇其毛而卜之吉然後養之君皮弁素積朔月月半君巡牲詳見祭義犧牲不粥于市王制牲死則埋之注見祭器右犧牲聖人為天地主為山川主為鬼神主為宗廟主鬼神百神也因外説故在宗廟之上也序五牲之先後貴賤五牲牛羊豕犬雞先後謂四時所尚也諸侯之祭牛曰太牢天子之大夫亦太牢太牢天子之牲角握諸侯角尺大夫索牛也大夫之祭牲羊曰少牢天子之士亦少牢也士之祭牲特豕曰饋食不言特牲其文已著又與大夫互相足也無禄者稷饋庶人無常牲故以稷為主稷饋者無尸無尸者厭也宗廟曰芻豢牛羊曰芻犬豕曰豢山川曰犧牷色純曰犧體完曰牷宗廟言豢山川言牲互文也山川謂岳瀆以方色角入其餘用戾索之割列禳瘞割割牲列疈辜禳面禳瘞瘞埋于是有五牲大載禮上牲損則用下牲下牲損則祭不備物以其舛之為不樂也説苑子期祀平王祭以牛俎于王王問于觀射父曰祀牲何及對曰祀加于舉天子舉以大牢祀以㑹諸侯舉以特牛祀以大牢卿舉以少牢祀以特牛大夫舉以特牲祀以少牢士食魚炙祀以特牲庶人食菜祀以魚上下有序則民不慢王曰其小大何如對曰郊禘不過繭栗烝嘗不過把握王曰芻豢幾何對曰逺不過三月近不過浹日詳見祭義魯祭周公何以為牲據廟異也周公用白牡白牡殷牲也周公死有王禮謙不敢與文武同也不以夏黒牲者嫌改周之文當以夏辟嫌也魯公用騂犅騂犅赤脊周牲也魯公以諸侯不嫌故从周制以脊為差羣公不毛不毛不純色所以降于尊祖羊文十三年公傳魯公索氏将祭而亡其牲孔子聞之曰公索氏不及二年必亡今過朞而亡夫子何以知其然孔子曰夫祭者孝子所以自盡于其親将祭而亡其牲則其餘所亡者多矣若此而不亡者未之有也家語晏平仲祀其先人豚肩不揜豆君子以為隘矣雜記注云豚俎實豆徑尺言并豚兩肩不能覆豆喻小也器禮宋公使邾文公用鄫子于次睢之社欲以屬東夷睢水受汴東京陳留梁譙沛彭城縣入泗此水次有妖神東夷皆社祠之蓋殺人而用祭司馬子魚曰古者六畜不相為用司馬子魚公子目夷也六畜不相為用謂若祭馬先不用馬小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰饗之僖十九年左氏傳天子為藉千畆冕而朱紘躬秉耒諸侯為藉百畆冕而青紘躬秉耒以事天地山川社稷先古以為醴酪齊盛于是乎取之詳見祭義天子親耕于南郊以共齊盛諸侯耕于東郊亦以共齊盛同上甸師掌帥其屬而耕耨王藉以時入之以共齍盛其屬府史胥徒也耨芸芓也王以孟春躬耕帝藉天子三推三公五推卿諸侯九推庶人終于千畝庶人謂徒三百人藉之言借也王一耕之而使庶人芸芓終之齍盛祭祀所用穀也粢稷也榖者稷為長是以名云在器曰盛天官季秋藏帝藉之收于神倉祗敬必飭重粢盛之委也帝藉所耕千畝也藏祭祀之穀為神倉祗亦敬也月令小宗伯辨六齍之名物與其用使六宮之人共奉之齍讀為粢六粢謂六穀黍稷稻粱麥苽春官天子禘郊之事王后必自舂其粢器實曰粢諸侯宗廟之事夫人必自舂其盛在器曰盛上言粢下言盛互其文也天子親舂禘郊之盛帥后舂之義楚語詳見祭廪人大祭祀則共其接盛接讀為壹扱再祭之扱扱以授舂人舂之大祭祀之穀藉田之收藏于神倉也者不以給小用舂人祭祀共其齍盛之米齍盛謂黍稷稻粱之屬可盛以為簠簋實饎人掌凡祭祀共盛盛炊而共之舍人凡祭祀共簠簋實之陳之方曰簠圓曰簋盛黍稷稻粱器並地官肆師祭之日表齍盛告絜粢六穀也在器曰盛故書表為剽剽表皆謂徽識也春官右粢盛耕藉之禮詳見通禮朝廷禮米廪有虞氏之庠也庠之言詳也于以考禮詳事也魯謂之米廪虞帝上孝今藏粢盛之委焉明堂位魯祭周公何以為盛據牲異也周公盛盛者新穀魯公燾燾者冒也故上以新也羣公廪廪者連新于陳上財令半相連爾此謂上祫祭之時序昭穆之差文十三年公羊傳桓公十四年秋八月壬申御廪灾御廪公所親耕以奉粢盛之倉也天火曰灾例在宣十六年乙亥嘗先其時亦過也既戒日致齊御廪雖灾苟不害嘉穀則祭不應廢故書以示法書不害也灾其屋救之則息不及穀故曰書不害左氏傳御廪之灾不志以其微此其志何也以為唯未易灾之餘而嘗可也志不敬也鄭嗣曰唯以未易灾之餘而嘗然後可志也用火焚之餘以祭宗廟非人子所以盡其心力不敬之大也天子親耕以共粢盛天子親耕其禮三推黍稷曰粢在器曰盛王后親蠶以共祭服王后親蠶齊戒躬桑夫人三繅遂班三宮朱緑𤣥黄以為黼黻文章既成君服以祀之國非無良農女工也以為人之所盡事其祖禰不若以己所自親者也凱曰夫治人之道莫急于禮禮有五經莫重于祭祭者非物自外至者也由中出者身致其誠信然後可以交于神明祭之道也何用見其未易灾之餘而嘗也曰甸粟而内之三宮三宮米而藏之御廪甸甸師掌田之官也三宮三夫人也宗廟之禮君親割夫人親舂夫嘗必有兼甸之事焉夫人親舂是兼甸之事壬申御廪灾乙亥嘗以為未易灾之餘而嘗也鄭嗣曰壬申乙亥相去四日言用日至少而功多明未足及易而嘗穀梁傳御廪粢盛委之所藏也黍稷曰粢在器曰盛委積也御者謂御用于宗廟廪者擇治穀名禮天子親耕東田千畝諸侯百畝后夫人親西郊采桑以共粢盛祭服躬行孝道以先天也御廪灾不如勿嘗而已矣當廢一時祭自責以奉天灾也知不以不時者書本不當嘗也公羊傳敬姜曰天子日入監九御使潔奉禘郊之粢盛監視也九御九嬪之官主粢盛祭服者而後即安即就也語國語魯天子諸侯無事則歲三田一為乾豆乾豆謂腊之以為祭祀豆實也王制服不氏凡祭祀共猛獸謂中膳羞者獸人冬獻狼春秋傳曰熊蹯不孰夏官囿人祭祀共其生獸死獸之物地官獸人凡祭祀共其死獸生獸共其完者天官掌畜祭祀共卵鳥其卵可薦之鳥官夏䱷人凡祭祀共其魚之鱻薧鼈人祭祀共蠯蠃蚳以授醢人蠃螔蝓鄭司農云蠯蛤也杜子春云蠯蜯也蚔蛾子國語曰蟲舍蚳蝝並天官川衡祭祀共川奠川奠籩豆之實魚鱐蜃蛤之屬澤虞凡祭祀共澤物之奠澤物之奠亦籩豆之實芹茒蔆芡之屬並地官庖人共祭祀之好羞謂四時所為膳食若荆州之䱹魚青州之蟹胥雖非常物進之孝也天官場人凡祭祀共其果蓏享亦如之享納牲地官甸師共野果蓏之薦甸在逺郊之外郊外曰野果桃李之屬蓏𤓰瓞之屬籩人掌四籩之實籩竹器如豆者其容實皆四升朝事之籩其實䵄蕡白黑形塩膴鮑魚鱐蕡枲實也鄭司農云朝事謂清朝未食先進寒具口實之籩熬麥曰䵄麻曰蕡稲曰白黍曰黒築塩以為虎形謂之形塩故春秋傳曰塩虎形𤣥謂以司尊彛之職參之朝事謂祭宗廟薦血腥之事形塩塩之似虎者膴䐑生魚為大臠鮑者于楅室中糗乾之出于江淮也鱐者析乾之出東海王者備物近者腥之逺者乾之因其宜也今河間以北煮穜麥賣之名曰逢燕人膾魚方寸切其腴以㗖所貴饋食之籩其實棗㮚桃乾䕩榛實饋食薦孰也今吉禮存者特牲少牢諸侯之大夫士祭禮也不祼不薦血腥而自薦孰始是以皆云饋食之禮乾䕩乾梅也有桃諸梅諸是其乾者榛似栗而小加籩之實蔆芡㮚脯蔆芡㮚脯加籩諸尸既食后亞獻尸所加之籩重言之者以四物為八籩蔆芰也芡雞頭也栗與饋食同鄭司農云蔆芡脯脩羞籩之實糗餌粉餈羞籩謂若少牢主人酬尸宰夫羞房中之羞于尸侑主人主婦皆右之者故書餈作茨鄭司農云糗熬大豆與米也粉豆屑也茨字或作餈謂乾餌餅之也𤣥謂此二物皆粉稲米黍米所為也合蒸曰餌餅之曰餈糗者擣粉熬大豆為餌餈之黏著以粉之耳餌言糗餈言粉互相足凡祭祀共其籩薦羞之實薦羞皆進也未食未飲曰薦既食既飲曰羞醢人掌四豆之實朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茒菹麇臡醓肉汁也昌本昌蒲根切之四寸為菹三臡亦醢也作醢及臡者必先膊乾其肉乃後莝之雜以粱麯及塩漬以美酒塗置甄中百日則盛矣鄭司農云麇臡麇骭髓醢或曰麇臡醤也有骨為臡無骨為醢菁菹韭菹鄭大夫謂茒為茅茒菹初生或曰茒水草杜子春讀茒為邜𤣥謂菁蔓菁也茒鳬葵也凡菹醢皆以氣味相成其状未聞饋食之豆其實葵菹蠃醢脾析蠯醢蜃蚳醢豚拍魚醢蠃螔蝓蜃大蛤蚳蛾子鄭司農云脾析牛百葉也蜃蛤也鄭大夫杜子春皆以拍為膊謂脇也或曰豚拍肩也今河間名豚脅聲如鍜鏄加豆之實芹菹免醢深蒲醓醢箈菹鴈醢筍菹魚醢芹楚葵也鄭司農云深蒲蒲蒻入水深故曰深蒲或曰深蒲桑耳醓醢肉醤也箈水中魚衣故書鴈或為鶉杜子春云當為鴈𤣥謂深蒲蒲始生水中子箈箭萌筍竹萌羞豆之實酏食糝食鄭司農云酏食以酒酏為餅糝食菜餗蒸𤣥謂酏􅊡也内則曰取稻米舉糔溲之小切狼臅膏以與稻米為􅊡又曰糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之凡祭祀共薦羞之豆實醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醤之物齊菹醬屬醯人者皆湏醯成味塩人祭祀共其苦塩散塩杜子春讀苦為盬謂出塩直用不湅治鄭司農云散塩湅治者𤣥謂散塩鬻水為塩宰夫以式法掌祭祀之戒具與其薦羞薦脯塩也羞庶羞内羞腊人凡祭祀共豆脯薦脯膴胖凡腊物脯非豆實豆當為羞聲之誤也鄭司農云膴膺肉鄭大夫云胖讀為判杜子春讀胖為版又云膴胖皆謂夾脊肉又云禮家以胖為半體𤣥謂公食大夫禮曰庶羞皆有大者此據肉之所擬祭者也又引有司曰主人亦一魚加膴祭于其上者此據主人擬祭者膴與大亦一也内則曰麋鹿田豕麕皆有胖足相參正也大者胾之大臠膴者魚之反覆膴又詁曰大二者同矣則是膴亦䐑肉大臠胖宜為脯而腥胖之言片也析肉意也禮固有腥腍爓雖其有為孰之皆先制乃亨並天官量人凡祭祀制其從獻脯燔之數量鄭司農云从獻者肉殽从酒也𤣥謂燔从于獻酒之肉炙也數多少也量長短也夏官外饔掌外祭祀之割亨共其膴脩刑膴陳其鼎俎實之牲體魚腊脩鍛脯也鄭司農云刑膴謂夾脊肉或曰膺肉也𤣥謂刑鉶羮也膴䐑肉大臠所以祭者亨人祭祀共大羮鉶羮大羹肉湇鄭司農云大羮不致五味鉶羮加鹽菜矣並天官庶羞不踰牲祭以羊則不以牛肉為羞王制右庶差鳥獸之肉不登于俎則公不射隱五年左氏傳水草之菹陸産之醢小物備矣三牲之俎八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣詳見祭義薦不美多品禮器苟有明信澗谿沼沚之毛谿亦澗也沼池也沚小渚也毛草也蘋蘩蕰藻之菜蘋大蓱也蘩皤蒿蕰藻聚藻也筐筥錡釡之器方曰筐圓曰筥無足曰釡有足曰錡潢汙行潦之水潢汙渟水行潦流潦可薦于鬼神隐三年左氏傳里革曰古者大寒降土蟄發水虞于是乎講罛罶取名魚登川禽而嘗之寢廟鳥獸成水蟲孕水虞于是乎禁罝䍡設穽鄂以實廟庖詳見通禮政事下屈到嗜芰屈到楚卿屈蕩子子夕也芰蔆也有疾召其宗老而屬之家臣曰老宗老為宗人者曰祭我必以芰及祥祥祭也宗老将薦芰屈建命去之建屈到之子子木也宗老曰夫子屬之夫子屈到也子木曰不然夫子承楚國之政承奉也其法刑在民心而藏在王府上之可以比先王下之可以訓後世雖微楚國諸侯莫不譽微無也雖使無楚國之稱諸侯猶皆譽之以為善也其祭典有之曰國君有牛享諸侯有大牢也大夫有羊饋羊饋少牢也士有豚犬之饋士以特牲庶人有魚炙之薦庶人祀以魚籩豆脯醢則上下共之共之以多少為差也不羞珍異不陳庶侈羞進也庶衆也侈猶多也夫子不以其私欲干國之典遂不用干犯也語國語楚豊卷将祭請田焉子産弗許田獵也曰唯君用鮮鮮野獸衆給而已衆臣祭以芻豢為足襄三十年左氏傳夏后氏尚明水殷尚醴周尚酒此皆其時之用耳言尚非也明堂位司烜氏掌以夫遂取明火于日以鍳取明水于月以共祭祀之明齍明燭共明水夫遂陽遂也鍳鏡屬取水者世謂之方諸取日之火月之水欲得隂陽之絜氣也明燭以照饌陳明水以為𤣥酒鄭司農云夫發聲明謂以明水滫滌粢盛黍稷秋官酒人掌為五齊三酒祭祀則共奉之以役世婦世婦謂宮卿之官掌女宮之宿戒及祭祀比其具酒人共酒因留與其奚為世婦役亦官聨凡祭祀共酒以徃不言奉小祭祀酒正辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊泛者成而滓浮泛泛然如今宜成醪矣醴猶體也成而汁滓相将如今恬酒矣盎猶翁也成而翁翁然蔥白色如今鄼白矣緹者成而紅赤如今下酒矣沈者成而滓沈如今造清矣自醴以上尤濁縮酌者盎以下差清其象類則然古之法式未可盡聞杜子春讀齊皆為粢又禮器曰緹酒之用𤣥酒之尚𤣥謂齊者毎有祭祀以度量節作之辨三酒之物一曰事酒二曰昔酒三曰清酒鄭司農云事酒有事而飲也昔酒無事而飲也清酒祭祀之酒𤣥謂事酒酌有事者之酒其酒則今之醳酒也昔酒今之酋久白酒所謂舊醳者也清酒今中山冬醸接夏而成凡祭祀以法共五齊三酒以實八尊大祭三貳中祭再貳小祭壹貳皆有酌數唯齊酒不貳皆有器量酌器所用注尊中者數量之多少未聞鄭司農云三貳三益副之也大祭天地中祭宗廟小祭五祀齊酒不貳為尊者質不敢副益也杜子春云齊酒不貳謂五齊以祭不益也其三酒人所飲者益也弟子職曰周旋而貳唯嗛之視𤣥謂大祭者王服大裘衮冕所祭也中祭者王服鷩冕毳冕所祭也小祭者王服希冕𤣥冕所祭也三貳再貮壹貳者謂就三酒之尊而益之也禮運曰𤣥酒在室醴醆在户粢醍在堂澄酒在下澄酒是三酒也益之者以飲諸臣若今常滿尊也祭祀必用五齊者至敬不尚味而貴多品並天官司尊彛掌六尊六彛之位詔其酌辨其用與其實位所陳之處酌泲之使可酌各異也用四時祭祀所用亦不同實鬰及醴齊之屬凡六彛六尊之酌鬰齊獻酌醴齊縮酌盎齊涗酌凡酒脩酌故書縮為數齊為齍鄭司農云獻讀為儀儀酌有威儀多也涗酌者涗拭勺而酌也脩酌者以水洗勺而酌也齍讀皆為齊和之齊杜子春云數當為縮齊讀皆為粢𤣥謂禮運曰𤣥酒在室醴醆在户粢醍在堂澄酒在下以五齊次之則醆酒盎齊也郊特牲曰縮酌用茅明酌也醆酒涗于清汁獻涗于醆酒猶明清與醆酒于舊澤之酒也此言轉相泲成也獻讀為摩莎之莎齊語聲之誤也煮鬰和秬鬯以醆酒摩莎泲之出其香汁也醴齊尤濁和以明酌泲之以茅縮去滓也盎齊差清和以清酒泲之而已其餘三齊泛从醴醍沈从盎凡酒謂三酒也脩讀為滌濯之滌滌酌以水和而泲之今齊人命浩酒曰滌明酌酌取事酒之上也澤讀曰醳明酌清酒醆酒泲之皆以舊醳之酒凡此四者稞用鬰齊朝用醴齊饋用盎齊諸臣自酢用凡酒唯大事于大廟備五齊三酒春官祭齊加明水明水涗齊縮酌用茅明酌也醆酒涗于清汁獻涗于醆酒猶明清與醆酒于舊澤之酒也詳見祭義右酒齊典瑞大祭祀共其玉器而奉之玉器謂四圭祼圭之屬春官泰有虞氏之尊也山罍夏后氏之尊也著殷尊也犧象周尊也泰用瓦著著地無足爵夏后氏以琖殷以斚周以爵􅕌畫禾稼也詩曰洗爵奠􅕌灌尊夏后氏以雞夷殷以􅕌周以黄目其勺夏后氏以龍勺殷以疏勺周以蒲勺夷讀為彛周禮春祠夏禴祼用雞彛鳥彛秋嘗冬烝祼用􅕌彛黄彛龍龍頭也疏通刻其頭蒲合蒲如鳬頭也明堂位小宗伯辨六彛之名物以待果将六彛雞彛鳥彛􅕌彛黄彛虎彛蜼彛果讀曰祼辨六尊之名物以待祭祀待者有事則給之鄭司農云六尊獻尊象尊壺尊著尊大尊山尊司尊彛春祠夏禴祼用雞彛鳥彛皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所昨也秋嘗冬烝祼用斝彛黄彛皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也凡四時之間祀追享朝享祼用虎彛蜼彛皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也詳見天子諸侯廟享鬯人掌共秬鬯而飾之秬鬯不和鬰者飾之謂設巾凡祭祀社壝用大罍壝謂委土為墠壇所以祭也大罍瓦罍禜門用瓢齎禜謂營鄼所祭門國門也春秋傳曰日月星辰之神則雪霜風雨之不時于是乎禜之山川之神則水旱癘疫之不時于是乎禜之魯荘二十五年秋大水鼔用牲于門故書瓢作剽鄭司農云讀剽為瓢杜子春讀齎為粢瓢謂瓠蠡也粢盛也𤣥謂齎謂為齊取甘瓠割去柢以齊為尊廟用脩凡山川四方用蜃凡祼事用概凡疈事用散祼當為埋字之誤也故書蜃或為謨杜子春云謨當為蜃書亦或為蜃蜃水中蜃也鄭司農云脩模概散皆器名𤣥謂廟用脩者謂始禘時自饋食始脩蜃概散皆漆尊也脩讀曰卣卣中尊謂獻象之屬尊者彛為上罍為下蜃畫為蜃形蚌曰合漿尊之象概官尊以朱帶者無飾曰散並春宗廟之祭貴者獻以爵賤者獻以散尊者舉觯卑者舉角凡觴一升曰爵二升曰觚三升曰觯四升曰角五升曰散禮器有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋皆黍稷器制之異同未聞俎有虞氏以梡夏后氏以嶡殷以椇周以房俎梡斷木為四足而已嶡之言蹷也謂中足為横鉅之象周禮謂之距椇之言枳椇也謂曲橈之也房謂足下跗也上下兩間有似于堂房魯頌曰籩豆大房夏后氏以楬豆殷玉豆周獻豆楬無異物之飾也獻疏刻之齊人謂無髮為秃楬明堂位司巫祭祀則共匰主及道布及蒩館杜子春云蒩讀為鉏匰器名主謂木主也道布新布三尺也鉏藉也館神所館止也書或為蒩館或為租飽或曰布者以為席也租飽茅裹肉也𤣥謂道布者為神所設巾中霤禮曰以功布為道布屬于几也蒩之言藉也祭食有當藉者館所以承蒩謂若今筐也主先匰蒩後館互言之者明共主以匰共蒩以筐大祝取其主蒩陳之器則退也士虞禮曰苴刌茅長五寸實于筐饌于西坫上又曰祝盥取苴降洗之升入設于几東席上東縮春官暢臼以掬杵以梧所以擣鬰也掬㧮也雜記掌蜃祭祀共蜃器之蜃飾祭器之屬也鬯人職曰凡四方山川用蜃器春秋定十四年秋天王使石尚來歸蜃蜃之器以蜃飾因名焉鄭司農云蜃可以白器令色白地官凌人祭祀共氷鑑鑑如甄大口以盛水天官司几筵掌五几五席之名物辨其用與其位五几左右玉彫彤漆書五席莞藻次蒲熊用位所設之席及其處凡大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席黼純左右玉几斧謂之黼其繡白黒采以絳白為質依其制如屏風然于依前為王設席左右有几優至尊也鄭司農云紛讀為豳又讀為和粉之粉謂白繡也純讀為均服之均純緣也繅讀為藻率之藻次席虎皮為席書顧命曰成王将崩命大保芮伯畢公等被冕服馮玉几𤣥謂紛如綬有文而狹者繅席削蒲蒻展之編以五采若今合歡矣畫謂雲氣也次席桃枝席有次列成文者祀先王昨席亦如之鄭司農云昨席于主階設席王所坐也𤣥謂昨讀曰酢謂祭祀及王受酢之席尸卒食王酳之卒爵祝受之又酌授尸尸酢王于是席王于户内后諸臣致爵乃設席諸侯祭祀席蒲筵繢純加莞席紛純右彫几繢畫文也不莞席加繅者繅柔嚅不如莞清堅又于鬼神宜昨席莞筵紛純加繅席畫純昨讀亦曰酢甸役則設熊席右漆几謂王甸有司祭表貉所設席春官鬼神之祭單席禮器幂人掌共巾幂共巾可以覆物祭祀以疏布巾幂八尊以疏布者天地之神尚質以畫布巾幂六彛宗廟可以文畫者畫其雲氣與天官伊耆氏掌國之大祭祀共其杖咸咸讀為函老臣雖杖于朝事鬼神尚敬去之有司以此函藏之既事乃授之秋官鄉師正歲稽其鄉器閭共祭器鄉共吉凶禮禮樂之器祭器者簠簋鼎俎之屬閭胥主集為之吉器若閭祭器者也地官孟冬命工師效功陳祭器案度程主于祭器祭器尊也度謂制大小也程謂器所容也月令凡家造祭器為先犧賦為次養器為後大夫稱家謂家始造事犧賦以賦出牲無田祿者不設祭器有田祿者先為祭服祭器可假祭服宜自有君子雖貧不粥祭器雖寒不衣祭服廣敬鬼神也粥賣也曲禮四命受器鄭司農云受祭器為上大夫𤣥謂此公之孤始得有祭器者也禮運曰大夫具官祭器不假聲樂皆具非禮也王之下大夫亦四命春官大宗伯大夫祭器不假祭器未成不造燕器造為也王制大夫士去國祭器不踰竟此用君禄所作取以出竟恐辱親也大夫寓祭器于大夫士寓祭器于士寓寄也與得用者言寄覬已後還曲禮宗廟之器不粥于市王制君子敬則用祭器謂朝聘待賔客崇敬不敢用燕器也表記祭服敝則焚之祭器敝則埋之此皆不欲人䙝之也焚之必已不用埋之不知鬼神之所為曲禮右祭器大夫祭器不假非禮也臣之奢富擬于國君敗亂之國也運禮内牢中春詔后帥外内命婦始蠶于北郊以為祭服天官王后蠶于北郊以共純服夫人蠶于北郊以共冕服祭統見親蠶之禮詳内治篇季夏命婦官染采黼黻文章必以法故無或差貸以給郊廟祭祀之服詳月令典絲凡祭祀共黼畫組就之物以給衣服冕旒及依盥巾之屬白與黒謂之黼采色一成曰就天官弁師掌王之五冕詳見名器上篇司服掌王之吉凶衣服辨其名物與其用事用事祭祀視朝甸凶弔之事衣服各有所用王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕詳見名器公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服士之服自皮弁而下如大夫之服其齊服有𤣥端素端詳見名器凡大祭祀共其衣服而奉之奉猶送也送之于王所春官追師掌王后之首服為副編次追衡笄為九嬪及外内命婦之首服以待祭祀詳見名器内司服掌王后之六服禕衣揄狄闕狄鞠衣展衣緣衣素沙辨外内命婦之服鞠衣展衣緣衣素紗凡祭祀共后之衣服及九嬪世婦凡命婦共其衣服詳見名器王后禕衣夫人揄狄君命屈狄再命禕衣一命䄠衣士褖衣詳見名器屨人掌王及后之服屨為赤舄黒舄赤繶黄繶青句素屨葛屨辨外内命夫命婦之命屨功屨散屨凡四時之祭祀以宜服之詳見名器天子玉藻十有二旒前後邃延龍卷以祭𤣥端而朝日于東門之外聽朔于南門之外諸侯𤣥端以祭皮弁以聽朔于太廟詳見名器及朝廷禮大夫冕而祭于公弁而祭于已士弁而祭於公冠而祭于己士弁而親迎然則士弁而祭于己可也詳見名器少牢饋食之禮主人朝服主婦被鍚衣侈袂主婦賛者亦被鍚衣侈袂詳見少牢特牲饋食之禮主人冠端𤣥子姓兄弟如主人之服有司羣執事如兄弟服詳見特牲特牲饋食其服皆朝服𤣥冠緇帶緇韠唯尸祝佐食𤣥端𤣥裳黄裳雜裳可也皆爵韠同上主婦纚笄宵衣同上有虞氏皇而祭夏后氏收而祭殷人冔而祭周人冕而祭詳見名器𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也詳見祭通禮齊戒章周弁殷冔夏收同上有虞氏服韍夏后氏山殷火周龍章詳見名器一命緼韍幽衡再命赤韍幽衡三命赤韍蔥衡同上鄉師比共吉凶二服吉服者祭服也比長主集為之地官有田祿者先為祭服君子雖寒不衣祭服詳見祭器祭服敝則焚之同上燕衣不踰祭服王制右祭服大司樂以六律六同五聲八音六舞大合樂以致鬼神示乃分樂而序之以祭以享以祀乃奏黄鍾歌大呂舞雲門以祀天神乃奏大簇歌應鍾舞咸池以祭地示乃奏姑洗歌南宫舞大磬以祀四望乃奏蕤賔歌函鍾舞大夏以祭山川乃奏夷則歌小吕舞大濩以享先妣乃奏無射歌夾鍾舞大武以享先袓凡六樂者文之以五聲播之以八音凡六樂者一變而致羽物及川澤之示再變而致羸物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神凡樂圜鍾為宫黄鍾為角太簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至于地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫太簇為角姑洗為徵南宫為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至于澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黄鍾為宫大吕為角大簇為徵應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九磬之舞于宗廟之中奏之若樂九變則人鬼可得而禮矣凡樂事大祭祀宿縣遂以聲展之王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏帥國子而舞詳見樂制典庸器掌藏樂器及祭祀則帥其屬而設筍虡詳見樂器鐘師凡祭祀奏燕樂鎛師凡祭祀鼓其金奏之樂笙師凡祭祀共其鐘聲之樂磬師凡祭祀奏縵樂大師大祭祀帥瞽登歌令奏擊拊下管播樂器令奏鼓朄小師大祭祀登歌擊拊下管擊應鼓徹歌凡小祭祀小樂事鼓朄樂師凡國之小事用樂者令奏鐘鼓凡樂成則告備詔來瞽臯舞及徹帥學士而歌徹令相已上並詳見樂制鼓人以靁鼓鼓神祀以靈鼓鼓社祭以路鼓鼓鬼享詳見樂器大胥凡祭祀之用樂者以鼓徵學士詳見樂制籥師祭祀則鼓羽籥之舞司干掌舞器祭祀舞者既陳則授舞器既舞則受之司兵祭祀授舞者兵司戈盾祭祀授旅賁殳故士戈盾授舞者兵亦如之舞師掌教兵舞帥而舞山川之祭祀教帗舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀教皇舞帥而舞旱暵之事凡野舞則皆教之凡小祭祀則不興舞旄人掌教舞散樂舞夷樂凡四方之以舞仕者屬焉凡祭祀舞其燕器韎師掌教韎樂祭祀則帥其屬而舞之鞮鞻氏掌四夷之樂與其聲歌祭祀則龡而歌之並詳見歌舞右樂舞昔者周公旦有勲勞于天下周公既没成王康王追念周公之所以勲勞者而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也大夫嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也子孫纂之至于今不廢所以明周公之德而又以重其國也詳見祭義季夏六月以禘禮祀周公于太廟升歌清廟下管象朱干玉戚冕而舞大武皮弁素積裼而舞大夏昧東夷之樂也任南蠻之樂也納夷蠻之樂于大廟言廣魯于天下也詳見廟享禘章荀偃士匄曰魯有禘樂賔祭用之詳見歌舞隠公五年考仲子之宫将萬焉公問羽數于衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之于是初獻六羽始用六佾也同上昭公将禘于襄公萬者二人其衆萬于季氏臧孫曰此之謂不能庸先君之廟同上孔子謂季氏八佾舞于庭是可忍也孰不可忍也三家者以雍徹子曰相維辟公天子穆穆奚取于三家之堂並詳見歌舞季冬乃命四監收秩薪柴共郊廟及百祀之薪燎四監主山林川澤之官也大者可析謂之薪小者合束謂之柴薪施炊㸑柴以給燎春秋傳曰其父析薪月令遂人凡國祭祀令野職野職薪炭之屬地官委人以式法共祭祀之薪蒸木材式法故事之多少也薪蒸給炊及燎粗者曰薪細者曰蒸木材給張事同上司烜氏掌以夫遂取明火于日共祭祀之明燭凡邦之大事共墳燭庭燎故書墳為蕡鄭司農云蕡燭麻燭也𤣥謂墳大也樹于門外曰大燭于門内曰庭燎皆所以照衆為明秋官甸師祭祀共蕭茅鄭大夫云蕭字或為莤莤讀為縮束茅立之祭前沃酒其上酒滲下去若神飲之故謂之縮縮浚也故齊桓公責楚不貢包茅王祭不共無以縮酒杜子春讀為蕭蕭香蒿也𤣥謂詩所云取蕭祭脂郊特牲云蕭合黍稷臭陽達于墻屋故既薦然後炳蕭合馨香合馨香者是蕭之謂也茅以共祭之苴亦以縮酒苴以藉祭縮酒泲酒也醴齊縮酌天官鄉師大祭祀共茅蒩杜子春云蒩當為菹以茅為菹若葵菹也鄭大夫讀蒩為藉謂祭前藉也易曰藉用白茅无咎𤣥謂蒩士虞禮所謂苴黍刌茅長五寸束之者是也祝設于几東席上食佐食取稷祭于苴三取膚祭祭如初此所以承祭既祭蓋束而去之守祧職云既祭藏其隋是與地官掌蜃祭祀共白盛之蜃盛猶成也謂飾牆使白之蜃也今東莱用蛤謂之叉灰云同上幕人凡祭祀共其帷幕幄帟綬共之者掌次當以張掌次凡祭祀張其旅幕張尸次旅衆也公卿以下即位所祭祀之門外以待事為之張大幕尸則有幄鄭司農云尸次祭祀之尸所居更衣帳同上右薪茅雜物齊桓公伐楚曰爾貢包茅不入王祭不共無以縮酒寡人是徵包裹束也茅青茅也束茅而灌之以酒為縮酒尚書包匭菁茅茅之為異未審僖四年左傳五穀不升謂之大侵侵傷大侵之禮禱而不祀周書曰大荒有禱無祀年㐮二十四穀梁傳凶年則乘駑馬祀以下牲自貶損亦取易供也駑馬六種最下者下牲少牢若特豕特豚也雜記閭師凡庶人不畜者祭無牲不耕者祭無盛掌罰其家事也盛黍稷也地官右殺禮孔子在齊齊大旱春飢景公問于孔子曰如之何孔子曰凶年則乗駑馬力役不興馳道不修馳道君行之路祈以幣玉君所祈請用幣及玉不用牲也祭祀不縣不作樂也祀以下牲當用大牢者用少牢此賢君自貶以救民之禮也家語鄭公孫黒肱有疾歸邑于公黒肱子張召室老宗人立叚叚子石黒肱子而使黜官薄祭黜官無多受職祭以特羊殷以少牢足以供祀四時祀一羊三年盛祭以羊豕殷盛也㐮二十二年左氏傳禮書綱目巻四十六
