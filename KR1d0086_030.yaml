body:
  text: 禮書綱目卷二十八婺源江永撰卒哭祔練祥禫記吉祭忌日附補死三日而殯三月而葬遂卒哭謂士也雜記曰大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭此記更從死起異人之間其義或殊士虞記士三月而葬是月也卒哭大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭詳見喪大記卜葬日章卒哭他用剛日詳見士虞禮將旦而祔則薦薦謂卒哭之祭士虞記是日也以吉祭易喪祭卒哭吉祭檀弓婦之喪卒哭夫若子主之詳見士虞禮祭成喪者必有尸詳見士虞禮男男尸女女尸同上練已上兩條祔祥禫通用用嗣尸虞祔尚質未暇筮尸士虞記祔通用庖人共喪紀之庶羞詳見喪大記虞章囿人獸人共獸臘人共乾肉魚人共鮮薧醢人共豆詳見喪大記陳小斂奠章籩人共籩詳見朔月月半奠章自天子達于庶人祭從生者詳見士虞禮子為士祭以士子為大夫葬以大夫同上祥以上三條祔練禫通用上大夫之虞也少牢卒哭成事附皆大牢下大夫之虞也犆牲卒哭成事附皆少牢詳見喪大記虞章祭稱孝子孝孫喪稱哀子哀孫名以其義稱禫雜記祔練祥通用卒哭曰成事詳喪禮義曰哀薦成事詳見士虞禮卒辭曰哀子某來日某隮附爾于皇祖某甫尚饗卒辭卒哭之祝辭隮升也尚庶幾也不稱饌明主為告祔也今文隮為齊女子曰皇祖妣某氏女孫祔于祖母婦曰孫婦于皇祖姑某氏不言爾曰孫婦婦差疏也其他辭一也來日某隮祔尚饗士虞記饗辭曰哀子某圭為而哀薦之饗詳見士虞禮獻畢未徹乃餞卒哭之祭既三獻也餞送行者之酒詩云出宿于泲飲餞于禰尸旦將始祔于皇祖是以餞送之古文餞為薦尊兩甒于廟門外之右少南水尊在酒西勺北枋少南將有事于北有玄酒即吉也此在西尚凶也言水者喪質無冪不久陳古文甒為庶也洗在尊東南水在洗東篚在西在門之左又少南饌籩豆脯四脡酒宜脯也古文脡為挺有乾肉折俎二尹縮祭半尹在西孰乾肉臘體之脯也如今涼州烏翅矣折以為俎實優尸也尹正也雖其折之必使正縮以也古文縮為蹙尸出執几從席從祝入亦告利成入前尸尸乃出几席素几葦席也以几席從執事也尸出門右南面俟設席也席設于尊西北東面几在南賓出復位將入臨之位士賓禮賓繼兄弟北上門東北面西上門西北面東上西方東面北上主人出即位于門東少南婦人出即位于主人之北皆西面哭不止婦人重餞尸尸即席坐唯主人不哭洗廢爵酌獻尸尸拜受主人拜送哭復位薦脯醢設俎于薦東朐在南朐脯及乾肉之屈也屈者在南變于吉尸在執爵取脯擩醢祭之佐食授嚌授乾肉之祭尸受振祭嚌反之祭酒卒爵奠于南方反之反于佐食佐食反之于俎尸奠爵禮有終主人及兄弟踊婦人亦如之主婦洗足爵亞獻如主人儀無從踊如初賓長洗繶爵三獻如亞獻踊如初佐食取俎實于篚尸謖從者奉篚哭從之祝前哭者皆從及大門內踊如初男女從尸男由左女由右及至也從尸不出大門者由廟門外無事尸之禮也古文謖作休尸出門哭者止以餞于外大門猶廟門賓出主人送拜稽顙送賓拜于大門外主婦亦拜賓女賓也不言出不言送拜之于闈門之內闈門如今東西掖門丈夫説絰帶于廟門外既卒哭當變麻受之以葛也夕日則服葛者為祔期今文説為稅入徹主人不與入徹者兄弟大功以下言主人不與則知丈夫婦人在其中古文與為豫婦人説首絰不説帶不説帶齊斬婦人帶不説也婦人少變而重帶帶下體之上也大功小功者葛帶時亦不説者未可以輕文變于主婦之質至祔葛帶以即位檀弓曰婦人不葛帶無尸則不餞猶出几席設如初拾踊三以餞尸者本為送神也丈夫婦人亦從几席而出古文席為筵哭止告事畢賓出士虞記脯曰尹祭曲禮用祔通父母之喪既虞卒哭疏食水飲不食菜果柱楣翦屏笇翦不納詳見喪通禮飲食居處章天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而后主各反其廟藏諸主于祖廟象有凶事者聚也卒哭成事先祔之祭名也曽子問卒哭而諱諱辟其名生事畢而鬼事始已謂不復饋食于下室而鬼神祭之已辭也既卒哭宰夫執木鐸以命于宫曰舍故而諱新故謂髙祖之父當遷也者易説帝乙曰易之帝乙為成湯書之帝乙六世王天之錫命疏可同名自寢門至於庫門百官所在庫門宫外門明堂位曰庫門天子臯門檀弓卒哭而諱自此而鬼神事之尊而諱其名王父母兄弟世父叔父姑姊妹子與父同諱父為其親諱則子不敢不從諱也謂王父母以下之親諱是謂士也天子諸侯諱羣祖母之諱宫中諱妻之諱不舉諸其側與從祖昆弟同名則諱母之所為其親諱子孫于宫中不言妻之所為其親諱夫于其側亦不言也孝子聞名心瞿凡不言人諱者亦為其相感動也子與父同諱則子可盡曽祖之親也從祖昆弟在其中于父輕不為諱與母妻之親同名則諱之雜記卒哭乃諱敬鬼神之名也諱辟也生者不相辟名衛侯名惡大夫有名惡君臣同名春秋不非禮不諱嫌名二名不偏諱為其難諱也嫌名謂音聲相近若禹與雨丘與區同偏謂二名不一一諱也孔子之母名徵在言在不稱徵言徵不稱在逮事父母則諱王父母不逮事父母則不諱王父母逮及也謂幼孤不及識父母恩不至于祖名孝子聞名心瞿諱之由心此謂庶人適士以上廟事祖雖不逮事父母猶諱祖君所無私諱謂臣言于君前不辟家諱尊無二大夫之所有公諱辟君諱也詩書不諱臨文不諱為其失事正廟中不諱為有事于髙祖則不諱曾祖以下尊無二也于下則諱上夫人之諱雖質君之前臣不諱也臣于夫人之家恩逺也質猶對也婦諱不出門婦親逺于宫中言辟之大功小功不諱曲禮大夫士諸父兄弟之喪既卒哭而歸詳見喪通禮居處章公之喪大夫俟練士卒哭而歸同上小功既卒哭可以冠取妻下殤之小功則不可大功卒哭可以冠子小功卒哭可以取妻下殤小功齊衰之親除喪而後可為昏禮凡冠者其時當冠則因喪而冠之雜記喪者不遺人人遺之雖酒肉受也從父昆弟以下既卒哭遺人可也言齊衰之喪重志不在施惠于人同上期之喪卒哭而從政詳見喪通禮動作章君既卒哭而服王事大夫士既卒哭辨絰帶金革之事無辟也同上右卒哭申繻曰周人以諱事神名終將諱之禮既卒哭以木鐸徇曰舍故而諱新謂舍親盡之祖而諱新死者故言以諱事神名終將諱之自父至髙祖皆不敢斥言桓六年左氏傳子夏曰三年之喪卒哭金革之事無辟者禮與孔子曰昔者魯公伯禽有為為之也詳見喪禮義明日以其班祔卒哭之明日也班次也喪服小記曰祔必以其昭穆亡則中一以上凡祔已復于寢如既祫主反其廟練而後遷廟古文班或為辨辨氏姓或然今文為胖士虞記按既夕篇末明日以其班祔注云班次也祔卒哭之明日祭名祔猶屬也祭昭穆之次而屬之明日祔于祖父祭告于其祖之廟其變而之吉祭也比至于祔必于是日也接詳見喪禮義小宗伯既葬詔相喪祭之禮詳見喪大記虞章大祝付練詳掌國事付當為祔祭于先王以祔後死者掌國事辨護之春官凡主兄弟之喪雖疏亦虞之喪事虞祔乃畢詳見士虞禮婦之喪祔則舅主之詳見士虞禮主妾之喪則自祔至於練祥皆使其子主之其殯祭不於正室祔自為之者以其祭于祖廟雜記姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親弗主夫若無族矣則前後家東西家無有則里尹主之或曰主之而附于夫之黨詳見喪通禮主後章沐浴櫛搔翦彌自飾也搔當為爪今文曰沐浴搔翦或為蚤揃揃或為鬋士虞禮記凡喪小功以上非虞祔練祥無沐浴詳見士虞禮祔杖不升于堂哀益衰敬彌多也小記卒哭而祔祔而作主特祀於主詳見喪大記作主章卒哭章有用嗣尸三條此章通用用専膚為折俎取諸脰膉専猶厚也折俎謂主婦以下俎也體盡人多折骨以為之今以脰膉貶于純吉今文字為折俎而説以為肵俎亦甚誣矣古文脰膉為頭嗌也其他如饋食如特牲饋食之事或云以左胖虞右胖祔今此如饋食則尸俎肵俎皆有肩臂豈復用虞臂乎其不然明矣士虞記外饔凡小喪紀陳其鼎俎而實之詳見喪大記虞章章卒哭章庖人以下三條此通用上大夫祔大牢下大夫祔少牢詳見卒哭章大夫附於士士不附於大夫附於大夫之昆弟無昆弟則從其昭穆雖王父母在亦然附皆讀為祔大夫祔于士不敢以已尊自殊于其祖也士不祔于大夫自卑别于尊也大夫之昆弟謂為士者也從其昭穆中一以上祖又祖而已祔者祔于先死者婦附于其夫之所附之妃則亦從其昭穆之妃妾附于妾祖姑無妾祖姑則亦從其昭穆之妾夫所附之妃于父則祖姑男子附於王父則配女子附於王母則不配配謂并祭王母不配則不祭王父也有事于尊者可以及卑有事于卑者不敢援尊配與不配祭饌如一祝辭異不言以某妃配某氏耳女子謂未嫁者嫁未三月而死猶歸葬于女氏之黨公子附於公子不敢戚君雜記士大夫不敢祔於諸侯祔於諸祖父之為士大夫者其妻祔於諸祖姑妾祔於妾祖姑亡則中一以上而祔祔必以其昭穆士大夫謂公子公孫為士大夫者不得祔于諸侯卑別也既卒哭各就其先君為祖者兄弟之廟而祔之中猶間也小記諸侯不得祔於天子天子諸侯大夫可以祔於士人莫敢卑其祖也同上婦祔於祖姑祖姑有三人則祔於親者謂舅之母死而又有繼母二人也親者謂所生其妻為大夫而卒而后其夫不為大夫而祔於其妻則不易牲妻卒而后夫為大夫而祔於其妻則以大夫牲妻為大夫夫為大夫時卒不易牲也此謂始來仕無廟者無廟者不祔宗子去國乃以廟從士祔於大夫則易牲不敢以卑牲祭尊也大失少牢也妾無妾祖姑者易牲而祔於女君可也女君適祖姑也易牲而祔則凡妾下女君一等記並小王父死未練祥而孫又死猶是祔於王父也未練祥嫌未祫祭序于昭穆爾王父既附則孫可附焉猶當為由由用也附皆當作祔雜記庶子不祭殤與無後者殤與無後者從祖祔食不祭殤者父之庶也不祭無後者祖之庶也此二者當從祖祔食而已不祭無所食之池共其牲物而宗子主其禮焉祖庶之殤則自祭之凡所祭殤者唯適子耳無後者謂昆弟諸父也宗子之諸父無後者為墠祭之小記女未廟見而死不遷於祖不祔於皇姑詳見喪變禮有父母之喪尚功衰而附昆弟之殤則練冠附于殤稱陽童某甫不名神也此兄弟之殤謂大功親以下之殤也斬衰齊衰之喪練皆受以大功之衰此謂之功衰以是時而祔大功親以下之殤大功親以下之殤輕不易服冠而兄為殤謂同年者也兄十九而死已明年因喪而冠陽童謂庶殤也宗子則曰陰童童未成人之稱也某甫且字也尊神不名為之造字雜記曰孝子某孝顯相夙興夜處小心畏忌不惰其身不寧稱孝者吉祭用尹祭尹祭脯也大夫士祭無云脯者今不言牲號而云尹祭亦記者誤矣嘉薦普淖普薦溲酒普薦鉶羮不稱牲記其異者今文溲為醙適爾皇祖某甫以隮祔爾孫某甫尚饗欲其附合兩告之曽子問曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而後主各反其廟然則士之皇祖于卒哭亦反其廟無主則反廟之禮未聞以其幣告之乎士虞記曰卒哭章祭稱孝子孝孫脯尹祭兩條此章通用父母之喪偕先葬者不虞祔待後事詳見變除並有喪服章祔練曰告此致祭祀之餘于君子也攝主言致福申其辭也自祭言膳謙也祔練言告不敢以為福膳也少儀朋友虞祔而已詳見喪通禮主後章朋友虞祔而退詳見弔禮會葬章右祔殷練而祔周卒哭而附孔子善殷期而神之人情弓檀君氏卒不祔於姑詳見喪大記命赴章姒氏卒不稱夫人不赴且不祔也赴同祔姑夫人之禮二者皆闕故不曰夫人定十五年左氏傳期而小祥小祥祭名祥祭也檀弓曰歸祥肉古文期皆作基士虞記期而練詳見喪服義十三月而練同上期之喪十一月而練十三月而祥十五月而禫此謂父在為母也雜記凡卜筮日喪事先逺日詳見士喪禮卜葬日章大祥通用練筮日筮尸視濯皆要絰杖繩屨有司告具而后去杖筮日筮尸有司告事畢而后杖拜送賓詳見變除練章大祝練掌國事詳見祔章大功者主人之喪有三年則必為之再祭詳見喪通禮主後章大祥通用主妾之喪則練使其子主之詳見祔章五廟之孫祖廟未毁雖為庶人練則告詳見士喪禮命赴章凡喪小功以上非練無沐浴詳見祔章練而慨然詳見喪通禮哀戚章練主用栗詳見喪大記作主章吉主于練同上作主壞廟有時日於練焉壞廟壞廟之道易簷可也改塗可也同上以卒哭章祭成喪者必有尸下二條又庖人以下三條又祭稱孝子孝孫並此章通用曰薦此常事祝辭之異者言常者期而祭禮也古文常為祥辭士虞記通祔章饗此章所用自諸侯達諸士小祥之祭主人之酢也嚌之衆賓兄弟則皆啐之大祥主人啐之衆賓兄弟皆飲之可也嚌啐皆嘗也嚌至齒啐入口雜記大夫士父母之喪既練而歸朔月忌日則歸哭於宗室詳見通禮居處章婦人喪父母既練而歸同上公之喪大夫俟練士卒哭而歸同上既練舍外寢始食菜果飯素食哭無時詳見喪服斬衰章既練居堊室不與人居君謀國政大夫士謀家事詳見喪通禮居處動作章期而小祥居堊室寢有席詳見喪通禮居處章三年之喪練不羣立不旅行詳見弔禮弔章三年之喪雖功衰不弔同上如三年之喪則既顈其練祥皆行詳見變除並有喪變服章父母之喪將祭而昆弟死既殯而祭如同宫則雖臣妾葬而后祭祭主人之升降散等執事亦散等雖虞祔亦然將祭謂練祥也言若同宫則是昆弟異宫古者兄弟異居同財有東宫有南宫有北宫有父母之喪當在殯宫而在異宫者疾病或歸者主人適子散等栗階為新喪略威儀雜記此條前祔後大祥皆通用君之喪服除而后殷祭禮也詳見喪變禮並有喪章三年而後葬者必再祭其祭之間不同時而除喪再祭練祥也間不同時者當異月也既祔明月練而祭又明月祥而祭必異月者以葬與練祥本異嵗冝異時也而除喪已祥則除不禫大小記用殷祭以下二條祥通祔練曰告詳見祔章右練祔章殷練而祔此章通用曽子問曰祭如之何則不行旅酬之事矣孔子曰聞之小祥者主人練祭而不旅奠酬於賓賓弗舉禮也奠無尸虞不致爵小祥不旅酬大祥無無算爵彌吉昔者魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也孝公隱公之祖父曽子問又期而大祥又復也士虞記父母之喪三年而祥詳見喪服義三年之喪二十五月而畢同上期之喪十三月而祥雜記日練章喪事先逺此章通用大祝祥掌國事詳見祔章五廟之孫祖廟未毁雖為庶人祥必告詳見練章主妾之喪則自祔至於祥皆使其子主之詳見祔章之練章大功者主人之喪為再祭此章通用曰薦此祥事變言祥事亦是常事也通士虞記祔章饗辭此章用自諸侯達諸士大夫主人啐之衆賓兄弟皆飲之可也詳是練章如三年之喪則既顈其練祥皆行詳見練章祭練章有父母之喪將又君之喪服除而后殷祭又三年而后葬者必再祭三條皆此章所通用祥而廓然詳見喪通禮哀戚章既祥黝堊詳見喪通禮居處章又期而大祥有醯醬居復寢素縞麻衣詳見變除祥而外無哭者禫而內無哭者樂作矣故也外無哭者于門外不哭也內無哭者入門不哭也禫踰月而可作樂樂作無哭者喪大記祥之日鼓素瑟詳見喪服義喪復常讀樂章曲禮三年之喪祥而從政詳見喪通禮動作章曽子曰廢喪服可以與於饋奠之事乎孔子曰説衰與奠非禮也以擯相可也詳見喪變禮右大祥孝公大祥奠酬弗舉亦非禮也詳見練章孔子既祥五日彈琴而不成聲哀未忘也十日而成笙歌踰月且異旬也祥亦凶事用逺日五日彈琴十日笙歌除由外也琴以手笙歌以氣檀弓子夏既除喪而見見于孔子豫之琴和之而不和彈之而不成聲樂由人心作而曰哀未忘也先王制禮而弗敢過也作起子張既除喪而見豫之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉雖情異善其俱順禮同上魯人有朝祥而莫歌者子路笑之笑其為樂速夫子曰由爾責於人終無己夫三年之喪亦已久矣夫為當時如此人行三年喪者希抑子路以善彼子路出夫子曰又多乎哉踰月則其善也又復也同上顔淵之喪饋祥肉饋遣也孔子出受之入彈琴而後食之彈琴以散哀也上同中月而禫中猶間也禫祭名也與大祥間一月自喪至此凡二十七月禫之言淡淡然平安意也古文禫或為導士虞記為父母妻長子禫目所為禫者也小記庶子在父之室則為其母不禫妾子父在厭也宗子母在為妻禫宗子之妻尊也同上期之喪十五月而禫詳見練章侯卒哭章天子諸之喪不斬衰者不與祭一條祭成喪者必有尸下二條庖人以下三條祭稱孝子孝孫一條又祔章饗辭皆此章所通用月中而禫禫而飲醴酒始飲酒者先飲醴酒始食肉者先食乾肉先飲醴酒食乾肉者不忍發御厚味間傳禫而牀詳見喪通禮居處章禫而從御吉祭而復寢從御御婦人也復寢不復宿殯宫也喪大記禫而內無哭者樂作矣故也詳見祥章是月禫徙月樂言禫明月可以用樂檀弓右禫孟獻子禫縣而不樂比御而不入可以御婦人矣尚不復寢孟獻子魯大夫仲孫蔑夫子曰獻子加於人一等矣加猶踚也檀弓是月也吉祭猶未配是月是禫月也當四時之祭月則祭猶未以某妃配某氏哀未忘也少牢饋食禮祝祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦嵗事于皇祖伯某以某妃配某氏尚饗士虞記吉祭而復寢詳見禫章右吉祭僖公八年秋七月禘於大廟用致夫人禘三年大祭之名大廟周公廟致者致新死之主于廟而列之昭穆夫人淫而與殺不薨于寢于禮不應致故僖公疑其禮厯三禘今果行之嫌異常故書之禘而致哀薑焉非禮也凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也寢小寢同同盟將葬又不以殯過廟據經哀薑薨葬之文則為殯廟赴同祔姑今當以不薨于寢不得致也春秋左氏傳閔公二年夏五月乙酉吉禘于莊公三年喪畢致新死者之主于廟廟之逺主當遷入祧因是大祭以審昭穆謂之禘莊公喪制未闋時别立廟廟成而吉祭又不于大廟故詳書以示譏速也左氏傳其言吉何據禘于大廟不言吉言吉者未可以吉也都未可以吉祭經舉重不書禘于大廟嫌獨莊公不當禘于大廟可禘者故加吉明大廟皆不當曷為未可以吉未三年也禮禘祫從先君數朝聘從合君數三年喪畢遭禘則禘遭祫則祫三年矣曷為謂之未三年三年之喪實以二十五月時莊公薨至是適二十二月所以必二十五月者取期再期恩倍漸三年也孔子曰子生三年然後免於父母之懷夫三年之喪天下之通喪禮士虞記曰期而小祥曰薦此常事又期而大祥曰薦此祥事中月而禫是月也吉祭猶未配是月者二十七月也傳言二十五月者在二十五月外可不譏其言于莊公何據禘于大廟不言周公祫僖公不言僖宫未可以稱宫廟也曷為未可以稱宫廟在三年之中矣當思慕悲哀未可以鬼神事之吉禘于莊公何以書譏何譏爾譏始不三年也與託始同義公羊傳吉禘者不吉者也喪事未畢而舉吉祭故非之也莊公薨至此方二十二月喪未畢穀梁傳襄公十五年冬十一月晉悼公卒十六年冬穆叔如晉聘且言齊故言齊再伐魯晉人曰以寡君之未禘祀禘祀三年喪畢之吉祭不然不敢忘左氏傳小史若有事則詔王之忌諱鄭司農云先王死日為忌名為諱玄謂王有事所祭于其廟春官大夫士父母之喪既練而歸忌日則歸哭于宗室詳見練章君子有終身之喪忌日之謂也忌日不用詳見喪禮義忌日不樂同上右忌日文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親思死者如不欲生言思親之深也祭義禮書綱目卷二十八
