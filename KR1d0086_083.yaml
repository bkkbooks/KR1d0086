body:
  text: 禮書綱目卷八十一婺源江永撰樂制樂一補伏羲樂名扶來亦曰立本神農樂名扶持亦曰下謀見帝系譜及孝經緯文按隋樂志云伏羲有絢同之詠伊耆有葦籥之音葛天八闋神農五絃事與功偕其來尚矣黃帝作咸池少皥作大淵見帝王世紀顓頊作六莖帝嚳作六英唐堯作大章虞舜作大韶夏禹作大夏禹命登扶氏為承夏之樂有鐘鼓磬鐸鞉鐘所以記有德鼓所以謀有道磬所以待有憂鞀所以察有說治天下以五聲為銘於簨簴商湯作大濩周武王作大武周公作勺又有房中之樂以歌后妃之德杜氏通典土鼓蕢桴葦籥伊耆氏之樂也蕢當為凷聲之誤也籥如笛三孔伊耆氏古天子有天下之號也今有姓伊耆氏者明堂位舜作五弦之琴以歌南風䕫始制樂以賞諸侯詳樂記䕫曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后德讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳳凰來儀戛擊考擊也鳴球玉磬名也搏至拊循也樂之始作升歌於堂上則堂上之樂惟取其聲之輕清者與人聲相比故曰以詠蓋戛擊鳴球搏拊琴瑟以合詠歌之聲也格神之格思之格虞賔丹朱也堯之後為賔於虞猶微子作賔於周也丹朱在位與助祭群后以德相讓則人無不和可知矣下堂下之樂也管猶周禮所謂隂竹之管孤竹之管孫竹之管也鼗鼓如鼓而小有柄持而搖之則旁耳自擊柷敔郭璞云柷如漆桶方二尺四寸深一尺八寸中有椎柄連底撞之令左右擊敔狀如伏虎背上有二十七鉏鋙刻以籈櫟之籈長一尺以木為之始作也擊柷以合之及其將終也則櫟敔以止之皆節樂之器也笙以匏為之列管於匏中又施簧於管端鏞大鍾也葉氏曰鐘與笙相應者曰笙鐘與歌相應者曰頌鐘頌或謂之鏞詩賁鼓維鏞是也大射禮樂人宿縣于阼階東笙磬西面其南笙鐘西階之西頌磬東面其南頌鐘頌鐘即鏞鐘也上言以詠此言以問相對而言蓋與詠歌迭奏也鄉飲酒禮云歌鹿鳴笙南陔間歌魚麗笙由庚或其遺制也蹌蹌行動之貌言樂音不獨感神人至於鳥獸無知亦且相率而舞蹌蹌然也簫古文作簫舞者所執之物說文云樂名簫韶季札觀周樂見舞韶簫者則簫韶蓋舜樂之總名也今文作簫故先儒誤以簫管釋之九成者樂之九成也功以九敘故樂以九成九成猶周禮所謂九變也孔子曰樂者象成者也故曰成鳳凰羽族之靈者其雄為鳳其雌為凰來儀者來舞而有容儀也戛擊鳴球搏拊琴瑟以詠堂上之樂也下管鼗鼓合止柷敔笙鏞以間堂下之樂也唐孔氏曰樂之作也依上下而遞奏間合而後曲成祖考尊神故言於堂上之樂鳥獸微物故言於堂下之樂九成致鳳尊異靈瑞故别言之非堂上之樂獨致神格堂下之樂偏能舞獸也或曰笙之形如鳥翼鏞之虞如獸形故於笙鏞以間言鳥獸蹌蹌風俗通曰舜作簫笙以象鳳蓋因其形聲之似以狀其聲樂之和豈真有鳥獸鳯凰而蹌蹌來儀者乎曰是未知聲樂蹙通之妙也匏巴鼓瑟而遊魚出聽伯牙鼓琴而六馬仰秼聲之致祥召物見於傳者多矣况舜之德致和於上䕫之樂召和於下其格神人舞獸鳳豈足疑哉今按季札觀周樂見舞韶簫者曰德至矣盡矣如天之無不覆如地之無不載雖甚盛德蔑以加矣夫韶樂之奏幽而感神則祖考來格明而感人則群后德讓微而感物則鳳儀獸舞原其所以能感召如此者皆由舜之德如天地之無不覆燾也其樂之傳厯千餘載孔子聞之於齊尚且三月不知肉味曰不圗為樂之至於斯則當時感召從可知矣䕫曰於豫擊石拊石百獸率舞庶尹允諧重擊曰擊輕擊曰拊石磬也有大磬有編磬有歌磬磬有大小故擊有輕重八音獨言石者蓋石聲屬角最難諧和記曰磬以立辨夫樂以合為主而石聲獨立辨者以其難和也石聲既和則金絲竹匏土革木七聲無不和者矣詩云既和且平依我磬聲則知言石者總樂之和而言之也或曰玉振之也者終條理之事故舉磬以終焉上言鳥獸此言百獸者考工記曰天下大獸五脂者膏者羸者羽者麟者羽麟總可謂之獸也百獸舞則物無不和可知矣尹正也庶尹者衆百官府之長也允諧者信皆和諧也庶尹諧則人無不和可知矣益稷右厯代樂制樂所由來者尚也尚曩必不可廢有節有侈有正有淫矣節適也侈大也正雅也淫亂也賢者以昌不肖以亡昔古朱襄氏之治天下也朱襄氏古天子炎帝之别號多風而陽氣蓄積萬物散解果實不成故士逹作為五絃瑟以來隂氣以定羣生士達朱襄氏之臣昔葛天氏之樂三人摻牛尾投足以歌八闋葛天氏古帝名投足猶蹀足闋終一曰載民二曰𤣥鳥三曰遂草木四曰奮五榖五曰敬天常六曰達帝功七曰依地德八曰總萬物之極樂之八篇名也昔陶唐氏之始隂多滯伏而湛積陶唐氏堯之號水道壅塞不行其原故有洪水之災民氣鬱閼而滯著閼讀曰遏止之遏筋骨瑟縮不達故作為舞以宣導之宣通昔黃帝令伶倫作為律伶倫黃帝臣伶倫自大夏之西大夏西方之山乃之阮隃之隂阮隃山名山北曰隂取竹於嶰溪之谷以生空竅厚鈞者斷兩節間竹生溪谷者取其厚鈞斷兩節間以為律管其長三寸九分而吹之以為黃鐘之宫斷竹長三寸九分吹之音中黃鍾之宫吹曰舍少次制十二筒六律六吕各有管故曰十二筒合成舍矣以之阮隃之下聽鳳凰之鳴以别十二律其雄鳴為六雌鳴亦六以此黃鐘之宫適合合和諧黃鐘之宫皆可以生之故曰黃鐘之宫律吕之本法鳳之雌雄故律有隂陽上下相生故曰黃鐘之宫皆可以生之黃帝又命伶倫與榮猿鑄十二鐘以和五音以仲春之月乙卯之日日在奎始奏之命之曰咸池奏十二鍾樂名之為咸池帝顓頊生自若水實處空桑處居空桑乃登為帝惟天之合正風乃行惟天之合德與天合風化也其音若熙熙凄凄鏘鏘帝顓頊好其音乃令飛龍作效八風之音八風八卦之風命之曰承雲以祭上帝上帝昊天上帝乃令鱓先為樂倡倡始也鱓乃偃浸以其尾鼓其腹鼓擊其音英英和盛貌帝嚳命咸黑作為聲歌九招六列六英倕作為鼙鼓鐘磬吹苓管塤篪因令鳳鳥天翟舞之帝嚳大喜乃以康帝德康安帝堯立乃命質為樂質乃效山林溪谷之音以歌質當為䕫乃以麋􅛘置缶而鼓之鼓擊乃拊石擊石以象上帝玉磬之音以致舞百獸瞽叟乃拌五絃之瑟拌分作以為十五絃之瑟命之曰大章以祭上帝舜立仰延乃拌瞽叟之所為瑟益之八絃以為二十三絃之瑟帝舜乃令質修九招六列六英以明帝德招列英皆樂名也帝謂舜禹立勤勞天下日夜不懈通大川决壅塞鑿龍門降通漻水以導河決壅塞故鑿龍門也降大漻水疏三江五湖注之東海以利黔首於是命臯陶作為夏籥九成以昭其功九成九變昭明殷湯即位夏為無道暴虐萬民侵削諸侯不用軌度天下患之湯於是變六州以討桀之罪功名大成黔首安寧湯乃命伊尹作為大濩歌晨露修九招六列以見其善大濩晨露九招六列皆樂名善美也周文王處岐諸侯去殷三淫而翼文王文王古公亶父之孫王季厯之子也古公避獯鬻之難邑于岐山之陽有周地及受命因為天下號也淫過翼佐三淫謂剖比干之心斫賢士之股刳孕婦之胎故諸侯去之而佐文王也散宜生曰殷可伐也文王弗許散冝生文王四臣之一也論語曰文王為西伯三分天下有其二以服事殷故不許周公旦乃作詩曰文王在上於昭于天周雖舊邦其命維新以繩文王之德武王即位以六師伐殷六師未至以鋭兵克之於牧野未至殷都而勝紂於牧野歸乃薦俘馘于京大室乃命周公為作大武大武周樂成王立殷民反叛反王命周公踐伐之踐往商人服象為虐于東夷象獸名也周公遂以師逐之至于江南乃為三象以嘉其德故樂之所由來者尚矣非獨為一世之所造三象周公所作樂名嘉美也尚久也自黃帝以來功成作樂故曰非獨為一世之所造也吕氏春秋古樂樂者所以象德表功殊名黃帝曰咸池者言大施天下之道而行之天之所生地之所載咸蒙德施也顓頊曰六莖者言和律厯以調隂陽莖者著萬物也帝嚳曰五英者言能調和五聲以養萬物調其英華也堯曰大章者大明天地人之道也舜曰簫韶者言能繼堯之道也禹曰大夏者言禹能順二聖之道而行之故曰大夏也湯曰大濩者言湯承堯能護民之急也周公曰酌合者言周公輔成王能斟酌文武之道而成之也武王曰象者象太平而作樂示已太平也合曰大武者天下始樂周之征伐行武故詩人歌之王赫斯怒爰整其旅當此之時天下樂文王之怒以安天下故樂其武也白虎通顔淵問為邦子曰樂則韶舞取其盡善盡美論語子在齊聞韶三月不知肉味曰不圗為樂之至於斯也史記三月上有學之二字不知肉味蓋心一於是而不及乎他也曰不意舜之作樂至於如此之美則有以極其情文之備而不覺其歎息之深也蓋非聖人不足以及此孔子至齊郭門之外遇一嬰兒挈一壺相與俱行其視精其心正其行端孔子謂御曰趣驅之趣驅之韶樂方作於是至而聞韶學之三月不知肉味曰不圗為樂之至於此也故樂非獨以自樂也又以樂人非獨以自正也又以正人至矣哉子謂韶盡美矣又盡善也謂武盡美矣未盡善也韶舜樂武武王樂美者聲容之盛善者美之實也舜紹堯致治武王伐紂救民其功一也故其樂皆盡美然舜之德性之也又以揖讓而有天下武王之德反之也又以征誅而得天下故其實有不同者善程子曰成湯放桀惟有慙德武王亦然故未盡堯舜禹湯其揆一也征伐非其所欲所遇之時然爾論語賔牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之已久何也對曰病不得其衆也武謂周舞也備戒擊鼓警衆病猶憂也以不得衆心為憂憂其難也咏歎之淫液之何也對曰恐不逮事也咏嘆淫液歌遲之也逮及也事戎事也發揚蹈厲之已蚤何也對曰及時事也時至武事當施也武坐致右憲左何也對曰非武坐也言武之事無坐也致謂膝至地也憲讀為軒聲之誤聲淫及商何也對曰非武音也言武歌在正其軍不貪商也時人或說其義為貪商也子曰若非武音則何音也對曰有司失其傳也若非有司失其傳則武王之志荒矣有司典樂者也傳猶說也荒老耄也言典樂者失其說也而時人妄說也書曰王耄荒子曰唯丘之聞諸萇𢎞亦若吾子之言是也萇𢎞周大夫賔牟賈起免席而請曰夫武之備戒之已久則既聞命矣敢問遲之遲而又久何也遲之遲謂久立於綴子曰居吾語女夫樂者象成者也揔干而山立武王之事也發揚蹈厲大公之志也武亂皆坐周召之治也居猶安坐也成謂已成之事也揔干持盾也山立猶正立也象武王持盾正立待諸侯也發揚蹈厲所以象威武時也武舞象戰鬪也亂謂失行列也失行列則皆坐象周公召公以文止武也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇成猶奏也每奏武曲一終為一成始奏象觀兵盟津時也再奏象克商時也三奏象克殷有餘力而反也四奏象南方荆蠻之國侵畔者服也五奏象周公召公分職而治也六奏象兵還振旅也復綴反位止也崇充也凡六奏以充武樂也天子夾振之而駟伐盛威於中國也夾振之者王與大將夾舞者振鐸以為節也駟當為四聲之誤也武舞戰象也每奏四伐一擊一刺為一伐牧誓曰今日之事不過四伐五伐分夾而進事蚤濟也分猶部曲也事猶為也濟成也舞者各有部曲之列又夾振之者象用兵務於早成也久立於綴以待諸侯之至也象武王伐紂待諸侯也且女獨未聞牧野之語乎欲語以作武樂之意武王克殷反商未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞投殷之後於宋封王子比干之墓釋箕子之囚使之行商容而復其位庶民弛政庶士倍祿濟河而西馬散之華山之陽而弗復乘牛散之桃林之野而弗復服車甲釁而藏之府庫而弗復用倒載干戈包之以虎皮將帥之士使為諸侯名之曰建櫜然後天下知武王之不復用兵也反當為及字之誤也及商謂至紂都也牧誓曰至于商郊牧野封謂故無土地者也投舉徙之辭也時武王封紂子武庚於殷墟所徙者微子也後周公更封而大之積土為封封比干墓崇賢也行猶視也使箕子視商禮樂之官賢者所處皆令反其居也弛政去其紂時苛政也倍祿復其紂時薄者也散猶放也桃林在華山旁甲鎧也釁釁字也包干戈以虎皮明能以武服兵也建讀為鍵字之誤也兵甲之衣曰櫜鍵櫜言閉藏甲兵也詩曰載櫜弓矢春秋傳曰垂櫜而入周禮曰櫜之欲其約也薊或為續祝或為鑄散軍而郊射左射貍首右射騶虞而貫革之射息也禆冕搢笏而虎賁之士說劒也祀乎明堂而民知孝朝覲然後諸侯知所以臣耕藉然後諸侯知所以敬五者天下之大教也郊射為射宫於郊也左東學也右西學也貍首騶虞所以歌為節也貫革射穿甲革也禆冕衣禆衣而冠冕也禆衣衮之屬也搢猶插也賁憤怒也文王之廟為明堂制耕藉藉田也食三老五更於大學天子袒而割牲執醬而饋執爵而酳冕而揔干所以教諸侯之弟也三老五更互言之耳皆老人更知三德五事者也冕而揔干親在舞位也周名大學曰東膠若此則周道四達禮樂交通則夫武之遲久不亦宜乎言武遲久為重禮樂樂記武奏大武也朱子曰大武周公象武王武功之舞歌此詩以奏之禮曰朱干玉戚冕而舞大武然傳以此詩為武王所作則篇內已有武王之諡而其說誤矣酌告成大武也朱子曰酌即勺也內則十三舞勺即以此詩為節而舞也然此詩與賚般皆不用詩中字名篇疑取樂節之名如曰武宿夜云爾竝詩序帝曰豫欲聞六律五聲八音在治忽以出納五言汝聽六律陽律也不言六吕者陽統隂也有律而後有聲有聲而後八音得以依據故六律五聲八音言之叙如此也在察也忽治之反也聲音之道與政通故審音以知樂審樂以知政而治之得失可知也五言者詩歌之協於五聲者也自上達下謂之出自下達上謂之納汝聽者言汝當審樂而察政治之得失者也益稷帝曰䕫命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和胄長也自天子至卿大夫之適子也栗莊敬也上二無字與母同凡人直者必不足於溫故欲其溫寬者必不足於栗故欲其栗所以慮其偏而輔翼之也剛者必至於虐故欲其無虐簡者必至於傲故欲其無傲所以防其過而戒禁之也教胄子者欲其如此而其所以教之之具則又専在於樂如周禮大司樂掌成均之法以教國子弟而孔子亦曰興於詩成於樂蓋所以蕩滌邪穢斟酌飽溝動蕩血脉流通精神養其中和之德而救其氣質之偏者也心之所之謂之志心有所之必形於言故曰詩言志既形於言則必有長短之節故曰歌永言既有長短則必有髙下清濁之殊故曰聲依永聲者宫商角徴羽也大抵歌聲長而濁者為宫以漸而清且短則為商為角為徴為羽所謂聲依永也既有長短清濁則又必以十二律和之乃能成文而不亂假令黃鐘為宫則太簇為商姑洗為角林鍾為徴南吕為羽蓋以三分損益隔八相生而得之餘律皆然即禮運所謂五聲六律十二管還相為宫所謂律和聲也人聲既和乃以其聲被之八音而為樂則無不諧協而不相侵亂失其倫次可以奏之朝廷薦之郊廟而神人以和矣聖人作樂以養性情育人材事神祗和上下其體用功效廣大深切乃如此今皆不復見矣可勝嘆哉舜典大司樂以樂德教國子中和祗庸孝友中猶忠也和剛柔適也祗敬庸有常也善父母曰孝善兄弟曰友以樂語教國子興道諷誦言語興者以善物喻善事道讀曰導導者言古以剴今也倍文曰諷以聲節之曰誦發端曰言答述曰語以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武此周所存六代之樂黃帝曰雲門大卷黃帝能成名萬物以明民共財言其德如雲之所出民得以有旅無類大咸咸池堯樂也堯能殫均刑法以儀民言其德所不施大㲈舜樂也言其德能紹堯之道也大夏禹樂也禹治水傳土言其德能大中國也大濩湯樂也湯以寬治民而除其邪言其德能使天下得其所也大武武王樂也武王伐紂以除其害言其德能成武功樂師掌國學之政以教國子小舞謂以年幼少時教之舞內則曰十三舞勺成童舞象二十舞大夏大胥掌學士之版以待致諸子春入學舍采合舞秋頒學合聲詳歌舞篇籥師掌教國子舞羽吹籥同上官並春凡學世子及學士必時四時各有宜學士謂司徒論俊選所升於學者春夏學干戈秋冬學羽籥皆於東序干盾也戈句孑㦸也干戈萬舞象武也用動作之時學之籥舞象文也用安靜之時學之詩云左手執籥右手秉翟小樂正學干大胥贊之籥師學戈籥師丞贊之四人皆樂官之屬也通職秋冬亦學以羽籥小樂正樂師也周禮樂師掌國學之政教國子小舞大胥掌學士之版春入學舍采合舞秋頒學合聲籥師掌教國子舞羽吹籥胥鼓南南南夷之樂也胥掌以六樂之㑹正舞位旄人教夷樂則以鼓節之詩云以雅以南以籥不僭春誦夏弦大師詔之瞽宗誦謂歌樂也弦謂以絲播詩陽用事則學之以聲大樂正學舞干戚戚斧也子文王世大司樂以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賔客以說逺人以作動物六律合陽聲者也六同合隂聲者也此十二者以銅為管轉而相生黃鍾為首其長九寸各因而三分之上生者益一分下生者去一焉國語曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾言以中聲定律以律立鐘之均大合樂者謂遍作六代之樂以冬日至作之致天神人鬼以夏日至作之致地祗物魅動作羽嬴之屬虞書曰䕫曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賔在位群后德讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳳凰來儀又曰於豫擊石拊石百獸率舞庶尹允諧此其于宗廟九奏效應乃分樂而序之以祭以享以祀分謂各用一代之樂乃奏黃鍾歌大吕舞雲門以祀天神以黃鍾之鍾大吕之聲為均者黃鍾陽聲之首大吕為之合奏之以祀天神尊之也天神謂五帝及日月星辰也王者又各以夏正月祀其所受命之帝於南郊尊之也孝經說曰祭天南郊就陽位是也乃奏大簇歌應鍾舞咸池以祭地示大蔟陽聲第二應鍾為之合咸池大咸也地示所祭於北郊謂神州之神及社稷乃奏姑洗歌南吕舞大㲈以祀四望姑洗陽聲第三南吕為之合四望五嶽四鎮四瀆此言祀者司中司命風師兩師或亦用此樂歟乃奏蕤賔歌函鍾舞大夏以祭山川蕤賔陽聲第四函鍾為之合函鍾一名林鍾乃奏夷則歌小吕舞大濩以享先妣夷則陽聲第五小吕為之合小吕一名中吕先妣姜嫄也姜嫄履大人跡感神靈而生后稷是周之先母也周立廟自后稷為始祖姜嫄無所妃是以特立廟而祭之謂之閟宫閟神之也乃奏無射歌夾鍾舞大武以享先祖無射陽聲之下也夾鍾為之合夾鍾一名圜鍾先祖謂先王先公凡六樂者文之以五聲播之以八音六者言其均皆待五聲八音乃成也播之言被也故書播為藩杜子春云藩當為播讀如后稷播百榖之播凡六樂者一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神變猶更也樂成則更奏也此謂大蠟索鬼神而致百物六奏樂而禮畢東方之祭則用大簇姑洗南方之祭則用蕤賔西方之祭則用夷則無射北方之祭則用黃鍾為均焉每奏有所感致和以來之凡動物敏疾者地祗髙下之甚者易致羽物既飛又走川澤有孔竅者蛤蟹走則遲墳衍孔竅則小矣是其所以舒疾之分土袛原隰及平地之神也象物有象在天所謂四靈者天地之神四靈之知非德至和則不至禮運曰何謂四靈麟鳳龜龍謂之四靈龍以為畜故魚鮪不淰鳳以為畜故鳥不矞麟以為畜故獸不狘龜以為畜故人情不失凡樂圜鍾為宫黃鍾為角大蔟為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫大簇為角姑洗為徵南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黃鐘為宫大吕為角大蔟為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣此三者皆禘大祭也天神則主北辰地示則主崑崙人鬼則主后稷先奏是樂以致其神禮之以玉而裸焉乃後合樂而祭之大傳曰王者必禘其祖之所自出祭法曰周人禘嚳而郊稷謂此祭天圜丘以嚳配之圜鍾夾鐘也夾鍾生於房心之氣房心為大辰天祭之明堂函鍾林鍾也林鍾生于未之氣未坤之位或曰天社在東井與鬼之外天社地神也黃鍾生於虛危之氣虛危為宗廟以此三者為宫用聲類求之天宫夾鍾隂聲其相生從陽數其陽無射無射上生中吕中吕與地宫同位不用也中吕上生黃鍾黃鍾下生林鐘林鐘地宫又不用林鍾上生太蔟太簇下生南吕南吕與無射同位又不用南吕上生姑洗地宫林鍾林鍾上生大蔟大蔟下生南吕南吕上生姑洗人宫黃鍾黃鍾下生林鍾林鍾地宫又辟之林鍾上生大蔟大蔟下生南吕南吕與天宫之陽同位又辟之南吕上生姑洗姑洗南吕之合又辟之姑洗下生應鍾應鍾上生蕤賔蕤賔地宫林鍾之陽也又辟之蕤賔上生大吕凡五聲宫之所生濁者為角清者為徴羽此樂無商者祭尚柔商堅剛也鄭司農云雷鼓雷鼗皆謂六面有革可擊者也雲和地名也靈鼓靈鼗四面路鼓路鼗兩面九德之歌春秋傳所謂水火金木土榖謂之六府正德利用厚生謂之三事六府三事謂之九功九功之德皆可歌也謂之九歌也𤣥謂雷鼓雷鼗八面靈鼓靈鼗六面路鼓路鼗四面孤竹竹特生者孫竹竹枝根之末生者隂竹生於山北者雲和空桑龍門皆山名九㲈讀當為大韶字之誤也凡樂事大祭祀宿縣遂以聲展之叩聽其聲具陳次之以知完否王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏三夏皆樂章名帥國子而舞當用舞者帥以往大饗不入牲其他皆如祭祀大饗饗賔客也不入牲牲不入亦不奏昭夏也其他謂王出入賔客出入亦奏王夏肆夏大射王出入令奏王夏及射令騶虞騶虞樂章名在召南之卒章王射以騶虞為節王大食三侑皆令奏鐘鼓大食朔月月半以樂宥食時也宥猶勸也王師大獻則令奏愷樂大獻獻捷於祖愷樂獻功之樂鄭司農云以春秋晉文公敗楚于城濮傳曰振旅愷以入于晉凡建國禁其淫聲過聲凶聲慢聲淫聲若鄭衛也過聲失哀樂之節凶聲亡國之聲若桑間濮上慢聲惰慢不恭樂師凡樂掌其序事治其樂政序事次序用樂之事凡國之小事用樂者令奏鐘鼓小事小祭祀之事凡樂成則告備成謂所奏一竟書曰簫韶九成燕禮曰大師告於樂正曰正歌備詔來瞽臯舞鄭司農云瞽當為鼓臯當為告呼擊鼓者又告當舞者持鼓與舞俱來也鼓字或作瞽詔來瞽或曰瞽或曰來敕也敕爾鼓率爾衆工奏爾悲誦肅肅雍雍母怠母凶𤣥謂韶來瞽詔視瞭扶瞽者來入也臯之言號告國子當舞者舞及徹帥學士而歌徹學士國子也鄭司農云謂捋徹之時自有樂故帥學士而歌徹𤣥謂徹者歌雍雍在周頌臣工之什令相令視瞭扶工鄭司農云告當相瞽師者言當罷也瞽師盲者皆有相道之者故師冕見及階曰階也及席曰席也皆坐曰某在斯某在斯曰相師之道與饗食諸侯序其樂事令奏鍾鼓令相如祭之儀樂出入令奏鍾鼓樂出入謂笙歌舞者及其器凡樂官掌其政令聽其治訟大胥比樂官比猶校也杜子春云次比樂官也鄭大夫讀比為庀庀具也録具樂官展樂器展謂陳數之凡祭祀之用樂者以鼓徵學士擊鼓以召之文王世子曰大昕鼓徴所以警衆大師大祭祀帥瞽登歌令奏擊拊擊拊瞽乃歌也故書拊為付鄭司農云登歌歌者在堂也付字當為拊書亦或為拊樂或當擊或當拊登歌下管貴人聲也𤣥謂拊形如鼓以韋為之著之以穅下管播樂器令奏鼓朄鼓朄管乃作也特言管者貴人氣也鄭司農云下管吹管者在堂下朄小鼓也先擊小鼓乃擊大鼓小鼓為大鼓先引故曰朄朄讀為導引之引𤣥謂鼓朄猶言擊朄詩云應朄縣鼓大饗亦如之大射帥瞽而歌射節射節主歌騶虞凡國之瞽矇正焉從大師之政教小師大祭祀登歌擊拊亦自有拊擊之佐大師令奏鄭司農云拊者擊石下管擊應鼓應鼙也應與朄及朔皆小鼓也其所用别未間徹歌於有司徹而歌雍大饗亦如之凡小祭祀小樂事鼓朄如大師鄭司農云朄小鼓名掌六樂聲音之節與其和和錞于視瞭掌凡樂事播鼗擊頌磬笙磬詳見樂器掌大師之縣大師當縣則為之凡樂事相瞽相謂扶工賔射皆奏其鐘鼓擊朄以奏之其登歌大師自奏之磬師教縵樂燕樂之鐘磬杜子春讀縵為怠慢之慢𤣥謂縵讀謂縵錦之縵謂雜聲之和樂者也學記曰不學操縵不能安弦燕樂房中之樂所謂隂聲也二樂皆教其鐘磬凡祭祀奏縵樂鐘師掌金奏金奏擊金以為奏樂之節金謂鐘及鎛凡樂事以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏以鐘鼓者先擊鐘次擊鼓以奏九夏夏大也樂之大歌有九故書納作內杜子春云內當為納祴讀為陔鼓之陔王出入奏王夏尸出入奏肆夏牲出入奏昭夏四方賔來奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏客醉而出奏陔夏公出入奏驁夏肆夏詩也春秋傳曰穆叔如晉晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜曰三夏天子所以享元侯也使臣不敢與聞肆夏與文王鹿鳴俱稱三謂其三章也以此知肆夏詩也國語曰金奏肆夏繁遏渠天子所以享元侯肆夏繁遏渠所謂三夏矣吕叔玉云肆夏繁遏渠皆周頌也肆夏時邁也繁遏執競也梁思文也肆遂也夏大也言遂於大位謂王位也故時邁曰肆于時夏允王保之繁多也遏止也言福祿止於周之多也故執億曰降福穰穰降福簡簡福祿來反渠大也言以后稷配天王道之大也故思文曰思文后稷克配彼天故國語謂之曰皆昭令德以合好也𤣥謂以文王鹿鳴言之則九夏皆詩篇名頌之族類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具凡祭祀饗食奏燕樂以鐘鼓奏之掌鼙鼓縵樂鼓讀如莊王鼓之鼓𤣥謂作縵樂擊鼙以和之笙師凡祭祀饗射共其鍾笙之樂鍾笙與鐘聲相應之笙燕樂亦如之鎛師掌金奏之鼓凡祭祀鼓其金奏之樂饗食賔射亦如之韎師掌教韎樂祭祀則帥其屬而舞之舞之以東夷之舞大饗亦如之旄人掌教舞散樂舞夷樂散樂野人為樂之善者若今黃門倡矣自有舞夷樂四夷之樂亦皆有聲歌及舞凡四方之以舞仕者屬焉凡祭祀賔客舞其燕樂鞮鞻氏掌四夷之樂與其聲歌四夷之樂東方曰韎南方曰任西方曰侏離北方曰禁詩云以雅以南是也王者必作四夷之樂一天下也言與其聲歌則云樂者主於舞祭祀則吹而歌之吹之以管籥為之聲燕亦如之春並宫天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之將謂執以將命柷鼗皆所以節樂王制右樂事雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考雷出地奮和之至也先王作樂既象其聲又取其義殷盛也易有瞽始作樂而合乎祖也詩序有瞽有瞽在周之庭瞽樂官無目者也序以此為始作樂而合乎祖之詩兩句總序其事也設業設虡崇牙樹羽應田縣鼓鞉磬柷圉既備乃奏簫管備舉業虡崇牙見靈臺篇樹羽置五采之羽於崇牙之上也應小鞞田大鼓也鄭氏曰田當作朄小鼓也縣鼓周制也夏后氏足鼓殷楹鼓周縣鼓鞉如鼓而小有柄兩耳持其柄而搖之則旁耳還自擊磬石磬也柷狀如漆桶以木為之中有椎連底挏之令左右擊以起樂者也圉亦作敔狀如伏虎背上有二十七鉏鋙刻以木長尺櫟之以止樂者也簫編小竹管為之管如笛併兩而吹之者也喤喤厥聲肅雍和鳴先祖是聽我客戾止永觀厥成我客二王後也觀視也成樂闋也如簫韶九成之成獨言二王後者猶言虞賔在位我有嘉客蓋尤以是為盛耳周頌歌者在堂上舞者在堂下何歌者象德儛者象功君子上德而下功降神之樂在上何為鬼神舉故書曰戛擊鳴球搏拊琴瑟以詠祖考來格所以用鳴球搏拊者何鬼神清虛貴净賤鏗鏘也王者食所以有樂何樂食天下之太平富積之饒也明天子至尊非功不食非德不飽樂元語曰受命而六樂樂先王之樂明有法也與其所自作明有制典四夷之樂明德廣及之也故南夷之樂曰任西夷之樂曰禁北夷之樂曰昧東夷之樂曰離合觀之樂儛於堂四夷之樂陳於右以文得之持羽毛儛以武得之持干戚儛也樂元語曰東夷之樂持矛舞助時生也南夷之樂持羽舞助時養也西夷之樂持㦸舞助時煞也北夷之樂持干儛助時藏也先王推行道德和調隂陽覆被夷狄故夷狄安樂來朝中國於是作樂樂之制夷狄樂不制夷狄禮何以為禮者身當履而行也夷狄之人不能行禮樂者聖人作為以樂之耳故有夷狄樂也並白虎通昧東夷之樂也任南蠻之樂也納夷蠻之樂於大廟言廣魯於天下也周禮昧師掌教昧樂詩曰以雅以南以籥不僭廣大也明堂位晉悼公十二年公伐鄭鄭伯嘉來納女工妾三十人女樂二八嘉鄭僖公子簡公也女美女工樂師傳曰賂晉以師愷師觸師蠲是也妾給使者工妾凡三十人女樂今伎女也八人為佾備八音也或云女工有技巧者也與傳相違失之矣賈侍中云妾女樂也下别有女樂二八則賈君所云似非也歌鍾二肆歌鍾歌時所奏肆列也凡縣鍾磬全為肆半為堵及寶鏄鏄小鍾也寶鄭所寶也公賜魏絳女樂一八歌鍾一肆曰子教寡人和戎翟而正諸華於今八年七合諸侯寡人無不得志請與子共樂之國語晉語魏絳於是乎始有金石之樂禮也禮大夫有功則賜樂襄十一年左氏傳太師摯適齊太師魯樂官之長摯其名也亞飯干適楚三飯繚適蔡四飯缺適秦亞飯以下以樂侑食之官干繚缺皆名也鼓方叔入於河鼓擊鼓者方叔名河河內播鼗武入於漢播搖也鼗小鼓兩旁有耳持其柄而搖之則旁耳還自擊武名也漢漢中少師陽擊磬襄入於海少師樂官之佐陽襄二人名襄即孔子所從學琴者海海島也也此記賢人之隱遁以附前章然未必夫子之言張子曰周衰樂廢夫子自衛反魯一嘗治之其後伶人賤工識樂之正及魯益衰三桓僭妄自太師以下皆知散之四方逾河蹈海以去亂聖人俄頃之助功化如此如有用我期月而可豈虛語哉論語禮書綱目卷八十一
