body:
  text: 禮書綱目卷十六婺源江永撰覲禮賓禮七經鄭目録云覲見也諸侯秋見天子之禮春見曰朝夏見曰宗秋見曰覲冬見曰遇朝宗禮備覲遇禮省是以享獻不見焉三時禮亡唯此存爾覲禮於五禮屬賔禮覲禮右篇目凡言朝見之期與待賓客之禮皆附于下舜典五載一巡狩羣后四朝敷奏以言明試以功車服以庸五載之內天子巡狩者一諸侯來朝者四蓋巡狩之明年則東方諸侯來朝於天子之國又明年則南方之諸侯來朝又明年則西方之諸侯來朝又明年則北方之諸侯來朝又明年則天子復巡狩是則天子諸侯雖有尊卑而一往一來禮無不答是以上下交通而遠近治和也敷陳奏進也周禮曰民功曰庸程子曰敷奏以言者使各陳其為治之說言之善者則從而明考其功有功則賜車服以旌異之其言不善則亦有以告飭之也周官六年五服一朝五服侯甸男采衛也六年一朝會京師周禮邦畿方千里其外方五百里謂之侯服嵗一見其貢祀物又其外方五百里謂之甸服二嵗一見其貢嬪物又其外方五百里謂之男服三嵗一見其貢器物又其外方五百里謂之采服四嵗一見其貢服物又其外方五百里謂之衛服五嵗一見其貢財物又其外方五百里謂之要服六嵗一見其貢貨物要服蠻服也此六服去王城三千五百里相距七千里公侯伯子男封焉其朝貢之嵗四方各四分趨四時而來或朝春或宗夏或覲秋或遇冬祀貢者犧牲之屬故書嬪作頻鄭司農云嬪物婦人所為物𤣥謂絲枲也器物尊彛之屬服物𤣥纁絺纊也材物八材也貨物龜貝也九州之外謂之蕃國世一見各以其所貴寶為贄九州之外夷服鎮服蕃服也曲禮曰其在東夷北狄西戎南蠻雖大曰子春秋傳曰杞桓公以夷禮故曰子然則九州之外其君皆子男也無朝貢之嵗父死子立及嗣王即位乃一來耳各以其所貴寶為贄則蕃國之君無執王瑞者是謂其君為小賓臣為小客所貴寶見傳者若犬戎獻白狼白鹿是也其餘則周書王㑹備焉秋官大行人記諸侯之於天子也比年一小聘三年一大聘五年一朝比年每嵗也小聘使大夫大聘使卿朝則君自行然此大聘與朝晉文公時所制也虞夏之制諸侯嵗朝周之制侯甸男采衛要服六者各以其服數來朝王制天子無事與諸侯相見曰朝事謂征伐考禮正刑一德以尊于天子同上大宗伯以賓禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇本文此下云時見曰㑹殷見曰同此六禮以諸侯見王為文六服之內四方以時分來或朝春或宗夏或覲秋或遇冬名殊禮異更遞而遍朝猶朝也欲來之早宗尊也欲其尊王覲之言勤也欲其勤王之事遇偶也欲其若不期而俱至春官大行人掌大賓之禮及大客之儀以親諸侯大賓要服以內諸侯大客謂孤卿春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮本文此下云時㑹以發四方之禁殷同以施天下之政言六事者以王見諸侯為文圖比陳協皆考績之王者春見諸侯則圖其事之可否秋見諸侯則比其功之高下夏見諸侯則陳其謀之是非冬見諸侯則合其慮之異同六服以其朝嵗四時分來更迭如此更迭而遍司馬法曰春以禮朝諸侯圖同事夏以禮宗諸侯陳同謀秋以禮覲諸侯比同功冬以禮遇諸侯圖同慮時以禮㑹諸侯施同政殷以禮宗諸侯發同禁秋官大宰以八統詔王馭萬民八曰禮賓禮賓賓客諸侯所以示民親仁善鄰以九式均節財用二曰賓客之式六曰幣帛之式幣帛所以贈勞賓客者天官小宰以官府之六聯合邦治二曰賓客之聯事以法掌賓客之戒具法謂其禮法也戒具戒官有事者所當共令百官府共其財用同上宰夫凡禮事贊小宰比官府之具比校次之同上大府邦中之賦以待賓客同上大行人以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賓客九儀謂命者五公侯伯子男也爵者四孤卿大夫士也秋官小行人掌邦國賓客之禮籍詳見王朝邦國遣使禮司儀凡四方之賓客禮儀辭命餼牢賜獻以二等從其爵而上下之上下猶豐殺也秋官掌客掌四方賓客之牢禮餼獻飲食之等數與其政治政治邦新殺禮之屬也同上掌訝掌邦國之等籍以待賓客等九儀之差數侯同上之凡言客者謂諸聘問臣王朝邦國遣使篇當於此考之下皆同至于郊郊謂近郊去王城五十里右至郊諸侯出行及逆積問勞之禮附于下記孔子曰諸侯適天子必告于祖奠于禰皆奠幣以告之互文也冕而出視朝聽國事也諸侯朝天子必禆冕為將廟受也禆冕者公衮侯伯鷩子男毳命祝史告于社稷宗廟山川臨行又遍告宗廟孝敬之心也乃命國家五官而後行五官五大夫與事者命者敕之以其職道而出祖道也聘禮出祖釋軷祭酒脯也告者五日而遍過是非禮也既告不敢久留凡告用牲幣反亦如之牲當為制字之誤也制幣一丈八尺曽子問諸侯將出宜乎社造乎禰宜造皆祭名王制諸侯將出必以幣帛皮圭告于祖禰遂奉以出載於齊車以行每舍奠焉而後就舍以脯醢禮神乃敢即安也所告而不以出即埋之曽子問諸侯朝天子見日而行逮日而舍奠舍奠每將舍奠行主同上司關凡四方之賓客叩關則為之告賓客謂朝聘者叩關猶謁關人也鄭司農說以國語曰周之秩官有之曰敵國賓至關尹以告行理以節逆之地官蠟氏凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野大賓客亦如之蠲讀如吉圭為饎之圭圭潔也刑者黥劓之屬任人司圜所收教罷民也凶服服衰絰也此所禁除者皆為不欲見人所穢惡也官秋小行人凡諸侯入王則逆勞于畿鄭司農云入王朝于王也故春秋傳曰宋公不王又曰諸侯有王王有巡狩同上訝士邦有賓客則與行人送逆之入于國則為之前驅而辟野亦如之送逆謂始來及去也入國八野自以時事同上掌訝若將有國賓客至則告官修委積與士逆賓於疆為前驅而入官謂牛人羊人舍人委人之屬士訝士也既戒乃出迎賓及宿則令聚柝令令野廬氏及委則致積以王命致于賓同上環人掌送逆邦國之通賓客以路節達諸四方通賓客以常事往來者也路節旌節也四方圻上舍則授館令聚柝有任器則令環之令令野廬氏也鄭司農云四方人有任器者則環人主令殉環守之凡門關無幾送逆及疆鄭司農云門關不得苛留環人也𤣥謂環人送逆之則賓客出入不見幾同上野廬氏若有賓客則令守涂地之人聚柝之有相翔者誅之守涂地之人道所出廬宿旁民也相翔猶昌翔觀伺者也鄭司農云聚柝之聚擊柝以宿衛之也有奸人相翔于賓客之側則誅之不得令冦盜賓客同上大司徒大賓客令野修道委積令令遺人使為之也少曰委多曰積皆所以給賓客官地遂人凡賓客令修野道而委積委積於廬宿市同上遂師賓客則巡其道修庀其委積巡其道修行治道路也故書庀為比鄭司農云讀為庀庀具也同上遺人郊里之委積以待賓客凡賓客掌其道路之委積凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積廬若今野候徙有庌也宿可止宿若今亭有室矣候館樓可觀望者也一市之間有三廬一宿同上委人以稍聚待賓客聚凡畜聚之物也賓客共其芻薪同上牛人凡賓客之事共其積膳之牛積所以給賓客之用若司儀職曰主國五積者也致饔餼詳見同上羊人賓客共其法羊注見致饔餼夏官上公之禮出入五積三問三勞侯伯之禮出入四積再問再勞子男之禮出入三積一問一勞出入謂從來訖去也每積有牢禮米禾芻薪凡數不同者皆降殺問問不恙也勞謂苦倦之也皆有禮以幣致之大行人鄉士大賓客則各掌其鄉之禁令帥其屬夾道而蹕屬中士以下秋官司門凡四方之賓客造焉則以告造猶至也告告于王而止客以俟逆地官王使人皮辨用璧勞侯氏亦皮辨迎于帷門之外再拜小行人職曰凡諸侯入王則逆勞于畿則郊勞者大行人也皮辨者天子之朝朝服也璧無束帛者天子之玉尊也不言諸侯言侯氏者明國殊舍異禮不凡之也郊舍狹寡為帷宮以受勞掌舍職曰為帷宮設旌門使者不答拜遂執玉三揖至于階使者不讓先升侯氏升聽命降再拜稽首遂升受玊不答拜者為人使不當其禮也不讓先升奉王命尊也升者升壇使者東面致命侯氏東階上西面聽之使者左還而立侯氏還璧使者受侯氏降再拜稽首使者乃出左還還南面示將去也立者見侯氏將有事於已俟之也還玉重禮侯氏乃止使者使者乃入侯氏與之讓升侯氏先升受几侯氏拜送几使者設几答拜侯氏先升賓禮統焉几者安賓所以崇優厚也上介出止使者則已布席也侯氏用束帛乘馬儐使者使者再拜受侯氏再拜送幣儐使者所以致尊敬也拜者各於其階使者降以左驂出侯氏送于門外再拜侯氏遂從之騑馬曰驂左驂設在西者其餘三馬侯氏之士遂以出授使者之從者于外從之者遂隨使者以至朝右郊勞小行人及郊勞為承而擯本文郊勞下有視館將幣字賓視館致館也承猶丞也王使勞賓於郊致館於至將幣使宗伯為上擯皆為之丞而擯之秋官記案十有二寸棗㮚十有二列諸侯純九大夫純五夫人以勞諸侯純猶皆也鄭司農云案玉案也夫人天子夫人𤣥謂案玉飾案也夫人王后也記時諸侯猶稱王而夫人之號不别是以同王后於夫人也玊案十二以為列王后勞朝諸侯皆九列聘大夫皆五列則十有二列者勞二王之後也棗㮚實于器乃加于案聘禮曰夫人使下大夫勞以二竹簋方𤣥被纁裡有蓋實棗蒸㮚擇兼執之以進考工記玊人天子賜舍以其新至道路勞苦未受其禮且使即安也賜舍猶致館也所使者司空與小行人為承擯今文賜作錫曰伯父女順命于王所賜伯父舍此使者致館辭侯氏再拜稽首受館儐之束帛乘馬王使人以命致館無禮猶儐之者尊王使也侯氏授館于外既則儐使者于內右賜舍小行人視館為承而擯詳見上章掌訝至于國賓入館次于舍門外待事于客次如今官府門外更衣處待事于客通其所求索凡從者出則使人道之從者凡介以下也人其屬胥徒也使道賓客之從者營護之凡訝者賓客至而往詔相其事而掌其治令秋官訝士居館則帥其屬而為之蹕誅戮暴客者同上司隸邦有賓客之事則役其煩辱之事煩猶劇也同上宰夫掌賓賜之飱牽與其陳數鄭司農云飱夕食也春秋傳曰飱有陪鼎牽牲牢可牽而行者春秋傳曰餼牽竭矣𤣥謂飱客始至所致禮凡此禮陳數存可見者唯有行人掌客及聘禮公食大夫天官飱中他物詳見致饔餼天子使大夫戒曰某日伯父帥乃初事大夫者卿為訝者也掌訝職曰凡訝者賓客至而往詔相其事戒猶告也其為告使順循其事也初猶故也侯氏再拜稽首受覲日也右戒日諸侯前朝皆受舍于朝同姓西面北上異姓東面北上言諸侯者明來朝者衆矣顧其入覲不得並耳受舍于朝受次于文王廟門之外聘禮記曰宗人受次次以帷少退于君之次則是次也言舍者尊舍也天子使掌次為之諸侯上介先朝受焉此覲也言朝者覲遇之禮雖簡其來之心猶若朝也分别同姓異姓受之將有先後也春秋傳曰寡人若朝于薛不敢與諸任齒則周禮先同姓右受舍凡王朝戒令皆附見于下幕人凡朝覲共其帷幕幄帟綬共之者掌次當以張詳見會同天官掌次諸侯朝覲則張大次小次大次亦初往所止居小次即宮待事之處同上射人有大賓客則作卿大夫從作者選使從王見諸侯戒大史及大夫介戒戒其當行者覲禮曰諸公奉篋服加命書于其上升自西階東而太史氏右夏官司士凡㑹同作士從賓客亦如之作士從謂可使從于王者同上諸子賓客作羣子從從于王同上大史朝覲以書協禮事詳見會同篇春官小史大賓客佐大史凡國事之用禮法者掌其小事同上雞人大祭祀夜呼旦以􅑧百官凡國之大賓客亦如之夜夜漏未盡雞鳴時也呼旦以警起百官使夙興同上司烜氏凡邦之大事共墳燭庭燎故書墳為蕡鄭司農云蕡燭麻燭也𤣥謂蕡大也樹于門外曰大燭于門內曰庭燎皆所以昭衆為明秋官侯氏禆冕釋幣于禰將覲質明時也禆冕者衣禆衣而冠冕也禆之言埤也天子六服大裘為上其餘為禆以事尊卑服之而諸服亦服焉上公衮無升龍侯伯鷩子男毳孤絺卿大夫𤣥此差司服所掌也禰謂行主遷主矣而云禰親之也釋幣者告將覲也其釋幣如聘大夫將受命釋幣于禰之禮既則祝藏其幣歸乃埋之于祧西階之東右釋幣于禰記諸侯禆冕以朝朝天子也禆冕公衮侯伯鷩子男毳也玉藻乘墨車載龍旗弧韣乃朝以瑞玊有繅墨車大夫制也乘之者入天子之國車服不可盡同也交龍為旗諸侯之所建弧所以張縿之弓也弓衣曰韣瑞玉謂公桓圭侯信圭伯躬圭子穀璧男蒲璧繅所以藉玊以韋衣木廣袤各如其玉之大小以朱白蒼為六色今文玊為圭繅或為璪天子設斧依于户牖之間左右几依如今綈素屏風也有繡斧文所以示威也斧謂之黼几玊几也左右者優至尊也其席莞席紛純加繅席畫純加次席黼純天子衮冕負斧依衮衣者禆之上也繢之繡之為九章其龍天子有升龍有降龍衣此衣而冠冕南鄉而立以俟諸侯見嗇夫承命告于天子嗇夫蓋司空之屬也為末擯承命於侯氏下介傳而上上擯以告天子天子見公擯者五人見侯伯擯者四人見子男擯者三人皆宗伯為上擯春秋傳曰嗇夫馳天子曰非他伯父實來豫一人嘉之伯父其入豫一人將受之言非他者親之辭嘉之者美之辭也上擯又傳此而下至嗇夫侯氏之下介受之傳而上上介以告其君君乃許入今文實作實嘉作賀侯氏入門右坐奠圭再拜稽首入門右執臣道不敢由賓之位也卑者見尊奠摯而不授擯者謁謁謂告也上擯告以天子前辭欲親受之如賓客也其辭所易者曰伯父其升侯氏坐取圭升致命王受之玉侯氏降階東北面再拜稽首擯者延之曰升升成拜乃退擯者請之侯氏坐取圭則遂左降拜稽首送玊也從後詔禮曰延延進也右覲凡賓客諸侯有卿訝此謂朝覲之日王所使迎賓于館之訝掌訝掌訝及將幣為前驅道之以如朝至于朝詔其位入復鄭司農云詔其位告客以其位次也入復客入則掌訝出復其故位也𤣥謂入復者入告王以客至也秋官記偏駕不入王門在旁與已同曰偏同姓金輅異姓象輅四衛革輅蕃國木輅駕之與王同謂之偏駕不入王門乘墨車以朝是也偏駕之車舍之于館與經本記司常日月為常交龍為旗王畫日月象天明也諸侯畫交龍一象其升朝一象其下復也凡祭祀各建其旗賓客亦如之賓客朝覲宗遇王乘金輅建其大常春官典瑞公執桓圭侯執信圭伯執躬圭繅皆三采三就子執榖璧男執蒲璧繅皆二采再就以朝覲宗遇于王三采朱白蒼二采朱緑也鄭司農云以圭璧見于王覲禮曰侯氏入門右坐奠圭再拜稽首同上所以朝天子圭與繅皆九寸剡上寸半厚半寸博三寸繅三采六等朱白蒼𤣥纁繫長尺絢組聘禮記禮詳見聘大行人辨諸侯之命以同邦國之禮上公之禮執桓圭九寸繅藉九寸冕服九章建常九斿樊纓九就二車九乘介九人其朝位賓主之間九十步立當車軹擯者五人諸侯之禮執信圭七寸繅藉七寸冕服七章建常七斿樊纓七就二車七乘介七人朝位賓主之間七十步立當前疾擯者四人諸伯執躬圭其他皆如諸侯之禮諸子執穀璧五寸繅藉五寸冕服五章建常五斿樊纓五就二車五乘介五人朝位賓主之間五十步立當車衡擯者三人諸男執蒲璧其他皆如諸子之禮繅藉以五采韋衣板若奠玊則以藉之冕服著冕所服之衣也九章者自山龍以下七章者自華蟲以下五章者自宗彛以下也常旌斿也斿其屬縿垂者也樊纓馬飾也以罽飾之每一處五采備為一就就成也二副也介輔已行禮者也朝位謂大門外賓下車及王車出迎所立處也王始立大門內交擯三辭乃乘車而迎之齊僕為之節上公立當軹侯伯立當疾子男立當衡王立當軫與鄭司農云車軹軹也前疾謂駟馬車轅前胡下垂拄地者之介幾人下有牢禮之數見後饗禮章擯者幾人下有廟中將幣三享云云見享章有饗食禮見嘉禮饗食燕記篇有積問勞之數見至郊章凡諸侯之王事辨其位正其等協其禮賓而見之王事以王之事來也詩云莫敢不來王孟子曰諸侯有王秋官凡諸侯之適子誓于天子攝其君則下其君之禮一等未誓則以皮帛繼子男誓猶命也言誓者明天子既命以為之嗣樹子不易也春秋桓九年曹伯使其世子射姑來朝行國君之禮是也公之子如侯伯而執圭侯伯之子如子男而執璧子男之子與未誓者皆次小國之君執皮帛而朝㑹焉其賓之皆以上卿之禮焉春官典命司服大賓客共其衣服而奉之奉猶送也送之于王所春官校人朝覲毛馬而頒之毛馬齊其色也頒授當乘之夏官典路大祭祀則出路贊駕說大賓客亦如之亦出路當陳之鄭司農說漢朝上計律陳屬車于庭故曰大賓客亦如之春官齊僕掌馭金路以賓以待賓客夏官齊右掌賓客前齊車齊車金路王自整齊之車也前之者已駕王未乘之時同上大司寇凡朝覲前王秋官小司寇大賓客前王而辟鄭司農云小司冦為王道辟除姦人也若今時執金吾下至令尉奉引矣同上旅賁氏賓客則服而趨服而趨夾王車趨也會同賓客王亦齊服服衮冕則此士之齊服服𤣥端夏官節服氏掌朝覲衮冕六人維王之大常服衮冕者從王服也維維之以縷王旌十二旒兩兩以縷綴連旁三人持之禮天子旌曳地鄭司農云維持之同上司几筵凡大朝覲王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玊几斧謂之黼其繡白黑采以絳帛為質依其制如屏風然於依前為王設席左右有几優至尊也鄭司農云紛讀為豳又讀為和粉之粉謂白繡也純謂為均服之均純緣也繅讀為藻率之藻次席虎皮為席書顧命曰成王將崩命大保芮伯畢公等被冕服馮玉几𤣥謂紛如綬有文而狹者繅席削蒲蒻展之編以五采若今合歡矣畫為雲氣也次席桃枝席有次列成文春官几俟于東廂王即席乃設之也東箱東夾之前相翔待事之處本經記大僕賓客正王之服位詔法儀詔告也夏官大宗伯朝覲則為上相相詔王禮也出接賓曰擯入詔禮曰相相者五人卿為上擯春官小行人將幣為承而擯詳見郊勞章司儀掌九儀之賓客擯相之禮以詔儀容辭令揖讓之節出接賓曰擯入贊禮曰相以詔者以禮告王凡行人之儀不朝不夕不正其主面亦不背客謂擯相傳辭時也不正東鄉不正西鄉常視賓主之前郤得兩鄉之而已秋官五官之長曰伯是職方謂為三公者周禮九命作伯職主也是伯分主東西者春秋傳曰自陜以東周公主之自陜以西召公主之一相處于內是或為氏其擯于天子也曰天子之吏擯者辭也春秋傳曰王命委之三吏謂三公也天子同姓謂之伯父異姓謂之伯舅稱之以父與舅親之之辭也九州之長入天子之國曰牧每一州之中天子選諸侯之賢者以為之牧也周禮曰乃施典于邦國而建其牧天子同姓謂之叔父異姓謂之叔舅牧尊于大國之君而謂之叔父辟二伯也亦以此為尊禮或損之而益謂此類也其在東夷北狄西戎南蠻雖大曰子謂九州之外長也天子亦選其諸侯之賢者以為之子子猶牧也入天子之國曰子天子亦謂之子雖有侯伯之地本爵亦無過乎子是以同名曰子庶方小侯入天子之國曰某人謂戎狄子男君也諸侯見天子曰臣某侯某謂嗇夫承命告天子辭也其為州牧則曰天子之老臣某侯某奉圭請覲某侯者國名某者人名曲禮君天下曰天子朝諸侯分職授政任功曰豫一人皆擯者辭也天下謂外及四海也漢于蠻夷稱天子于王侯稱皇帝覲禮曰伯父實來豫一人嘉之余豫古今字上同凡自稱天子曰豫一人謙自别于人而已伯曰天子之力臣伯上公也命分陜諸侯之于天子曰某土之守臣某其在邊邑曰某屏之臣某邊邑謂九州之外玉藻訝士客出入則道之出入謂朝覲于王時也春秋傳曰晉侯受䇿以出出入三覲秋官天子執冒四寸以朝諸侯名玊曰冒者言德能覆蓋天下也四寸者方以尊接卑以小為貴考工記玊人天子當依而立諸侯北面而見天子曰覲天子當寧而立諸公東面諸侯西面曰朝諸侯春見曰朝受摯于朝受享于廟生氣文也秋見曰覲一受之于廟殺氣質也朝者位于內朝而序進覲者寓于庿門外而序入王南面立于依寧而受焉夏宗依春冬遇依秋春秋時齊侯唁魯昭公以遇禮相見取易略也覲禮今存朝宗遇禮今亡曲禮奠圭于繅上謂釋于地也本經記掌訝及退亦如之文承前入復之下館鄭司農云客退復入迎為之前驅至于也𤣥謂亦如之如其為前驅秋官象胥掌蠻夷閩貉戎狄之國使詳見遣使若以時入賓則協其禮與其辭言傳之以時入賓謂其君以世一見來朝為賓者凡其出入送逆之禮節幣帛辭令而賓相之從來至去皆為擯而相侑其禮儀同上曽子問曰諸侯禮見天子入門不得終禮廢者幾旅衆孔子曰四請問之曰太廟火日食后之喪雨霑服失容則廢大廟始祖廟宗廟皆然主于始祖耳如諸侯皆在而日食則從天子救日各以其方色與其兵示奉時事將有所討也方色者東方衣青南方衣赤西方衣白北方衣黑兵未聞也大廟火則從天子救火不以方色與兵曽子問舜典輯五瑞既月乃日覲四嶽羣牧班瑞于羣后輯斂瑞信也公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧五等諸侯執之以合符于天子而驗其信否也周禮天子執冒以朝諸侯鄭氏注云名玊以冒其德覆冒天下也諸侯始受命天子錫以圭圭頭斜鋭其冒下斜刻小大長短廣狹如之諸侯來朝天子以刻處冒其圭頭有不同者即辨其僞也既盡覲見四嶽四方之諸侯羣牧九州之牧伯也程子曰輯五瑞徴五等之諸侯也此以上皆正月事至盡此月則四方之諸侯有至者矣遠近不同來有先後故日日見之不如他朝㑹之同期于一日蓋欲以少接之則得盡其詢察禮意也班頒同羣后即侯牧也既見之後審知非僞則又頒還其瑞以與天子正始也昔者周公朝諸侯于明堂之位天子負斧依南鄉而立負之言背也斧扆為斧文屏風于户牖之間按注以天子為周公其說差異今削之三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上九采之國應門之外北面東上四塞世告至此周公明堂之位也朝之禮不于此周公權用之也朝位之上上近主位尊也九采九州之牧典貢職者也正門謂之應門二伯帥諸侯而入牧居外而糾察之也四塞謂夷服鎮服蕃服在四方為蔽塞者新君即位則乃朝周禮侯服嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衛服五嵗一見要服六嵗一見九州之外謂之蕃國世一見明堂也者明諸侯之尊卑也朝于此所以正儀辨等也堂明位覲禮天子不下堂而見諸侯正君臣也下堂而見諸侯天子之失禮也由夷王以下夷王周康王之𤣥孫之子也時微弱不敢自尊于諸侯郊特牲四享皆束帛加璧庭實唯國所有四當為三古書作三四或皆積畫此篇又多四字字相似由此誤也大行人職曰諸侯庿中將幣皆三享其禮差又無取于四也初享或用馬或用虎豹之皮其次享三牲魚臘籩豆之實龜也金也丹漆絲纊竹箭也其餘無常貨此地物非一國所能有唯所有分為三享皆以璧帛致之奉束帛匹馬卓上九馬隨之中庭西上奠幣再拜稽首卓讀如卓王孫之卓卓猶的也以素的一馬以為上書其國名後當識其何産也馬必十匹者不敢斥王之乘用成數敬也擯者曰豫一人將受之亦言王欲親受之侯氏升致命王撫玊侯氏降自西階東面授宰幣西階前再拜稽首以馬出授人九馬隨之王不受玉撫之而已輕財也以馬出隨侯氏出授玉人于外也王不使人受馬者至于享王之尊益君侯氏之卑益臣事畢三享訖右享王禮賓事附于下璧琮九寸諸侯以享天子享獻也聘禮享君以璧享夫人以琮玉人圭以馬璋以皮璧以帛琮以錦五等諸侯享天子以璧享后用琮其大各如其瑞皆有庭實以馬若皮皮虎豹皮也用圭璋者二王之後也二王後尊故享用圭璋而特之禮器曰圭璋特義亦通于此詳見諸侯相朝篇小行人小宗伯大賓客受其將幣之齎謂所齎來貢獻之財物春官服不氏賓客之事則抗皮鄭司農云謂賓客來朝聘布皮帛者服不氏主舉藏之𤣥謂抗者若聘禮曰有司二人舉皮以東夏官校人凡賓客受其幣馬賓客之幣馬來朝聘而享王者同上上公之禮廟中將幣三享王禮再祼而酢侯伯之禮廟中將幣三享王禮一祼而酢子男之禮廟中將幣三享王禮一祼不酢廟受命祖之廟也故書祼作果鄭司農云三享三獻也祼讀為灌再灌再飲公也而酢報飲至也𤣥謂三享皆束帛加璧庭實唯國所有朝士儀曰奉國地所出重物而獻之明臣職也朝先享不言朝者朝正禮不嫌有等也王禮王以鬱鬯禮賓也鬱人職曰凡祭祀賓客之祼事和鬱鬯以實彛而陳之禮者使宗伯攝酌圭瓚而祼王既拜送爵又攝酌璋瓚而祼后又拜送爵是謂再祼再祼賓乃酢王也禮侯伯一祼而酢者祼賓賓酢王而已后不祼也祼子男一祼不酢者祼賓而已不酢王也不酢之禮聘禮禮賓是與大行人典瑞祼圭有瓚以祼賓客鄭司農云于圭頭為器可以挹鬯祼祭謂之瓚故詩曰恤彼玉瓚黃流在中國語謂之鬯圭𤣥謂爵行曰祼漢禮瓚槃大五升口徑八寸下有槃口徑一尺春官鬱人掌祼器祼器謂彛及舟與瓚凡賓客之祼事和鬱鬯以實彛而陳之築鬱金煮之以和鬯酒鄭司農云鬱草名十葉為貫百二十貫為築以煮之鑊中停于祭前鬱為草若蘭凡祼玊濯之陳之以贊祼事祼玊謂圭瓚璋瓚詔祼將之儀與其節節謂王奉玉送祼早晏之時凡祼事沃盥同上小臣朝覲沃王盥夏官肆師大賓客涖筵几築煮此王所以禮賓客贊果將酌鬱鬯授大宗伯載祼春官大宗伯大賓客則攝而載果載為也果讀為祼代王祼賓客以鬯君無酌臣之禮言為者攝酌獻耳拜送則王也鄭司農云王不親為主同上小宗伯賓客以時將瓚果將送也猶奉也賓客以時奉而授宗伯天子圭瓚諸侯璋瓚同上小宰凡賓客贊祼凡受爵之事凡受幣之事唯祼助宗伯其餘皆助大宰王不酌賓客而有受酢大宗伯職曰大賓客則攝而載祼內宰凡賓客之祼皆贊謂王同姓及二王之後來朝覲為賓客者祼之禮亞王而禮賓並天官乃右肉袒于廟門之東乃入門右北面立告聽事右肉袒者刑宜施于右也凡以禮事者左袒入更從右者臣益純也告聽事者告王以國所用為罪之事也易曰折其右肱無咎擯者謁諸天子天子辭于侯氏曰伯父無事歸寧乃邦謁告寧安也乃猶女也侯氏再拜稽首出自屏南適門西右請事有治附見下掌訝凡賓客之治令訝訝治之賓客之治謂欲正其貢賦理國事也以告訝訝為如朝而理之秋官訝士有治則贊之同上大宰待四方之賓客之小治大事決于王小事冢宰專平天官遂入門左北面立王勞之再拜稽首擯者延之曰升升成拜降出王辭之不即左者當出隱于屏而襲之也天子外屏勞之勞其道勞也右王勞天子賜侯氏以車服迎于外門外再拜賜車者同姓以金輅異姓以象輅服則衮也鷩也毳也古文曰迎于門外也路先設西上路下四亞之重賜無數在車南路謂車也凡君所乘車曰路路下四謂乘馬也亞之次車而東也詩云君子來朝何錫豫之雖無豫之路車乘馬又何豫之𤣥衮及黼重猶善也所加賜善物多少由恩也春秋傳曰重錦三十兩諸公奉篋服加命書于其上升自西階東面大史是右言諸公者王同時分命之而使賜侯氏右讀如周公右王之右是右者始隨入于升東面乃居其右古文是為氏也侯氏升西面立太史述命諸王命書也侯氏降兩階之間北面再拜稽首受命升成拜大史辭之降也春秋傳曰且有後命以伯舅耋老無下拜此辭之類大史加書于服上侯氏受受篋服使者出侯氏送再拜儐使者諸公賜服者束帛四馬儐大史亦如之既云拜送乃云儐使者以勞有成禮略而遂言同姓大國則曰伯父其異姓則曰伯舅同姓小邦則曰叔父其異姓小邦則曰叔舅據此禮云伯父同姓大邦而言右賜車服內府掌受九貢九賦九功之貨賄良兵良器以待邦之大用大用朝覲之頒賜天官小宗伯掌衣服車旗宮室之賞賜王以賞賜有功者春官校人飾幣馬執撲而從之鄭司農云校人主飾之也幣馬以馬遺人當幣處者也聘禮曰馬則北面奠幣于其前士喪禮下篇曰薦馬纓三就入門北面交轡圉人夾牽之馭者執䇿立于馬後夏官圉人凡賓客牽馬而入陳賓客之馬王所以賜之者詩云雖無豫之路車乘馬同上記所謂大輅者天子之車也龍旗九旒天子之旌也青黑緣者天子之寶龜也從之以牛羊之羣則所以贈諸侯也贈諸侯謂來朝將去賜之以禮樂記君子來朝何錫豫之雖無豫之路車乘馬又何豫之𤣥衮及黼君子諸侯也路車金路以賜同姓象路以賜異姓也𤣥衮𤣥衣而畫以卷龍也黼如斧形刺之于裳也小雅采菽韓侯入覲以其介圭入覲于王王錫韓侯淑旗綏章簟茀錯衡𤣥衮赤舄鉤膺鏤錫鞹鞃淺幭鞗革金厄介圭封圭執之以為贄以合瑞于王也淑善也交龍曰旗綏章染鳥羽或旄牛尾為之注于旗竿之首為表章者也鏤刻金也馬首上飾曰鍚今當盧也鞃式中也謂兩較之間橫木可慿者也以鞹持之使牢固也淺虎皮也幭覆式也字一作幦又作幎以有毛之皮覆式上也鞗革轡首也金厄以金為環纒扼轡首也大雅韓奕饗禮禮謂食燕也王或不親以其禮幣致之略言饗禮互文也掌客職曰上公三饗三食三燕侯伯再饗再食再燕子男一饗一食一燕右饗禮詳見嘉禮饗食燕記篇下致饔餼等經不具附見于宰夫凡朝覲賓客以牢禮之法掌其牢禮委積膳獻飲食牢禮之法多少之差及其時也三牲牛羊豕具為一牢委積謂牢米薪芻給賓客道用也膳獻禽羞俶獻也飲食燕饗也天官上公之禮禮九牢侯伯禮七牢子男禮五牢禮大禮饔餼也三牲備為一牢秋官大行人諸侯七介七牢諸侯七介七牢者周之侯伯也周禮上公九介九牢侯伯七介七牢子男五介五牢禮器賓客之牛角尺王制牛人凡賓客之事共其牢禮積膳之牛牢禮飱饔也膳所以間禮賓客若掌客云殷膳大牢積注見前地官羊人賓客共其法羊法羊飱饔積膳之羊夏官外饔祭祀共其脯修刑膴陳其鼎俎實之牲體魚臘凡賓客之飱饔饗食之事亦如之飱客始至之禮饔既將幣之禮致禮于客莫盛于饔天官亨人祭祀共鉶羮賓客亦如之鉶羮加鹽菜矣同上酒人凡祭祀共酒以往賓客之陳酒亦如之謂若歸饔餼之酒亦自有奉之者以酒從往同上饎人凡賓客共其簠簋之實謂致飱饔地官舍人凡祭祀共簠簋實之陳之方曰簠圓曰簋盛黍稷稻粱器賓客亦如之共其禮車米筥米芻禾禮致饔餼之禮同上舂人賓客共其牢禮之米謂可以實筐筥同上醢人賓客之禮共醢五十罋致饔餼時官天醯人賓客之禮共醯五十罋同上典瑞璋邸射以造贈賓客璋有邸而射鄭司農云射剡也春官玊人璋邸射素功以致稍餼邸射剡而出也致稍餼造賓客納稟食也鄭司農云素功無瑑飾也考工記庖人共賓客之禽獻禽獻獻禽于賓客獻古文為獸杜子春云當為獻凡令禽獸以法授之其出入亦如之令令獸人也禽獸不可久處賓客至將獻之庖人乃令獸人取之必書所當獻之數與之及其來致禽亦以此書校數之至于獻賓客又以此書付使者展而行之掌客乘禽于諸侯各如其命之數聘禮乘禽於客日如其饔餼之數士中日則二雙天官漿人共賓客之稍禮稍禮非飱饔之禮留間王稍所給賓客者漿人所給亦六飲而已同上內宰致后之賓客之禮謂諸侯來朝覲及女賓之賓客同上乃歸右乃歸還圭附見于下諸侯執所受圭與璧朝于天子無過者復得其圭以歸其有過者留其圭能正行者復還其圭三年圭不復少絀以爵尚書大傳訝人與行人送之詳見至郊章掌訝及歸送亦如之如之者送至于竟如其前驅聚柝待事之屬秋官司儀凡賓客送逆同禮謂郊勞郊送之屬同上環人凡門關無幾送及疆詳至郊章反必告設奠卒斂幣玉藏諸兩階之間乃出曽子問凡告用牲幣反亦如之詳至郊章朝事儀賔禮八古者聖王明義以别貴賤以序尊卑以體上下然後民知尊君敬上而忠順之行備矣是故古者天子之官有典命官掌諸侯之儀大行人掌諸侯之儀以等其爵故貴賤有别尊卑有序上下有差也典命諸侯之五儀諸臣之五等以定其爵故貴賤有别尊卑有序上下有差也故朝聘之禮各執其圭瑞服其服乘其輅建其旌旗施其樊纓從其二車委積之以其牢禮之數所以明别義也然後天子冕而執鎮圭尺有二寸藻藉尺有二寸搢大圭乘大輅建大常十有二旒樊纓十有再就二車十有二乘率諸侯而朝日東郊所以教尊尊也退而朝諸侯為壇三成宮旁一門天子南鄉見諸侯土揖庶姓時揖異姓天揖同姓所以别親疏外內也公侯伯子男各以其旗就其位諸公之國中階之前北面東上諸侯之國東階之東西面北上諸伯之國西階之西東面北上諸男之國門西北面東上及其將幣也公於上等按此中當有侯伯于中等子男于下等二句所以别貴賤序尊卑也奠圭降拜升成拜明臣禮也奉國地所出重物而獻之明臣職也肉袒入門而右以聽事也明臣禮職臣事所以教臣也率而祀天於南郊配以先祖所以教民報德不忘本也率而享祀於大廟所以教孝也與之大射以考其習禮樂而觀其德行與之圖事以觀其能儐而禮之三饗三食三宴以與之習立禮樂是故一朝而近者三年遠者六年有德焉禮樂為之益習德行為之益修天子之命為之益行然後使諸侯世相朝交嵗相問殷相聘以習禮考義正刑一德以崇天子故曰朝聘之禮者所以正君臣之義也諸侯附于德服于義則天下太平古者為諸侯不行禮義不修法度不附于德不服于義故使射人以射禮選其德行職方氏大行人以其治國選其能功諸侯之得失治亂定然後明九命之賞以勸之明九伐之法以震威之尚猶有不附于德不服于義者則使掌交說故諸侯莫不附于德服于義者此天子之所以養諸侯兵不用而諸侯自為政之法也大戴記諸侯朝于天子曰述職述職者述所職也一不朝則貶其爵再不朝則削其地三不朝則六師移之孟子朝覲之禮所以明君臣之義也聘覲之禮廢則君臣之位失諸侯之行惡而陪畔侵陵之敗起矣經解殺上者生于不義義所以别貴賤明尊卑也貴賤有别尊卑有序則民莫不尊上而敬長朝聘之禮者所以明義也義必明則民不犯故雖有殺上之獄而無陷刑之民有犯殺上之獄者則飭朝覲之禮家語朝覲然後諸侯知所以臣樂記朝聘以時厚往而薄來所以懷諸侯也朝謂諸侯見于天子聘謂諸侯使大夫來獻王制比年一小聘三年一大聘五年一朝厚往薄來謂燕賜厚而納貢薄中庸曹劌曰夫禮所以正民也是故先王制諸侯使五年四王一相朝也賈侍中云王謂王事天子也嵗聘以志業間朝以講禮五年之間四聘于王而一相朝者將朝天子先相朝也唐尚書云先王謂堯也五載一巡狩諸侯四朝昭謂以堯典相參義亦似之然此欲以禮正君宜用周制周禮中國凡五服遠者五嵗而朝禮記曰諸侯之于天子也比年一小聘三年一大聘五年一朝謂此也晉文公霸時亦取于此禮終則講於㑹以正班爵之義終畢也講習也班次也謂朝畢則習禮于㑹以正爵位次序尊卑之義帥長幼之序訓上下之則帥循也制財用之節謂牧伯差國大小使受職貢也其間無由荒怠其間朝㑹之間國語魯語之莊公二十三年左氏傳云㑹以訓上下之則制財用節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有巡狩以大習之薳啓彊曰聖王務行禮朝聘有圭圭以為信享俯有璋享饗也俯見也既朝聘而享見也臣為君使執璋小有述職諸侯適夫子曰述職大有巡功天子巡守曰巡功設機而不倚爵盈而不飲言務行禮宴有好貨宴飲以貨為好衣服車馬在客所無飱有陪鼎熟食為飱陪加也加鼎所以厚殷勤入有郊勞賓至逆勞之于郊出有贈賄去則贈之以貨賄禮之至也國家之敗失之道也則禍亂興失朝聘宴好之道昭五年左氏傳旅幣無方所以别土地之宜而節遠邇之期也旅衆也邇近也龜為前列先知也以鐘次之以和居參之也鐘金也獻金為作器鐘其大者以金參居庭實之間示和也虎豹之皮示服猛也束帛加璧往德也郊特牲王者不純臣諸侯故朝則迎之於著覲則待之於阼階升降自西郊為庭燎設九賓享禮而後歸是異於衆臣也白虎通王者始立諸侯皆見何當受法稟政教也遠近莫不至受命之君天之所興四方莫敢違夷狄咸率服故也同上禮書綱目卷十六
