body:
  text: 禮書綱目卷四十九婺源江永撰武備軍禮二補夏后氏尚黑戎事乘驪戎兵也馬黑色曰驪爾雅曰騋牝驪牡𤣥殷人尚白戎事乘翰翰白色馬也易曰白馬翰如周人尚赤戎事乘騵騵駵馬白腹檀弓夏小正四月執陟攻駒五月頒馬大戴禮校人掌王馬之政政謂差擇養乘之數也月令曰班馬政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物種謂上善似母者以次差之玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宫中之役凡頒良馬而養乘之乘馬一師四圉三乘為皂皂一趣馬三皂為繫繫一馭夫六繫為廏廏一僕夫六廏成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫良善也善馬五路之馬鄭司農云四匹為乘養馬為圉故春秋傳曰馬有圉牛有牧𤣥謂二耦為乘師趣馬馭夫僕夫帥之名也趣馬下士馭夫中士則僕夫上士也自乘至廏其數二百一十六匹易乾為馬此應乾之策也至校變為言成者明六馬各一廏而王馬小備也校有左右則良馬一種者四百三十二匹五種合二千一百六十匹駑馬三之則為千二百九十六匹五良一駑凡三千四百五十六匹然後王馬大備詩云騋牝三千此謂王馬之大數與麗耦也駑馬自圉至馭夫凡馬千二十四匹與三良馬之數不相應八皆宜為六字之誤也師十二匹趣馬士十二匹則馭夫四百三十二匹然後而三之既三之無僕夫者不駕於五路卑之也天子十有二間馬六種邦國六間馬四種家四間馬二種降殺之差每廏為一間諸侯有齊馬道馬田馬大夫有田馬各一間其駑馬則皆分為三焉凡馬特居四之一欲其乘之性相似也物同氣則心一鄭司農云四之一者三牝一牡春祭馬祖執駒馬祖天駟也孝經說曰房為農馬鄭司農云執駒無令近母猶攻駒也二歲曰駒三歲曰侁𤣥謂執猶拘也春通淫之時駒弱血氣未定為其乘匹傷之夏祭先牧頒馬攻特先牧始養馬者其人未聞夏通淫之後攻其特為其蹄齧不可乘用鄭司農云攻特謂騬之秋祭馬社臧僕馬社始乘馬者世本作曰相土作乘馬鄭司農云臧僕謂簡練馭者令皆善也𤣥謂僕馭五路之僕冬祭馬步獻馬講馭夫馬步神為災害馬者獻馬見成馬於王也馭夫馭二車從車使車者講猶簡習凡大祭祀朝覲㑹同毛馬而頒之毛馬齊其色也頒授當乘之凡軍事物馬而頒之物馬齊其力等馭夫之祿馭夫於趣馬僕夫為中舉中見上下宫中之稍食師圉府史以下也鄭司農云稍食曰廪夏官趣馬掌贊正良馬而齊其飲食簡其六節贊佐也佐正者謂校人臧僕講馭夫之時簡差也節猶量也差擇王馬以為六等掌駕說之頒用馬之第次辨四時之居治以聽馭夫居謂牧庌所處治謂執駒攻特之屬同上巫馬掌養疾馬而乘治之相醫而藥攻馬疾受財於校人乘謂驅步以發其疾知所疾處乃治之相助也馬死則使其賈粥之入其布于校人布泉也鄭司農云賈謂其屬官小吏賈一人粥賣也同上牧師掌牧地皆有厲禁而頒之頒馬授圉者所牧處孟春焚牧焚牧地以除陳生新草也中春通淫中春隂陽交萬物生之時可以合馬之牝牡也月令季春乃合纍牛騰馬遊牝于牧秦時書也秦地寒涼萬物後動掌其政令同上廋人掌十有二間之政教以阜馬佚特教駣攻駒及祭馬祖祭間之先牧及執駒散馬耳九者皆有政教焉阜盛壯也詩云四牡孔阜杜子春云佚當為逸鄭司農云馬三歲曰駣二歲曰駒散讀為中散大夫之散謂聒馬耳毋令善驚也𤣥謂逸者用之不使甚勞安其血氣也教駣始乘習之也攻駒騬其蹄齧者間之先牧先牧制間者散馬耳以竹括押其耳頭動搖則括中物後遂串習不復驚正校人員選校人謂師圍也正員選者選擇可備員者平之馬八尺以上為龍七尺以上為騋六尺以上為馬大小異名爾雅曰騋牝驪牡𤣥駒牡驂鄭司農云以月令曰駕蒼龍同上圉師掌教圉人養馬春除蓐釁廏始牧夏庌馬冬獻馬茨牆則翦闔蓐馬兹也馬既出而除之新釁焉神之也春秋傳曰凡馬日中而出日中而入故字庌為訝鄭司農云當為庌𤣥謂庌廡也廡所以庇馬者也茨蓋也闔苫也翦闔圉人所習也同上圉人掌養馬芻牧之事以役圉師役者圉師使令焉上同蠻𨽻掌役校人養馬秋官馭夫掌馭二車從車使車二車象輅之副也從車戎路田路之副也使車驅逆之車分公馬而駕治之乘調六種之馬夏官馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈此三馬買以給官府之使無種也鄭司農云皆有物賈皆有物色及賈直綱惡馬鄭司農云綱讀為以亢其讎之亢書亦或為亢亢御也禁也禁去惡馬不畜也𤣥謂綱以縻索維綱狎習之凡受馬於有司者書其齒毛與其賈馬死則旬之內更旬之外入馬耳以其物更其外否鄭司農云更謂償也𤣥謂旬之內死者償以齒毛與賈受之日淺養之惡也旬之外死入馬耳償以毛色不以齒賈任之過其任也其外否者旬之外踰二十日而死不任用非用者罪馬及行則以任齊其行識其所載輕重及道里齊其勞逸乃復用之若有馬訟則聽之訟謂賣買之言相負禁原蠶者原再也天文辰為馬蠶書蠶為龍精月直大火則浴其種是蠶與馬同氣物莫能兩大禁再蠶者為傷馬與上同季春乃合纍牛騰馬遊牝于牧纍騰皆乘匹之名是月所合牛馬謂繫在廏者其牝欲遊則就牧之牡而合之犧牲駒犢舉書其數以在牧而校數書之明出時無他故至秋當録內且以知其息之多少也仲夏游牝别羣孕妊之欲止也則縶騰駒為其壯氣有餘相蹄齧也班馬政馬政謂養馬之政教也廋人職曰掌十有二間之政教以阜馬佚特教駣攻駒此之謂也月令大宰以九式均節財用七曰芻秣之式芻秣養牛馬禾榖也天官四郊之賦以待稍秣待猶給也稍秣即芻秣也謂之稍稍用之物也天官大府右馬民馬見兵制篇王來自商至于豐乃偃武修文歸馬于華山之陽放牛於桃林之野示天下弗服山南曰陽桃林今華隂縣潼關也武成秦之先有造父以善御得幸於周穆王得驥溫驪驊駵騄耳之駟西巡狩樂而忘歸其後又有非子居犬􅉌好馬及畜善養息之犬􅉌人言之周孝王孝王召使主馬于汧渭之間馬犬蕃息於是孝王曰昔伯醫為舜主畜畜多息故有土賜姓嬴今其後世亦為朕息朕其分土為附庸邑之秦使復續嬴氏之祀史記魯莊公二十九年春新作延廏書不時也凡馬日中而出日中而入日中春秋分也治廏當以秋分因馬向入而修之今以春作故曰不時左氏傳延廏者法廏也周禮天子十二間馬六種邦國六間馬四種每廏一間言法廏者六間之舊制也其言新有故也言改故而新之榖梁傳定之方中美衛文公也詩序匪直也人秉心塞淵騋牝三千非獨此人所以操其心者誠實而淵深也蓋其所畜之馬七尺而牝者亦已至于三千之衆矣蓋人操心誠實而淵深則無所為而不成其致此富盛宜矣記曰問國君之富數馬以對今言騋牝之衆如此則生息之蕃可見而衛國之富亦可知矣鄘風晉惠公與秦戰于韓乘小駟鄭入也鄭所獻馬名小駟慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乘異産以從戎事及懼而變將與人易變易人意亂氣狡憤隂血周作張脈僨興外彊中乾狡戾也僨動也氣狡憤於外則血脈必周身而作隨氣張動外雖有彊形而內實乾竭進退不可周旋不能君必悔之弗聽及戰晉戎馬還濘而止濘泥也還便旋也小駟不調故隋泥中秦獲晉侯以歸僖十五年左氏傳晉程鄭為乘馬御六騶屬焉使訓羣騶知禮程鄭荀氏别族乘馬御乘車之僕也六騶六間之騶周禮諸侯有六間馬乘車尚禮容故訓羣騶使知禮成十八年左氏傳鬭且曰古者聚馬不害民之財用國馬足以行軍國馬民馬也十六井為􅉌有戎馬一匹牛三頭足以行軍也公馬足以稱賦公馬公之戎馬稱舉也賦兵賦也不是過也國語楚語玉府掌王之兵器凡王之獻兵器受而藏之謂百工為王所作可以獻遺諸侯天官內府掌受良兵良器凡四方之幣獻之兵器入焉諸侯朝聘所獻國珍同上職金入其金錫於為兵器之府為兵器者攻金之工六也掌受士之金罰入於司兵給治兵秋官戎器不粥於市兵車不中度不粥於市王制右兵器總要萃君子以除戎器戒不虞除者修而聚之之謂傳萃象密須之鼓與其大路文所以大搜也密須姞姓國也在安定隂密縣文王伐之得其鼓路以搜闕鞏之甲武所以克商也闕鞏國所出鎧唐叔受之昭十五年左氏傳越棘大弓天子之戎器也越國名也棘㦸也春秋傳曰子都拔棘明堂位車有六等之數車有天子之象人在其中焉六等之數法易之三材六畫車珍四尺謂之一等戈柲六尺有六寸既建而迆崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車㦸常崇於殳四尺謂之五等酋矛常有四尺崇於㦸四尺謂之六等此所謂兵車也軫與後橫木崇髙也八尺曰尋倍尋曰常殳長丈二戈殳㦸矛皆插車輢鄭司農云迆讀為倚移從風之移謂著戈於車邪倚也酋發聲直謂矛車謂之六等之數申言數也考工記革路龍勒條纓五就建大白以即戎革路挽之以革而漆之無他飾龍駹也以白黑飾韋雜色為勒條讀為絛其樊及纓以絛絲飾之而五成不言樊字蓋脫爾大白殷之旗猶周大赤蓋象正色也即戎謂兵事車春官巾車僕掌戎路之萃廣車之萃闕車之萃蘋車之萃輕車之萃萃猶副也此五者皆兵車所謂五戎也戎路王在軍所乘也廣車橫陳之車也闕車所用補闕之車也蘋猶屏也所用對敵自蔽隱之車也輕車所用馳敵致師之車也春秋傳曰公喪戎路又曰其君之戎分為二廣則諸侯戎路廣車也又曰帥斿闕四十乘孫子八陳有蘋車之陳又曰馳車十乘五者之制及萃數未盡聞也書曰武王戎車三百輛故書革作平杜子春云蘋車當為軿車其字當為蘋書亦或為蘋凡師共革車各以其萃五戎者共其一以為王優尊者所乘也而萃各從其元焉春官戎僕掌馭戎車掌王倅車之政詳見征伐篇右車民車見兵制篇夏后氏曰鉤車先正也殷曰寅車先疾也周曰元戎先良也司馬法以爾鉤援與爾臨衝以伐崇墉鉤援鉤梯也所以鉤引上城所謂雲梯者也臨臨車也在上臨下者也衝衝車也從旁衝突者也皆攻城之具也崇國名墉城也大雅皇矣武王戎車三百兩武賁三百人與受戰于牧野書序元戎十乘以先啓行元大也戎戎車也軍之前鋒也啓開行道也戎車既安如輊如軒輊車之覆而前也軒車之却而後也凡車從後視之如輊從前視之如軒然後適調也六小雅月小戎俴收五楘梁輈游環脅驅隂靷鋈續文茵暢轂小戎兵車也俴淺也收軫也謂車前後兩端橫木所以收斂所載者也凡車之制廣皆六尺六寸其平地任載者為大車則軫深八尺兵車則軫深四尺四寸故曰小戎俴收也五五束也楘厯録然文章之貌也梁輈從前軫以前稍曲而上至衡則向下鉤之橫衡於輈下而輈形穹隆上曲如屋之梁又以皮革五處束之其文章厯録然也游環靷環也以皮為環當兩服馬之背上游移前却無定處引兩驂馬之外轡貫其中而執之所以制驂馬使不得外出左傳曰如驂之有蘄是也脅驅亦以皮為之前係於衡之兩端後係於軫之兩端當服馬脅之外所以驅驂馬使不得內入也隂掩軌也軌在軾前而以板橫側掩之以其隂映此軌故謂之隂也靷以皮二條前係驂馬之頸後係隂板之上也鋈續隂板之上有續靷之處消白金沃灌其環以為飾也蓋車衡之長六尺六寸止容二服驂馬之頸不當於衡故别為二靷以引車亦謂之靳左傳曰兩靷將絶是也文茵車中所坐虎皮褥也暢長也轂者車輪之中外持輻內受軸者也大車之轂一尺有半兵車之轂長三尺二寸故兵車曰暢轂又曰龍盾之合鋈以觼軜盾干也畫龍於盾合而載之以為車上之衛必載二者備破毁也觼環之有舌者軜驂內轡也置觼於軾前以繫軜故謂之觼軜亦消沃白金以為飾也秦風小戎潘黨率游闕四十乘游車補闕者傳宣十二年左楚子登巢車以望晉軍巢車車上為櫓年成十六左傳車者軍之羽翼也所以陷堅陳要强敵遮北走也易戰之法一車當步卒八十人八十人當一車一車當六騎六騎當一車十乘敗千人百乘敗萬人此其大數也置車之吏數五車而一長十車而一吏五十車而一卒百乘而一將易戰之法五車為列前後相去四十步左右十步險戰之法車必循道十里為聚二十車為屯前後相去二十步左右六步隊閒三十六步五車一長縱橫相去一里各返故道選車士之法取年四十以下長七尺五寸已上走能逐馬及馳而乘之前後左右上下周旋能超乘旌旗力彀八石弩射前後皆便習者武車之士不可不厚也六韜函人為甲犀甲七屬兕甲六屬合甲五屬屬讀如灌注之注謂上旅下旅札續之數也革堅者札長鄭司農云合甲削革裏肉但取其表合以為甲犀甲壽百年兕甲壽二百年合甲壽三百年革堅者又支久凡為甲必先為容服者之形容也鄭司農云容謂象式然後制革裁制札之廣袤權其上旅與其下旅而重若一鄭司農云上旅謂要以上下旅謂要以下以其長為之圍圍謂札要廣厚凡甲煆不摯則不堅已敝則橈鄭司農云煆煆革也摯謂質也煆革大孰則革敝無强曲橈也𤣥謂摯之言致凡察革之道眂其鑽空欲其惌也鄭司農云惌小孔貌惌讀為宛彼北林之宛眂其裏欲其易也無敗薉也眂其朕欲其直也鄭司農云朕謂革制櫜之欲其約也鄭司農云謂卷置櫜中也春秋傳曰櫜甲而見子南舉而眂之欲其豐也豐大衣之欲其無齘也鄭司農云齘謂如齒齘眂其鑽空而惌則革堅也眂其裏而易則材更也眂其朕而直則制善也櫜之而約則周也舉之而豐則明也衣之無齘則變也周密致也明有光耀鄭司農云更善也變隨人身便利考工記司甲闕官夏右甲成公元年作丘甲周禮九夫為井四井為邑四邑為丘丘十六井甲鎧也作為也丘為甲也使丘之民皆作甲􅉌甲國之大事也􅉌作甲非正也古者立國家百工具農工皆有職以事上古者有四民有士民學習道藝者有商民通四方之貨者有農民播殖耕稼者有工民巧心勞手以成器物者夫甲非人人之所能為也各有業也丘作甲非正也榖梁傳五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈戟之齊參分其金而錫居一謂之大刃之齊凡金多錫則忍白考工記冶氏戈廣二寸內倍之胡三之援四之戈今句孑㦸也或謂之雞鳴或謂之擁頸內謂胡以內接柲者也長四寸胡六寸援八寸鄭司農云援直刃也胡其孑已倨則不入己句則不決長內則折前短內則不疾戈句兵也主於胡也已倨謂胡微直而邪多也以啄人則不入己句謂胡曲多也以啄人則創不決胡之曲直鋒本必橫而取圜於磬折前謂援也內長則援短援短則曲於磬折曲於磬折則引之與胡並鈎內短則援長援長則倨於磬折倨於磬折則引之不疾是故倨句外博博廣也倨之外胡之裏也句之外胡之表也廣其本以除四病而便用也俗謂之曼胡似此重三鋝鄭司農云鋝量名也讀為刷𤣥謂許叔重說文解字云鋝鍰也今東萊稱或以大半兩為鈞十鈞為環環重六兩大半兩鍰鋝似同矣則三鋝為一斤四兩㦸廣寸有半寸內三之胡四之援五之倨句中矩與刺重三鋝戟今三鋒㦸也內長四寸半胡長六寸援長七寸半三鋒者胡直中矩言正方也鄭司農云刺謂援也𤣥謂刺者著柲直前如鐏者也㦸胡橫貫之胡中矩則援之外句磬折與同上廬人為廬器戈柲六尺有六寸殳長尋有四尺車㦸常酋矛常有四尺夷矛三尋柲猶柄也八尺曰尋倍尋曰常酋夷長短名酋之言遒也酋近夷長矣凡兵無過三其身過三其身弗能用也而無已又以害人人長八尺與尋齊進退之度三尋用兵力之極也而無已不徒止耳故攻國之兵欲短守國之兵欲長攻國之人衆行地逺食飲飢且涉山林之阻是故兵欲短守國之人寡食飲飽行地不逺且不涉山林之阻是故兵欲長言罷羸宜短兵壯健宜長兵凡兵句兵欲無彈刺兵欲無蜎是故句兵椑刺兵摶句兵戈㦸屬刺兵矛屬故書彈或作但蜎或作絹鄭司農云彈讀為彈丸之彈絹讀為悁邑之悁悁謂橈也椑讀為鼓鼙之鼙𤣥謂蜎亦掉也讀為井中蟲蜎之蜎齊人謂柯斧柄為椑則椑隋圜也摶圜也􅌛兵同强舉圍欲細細則校刺兵同强舉圍欲重重欲傅人傅人則密是故侵之改句言􅌛容殳無刃同强上下同也舉謂手操鄭司農云校讀為絞而婉之絞重欲傅人謂矛柄之大者在人手中者侵之能敵也𤣥謂校疾也傅近也密審也正也人手操細以􅌛則疾操重以刺則正然則為矜句兵堅者在後刺兵堅者在前凡為殳五分其長以其一為之被而圍之參分其圍去一以為晉圍五分其晉圍去一以為首圍凡為酋矛參分其長二在前一在後而圍之五分其圍去一以為晉圍參分其晉圍去一以為刺圍被把中也圍之圜之也大小未聞凡矜八觚鄭司農云晉謂矛㦸下銅鐏也刺謂矛創胸也𤣥謂晉讀如王搢大圭之搢矜所捷也首殳上鐏也為戈㦸之矜所圍如殳夷矛如酋矛凡試廬事置而搖之以眂其蜎也炙諸牆以眂其橈之均也橫而搖之以眂其徑也置猶樹也炙猶柱也以柱兩牆之間挽而肉之本末勝負可知也正於牆牆歰六建既備車不反覆謂之國工六建五兵與人也反覆猶軒輖同上桃氏為劒臘廣二寸有半寸臘謂兩刃兩從半之鄭司農云謂劒脊兩面殺趨鍔以其臘廣為之莖圍長倍之鄭司農云莖謂劒夾人所握鐔以上也𤣥謂莖在夾中者莖長五寸中其莖設其後鄭司農云謂穿之也𤣥謂從中以郤稍大之也後大則於把易制參分其臘廣去一以為首廣而圍之首圍其徑一寸三分寸之二身長五其莖長重九鋝謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之上制長三尺重三斤十二兩中制長二尺五寸重二斤十四兩三分兩之二下制長二尺重二斤一兩三分兩之一此今之匕首也人各以其形貌大小帶之此士謂國勇力之士能用五兵者也樂記曰武王克商裨冕搢笏而虎賁之士說劒同上司兵掌五兵五盾各辨其物與其等以待軍事五盾干櫓之屬其名未盡聞也等謂功沽上下鄭司農云五兵者戈殳㦸酋矛夷矛及授兵從司馬之法以頒之及其受兵輸亦如之及其用兵亦如之從司馬之法令師旅卒兩人數所用多少也兵輸謂師還有司還兵也用兵謂出給衛守軍事建車之五兵㑹同亦如之車之五兵鄭之司農云者是也步卒之五兵則無夷矛而有弓矢夏官司戈盾掌戈盾之物而頒之分與授用軍旅㑹同授二車戈盾建乘車之戈盾授旅賁及虎士戈盾乘車王所乘車也軍旅則革路㑹同則金路及舍設藩盾行則斂之舍止也藩盾盾可以藩衛者如今之扶蘇與同上右兵二矛重英二矛酋矛夷矛也英以朱羽為矛飾也酋矛長二丈夷矛長二丈四尺並建於車上則其英重疊而見又曰二矛重喬矛之上句曰喬所以懸英也英敝而盡所存者喬而已鄭風清人龍盾之合注見前又曰厹矛鋈錞蒙伐有苑厹矛三隅矛也鋈錞以白金沃矛之下端平底者也蒙雜也伐中干也盾之别名苑文貌畫雜羽之文於盾上也秦風小戎吳建肥胡奉文犀之渠肥胡幡也文犀之渠謂楯也文犀犀之有文理者吳語兵革藏於私家非禮也是謂脅君劫脅之君也兵革君之武衛及軍器也禮運槀人掌受財于職金以齎其工齎其工者給市財用之直弓六物為三等弩四物亦如之三等者上中下人各有所宜弓人職曰弓長六尺六寸謂之上制上士服之弓長六尺三寸謂之中制中士服之弓長六尺謂之下制下士服之弩及矢箙長短之制未聞矢八物皆三等箙亦如之春獻素秋獻成矢箙春作秋成書其等以饗工鄭司農云書工功拙高下之等以制其饗食也𤣥謂饗酒肴勞之也上工作上等其饗厚下工作下等其饗薄乘其事試其弓弩以下上其食而誅賞鄭司農云乘計也計其事之成功也故書試為考𤣥謂考之而善則上其食尤善又賞之否者反此乃入功于司弓矢及繕人功成凡齎財與其出入皆在槀人以待㑹而考之亡者闕之皆在槀人者所齎工之財及弓弩矢箙出入其簿書槀人藏之闕猶除也弓弩矢箙棄亡者除之計今現在者夏官弓人為弓取六材必以其時取幹以冬取角以秋絲漆以夏筋膠未聞六材既聚巧者和之聚猶具也幹也者以為逺也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者為以受霜露也六材之力相得而足凡取幹之道七柘為上檍次之檿桑次之橘次之木瓜次之荆次之竹為下鄭司農云檍讀為億萬之億爾雅曰杻檍又曰檿桑山桑國語曰檿弧箕服凡相幹欲赤黑而陽聲赤黑則鄉心陽聲則逺根陽猶清也木之類近根者奴凡析幹射逺者用藝射深者用直鄭司農云藝謂形藝假令木性自曲則當反其曲以為弓故曰審曲面藝𤣥謂曲藝則宜薄薄則力少直則可厚厚則力多居幹之道菑栗不迆則弓不發鄭司農云菑讀為不菑而畬之菑栗讀為榛栗之栗謂以鋸副析幹迆讀為倚移從風之移謂邪行絶理者弓發之所從起𤣥謂栗讀為裂襦之裂凡相角秋閷者厚春閷者薄稚牛之角直而澤老牛之角紾而昔鄭司農云紾讀為抮縳之紾昔讀為交錯之錯謂牛角粗理錯也𤣥謂昔讀履錯然之錯疢疾險中牛有久病則角裏傷瘠牛之角無澤少潤氣角欲青白而豐末豐大也夫角之本蹙於􅑠而休於氣是故柔柔故欲其藝也白也者藝之徴也蹙近也休讀為煦鄭司農云欲其形之自曲反以為弓𤣥謂色白則藝夫角之中恆當弓之畏畏也者必橈橈故欲其堅也青也者堅之徴也故書畏作威杜子春云當為威威謂弓淵角之中央與淵相當𤣥謂畏讀如秦師入隈之隈夫角之末逺於􅑠而不休於氣是故脆脆故欲其柔也豐末也者柔之徴也末之大者􅑠氣及煦之角長二尺有五寸三色不失理謂之牛戴牛三色本白中青末豐鄭司農云牛戴牛角直一牛凡相膠欲朱色而昔昔也者深瑕而澤紾而摶廉摶圜也廉瑕嚴利也鹿膠青白馬膠赤白牛膠火赤鼠膠黑魚膠餌犀膠黃皆謂煮用其皮或用角餌色如餌凡昵之類不能方鄭司農云謂膠善戾故書昵或作樴杜子春云樴讀為不義不昵之昵或為䵑䵑黏也𤣥謂樴脂膏䐈敗之䐈䐈亦黏也凡相筋欲小簡而長大結而澤小簡而長大結而澤則其為獸必剽以為弓則豈異於其獸剽疾也鄭司農云簡讀為􅏌然登捭之􅏌𤣥謂讀如簡札之簡謂筋條也筋欲敝之敝鄭司農云嚼之當孰漆欲測鄭司農云測讀為惻隱之惻𤣥謂測讀如測度之測測猶清也絲欲沈如在水中時色得此六材之全然後可以為良全無瑕病良善也凡為弓冬析幹而春液角夏治筋秋合三材三材膠漆絲鄭司農云液讀為譯寒奠體奠讀為定至冬膠堅內之檠中定往來體冰析灂大寒中下於檠中復內之冬析幹則易理滑致春液角則合合讀為洽夏治筋則不煩煩亂秋合三材則合合堅密也寒奠體則張不流流猶移也冰析灂則審環審猶定也春被弦則一年之事朞歲乃可用析幹必倫順其理也析角無邪亦正之斫目必荼鄭司農云荼讀為舒舒徐也目幹節目斫目不荼則及其大修也筋代之受病修猶久也夫目也者必强强者在內而摩其筋夫筋之所由幨恆由此作摩猶喼也故書筋或作薊鄭司農云當為筋幨讀為車幨之幨𤣥謂幨絶起也故角三液而幹再液重醳治之使相稱厚其帤則木堅薄其帤則需需謂不充滿鄭司農云帤讀為𥜗有衣絮之絮帤謂弓中裨是故厚其液而節其帤厚猶多也節猶適也約之不皆約疏數必侔不皆約纒之繳不相次也皆約則弓帤侔猶均也斫摯必中膠之必均摯之言致也中猶均也斫摯不中膠之不均則及其大修也角代之受病夫懷膠於內而摩其角夫角之所由挫恆由此作幹不均則角蹴折也凡居角長者以次需當弓之隈也長短各稱其幹短者居簫恆角而短是謂逆橈引之則縱釋之則不校鄭司農云恆讀為裻縆之縆𤣥謂恆讀為㮓㮓竟也竟其角而短于淵幹引之角縱不用力若欲反橈然校疾也既不用力放之又不疾恆角而逹辟如終紲非弓之利也逹謂長于淵幹若逹於簫頭紲弓䪐角過淵接則送矢大疾若見紲於䪐矣弓有䪐者為發弦時備頓傷詩云竹䪐緄縢今夫茭解中有變焉故校鄭司農云茭讀為激發之激茭謂弓檠也校讀為絞而婉之絞𤣥謂茭讀如齊人名手足掔為骹之骹茭解謂接中也變謂簫臂用力異校疾也於挺臂中有柎焉故剽挺直也柎側骨剽亦疾也鄭司農云剽讀為湖漂絮之漂恆角而逹引如終紲非弓之利重明逹角之不利變譬言引字之誤嬌幹欲孰於火而無贏嬌角欲孰於火而無燂引筋欲盡而無傷其力煮膠欲孰而水火相得然則居旱亦不動居溼亦不動贏過孰也燂炙爛也不動者謂弓也故書燂或作朕鄭司農云字從燂苟有賤工必因角幹之溼以為之柔善者在外動者在內雖善於外必動於內雖善亦弗可以為良矣苟愈也溼猶生也凡為弓方其峻而高其柎長其畏而薄其敝宛之無已應宛謂引之也引之不休止常應弦言不罷需也峻謂簫也鄭司農云敝讀為蔽塞之蔽謂弓人所握持者下柎之弓末應將興末猶蕭也興猶動也發也弓柎卑簫應弦則柎將動為柎而發必動於閷閷接中弓而羽閷末應將發羽讀為扈扈緩也接中動則緩緩簫應弦則角幹將發弓有六材焉維幹强之張如流水無難易也維體防之引之中參體謂內之於檠中定其體防深淺所止謂體定張之弦居一尺引之又二尺維角䟫之欲宛而無負弦引之如環釋之無失體如環負弦辟戾也負弦則不如環如環亦謂無難易鄭司農云䟫讀如牚距之牚車掌之牚材美工巧為之時謂之參均角不勝幹幹不勝筋謂之參均量其力有三均均者三謂之九和有三讀為又參量其力又參均者謂若幹勝一石加角而勝二石被筋而勝三石引之中三尺假令弓力勝三石引之中三尺弛其弦以繩緩擐之每加物一石則張一尺故書勝或作稱鄭司農云當言稱謂之不參均𤣥謂不勝無負也九和之弓角與幹權筋三侔膠三鋝絲三邸漆三庾上工以有餘下工以不足權平也侔猶等也角幹既平筋三而又與角幹等也鋝鍰也邸庾輕重未聞為天子之弓合九而成規為諸侯之弓合七而成規大夫之弓合五而成規士之弓合三而成規材長則句少也弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之人各以其形貌大小服此弓凡為弓各因其君之躬志慮血氣又隨其人之性情豐肉而短寬緩以荼若是者為之危弓危弓為之安矢骨直以立忿疾以奔若是者為之安弓安弓為之危矢言損贏濟不足危奔若疾也骨直謂强毅荼古文舒假借字鄭司農云荼讀為舒其人安其弓安其矢安則莫能以速中且不深故書速或作數鄭司農云字從速速疾也三舒不能疾而中言矢行短也中又不能深其人危其弓危其矢危則莫能以願中願慤也三疾不能慤而中言矢行長也長謂過去往體多來體寡謂之夾臾之屬利射侯與弋射逺者用藝夾臾之弓合五而成規侯非必逺顧藝弓者材必薄薄則弱弱則矢深不中侯不落大夫士射侯矢落不獲弋繳射也故書與作其杜子春云當為與往體寡來體多謂之王弓之屬利射革與質射深者用直此又直焉於射堅宣也王弓合九而成規弧弓亦然革謂干盾質木椹天子射侯亦用此弓大射曰中離維綱揚觸梱復君則釋獲其餘則否往體來體若一謂之唐弓之屬利射深射深用直唐弓合七而成規大弓亦然春秋傳曰盜竊寶玉大弓大和無灂其次筋角皆有灂而深其次有灂而疏其次角無灂大和尤良者也深謂灂在中央兩邉無也角無灂謂隈裏合灂若背手文弓表裏灂合處若人合手背文相應鄭司農云如人手背文理角環灂牛筋蕡灂麋筋斥蠖灂蕡枲實也斥蠖屈蟲也和弓􅌛摩和猶調也􅌛拂也將用弓必先調之拂之摩之大射禮曰小射正授弓大射正以袂順左右隈上再下一覆之而角至謂之句弓句於三體材敝惡不用之弓也覆猶察也謂用射而察之至猶善也但角善則矢雖疾而不能逺覆之而幹至謂之侯弓射侯之弓也幹又善則矢疾而逺覆之而筋至謂之深弓射深之弓也筋又善則矢既疾而逺又深考工記五分其金而錫居二謂之削殺矢之齊同上冶氏為殺矢刃長寸圍寸鋌十之重三垸殺矢與戈㦸異齊而同工似補脫誤在此也殺矢用諸田獵之矢也鋌讀如麥秀鋌之鋌鄭司農云鋌箭足入槀中者也垸量名讀為丸同上矢人為矢鍭矢參分茀矢參分一在前二在後參訂之而平者前有鐵重也司弓矢職茀當為殺鄭司農云一在前謂箭槀中鐵莖居參分殺一以前兵矢田矢五分二在前三在後鐵差短小也兵矢謂枉矢潔矢也此二矢亦可以田田矢謂矰矢殺矢七分三在前四在後鐵又差短小也司弓矢職殺當為茀參分其長而殺其一矢槀長三尺殺其前一尺令趣鏃也五分其長而羽其一羽者六寸以其笴厚為之羽深笴讀為槀謂矢幹古文假借字厚之數未聞水之以辨其隂陽辨猶正也隂沉而陽浮夾其隂陽以設其比夾其比以設其羽夾其隂陽者弓矢比在槀兩旁弩矢比在上下設羽於四角鄭司農云比謂括也參分其羽以設其刃刃二寸則雖有疾風亦弗之能憚矣故書憚或作但鄭司農云讀當為憚之以威之憚謂風不能驚憚箭也刃長寸圍寸鋌十之重三垸刃長寸脫二字鋌一尺前弱則俯後弱則翔中弱則紆中强則揚羽豐則遲羽殺則躁言幹羽之病使矢行不正俯低也翔回顧也紆曲也揚飛也豐大也躁旁掉也是故夾而搖之以視其豐殺之節也今人以指夾矢儛衛是也橈之以視其鴻殺之稱也橈搦其幹凡相笴欲生而摶同摶欲重同重節欲疏同疏欲㮚相猶擇也生謂無瑕蠧也摶讀如摶黍之摶謂圜也鄭司農云欲㮚欲其色如㮚也同上司弓矢掌六弓四弩八矢之法辨其名物而掌其守藏與其出入法曲直長短之數中春獻弓弩中秋獻矢箙弓弩成於和矢箙成於堅箙盛矢器也以獸皮為之及其頒之王弓弧弓以授射甲革椹質者夾弓庾弓以授射犴侯鳥獸者唐弓大弓以授學射者使者勞者王弧夾庾唐大六者弓異體之名也往體寡來體多曰王弧往體多來體寡曰夾庾往體來體若一曰唐大甲革革甲也春秋傳曰蹲甲而射之質正也樹椹以為射正射甲與椹試弓習武也犴侯五十步及射鳥獸皆近射也近射用弱弓則射大侯者用王弧射參侯者用唐大矣學射者弓用中後習强弱則易也使者勞者弓亦用中逺近可也勞者勤勞王事若晉文侯文公受王弓矢之賜者故書椹為鞎鄭司農云椹字或為鞎非是也圉師職曰射則充椹質又此司弓矢職曰澤共射椹質之弓矢言射椹質自有弓謂王弧弓也以此觀之言鞎質者非其矢箙皆從其弓從弓數也每弓者一箙百矢凡弩夾庾利攻守唐大利車戰野戰攻城壘者與其自守者相迫近弱弩發疾也車戰野戰進退非强則不及弩無王弧王弧恆服弦往體少者使矢不疾凡矢枉矢潔矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恆矢痺矢用諸散射此八矢者弓弩各有四焉枉矢殺矢矰矢恆矢弓所用也潔矢鍭矢茀矢痺矢弩所用也枉矢者取名變星飛行有光今之飛矛是也或謂之兵矢潔矢象焉二者皆可結火以射敵守城車戰前於重後微輕行疾也殺矢言中則死鍭矢象焉鍭之言候也二者皆可以司候射敵之近者及禽獸前尤重中深而不可逺也結繳於矢謂之矰矰高也茀矢象焉茀之言刜也二者皆可以弋飛鳥刜羅之也前於重又微輕行不低也詩云弋鳬與雁恆矢安居之矢也痺矢象焉二者皆可以散射也謂禮射及習射也前後訂其行平也凡矢之制枉矢之屬五分二在前三在後殺矢之屬參分一在前二在後矰矢之屬七分三在前四在後恆矢之屬軒輖中所謂志也鄭司農云痺矢讀為人罷短之罷𤣥謂痺讀如痺病之痺痺之言倫比天子之弓合九而成規諸侯合七而成規大夫合五而成規士合三而成規句者謂之弊弓體往來之衰也往體寡來體多則合多往體多來體寡則合少而圜弊猶惡也句者惡則直善矣凡師役㑹同頒弓弩各以其物從授兵甲之儀物弓弩矢箙之屬凡亡矢者弗用則更更償也用而棄之則不償夏官繕人掌王之用弓弩矢箙矰弋抉拾鄭司農云抉者所以縱弦也拾者所以引弦也詩云抉拾既佽詩家說或謂抉謂引弦彄也拾謂韝扞也𤣥謂抉挾矢時所以持弦飾也著右手巨指士喪禮曰抉用正王棘若檡棘則天子用象骨與韝扞著左臂裏以韋為之凡乘車充其籠箙載其弓弩充籠箙以盛矢既射則斂之斂藏之也詩云彤弓弨兮受言藏之無㑹計亡敗多少不計同上右弓矢虎韔鏤膺交韔二弓竹閉緄縢虎韔以虎皮為弓室也鏤膺鏤金以飾馬當胸帶也交韔交二弓於韔中謂顛倒安置之必二弓以備壞也閉弓檠也儀禮作䪐緄繩縢約也以竹為閉而以繩約之於弛弓之裏檠弓體使正也秦風小戎象弭魚服象弭以象骨飾弓弰也魚獸名似猪東海有之其皮背上斑文腹下純青可為弓鞬矢服也小雅采薇鼓人以鼖鼓鼓軍事大鼓謂之鼖鼖鼓長八尺以金錞和鼓以金鐲節鼓以金鐃止鼓以金鐸通鼓錞錞于也圜如碓頭大上小下樂作鳴之與鼓相和鐲鉦也形如小鐘軍行鳴之以為鼓節司馬職曰軍行鳴鐲鐃如鈴無舌有秉執而鳴之以止擊鼓司馬職曰鳴鐃且郤鐸大鈴也振之以通鼓司馬職曰司馬振鐸地官大司馬中春教振旅辨鼓鐸鐲鐃之用王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲提謂馬上鼓有曲木提持立馬髦上者故謂之提詳見田役篇司常掌九旗之物名各有屬以待國事日月為常交龍為旗通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌及國之大閲贊司馬頒旗物王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌皆畫其象焉官府各象其事州里各象其名家各象其號詳見通禮名器下大司馬中秋教治兵辨旗物之用王載大常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉詳見田役篇巾車革路建大白以即戎詳見車章右金鼓旌旗宣子曰伐備鐘鼓聲其罪也以聲彰其罪也戰以錞于丁寧警其民也錞于形如碓頭與鼓相和丁寧謂鉦也警戒也唐尚書云錞于鐲也非也鐲與錞于各異物國語晉語㑹于黃池吳王秉枹親就鳴鐘鼓丁寧錞于振鐸吳語旗夏后氏𤣥首人之藝也殷白天之義也周黃地之道也章夏后氏以日月尚明也殷以虎尚威也周以龍尚文也司馬法小宰軍旅令百官府共其財用天官外府軍旅共其財用之幣齎賜豫之財用齎行道之財用也同上遺人師役掌其道路之委積凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積委積者廪人倉人計九穀之數足國用以其餘共之少曰委多曰積廬若今野候徙有庌也宿可止宿若今亭有室矣候館樓可以觀望者也一市之間有三廬一宿地官委人軍旅共其委積薪芻凡疏財共野委兵器與其野囿財用委積薪芻者委積之薪芻也軍旅又有疏財以助禾粟野委謂廬宿止之薪芻也其兵器謂守衛陳兵之器也野囿之財用者苑囿藩蘿之材凡軍旅之賔客館焉館舍也必舍此者就牛馬之用同上廪人凡邦有師役之事則治其糧與其食行道曰糧謂糒也止居曰食謂米也同上倉人凡國之大事共道路之穀積食飲之具大事謂喪戎同上牛人軍事共其犒牛鄭司農云犒師之牛同上外饔師役則掌共其獻賜脯肉之事獻謂酌其長帥天官右財用掌固掌修城郭溝池樹渠之固頒其士庶子及其衆庶之守樹謂枳棘之屬有刺者也衆庶民遞守固者也鄭司農說樹以國語曰城守之木於是乎用之設其飾器兵甲之屬今城郭門之器亦然分其財用均其稍食財用國以財所給守吏之用也稍食祿廪任其萬民用其財器任謂以其任使之也民之材器其所用塹築及為藩落凡守者受法焉以通守政有移甲與其役財用唯是得通與國有司帥之以贊其不足者凡守者士庶子及他要害之守吏通守政者兵甲役財難易多少轉移相給也其他非是不得妄離部署國有司掌固也其移之者又與掌固帥致之贊佐也晝三巡之夜亦如之巡行也行守者為衆庶之解惰夜三鼜以號戒杜子春云讀鼜為造次之造謂擊鼓行夜戒守也春秋傳所謂賔將趣者與趣與造音相近故曰終夕與燎𤣥謂鼜擊鼜警守鼓也三巡之間又三擊鼜若造都邑則治其固與其守法都邑亦為城郭凡國都之竟有溝樹之固郊亦如之竟界也民皆有職焉職謂守與任若有山川則因之山川若殽皋河漢夏官司險掌九州之圖以周知其山林川澤之阻而逹其道路周猶遍也逹道路者山林之阻則開鑿之川澤之阻則橋梁之設國之五溝五涂而樹之林以為阻固皆有守禁而逹其道路五溝遂溝洫澮川也五涂徑畛涂道路也樹之林作藩落也國有故則藩塞阻路而上行者以其屬守之唯有節者逹之有故喪災及兵也閉絶要害之道備姦宄也同上掌疆闕上同鎛師凡軍之夜三鼜皆鼓之守鼜亦如之守鼜備守鼓也鼓之以鼖鼓杜子春云一夜三擊備守鼜也春秋傳所謂賔將趣者音聲相似春官典瑞牙璋以治兵守牙璋亦王使之瑞節兵守用兵所守若齊人戍遂諸侯戍周同上司士國有故則致士而頒其守故非喪則兵災夏官大司徒國有大故則致萬民於王門令無節者不行於天下大故謂王崩及寇兵也節六節有節乃得行防姦私地官小司徒大故致餘子注見兵制鄉大夫國有大故則令民各守其閭以待政令使民皆聚於閭胥所治處以旌節輔令則逹之民雖以徴㑹行其將之者無節則不得通同上修閭氏邦有故則令守其閭互唯執節者不幾令者令其閭內之閭胥里宰之屬馬所以障互禁止人也互謂行秋官職金凡國有大故而用金石則掌其令主其取之令也用金石者作槍雷椎椁之屬同上孟冬壞城郭戒門閭修鍵閉慎管籥固封疆備邊境完要塞謹關梁塞徯徑壞益也鍵牡閉牝也管籥搏鍵器也固封疆謂使有司循其溝樹及其衆庶之守法也要塞邊城要害處也梁橋橫也徯徑禽獸之道也今月令疆或為璽月令公若有出疆之政謂朝覲㑹同也庶子以公族之無事者守於公宫正室守太廟正室適子也太廟太祖之廟諸父守貴宫貴室謂守路寢諸子諸孫守下宫下室下宫親廟也下室燕寢或言宫或言廟通異語文王世子右守禦天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉坎彖傳欒武子曰楚軍內官序當其夜內官近官序次也以待不虞不可謂無備宣十二年左氏傳晉侯使申公巫臣如吳假道于莒與渠丘公立於池上渠丘公莒子朱也池城池也渠丘邑名莒縣有蘧里曰城已惡莒子曰辟陋在夷其孰以我為虞虞度也對曰夫狡焉狡猾之人思啓封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也世有思開封疆者有縱其暴掠者莒人當唯此為命勇夫重閉况國乎為明年莒潰傳成八年左氏傳十一月楚子重伐莒圍渠􅉌渠􅉌城惡衆潰奔莒戊申楚入渠􅉌楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也終巫臣之言君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫浹辰十二日也詩曰雖有絲麻無棄菅蒯雖有姬姜無棄蕉萃凡百君子莫不代匱言備之不可以已也逸詩也姬姜大國之女蕉萃陋賤之人成九年左氏傳楚囊瓦為令尹囊瓦子囊之孫子常也代陽丐城郢楚用子囊遺言已築郢城矣今畏吳復增修以自固沈尹戌曰子常必亡郢苟不能衛城無益也古者天子守在四夷德及逺天子卑守在諸侯政卑損諸侯守在四鄰鄰國為之守諸侯卑守在四竟裁自完慎其四竟結其四援結四鄰之國為援助民狎其野狎安習也三務成功春夏秋三時之務民無內憂而又無外懼國焉用城今吳是懼而城於郢守已小矣卑之不獲能無亡乎不獲守四竟昔梁伯溝其公宫而民潰在僖十八年民棄其上不亡何待夫正其疆埸修其土田險其走集走集邊竟之壘壁親其民人明其伍候使民有部伍相為候望信其鄰國慎其官守守其交禮交接之禮不僭不貪不懦不耆懦弱也耆强也完其守備以待不虞又何畏矣詩曰無念爾祖聿修厥德詩大雅無念念也聿述也義取念祖考則述治其德以顯之無亦監乎若敖蚡冒至於武文四君皆楚先君之賢者土不過同方百里為一同言未滿一圻慎其四竟猶不城郢今土數圻方千里為圻而郢是城不亦難乎言守若是難以為安也為定四年吳入楚傳昭二十三年左氏傳諸侯之大夫盟于宋盟在魯襄二十七年晉楚始盟以弭諸侯之兵是行也以蕃為軍藩籬落也不設壘壁攀輦即利而舍攀引也輦輦車也即就也言人引車就水草便利之地而舍之候遮扞衛不行候候望也遮遮罔也晝則候遮夜則扞衛扞衛謂羅闉狗附也張羅闉去壘五十步而陳周軍中前後左右彉弓注矢以誰何謂之羅闉又二十人為曺輩去壘三百步畜犬其中或視前後或視左右謂之狗附皆昏而設明而罷候遮二十人居狗附處以視聽候望明而設昏而罷不行者不設之也國語晉語禮書綱目卷四十九
