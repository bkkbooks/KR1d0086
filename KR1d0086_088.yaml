body:
  text: 禮書綱目附録卷上婺源江永撰論蔡氏律書三條論蔡氏律書未盡善理之在天下至無窮也智者研之而亦有未精愚者思之而或有一得古人發之已謂詳宻無可加後人觀之猶謂罅隙有可議雖曲藝小道莫不皆然而况幽深難知如律吕一事乎古之通於音律者别有暗悟神解此誠不可思議若夫薈萃古人成説為之梳櫛其條理闡發其窔奥曲暢旁通自成一家之言如蔡西山先生律吕本原證辯二篇固為朱子所極取然而理不厭精學不厭辯誠能於古人成説之外别闢一解别創一法似新竒而實為平易似臆説而又有據依此亦先儒之所不禁也永於律吕一事殫思有年竊疑西山先生之書猶有未盡善者自以管見為書二卷非敢必以為是也將俟當世君子論定焉耳又論永少讀蔡氏之書沈潛反覆不能贊一辭中年因讀朱子琴律説見其言管絃同理又謂琴有兩角聲此律吕性情自然之變非人之所能為縁此忽有疑焉使蔡氏之書而至當也宜其證之琴家若合符節胡為律書有二變而琴皆正聲律書唯一角而琴有兩角意蔡氏之書猶有不適於用者乎後觀朱子語有云季通不能琴彈出便不可行乃知蔡氏著書未嘗與琴參證也又因讀前漢律厯志見劉歆有推厯生律一語竊疑律管短長必有與厯㝠符者當求管中積分以合於厯日不當執定古人三分損益成法也既而考之益詳思之益宻算周鬴以求黄鍾之積分推琴徽以求聲律之數度考古人轉絃換調之法訪俗樂工尺上四之粗乃知音律别有精微亦别有法度執蔡氏之律書而求合於管絃無異按圖而索馬刻舟而求劔也蓄之於心二十餘年衆證皆備衆疑盡豁乃敢筆之於書若理未經深思事未加詳考僅據片言譌字便欲盡翻前人窠臼如李文利律吕元聲者則永嘗竊笑之又何敢效焉又論從來天下事是非當否當以理為斷不當以人為㫁當以目前有據者為定不當以古説乆逺者為定如律吕一事欲求至是之歸將以人為斷乎則若西山先生者書無不讀學無不窺人之所難彼之所易朱子稱為老友不敢謂在弟子之列者其所著述尚有考之不詳思之不精貽後人之辯駁者乎且其書實與朱子商確而成蔡氏之書即朱子之書也猶謂不足據信乎如謂以古為定也則蔡氏之書悉本古人成説淮南太史劉歆班固司馬貞孔頴達杜佑皆著述通人其言前後一揆豈尚有遺議乎若破此拘攣之見以理為衡當别有至是之歸理亦虚而難憑唯以目前有據之物如琴者以決之則此理之是非當否亦不難論定矣蔡氏别有厯書未行於世欲以邵子一元之數為日分恐亦不能與天宻合使其書今存豈能舍目前之有據者而唯皇極經世厯是從乎論五聲二條論五聲之體本於河圖天地之間氣而已矣氣動而聲發焉或兩氣相軋而聲出於虚或兩形相軋而聲出於實或形軋氣氣軋形而聲出於虚實之間大小髙下皆有數存焉稽之於物金石之屬小而薄者聲濁大而厚者聲清絲絃之屬粗而長張之而緩者聲濁細而短張之而急者聲清聲皆禀於器竹管之屬長而寛吹之而緩者聲濁短而窄吹之而急者聲清聲皆禀於器而器之大小短長粗細寛窄莫不有數存焉品其清濁髙下之次第有五最濁為宫次濁為商清濁間為角次清為徴最清為羽太清則噍殺太濁則盎緩五聲者天地之中聲也先王文之而成樂焉月令曰春其音角其數八夏其音徴其數七中央土其音宫其數五秋其音商其數九冬其音羽其數六此即河圖五行之數也五行生出之序一水二火三木四金五土而土又為五行之主四行皆頼之而成故一得五成六二得五成七三得五成八四得五成九五復得五成十而天地之數全矣宫屬土五與十之數也商屬金四與九之數也角屬木三與八之數也徴屬火二與七之數也羽屬水一與六之數也五行根於無形之理故以徴著為次而曰水火木金土五聲禀於有形之器故以大小為次而曰土金木火水試累十數命為宫損一則為九為商又損一則為八為角又損一則為七為徴又損一則為六為羽又損一則為五為少宫於律為黄鍾之宫於琴為中徽然則河圖之數實五聲之原知夫五聲之原根於自然之數則其序唯曰宫商角徴羽而已古法宫生徴徴生商商生羽羽生角意其出於人為而非數之自然者乎十九八七六五皆迭減一然聲陽也用九而不用十故黄鍾止於九寸寸有九分每聲迭減九分九其九為八十一宫之初也八其九為七十二商之初也七其九為六十三角之初也六其九為五十四徴之初也五其九為四十五羽之初也自是則以九之半乗九得四十零半分為少宫以九之半乗八得三十六為少商與舊法異論五聲之用本於琴徽五聲既以均齊者為體又以參差者為用體者其界限也用者其發聲之處也發聲之處何以驗之當驗之於琴徽琴徽者聲之出於自然者也造化之理有均齊必有參差如人之耳目手足左右相對均齊者也手之五指則有參差矣天之二十八宿四維各七均齊者也井斗度多鬼觜度少則有參差矣琴徽左右相對亦均齊也自龍齦至十三徽四寸五分十三徽至十二徽一寸五分十二徽至十一徽一寸三分十一徽至十徽一寸七分十徽至九徽三寸九徽至八徽二寸六分八徽至七徽三寸四分此參差者也以均齊者布之一聲三寸六分商界在十三徽外九分角界在十一徽外一分徴界在九徽外一寸二分羽界在八徽外二分而用數則發聲於諸徽詳見下卷論琴用亦不離乎體之外皆過界而後發聲此造化自然之妙也舊法宫數八十一三分損益以相生商七十二角六十四徴五十四羽四十八以此較今法宫商徴合而角羽則差矣論黄鍾之宫一條辯前漢志誤刪吕氏春秋古人造律所以審音制器為作樂之本律必始於黄鍾黄鍾之聲又不易定於是先為黄鍾之宫其管四寸五分其空徑三分寸之一以審定其清聲而後倍之以為黄鍾之全律蓋古之四寸五分當今之二寸八分有竒其管甚短自此以下則太清而不可吹古人能以耳齊聲以此定為黄鍾之宫乃倍為之九寸以生大吕以下十一律焉故律必以黄鍾之宫為本吕氏春秋古樂篇述黄帝命伶倫造律其文甚明但字有譌舛耳其云伶倫取竹嶰谿之谷空竅厚薄均者斷兩節間而吹之其長三寸九分以為黄鍾之宫吹曰舍少此即黄鍾半律也半律當言四寸五分而云三寸九分者古四字疊積四畫因誤為三九字亦與五畧相似而譌也唯其黄鍾之宫異於全律是以下文别云次制十二筒以聽鳳凰之鳴云云明其非十二筒中之黄鍾也班孟堅作志時吕覽本三九字已誤疑其三寸九分無當於律遂刪去此句又刪去吹曰舍少句顔師古遂解黄鍾之宫為最長之律既先為最長之律矣復言制十二筒又有最長之黄鍾豈不為重複乎月令亦吕氏之書也季夏中央土律中黄鍾之宫而仲冬之月又曰律中黄鍾明仲冬所中者全律而中央所中者其半律半律居全律之中如琴之七徽有中央之象故季夏未當之其適音篇又云黄鍾之宫聲之本也清濁之衷也此如琴四徽為清全絃為濁七徽則其清濁之衷也合此三處考之其為黄鍾半聲無疑矣班氏采吕覽當存其本文而於寸分之誤加擬議可也率爾刪之豈不大失古人之意乎鄭康成註月令亦誤唯蔡邕月令章句獨以黄鍾之宫為少宫為四寸五分之律管最為得之疏家熊氏亦従此但不當言以此候氣耳今猶見於正義可考也由此言之黄鍾清聲伶倫之所首重後世雖俗樂正宫越調皆必以此起調畢曲譬之人事黄鍾全律人君之象也中央黄鍾之宫帝座之象也尊帝座即所以尊君也皇祐元豐間李照范鎮制樂皆去四清聲則首去此黄鍾之宫矣此聲之最貴者而可去乎蔡氏蔽於通典變律子聲之説謂無黄鍾四寸半之律使其果無伶倫何為首造此耶亦由班氏不能訂吕氏寸分之誤輒刪其文故令後人不復致思耳莆田李文利作律吕元聲以闕九吕覽三寸九分句為主不思三字之誤又不知其為黄鍾清聲别有全律遂謂黄鍾之長本止如此於是以短而清者為尊長而濁者為卑其説甚謬不足與辨舍吕覽吹曰舍少四字亦恐有誤一本曰作日又一本作舍皆非也竊恐吹字為命字之誤舍字為宫字之誤當作命曰宫少四字宫少即蔡邕所謂少宫也如此則黄鍾之宫為半聲尤明覽者詳之之又按管子地員篇云凡將起五音凡首先主一而三四開以合九九以是生黄鍾小素之首以成宫三分而益之以一為百有八為徴有三分而去其乗適足以是生商有三分而復於其所以是成羽有三分而去其乗適足以是成角此云黄鍾小素之首以成宫亦是黄鍾半律也故其下言三分益一為百有八為徴若是全律則當三分損一為五十四矣全律一百六十二對全律言之故謂之小素其云四開以合九九四當為三亦因古字積畫而誤三開以合九九者三其三為九九其九為八十一也言四開則非矣管子言三分損益雖非是觀此文可知古人起聲律皆先半黄鍾以為律本正與吕覽之説相發明三之誤為四亦猶四之誤為三又可見三寸九分之為誤文明矣論黄鍾之長一條辨蔡邕黄鍾長尺之非黄鍾長九寸凡聲屬陽陽究於九故不盈十至用以量須用全數故加一寸為尺蔡邕銅龠銘曰黄鍾之宫長九寸空圍九分其月令章句又云管者形長尺圍寸是黄鍾之長與空圍有兩説謂約黄鍾之九寸為十寸可也謂古之尺如黄鍾之長恐不然古之黄鍾九寸大約當今工人尺五寸六分有竒使約九為十則寸狹而分亦狹空圍十分恐管徑太狹吹之不成聲又以此算周鬴漢斛所容皆不應矣且古者以八尺為中人之長大約今之五尺也若以九約之僅如今之四尺五寸則今時中人亦不止如此故蔡邕之説未確邢雲路信之謂古法十其寸為尺九其寸為律考之不詳耳論黄鍾之積三條論律生於厯聲無形者從陽而法天其數五倍之為十半為清而半為濁律有體者從陰而效地其數六倍之為十二律居陽而吕居陰夫六律六吕之應十二月説者以為埋管於密室隨月氣應而灰飛其事雖未有確驗要之天有十二月律有十二管律厯自然相應則其顯然者矣古人有言曰推厯生律見前漢律厯志夫律何以生於厯哉盖黄鍾之積分㝠符厯日之數也天以日為主右行一日一度積之一嵗而有三百六十五日四分日之幾一黄鍾之半管積分應之全管則有圓分七百三十分又半分稍弱適符兩嵗之期實此律厯所以相通雖未必有氣應灰飛之事而自有黙相契合之理猶之人身血脈周流悉應天運而經絡空穴亦有三百六十五數以應天度焉此豈人之所能為哉古今之言律厯相通者皆未思及此漢志雖言推厯生律而以律之八十一分為日法則是因律生厯以數强合并厯亦失之矣邢雲路謂冬至景長測景以定黄鍾不知景隨地異將以何者為準且夏至景短何以蕤賓之律不最短乎考周鬴定黄鍾積分應再朞黄鍾積分應再朞之日此説千古所未發其數甚𣺌茫難信幸有因律生量之法見於前漢志又有㮚氏之鬴尺度淺深之數見於周禮以周鬴之容受求黄鍾空圍内之容分兩嵗朞實不約而合夫謂容分應再朞非謂十分為寸之分又非以平方分起算以立方分計積也蓋聲音屬陽故黄鐘之寸必九而管體之空必圜寸既以九則分亦當用九而不用十律以九分為寸史遷以來有此法但假此便於三分損益耳不知其數本如此管空既圜則分亦當用圜而不用方此自然之理也范鎮曰古者以竹為律竹形本圓而今以方分置算此律非是算法圓分謂之徑圍方分謂之方斜今圓分而以方法算之此算數非是説正與此合蔡氏謂算家無用圓分之法不知算家用方分取其整齊易算耳律數精微黙契天運未可以算家簡便之法推也按考工記㮚氏為量量之以為鬴深尺内方尺而圜其外其實一鬴其臋一寸其實一豆内方尺者虚度之四隅皆抵圍圜其外即方尺之外此皆謂鬴内容受之處鄭註謂圜其外者為之脣非也臋底也豆即斗字覆其底深一寸容一斗則腹深尺者容十斗可知矣王安石引管子百升成鬴是也鄭注鬴六斗四升非也此鬴即十斗之斛出於黄鍾之龠内方尺而圜其外既不言有庣旁庣謂不滿處則内方四隅皆抵圍以勾股求弦法推之勾尺自乗百寸股尺亦自乗百寸合勾股羃二百寸平方開之得弦弦即圜徑其徑一尺四寸一分四釐二毫一秒三忽五微六纎有竒今始以算家十分為寸平方立方法算之凡圓率徑一者周三一四一五九三六祖沖之宻率以半徑乗半周徑圍求面冪法而得面冪七八五三九八四徑十寸者自乗百寸其圜内之冪七十八寸五三九八四今此鬴之徑自乗二百寸則冪亦當倍之為一百五十七寸七分九十六釐八十毫一寸有平方百分凡一萬五千七百七分九十六釐八十毫深一寸有立方一十五萬七千七十九分六八深一尺有立方一百五十七萬七百九十六分八十釐此鬴之容方分也因鬴以求黄鍾一鬴之實容黄鍾二千龠漢志黄鍾兩龠為合十合為升十升為斗十斗為斛故一斛有二千龠以二千歸立方得黄鍾之積七百八十五分三九八四黄鍾九寸當以九十歸之得面冪八分七二六六四九以面冪求周徑得周一十分四釐七毫一九八徑三分三釐三分釐之一胡安定以來謂徑三分四釐六毫者未宻此古黄鍾圍徑積冪以十起算之數也較之蔡氏九平方分積八百一十分者不侔矣再以九分為寸并圜分之法推之即前之徑約十為九得一百二十七分二七九二二零六約十為九者以九自乗得八一亦如前法倍之得一六二即為徑冪求圜内之圜分者徑冪即為圜分如徑十者圜分百得一萬六千二百為平圜分深一尺者九十分有立圜一百四十五萬八千以二千歸之得黄鍾之積七百二十九个立圜分以八十一歸之空圍有九平圜分徑九分寸之三由此觀之則黄鍾之積豈不適合兩嵗之日乎雖兩嵗有七百三十零半日弱此積不及一分有竒然此一分有竒者甚微空徑稍寛毫髮即盈其數黄鍾稍寛則鬴徑亦當稍寛較寛一釐四毫四秒内方尺之四隅不及抵圍亦當微有庣旁然其數甚微不言亦可且量器取其整齊足以垂法不妨少減庣處以就内方初不必計其毫釐也若王莽之斛雖亦出於黄鍾然其造律或圍徑稍寛於是積分稍多以二千龠登於斛遂有一千六百二十寸其徑一尺四寸三分六釐一毫九秒二忽於是内方四隅不抵圜周不得不有庣旁劉歆謂庣旁九釐五毫而祖沖之以宻率計之庣旁一分九毫有竒則漢斛大於周鬴矣蔡氏以漢斛定黄鍾空圍九分積八百一十分豈知黄鍾之積本應再朞合周鬴而且用九用圜布算者乎論宋儒算術之誤算術亦律學之一事當講於勾股少廣開方諸法有宋諸儒言律者如胡安定范蜀公蔡西山皆不精於算術其求周徑也不考祖沖之宻率但用圍三徑一之法其求積冪也不以宻率實算但用圓田簡約之法今所算皆用宻率唯數位之後竒零甚微者乃棄之論十一律四條論律當匀截應節氣黄鍾半律之容分既當一嵗之日則其生大吕以下十一律也亦以四寸有半均匀截之以應月之中氣每律截去三分七釐五毫其中容分三十分有竒猶之自冬至至大寒太陽平行三十度有竒在厯則積而漸多在律則減而漸少至應鍾又截去三分七釐五毫則為黄鍾清聲此天地之氣循環無端之象也舊法以三分損益隔八相生之法生十一律其所生之律忽短忽長無闗於厯日之數至於仲吕不能反生黄鍾遂往而不反豈自然之數法哉又論今厯節氣亦有短長此因太陽行本輪有髙下故視行小有盈縮節氣微有短長在天本皆平行律分應日亦當稍有參差然其數甚微律管不過毫釐之間即謂均匀截之以應太陽平行之平氣亦可也今律較舊律今律大吕八寸六分二釐五毫太簇八寸二分五釐夾鍾七寸八分七釐五毫姑洗七寸五分仲吕七寸一分二釐五毫蕤賓六寸七分五釐林鍾六寸三分七釐五毫夷則六寸南吕五寸六分二釐五毫無射五寸二分五釐應鍾四寸八分七釐五毫黄鍾清四寸五分舊律大吕八寸四分一釐七毫有竒少二分七毫有竒太簇八寸少二分五釐夾鍾七寸四分九釐有竒少三分八釐有竒姑洗七寸一分一釐有竒少三分八釐有竒仲吕六寸六分五釐有竒少四分六釐有竒蕤賓六寸三分一釐少四分三釐有竒林鍾六寸少三分七釐五毫夷則五寸六分一釐有竒少三分八釐有竒南吕五寸三分三釐有竒少二分九釐有竒無射四寸九分七釐有竒少二分七釐有竒應鍾四寸七分四釐有竒少一分三釐有竒變黄鍾半律四寸四分三釐有竒少黄鍾清六釐有竒觀舊律皆短於今律夾鍾近姑洗姑洗近仲吕仲吕近蕤賓蕤賓近林鍾林鍾夷則差一律夷則近南吕南吕近無射以厯日較之差多者一月矣其兩律相減大吕減黄鍾五分八釐有竒夾鍾減太簇五分有竒何其疎南吕減夷則二分八釐應鍾減無射二分三釐又何其宻豈天地之氣果如是疎宻不均乎或曰五聲之用亦有參差而律獨皆均齊何也曰五聲之有參差也驗於琴徽之泛聲而律管之無參差也應乎黄道之宫度各有攸當不可以彼例此也使謂十二律不應十二月則已如其應十二月也安得舍太陽行度一月三十之截然者而從夫三分損益忽疎忽宻之數乎論律吕應日躔斗建陽律陰吕之相合也有自然之理焉亦有自然之數焉周禮大司樂奏黄鍾歌大吕以祀天神子與丑合也奏太簇歌應鍾以祭地示寅與亥合也奏姑洗歌南吕以祀四望辰與酉合也奏蕤賓歌函鍾以祭山川午與未合也奏夷則歌小吕以享先妣申與已合也奏無射歌夾鍾以享先祖戌與夘合也此十二辰之六合説者以為本於日躔與斗建如日躔星紀丑則斗建元枵子日躔析木寅則斗建娵訾亥是也以今律黄鍾清四寸半合大吕八寸六分二釐五毫得十三寸一分二釐五毫太簇合應鍾姑洗合南吕蕤賓合林鍾夷則合仲吕無射合夾鍾皆得十三寸一分二釐五毫與大司樂之文及日躔斗建之説不約而合豈非自然之理數不假絲毫智力者乎黄鍾全律獨不與吕合而所合者乃其清聲又隠然有尊君之理寓於律數之間云論三分損益八條辨三分損益上下相生之非三分損益上下相生之説始於管子至史記律書而加詳班氏律厯志又因史記推演其數後之言律者皆固守其説不知此法果天為之乎凡數之出於自然如河圖洛書如先天八卦如納音五行如揲蓍如算家勾股乗除諸法是誠非人之所能為若夫聲律之用三分損益竊謂其出於人而非天也律管本應十二月如云黄鍾三分損一下生林鍾安見六月之積日由十一月下生而來如云林鍾三分益一上生太簇安見正月之積日又必由六月上生而至乎明者觀之不待其生至仲吕不能反生黄鍾固已疑其法之非真矣五聲三分損益隔四而相生亦得其近似而非其本然古人見其數之近似也遂立為成法不知小有不合則法已非真如古之算家但知徑一圍三不知有宻率古之厯家但知一嵗小餘四分日之一不知有嵗差其事亦正相類後人於厯算二事已精益精初不必守古人之定法至言律吕獨相沿不改何其膠柱不知變乎又論律之三分損益算之徑一圍三厯之十九嵗氣朔分齊皆近似不精之法及細考之厯算二法皆不然律法豈得獨是厯則分明有景可測算則分明有器可量律則分明有琴可考三者皆不可誣雖有羲和之厯隷首之算伶倫之律相傳至今亦當以有據者為斷不當法古法為定如云太史公之説必有所傳則史遷専司星厯其厯書法度當精宻不可易矣今太初之法一步不可行又何疑於律乎又論細考之古法三分損益其源亦自琴來故謂宫聲為八十一絲商聲為七十二絲皆以琴絃言之琴絃取應聲之法亦畧有三分損益之意如初絃第九徽應四絃散聲九徽當絃三分之二似宫聲三分損一而生徵四絃九徽應七絃散聲似徵聲三分損一而生少商益一即是上生商五絃九徽為清角三分益一又似羽聲上生角然太簇八寸不當十三徽則徴生商三分損一而有餘姑洗七寸一分亦不正當十一徽則羽生角三分益一而不足商生羽從十三徽外半寸起算則三分損一得八徽若自十三徽起算則三分損一又有餘以此觀之唯有宫生徴合三分損益之數其餘三聲非太過即不及故三分損一近似而非真徴之於宫也偶合三分損一耳諸聲不可以此為例琴又有時以十徽為角三分損一則復生宫而五聲循環矣然就三分損益之法自前生來終不能使十徽為角也又論又以嵗日驗之黄鍾當兩嵗為四十八氣三分損一為三十二氣除一嵗二十四氣餘八氣以八氣減二十四餘十六氣自冬至數之是處暑七月中也而云黄鍾下生林鍾林鍾六月之律已差一月矣又以三十二氣分為九十六候三分益一百二十八候除一嵗七十二候餘五十六候以減七十二餘十六候自冬至初候數之是驚蟄二月節後第二候也而云林鍾上生太簇太簇正月之律又差四候矣以此觀之月之三分損一已是隔九及其三分益一亦不正得隔八故嵗日總無三分損益之數而律之隔八下生其源已失之於林鍾又論或疑聲律三分損益上下相生至其末也復以三分之則有不盡之算而數不行故聲止於五律止於十二此似出於自然曰此亦出於人為也盖其初先知聲之當五故置一而五三之得八十一為宫之數相生至角六十四三分之不盡一算而數不行設使其初不知聲之當五或置一而四三之以二十七為宫則相生至四位即有三分不盡之算矣或六三之以二百四十三為宫則至六位而後有不盡之算五位猶可分也律亦猶是其初先知律之當有十二故自子至亥以三厯十二辰得十七萬七千一百四十七為黄鍾之實相生至仲吕十三萬一千七十二三分之不盡二算而數不行設使其初不知律之當十二不以三厯十二辰則不盡之算又不如此矣然則此數與法豈果出於自然哉古厯家謂十九嵗七閏無餘分為一章故立法以九百四十分為一日以二百三十五為小餘此二百三十五者一章之月數也不知厯者見其積至十九嵗果無餘分遂謂九百四十分之日法出於天然不知其先因章月有二百三十五故立為日法非天道果有此數也後人覺其有差而此數法不可用矣其事正與聲律相類厯則乆正之矣律則鮮有覺其非者論古時未有三分損益之説周禮典同曰凡為樂器以十有二律為之數度樂器之長短小大皆以律計其倍半而為之律誠有數有度矣但不知周公以前造律者果如管子史遷之説乎抑别有活法乎伶州鳩曰古之神瞽考中聲而量之以制度律均鍾神瞽目廢而耳聰聲之大小髙下自能以耳齊之非専求之度數也即謂度數有成法亦當先為簡徑而後漸為煩曲如今法遞減黄鍾黄均匀截管其法至簡易徑㨗而三分損益一律分之至於千萬其數極為迂曲煩難安知古人造律不即如今日簡徑之法至後人加以巧曲始有管子以下諸説乎管子盖春秋戰國間人撰自此以前未有三分損益之説唯國語伶州鳩之言有紀之以三一語朱子疑其謂三分損益然韋昭解此以三為天地人則亦未必其果如朱子之説也論後人嘗破三分損益之説劉宋時何承天嘗増林鍾以下分數使至仲吕反生復得黄鍾謂三分損益者其大畧猶厯言斗分四之一此説最為有見然以意増之而涉於牽强則亦難憑明鄭世子謂長律下生短律左旋隔八短律上生長律右旋隔六以勾股算術布之周而復始不用三分損益其云左旋隔八右旋隔六猶是舊法如朝四暮三實無異也勾股算術與此難通亦牽强布算耳豈出於自然乎總之律應十二月隨月迭減而非隔八相生後人雖有議及三分損益者未嘗思其所以失之之由雖有欲破三分損益者亦不知所以破之之道牽强立法徒勞無當邢雲路既知三分損益猶厯言斗分四之一為大畧之數矣又云後人苟有得不當詆古人立論之非此又不然易大傳謂蓍策三百六十當期之日此謂揲法已成其過揲之策猶有一嵗常數之象故大畧言之不必正與嵗實相當若律之三分損益乃是以此立法苟可増損毫釐則此法數非真與蓍策之大槩言相當者不同不可以彼例此也後人果是則古人為非但當論後人所得者果是與否耳不必猶為古人囬䕶也如是言以厯比律厯家謂斗分四之一即漢厯太初四分之術也邢氏何不為之回䕶而深詆漢人為不知厯乎若曰律分法由來已乆不始於漢則殷周之厯不為不乆其失與太初四分等亦將謂乆者即不當詆乎論仲吕不能反生黄鍾天地之運晝夜寒暑終則有始獨於律吕之數往而不反仲吕再生不及黄鍾之九寸此由黄鍾三分損一下生林鍾即已失之六寸當為夷則而林鍾以進而干其位安能使仲吕反生復於其所京房創為六十律之説仲吕再生别名執始轉生四十八律終於南吕殊為穿鑿何承天劉焯譏房之失増林鍾已下十一律之分使仲吕反生還得黄鍾之實又涉牽强總之拘於三分損益其本已失豈能齊其末今法迭減黄鍾順序而生不曰黄鍾生林鍾而曰黄鍾生大吕不曰仲吕生黄鍾而曰應鍾生半黄鍾豈有不能循環者乎蔡氏亦譏房之失而取通典變律子聲之説仲吕生變黄鍾以下有六變律則亦四十八律中執始子黄去滅未林時息寅太結躬酉南變虞辰姑遟内亥應之異名耳論二變聲二條論二變不合於琴古法五聲之餘於羽宫之間近宫收一聲為變宫角徴之間近徴收一聲為變徴淮南子云姑洗生應鍾比於正音故為和應鍾生蕤賓不比於正音故為謬二變之説其來乆矣然以琴考之殊不然琴絃皆正聲六七絃為宫商之清聲非二變也十三徽至十徽一律一徽是角商各二聲皆非如二變之説也論聲律者當以琴為主琴徽出於天然不従三分損益來者也論七音非古周景王問伶州鳩七律對以武王伐殷之初嵗月日星辰所在自鶉及駟為七列鶉火午宫張宿至天駟凡七宿天駟房也南北之揆為七同自鶉火午至天黿子凡七宫神人以七同其數而以律和其聲故謂之七律此但言所以用七之故而不言七律為何律後又言武王作四樂曰羽曰厲曰宣曰嬴亂用夷則上宫黄鍾下宫太簇下宫無射上宫又只有四律而不言七此皆不甚分明韋昭註七律云黄鍾為宫太簇為商姑洗為角林鍾為徴南吕為羽應鍾為變宫蕤賓為變徴武王所用七律果如是乎左傳昭公二十年七音杜預但引國語之文而不用五聲二變之説豈亦有疑於此者乎杜佑則云古有五聲至周以來加文武二聲謂之七音此則琴絃少宫少商之説也竊疑此説得之變宫變徴恐周初未嘗有此京房謂伏羲時已有此七音太無稽矣尚書大傳云予欲聞六律五聲八音七始詠説者謂七始即七音然今文尚書作在治忽史記又作來始滑一文而三處不同始治字相近滑忽音相近七在古音亦相近以文義言之皆不若今文尚書之安則尚書其本文而史記書傳皆誤文也以七始為七音郢書燕説豈足信乎論變律二條辨變律半律之非古法十二律之外但有四清聲而已至唐杜佑通典始有變律子聲之説仲吕再生變黄鍾轉生十二律各半之為子聲其律皆短於正律蔡氏取黄太姑林南應六變律各有半聲有用有不用似非自然之理如當用此律則宜用其正律不能用全律則宜用正律之半聲而已何為舍其正者不用必用其近似不正者乎其所以然者但拘於三分損益之説謂従正律生來不得本律故輾轉相生皆殺於本律不知三分損益之法人為之耳豈聲音中果有如是之數黙寓其間當用變律時必不宜從正律取聲耶朱子謂漢志黄鍾不為他律役與通典變律之説相發明然黄鍾自有半律為他宫用亦是不為他律役不必又取變黄鍾之半聲也論范馬未檢通典朱子甚取通典之説謂他書所不及又謂范蜀公司馬温公不知檢通典以今觀之二公之論樂其大者未必得元聲次則十一律之損益未必得本律之正耳至若通典之説尚有可疑用與不用恐於樂皆無加損也范主房庶私増漢書又去四清聲最為紕謬唯律管當用圓分之説有可取之禮書綱目附録卷上
