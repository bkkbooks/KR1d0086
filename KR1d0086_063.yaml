body:
  text: 禮書綱目卷六十一婺源江永撰朝廷禮通禮十補天子者與天地參故德配天地兼利萬物與日月並明明照四海而不遺微小其在朝廷則道仁聖禮義之序燕處則聽雅頌之音行步則有環佩之聲升車則有鸞和之音居處有禮進退有度百官得其宜萬事得其序詩云淑人君子其儀不忒其儀不忒正是四國此之謂也道猶言也環珮佩環佩玉也所以為行節也玉藻曰進則揖之退則揚之然後玉鏘鳴也環取其無窮止玉則比德焉孔子佩象環五寸人君之環未聞也鸞和皆鈴也所以為車行節也韓詩內傳曰鸞在衡和在式故升車則馬動馬動則鸞鳴鸞鳴則和應居處朝廷與燕也進退行步與升車也發號出令而民説謂之和上下相親謂之仁民不求其所欲而得之謂之信除去天地之害謂之義義與信和與仁霸王之器也有治民之意而無其器則不成器謂所操以作事者也義信和仁皆存乎禮記經解三代之禮天子春朝朝日秋暮夕月祭日東壇祭月西壇故以别內外以端其位所以明有别也春秋入學坐國老執醬而親饋之仲春舍菜合舞仲秋班學合聲所以明有孝也行中鸞和步中采齊趨中肆夏車亦應樂節步又中佩聲互言之也所以明有度也於禽獸見其生不食其死聞其聲不嘗其肉故逺庖厨所以長恩且明有仁也食以禮徹以樂失度則史書之工誦之三公進而讀之宰夫減其膳是天子不得為非也大戴禮保傳右通論師氏掌以媺詔王告王以善道也文王世子曰師也者教之以事而諭諸德者也地官保氏掌諫王惡諫者以禮義正之文王世子曰保也者慎其身以輔翼之而歸諸道者也上同君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也大學之禮雖詔於天子無北面所以尊師也尊師重道焉不使處臣位也武王踐阼召師尚父而問焉曰昔黃帝顓頊之道存乎意亦忽不可得見與師尚父曰在丹書王欲聞之則齊矣王齊三日端冕師尚父亦端冕奉書而入負屏而立王下堂南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言學記天子不論先聖王之德不知國君畜民之道不見禮義之正不察應事之理不博古之典傳不間於威儀之數詩書禮樂無經學業不法凡是其屬太師之任也天子無恩於父母不惠於庶民無禮於大臣不中於制獄無經於百官不哀於喪不敬於祭不信於諸侯不誡於戎事不誠於賞罰不厚於德不強於行賜與侈於近臣鄰愛於疏逺卑賤不能懲忿窒欲言不勝其情易曰君子以懲忿窒欲不從太師之言凡是之屬太傅之任也天子處位不端受業不敬言語不序聲音不中律聲有準乃中律進退節度無禮節度或為節序升降揖讓無容周旋俯仰視瞻無儀安顧咳唾趨行不得趨或為走色不比順隱琴瑟隱據也言按禮樂之器凡此其屬太保之任也天子宴譬廢其學少師與天子宴者也朱子曰譬本作瞻又無廢字今以學記利補左右之習反其師左右所習不順於師也朋朱子曰此即學記所謂燕逆其師者也答逺方諸侯不知文雅之辭應對羣臣左右不知已諾之正簡聞小誦不傳不習凡此其屬少師之任也天子居處出入不以禮冠帶衣服不以制御器在側不以度縱上下雜采不以章惑於朱紫不以典章忿怒説喜不以義賦與集讓不以節朱子曰集疑當作譙凡此其屬少傅之任也天子宴私安如易自放縱也朱子曰如而古通用樂而湛過於樂也飲酒而醉食肉而餕過其性也飽而強強猶強也飢而婪婪貪殘也暑而暍暍傷暑也寒而嗽寢而莫宥坐而莫侍行而莫先莫後天子自為開門户取玩好自執器皿亟顧環面環旋也御器之不舉不藏凡此之屬少保之任也號呼歌謡聲音不中律宴樂雅誦迭樂序輕用雅誦也凡禮不同樂各有迭苟從所好亂其次聲樂之失任在太史者樂應天也國語曰吾非瞽史焉知天道也不知日月之時節不知先王之諱與大國之忌周禮小史職曰若有事則詔王之忌諱也不知風雨雷電之眚凡此其屬太史之任也大戴保傳古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞可正而不正責之輔可揚而不揚責之弼尚書大傳每歲孟春遒人以木鐸徇于路官師相規工執藝事以諫其或不恭邦有常刑遒人司令之官木鐸金口木舌施政教時所振以警衆也官以職言師以道言規正也相規云者胥教誨也工百工也百工技藝之事至理存焉理無往而不在故言無微而可略也孟子曰責難於君謂之恭書胤征天子聽政使公卿至於列士獻詩獻詩以風也列士上士也瞽獻典無目曰瞽瞽樂師與樂典也史獻書史外史也周官外史掌三皇五帝之書師針師小師也針針刺王闕以正得失􅕓賦無眸子曰􅕓賦賦公卿列士所獻詩也矇誦有眸子而無見曰矇周禮矇主弦歌風誦誦針諫之語也百工諫百工執技以事上者執藝事以諫謂若匠師慶諫魯莊公丹楹刻桷者庶人傳語庶人卑賤見時得失不得進傳以語之也近臣盡規近臣謂驂僕之屬也盡規盡其規以告王也親戚補察補補過察察政也傳曰自王以下有父兄子弟以補察其過瞽史教誨瞽樂太師史太史也掌隂陽天時禮法之書以相教誨者單襄公曰吾非瞽史焉知天道耆艾修之耆艾師傅也修之理瞽史之教以聞於王而後王斟酌焉斟取也酌行也是以事行而不悖悖送也語國語周古之王者政德既成又聽於民詢於芻蕘聼謗譽也於是乎使工誦諫於朝工矇􅕓也誦誦讀前世針諫之語在列者獻詩使勿兜列位也謂公卿至於列士獻詩以風也兜惑也風聽臚言於市風采也臚傳也采聽商旅所傳善惡之言辨妖祥於謡辨别也妖惡也祥善也行歌曰謡丙之辰檿弧箕服之類是也考百事於朝百官職事問謗譽於路有邪而正之盡戒之術也術道也晉語有君而為之二二卿佐使師保之勿使過度是故天子有公諸侯有卿卿置側室側室支子之官大夫有二宗二宗宗子之副二者士有朋友庶人工商皂𨽻牧圉皆有親昵以相輔佐也善則賞之賞謂宣揚過則匡之匡正也患則救之救其難也失則革之革更也自王以下各有父子兄弟以補察其政補其愆過察其得失史為書瞽為詩工誦針諫大夫規誨士傳言庶人謗商旅於市百工獻藝故夏書曰遒人以木鐸徇於路逸書遒人行令之官也木鐸木古金鈴徇于路求歌謡之言官師相規官師大夫自相規正工執藝事以諫所謂獻藝正月孟春於是乎有之諫失常也有道人徇路氏襄公十四年左傳天子有爭臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國孝經卒食玄端而居天子服玄端燕居也動則左史書之言則右史書之其書春秋尚書其存者御瞽幾聲之上下瞽樂人也幾猶察也察其哀樂玉藻太史典禮執簡記奉諱惡簡記策書也諱先王名惡忌日若子卯天子齋戒受諫歲終羣臣奏歲事諫王當所改為也王制小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱鄭司農云志謂記也春秋傳所謂周志國語所謂鄭書之屬是也史官主書故韓宣子聘於魯觀書太史氏繫世謂帝繫世本之屬是也小史主定之瞽矇諷誦之先王死日為忌名為諱故書奠為帝杜子春云帝當為奠奠讀為定書亦或為奠玄謂王有事所祭於其廟春官宗祝在廟三公在朝三老在學王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正此所以達禮於下也教民慎居處也宗宗人也瞽樂人也侑四輔也禮運天子出户而巫覡有事出門而宗祝有事出户謂門內也女曰巫男曰覡有事祓除不祥出門謂車駕出國門宗者主祭祀之官有事謂祭行神也荀子太僕掌正王之服位服王舉動所當衣也位立處也夏官小臣正王之燕服位謂燕居時也玉藻曰王卒食玄端而居同上訓方氏掌道四方之政事與其上下之志道猶言也為王説之四方諸侯也上下君臣也誦四方之傳道傳道世世所傳説往古之事也為王誦之若今論聖德堯舜之道矣故書傳為傳杜子春云傳當為傳書亦或為傳同上右師保凡規諫侍御之法皆在此魯哀公問於子夏曰必學而後可以安國保民乎子夏曰不學而能安國保民者未之有也哀公曰然則五帝有師乎子夏曰有臣聞神農學乎悉老黃帝學乎大真一作墳顓頊學乎緑一作緑圖一作伯夷父帝嚳學乎赤松子一作伯招堯學乎尹壽一作務成子跗一作子州父舜學乎務成跗一作尹壽一作許由禹學乎西王國一作大成執湯學乎威子伯一作貸子相一作小臣文王學乎鉸時一作錫疇子斯武王學乎郭叔一作太公一作文王武王學太公望周公旦周公學乎太公一作虢叔仲尼學乎老聃此十一聖人未遭此師則功業不著於天下名號不傳乎千世夫不學不明古道而能安國家者未之有也新序武王踐阼三日既王之後召士大夫而問焉曰惡有藏之約行之行萬世可以為子孫恆者乎惡猶於何也言於何有約言而行之乃行萬世而猶得其福諸大夫對曰未得聞也然後召師尚父而問焉曰黃帝顓頊之道存乎意亦忽不可得見與言忽然謂不可得見師尚父曰在丹書王欲聞之則齊矣三日王端冕師尚父亦端冕奉書而入負屏而立端正也樹謂之屛王下堂南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不強則枉凡事不能自強去執於此則枉也矯朱子曰去執二字恐誤蓋強者以力自謂若徇其所偏不自矯揉則終於枉而已弗敬則不正枉者滅廢敬者萬世藏之約行之行可以為子孫恆者此言之謂也問先帝之道庶聞要約之旨故對此而已王聞書之言惕若恐懼而為戒書託於物以自警戒也於席之四端為銘焉於几為銘焉於鑑為銘焉於盥槃為銘焉於楹為銘焉於杖為銘焉於帶為銘焉於履屨為銘焉於觴豆為銘焉於户為銘焉於牖為銘焉於劒為銘焉於弓為銘焉於矛為銘焉席前左端之銘曰安樂必敬安不忘危前右端之銘曰無行可悔當恭敬朝夕故以懷安為悔也後左端之銘曰一反一側亦不可以忘言雖反側之間不可以忘道也後右端之銘曰所監不逺視邇所代周監不逺近在有殷之世几之銘曰皇皇惟敬口生㖃㖃恥也言為君子榮辱之主可不慎乎㖃㖃詈也口戕口言口能害口也几者人君出令所依故以言語為戒也鑑之銘曰見爾前慮爾後盥槃之銘曰與其溺於人也寧溺於淵溺於淵猶可遊也溺於人不可救也日知所亡學者之功溺於民庶大人之禍故或以自新取戒或以遊溺為鑑也楹之銘曰毋曰胡殘其禍將然毋曰胡害其禍將大毋曰胡傷其禍將長夫為室者慎其楹君天下者難其相也相朱子曰此亦泛言未必指楹為也杖之銘曰惡乎危於忿疐惡乎何也忿者危之道怒甲及乙又危之甚杖危故以危戒也惡乎失道於嗜欲杖依道而行之惡乎相忘於富貴言身杖相資也因失道相忘乃嗜欲安樂之戒也帶之銘曰火滅修容慎戒必恭恭則壽雖夜解息其容不可以苟帶於寢先釋故因言之也履屨之銘曰慎之勞勞則富行慎躬勞躬勞終福論慎履亦財不費也履在下尤勞辱因為此戒勞與富音義兩施互取焉觴豆之銘曰食自杖食自杖戒之憍憍則逃無求醉飽自杖而已户之銘曰夫名難得而易失無勤弗志而曰我知之乎無勤弗及而曰我杖一本作枝之乎志識也杖立不能懲其駑息而自謂杖成功無可就故終失其名也擾阻以泥之朱子曰無勤弗志至此皆所未詳要必有害於户者若風將至必先搖搖搖搖無所託言有風則先困閉朱子曰也此謂户不固而動搖雖有聖人不能為謀也論人行諭亦然牖之銘曰隨天之時任也以地之財質也敬祀皇天敬以先時先祭時而敬齋處朱子曰牖下齊祭之也劒之銘曰帶之以為服動必行德行德則興倍德則崩以順誅也弓之銘曰屈伸之義廢興之行無忘自一本作息過言得時也矛之銘曰造矛造矛少間弗忍終身之羞重言造矛見造矛之不易也言少間之不忍則為焉終身羞以君子於殺之中禮恕存豫一人所聞以戒後世子孫貽厥孫謀以燕翼子武王之詩也大戴踐阼昔周辛甲之為大史也命百官官針王闕辛甲周武王太史闕過也使百官各為針辭戒王過左傳明堂之位曰篤仁而好學多聞而道慎天子疑則問應而不窮者謂之道道者𨗳天子以道者也常立於前是周公也誠立而敢斷輔善而相義者謂之充充者充天子之志也常立於左是太公也潔廉而切直匡過而諫邪者謂之弼弼者拂天子之過者也常立於右是召公也博聞強記接給而善對者謂之承承者承天子之遺忘者也常立於後是史佚也史佚周太史尹佚也故成王中立而聽朝則四聖維之是以慮無失計而舉無過事殷周之前以長久者其輔翼天子有此具也大戴保傳衛武公年數九十有五矣武公衛僖公之子共伯之弟武公和也猶針警於國針刺也警戒也曰自卿以下至於師長士師長大夫士衆士也苟在朝者無謂我老耄而舍我舍謂不諫戒也必恭恪於朝朝夕以交戒我聞一二之言必誦志而納之以訓道我言謗譽之言也志記也在輿有旅賁之規規規諫也旅賁勇力之士掌執戈楯夾車而趨車止則持輪位寧有官師之典中庭之左右謂之位門屏之間謂之寧師長也典常也倚几有誦訓之諫誦訓工師所誦之諫書之於几也居寢有􅉏御之針􅉏近也臨事有瞽史之道事戎祀也瞽樂太師掌詔吉凶史太史也掌詔禮事宴居有師工之誦師樂師工瞽矇也誦謂針諫也史不失書矇不失誦以訓御之御進也於是乎作懿戒以自警也三家云懿戒書也昭謂懿戒詩大匹抑之篇也懿讀曰抑毛詩敘曰抑衛武公刺厲王亦以自警也及其沒也謂之睿聖武公睿明也書曰睿作聖諡法威強睿德曰武楚語荀子曰國將興必貴師而重傅貴師而重傅則法度存國將衰必賤師而輕傅賤師而輕傅則人有快人肆其意人有快則法度壞荀子大略天子皮辨以日視朝玉藻視朝則皮辨服視朝視內外朝之事皮辨之服十五升白布衣積素以為裳王受諸侯朝覲於廟則衮冕春官司服此二條王視朝之服象路朱樊纓七就建大赤以朝象路以象飾諸末象路無鈎以朱飾勒而已其樊及纓以五采罽飾之而七成大赤九旗之通帛以朝以日視朝春官巾車此條王視朝車旗司士正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之之右南面東上大僕大右大僕從者在路門之左南面西上此王日視朝事於路門外之位王族故士故為士晚退晉宿衛者未嘗仕雖同族不得在王宮大右司右也大僕從者小臣祭僕御僕隸僕司士擯詔王出揖公卿特揖大夫以下朝者也特揖大夫以其等旅揖士旁三揖王還揖門左揖門右特揖一一揖之旅衆也大夫爵同者衆揖之公及孤卿大夫始入門右皆北面東上王揖之乃就位羣士及故士大僕之屬發在其位羣士位東面王西南鄉而揖之三揖者士有上中下王揖之皆逡巡既復位鄭司農云卿大夫士皆君之所揖禮春秋傳所謂三揖在下大僕前前正王視朝之位王入內朝皆退王入入路門也王入路門內朝朝者皆退反其官府治處也王之外朝則朝士掌焉玉藻曰朝服以日視朝於內朝朝辨色始入君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢謂諸侯也王日視朝皮辨服其禮則同夏官宰夫之職掌治朝之法以正王及三公六卿大夫羣吏之位掌其禁令治朝在路門外其位司士掌焉宰夫察其不如儀天官大僕王視朝則前正位而退入亦如之前正位而退道王王既立退居路門左待朝畢夏官諸子掌國子之倅辨其等正其位鄭司農云國子謂諸侯卿大夫士之子也玄謂四民之業而士者亦世焉國子者是公卿大夫士之副二位朝位同上大宰王視治朝則贊聽治治朝在路門外羣臣治事之朝王視之則助王平斷天官師氏居虎門之左司王朝虎門路寢門也王日視朝於路寢門外畫虎焉以明勇猛於守室也司猶察也察王之視朝若有善道可行者則當前以詔王地官以上六條天子治朝諸侯朝服以日視朝於內朝朝服冠玄端素裳也此內朝路寢門外之正朝也天子諸侯皆三朝朝辨色始入羣臣也入入應門也辨猶正也别也君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢釋服小寢燕寢也釋服服玄端玉藻公族其在外朝則以官司士為之外朝路寢門之外庭司士亦司馬之屬也掌羣臣之班正朝儀之位也文王世子諸侯視朝大夫特士旅之大夫特士旅之謂君揖之朝禮器以上三條諸侯治大僕王視燕朝則正位掌擯相燕朝朝於路寢之庭王圖宗人之嘉事則燕朝王不視朝則辭於三公及孤卿辭謂以王不視朝之意告之春秋傳曰公有疾不視朝朝夏官不此條天子燕及辭視朝公族其朝於公內朝則東面北上臣有貴者以齒內朝路寢庭庶子治之雖有三命不踰父兄治之治公族之禮也唯於內朝則然其餘會聚之事則與庶姓同文王世子此條諸侯燕朝又羣臣之位見燕禮大射禮朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石達窮民焉樹棘以為位者取其赤心而外刺象以赤心三刺也槐之言懷也懷來人於此欲與之謀羣吏謂府吏也州長鄉遂之官鄭司農云王有五門外曰皋門二曰雉門三曰庫門四曰應門五曰路門路門一曰畢門外朝在路門外內朝在路門內左九棘右九棘故易曰係用徽纒置于叢棘玄謂明堂位説魯公宮曰庫門天子皋門雉門天子應門言魯用天子之禮所名曰庫門者如天子皋門所名曰雉門者如天子應門此名别二兼四則魯無皋門應門矣檀弓曰魯莊公之喪既葬而經不入庫門言其除喪而反由外來是庫門在雉門外必矣如是王五門雉門為中門雉門設兩觀與今之宮門同閽人幾出入者窮民蓋不得入也郊特牲譏繹於庫門內言逺當於廟門廟在庫門之內見於此矣小宗伯職曰建國之神位右社稷左宗廟然則外朝在庫門之外皋門之內與今司徒府有天子以下大會殿亦古之外朝哉周天子諸侯皆有三朝外朝一內朝二內朝之在路門內者或謂之燕朝帥其屬而以鞭呼趨且辟趨朝辟行人執鞭以威之禁慢朝錯立族談者慢朝謂臨朝不肅敬也錯立族談違其位僔語也秋官小司冦之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君外朝在雉門之外者也國危謂有兵荒之難國遷謂徙都故邑也立君謂無冡適選於庶也鄭司農云致萬民聚萬民也詢謀也詩曰詢於芻蕘書曰謀及庶人其位王南鄉三公及州長百姓北面羣臣西面羣吏東面羣臣卿大夫士也羣吏府吏也其孤不見者孤從羣臣卿大夫在公後小司冦擯以敘進而問焉以衆輔志而弊謀擯謂揖之使前也敘更也輔志者尊王賢明也同上鄉大夫大詢於衆庶則各帥其鄉之衆寡而致於朝大詢者詢國危詢國遷詢立君鄭司農云大詢於衆庶洪範所謂謀及庶民天地官朝已上三條子外大宰王視朝則贊聽治視四方之聽朝亦如之謂王巡守在外朝天官師氏王舉則從聽治亦如之謂王舉於野外以聽朝地官保氏王舉則從聽治亦如之同上子己上三條天有外聽朝朝玄端夕深衣謂大夫士也夫玉視藻朝此一條大士私右朝儀離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也易説卦傳君之南鄉答陽之義也臣之北面答君也答對也郊特牲公父文伯之母如季氏如之也康子在其朝自其外朝也與之言弗應從之及寢門弗應而入入康子之家康子辭於朝而入見辭其家臣入見敬薑曰肥也不得聞命無乃罪乎得無有罪乎曰子弗聞乎天子及諸侯合民事於外朝言與百官考合民事於外朝也合神事於內朝神事祭祀也內朝在路門內自卿以下合官職於外朝外朝君之公朝合家事於內朝家大夫也內朝家朝也寢門之內婦人治其業焉上下同之寢門在室之門上下天子以下也夫外朝子將業君之官職焉內朝子將庀季氏之政焉庀治也皆非吾所敢言也國語魯語天子左五鐘右五鐘凡律呂十二各一鐘天子宮縣黃鐘㽔賓在南北其餘則在東西天子將出則撞黃鐘右五鐘皆應黃鐘在陽陽氣動西五鐘在隂隂氣靜君將出故以動告靜靜者皆和也馬鳴中律步者皆有容駕者皆有文御者皆有數步者中規折還中矩立則磬折拱則抱鼓言聲合於樂體比於禮也然後太師奏登車告出也周禮王出入奏王夏入則撞蕤賓左五鐘皆應蕤賓在隂東五鐘在陽君入故以靜告動動者則亦皆和之也以治容貌在內者皆玉色在外者皆金聲玉色反其正性也金聲其事殺然後少師奏登堂就席告入也少師佐成大師之事者也尚書大傳樂師教樂儀行以肆夏趨以采齊車亦如之環拜以鐘鼓為節教樂儀教王以樂出入於大寢朝廷之儀故書趍作跢鄭司農云跢當為趍書亦或為趍肆夏采齊皆樂名或曰皆逸詩謂人君行步以肆夏為節趨疾於步則以采齊為節若今時行禮於太學罷出以鼓陔為節環謂旋也拜直拜也玄謂行者謂於大寢之中趨謂於朝廷爾雅曰堂上謂之行門外謂之趨然則王出既服至堂而肆夏作出路門而采齊作其反入至應門路門亦如之此謂步迎賔客王如有車出之事登車於大寢西階之前及降於阼階之前尚書大傳曰天子將出撞黃鐘之鐘右五鐘皆應入則撞蕤賓之鐘左五鐘皆應大師於是奏樂春官大馭掌馭玉路以祀凡馭路行以肆夏趨以采齊凡馭路謂五路也肆夏采齊樂章也行謂大寢至路門趨謂路門至應門凡馭路儀以鸞和為節舒疾之法也鸞在衡和在軾皆以金為鈴夏官齊僕掌馭金路以賓以待賓客同上道僕掌馭象路以朝夕燕出入其法儀如齊車朝夕朝朝其夕掌二車之政令二亦副同上齊右掌祭祀會同賓客前齊車王乘則持馬行則陪乘齊車金路王自整齊之車也前之者已駕王未乘之時陪乘參乘謂車右也齊右與齊僕同車而有祭祀之事則兼王路之右然則戎右兼田右與凡有牲事則前馬王見牲則拱而式居馬前郤行備驚奔也曲禮曰國君下宗廟式齊牛同上道右掌前道車王出入則持馬陪乘如齊車之儀道車象路也王行道德之車自車上諭命於從車自由詔王之車儀顧式之屬王式則下前馬王下則以蓋從以蓋從表尊同上隸僕王行洗乘石鄭司農云乘石王所登以上車之石也詩云有扁斯石履之卑兮謂上車所登之石同上大僕王出入則自左馭而前驅前驅如今道引也道而居左自馭不參乘辟王也亦有車右焉同上小臣詔相王之小法儀小法儀趨行拱揖之容王之燕出入則前驅燕出入若今遊於諸觀苑同上虎賁氏掌先後王而趨以卒伍王出將虎賁士居前後雖羣行亦有局分同上旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪夾王車者其下士也下士十有六人中士為之帥焉同上節服氏掌祭祀朝覲衮冕六人維王之大常服衮冕者從王服也維維之以縷王旌十二旒兩兩以縷綴連旁三人持之禮天子旌曵地鄭司農云維持之諸侯則四人其服亦如之同上條狼氏掌執鞭以趨辟王出入則八人夾道公則六人侯伯則四人子男則二人趨辟趨而辟行人若今卒辟車之為也孔子曰富而可求雖執鞭之士吾亦為之言士之賤也秋官大司冦凡邦之大事使其屬蹕屬士師以下也故書蹕作避杜子春云避當為辟謂辟除姦人也玄謂蹕止行也同上小司冦大賓客前王而辟鄭司農云小司冦為王道辟除姦人也若今時執金吾下至令尉奉引矣凡國之大事使其屬蹕屬士師以下同上士師王燕出入則前驅而辟道王且辟行人同上鄉士大祭祀大喪紀大軍旅大賓客則各掌其鄉之禁令帥其屬夾道而蹕屬中士以下三公若有邦事則為之前驅而辟鄭司農云鄉士為三公道也若今時三公出城郡督郵盜賊道也同上遂士若邦有大事聚衆庶則各掌其遂之禁令帥其屬而蹕大事王所親也六卿若有邦事則為之前驅而辟同上縣士若大夫有邦事則為之前驅而辟同上右出入僕從之儀穆王曰昔在文武侍御僕從罔非正人出入起居罔有不欽冏命虢之會諸侯之大夫尋宋之盟也在昭元年楚公子圍二人執戈先焉楚公子圍恭王之庶子靈王熊虔也時為令尹先謂使二人執戈在前𨗳也叔孫穆子曰天子有虎賁習武訓也穆子魯卿叔孫豹也訓教也虎賁掌先後王而趨舍則守王間在國則守宮門所以習武教也諸侯有旅賁禦災害也禦禁也旅賁掌執戈盾夾車而趨車止則持輪所以備非常禁災害也大夫有二車僃承事也二副也承奉也事使也士有陪乘告奔走也陪猶重也奔走使令也今大夫而設諸侯之服有其心矣有篡國之心也國語魯語帝曰龍朕堲讒説殄行震驚朕師命汝作納言夙夜出納朕命惟允堲疾殄絶也殄行者謂傷絶善人之事也師衆也謂其言之不正而能變亂黑白以駭衆聽也納言官名命令政教必使審之既允而後出則讒説不得行而矯偽無所託矣敷奏復逆必使審之既允而後入則邪僻無自進而功緒有所稽矣周之內史漢之尚書魏晉以來所謂中書門下者皆此職也舜典宰夫敘羣吏之治以待賓客之令諸臣之復萬民之逆恆次敘諸吏之職事三者之來則應使辨理之鄭司農云復請也逆迎受王命者宰夫主諸臣萬民之復逆故詩人重之曰家伯冡宰玄謂復之言報也反也反報於王謂於朝廷奏事自下而上曰逆逆謂上書官天內史掌敘事之法受納訪以詔王聽治敘六敘也納訪納謀於王也六敘六曰以敘聽其情凡命諸侯及孤卿大夫則䇿命之鄭司農説以春秋傳曰王命內史興父䇿命晉侯為侯伯䇿謂以簡䇿書王命其文曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命受䇿以出凡四方之事書內史讀之若今尚書入省事王制祿則贊為之以方出之贊為之為之辭也鄭司農云以方出之以方板書而出之賞賜亦如之內史掌書王命遂二之副寫藏之春官外史掌書外令王令下畿外若以書使於四方則書其令書王令以授使者同上御史掌贊書王有命當以書致之則贊為辭若今尚書作説文同上大僕出入王之大命出大命王之教也入大命羣臣所奏行掌諸侯之復逆鄭司農云復謂奏事也逆謂受下奏建路鼓于大寢之門外而掌其政大寢路寢也其門外則內朝之中如今宮殿端門下矣政鼓節與早晏以待達窮者與遽令聞鼓聲則速逆御僕與御庶子鄭司農云窮謂窮寃失職則來擊此鼓以達於王若今時上變事擊鼓矣遽傳也若今時驛馬軍書當急聞者亦擊此鼓令聞此鼓聲則速逆御僕與御庶子也大僕主令此二官使速逆窮遽者玄謂達窮者謂司冦之屬朝士掌以肺石達窮民聽其辭以告於王遽令郵驛上下程品御僕御庶子直事鼓所者大僕聞鼓聲則速逆此二官當受其事以聞夏官小臣掌王之小命小命時事所敕問也掌三公及孤卿之復逆同上御僕掌羣吏之逆及庶民之復羣吏府史以下掌王之燕令燕居時之令以序守路鼓序更同上振木鐸於朝天子之政也天子將發號令必以木鐸警衆明堂位右號令復逆天下有風姤后以施命誥四方易王言如絲其出如綸王言如綸其出如綍言言出彌大也綸今有秩嗇夫所佩也綍引棺索也故大人不倡遊言遊猶浮也不可用之言也緇衣穆王曰昔在文武發號施令罔有不臧冏命成王與弟叔虞戲削桐葉為圭以與叔虞曰以此封若史佚因請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言言則史書之禮成之樂歌之於是遂封叔虞於唐史記王命仲山甫式是百辟纘戎祖考王躬是保出納王命王之喉舌賦政于外四方爰發賦也式法戎汝也王躬是保所謂保其身體者也然則仲山甫蓋以冡宰兼大保而大保抑其世官也與出承而布之也納行而復之也喉舌所以出言也發發而應之也民大雅蒸大宰以九式均節財用四曰羞服之式羞飲食之物也天官大府闢市之賦以待王之膳服膳服即羞服也同上膳夫掌王之食飲膳羞以養王及后世子食飯也飲酒漿也膳牲肉也羞有滋味者凡養之具大略有四凡王之饋食用六穀膳用六牲飲用六清羞用百二十品珍用八物醬用百有二十甕進物於尊者曰饋此饋之盛者王舉之饌也六牲馬牛羊豕犬雞也羞出於牲及禽獸以備滋味謂之庶羞公食大夫禮內則下大夫十六上大夫二十其物數備馬天子諸侯有其數而物未得盡聞珍謂淳熬淳毋炮豚炮牂搗珍漬熬肝膋也醬謂醯醢也王舉則醢人共醢六十甕以五韲七醢七菹三臡實之醯人共韲菹醯物六十甕鄭司農云羞進也六穀稌黍稷梁麥苽苽雕胡也六清水漿醴䣼醫酏王日一舉鼎十有二物皆有俎殺牲盛饌曰舉王日一舉以朝食也后與王同庖鼎十有二牢鼎九陪鼎三物謂牢鼎之實亦九俎以樂侑食膳夫授祭品嘗食王乃食侑猶勸也祭謂刌肺脊也禮飲食必祭示有所先品者每物皆嘗之道尊者也卒食以樂徹于造造作也鄭司農云造謂食之故所居處也己食徹置故處王齊日三舉鄭司農云齋必變食大喪則不舉大荒凶年大札疫癘也天災日月晦食地災崩動也大故冦戎之事鄭司農云大故刑殺也春秋傳曰司寇行戮君為之不舉王燕食則奉膳贊祭燕食謂日中與夕食奉膳奉朝之餘膳所祭者牢肉凡王之稍事設薦脯醢鄭司農云稍食謂非日中大舉時而問食謂之稍事膳夫主設薦脯醢玄謂稍事有小事而飲酒掌后及世子之膳羞亦主其饌之數不饋之耳凡肉修之頒賜皆掌之鄭司農云修脯也凡祭祀之致福者受而膳之致福謂諸臣祭祀進其餘肉歸胙于王鄭司農云膳夫受之以給王膳以摯見者亦如之鄭司農云以羔鴈雉為摯見者亦受以給王膳歲終則會唯王及后世子之膳不會不會計多少優尊者其頒賜諸臣則計之同上食醫掌和王之六食六飲六膳百羞百醬八珍之齊和調也凡食齊眂春時飯宜溫羮齊眂夏時羮宜熱醬齊眂秋時醬宜涼飲齊眂冬時飲宜寒凡和春多酸夏多苦秋多辛冬多鹹調以滑甘各尚其時味而甘以成之猶水火金木之載於土內則曰棗栗飴蜜以甘之堇荁枌榆免薨滫瀡以滑之凡會膳食之宜牛宜稌羊宜黍豕宜稷犬宜梁鴈宜麥魚宜苽會成也謂其味相成鄭司農云稌稷也爾雅曰稌稻苽雕胡也凡君子之食恆放焉放猶依也上同饎人共王及后之六食六食六穀之飯地官春天子食麥與羊麥實有孚甲屬木羊火畜也時尚寒食之以安性也夏食菽與雞菽實孚甲堅合屬水雞木畜時熱食之亦以安性也中央土食稷與牛稷五穀之長牛土畜也秋食麻與犬麻實有文理屬金犬金畜也冬食黍與彘黍秀舒散屬火寒時食之亦以安性也彘水畜也月令酒正掌酒之政令以式法授酒材式法作酒之法式作酒既有米麴之數又有功沽之巧月令曰乃命大酋秫稻必齊麴蘖必時湛饎必潔水泉必香陶器必良火齊必得鄭司農云授酒人以其材辨三酒之物一曰事酒二曰昔酒三曰清酒鄭司農云事酒有事而飲也昔酒無事而飲也清酒祭祀之酒玄謂事酒酌有事者之酒其酒則今之醳酒也昔酒今之酋久白酒所謂舊醳者也清酒今中山冬釀接夏而成辨四飲之物一曰清二曰醫三曰漿四曰酏清謂醴之泲者醫內則所謂或以酏為醴凡醴濁釀酏為之則少清矣醫之字從殹從酉省也漿今之酨漿也酏今之粥內則有黍酏酏飲粥稀者之清也鄭司農説以內則曰飲重醴稻醴清􅙤黍醴清􅙤梁醴清􅙤或以酏為醴漿水臆後致飲于賓客之禮有醫酏糟糟音聲與􅙤相似醫與臆亦相似文字不同記之者各異耳此皆一物掌其厚薄之齊以共王之四飲三酒之饌及后世子之飲與其酒后世子不言饌其饋食不必具設之五齊正用醴為飲者取醴恬與酒味異也其餘四齊味皆似酒掌酒之賜頒皆有法以行之法尊卑之差唯王及后之飲酒不會以酒式誅賞誅賞作酒之善惡者天官酒人凡事共酒而入于酒府入于酒正之府者是王燕飲之酒酒正當奉之同上漿人掌共王之六飲水漿醴涼醫酏入於酒府王之六飲亦酒正當奉之醴醴清也鄭司農云涼以水和酒也玄謂涼今寒粥若糗飯雜水也酒正不辨水涼者無厚薄之齊同上仲冬乃命大酋秫稻必齊麴蘖必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸酒熟曰酋大酋者酒官之長也於周則為酒人秫稻必齊謂孰成也湛漬也熾炊也火齊腥孰之調也物猶事也差貸謂失誤有善有惡也古者穫稻而漬米麴至春而為酒詩云十月穫稻為此春酒以介眉壽月令庖人掌共六畜六獸六禽辨其名物六畜六牲也始養之曰畜將用之曰牲春秋傳曰卜日曰牲鄭司農云六獸麋鹿熊麕野豕兔六禽雁鶉鷃雉鳩鴿玄謂獸人冬獻狼夏獻麋又內則無熊則六獸當有狼而熊不屬六禽於禽獻及六摯宜為羔豚犢麛雉雁凡鳥獸未孕曰禽司馬膱曰大獸公之小禽私之凡其死生鮮薧之物以共王之膳與其薦羞之物及后世子之膳羞凡計數之薦亦進也備品物曰薦致滋味乃為羞王言薦者味以不褻為尊鄭司農云鮮謂生肉羮謂乾肉凡用禽獻春行羔豚膳膏香夏行腒鱐膳膏臊秋行犢麛膳膏腥冬行鮮羽膳膏羶用禽獻謂煎和之以獻王鄭司農云膏香牛脂也以牛脂和之腒乾雉鱐乾魚膏臊豕膏也以豕膏和之杜子春云膏臊犬膏膏腥豕膏也鮮魚也羽雁也膏羶羊脂也玄謂膏腥雞膏也羔豚物生而肥犢與麛物成而充腒鱐暵熱而乾魚雁水涸而性定此八物者得四時之氣尤盛為人食之弗勝是以用休廢之脂膏煎和膳之牛屬司徒土也雞屬宗伯木也犬屬司冦金也羊屬司馬火也歲終則會唯王及后之膳禽不會膳禽四時所膳禽獻如世子可以會之天官內饔掌王及后世子膳羞之割亨煎和之事辨體名肉物辨百品味之物割肆解肉也亨煮也煎和齊以五味體名脊脅肩臂臑之屬肉物胾燔之屬百品味庶羞之屬言百舉成數王舉則陳其鼎俎以牲體實之取於鑊以實鼎取於鼎以實俎實鼎曰脀實俎曰載選百羞醬物珍物以俟饋先進食之時恆選擇其中御者共后及世子之膳羞膳夫掌之是乃共之辨腥臊羶香之不可食者牛夜鳴則庮羊冷毛而毳羶犬赤股而躁臊鳥皫色而沙鳴貍豕盲眂而交睫腥馬黑脊而般臂螻腥臊羶香可食者是别其不可食者則所謂者皆臭味也冷毛毛長總結也皫失色不澤美也沙澌也交睫腥腥當為星聲之誤也肉有如米者似星般臂臂毛有文鄭司農云𤸈朽木臭也螻螻蛄臭也杜子春云盲眠當為望視凡宗廟之祭祀掌割亨之事凡燕飲食亦如之凡掌共羞修刑膴胖骨鱐以待共膳掌共共當為具羞庶羞也修煆脯也胖如脯而腥者鄭司農云刑膴謂夾脊肉或曰膺肉也骨鱐謂骨有肉者玄謂刑鉶羮也膴䐑肉大臠所以祭者骨牲體也鱐乾魚凡王之好賜肉修則饔入共之好賜王所善而賜也同上亨人掌共鼎鑊以給水火之齊鑊所以煮肉及魚臘之器就孰乃脀于鼎齊多少之量職外內饔之爨亨煮辨膳羞之物職主也爨今之竈主於其爨煮物同上獸人掌罟田獸辨其名物罟罔也以罔摶所當田之獸冬獻狼夏獻麋春秋獻獸物狼膏聚麋膏散聚則溫散則涼以救時之苦也獸物凡獸皆可獻也及狐狸同上漁人掌以時漁為梁月令季冬命漁師為梁鄭司農云梁水偃也偃水為關空以笱承其空詩曰敝笱在梁辨魚物為鮮薧以共王膳羞鮮生也薧乾也同上臘人掌乾肉凡田獸之脯臘膴胖之事大物解肆乾之謂之乾肉若今涼州鳥翅矣薄析曰脯捶之而施薑桂曰鍛修臘小物全乾同上掌畜共膳獻之鳥雉及鶉鴽之屬夏官司士掌擯士者膳其摯擯士告見初為士者於王也鄭司農云膳其摯者王食其所執羔雁之摯玄謂膳者入於王之膳人同上㕓人凡珍異之有滯者斂而入於膳府珍異四時食物也不售而在㕓久則將瘦臞腐敗為買之入膳夫之府所以紓民事而官不失實地官籩人為王及后世子共其內羞於其飲食以共房中之羞天官醢人為王及后世子共其內羞王舉則共醢六十甕以五齊七醢七菹三臡實之齊當為韲五韲昌本脾析蜃豚拍深蒲也七醢醓螺蚳魚免雁醢七菹韭菁茒葵芹菭筍菹三臡麋鹿麕臡也凡醯臡所和細切為韲全物若䐑為菹少儀曰麋鹿為菹野豕為軒皆䐑而不切麋為辟雞兔為宛脾皆䐑而切之切蔥若薤實之醯以柔之由此言之則韲菹之稱菜肉通同上醯人王舉則共齊菹醯物六十甕共后及世子之醬齊菹同上天子之豆二十有六謂天子朔食禮器鹽人掌鹽之政令以共百事之鹽政令謂受入教所處置求者所當得王之膳羞共飴鹽后及世子亦如之飴鹽鹽之甜者今戎鹽有焉凡齊事鬻監以待戒令齊事和五味之事鬻監涷治之天官凌人掌冰春始治鑑鑑如甀大口以盛冰置食物于中以禦溫氣春而始治之為二月將獻羔而啓冰凡外內饔之膳羞鑑焉凡酒漿之酒醴亦如之酒醴見溫氣亦失味酒漿酒人漿人也同上幂人掌共巾幂共巾可以覆物凡王巾皆黼四飲三酒皆畫黼周尚武其用文德則黻可同上大司樂王大食三宥皆令奏鐘鼓大食朔月月半以樂宥食時也宥猶勸也春官天子皮辨以日視朝遂以食日中而餕奏而食日少牢朔月大牢餕食朝之餘也奏奏樂也五飲上水漿酒醴酏上水水為上餘其次之卒食玄端而居年不順成天子食無樂自貶損也諸侯又朝服以食特牲三俎祭肺食必復朝服所以敬養身也三俎豕魚臘夕深衣祭牢肉祭牢肉異於始殺也天子言日中諸侯言夕天子言餕諸侯言祭牢肉互相挾朔月少牢五俎四簋五俎加羊與其腸冒也朔月四簋則日食粱稻各一簋而已子卯稷食菜羮忌日貶也夫人與君同庖不特殺也君無故不殺牛大夫無故不殺羊士無故不殺犬豕故謂祭祀之屬君子逺庖厨凡有血氣之類弗身踐也踐當為剪聲之誤也剪殺也至于八月不雨君不舉為旱變也此謂建子之月不雨盡建未月也春秋之義周之春夏無雨未能成災至其秋秀實之時而無雨則雩雩而得之則書雩喜祀有益也雩而不得則書旱明災成也玉藻歲凶年穀不登君膳不祭肺大夫不食粱士飲酒不樂皆自為貶損憂民也禮食殺牲則祭先有虞氏以首夏后氏以心殷人以肝周人以肺不祭肺則不殺也天子食日少牢朔月大牢諸侯食日特牲朔月少牢粱加食也不樂去琴瑟曲禮大侵之禮君食不兼味襄二十四年穀梁傳司冦行戮司冦刑官君為之不舉去盛饌氏莊二十年左傳天子一食諸侯再大夫士三食力無數一食再食三食謂告飽也食力謂工商農也禮器大夫燕食有膾無脯有脯無膾士不二羮胾庶人耆老不徒食尊卑差也內則羮食自諸侯以下至於庶人無等羮食食之主也庶羞亦異耳大夫無秩膳謂五十始命未甚老也秩常也大夫七十而有閣有秩膳也閣以板為之庋食物也天子之閣左達五右達五公侯伯於房中五大夫於閣三士於坫一達夾室大夫言於閣與天子同處天子二五倍諸侯也五者三牲之肉及魚䐗也同上飯目諸飯也漆稷稻粱白黍黃粱稰穛孰穫曰稰生穫曰穛黍黃黍也膳目諸膳也膷臐膮醢牛炙醢牛胾醢牛膾羊炙羊胾醢豕炙醢豕胾芥醬魚膾雉兔鶉鷃此上大夫之禮庶羞二十豆也以公食大夫禮校之則膮牛炙間不得有醢醢衍字也又以鷃為鴽也飲目諸飲也重醴稻醴清糟黍醴清糟梁醴清糟重倍也糟醇也清泲也致飲有醇者有泲者陪設之也或以酏為醴醴粥為醴黍酏酏粥漿酢胾水清耕醷梅漿濫以諸和水也以周禮六飲校之則濫涼也紀莒之間名諸為濫酒目諸酒也清白白事酒昔酒也羞目諸羞也糗餌粉酏糗搗熬穀也以為粉餌與餈此記似脫周禮羞籩之實粉餌粉餈羞豆之實酏食慘食此酏當為餰以稻米與狼臅膏為餰是也食食飯也日人君燕食所用也蝸醢而苽食雉羮麥食脯羮雞羮折稌犬羮兔羮和糝不蓼苽雕胡也稌稻也几羮齊宜五味之和米屑之糝蓼則不矣此脯所謂析乾牛羊肉也濡豚包苦實蓼濡雞醢醬實蓼濡魚卵醬實蓼濡鱉醢醬實蓼凡濡謂亨之以汁和也苦苦荼也以包豚殺其氣卯讀為鯤鯤魚子或作椚也腵修蚳醢腵修捶脯施薑桂也蚳蚍蜉子也脯羮免醢麋膚魚醢魚膾芥醬麋腥醢醬桃諸梅諸卵監自蝸醢至此二十六物似皆人君燕所食也其饌則亂膚切肉也膚或為胖卵鹽大鹽也凡食齊視春時飯宜溫也羮齊視夏時羮宜熱也醬齊視秋時醬宜涼也飲齊視冬時飲宜寒也凡和春多酸夏多苦秋多辛冬多醎調以滑甘多其時味以養氣也牛宜稌羊宜麥豕宜稷犬宜梁雁宜麥魚宜苽言宜氣味相成也春宜羔豚膳膏薌夏宜腒鱐膳膏臊秋宜犢麛膳膏腥冬宜鮮羽膳膏羶此八物四時肥美也為其大盛煎以休廢之膏節其氣也牛膏薌犬膏臊雞膏腥羊膏羶腒乾雉也鱐乾魚也鮮生魚也羽雁也牛修鹿脯田豕脯麋脯麕脯麋鹿田豕麕皆有軒雉兔皆有芼脯皆析乾其肉也軒讀為憲謂藿葉切也芼謂菜釀也軒或為胖爵鷃蜩范蜩蟬也范蜂也芝栭蓤椇棗栗榛柿瓜桃李梅杏椇梨薑桂菱芰也椇枳椇也椇梨之不臧者自牛修至此三十一物皆人君燕食所加庶饈也周禮天子羞用百有二十品記者不能次録膾春用蔥秋用芥豚春用韭秋用蓼芥芥醬也脂用蔥膏用薤脂肥凝者釋者曰膏三牲用藙和用醯藙煎茱萸也漢律會稽獻焉爾雅謂之榝和用醯者畜與家物自相和也獸用梅亦野物自相和鶉羮雞羮鴽釀之蓼釀謂切雜之也鴽在羮下蒸之不羮也魴鱮蒸雛燒雉薌無蓼薌蘇荏之屬也燒煙於火中也自膾用蔥至此言調和菜釀之宜也不食雛鱉狼去腸狗去腎貍去正脊兔去尻狐去首豚去腦魚去乙鱉去醜皆為不利人也雛鱉伏乳者乙魚體中害人者名也今東海鰫魚有骨名乙在目傍狀如篆乙食之鯁人不可少醜謂鱉竅也肉曰脫之魚曰作之棗曰新之栗曰撰之桃曰膽之椇梨曰攢之皆治擇之名也牛夜鳴則庮羊冷毛而毳羶狗赤股而躁臊鳥皫色而沙鳴鬱豕望視而交睫腥馬黑脊而般臂漏雛尾不盈握弗食舒雁翠鵠梟胖舒鳬翠雞肝雁腎鴇奧鹿胃亦皆為不利人也庮惡臭也春秋傳曰一薰一庮冷毛毳毛别聚於不解者也赤般股襄無毛也皫色毛變色也沙猶嘶也鬱腐臭也望視逺視也腥當為星聲之誤也星肉中如米者般臂前腥般般然也漏當為螻如蛄螻臭也舒雁鵝也翠尾肉也鵠梟胖謂脅側薄肉也舒鳬鵝也鴇奧脾肶也鵠或為鴇也肉腥細者為膾大者為軒言大切細切異名也膾者必先軒之所謂聶而切之也或曰麋鹿魚為菹麕為辟雞野豕為軒兔為宛脾切蔥若薤實諸醯以柔之此軒辟雞宛脾皆菹類也釀菜而柔之以醯殺腥肉及其氣今益州有鹿者近由此為之矣菹軒聶而不切辟雞宛脾聶而切之軒或為胖宛或作鬱同上淳熬煎醢加於陸稻上沃之以膏曰淳熬淳沃也熬亦煎也沃煎成之以為名淳毋煎醢加於黍食上沃之以膏曰淳毋毋讀曰模模象也作此象淳熬炮取豚若將刲之刳之實棗於其腹中編萑以苴之塗之以謹塗炮之塗皆乾擘之濯手以摩之去其皽為稻粉糔溲之以為酏以付豚煎諸膏膏必滅之巨鑊湯以小鼎薌脯於其中使其湯毋滅鼎三日三夜毋絶火而后調之以醯醢炮者以塗燒之為名也將當為牂牂牝羊也刲刳博異語也謹當為墐聲之誤也墐塗塗有穰草也皽謂皮肉之上魄草也糔溲亦博異語也糔讀與滫瀡之滫同薌脯謂煮豚若羊於小鼎中使之香美也謂之脯者既去皽則解析其肉使薄如為脯然唯豚全耳豚羊入鼎三日乃內醯醢可食也搗珍取牛羊麋鹿麕之肉必脄每物與牛若一捶反側之去其餌孰出之去其皽柔其肉膠脊側肉也捶搗之也餌筋膄也柔之為汁和也汁和亦醯醢與漬取牛肉必新殺者薄切之必絶其理湛諸美酒期朝而食之以醢若醯醷湛亦漬也為熬捶之去其皽編萑布牛肉焉屑桂與薑以灑諸上而鹽之乾而食之施羊亦如之施麋施鹿施麕皆如牛羊欲濡肉則釋而煎之以醢欲乾肉則捶而食之熬於火上為之也今之火脯似矣欲濡欲乾人自由也醢或為醯此七者周禮八珍其一肝膋是也糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之此周禮糝食也肝膋取狗肝一幪之以其膋濡炙之舉燋其膋不蓼膋腸問脂舉或為巨取稻米舉糔溲之小切狼臅膏以與稻米為酏狼臅膏臆中膏也以煎稻米則似今膏􅖸矣此周禮酏食也此酏當從餰同上右膳羞王者所以日食何明有四方之物食四時之功也四方不平四時不順有徹樂之法焉所以鳴至尊著法戒也王平居中央制御四方平旦食少陽之始也晝食太陽之始也晡食少陰之始也暮食太陰之始也論語曰亞飯干適楚三飯繚適蔡四飯缺適秦諸侯三飯卿大夫再飯尊卑之羞也禮保傳曰王失度宰夫徹其膳宰所以徹膳何陰陽不調五穀不熟故王者為不盡味而食之禮曰一穀不升不僃雞鷃二穀不升不備三牲白虎通天子玄端聽朔於南門之外閏月則闔門左扉立于其中端當為冕字之誤也玄衣而冕冕服之下南門謂國門也天子廟及路寢皆如明堂制明堂在國之陽每月就其時之堂而聽朔焉卒事反宿路寢亦如之閏月非常月也聽其朔於明堂門中還處路寢門終月凡聽朔必以特牲告其帝及神配以文王武王玉藻孟春天子居青陽左個青陽左個大寢東堂北偏仲春天子居青陽大廟青陽大廟東堂大室季春天子居青陽右個青陽右個東堂南偏孟夏天子居明堂左個明堂左個大寢南堂東偏也仲夏天子居明堂大廟南堂大廟南堂當大室也季夏天子居明堂右個明堂右個南堂西偏也中央土天子居大廟大室大廟大室中央室也孟秋天子居總章左個總章左個大寢西堂南偏仲秋天子居總章大廟總章大廟西堂當大室也季秋天子居總章右個總章右個西堂北偏孟冬天子居玄堂左個玄堂左個北堂西偏也仲冬天子居玄堂大廟玄堂大廟北堂當大室季冬天子居玄堂右個玄堂右個北堂東偏月令太史頒告朔于邦國天子頒朔于諸侯諸侯藏之祖廟至朔朝于廟告而受行之鄭司農云頒讀為班班布也以十二月朔布告天下諸侯故春秋傳曰不書日官失之也閏月詔王居門終月門謂路寢門也鄭司農云月令十二月分在青陽明堂總章玄堂左右之位惟閏月無所居居于門故于文王在門謂之門春官諸侯皮辨以聽朔于大廟皮辨下天子也玉藻右聽朔文公六年閏月不告月猶朝於廟杜曰諸侯每月必告朔聽政因朝宗廟文公以閏非常月故闕不告朔怠慢政事雖朝于廟則如勿朝故曰猶猶者可止之詞每何曰諸侯受十二月朔政于天子藏于大祖廟月朔朝廟使大夫南面奉天子命君北面而受之此時使有司先告朔慎之至也受于廟者孝子歸美先君不敢自専也言朝者緣生以事死親在朝朝暮夕已死不敢泄鬼神故也必於朔者感月始生而朝也春秋閏月不告朔非禮也經稱告月傳稱告朔明告月必以朔閏以正時四時漸差則置閏以正之時以作事順時命事事以厚生事不失時則年豐生民之道於是乎在矣不告閏朔棄時政也何以為民左氏傳曷為不告朔據具月也天無是月也何以謂之天無是月非常月也所在無常故無政也猶者何通可以已也朝者因視朔政爾無政而朝故曰猶不言朔者閏月無告朔禮也不言公者內事可知公羊傳不告月者不告朔也禮天子以十二月朔政班告于諸侯諸侯受於禰廟孝子尊事先君不敢自専也言朝者緣生以事死親存朝朝暮夕不敢泄鬼神故事畢感月始而朝之不告朔則何為不言朔也閏月者附月之餘日也積分而成於月者也一歲三百六十日餘六日又有小月六積五歲得六十日而再閏積衆月之餘分以成此月天子不以告朔而喪事不數也閏是叢殘之數非月之正故吉凶大事皆不用也猶之為言可以已也郊然後三望告朔然後朝廟俱言猶義相類也既廢其大而行其細故譏之穀粱傳文公十六年夏五月公四不視朔諸侯每月必告朔聽政因朝于廟今公以疾闕不得視二月三月四月五月朔也春秋十二公以疾不視朔非一也義無所取故特舉此以表行事因明公之實有疾非詐齊春秋疾也左氏傳公曷為四不視朔據無事也公有疾也以不諱舉公知有疾公有疾乃復舉公是也何言乎公有疾不視朔據有疾無惡也自是公無疾不視朔也有疾無惡不當書又不言有疾者欲起公自是無疾不視朔也然則曷為不言公無疾不視朔有疾猶可言也無疾不可言也言無疾大惡不可言也是後公不復視朔政事委任公子遂公羊傳天子告朔于諸侯諸侯受乎禰廟禮也每月天子以朔政班于諸侯諸侯受而納之禰廟告廟以羊今公自二月不視朔至於五月是後視朔之禮遂廢故子貢欲去其羊公四不視朔公不臣也以公為厭政已甚矣天子班朔而公不視是不臣傳穀粱襄公二十九年春王正月公在楚釋不朝正于廟也釋解也告朔在楚解公所以不朝正春秋左氏傳子貢欲去告朔之犧羊告朔之禮古者天子常以季冬頒來歲十二月之朔于諸侯諸侯受而藏之祖廟月朔則以時羊告廟請而行之犧生牲也魯自文公始不視朔而有司猶供此羊故子貢欲去也子曰賜也爾愛其羊我愛其禮愛猶惜也子貢蓋惜其無實而妄費然禮雖廢羊存猶得以識之而可復焉若并去其羊則此禮遂亡矣孔子所以惜之楊氏曰告朔諸侯所以稟命於君親禮之大者魯不視朔矣然羊存則告朔之名未泯而其實自可舉此夫子所以惜之也論語舍人以歲時縣穜稑之種以供王后之春獻禮縣之者欲其風氣燥達也鄭司農云春王當耕于籍則后獻其種也后獻其種見內宰職地官內宰上春詔王后帥六宮之人而生穜稑之種而獻之于王六宮之人夫人以下分居后之六宮者古者使后宮藏種以其有傳類蕃孶之祥必生而獻之示能育之使不傷敗且以佐王耕事共禘郊也鄭司農云先種後孰謂之穜後種先孰謂之稑王當以耕種于藉田玄謂詩云黍稷穜稑是也夫人以下分居后之六宮者每宮九嬪一人世婦三人女御九人其餘九嬪三人世婦九人女御二十七人從后唯其所燕息焉從后者五日而沐浴其次又上十五日而遍云夫人如三公從容論婦禮天官孟春乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉天子三推三公五推卿諸侯九推元辰蓋郊後吉辰也耒耜之上曲也保介車右也置耒於車右與御者之間明已勸農非農者也人君之車必使勇士衣甲居右而參乘備非常也保猶衣也介甲也帝藉為天神借民力所治之田也反執爵于大寢三公九卿諸侯大夫皆御命曰勞酒既耕而宴欲以勞羣臣也大寢路寢御侍也月令甸師掌帥其屬而耕耨王藉以時入之以共齍盛其屬府史胥徒也耨藝芓也王以孟春躬耕帝藉天子三推三公五推卿諸侯九推庶人終於千畝庶人謂徒三百人藉之言借也王一耕之而使庶人藝芓終之齍盛祭祀所用穀也粢稷也穀者稷為長是以名云在器曰盛天官季秋乃命冡宰農事備收備猶盡也舉五榖之要定其祖稅之薄藏帝藉之收於神倉祗敬必飭重黍稷之委也帝藉所耕千畝也藏祭祀之穀為神倉祗亦敬也月令天子親耕以共粢盛天子親耕其禮三推黍稷曰粢在器曰盛甸粟而內之三宮三宮米而藏之御廩甸甸師掌田之官也三宮三夫人也宗廟之禮君親割夫人親舂桓十四年穀梁傳天子為藉千畝冕而朱紘躬秉耒諸侯為藉百畝冕而青紘躬秉耒以事天地山川社稷先古以為醴酪齊盛於是乎取之藉藉田先古先祖祭義天子親耕於南郊以共齊盛諸侯耕於東郊亦以共齊盛齊或作粢東郊少陽諸侯象統祭右耕藉耕藉然後諸侯知所以敬耕藉藉田也樂記耕藉所以教諸侯之養也祭義王者所以親耕后親桑何所以率天下農蠶也耕於東郊何東方少陽農事始起桑於西郊西方少陰女功所成故曾子問曰天子耕東田而三反之白虎通天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也祭統宣王即位不藉千畝藉借也借民力以為之天子藉田千畝諸侯百畝自厲王之流藉田禮廢宣王即位不復遵古虢文公諫曰賈侍中云文公文王母弟虢仲之後為王卿士昭謂虢叔之後西虢也宣王都鎬在畿內不可夫民之大事在農穀民之命故農為大事上帝之粢盛於是乎出出於農也器實曰粢在器曰盛民之蕃庶於是乎生蕃息也庶衆也事之共給於是乎在共具也給足也和協輯睦於是乎興協合也輯聚也睦親也財用蕃殖於是乎始殖長也敦厖純固於是乎成敦厚也厖大也是故稷為大官民之大事在農故稷之職為大官古者大史順時覛土覛視也陽疸憤盈土氣震發疸厚也憤積也盈滿也震動也發起也農祥晨正農祥房星也晨正謂立春之日晨中於午也農事之候故曰農祥日月底於天廟底至也天廟營室也孟春之月日月皆在營室土乃脈登脈理也農書曰春土冒陳根可拔耕者急發先時九日先先立春日也太史告稷曰自今至於初吉初吉二月朔日也詩云二月初吉陽氣俱蒸土膏其動蒸升也土膏潤也其動潤澤欲行弗震弗渝脈其滿眚榖乃不殖震動也渝變也眚災也言陽氣俱升土膏欲動當即發動變寫其氣不然則脈滿氣結更為災病穀乃不殖稷以告以大史之言告王王曰史帥陽官以命我司事史大史陽官春官司事主農事官也曰距今九日土其俱動距去也王其祗祓監農不易祇敬也祓齊戒祓除也不易不易物土之宜王乃使司徒咸戒公卿百吏庶民百吏百官也庶民甸師氏所掌之民主耕耨王之藉田者司空除壇于藉司空掌地也命農大夫咸戒農用農大夫田畯也農用田器也先時五日先耕時也瞽告有協風至瞽樂大師知風聲者協和也風氣和時候至也立春曰融風王即齋宮所齋之宮百官御事各即其齋三日御治也王乃淳濯饗醴淳沃也濯溉也饗飲也謂王沐洽飲醴酒及期期耕日也鬱人薦鬯鬱鬱金香草宜以和鬯酒也周禮鬱人掌祼器凡祭祀賓客和鬱鬯以實彜而陳之共王之齊鬯犧人薦醴犧人司尊也掌共酒醴者王裸鬯饗醴乃行裸灌也灌鬯飲醴皆所以自香潔百吏庶民畢從及藉后稷監之監察也膳夫農正陳藉禮膳夫上士也掌王之飲食膳羞之饋食農正田大夫主敷陳藉禮而祭其神為農祈也太史贊王贊道也王敬從之王耕一墢一墢一耜之墢也王無耦以一耜耕班三之班次也三之下各三其上也王一墢公三卿九大夫二十七庶人終于千畝終盡耕也其后稷省功大史監之司徒省民大師監之畢宰夫陳饗膳宰監之宰夫下大夫也膳宰膳夫也膳夫贊王王歆大牢歆饗也班嘗之公卿大夫也庶人終食終畢也是日也瞽帥音官以省風土音官樂官也風土以音律省土風風氣和則土氣養廩于藉東南鍾而藏之廪御廩一名神倉東南生長之處鍾聚也謂為廩以藏王所藉田以奉齍盛而時布之于農布賦也稷則遍戒百姓紀農協功紀猶綜理也協同也曰陰陽分布震雷出滯隂陽分日夜同也滯蟄蟲乃發聲始也明堂月令曰日夜分雷電蟄蟲咸動啓户始出土不備墾辟在司冦墾發也辟罪也在司冦司冦行其罪乃命其旅曰徇旅衆也徇行也農師一之一之先之也農師上士農正再之農正后稷之佐田畯也故次農師后稷三之后稷農官之長故次農正司空四之司空主道路溝洫故次后稷司徒五之司徒省民故次司空大保六之大師七之犬保大師天子三公佐王論道泛監衆官不特掌事故次司徒大史八之太史掌逆官府之治故次大師宗伯九之宗伯卿官掌相王之大禮若王不與祭則攝位故次太史王則大徇大徇率公卿大夫親行農也耨穫亦如之如之如耕時也民用莫不震動恪恭于農用謂田器也修其疆畔日服其鎛不解于時疆境也畔界也鎛鋤屬財用不乏民用和同是時也王事唯農是務無有求利於其官以干農功求利謂變易役使干亂農功三時務農而一時講武三時春夏秋一時冬也講習也故征則有威守則有財若是乃能媚於神媚説也而和於民矣則享祀時至而布施優裕也優饒也裕緩也今天子欲修先王之緒而棄其大功匱神之祀而困民之財匱神之祀不耕藉也困民之財取財用也將何以求福用民王弗聽三十九年戰于千畝王師敗績于薑氏之戎言宜王不納練務農無以事神使民以致弱敗之咎國語周語仲山甫曰王治農于藉藉藉於千畝田也耨穫亦於藉言王亦至於藉考課之是皆習民數者也習簡習也上同禮書綱目卷六十一
