body:
  text: 禮書綱目卷六十二婺源江永撰政事上通禮十一補洪範九疇次三曰農用八政八政曰農所以厚生也三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司寇七曰賓八曰師食者民之所急貨者民之所資故食為首而貨次之食貨所以養生也祭祀所以報本也司空掌上所以安其居也司徒掌教所以成其性也司寇掌禁所以治其姦也賓者禮諸侯逺人所以往來交際也帥者除殘禁暴也兵非聖人之得已故居末也洪範司徒齊八政以防淫八政飲食衣服事為異别度量數制飲食為上衣服次之事為百工技藝也異别五方用器不同也度丈尺也量斗斛也數百十也制布帛幅廣狹也王制乃立天官冡宰使帥其屬而掌邦治以佐王均邦國掌主也邦治王所以冶邦國也佐猶助也鄭司農云邦治謂總六官之職也故太宰職曰掌建邦之六典以佐王治邦國六官皆總屬於冡宰故論語曰君薨百官總已以聽於冡宰言冡宰於百官無所不主爾雅曰冡大也冡宰大宰也大宰之職掌建邦之六典以佐王治邦國一曰治典以經邦國以治官府以紀萬民二曰教典以安邦國以教官府以擾萬民三曰禮典以和邦國以統百官以諧萬民四曰政典以平邦國以正百官以均萬民五曰刑典以詰邦國以刑百官以紏萬民六曰事典以富邦國以任百官以生萬民大曰邦小曰國邦之所居亦曰國典常也經也法也王謂之禮經常所秉以治天下也邦國官府謂之禮法常所守以為法式也常者其上下通名擾猶馴也統猶令也詰猶禁也書曰度作詳刑以詰四方任猶倳也生猶養也鄭司農云治典冡宰之職故立其官曰使帥其屬而掌邦治以佐王均邦國教典司徒之職故立其官曰使帥其屬而掌邦教以佐王安擾邦國禮典宗伯之職故立其官曰使帥其屬而掌邦禮以佐王和邦國政典司馬之職故立其官曰使帥其屬而掌邦政以佐王平邦國刑典司寇之職故立其官曰使帥其屬而掌邦禁以佐王刑邦國此三時皆有官惟冬無官又無司空以三隅反之則事典司空之職也司空之篇亡小宰職曰冬官其屬六十掌邦事以八法治官府一曰官屬以舉邦治二曰官職以辨邦治三曰官聫以㑹官治四曰官常以聽官治五曰官成以經邦治六曰官法以正邦治七曰官刑以糾邦治八曰官計以弊邦治注見職官下篇以八則治都鄙一曰祭祀以馭其神二曰法則以馭其官三曰廢置以馭其吏四曰祿位以馭其士五曰賦貢以馭其用六曰禮俗以馭其民七曰刑賞以馭其威八曰田役以馭其衆注見封建正月之吉始和布治于邦國都鄙乃縣治象之法于象魏使萬民觀治象挾日而斂之注見周月乃施典于邦國詳見職官下施則于都鄙詳見職官下施法于官府詳見職官上凡治以典待邦國之治以則待都鄙之治以法待官府之治以官成待萬民之治以禮待賓客之治成八成禮賓禮也凡邦之小治則冡宰聽之大事決於王小事冡宰專平天官小宰掌邦之六典八法八則之二以逆邦國都鄙官府之治逆迎受之鄭司農云二副也同上司㑹掌邦之六典八法八則之二以逆邦國都鄙官府之治逆受而鉤考之同上司書掌邦之六典八法八則九職九正九事注見財賦篇同上大史掌建邦之六典以逆邦國之治掌法以逆官府之治掌則以逆都鄙之治典則亦法也逆迎也六典八法八則冡宰所建以治百官大史又建焉以為王迎受其治也大史日官也春秋傳曰天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官于朝居猶處也言建六典以處六卿之職凡辨法者考焉不信者刑之謂邦國都鄙官府以法爭訟來正之者春官內史執國法及國令之二以考政事以逆㑹計國法六典八法八則同上御史掌邦國都鄙及萬民之治令以贊冡宰王所以治之令冡宰掌王治凡治者受法令焉為書寫其治之法令來受則授之同上匡人掌達法則匡邦國法則八法八則也邦國之官府都鄙亦用焉夏官大行人十有一嵗修法則法八法也則八則也周官凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懷諸侯也經常也體謂設以身處其地而察其心也子如父母之愛其子也柔逺人所謂無忘賓旅者也此列九經之目也吕氏曰天下國家之本在身故修身為九經之本然必親師取友然後修身之道進故尊賢次之道之所進莫先其家故親親次之由家以及朝廷故敬大臣體羣臣次之由朝廷以及其國故子庶民來百工次之由其國以及天下故柔逺人懷諸侯次之此九經之序也視羣臣猶吾四體視百姓猶吾子此視臣視民之別也中庸右總要聖人南面而聽天下所宜先者五民不與焉宜先言未遑餘事一曰治親二曰報功三曰舉賢四曰使能五曰存愛功功臣也存察也察有仁愛也五者一得於天下民無不足無不贍者五者一物紕繆民莫得其死物猶事也紕繆猶錯也五事得則民足一事失則民不得其死明政之難聖人南面而治天下必自人道始矣人道謂此五事大傳孔子侍坐於哀公哀公曰敢問人道誰為大孔子對曰人道政為大公曰敢問何謂為政孔子對曰政者正也君為政則百姓從政矣君之所為百姓之所從也君所不為百姓何從言君當務於攻公曰敢問為政如之何孔子對曰夫婦别父子親君臣嚴三者正則庶物從之矣庶物猶衆事也公曰寡人雖無似也願聞所以行三言之道可得聞乎無似猶言不肖孔子對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大大昏至矣大昏既至冕而親迎親之也親之也者親之也是故君子興敬為親舍敬是遺親也弗愛不親弗敬不正愛與敬其政之本與大昏國君取禮也至矣言至大也興敬為親言相敬則親孔子遂言曰昔三代明王之政必敬其妻子也有道妻也者親之主也敢不敬與子也者親之後也敢不敬與君子無不敬也敬身為大身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本傷其本枝從而亡三者百姓之象也身以及身子以及子妃以及妃君行此三者則愾乎天下矣大王之道也如此則國家順矣愾猶至也大王居豳為狄所伐乃曰土地所以養人也君子不以其所養害所養乃去之岐是言百姓之身猶吾身也百姓之妻子猶吾妻子也不忍以土地之故而害之去之岐而王迹興焉公曰敢問何謂敬身孔子對曰君子過言則民作辭過動則民作則君子言不過辭動不過則百姓不命而敬恭如是則能敬其身能敬其身則能成其親矣則法也民者化若者也君之言雖過民猶稱其辭君之行雖過民猶以為法公曰敢問何謂成親孔子對曰君子也者人之成名也百姓歸之名謂之君子之子是使其親為君子也是為成其親之名也已孔子遂言曰古之為政愛人為大不能愛人不能有其身不能有其身不能安土不能安土不能樂天不能樂天不能成其身有猶保也不能保身者言人將害之也不能安土動移失業也不能樂天不知已過而怨天也公曰敢問何謂成身孔子對曰不過乎物物猶事也仁人不過乎物孝子不過乎物是故仁人之事親也如事天事天如事親是故孝子成身物猶事也事親事天孝敬同也孝經曰事父孝故事天明舉無過事以孝事親是所以成身哀公問衛文公大布之衣大帛之冠大布粗布大帛厚繒蓋用諸侯諒閽之服務財訓農通商惠工加惠於百姓賞其利器用敬教勸學授方任能方百事之宜也元年革車三十乘季年乃三百乘革車兵車季年在僖二十五年蓋招懷逃散故能致十倍之衆閔二年左傳晉文公屬百官賦職任功屬會也賦授也授職事任有功也棄責薄斂施舍分寡棄責除宿責也施施德也舍舍禁也分寡分少財也救乏振滯匡困資無救乏救乏絶也振拯也拯淹滯之士匡正也正困窮之人資無子無財者輕關易道通商寬農輕關輕其稅也易道除盜賊也通商利商旅也寬農寬其政不奪其時茂穡勸分省用足財茂穡勉稼穡也勸分勸有分無也省用减國用也足財備凶年也利器明德以厚民性利器利器用也明德明德教也厚民性厚其情性舉善授能官方定物方常也物事也立其常官以定百事正名育類正名正上下服位之名育長也類善也昭舊族昭明也舊族舊臣有功者之族愛親戚眀賢良明顯也尊貴寵國之貴臣尊寵之賞功勞事耉老禮賓旅旅客也友故舊故舊為公子時也胥籍狐箕欒郤伯先羊舌董韓實掌近官十一族晉之舊姓近官朝廷者諸姬之良掌其中官諸姬同姓也中官內官也異姓之能掌其逺官逺官縣鄙也公食貢大夫食邑士食田受公田也庶人食力各食其力工商食官工百工商官賈也周禮府藏皆有賈人以知物賈食官官廪之皂𨽻食職士臣皂皂臣輿輿臣隸食職各以其職大小食祿也官宰食加官宰家臣也加大夫之家田也論語曰原憲為家邑宰政平民阜財用不匱阜安也語國語晉趙宣子為國政宣趙盾諡制事典典常也正法罪輕重當辟刑獄辟猶理也董逋逃董督也由質要由用也質要券契也治舊汙治理汙穢本秩禮貴賤不失其本續常職修廢官出滯淹拔賢能也既成以授大傅陽子與大飾賈他使行諸晉國以為常法文六年左氏傳晉悼公即位於朝始命百官始為政施舍已責施恩惠舍勞役止逋責逮鰥寡惠及微振廢滯起舊德匡乏困救災患匡亦救也禁淫慝薄賦斂宥罪戾宥寬也節器用節省也時用民使民以時欲無犯時不縱私欲舉不失職官不易方官守其業無相踰易爵不踰德量德授爵師不陵正旅不逼師正軍將命卿也師二千五百人之帥也旅五百人之帥也言上下有禮不相陵逼民無謗言所以復霸也成十八年左傳子産為政使都鄙有章國都及邉鄙車服尊卑各有分部上下有服公卿大夫服不相踰田有封洫封彊也洫溝也廬井有伍廬舍也九夫為井使五家相保大人之忠儉者謂卿大夫從而與之汰侈者因而斃之因其有罪而斃踣之從政一年輿人誦之曰取我衣冠而褚之褚畜也奢侈者畏法故畜藏取我田疇而伍之孰殺子産吾其與之並畔為疇及三年又誦之曰我有子弟子産誨之我有田疇子産殖之殖生也子産而死誰其嗣之嗣續也傳言鄭所以興襄三十年左傳孔子初仕為中都宰制為養生送死之節長幼異食强弱異任男女别塗路無拾遺器不雕僞為四寸之棺五寸之椁因丘陵為墳不封不樹行之一年而四方諸侯則焉定公謂孔子曰學子此法以治魯國何如孔子對曰雖天下可也何但魯國而已哉家語大宰以八統詔王馭萬民一曰親親二曰敬故三曰進賢四曰使能五曰保庸六曰尊貴七曰達吏八曰禮賓統所以合率以等物也親親若堯親九族也敬故不慢舊也晏平仲久而敬之賢有善行也能多才藝者保庸安有功者尊貴尊天下之貴者孟子曰天下之達尊者三曰爵也德也齒也祭義曰先王之所以治天下者五貴有德貴貴貴老敬長慈幼達吏察舉勤勞之小吏也禮賔賔客諸侯所以示民親仁善鄰以九職任萬民一曰三農生九穀二曰園圃育草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚斂疏材九曰閒民無常職轉移執事任猶倳也鄭司農云三農平地山澤也九榖黍稷秫稻麻大小豆大小麥八材珠曰切象曰瑳玉曰琢石曰磨木曰刻金曰鏤革曰剝羽曰析閒民謂無事業者轉移為人執事若今傭賃也𤣥謂三農原隰及平地九榖無秫大麥而有粱瓜樹果蓏曰圃園其樊也虞衡掌山澤之官主山澤之民者澤無水曰藪牧牧田在逺郊皆畜牧之地行曰商處曰賈阜盛也金玉曰貨布帛曰賄嬪婦人之美稱也堯典曰釐降二女嬪于虞臣妾男女貧賤之稱晉惠公卜懷公之生曰將生一男一女男為人臣女為人妾生而名其男曰圉女曰妾及懷公質於秦妾為宦女焉疏材百草根實可食者疏不熟曰饉以九兩繫邦國之民一曰牧以地得民二曰長以貴得民三曰師以賢得民四曰儒以道得民五曰宗以族得民六曰主以利得民七曰吏以治得民八曰友以任得民九曰藪以富得民兩猶耦也所以協耦萬民繫聫綴也牧州長也九州各有封域以居民也長謂侯也一邦之貴民所仰也師諸侯師氏有德行以教民者儒諸侯保氏有六藝以教民者宗繼别為大宗收族者鄭司農云主謂公卿大夫世世食采不絶民稅薄利之𤣥謂利讀如上思利民之利謂以政教利之吏小吏在鄉邑者友謂同井相合耦鋤作者孟子曰鄉田同井出入相友守望相助疾病相扶持則百姓親睦藪亦有虞掌其政令為之厲禁使其地之民守其材物以時入于王府頒其餘於萬民富謂藪中材物天官大司徒以保息六養萬民一曰慈幼二曰養老三曰振窮四曰恤貧五曰寬疾六曰安富保息謂安之使蕃息也慈幼謂愛幼少也産子三人與之母二人與之餼十四以下不從征養老七十養於鄉五十異粻之屬振窮拯救天民之窮者也窮者有四曰矜曰寡曰孤曰獨恤貧貧無財業禀貸之寬疾若今癃不可事不算卒可事者半之也安富平其繇役不専取以本俗六安萬民一曰􅍇宫室二曰族墳墓三曰聫兄弟四曰聫師儒五曰聫朋友六曰同衣服本猶舊也媺善也謂約椓攻堅風雨攸除各有攸宇族猶類也同宗者生相近死相迫聨猶合也兄弟昏姻嫁娶也師儒鄉里教以道藝者同師曰朋同志曰友同猶齊也民雖有富者衣服不得獨異頒職事十有二于邦國都鄙使以登萬民一曰稼穡二曰樹藝三曰作材四曰阜蕃五曰飭材六曰通財七曰化材八曰斂材九曰生材十曰學藝十有一曰世事十有二曰服事鄭司農云稼穡謂三農生九穀也樹藝謂園圃育草木作材謂虞衡作山澤之材阜蕃謂藪牧養蕃鳥獸飭材謂百工飭化八材通財謂商賈阜通貨賄化材謂嬪婦化治絲枲斂材謂臣妾聚斂疏材生材謂閒民無常職轉移執事學藝謂學道藝世事謂以世事教能則民不失職服事謂為公家服事者𤣥謂生材養竹木者地官土均掌平土地之政以均地守以均地事以均地貢政讀為征所平之稅邦國都鄙也地守虞衡之屬地事農圃之職地貢諸侯之九貢以和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地􅍇惡為輕重之法而行之掌其禁令施讀為弛也禮俗邦國都鄙民之所行先王舊禮也君子行禮不求變俗隨其土地厚薄為之制豐省之節耳禮器曰禮也者合於天時設於地財順於鬼神合於人心理於萬物同上右通言民政禹曰德惟善政政在養民水火金木土榖惟修正德利用厚生惟和九功惟叙九叙惟歌戒之用休董之用威勸之以九歌俾勿壞德非徒善而已惟當有以善其政政非徒法而已在乎有以養其民下文六府三事即養民之政也水火金木土榖惟修者水克火火克金金克木木克土而生五榖或相制以泄其過或相助以補其不足而六者無不修矣正德者父慈子孝兄友弟恭夫義婦聽所以正民之德也利用者工作什器商通貨財之類所以利民之用厚生者衣帛食肉不飢不寒之類皆所以厚民之生也六者既修民生始遂不可以逸居而無教故為之惇典敷教以正其德通功易事以利其用制節謹度以厚其生使皆當其理而無所乖則無不和矣九功合六與三也叙者言九者各順其理而不汨陳以亂其常也歌者以九功之叙而詠之歌也言九者既已修和各由其理民享其利莫不歌詠而樂其生也然始勤終怠者人情之常恐安養既久怠心必生則已成之功不能必其久而不廢故當有以激勵之如下文所云也董督也威古文作畏其勤於是者則戒喻而休美之其怠於是者則督責而懲戒之然又以事之出於勉强者不能久故復即其前日歌詠之言協之律吕播之聲音用之鄉人用之邦國以勸相之使其歡欣鼓舞趨事赴功不能自已而前日之成功得以久存而不壞此周禮所謂九德之歌九韶之舞而太史公所謂佚能思初安能惟始沐浴膏澤而歌詠勤苦者也大禹謨大司徒以土宜之法辨十有二土之名物以相民宅而知其利害以阜人民以蕃鳥獸以育草木以任土事十二土分野十二邦上繫十二次各有所宜也相占視也阜猶盛也蕃蕃息也育生也任謂任地所生因民所能地官司空掌邦土居四民時地利冬官卿主國空土以居民士農工商四人使順天時分地利授之土能吐生百穀故曰土周官司空執度度地司空冬官卿掌邦事者度丈尺也居民山川沮澤時四時觀寒暖燥濕沮謂萊沛量地逺近制邑井之處興事任力事謂築邑廬宿市也凡居民材必因天地寒暖燥濕使其材藝堪地氣也廣谷大川異制謂其形象民生其間者異俗謂其所好惡剛柔輕重遲速異齊謂其情性緩急五味異和謂香臭與鹹苦器械異制謂作務之用衣服異宜謂氊裘與絺綌修其教不易其俗齊其政不易其宜教謂禮義政謂刑禁王制凡居民量地以制邑度地以居民地邑民居必參相得也得猶足也無曠土無游民食節事時民咸安其居樂事勸功尊君親上然後興學立小學大學同上右居民昔聖王之處民也擇瘠土而處之磽確為瘠勞其民而用之故長王天下瘠土利薄又勞而用之使不淫逸不淫逸則向義故長王天下也夫民勞則思思則善心生民勞於事則思儉約故善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也沃肥善也不材器能少也瘠土之民莫不嚮義勞也善心生故嚮義也國語魯語聖王所以順山者不使居川不使渚者居中原而弗敝也小洲曰渚廣平曰原山者利其禽獸渚者利其魚鹽中原利其五榖使各居其所安不易其利勞敝之也民失其業則窮窮則濫禮運管仲曰昔者聖王之治天下也參其國而伍其鄙參三也國郊以內也伍五也鄙郊以外也謂三分國都以為三軍五分其鄙以為五屬聖王謂若湯武也定民之居成民之事謂使四民各居其職所也若工就官府農就田野所以成其事也陵為之終以為葬也而慎用其六柄焉柄本也六柄生殺貧富貴賤也桓公曰成民之事若何對曰四民者勿使雜處四民謂士農工商雜處則其言哤其事易哤亂貌易變易也公曰處士農工商若何對曰昔聖王之處士也使就閒燕士講學道藝者間燕猶清淨也處工就官府處商就市井處農就田野今夫士羣萃而州處萃集也處聚也閒燕則父與父言義子與子言孝其事君者言敬其幼者言悌少而習焉其心安焉不見異物而遷焉物事也遷移也是故其父兄之教不肅而成肅疾也其子弟之學不勞而能夫是故士之子恆為士今夫工羣萃而州處審其四時言四時各有其宜也謂死生凝釋之時也辨其功苦辨别也功牢也苦脆也權節其用權平也視其平沈之均也節節其大小輕重也論比協材論擇也比比其善惡也協和也和其剛柔也旦莫從事施於四方施其物用於四方也以飭其子弟飭教也相語以事相示以巧相陳以功陳亦示也功成功也功善則有賞少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故工之子恆為工今夫商羣萃而州處察其四時四時所用者預資之也而監其鄉之資監視也資財也視其貴賤有無以知其市之賈負任擔荷背曰負肩曰擔任抱也荷揭也服牛軺馬服謂牛服車也軺馬車也詩云晥彼牽牛不以服箱以周四方周遍也以其所有易其所無市賤鬻貴市取也鬻賣也旦莫從事於此以飭其子弟相語以利相示以賴賴贏也相陳以知賈賈知物價相與陳說少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商之子恆為商今夫農羣萃而州處察其四時四時樹藝各有宜也權節其用耒耜枷芟權平也平節其器用小大倨句之宜也枷拂也所以擊草也芟大鎌所以芟草也及寒擊菒除田寒謂季冬大寒之時也菒枯草也以待時耕時耕謂立春之後及耕深耕而疾耰之以待時雨疾速也耰摩平也時雨至當種之也時雨既至挾其槍刈耨鎛在掖曰挾槍椿也刈鎌也耨鎡䥓也鎛鉏也以旦莫從事於田野脫衣就功首戴茅蒲身衣襏襫脫解也茅蒲䔲笠也襏襫蓑薜衣也茅或作萌竹萌之皮所以為笠也霑體塗足霑濡也暴其髮膚盡其四支之敏敏猶材也以從事於田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能是故農之子恆為農野處而不昵昵近也其秀民之能為士者必足賴也秀民民之秀出者也賴恃也有司見而不以告其罪五有司掌民之官也罪在五刑也有司已於事而竣已畢也竣退伏也桓公曰定民之居若何對曰制國以為二十一鄉唐尚書曰四民之所居也昭謂國國都城郭之域也惟士工商而已農不在焉桓公曰善管子於是制國以為二十一鄉二千家為一鄉二十一鄉凡四萬二千家此管仲所制非周法也工商之鄉六工商各三也二者不從戎役也士鄉十五唐尚書云士與農共十五鄉昭謂此士軍士也十五鄉合三萬人是為三軍農野處而不昵不在都邑之數則下所云伍鄙是也公帥五鄉焉五鄉萬人是謂中軍公所帥也國子帥五鄉焉髙子帥五鄉焉國子髙子皆齊上卿各帥五鄉為左右軍也參國起按以為三官參三也按界也分國事以為三也臣立三宰三宰三卿也使掌羣臣也工立三族族屬也晉趙盾為旄車之族上言工商之鄉六則各三也市立三鄉市商也商處市井故曰市澤立三虞周禮有澤虞之官虞度也掌度知川澤之大小及所生育者山立三衡周禮有山虞林衡之官衡平也掌平其政也桓公曰伍鄙若何管子上言參其國而伍其鄙內政既備故復問伍鄙之事管子對曰制鄙三十家為邑邑有司制野鄙之政也此以下與郊內之制異也十邑為卒卒有卒帥十卒為鄉鄉有鄉帥三鄉為縣縣有縣帥十縣為屬屬有大夫五屬故立五大夫各使治一屬焉五屬四十五萬家也立五正正長也各使聽一屬焉是故正之政聽屬正五正也聽大夫之治也牧政聽縣牧五屬大夫也聽縣帥之治下政聽鄉下政縣帥也聽鄉帥之治也桓公曰各保治爾所無或淫怠而不聽治者國語齊語司民掌登萬民之數自生齒以上皆書于版辨其國中與其都鄙及其郊野異其男女嵗登下其死生登上也男八月女七月而生齒板令户籍也下猶去也每嵗更著生去死及三年大比以萬民之數詔司冦司冦及孟冬祀司民之日獻其數于王王拜受之登于天府內史司㑹冡宰二之以贊王治鄭司農云文昌宫三能屬軒轅角相與為體近文昌為司命次司祿次司民𤣥謂司民軒轅角也天府主祖廟之藏者贊佐也三官以二佐王治者當以民多少黜陟主民之吏秋官小司寇及大比登民數自生齒以上登于天府大比三年大數民之衆寡也人生齒而體備男八月而生齒女七月而生齒內史司㑹冡宰二之以制國用人數定而九賦可知國用乃可制耳孟冬祀司民獻民數於王王拜受之以圖國用而進退之司民星名謂軒轅角也小司冦於祀司民而獻民數於王重民也進退猶損益也國用民衆則益民寡則損上同天府若祭天之司民司祿而獻民數穀數則受而藏之注見吉禮天神右民數受計之禮主所親拜者二聞生民之數則拜之聞登穀則拜之賈誼新書宣王既喪南國之師喪亡也敗於姜戎氏時所亡也南國江漢之間也詩曰滔滔江漢南國之紀乃料民于大原料數也大原地名仲山甫諫曰民不可料也夫古者不料民而知其少多司民協孤終司民掌登萬民之數自生齒以上皆書於版協合也無父曰孤終死也合其名籍以登于王也司商協名姓司商掌賜族受姓之官商金聲清謂人始生吹律合之定其姓名司徒協旅司徒掌合師旅之衆也司寇協姦司寇刑官掌合姦民以知死刑之數牧協職周禮牧人掌牧養犧牲合其物色之數工協革工百工之官革更也更制度者合其數也場協入場人掌場圃委積珍物斂而藏之也廪協出廪人掌九穀出用之數也是則少多死生出入往來者皆可知也於是乎又審之以事事謂因藉田與搜狩以簡知其數也王治農於藉藉藉於千畝田也摉於農隙春田曰摉摉擇也禽獸懷妊未著摉而取之也農隙仲春既耕之後隙間也耨穫亦於藉言王亦至於藉考課之獮於既蒸秋田曰獮獮殺也順時始殺也蒸升也月令孟秋乃升穀天子嘗新既升謂仲秋也狩於畢時冬田曰狩圍守而取之畢時時務之畢也是皆習民數者也又何料焉習簡習也不謂其少而大料之是示少而惡事也言王不謂其衆少而大料數之是示以寡少又厭惡政事不能修之意也臨政示少諸侯避之示天下寡弱諸侯將避逺王室不親附也治民惡事無以賦令言厭惡政事無以賦令也且無故而料民天之所惡也故事也天道清淨也害於政而妨於後嗣害政戕為政之道也妨後嗣謂將有禍亂也王卒料之及幽王乃廢滅國語周語趙簡子使尹鐸為晉陽尹鐸簡子家臣也晉陽趙氏邑為治也請曰以為繭絲乎抑為保障乎繭絲賦稅保障蔽扞也小城曰保禮記曰遇入保者簡子曰保障哉尹鐸損其户數損其户則民優而稅少晉語大司徒令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓此所以勸民者也使之者皆謂立其長而教令使之保猶任也救救凶災也賓賓客其賢者故書受為授杜子春云當為受謂民移徙所到則受之所去則出之又云賙當為紏謂紏其惡𤣥謂受者宅舍有故相受寄記也賙者謂禮物不備相給足也閭二十五家族百家黨五百家州二千五百家鄉萬二千五百家地官小司徒之職掌建邦之教法以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾凡征役之施舍與其祭祀飲食喪紀之禁令稽猶考也夫家猶言男女也鄭司農云九比謂九夫為井𤣥謂九比者冡宰職出九賦者之人數也貴謂為卿大夫賤謂占㑹販賣者廢疾謂癃疾也施當為弛乃頒比法於六鄉之大夫使各登其夫家衆寡六畜車輦辨其物以嵗時入其數以施政教行徴令登成也成猶定也衆寡民之多少物家中之財嵗時入其數若今四時言事及三年則大比大比則受邦國之比要大比謂使天下更簡閲民數及其財物也受邦國之比要則亦受鄉遂矣鄭司農云五家為比故以比為名今時八月案比是也要謂其簿嵗終則考其屬官之治成而誅賞治成治事之計令羣吏正要㑹而致事正嵗則帥其屬而觀教象之法徇以木鐸曰不用法者國有常刑令羣吏憲禁令修法糾職以待邦治憲表縣之及大比六鄉四郊之吏平教治正政事考夫屋及其衆寡六畜兵器以待政令四郊之吏吏在四郊之內主民事者夫三為屋屋三為井出地貢者三三相任鄉師之職各掌其所治鄉之教而聽其治聽謂平察之以國比之法以時稽其夫家衆寡辨其老幼貴賤廢疾馬牛之物辨其可任者與其施舍者掌其戒令糾禁聽其獄訟嵗終則考六鄉之治以詔廢置正嵗稽其鄉器比共吉凶二服閭共祭器族共喪器黨共射器州共賓器鄉共吉凶禮樂之器吉服祭服也凶服弔服也比長主集為之祭器者簠簋鼎俎之屬閭胥主集為之喪器者夷槃素俎楬豆輁軸之屬族師主集為之此三者民所以相共也射器者弓矢楅中之屬黨正主集為之為州長或時射於此黨也賓器者尊俎笙瑟之屬州長主集為之為鄉大夫或時賓賢能於此州也吉器若閭祭器者也凶器若族喪器者也禮樂之器若州黨賓射之器者鄉大夫備集此四者為州黨族閭有故而不共也此鄉器者旁使相共則民無廢事上下相補則禮行而教成若國大比則考教察辭稽器展事以詔誅賞考教視賢能以知道藝與不察辭視吏言事知其情實否展猶整具鄉大夫之職各掌其鄉之政教禁令正月之吉謂建子之十一月也受教法於司徒退而頒之於其鄉吏使各以教其所治詳見學校以嵗時登其夫家之衆寡辨其可任者詳見禮田役篇嵗終則令六鄉之吏皆㑹政致事㑹計也致事言其嵗盡文書正嵗令羣吏考法於司徒以退各憲之於其所治州長各掌其州之教治政令之法凡州之大祭祀大喪皆涖其事大祭祀謂州社稷大喪鄉老大夫於是卒者涖臨也嵗終則㑹其州之政令三年大比則大考州里以贊鄉大夫廢興廢興所廢退所興進也黨正各掌其黨之政令教治凡其黨之祭祀喪紀昏冠飲酒教其禮事掌其禁戒其黨之民嵗終則㑹其黨政帥其吏而致事以嵗時涖校比涖臨也鄭司農云校比族師職所謂以時屬民而校登其族之夫家衆寡辨其貴賤老幼廢疾可任者及其六畜車輦如今小案比及大比亦如之族師各掌其族之戒令政事政事邦政之事以邦比之法帥四閭之吏以時屬民而校登其族之夫家衆寡辨其貴賤老幼廢疾可任者及其六畜車輦五家為比十家為聫五人為伍十人為聫四閭為族八閭為聫使之相保相受刑罰慶賞相及相共以受邦以役國事以相葬埋相共猶相救相賙嵗終則㑹政致事閭胥各掌其閭之徴令以嵗時各數其閭之衆寡辨其施舍比長各掌其比之治五家相受相和親有罪奇邪相及邪猶惡也徙於國中及郊則從而授之徙謂不便其居也或國中之民出徙郊或郊民入徙國中皆從而付所處之吏明無罪惡若徙於他則為之旌節而行之徙於他謂出居異鄉也授之者有節乃達若無授無節則唯圜土內之鄉中無授出鄉無節過所則呵問繫之圜土考辟之也圜土獄城也獄必圜者規主仁以仁心求其情古之治獄閔於出之閭師掌國中及四郊之人民六畜之數詳財賦篇縣師掌邦國都鄙稍甸郊里之地域而辨其夫家人民田萊之數及其六畜車輦之稽三年大比則以考羣吏而以詔廢置郊里郊所居也自邦國以及四郊之內是所主數周天下也萊休不耕者郊內謂之易郊外謂之萊善言近遂人掌邦之野郊外曰野此野謂甸稍縣都以土地之圖經田野造縣鄙形體之法五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂皆有地域溝樹之使各掌其政令刑禁以嵗時稽其人民而授之田野簡其兵器教之稼穯經形體皆謂制分界也鄰里鄼鄙縣遂猶郊內比閭族黨州鄉也鄭司農云田野之居其比伍之名與國中異制故五家為鄰𤣥謂異其名者示相變耳遂之軍法追胥起徒役如六鄉凡治野以下劑致氓以田里安氓以樂昏擾氓以土宜教氓稼穡以興鋤利氓以時器勸氓以彊豫任氓以土均平政變民言氓異外內也氓猶懵懵無知貌也致猶會也民雖受上田中田下田及㑹之以下劑為率謂可任者家二人樂昏勸其昏姻如媒氏㑹男女也擾順也時器鑄作耒耜錢鎛之屬彊豫謂民有餘力復豫之田若餘夫然政讀為征土均掌均平其稅鄭大夫讀鋤為藉杜子春讀鋤為助謂起民人令相佐助以嵗時登其夫家之衆寡及其六畜車輦辨其老幼廢疾與其施舍者以頒職作事以令貢賦以令師田以起政役職謂民九職也分其農牧衡虞之職使民為其事也載師職云以物地事授地職互言矣貢九貢也賦九賦也政役出士徒役遂師各掌其遂之政令戒禁以時登其夫家之衆寡六畜車輦辨其施舍與其可任者經牧其田野辨其可食者周知其數而任之以徴財征施讀亦弛也經牧制田界與井也可食謂今年所當耕者也財征賦稅之事遂大夫各掌其遂之政令以嵗時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者以教稼穡以稽功事掌其政令戒禁聽其治訟施亦讀為弛功事九職之事民所以為功業令為邑者嵗終則㑹政致事不言其遂之吏而言為邑者容公邑及公卿大夫王子弟之采邑政令戒禁遂大夫亦施焉三嵗大比則帥其吏而興氓明其有功者屬其地治者興氓舉民賢者能者如六鄉之為也興猶舉也屬猶聚也又因舉吏治有功者而聚敕其餘以職事凡為邑者以四達戒其功事而誅賞廢興之四逹者治民之事大通者有四夫家衆寡也六畜車輦也稼穡耕耨也旗鼓兵革也縣正各掌其縣之政令徴比以頒田里以分職事掌其治訟趨其稼事而賞罰之徴徴召也比案比鄙師各掌其鄙之政令祭祀祭祀祭禜也以時數其衆庶而察其媺惡而誅賞時四時也嵗終則㑹其鄙之政而致事鄼長各掌其鄼之政令以時校登其夫家比其衆寡以治其喪紀祭祀之事校猶數也若嵗時簡器與有司數之簡器簡稼器也兵器亦存焉有司遂大夫凡嵗時之戒令皆聽之聽之受而行之也里宰掌比其邑之衆寡與其六畜兵器治其政令邑猶里也以嵗時合耦於鋤以治稼穡趨其耕耨行其秩叙以待有司之政令而徴斂其財賦注見下章鄰長掌相糾相受相糾相舉察凡邑中之政相贊長短使相補助徙於他邑則從而授之從猶隨也授猶付也並地官士師掌鄉合州黨族閭比之聫與其人民之什伍使之相安相受以比追胥之事以施刑罰慶賞鄉合鄉所合也追追寇也胥讀如宿偦之偦偦謂司摶盜賊也秋官鄉士掌國中鄭司農云謂國中至百里郊也𤣥謂其地則距王城百里內也言掌國中此主國中獄也六鄉之獄在國中各掌其鄉之民數而糾戒之鄉士八人言各者四人而分主三鄉遂士掌四郊鄭司農云謂百里外至三百里也𤣥謂其地則距王城百里以外至二百里言掌四郊者此主四郊獄也六遂之獄在四郊各掌其遂之民數而糾其戒令遂士十二人言各者二人而分主一遂縣士掌野鄭司農云掌三百里至四百里大夫所食晉韓須為公族大夫食縣𤣥謂地距王城二百里以外三百里曰野三百里以外至四百里曰縣四百里以外至五百里曰都都縣野之地其邑非王子弟公卿大夫之采地則皆公邑也謂之縣縣士掌其獄焉言掌野者郊外曰野大總言之也獄居近野之縣獄在二百里上縣之縣獄在三百里上都之縣獄在四百里上各掌其縣之民數糾其戒令方士掌都家鄭司農云掌四百里至五百里公所食魯季氏食於都𤣥謂都王子弟及公卿之采地家大夫之采地大都任疆地小都任縣地家邑任稍地不言掌其民數民不純屬王凡都家之大事聚衆庶則各掌其方之禁令方士十六人言各掌其方者四人而主一方也其方以王之事動衆則為班禁令焉以時修其縣法若嵗終則省之而誅賞焉縣法縣師之職也其職掌邦國都鄙稍甸郊野之地域而辨其夫家人民田萊之數及其六畜車輦之稽方士以四時修此法嵗終又省之則與掌民數亦相近並秋官右鄉邑之政神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益二體皆木上入下動天下之益莫大於此繫辭傳少皥氏以鳥名官九扈為九農正扈民無淫者也注見職官帝曰棄黎民阻飢汝后稷播時百穀阻厄后君也有爵土之稱播布也穀非一種故曰百穀此因禹之讓而申命之使仍舊職以終其事也舜典大宰以九職任萬民一曰三農生九榖七曰嬪婦化治絲枲詳見民政篇大司徒辨十有二壤之物而知其種以教稼穡樹藝壤亦土也變言耳以萬物自生焉則言土土猶吐也以人所耕而樹藝焉則言壤壤和緩之貌詩曰樹之榛栗又曰我藝黍稷藝猶蒔也地官土方氏以辨土宜土化之法而授任地者土宜謂九穀植稚所宜也土化地之輕重糞種所宜用也任地者載師之屬夏官草人掌土化之法以物地相其宜而為之種土化之法化之使美若泛勝之術也以物地占其形色為之種黃白宜以種禾之屬凡糞種騂剛用牛赤緹用羊墳壤用麋渴澤用鹿鹹潟用貆勃壤用狐埴壚用豕彊㯺用蕡輕爂用犬凡所以糞種者皆謂煮取汁也赤緹縓色也渴澤故水處也潟鹵也貆貒也勃壤粉解者埴壤黏疏者强㯺强堅者輕爂輕脆者故書騂為挈墳作蚠杜子春挈讀為騂謂地色赤而土剛强也鄭司農云用牛以牛骨汁漬其種也謂之糞種墳壤多蚠鼠也壤白色蕡麻也𤣥謂墳壤潤解地官稻人掌稼下地以水澤之地種榖也謂之稼者有似嫁女相生以瀦畜水以防止水以溝蕩水以列舍水以澮寫水以涉揚其芟作田鄭司農說瀦防以春秋傳曰町原防規偃瀦以列舍水列者非一道以去水也以涉楊其芟以其水寫故得行其田中舉其芟鉤也杜子春讀蕩為和蕩謂以溝行水也𤣥謂偃瀦者畜流水之陂也防瀦旁隄也遂田首受水小溝也列田之畦㽟也澮田尾去水大溝作猶治也開遂舍水於列中因涉之揚去前年所芟之草而治田種稻凡稼澤夏以水殄草而芟夷之殄病也絶也鄭司農說芟夷以春秋傳曰芟夷蕰崇之今時謂禾下麥為荑下麥言芟刈其禾於下種麥也𤣥謂將以澤地為稼者必於夏六月之時大雨時行以水病絶草之後生者至秋水涸芟之明年乃稼澤草所生種之芒種鄭司農云澤草之所生其地可種芒種芒種稻麥也司稼掌巡邦野之稼而辨穜稑之種周知其名與其所宜地以為法而縣於邑閭周猶遍也遍知種所宜之地縣以示民後年種穀用為法也遂人以嵗時稽其人民而授之田野教之稼穡詳見上章遂師巡其稼穡而移用其民以救其時事移用其民使轉相助救時急事也四時耕耨斂艾芟地之宜晚早不同而有天期地澤風雨之急遂大夫以嵗時稽其夫家之衆寡以教稼穡以稽功事詳見上章正嵗簡稼器修稼政簡猶閲也稼器耒耜鎡基之屬稼政孟春之月令所云皆修封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教道民必躬親之縣正趨其稼事而賞罰之詳見上章鄼長趨其耕耨稽其女功女功絲枲之事里宰以嵗時合耦于鋤以治稼穡趨其耕耨行其秩叙考工記曰耜廣五寸二耜為耦此言兩人相助耦而耕也鄭司農云鋤讀為藉杜子春云鋤讀為助謂相佐助也𤣥謂鋤者里宰治處也若今街彈之室於此合耦使相佐助因放而為名月令季冬命農師計耦耕事修耒耜具田器是其嵗時與合人耦則牛耦亦可知也秩叙受耦相佐助之次第並地官車人為耒庛長尺有一寸中直者三尺有三寸上句者二尺有二寸鄭司農云耒謂耕耒庛讀為其顙有庛之庛謂耒下岐𤣥謂庛讀為棘刺之刺刺耒下前曲接耜自其庛緣其外以至於首以弦其內六尺有六寸與步相中也緣外六尺有六寸內弦六尺應一步之尺數耕者以田器為度宜耜異材不在數中堅地欲直庛柔地欲句庛直庛則利推句庛則利發倨句磬折謂之中地中地之耒其庛與直者如磬折則調矣調則弦六尺考工記段氏為鎛器鎛器田器錢鎛之屬同上雍氏掌溝瀆澮池之禁凡害於國稼者春令為阱擭溝瀆之利於民者秋令塞阱杜擭溝瀆澮田間通水者也池謂陂障之水道也害於國稼謂水潦及禽獸也阱穿地為􅢾所以禦禽獸其或超踰則陷焉世謂之陷阱擭柞鄂也堅地阱淺則設柞鄂于其中秋而杜塞阱擭收刈之時為其限害人也書費誓曰乃擭敜乃阱時秋也伯禽以出師征徐戎秋官載師凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征鄭司農云宅不毛者謂不種桑麻也𤣥謂宅不毛者罰以一里二十五家之泉空田者罰以三家之稅粟以共吉凶二服及喪器也民有間無職事者出夫稅家稅也夫稅者百畝之稅家稅者出士徒車輦給繇役地官閭師凡庶民不畜者祭無牲不耕者祭無盛不樹者無槨不蠶者不帛不績者不衰掌罰其家事也盛黍稷也槨周棺也不帛不得衣帛也不衰不得衣衰也皆所以耻不免同上旅師凡用粟春頒而秋斂之困時施之饒時收之同上春省耕而補不足秋省斂而助不給春秋巡行郊野察民之所不足而補助之孟子孟春天氣下降地氣上騰天地和同草木萌動王命布農事命田舍東郊皆修封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教道民必躬親之田事既飭先定準直農乃不惑毋聚大衆毋置城郭仲春耕者少舍乃修闔扇毋作大事以妨農之事季春命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞孟夏毋起土功毋發大衆命野虞出行田原為天子勞農勸民毋或失時命司徒巡行縣鄙命農勉作毋休于都驅獸毋害五榖毋大田獵農乃登麥仲夏農乃登黍季夏毋發令而待以妨神農之事是月也土潤溽暑大雨時行燒剃行水利以殺草如以熱湯可以糞田疇可以美土疆孟秋農乃登穀命百官始收斂完隄防謹壅塞以備水潦仲秋乃命有司趣民收斂務畜菜多積聚乃勸種麥毋或失時其有失時行罪無疑季秋乃命冡宰農事備收舉五榖之要仲冬農有不收藏積聚者馬牛畜獸有放佚者取之不詰季冬氷以入令告民出五種命農計耦耕事修耒耜具田器注並詳月令篇右農政宣公十四年公羊傳何休注云聖人制井田之法而口分之一夫一婦受田百畝以養父母妻子種榖不得種一榖以備災害田中不得有樹以妨五榖還廬舍種桑荻雜菜畜五母雞兩母豕瓜果種疆畔女工蠶織老者得衣帛焉得食肉焉死者得葬焉在田曰廬在邑曰里一里八十户八家共一巷中里為校室選其耆老有髙德者名曰父老其有辨護伉健者為里正皆受倍田得乘馬父老比三老孝弟官屬里正比庶人在官之吏民春夏出田秋冬入保城郭田作之時春父老及里正旦開門坐孰上晏出後時者不得出莫不持樵者不得入五穀畢入民皆居宅里正促緝績男女同巷相從夜績至於夜中故女功一月得四十五日作從十月盡正月止神農之法曰丈夫丁壯而不耕天下有受其飢者婦人當年而不織天下有受其寒者故身自耕妻親織以為天下先淮南子五畝之宅樹墻下以桑匹婦蠶之則老者足以衣帛矣五母雞二母彘毋失其時老者足以無失肉矣百畝之田匹夫耕之八口之家可以無飢矣此文王之政也一家養母雞五母彘二也所謂西伯善養老者制其田里教之樹畜導其妻子使養其老五十非帛不暖七十非肉不飽不暖不飽謂之凍餒文王之民無凍餒之老者此之謂也田謂百畝之田里謂五畝之宅樹謂耕桑畜謂雞彘也趙氏曰善養老者教導之使可以養其老耳非家賜而人益之也子孟嗟嗟臣工敬爾在公王釐爾成來咨來茹嗟嗟重嘆以深敕之也臣工羣臣百官也公公家也釐賜也成成法也茹度也此戒農官之詩先言王有成法以賜汝汝當來咨度也嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人痔乃錢鎛奄觀銍艾保介見月令吕覽其說不同然皆為藉田而言蓋農官之副也莫春斗柄建辰夏正之三月也畬三嵗田也於皇歎美之詞來牟麥也明上帝之明賜也言麥將熟也迄至也康年猶豐年也衆人甸徒也痔具錢銚鎛鉏皆田器也銍鑊禾短鐮也艾穫也如此乃言所戒之事言三月則當治其新畬矣今何哉然麥已將熟則可以受上帝之明賜而此明昭之上帝又將賜我新畬以豐年也於是命甸徒具農器以治其新畬而又將忽見其收成也周頌臣工噫嘻成王既昭假爾率時農夫播厥百榖駿發爾私終三十里亦服爾耕十千維耦噫嘻亦歎辭也昭明假格也爾田官也時是駿大發耕也私私田也三十里萬夫之地四旁有川內方三十三里有竒言三十里舉成數也耦二人並耕也此連上篇亦戒農官之詞昭假爾猶言格爾衆庶蓋成王始置田官而嘗戒命之也爾當率時農夫播其百榖使之大發其私田皆服其耕事萬人為耦而並耕也蓋耕本以二人為耦今合一川之衆為言故云萬人畢出并力齊心如合一耦也此必鄉遂之官司稼之屬其職以萬夫為界者溝洫用貢法無公田故皆謂之私蘇氏曰民曰雨我公田遂及我私而君曰駿發爾私終三十里其上下之間交相忠愛如此周頌噫嘻宣王即位不藉千畝虢文公諌曰不可王事唯農是務無有求利於其官以干農功三時務農而一時講武故征則有威守則有則詳見王朝禮單襄公假道於陳以聘於楚歸告定王曰陳侯不有大咎國必亡周制有之曰民無縣耜言常用也入土曰耜耜柄曰耒野無奧草皆墾辟也奧深也不奪民時不蔑民功蔑棄也有優無匱有逸無罷國有班事國城邑也班次也執事有次縣有序民縣鄙之民從事有序今陳國道路不可知田在草間不懇者多功成而不收野場若棄也民罷於逸樂罷於為國君作逸樂之事是棄先王之法制者也周語少皥氏以鳥名官五雉為五工正利器用正度量夷民者也注見職官帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓於殳斨暨伯與帝曰俞往哉汝諧若順其理而治之也曲禮六工有土工金工石工木工獸工草工周禮有攻木之工攻金之工攻皮之工設色之工摶埴之工皆是也帝問誰能順治豫百工之事者垂臣名有巧思莊子曰儷工倕之指即此也殳斨伯與三臣名也殳以積竹為兵建兵車者斨方銎斧也古者多以其所能為名殳斨豈能為二器者歟往哉汝諧者往哉汝和其職也舜典有虞氏上陶夏后氏上匠殷人上梓周人上輿官各有所尊王者相變也舜至質貴陶器甒大瓦棺是也禹治洪水民降丘宅土卑宫室盡力乎溝洫而尊匠湯放桀疾禮樂之壞而尊梓武王誅紂疾上下失其服飾而尊輿考工記天子之六工曰土工金工石工木工獸工草工典制六材此亦殷時制也周則皆屬司空土工陶瓬也金工築冶鳧㮚鍛桃石工玉人磬人也木工輪輿弓廬匠車梓也獸工函鮑韗韋裘也惟草工職亡蓋謂作萑葦之器曲禮大宰以九職任萬民五曰百工飭化八材詳見民政章凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五摶埴之工二攻猶治也搏之言拍也埴黏土也故書七為十刮作捖鄭司農云十當為七捖摩之工謂玉工也捖讀為刮其事亦是也攻木之工輪輿弓廬匠車梓攻金之工築冶鳧㮚段桃攻皮之工函鮑韗韋裘設色之工畫繢鍾筐㡛刮摩之工玉楖雕矢磬摶埴之工陶旊事官之屬六十此識其五材三十工略記其事耳其曰某人者以其事名官也其曰某氏者官有世功若族有世業以氏名官者也廬矛㦸矜祕也國語曰侏儒扶廬梓檟屬也故書雕或為舟鄭司農云輪輿弓廬匠車梓此七者攻木之工官别名也孟子曰梓匠輪輿鮑讀為鮑魚之鮑書或為鞄蒼頡篇有鮑菀韗讀為歷運之運慌讀為芒芒禹迹之芒楖讀如巾櫛之櫛旊讀為甫始之甫埴書或為植杜子春云雕或為舟者非也𤣥謂瓬讀為放於此乎之放考工記攻金之工築氏執下齊冶氏執上齊鳧氏為聲㮚氏為量段氏為鎛器桃氏為刃多錫為下齊大刃削殺氏鑒燧也少錫為上齊鐘鼎斧斤戈㦸也聲鍾錞于之屬量豆區釜也鎛器田器錢鎛之屬刃大刃刀劒之屬金有六齊目和金之品數六分其金而錫居一謂之鐘鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈㦸之齊參分其金而錫居一謂之削殺矢之齊金錫半謂之鑒燧之齊鑒燧取水火於日月之器也鑒亦鏡也凡金多錫則忍白且明也同上凡鑄金之狀故書狀作壯杜子春云當為狀謂鑄金之形狀金與錫黑濁之氣竭黃白次之黃白之氣竭青白次之青白之氣竭青氣次之然後可鑄也消湅金錫精粗之候同上季春命工師令百工審五庫之量金鐵皮革筋角齒羽箭幹脂膠丹漆毋或不良百工咸理監工日號毋悖於時毋或作為淫巧以蕩上心季秋霜始降則令百工休孟冬命工師效功陳祭器案度程毋或作為淫巧以蕩上心必功致為上物勒工名以考其誠功有不當必行其罪以窮其情注並見月令篇來百工則財用足來百工則通功易事農末相資故財用足日省月試既稟稱事所以勸百工也既讀曰餼餼禀稍食也稱事如周禮藁人職曰考其弓弩以上下其食是也中庸右工政國有六職百工與居一焉百工司空事官之屬於天地四時之職亦處其一也司空掌營城郭建都邑立社稷宗廟造宫室車服器械監百工者唐虞以上曰共工或坐而論道或作而行之或審曲面藝以飭五材以辨民器或通四方之珍異以資之或飭力以長地財或治絲麻以成之言人德能事業之不同者也論道謂謀慮治國之政令也作起也辨猶具也資取也操也鄭司農云審曲面藝審察五材曲直方面形藝之宜以治之及隂陽之向背是也春秋傳曰天生五材民並用之謂金木水火土也故書資作齊杜子春云齊當為資讀為冬資絺綌之資𤣥謂此五材金木皮玉土坐而論道謂之王公天子諸侯作而行之謂之士大夫親受其職居其官也審曲面藝以飭五材以辨民器謂之百工五材各百工言百衆言之也通四方之珍異以資之謂之商旅商旅販賣之客也易曰至日商旅不行飭力以長地財謂之農夫三農受夫田也治絲麻以成之謂之婦功布帛婦官之事粵無鎛燕無函秦無廬胡無弓車此四國者不置是工也鎛田器詩云偫乃錢鎛又曰其鎛斯㨄鄭司農云函讀為國君含垢之含函鎧也孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人廬讀為纑謂矛㦸柄竹櫕柲或曰摩鑢之器胡今胸奴粵之無鎛也非無鎛也夫人而能為鎛也燕之無函也非無函也夫人而能為函也秦之無廬也非無廬也夫人而能為廬也胡之無弓車也非無弓車也夫人而能為弓車也言其大夫人人皆能作是器不須國工粵地塗泥多草薉而山出金錫鑄冶之業田器尤多燕近强胡習作甲胄秦多細木善作矜祕胸奴無屋宅田獵畜牧逐水草而居皆知為弓車知者創物謂始闓端造器物若世本作者是也巧者述之守之世謂之工父子世以相教百工之事皆聖人之作也事無非聖人所為也爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人之所作也凝堅也故書舟作周鄭司農云周當作舟天有時地有氣材有美工有巧合此四者然後可以為良時塞溫也氣剛柔也良善也材美工巧然而不良則不時不得地氣也不時不得天時橘踰淮而北為枳鸜鵒不踰濟貉踰汶則死此地氣然也鸜鵒鳥也春秋昭二十五年有鸜鵒來巢傳曰書所無也鄭司農云不踰齊無妨於中國有之貉或為猿謂善緣木之猿也汶水在魯北鄭之刀宋之斤魯之削吳粵之劒遷乎其地而弗能為良地氣然也去此地而作之則不能使良也燕之角荆之幹妢胡之笴吳粵之金錫此材之美者也荆荆州也幹柘也可以為弓弩之幹妢胡胡子之國在楚旁笴矢斡也禹貢荆州貢杶幹栝柏及箘簵楛故書笴為筍杜子春云妢讀為焚咸丘之焚書或為邠妢胡地名也筍當為笴笴讀為槀謂箭槀天有時以生有時以殺草木有時以生有時以死石有時以泐水有時以凝有時以澤此天時也言百工之事當審其時也鄭司農云泐讀如再扐而後掛之扐扐謂石解散也夏時盛暑大熱則然考工記禮書綱目卷六十二
