body:
  text: 禮書綱目卷五十六婺源江永撰制國通禮五補昔黃帝方制天下立為萬國及少皥氏之衰其後制度無聞若顓頊之所建帝嚳受之創制九州雍荆豫梁徐冀青兗揚統領萬國至堯遭洪水而天下分絶使禹平水土還為九州如舊制杜佑通典禹敷土隨山刋木奠高山大川敷分也分别土地以為九州也奠定也定高山大川以别州境也若兖之濟河青之海岱揚之淮海雍之黑水西河荆之荆衡徐之海岱淮豫之荆河梁之華陽黑水是也方洪水橫流不辨區域禹分九州之地隨山之勢相其便宜斬木通道以治之又定其山之高者與其川之大者以為之紀綱此三者禹治水之要也冀州冀州帝都之地三靣距河兖河之西雍河之東豫河之北周禮職方河內曰冀州是也八州皆言疆界而冀不言者以餘州所至可見朝氏曰亦所以尊京師示王者無外之意濟河惟兖州兖州之域東南據濟西北距河海岱惟青州青州之域東北至海西南距岱岱泰山也海岱及淮惟徐州徐州之域東至海南至淮北至岱而西不言濟者岱之陽濟東為徐岱之北濟東為青言濟不足以辨故略之也爾雅濟東曰徐州者商無青并青于徐也周禮正東曰青州者周無徐并徐于青也淮海惟揚州揚州之域北至淮東南至於海荆及衡陽惟荆州荆州之域北距南條荆山南盡衡山之陽唐孔氏曰荆州以衡山之陽為至者蓋南方惟衡山為大以衡陽言之見其地不止此山而猶包其南也荆河惟豫州豫州之域西南至南條荆山北距大河華陽黑水惟梁州梁州之境東距華山之南西據黑水黑水西河惟雍州雍州之域西據黑水東距西河謂之西河者主冀都而言也禹貢肇十有二州封十有二山濬川肇始也十二州冀兖青徐荆揚豫梁雍幽并營也中古之地但為九州曰冀兖青徐荆揚豫梁雍禹治水作貢亦因其舊及舜即位以冀青地廣始分冀東恆山之地為并州其東北醫無閭之地為幽州又分青之東北遼東等處為營州而冀州止有河內之地今河東一路是也封表也封十二山者每州封表一山以為一州之鎮如職方氏言揚州其山鎮曰㑹稽之類濬川濬導十二州之川也然舜既分十有二州而至商時又但言九圍九有周禮職方氏亦止列為九州有揚荆豫青兖雍幽冀并而無徐梁營也則是為十二州蓋不甚久不知其自何時復合為九也舜典兩河間曰冀州自東河至西河河南曰豫州自南河至漢河西曰雍州自西河至黑水漢南曰荆州自漢南至衡山之陽江南曰揚州自江南至海濟河間曰兖州自河東至濟濟東曰徐州自濟東至海燕曰幽州自易水至北狄齊曰營州自岱東至海此蓋殷制爾雅自恆山至於南河千里而近冀州域自南河至於江千里而近豫州域自江至於衡山千里而遙荆州域自東河至於東海千里而遙雍州域自東河至於西河千里而近亦冀州域自西河至於流沙千里而遙雍州域西不盡流沙南不盡衡山東不盡東海北不盡恆山凡四海之內斷長補短方三千里王制職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九榖六畜之數要周知其利害天下之圖如今司空輿地圖也鄭司農云東方曰夷南方曰蠻西方曰戎北方曰貉狄𤣥謂閩蠻之别也國語曰閩芋蠻矣四八七九五六周之所服國數也財用泉榖貨賄也利金錫竹箭之屬害神姦鑄鼎所象百物也爾雅曰九夷八蠻六戎五狄謂之四海乃辨九州之國使同貫利貫事也東南曰揚州其山鎮曰㑹稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭其民二男五女其畜宜鳥獸其榖宜稻鎮名山安地德者也㑹稽在山隂大澤曰藪具區五湖在吳南浸可以為陂灌溉者錫鑞也箭篠也鳥獸孔雀鸞鵁鶄犀象之屬故書箭為晋杜子春曰晋當為箭書亦或為箭正南曰荆州其山鎮曰衡山其澤藪曰雲瞢其川江漢其浸潁湛其利丹銀齒革其民一男二女其畜宜鳥獸其榖宜稻衡山在湘南雲瞢在華容潁出陽城宜屬豫州在此非也湛未聞齒象齒也革犀兕革也杜子春云湛讀當為人名湛之湛湛或為淮河南曰豫州其山鎮曰華山其澤藪曰圃田其川滎雒其浸波溠其利林漆絲枲其民二男三女其畜宜六擾其榖宜五種華山在華隂圃田在中牟滎兖水也出東垣入於河泆為滎滎在滎陽波讀為播禹貢曰滎播既都春秋傳曰楚子除道梁溠營軍臨隨則溠宜屬荆州在此非也林竹木也六擾馬牛羊豕犬雞五種黍稷菽麥稻正東曰青州其山鎮曰沂山其澤藪曰望諸其川淮泗其浸沂沭其利蒲魚其民二男二女其畜宜雞狗其榖宜稻麥沂山沂水所出也在蓋望諸明都也在雎陽沭出東莞二男二女數等似誤也蓋當與兖州同二男三女鄭司農云淮或為睢沭或為洙河東曰兖州其山鎮曰岱山其澤藪曰大野其川河泲其浸廬維其利蒲魚其民二男三女其畜宜六擾其榖宜四種岱山在博大野在巨野廬維當為雷雍字之誤也禹貢曰雷夏既澤雍沮㑹同雷夏在陽城四種黍稷稻麥正西曰雍州其山鎮曰嶽山其澤藪曰弦蒲其川涇汭其浸渭洛其利玉石其民三男二女其畜宜牛馬其榖宜黍稷嶽吳嶽也弦蒲在汧涇出涇陽汭在豳地詩大雅公劉曰芮鞠之即洛出懷德鄭司農云弦或為汧蒲或為浦東北曰幽州其山鎮曰醫無閭其澤藪曰貕養其川河泲其浸菑時其利魚鹽其民一男三女其畜宜四擾其榖宜三種醫無閭在遼東貕養在長廣菑出萊蕪時出般陽四擾馬牛羊豕三種黍稷稻杜子春讀貕為奚河內曰冀州其山鎮曰霍山其澤藪曰揚紆其川漳其浸汾潞其利松柏其民五男三女其畜宜牛羊其榖宜黍稷霍山在彘揚紆所在未聞漳出長子汾出汾陽潞出歸德正北曰并州其山鎮曰恆山其澤藪曰昭餘祁其川呼池嘔夷其浸淶易其利布帛其民二男三女其畜宜五擾其榖宜五種恆山在土曲陽昭餘祁在塢呼池出鹵城嘔夷出平舒淶出廣昌易出故安五擾馬牛羊犬豕五種黍稷菽麥稻也凡九州及山鎮澤藪言曰者以其非一曰其大者耳此州界揚荆豫兖雍冀與禹貢略同青州則徐州地也幽并則青冀之北也無徐梁夏官大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國土地之圖若今司空郡國輿地圖以天下土地之圖周知九州之地域廣輪之數辨其山林川澤丘陵墳衍原隰之名物周猶遍也九州揚荆豫青兖雍幽冀并也輪從也積石曰山竹木曰林注瀆曰川水鍾曰澤土髙曰丘大阜曰陵水崖曰墳下平曰衍髙平曰原下濕曰隰名物者十等之名與所生之物而辨其邦國都鄙之數制其畿疆而溝封之千里曰畿疆猶界也春秋傳曰吾子疆理天下溝穿地為阻固也封起土界也以土㑹之法辨五地之物生一曰山林其動物宜毛物其植物宜皂物其民毛而方二曰川澤其動物宜鱗物其植物宜膏物其民黑而津三曰丘陵其動物宜羽物其植物宜核物其民專而長四曰墳衍其動物宜介物其植物宜莢物其民晳而瘠五曰原隰其動物宜裸物其植物宜叢物其民豐肉而庳㑹計也以上計貢稅之法因别此五者也毛物貂狐貒貉之屬縟毛者也鱗物魚龍之屬津潤也羽物翟雉之屬核物李桃之屬專圜也介物龜鱉之屬水居陸生者莢物薺莢王棘之屬晳白也瘠􅋯也裸物虎豹貔之屬淺毛者叢物萑葦之屬豐猶厚也庳猶短也杜子春讀生為性鄭司農云植物根生之屬皂物柞栗之屬今世間謂柞實為皂斗膏物謂楊柳之屬理致且白如膏𤣥謂膏當為櫜字之誤也蓮芡之實有櫜韜地官量人邦國之地與天下之涂數皆書而藏之書地謂方圜山川之廣狹書涂謂支湊之逺近夏官山師掌山林之名辨其物與其利害而頒之於邦國使致其珍異之物山林之名與物若岱畎絲枲嶧陽孤桐矣利其中人用者害毒物及螫噬之蟲獸同上川師掌川澤之名辨其物與其利害而頒之於邦國使致其珍異之物川澤之物與名若泗濵浮磬淮夷蠙珠暨魚澤之萑蒲同上邍師掌四方之地名辨其丘陵墳衍邍隰之名地名謂東原大陸之屬物之可以封邑者物之謂相其土地可以居民立邑同上土訓掌道地圖以詔地事道說也說地圖九州形勢山川所宜告王以施其事也若云荆揚地宜稻幽并地宜麻道地慝以辨地物而原其生以詔地求地慝若瘴蠱然也辨其物者别其所有所無原其生生有時也以此二者告王之求也地所無及物未蝮生則不求也鄭司農云地慝地所生惡物害人者若虺之屬地官誦訓掌道方志以詔觀事說四方所識久逺之事以告王觀博古所識若魯有大庭氏之庫殽之二陵掌道方慝以詔辟忌以知地俗方慝四方言語所惡也不辟其忌則其方以為苟於言語也知地俗博事也鄭司農云以詔辟忌不違其俗也曲禮曰君子行禮不求變俗同上右分土惟王建國建立也周公居攝而作六典之職謂之周禮營邑于土中七年致政成王以此禮授之使居雒邑治天下司徒職曰日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉辨方正位辨别也鄭司農云别四方正君臣之位君南靣臣北靣之屬𤣥謂考工匠人建國水地以縣置𣙗以縣視以景為規識日出之景與日入之景晝參諸日中之景夜考之極星以正朝夕是別四方召誥曰越三日戊申太保朝至於雒卜宅厥既得卜則經營越三日庚戌太保乃以庶殷攻位于雒汭越五日甲寅位成正位謂此定宮廟體國經野體猶分也經謂為之里數鄭司農云營國方九里國中九經九緯左祖右社靣朝後市野則九夫為井四井為邑之屬是也設官分職鄭司農云置冡宰司徒宗伯司馬司冦司空各有所職而百事舉以為民極極中也令天下之人各得其中不失其所五官篇首同大司徒以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂土圭所以致四時日月之景也云測猶度也不知廣深故曰測故書求為救杜子春云當為求鄭司農云測土深謂南北東西之深也日南謂立表處大東近日也日北謂立表處大北逺日也景夕謂日昳景乃中立表處大東近日也景朝謂日未中而景中立表處大西逺日也𤣥謂晝漏半而置土圭表隂陽審其南北景短于土圭謂之日南是地于日為近南也景長于土圭謂之日北是地于日為近北也東于土圭謂之日東是地于日為近東也西于土圭謂之日西是地于日為近西也如是則寒暑隂風偏而不和是未得其所求凡日景于地千里而差一寸日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之景尺有五寸者南戴日下萬五千里地與星辰四逰升降于三萬里之中是以半之得地之中也畿方千里取象於日一寸為正樹樹木溝上所以表助阻固也鄭司農云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今潁州陽城地為然官地封人為畿封而樹之畿上有封若今時界矣同上匠人建國立王國若邦國者水地以縣于四角立植而縣以水望其高下髙下既定乃為位而平地置𣙗以縣眂以景故書𣙗或作弋杜子春云𣙗當為弋讀為杙𤣥謂𣙗古文臬假借字於所平之地中央樹八尺之臬以縣正之眂之以其景將以正四方也爾雅曰在牆者謂之杙在地者謂之臬為規識日出之景與日入之景日出日入之景其端則東西正也又為規以識之者為其難審也自日出而畫其景端以至日入既則為規測景兩端之內規之規之交乃審也度兩交之間中屈之以指臬則南北正晝參諸日中之景夜考之極星以正朝夕日中之景最短者也極星謂北辰考工記匠人營國方九里旁三門營謂丈尺其大小天子十二門通十二子國中九經九緯經涂九軌國中城內也經緯謂涂也經緯之涂皆容方九軌軌謂轍廣乘車六尺六寸旁加七寸凡八尺是謂轍廣九軌積七十二尺則此涂十一步也旁加七寸者輻內二寸半輻廣三寸半綆三分寸之二金轄之間三分寸之一左祖右社靣朝後市王宮所居也祖宗廟靣猶鄉也王宮當中經之涂也市朝一夫方各百步夏后氏世室殷人重屋周人明堂詳見名器下篇室中度以几堂上度以筵宫中度以尋野度以步涂度以軌周文者各因物宜為之數室中處謂四壁之內王宮門阿之制五雉宮隅之制七雉城隅之制九雉阿棟也宮隅城隅謂角浮思也雉長三丈髙一尺度髙以高度廣以廣經涂九軌環涂七軌野涂五軌度狹之差也故書環或作轘杜子春云當為環環涂謂環城之道同上量人掌建國之法以分國為九州營國城郭營后宮量市朝道巷門渠建立也立國有舊法式若匠人職云分國定天下之國分也后君也言君容王與諸侯夏官內宰凡建國佐后立市市朝者君所以建國也建國者必靣朝後市王立朝而后立市隂陽相承之義天官邑外謂之郊郊外謂之牧牧外謂之野野外謂之林林外謂之坰邑國都也假令百里之國五十里之界界各十里也爾雅右建國武王既克商曰我南望三塗北望嶽鄙顧詹有河粵詹洛伊毋逺天室營周居於洛邑而後去史記惟二月既望越六日乙未王朝步自周則至於豐日月相望謂之望既望十六日也乙未二十一日也周鎬京也去豐二十五里文武廟在焉成王至豐以宅洛之事告廟也惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至於洛卜宅厥既得卜則經營成王在豐使召公先周公行相視洛邑越若來古語辭言召公於豐迤邐而來也朏孟康曰月出也三日明生之名戊申三月五日也卜宅者用龜卜宅都之地既得吉卜則經營規度其城郭宗廟郊社朝市之位越三日庚戌太保乃以庶殷攻位於洛汭越五日甲寅位成庶殷殷之衆庶也用庶殷者意是時殷民已遷於洛故就役之也位成者左祖右社前朝後市之位成也若翼日乙卯周公朝至於洛則達觀於新邑營周公至則遍觀新邑所經營之位越三日丁巳用牲於郊牛二越翼日戊午乃社於新邑牛一羊一豕一郊祭天地也故用二牛社祭用太牢禮也皆告以營洛之事越七日甲子周公乃朝用書命庶殷侯甸男邦伯書役書也春秋傳曰士彌牟營成周計丈數揣高低度厚薄仭溝洫物土方議逺邇量事期計徒庸慮材用書餱糧以令役於諸侯亦此意王氏曰邦伯者侯甸男服之邦伯也庶邦冡君咸在而獨命邦伯者公以書命邦伯而邦伯以公命命諸侯也厥既命殷庶庶殷丕作丕作者言皆趨事赴功也殷之頑民若未易役使者然召公率以攻位而位成周公用以書命而丕作殷民之難化者猶且如此則其悅以使民可知也召誥周公將致政乃作大邑成周於土中王城也於天下土為中城方千七百二十丈郛方七十里南繫於洛水北因於郟山以為天下之大湊郛郭也繫因皆連接也湊㑹也制郊甸方六百里國西土為方千里西土岐周通為圻內分以百縣縣有四郡郡有四鄙大縣城方王城三之一小縣立城方王城九之一三三九分居其一都鄙不過百室以便野事耕桑之事農居鄙得以庶士士居國家得以諸公大夫居治也治鄙以農治國家以大夫凡工賈胥市臣僕州里俾無交為工賈百胥市人臣僕各異州里而居不相雜交也胥待也乃設丘兆於南郊設築壇城內郊南郭也諸侯受命於周乃建大社於周中受封也乃位五宮太廟宗宮考宮路寢明堂五宮宮府寺也太廟后稷二宮祖考廟也路寢王所居也明堂在國南者也咸有四阿反坫重亢重郎常纍復格升藻梲設移旅楹蠢常畫咸皆也廟四下曰阿反坫外向室也重亢纍棟也重郎纍屋也常纍系也復格纍之櫺也升藻棁畫梁柱也承屋曰移旅列也蠢謂藻升之飾也言皆畫列柱為之也內階𤣥階堤唐山牆以黑石為階唐中庭道堤謂為高之也山牆謂畫山雲應門庫臺𤣥閫門首皆有臺於庫門見之後可知也又以黑石為門限也汲冡周書作雒解惟三月哉生魄周公初基作新大邑於東國洛四方民大和㑹侯甸男邦采衛百工播民和見士於周周公咸勤乃洪大誥治三月周公攝政七年之三月也始生魄十六日也百工百官也士說文曰事也詩曰勿士行枚蘇氏曰此洛誥之文當在周公拜手稽首之上康誥周公拜手稽首曰朕復子明辟此下周公授使者告卜之辭也拜手稽首者史記周公遣使之禮也復如復逆之復成王命周公往營成周周公得卜復命于王也謂成王為子者親之也謂成王為明辟者尊之也周公相成王尊則君親則兄之子也明辟者明君之謂王如弗敢及天基命定命豫乃𦙍保大相東土其基作民明辟凡有造基之而後成成之而後定基命所以成始也定命所以成終也言成王幼冲退託如不敢及知天之基命定命豫乃繼太保而往大相洛邑其庶幾為王始作民明辟之地也洛邑在鎬京東故曰東土豫惟乙卯朝至於洛師我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻來以圖及獻卜乙卯即召誥之乙卯也洛師猶言京師也河朔黎水河北黎水交流之內也澗水東瀍水西王城也朝㑹之地瀍水東下都也處啇民之地王城在澗瀍之間下都在瀍水之外其地皆近洛水故兩云惟洛食也食者史先定墨而灼龜之兆正食之墨也伻使也圖洛之地圖也獻卜獻其卜之兆辭也王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來視豫卜休恆吉我二人共貞公其以豫萬億年敬天之休拜手稽首誨言此王授使者復公之辭也王拜手稽首者成王尊異周公而重其禮也匹配也公不敢不敬天之休命來相宅為周匹休之地言卜洛以配周命于無窮也視示也示我以卜之休美而恆吉者也二人成王周公也貞猶當也十萬曰億言周公宅洛規模宏逺以我萬億年敬天休命故又拜手稽首以謝周公之誨言洛誥王來紹上帝自服於土中旦曰其作大邑其自時配皇天毖祀於上下其自時中乂王厥有成命治民今休洛邑天地之中故謂之土中王來洛邑繼天出治當自服行於土中是時洛邑告成成王始政故召公以自服土中為言又舉周公嘗言作此大邑自是可以對越上天可以饗答神祗可以宅中圖治成命者天之成命也成王而能紹上帝服土中則庶幾天有成命治民今即休美也召誥王使富辛與石張如晉請城成周子朝之亂其餘黨多在王城敬王畏之徙都成周成周狹小故請城之天子曰昔成王合諸侯城成周以為東都崇文德焉作成周遷殷民以為京師之東都所以崇文王之德今我欲徼福假靈於成王修成周之城俾戍人無勤諸侯用寧蝥賊逺屏晉之力也蝥賊喻灾害范獻子謂魏獻子曰與其戍周不如城之魏獻子曰善使伯音對伯音韓不信曰天子有命敢不奉承以奔告於諸侯遲速衰序衰差也序次也於是焉在在周所命冬十一月晉魏舒韓不信如京師合諸侯之大夫於狄泉尋盟且令城成周尋平丘盟己丑士彌牟營成周計丈數計所當城之丈數也揣高卑度高曰揣度厚薄仞溝洫度深曰仭物土方議逺邇物相也相取土之方靣逺近之宜量事期如事幾時畢計徒庸知用幾人功慮材用知費幾材用書餱糧知用幾糧食以令役於諸侯屬役賦丈付所當城尺丈書以授帥帥諸侯之大夫而效諸劉子效致也韓簡子臨之以為成命臨履其事以命諸侯經所以不書魏舒年昭三十二定公元年春王正月庚寅栽栽設板築城三旬而畢乃歸諸侯之戍左氏傳小司寇掌外朝之政以致萬民而詢焉二曰詢國遷國遷謂徙都改邑也秋官大卜國大遷則貞龜正龜於卜位也士喪禮曰卜人抱龜燋先奠龜西靣是也又不親命龜亦太遷輕於大祭祀也春官大史大遷國抱法以前法司空營國之法也抱之以前當先王至知諸位處同上天府若遷寶則奉之奉猶送也同上右遷國盤庚既遷奠厥攸居乃正厥位綏爰有衆盤庚既遷新邑定其所居正君臣上下之位慰勞臣民遷徙之勞以安有衆之情也盤庚下篤公劉匪居匪康乃埸乃疆乃積乃倉乃裹餱糧于槖于囊思戢用光弓矢斯張干戈戚揚爰方啓行賦也篤厚也公劉后稷之曾孫也居安康寧也埸疆田畔也積露積也餱食糧糗也無底曰槖有底曰囊輯和戚斧揚鉞方始也公舊說召康公以成王將蒞政當戒以民事故詠劉之事以告之曰厚哉公劉之於民也其在西戎不敢寧居治其田疇實其倉廩既富且强於是裹其餱糧思以輯和其民人而光顯其國家然後以其弓矢斧鉞之備爰始啓行而遷都於豳焉蓋亦不出其封內也篤公劉于胥斯原既庶既繁既順乃宣而無永嘆陟則在巘復降在原何以舟之維玉及瑶鞞琫容刀賦也胥相也庶繁謂居之者衆也順安宣遍也言居之遍也無永歎得其所不思舊也巘山頂也舟帶也鞞刀鞘也琫刀上飾也容刀容飾之刀也或曰容刀如言容臭謂鞞琫之中容此刀耳於言公劉至豳欲相土以居而帶此劍佩以上下山原也東萊呂氏曰以如是之佩服而親如是之勞苦斯其所以為厚於民也歟篤公劉逝彼百泉瞻彼溥原乃陟南岡乃覯于京京師之野于時處處于時廬旅于時言言于時語語賦也溥大覯見也京高丘也師衆也京師高丘而衆居也董氏曰所謂京師者蓋起於此其後世因以所都為京師也時是也處處居室也廬寄也旅賔旅也直言曰言論難曰語廣此章言營度邑居也自下觀之則往百泉而望原自上觀之則陟南岡而覯于京於是為之居室於是廬其賔旅於是言其所言於是語其所語無不於斯焉篤公劉于京斯依蹌蹌濟濟俾筵俾几既登乃依乃造其曹執豕于牢酌之用匏食之飲之君之宗之賦也依安也蹌蹌濟濟羣臣有威儀貌俾使也使人為之設筵几也登登筵也依依几也曹羣牧之處也以豕為殽用匏為爵儉以質也宗尊也主也嫡子孫主祭祀而族人尊之以為主也此章言宮室既成而落之既以飲食勞其羣臣而又為之君為之宗焉東萊呂氏曰既饗燕而定經制以整屬其民上則皆統于君下則皆統於宗蓋古者建國立宗其事相須楚執戎蠻子而致邑立宗以誘其遺民即其事也篤公劉既溥既長既景乃岡相其隂陽觀其流泉其軍三單度其隰原徹田為糧度其夕陽豳居允荒賦也溥廣也言其芟夷墾辟土地既廣而且長也景考日景以正四方也岡登高以望也相視也隂陽向背寒暖之宜也流泉水泉灌溉之利也三單未詳徹通也一井之田九百畝八家皆私百畝同養公田耕則通力而作收則計畝而分也周之徹法自此始其後周公蓋因而修之耳山西曰夕陽允信也荒大也法此言辨土宜以授所徙之民定其軍賦與其稅又度山西之田以廣之而豳人之居於此益大矣篤公劉于豳斯館涉渭為亂取厲取煆止基乃理爰衆爰有夾其皇澗遡其過澗止旅乃密芮鞠之即賦也館客舍也亂舟之截流橫渡者也厲砥煆鐵止居基定也理疆理也衆人多也有財足也遡鄉也皇過二澗名芮水名出吳山西北東入涇周禮職方作芮鞠水外也渭此章又總叙其始終言其始來未定居之時涉取材而為舟以來往取厲取煆而成宮室既止基於此矣乃疆理其田野則日益繁庶富足其居有夾澗者有遡澗者其止居之衆日以益密乃復即芮鞠而居之而豳地以廣矣大雅公劉古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇賦也朝早也走馬避狄難也滸水崖也漆沮之側也岐下岐山之下也姜女太王妃也胥相宇宅也周原膴膴堇荼如飴爰始爰謀爰契我龜曰止曰時築室于兹賦也周地名在岐山之南廣平曰原膴膴肥美貌堇烏頭也荼苦菜蓼屬也飴餳也契所以然火而灼龜者也儀禮所謂楚焞是也或曰以刀刻龜甲欲鑽之處也言周原土地之美雖物之苦者亦甘於是大王始與豳人之從己者謀居之又契龜而卜之既得吉兆乃告其民曰可以止於是而築室矣或曰時謂土功之時也乃慰乃止乃左乃右乃疆乃理乃宣乃畝自西徂東周爰執事賦也慰安止居也左右東西列之也疆謂畫其大界理謂别其條理也宣布散而居也或曰導其溝洫也畝治其田疇也自西徂東自西水滸而徂東也周遍也言靡事不為也乃召司空乃召司徒俾立室家其繩則直縮版以載作廟翼翼賦也司空掌營國邑司徒掌徒役之事繩所以為直凡營度位處皆先以繩正之既正則束版而築也縮束也載上下相承也言以索束版投土築訖則升下而上以相承載也君子將營宮室宗廟為先廏庫為次居室為後翼翼嚴正也救之陾陾度之薨薨築之登登削屢馮馮百堵皆興鼛鼓弗勝賦也救盛土於器也陾陾衆也度投土於版也薨薨衆聲也登登相應聲削屢牆成而削治重復也馮馮牆堅聲五版為堵興起也此言治宮室也鼛鼓長一丈二尺以鼓役事弗勝者言其樂事勸功鼓不能止也乃立臯門皋門有伉乃立應門應門將將乃立冢土戎醜攸行賦也傳曰王之郭門曰臯門伉高貌王之正門曰應門將將嚴正也大王之時未有制度特作二門其名如此及周有天下遂尊以為天子之門而諸侯不得立焉冢土大社也亦大王所立而後因以為天子之制也戎醜大衆也起大事動大衆必有事乎社而後出謂之宜大雅綿文王受命有此武功既伐于崇作邑于豐文王蒸哉賦也作邑徙都也豐即崇國之地在今鄠縣杜陵西南築城伊淢作豐伊匹匪棘其欲遹追來孝王后蒸哉賦也淢城溝也方十里為成成間有溝湥廣各八尺匹稱棘急也王后亦指文王也邑言文王營豐邑之城因舊溝為限而築之其作居亦稱其城而不侈大皆非急成已之所欲也特追先人之志而來致其孝耳鎬京辟雍自西自東自南自北無思不服皇王蒸哉賦也鎬京武王所營也在豐水東去豐邑二十五里張子曰周家自后稷居邰公劉居豳太王邑岐而文王則遷於豐至武王又居於鎬當是時民之歸者日衆其地有不能容不得不遷也此言武王徙居鎬京講學行禮而天下自服也考卜維王宅是鎬京維龜正之武王成之武王蒸哉賦也考稽宅居正决也成之作邑居也大雅文王有聲周之東遷晉鄭焉依幽王為犬戎所殺平王東徙晉文侯鄭武公左右王室故曰晉鄭焉依隱六年左氏傳邾文公卜遷於繹繹邾邑魯國鄒縣北有繹山史曰利於民而不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之左右以一人之命為言文公以百姓之命為主一人之命各有短長不可如何百姓之命乃傳世無窮故徙之遂遷於繹五月邾文公卒君子曰知命文十三年左氏傳晉人謀去故絳晉復命新田為絳故謂此故絳諸大夫皆曰必居郇瑕氏之地郇瑕古國名河東解縣西北有郇城沃饒而近盬盬鹽也猗氏縣鹽池是國利君樂不可失也韓獻子曰不可郇瑕氏土薄水淺土薄地下其惡易覯惡疾疢覯成也易覯則民愁民愁則墊隘墊隘羸困也於是乎有沈溺重膇之疾沈溺濕疾重膇足腫不如新田今平陽絳邑縣是土厚水深居之不疾高燥故有汾澮以流其惡汾水出太原經絳北西南入河澮水出平陽絳縣南西入汾惡垢穢且民從教無灾患十世之利也夫山澤林盬國之寶也國饒則民驕佚財易致則民驕侈近寶公室乃貧不可謂樂近寶則民不務本公說從之遷於新田成六年左氏傳禮書綱目卷五十六
