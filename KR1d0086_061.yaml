body:
  text: 禮書綱目卷五十九婺源江永撰封建通禮八補五百里甸服規方千里之内謂之甸服為天子服治田去王城面五百里百里賦納總甸服内之百里近王城者禾槀曰總入之供飼國馬二百里納銍銍刈謂禾穂三百里納秸服秸槀也服槀役四百里粟五百里米所納精者少矗者多五百里侯服甸服外之五百里侯候也斥候而服事百里采侯服内之百里供王事而已不主一二百里男邦男任也仕王者事三百里諸侯三百里同為王者斥候故合三為一名五百里綏服綏安也侯服外之五百里安服王者政教三百里揆文教揆度也度王者文教而行之三百里皆同二百里奮武衛文教外之二百里奮武衛天子所以安五百里要服綏服外之五百里要束以文教三百里夷守平常之教事王者而已二百里蔡蔡法也法三百里而差簡五百里荒服要服外之五百里言荒又簡略三百里蠻以文徳蠻來之不制以法二百里流流移也言政教隨其俗凡五服相距為方五千里東漸于海西被于流沙朔南曁聲教漸入也被及也此言五服之外皆與王者聲教而朝見訖于四海禹貢千里之内曰甸服治田出穀税千里之外曰采九州之内地取其美物以當穀税曰流謂九州之外也夷狄流移或貢或不禹貢荒服之外三百里蠻二百里流王制方千里之内為比服方二千里之内為要服方三千里之内為荒服此服名因於殷非周制也周書王會解大司馬以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿畿猶限也自王城以外五千里為界有分限者九籍其禮差之書也政職所共王政之職謂賦税也故書畿為近鄭司農云近當言畿春秋傳曰天子一畿列國一同詩殷頌曰邦畿千里維民所止夏官職方氏乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服服服事天子也詩云侯服于周同上邦畿方千里其外方五百里謂之侯服又其外方五百里謂之甸服又其外方五百里謂之男服又其外方五百里謂之采服又其外方五百里謂之衛服又其外方五百里謂之要服要服蠻服也此六服去王城三千五百里相距七千里公侯伯子男封焉九州之外謂之蕃國九州之外夷服鎮服蕃服也秋官大行人右畿服之制祭公謀父曰先王之制邦内甸服邦内謂天子畿内千里之地商頌曰邦畿千里維民所止王制曰千里之内曰甸京邑在其中央故夏書曰五百里甸服則古今同矣甸王田也服服其職業也自商以前并幾内為五服武王克殷周公致太平因禹所弼除畿内更制天下為九服千里之内謂之王畿王畿之外曰侯服侯服之外曰甸服今謀父諫穆王稱先王之制猶以王畿為甸服者甸古名世俗所習也故周襄王謂晉文公曰昔我先王之有天下也規方千里以為甸服是也周禮亦以蠻服為要服足以相况也邦外侯服邦外邦畿之外也方五百里之地謂之侯服侯服侯圻也言諸侯之近者嵗一來見也侯衛賔服此總言之也侯侯圻也衛衛圻也言自侯圻至衛圻其間凡五圻圻五百里五五二千五百里中國之界也謂之賔服常以服貢賔見於王也五圻者侯圻之外曰甸圻甸圻之外曰男圻男圻之外曰采圻采圻之外曰衛圻周書康誥曰侯甸男采衛是也凡此服數諸家之説皆紛錯不同唯賈君近之蠻夷要服蠻蠻圻也夷夷圻也周禮衛圻之外曰蠻圻去王城三千五百里九州之界也夷圻去王城四千里周禮行人職曰衛圻之外謂之要服此言蠻夷要服則夷圻朝貢或與蠻圻同也要者要結好信而服從也戎狄荒服戎狄去王城四千五百里至五千里也四千五百里為鎮圻五千里為蕃圻在九州之外荒裔之地與戎狄同俗故謂之荒荒忽無常之言也甸服者祭供日祭也此采地之君其見無數侯服者祀供月祀也堯舜及周侯服皆嵗見賔服者享供時享也享獻也周禮甸圻二嵗而見男圻三嵗而見采圻四嵗而見衛圻五嵗而見其見必以所貢助祭於廟孝經所謂四海之内各以其職來祭者是也要服者貢供嵗貢也要服六嵗一見也荒服者王王王事天子也周禮九州之外謂之蕃國世一見各以其所貴寳為贄故詩云自彼氐羌莫敢不來王國語周語襄王曰昔我先王之有天下也規方千里以為甸服規規盡而有之以供上帝山川百神之祀以其職貢供王祭也上帝天神五帝也山川五嶽河海也百神丘陵墳衍之神也以備百姓兆民之用以待不庭不虞之患百姓百官有世功者用財用也庭直也虞度也不直猶不道也不度不億度而至之患其餘以均分公侯伯子男其餘甸服之外地也均平也周禮公之地方五百里侯四百里伯三百里子二百里男百里使各有寧宇寧安也宇居也同上天子之田方千里象日月之大亦取畧同也此謂縣内以禄公卿大夫元士公侯田方百里伯七十里子男五十里不能五十里者不合於天子附於諸侯曰附庸天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸皆象星辰之大小也不合謂不朝㑹也小城曰附庸附庸者以國事附於大國未能以其名通也視猶比也元善也善士謂命士也此地殷所因夏爵三等之制也殷有鬼侯梅伯則殷爵三等者公侯伯也周武王初定天下更立五等之爵增以子男而猶因殷之地以九州之界尚狹也周公攝政致太平斥大九州之界制禮成武王之意封王者之後為公及有功之諸侯大者地方五百里其次侯四百里其次伯三百里其次子二百里其次男百里所囚殷之諸侯亦以功黜陟之其不合者皆益之地為百里焉是以周世有爵尊而國小爵卑而國大者唯天子畿内千里不増以禄羣臣不主為治民王制凡四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸閒田八州州二百一十國建立也立大國三十十三公也立次國六十十六卿也立小國百二十二十二小卿也名山大澤不以封者與民同財不得障管亦賦税之而已此大界方三千里三三而九方千里者九也其一為縣内餘八各立一州此殷制也周公制禮九州大界方七千里七七四十九方千里者四十有九也其一為畿内餘四十八八州各有方千里者六設法一州封地方五百里者不過四謂之大國又封方四百里者不過六又封方三百里者不過十一謂之次國又封方二百里者不過二十五及餘方百里者謂之小國盈上四等之數并四十九一州二百一十國則餘方百里者百六十四也凡處地方千里者五方百里者五十九其餘方百里者四十一附庸地也天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以朌其餘以禄士以為閒田縣内夏時天子所居州界名也殷曰畿詩殷頌曰邦畿千里維民所止周亦曰畿畿内大國九者三公之田三為冇致仕者副之為六也其餘三待封王之子弟次國二十一者卿之田六亦為有致仕者副之為十二又三為三孤之田其餘六亦待封王之子弟小國六十三大夫之田二十七亦為有致仕者副之為五十四其餘九亦以待封王之子弟三孤之田不副者以其無職佐公論道耳雖有致仕猶可即而謀焉朌讀為班凡九州千七百七十三國天子之元士諸侯之附庸不與不與不在數中也春秋傳曰禹會諸侯於塗山執玉帛者萬國言執玉帛則是唯謂中國耳中國而言萬國則是諸侯之地有方百里有方七十里有方五十里者禹承堯舜而然矣要服之内地方七千里乃能容之夏末旣衰夷狄内侵諸侯相并土地減國數少殷湯承之更制中國方三千里之界亦分為九州而建此千七百七十三國焉周公復唐虞之舊域分其五服為九其要服之内亦方七千里而因殷諸侯之數廣其土増其禹耳孝經説曰周千八百諸侯布列五千里内此又改周之法闗盛衰之中三七之間以為説也終此説之意五五二十五方千里者二十五也其一為畿内餘二十四州各有方千里者三其餘諸侯之地大小則未得而聞也方千里者為方百里者百封方百里者三十國其餘方百里者七十又封方七十里者六十為方百里者二十九方十里者四十其餘方百里者四十方十里者六十又封方五十里者百二十為方百里者三十其餘方百里者十方十里者六十名山大澤不以封其餘以為附庸閒田諸侯之有功者取於閒田以禄之其有削地者歸之閒田天子之縣内方千里者為方百里者百封方百里者九其餘方百里者九十一又封方七十里者二十一為方百里者十方十里者二十九其餘方百里者八十方十里者七十一又封方五十里者六十三為方百里者十五方十里者七十五其餘方百里者六十四方十里者九十六並同上列爵惟五分土惟三列爵惟五公侯伯子男也分土惟三公侯百里伯七十里子男五十里之三等也武成大司徒凡建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一土其地猶言度其地鄭司農云土其地但為正四方耳其食者半公所食租税得其半耳其半皆附庸小國也屬天子參之一者亦然故魯頌曰錫之山川土田附庸奄有龜蒙遂荒大東至於海邦論語曰季氏將伐顓臾孔子曰先王以為東蒙主且在邦域之中是社稷之臣此非七十里所能容然則方五百里四百里合於魯頌論語之言諸男食者四之一適方五十里獨此與今五經家説合耳地官凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男以周知天下以此率編知四海九州邦國多少之數方千里者為方百者百以方三百里之積以九約之得十一有奇云七伯者字之誤也周九州之界方七千里七七四十九方十里者四十九其一為畿内餘四十八八州各有方千里者六周公變殷湯之制雖小國地皆方百里是毎事言則者設法也設法者以待有功而大其封一州之中以其千里封公則可四又以其千里封侯則可六又以其千里封伯則可十一又以其千里封子則可二十五又以其千里封男則可百公侯伯子男亦不是過也州二百一十國以男備其數焉其餘以為附庸四海之封黜陟之功亦如之雖有大國爵稱子而已鄭司農云此制亦見大司徒職曰諸公之地方五百里諸侯之地方四百里諸伯之地方三百里諸子之地方二百里諸男之地方百里夏官職方氏右分封之制禹合諸侯於塗山執玉帛者萬國諸侯執玉附庸執帛塗山在夀春東北哀公七年在傳子産曰昔天子之地一圻方千里列國一同方百里自是以衰衰差降今大國多數圻矣襄二十五年左氏傳孟子曰天子之地方千里不千里不足以待諸侯諸侯之地方百里不百里不足以守宗廟之典籍待諸侯謂待其朝覲聘問之禮宗廟典籍祭祀會同之常制也周公之封於魯為方百里也地非不足而儉於百里太公之封於齊也亦為方百里也地非不足也而儉於百里二公有大勲勞於天下而其封國不過百里儉止而不過之意也王者立三公九卿二十七大夫足以教道照幽隠必復封諸侯何重民之至也善惡比而易知故擇賢而封之使治其民以著其徳極其才上以尊天子僃藩輔下以子養百姓施行其道開賢者之路謙不自專故裂土封賢因而象之象賢重民也諸侯封不過百里象雷震百里所潤雨同也七十里五十里差功徳也天子所治方千里此平土三千并數邑居山川至五十里名山大澤不以封者與百姓共之不使一國獨專也山木之饒水泉之利千里相通所均有無贍其不足制土三等何因土地有高下中王者即位先封賢者憂人之急也故列土為疆非為諸侯張官設府非為卿大夫皆為民也天下太平乃封親屬者示不私也即不私封之何普天之下莫非王土率土之濵莫非王臣海内之衆已盡得使之不忍使親屬無短足之居一人使封之親親之義也白虎通唐虞建官外有州牧侯伯州牧各總其州者侯伯次州牧而總諸侯者也周官弼成五服至於五千州十有二師外薄四海咸建五長五服甸侯綏要荒也言非特平治水土又因地域之逺近以輔成五服之制也五千者毎服五百里五服之地東西南北相距五千里也十二師者毎州立十二諸侯以為之師使之相牧以糾羣后也薄迫也九州之外迫於四海毎方各建五人以為之長而統率之也聖人經理之制其詳内畧外者如此益稷千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯屬連卒州猶聚也伯帥正猶長也凡長皆因賢侯為之殷之州長曰伯虞夏及周皆曰牧八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯老謂上公周禮曰九命作伯春秋傳曰自陜以東周公主之自陜以西召公主之天子使其大夫為三監監於方伯之國國三人使佐方伯領諸侯王制天子之大夫為三監監於諸侯之國者其禄視諸侯之卿其爵視次國之君其禄取之於方伯之地方伯為朝天子皆有湯沐之邑於天子之縣内視元士給齊戒日潔清之用浴用湯沐用潘同上五官之長曰伯是職方其擯於天子也曰天子之吏天子同姓謂之伯父異姓謂之伯舅自稱於諸侯曰天子之老於外曰公於其國曰君九州之長入天子之國曰牧天子同姓謂之叔父異姓謂之叔舅於外曰侯於其國曰君注見名器上篇曲禮大宰施典於邦國而建其牧立其監以侯伯有功徳者加命作州長謂之牧所謂八命作牧者監謂公侯伯子男各監一國書曰王啓監厥亂為民天官大司馬建牧立監以維邦國詳見治邦國章八命作牧謂侯伯有功徳者加命得專征伐於諸侯鄭司農云一州之牧王之三公亦八命九命作伯上公有功徳者加命為二伯得征五侯九伯者鄭司農云長諸侯為方伯春官大宗伯右牧伯之制王者必立牧方三人使窺逺牧衆也逺方之民有饑寒而不得衣食有獄訟而不平其寃失賢而不舉者入告乎天子天子於其君之朝也揖而進之曰意朕之政教有不得爾者邪何如乃有饑寒而不得衣食有獄訟而不平其寃失賢而不舉然後其君退而與其卿大夫謀之逺方之民聞之皆曰誠天子也夫我居之僻見我之近也我居之幽見我之明也可欺乎哉故牧者所以明四目達四聰也尚書大傳州伯者何謂也伯長也選擇賢良使長一州故謂之伯也唐虞謂之牧何尚質使大夫往來牧諸侯故謂之牧方立三人凡十二人王者所以有二伯者分職而授政欲其亟成也春秋公羊傳曰自陜以東周公主之自陜以西召公主之不分南北何東方被聖人化日少西方被聖人化日久故分東西使聖人主其難者賢者主其易者乃俱致太平也又欲令同有隂陽寒暑之節共法度也白虎通舜咨十有二牧曰食哉惟時柔逺能邇惇徳允元而難任人蠻夷率服牧養民之官十二牧十二州之牧也王政以食為首農事以時為先舜言足食之道惟在於不違農時也柔者憲而撫之也能者擾而習之也逺近之勢如此先其畧而後其祥也惇厚允信也徳有徳之人也元仁厚之人也難拒絶也任古又作壬包藏凶惡之人也言當厚有徳信仁人而拒姦惡也凡此五者處之各得其宜則不特中國順治雖蠻夷之國亦相率而服從矣舜與羊客問子思曰周自后稷封為王者後子孫據國至大王王季文王此固世為諸侯矣焉得為西伯乎子思曰吾聞諸子夏古之帝王中分天下使二公治之謂之二伯殷王帝乙之時王季以功九命作伯禮九命一命受職再命受服三命受位四命受器五命受則六命受官七命受國八命受牧九命作伯受圭瓚鬯之賜禮九錫一曰車馬二曰衣服三曰樂器四曰納陛五曰虎賁六曰朱戸七曰斧鉞八曰弓矢九曰圭瓚故文王因之得專征伐此以諸侯為伯猶周召之君為伯也周召之地在雍州岐山之陽古公亶父避狄自豳始徙於此修徳以建王業故啇王帝乙命其子季歴以為西伯至紂又命文王為西伯蓋商之州長曰伯謂以文王為伯而在西也故文王行化而雍梁荆豫徐揚之人咸被其徳而從之故語曰三分天下有其二以服事殷惟冀青兗一分屬紂矣文王受命作邑于豐而岐陽周召之地已空故分賜周公召公以為采邑施大王王季之化於己所職之國傳記言分陜而治者蓋此也孔叢子管仲曰昔召康公命我先君大公召康公周大保召公奭也曰五侯九伯女實征之以夾輔周室五等諸侯九州之伯皆得征討其罪齊桓因此命以夸楚賜我先君履東至于海西至于河南至于穆陵北至于無棣穆陵無棣皆齊境也履所踐履之界齊桓又因以自言其盛僖四年左氏傳自陜而東者周公主之自陜而西者召公主之陜者蓋今𢎞農陜縣是也隠五年公羊傳襄王命尹氏及王子虎内史叔興父策命晉侯為侯伯以策書命晉侯為伯僖二十八年左氏傳典瑞土圭封國則以土地土地猶度地也封諸侯以土圭度日景觀分寸長短以制其域所封也春官土方氏掌土圭之灋以土地相宅而建邦國土地猶度地知東西南北之深而相其可居者宅居也夏官小司徒凡建邦國立其社稷正其畿疆之封畿九畿地官封人凡封國設其社稷之壝封其四疆封國建諸侯立其國之封同上量人掌建國之灋營國城郭營后宮量市朝道巷門渠建立也立國有舊法式若匠人職云后君也言君容王與諸侯夏官古者百里之國三十里之遂二十里之郊九里之城三里之宮七十里之國二十里之遂九里之郊三里之城一里之宮五十里之國九里之遂三里之郊一里之城以城為宫遂郊之門執禁以譏異服譏異言𤣥或疑焉匠人營國方九里謂天子城也今大國九里小則與天子同春秋傳曰中五之一小九之一以此推説國大都之地方百步中都之城六十步小都之城三十二步三分之一非也然則大國七里之城小國三里之城焉為近可也盛者天子十二里之城諸侯大國九里次國七里小國五里尚書大傳匠人王宮隅之制七雉宮隅城隅謂角浮思也雉長三丈高一丈度高以高度廣以廣環涂七軌環涂謂環城之首宮隅之制以為諸侯之城制諸侯畿以外也其城隅制高七丈宫隅門阿皆五丈禮器曰天子諸侯臺門環涂以為諸侯經涂經亦謂城中道諸侯環涂五軌野涂三軌考工記大宗伯王大封則先告后土后土土神也黎所食者春官大祝建邦國先告后土用牲幣后土土神也同上司几筵凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几斧謂之黼其繡白黑采以絳帛為質依其制如屏風然於依前為王設席左右有几優至尊也鄭司農云紛讀為豳又讀為和粉之粉謂白繡也純讀為均服之均純縁也繰讀為藻率之藻次席虎皮為席書顧命曰成王將崩命大保芮伯畢公等被冕服憑玉几𤣥謂紛如綬有文而狹者繅席削蒲蒻展之編以五采若今合歡矣盡謂雲氣也次席桃枝席有次列成文同上大宗伯王命諸侯則儐儐進之也王將出命假祖廟立依前南鄉儐者進當命者延之命使登内史由王右以䇿命之降再拜稽首登受䇿以出此其畧也諸侯爵禄其臣則於祭焉同上内史凡命諸侯則策命之詳見職官下篇巾車金路鉤樊纓九就建大旂同姓以封象路朱樊纓七就建大赤異姓以封革路龍勒條纓五就建大白以封四衛木路前樊鵠纓建大麾以封蕃國同姓以封謂王子母弟率以功徳出封雖為侯伯其盡服猶如上公若魯衛之屬其無功徳各以親疏食采畿内而已異姓王甥舅四衛四方諸侯守衛者蠻服以内蕃國謂九州之外夷服鎮服蕃服詳見名器下篇春官罪隷凡封國若家牛助為牽徬鄭司農云凡封國若家謂建諸侯立大夫家也牛助為牽徬此官主為送致之也𤣥謂牛助國以牛助轉徙也罪隷牽徬之在前曰牽在旁曰徬秋官右封國之禮古者於嘗出田邑順隂義也國地屬隂統祭諸侯受命於周乃建大社於周中受封也其壝東青土南赤土西白土北驪土中央亹以黄土將建諸侯鑿取其方一面之土苞以黄土苴以白茅以為土封故曰受則土於周室其方謂建東方諸侯以青土而覆茅苴裏土封之以為社也汲冢周書作雒解乃命魯公俾侯于東錫之山川土田附庸魯公伯禽也附庸猶屬城也小國不能自達於天子而附於大國也魯頌閟宮周公何以稱大廟于魯封魯公以為周公也周公拜乎前魯公拜乎後始受封時拜於文王廟也尚書曰用命賞於祖是也父子俱拜者明以周公之功封魯公也曰生以養周公生以魯國供養周公死以為周公主如周公死當以魯公為祭祀主加曰者成王始授其茅土之辭禮記明堂位曰封周公於曲阜地方七百里革車千乗蓋以為有王功故半天子也年文十三公羊傳魯人三郊三遂國外曰郊郊外曰遂天子六軍則六鄉六遂大國三軍故魯三郊三遂也費誓衛子魚曰武王克商成王定之選建明徳以蕃屏周故周公相王室以尹天下尹正也於周為睦睦親厚也以盛徳見親厚分魯公以大路大旂魯公伯禽也此大路金路錫同姓諸侯車也交龍為旂周禮同姓以封夏后氏之璜璜美玉名封父之繁弱封父古諸侯也繁弱大弓名殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜醜衆也以法則周公用即命于周即就也使六族就周受周公之法制是使之職事于魯共魯公之職事以昭周公之明徳昭顯也分之土田陪敦陪增也敦厚也祝宗卜史大祝宗人大卜大史凡四官備物典策典䇿春秋之制官司彝器官司百官也彞器常用器因商奄之民啇奄國名也與四國流言或迸散在魯皆令即屬魯懷柔之命以伯禽伯禽周公世子時周公惟遣伯禽之國故皆以付伯禽而封於少皥之虚少皥虚曲阜也在魯城内分康叔康叔衛之祖以大路少帛綪茷旃旌少帛雜帛也綪茷大赤取染草名也通帛為旃析羽為旌大呂鐘名殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略自武父以南及圃田之北竟畛塗所徑也畧界也武父衛北界圃田鄭藪名取於有閻之土以共王職有閻衛所受朝宿邑蓋近京畿取於相土之東都以會王之東蒐為湯沐邑王東巡守以助祭泰山聃季授土耼季周公弟司空陶叔授民陶叔司徒命以康誥而封於殷虛康誥周書殷虚朝歌也皆啟以商政疆以周索皆魯衛也啟開也居殷故地因其風俗開用其政疆理土地以周法索法也分唐叔唐叔晉之祖以大路密須之鼓密須國名闕鞏甲名姑洗鐘名懷姓九宗職官五正懷姓唐之餘民九宗一姓為九族職官五正五官之長命以唐誥而封於夏虚唐誥誥命篇名也夏虚大夏今大原晉陽也啟以夏政亦因夏風俗開明其政疆以戎索大原近戎而寒不與中國同故自以戎法三者皆叔也而有令徳故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也定四年左氏傳肅慎氏貢楛矢石砮其長尺有咫肅慎北夷也楛木名砮鏃也以石為之八寸曰咫先王欲昭其令徳之致逺也以示後人使永監焉監視也故銘其栝曰肅慎氏之貢矢刻曰銘栝葥羽之閒也以分大姬配虞胡公而封諸陳分予也大姫武王元女胡公舜後虞遏父之子胡滿也古者分同姓以珍玉展親也展重也玉謂若夏后氏之璜分異姓以逺方之職貢使無忘服也故分陳以肅慎氏之貢陳媯姓也國語魯語天子存二代之後猶尊賢也尊賢不過二代過之逺難法也二或為三牲郊特右封帝王後虞舜以堯子丹朱為賔曰虞賔而不臣之夏禹封丹朱於唐舜子商均於虞皆有疆土以奉先祀服其服禮樂如之以客禮不臣也杜佑通典武王克殷反商未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞投殷之後於宋反當為及字之誤也及商謂至紂都也牧誓曰至於商郊牧野封謂故無土地者也投舉徙之辭也時武王封紂子武庚於殷墟所徙者微子也後周公更封而大之樂記子産曰昔虞閼父為周陶正以服事我先王閼父舜之後當周之興閼父為武王陶正我先王賴其利器用也與其神明之後也舜聖故謂之神明庸以元女大姬配胡公庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之恪并二王後為三國其禮轉降示敬而已故曰三恪傳襄二十五年左氏王者所以存二王之後何也所以尊先王通天下之三統也明天下非一家之有謹敬謙讓之至也故封之百里使得服其正色用其禮樂永事先祖詩曰厥作祼將常服黼冔言微子服殷之冠助祭於周也周頌曰有客有客亦白其馬此微子朝周也白虎通大宰掌建邦之六典以佐王治邦國詳見政事上篇乃施典於邦國詳職官下篇凡治以典待邦國之治以九貢致邦國之用詳財賦篇以九兩繫邦國之民詳政事上篇典命掌諸侯之五儀詳職官下大宗伯以九儀之命正邦國之位詳職官下以玉作六瑞以等邦國詳名器下以凶禮哀邦國之憂詳凶禮以賔禮親邦國詳賔禮以軍禮同邦國詳軍禮以賑膰之禮親兄弟之國以賀慶之禮親異姓之國詳嘉禮嘉事雜記篇乃頒祀於邦國詳吉禮祭通禮大祝禁督逆祀命者頒祭號於邦國同上大史頒告朔於邦國詳王朝禮大司樂凡建國禁其淫聲過聲凶聲慢聲注見樂大司馬之職掌建邦國之九法以佐王平邦國平成也正也制畿封國以正邦國封謂五封於疆為界設儀辨位以等邦國儀謂諸侯及諸臣之儀辨別也别尊卑之位進賢興功以作邦國興猶舉也作起也起其勸善樂業之心使不情廢建牧立監以維邦國牧州牧也監監一國謂君也維猶聯結也制軍詰禁以糾邦國詰猶窮治也糾猶正也施貢分職以任邦國職猶賦税也任猶事也事以其力之所堪簡稽鄉民以用邦國簡謂比數之稽猶計也均守平則以安邦國諸侯有土地者均之尊者守大卑者守小則法也比小事大以和邦國比猶親使大國親小國小國事大國相合和也夏官職方氏凡邦國小大相維大國比小國小國事大國各有屬相維聯也王設其牧選諸侯之賢者為牧使牧理之制其職各以其所能牧監參伍之屬用能所任秩次制其貢各以其所有國之地物所有同上合方氏掌達天下之道路津梁相凑不得陷絶通其財利茂遷其有無同其數器權衡不得有輕重壹其度量尺丈釡鍾不得有大小除其怨惡怨惡邦國相侵虐同其好善所好所善謂風俗所髙尚形方氏掌制邦國之地域而正其封疆無有華離之地杜子春云離當為雜書亦或為雜𤣥謂華讀為􅏠哨之􅏠正之使不􅏠邪離絶使小國事大國大國比小國比猶親也易比象曰先王以建萬國親諸侯匡人掌達灋則匡邦國而觀其慝使無敢反側以聽王命法則八法八則也邦國之官府都鄙亦用焉憨姦偽之惡也反側猶背違法度也書曰無反無側王道正直撢人掌誦王志道國之政事以巡天下之邦國而語之道猶言也以王之志與政事諭説諸侯使不迷惑使萬民和説而正王面面猶鄉也使民之心暁而正鄉王並同上大行人王之所以撫邦國諸侯者歲徧存三歲徧覜五歲徧省七歲屬象胥諭言語協辭命九歲屬瞽史諭書名聴聲音十有一歲達瑞節同度量成牢禮同數器修灋則十有二歲王巡守殷國注見賔禮王侯聘問遣使及巡守會同篇小行人若國札喪則令賻補之若國凶荒則令賙委之若國師役則令槁禬之若國有福事則令慶賀之若國有禍烖則令哀弔之凡此五物者治其事故及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札喪凶荒厄貧為一書其康樂和親安平為一書凡此五物者毎國辨異之以反命于王以周知天下之故注見王侯聘問遣使掌交掌以節與幣巡邦國之諸侯及其萬民之所聚者道王之徳意志慮使咸知王之好惡辟行之節以為行信幣以見諸侯也咸皆也辟讀如辟忌之辟使皆知王之所好者而行之知王所惡者辟而不為使和諸侯之好有欲相與修好者則為和合之達萬民之説説所喜也達者達之于王若其國君掌邦國之通事而結其交好通事謂朝覲聘問也以諭九税之利九禮之親九牧之維九禁之難九戎之威諭告暁也九税所税民九職也九禮九儀之禮九牧九州之牧九禁九法之禁九戎九伐之戎秋官大司冦掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典注見刑辟天子之縣内諸侯禄也選賢置之於位其國之禄如諸侯不得世外諸侯嗣也有功乃封之使之世也冠禮記曰繼世以立諸侯象賢也王制繼絶世舉廢國治亂持危朝聘以時厚往而薄來所以懷諸侯也中庸右治邦國之法祭公謀父曰甸服者祭供日祭也此采地之君其見無數侯服者祀供月祀也堯舜及周侯服皆歲見賔服者享供時享也享獻也周禮甸圻二歲而見男圻三歲而見采圻四歲而見衛圻五歲而見其見也皆以所貢助祭於廟孝經所謂四海之内各以其職來祭要服者貢供歲貢也要服六歲一見荒服者王王王事天子也周禮九州之外謂之蕃國世一見各以其所貴寳為贄詩曰自彼氐羌莫敢不來王日祭日祭祭於祖考謂上食也近漢亦然月祀月祀於高曽時享時享於二祧歲貢歲貢於壇墠終王終謂世終也朝嗣王及即位而來見先王之訓也有不祭則修意意志意也謂邦國之内有一違闕不供日祭者先修志意以自責也圻内近知王意有不祀則修言言號令也有不享則修文文典法也有不貢則修名名謂尊卑職供之名號也晉語曰信於名則上下不干也有不王則修徳逺人不服則修文徳以來之序成而有不至則修刑序成謂上五者次序已成而有不至則有刑誅於是乎有刑不祭伐不祀征不享讓不貢讓譴責也告不王謂以文辭告暁之也地逺者罪輕於是乎有刑罰之辟刑不祭也有攻伐之兵伐不祀也有征討之備征不享也有威讓之令讓不貢也有文告之辭告不王也布令陳辭而又不至則又增修於徳無勤民於逺勤勞也是以近無不聽逺無不服國語周語芋尹無宇曰天子經畧經營天下畧有四海故曰經畧諸侯正封封疆有定分古之制也昭七年左氏傳繼世以立諸侯象賢也象法也為子孫行法先祖之賢故使之繼世也士冠記始封諸侯無子死不得與兄弟者何古者象賢也弟非賢者子孫至繼體諸侯無子得及親屬者以其俱賢者子孫也重其先祖之功故得及之禮服傳曰大宗不可絶同宗則可以為後繼世諸侯無子又無弟但有諸父庶兄當推與庶兄推親之序也王者受命而作興滅國繼絶世何為先王無道妄殺無辜及嗣子幼弱為强臣所奪子孫皆無罪因而絶重其先人之功故復立之誅君之子不立者義無所繼也諸侯世位象賢也今親被誅絶也春秋傳曰誅君之子不立君見弑其子得立何以尊君防篡弑也白虎通鄭伯以璧假許田非假而曰假諱易地也禮天子在上諸侯不得以地相與也書曰三載考績三考黜陟幽明其訓曰三歲而小考者正職而行事也九歲而大考者黜無職而賞有功也其賞有功也諸侯賜弓矢者得專征賜鈇鉞者得專殺賜圭瓚者得為鬯以祭不得專征者以兵屬於得専征之國春秋傳曰魯賦八百邾賦六百以兵屬于晉由是也不得專殺者以獄屬於專殺之國不得賜圭瓚者資鬯於天子之國然後祭資取尚書大傳天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之將謂執以致命祝鼗皆所以節樂諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓚然後為鬯未賜圭瓚則資鬯於天子得其器乃敢為其事圭瓚鬯爵也鬯秬酒也王制小宗伯掌衣服車旗宮室之賞賜注見名器上内史王制禄則贊為之以方出之注見職官下賞賜亦如之春官司勲掌六鄉賞地之灋以等其功賞地賞田也在逺郊之内屬六鄉焉等猶差也以功大小為差王功曰勲輔成王業若周公國功曰功保全國家若伊尹民功曰庸法施於民若后稷事功曰勞以勞定國若禹治功曰力制法成治若咎繇戰功曰多尅敵出奇若韓信陳平司馬法曰上多前虜凡有功者銘書於王之大常祭於大烝司勲詔之銘之言名也生則書於王旌以識其人與其功也死則於烝先王祭之詔謂告其神以辭也盤庚告其卿大夫曰兹予大享於先王爾祖其從與享之是也今漢祭功臣於朝廷大功司勲藏其貳貳猶副也功書蔵於天府又副於此者以其主賞掌賞地之政令政令謂役賦凡賞無常輕重眂功無常者功之大小不可豫凡頒賞地參之一食鄭司農云不以美田為采邑𤣥謂賞地之税參分計税王食其一也二全入於臣惟加田無國正加田旣賞之又加賜以田所以厚思也鄭司農云正謂税也禄田亦有給公家之賦貢若今時侯國有司農少府錢穀矣獨加賞之田無正耳夏官䕫始制樂以賞諸侯䕫欲舜與天下之君共此樂也徳盛而教尊五穀時孰然後賞之以樂樂記諸侯敵王所愾而獻其功敵猶當也愾恨怒也王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以明報功宴樂左大四年氏傳大司馬以九伐之灋正邦國馮弱犯寡則𤯝之賊賢害民則伐之暴内陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之外内亂鳥獸行則滅之注見軍禮一不朝則貶其爵再不朝則削其地三不朝則六師移之移之者誅其人而變置之也孟子諸侯得專征者鄰國有臣弑其君孽伐其宗者弗請於天子征之而歸其地于天子可也孽支子也宗適子也征伐也諸侯之有不率正者天子絀之率循也正正也一絀少絀以爵謂三年明也言少絀明以漸也再絀少絀以地謂六年時也三絀而爵地畢尚書大傳諸侯之有功者取於閒田以禄之其有削地者歸之閒田王制古者天子之制諸侯嵗獻貢士於天子天子試之於射宮其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓則削地注見嘉禮射義右黜陟巡守而行黜陟見賔禮巡守篇諸侯所以考黜何王者所以勉賢抑惡重民之至也禮記九錫車馬衣服樂朱户納陛虎賁鈇鉞弓矢秬鬯皆隨其徳可行而賜車馬能安民者賜衣服能使民和樂者賜以樂民衆多者賜以朱户能進善者賜以納陛能退惡者賜以虎賁能誅有罪者賜以鈇鉞能征不義者賜以弓矢孝道備者賜以秬鬯能安民故賜車馬以著其功徳安其身能使人富足衣食倉廩實故賜衣服以彰其體能使民和樂故賜之樂以事其先也禮曰未賜樂者不得以時王之樂事其宗廟也朱盛色户所以紀民數故民衆多賜朱戸也古者人君下賢降階一等而禮之故進賢賜之納陛以優之也旣能進善當能戒惡故賜虎賁虎賁者所以戒不虞而距惡距惡當斷刑故賜之鈇鉞所以斷大刑刑罰旣中則能征不義故賜弓矢弓矢所以征不義伐無道也圭瓚秬鬯宗廟之盛禮故孝道備而賜之秬鬯所以極著孝道孝道純備故内和外榮玉以象徳金以配情芬香條鬯以通神靈玉飾其本君子之性金飾其中君子之道也所以三歲一考績何三年有成故於是賞有功黜不肖何以知始考輒黜之尚書曰三年一考少黜以地書所言三考黜陟者謂爵土異也小國考之有功增土進爵後考無功削黜後考有功正而賜之矣五十里不過五賜而進爵土七十里不過七賜而進爵土能有小大行有進退也一説盛徳始封百里者賜三等得征伐專殺斷獄七十里伯始封賜二等至虎賁百人後有功賜弓矢復有功賜秬鬯增爵為侯益土百里復有功入為三公五十里子男始封賜一等至樂復有功稍賜至虎賁増爵為伯復有功稍賜至秬鬯增爵為侯未賜鈇鉞者從大國連帥方伯而斷獄受命之王致太平之主美羣臣上下之功故盡封之及中興征伐大功皆封所以著大功盛徳之士亦封之所以尊有徳也以徳封者必試之必附庸三年有功因而封五十里元士有功者亦為附庸世其位大夫功成封五十里卿功成封七十里公功成封百里士有功徳遷為大夫大夫有功徳遷為卿卿有功徳遷為公故爵主有徳封主有功也三公功成當封而死得立其子為附庸賢者之體能否一也百里公一削為七十里侯再削為七十里伯三削為寄公七十里伯一削為五十里伯二削為五十里子三削地盡五十里子一削為三十里子再削為三十里男三削地盡五十里男一削為三十里男再削為三十里附庸三削爵盡所以至三削何禮成於三三而不改雖反無益也先削地後黜爵者何爵者尊號也地者人所任也今不能治廣土衆民故先削其土地也君幼稚唯考不黜者何君子不偹責童子也二王後不貶黜者何尊賔客重先王也以其當公也罪惡足以絶之即絶更立其次周公誅禄甫立微子諸侯喑聾跛躄惡疾不免黜者何尊人君也世子有惡疾廢者何以其不可承先祖也白虎通平王曰父義和晉文侯仇字用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹黑黍曰秬釀以鬯草不言圭瓚可知卣中罅也當以錫命告其始祖故賜鬯彤赤虗黑也馬四匹曰乘書文侯之命齊桓公會諸侯于葵丘王使宰孔賜齊侯胙胙祭肉尊之比二王後賞服大路龍旂九旒渠門赤旂大路謂金路鉤樊纓九就龍旂畫交龍於縿也正幅為縿旁屬為旒鉤婁領之鉤樊馬大帶纓當胸削革為之皆以五采罽飾之九就就成也渠門兩旗所建以為軍門若今牙門也國語齊語晉文公以諸侯之師及楚人戰於城濮楚師敗績獻楚俘於王駟介百乘徒兵千人駟介四馬被甲徒兵步卒王命尹氏及王子虎内史叔興父䇿命晉侯為侯伯以䇿書命晉侯為伯也周禮九命作伯尹氏王子虎皆王卿士也叔興父大夫也三官命之以寵晉賜之大輅之服戎輅之服人輅金輅戍輅戎車二輅各有服彤弓一彤矢百玈弓矢千彤赤弓玈黑弓弓一矢百則矢千弓十矣諸侯賜弓矢然後專征伐秬鬯一卣秬黑黍鬯香酒所以降神卣器名虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝逖逺也有惡於王者糾而逺之晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命稽首首至地丕大也休美也受䇿以出出入三覲出入猶去來也從來至去凡三見王僖二十八年左氏傳文公元年天王使毛伯來錫公命錫者何賜也命者何加我服也古者三載考績三考黜陟幽明文公新即位功未足施而賜之非禮也公羊傳禮有受命無來錫命錫命非正也穀梁傳襄王使大宰文公及内史興賜晉文公命大宰文公卿士王子虎也内史興周内史叔興父晉文公獻公之子惠公異母兄重耳也命命服也諸侯七命冕服七章上卿逆於境逆迎也晉侯郊勞郊迎用辭勞也館諸宗廟館舍也舍於宗廟尊王命也饋九牢牛羊豕為一牢上公饔餼九牢設庭燎設大燭於庭謂之庭燎及期命於武宮期將事之日也武宮文公之祖武公之廟也命受王之命設桑主布几筵主獻公之主也練主用栗虞主用桑禮旣塟而虞虞而作主天子於是爵命世子世子即位受命服也獻公死已久於此設之者文公不欲繼於惠憞故立獻公之主自以子繼父之位行未踰年之禮筵席也大宰涖之晉侯端委以入説云𤣥𤣥端冠委貌諸侯祭服也昭謂上士服也諸侯之子未受爵命服士服也大宰以王命命冕服冕大冠也服鷩衣也内史贊之三命而後即冕服贊道也三命三以王命命文公文公三讓後就旣畢賔饗贈餞如公命侯伯之禮而加之以宴好賔者主人所以接賔致飧饔之屬饗饗食之禮贈致贈賄之禮餞謂郊送飲酒之禮如公命侯伯之禮者如公受王命以侯伯待之之禮而又加之以宴好也大宰上卿也而言公者兼之内史興歸以告王曰晉不可不善也其君必霸逆王命敬謂上卿逆於境晉侯郊勞奉禮義成謂三讓賔饗之屬皆加禮國語周語諸侯失國而後託於諸侯禮也古者諸侯岀奔他國食其廩餼謂之寄公孟子諸侯不臣寓公故古者寓公不繼世寓寄也寄公之子非賢者世不足尊也寓或為託郊特牲右寓公土方氏掌土圭之灋以土地相宅而建都鄙夏官大司徒凡造都鄙制其地域而封溝之詳見井田縣師凡造都邑量其地辨其物而制其域物謂地所有也名山大澤不以封地官封人凡封國封其四疆造都邑之封域者亦如之同上量人營國城郭營后宮量市朝道巷門渠造都邑亦如之夏官匠人王宮門阿之制五雉野涂五軌門阿之制以為都城之制都四百里外距五百里王子弟所封其城隅高五丈宮隅門阿皆三丈野涂以為都經涂經亦謂城中道都環涂野涂皆三軌考工記掌固若造都邑則治其固與其守灋都邑亦為城郭夏官小司徒乃經土地而井牧其田野詳見井田載師以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任畺地詳見井田凡任地甸稍縣都皆無過十二詳見財賦大宰以八則治都鄙一曰祭祀以馭其神二曰灋則以馭其官三曰廢置以馭其吏四曰禄位以馭其士五曰賦貢以馭其用六曰禮俗以馭其民七曰刑賞以馭其威八曰田役以馭其衆都之所居曰鄙則亦法也典法則所用異異其名也都鄙公卿大夫之禾邑王子弟所食邑周召毛耼畢原之屬在畿内者祭祀其先君社稷五祀法則其官之制度廢猶退也退其不能者舉賢而置之禄若今月奉也位爵次也賦口率出泉也貢功也九職之功所税也禮俗昬姻喪紀舊所行也鄭司農云士謂學士乃施則於都鄙詳職官下凡治以則待都鄙之治天官都宗人掌都宗祀之禮凡都祭祀致福於國注見吉禮祭通禮正都禮與其服注見名器上若有寇戎之事則保羣神之壝注見祭通禮國有大故則令禱祠旣祭反命於國注見因事之祭篇春官家宗人掌家祭祀之禮凡祭祀致福注見祭通禮國有大故則令禱祠反命祭亦如之注見因事之祭掌家禮與其衣服宮室車旗之禁令掌亦正也不言寇戍保羣神之壝則都家自保之都宗人所保者謂王所祀明矣同上都司馬掌都之士庶子及其衆庶車馬兵甲之戒令庶子卿大夫士之子車馬兵甲備軍發卒以國灋掌其政學政謂賦税也學修徳學道以聴國司馬聴者受行其所徵為也國司馬大司馬之屬皆是家司馬亦如之大夫家臣為司馬者春秋傳曰叔孫氏之司馬鬷戾夏官方士掌都家聴其獄訟之辭詳見刑辟凡都家之大事聚衆庶則各掌其方之禁令以時修其縣灋若歲終則省之而誅賞焉詳政事上凡都家之士所上治則主之注見刑辟秋官朝大夫掌都家之國治都家王子弟公卿及大夫之采地也主其國治者平理其來文書於朝者日朝以聴國事故以告其君長國事故天子之事當施於都家者也告其君長使知而行之也君謂其國君長使卿大夫也國有政令則令其朝大夫使以告其都家之吏凡都家之治於國者必因其朝大夫然後聴之唯大事弗因謂以小事文書來者朝大夫先平理之乃以告有司也大事者非朝大夫所能平理凡都家之治有不及者則誅其朝大夫不及謂有稻殿之在軍旅則誅其有司有司都司馬家司馬同上都則闕都士闕家士闕上並同右都邑天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度言今不然也春秋昭元年秦伯之弟鍼出奔晉刺其有千乘之國不能容其母弟禮運子云貧而好樂富而好禮衆而以寧者天下其幾矣言如此者寡也寧安也大族衆家恆多作亂故制國不過千乘都城不過百雉家富不過百乘以此坊民諸侯猶有畔者古者方十里其中六十四井出兵車一乘此兵賦之法也成國之賦千乘雉度名也髙一丈長三丈為雉百雉為長三百丈方五百步子男之城方五里百雉者此謂大都三闕之一坊記大夫功成未封子得封者善善及子孫也諸侯入為公卿大夫得食兩家采不曰有能然後居其位徳加於人然後食其禄所以尊賢重有徳也今以盛徳入輔佐兩食之何王制曰天子之縣内諸侯禄也外諸侯嗣也天子太子食采者儲君嗣主也當有土以尊之也太子食百里與諸侯封同故禮曰公士大夫子子也無爵而在大夫上故知百里也公卿大夫皆食采者示與民同有無也白虎通鄭武公取武姜生莊公及共叔段姜氏愛段莊公即位為之請京使居之謂之京城大叔祭仲曰都城過百雉國之害也方丈曰堵三堵曰雉一雉之牆長三丈高一丈侯伯之城方五里徑三百雉故其大都不得過百雉先王之制大都不過三國之一三分國城之一中五之一小九之一今京不度非制也不合法度非先王制君將不堪其後大叔完聚完城郭聚人民繕甲兵具卒乘將襲鄭公伐之大叔出奔共隠元年左氏傳魯惠公之二十四年晉始亂故封桓叔於曲沃晉文侯卒子昭侯元年危不自安封成師為曲沃伯師服曰吾聞國家之立也本大而末小是以能固故天子建國立諸侯也諸侯立家卿大夫稱家卿置側室側室衆子也得立此一官大夫有貳宗適子為小宗次者為貳宗以相輔貳士有隷子弟士卑自以其子弟為僕隷庶人工商各有分親皆有等衰庶人無復尊卑以親疏為分别也衰殺也是以民服事其上而下無覬覦下不冀望上位今晉甸侯也而建國本旣弱矣其能久乎諸侯而在甸服者桓二年左氏傳辛伯諗周桓公諗告也事在桓十八年云大都耦國亂之本也閔公二年左傳楚靈王城陳蔡不羮襄城縣東南有不羮城定陵西北有不羮亭使棄疾為蔡公王問於申無宇曰棄疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊公城櫟而寘子元焉使昭公不立子元鄭公子莊公寘子元於櫟桓十五年屬公因之以殺櫟大夫檀伯遂居櫟卒使昭公不安位而見殺齊桓公城穀而寘管仲焉至於今賴之城穀在莊三十二年臣聞五大不在邊五細不在庭上古金木水火土謂之五官𤣥鳥氏丹鳥氏亦有五又以五鳩鳩民五雉為五工正蓋立官之本也末世隨事施職是以官無常數今無宇稱習古言故云五大也言五官之長專盛過節則不可居邉細弱不勝任亦不可居朝廷親不在外羈不在内今棄疾在外鄭丹在内襄十九年丹奔楚君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯曼伯檀伯也厲公得櫟又并京宋蕭亳實殺子游在莊十二年齊渠丘實殺無知在莊九年渠丘今齊國西安縣也齊大夫雍廩邑衛蒲戚實出獻公蒲寗殖邑戚孫林父邑出獻公在襄十四年若由是觀之則害於國末大必折折其本尾大不掉君所知也為十三年陳蔡作亂傳昭十一年左氏傳孔子言於定公曰家不藏甲邑無百雉之城古之制也今三家過制請皆損之乃使季氏宰仲由隳三都家語仲由為季氏宰將墮三都三都費郈成也疆盛將為國害故仲由欲毁之於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯不狃費宰也輒不得志於叔孫氏仲尼命申句須樂頎下伐之二子魯大夫仲尼時為司寇費人北二子奔齊二子不狃叔孫輒遂墮費將墮成公斂處父謂孟孫墮成齊人必至於北門成在魯北竟故且成孟氏之保障也無成是無孟氏也子偽不知佯不知我將不墮公圍成弗克定十二年左氏傳禮書綱目卷五十九
