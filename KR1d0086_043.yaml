body:
  text: 禮書綱目卷四十一婺源江永撰少牢饋食禮下吉禮八經舊篇名有司徹鄭目録云少牢之下篇也大夫既祭儐尸於堂之禮祭畢禮尸於室中天子諸侯之祭明日而繹有司徹於五禮屬吉有司徹徹室中之饋及祝佐食之俎卿大夫既祭而儐尸禮崇也儐尸則不設饌西北隅以此薦俎之陳有祭象而亦足以厭飫神天子諸侯明日祭於祊而繹春秋傳曰辛巳有事于大廟仲遂卒于垂壬午猶繹是也爾雅曰繹又祭也埽堂為賓尸新之少儀曰汎埽曰埽埽席前曰拚司宫攝酒更洗益整頓之今文攝為聶乃燅尸俎燅温也温尸俎於爨肵亦温焉獨言温尸俎則祝與佐食不與儐尸之禮古文燅皆作尋記或作燖春秋傳曰若可尋也亦可寒也卒燅乃升羊豕魚三鼎無腊與膚乃設扃鼏陳鼎于門外如初腊為庶羞膚従豕去其鼎者儐尸之禮殺於初如初者如廟門之外東方北面北上今文扃為鉉古文鼏為宻右將儐尸徹饌燅尸俎記三家者以雍徹詳樂類樂歌乃議侑于賓以異姓議猶擇也擇賓之賢者可以侑尸必用異姓廣敬也是時主人及賓有司已復内位古文侑皆作宥宗人戒侑戒猶告也南面告於其位戒曰請子為侑侑出俟于廟門之外俟待也待於外當與尸更入主人興禮事尸極敬心也右議侑司宫筵于户西南面為尸席也又筵于西序東面為侑席也尸與侑北面于廟門之外西上言與殊尊卑北面者賓尸而尸益卑西上統於賓客主人出迎尸宗人擯賓客尸而迎之主人益尊擯贊主人拜尸答拜主人又拜侑侑答拜主人揖先入門右道尸尸入門左侑従亦左揖乃讓沒霤相揖至階又讓主人先升自阼階尸侑升自西階西楹西北面東上東上統於其席主人東楹東北面拜至尸答拜主人又拜侑侑答拜拜至喜之右主人迎尸乃舉舉舉鼎也舉者不盥殺也司馬舉羊鼎司士舉豕鼎舉魚鼎以入陳鼎如初如初如阼階下西面北上雍正執一匕以従雍府執二匕以従司士合執二俎以従司士贊者亦合執二俎以従匕皆加于鼎東枋二俎設于羊鼎西西縮二俎皆設于二鼎西亦西縮雍正羣吏掌辨體名肉物者府其屬凡三匕鼎一匕四俎為尸侑主人主婦其二俎設于豕鼎魚鼎之西陳之宜具也古文縮皆為蹙雍人合執二俎陳于羊俎西並皆西縮覆二疏匕于其上皆縮俎西枋並併也其南俎司馬以羞羊匕湇羊肉湆其北俎司士以養豕匕湇豕肉湇豕脀湇魚疏匕匕柄有刻飾者古文並皆作併右鼎俎入主人降受宰几尸侑降主人辭尸對几所以坐安體周禮大宰掌贊玉几玉爵宰授几主人受二手横執几揖尸獨揖尸几禮主於尸主人升尸侑升復位位阼階賔階上位主人西面左手執几縮之以右袂推拂几三二手横執几進授尸于筵前衣袖謂之袂推拂去塵示新尸進二手受于手間受従手間謙也主人退尸還几縮之右手執外㢘北面奠于筵上左之南縮不坐左之者異於鬼神生人陽長左鬼神陰長右不坐奠之者几輕主人東楹東北面拜拜送几也尸復位尸與侑皆北面答拜侑拜者従於尸右主人授尸几主人降洗尸侑降尸辭洗主人對卒洗揖主人升尸侑升尸西楹西北面拜洗主人東楹東北面奠爵答拜降盥尸侑降主人辭尸對卒盥主人揖升尸侑升主人坐取爵酌獻尸尸北面拜受爵主人東楹東北面拜送爵降盥者為土汚手不可酌主婦自東房薦韭菹醢坐奠于筵前菹在西方婦贊者執昌菹醢以授主婦主婦不興受陪設于南昌在東方興取籩于房麷蕡坐設于豆西當外列麷在東方婦贊者執白黒以授主婦主婦不興受設于初籩之南白在西方興退昌昌本也韭菹醓醢昌本麋臡麷熬麥也蕡熬枲實也白熬稻黒熬黍此皆朝事之豆籩大夫無朝事而用之儐尸亦豐大夫之禮主婦取籩興者以饌異親之當外列辟鉶也退退入房也右主人獻尸乃升升牲體於俎也司馬朼羊亦司馬載載右體肩臂肫骼臑正脊一脡脊一横脊一短脅一正脅一代脅一腸一胃一祭肺一載于一俎言燅尸俎復序體者明所舉肩骼存焉亦著脊脅皆一骨也臑在下者折分之以為肉湇俎也一俎謂司士所設羊鼎西第一俎羊肉湆臑折正脊一正脅一腸一胃一嚌肺一載于南俎肉湇肉在汁中者以増俎實為尸加也必為臑折上所折分者嚌肺離肺也南俎雍人所設在南者此以下十一俎俟時而載於此厯説之爾今文湇為汁司士朼豕亦司士載亦右體肩臂肫骼臑正脊一脡脊一横脊一短脅一正脅一代脅一膚五嚌肺一載于一俎臑在下者順羊也俎謂雍人所設在北者侑俎羊左肩左肫正脊一脅一腸一胃一切肺一載于一俎侑俎豕左肩折正脊一脅一膚三切肺一載于一俎侑俎用左體侑賤其羊俎過三體有肫尊之加也豕左肩折折分為長兄弟俎也切肺亦祭肺互言之爾無羊湇下尸也豕又祭肺不嚌肺不備禮俎司士所設羊鼎西之北俎也豕俎與尸同阼俎羊肺一祭肺一載于一俎羊肉湇臂一脊一脅一腸一胃一嚌肺一載于一俎豕脀臂一脊一脅一膚三嚌肺一載于一俎阼俎主人俎無體逺下尸也以肺代之肺尊也加羊肉湇而有體崇尸恵亦尊主人臂左臂也侑用肩主人用臂下之也不言左臂者大夫尊空其文也降於侑羊體一而増豕膚三有所屈有所申亦所謂順而摭也阼俎司士所設豕鼎西俎也其湇俎與尸俎同豕俎又與尸豕爼同主婦俎羊左臑脊一脅一腸一胃一膚一嚌羊肺一載于一俎無豕體而有膚以主人無羊體不敢備也無祭肺有嚌肺亦下侑也祭肺尊言嚌羊肺者文承膚下嫌也膚在羊肺上則羊豕之體名同相亞也其俎司士所設在魚鼎西者司士朼魚亦司士載尸俎五魚横載之侑主人皆一魚亦横載之皆加膴祭于其上横載之者異於牲體彌變於神膴讀如殷冔之􅒐刳魚時割其腹以為大臠也可用祭也其俎又與尸豕俎同右載俎卒升卒已也已載尸羊俎賓長設羊俎于豆南賓降尸升筵自西方坐左執爵右取韭菹㨎于三豆祭于豆間尸取麷蕡宰夫贊者取白黑以授尸尸受兼祭于豆祭賓長上賓雍人授次賓疏匕與俎受于鼎西左手執俎左㢘縮之卻右手執匕枋縮于俎上以東面受于羊鼎之西司馬在羊鼎之東二手執挑匕枋以挹湇注于疏匕若是者三挑謂之歃讀如或㫪或枕之枕字或作挑者秦人語也此二匕者皆有淺升狀如飯槮挑長枋可以杼物於器中者注猶寫也今文挑作枕挹皆為扱尸興左執爵右取肺坐祭之祭酒興左執爵肺羊祭肺次賓縮執匕俎以升若是以授尸尸卻手受匕枋坐祭嚌之興覆手以授賓賓亦覆手以受縮匕于俎上以降嚌湇者明湇肉加耳嘗之以其汁尚味尸席末坐啐酒興坐奠爵拜告旨執爵以興主人北面于東楹東答拜旨美也拜告酒美答主人意古文曰東楹之東司馬羞羊肉湇縮執俎尸坐奠爵興取肺坐絶祭嚌之興反加于俎司馬縮奠俎于羊湇俎南乃載于羊俎卒載俎縮執俎以降絶祭絶肺末以祭周禮曰絶祭湇使次賓肉使司馬大夫禮多崇敬也尸坐執爵以興次賓羞羊燔縮執俎縮一燔于俎上鹽在右尸左執爵受燔㨎于鹽坐振祭嚌之興加于羊俎賓縮執俎以降燔炙尸降筵北面于西楹西坐卒爵執爵以興坐奠爵拜執爵以興主人北面于東楹東答拜主人受爵尸升筵立于筵末右尸卒爵主人酌獻侑侑西楹西北面拜受爵主人在其右北面答拜不洗者俱獻間無事也主人就右者賤不専階主婦薦韭菹醢坐奠于筵前醢在南方婦贊者執二籩麷蕡以授主婦主婦不興受之奠麷于醢南蕡在麷東主婦入于房醢在南方者立侑為尸使正饌統焉侑升筵自北方司馬横執羊俎以升設于豆東侑坐左執爵右取菹㨎于醢祭于豆間又取麷蕡同祭于豆祭興左執爵右取肺坐祭之祭酒興左執爵次賓羞羊燔如尸禮侑降筵自北方北面于西楹西坐卒爵執爵以興坐奠爵拜主人答拜答拜拜於侑之右右主人獻侑尸受侑爵降洗侑降立于西階西東面主人降自阼階辭洗尸坐奠爵于篚興對卒洗主人升尸升自西階主人拜洗尸北面于西楹西坐奠爵答拜降盥主人降尸辭主人對卒盥主人升尸升坐取爵酌酌者將酢主人司宫設席于東序西面主人東楹東北面拜受爵尸西楹西北面答拜主婦薦韭菹醢坐奠于筵前菹在北方婦贊者執二籩麷蕡主婦不興受設麷于菹西北蕡在麷西主人升筵自北方主婦入于房設籩于菹西北亦辟鉶長賓設羊俎于豆西主人坐左執爵祭豆籩如侑之祭興左執爵右取肺坐祭之祭酒興次賓羞匕湇如尸禮席末坐啐酒執爵以興司馬羞羊肉湇縮執俎主人坐奠爵于左興受肺坐絶祭嚌之興反加于湇俎司馬縮奠湇俎于羊俎西乃載之卒載縮執虚俎以降奠爵于左者神恵變於常也言受肺者明有授言虚俎者羊湇俎訖於此虚不復用主人坐取爵以興次賓羞燔主人受如尸禮主人降筵自北方北面于阼階上坐卒爵執爵以興坐奠爵拜執爵以興尸西楹西答拜主人坐奠爵于東序南不降奠爵於篚急崇酒侑升尸侑皆北面于西楹西見主人不反位知將與已為禮主人北面于東楹東再拜崇酒崇充也拜謝尸侑以酒薄充滿尸侑皆答再拜主人及尸侑皆升就筵右尸酢主人司宫取爵于篚以授婦贊者于房東以授主婦房東房户外之東主婦洗爵于房中出實爵尊南西面拜獻尸尸拜于筵上受尊南西面拜由便也主婦西面于主人之席北拜送爵入于房取一羊鉶坐奠于韭菹西主婦贊者執豕鉶以従主婦不興受設于羊鉶之西興入于房取糗與腶脩執以出坐設之糗在蕡西脩在白西興立于主人席北西面飲酒而有鉶者祭之餘鉶無黍稷殺也糗糗餌也腶脩擣肉之脯今文腶為斷尸坐左執爵祭糗脩同祭于豆祭以羊鉶之柶挹羊鉶遂以挹豕鉶祭于豆祭祭酒次賓羞豕匕湇如羊匕湇之禮尸坐啐酒左執爵嘗上鉶執爵以興坐奠爵拜主婦答拜執爵以興司士羞豕脀尸坐奠爵興受如羊肉湇之禮坐取爵興次賓羞豕燔尸左執爵受燔如羊燔之禮坐卒爵拜主婦答拜受爵酌獻侑侑拜受爵主婦主人之北西面答拜酌獻者主婦今文無西面主婦羞糗脩坐奠糗于麷南脩在蕡南侑坐左執爵取糗脩兼祭于豆祭司士縮執豕脀以升侑興取肺坐祭之司士縮奠豕脀于羊俎之東載于羊俎卒乃縮執俎以降侑興豕脀無湇於侑禮殺次賓羞豕燔侑受如尸禮坐卒爵拜主婦答拜右主婦獻尸及侑受爵酌以致于主人主人筵上拜受爵主婦北面于阼階上答拜主婦易位拜于阼階上辟併敬主婦設二鉶與糗脩如尸禮主人共祭糗脩祭鉶祭酒受豕匕湇拜啐酒皆如尸禮嘗鉶不拜主人如尸禮尊也其異者不告旨其受豕脀受豕燔亦如尸禮坐卒爵拜主婦北面答拜受爵右主婦致爵于主人尸降筵受主婦爵以降將酢主婦主人降侑降主婦入于房主人立于洗東北西面侑東面于西階西南俟尸洗尸易爵于篚盥洗爵易爵者男女不相襲爵主人揖尸侑將升主人升尸升自西階侑從主人北面立于東楹東侑西楹西北面立俟尸酌尸酌主婦出于房西面拜受爵尸北面于侑東答拜主婦入于房司宫設席于房中南面主婦立于席西設席者主婦尊今文曰南面立于席西婦贊者薦韭菹醢坐奠于筵前菹在西方婦人贊者執麷蕡以授婦贊者婦贊者不興受設麷于菹西蕡在麷南婦人贊者宗婦之少者主婦升筵司馬設羊俎于豆南主婦坐左執爵右取菹㨎于醢祭于豆間又取麷蕡兼祭于豆祭主婦奠爵興取肺坐絶祭嚌之興加于俎坐捝手祭酒啐酒捝手者于帨帨佩巾内則曰婦人亦左佩紛帨古文捝作説次賓羞羊燔主婦興受燔如主人之禮主婦執爵以出于房西面于主人席北立卒爵執爵拜尸西楹西北面答拜主婦入立于房尸主人及侑皆就筵出房立卒爵宜鄉尊不坐者變於主人也執爵拜變於男子也右尸酢主婦上賓洗爵以升酌獻尸尸拜受爵賓西楹西北面拜送爵尸奠爵于薦左賓降上賓賓長也謂之上賓以將獻異之或謂之長賓奠爵爵止也右賓長三獻尸尸奠爵主人降洗爵尸侑降主人奠爵于篚辭尸對卒洗揖尸升侑不升侑不升尸禮益殺不從主人實爵酬尸東楹東北面坐奠爵拜尸西楹西北面答拜坐祭遂飲卒爵拜尸答拜降洗尸降辭主人奠爵于篚對卒洗主人升尸升主人實爵尸拜受爵主人反位答拜尸北面坐奠爵于薦左降洗者主人右主人酬尸尸侑主人皆升筵乃羞宰夫羞房中之羞于尸侑主人主婦皆右之司士羞庶羞于尸侑主人主婦皆左之二羞所以盡歡心房中之羞其籩則糗餌粉餈其豆則酏食糝食庶羞羔臐豕膮皆有胾醢房中之羞内羞也内羞在右陰也庶羞在左陽也右設羞主人降南面拜衆賓于門東三拜衆賓門東北面皆答壹拜拜于門東明少南就之也三拜者衆賓賤旅之也衆賓一拜賤也卿大夫尊賓賤純臣也位在門東今文壹為一主人洗爵長賓辭主人奠爵于篚興對卒洗升酌獻賓于西階上長賓升拜受爵主人在其右北面答拜宰夫自東房薦脯醢醢在西司士設俎于豆北羊骼一腸一胃一切肺一膚一羊骼羊左骼上賓一體賤也薦與設俎者既則俟于西序端古文骼為胳賓坐左執爵右取肺㨎于醢祭之執爵興取肺坐祭之祭酒遂飲卒爵執以興坐奠爵拜執爵以興主人答拜受爵賓坐取祭以降西面坐委于西階西南成祭於上尊賓也取祭以降反下位也反下位而在西階西南已獻尊之祭脯肺宰夫執爵以従設于祭東司士執俎以從設于薦東衆賓長升拜受爵主人答拜坐祭立飲卒爵不拜既爵既盡也長賓升者以次第升受獻言衆賓長拜則其餘不拜宰夫贊主人酌若是以辯主人每獻一人奠空爵于棜宰夫酌授于尊南今文若為如辯皆為徧辯受爵其薦脯醢與脀設于其位其位繼上賓而南皆東面其脀體儀也徧獻乃薦略之亦宰夫薦司士脀儀者尊體盡儀度餘骨可用而用之尊者用尊體卑者用卑體而已亦有切肺膚今文儀皆為􅬞或為議乃升長賓主人酌酢于長賓西階上北面賓在左主人酌自酢序賓意賓卑不敢酢主人坐奠爵拜執爵以興賓答拜坐祭遂飲卒爵執爵以興坐奠爵拜賓答拜賓降降反位右主人獻賓辯宰夫洗觶以升主人受酌降酬長賓于西階南北面賓在左主人坐奠爵拜賓答拜坐祭遂飲卒爵拜賓答拜宰夫授主人觶則受其虚爵奠于篚古文酌為爵主人洗賓辭主人坐奠爵于篚對卒洗升酌降復位賓拜受爵主人拜送爵賓西面坐奠爵于薦左右主人酬賓主人洗升酌獻兄弟于阼階上兄弟之長升拜受爵主人在其右答拜坐祭立飲不拜既爵皆若是以辯兄弟長幼立飲賤不别大夫之賓尊於兄弟宰夫不贊酌者兄弟以親昵來不以官待之辯受爵其位在洗東西面北上升受爵其薦脀設于其位亦辯獻乃薦既云辯矣復言升受爵者為衆兄弟言也衆兄弟升不拜受爵先著其位於上乃後云薦脀設于其位明位初在是也位不繼於主人而云洗東卑不統於尊此薦脀皆使私人其先生之脀折脅一膚一先生長兄弟折豕左肩之折其衆儀也右主人獻兄弟主人洗獻内賓于房中南面拜受爵主人南面于其右答拜内賓姑娣妹及宗婦獻于主婦之席東主人不西面尊不與為賓主禮也南面于其右主人之位恒左人坐祭立飲不拜既爵若是以辯亦有薦脀亦設薦脀於其位特牲饋食禮記曰内賓立于房中西墉下東面南上宗婦北堂東面北上右主人獻内賓主人降洗升獻私人于阼階上拜于下升受主人答其長拜乃降坐祭立飲不拜既爵若是以辯宰夫贊主人酌主人於其羣私人不答拜其位繼兄弟之南亦北上亦有薦脀私人家臣已所自謁除也大夫言私人明不純臣也士言私臣明有君之道北上不敢専其位亦有薦脀初亦北面在衆賓之後爾言繼者以爵既獻為文凡獻位定主人就筵古文曰升就筵右主人獻私人尸作三獻之爵上賓所獻爵不言三獻作之者賓尸而尸益卑可以自舉司士羞湇魚縮執俎以升尸取膴祭祭之祭酒卒爵不羞魚匕湇略小味也羊有正俎羞匕湇肉湇豕無正俎魚無匕湇隆汚之殺司士縮奠俎于羊俎南横載于羊俎卒乃縮執俎以降尸奠爵拜三獻北面答拜受爵酌獻侑侑拜受三獻北面答拜司馬羞湇魚一如尸禮卒爵拜三獻答拜受爵司馬羞湇魚變於尸酌致主人主人拜受爵三獻東楹東北面答拜賓拜於東楹東以主人拜受於席就之司士羞一湇魚如尸禮卒爵拜三獻答拜受爵尸降筵受三獻爵酌以酢之既致主人尸乃酢之遂賔意三獻西楹西北面拜受爵尸在其右以授之尸升筵南面答拜坐祭遂飲卒爵拜尸答拜執爵以降實于篚右賓長終三獻二人洗觶升實爵西楹西北面東上坐奠爵拜執爵以興尸侑答拜坐祭遂飲卒爵執爵以興坐奠爵拜尸侑答拜皆降三獻而禮小成使二人舉爵序殷勤於尸侑洗升酌反位尸侑皆拜受爵舉觶者皆拜送侑奠觶于右奠于右者不舉也神恵右不舉變於飲酒尸遂執觶以興北面于阼階上酬主人主人在右尸拜於阼階上酬禮殺坐奠爵拜主人答拜不祭立飲卒爵不拜既爵酌就于阼階上酬主人言就者主人立待之主人拜受爵尸拜送酬不奠者急酬侑也尸就筵主人以酬侑于西楹西侑在左坐奠爵拜執爵興侑答拜不祭立飲卒爵不拜既爵酌復位侑拜受主人拜送言酌復位明授於西階上主人復筵乃升長賓侑酬之如主人之禮遂旅也言升長賓則有贊呼之至于衆賓遂及兄弟亦如之皆飲于上上西階上遂及私人拜受者升受下飲私人之長拜於下升受兄弟之爵下飲之卒爵升酌以之其位相酬辯其位兄弟南位亦拜受拜送升酌由西階卒飲者實爵于篚末受酬者雖無所旅猶飲乃羞庶羞于賓兄弟内賓及私人無房中之羞賤也此羞同時羞則酌房中亦旅其始主婦舉酬於内賓遂及宗婦右旅酬兄弟之後生者舉觶于其長後生年少也古文觶皆為爵延景中詔校書定作觶洗升酌降北面立于阼階南長在左坐奠爵拜執爵以興長答拜長在左辟主人坐祭遂飲卒爵執爵以興坐奠爵拜執爵以興長答拜洗升酌降長拜受于其位舉爵者東面答拜爵止拜受答拜不北面者儐尸禮殺長賓言奠兄弟言止互相𤼵明相待也右兄弟舉觶于長兄弟賓長獻于尸如初無湇爵不止賓長者賓之長次上賓者非即上賓也如初如其獻侑酌致主人受尸酢也無湇爵不止别不如初者不使兄弟不稱加爵大夫尊也不用觚大夫尊者也右衆賓長獻賓一人舉爵于尸如初亦遂之於下一人次賓長者如初如二人洗觶之為也遂之于下者遂及賓兄弟下至于私人故言亦遂之于下也上言無湇爵不止互相𤼵明右更為旅酬賓及兄弟交錯其酬皆遂及私人爵無算算數也長賓取觶酬兄弟之黨長兄弟取觶酬賓之黨唯己所欲無有次第之數也右無算爵尸出侑従主人送于廟門之外拜尸不顧拜送之拜侑與長賓亦如之衆賓従従者不拜送也司士歸尸侑之俎尸侑尊送其家主人退反於寢也有司徹徹堂上下之薦俎也外賓尸雖堂上婦人不徹右送尸若不賓尸不賓尸謂下大夫也其牲物則同不得備其禮耳舊説云謂大夫有疾病攝昆弟祭曽子問曰攝主不厭祭不旅不假不綏祭不配布奠于賓賓奠而不舉而此備有似失之矣則祝侑亦如之謂尸七七飯時食飯八盛俎臑臂肫脡脊横脊短脅代脅皆牢盛者盛于肵俎也此七體羊豕其脊脅皆取一骨也與所舉正脊幹骼凡十矣肩未舉既舉而俎猶有六體焉魚七盛半也魚十有五而俎其一已舉必盛半者魚無足翼於牲象脊脅而已腊辯無髀亦盛半也所盛者右體也脊屬焉言無髀者云一純而俎嫌有之古文髀作脾卒盛乃舉牢肩尸受振祭嚌之佐食受加于肵卒已佐食取一俎于堂下以入奠于羊俎東不言魚俎東主于尊乃摭于魚腊俎俎釋三个其餘皆取之實于一俎以出个猶枚也魚摭四枚腊摭五枚其所釋者腊則短脅正脅代脅魚三枚而已古文摭為揲祝主人之魚腊取于是祝主人主婦俎之魚腊取於此者大夫之禮文待神餘也三者各取一魚其腊主人臂主婦臑祝則骼也與此皆於鼎側更載焉不言主婦未聞尸不飯告飽主人拜侑不言尸又三飯凡十一飯士九飯大夫十一飯其餘有十三飯十五飯佐食受牢舉如儐舉肺脊右不賓尸正祭以下皆下大夫不賓尸之禮主人洗酌酳尸賓羞肝皆如儐禮卒爵主人拜祝受尸爵尸答拜祝酌授尸尸以醋主人亦如儐其綏祭其嘏亦如儐肝牢肝也綏皆當作挼挼讀為藏其隋之隋古文為㨎其獻祝與二佐食其位其薦脀皆如儐右主人獻主婦其洗獻于尸亦如儐自尸侑不飯告飽至此與儐同者在上篇主婦反取籩于房中執棗糗坐設之棗在稷南糗在棗南婦贊者執栗脯主婦不興受設之栗在糗東脯在棗東主婦興反位棗饋食之籩糗羞籩之實雜用之下賓尸也栗脯加籩之實也反位反主人之北拜送爵位尸左執爵取棗糗祝取栗脯以授尸尸兼祭于豆祭祭酒啐酒次賓羞牢燔用俎鹽在右尸兼取燔㨎于鹽振祭嚌之祝受加于肵卒爵主婦拜祝受尸爵尸答拜自主婦反取籩至祝受加于肵此異于儐祝易爵洗酌授尸尸以醋主婦主婦主人之北拜受爵尸答拜主婦反位又拜上佐食綏祭如儐卒爵拜尸答拜主婦夾爵拜為不賓尸降崇敬今文醋曰酢主婦獻祝其酌如儐拜坐受爵主婦主人之北答拜自尸卒爵至此亦與儐同者亦在上篇宰夫薦棗糗坐設棗于菹西糗在棗南祝左執爵取棗糗祭于豆祭祭酒啐酒次賓羞燔如尸禮卒爵内子不薦籩祝賤使官可也自宰夫薦至賓羞燔亦異于儐主人受爵酌獻二佐食亦如儐主婦受爵以入于房右主婦獻賓長洗爵獻于尸尸拜受賓户西北面答拜爵止尸止爵者以三獻禮成欲神恵之均於室中是以奠而待之主婦洗于房中酌致于主人主人拜受主婦户西北面拜送爵司宫設席拜受乃設席變於士也主婦薦韭菹醢坐設于席前菹在北方婦贊者執棗糗以従主婦不興受設棗于菹北糗在棗西佐食設俎臂脊脅肺皆牢膚三魚一腊臂臂左臂也特牲五體此七三者以其牢與腊臂而牢腊俱臂亦所謂腊如牲體主人左執爵右取菹㨎于醢祭于豆間遂祭籩奠爵興取牢肺坐絶祭嚌之興加于俎坐捝手祭酒執爵以興坐卒爵拜無従者變於士也亦所謂順而摭也主婦答拜受爵酌以醋戸内北面拜自酢不更爵殺主人答拜卒爵拜主人答拜主婦以爵入于房尸作止爵祭酒卒爵賓拜祝受爵尸答拜作止爵乃祭酒亦變於士自爵止至作止爵亦異於儐祝酌授尸賓拜受爵尸拜送坐祭遂飲卒爵拜尸答拜獻祝及二佐食洗致爵于主人洗致爵者以承佐食賤新之主人席上拜受爵賓北面答拜坐祭遂飲卒爵拜賓答拜受爵酌致爵于主婦主婦北堂司宫設席東面北堂中房以北東面者變於士妻賓尸不變者賓尸禮異矣内子東面則宗婦南面西上内賓自若東面南上主婦席北東面拜受爵賓西面答拜席北東面者北為下婦贊者薦韭菹醢菹在南方婦人贊者執棗糗授婦贊者婦贊者不興受設棗于菹南糗在棗東婦人贊者宗婦之弟婦也佐食設俎于豆東羊臑豕折羊脊脅祭肺一膚一魚一腊臑豕折豕折骨也不言所折畧之特牲主婦觳折豕無脊脅下主人羊豕四體與腊臑而五主婦升筵坐左執爵右取菹㨎于醢祭之祭籩奠爵興取肺坐絶祭嚌之興加于俎坐捝手祭酒執爵興筵北東面立卒爵拜立飲拜既爵者變於大夫賓答拜賔受爵易爵于篚洗酌醋于主人户西北面拜主人答拜卒爵拜主人答拜賓以爵降奠于篚賓獻及二佐食至此亦異於儐乃羞宰夫羞房中之羞司士羞庶羞于尸祝主人主婦内羞在右庶羞在左右賓長獻中間尸止爵主婦致爵于主人主人降拜衆賓洗獻衆賓其薦脀其位其酬醋皆如儐禮主人洗獻兄弟與内賓與私人皆如儐禮其位其薦脀皆如儐禮卒乃羞于賓兄弟内賓及私人辯自乃羞至私人之薦脀此亦與儐同者在此篇不賓尸則祝猶侑耳卒已也乃羞者羞庶羞右主人獻衆賓兄弟内賓私人賓長獻于尸尸醋獻祝致醋賓以爵降實于篚致謂致爵于主人主婦不言如初者爵不止又不及佐食右次賓長獻賓兄弟交錯其醻無算爵此亦與儐同者在此篇右無算爵利洗爵獻于尸尸醋獻祝祝受祭酒啐酒奠之利獻不及主人殺也此亦異於儐右利獻主人出立于阼階上西面祝出立于西階上東面祝告于主人曰利成祝入主人降立于阼階東西面尸謖祝前尸従遂出于廟門祝反復位于室中祝命佐食徹尸俎佐食乃出尸俎于廟門外有司受歸之徹阼薦俎自主人出至此與儐雜者也先𧃊徹主人薦俎者變于士特牲饋食禮曰徹阼俎豆籩設于東序下乃𧃊如儐謂上篇自司宫設對席至此餕興出也古文𧃊作餕右告利成尸出徹俎𧃊卒𧃊有司官徹饋饌于室中西北隅南面如饋之設右几厞用席官徹饋者司馬司士舉俎宰夫取敦及豆此於尸謖改饌當室之白孝子不知神之所在庶其饗之於此所以為厭飫不令婦人改徹饌敦豆變於始也尚使官也佐食不舉羊豕俎親餕尊也厞隐也古文右作侑厞作茀納一尊于室中陽厭殺無𤣥酒司宫埽祭埽豆間之祭舊説云埋之西階東主人出立于阼階上西面祝執其俎以出立于西階上東面司宫闔牖户閉牖與户為鬼神或者欲幽闇祝告利成乃執俎以出于廟門外有司受歸之衆賓出主人拜送于廟門外乃反拜送賓也者亦拜送其長不言長賓者下大夫無尊賓也婦人乃徹徹祝之薦及房中薦俎不使有司者下上大夫之禮徹室中之饌有司饌之婦人徹之外内相兼禮殺右陽厭事畢禮書綱目卷四十一
