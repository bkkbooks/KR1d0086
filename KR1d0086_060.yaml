body:
  text: 禮書綱目卷五十八婺源江永撰職官下通禮七補大宰乃施典於邦國而建其牧立其監設其參傅其伍陳其殷置其輔乃者更申勅之以侯伯有功徳者加命作州長謂之牧所謂八命作牧者監謂公侯伯子男各監一國書曰王啓監厥亂為民參謂卿三人伍謂大夫五人鄭司農云殷治律輔為民之平也𤣥謂殷衆也謂衆士也王制諸侯上士二十七人其中士下士各居其上之三分輔府史庻人在官者天官大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人命於天子者天子選用之如今詔書除吏是矣小國亦三卿一卿命於天子二卿命於其君此文似誤脱耳或者欲見畿内之國二卿與王制次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫此諸侯使卿大夫覜聘並會之序也其位爵同小國在下爵異固在上耳其有中士下士者數各居其上之三分謂其為介若特行而並會也居猶當也此據大國而言大國之士為上次國之士為中小國之士為下士之數國皆二十七人各三分之上九中九下九以位相當則次國之上士當大國之中中當其下小國之上士當大國之下凡非命士亦無出會之事春秋傳謂士為㣲同上右侯國之官司徒司馬司空亞旅司徒司馬司空三卿也武王是時尚為諸侯故未偤六卿唐孔氏曰司徒主民治徒庶之政令司馬主兵治軍旅之誓戒司空主土治壘壁以營軍亞次旅衆也大國三卿下大夫五人士二十七人亞者卿之貳大夫是也旅者卿之屬士是也牧誓六命賜官此王六命之卿賜官者使得自置其臣治家邑如諸侯春官大宗伯大宰乃施則於都鄙而建其長立其兩設其伍陳其殷置其輔長謂公卿大夫王子弟食采邑者兩謂兩卿不言三卿者不足於諸侯鄭司農云兩謂兩丞天官仕於家者出鄉不與士齒亦賤王制右大夫之官大夫具官非禮也是謂亂國臣之奢富擬於國君敗亂之國也孔子謂管仲官事不攝焉得儉仕於公曰臣仕於家曰僕與家僕雜居齊齒非禮也是謂君與臣同國臣與僕相等輩而處是謂君臣共國無尊卑也僕不可與士齒禮運管仲官事不攝焉得儉攝兼也家臣不能具官一人常兼數事管仲不然皆言其侈論語王者之制祿爵公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等二五象五行剛柔十日祿所受食爵秩次也上大夫曰卿王制制三公一命卷若有加則賜也不過九命次國之君不過七命小國之君不過五命卷俗讀也其通則曰衮三公八命矣復加一命則服龍衮與王者之後同多於此則賜非命服也虞夏之制天子服有日月星辰周禮曰諸公之服自衮冕而下如王之服大國之卿不過三命下卿再命小國之卿與下大夫一命不著次國之卿者以大國之下互明之此卿命則異大夫皆同周禮公侯伯之卿三命其大夫再命子男之卿再命其大夫一命同上大宗伯以九儀之命正邦國之位毎命異儀貴賤之位乃正春秋傳曰名位不同禮亦異數壹命受職始見命為正吏謂列國之士於子男為大夫王之下士亦一命鄭司農云受職治職事再命受服鄭司農云受服受祭衣服為上士𤣥謂此受𤣥冕之服列國之大夫再命於子男為卿卿大夫自𤣥冕而下如孤之服王之中士亦再命則爵弁服三命受位鄭司農云受下大夫之位𤣥謂此列國之卿始有列位於王為王之臣也王之上士亦三命四命受器鄭司農云受祭器為上大夫𤣥謂此公之孤始得有祭器者也禮運曰大夫具官祭器不假聲樂皆具非禮也王之下大夫亦四命五命賜則鄭司農云則者法也出為子男𤣥謂則地未成國之名王之下大夫四命出封加一等五命賜之以方百里二百里之地者方三百里以上為成國王莽時以二十五成為則方五十里合今俗説子男之地獨劉子駿等識古有此制焉六命賜官鄭司農云子男入為卿治一官也𤣥謂此王六命之卿賜官者使得自置其臣治家邑如諸侯春秋襄十九年冬晉侯以諸侯圍齊荀偃為君禱河既陳齊侯之罪而曰曾臣彪將帥諸侯以討焉其官臣偃實先後之七命賜國王之卿六命出封加一等者鄭司農云出就侯伯之國八命作收謂侯伯有功徳者加命得專征伐於諸侯鄭司農云一州之牧王之三公亦八命九命作伯上公有功徳者加命為二伯得征五侯九伯者鄭司農云長諸侯為方伯春官典命掌諸侯之五儀諸臣之五等之命五儀公侯伯子男之儀五等謂孤以下四命三命再命一命不命也或言儀或言命互文也故書儀作義鄭司農義讀為儀上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命其國家宫室車旗衣服禮儀皆以七為節子男五命其國家宫室車旗衣服禮儀皆以五為節上公謂王之三公有徳者加命為二伯二王之後亦為上公國家國之所居謂城方也公之城蓋方九里宫方九百步侯伯之城蓋方七里宫方七百步子男之城蓋方五里宫方五百步大行人職則有諸侯圭藉冕服建常樊纓貳車介牢禮朝位之數焉王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之四命中下大夫也出封出畿内封於八州之中加一等褒有徳也大夫為子男卿為侯伯其在朝廷則亦如命數耳王之上士三命中士再命下士一命凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男誓猶命也言誓者明天子既命以為之嗣樹子不易也春秋桓九年曹伯使其世子射姑來朝行國君之禮是也公之子如侯伯而執圭侯伯之子如子男而執璧子男之子與未誓者皆次小國之君執皮帛而朝㑹焉其賓之皆以上卿之禮焉公之孤四命以皮帛眡小國之君其卿三命其大夫再命其士壹命其宫室車旗衣服禮儀各眡其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫壹命其士不命其宫室車旗衣服禮儀各眡其命之數視小國之君者列於卿大夫之位而禮如子男也鄭司農云九命上公得置孤卿一人春秋傳曰列國之卿當小國之君固周制也𤣥謂王制曰大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人同上大宗伯王命諸侯則儐注見封建内史凡命諸侯及孤卿大夫則䇿命之鄭司農説以春秋傳曰王命内史興父䇿命晉侯為侯伯䇿謂以簡䇿書王命其文曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命受䇿以出春官小宗伯賜卿大夫士爵則儐賜猶命也儐之如命諸侯之儀春秋文元年天王使毛伯来錫公命傳曰錫者何賜也命者何加我服也同上五十而爵賢者命為大夫王制五十命為大夫服官政統一官之政也内則天子之田方千里公侯田方百里伯七十里子男五十里不能五十里者不合於天子附於諸侯曰附庸天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸註見封建制農田百畝百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差也農夫皆受田於公田肥墝有五等収入不同也庶人在官謂府史之屬官長所除不命於天子國君者分或為糞諸侯之下士視上農夫祿足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿次國之卿三大夫祿君十卿祿小國之卿倍大夫祿君十卿祿此班祿尊卑之差王制諸侯之下士祿食九人中士食十八人上士食三十六人下大夫食七十二人卿食二百八十八人君食二千八百八十人次國之卿食二百一十六人君食二千一百六十人小國之卿食一百四十四人君食一千四百四十人次國之卿命於其君者如小國之卿天子之大夫為三監監於諸侯之國者其祿視諸侯之卿其爵視次國之君其祿取之於方伯之地方伯為朝天子皆有湯沐之邑於天子之縣内視元士給齊戒自潔清之用浴用湯沐用潘諸侯世子世國象賢也大夫不世爵使以徳爵以功謂縣内及列國諸侯為天子大夫者不世爵而世祿辟賢也未賜爵視天子之元士以君其國列國及縣内之國也諸侯之大夫不世爵祿同上内史王制祿則贊為之以方出之贊為之為之辭也鄭司農云以方出之以方版書而出之上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差諸侯之下士視上農夫祿足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿杜子春云方直謂今時牘也𤣥謂王制曰王之三公視公侯卿視伯大夫視子男元士視附庸賞賜亦如之春官司祿闕官地季秋收祿秩之不當者祿秩之不當恩所加增也月令大宰以八柄詔王馭羣臣一曰爵以馭其貴二曰祿以馭其富詳見下章司士以徳詔爵以功詔祿以能詔事以久奠食凡邦國三嵗則稽士任而進退其爵祿同上任官然後爵之位定然後祿之同上右爵祿北宫錡問曰周室班爵祿也如之何北宫姓錡名衛人班列也孟子曰其詳不可得聞也諸侯惡其害已也而皆去其籍然而軻也嘗聞其略也當時諸侯兼并僭竊故惡周制妨害己之所為也天子一位公一位侯一位伯一位子男同一位凡五等也君一位卿一位大夫一位上士一位中士一位下士一位凡六等此班爵之制也五等通於天下六等施於國中天子之制地方千里公侯皆方百里伯七十里子男五十里凡四等不能五十里不達於天子附於諸侯曰附庸此以下班祿之制也不能猶不足也小國之地不足五十里者不能自達於天子因大國以姓名通謂之附庸若春秋邾儀父之類是也天子之卿受地視侯大夫受地視伯元士受地視子男視比也徐氏曰王畿之内亦制都鄙受地也元士上士也大國地方百里君十卿祿卿祿四大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也十十倍之也四四倍之也倍加一倍也徐氏曰大國君田三萬二千畝其入可食二千八百八十人卿田三千二百畆可食二百八十八人大夫田八百畆可食七十二人上士田四百畆可食三十六人中士田二百畆可食十八人下士與庶人在官者田百畝可食九人至五人庶人在官府史胥徒也愚按君以下所食之祿皆助法之公田藉農夫之力以耕而収其租士之無田與庶人在官者則但受祿於官如田之入而已次國地方七十里君十卿祿卿祿三大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也三謂三倍之也徐氏曰次國君田二萬四千畝可食二千一百六十人卿田二千四百畝可食二百十六人小國地方五十里君十卿祿卿祿二大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也二即倍也徐氏曰小國君田一萬六千畝可食千四百四十人卿田一千六百畆可食百四十四人耕者之所獲一夫百畆百畆之糞上農夫食九人上次食八人中食七人中次食六人下食五人庶人在官者其祿以是差獲得也一夫一婦佃田百畆加之以糞糞多而力勤者為上農其所収可供九人其次用力不齊故有此五等庶人在官者其受祿不同亦有此五等也愚按此章之説與周禮王制不同蓋不可考闕之可也程子曰孟子之時去先王未逺載籍未經秦火然而班爵祿之制已不聞其詳今之禮書皆掇拾於煨燼之餘而多出於漢儒一時之傳㑹奈何欲盡信而句為之解乎然則其事固不可一二追復矣孟子爵人於朝與士共之必共之者所以審慎之也制王古者於禘也發爵賜服順陽氣也言爵命屬陽祭統古者明君爵有德而祿有功必賜爵祿於大廟示不敢專也故祭之日一獻君降立於阼階之南南鄉所命北面史由君右執䇿命之再拜稽首受書以歸而舍奠於其廟此爵賞之施也一獻一酳尸也舍當為釋聲之誤也非時而祭曰奠同上祿爵慶賞成諸宗廟所以示順也成諸宗廟於宗廟命之祭統有十倫六曰見爵賞之施焉祭義天子者爵稱也爵所以稱天子何王者父天母地為天之子也帝王之徳有優劣所以俱稱天子者何以其俱命於天而主治五千里内也所以名之為公侯者何公者通也公正無私之意也侯者候也候逆順也春秋傳曰王者之後稱公其餘大國稱侯小國稱伯子男也伯者百也子者孳也孳孳無己也男者任也公卿大夫者何謂也公之為言公正無私也卿之為言章善明理也大夫之為言扶進人者也故傳曰進賢達能謂之大夫也士者事也任事之稱也故傳曰通古今辨然否謂之事天子之士獨稱元士何士賤不得體君之尊故加元以别諸侯之士也王者太子亦稱士何舉從下升以為人無生得貴者莫不由士起禮士冠經天子之元子士也爵人於朝者示不私人以官與衆共之也大夫功成未封而死不得追爵賜之者以其未當股肱也春秋榖梁傳曰追賜死者非禮也世子三年喪畢必上受爵命於天子何明爵土者天子之有也臣無自爵之義童子當受父爵命使大夫就其國命之明王者不與童子為禮也白虎通文王之治岐也仕者世祿世禄者先王之世仕者之子孫皆教之教之而成材則官之如不足用亦使之不失其禄蓋其先世嘗有功德於民故報之如此忠厚之至也孟子武王克殷庶士倍祿倍祿復其紂時薄者也樂記秦后子來仕避景公仕于晉其車千乗從車千乗楚公子干来仕其車五乗子干恭王之庶子公子比也魯昭元年楚公子圉殺郟敖子干奔晉叔向為太傅實賦祿韓宣子問二公子之祿焉宣子韓起也代趙文子為政對曰大國之卿一旅之田公之孤四命五百人為旅為田五百頃上大夫一卒之田上大夫一命百人為卒為田百頃夫二公子者上大夫也皆一卒可也宣子曰秦公子富若之何其鈞之也鈞同也對曰夫爵以建事事職事也祿以食爵随爵尊卑徳以賦之功庸以稱之稱副也若何其以富賦祿也夫絳之富商韋藩木楗以過於朝韋藩韋蔽前後木楗木檐也唯其功庸少也言無功庸雖富不得服其尊服過於朝無位爵故也而能金玉其車文錯其服文文織錯錯鏤也言富商之財足以金玉其車文錯其服以其無位爵故不得為耳則止為韋藩木楗是也能行諸侯之賄言其財賄足以交於諸侯而無尋尺之禄無大績於民故也績功也八尺曰尋乃均其祿國語晉語徳左氏傳叔向曰底禄以德釣以年年同以尊公子以國不聞以富三載考績三考黜陟幽明庶績咸熙考核實也三考九載也九載則人之賢否事之得失可見於是陟其明而黜其幽賞罰明信人人力於事功此所以庻績咸熈也此言舜命二十二人之後立此考績黜陟之法以時舉行而卒言其效如此也舜典建官惟賢位事惟能建官惟賢不肖者不得進位事惟能不才者不能任武成大宰以八灋治官府一曰官屬以舉邦治二曰官職以辨邦治三曰官聯以㑹官治四曰官常以聴官治五曰官成以經邦治六曰官灋以正邦治七曰官刑以糾邦治八曰官計以弊邦治百官所居曰府弊斷也鄭司農云官屬謂六官其屬各六十若今博士大史大宰大祝大樂屬大常也小宰職曰以官府之六屬舉邦治一曰天官其屬六十是也官職謂六官之職小宰職曰以官府之六職辨邦治官聨謂國有大事一官不能獨供則六官共舉之聨讀為連古書連作聨聨謂連事通職相佐助也小宰職曰以官府之六聨合邦治官常謂各自領其官之常職非連事通職所共也官成謂官府之成事品式也小宰職曰以官府之八成經邦治官法謂職所主之法度官職主祭祀朝覲會同賔客者則皆自有其法度小宰職曰以法掌祭祀朝覲會同賔客之戒其官刑謂司刑所掌墨辠劓辠宫辠刖辠殺辠也官計謂三年則大計羣吏之治而誅賞之𤣥謂官刑司冦之職五刑其四曰官刑上能紏職官訃謂小宰之六訃所以斷羣吏之治以八則治都鄙二曰灋則以馭其官三曰廢置以馭其吏四曰祿位以馭其士法則其官之制度廢猶退也退其不能者舉賢而置之禄若今月奉也位爵次也鄭司農云士謂學士詳見封建以八柄詔王馭羣臣一曰爵以馭其貴二曰祿以馭其富三曰予以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過柄所秉執以起事者也詔告也助也爵謂公侯伯子男卿大夫士也詩云誨爾序爵言教王以賢否之第次也班禄所以富臣下書曰凡厥正人既富方穀幸謂言行偶合於善則有以賜予之以勸後也生猶養也賢臣之老者王有以養之成王封伯禽于魯曰生以養周公死以為周公後是也五福一曰壽奪謂臣有大罪沒入家財者六極四曰貧廢猶放也舜殛鯀于羽山是也誅責讓也曲禮曰齒路馬有誅凡言馭者所以敺之内之于善天官小宰以官府之六叙正羣吏一曰以叙正其位二曰以叙進其治三曰以叙作其事四曰以叙制其食五曰以叙受其㑹六曰以叙聴其情叙秩次也謂先尊後卑也治功狀也食禄之多少情争訟之辭也以官府之六屬舉邦治一曰天官其屬六十掌邦治大事則從其長小事則專達二曰地官其屬六十掌邦教大事則從其長小事則專達三曰春官其屬六十掌邦禮大事則從其長小事則專達四曰夏官其屬六十掌邦政大事則從其長小事則專達五曰秋官其屬六十掌邦刑大事則從其長小事則專達六曰冬官其屬六十掌邦事大事則從其長小事則專達大事從其長若庖人内外饔與膳夫共王之食小事專達若宫人掌舍各為一官六官之屬三百六十象天地四時日月星辰之度數天道備焉前此者成王作周官其志有述天授位之義故周公設官分職以法之以官府之六職辨邦治一曰治職以平邦國以均萬民以節財用二曰教職以安邦國以寧萬民以懐賔客三曰禮職以和邦國以諧萬民以事鬼神四曰政職以服邦國以正萬民以聚百物五曰刑職以詰邦國以糾萬民以除盜賊六曰事職以富邦國以養萬民以生百物懐亦安也賔客來共其委積所以安之聚百物者司馬主九畿職方制其貢各以其所有以官府之六聯合邦治一曰祭祀之聯事二曰賔客之聯事三曰喪荒之聯事四曰軍旅之聯事五曰田役之聯事六曰歛弛之聯事凡小事皆有聯鄭司農云大祭祀太宰贊玉幣司徒奉牛牲宗伯視滌濯涖玉鬯省牲鑊奉玉齍司馬羞魚牲奉馬牲司冦奉明水火大䘮大宰贊贈玉含玉司徒帥六卿之衆庶屬其六紖宗伯為上相司馬平士大夫司冦前王此所謂官聨杜子春弛讀為施𤣥謂荒政弛力役及國中貴者賢者服公事者老者疾者皆舍不以力役之事奉牲者其司空奉豕與以聴官府之六計弊羣吏之治一曰亷善二曰亷能三曰廉敬四曰廉正五曰廉灋六曰廉辨聴平治也平治官府之計有六事弊斷也既斷以六事又以亷為本善善其事有辭譽也能政令行也敬不解于位也正行無傾邪也法守法不失也辨辨然不疑惑也杜子春云亷辨或為亷端以灋掌祭祀朝覲㑹同賓客之戒具軍旅田役喪荒亦如之法謂其禮法也戒具戒官有事者所當共七事者令百官府共其財用治其施舍聴其治訟七事謂先四如之者三也施舍不給役者七事故書為小事杜子春云當為七事書亦為七事同上宰夫掌百官府之徴令辨其八職一曰正掌官灋以治要二曰師掌官成以治凡三曰司掌官灋以治目四曰旅掌官常以治數五曰府掌官契以治藏六曰史掌官書以贊治七曰胥掌官叙以治叙八曰徒掌官命以徴令别異諸官之八職以備王之徴召所為正辟於治官則冢宰也治要若嵗訃也師辟小宰宰夫也治凡若月訃也司辟上士中士治目若今日計也旅辟下士也治數毎事多少異也治藏藏文書及器物贊治若今起文書草也治叙次序官中如今侍曹伍伯傳吏朝也徴令趨走給召呼同上内史掌王之八枋之灋以詔王治一曰爵二曰祿三曰廢四曰置五曰殺六曰生七曰予八曰奪大宰既以詔王内史又居中貳之春官御史凡數從政者自公卿以下至胥徒凡數及其見在空闕者鄭司農讀言掌賛書數書數者經禮三百曲禮三千法度皆在𤣥以為不辭故改之云同上司士掌羣臣之版以治其政令嵗登下其損益之數辨其年嵗與其貴賤周知邦國都家縣鄙之數卿大夫士庶子之數損益謂用功過黜陟者縣鄙鄉遂之屬故書版為班鄭司農云班書或為版版名籍以詔王治告王所當進退以徳詔爵以功詔祿以能詔事以久奠食徳謂賢者食稍食也賢者既爵乃禄之能者事成乃食之王制曰司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後禄之惟賜無常賜多少由王不如禄食有常品掌國中之士治凡其戒令國中城中凡邦國三嵗則稽士任而進退其爵祿任其所掌治夏官凡官民材必先論之論謂考其徳行道藝論辨然後使之辨謂考問得其定也易曰問以辨之任事然後爵之爵謂正其秩次位定然後祿之與之以常食王制司馬辨論官材辨其論觀其材觀其所長論進士之賢者以告於王而定其論各署其所長論定然後官之使之世守任官然後爵之命之位定然後祿之大夫廢其事終身不仕死以士禮葬之以不任大夫也凡執技論力適四方臝股肱決射御謂擐衣出其臂脛使之射御決勝負見勇力凡執技以事上者祝史射御醫卜及百工言技謂此七者凡執技以事上者不貳事不移官欲專其事亦為不徳出鄉不與士齒賤也於其鄉中則齒親親也仕於家者出鄉不與士齒亦賤同上五官致貢曰享貢功也享獻也致其嵗終之功於王謂之獻也周禮大宰嵗終則令百宫府各正其治受其會聴其致事而詔王廢置曲禮司㑹以嵗之成質於天子司㑹冢宰之屬掌計要者成計要也質平也平其計要冢宰齊戒受質贊王受之大樂正大司宼市三官以其成從質於天子大樂正於周宗伯之屬市司市也於周司徒之屬從從於司㑹也大司徒大司馬大司空齊戒受質百官各以其成質於三官大司徒大司馬大司空以百官之成質於天子百官此三官之屬百官齊戒受質受平報也然後休老勞農饗養之成嵗事斷計要也制國用王制大宰嵗終則令百官府各正其治受其㑹正正處也㑹大訃也聽其致事而詔王廢置平其事来至者之功狀而奏白王三嵗則大計羣吏之治而誅賞之事久則聴之大無功不徒廢必罪之大有功不徒置必賞之鄭司農云三載考績官天小宰月終則以官府之叙受羣吏之要主每月之小訃贊冢宰受嵗㑹嵗終則令羣吏致事使齎嵗盡文書来至若今上訃正嵗帥治官之屬而觀治象之灋徇以木鐸曰不用灋者國有常刑正嵗謂夏之正月得四時之正以出教令者審也古者將有新令必奮木鐸以警衆使明聴也木鐸木舌也文事奮木鐸武事奮金鐸乃退以宫刑憲禁於王宫憲謂表縣之若今新有法令云令於百官府曰各修乃職考乃灋待乃事以聽王命其有不共則國有大刑乃猶女也同上宰夫嵗終則令羣吏正嵗㑹月終則令正月要旬終則令正日成而以攷其治治不以時舉者以告而誅之嵗終自周季冬正猶定也旬十日也治不時舉者謂違時令失期會正嵗則以灋警戒羣吏令修宫中之職事警勑戒之言鄭司農云正吏嵗夏之正月以法戒勑羣書其能者與其良者而以告於上良猶善也上謂小宰大宰也鄭司農云若今時舉孝廉賢良方正茂才異等同上司㑹掌邦之六典八灋八則之貳以逆邦國都鄙官府之治逆受而鉤考之掌國之官府郊野縣都之百物財用凡在書契版圖者之貳以逆羣吏之治而聽其㑹計郊四郊去國百里野甸稍也甸去國二百里稍三百里縣四百里都五百里書謂薄書契其最凡也版户籍也圖上地形象田地廣狭以參互考日成以月要考月成以嵗㑹攷嵗成參互謂司書之要貳與職内之入職嵗之出故書互為巨杜子春讀為參互以周知四國之治以詔王及冢宰廢置周猶徧也言四國者本逆邦國之治亦鉤考以告同上大司徒嵗終則令教官正治而致事嵗終自周季冬也教官其屬六十正治明處其文書致事上其計薄正嵗今於教官曰各共爾職修乃事以聽王命其有不正則國有常刑正嵗夏正月朔日地官小司徒嵗終則考其屬官之治成而誅賞治成治事之計令羣吏正要會而致事正嵗則帥其屬而觀教象之灋徇以木鐸曰不用灋者國有常刑令羣吏憲禁令修灋糾職以侍邦治憲表縣之同上鄉師嵗終則考六鄉之治以詔廢置若國大比則考教察辭稽器展事以詔誅賞考教視賢能以知道藝與不察辭視吏言事知其情實不展猶整具同上鄉大夫嵗終則命六鄉之吏皆㑹政致事會計也致事言其嵗盡文書同上州長嵗終則㑹其州之政令同上黨正嵗終則㑹其黨政帥其吏而致事族師嵗終則㑹政致事同上遂大夫令為邑者嵗終則㑹政致事不言其遂之吏而言為邑者容公邑及公卿大夫王子弟之采邑政令戒禁遂大夫亦施焉三嵗大比則帥其吏而興甿明其有功者屬其地治者興甿舉民賢者能者如六鄉之為也屬猶聚也又因舉吏治有功者而聚勅其餘以職事凡為邑者以四達戒其功事而誅賞廢興之四達者治民之事大通者有四夫家衆寡也六畜車輦也稼穡耕耨也旗鼓兵革也同上鄙師嵗終則㑹其鄙之政而致事同上天府凡官府鄉州及都鄙之治中受而藏之以詔王察羣吏之治察察其當黜陟者鄭司農云治中謂其治職薄書之要春官内史執國灋及國令之貳以考政事以逆㑹計國法六典八法八則同上小司宼乃命其屬入㑹乃致事得其屬之計乃令致之於王秋官士師嵗終則令正要㑹定計薄同上仲冬可以罷官之無事謂先時權所建者月令右任官帝曰咨汝二十有二人欽哉惟時亮天功二十二人四岳九官十二牧也周官言内有百揆四岳外有州牧侯伯蓋百揆者所以統庶官而四岳者所以統十二牧也既分命之又總告之使之各敬其職以相天事也曾氏曰舜命九官新命者六人命伯禹命伯夷咨四岳而命者也命垂命益泛咨而命者也命䕫命龍因人之讓不咨而命者也夫知道而後可宅百揆知禮而後可典三禮知道知禮非人人所能也故必咨於四岳若予工若上下草木鳥獸則非此之比故泛咨而已禮樂命令其體雖不若百揆之大然其事理精微亦非百工庶物之可比伯夷既以四岳之舉而當秩宗之任則其所讓之人必其中於典樂納言之選可知故不咨而命之也若稷契臯陶之不咨者申命其舊職而已又按此以平水土若百工各為一官而周制同領於司空此以士一官兼兵刑之事而周禮分為夏秋兩官蓋帝王之法隨時制宜所謂損益可知者以此舜典昔高陽氏有才子八人高陽帝顓頊之號八人其苗裔蒼舒隤敳檮戭大臨尨降庭堅仲容叔達此即垂益禹臯陶之倫庭堅即臯陶字齊聖廣淵明允篤誠天下之民謂之八愷齊中也淵深也允信也篤厚也愷和也高辛氏有才子八人高辛帝嚳之號八人亦其苗裔伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍此即稷契朱虎熊羆之倫忠肅共懿宣慈恵和天下之民謂之八元肅敬也懿美也宣徧也元善也此十六族也世濟其美不隕其名濟成也隕墜也以至於堯堯不能舉舜臣堯舉八愷使主后土后土地官禹作司空平水土即土地之官以揆百事莫不時序地平天成揆度也成亦平也舉八元使布五教於四方契作司徒五教在寛故知契在八元之中父義母慈兄友弟共子孝内平外成内諸夏外夷狄傳文十八年左氏臯陶曰都亦行有九德亦言其人有德乃言曰載采采禹曰何臯陶曰寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而廉剛而塞彊而義彰厥有常吉哉亦總也亦行有九德者總言徳之見於行者其凡有九也亦言其人有徳者總言其人之有徳也載行采事也總言其人有徳必言其行某事某事為可信騐也禹曰何者問其九徳之目也寛而栗者寛𢎞而莊栗也柔而立者柔順而植立也愿而恭者謹愿而恭恪也亂治也亂而敬者有治才而敬畏也擾馴也擾而毅者馴擾而果毅也直而温者徑直而温和也簡而亷者簡易而亷隅也剛而塞者剛健而篤實也彊而義者彊勇而好義也而轉語辭也正言而反應者所以明其德之不偏皆指其成德之自然非以彼濟此之謂彰著也成德著之於身而又始終有常其吉士哉日宣三徳夙夜浚明有家日嚴祇敬六德亮采有邦翕受敷施九徳咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝宣明也三徳六德者九德之中有其三有其六也浚治也亮亦明也有家大夫也有邦諸侯也浚明亮采皆言家邦政事明治之義氣象則有大小之不同三德而為大夫六徳而為諸侯以徳之多寡職之大小槩言之也夫九德有其三必日宣而充廣之而使之益以著九德有其六尤必日嚴而祗敬之而使之益以謹也翕合也德之多寡雖不同人君惟能合而受之布而用之如此則九德之人咸事其事大而千人之俊小而百人之又皆在官使以天下之才任天下之治唐虞之朝下無遺才而上無廢事者良以此也師師相師法也言百僚皆相師法而百工皆及時以趨事也百僚百工皆謂百官言其人之相師則曰百僚言其人之趨事則曰百工其實一也撫順也五辰四時也木火金水旺於四時而土則寄旺於四季也禮運曰播五行於四時者是也凝成也言百工趨時而衆功皆成也臯陶謨周公若曰拜手稽首告嗣天子王矣用咸告于王曰王左右常伯常任準人綴衣虎賁周公曰嗚呼休兹知恤鮮哉周公帥羣臣進戒于王贊之曰拜手稽首告嗣天子王矣羣臣用皆進戒曰王左右之臣有收民之長曰常伯有任事之公卿曰常任有守法之有司曰準人三事之外掌服器者曰綴衣執射御者曰虎賁皆任用之所當謹者周公於是歎自言曰美矣此官然知憂恤者鮮矣言五等官職之美而知憂其得人者少也呉氏曰綴衣虎賁近臣之長也葛氏曰綴衣周禮司服之類虎賁周禮之虎賁氏也古之人廸惟有夏乃有室大競籲俊尊上帝迪知忱恂于九徳之行乃敢教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣謀面用丕訓徳則乃宅人兹乃三宅無義民古之人有行此道者惟有夏之君當王室大强之時而求賢以為事天之實也廸知者蹈知而非苟知也忱恂者誠信而非輕信也言夏之臣蹈知誠信于九徳之行乃敢告教其君曰拜手稽首后矣云者致敬以尊其為君之名也曰宅乃事宅乃牧宅乃凖兹惟后矣云者致告以叙其為君之實也兹者此也言如此而后可以為君也即臯陶與禹言九徳之事謀面者謀人之面貌也言非廸知忱恂于九徳之行而徒謀之面貌用以為大順于徳乃宅而任之如此則三宅之人豈復有賢者乎蘇氏曰事則向所謂常任也牧則向所謂常伯也準則向所謂準人也一篇之中所論宅俊者參差不齊然大要不出此三者其餘則皆小臣百執事也桀徳惟乃弗作往任是惟暴徳罔後夏桀惡徳弗作徃昔先王任用三宅而作任者乃惟暴德之人故桀以䘮亡無後亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德亦越者繼前之辭也耿光也湯自七十里升為天子典禮命討昭著于天下所謂陟丕釐上帝之光命也三宅謂居常伯常任準人之位者三俊謂有常伯常任準人之才者克即者言湯所用三宅實能就是位而不曠其職所稱三俊實能就是徳而不浮其名也三俊説者謂他日次補三宅者詳宅以位言俊以徳者意其儲養待用或如説者所云也惟思式法也湯於三宅三俊嚴思而丕法之故能盡其宅俊之用而宅者得以効其職俊者得以著其才賢智奮庸登于至治其在商邑用協於厥邑近者察之詳其情未易齊畿甸之協則純之至也其在四方用丕式見徳逺者及之難其徳未易徧觀法之同則大之至也至純至大治道無餘藴矣亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯三宅三俊文武克知灼見皆曰心者即所謂廸知忱恂而非謀面也三宅已授之位故曰克知三俊未任以事故曰灼見以是敬事上帝則天職修而上有所承以是立民長伯則體統立而下有所寄人君位天人之兩間而俯仰無怍者以是也夏之尊帝商之丕釐周之敬事其義一也長如王制所謂五國以為屬屬有長伯如王制所謂二百一十國以為州州有伯是也立政任人準夫牧作三事言文武立政三宅之官也任人常任也準夫準人也牧常伯也以職言故曰事虎賁綴衣趣馬小尹左右攜僕百司庶府此侍御之官也趣馬掌馬之官小尹小官之長㩦僕攜持僕御之人百司若司裘司服庶府若内府大府之屬也大都小伯藝人表臣百司太史尹伯庶常吉士此都邑之官也吕氏曰大都小伯者謂大都之伯小都之伯也大都言都不言伯小伯言伯不言都互見之也藝人者卜祝巫匠執技以事上者表臣百司表外也表對裏之詞上文百司蓋内百司若内府内司服之屬所謂裏臣也此百司蓋外司若外府外司服之屬所謂表臣也太史者史官也尹伯者有司之長如庖人内饔膳夫則是數尹之伯也鐘師尹鐘磬師尹磬太師司樂則是數尹之伯也凡所謂官吏莫不在内外百司之中至于特見其名者則皆有意焉虎賁綴衣趣馬小尹左右㩦僕以扈衛親近而見庶府以冗賤人所易忽而見藝人恐其或興滛巧機詐以蕩上心而見太史以奉諱惡公天下後世之是非而見尹伯以大小相維體統所係而見若大都小伯則分治郊畿不預有司之數者既條陳厯數文武之衆職而總結之曰庶常吉士庶衆也言在文武之廷無非常徳吉士也司徒司馬司空亞旅此諸侯之官也司徒主邦教司馬主邦政司空主邦土餘見牧誓言諸侯之官莫不得人也諸侯之官獨舉此者以其名位通於天子歟夷㣲盧烝三亳阪尹此王官之監於諸侯四夷者也㣲盧見經亳見史三亳蒙為北亳穀熟為南亳偃師為西亳丞或以為衆或以夷名阪未詳古者險危之地封疆之守或不以封而使王官治之参錯於五服之間是之謂尹地志載王官所治非一此時舉其重者耳自諸侯三卿以降惟列官名而無他語承上庶常吉士之文以内見外也夫上自王朝内而都邑外而諸侯逺而夷狄莫不皆得人以為官使何其盛歟文王惟克厥宅心乃克立兹常事司牧人以克俊有徳文王惟能其三宅之心能者能之也知之至信之篤之謂故能立此常任常伯用能俊有德也不言準人者因上章言文王用人而克申知三有宅心之説故畧之也文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶言號令也庶獄獄訟也庶慎國之禁戒儲備也有司有職主者牧夫牧人也文王不敢下侵庶職惟于有司牧夫訓勅用命及違命者而已漢孔氏曰勞於求才逸於用賢庶獄庶慎文王罔敢知于兹上言罔攸兼則猶知之時不兼其事耳至此罔敢知則若未嘗知有其事蓋信任之益專也上言庶言此不及者號令出於君有不容不知者故也亦越武王率惟敉功不敢替厥義徳率惟謀從容徳以並受此丕丕基率循也敉功安天下之功義徳義德之人容徳容德之人蓋義德者有撥亂反正之才容德者有休休樂善之量皆成徳之人也周公上文言武王率循文王之功而不敢替其所用義徳之人率循文王之謀而不敢違其容徳之士意如虢叔閎夭散宜生太顛南宫括之徒所以輔成王業者文用之于前武任之於後故周公於君奭言五臣克昭文王受有殷命武王惟兹四人尚廸有禄正猶此叙文武用人而言並受此丕丕基也嗚呼孺子王矣繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶愼時則勿有間之我者指王而言若順也周公既述文武基業之大歎息而言曰孺子今既為王矣繼此以徃王其於立政立事準人牧夫之任當能明知其所順順者其心之安也孔子曰察其所安人焉庾哉察其所順者知人之要也夫既明知其所順采正而不他然後推心而大委任之使展布四體以為治相助左右所受之民和調均齊獄慎之事而又戒其勿以小人間之使得終始其治此任人之要也民而謂之受者言民者乃受之於天受之於祖宗非成王之所自有也立政惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承徳歸于宗周董正治官此書之本序也董督也治官凡治事之官也言成王撫臨萬國巡狩侯甸四方征討不庭之國以安天下之民六服諸侯之君無不奉承周德成王歸于鎬京督正治事之官外攘之功舉而益嚴内治之修也王曰若昔大猷制治於未亂保邦於未危若昔大道之世制治保邦於未亂未危之前即下文明王立政是也曰唐虞稽古建官惟百内有百揆四岳外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用又明王立政不惟其官惟其人百揆無所不總者四岳總其方岳者州牧各總其州者侯伯次州牧而總諸侯者也百揆四岳總治於内州牧侯伯總治於外内外相承體統不紊故庶政惟和而萬國咸安夏商之時世變事繁觀其㑹通制其繁簡官數加倍亦能用治明王立政不惟其官之多惟其得人而已今予小子祗勤于徳夙夜不逮仰惟前代時若訓迪厥官逮及時是若順也成王祗勤于徳早夜若有所不及然蓋修徳者任官之本也立太師太傅太保茲惟三公論道經邦燮理隂陽官不必備惟其人立始辭也三公非始於此立為周家定制則始于此也賈誼曰保者保其身體傅者傳之道義師道之教訓此所謂三公也隂陽以氣言道者隂陽之理恒而不變者也易曰一隂一陽之謂道是也論者講明之謂經者經綸之謂爕理者和調之也非經綸天下之大經参天地之化育者豈足以任此責故官不必備惟其人也少師少傅少保曰三孤貳公𢎞化寅亮天地弼予一人孤特也三少雖三公之貳而非其屬官故曰孤天地以形言化者天地之用運而無迹者也易曰範圍天地之化是也𢎞者張而大之寅亮者敬而明之也公論道孤𢎞化公燮理隂陽孤寅亮天地公論於前孤弼于後公孤之分如此冢宰掌邦治統百官均四海冢大宰治也天官卿治官之長是為冡宰内統百官外均四海蓋天子之相也百官異職管攝使歸于一是之謂統四海異宜調劑使得其平是之謂均司徒掌邦教敷五典擾兆民擾馴也地官卿主國教化敷君臣父子夫婦長㓜朋友五者之教以馴擾兆民之不順者而使之順也唐虞司徒之官固已職掌如此宗伯掌邦禮治神人和上下春官卿主邦禮治天神地祗人鬼之事和上下尊卑等列春官於四時之序為長故其官謂之宗伯成周合樂於禮官謂之和者蓋以樂而言也司馬掌邦政統六師平邦國夏官卿主戎馬之事掌國征伐統御六軍平治邦國平謂強不得陵弱衆不得暴寡而人皆得其平也軍政莫急於馬故以司馬名官何莫非政獨戎政謂之政者用以征伐而正彼之不正王政之大者也司宼掌邦禁詰姦慝刑暴亂秋官卿主冦賊法禁羣行攻刼曰冦詰姦慝刑强暴作亂者掌刑不曰刑而曰禁者禁於未然也吕氏曰姦慝隠而難知故謂之詰推鞠窮詰而求其情也暴亂顯而易見直刑之而已司空掌邦土居四民時地利冬官卿主國邦土以居士農工商四民順天時以興地利按周禮冬官則記考工之事與此不同蓋本闕冬官漢儒以考工記當之也六卿分職各率其屬以倡九牧阜成兆民六卿分職各率其屬官以倡九州之牧自内達之於外政治明教化洽兆民之衆莫不阜厚而化成也按周禮毎卿六十屬六卿三百六十屬也吕氏曰冡宰相天子統百官則司徒以下無非冢宰所統乃均列一職而併數之為六者綱在網中也乾坤之與六子並列於八方冢宰之與五卿並列於六職也六年五服一朝又六年王乃時巡考制度于四岳諸侯各朝于方岳大明黜陟五服侯甸男采衛也六年一朝㑹京師十二年王一巡狩時巡者猶舜之四仲巡狩也考制度者猶舜之協時月正日同律度量衡等事也諸侯各朝方岳者猶舜之肆覲東后也大明黜陟者猶舜之黜陟幽明也疏數異時繁簡異制帝王之治因時損益者可見矣王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其允懷建官之體統前章既訓廸之矣此則居守官職者咸在曰凡有官君子者合尊卑小大而同訓之也反者令出不可行而壅逆之謂言敬汝所主之職謹汝所出之令令出欲其行不欲其壅逆而不行也以天下之公理滅一己之私情則令行而民莫不敬信懐服矣學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆靣莅事惟煩學古學前代之古也制裁度也迷錯謬也典常當代之法也周家典常皆文武周公之所講畫至精至備凡莅官者謹師之而已不可喋喋利口更改而紛亂之也積疑不决必敗其謀怠惰忽畧必荒其政人而不學其猶正墻面而立必無所見而舉錯煩擾也戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱此下申戒卿士也王氏曰功以志崇業以仁廣斷以勇克此三者天下之達道也吕氏曰功者業之成也業者功之積也崇其功者存乎志廣其業者存乎勤勤由志而生志待勤而遂雖有二者當幾而不能果斷則志與勤虚用而終蹈後艱矣位不期驕禄不期侈恭儉惟徳無載爾偽作徳心逸日休作偽心勞日拙貴不與驕期而驕自至禄不與侈期而侈自至故居是位當知所以恭饗是禄當知所以儉然恭儉豈可以聲音笑貌為哉當有實得於已不可從事於偽作徳則中外惟一故心逸而日休休焉作偽則揜䕶不暇故心勞而日著其拙矣居寵思危罔不惟畏弗畏入畏居寵盛則思危辱當無所不致其祗畏苟不知祗畏則入于可畏之中矣後之患失者與思危相似然思危者以寵利為憂患失者以寵利為樂所存大不同也推賢讓能庶官乃和不和政龎舉能其官惟爾之能稱匪其人惟爾不任賢有徳者也能有才者也王氏曰道二義利而已推賢讓能所以為義大臣出于義則莫不出於義此庶官所以不争而和蔽賢害能所以為利大臣出於利則莫不出於利此庶官所以争而不和庶官不和則政必雜亂而不理矣稱亦舉也所舉之人能修其官是亦爾之所能舉非其人是亦爾不勝任古者大臣以人事君其責如此王曰嗚呼三事暨大夫敬爾百官亂爾有政以佑乃辟永康兆民萬邦惟無斁三事即立政三事也亂治也篇終歎息上自三事下至大夫而申戒勑之也其不及公孤者公孤徳尊位隆非有待於戒勑也禮周官載按此篇與今周禮不同如三公三孤周皆不或謂公孤兼官無正職故不載然三公論道經邦三孤貳公𢎞化非職乎職任之大無踰此矣或又謂師氏即太師保氏即太保然以師保之尊而反屬司徒之職亦無是理也又此言六年五服一朝而周禮六服諸侯有一嵗一見者二嵗一見者三嵗一見者亦與此不合是固可疑然周禮非聖人不能作也意周公方條治事之官而未及師保之職所謂未及者鄭重而未及言之也書未成而公亡其間法制有未施用故與此異而冬官亦缺要之周禮首末則未備周公未成之書也惜哉讀書者参互而考之周公經制可得而論矣王若曰伯冏惟予弗克于徳嗣先人宅丕后怵惕惟厲中夜以興思免厥愆伯冏臣名穆王言我不能于徳繼前人居大君之位恐懼危厲中夜以興思所以免其咎過昔在文武聰明齊聖小大之臣克懷忠良其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祗若萬邦咸休侍給侍左右者御車御之官僕從太僕羣僕凡從王者承承順之謂弼正救之謂雖文武之君聰明齊聖小大之臣咸懐忠良固無待於侍御僕從之承弼者然其左右奔走皆得正人則承順正救亦豈小補哉惟予一人無良實頼左右前後有位之士匡其不及繩愆糾謬格其非心俾克紹先烈無良言其質之不善也匡輔助也繩直糾正也非心非僻之心也先烈文武也今予命汝作大正正于羣僕侍御之臣懋乃后徳交修不逮大正太僕正也周禮太僕下大夫也羣僕謂祭僕隸僕戎僕齊僕之類穆王欲伯冏正其羣僕侍御之臣以勉進君徳而交修其所不及或曰周禮下大夫不得為正漢孔氏以為太御中大夫蓋周禮太御最長卞又有羣僕與此所謂正于羣僕者合且與君同車最為親近也愼簡乃僚無以巧言令色便辟側媚其惟吉士巧好令善也好其言善其色外飾而無質實者也便者順人之所欲辟者避人之所惡側者姦邪媚者諛説小人也吉士君子也言當謹擇汝之僚佐無任小人而惟用君子也又按此言愼簡乃僚則成周之時凡為官長者皆得自舉其屬不特辟除府史胥徒而已僕臣正厥后克正僕臣諛厥后自聖后徳惟臣不徳惟臣自聖自以為聖也僕臣之賢否係君徳之輕重如此吕氏曰自古小人之敗君徳為昏為虐為侈為縦曷其有極至於自聖猶若淺之為害穆王獨以是蔽之者蓋小人之蠱其君必使之虚美熏心傲然自聖則謂人莫已若而欲予言莫之違然後法家拂士日逺而快意肆情之事亦莫或齟齬其間自聖之證既見而百疾從之昏虐侈縦皆其枝葉而不足論也爾無昵于憸人充耳目之官迪上以非先王之典汝無比近小人充我耳目之官導君上以非先王之典蓋穆王自量其執徳未固恐左右以異端進而蕩其心也非人其吉惟貨其吉若時瘝厥官惟爾大弗克祗厥辟惟予汝辜戒其以貨賄任羣僕也言不于其人之善而惟以貨賄為善則是曠厥官汝大不能敬其君而我亦汝罪矣王曰嗚呼欽哉永弼乃后于彜憲彜憲常法也吕氏曰穆王卒章之命望於伯冏者深且長矣此心不繼造父為御周遊天下將必有車轍馬跡導其侈者果出於僕御之間抑不知伯冏猶在職乎否也穆王豫知所戒憂思深長猶不免躬自蹈之人心操捨之無常可懼哉擇吕氏曰陪僕􅉏御之臣後世視為賤品而不之者曽不知人主朝夕與俱氣體移養常必由之潜消黙奪於冥冥之中而明爭顕諫於昭昭之際抑末矣白周公作立政而歎綴衣虎賁知恤者鮮則君徳之所繋前此知之者亦罕矣周公表而出之其選始重穆王之用太僕正特作命書至與大司徒略等其知本哉伯冏官盛任使所以勸大臣也忠信重禄所以勸士也官盛任使謂官屬衆盛足任使令也蓋大臣不當親細事故所以優之者如此忠信重禄謂待之誠而養之厚蓋以身體之而知其所頼乎上者如此也中庸葵丘之㑹四命曰士無世官官事無攝取士必得無專殺大夫士世禄而不世官恐其未必賢也官事無攝當廣求賢才以充之不可以闕人廢事也取士必得必得其人也無專殺大夫有罪則請命于天子而後殺之也孟子尹氏卒尹氏者何天子之大夫也其稱尹氏何貶曷為貶譏世卿世卿者父死子繼也貶去名著氏者起其世也若曰世世尹氏也世卿非禮也禮公卿大夫士皆選賢而用之卿大夫任重職大不當世為其秉政久恩德廣小人居之必奪君之威權故尹氏世立王子朝齊崔氏世弑其君光君子疾其末則正其本見譏于卒者亦不可造次無故驅逐必因其過卒絶之明君案見勞授賞則衆譽不能進無功案見惡行誅則衆讒不能退無罪隠三年公羊傳齊崔氏出奔衞稱崔氏譏世卿世卿非禮也復見譏者嫌尹氏王者大夫職重不當世諸侯大夫任輕可世也因齊大國禍著故就可以為法戒明王者尊莫大於周室彊莫大於齊國世卿猶能危之宣十年公羊傳晉悼公即位使魏相士魴魏頡趙武為卿相魏錡子魴士㑹子頡魏顆子武趙朔子此四人其父祖皆有勞於晉國荀家荀㑹欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟無忌韓厥子使士渥濁為大傅使修范武子之法渥濁士貞于武子為景公大傳右行辛為司空使修士蒍之法辛將右行因以為氏士蒍獻公司空也弁糾御戎校正屬馬弁糾欒糾也校正主馬官使訓諸御知義戎士尚節義荀賓為右司士屬焉司士車右之官使訓勇力之士時使勇力皆車右也勇力多不順命故訓之以供時之使卿無共御立軍尉以攝之省卿戎御令軍尉攝御而已祁奚為中軍尉羊舌職佐之魏絳為司馬魏犨子也張老為候奄鐸遏宼為上軍尉籍偃為之司馬偃籍談父為上軍司馬使訓卒乗親以聴命相親以聴上命程鄭為乗馬御六騶屬焉使訓羣騶知禮程鄭荀氏别族乘馬御乘車之僕也六騶六閑之騶周禮諸侯有六閑馬乗車尚禮容故訓羣騶使知禮凡六官之長皆民譽也大國三卿晉時置六卿為軍帥故總舉六官則知羣官無非其人舉不失職官不易方官守其業無相踰易爵不踰徳量徳授爵師不陵正旅不偪帥正軍將命卿也師二千五百人之帥也旅五百人之帥也言上下有禮不相陵偪民無謗言所以復覇也此以上通言悼公所行未必皆在即位之年成十八年左氏傳楚公子午為令尹代子囊公子罷戎為右尹蒍子馮為大司馬子馮叔敖從子公子囊師為右司馬公子成為左司馬屈到為莫敖屈到屈蕩子公子追舒為箴尹追舒莊王子子南屈蕩為連尹養由基為宫廏尹以靖國人君子謂楚於是乎能官人官人國之急也能官人則民無覦心無覬覦以求幸詩云嗟我懷人寘彼周行能官人也詩周南也寘置也行列也周徧也詩人嗟嘆言我思得賢人置之徧于列位是后妃之志以官人為急王及公侯伯子男甸采衛大夫各居其列所謂周行也言自王以下諸侯大夫各任其職則是詩人周行之志也甸采衛五服之名也天子所居千里曰圻其外曰侯服次曰甸服次曰男服次曰采服次曰衛服五百里為一服不言侯男畧舉也㐮十五年左氏傳禮書綱目卷五十八
