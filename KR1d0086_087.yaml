body:
  text: 禮書綱目卷八十五婺源江永撰樂記樂六補凡音之起由人心生也人心之動物使之然也感於物而動故形於聲宫商角徵羽雜比曰音單出曰聲形猶見也聲相應故生變樂之器彈其宫則衆宫應然不足樂是以變之使雜也易曰同聲相應同氣相求春秋傳曰若以水濟水誰能食之若琴瑟之專一誰能聽之變成方謂之音方猶文章也比音而樂之及干戚羽旄謂之樂干盾也戚斧也武舞所執也羽翟羽也旄旄牛尾也文舞所執周禮舞師樂師掌教舞有兵舞有干舞有羽舞有旄舞詩曰左手執籥右手秉翟樂者音之所由生也其本在人心之感於物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔六者非性也感於物而后動言人聲在所見非有常也噍踧也嘽寬綽貌發猶揚也粗粗也是故先王慎所以感之者故禮以道其志樂以和其聲政以一其行刑以防其姦禮樂刑政其極一也極至也所以同民心而出治道也此其所謂至也凡音者生人心者也情動於中故形於聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣言八音和否隨政也玉藻曰御瞽幾聲之上下宫為君商為臣角為民徴為事羽為物五者不亂則無怗懘之音矣五者君臣民事物也凡聲濁者尊清者卑怗懘敝敗不和貌宫亂則荒其君驕商亂則陂其臣壞角亂則憂其民怨徴亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣君臣民事物其道亂則其音應而亂荒猶散也陂傾也書曰王耄荒易曰無平不陂鄭衛之音亂世之音也比於慢矣比猶同也桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也濮水之上地有桑間者亡國之音於此之水出也昔殷紂使師延作靡靡之樂已而自沈於濮水後師涓過焉夜聞而寫之為晉平公鼓之是之謂也桑間在濮陽南誣罔也凡音者生於人心者也樂者通倫理者也倫猶類也理分也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂禽獸知此為聲耳不知其宫商之變也八音並作克諧曰樂是故審聲以知音審音以知樂審樂以知政而治通備矣是故不知聲者不可與言音不知音者不可與言樂知樂則幾於禮矣禮樂皆得謂之有德德者得也幾近也聽樂而知政之得失則能正君臣民事物之禮也是故樂之隆非極音也食饗之禮非致味也隆猶盛也極窮也清廟之瑟朱弦而疏越一倡而三歎有遺音者矣大饗之禮尚𤣥酒而俎腥魚大羮不和有遺味者矣清廟謂作樂歌清廟也朱弦練則聲濁越瑟底孔也晝疏之使聲遲也倡發歌句也三歎三人從歎之耳大饗祫祭先王以腥魚為俎實不臑熟之大羮肉湇不調以鹽菜遺猶餘也是故先王之制禮樂也非以極口腹耳目之欲也將以教民平好惡而反人道之正也教之使知好惡也昔者舜作五弦之琴以歌南風䕫始制樂以賞諸侯䕫欲舜與天下之君共此樂也南風長養之風也以言父母之長養已其辭未聞也䕫舜時典樂者書曰䕫命女典樂故天子之為樂也以賞諸侯之有德者也德盛而教尊五榖時熟然後賞之以樂故其治民勞者其舞行綴逺其治民逸者其舞行綴短民勞則德薄酇相去逺舞人少也民逸則德盛酇相去近舞人多也故觀其舞知其德聞其諡知其行也諡者行之迹也大章章之也堯樂名也言堯德章明也周禮闕之或作大卷咸池備矣黃帝所作樂名也堯增修而用之咸皆也池之言施也言德之無不施也周禮曰大咸韶繼也舜樂名也韶之言紹也言舜能繼紹堯之德周禮曰大韶夏大也禹樂名也言禹能大堯舜之德周禮曰大夏殷周之樂盡矣言盡人事也周禮曰大濩大武天地之道寒暑不時則疾風雨不節則饑教者民之寒暑也教不時則傷世事者民之風雨也事不節則無功教謂樂也然則先王之為樂也以法治也善則行象德矣以法治以樂為治之法行象德民之行順君之德也夫民有血氣心知之性而無哀樂喜怒之常應感起物而動然後心術形焉言在所以感之也術所由也形猶見也是故志微噍殺之音作而民思憂嘽諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣賁之音作而民剛毅廉直徑正莊誠之音作而民肅敬寬裕肉好順成和動之音作而民慈愛流辟邪散狄成滌濫之音作而民淫亂志微意細也吳公子札聽鄭風而曰其細已甚民弗堪也簡節少易也奮末動使四支也賁讀為憤憤怒氣充實也春秋傳曰血氣狡憤肉肥也狄滌往來疾貌也濫僭差也此皆民心無常之斂也肉或為潤是故先王本之情性稽之度數制之禮義合生氣之和道五常之行使之陽而不散隂而不密剛氣不怒柔氣不懾四暢交於中而發作於外皆安其位而不相奪也生氣隂陽氣也五常五行也密之言閉也懾猶恐懼也然後立之學等廣其節奏省其文采以繩德厚等差也各用其才之差學之廣謂增習之省猶審也文謂節奏合也繩猶度也周禮大司樂以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大韶大夏大濩大武律小大之稱比終始之序以象事行律六律也周禮典同以六律六同辨天地四方陰陽之聲以為樂器小大謂髙聲正聲之類也終始謂始於宫終於羽宗廟黃鍾為宫大吕為角太蔟為徵應鍾為羽以象事行宫為君商為臣使親踈貴賤長幼男女之理皆形見於樂故曰樂觀其深矣謂同聽之莫不和敬莫不和順莫不和親土敝則草木不長水煩則魚鱉不大氣衰則生物不遂世亂則禮慝而樂淫是故其聲哀而不莊樂而不安慢易以犯節流湎以忘本廣則容姦狹則思欲感條暢之氣而滅平和之德是以君子賤之也遂猶成也慝穢也廣謂聲緩也狹謂聲急也感動也動人條暢之善氣使失其所凡姦聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉倡和有應回邪曲直各歸其分而萬物之理各以類相動也成象者謂人樂習也是故君子反情以和其志比類以成其行姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪辟之氣不設於身體使耳目鼻口心知百體皆由順正以行其義反猶本也術猶道也然後發以聲音而文以琴瑟動以干戚飾以羽旄從以簫管奮至德之光動四氣之和以著萬物之理奮猶動也動至德之光謂降天神出地祗假祖考著猶成也是故清明象天廣大象地終始象四時周旋象風雨五色成文而不亂八風從律而不姦百度得數而有常小大相成終始相生倡和清濁迭相為經清明謂人聲也廣大謂鍾鼓也周旋謂舞者五色五行也八風從律應節至也百度百刻也言日月晝夜不失正也清謂蕤賔至應鍾濁謂黃鍾至中吕故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧言樂用則正人理和隂陽也倫謂人道也故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂道謂仁義也欲謂邪淫也是故君子反情以和其志廣樂以成其教樂行而民鄉方可以觀德矣方猶道也德者性之端也樂者德之華也金石絲竹樂之器也詩言其志也歌咏其聲也舞動其容也三者本於心然後樂氣從之是故情深而文明氣盛而化神和順積中而英華發外唯樂不可以為僞三者本志也聲也容也言無此本於內則不能為樂也樂者心之動也聲者樂之象也文采節奏聲之飾也君子動其本樂其象然後治其飾是故先鼓以警戒三步以見方再始以著往復亂以飭歸奮疾而不拔極幽而不隱獨樂其志不厭其道備舉其道不私其欲是故情見而義立樂終而德尊君子以好善小人以聽過故曰生民之道樂為大焉文采樂之威儀也先鼓將奏樂先擊鼓以警戒衆也三步謂將舞必先三舉足以見其舞之漸也再始以著往武王除喪至盟津之上紂未可伐還歸三年乃遂伐之武舞再更始以明伐時再往也復亂以飭歸謂鳴鐃而退明以整歸也奮疾謂舞者也極豳謂歌者也夫樂者樂也人情之所不能免也樂必發於聲音形於動靜人之道也聲音動靜性術之變盡於此矣免猶自止也人道人之所為也性術言此出於性也盡於此而不可遏故人不耐無樂樂不耐無形形而不為道不耐無亂形聲音動靜也耐古書能字也後世變之此獨存焉古以能為三台字先王恥其亂故制雅頌之聲以道之使其聲足樂而不流使其文足論而不息使其曲直繁瘠廉肉節奏足以感動人之善心而已矣不使放心邪氣得接焉先王立樂之方也流猶淫放也文篇辭也息猶銷也曲直歌之曲折也繁瘠廉肉聲之鴻殺也節奏闋作進止所應也方道也是故樂在宗廟之中君臣上下同聽之則莫不和敬在族長鄉里之中長幼同聽之則莫不和順在閨門之內父子兄弟同聽之則莫不和親故樂者審一以定和比物以飾節節奏合以成文所以合和父子君臣附親萬民也是先王立樂之方也審一審其人聲也比物謂雜金蘋土匏之屬也以成文五聲八音克諧相應和故聽其雅頌之聲志意得廣焉執其干戚習其俯仰詘伸容貌得莊焉行其綴兆要其節奏行列得正焉進退得齊焉故樂者天地之命中和之紀人情之所不能免也綴表也所以表行列也詩云荷戈與綴兆域也舞者進退所至也要猶㑹也命教也紀總要之名也夫樂者先王之所以飾喜也軍旅鈇銊者先王之所以飾怒也故先王之喜怒皆得其儕焉儕猶輩類喜則天下和之怒則暴亂者畏之先王之道禮樂可謂盛矣天子之於天下喜怒節之以禮樂則兆民和從而畏敬之禮樂王者所常興則盛也以上並樂記雅頌之聲皆發於辭本於情故君臣以睦父子以親故韶夏之樂也聲浸乎金石潤乎草木今取怨思之聲施之於弦管聞其音者不淫則悲淫則亂男女之辨悲則感怨思之氣豈所謂樂哉故事不本於道德者不可以為儀言不合乎先王者不可以為道音不調乎雅頌者不可以為樂賢人之政降人以體聖人之政降人以心體降可以圖治心降可以保終降體以禮降心以樂所謂樂者非金石絲竹也謂人樂其家謂人樂其族謂人樂其業謂人樂其都邑謂人樂其政令謂人樂其道德如此君人者乃作樂以節之使不失其和故有德之君以樂樂人無德之君以樂樂身樂人者久樂身者不久而亡三略先王之樂所以節百事也故有五節五聲之節遲速本末以相及中聲以降五降之後不容彈矣此謂先王之樂得中聲聲成五降而息也降罷退於是有煩手淫聲慆堙心耳乃忘平和君子弗聽也五降而不息則雜聲並奏所謂鄭衛之聲物亦如之言百事皆如樂不可失節至於煩乃舍也已無以生疾煩不舍則生疾君子之近琴瑟以儀節也非以慆心也為心之儀節使動不過度左氏昭元年廣博易良樂教也樂之失奢其為人也廣慱易良而不奢則深於樂者也經解六律者何黃鍾蕤賔無射太蔟夷則姑洗是也故天子左五鍾右五鍾六律為陽六吕為隂凡律吕十二各一鍾天子宫縣黃鍾蕤賔在南北其餘則在東西天子將出則撞黃鍾右五鍾皆應黃鍾在陽陽氣動西五鍾在隂隂氣靜君將出故以動告靜靜者皆和也馬鳴中律步者皆有容駕者皆有文御者皆有數步者周還中規折還中矩立則磬折拱則抱鼓言聲合於樂體比於禮也然後大師奏登車告出也周禮王出入奏王夏入則撞蕤賔左五鍾皆應蕤賔在隂東五鍾在陽君入故以靜告動動者則亦皆和之也以治容貌容貌得則氣得氣得則肌膚安肌膚安則色齊矣入故欲其靜也蕤賔聲狗吠彘鳴及倮介之蟲皆莫不延頸以聽蕤賔皆守物及隂之類也在內者皆玉色在外者皆金聲玉色反其正性也金聲其事殺然後少師奏登堂就席告入也少師佐成太師之事者也此言至樂相知物動相生同聲相應之義也古者帝王升歌清廟樂章名大琴練絃達越大瑟朱絃達越以韋為鼓謂之搏拊何以也練絃朱絃互文也越下孔也凡練絃達越搏拊者象其德寬和君子有大人聲不以鍾鼓竽瑟之聲亂人聲清廟升歌者歌先人之功烈德澤也故欲其清也烈業也其歌之呼也呼出聲也曰於穆清廟於者歎之也穆者敬之也清者欲其在位者遍聞之也故周公升歌文王之功烈德澤苟在廟中嘗見文王者愀然如復見文王故書曰搏拊琴瑟以詠祖考來假此之謂也尚書大傳子語魯大師樂曰樂其可知也始作翕如也從之純如也皎如也繹如也以成語告也大師樂官名時音樂廢缺故孔子教之翕合也從放也純和也皎明也繹相續不絶也成樂之一終也五謝氏曰五音六律不具不足以為樂翕如言其合也音合矣清濁髙下如五味之相濟而後和故曰純如合而和矣欲其無相奪倫故曰皎如然豈宫自宫而商自商乎不相反而相連如貫珠可也故曰繹如也以成論語子曰師摯之始關雎之亂洋洋乎盈耳哉師摯魯樂師名摯也亂樂之卒章也史記曰關雎之亂以為風始洋洋美盛意孔子自衛反魯而正樂適師摯在官之初故樂之美盛如此同上魏文侯問於子夏曰吾端冕而聽古樂則唯恐卧聽鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也魏文侯晉大夫畢萬之後僭諸侯者也端𤣥衣也古樂先王之正樂也子夏對曰今夫古樂進旅退旅和正以廣弦匏笙簧㑹守拊鼓始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身及家平均天下此古樂之發也旅猶俱也俱進俱退言其齊一也和正以廣無姦聲也㑹猶合也皆也言衆皆待擊鼓乃作周禮太師職曰大祭祀帥瞽登歌合奏擊拊下管播樂器今奏鼓朄文謂鼓也武謂金也相即拊也亦以節樂拊者以韋為表裝之以穅穅一名相因以名焉今齊人或謂穅為相雅亦樂器名也狀如漆筒中有椎今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也俯猶曲也言不齊一也濫濫竊也溺而不止聲淫亂無以治之獶獮猴也言舞者如獼猴戲也亂男女之尊卑獶或為優今君之所問者樂也所好者音也夫樂者與音相近而不同言文侯好音而不知樂也鏗鏘之類皆為音應律乃為樂文侯曰敢問何如欲知音樂異意子夏對曰夫古者天地順而四時當民有德而五穀昌疾疢不作而無妖祥此之謂大當然後聖人作為父子君臣以為紀綱紀綱既正天下大定天下大定然後正六律和五聲弦歌詩頌此之謂德音德音之謂樂當謂樂不失其所詩云莫其德音其德克明克明克類克長克君王此大邦克順克俾俾于文王其德靡悔既受帝祉施于孫子此之謂也此有德之音所謂樂也德正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長慶賞刑威曰君慈和遍服曰順俾當為比聲之誤也擇善從之曰比施延也言文王之德皆能如此故受天福而延於後世也今君之所好者其溺音乎言無文王之德則所好非樂也文侯曰敢問溺音何從出也玩習之久不知所由出也子夏對曰鄭音好濫淫志宋音燕女溺志衛音趨數煩志齊音敖辟喬志此四者皆淫於色而害於德是以祭祀弗用也言四國皆出此溺音濫濫竊姦聲也燕安也春秋傳曰懷與安實敗名趨數讀為促速聲之誤也煩勞也祭祀不用淫樂詩曰肅雍和鳴先祖是聽夫肅肅敬也雍雍和也夫敬以和何事不行言古樂敬且和故無事而不用溺音無所施為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也誘進也孔甚也言民從君所好惡進之於善無難然後聖人作為鞉鼓椌楬塤篪此六者德音之音也六者為本以其聲質也椌楬謂柷敔也塤篪或為簨篪然後鍾磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長幼之序也官序貴賤謂尊卑樂器列數有差次鍾聲鏗鏗以立號號以立橫橫以立武君子聽鍾聲則思武臣號號令所以警衆也橫充也謂氣作充滿也石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣石聲磬磬當為罄字之誤也辨謂分明於節義絲聲哀哀以立廉廉以立志君子聽琴瑟之聲則思志義之臣廉廉隔也竹聲濫濫以立㑹㑹以聚衆君子聽竽笙簫管之聲則思畜聚之臣濫之意猶攬聚也㑹猶聚也聚或為最鼓鼙之聲歡歡以立動動以進衆君子聽鼓鼙之聲則思將帥之臣聞歡囂則人意動作歡或為歡動或為勳君子之聽音非聽其鏗鏘而已矣彼亦有所合之也以聲合成己之志樂記平公說新聲說樂也新聲者衛靈公將如晉舍于濮水之上聞琴聲焉甚哀使師涓以琴寫之至晉為平公鼓之師曠撫其手而止之曰止此亡國之音也昔師延為紂作靡靡之樂後而自沉于濮水之中聞此聲者必於濮水之上乎師曠曰公室其將卑乎師曠晉主樂太師子野君之明兆於衰矣兆形也夫樂以開山川之風開通也政八音以通八風以耀德於廣逺也耀明也風德以廣之風宣其德廣之於四方作樂各象其德韶夏濩武是也風山川以逺之逺逺其德也周禮每樂一變各有所致謂鱗介毛羽之物山林山澤天地之神祗也風物以聽之言風化之動物莫不傾耳而聽修詩以詠之修禮以節之夫德廣逺而有時節作之有時動有禮節是以逺服而邇不遷國語晉語太史公曰余每讀虞書至於君臣相敕維是幾安而股肱不良萬事墮壞未嘗不流涕也成王作頌推已懲艾悲彼家難可不謂戰戰恐懼善守善終哉君子不為約則修德滿則棄禮佚能思初安能惟始沐浴膏澤而歌咏勤苦非大德誰能如斯傳曰治定功成禮樂乃興海內人道益深其德益至所樂者亦異滿而不損則溢盈而不持則傾凡作樂者所以節樂君子以謙退為禮以損減為樂樂其如此也以為州異國殊情習不同故博采風俗協比聲律以布短移化助流政教天子躬於明堂臨觀而萬民咸蕩滌邪穢斟酌飽滿以飾厥性故云雅頌之音理而民正嘄噭之聲興而士奮鄭衛之曲動而心淫及其調和諧合鳥獸盡感而况懷五常含好惡自然之勢也又曰夫上古明王舉樂者非以娛心自樂快意恣欲將欲為治也正教者皆始於音音正而行至故音樂者所以動蕩血脉流通精神而和正心也故宫動脾而和正聖商動肺而和正義角動肝而和正仁徴動心而和正禮羽動腎而和正智故樂所以內輔正心而外異貴賤也上以事宗廟下以變化黎庶也夫禮由外入樂自內出故君子不可須臾離禮須臾離禮則暴慢之行窮外不可須臾離樂須臾離樂則奸邪之行窮內故樂音者君子之所養義也夫古者天子諸侯聽鍾磬未嘗離於庭卿大夫聽琴瑟之音未嘗離於前所以養行義而防淫泆也夫淫泆生於無禮故聖王使人耳聞雅頌之音目視威儀之禮足行恭敬之容口言仁義之道故君子終日言而邪辟無由入也史記樂書禮書綱目卷八十五
