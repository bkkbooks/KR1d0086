body:
  text: 禮書綱目卷二十四婺源江永撰士喪禮下本名既夕經鄭目録云既夕禮士喪禮之下篇也既已也謂先葬二日已夕之時與葬間一日凡朝廟日請啟期必容焉此諸侯之下士一廟其上士二廟則既夕哭先葬前三日别録名士喪禮下篇既夕哭既已也謂出門哭止復外位時請啟期告于賔将葬當遷柩于祖有司于是乃請啟肂之期于主人以告賔賔宜知其時也今文啟為開右請啟期夙興設盥于祖廟門外祖王父也下士祖禰共廟陳鼎皆如殯東方之饌亦如之皆皆三鼎也如殯如大歛既殯之奠侇牀饌于階間侇之言尸也朝正柩用此牀右陳朝祖奠具記夷牀輁軸饌于西階東明階間者位近西也夷牀饌于祖廟輁軸饌于殯宫其二廟者于禰亦饌輁軸焉古文輁或作拱其二廟則饌于禰廟如小歛奠乃啟祖尊禰卑也士事祖禰上士異廟下士共廟奠本經記大上篇陳小歛章喪不剥奠批畢用桑以素噐歛奠章大功與饋奠當互考二燭俟于殯門外早闇以為明也燭用蒸丈夫髽散帶垂即位如初為将啟變也比互文以相見耳髽婦人之變喪服小記曰男子死而婦人髽男子冠而婦人笄如初朝夕哭門外位婦人不哭主人拜賔入即位袒此不䝉如初者以男子入門不哭也不哭者将有事止讙囂也商祝免袒執功布入升自西階盡階不升堂聲三啟三命哭功布灰治之布也執之以接神使有所拂仿也聲三三有聲存神也啟三三言啟告神也舊説以為聲噫興也今文免作絻燭入照徹與啟肂者祝降與夏祝交于階下取銘置于重祝降者祝徹宿奠降也與夏祝交事相接也夏祝取銘置于重為啟肂遷之吉事交相左凶事交相右今文銘皆作名踊無算主人也商祝拂柩用功布幠用夷衾拂去塵也幠覆之為其形露右啟記啓之所外内不哭将有事為其讙囂既啟命啟辯拜詳見小斂章遷于祖用軸遷徙也徙于祖朝祖廟也檀弓曰殷朝而殯于祖周朝而遂葬盖象平生時将出必辭尊者軸輁軸也軸状如轉轔刻両頭為軹輁状如長牀穿桯前後著金而闗軸焉大夫諸侯以上有四周謂之輴天子畫之以龍重先奠從燭從柩從燭從主人從行之序也主人从者大夫由右婦人由左以服之親踈為先後各从其昭穆男賔在前女賔在後升自西階柩也猶用子道不由阼也奠俟于下東面北上俟正柩也主人從升婦人升東面衆人東即位東方之位正柩于兩楹間用侇牀兩楹間象鄉户牖也是時柩北首主人柩東西面置重如初如殯宮時也席升設于柩西奠設如初巾之升降自西階席設于柩之西直柩之西當西階也以奠設如初東面也不統于柩神不西面也不設柩東東非神位也巾之者為禦當風塵主人踊無算降拜賔即位踊襲主婦及親者由足西面設奠時婦人皆室户西南面奠畢乃得東面親者西面堂上迫䟽者可以居房中薦車直東榮北輈薦進也進車者象生時将行陳駕也今時謂之魂車輈轅也車當東榮東陳西上于中庭質明㓕燭質正也徹者升自阼階降自西階徹者辟新奠不設序西南已再設為褻乃奠如初升降自西階為遷祖奠也奠升不由阼階柩北首辟其足主人要節而踊節升降薦馬纓三就入門北面交轡圉人夹牽之駕車之馬毎車二疋纓今馬鞅也就成也諸侯之臣飾纓以三色而三成此三色者盖絛絲也其著之如罽然天子之臣如其命數王之革路絛絲圉人飬馬者在左右曰夹既奠乃薦馬者為其踐汚廟中也凡入門参分庭一在南御者執筴立于馬後哭成踊右還出主人于是乃哭踊者薦車之禮成于薦馬賔出主人送于門外右朝祖廟車設奠薦馬記朝于禰廟重止于門外之西東面柩入升自西階正柩于兩楹間奠止于西階之下東西北上主人升柩東西面衆主人東即位婦人從升東面奠升設于柩西升降自西階主人要節而踊重不入者主于朝祖而行若過之矣門西東面待之便也燭先入者升堂東楹之南西面後入者西階東北面在下照正柩者先先柩者後後柩者適祖時燭亦然互記于此主人降即位徹乃奠升自西階主人踊如初如其降拜賔至于要節而踊不薦車不从此行祝及執事舉奠巾席從而降柩從序從如初適祖此謂朝禰明日舉奠適祖之序也此祝執醴先酒脯醢俎从之巾席為後既正柩席升設設奠如初祝受巾巾之凡喪自卒至殯自啟至葬主人之禮其變同則此日數亦同矣序从主人以下今文無从本經記既正柩賔出遂匠納車于階間遂匠遂人匠人也遂人主引徒役匠人主載柩窆職相左右也車載柩車周禮謂之蜃車雜記謂之團或作輇或作摶聲讀皆相附耳未聞孰正其車之轝状如牀中央有轅前後出設前後輅轝上有四周下則前後有軸以輇為輪許叔重説有幅曰輪無輻曰輇同上薦乘車鹿淺幦干笮革靾載旜載皮弁服纓轡貝勒縣于衡士乗棧車鹿淺鹿夏毛也幦覆苓玉藻曰士齊車鹿幦豹犆干盾也笮矢箙也靾韁也旜旌旗之屬通帛為旜孤卿之所建亦攝焉皮弁服者視朔之服貝勒貝飾勒有干無兵有箙無弓矢明不用古文靾為殺旜為膳道車載朝服道車朝夕及燕出入之車朝服日視朝之服也𤣥衣素裳槀車載簑笠槀猶散也散車以田以鄙之車蓑笠備兩服今文藁為潦凡道車槀車之纓轡及勒亦縣于衡也同上祥車曠左空神位也祥車葬之乗車曲禮士葬用國車詳見喪大記士喪有與天子同者三其終夜燎及乗人専道而行乗人謂使人執引也専道人辟之雜記有司請祖期亦因在外位請之當以告賔毎事畢輒出将行而飲酒曰祖祖始也曰日側側昳也謂将過中之時右請祖期主人入袒乃載踊無算卒束襲袒為載變也舉柩郤下而載之束束棺于柩車賔出遂匠納車于階間謂此車降奠當前束下遷祖之奠也當前束猶當尸腢也亦在柩車西束有前後也右載記将載祝及執事舉奠户西南面東上卒束前而降奠席于柩西将于柩西當前束設之本經記君若載而后弔之則主人東面而拜門右北面而踊出待反而後奠主人拜踊于賔位不敢廹君也君即位車東出待不必君留也君反之使奠記雜商祝飾柩一池紐前䞓後緇齊三采無貝飾柩為設牆栁也巾奠乃牆謂此也牆有布帷栁有布荒池者象宫室之承霤以竹為之狀如小車笭衣以青布一池縣于栁前士不揄絞紐所以聨帷荒前赤後黑因以為飾左右面各有前後齊居栁之中央若今小車葢上㽔矣以三采繒為之上朱中白下蒼著以絮元士以上有貝設披披輅栁棺車貫結于載人居旁牽之以備傾虧䘮大記曰士戴前纁後緇二披用纁今文披皆為藩屬引屬猶著也引所以引柩車在軸輴曰紼古者人引柩春秋傳曰坐引而哭之三右飾柩記巾奠乃牆牆飾柩也本經記池視重霤如堂之有承霤也承霤以木為之用行水亦宫之飾也栁宫象也以竹為池衣之青布縣銅魚焉今宫中有承霤云以銅為之檀弓飾棺士布帷布荒一池揄絞纁紐二緇紐二齊三采一貝畫翣二皆戴綏士戴前纁後緇二披用纁詳見䘮大記周人牆置翣詳見上篇陳殯具章子張之䘮公明儀為志焉志亦謂章識褚幕丹質以丹布幕為褚葬覆棺不牆不翣蟻結于四隅畫褚之四角其文如蟻行徃來相交錯蟻蚍蜉也殷之蟻結似今蛇文畫殷士也學于孔子倣殷禮檀弓陳明器于乗車之西明器藏器也檀弓曰其曰明器神明之也言神明者異于生器竹不成用瓦不成味木不成斵琴瑟章而不平竽笙備而不和有鐘磬而無筍簴陳器于乗車之西則重北也折横覆之折猶屐也方鑿連木為之葢如牀而縮者三横者五無簀窆事畢加之壙上以承抗席横陳之者為苞筲以下䋫于其北便也覆之見善面也抗木横三縮二抗禦也所以禦止土也其横與縮各足掩壙加抗席三席所以禦塵加茵用疏布緇剪有幅亦縮二横三茵所以藉棺者剪淺也幅縁之亦者亦抗木也及其用之木三在上茵二在下象天三合地二人藏其中焉今文剪作淺器西南上綪噐目言之也陳明噐以西行南端為上綪屈也不容則屈而反之茵茵在抗木上陳噐次而北也苞二所以裹奠羊豕之肉筲三黍稷麥筲畚種類也其容盖與簋同一觳也罋三醯醢屑幂用䟽布罋瓦器其容亦盖一觳屑簠桂之屑也内則曰屑桂與薑幂覆也今文幂皆作宻甒二醴酒幂用功布甒亦瓦噐也古文甒皆作廡皆木桁久之桁所以屐苞筲罋甒也久當為灸灸謂以盖案塞其口每器異桁用噐弓矢耒耜兩敦兩杅槃匜匜實于槃中南流此皆常用之噐也杅盛湯漿槃匜盥器也流匜口也今文杅為桙無祭噐士禮畧也大夫以上兼用鬼噐人噐也有燕樂噐可也與賔客燕飲用樂之噐也役噐甲胄干笮此皆師役之噐甲鎧胄兠鍪干揗笮矢箙燕器杖笠翣燕居安體之噐也笠竹􅡓盖也翣扇右陳噐記抗木刋剥削之古文刋為竿茵著用荼實綏澤焉荼茅秀也綏亷薑也澤澤蘭也皆取其香且御濕葦苞長三尺一編用便易也菅筲三其實皆瀹米麥皆湛之湯未知神之所享不用食道所以為敬本經記弓矢之新沽功設之冝新沽示不用今文沽作古有弭飾焉弓無縁者謂之弭弭以骨角為飾亦可張也亦使可張有柲柲弓檠弛則縛之于弓裏備損傷以竹為之詩云竹柲緄縢古文柲作柴設衣撻焉依纒弦也撻弣側矢道也皆以韋為之今文撻為銛有韣韣弓衣也以緇布為之翭矢一乗骨鏃短衛翭猶候也候物而射之矢也四矢曰乗骨鏃短衛亦示不用也生時翭矢金鏃凡為矢五分笴長而羽其一志矢一乗軒輖中亦短衛志猶擬也習射之矢書云若射之有志輖􅜛也無鏃短衞亦示不用生時志矢骨鏃凡為矢前重後輕也同上陳噐之道多陳之而省納之可也省陳之而盡納之可也多陳之謂賔客之就器也以多為榮省陳之謂主人之明噐也以節為禮小記徹奠巾席俟于西方主人要節而踊巾席俟于西方祖奠将用焉要節者未象升丈夫踊去象降婦人踊徹者由明噐北西面既徹由重南東不設于序西南者非宿奠也宿奠必設者為神憑依之義也袒為將祖變商祝御柩亦執功布居前為還柩車為節乃祖還柩鄉外為行始踊襲少南當前束主人也柩還則當前束南婦人降即位于階間為柩将去有時也位束上祖還車不還噐祖有行漸車亦冝鄉外也噐之陳自已南上祝取銘置于茵重不藏故于此移明加于茵上二人還重左還重與車馬還相反由便也布席乃奠如初主人要節而踊車已祖可以為之奠也是之謂祖奠薦馬如初柩動車還宜新之也賔出主人送右祖奠薦馬記祖于庭詳見喪禮義祖還車不易位為鄉外耳未行執披者旁四人前後左右各二人本經記祝饌祖奠于主人之南當前輅北上巾之言饌于主人之南當前輅則既祖祝乃饌同上曽子弔于負夏主人既祖填池推柩而反之降而後行禮詳見喪禮義有司請葬期亦因在外位時入復位主人也自死至于殯自啟至于葬主人及兄弟恒在内位右請葬期公賵𤣥纁束馬兩公國君也賵所以助主人送葬也兩馬士制也春秋傳曰宋景曺卒魯季康子使冉求賵之以馬曰其可以稱旌繁乎擯者出請入告主人釋杖迎于廟門外不哭先入門右北面及衆主人袒尊君命也衆主人自若西面馬入設設于庭在重南賔奉幣由馬西當前輅北面致命賔使者幣𤣥纁也輅轅縳所以屬引由馬西則亦當前輅之西于是北面致命得鄉柩與奠柩車在階間少前三分庭之北輅有前後主人哭拜稽顙成踊賔奠幣于棧左服出棧謂柩車也凡士車制無漆飾左服象授人授其右也服車箱今文棧作輚宰由主人之北舉幣以東柩東主人位以東藏之士受馬以出此士謂胥徒之長也有勇力者受馬聘禮曰皮馬相間可也主人送于外門外拜襲入復位杖右公賵賔賵者将命賔卿大夫士也擯者請入告出告湏不迎告曰孤某湏馬入設賔奉幣擯者先入賔從致命如初初公使者主人拜于位不踊柩車東位也既啟之後與在室同賔奠幣如初舉幣受馬如初擯者出請賔出在外請之為其復有事若奠賔敬可以奠也入告出以賔入将命如初士受羊如受馬又請士亦為胥徒之長又復也若賻賻之言補也助也貨財曰賻入告主人出門左西面賔東面将命主人出者賻主施于主人主人拜賔坐委之宰由主人之北東面舉之反位坐委之明主人哀戚志不在受人物反位反主人之後位若無器則捂受之謂對相授不委地又請賔告事畢拜送入贈者将命贈送擯者出請納賔如初如其入告出告湏賔奠幣如初亦于棧左服若就噐則坐奠于陳就猶善也贈無常唯玩好所有陳明噐之陳凡将禮必請而后拜送雖知事畢猶請君子不必人意兄弟賵奠可也兄弟有服親者可且賵且奠許其厚也賵奠于死生兩施所知則賵而不奠所知通問相知也降于兄弟奠施于死者為多故不奠知死者贈知生者賻各主于所知書賵于方若九若七若五方板也書賵奠賻贈之人名與其物于板每板若九行若七行若五行書遣于䇿䇿簡也遣猶送也謂所當藏物茵以下乃代哭如初棺柩有時将去不忍絶聲也初謂既小歛時宵為燎于門内之右為哭者為明右親賔賵奠賻贈記凡贈幣無常賔之贈也玩好曰贈在所有記本經孟獻子之喪司徒旅歸四布夫子曰可也詳見喪通禮財用章子碩欲以賻布之餘具祭噐子栁曰不可君子不家于喪請班諸兄弟之貧者檀弓他賻贈事詳見弔禮贈喪章厥明陳鼎五于門外如初鼎五羊豕魚腊鮮獸各一鼎也士禮特牲三鼎盛葬奠加一等用少牢也如初如大歛奠時其實羊左胖反吉祭也言左胖者體不殊骨也髀不升周貴肩賤髀古文髀作脾腸五胃五亦盛之也離肺離㨒豕亦如之豚解無腸胃如之如羊左胖脾不升離肺也豚解解之如解豚亦前肩後肫脊脅而已無腸胃者君子不食溷腴魚腊鮮獸皆如初鮮新殺者士腊用兎加鮮獸而無膚者豕既豚解畧之東方之饌四豆脾析蜱醢葵菹蠃醢脾讀為雞脾肶之脾脾析百葉也蜱蜯也今文蠃為蜗四籩棗糗栗脯糗以豆糗粉餌醴酒此東方之饌與祖奠同在主人之南當前輅北上巾之陳噐明噐也夜歛藏之滅燎執燭俠輅北面照徹與葬奠也賔入者拜之明自啟至此主人無出禮右陳遣奠記凡糗不煎以膏煎之則䙝非敬歛本經記上篇陳小奠章喪不剥奠批畢用桑奠以素噐大歛奠章大功與饋奠當互考徹者入丈夫踊設于西北婦人踊猶阼階升時也亦既盥乃入入由重東而主人踊猶其升也自重北西面而徹設于柩車西北亦猶序西南徹者東由柩車北東適葬奠之饌鼎入舉人陳之也陳之盖于重東北西面北上如初乃奠豆南上綪籩蠃醢南北上綪籩蠃醢南辟醴酒也俎二以成南上不綪特鮮獸成猶併也不綪者魚在羊東腊在豕東古文特為俎醴酒在籩西北上統于豆也奠者出主人要節而踊亦以徃来為節奠由重北西既奠由重南東右遣奠甸人抗重出自道道左倚之還重不言甸人抗重言之者重既虞将埋之言其宮使守視之抗舉也出自道出从門中央也不由闑東西者重不反變于恒出入道左主人位今時有死者鑿木置食其中樹于道左由此薦馬馬出自道車各從其馬駕于門外西面而俟南上南上便其行也行者乗車在前道稾序从徹者入踊如初徹巾苞牲取下體苞者象既饗而歸賔俎者也取下體者脛骨象行又俎實之終始也士苞三個前脛折取臂臑後脛折取骼亦得俎釋三個雜記曰父母而賔客之所以為哀不以魚腊非正牲也行噐目葬行明噐在道之次茵苞噐序從如其陳之之先後車從次器徹者出踊如初于是廟中當行者唯柩車右重出車馬奠噐從記載粻有子曰非禮也粻米粮也喪奠脯醢而已言死者不食粮也遣奠本無黍稷雜記主人之史請讀賵執算從柩車當前束西面不命毋哭哭者相止也唯主人主婦哭燭在右南面史北面請既而與執算西面于主人之前讀書釋算燭在右南面炤書便也古文算皆為䇲讀書釋算則坐必釋算者榮其多卒命哭㓕燭書與算執之以逆出卒已也公史自西方東面命毋哭主人主婦皆不哭讀遣卒命哭滅燭出公史君之典禮書者遣者入壙之物君使史来讀之成其得禮之正以終也燭俠輅右讀賵記讀賵曽子曰非古也是再告也曽子言非禮祖而讀賵賔致命将行主人之史又讀賵所以存録之檀弓商祝執功布以御柩執披居柩車之前若道有低仰傾虧則以布為抑揚左右之節使引者執披者知之士執披八人今文無以主人袒乃行踊無算袒為行變也乃行謂柩車行也凡从柩者先後左右如遷于祖之序出宫踊襲哀次右柩行記士葬二綍無碑比出宫御棺用功布詳見喪大記士喪有與天子同者乗人専道而行詳見朝祖章及葬毁宗躐行出于大門殷道也學者行之祥見上篇楔齒綴足章孔子在衞有送葬者而夫子觀之曰善哉為喪乎足以為法矣小子識之子貢曰夫子何善爾也曰其徃也如慕其反也如疑慕謂小兒随父母啼呼疑者哀親之在彼子貢曰豈若速反而虞乎速疾子曰小子識之我未之能行也哀戚本也祭祀末也檀弓曽子曰葬引至于堩日有食之則有變乎且不乎堩道也變謂異禮孔子曰昔者吾從老聃助葬于巷黨及堩日有食之老聃曰丘止柩就道右止哭以聴變既明反而后行曰禮也巷黨黨名也就道右者行相左也變日食也反復也反葬而丘問之曰夫柩不可以反者也日有食之不知其已之遲数則豈如行哉已止也数讀為速老聃曰諸侯朝天子見日而行逮日而舍奠大夫使見日而行逮日而舍舍奠毎将舍奠行主夫柩不蚤出不莫宿侵晨夜則近姦冦見星而行者唯罪人與奔父母之喪者乎日有食之安知其不見星也為無日而慝作豫止也且君子行禮不以人之親痁患痁病也以人之父母行禮而恐懼其有患害不為也吾聞諸老聃云曽子問至于邦門公使宰夫贈𤣥纁束邦門城門也贈送也主人去杖不哭由左聽命賔由右致命柩車前輅之左右也當時止柩車主人哭拜稽顙賔升實幣于盖降主人拜送復位杖乃行升柩車之前實其幣于棺盖之栁中若親授之然復位反柩車後右公使人贈記唯君命止柩于堩其餘則否不敢㽞神也堩道也曽子問曰葬既引至于堩本經記至于壙陳噐于道東西北上統于壙茵先入當藉柩也元士則葬用輁軸加茵焉屬引于是説載除飾更屬引于緘耳古文屬為燭主人袒衆主人西面北上婦人東面皆不哭俠羡道為位右至壙記車至道左北面立東上道左墓道東先至者在東柩至于壙歛服載之柩車至壙祝説載除飾乃歛乗車道車槀車之服載之不空之以歸送形而徃迎精而反亦禮之宜本經記衞司徒敬子之喪孔子相及墓男子西面婦人東面殷道也詳見喪禮義國昭子之母死問于子張曰葬及墓男子婦人安位國昭子齊大夫子張曰司徒敬子之喪夫子相男子西鄉婦人東鄉夹羡道為位夫子孔子也曰噫毋噫不寤之聲毋禁止之辭曰我喪也斯沾斯盡也沾讀曰覘覘視也國昭子自謂齊之大家有事人盡視之欲人觀之法其所為爾専之賔為賔焉主為主焉専猶同也時子張相婦人從男子皆西鄉非也檀弓乃窆主人哭踊無算窆下棺也今文窆為封襲贈用制幣𤣥纁束拜稽顙踊如初丈八尺曰制二制合之束十制五合卒袒拜賔主婦亦拜賔即位拾踊三襲主婦拜賔拜女賔也即位反位也賔出則拜送相問之賔也凡弔賔有五去皆拜之此舉中焉藏噐于旁加見噐用器役器也見棺飾也更謂之見者加此則棺柩不復見矣先言藏噐乃云加見者器在見内也内之者明君子之于事終不自逸也檀弓曰周人牆置翣藏苞筲于旁于旁者在見外也不言罋甒饌相次可知四者兩兩而居喪大記曰棺椁之間君容柷大夫容壺士容甒加折卻之加抗席覆之加抗木宜次也實土三主人拜郷人謝其勤勞即位踊襲如初哀親之在斯右窆記父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫周公制為禮法以及天下使葬用死者之爵祭用生者之禄中庸並有喪葬先輕而後重詳見喪變禮大司徒令四閭為族使之相葬地官族師四閭為族八閭為聨使之相保以相葬埋同上墓大夫掌凡邦墓之地域為之圖凡邦中之墓地萬民所葬地令國民族葬而掌其禁令族葬各从其親正其位掌其度數位謂昭穆也度數爵等之大小使皆有私地域古者萬民墓地同處分其地使各有區域得以族葬後相容凡争墓地者聴其獄訟争墓地相侵區域帥其屬而廵墓厲居其中之室以守之厲塋限遮列處鄭司農云居其中之室有官寺在墓中春官既封主人贈詳見士虞禮魯人之贈也三𤣥二纁廣尺長終幅言失之也士喪禮下篇曰贈用制幣𤣥纁束雜記疏布輤四面有章置于四隅輤其盖也四面皆有章蔽以隠翳牢肉四隅椁中之四隅雜記醴者稻醴也罋甒筲衡實見間而后折入此謂葬時藏物也衡當為桁所以庪罋甒之属聲之誤也實見間藏于見外椁内也折承席也同上庶人縣封葬不為兩止不封不樹縣封當為縣窆縣窆者至卑不得引紼下棺雖兩猶葬以其禮儀少封謂聚土為墳不封之不樹之無飾也周禮曰以爵等為丘封之地與其樹數則士以上乃皆封樹王制孔子為中都宰制為飬生送死之節因丘陵為墳不封不樹詳見陳殯具章為宫室不斬于丘木廣敬鬼神也丘壟也曲禮易墓非古易謂芟治草木不易者丘陵也檀弓墳墓不培詳見喪服義國子髙曰葬也者藏也欲人之弗得見也是故衣足以飾身棺周于衣槨周于棺土周于槨反壤樹之哉詳見喪禮義舜葬于蒼梧之野舜征有苗而死因㽞葬焉書説舜曰陟方乃死蒼梧于周南越之地今為郡蓋三妃未之從也古者不合葬帝嚳而立四妃矣象后妃四星其一明者為正妃餘三小者為次妃帝堯因焉至舜不告而取不立正妃但三妃而已謂之三夫人離騷所歌湘夫人舜妃也夏后氏増以三三而九合十二人春秋説云天子取十二即夏制也以虞夏及周制差之則殷人又増以三九二十七合三十九人周人上法帝嚳立正妃又三二十七為八十一人以增之合百二十人其位后也夫人也嬪也世婦也女御也五者相参以定尊卑季武子曰周公盖附附謂合葬合葬自周公以来弓檀孔子曰衞人之祔也離之祔謂合葬也離之有以間其椁中魯人之祔也合之善夫善夫善魯人也祔葬當合也同上孔子少孤不知其墓殯于五父之衢殯于家則知之者無由怪已欲發問端五父衢名盖聊曼父之鄰也人之見之者皆以為葬也見柩行于路其慎也盖殯也慎當作引禮家讀然聲之誤也殯引飾棺以輤葬引飾棺以栁翣孔子是時以殯引不以葬引時人見者為不知禮問于聊曼父之母然後得合葬于防曼父之母與孔子之母徴在與鄰相善同上孔子既得合葬于防言既得者少孤不知其墓曰吾聞之古也墓而不墳墓謂兆域今之封塋也土之髙者曰墳今丘也東西南北之人也不可以弗識也于是封之崇四尺東西南北言居無常也聚土曰封封之周禮也周禮曰以爵等為丘封之度崇髙也髙四尺盖周之士制孔子先反當修虞事門人後雨甚至後待封也孔子問焉曰爾来何遲也曰防墓崩言所以遲者修之而来孔子不應以其非禮三三言之以孔子不聞孔子泫然流涕曰吾聞之古不修墓脩猶治也同上孔子之喪有自燕来觀者舍于子夏氏子夏曰聖人之葬人與人之葬聖人也子何觀焉與及也昔者夫子言之曰吾見封之若堂者矣封築土為壟堂形四方而髙見若防者矣坊形旁殺平上而長見若覆夏屋者矣覆謂茨瓦也夏屋今之門廡也其形旁廣而卑見若斧者矣斧形旁殺刃上而長從若斧者焉孔子以為刃上難登狭又易為功馬鬛封之謂也俗間名今一日而三斬板而已封板盖廣二尺長六尺斬板謂斷其縮也三斷上之旁殺盖髙四尺其廣袤未聞詩云縮版以載尚行夫子之志乎哉尚庶㡬也同上孔子葬于魯城北泗水上藏入地不及泉而封乃為偃斧之形髙四尺樹松栢為志焉家語季武子成寝武子魯公子季友之曾孫季孫宿杜氏之葬在西階之下請合葬焉許之入宫而不敢哭武子曰合葬非古也自周公以来未之有改也自見夷人冢墓以為宅欲文過吾許其大而不許其細何居命之哭記此善其不奪人之恩檀弓曽子問曰下殤土周葬于園輿機而徃塗邇可也土周堲周也周人以夏后氏之堲周葬下殤于園中以其去成人逺不就墓也機輿尸之牀也以䋲絙其中央又以䋲从兩旁鉤之禮以機舉尸輿之以就園而歛葬焉塗近故耳輿機或為餘機今墓逺則其葬也如之何今人歛下殤于宫中而葬于墓與成人同墓塗乃逺其葬當輿其棺乎載之也問禮之變也孔子曰吾聞諸老聃曰昔者史佚有子而死下殤也墓逺盖欲葬墓如長殤從成人也也長殤有送葬車者則棺載之之矣史佚成王時賢史也賢猶有所不知召公謂之曰何以不棺歛于宫中欲其歛于宫中如成人也歛于宫中則葬當載之史佚曰吾敢乎哉畏知禮也召公言于周公為史佚問周公曰豈不可言是豈于禮不可不許也史佚行之失指以為許也遂用召公之言下殤用棺衣棺自史佚始也棺謂歛于棺曽子問延陵季子適齊于其反也其長子死葬于嬴博之間其坎深不至于泉其歛以時服既葬而封廣輪掩坎其髙可隠也詳見喪禮義乃反哭入升自西階東面衆主人堂下東面北上西階東靣反諸其所作也反哭者于其祖廟不於阼階西面西方神位婦人入丈夫踊升自阼階辟主人也主婦入于室踊出即位及丈夫拾踊三入于室反諸其所飬也出即位堂上西面也拾更也賔弔者升自西階曰如之何主人拜稽顙賔弔者衆賔之長也反而亡焉失之矣于是為甚故弔之弔者北面主人拜于位不北面拜賔東者以其亦主人位也古文無曰字賔降出主人送于門外拜稽顙遂適殯宫皆如啟位拾踊三啟位婦人入升堂丈夫即中庭之位兄弟出主人拜送兄弟小功以下也異門大功亦可以歸衆主人出門哭止闔門主人揖衆主人乃就次次倚廬也猶朝夕哭不奠是日也以虞易奠右反哭記卒窆而歸不驅孝子徃如慕反如疑為親之在彼本經記既封而歸殷道也詳見喪禮義無柩者不帷謂既葬也棺柩已去鬼神在室堂無事焉遂去帷雜記反哭升堂主婦入于室詳見喪禮義升自客階受弔于客位同上其反也如疑詳見柩行章禮書綱目巻二十四
