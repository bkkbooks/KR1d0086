body:
  text: 禮書綱目巻二十婺源江永撰喪服變除凶禮三補疾病男女改服為賔客來問病赤朝服也庶人深衣喪大記養有疾者不喪服遂以主其喪不喪服求生主吉惡其凶也遂以主其喪謂養者有親也死則當為之主其為主之服如素無喪服非養者入主人之喪則不易已之喪服入猶來也謂養者無親于死者不得為主其有親來為主者素有喪服而來為主與素無服者異素無服素有服為今死者當服則皆三日成也養尊者必易服養卑者否尊謂父兄卑謂子弟之屬小喪服記右疾病改服親始死雞斯徒跣扱上衽交手哭親父母也雞斯當為笄纚親始死去冠三日乃去笄纚括髮也徒猶空也上衽深衣之裳前問喪夫子曰始死羔裘𤣥冠者易之而已檀弓曽子問曰親近女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪布深衣縞總婦人始喪未成服之服曽子問巾車王之喪車木車蒲蔽犬􅍜尾櫜疏飾小服皆疏詳見制度右始死變服主人出南面左袒扱諸面之右實米唯盈取滿而已主人襲反位襲復衣也位在尸東士喪服禮上右飯含變服小斂環絰公大夫士一也雜記詳見喪服制度小斂卒斂主人馮之踊主婦亦如之主人袒説髦括髮以麻婦人髽帶麻于房中士既殯説髦此云小斂蓋諸侯禮也士之既殯諸侯之小斂于死者俱三日也婦人之髽帶麻于房中則西房也天子諸侯有左右房同上卒斂馮尸主人髺髮袒衆主人免于房始死将斬衰者雞斯将齊衰者素冠今至小斂變髺髪者去笄纚而紒衆主人免者齊衰将袒以免代冠婦人髽于室始死婦人将斬衰者去笄而纚将齊衰者骨笄而纚今言髽者亦去笄纚而紒也齊衰以上至笄猶髽士喪禮上既馮尸主人絞帶衆主人布帶衆主人齊衰以下士喪記動尸舉柩袒而踊婦人不宜袒詳見喪禮義右小斂變服叔孫武叔之母死武叔公子牙之六世孫名州仇毀孔子者既小斂舉者出尸出户袒且投其冠括髮尸出户乃變服失哀節冠素委貌子㳺曰知禮嗤之檀弓男女奉尸夷于堂降拜賔主人即位襲帶絰踊即位阼階之下位也有襲絰乃踊尊卑相變也母之喪即位而免記異者禮斬衰括髪齊衰免以至成服而冠為母重初亦括髪既小斂則免乃奠小斂奠也喪大記動尸舉柩袒而踊詳見小斂條大功以上散帶小功緦輕初而絞之雜記士舉男女奉尸侇于堂主人拜賔即位襲絰于序東乃奠士喪禮上右奉尸侇于堂變服君将大斂子弁絰即位于序端子弁絰者未成服弁如爵弁而素大夫之喪子亦弁絰喪大記主人及親者袒袒大斂變也不言髽免括髪小斂以來自若矣卒塗主人復位襲乃奠士喪禮上凡斂者袒遷尸者襲見小斂章動尸舉柩袒而踊同上君若視斂主人及衆主人袒卒塗卒奠君出門主人拜送襲入即位衆主人襲士喪禮上既殯主人説髦既殯置銘于肂復位時也今文説作税兒生三月鬋髮為鬌男角女覊否則男在女右長大猶為飾存之謂之髦所以順父母㓜小之心至此尸柩不見喪無飾可以去之髦之形象未聞記士䘮右大斂殯變服天子崩三日祝先服祝佐含斂先病五日官長服官長大夫士七日國中男女服庶人三月天下服諸侯之大夫檀弓三日授子杖五日授大夫杖七日授士杖喪服四制君之喪三日子夫人杖五日既殯授大夫世婦杖三日者死之後三日也為君杖不同日人君禮大可以見親疏也大夫之喪三日之朝既殯主人主婦室老皆杖士之喪二日而殯三日之朝主人杖婦人皆杖士之禮死與徃日生與來日此二日于死者亦得三日也婦人杖謂主婦容妾為君女子子之在室者喪大記三日成服杖既殯之明日全三日士喪禮上三日絞垂成服日絞要絰之散垂者記士喪右成服大夫卜宅與葬日有司麻衣布衰布帶因喪屨緇布冠不㽔占者皮弁有司卜人也麻衣白布深衣而著衰焉及布帶緇布冠此服非純吉亦非純凶也皮弁則純吉之尤者也占者尊于有司卜求吉其服彌吉大夫士朔服皮弁如筮則史練冠長衣以筮占者朝服筮者筮宅也謂下大夫若士也筮史筮人也長衣深衣之純以素也長衣練冠純凶服也朝服純吉服也大夫士日朝服以朝也雜記筮宅主人皆徃兆南北面免絰兆域也所營之處免絰者求吉不敢純凶卒筮主人絰士喪禮上聴卜有事于尸則去杖喪大記右筮宅卜日變服丈夫髽散帶垂為將啟變也此互文以相見耳喪服小記曰男子免而婦人髽士喪禮下主人袒啓遷于祖正柩主人襲同上主人袒乃載卒束襲袒為載變也同上袒為将祖變商祝御柩乃祖襲同上公賵主人及衆主人袒尊君命也賔出主人送于門外襲同上主人袒乃行袒為行變也乃行謂柩車行也出宫襲同上動尸舉柩袒踊見小歛章非從柩與反哭無免于堩言喪服出入非此二事皆冠也免所以代冠人子道路不可無飾堩道路雜記右啓殯朝祖柩行變服屬引主人袒乃窆主人襲贈用制幣𤣥纁卒袒拜賔襲士喪禮下為兄弟既除喪已及其葬也反服其服詳見虞變服章實土主人拜鄉人襲如初士喪禮下非從柩與反哭無免于堩見上柩行章逺葬者比反哭者皆冠及郊而後免反哭墓在四郊之外小記右葬及反哭變服弁絰葛而葬接神之道不可以純凶天子諸侯變服而葬冠素弁以葛為環絰既虞卒哭乃服受服也雜記曰凡弁絰其衰侈袂周人弁而葬殷人冔而葬周弁殷冔俱象祭冠而素禮同也詳見喪禮義子墨衰絰敗秦師于殽以凶服从戎故墨之遂墨以葬文公晉於是始墨後遂常以為俗記禮所由變僖三十三年左氏傳魯莊公之䘮既葬而絰不入庫門時子般弑慶父作亂閔公不敢居喪葬已吉服而反正君臣欲以防遏之微弱之至士大夫既卒哭麻不入麻猶絰也羣臣畢虞卒哭亦除喪也閔公既吉服不與虞卒哭檀弓葬晉悼公踰月而葬速也平公即位平公悼公子彪改服修官烝于曲沃既葬改葬服曲沃晉祖廟烝冬祭也諸侯五月而葬既葬卒哭作主然後烝嘗于廟今晉踰月葬作主而烝祭傳言晉将有湨梁之會故速葬氏㐮十六年左傳王太子夀卒穆后崩既葬除喪以文伯宴叔向曰王一嵗而有三年之喪二焉于是乎以喪賔宴樂憂甚矣且非禮也三年之喪雖貴遂服禮也詳見喪通禮衰戚章主人及兄弟如葬服賔執事者如弔服葬服者既夕曰丈夫髽散垂帶也祝免澡葛絰帶布席于室中澡治也治葛以為首絰及帶接神宜也然則士之屬官為其長弔服加麻矣至于既卒哭主人變服則除主人倚杖入祝近尸一人衰絰奉篚哭從尸一人主人兄弟士虞禮虞杖不入于室詳見士虞禮緦小功虞卒哭則免棺柩已藏嫌恩輕可以不免也言則免者則既殯先啟之間雖有事不免既葬而不報虞則雖主人皆冠及虞則皆免有故不得祭虞雖主人皆冠不可久無飾也皆免自主人至緦麻為兄弟既除喪已及其葬也反服其服報虞卒哭則免如不報虞則除之小功以下記小有事于尸則去杖喪大記右虞變服卒哭獻畢乃餞賔出丈夫説絰帶于廟門外既卒哭當變麻受之以葛也夕日則服葛者為祔期今文説為税婦人説首絰不説帶不説帶齊斬婦人帶不變也婦人少變而重帶帶下體之上也大功小功者葛帶亦不説者未可以輕文變于主婦之質至祔葛帶以即位士虞記斬衰三升既虞卒哭受以成布六升冠七升間傳衰三升三升有半其冠六升以其冠為受受冠七升詳見喪服制義去麻服葛葛帶三重葛帶三重謂男子也五分去一而四紏之帶輕既變因為飾也婦人葛絰不葛帶舊説云三也三糾之練而帶去一股去一股則小于小功之絰似非傳間婦人不葛帶婦人質不變重者至期除之卒哭變絰而已檀弓婦人葛絰而麻帶謂既虞卒哭也帶所以自結束也婦人質少變于喪之帶有除而無變少儀斬衰絞帶疏曰絰帶至虞後變麻服葛絞帶虞後雖不言所變案公士衆臣為君服布帶又齊衰以下亦布帶則絞帶虞後變麻服布于義可也喪服本章為母疏衰四升受以成布七升冠八升間傳齊衰四升其冠七升以其冠為受受冠八升詳見制度齊衰大功冠其受也帶縁各視其冠詳見喪服杖期章女子子適人者為其父母卒哭子折笄首以笄布總傳曰折笄首者折吉笄之首也吉笄者象笄也何以言子折笄首而不言婦終之也有首者若今時刻鏤摘頭矣卒哭而喪之大事畢女子子可以歸于夫家而著吉笄折其首者為其大飾也詳見喪服大功三月受以小功衰即葛九月者傳曰大功布九升小功布十一升此受之下也以發傳者明受盡于此也又受麻絰以葛絰間傳曰大功之葛與小功之麻同凡天子諸侯卿大夫既虞士卒哭而受服正言三月者天子諸侯無大功主于大夫士也喪服本章大功八升若九升小功十升若十一升不言七升者主于受服欲其文相值制詳見度小功即葛五月即就也小功輕三月變麻因故衰以就葛絰帶而五月也間傳曰小功之葛與緦之麻同右既虞卒哭受服緦小功卒哭則免報虞卒哭則免詳見虞變服章大夫士既卒哭弁絰帶金革之事無辟也詳見喪通禮動作章巾車王之喪車素車棼蔽犬􅍜素飾小服皆素詳見制度右卒哭變服繐衰既葬除之喪服本章公子為其母麻衣為其妻麻衣皆既葬除之詳見喪服既葬各以其服除卒哭當變衰麻者變之或有除者不視主人檀弓右既葬除服不杖麻屨喪服本章疏衰無受無受者服是服而除不以輕服受之大功無受傳曰何以大功也未成人也何以無受也喪成人者其文縟喪未成人者其文不縟故殤之絰不樛垂蓋未成人也縟猶數也其文數者謂變除之節也其長殤皆九月其中殤皆七月大功即葛九月小功五月小功即葛五月緦麻三月已上喪服九月七月之喪三時也五月之喪二時也三月之喪一時也言喪之莭應嵗時之氣小記除殤之喪者其祭也必𤣥殤無變文不縟𤣥冠𤣥端黄裳而祭不朝服未純吉也于成人為釋禫之服除成喪者其祭也朝服縞冠成成人也縞冠未純吉祭服也既祥祭乃素縞麻衣同上雖諸父昆弟之喪如當父母之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服雖有親之大喪猶為輕服者除骨肉之恩也唯君之喪不除私服言當者期大功之喪或終始皆在三年之中小功緦麻則不除殤長中乃除雜記兄弟之喪内除詳見大祥除服章右不杖以下各以月數除服閠月葬齊景公閠不書此何以書據楚子昭卒不書閏喪以閠數也謂喪服大功以下諸喪當以閠月為數喪曷為以閏數據卒不書閏喪數畧也畧猶殺也以月數恩殺故并閏數哀五年春秋公羊傳祔杖不升于堂詳見士虞禮有父母之喪尚功衰而祔兄弟之殤則練冠附于殤詳見並有喪服章右祔變服練筮日筮尸視濯皆要絰杖繩屨有司告具而后去杖筮日筮尸有司告事畢而后杖拜送賔臨事去杖敬也濯謂溉祭噐也記小右練筮日筮尸變服父母之喪十三月而練冠喪服四制期之喪十一月而練此謂父在為母也雜記練練衣黄裏縓縁小祥練冠練中衣以黄為内縓為飾黄之色卑于纁縓纁之類明外除葛要絰繩屨無絇角瑱瑱充耳也吉時以玊人君有瑱鹿裘衡長袪衡當為横字之誤也袪謂褎縁袂口也練而為裘横廣之又長之又為袪則先時狹短無袪可知吉時麛裘袪裼之可也裼表裘也有袪而裼之備飾也玉藻曰麛裘青豻褎絞衣以裼之鹿裘亦用絞乎檀弓期而小祥練冠縓縁要絰不除男子除乎首婦人除乎帶男子何為除乎首也婦人何為除乎帶也男子重首婦人重帶除服者先重者易服者易輕者婦人重帶帶在下體之上婦人重之辟男子也其為帶猶五分絰去一耳間傳三年之練冠亦條屬右縫詳見制度布總箭笄髽衰三年喪服齊衰帶惡笄以終喪笄所以卷髪帶所以持身婦人質于喪所以自卷持者有除無變小記疏衰杖期喪服再期之喪三年也期之喪二年也故期而祭禮也期而除喪道也祭不為除喪也此謂練祭也禮正月存親親亡至今而期期則冝祭期天道一變衰惻之情益衰衰則冝除不相為也小記縞冠𤣥武子姓之冠也謂父有喪服子為之不純吉也武冠卷也古者冠卷殊玉藻巾車王之喪車薻車薻蔽鹿淺䄙革飾詳見制度右練受服除服季桓子喪康子練而無衰子㳺問于孔子曰既服練服可以除衰乎孔子曰無衰衣者不以見賔何以除焉家語古者臣有大喪則君三年不呼其門重奪孝子之恩也禮父母之喪三年不从政齊衰大功之喪三月不从政故孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事周人卒哭而致事故君子不奪人之親亦不可奪親也已練可以弁冕此説時衰正失非謂禮當然弁禮所謂皮弁爵弁皮弁武冠爵弁文冠夏曰收殷曰冔周曰弁加旒曰冕主所以入宗廟服金革之事謂以兵事使之君使之非也非古道也臣行之禮也臣順君命亦禮也閔子閔子騫以孝聞要絰而服事禮已練男子除乎首婦人除乎帶既而曰若此乎古之道不即人心既事畢言古者不敢斥君即近也退而致事退退身也致仕還禄位于君孔子蓋善之也善其服事外得事君之義致仕内不失親親之恩宣元年公羊傳大祥吉服而筮尸凡變除者必服其吉服以即祭事不以凶臨吉也間傳曰大祥素縞麻衣記小右大祥筮尸變服父母之喪三年而祥喪服四制期之喪十三月而祥此謂父在為母也雜記祥主人之除也于夕為期朝服祥因其故服為期為祭期也朝服以期至明日而祥祭亦朝服始即吉正祭服也喪服小記曰除成喪者其祭也朝服縞冠是也祭酒縞冠未純吉也既祭乃服大祥素縞麻衣釋也禫之禮云𤣥衣黄裳則是禫祭𤣥冠矣黄裳者未大吉既祭乃服禫服朝服綅冠踰月吉祭乃𤣥冠朝服既祭𤣥端而居復平常也雜記祥而縞縞冠素紕也檀弓縞冠素紕既祥之冠也紕縁邊也紕讀為埤益之埤既祥之冠也已祥祭而服之也間傳曰大祥素縞麻衣玉藻又期而大祥素縞麻衣喪服小記除成喪者其祭也朝服縞冠此素縞者玉藻所云縞冠素紕既祥之冠麻衣十五升布深衣也謂之麻者純用布無采飾也大祥除衰杖間傳弃杖者斷而弃之於隠者杖以喪至尊為人得而褻之也喪大記三年之喪二十五月而畢詳見喪服義親喪外除日月已竟而哀未忘兄弟之喪内除日月未竟而哀已殺雜記有父之喪如未沒喪而母死其除父之喪也服其除服卒事反喪服沒猶竟也除服謂祥祭之服也卒事既祭反喪服服後死者之服同上曽子問曰大夫士有私喪可以除之矣而有君服焉其除之也如之何孔子曰有君喪服於身不敢私服又何除焉於是乎有過時而弗除也君之喪服除而後殷祭禮也曽子問曰父母之喪弗除可乎孔子曰先王制禮過時弗舉禮也非弗能勿除也患其過于制也故君子過時不祭禮也詳見喪變禮並有喪章巾車王之喪車駹車雚蔽然􅍜髤飾詳見喪服制度右大祥除服素冠刺不能三年也詩序庶見素冠兮棘人欒欒兮勞心慱慱兮賦也庶幸也縞冠素紕既祥之冠也黒經白緯曰縞縁邊曰紕棘急也喪事欲其總總耳哀遽之状也欒欒瘠貌慱慱憂勞之貌祥冠祥則冠之禫則除之今人皆不能行三年之喪矣安得見此服乎當時賢者庶㡬見之至于憂勞也庶見素衣兮我心傷悲兮聊與子同歸兮賦也素冠則素衣矣與子同歸愛慕之辭也庶見素韠兮我心藴結兮聊與子如一兮賦也韠蔽膝也以韋為之冕服謂之韍其餘曰韠韠从裳色素衣素裳則素韠也藴結思之不觧也與子如一甚于同歸矣檜風有子蓋既祥而絲屨組纓􅏺其早也禮既祥白屨無絢縞冠素紕檀弓中月而禫自喪至此凡二十七月士虞記期之喪十五月而禫此謂父在為母也雜記中月而禫禫而纎無所不佩黒經白緯曰纎舊説纎冠者采纓也無所不佩紛帨之屬如平常也纎或作綅問傳巾車王之喪車􅃮車藩蔽豻􅍜雀飾詳見制度右禫易服惟三祀十有二月朔湯以元年十一月崩至此二十六月三年服關伊尹以冕服奉嗣王歸于亳冕冠也踰月即吉服書太甲孤子當室冠衣不純采早喪親雖除喪不忘哀也謂年未三十者三十壮有室有代親之端不為孤也當室適子也深衣曰孤子衣純以素曲禮孤子衣純以素三十以下無父稱孤深衣右既孤易服曽子問曰父母之喪既引及塗聞君薨如之何孔子曰遂既封改服而徃封亦當為窆改服括髮徒跣布深衣扱上衽不以私喪包至尊曽子問父母之喪偕先葬者不虞袝待後事其葬服斬衰偕俱也謂同月若同日死也先葬者母也曽子問曰葬先輕而後重又曰反葬奠而後辭于殯遂修葬事其虞也先重而後輕待後事謂如此也其葬服斬衰者喪之隆哀宜从重也假令父死在前月而同月葬猶服斬衰不葬不變服也言其葬服斬衰則虞袝各以其服矣及練祥皆然卒事反服重小記除服者先重者易服者易輕者易服謂為後喪所變也斬衰之喪既虞卒哭遭齊衰之喪輕者包重者特説所以易輕者之義也既虞卒哭謂齊衰可易斬衰之節也輕者可施于卑服齊衰之麻以包斬衰之葛謂男子帶婦人絰也重者宜主于尊謂男子之絰婦人之帶特其葛不變之也此言包特者明于卑可以兩施而尊者不可貳既練遭大功之喪麻葛重此言大功可易斬服之節也斬衰已練男子除絰而帶獨存婦人除帶而絰獨存謂之单单獨也遭大功之喪男子有麻絰婦人有麻帶又皆易其輕者以麻謂之重麻既虞卒哭男子帶其故葛帶絰期之葛絰婦人絰其故葛絰帶期之葛帶謂之重葛齊衰之喪既虞卒哭遭大功之喪麻葛兼服之此言大功可易齊衰期服之節也兼猶兩也不言包特而兩言者包特著其義兼者明有絰有帶耳不言重者三年之喪既練或無絰或無帶言重者以明今皆有期以下固皆有矣兩者有麻有葛耳葛者亦特其重麻者亦包其輕斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同大功之葛與小功之麻同小功之葛與緦之麻同麻同則兼服之此章言有上服既虞卒哭遭下服之差也唯大功有變三年既練之服小功以下則于上皆無易焉此言大功之葛與小功之麻同小功之葛與緦之麻同主為大功之殤長中言之兼服之服重者則易輕者也服重者謂特之也則者則男子與婦人也凡下服虞卒哭男子反其故葛帶婦人反其故葛絰其上服除則固自受以下服之受矣閒傳除喪者先重者謂練男子除乎首婦人除乎帶易服者易輕者謂大喪既虞卒哭而遭小喪也其易喪服男子易乎帶婦人易乎首小記斬衰之葛與齊衰之麻同絰之大俱七寸五分寸之一帶五寸二十五分寸之十九齊衰之葛與大功之麻同絰之大俱五寸二十五分寸之十九帶四寸百二十五分寸之七十六麻葛皆兼服之皆者皆上二事也兼服之謂服麻又服葛也男子則絰上服之葛帶下服之麻婦人則絰下服之麻固自帶其故帶也所謂易服易輕者也兼服之文主于男子同上麻之有本者變三年之葛有本謂大功以上也小功以下澡麻斷本服問殤長中變三年之葛終殤之月算而反三年之葛是非重麻為其無卒哭之税下殤則否謂大功之親為殤在緦小功者也可以變三年之葛正親親也三年之葛大功變既練齊衰變既虞卒哭凡喪卒哭受麻以葛殤以麻終喪之月數非重之而不變為殤未成人文不縟耳下殤則否言賤也男子為大功之殤中从上服小功婦人為之中从下服緦麻同上大夫有私喪之葛則于其兄弟之輕喪則弁絰私喪妻子之喪也輕喪緦麻也大夫降焉弔服而徃不以私喪之末臨兄弟雜記三年之喪雖功衰不弔自諸侯達諸士如有服而将徃哭之則服其服而徃詳見弔禮有三年之練冠則以大功之麻易之唯杖屨不易謂既練而遭大功之喪者也練除首絰要絰葛又不如大功之麻重也言練冠易麻互言之也唯杖屨不易言其餘皆易也屨不易者練與大功俱用繩耳雜記既練遇麻斷本者于免絰之既免去絰每可以絰必絰既絰則去之雖無變縁練無首絰有事則免絰如其倫免無不絰絰有不免其無事則自若練服也小功不易喪之練冠如免則絰其緦小功之絰因其初葛帶緦之麻不變小功之葛小功之麻不變大功之葛以有本為税税亦變易也小功葛以下之麻雖與上同猶不變也此要其麻有本者乃變上耳雜記曰有三年之練冠則以大功之麻易之唯杖屨不易也服問三年之喪既練矣有期之喪既葬矣則帶其故葛帶絰期之絰服其功衰帶其故葛帶者三年既練期既葬差相似也絰期之葛絰三年既練首絰除矣為父既練衰七升母既葬衰八升凡齊衰既葬衰或八升或九升服其功衰服粗衰有大功之喪亦如之大功之麻變三年之練葛期既葬之葛帶小于練之葛帶又當有絰亦反服其故葛帶絰期之絰差之宜也此雖變麻服葛大小同耳亦服其功衰凡三年之喪既練始遭齊衰大功之喪絰帶皆麻小功無變也無所變于大功齊斬之服不用輕累重也同上如三年之喪則既顈其練祥皆行言今之喪既服顈乃為前三年者變除而練祥祭也此主謂先有父母之服今又喪長子者其先有長子之服又喪父母其禮亦然然則言未歿喪者已練祥矣顈草名無葛之鄉去麻則用顈雜記有父母之喪尚功衰而附兄弟之殤則練冠附于殤此兄弟之殤謂大功親以下之殤也斬衰齊衰之喪練皆受以大功之衰此謂之功衰以是時而附大功親以下之殤大功親以下之殤輕不易服同上右並有喪服久而不葬者唯主喪者不除其餘以麻終月數者除喪則已其餘謂旁親也以麻終月數不葬者喪不變也小記三年而后葬者必再祭其祭之間不同時而除喪詳見卒哭袝練祥禫記練章司徒文子曰喪服既除然後乃葬則其服何服子思荅曰三年之喪未葬服不變除何有焉期大功之喪服其所除之服以葬既葬而除之孔叢子右久不葬服改葬緦謂坟墓以他故崩壞将亡失尸柩也言改葬者明棺物毁敗改葬之如葬時也其奠如大歛从廟之廟從墓之墓禮冝同也服緦者臣為君也子為父也妻為夫也必服緦者親見尸柩不可以無服緦三月而除之喪服記右改葬服葬桓王改葬也改葬之禮緦舉下緬也緦者五服最下言舉下緬上从緦皆反其故服因葬桓王記改葬之禮不謂改葬桓王當服緦也江熈曰葬稱公舉五等之上改葬禮緦舉五服于之下以喪緬藐逺也天子諸侯易服而葬以為交神明者不可以純凶况其緬者乎是故改葬之禮其服唯輕言緬釋所以緦也荘三年穀梁傳司徒文子改葬其叔父問服于子思子思曰禮父母改葬緦既葬而除不忍無服送至親也非父母無服無服則弔而加麻孔叢子君弔則復殯服詳見喪大記殯後受弔章君弔雖不當免時也主人必免不散麻雖異國之君免也親者皆免不散麻者自若絞垂為人君變貶于大歛之前既啟之後也親者大功以上也異國之君免或為弔小記諸侯弔所弔雖已葬主人必免以免者尊人君為之變也同上凡喪服未畢有弔者則為位而哭拜踊客始來主人不可以殺禮待之雜記主人未除喪有兄弟自他國至則主人不免而為主親質不崇敬也小記子㳺曰既祥雖不當縞者必縞然後反服謂有以喪事贈賵來者雖不及時猶變服服祥祭之服以受之重其禮也其于此時始弔者則衛将軍文子之為之是矣反服反素縞麻衣也雜記右受弔變服晉侯彪卒既葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣送葬禮畢而又命孤孤斬焉在衰絰之中既葬未卒哭故猶服斬衰其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫将若之何皆無辭以見昭十年左氏傳将軍文子之喪既除喪而后越人來弔主人深衣練冠待于廟垂涕洟主人文子之子簡子瑕也深衣練冠凶服變也待于廟受弔不迎賔也子㳺觀之曰将軍文氏之子其庶幾乎亡于禮者之禮也其動也中中禮之變檀弓生不及祖父母諸父昆弟而父税喪已則否謂子生于外者也父以他故居異邦而生己已不及此親存時歸見之今其死于喪服年月已過乃聞之父為之服已則否者不責非時之恩于人所不能也當其時則服税讀如無禮則税之税税喪者喪與服不相當之言為君之父母妻長子君已除喪而后聞喪則不税臣之恩輕也謂卿大夫出聘問以他故久留降而在緦小功則税之謂正親在齊衰大功者正親緦小功不税矣曽子曰小功不税則是逺兄弟終無服也此句補脱誤在是冝承父税喪己則否近臣君服期服矣其餘從而服不從而税謂君出朝覲不時反而不知喪者近臣閽寺之屬也其餘羣介行人宰史也君雖未知喪臣服已从服者所从雖在外自若服也小記曽子曰小功不税據禮而言也日月已過乃聞喪而服曰税大功以上然小功輕不服則是逺兄弟終無服也言相離逺者聞之恒晚而可乎以已意怪之檀弓右税服席葢重素不入公門席葢截喪車也雜記士輤葦席以為屋蒲席以為裳帷重素衣裳皆素也苞屨扱衽厭冠不入公門此皆凶服也苞藨也齊衰藨蒯之菲也問喪曰親始死扱上衽厭猶伏也喪冠厭伏苞或為菲書方衰凶噐不以告不入公門此謂喪在内不得不入當先告君耳方板也士喪禮下篇曰書賵于方若九若七若五凶噐明噐也曲禮三年之喪以衰裳入朝非禮也是謂君與臣同國臣有喪事而不歸反服其衰裳以入朝是謂君臣同國無尊卑也有喪不歸唯君耳臣有喪當致仕而歸禮運凡見人無免絰雖朝于君無免絰唯公門有税齊衰詳見喪禮義季武子寝疾蟜固不説齊衰而入見曰斯道也将亡矣士唯公門説齊衰季武子魯大夫季孫夙也世為上卿强且專政國人事之如君蟜固能守禮不畏之矯失俗也道猶禮也武子曰不亦善乎君子表微時無如之何佯若善之表猶明也檀弓麻者不紳執玉不麻麻不加于采吉凶不相干也麻謂絰也紳大帶也喪以要絰代大帶也麻不加于采衣采者不麻謂弁絰者必服弔服是也采𤣥纁之衣記雜凡帶必有佩玉唯喪否喪主于哀去飾也凡謂天子以下至士玉藻小功不説笏當事免則説之免悲哀哭踊之時不在于記事也小功輕不當事可以搢笏也同上君之喪子大夫寢門之外杖寢門之内輯之夫人世婦在其次則杖即位則使人執之子有王命則去杖國君之命則輯杖聴卜有事于尸則去杖大夫于君所則輯杖於大夫所則杖輯歛也斂者謂舉之不以拄地也夫人世婦次于房中即位堂上堂上近尸殯使人執杖不敢自持也子于國君之命輯杖下成君不敢敵之也卜卜葬卜日也凡喪祭虞而有尸大夫于君所輯杖謂與之俱即寢門外位也獨焉則杖君謂子也于大夫所杖俱為君杖不相下也大夫之喪大夫有君命則去杖大夫之命則輯杖内子為夫人之命去杖為世婦之命授人杖大夫有君命去杖此指大夫之子也而云大夫者通實大夫有父母之喪也授人杖與使人執之同也士之喪于君命夫人之命如大夫于大夫世婦之命如大夫子皆杖不以即位子謂凡庶子也不以即位與去杖同大夫士哭殯則杖哭柩則輯杖哭殯謂既塗也哭柩謂啟後也大夫士之子于父父也尊近哭殯可以杖天子諸侯之子于父父也君也尊逺杖不入廟門喪大記父在不敢杖矣尊者在故也堂上不杖辟尊者之處也父在不杖謂為母喪也尊者在不杖辟尊者之處不杖有事不趨皆為其感動使之憂戚也問喪傳曰公卿大夫室老士貴臣其餘皆衆臣也衆臣杖不以即位喪服傳為長子杖則其子不以杖即位辟尊者雜記為妻父母在不杖不稽顙尊者在不敢盡禮于私喪也同上庶子不以杖即位下適子也位朝夕哭位也父不主庶子之喪則孫以杖即位可也祖不厭孫孫得伸也父在庶子為妻以杖即位可也舅不主妾之喪子得伸也小記女未廟見而死壻不杖不菲不次曽子問童子何以不杖不能病也婦人何以不杖亦不能病也詳見喪服斬衰章童子不杖不菲雜記古者貴賤皆杖叔孫武叔朝見輪人以其杖闗轂而輠輪者于是有爵而后杖也記庶人失禮所由始也叔孫武叔魯大夫叔孫州仇也輪人作車輪之官同上八十齊喪之事弗及也王制七十致政唯衰麻為喪同上五十不成喪成猶備也所不能備謂不致毁不散送之屬也七十唯衰麻在身言其餘居處飲食與吉時同也大記五十不散送送喪不散麻始衰不備禮玉藻子㓜則以衰抱之人為之拜大記童子無緦服聴事不麻皆為㓜小不備禮也雖不服緦猶免深衣無麻徃給事也玉藻或問曰免者以何為也怪本所為施也曰不冠者之所服也禮曰童子不緦唯當室緦緦者其免也當室則免而杖矣不冠者猶未冠也當室謂無父兄而主家者也童子不杖不杖者不免當室則杖而免免冠之細别以次成人也緦者其免也言免乃有緦服也問喪婦人不宜袒同上秃者不髽傴者不袒喪服四制然則秃者不免傴者不袒跛者不踊非不悲也身有錮疾不可以備禮也傴背曲也問喪右雜記喪服之變禮書綱目卷二十
