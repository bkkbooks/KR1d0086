body:
  text: 禮書綱目卷六婺源江永撰公食大夫禮嘉禮十經鄭目録云主國君以禮食小聘大夫之禮公食于五禮屬嘉禮公食大夫之禮使大夫戒各以其爵戒猶告也告之必使同班敵者易以相親敬上介出請入告問所以為來事三辭為既先受賜不敢當賓出拜辱拜使者屈辱來迎已大夫不答拜將命不答拜為人使也將猶致也賓再拜稽首受命大夫還復于右賓不拜送遂從之不拜送者為從之不終事賓朝服即位于大門外如聘于是朝服則初時𤣥端如聘亦入于次俟右戒賓賓從記不宿戒食禮輕也此所以不宿戒者謂前期三日之戒申戒為宿謂前期一日戒不速食賓之朝夙興戒之賓則從戒者而來不復召賓之乘車在大門外西方北面立賓車不入門廣敬也凡賓即朝中道而往將至下行而後車還立于西方賓及位而止北面卿大夫之位當車前凡朝位賓主之間各以命數為逺近之莭也即位具主人也擯者俟君于大門外卿大夫士序及宰夫具其饌物皆于廟門之外羹定肉謂之羹定猶孰也著之者下以為莭甸人陳鼎七當門南面西上設扄冪冪若束若編七鼎一大牢也甸人冢宰之屬兼亨人者南面西上以其為賓統于外也扄鼎扛所以舉之者也凡鼎冪蓋以茅為之長則束本短則編其中央今文扄作鉉古文冪作密設洗如饗必如饗者先饗後食如其近者也饗禮亡燕禮則設洗于阼階東南古文饗或作鄉小臣具槃匜在東堂下為公盥也公尊不就洗小臣于小賓客饗食掌正君服位宰夫設筵加席几設筵于戶西南面而左几公不賓至授几者親設湇醬可以略此無尊主于食不獻酬飲酒漿飲俟于東房飲酒清酒也漿飲胾漿也其俟奠于豐上也飲酒先言飲明非獻酬之酒也漿飲先言漿别于六飲也凡宰夫之具饌于東房凡非一也飲酒之具宰夫所掌也酒漿不在凡中者雖無尊猶嫌在堂右陳器饌記不授几異于禮也無阼席公不坐亨于門外東方必于門外者大夫之事也東方者主陽司宫具几與蒲筵常緇布純加萑席尋𤣥帛純皆卷自末司宫大宰之屬掌宫廟者也丈六尺曰常半常曰尋純緣也萑細葦也末經所終有以識之必長筵者以有左右饌也今文萑皆為莞宰夫筵出自東房筵本在房宰夫敷之也天子諸侯左右房公如賓服迎賓于大門內不出大門降于國君大夫納賓大夫謂上擯也納賓以公命賓入門左公再拜賓辟再拜稽首左西方賓位也辟逡遁不敢當君拜也公揖入賓從揖入道之及廟門公揖入廟禰廟也賓入三揖每曲揖及當碑揖相人偶至于階三讓讓先升公升二等賓升逺下人君大夫立于東夾南西面北上東夾南東西莭也取莭于夾明東于堂士立于門東北靣西上統于門者非其正位辟賓在此小臣東堂下南面西上宰東夾北西面南上宰宰夫之屬也古文無南上內官之士在宰東北西面南上夫人之官內宰之屬也自卿大夫至此不先即位從君而入者明助君饗食賓自無事介門西北面西上西上自統于賓也然則承擯以下立于士西少進東上右迎賓即位公當楣北鄉至再拜賓降也公再拜楣謂之梁至再拜者興禮俟賓嘉其來也公再拜賓降矣賓西階東北面答拜西階東少就主君敬也擯者辭辭拜于下拜也公降一等辭曰寡君從子雖將拜興也賓降再拜公降擯者釋辭矣賓猶降終其再拜稽首興起也賓栗階升不拜自以已拜也栗實栗也不拾級連步趨主國君之命不拾級而下曰走命之成拜階上北面再拜稽首賓降拜主君辭之賓雖終拜于主君之意猶為不成右拜至記卿擯由下不升堂也士舉鼎去冪於外次入陳鼎于碑南南面西上右人抽扃坐奠于鼎西南順出自鼎西左人待載入由東出由西明為賓也今文奠為委古文待為持雍人以爼入陳于鼎南旅人南面加七于鼎退旅人雍人之屬旅食者也雍人言入旅人言退文互相備也出入之由亦如舉鼎者匕爼每器一人諸侯官多也大夫長盥洗東南西面北上序進盥退者與進者交於前卒盥序進南面七長以長幼也序猶更也前洗南載者西面載者左人也亦序自鼎東西面于其前大夫匕則載之魚臘飪飪孰也食禮宜孰饗有腥者載體進奏體謂牲與臘也奏謂皮膚之理也進其理本在前下大夫體七個魚七縮爼寢右右首也寢右進鬐也乾魚進腴多骨鯁腸胃七同爼以其同類也不異其牛羊腴賤也此爼實凡二十八倫膚七倫理也謂精理􅉸脆者今文倫或作論腸胃膚皆橫諸爼垂之順其在牲之性也腸胃垂及爼拒大夫既七七奠于鼎逆退復位事畢宜由便也士七載者又待設爼右舉鼎載爼公降盥將設醬賓降公辭辭其從已卒盥公一揖一讓公升賓升揖讓皆一殺于初古文一皆作一宰夫自東房授醯醬授授公也醯醬以醯和醬公設之以其為饌本賓辭北面坐還而東遷所東遷所奠之東側其故處公立于序內西鄉不立阼階上示親饌賓立于階西疑立不立階上以主君離阼也疑正立也自定之貌今文曰西階宰夫自東房薦豆六設于醬東西上韭菹以東醓醢昌本昌本南麋臡以西菁菹鹿臡醓醢醢有醓昌本昌蒲本菹也醢有骨謂之臡菁􅕴菁菹也今文臡皆作麋士設爼于豆南西上牛羊豖魚在牛南臘腸胃亞之亞次也不言䋫錯爼尊也膚以為特直豖與腸胃東北特膚者出下牲賤旅人取七甸人舉鼎順出奠于其所以其空也其所謂當門宰夫設黍稷六簋于爼西二以並東北上黍當牛爼其西稷錯以終南陳並併也今文曰併古文簋皆作軌大羹湇不和實于鐙宰右執鐙左執蓋由門入升自阼階盡階不升堂授公以蓋降出入反位大羹湇煮肉汁也大古之羮不和無鹽菜瓦豆謂之鐙宰謂大宰宰夫之長也有蓋者饌自外入為風塵今文湇為汁又曰入門自阼階無升公設之于醬西賓辭坐遷之亦東遷所宰夫設鉶四于豆西東上牛以西羊羊南豖豖以東牛鉶菜和羹之器飲酒實于觶加于豐豐所以承觶者也如豆而卑宰夫右執觶左執豐進設于豆東食有酒者優賓也設于豆東不舉也燕禮記曰凡奠者于左宰夫東面坐啓簋㑹各卻于其西㑹簋蓋也亦一一合卻之各當其簋之西右設正饌記贊者盥從爼升爼其所有事上贊下大夫也上謂堂上擯贊者事相近以佐上下為名鉶芼牛藿羊苦豖薇皆有􅉸藿豆葉也苦苦茶也􅉸莖荁之屬今文苦為芐贊者負東房南面告具於公負東房負房戶而立也南面者欲得鄉公與賓也公再拜揖食再拜拜賓饌具賓降拜答公拜公辭賓升再拜稽首不言成拜降未拜賓升席坐取韭菹以辨擩于醢上豆之間祭擩猶染也今文無于贊者東面坐取黍實于左手辨又取稷辨反于右手興以授賓賓祭之取授以右手便也賓亦興受坐祭之于豆祭也獨云贊興優賓也少儀曰受立授立不坐三牲之肺不離贊者辨取之一以授賓肺不離者􅞟之也不言􅞟􅞟則祭肺也此舉肺不離而􅞟之便賓祭也祭離肺者絶肺祭也一猶稍也古文一作一賓興受坐祭于是云賓興受坐祭重牲也賓亦每肺興受祭于豆祭挩手扱上鉶以柶辨擩之上鉶之間祭扱以扱其鉶菜也挩拭也拭以巾祭飲酒於上豆之間魚臘醬湇不祭不祭者非食物之盛者右賓祭正饌宰夫授公飯粱公設之於湇西賓北面辭坐遷之既告具矣而又設此殷勤之加也遷之遷而西之以其東上也公與賓皆復初位位序內階西宰夫膳稻于粱西膳猶進也進稻粱者以簠士羞庶羞皆有大蓋執豆如宰羞進也庶衆也進衆珍味可進者也大以肥美者特為臠所以祭也魚或謂之膴膴大也唯醢醬無大如宰如其進大羹湇右執豆左執蓋先者反之由門入升自西階庶羞多羞人不足則相授于階上復出取也先者一人升設于稻南簋西間容人簋西黍稷西也必言稻南者明庶羞加不與正豆併也間容人者賓當從間往來也旁四列西北上不統于正饌者雖加自是一禮是所謂羔胾中别膷以東臐膮牛炙膷臐膮今時臛也牛曰膷羊曰臐豖曰膮皆香美之名也古文膷作香臐作熏炙南醢以西牛胾醢牛鮨先設醢䋫之以次也內則謂鮨為膾然則膾用鮨今文鮨作鰭鮨南羊炙以東羊胾醢豖炙炙南醢以西豕胾芥醬魚膾芥醬芥實醬也內則曰膾春用葱秋用芥衆人騰羞者盡階不升堂授以蓋降出騰當作媵送也授授先者一人右設加饌記簠有蓋幂稻粱將食乃設去㑹于房蓋以幂幂巾也今文或作幕凡炙無醬已有醎和贊者負東房告備于公復告庶羞具者以其異饌贊升賓以公命命賓升席賓坐席末取粱即稻祭于醬湇間即就也祭稻粱不以豆祭祭加宜于加贊者北面坐辨取庶羞之大興一以授賓賓受兼一祭之一一受之而兼一祭之庶羞輕也自祭之于膷臐之間以異饌也右賓祭加饌賓降拜拜庶羞公辭賓升再拜稽首公答再拜賓北面自間坐左擁簠粱右執湇以降自間坐由兩饌之間也擁抱也必取梁者公所設也以之降者堂尊處欲食于階下然也公辭賓西面坐奠于階西東面對西面坐取之栗階升北面反奠于其所降辭公奠而後對成其意也降辭公敬也必辭公者為其尊而親臨也食侍食贊者之事公許賓升公揖退于箱箱東夾之前俟事之處擯者退負東孰而立無事賓坐遂卷加席公不辭贊者以告公公聽之重來優賓賓三飯以湇醬每飯啜湇以肴擩醬食正饌也三飯而止君子食不求飽不言其肴優賓宰夫執觶漿飲與其豐以進此進潄也非為卒食為將有事緣賓意欲自潔清賓挩手興受受觶宰夫設其豐于稻西酒在東漿在西是所謂左酒右漿庭實設乘皮賓坐祭遂飲奠于豐上飲潄右賓正食公受宰夫束帛以侑西鄉立束帛十端帛也侑猶勸也主國君以為食賓殷勤之意未至復發幣以勸之欲用深安賓也西鄉立序內位也受束帛于序端賓降筵北面以君將有命也北面于西階上擯者進相幣為君釋幣辭于賓賓降辭幣升聽命降辭幣主國君又命之升聽命釋許辭降拜當拜受幣公辭賓升再拜稽首受幣當東楹北面主國君南面授之當東楹者欲得君行一臣行二也退西楹西東面立俟主國君送幣也退不負序以將降公一拜賓降也公再拜賓不敢俟成拜介逆出以賓事畢賓北面揖執庭實以出揖執者示親受公降立俟賓反上介受賓幣從者訝受皮從者府史之屬訝迎也今文曰梧受右侑幣賔入門左設霤北面再拜稽首便退則食禮末卒不退則嫌更入行拜若欲從此退公辭止其拜使之卒食揖讓如初如初入也升賓再拜稽首公答再拜賓拜拜主國君之厚意賓揖介入復位賓降辭公如初將復入賓升公揖退于箱賓卒食㑹飯三飲卒已也已食會飯三潄漿也㑹飯謂黍稷此食黍稷則初時食稻粱不以漿湇不復用正饌也初時食加飯用正饌此食正飯用庶羞互相成也後言湇或時後用挩手興北面坐取粱與醬以降西面坐奠于階西示親徹也不以出者非所當得又以已得侑幣東面再拜稽首卒食拜也不北面者異于辭公降再拜答之也不辭之使升堂明禮有終右卒食介逆出賓出公送于大門內再拜賓不顧初來揖讓而退不顧退禮略也示難進易退之義擯以賓不顧告公公乃還也有司卷三牲之爼歸於賓館卷猶收也無遺之辭也三牲之爼正饌尤尊盡以歸賓尊之至也歸爼者實于篚他時有所釋故魚臘不與以三牲之爼無所釋故也禮之有餘為施惠不言腸胃膚者在魚臘下不與可知也古文與作豫右賓出明日賓朝服拜賜于朝拜食與侑幣皆再拜稽首朝謂大門外訝聽之受其言入告出報也此下大夫有士訝右拜賜上大夫八豆八簋六鉶九爼魚臘皆二爼記公食上大夫異于下大夫之數豆加葵菹蝸醢四四為列爼加鮮魚鮮臘三三為列無特魚腸胃倫膚若九若十有一下大夫則若七若九此以命數為差也九謂再命者也十一謂三命者也七謂一命者也九或上或下者再命謂小國之卿次國之大夫也卿則曰上大夫則曰下大國之孤視子男庶羞西東毋過四列謂上下大夫也古文毋為無上大夫庶羞二十加于下大夫以雉兔鶉鴽鴽音毋右食上大夫禮記上大夫蒲筵加萑席其純皆如下大夫純謂三命大夫也孤為賓則莞筵紛純加繅席畫純也上大夫庶羞酒飲漿飲庶羞可也于食庶羞宰夫又設酒漿以之食庶羞可也以優賓拜食與侑幣皆再拜稽首嫌上大夫不稽首若不親食謂主國君有疾病若他故使大夫各以其爵朝服以侑幣致之執幣以將命豆實實於罋陳于楹外二以並北陳簋實實于筐陳于楹內兩楹間二以並南陳陳罋筐于楹間者象授受于堂中也南北相當以食饌同列耳罋北陳者變于食罋數如豆醢芥醬從焉筐米四今文並作併庶羞陳于碑內生魚也魚臘從焉上大夫加鮮魚鮮臘雉兔鶉鴽不陳于堂辟正饌庭實陳于碑外執乘皮者也不參分庭一在南者以言歸宜近內牛羊豖陳于門內西方東上為其踐汙館庭使近外賓朝服以受如受饔禮朝服食禮輕也無儐以已本宜往明日賓朝服以拜賜于朝訝聽命賜亦謂食侑幣右不親食此後有大夫相食一章見饗食燕記篇公食大夫義嘉禮十一補記食禮公飬賓飬賢一也親之故愛之愛之故飬之飬之故食之食而弗愛猶豢之也愛而弗敬猶畜之也饗禮敬之至也食禮愛之至也饗為愛弗勝其敬食為敬弗勝其愛文質之辨也公使大夫戒必以其爵恭也已輕則卑之已重則是以其貴臨之也賓三辭聽命言是禮之貴弗敢當也弗敢當故難進也公迎賓于大門內非不能至于外也所以待人君之禮也臣之意欲尊其君子之意欲尊其父故迎賓于大門內所以順其為尊君之意也三揖至於階三讓而升堂充其意諭其誠也於廟用祭器誠之盡也君子於所尊敬不敢狎不敢狎故神明之神明之故忠臣嘉賓樂盡其心也大夫立于東夾南西面北上士立于門東北面西上小臣東堂下南面西上宰東夾北西面南上內官之士在宰東北西面南上百官有司備以樂飬賢也設筵加席几致安厚之義也公設醬然後宰夫薦豆菹醢士設爼公設太羔然後宰夫設鉶啓簋言以身親之也賓遍祭公設粱宰夫膳稻士膳庶羞為殷勤也賓三飯粱以湇漿以君子之厚已也賓必親徹有報之道也庭實乘皮侑以束帛雖偹物猶欲其加厚焉也公拜送終之以敬也有司卷三牲之爼歸于賓館不敢䙝其餘也上大夫八豆八簋六鉶九爼庶羞二十其餘衰見是德之殺也君子言之曰愛人者使人愛之者也敬人者使人敬之者也親人者使人親之者也自卑者使人尊之者也是故公飬賓國飬賢其義一也未有愛之敬之親之尊之而其位不安者也未有不愛不敬不尊不親而能長有其國者也將由乎好德之君則將怡焉唯恐其不足于禮將由乎驕慢之君則將曰是食於我而已矣故禮君子所不足小人所泰餘也孔子食於少施氏將祭主人辭曰不足祭也將飱主人辭曰不足飱也孔子退曰吾食而飽少施氏有禮哉故君子難親也將親之舍禮何以哉劉敞補禮書綱目卷六
