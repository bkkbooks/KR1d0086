body:
  text: 禮書綱目卷十七婺源江永撰㑹同禮賓禮九補因覲禮諸侯覲于天子一章補為此篇大宗伯以賓禮親邦國時見曰㑹殷見曰同時見者言無常期諸侯有不順服者王將有征討之事則既朝覲王為壇于國外合諸侯而命事焉春秋傳曰有事而㑹不協而盟是也殷猶衆也十二嵗王如不巡守則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉所命之政如王巡守殷見四方四時分來嵗終則徧春官大行人掌大賓之禮時㑹以發四方之禁殷同以施天下之政時㑹即時見也無常期諸侯有不順服者王將有征討之事則既朝王命為壇子國外合諸侯而發禁命事焉禁謂九伐之法殷同則殷見也王十二嵗一巡守若不巡守則殷同殷同者六服盡朝既朝王亦命為壇于國外合諸侯而命其政政謂邦國之九法殷同四方四時分來嵗終則徧矣九伐九法皆在司馬職十有二嵗王巡守殷國王巡守諸侯㑹者各以其時之方書曰遂覲東后是也其殷國則四方四時分來如平時秋官右總要㑹以訓上下之則制財用之節詳見朝事義職方氏王將巡守則戒于四方曰各修平乃守考乃職事無敢不敬戒國有大刑及王之所行先道帥其屬而巡戒令注見巡守王殷國亦如之殷猶衆也十二嵗王若不巡守則六服盡朝謂之殷國其戒四方諸侯與巡守同夏官右戒令小宰以法掌㑹同賓客之戒具法謂其禮法也戒具戒官有事者所當共令百官府共其財用治其施舎聴其治訟施舎謂不給役者天官宰夫凡禮事贊小宰比官府之具比校次之同上外府凡㑹同共其財用之幣齎賜予之財用齎行道之財用也聘禮曰問㡬月之齎上同廩人凡邦有㑹同之事則治其糧與其食行道曰糧謂耩也止居曰食謂米也地官遺人㑹同掌其道路之委積地官右戒具鄉師大㑹同正治其徒役與其輂輦戮其犯命者輂駕馬輦人輓行所以載任器也止以為藩營司馬法曰夏后氏謂輦曰余車殷曰胡奴車周曰輜輦輦一斧一斤一鑿一梩一鋤周輦加二扳二築又曰夏后氏二十人而輦殷十八人而輦周十五人而輦地官縣師若將有㑹同之戒則受法于司馬以作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至受法于司馬者知所當徵寡衆同上稍人若有㑹同之事則以縣師之法作其同徒輂輦帥而以至治其政令以聴於司馬同徒司馬所調之同凡用役者不必一時皆徧以人數調之使勞逸逓焉同上大司馬及師大合軍以行禁令以救無辜伐有罪師所謂王巡守若㑹同司馬起師合軍以从所以威天下行其政也不言大者未有敵不尚武夏官右起徒役射人㑹同朝覲作大夫介凡有爵者作讀如作止爵之作諸侯來至王使公卿有事焉則作大夫使之介也有爵者命士以上不使賤者夏官司士凡㑹同作士從作士从謂選可使从于王者同上諸子㑹同作羣子從从于王同上大司馬大㑹同則帥士庶子而掌其政令帥帥以从王同上司兵軍事建車之五兵㑹同亦如之車之五兵鄭司農所云者是也步卒之五兵則無夷矛而有弓矢鄭司農云五兵者戈殳㦸酋矛夷矛同上司戈盾㑹同授貳車戈盾建乘車之戈盾授旅賁及虎士戈盾乘車王所乗車也㑹同則金路同上司弓矢㑹同頒弓弩各以其物從授兵甲之儀物弓弩矢箙之屬同上校人㑹同毛馬而頒之毛馬齊其色也頒授當乘者同上牛人㑹同共其兵車之牛與其牽徬以載公任器牽徬在轅外輓牛也人御之居其前曰牽居其旁曰徬任猶用也地官戎右㑹同充革車㑹同王雖乘金輅猶以革路從行也充之者謂居左也曲禮曰乘君之乘車不敢曠左夏官車僕凡師共革車各以其萃㑹同亦如之萃猶副也巡守及兵車之㑹則王乘戎路乘車之㑹王雖乘金路猶共以从不失備也春官典路凡㑹同以路從王出于事無常王乘一路典路以其餘路从行亦以華國同上司右㑹同合其車之卒伍而比其乘屬其右合比屬謂次第相安習也車亦有卒伍夏官齊右㑹同前齊車前之者已駕王未乘之時同上虎賁氏掌先後王而趨以卒伍㑹同亦如之王出將虎賁士居前後雖羣行亦有局分上同旅賁氏㑹同則服而趨服而趨夾王車趨也㑹同賓客王亦齊服服衮冕則此士之齊服服𤣥端同上師氏㑹同王舉則從舉猶行也故書舉為與杜子春云當為與謂王與㑹同之事地官保氏㑹同王舉則從同上右從行儀㑹大祝大㑹同造於廟宜于社過大山川則用事焉用事亦用祭事告行也玉人職有宗祝以黄金勺前馬之禮是謂過大山川與曽子問曰凡告必用牲幣春官小宗伯凡王之㑹同之禱祠肄儀為位肄習也故書肄為肆儀為義杜子春讀肆當為肄義為儀謂若今時肄司徒府也小宗伯主其位同上右祭告禱掌舎掌王之㑹同之舎設梐枑再重故書枑為柜鄭司農云梐榱梐也柜受居溜水洓橐者也杜子春讀為梐枑梐枑謂行馬𤣥謂行馬再重者以周衞有外内列設車宮轅門謂王行止宿阻險之處備非常次車以為藩則仰車以其轅表門為壇壝宮棘門謂王行止宿平地築壇又委壝土起堳埒以為宮鄭司農云棘門以㦸為門杜子春云棘門或作材門為帷宮設旌門謂王行晝止有所展肄若食息張帷為宮則樹旌以表門無宮則共人門謂王行有所逢遇若住逰觀陳列周衞則立長大之人以表門凡舎事則掌之王行所舎止天官司戈盾及舎設藩盾行則斂之舎止也藩盾盾可以藩衞者如今之扶蘇與夏官虎賁氏舎則守王閑舎王出所止宿處閑梐枑也同上宮人凡寢中之事埽除執燭共鑪炭凡勞事四方之舎事亦如之从王適四方及㑹同所舎天官右止舎士師以五戒先後刑罰二曰誥用之于㑹同誥于書則大誥康誥之屬秋官右誥戒諸侯覲于天子為宮方三百步四門壇十有二尋深四尺加方明于其上四時朝覲受之于廟此謂時㑹殷同也宮謂壝土為埒以象牆壁也為宮者于國外春㑹同則于東方夏㑹同則于南方秋㑹同則于西方冬㑹同則于北方八尺曰尋十有二尋則方九十六尺也深謂高也從上曰深司儀職曰為壇三成成猶重也三重者自下差之為三等而上有堂焉堂上方二丈四尺上等中等下等每面十二尺方明者上下四方神明之象也上下四方之神者所謂神明也會同而盟明神鍳之則謂之天之司盟有象者猶宗廟之有主乎王巡守至于方嶽之下諸侯會之亦為此宮以見之司儀職曰將會諸侯則命為壇三成宮旁一門詔王儀南鄉見諸侯也方明者木也方四尺設六色東方青南方赤西方白北方黑上𤣥下黃設六玊上圭下璧南方璋西方琥北方璜東方圭六色象其神六玊以禮之上宜以蒼璧下宜以黃琮而不以者則上下之神非天地之至貴者也設玉者刻其木而著之上介皆奉其君之旂置于宮尚左公侯伯子男皆就其旂而立置于宮者建之豫為其君見王之位也諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上尚左者建旂公東上侯先伯伯先子子先男而位皆上東方也諸侯入壝門或左或右各就其旂而立王降階南鄉見之土揖庶姓時揖異姓天揖同姓見揖位乃定古文尚作上四傳擯王既揖五者升壇設擯升諸侯以㑹同之禮其奠瑞玊及享幣公拜于上等侯伯于中等子男于下等擯者每延之升堂致命王受玊撫玉降拜于下等及請事勞皆如覲禮是以記之覲云四傳擯者每一位畢擯者以告乃更陳列而升其次公也侯也伯也各一位子男俠門而俱東上亦一位也至庭乃設擯則諸侯初入門王官之伯帥之耳古文傳作傅天子乘龍載大斾象日月升龍降龍出拜日于東門之外反祀方明此謂㑹同以春者也馬八尺以上為龍大斾大常也王建大常縿首畫日月其下及旒交畫升龍降龍朝事儀曰天子冕而執鎮圭尺有二寸繅藉尺有二寸搢大圭乘大路建大常十有二旒樊纓十有二就貳車十有一乘帥諸侯而朝日于東郊所以教尊尊也退而朝諸侯由此二者言之已祀方明乃以㑹同之禮見諸侯也凡㑹同者不協而盟司盟職曰凡邦國有疑會同則掌其盟約之載書及其禮儀北面詔明神既盟則藏之言北面詔明神則明神有象也象者其方明乎及盟時又加于壇上乃以載辭告焉詛祝掌其祝號禮日于南門外禮月與四瀆于北門外禮山川丘陵于西門外此謂會同以夏冬秋者也變拜言禮者客祀也禮月于北郊者月大險之精以為地神也盟神必云日月山川焉者尚著明也詩曰謂予不信有如皦日春秋傳曰縱子忘之山川神祇其忘諸乎此皆用明神為信也此下有祭天燔柴四句見巡守篇覲禮幕人掌帷幕幄帟綬之事王出宮則有是事在旁曰帷在上曰幕幕或在地展陳于上帷幕皆以布為之四合象宮室曰幄王所居之帳也鄭司農云帟平帳也綬組綬所以繋帷也𤣥謂帟主在幕若幄中坐上承塵幄帟皆以繒為之凡四物者以綬連繋焉凡朝覲㑹同共其帷幕幄帟綬共之者掌次當以張天官掌次朝日祀五帝則張大次小次設重帟重案合諸侯亦如之次謂幄也大幄初往所止居也小幄既接祭退俟之處合諸侯于壇王亦以時休息重帟複帟重案牀重席也諸侯朝覲㑹同則張大次小次大次亦初往所止居小次即宮待事之處孤卿有邦事則張幕設案有邦事謂以事从王若以王命出也孤王之孤三人副三公論道者不言公公如諸侯禮从主合諸侯張大次小次同上司几筵凡大朝覲王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玊几注見覲禮司常日月為常交龍為旂凡祭祀各建其旂㑹同賓客亦如之置旌門賓客朝覲宗遇王乘金輅巡守兵車之㑹王乘戎路皆建其大常掌舎職曰為帷宮設旌門春官雞人大祭祀夜呼旦以嘂百官㑹同亦如之同上射鳥氏祭祀以弓矢敺烏鳶凡賓客㑹同亦如之鳥鳶善鈔盜便汚人夏官大司冦㑹同前王秋官大史大㑹同朝覲以書協禮事亦先習録之也及將幣之日執書以詔王將送也詔王告王以禮事春官小史大㑹同佐大史同上大宗伯㑹同則為上相相詔玉禮也出接賓曰擯入詔禮曰相相者五人卿為上擯同上肆師大朝覲佐儐為承擯也同上典瑞公執桓圭侯執信圭伯執躬圭繅皆三采三就子執穀璧男執蒲璧繅皆二采再就以㑹同于王注見覲禮司儀將合諸侯則令為壇三成宮旁一門合諸侯謂有事而㑹也為壇于國外以命事宮謂壝土以為牆處所謂為壇壝宮也天子春帥諸侯拜日于東郊則為壇於國東夏禮日於南郊則為壇於國南秋禮山川丘陵于西郊則為壇于國西冬禮月四瀆於北郊則為壇于國北既拜禮而還加方明于壇上而祀焉所以教尊尊也王巡守殷國而同則其為宮亦如此與鄭司農云三成三重也爾雅曰丘一成為敦丘再成為陶丘三成為崑崙丘謂三重詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓謂王既祀方明諸侯上介皆奉其君之旂置于宮乃詔王升壇諸侯皆就其旂而立諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上王揖之者定其位也庶姓無親者也土揖推手小下之也異姓昏姻也時揖平推手也衞將軍文子曰獨居思仁公言言義其聞詩也一日三復白圭之玷是南宮韜之行也夫子言其仁以為異姓謂妻之也天揖推手小舉之及其擯之各以其禮公于上等侯伯于中等子男於下等謂執玉而前見于也擯之各以其禮者謂擯公者五人侯伯四人子男三人上等中等下等者謂所奠玉處也壇三成深四尺則一等一尺也壇十有二尋方九十六尺則堂上二丈四尺每等丈二尺與諸侯各于其等奠玊降拜升成拜明臣禮也既乃升堂授王玊其將幣亦如之其禮亦如之將幣享也禮謂以鬱鬯祼之也皆於其等之上秋官大宰大朝覲㑹同贊玊幣玉獻玉凡玊爵助王受此四者時見曰㑹殷見曰同大㑹同或于春朝或于秋覲舉春秋則冬夏可知玉幣諸侯享幣也其合亦如小行人所合六幣云玉獻獻國珍異亦執玉以致之玊几王所依也立而設几優尊者玉爵王禮諸侯之醉爵王朝諸侯立依前南面其禮之于阼階上天官㑹同主詡詡謂敏而有勇若齊國佐少儀史載筆士載言謂從於㑹同各持其職以待事也筆謂書具之屬言謂㑹同盟要之辭曲禮詛祝掌盟詛之祝號所以告神明也盟詛主于要誓大事曰盟小事曰詛作盟詛之載辭以敘國之信用以質邦國之劑信載辭為辭而載之於策故用牲加書於其上也國謂王之國邦國諸侯國也質正也成也文王修徳而虞芮質厥成鄭司農云載辭以春秋傳曰使祝為載書春官封人大盟則飾其牛牲大盟會同之盟地官玊府若合諸侯則共珠槃玊敦敦槃類珠玉以為飾古者以槃盛血以敦盛食合諸侯者必割牛耳取其血歃之以盟珠槃以盛牛耳尸盟者執之故書珠為夷鄭司農云夷槃或為珠槃玉敦歃血玉器天官涖牲曰盟涖臨也故用牲臨而讀其盟書盟禮亡曲禮司盟掌盟載之灋載盟辭也盟者書其辭於䇿殺牲取血坎其牲加書於上而埋之謂之載書春秋傳曰宋寺人惠牆伊戾坎用牲加書為世子痤與楚客盟凡邦國有疑㑹同則掌其盟約之載及其禮儀北面詔明神既盟則貳之有疑不協也明神神之明察者謂日月山川也覲禮加方明于壇上所以依之也詔之者讀其載書以告之也貳之者寫副當以授六官秋官戎右盟則以玉敦辟盟遂役之鄭司農云敦器名也辟法也𤣥謂將歃血者先執其器為衆陳其載辭使心皆開辟也役之者傳敦血授當歃者贊牛耳桃茢鄭司農云贊牛耳者春秋傳所謂執牛耳者故書茢為滅杜子春云滅當為屬𤣥謂尸盟者割牛耳取血助為之及血在敦中以桃茢沸之又助之也耳者盛以珠槃尸盟者執之桃鬼所畏也茢苕帚所以掃不祥夏官大司㓂凡邦之大盟約涖其盟書而登之于天府涖臨也天府祖廟之藏大史内史司㑹及六官皆受其貮而藏之六官六卿之官也貳副也秋官右㑹同盟約禹合諸侯於塗山執玊帛者萬國諸侯執玉附庸執帛塗山在夀春東北哀七年左氏傳夏啟有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之蒐康有酆宮之朝穆有塗山之㑹昭四年左傳詳見諸侯相朝篇周室既寧八方㑹同各以其職來獻欲垂法厥後作王㑹成周之㑹墠上張赤帟隂羽王城既成大㑹諸侯及四夷也陰鶴也以羽飾帳也除地曰墠帟帳也天子南面立絻無繁露朝服八十物搢挺繁露冕之所重也所尊敬則有焉八十物大小所服搢插也挺笏也唐叔荀叔周公在左太公望在右皆絻亦無繁露朝服七十物搢笏旁天子而立于堂上唐荀國名皆成王弟故曰叔旁差在後也近天子後故其冕亦無旒也堂下之右唐公虞公南面立焉唐虞二公堯舜後也堂下之左殷公夏公立焉皆南面絻有繁露朝服五十物皆搢笏杞宋二公冕有繁露搢笏則唐虞闕也為諸侯之有疾病者阼階之南祝淮氏榮氏次之圭瓚次之皆西面彌宗旁之淮榮二祝之氏也彌宗官名次圭瓚南差在後為諸侯有疾病者之醫藥所居使侍左右也居則南也相者太史魚大行人皆朝服有繁露魚太史名及大行人皆贊相賓客禮儀也堂下之東面郭叔掌為天子菉幣焉絻有繁露郭叔虢文王弟菉録諸侯之幣也内臺西面者正北方應侯曹叔伯舅中舅内臺中臺也應侯成王弟比服次之要服次之荒服次之西方東面正北方伯父中子次之此要服於比服轉遠殊故殊其名非夷狄之四荒也伯父姫姓之國中子於王子中行者也方千里之外為比服方千里之内為要服三千里之内為荒服是皆朝於内者此服名因於殷非周制也堂後東北為赤帟焉浴盆作其中雖不用而設之敬諸侯也其西天子車立焉乘六青陰羽鳧旌鶴鳧羽為旌旄中臺之外其右泰士臺左彌士外謂臺之東西也外臺右太士左彌士士言尊王大彌相儀之士也受贄者八人東面者四人受賓幣士也四人東面則西面四人也陳幣當外臺天𤣥宗馬十二陳束帛皮馬於外臺天𤣥黒宗尊也玊𤣥繚璧綦十二此下三璧皆玉故自下以至王之𤣥繚謂之黒組紐之綦玉名有十二綦也參方𤣥繚璧豹虎皮十二參方陳幣三所也璧皮魚陳也四方𤣥繚璧琰十二琰珪也有鋒疾陳之四方所列三也外臺之四隅張赤帟為諸侯欲息者皆息焉命之曰爻閭每角張息者随所近也諸侯稱爻也周書王㑹解成王盟諸侯于岐陽岐山之陽楚為荆蠻荆州之蠻也置茅蕝設望表與鮮牟守燎置立也蕝謂束茅而立之所以縮酒望表謂望山川立木以為表表其位也鮮牟東夷國燎庭燎也國語楚語車攻宣王復古也宣王修車馬備器械復㑹諸侯於東都詩序駕彼四牡四牡奕奕赤芾金舄㑹同有繹奕奕連絡布散之貌赤芾諸侯之服金舄赤舄而加金飾亦諸侯之服也時見曰會殷見曰同繹陳列聫屬之貌也此章言諸侯來會朝于東都也小雅叔向曰明王之制使諸侯嵗聘以志業志識也嵗聘以修其職業閒朝以講禮三年而一朝正班爵之義率長幼之序再朝而㑹以示威六年而一㑹以訓上下之則制財用之節再㑹而盟以顯昭明十二年而一盟所以昭信義也凡八聘四朝再㑹王一巡守盟于方嶽之下志業於好聘也講禮於等朝也示威於衆㑹也昭明于神盟也自古以來未之或失也昭十二年左氏傳掌客王殷國則國君膳以牲犢令百官百牲皆具從者三公眂上公之禮卿眂侯伯之禮大夫眂子男之禮士眂諸侯之卿禮庶子壹眂其大夫之禮注見巡守宰夫凡會同賓客以牢禮之灋掌其牢禮委積膳獻飲食賓賜之飱牽與其陳數牢禮之法多少之差及其時也三牲牛羊豕具為一牢委積謂牢米薪芻給賓客道用也膳獻禽羞俶獻也飲食燕饗也鄭司農云飱夕食也春秋傳曰飱有陪鼎牽牲牢可牽而行者春秋傳曰餼牽竭矣𤣥謂飱客始至所致禮凡此禮陳數存可見者唯有行人掌客及聘禮公食大夫天官右禮賓大祝大會同反行舎奠曾子問曰凡告必用牲幣反亦如之春官右反行小祝小會同掌事焉疏曰小會同謂諸侯遣臣王使卿大夫與之行會同之禮小祝專掌其事也春官小司馬小㑹同掌其事如大司馬之灋疏曰謂諸侯使卿大夫來聘王使卿大夫與之㑹同掌事如大司馬之法亦如大司馬羞魚牲授其祭之等也夏官右小㑹同巡守賓禮十補嵗二月東巡守至于岱宗柴諸侯為天子守土故稱守廵行之既班瑞之明日乃順春東巡岱宗泰山為四岳所宗燔柴祭天告至望秩于山川東岳諸侯境内名山大川如其秩次望祭秩者牲幣祝號之次第如五岳視三公四瀆視諸侯其餘視伯子男肆覲東后遂見東方之國君協時日正月同律度量衡合四時之節氣月之大小日之甲乙使齊一也律法制及尺丈斛斗斤兩皆均同集傳曰律謂十二律修五禮五玊修吉凶賓軍嘉之禮五等諸侯執其玉三帛二生一死贄三帛諸侯世子執纁公之孤執𤣥附庸之君執黄二生卿執羔大夫執鴈一死士執雉玊帛主死所以為贄以見之集傳曰五玉三帛二生一死贄九字當在肆覲東后之下協時月正日之上誤脱在此言東后之覲皆執此贄也如五器卒乃復卒終復還也器謂圭璧如五器禮終則還之三帛生死則否也集傳曰如五器劉侍講曰如同也五器即五禮之器卒乃復者舉祀禮覲諸侯一正朔同制度修五禮如五器數事皆畢則不復東行而遂西向且轉而南行也五月南巡守至于南岳如岱禮南岳衡山自東岳南巡五月至八月西巡守至于西岳如初西岳華山初謂岱宗十有一月朔巡守至于北岳如西禮北岳恒山歸格于藝祖用特巡守四岳然後歸告至文祖之廟藝文也言祖則考著特一牛五載一巡守羣后四朝各會朝于方岳之下凡四處故曰四朝將説敷奏之事故申言之堯舜同道舜攝則然堯又可知集傳四朝説異見覲禮篇舜典天子五年一巡守天子以海内為家時一巡省之五年者虞夏之制也周則十一嵗一巡守嵗二月東巡守至于岱宗代宗東嶽柴而望祀山川柴祭天告至也覲諸侯覲見也問百年者就見之就見老人命大師陳詩以觀民風陳詩謂采其詩而視之命市納賈以觀民之所好惡志淫好辟市典市者賈謂物貴賤厚薄也質則用物貴淫則侈物貴民之志淫邪則其所好者不正命典禮考時月定日同律禮樂制度衣服正之同陰律也山川神祇有不舉者為不敬不敬者君削以地舉猶祭也宗廟有不順者為不孝不孝者君絀以爵不順者謂若逆昭穆變禮易樂者為不從不從者君流流放也革制度衣服者為畔畔者君討討誅也有功德於民者加地進律律法也五月南巡守至于南嶽如東巡守之禮八月西巡守至于西嶽如南巡守之禮十有一月北巡守至于北嶽如西巡守之禮歸假于祖禰用特假至也特特牛也祖下及禰皆一牛王制六年五服一朝五服侯甸男采衞六年一朝㑹京師又六年王乃時巡考制度于四岳周制十二年一巡守春東夏南秋西冬北故曰時巡考正制度禮法于四岳之下如虞帝巡守然諸侯各朝于方岳大明黜陟覲四方諸侯各朝于方岳之下大明考績黜陟之法周官十有二嵗王巡守王巡守諸侯會者各以其時之方書曰肆覲東后是也秋官大行人職方氏王將巡守則戒于四方曰各修平乃守考乃職事無敢不敬戒國有大刑乃猶女也守謂國境之内職事所當共具及王之所行先道帥其屬而巡戒令先道先由王所從道居前行其前日所戒之令夏官戎僕掌馭戎車戎車革路也師出王乘以自將犯軷如玉路之儀凡巡守亦如之如在軍同上土訓王巡守則夾王車巡守行視所守也天子以四海為守地官誦訓王巡守則夾王車同上掌土訓誦訓所見通禮制國篇土方氏王巡守則樹王宫為之藩羅夏官天子將出類乎上帝宜乎社造乎禰帝謂五德之帝所祭于南郊者類宜造皆祭名其禮亡制王天子巡守以遷廟主行載於齊車齊車金路曽子問玊人大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬射琰出者也勺故書或作約杜子春云當為勺謂酒尊中勺也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也𤣥謂鼻勺流也凡流皆為龍口也衡古文横假借字也衡謂勺徑也三璋之勺形如圭瓚天子巡守有事山川則用灌焉於大山川則用大璋加文飾也於中山川用中璋殺文飾也於小山川用邊璋半文飾也其祈沈以馬宗祝亦執勺以先之禮王過大山川則大祝用事焉將有事於四海山川則校人飾黃駒考工記校人凡將事于四海山川則飾黃駒四海猶四方也王巡守過大山川則有殺駒以祈沈禮與玉人職有宗祝以黄金勺前馬之禮夏官天子適四方先柴書曰嵗二月東巡守至于岱宗柴郊特牲祭天燔柴祭山丘陵升祭川沈祭地瘞升沈必就祭者也就祭則是謂王巡守及諸侯之盟祭也其盟揭其著明者燔柴升沈瘞祭禮終矣備矣郊特牲曰郊之祭也迎長日之至也大報天而主日也宗伯職曰以實柴祀日月星辰則燔柴祭天謂祭日也柴為祭日則祭地瘞者祭月也日月而云天地靈之也王制曰王巡守至于岱宗柴是王巡守之盟其神主日也春秋傳曰晉文公為踐土之盟而傳云山川之神是諸侯之盟其神主山川也月乃太陰之精上為天使臣道莫貴焉是王官之伯會諸侯而盟其神主月與古文瘞作殪覲禮臨諸侯畛於鬼神曰有天王某甫畛致也祝告致于鬼神辭也曰有天王某甫某甫且字也不名者不親徃也周禮大會同過山川則大祝用事焉鬼神謂百辟卿士也畛或為祇曲禮王巡守則君親監之監祝也周禮王十二嵗一巡守國語周語天子巡守諸侯待于竟天子先見百年者問其國君以百年者所在而往見之八十九十者東行西行者弗敢過西行東行者弗敢過欲言政者君就之可也弗敢過者謂道經之則見之祭義大宰王眡治朝則贊聴治眡四方之聴朝亦如之謂王巡守在外時天官天子適諸侯必舎其祖廟詳見下掌客王巡守則國君膳以牲犢令百官百牲皆具從者三公眂上公之禮卿眂侯伯之禮大夫眂子男之禮士眂諸侯之卿禮庶子壹眂其大夫之禮國君者王所過之國君犢繭栗之犢也以膳天子貴誠也牲孕天子不食也祭帝不用也凡賓客則皆角尺令者掌客令主國也百牲皆具言無有不具備秋官入其疆土地辟田野治養老尊賢俊傑在位則有慶慶以地入其疆土地荒蕪遺老失賢掊克在位則有讓慶賞也益其地以賞之也掊克聚斂也讓責也孟子古者天子將巡狩必先告於祖禰命史告羣廟及社稷圻内名山大川告者七日而徧親告用牲史告用幣申命冢宰而後清道而出或以遷廟之主行載於齊車每舎奠焉及所經五嶽四瀆皆有牲幣歸反舎於外次三日齋親告於祖禮用特命有司告羣廟社稷及圻内名山大川而復入聴朝孔叢子巡守維元祀巡守四嶽八伯祀年也元年謂月正元日舜假于文祖之年也巡行也視所守也天子以天下為守堯始得羲和命為六卿主其春夏秋冬者并掌方嶽之事是為四嶽出則為伯後稍死吺共工等代之乃分置八伯壇四奥奥内也安也四方之内人所安居也為壇祭之謂祭四方之帝四方之神也沈四海祭水曰沈封十有二山祭者必封封亦壇也十有二山十有二州之鎮也兆十有二州兆域也為營域以祭十二州之分星也壇沈封兆皆因所宜為之名濬川樂正定樂名樂正樂官之長周禮曰大司樂元祀代泰山貢兩伯之樂焉元始也嵗二月東巡守始祭代氣泰山也東稱代書曰至于岱宗柴東嶽陽伯之樂舞侏離其歌聲比余謡名曰晳陽陽伯猶曰春伯春官秩宗也伯夷掌之侏離舞曲名言象物生育離根株也徒歌謂之謡其聲清濁比如余謡然後應律也晳當為析春厥民析晳陽樂正所定名也是時契為司徒掌地官矣後又舉禹掌天官儀伯之樂舞鼚哉其歌聲比大謡名曰南陽儀當為羲羲仲後也鼚動貌哉始也言象物應雷而動始出見也南任也中祀大交霍山貢兩伯之樂焉中仲也古字通春為元夏為仲五月南巡守仲祭大交氣于霍山也南交稱大交書曰宅南交也夏伯之樂舞謾彧其歌聲比中謡名曰初慮夏伯夏官司馬也棄掌之謾猶曼也彧長貌言象物之滋曼彧然也初慮陽上極陰始謀也謾或為謗羲伯之樂舞將陽其歌聲比大謡名曰朱于羲伯羲叔之後也將陽言象物之秀實動摇也于大也秋祀栁穀華山貢兩伯之樂焉八月西巡守祭栁穀之氣於華山也栁聚也齊人語秋伯之樂舞蔡俶其歌聲比小謡名曰苓落秋伯秋官士皋陶掌之蔡猶衰也俶始也言象物之始衰也和伯之樂舞𤣥鶴其歌聲比中謡名曰歸來和伯和仲之後也𤣥鶴言象陽鳥之南也歸來言反其本也幽都𢎞山祀貢兩伯之樂焉𢎞山恒山也十有一月朔巡守祭幽都之氣於恒山互言之者明祭山北稱幽都也冬伯之樂舞齊落冬伯冬官司空也垂掌之齊落終也言象物之終也齊或為聚歌曰縵縵并論八音四㑹此上下有脱辭其説未聞歸假于禰祖用特五載一巡守羣后德讓貢正聲而九族具成族當為奏言諸侯貢其正聲而天子九奏之樂乃具成也尚書大傳時邁巡守告祭柴望也詩序般巡守而祀四岳河海也詩序於皇時周陟其高山堕山喬嶽允猶翕河敷天之下裒時之對時周之命髙山泛言山耳堕則其狹而長者喬高也嶽則其高而大者允猶未詳或曰允信也猶與由同翕河河善泛濫今得其性故翕而不為暴也裒聚也對答也言美哉此周也其巡守而登此山以柴望又道于河以周四嶽凡以敷天之下莫不有望於我故聚而朝之方嶽之下以答其意耳並周頌惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承德庭直也葛氏曰弗庭弗庭來者六服侯甸男采衞并畿内為六服也周官晏子曰天子適諸侯曰巡狩巡狩者巡所守也巡所守巡行諸侯所守之土也孟子王者所以巡狩者何巡者循也狩牧也為天下循行守牧民也道德太平恐遠近不同化幽隠有不得所考禮義正法度同律厯協時月皆為民也所以四時出何當承宗廟故不踰時也以夏之仲月者同律度當得其中也二月八月晝夜分五月十一月陰陽終所以五嵗巡狩何為太煩也過五年為太疎也因天道時有所生嵗有所成三嵗一閏天道小備五嵗再閏天道大備故五嵗一巡狩三年小備二伯出述職黜陟一年物有終始嵗有所成方伯行國時有所生諸侯行邑王者出一公以其屬守二公以其屬從也白虎通天子非展義不巡守天子巡守所以宣布德義左莊二十七年傳鄭石㚟曰先王卜征五年先征五年而卜吉凶也征謂巡守征行而嵗習其祥祥習則行五年五卜皆同吉乃巡守不習則増修德而改卜不習謂卜不吉傳襄十三年左氏天子無客禮莫敢為主焉君適其臣升自阼階不敢有其室也明饗君非禮也郊特牲天子四海之内無客禮莫敢為王焉故君適其臣升自阼階即位于堂示民不敢有其室也臣亦統于君坊記天子適諸侯必舎其祖廟而不以禮籍入是謂天子壊法亂紀以禮籍入謂大史典禮執簡記奉諱惡也天子雖尊舎人宗廟猶有敬焉自拱敕也禮運天子適諸侯諸侯膳用犢諸侯適天子天子賜之禮大牢貴誠之義也故天子牲孕弗食也犢者誠慤未有牝牡之情是以小為貴也孕任子也易曰婦孕不育郊特牲有以少為貴者天子適諸侯諸侯膳以犢疏曰諸侯事天子如天子事天天子事天既用一牛故天子巡守過諸侯境土諸侯奉膳亦止一牛而已禮器禮書綱目卷十七
