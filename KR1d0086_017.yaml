body:
  text: 禮書綱目卷十五婺源江永撰王朝邦國遣使禮賓禮五補大宗伯以賓禮親邦國時聘曰問殷俯曰視時聘者亦無常期天子有事乃聘之焉竟外之臣既非朝嵗不敢瀆為小禮殷俯謂一服朝之嵗以朝者少諸侯乃使卿以大禮衆聘焉一服朝在元年七年十一年春官大行人掌大賓之禮及大客之儀以親諸侯大客謂孤卿時聘以結諸侯之好殷俯以除邦國之慝此二事者亦以王見諸侯之臣使來者為文也時聘者亦無常期天子有事諸侯使大夫來聘親以禮見之禮而遣之所以結其思好也天子無事則已殷俯謂一服朝之嵗也慝猶惡也一服朝之嵗五服諸侯皆使卿以聘禮來俯天子天子以禮見之命以政禁之事所以除其惡行秋官諸侯之於天子也比年一小聘三年一大聘比年每嵗也小聘使大夫大聘使卿詳王制禮見覲典瑞瑑圭璋璧琮繅皆二采一就以眺聘璋以聘后夫人以琮享之也大夫衆來曰眺寡來曰聘鄭司農云瑑有圻鄂瑑起春官玉人瑑圭璋八寸璧琮八寸以眺聘瑑文飾也眺視也聘問也衆來曰眺特來曰聘聘禮曰凡四器者唯其所寶以聘可也考工記案十有二寸棗栗大夫純五夫人以勞諸侯詳見覲禮凡賓客卿有大夫訝大夫有士訝士皆有訝此謂聘問之日王所使迎賓客于館之訝秋官掌訝司几筵筵國賓于牖前莞筵紛純加繅席畫純左彤几國賓諸侯來朝孤卿大夫來聘朝者雕几聘者彤几春官凡大國之孤執皮帛以繼小國之君出入三積不問一勞朝位當車前不交擯廟中無相以酒禮之其他皆視小國之君此以君命來聘者也孤尊既聘享更自以其贄見執束帛而已豹皮表之以為飾繼小國之君言次之也朝聘之禮每一國畢乃前不交擯者不使介傳辭交于王之擯親自對擯者也廟中無相介皆入門西上而立不前相禮者聘之介是與以酒禮之酒謂齊酒也和之不用鬱鬯耳其他謂二車及介牢禮賓主之間擯者將幣祼酢饗食之數凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之此亦以君命來聘者也所下其君者介與朝位賓主之間也其餘則自以其爵聘義曰上公七介侯伯五介子男三介是謂使卿之聘之數也朝位則上公七十步侯伯五十步子男三十步與大行人凡諸侯之卿大夫士為國客則如其介之禮以待之言其特來聘問待之禮如其為介時也然則聘禮所以禮賓是亦禮介秋官掌客小行人掌邦國賓客之禮籍以待四方之使者禮籍各位尊卑之書使者諸侯之使臣來者也令諸侯春入貢秋獻功王親受之各以其國之籍禮之貢六服所貢也功考績之功也秋獻之若今計文書斷于九月其舊法凡四方之使者大客則擯小客則受其幣而聽其辭擯者擯而見之玉使得親言也受其幣者受之以入告其所為來之事秋官别國之大夫入天子之國曰某士亦謂諸侯之卿也三命以下于天子為士曰某士者若晉韓起聘于周擯者曰晉士起自稱曰陪臣某陪重也曲禮次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫此諸侯使卿大夫眺聘並會之序也其位爵同小國在下爵異固在上耳其有中士下士者數各居其上之三分謂其為介若特行而並會也居猶當也此據大國而言大國之士為上次國之士為中小國之士為下士之數國皆二十七人各三分之上九中九下九以位相當則次國之上士當大國之中中當其下小國之上士當大國之下凡非命士亦無出會之事春秋傳謂士為微王制小司徒小賓客令野修道委積小賓客諸侯之使臣也官地大行人若有四方之大事則受其幣聽其辭四方之大事謂國有兵冦諸侯來告急者禮動不虛皆有贄幣以崇敬也受之以其事入告王也聘禮曰若有言則以束帛如享禮秋官小臣小賓客掌事如太僕之法夏官候人若有方治則帥而致于朝及歸送之于竟方治其方來治國事者也春秋傳曰晉欒盈過周玉使候人出諸轘轅是其送之同上象胥掌蠻夷閩貉戎狄之國使掌傳王之言而諭説焉以和親之謂蕃國之臣來俯聘者凡軍旅會同受國客幣而賓禮之謂諸侯以王有軍旅之事使臣奉幣來問秋官言諡曰類使大夫行象聘問之禮也言諡者序其行及諡所宜其禮亡曲禮右邦國遣使于王朝凡周禮通言賓客之事客謂諸侯聘問之臣詳見覲禮篇此不别出當於彼篇考之晉韓宣子聘于周王使請事問何事來聘對曰晉士起將歸時事於宰旅無他事矣起宣子名禮諸侯大夫入天子國稱士時事四時貢職宰旅冢宰之下士言獻職貢于宰旅不敢斥尊王聞之曰韓氏其昌阜於晉乎辭不失舊阜大也傳言周衰諸侯莫能如禮唯韓起不失舊襄二十六年左氏傳王使來徵聘徵召也言周徵也徵聘不書徵加諷諭不指斥孟獻子聘于周王以為有禮厚賄之宣九年左氏傳晉羊舌肸聘于周發幣于大夫及單靖公靖公享之儉而敬賓禮贈餞視其上而從之燕無私送不過郊語説昊天有成命國語周語燕注見饗食記篇大行人間問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之災此四者王使臣於諸侯之禮也間問者間嵗一問諸侯謂存省之屬諭諸侯之志者諭言語諭書名其類也交或往或來者也贊助也致禬凶禮之弔禮禬禮也補諸侯災者若春秋澶淵之會謀歸宋財王之所以撫邦國諸侯者嵗遍存三嵗遍眺五嵗遍省七嵗屬象胥諭言語協辭命九嵗屬瞽史諭書名聽聲音十有一嵗達瑞節同度量成牢禮同數器修法則撫猶安也存俯省者王使臣於諸侯之禮所謂間問也嵗者巡狩之明嵗以為始也屬猶聚也自五嵗之後遂間嵗遍省也七嵗省而召其象胥九嵗省而召其瞽史皆聚于天子之宮教習之也故書協辭命作叶詞命鄭司農云象胥譯官也叶當為汁詞當為辭書或為叶辭命玄謂胥讀為諝王制曰五方之民言語不通嗜欲不同達其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯此官正為象者周始有越重譯而來獻是因通言語之官為象諝云諝謂象之有才知者也辭命六辭之命也瞽樂師也史大史小史也書名書之字也古曰名聘禮曰百名以上至十一嵗又遍省焉度丈尺也量豆區釜也數器銓衡也法八法也則八則也達同成修皆謂齎其法式行至則齊等之也成平也平其僭踰者也官秋典瑞珍圭以徵守以恤凶荒杜子春曰珍當為鎮書亦或為鎮以徵守者以徵召守國諸侯若今時徵郡守以竹使符也鎮者國之鎮諸侯亦一國之鎮故以鎮圭徵之也凶荒則民有遠志不安其土故以鎮圭鎮安之玄謂珍圭王使之瑞節制大小當與琬琰相依王使人徵諸侯憂凶荒之國則授之執以往致王命焉如今時使者持節矣恤者闓府庫振救之凡瑞節歸又執以反命穀圭以和難穀圭亦王使之瑞節穀善也其飾若粟文然難仇讐和之者若春秋宣公及齊侯平莒及郯晉侯使瑕嘉平戎于王琬圭以治德以結好琬圭亦王使之瑞節諸侯有德王命賜之及諸侯使大夫來聘既而為壇會之使大夫執以命事焉大行人職曰時聘以結諸侯之好鄭司農云琬圭無鋒芒故治德以結好琰圭以易行以除慝瑣圭亦王使之瑞節鄭司農云琰圭有鋒芒傷害征伐誅討之象故以易行以除慝易惡行令為善者以此圭責讓諭告之也玄謂除慝亦于諸侯使大夫來眺既而使大夫執而命事于壇大行人職曰殷眺以除邦國之慝春官玉人琬圭九寸而繅以象德琬猶圜也王使之瑞節也諸侯有德王命賜之使者執琰圭以致命焉繅藉也琰圭九寸判規以除慝以易行凡圭琰上寸半琰圭琰半以上又半為瑑飾諸侯有為不義使者征之執以為瑞節也除慝除惡逆也易行去煩苛考工記司士作士適四方使為介士使謂自以王命使也介大夫之介也春秋傳曰天王使石尚來歸脤夏官虎賁氏適四方使則從士大夫虎士從使者若道路不通有徵事則奉書以使于四方不通逢兵冦若泥水奉書徵師役也春秋隱七年冬戎伐凡伯于楚丘以歸同上內府凡適四方使者共其所受之物而奉之王所以遺諸侯者天官校人凡國之使者共其幣馬使者所用私覿夏官小行人使適四方協九儀賓客之禮朝覲宗遇會同君之禮也存眺省聘問臣之禮也適之也協合也達天下之六節成六瑞並詳名器下篇合六幣詳諸侯相朝篇若國札喪則令賻補之若國凶荒則令賙委之若國師役則令稿禬之若國有福事則令賀慶之若國有禍災則令哀弔之凡此五物者治其事故故書賻作傳稿為藁鄭司農云賻補之謂賻喪家補助其不足也若今時一室二户則官與之棺也稿當讀為犒謂犒師也玄謂師役者國有兵冦以匱病者也使鄰國合會財貨以與之春秋定五年夏歸粟于蔡是也宗伯職曰以禬禮哀圍敗禍災水火及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札喪凶荒厄貧為一書其康樂和親安平為一書凡此五物者每國辨異之以反命于王以周知天下之故慝惡也猶圖也秋官行夫掌邦國傳遽之小事媺惡而無禮者凡其使也必以旌節雖道有難而不時必達傳遽若今時乘傳騎驛而使者也美福慶也惡喪荒也此事之小者無禮行夫主使之道有難謂遭疾病他故不以時至也必達王命不可廢也其大者有禮大小行人使之有故則介傳命不嫌不達居於其國則掌行人之勞辱事焉使則介之使謂大小行人也故書曰夷使鄭司農云夷使使於四夷則使行夫主為之介玄謂夷發聲同上右王朝遣使于邦國定王使單襄公聘于宋單襄公王卿士單朝也聘問也問者王之所以撫萬國存省之遂假道於陳以聘于楚假道自宋適楚經陳也是時天子微弱故以諸侯相聘之禮假道也聘禮若過國至于境使次介假道束帛將命于廟候不在疆候候人也掌送迎賓客者疆境也司空不視塗司空卿官掌道路也膳宰不致餼膳宰膳夫也掌賓客之牢禮生曰餼司里不授館司里里宰也掌授客館國無寄寓寓亦寄也無寄寓者不為廬舍可以寄羈旅之客縣無施舍四甸為縣縣方六十里施舍者所以施舍賓客負任之處單子歸告王曰陳侯不有大咎國必亡周之秩官有之秩官周常官篇名曰敵國賓至關尹以告敵位敵也闕尹司關掌四方賓客叩關則為之告聘禮曰及境謁關人關人問從者幾人遂以入境行理以節逆之理吏也逆迎也執瑞節為信而迎之也行理小行人候人為導導賓至于朝出送之境卿出郊勞聘禮曰賓至于近郊君使卿朝服用束帛勞門尹除門門尹司門也除門掃除門處也宗祝執祀宗宗伯祝太祝也執祀賓將有事於廟則宗祝執祭祀之禮司里授館司里授客所當館次於卿也聘禮卿致館司徒具徒具徒役修道路之委積司空視塗視險易也司寇詰姦禁詰姦盜虞人入材虞人掌山澤之官祭祀賓客各供其材甸人積薪甸人掌薪蒸之官也火師監燎火師司火燎庭燎也水師監濯水師掌水監滌濯之事者膳宰致饔熟食曰饔廩人獻餼生曰餼禾米也司馬陳芻司馬掌師圉人養馬故陳芻圉人職屬司馬上人展車展省客車補傷敗也百官官以物至賓入如歸是故小大莫不懷愛小大謂賓介也其貴國之賓至則以班加一等益虔貴國大國也班次也至于王使則皆官正蒞事正長也蒞臨也上卿監之監視也今雖朝也不才有分族於周朝單子之名有分族王之親族也承王命以為過賓於陳假道為過賓而司事莫至是蔑先王之官也蔑欺也國語周語諸侯相朝禮賔禮六補凡諸侯之邦交世相朝也父死子立曰世凡君即位大國朝焉小國聘焉此皆所以習禮考義正刑一德以尊天子也必擇有道之國而就修之秋官大行人諸侯相見必告于禰道近或可以不親告祖朝服而出視朝朝服為事故也命祝史告于五廟所過山川諸侯五廟山川所不過則不告貶于適天子也亦命國家五官道而出反必親告于祖禰乃命祝史告至于前所告者而後聽朝而入五官五大夫典事者命者敕之以其職道祖道也反必親告祖禰同出入禮問曽子司儀凡諸公相為賓謂相朝也主國五積三問皆三辭拜受皆旅擯再勞三辭三揖登拜受拜送賓所止則積間闊則問行道則勞其禮皆使卿大夫致之從來至去數如此也三辭辭其以禮來於外也積問不言登受之于庭也鄭司農云旅讀為旅于泰山之旅謂九人傳辭相授于上下竟問賓從末上行介還受上傳之玄謂旅讀為鴻臚之臚臚陳之也賓之介九人使者七人皆陳擯位不傳辭也賓之上介出請使者則前對位皆當其末擯焉三揖謂庭中時也拜送送使者主君郊勞交擯三辭車逆拜辱三揖三辭拜受車送三還再拜主君郊勞備三勞而親之也鄭司農云交擯三辭謂賓主之擯者俱三辭也車逆主人以車迎賓于館也拜辱賓拜謝辱也玄謂交擯者各陳九介使傳辭也車迎拜辱者賓以主君親來乘車出舍門而迎之若欲遠就之然見之則下拜迎謝其自屈辱來也至去又出車若欲遠送然主君三還辭之乃再拜送之也車送迎之節各以其等則諸公九十步立當車軹也三辭重者先辭辭其以禮來于外後辭辭升堂致館亦如之館舍也使大夫授之君又以禮親致焉致飱如致積之禮俱使大夫禮同也飱食也小禮曰飱大禮曰饔餼及將幣交擯三辭車逆拜辱賓車進答拜三揖三讓每門止一相及廟唯上相入賓三揖三讓登再拜授幣賓拜送幣每事如初賓亦如之及出車送三請三進再拜賓三還三辭告辟鄭司農云交擯擯者交也賓車進答拜賓上車進主人乃答其拜也及出車送三請主人三請留賓也三進進隨賓也賓三還三辭告辟賓三還辭謝言已辟去也玄謂既三辭主君則乘車出大門而迎賓見之而下拜其辱賓車乃前下答拜也三揖者相去九十步揖之使前也至而三讓讓入門也相謂主君擯者及賓之介也謂之相者於外傳辭耳入門當以禮詔侑也介紹而傳命者君子于其所尊不敢質敬之至也每門止一相彌相親也君入門介拂闑大夫中棖與闑之間士介拂棖此為介鴈行相隨也止之者絶行在後耳賓三揖三讓讓升也登再拜授幣授當為受主人拜至且受玉也每事如初謂享及有言也賓當為儐謂以鬱鬯禮賓也上于下曰禮敵者曰儐禮器曰諸侯相朝灌用鬱鬯無籩豆之薦謂此朝禮畢儐賓也三請三進請賓就車也主君每一請車一進欲遠送之也三還三辭主君一請者賓亦一還一辭致饔餼還圭饗食致贈郊送皆如將幣之儀此六禮者唯饗速賓耳其餘主君親往親往者賓為主人主人為賓君如有故不親饗食則使大夫以酬幣侑幣致之鄭司農云還圭歸其玉也故公子重耳受飱及璧玄謂聘以圭璋禮也享以璧琮財也已聘而還圭璋輕財而重禮贈送以財既贈又送至于郊賓之拜禮拜饔餼拜饗食鄭司農云賓之拜禮者因言賓所當拜者之禮也所當拜者拜饔餼拜饗食玄謂賓將去就朝拜謝此三禮三禮禮之重者也賓既拜主君乃至館贈之去又送之于郊賓繼主君皆如主國之禮鄭司農云賓繼主君復主人之禮賓也故曰皆如主國之禮玄謂繼主君者儐主君也儐之者主君郊勞致館饔餼還圭致贈郊送之時也如其禮者謂玉帛皮馬也有饌陳之積者不如也若饗食主君及燕亦速焉諸侯諸伯諸子諸男之相為賓也各以其禮相待也如諸公之儀賓主相待之儀與諸公同也饔餼饗食之禮則有降殺秋官掌客凡諸侯之禮上公五積皆眂飱牽三問皆修羣介行人牢宰皆有牢飱五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳饔餼九牢其死牢如飱之陳牽四牢米百有二十筥醯醢百有二十甕車皆陳車米眂生牢牢十車車秉有五籔車禾眂死牢牢十車車三秅芻薪倍禾皆陳秉禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之凡介行人宰史皆有飱饔餼以其爵等為之牢禮之陳數唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔膳大牢侯伯四積皆眂飱牽再問皆修飱四牢食三十有二簠八豆三十有二鉶二十有八壺三十有二鼎簋十有二腥二十有七皆陳饔餼七牢其死牢如飱之陳牽三牢米百筥醯醢百甕皆陳米三十車禾四十車芻薪倍禾皆陳乘禽日七十雙殷膳大牢三饗再食再燕凡介行人宰史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢卿皆見以羔膳特牛子男三積皆眂飱牽一問以修飱三牢食二十有四簠六豆二十有四鉶十有八壺二十有四鼎簋十有二牲十有八皆陳饔餼五牢其死牢如飱之陳牽二牢米八十筥醯醢八十甕皆陳米二十車禾三十車芻薪倍禾皆陳乘禽日五十雙一饗一食一燕凡介行人宰史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮六壺六豆六籩膳眂致饗親見卿皆膳特牛積皆視飱牽謂所共如飱而牽牲以往不殺也不殺則無鉶鼎簠簋之實其米實于筐豆實實于甕其設筐陳于楹內甕陳于楹外牢陳于門西車米禾芻薪陳于門外壺之有無未聞三問皆修修脯也上公三問皆修下句云羣介行人宰史皆有牢君用修而臣有牢非禮也蓋著脫字失處且誤耳飱客始至致小禮也公侯伯子男飱皆飪一牢其餘牢則腥食者庶饈美可食者也其設蓋陳于楹外東西不過四列簠稻粱器也公十簠堂上六西夾東夾各二也侯伯八簠堂上四西夾東夾各二子男六簠堂上二西夾東夾各二豆菹醢器也公四十豆堂上十六西夾東夾各十二侯伯三十二豆堂上十二西夾東夾各十子男二十四豆堂上十二西夾東夾各六禮器曰天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六以聘禮差之則堂上之數與此同鉶羹器也公鉶四十二侯伯二十八子男十八非衰差也二十八書或為二十四亦非也其于衰公又當三十又為無所據依禮之大數鉶少于豆推其衰公鉶四十二宜為三十八蓋近之矣則公鉶堂上十八西夾東夾各十侯伯堂上十二西夾東夾各八子男堂上十西夾東夾各四壺酒器也其設于堂夾如豆之數鼎牲器也簋黍稷器也鼎十有二者飪一牢正鼎九與陪鼎三皆設于西階前簋十有二堂上八西夾東夾各二合言鼎簋者牲與黍稷俱食之主也牲當為腥聲之誤也腥謂腥鼎也於侯伯云腥二十有七其故腥字也諸侯禮盛腥鼎有鮮魚鮮臘每牢皆九為列設于阼階前公腥鼎三十六腥四牢也侯伯腥鼎二十七腥三牢也子男腥鼎十八腥二牢也皆陳陳列也飱門內之實備于是矣亦有車米禾芻薪公飱五牢米二十車禾三十車侯伯四牢米禾皆二十車子男三牢米十車禾二十車芻薪皆倍其禾饔餼既相見致大禮也大者既兼飱積有生有腥有孰餘又多也死牢如飱之陳亦飪一牢在西餘腥在東也牽生牢也陳于門西如積也米橫陳于中庭十為列每筥半斛公侯伯子男黍粱稻皆二行公稷六行侯伯稷四行子男二行醯醢夾碑從陳亦十為列醯在碑東醢在碑西皆陳于門內者于公門內陳之也言車者衍字耳車米載米之車也聘禮曰十斗曰斛十六斗曰籔十籔曰秉每車秉有五籔則二十四斛也禾稿實并刈者也聘禮曰四秉曰筥十筥曰稯十稯曰秅每車三秅則三十稯也稯猶束也禾米之秉筥字同數異禾之秉手把耳筥讀為棟梠之梠謂一穧也皆陳橫陳門外者也米在門東禾在門西芻薪雖取數于禾薪從米芻從禾也乘禽乘行羣處之禽謂雉鴈之屬於禮以雙為數殷中也中又致膳示念賓也若弗酌謂君有故不親饗食燕也不饗則以酬幣致之不食則以侑幣致之凡介行人宰史衆臣從賓者也行人主禮宰主具史主書皆有飱饔餼尊其君以及其臣也以其爵等為之牢禮之陳數爵卿也則飱二牢饔餼五牢大夫也則飱大牢饔餼五牢士也則飱少牢饔餼二牢也此降小禮豐大禮也以命數則參差難等略於臣用爵而已夫人致禮助君養賓也籩豆陳於户東壺陳于東序凡夫人之禮皆使下大夫致之於子男云膳視致饗言夫人致膳于小國君以致饗之禮則是不復饗也饗有壺酒卿皆見者見于賓也既見之又膳之亦所以助君養賓也卿見又膳此聘禮卿大夫勞賓餼賓之類與於子男云親見卿皆膳特牛見讀如卿皆見之見言卿于小國之君有不故造館見者故造館見者乃致膳鄭司農説牽云牲可牽行者也故春秋傳曰餼牽竭矣秅讀為秅秭麻答之秅同上君入門介拂闑大夫中棖與闑之間士介拂棖此謂兩君相見也棖門楔也君入必中門上介夾闑大夫介士介鴈行于後示不相治也君若迎聘客擯者亦然玉藻公執桓圭侯執信圭伯執躬圭繅皆三采三就子執穀璧男執蒲璧繅皆二采再就以朝覲宗遇會同于王諸侯相見亦如之鄭司農云亦執圭璧以相見故邾隱公朝于魯春秋傳曰邾子執玉高其容仰春官典瑞小行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故合同也六幣所以享也五等諸侯享天子用璧享后用琮其大各如其瑞皆有庭實以馬若皮皮虎豹皮也用圭璋者二王之後也二王後尊故享用圭璋而特之禮器曰圭璋特義亦通於此其於諸侯亦用璧琮耳子男于諸侯則享用琥璜下其瑞也凡二王後諸侯相享之玊大小各降其瑞一等及使卿大夫眺聘亦如之秋官瑑琮八寸諸侯以享夫人獻於所朝聘君之夫人也人考工記玉諸侯之席三重疏曰謂相朝時賓主皆然也尊者須溫厚故多重乃稱也三重則四席也熊氏云三重則三席也禮器諸侯相朝灌用鬱鬯無籩豆之薦灌獻也同上凡禮賓客國新殺禮凶荒殺禮札喪殺禮禍災殺禮在野在外殺禮皆為國省用愛費也國新新建國也凶荒無年也禍災新有兵冦水火也掌客曽子問曰諸侯相見揖讓入門不得終禮廢者幾孔子曰六請問之曰天子崩大廟火日食后夫人之喪雨霑服失容則廢夫人君之夫人曽子問右相朝諸侯相朝之禮各執其圭瑞服其服乘其輅建其旌旗施其樊纓從其二車委積之以其牢禮之數所以别義也介紹而相見君子於其所尊不敢質敬之至也君使大夫迎于境卿勞于道君親郊勞致館及將幣拜迎于大門外而廟受北面拜貺所以致敬也三讓而後升所以致尊讓也敬讓也者君子之所相接也諸侯相接以敬讓則不相侵陵也此天子之所以養諸侯兵不用而諸侯自為正之具也君親致饔既還圭饗食致贈郊送所以相與習禮樂也諸侯相與習禮樂則德行修而不流也故天子制之諸侯務焉大戴禮朝事儀君子之於禮也非作而致其情也作起也敬非已情也所以下彼此有由始也官所法也是故七介以相見也不然則已慤三辭三讓而至不然則已蹙已猶甚也慤蹙願貌大願則辭不見情無由至也禮器朝覲大夫之私覿非禮也大夫執圭而使所以申信也其君親來其臣不敢私見于主國君也以君命聘則有私見不敢私覿所以致敬也而庭實私覿何為乎諸侯之庭非其與君無别為人臣者無外交不敢二君也私覿是外交也特郊牲庭燎之百由齊桓公始也僭天子也庭燎之差公蓋五十侯伯子男皆三十同上子太叔曰昔文襄之霸也晉文公襄公其務不煩諸侯令諸侯三嵗而聘五嵗而朝明王之制嵗聘間朝今簡之昭三年左氏傳祭伯來來者來朝也其弗謂朝何也寰內諸侯非有天子之命不得出會諸侯不正其外交故弗與朝也天子畿內大夫有采地謂之寰內諸侯聘弓鍭矢不出竟埸束修之肉不行竟中有至尊者不二之也聘遺所以結二國之好將彼我之意臣當稟命于君無私朝聘之道隱元年穀梁傳隱公十一年春滕侯薛侯來朝天子無事諸侯相朝正也考禮修德所以尊天子也事謂巡守崩葬兵革之事傳春秋穀梁滕侯薛侯來朝爭長薛侯曰我先封薛祖奚仲夏所封在周之前滕侯曰我周之卜正也卜正卜官之長薛庶姓也我不可以後之庶姓非周之同姓公使羽父請於薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賓有禮主則擇之擇所宜而行之周之宗盟異姓為後盟載書皆先同姓例在定四年寡人若朝于薛不敢與諸任齒薛任姓齒列也君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯左氏傳曹大子來朝曹伯有疾故使其子來朝賓之以上卿禮也諸侯之適子未誓于天子而攝其君則以皮帛繼子男故賓之以上卿各當其國之上卿桓九年左氏傳文公十五年曹伯來朝禮也諸侯五年再相朝以修王命古之制也十一年曹伯來朝雖至此乃來亦五年左氏傳介葛盧來朝介東夷國也葛盧介君名也舍于昌行之上公在會饋之芻米禮也嫌公行不當致饋故曰禮也僖二十九年左氏傳子産相鄭伯以如楚舍不為壇至敵國交除地封土為壇以受郊勞外僕言曰昔先大夫相先君適四國未嘗不為壇外僕掌次舍者自是至今亦皆循之今子草舍無乃不可乎子産曰大適小則為壇小適大苟舍而已焉用壇僑聞之大適小有五美宥其罪戾赦其過失救其災患賞其德刑刑法也教其不及小國不困懷服如歸是故作壇以昭其功宣告後人無怠於德怠解也小適大有五惡説其罪戾自解説請其不足行其政事奉行大國之政共其職貢從其時命從朝會之命不然則重其幣帛以賀其福而弔其凶皆小國之禍也焉用作壇以昭其禍所以告子孫無昭禍焉可也無昭禍以告子孫傳襄二十八年左氏襄公薨之月子産相鄭伯以如晉晉侯以我喪故未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不修冦盜充斥充滿斥見言其多無若諸侯之屬辱在寡君者何是以令吏人完客所館館舍也高其閈閎閎門也厚其牆垣以無憂客使無令客使憂冦盜今吾子壞之雖從者能戒其若異客何以敝邑之為盟主繕完葺牆葺覆也以待賓客若皆毁之其何以共命寡君使丐請命請問毁垣之命對曰以敝邑𥚹小介於大國介間也誅求無時誅責也是以不敢寧居悉索敝賦以來會時事隨時來朝會逢執事之不間而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也薦陳猶獻見也其暴露之則恐燥濕之不時而朽蠹以重敝邑之罪僑聞文公之為盟主也宮室卑庳無觀臺榭以崇大諸侯之館館如公寢車廏繕修司空以時平易道路易治也圬人以時塓館宮室圬人塗者塓塗也諸侯賓至甸設庭燎庭燎設火於庭僕人巡宮巡宮行夜車馬有所有所處賓從有代代客役巾車脂轄巾車主車之官𨽻人牧圉各瞻其事瞻視客所當得百官之屬各展其物展陳也謂羣官各陳其物以待賓公不留賓而亦無廢事賓得速去則事不廢憂樂同之事則巡之巡行也教其不知而恤其不足賓至如歸無寧災患言見遇如此寧當復有災患耶無寧寧也不畏冦盜而亦不患燥濕今銅鞮之宮數里銅鞮晉離宮而諸侯舍于隸人舍如隸人舍門不容車而不可踰越門庭之內迫迮又有牆垣之限盜賊公行而夭癘不戒癘猶災也言水潦無時賓見無時命不可知若又勿壞是無所藏幣以重罪也敢請執事將何所命之問晉命已所止之宜雖君之有魯喪亦敝邑之憂也言鄭與魯亦有同姓之憂若獲薦幣薦進也修坦而行行去也君之惠也敢憚勤勞文伯復命反命于晉君趙文子曰信信如子産言我實不德而以隸人之垣以贏諸侯贏受也是吾罪也使士文伯謝不敏焉晉侯見鄭伯有加禮禮加敬厚其宴好而歸之乃築諸侯之館襄三十一年左氏傳鄭伯如晉拜成子遊相子遊公子偃授玉于東楹之東禮授玉兩楹之間鄭伯行疾故東過士貞伯曰鄭伯其死乎自棄也已視流而行速不安其位宜不能久視流不端諦也成六年左傳定公十五年春邾隱公來朝邾子益子貢觀焉邾子執玊高其容仰公受玊卑其容俯玉朝者之贄子貢曰以禮觀之二君皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度不合法度心已亡矣嘉事不體何以能久嘉事朝禮高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎為此年公薨哀七年以邾子益歸傳左氏傳諸侯未及期相見曰遇相見於郤地曰會及至也郤間也遇會禮亡禮曲右會遇春齊侯將平宋衛平宋衛于鄭有會期宋公以幣請于衛請先相見宋敬齊命衛侯許之故遇于犬丘犬丘垂也衛地注隱八年左氏傳期隱四年公及宋公遇于清云遇者草次之二國各簡其禮若道路相逢遇也定公與齊侯會于夾谷至會所為壇位土階三等以遇禮相見會遇之禮禮之簡略者也家語子太叔曰昔文襄之霸也令諸侯有事而會不協而盟昭三年左氏傳楚子合諸侯于申椒舉言於楚子曰夏啓有鈞臺之享啓禹子河南陽翟縣南有鈞臺陂蓋啓享諸侯于此商湯有景亳之命河南鞏縣西南有湯亭或言亳即偃師周武有孟津之誓將伐紂也成有岐陽之搜成王歸自奄大搜於岐山之陽岐山在扶風美陽縣西北康有酆宮之朝酆在始平鄠縣東有靈臺康王於是朝諸侯穆有塗山之會穆王會諸侯于塗山塗山在夀春東北齊桓有召陵之師在僖四年晉文有踐土之盟在僖二十八年君其何用王曰吾用齊桓用會召陵之禮王使問禮于左師與子産左師曰小國習之大國用之敢不薦聞言所聞謙示所未行獻公合諸侯之禮六其禮六儀也宋爵公故獻公禮子産曰小國共職敢不薦守獻伯子男會公之禮六鄭伯爵故獻伯子男會公之禮其禮同所從言之異君子謂合左師善守先代子産善相小國昭四年左氏傳公會吳于鄫吳欲霸中國吳來徵百牢子服景伯對曰先王未之有也吳人曰宋百牢我是時吳過宋得百牢魯不可以後宋且魯牢晉大夫過十晉大夫范鞅也在昭二十一年吳王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣有常數若有棄禮則有淫者矣淫過也周之王也制禮上物不過十二上物天子之牢以為天之大數也天有十二次故制禮象之今棄周禮而曰必百牢亦唯執事吳人弗聽乃與之哀七年左氏傳哀公會晉侯及吳子于黃池吳人將以公見晉侯子服景伯對使者曰王合諸侯則伯帥侯牧以見于王伯王官伯侯牧方伯伯合諸侯則侯帥子男以見於伯伯諸侯長自王以下朝聘玉帛不同故敝邑之職貢於吳有豐於晉無不及焉以為伯也今諸侯會而君將以寡君見晉君則晉成為伯矣敝邑將改職貢魯賦於吳八百乘若為子男則將半邾以屬於吳丰邾三百乘而如邾以事晉如邾六百乘且執事以伯召諸侯而以侯終之何利之有焉吳人乃止既而悔之謂景伯欺之哀十三年左氏傳僖公二十九年公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憗盟于翟泉卿不書罪之也晉侯始霸翼戴天子諸侯輯睦王室無虞而王子虎下盟列國以瀆大典諸侯大夫上敵公侯虧禮傷教故貶諸大夫諱公與盟在禮卿不會公侯會伯子男可也大國之卿當小國之君故可以會伯子男諸卿之見貶亦兼有此闕故傳重發之左氏傳禮書綱目卷十五
