body:
  text: 禮書綱目卷十四婺源江永撰聘禮賓禮三經鄭目録云大問曰聘諸侯相於久無事使卿相問之禮小聘使大夫周禮曰凡諸侯之邦交嵗相問也殷相聘也世相朝也聘於五禮屬賓禮聘禮右篇目周禮大行人凡諸侯之邦交嵗相問也殷相聘也世相朝也小聘曰問殷中也久無事又於殷朝者及而相聘也父死子立曰世凡君即位大國朝焉小國聘焉鄭司農云春秋傳孟僖子如齊殷聘秋官記久無事則聘焉事謂盟會之屬本經記諸侯使大夫問於諸侯曰聘聘禮今存曲禮文公元年穆伯如齊始聘焉禮也穆伯公孫敖凡君即位卿出竝聘踐修舊好要結外援踐猶履行也好事鄰國以衞社稷忠信卑讓之道也忠德之正也信德之固也卑讓德之基也傳因此發凡以明諸侯諒闇則國事皆用吉禮襄公元年衞子叔晉知武子來聘禮也凡諸侯即位小國朝之小事大大國聘焉大字小以繼好結信謀事補闕禮之大者也闕猶過也禮以安國家利民人為大昭公九年孟僖子如齊殷聘禮也自叔老聘齊至今二十年禮意久曠今修盛聘以無忘舊好故曰禮並左氏傳君與卿圖事圖謀也謀聘故及可使者謀事者必因朝其位君南面卿西面大夫北面士東面遂命使者遂猶因也既謀其人因命之也聘使卿使者再拜稽首辭辭以不敏君不許乃退退反位也受命者必進既圖事戒上介亦如之既已也戒猶命也已謀事乃命上介難於使者易於介宰命司馬戒衆介衆介皆逆命不辭宰上卿貳君事者也諸侯謂司徒為宰衆介者士也士屬司馬周禮司馬之屬司士掌作士適四方使為介逆猶受也右圖事命使介記大夫有所往必與公士為賓也謂聘也大聘使上大夫小聘使下大夫公士為賓謂作介也往之也玉藻宰書幣書聘所用幣多少也宰又掌制國之用命宰夫官具宰夫宰之屬也命之使衆官具幣及所宜齎右具齎幣司儀凡諸侯之交各稱其邦而為之幣以其幣為之禮幣享幣也於大國則豐小國則殺主國禮之如其豐殺謂賄用束紡禮用玉帛乘皮及贈之屬秋官記多貨則傷于德貨天地所化生謂玉也君子於玉比德焉朝聘之禮以為瑞節重禮也多之則是主於貨傷敗其為德幣美則没禮幣人所造成以自覆幣謂束帛也愛之斯欲衣食之君子之情也是以享用幣所以副忠信美之則是主於幣而禮之本意不見也本經記既受行出遂見宰問幾月之資資行用也古者君臣謀密草創未知所之逺近問行用當知多少而已古文資作齎同上及期夕幣及猶至也夕幣先行之日夕陳幣而視之重聘也使者朝服帥衆介夕視其事也古文帥皆作率管人布幕於寢門外管猶館也館人謂掌次舍帷幕者也布幕以承幣寢門外朝也古文管作官今文布作敷官陳幣皮北首西上加其奉于左皮上馬則北面奠幣于其前奉所奉以致命謂束帛及𤣥纁也馬言則者此享主用皮或時用馬馬入則在幕南皮馬皆乘古文奉為卷今文無則使者北面衆介立于其左東上既受行同位也位在幕南卿大夫在幕東西面北上大夫西面辟使者宰入告具于君君朝服出門左南鄉入告入路門而告史讀書展幣展猶校録也史幕東西面讀書賈人坐撫其幣每者曰在必西面者欲君與使者俱見之也宰執書告備具于君授使者使者授書授上介史展幣畢以書還授宰宰既告備以授使者其受授皆北面公揖入揖禮羣臣官載其幣舍于朝待旦行也上介視載者監其安處之畢乃出所受書以行為當復展右授使幣記使者既受行日朝同位謂前夕幣之間同位者使者北面介立于左少退别其處臣也本經記厥明賓朝服釋幣于禰告為君使也賓使者謂之賓尊之也天子諸使將出告羣庿大夫告禰而已凡釋幣設洗盥如初有司筵几于室中祝先入主人從入主人在右再拜祝告又再拜更云主人者庿中之稱也祝告告以主人將行也釋幣制𤣥纁束奠于几下出祝釋之也凡物十曰束𤣥纁之率𤣥居三纁居二朝貢禮云純四只制丈八尺主人立于户東祝立于牖西少頃之間示有俟於神又入取幣降卷幣實于笲埋于西階東又入者祝也埋幣必盛以器若藏之然又釋幣于行告將行也行者之先其古人之名未聞天子諸侯有常祀在冬大夫三祀曰門曰行曰厲喪禮有毀宗躐行出于大門則行神之位在廟門外西方不言埋幣可知也今時民春秋祭祀有行神古之遺禮乎遂受命賓須介來乃受命也言遂者明自是出不復入上介釋幣亦如之如其於禰與行右釋幣于禰及行上介及衆介俟于使者之門外俟待也待於門外東面北上使者載旜帥以受命于朝旜旌旗屬也載之者所以表識其事也周禮曰通帛為旜又曰孤卿建旜至於朝門使者北面東上古文旜皆為膳君朝服南鄉卿大夫西面北上君使卿進使者進之者使者謙不敢必君之終使已使者入衆介随入北面東上君揖使者進之上介立于其左接聞命進之者有命宜相近也接猶續也賈人西面坐啟櫝取圭垂繅不起而授宰賈人在官知物賈者繅所以藉圭也其或拜則奠于其上今文繅作璪宰執圭屈繅自公左授使者屈繅者斂之禮以相變為敬也自公左賛幣之義使者受圭同面垂繅以受命同面者宰就使者北面竝授之既授之而君出命矣凡授受者授由其右受由其左既述命同面授上介述命者循君之言重失誤上介受圭屈繅出授賈人衆介不從賈人將行者在門外北面受享束帛加璧受夫人之聘璋享𤣥纁束帛加琮皆如初享獻也既聘又獻所以厚恩惠也帛今之璧色繒也夫人亦自有聘享者以其與已同體為國小君也其聘用璋取其半圭也君享用璧夫人用琮天地配合之象也圭璋特達瑞也璧琮有加往德也周禮曰瑑圭璋璧琮以覜聘右受命于朝記所以朝天子圭與繅皆九寸剡上寸半厚半寸博三寸繅三采六等朱白蒼圭所以執以為瑞節也剡上象天圜地方也雜采曰繅以韋衣朩版飾以三色再就所以薦玉重慎也九寸上公之圭也古文繅作藻今文作璪問諸侯朱緑繅八寸二采再就降於天子也於天子曰朝於諸侯曰問記之於聘文互相備皆𤣥纁繋長尺絢組采成文曰絢繋無事則以繋玉因以為飾皆用五采組上以𤣥下以絳為地今文絢作約本經記凡四器者唯其所寶以聘可也言國獨以此為寶也四器獨圭璋璧琮上同聘禮大夫受命不受辭以外事不素制不豫設故云爾出竟有可以安社稷利國家者則專之可也莊十九年公羊傳遂行舍於郊於此脱舍衣服乃即道也曲禮曰凡為君使已受命君言不宿於家斂旜此行道耳未有事也斂藏也右遂行記凡為君使者已受命君言不宿於家急君使也言謂有故所問也聘禮曰若有言則以束帛如享禮曲禮出祖釋軷祭酒脯乃飲酒于其側祖始也既受聘享之禮行出國門止陳車騎釋酒脯之奠於軷為行始也詩傳曰軷道祭也謂祭道路之神春秋傳曰軷涉山川然則軷山行之名也道路以險阻為難是以委土為山或伏牲其上使者為軷祭酒脯祈告也卿大夫處者於是餞之飲酒於其側禮畢乘車轢之而遂行舍於近郊矣其牲犬羊可也古文軷作祓本經記問大夫之幣俟于郊為肆又齎皮焉肆猶陳列也齎猶付也使者既受命宰夫載問大夫之禮待於郊陳之為行列至則以付之也使者初行舍于近郊幣云肆馬云齎因其宜亦互文也不於朝付之者辟君禮也必陳列之者不夕也古文肆為肄同上大夫使見日而行逮日而舍曾子問卿行旅從五百人定四年左氏傳若過邦至于竟使次介假道束帛將命於朝曰請帥奠幣至竟而假道諸侯以國為家不敢直徑也将猶奉也帥猶道也請道已道路所當由下大夫取以入告出許遂受幣言遂者明受其幣非為許故也容其辭讓不得命也餼之以其禮上賓大牢積唯芻禾介皆有餼凡賜人以牲生曰餼餼猶稟也給也以其禮者尊卑有常差也常差者上賓上介牲用大牢羣介用少牢米皆百筥牲陳于門内之西北面米設于中庭上賓上介致之以束帛羣介則牽羊馬上賓有禾十車芻二十車禾以秝馬士師没其竟没盡誓于其竟賓南面上介西面衆介北面東上史讀書司馬執筴立於其後此使次介假道止而誓也賓南面專威信也史於衆介之前北面讀書以勅告士衆為其犯禮暴掠也禮君行師從卿行旅從司馬主軍法者執䇿示罰右過他國未入竟壹肄謂於所聘之國竟也肄習也習聘之威儀重失誤為壝壇畫階帷其北無宮壝土象壇也惟其北宜有所鄉依也無宮不壝土畫外垣也朝服興主無執也不立主人主人尊也不執玉不敢䙝也徒習其威儀而已介皆與北面西上入門左之位也古文與作豫習享士執庭實士士介也庭實必執之者皮則有攝張之節習夫人之聘享亦如之習公事不習私事公事致命者也右習儀及竟張旜誓及至也張旜明事在此國也張旜謂使人雜之乃謁闗人謁告也古者竟上為闗以譏異服譏異言闗人問從者幾人欲知聘問且為有司當共委積之具以介對以所與受命者對謙也聘禮上公之使者七介侯伯之使者五介子男之使者三介以其代君交於列國是以貴之周禮曰凡諸侯之卿其禮各下其君二等君使士請事遂以入竟請猶問也問所為來之故也遂以入因道之右及竟入竟斂旜乃展復校録幣重其事斂旜變於始入布幕賓朝服立于幕東西面介皆北面東上賈人北面坐拭圭拭清也側幕而坐乃開櫝遂執展之持之而立告在上介北面視之退復位言退復位則視圭進違位退圭圭璋尊不陳之陳皮北首西上又拭璧展之㑹諸其幣加于左皮上上介視之退㑹合也諸於也古文曰陳幣北首馬則幕南北面奠幣於其前前當前幕上展夫人之聘享亦如之賈人告于上介上介告於賓展夫人聘享上介不視貶於君也賈人既拭璋琮南面告於上介上介於是乃東面以告賓亦所謂放而文之類有司展羣幣以告羣幣私覿及大夫者有司載幣者自展自告及郊又展如初郊逺郊也周制天子畿内千里逺郊百里以此差之逺郊上公五十里侯伯三十里子男十里也近郊各半之及館展幣于賈人之館如初館舍也逺郊之内有候館可以小休止沐浴展幣不于賓館者為主國之人有勞問己者就焉便疾也右三展幣致積禮附見於下諸公之臣相為國客謂相聘也則三積皆三辭拜受受者受之於庭也侯伯之臣不致積秋官司儀賓至于近郊張旜君使下大夫請行反君使卿朝服用束帛勞請行問所之也雖知之謙不必也士請事大夫請行卿勞彌尊賓也其服皆朝服上介出請入告賓禮辭迎于舍門之外再拜出請出門西面請所以來事也入告入北面告賓也每所及至皆有舍其有來者與皆出請入告于此言之者賓彌尊事彌録勞者不答拜凡為人使不當其禮賓揖先入受于舍門内不受于堂此主于侯伯之臣也公之臣受勞于堂勞者奉幣入東面致命東面鄉賓賓北面聴命還少退再拜稽首受幣勞者出北面聴命若君南面然少退象降拜授老幣老賓之臣出迎勞者欲擯之勞者禮辭賓揖先入勞者從之乘皮設設於門内也物四曰乘皮麋鹿皮也賓用束錦儐勞者言儐者賓在公館如家之義亦以來者為賓勞者再拜稽首受稽首尊國賓也賓再拜稽首送幣受送拜皆北面象階上勞者揖皮出乃退賓送再拜揖皮出東面揖執皮者而出夫人使下大夫勞以二竹簠方𤣥被纁裏有葢竹簠方者器名也以竹為之状如簋而方如今寒具筥筥者圜此方耳其實棗蒸栗擇兼執之以進兼猶兩也右手執棗左手執栗賓受棗大夫二手授栗受授不游手慎之也賓之受如初禮如卿勞之儀儐之如初下大夫勞者遂以賓入出以束錦授從者因東面釋辭請導之以入然則賓送不拜右郊勞諸公之臣相為國客及大夫郊勞旅擯三辭拜辱三讓登聴命下拜登受賓使者如初之儀及退拜送登聴命賓登堂也賓當為儐勞用束帛儐用束錦侯伯之臣受勞于庭司儀記辭曰非禮也敢對曰非禮也敢辭辭不受也對答問也二者皆卒曰敢言不敢本經記叔弓聘于晉晉侯使郊勞聘禮賓至近郊君使卿勞之辭曰寡君使弓來繼舊好固曰女無敢為賓徹命於執事敝邑弦矣徹達也敢辱郊使請辭辭郊勞餘昭二年左氏傳見致館章至于朝主人曰不腆先君之祧既拚以俟矣賓至外門下大夫入告出釋此辭主人者公也不言公而言主人主人接賓之辭明至欲受之不敢稽賓也腆猶善也遷主所在曰祧周禮天子七廟文武為祧諸侯五廟則祧始祖也是亦廟也言祧者祧尊而廟親待賓客者上尊者賓曰俟間賓之意不欲奄卒主人也且以道路悠遠欲沐浴齋戒俟間未敢聞命右至朝大夫帥至於館卿致館致至也賓至此館主人以上卿禮致之所以安之也賓迎再拜卿致命賓再拜稽首卿退賓送再拜卿不俟設飱之畢以不用束帛致故也不用束帛致之者明為新至非大禮也右致館諸公之臣相為國客致館如初之儀如郊勞也不儐耳俟伯之臣致館于庭不言致飱者君於聘大夫不致飱也聘禮曰飱不致賓不拜司儀記卿館於大夫大夫館于士士館于工商館者必於廟不館於敵者之廟為大尊也自官師以上有廟有寢工商則寢而已管人為客三日具沐五日具浴館人掌客館者也客謂使者下及士介也本經記自卿大夫士之家曰私館公館與公所為曰公館公館若今縣官宮也公所為君所命使舎已者宮曾子問雜記公館者公宮與公所為也註公為君所作離宮別館也叔弓聘于晉致館辭曰寡君命下臣來繼舊好好合使成臣之禄也得通君命則於已為榮禄敢辱大館敢不敢叔向曰子叔子知禮哉吾聞之曰忠信禮之器也卑讓禮之宗也宗猶主也辭不忘國忠信也謂稱舊好先國後已卑讓也始稱敝邑之弦先國也次稱臣之禄後已也詩曰敬慎威儀以近有德夫子近德矣昭二年左氏傳辭郊勞見前宰夫朝服設飱食不備禮曰飱詩曰不素飱兮春秋傳曰方食魚飱皆謂是飪一牢在西鼎九羞鼎三腥一牢在東鼎七中庭之饌也餁熟也熟在西腥在東象春秋也鼎西九東七凡其鼎實與其陳如陳饔餼羞鼎則陪鼎也以其實言之則曰羞以其陳言之則曰陪堂上之饌八西夾六八六者豆數也凡饌以豆為本堂上八豆八簋六鉶兩簠八壺西夾六豆六簋四鉶兩簠六壺其實與其陳亦如饔餼門外米禾皆二十車禾稾實并刈者也諸侯之禮車米視生牢禾視死牢牢十車大夫之禮皆是死牢而已雖有生牢不取數焉米陳門東禾陳門西薪芻倍禾各四十車凡此之陳亦如饔餼上介飪一牢在西鼎七羞鼎三堂上之饌六門外米禾皆十車薪芻倍禾西鼎七無鮮魚鮮腊衆介皆少牢亦飪在西鼎五羊豕腸胃魚腊新至尚孰堂上之饌四豆四簋兩鉶四壺無簠右設飱記飱不致不以束帛致命草次饌飱具輕賓不拜以不致命沐浴而食之自潔清尊主國君賜也記此重者沐浴可知也本經記凡諸侯之卿大夫士為國客則如其介之禮以待之言其特來聘問待之禮如其為介時也然則聘禮凡所以禮賓是亦禮介秋官掌客凡侯伯子男之臣以其國之爵相為客而相禮爵卿也大夫也士也饔司儀用二條歸餼通厥明訝賓于館此訝下大夫也以君命迎賓謂之訝訝迎也亦皮弁賓皮弁聘至于朝賓入于次服皮弁者朝聘主相尊敬也諸侯視朔皮弁服入于次者俟辨也次在大門外之西以帷為之乃陳幣有司入于主國廟門外以布幕陳幣如展幣焉圭璋賈人執櫝而俟卿為上擯大夫為承擯士為紹擯擯者出請事擯謂主國之君所使出接賓者也紹繼也其位相承繼而出也主君公也則擯者五人侯伯也則擯者四人子男也則擯者三人聘義曰介紹而傳命君子於其所尊不敢質敬之至也既知其所為來之事復請者賔來當與主君為禮為其謙不敢斥尊者啟發以進之於是時賓出次直闑西北面上擯在闑東閾外西面其相去也公之使者七十步侯伯之使者五十步子男之使者三十步此旅擯耳不傳命上介在賓西北東面承擯在上擯東南西面各自次序而下末介末擯旁相去三丈六尺上擯之請事進南面揖賓俱前賓至末介上擯至末擯亦相去三丈六尺止揖而請事還入告于公天子諸侯朝覲乃命介紹傳命耳其儀各鄉本受命反面傳而下及末則鄉受之反面傳而上又受命傳而下亦如之此三丈六尺者門容二轍參个旁加各一步也今文無擯公皮弁迎賓于大門外大夫納賓公不出大門降于待其君也大夫上擯也謂之大夫者上序可知從大夫總無所别也於是賓主人皆裼賓入門左内賓位也衆介隨入北面西上少退擯者亦入門而右北面東上上擯進相君公再拜南面拜迎賓辟不答拜辟位逡遁不敢當其禮公揖入每門每曲揖每門輙揖者以相人偶為敬也凡君與賓入門賓必後君介及擯者隨之並而鴈行既入則或左或右相去如初玉藻曰君入門介拂闑大夫中棖與闑之閒士介拂棖賓入不中門不履閾此賓謂聘卿大夫也門中門之正也不敢與君並由之敬也介與擯者鴈行卑不踰尊者之迹亦敬也賓之介猶主人之擯及廟門公揖入立于中庭公揖先入省内事也既則立于中庭以俟賓不復出如此得君行一臣行二於禮可矣公迎賓大門内卿大夫以下入廟門即位而俟之賓立接西塾接猶近也門側之堂謂之塾立近塾者已與主君交禮將有出命俟之於此介在幣南北面西上上擯亦隨公入門東東上少進於士几筵既設擯者出請命有几筵者以其廟受宜依神也賓至廟門司宮乃于依前設之神尊不豫事也席西上上擯待而出請受賓所以來之命重停賓也至此言命事彌至言彌信也周禮諸侯祭祀席蒲筵繢純右彫几賈人東面坐啟櫝取圭垂繅不起而授上介賈人鄉入陳幣東面俟於此言之就有事也授圭不起賤不與為禮也不言裼襲者賤不裼也繅有組繫也上介不襲執圭屈繅授賓上介北面受圭進西面授賓不襲者以盛禮不在於己也屈繅并持之也曲禮曰執玉其有籍者則裼無籍者則襲賓襲執圭執圭盛禮而又盡飾為其相蔽敬也玉藻曰服之襲也充美也是故尸襲執玊龜襲也擯者入告出辭玊擯者上擯也入告公以賓執圭將致其聘命圭贄之重者辭之亦所以致尊讓也納賓賓入門左公事自闑西介皆入門左北面西上隨賓入也介無事止於此今文無門三揖君與賓也八門將曲揖既曲北面又揖當碑揖至于階三讓讓升公升二等先賓升二等亦欲君行一臣行二賓升西楹西東面與君相鄉擯者退中庭鄉公所立處退者以公宜親受賓命不用擯相也賓致命致其君之命也公左還北鄉當拜擯者進進阼階西釋辭於賓相公拜也公當楣再拜拜貺也貺惠賜也楣謂之梁賓三退負序三退三逡遁也不言辟者以執圭將進授之公側襲受玊于中堂與東楹之間側猶獨也言獨見其尊賓也佗日公有事必有贊為之者凡襲于隠者公序坫之間可知也中堂南北之中也入堂深尊賓事也東楹之間亦以君行一臣行二擯者退負東塾而立反其等位無事賓降介逆出逆出由便賓出聘事畢公側授宰玉使藏之授於序端裼降立裼者免上衣見裼衣凡當盛禮者以充美為敬非盛禮者以見美為敬禮尚相變也玉藻曰裘之裼也見美也又曰麛裘青豻褎絞衣以裼之論語曰素衣麛裘皮弁時或素衣其裘同可知也裘者為温表之為其褻也寒暑之服冬則裘夏則葛凡禮裼者左降立俟享也亦於中庭古文裼皆作賜右聘記卿大夫訝大夫士訝士皆有訝卿使者大夫上介也士衆介也訝主國君所使迎待賓者如今使者䕶客宗人授次次以帷少退于君之次主國之門外諸侯及卿大夫之所使者次位皆有常處並本經記諸公之臣相為國客及將幣旅擯三辭拜逆客辟三揖每門止一相及廟唯君相入三讓客登拜客三辟授幣下出每事如初之儀客辟逡巡不答拜也唯君相入客臣也相不入矣拜主君拜客至也客三辟三退負序也每事享及有言司儀凡侯伯子男之臣以其國之爵相為客而相禮其儀亦如之爵卿也大夫也士也同上辭無常孫而説孫順辭多則史少則不達史謂䇿祝辭苟足以達義之至也至極也今文至為砥記本經諸侯使人使於諸侯使者自稱曰寡君之老繫於君以為尊也此謂諸侯之卿上大夫曲禮上大夫曰下臣擯者曰寡君之老下大夫自名擯者曰寡大夫擯者之辭主謂見於他國君下大夫自名於他國君曰外臣某大夫私事使私人擯則稱名私事使謂以君命私行非聘也若魯成公時晉侯使韓穿來言汶陽之田歸之于齊之類公士擯則曰寡大夫寡君之老謂聘也大聘使上大夫小聘使下大夫玉藻賓入不中門不履閾辟尊者所從也此謂聘客也閾門限公事自闑西聘享也同上大夫見於國君國君拜其辱自外來而拜拜見也自内來而拜拜辱也曲禮君若迎拜則還辟不敢答拜嫌與君抗賓主之禮迎拜謂君迎而先拜之聘禮曰大夫入門再拜君拜其辱上同惟大聘有几筵謂受聘享時也小聘輕雖受于廟不為神位本經記凡執玊無藉者襲藉謂繅也繅所以緼藉玉同上執玊其有藉者則裼無藉者則襲藉藻也裼襲文質相變耳有藻為文裼見美亦文無藻為質襲充美亦質圭璋特而襲璧琮加束帛而裼亦是也曲禮上介執圭如重授賓慎之也曲禮曰凡執主器執輕如不克賓入門皇升堂讓將授志趨皇自莊盛也讓謂舉手平衡也志猶念也念趨謂審行步也孔子之執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循古文皇皆作王授如爭承下如送君還而后退重失隊也而后猶然後也下階發氣怡焉再三舉足又趨發氣舎息也再三舉足自安定乃復趨也至此云舉足則志趨卷豚而行也孔子之升堂鞠躬如也屏氣似不息者出降一等逞顔色怡怡如也沒階趨進翼如也及門正焉容色復故此皆心變見於威儀執圭入門鞠躬焉如恐失之記異説也本經記皇且行入門主敬升堂主慎復記執玉異説同上凡執主器執輕如不克重慎之也主君也克勝也執主器操幣圭璧則尚左手行不舉足車輪曳踵重慎也尚左手尊左也車輪謂行不絶地曲禮執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循圭諸侯命圭聘問鄰國則使大夫執以通信如不勝執主器執輕如不克敬謹之至也上如揖下如授謂執圭平衡手與心齊高不過揖卑不過授也戰色戰而色懼也蹜蹜舉足促狹也如有循記所謂舉前曳踵言行不離地如縁物也鄉黨曰子以君命在寡君寡君拜君命之辱此賛君拜聘享辭也在存也本經記楚子使越椒來聘執幣傲子越椒令尹子文從子傲不敬叔仲惠伯曰是必滅若敖氏之宗傲其先君神弗福也十二年傳曰先君之敝器使下臣致諸執事明奉使皆告廟故言傲其先君也為宣四年楚滅若敖氏張本文九年左氏傳秦伯使西乞術來聘襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉大器圭璋也不欲與秦為好故辭玉對曰不腆敝器不足辭也腆厚也主人三辭賓答曰寡君願徼福于周公魯公以事君徼要也魯公伯禽也言願事君以幷蒙先君之福不腆先君之敝器使下臣致諸執事以為瑞節節信也出聘必告廟故稱先君之禮要結好命所以藉寡君之命結二國之好藉薦也是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之賄贈送也傳文十二年左衞孫文子來聘公登亦登禮登階臣後君一等叔孫穆子相趨進曰諸侯之㑹寡君未甞後衞君敵體竝登今吾子不後寡君寡君未知所過吾子其少安安徐也孫子無辭亦無悛容悛改也穆叔曰孫子必亡為臣而君過而不悛亡之本也襄七年左氏傳晏子聘魯上堂則趨授玉則跪子貢怪之問孔子曰晏子知禮乎孔子曰其有方矣我將問焉俄而晏子至孔子問之晏子對曰夫上堂之禮君行一臣行二今君行疾臣敢不趨乎今君之受幣也卑臣敢不跪乎孔子曰善禮中又有禮賜寡使也何足以識禮晉侯使荀庚來聘且尋盟衞侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之於晉也其位在三下卿孫子之於衞也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫降一等小國之上卿當大國之下卿中當其上大夫下當其下大夫降大國二等上下如是古之制也古制公為大國侯伯為次國子男為小國衞在晉不得為次國春秋時以彊弱為大小故衞雖侯爵猶為小國晉為盟主其將先之計等則二人位敵以盟主故先晉丙午盟晉丁未盟衞禮也成三年左氏傳擯者出請不必賓事之有無賓裼奉束帛加璧享擯者入告出許許受之庭實皮則攝之毛則内内攝之入設也皮虎豹之皮攝之者右手并執前足左手並執後足毛在内不欲文之豫見也内攝之者兩手相鄉也入設亦參分庭一在南言則者或以馬凡君於臣臣於君麋鹿皮可也賓入門左揖讓如初升致命張皮張者釋外足見文也公再拜受幣士受皮者自後右容自申也從東方來由客後西居其左受皮也執皮者既授亦自前西而出賓出當之坐攝之象受於賓公側授宰幣皮如入右首而東如入在在前皮右首者變于生也右享記凡庭實隨入左先皮馬相閒可也隨入不並行也閒猶代也生物有宜君子不以所無為禮畜獸同類可以相代古文閒作干賓之幣唯馬出其餘皆東馬出當從廏也餘物皆東藏之内府本經記及享發氣焉盈容發氣舎氣也孔子之於享禮有容色衆介北面蹌焉容見舒揚同上享禮有容色既聘而享用圭璧有庭實有容色和也儀禮曰發氣滿容鄉黨若君不見君有疾若他故不見使者使大夫受受聘享也大夫上卿也自下聽命自西階升受負右房而立賓降亦降此儀如還圭然而賓大夫易處耳今文無而不禮辟正主也古文禮作醴本經記聘于夫人用璋享用琮如初禮如公立于中庭以下右聘享夫人記君以社稷故在寡小君拜此贊拜夫人聘享辭也言君以社稷故者夫人與君體敵不敢當其惠也其卒亦曰寡君拜命之辱本經記若有言則以束帛如享禮有言有所告請若有所問也記曰有故則束帛加書以將命春秋臧孫辰告糴于齊公子遂如楚乞師晉侯使韓穿來言汶陽之田皆是也無庭實也右有言記若有故則卒聘束帛加書將命百名以上書於䇿不及百名書於方故謂灾患及時事相告請也將猶致也名書文也今謂之字䇿簡也方版也主人使人與客請諸門外受其意既聘享賓出而讀之不於内者人稠處嚴不得審悉主人國君也人内史也書必璽之本經記擯者出請事賓告事畢公事畢賓奉束錦以請覿覿見也卿將公事是欲交其歡敬也不用羔因使而見非特來擯者入告出辭客有大禮未有以待之請禮賓賓禮辭聴命擯者入告告賓許也宰夫徹几改筵宰夫又主酒食者也將禮賓徹神几改神席更布也賓席東上公食大夫禮曰蒲筵常緇布純加萑席尋𤣥帛純此筵上下大夫也周禮曰筵國賓于牖前莞筵紛純加繅席畫純左彤几者則是筵孤也孤彤几卿大夫其漆几與公出迎賓以入揖讓如初公出迎者己之禮更端也公升側受几于序端漆几也今文無升宰夫内拂几三奉兩端以進内拂几不欲塵坋尊者以進自東箱來授君公東南鄉外拂几三卒振𬒮中攝之進西鄉進就賓也擯者告告賓以公授几賓進訝受几于筵前東面俟未設也今文訝為梧公壹拜送公尊也古文壹作一賓以几辟辟位逡遁北面設几不降階上答再拜稽首不降以主人禮未成也凡賓左几宰夫實觶以醴加柶于觶面枋酌以授君也君不自酌尊也宰夫亦洗升實觶以醴自東箱來不面擸不訝授也公側受醴將以飲賓賓不降壹拜進筵前授醴復位公拜送醴賓壹拜者醴質以少為貴宰夫薦籩豆脯醢賓升筵擯者退負東塾事未畢擯者不退中庭以有宰夫也賓祭脯醢以柶祭醴三庭實設庭實乘馬降筵北面以柶兼諸觶尚擸坐啐醴降筵就階上公用束帛致幣也言用奠於下也亦受之于序端建柶北面奠于薦東糟醴不啐擯者進相幣賛以辭賓降辭幣不敢當公禮也公降一等辭辭賓降也栗階升聴命衆階趨君命尚疾不連步降拜拜受公辭不降一等殺也升再拜稽首受幣當東楹北面亦訝受而北面者禮主於己巳臣也退東面俟俟君拜也不北面者謙若不敢當階然公壹拜賓降也公再拜不俟公再拜者不敢當公之盛也公再拜者事畢成禮也賓執左馬以出受尊者禮宜親之也效馬者并左右靮授之餘三馬主人牽者從出也上介受賓幣從者訝受馬從者士介右禮賓記禮不拜至以賓不於是始至今文禮為醴本經記醴尊于東箱瓦大一有豊瓦大瓦尊豊承尊器如豆而卑薦脯五膱祭半膱橫之膱脯如版然者或謂之脡皆取直貌焉祭醴再扱始扱一祭卒再祭卒謂後扱同上諸公之臣相為國客及禮再拜稽首君答拜禮以醴禮客司儀主人之庭實則主人遂以出賓之士訝受之此謂餘三馬也左馬賓執以出矣士士介從者記本經賓覿奉束錦總乘馬二人贊入門右北面奠幣再拜稽首不請不辭鄉時已請也覿用束錦辟享幣也總者總八轡牽之贊者居馬間扣馬也入門而右私事自闑右奠幣再拜以臣禮見也贊者賈人之屬介特覿也擯者辭辭其臣賓出事畢擯者坐取幣出有司二人牽馬以從出門西面于東塾南將還之也贊者有司受馬乃出凡取幣于庭北面擯者請受請以客禮受之賓禮辭聴命賓受其幣贊者受馬牽馬右之入設庭實先設客禮也右之欲人居馬左任右手便也於是牽馬者四人事得申也曲禮曰效馬效羊者右牽之賓奉幣入門左介皆入門左西上以客禮入可從介公揖讓如初升公北面再拜公再拜者以其初以臣禮見新之也賓三退反還負序反還者不敢與授圭同振幣進授當東楹北面不言君受略之也士受馬者自前還牽者後適其右受自由也適牽者之右而受之也此亦並授者不自前左由便也便其已授而去也受馬自前變於受皮牽馬者自前西乃出自由也賓降階東拜送君辭拜送幣于階東以君在堂鄉之拜也君降一等辭君乃辭之而賓猶拜敬也擯者曰寡君從子雖將拜起也此禮固多有辭矣未有著之者是其志而煥乎未敢明説栗階升公西鄉賓階上再拜稽首成拜公少退為敬賓降出公側授宰幣馬出廟中宜清公降立右私覿記私事自闑東覿面也玉藻私覿愉愉焉容貌和敬出如舒鴈威儀自然而有行列舒鴈鵞也本經記私覿愉愉如也私覿以私禮見也愉愉則又和矣鄉黨既覿賓若私獻奉獻將命時有珍異之物或賓奉之所以自序尊敬也猶以君命致之擯者入告出禮辭辭其獻也賓東面坐奠獻再拜稽首送獻不入者奉物禮輕擯者東面坐取獻舉以入告出禮請受東面坐取獻者以宜竝受也其取之由賓南而自後右客也賓固辭公答再拜拜受於賓也固亦衍字賓者立於閾外以相拜賓辟相贊也古文閾為蹙擯者授宰夫於中庭東藏之既乃介覿若兄弟之國則問夫人兄弟謂同姓若婚姻甥舅有親者問猶遺也謂獻也不言獻者變於君也非兄弟獻不及夫人本經記諸公之臣相為國客私面私面私覿也鄭司農云説私面以春秋傳曰楚公子棄疾見鄭伯以其良馬私面私獻既覿則或有私獻者再拜稽首君答拜擯者出請上介奉束錦士介四人皆奉玊錦束請覿玊錦錦之文纎縟者也禮有以少文為貴者後言束辭之便也擯者入告出許上介奉幣儷皮二人贊儷猶兩也上介用皮變於賓也皮麋鹿皮皆入門右東上奠幣皆再拜稽首皆者皆衆介也贊者奠皮出擯者辭亦辭其臣介逆出亦事畢也擯者執上幣士執衆幣有司二人舉皮從其幣出請受此請受請于上介也擯者先即西面位請之釋辭之時衆執幣者隨立門中而俟委皮南面執幣者西面北丄擯者請受請于上介也上言其次此言其位互約文也介禮辭聴命皆進訝受其幣此言皆訝受者嫌擯者一一授之上介奉幣皮先入門左奠皮先皮者介隨執皮者而入也入門左介至揖位而立執皮者奠皮以有不敢授之義古文重入公再拜拜中庭也不受于堂介賤也介振幣自皮西進北面授幣退復位再拜稽首送幣進者北行參分庭一而東行當君乃復北行也介出宰自公左受幣不側受介禮輕有司二人坐舉皮以東擯者又納士介納者出道入也士介入門右奠幣再拜稽首終不敢以客禮見擯者辭介逆出擯者執上幣以出禮請受賓固辭禮請受者一請受而聴之也賓為之辭士介賤不敢以言通於主君固衍字當如面大夫也公答再拜擯者出立于門中以相拜擯者以賓辭入告還立門中閾外西面公乃遙答拜也相者贊告之士介皆辟辟於其東面位逡遁也士三人東上坐取幣立俟擯者執上幣來也擯者進就公所也宰夫受幣于中庭以東使宰夫受于士士介幣輕也受之于公左賓幣公則授宰上介幣宰受于公左士介幣宰夫受于士敬之差執幣者序從之序從者以宰夫當一一受之右介私覿記君於士不答拜也非其臣則答拜之不臣人之臣曲禮擯者出請賓告事畢賓既告事畢衆介逆道賓而出也擯者入告公出送賓公出衆擯亦逆道紹擯及賓竝行間亦六步及大門内公問君卿以公禮將事無由問也賓至始入門之位北面將揖而出衆介亦在其右少退西上於此可以問君居處何如序殷勤也時承擯紹擯亦於門東北面東上上擯往來傳君命南面蘧伯玉使人於孔子孔子問曰夫子何為此公問君之類也賓對公再拜拜其無恙公拜賓亦辟公問大夫賓對公勞賓賓再拜稽首公答拜勞以道路之勤公勞介介皆再拜稽首公答拜賓出公再拜送賓不顧公既拜客趨辟君命上擯送賓出反告賓不顧於此君可以反路寢矣論語説孔子之行曰君召使擯色勃如也足躩如也賓退必復命曰賓不顧矣賓請有事於大夫請問問卿也不言問聘聘亦問也嫌近君也上擯送賓出賓東面而請之擯者反命因告之公禮辭許禮辭一辭賓即館小休息也即就也右公送賓問勞諸公之臣相為國客出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟中門之外即大門之内也問君曰君不恙乎對曰使臣之來寡君命臣于庭大夫曰二三子不恙乎對曰寡君命使臣於庭二三子皆在勞客曰遒路悠悠客甚勞勞介則曰二三子甚勞問君客再拜對者為敬慎也司儀記大夫士見於國君君若勞之則還辟再拜稽首謂見君既拜矣而後見勞也聘禮曰君勞使者及介君皆答拜曲禮賓即館訝將公命使已迎待之命又見之以其摯又復也復以私禮見者訝將舍於賓館之外宜相親也大夫訝者執鴈士訝者執雉經本記卿大夫勞賓賓不見以已公事未行介以賓辭辭之上大夫奠鴈再拜上介受不言卿卿與大夫同執鴈下見于國君周禮凡諸侯之卿見朝君皆執羔勞上介亦如之右卿大夫勞記幣之所及皆勞不釋服以與賓接於君所賓又請有事于己不可以不速也所不及者下大夫未嘗使者也不勞者以先是賓請有事於己同類既聞彼所禮所及則已往有嫌也所以知及不及者賓請有事固曰某子某子本經記君使卿韋弁歸饔餼五牢變皮弁服韋弁敬也韋弁韎韋之弁兵服也而服之者皮韋同類取相近耳其服葢韎布以為衣而素裳牲殺曰饔生曰餼今文歸或為饋上介請事賓朝服禮辭朝服示不受也受之當以尊服有可入陳入賓所館之廟陳其積饔謂飪與腥飪一牢鼎九設于西階前陪鼎當内亷東面北上上當碑南陳牛羊豕魚腊腸胃同鼎膚鮮魚鮮腊設扃鼏膷臐膮葢陪牛羊豕陪鼎三牲臛膷臐膮陪之庶羞加也當内亷辟堂塗也腸胃次腊以其出牛羊也膚豕肉也唯燖者有膚此饌先陳其位後言其次重大禮詳其事也宫必有碑所以識日景引隂陽也凡碑引物者宗廟則麗牲焉以取毛血其材宮庿以石窆用木腥二牢鼎二七無鮮魚鮮腊設于阼階前西面南陳如飪鼎二列有腥者所以優賓也堂上八豆設于户西西陳皆二以竝東上韭菹其南醓醢屈户室户也東上變于親食賓也醓醢汁也屈猶錯也今文並皆為併八簋繼之黍其南稷錯黍在北六鉶繼之牛以西羊豕豕南牛以東羊豕鉶羮器也兩簋繼之粱在北簠不次簋者粱稻加也几饌屈錯要相變八壺設于西序北上二以竝南陳壺酒尊也酒葢稻酒粱酒不錯者酒不以雜錯為味西夾六豆設于西墉下北上韭菹其東醓醢屈六簋繼之黍其東稷錯四鉶繼之牛以南羊羊東豕豕以北牛兩簠繼之粱在西皆二以竝南陳六壺西上二以竝東陳東陳在北墉下統於豆饌于東方亦如之東方東夾室西北上亦韭菹其東醓醢也壺東上西陳亦在北墉下統於豆醯醢百罋夾碑十以為列醯在東夾碑在鼎之中央也醯在東醯穀陽也醢肉陰也餼二牢陳于門西北面東上牛以西羊豕豕西牛羊豕餼生也牛羊右手牽之豕束之寢右亦居其左米百筥筥半斛設于中庭十以為列北上黍粱稻皆二行稷四行庭實固當庭中言當中庭者南北之中也東西為列列當醯醢南亦相變也此言中庭則設碑近如堂深也門外米三十車車秉有五籔設于門東為三列東陳大夫之禮米禾皆視死牢秉籔數名也秉有五籔二十四斛也籔讀若不數之數今文數或為逾禾三十車車三秅設于門西西陳秅數名也三秅千二百秉薪芻倍禾倍禾者以其用多也薪從米芻從禾四者之車皆陳北輈凡此所以厚重禮也聘義曰古之用財不能均如此然而用財如此其厚者言盡之於禮也盡之於禮則内君臣不相陵而外不相侵故天子制之而諸侯務焉爾賓皮弁迎大夫于外門外再拜大夫不答拜大夫使者卿也揖入及廟門賓揖入賓與使者揖而入使者止執幣賓俟之于門内謙也古者天子之適諸侯必舍于大祖庿諸侯行舍于諸公庿大夫行舎于大夫庿大夫奉束帛執其所以將命入三揖皆行皆猶竝也使者尊不後主人至于階讓大夫先升一等讓不言三不成三也凡升者主人讓于客三敵者則客三辭主人乃許升亦道賓之義也使者尊主人三讓則許升矣今使者三讓則是主人四讓也公雖尊亦三讓乃許升不可以不下主人也古文亦三讓賓從升堂北面聴命北面于階上也大夫東面致命賓降階西再拜稽首拜餼亦如之大夫以束帛同致饔餼也賓殊拜之敬也重君之禮也大夫辭升成拜尊賓受幣堂中西北面趨主君命也堂中西中央之西大夫降出賓降授老幣出迎大夫老家臣也賓出迎欲擯之大夫禮辭許入揖讓如初賓升一等大夫從升堂賓先升敵也皆北面庭實設馬乘乘四馬也賓降堂受老束錦大夫止止不降使之餘尊賓奉幣西面大夫東面賓致幣不言致命非君命也大夫對北面當擯再拜稽首稽首尊君客也致對有辭也受幣于楹間南面退東面侯賓北面授尊君之使賓再拜稽首送幣大夫降執左馬以出出廟門從者亦訝受之賓送于外門外再拜明日賓拜于朝拜饔與餼皆再拜稽首拜謝主君之恩惠于大門外周禮曰凡賓客之治令訝聴之此拜亦皮弁服上介饔餼三牢飪一牢在西鼎七羞鼎三飪鼎七無鮮魚鮮腊也賓介皆異館腥一牢在東鼎七堂上之饌六六者賓西夾之數西夾亦如之筥及罋如上賓凡所不貶者尊介也言如上賓者明此賓客介也餼一牢門外米禾視死牢牢十車薪芻倍禾凡其實與陳如上賓凡凡飪以下下大夫韋弁用束帛致之上介韋弁以受如賓禮介不皮弁者以其受大禮似賓不敢純如賓也儐之兩馬束錦士介四人皆餼大牢米百筥設于門外牢米不入門略之也米設當門亦十為列北上牢在其南西上宰夫朝服牽牛以致之執紖牽之東面致命朝服無束帛亦略之上介西面拜迎士介朝服北面再拜稽首受受於牢東拜自牢後適宰夫右受由前東面授從者無儐既受拜送之矣明日衆介亦各如其受之服從賓拜於朝右歸饔餼記聘日致饔急歸大禮本經記致饔餼如勞之禮司儀十斗曰斛十六斗曰籔十籔曰秉秉十六斛今江淮之間量名有為籔者今文籔為逾二百四十斗謂一車之米秉有五籔四秉曰筥此秉謂刈禾盈手之秉也筥穧名也若今來易之間刈稻聚把有名為筥者詩云彼有遺秉又云此有不斂穧十筥曰稯十稯曰秅四百秉為一秅一車之禾三秅為千二百秉三百筥三十稯也古文稯作緵本經記賜饔唯羮飪筮一尸若昭若穆羮飪謂羮一牢也肉謂之羮唯是祭其先大禮之盛者也筮尸若昭若穆容父在父在則祭祖父卒則祭禰腥餼不祭則士介不祭也士之初行不釋幣于禰不祭可也古文羮為羔飪作腍僕為祝祝曰孝孫某孝子某薦嘉禮于皇祖某甫皇考某子僕為祝者大夫之臣攝官也如饋食之禮如少牢饋食之禮不言少牢今以大牢也今文無之假器於大夫不敢以君之器為祭器朌肉及廋車朌猶賦也廋廋人也車巾車也二人掌視車馬之官也賦及之明辯也古文朌作紛同上士無饔無饔者無儐謂歸餼也上同凡賓拜于朝訝聴之拜拜賜也唯稍不拜同上歸大禮之日既受饔餼請觀聘於是國欲見其宗廟之好百官之富若尤尊大之焉訝帥之自下門入帥猶道也從下門外入游觀非正也同上晉士鞅來聘叔孫為政叔孫昭子以三命為國政季孫欲惡諸晉憎叔孫在已上位欲使得罪於晉使有司以齊鮑國歸費之禮為士鞅鮑國歸費在十四年牢禮各如其命數魯人失禮故為鮑國七牢士鞅怒曰鮑國之位下而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢言魯不能以禮事大國且為哀七年吳徴百牢起昭二十一年左氏傳賓朝服問卿不皮弁别於主君卿每國三人卿受于祖廟重賓禮也祖王父也下大夫擯無士擯者既接於君所急見之擯者出請事大夫朝服迎于外門外再拜賓不答拜揖大夫先入每門每曲揖及廟門大夫揖入入者省内事也既而俟于宁也擯者請命亦從入而出請不几筵辟君也庭實設四皮麋鹿皮也實奉束帛入三揖皆行至於階讓皆猶並也古文曰三讓賓升一等大夫從升堂北面聴命賓先升使者尊賓東面致命致其君命大夫降階西再拜稽首賓辭升成拜受幣堂中西北面於堂中央之西受幣趨聘君之命賓降出大夫降授老幣無儐不儐賓辟君也右問卿記聘日致饔明日問大夫不以殘日問人崇敬也古文曰問夫人也大夫不敢辭君初為之辭矣此宜在明日問大夫下本經記君貺寡君延及二三老拜此贊拜問大夫之辭貺賜也大夫曰老同上擯者出請事賓面如覿幣面亦見也其謂之面威儀質也賓奉幣庭實從庭實四馬入門右大夫辭大夫於賓入自階下辭迎之賓遂左見私事也雖敵賓猶謙入門右為若降等然曲禮曰客若降等則就主人之階主人因辭于客然後客復就西階庭實設揖讓如初大夫至庭中旋並行大夫升一等賓從之大夫先升道賓大夫西面賓稱面稱舉也舉相見之辭以相接大夫對北面當楣再拜受幣于楹間南面退西面立受幣楹間敵也賔亦振幣進北面授擯當楣再拜送幣降出大夫降授老幣右賓私面於卿擯出者請事上介特面幣如覿介奉幣特面者異于主君士介不從而入也君尊衆介始覿不自别也上賓則衆介皆從之皮二人贊亦儷皮也入門右奠幣再拜降等也大夫辭於辭上介則出擯者反幣出還于上介也庭實設介奉幣入大夫揖讓如初大夫亦先升一等今文曰入設介升大夫再拜受亦於楹間南面而受介降拜大夫降辭介升再拜送幣介既送幣降出也大夫亦授老幣擯者出請衆介面如覿幣入門右奠幣皆再拜大夫辭介逆出擯者執上幣出禮請受賓辭賓亦為士介辭大夫答再拜擯者執上幣立于門中以相拜士介皆辟老受擯者幣于中庭士三人坐取羣幣以從之擯者出請事賓出大夫送于外門外再拜賓不顧不顧言去擯者退大夫拜辱拜送也右介私面於卿下大夫嘗使至者幣及之嘗使至己國則以幣問之也君子不忘舊上介朝服三介問下大夫下大夫如卿受幣之禮上介三介下大夫使之禮也其面如賓面于卿之禮右賓問嘗使者大夫若不見有故也君使大夫各以其爵為之受如主人受幣禮不拜各以其爵主人卿也則使卿大夫也則使大夫不拜代受之耳不當主人禮也右主國大夫有故記既將公事賓請歸謂己問大夫事畢請歸不敢自專謙也主國留之饗食燕獻無日數盡殷勤也本經記賓既將公事復見訝以其摯既已也公事聘享問大夫復報也使者及上介執鴈羣介執雉各以見其訝同上夕夫人使下大夫韋弁歸禮夕問卿之夕也使下大夫下君也君使之云夫人者以致辭當稱寡小君堂上籩豆六設于户東西上二以竝東陳籩豆六者下君禮也臣設于户東又辟饌位也其設脯其南醢屈六籩六豆壺設于東序北上二以竝南陳醙黍清皆兩壺醙白酒也凡酒稻為上黍次之粱次之皆有清白以黍間清白者互相備明三酒六壺也先言醙白酒尊先設之大夫以束帛致之致夫人命也此禮無牢下朝君也賓如受饔之禮儐之乘馬束錦上介四豆四籩四壺受之如賓禮四壺無稻酒也不致牢下於君也儐之兩馬束錦明日賓拜禮于朝於是乃言賓拜明介從拜也今文禮為醴右夫人歸禮記聘日致饔明日問大夫夕夫人歸禮與君異日下之也今文歸作饋本經記大夫餼賓大牢米八筐其陳於門外黍梁各二筐稷四筐二以竝南陳無稻牲陳於後東上不饌於堂庭辟君也賓迎再拜老牽牛以致之賓再拜稽首受老退賓再拜送老室老大夫之貴臣上介亦如之衆介皆少牢米六筐皆士牽羊以致之米六筐者又無粱也士亦大夫之貴臣右大夫餼賓介記凡餼大夫黍粱稷筐五斛謂大夫餼賓上介也器寡而大略本經記公於賓壹食再饗饗謂享大牢以飲賓也公食大夫禮曰設洗如饗則饗與食互相先後也古文壹皆為一今文饗皆為鄉燕與羞俶獻無常數羞謂禽羞鴈鶩之屬成熟煎和也俶始也始獻四時新物聘義所謂時賜無常數由恩意也古文俶作淑賓介皆明日拜于朝上介壹食壹饗饗食賓介為介從饗獻矣復特饗之客之也若不親食使大夫各以其爵朝服致之以賄幣如致饔無儐君不親食謂有疾及他故也必致之不廢其禮也致之必使同班敵者易以相親敬也致禮於卿使卿致禮於大夫使大夫非必命數也無儐以已本宜往古文侑皆作宥致饗以酬幣亦如之酬幣饗禮酬賓勸酒之幣也所用未聞也禮幣束帛乘馬亦不是過也禮器曰琥璜爵葢天子酬諸侯右食饔燕羞獻記其介為介饗賓有介者賓尊行敵禮也本經記凡致禮皆用其饗之加籩豆凡致禮謂君不親饗食及上介以酬幣致其禮也其其賓與上介也加籩豆謂其實也亦實於罋筐饗禮今亡各以其爵朝服此句宜在凡致禮下同上饗食如將幣之儀饗食亦謂君不親而使大夫以幣致之司儀大夫來使無罪饗之樂與嘉賓為禮過則餼之餼之腥致其牢禮也其致之辭不云君之有故耳聘義曰使者聘而誤主君不親饗食所以愧厲之也不言罪者罪將執之本經記有大客後至則先客不饗食致之卑不與尊者齊禮無饔者無饗禮士介無饗禮燕則上介為賓賓為苟敬饗食君親為主尊賓也燕私樂之禮崇恩殺敬也賓不欲主君復舉禮事禮已於是辭為賓君聴之從諸公之席命為苟敬苟敬者主人所以小敬也更降迎其介以為賓介大夫也雖為賓猶卑於君君則不與亢禮也主人所以致敬者自敵以上宰夫獻為主人代公獻既致饔旬而稍宰夫始歸乘禽日如其饔餼之數稍禀食也乘謂乘行之禽也謂鴈鶩之屬其歸之以雙為數其賓與上介也古文既為餼士中日則二雙中猶間也不一日一雙大寡不敬也凡獻執一雙委其餘于面執一雙以将命也面前也其受之也上介受以入告之士舉其餘從之賓不辭拜受于庭上介執之以相拜于門中乃入授人上介受亦如之士介拜受于門外禽羞俶獻比比放也其致之禮如乘禽也禽羞謂成孰有齊和者俶獻四時珍美新物也俶始也言其始可獻也聘義謂之時賜並同上大夫於賓壹饗壹食上介若食若饗若不親饗則公作大夫致之以酬幣致食以侑幣作使也大夫有故君必使其同爵者為之致之列國之賓來榮辱之事君臣同之右大夫饗食賓介君使卿皮弁還玊于館玉圭也君子於玉比徳焉以之聘重禮也還之者德不可取於人相切厲之義也皮弁者始以此服受之不敢不忠也賓皮弁襲迎于外門外不拜帥大夫以入迎之不拜示將去不純為主也帥道也今文曰迎于門外古文帥為率大夫升自西階鉤楹鉤楹由楹内将南面致命致命不東面以賓在下也必言鉤楹者賓在下嫌楹外也賓自碑内聴命升自西階自左南面受圭退負右房而立聴命于下敬也自左南面右大夫且並受也必並受者若鄉君前耳退為大夫降逡遁今文或曰由自西階無南面大夫降中庭賓降自碑内東面授上介于阼階東大夫降出言中庭者為賓降節也授于阼階東者欲親見賈人藏之也賓還阼階下西面立上介出請賓迎大夫還璋如初入出請請事於外以入告也賓雖將去出入猶東唯升堂由西階凡介之位未有改也賓裼迎大夫賄用束紡賄予人財之言也紡紡絲為之今之縳也所以遺聘君可以為衣服相厚之至禮玊束帛乘皮禮禮聘君也所以報享也亦言玉璧可知也今文禮皆作醴皆如還玉禮大夫出賓送不拜右還玉賄禮記賄在聘于賄賄財也于讀曰為言主國禮賓當視賓之聘禮而為之財也賓客者主人所欲豐也若苟豐之是又傷賄也周禮曰凡諸侯之交各稱其邦而為之幣以其幣為之禮古文賄皆作悔本經記無行則重賄反幣無行謂獨來復無所之也必重其賄與反幣者使者歸以得禮多為榮所以盈聘君之意也反幣謂禮玉束帛乘皮所以報聘君之享禮也昔秦康公使西乞術聘于魯辭孫而説襄仲曰不有君子其能國乎厚賄之此謂重賄反幣者也今文曰賄反幣同上還圭如將幣之儀還以本圭故云如也司儀公館賓為賓將去親存送之厚殷勤且謝聘君之意也公朝服賓辟不敢受主國君見已于此館也此亦不見言辟者君在庿門敬也凡君有事於諸臣之家東造庿門乃下上介聴命聴命於廟門中西面如相拜然也擯者每贊君辭則曰敢不承命告于寡君之老聘享夫人之聘事問大夫送賓公皆再拜拜此四事公東面拜擯者北面公退賓從請命于朝賓從者實為拜主君之館己也言請命者以己不見不敢斥尊者之意公辭賓退辭其拜也退還館裴駕為旦將發也周禮曰賓從拜辱于朝明日客拜禮賜遂行右主君就賓館記客將歸使大夫以其束帛反命于館為書報也明日君館之既報館之書問尚疾也又拜送拜送賓也其辭葢云于將有行寡君敢拜送宜承上君館之下本經記君館客客辟介受命遂送客從拜辱于朝君館客者客將去就省之盡殷勤也遂送君拜以送客明日客拜禮賜遂行如入之積禮賜謂乘禽君之加惠也如入之積則三積從來至去司儀賓三拜乘禽于朝訝聴之發去乃拜乘禽明已受賜大小無不識遂行舎于郊始發且宿近郊自展軨右拜賜遂行記賓於館堂楹間釋四皮束帛賓不致主人不拜賓將遂去是館留禮以禮主人所以謝之也不致不拜不以將别崇新敬也本經記公使卿贈如覿幣贈送也所以好送之也言如覿幣見為反報也今文公為君受于舎門外如受勞禮無儐不入無儐明去而宜有己也如受勞禮以贈勞同節使下大夫贈上介亦如之使士贈衆介如其覿幣大夫親贈如其面幣無儐贈上介亦如之使人贈衆介如其面幣士送至于竟右贈送凡賓客送逆同禮謂郊勞郊送之屬司儀齊國莊子來聘自郊勞至于贈賄禮成而加之以敏迎來曰郊勞送去曰贈賄敏審當于事僖三十三年左氏傳使者歸及郊請反命郊近郊也告郊人使請反命于君也必請之者以已久在外嫌有罪惡不可以入春秋時鄭伯惡其大夫高克使之將兵逐而不納此葢請而不得入朝服載旜行時税舎于此郊今還至此正其故行服以俟君命敬也古文旜作膳禳乃入禳祭名也為行道累歴不祥禳之以除災凶乃入陳幣于朝西上上賓之公幣私幣皆陳上介公幣陳他介皆否皆否者公幣私幣皆不陳此幣使者及介所得於彼國君卿大夫之贈賜也其或陳或不陳詳尊而略卑也其陳之及卿大夫處者待之如夕幣其禮於君者不陳上賓使者公幣君之賜也私幣卿大夫之幣也他介士介也言他容衆從者束帛各加其庭實皮左不加于其皮上榮其多也公南鄉亦宰告于君君乃朝服出門左南鄉卿進使者使者執圭垂繅北面上介執璋屈繅立于其左此主于反命士介亦随入竝立東上反命曰以君命聘于某君某君受幣于某宮某君再拜以享某君某君再拜君亦揖使者進之乃進反命也某君某國名也某宮若言桓宮僖宮也某君再拜受也必言此者明彼君敬君已不辱命宰自公左受玉亦於使者之東同面竝受也不右使者由便也受上介璋致命亦如之變反言致者若云非君命也致命曰以君命聘於某君夫人某君再拜以享於某君夫人某君再拜不言受幣于某宮可知略之執賄幣以告曰某君使某子賄授宰某子若言高子國子凡使者所當以告君者上介取以授之賄幣在外也禮玉亦如之亦執束帛加璧也告曰某君使某子禮宰受之士随自後左士介受乘皮如初上介出取玊束帛士介後取皮也執禮幣以盡言賜禮禮幣主國君初禮賓之幣也以盡言賜禮謂自此至于贈公曰然而不善乎善其能使於四方而猶女也授上介幣再拜稽首公答再拜授上介幣當拜公言也不授宰者當復陳之私幣不告亦略卑也君勞之再拜稽首君答再拜勞之以道路勤苦若有獻則曰某君之賜也言此物某君之所賜予為惠者也其所獻雖珍異不言某為彼君服御物謙也其大夫出反必獻忠孝也君其以賜乎不必其當君也獻不拜者為君之答已也上介徒以公賜告如上賓之禮徒謂空手不執其幣君勞之再拜稽首君答拜勞士介亦如之士介四人旅答壹拜又賤也君使宰賜使者幣使者再拜稽首以所陳幣賜之也禮臣子人賜之而必獻之君父不敢自私服也君父因以予之則拜受之如更受賜也既拜宰以上幣授之賜介介皆再拜稽首士介之幣皆載以造朝不陳之耳與上介同受賜命俱拜既拜宰亦以上幣授上介乃退君揖入皆出去介皆送至于使者之門將行俟于門反又送于門與尊長出入之禮也乃退揖揖别也使者拜其辱随謝之也再拜上介三拜士介右歸反命釋幣于門門大門也主于闑布席于闑西閾外東面設洗于門外東方其餘如初于禰時出于行入于門不兩告告所先見也乃主于禰筵几于室薦脯醢告反也薦進也觴酒陳主人酌進奠一獻也言陳者將復有次也先薦後酌祭禮也行釋幣反釋奠略出謹入也席于阼為酢主人也酢主人者祝取爵酌不酢於室異於祭薦脯醢成酢禮也三獻室老亞獻士三獻也每獻奠輙取爵酌主人自酢也一人舉爵三獻禮成更起酒也主人奠之未舉也獻從者從者家臣從行者也主人獻之勞之也皆升飲酒于西階上不使人獻之辟國君也行酬乃出主人舉奠酬從者下辯室老亦與焉也上介至亦如之右禮門及禰聘遭喪入竟則遂也遭喪主國君薨也入境則遂國君以國為體士既請事已入境矣闗人未告則反不郊勞子未君也不筵几致命不於庿就尸柩於殯宮又不神之不禮賓喪降事也主人畢歸禮賓所飲食不可廢也禮謂饔餼饗食賓唯饗餼之受受正不受加也不賄不禮玉不贈喪殺禮為之不備遭夫人世子之喪君不受使大夫受于廟其他如遭君喪夫人世子死君為喪主使大夫受聘禮不以凶接吉也其他謂禮所降遭喪將命于大夫主人長衣練冠以受遭喪謂主國君薨夫人世子死也此三者皆大夫攝主人長衣素純布衣也去衰易冠不以純凶接純吉也吉時在裏為中衣中衣長衣繼皆掩尺表之曰深衣純袂寸半耳君喪不言使大夫受子未君無使臣義也右遭主國喪載季文子求遭喪之禮事記遭主國之喪不受饗食受牲禮牲亦當為腥聲之誤也有喪不忍煎亨正禮飱饔餼當孰者腥致之也掌客聘君若薨于後入竟則遂既接于主國君也赴者未至則哭于巷衰于館未至謂赴告主國君者也哭于巷者哭于巷門未可為位也衰于館未可以凶服出見人其聘享之事自若吉也今文赴作訃受禮受饗餼也不受饗食亦不受加赴者至則衰而出禮為鄰國闕於是可以凶服将事也唯稍受之稍禀食也歸執圭復命于殯升自西階不升堂復命于殯者臣子之于君父存亡同子即位不哭將有告請之事宜清净也不言世子者君薨也諸臣待之亦皆如朝夕哭位辯復命如聘自陳幣至于上介以公賜告無勞子臣皆哭使者既復命子與羣臣皆哭與介入北鄉哭北鄉哭新至别于朝夕出袒括髪悲哀變於外臣也入門右即位踊從臣位自哭至踊如奔喪禮右聘君薨記諸臣在他國為位而哭不敢拜賓謂大夫士使於列國奔喪公孫歸父欲去三桓云云遂奔齊宣一十八年左氏傳若有私喪則哭于館衰而居不饗食私喪謂其父母哭于館衰而居不敢以私喪自聞于主國凶服于君之吉使春秋傳曰大夫以君命出聞喪徐行而不反歸使衆介先衰而從之已有齊斬之服不忍顯然趨於徃來其在路使介居前歸又請反命已猶徐行隨之君納之乃朝服既反命出公門釋服哭而歸其他亦如奔䘮之禮吉時道路深衣右私喪大夫以君命出聞喪徐行而不反聞喪者聞父母之喪不忍疾行又為君當使人追代之以喪喻疾者喪尚不當反况于疾乎宣八年公羊傳賓客有喪唯芻稍之受不受饗食饗食加也喪謂父母死也客則又有君焉芻給牛馬稍人廩也其正禮飱饔餼主人致之則受掌客賓入竟而死遂也主人為之具而殯具謂始死至殯所當用介攝其命為致聘享之禮也初時上介接聞命君弔介為主人雖有臣子親姻猶不為主人以介與賔並命於君尊也主人歸禮幣必以用當中奠贈諸喪具之用不必如賓禮介受賓禮無辭也介受主國賓已之禮無所辭也以其當陳之以反命也有賓喪嫌其辭之不饗食歸介復命柩止于門外門外大門外也必以柩造朝達其忠心介卒復命出奉柩送之君弔卒殯卒殯成節乃去若大夫介卒亦如之不言上介者小聘上介士也士介死為之棺斂之不具他衣物也自以時服也君不弔焉主國君使人弔不親往若賓死未將命則既斂于棺造于朝介將命未將命謂俟閒之後也以柩造朝以已至朝志在達君命若介死歸復命唯上介造于朝若介死雖士介賓既復命往卒殯乃歸往謂送柩右賓介卒記其為賓則公館復私館不復其在野則升其乘車之左轂而復私館卿大夫之家也不於之復為主人之惡記喪大凡賓客死致禮以喪用死則主人為之具而殯矣喪用者饋奠之物掌客芋尹葢曰事死如事生禮也於是乎有朝聘而終以尸將事之禮朝聘道死以尸行事又有朝聘而遭喪之禮遭所聘之喪傳哀十五年左氏小聘曰問不享有獻不及夫人主人不筵几不禮面不升不郊勞記貶於聘所以為小也獻私獻也面猶覿也其禮如為介三介如為介如為大聘上介右小聘聘義賓禮四聘禮上公七介侯伯五介子男三介所以明貴賤也此皆使卿出聘之介數也大行人職曰凡諸侯之卿其禮各下其君二等介紹而傳命君子於其所尊弗敢質敬之至也質謂正自相當三讓而后傳命三讓而后入廟門三揖而后至階三讓而后升所以致尊讓也此揖讓主謂賓也三讓而后傳命賓至庿門主人請事時也賓見主人陳擯以大客禮當已則三讓之不得命乃傳其君之聘命也三讓而後入庿門讓主人廟受也小行人職曰凡四方之使者大客則擯小客則受其幣聴其辭君使士迎于竟大夫郊勞君親拜迎于大門之内而廟受北面拜貺拜君命之辱所以致敬也貺賜也賓致命公當楣再拜拜聘君之恩惠辱命來聘者也敬讓也者君子之所以相接也故諸侯相接以敬讓則不相侵陵君子之相接賓讓而主人敬也卿為上擯大夫為承擯士為紹擯君親禮賓賓私面私覿致饔餼還圭璋賄贈饗食燕所以明賓客君臣之義也設大禮則賓客之也或不親而使臣則為君臣也故天子制諸侯比年小聘三年大聘相厲以禮使者聘而誤主君弗親饗食也所以愧厲之也諸侯相厲以禮則外不相侵内不相陵此天子之所以養諸侯兵不用而諸侯自為正之具也比年小聘所謂嵗相問也三年大聘所謂殷相聘也以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也諸侯相厲以輕財重禮則民作讓矣圭瑞也尊圭璋之類也用之還之皆為重禮禮必親之不可以己之有遙復之也財謂璧琮享幣也受之為輕財者財可遙復重賄反幣是也主國待客出入三積餼客於舎五牢之具陳于内米三十車禾三十車芻薪倍禾皆陳于外乘禽日五雙羣介皆有餼牢壹食再饗燕與時賜無數所以厚重禮也厚重禮厚此聘禮也古之用財者不能均如此然而用財如此其厚者言盡之於禮也盡之於禮則内君臣不相陵而外不相侵故天子制之而諸侯務焉爾不能均如此言無則從其實也言盡之於禮欲令富者不能過也聘射之禮至大禮也質明而始行事日幾中而后禮成非彊有力者弗能行也故彊有力者將以行禮也禮成禮畢也或曰行成酒清人渴而不敢飲也肉乾人飢而不敢食也日莫人倦齊莊正齊而不敢解惰以成禮節以正君臣以親父子以和長幼此衆人之所難而君子行之故謂之有行有行之謂有義有義之謂勇敢故所貴於勇敢者貴其能以立義也所貴於立義者貴其有行也所貴于有行者貴其行禮也故所貴于勇敢者貴其敢行禮義也故勇敢彊有力者天下無事則用之於禮義天下有事則用之於戰勝用之于戰勝則無敵用之于禮義則順治外無敵内順治此之謂盛德故聖王之貴勇敢彊有力如此也勇敢彊有力而不用之於禮義戰勝而用之于争鬭則謂之亂人刑罰行于國所誅者亂人也如此則民順治而國安也勝克敵也或為陳並聘義聘問之禮所以使諸侯相尊敬也小聘曰問聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣經解禮書綱目卷十四
