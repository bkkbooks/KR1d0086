body:
  text: 禮書綱目卷七十婺源江永撰名器上通禮二十三補小宗伯掌五禮之禁令與其用等用等牲器尊卑之差鄭司農云五禮吉凶賓軍嘉辨吉凶之五服車旗宫室之禁五服王及公卿大夫士之服掌衣服車旗宫室之賞賜王以賞賜有功者書曰車服以庸春官典命上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命其國家宫室車旗衣服禮儀皆以七為節子男五命其國家宫室車旗衣服禮儀皆以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之公之孤四命其卿三命其大夫再命其士一命其宫室車旗衣服禮儀各眂其命之數大夫士亦如之子男之卿再命其大夫一命其士不命其宫室車旗衣服禮儀各眂其命之數詳職官爵禄章都宗人正都禮與其服禁督其違失者服謂衣服及宫室車旗春官家宗人掌家禮與其衣服宫室車旗之禁令掌亦正也同上右總要臧哀伯曰臧哀伯魯大夫僖伯之子清廟茅屋以茅飾屋著儉也清廟肅然清靜之稱也大路越席大路玉路祀天車也越席結草大羹不致大羹肉汁不致五味粢食不鑿黍稷曰粢不精鑿昭其儉也此四者皆示儉衮冕黻珽衮畫衣也冕冠也黻韋蹕以蔽膝也珽玉笏也若今吏之持簿帶裳幅舄帶革帶也衣下曰裳幅若今行縢者舄複履衡紞紘綖衡維持冠者紞冠之垂者紘纓從下而上者綖冠上覆昭其度也尊卑各有制度藻率鞞鞛藻率以韋為之所以藉玊也王五采公侯伯三采子男二采鞞佩刀鞘上飾鞛下飾鞶厲游纓鞶紳帶也一名大帶厲大帶之垂者游旌旗之游纓在馬膺前如索帬昭其數也尊卑各有數火龍黼黻火畫火也龍畫龍也白與黑謂之黼形若斧黑與青謂之黻兩已相戾昭其文也以文章明貴賤五色比象昭其物也車服器械之有五色皆以比象天地四方以示器物不虚設鍚鸞和鈴昭其聲也鍚在馬額鸞在鑣和在衡鈴在旂動皆有鳴聲三辰旂旗昭其明也三辰日月星也畫於旂旗象天之明夫德儉而有度登降有數登降謂上下尊卑文物以紀之聲明以發之以臨照百官百官於是乎戒懼而不敢易紀律桓二年左氏傳諸侯之宫縣而祭以白牡擊玊磬朱干設錫冕而舞大武乘大路諸侯之僭禮也言此皆天子之禮也宫縣四面縣也干盾也錫傅其背如龜也武萬舞也白牡大路殷天子禮也臺門而旅樹反坫繡黼丹朱中衣大夫之僭禮也言此皆諸侯之禮也旅道也屏謂之樹樹所以蔽行道管氏樹塞門塞猶蔽也禮天子外屛諸侯内屏大夫以簾士以帷反坫反爵之坫也蓋在尊南兩君相見主君既獻於反爵焉繡黻丹朱以為中衣領縁也繡讀為綃綃繒名也詩云素衣朱綃又云素衣朱襮襮黼領也故天子微諸侯僭大夫强諸侯脅於此相貴以等相覿以貨相賂以利而天下之禮亂矣言僭所由郊特牲子云君不與同姓同車與異姓同車不同服示民不嫌也以此坊民民猶得同姓以弑其君同姓者謂先王先公子孫有繼及之道者也其非此則無嫌也僕右恒朝服君則各以時事唯在軍同服于坊記昭公將弑季氏傳言弑者從昭公之辭告子家駒曰季氏為無道僭於公室久矣諸侯稱公室吾欲弑之何如昭公素畏季氏意者以為如人君故言弑子家駒曰諸侯僭於天子大夫僭於諸侯久矣昭公曰吾何僭矣哉失禮成俗不自知也子家駒曰設兩觀禮天子諸侯臺門天子外闕兩觀諸侯内闕一觀乘大路禮天子大路諸侯路車大夫大車士飾車朱干玊戚干楯也以朱飾楯戚斧也以玊飾斧以舞大夏大夏夏樂也周所以舞夏樂者王者始起未制作之時取先王之樂與已同者假以風化天下天下大同乃自作樂取夏樂者與周俱文也王者舞六樂于宗廟之中舞先王之樂明有法也舞已之樂明有制也舞四夷之樂大德廣及之也東夷之樂曰株離南夷之樂曰任西夷之樂曰禁北夷之樂曰昧八佾以舞大武此皆天子之禮也昭二十五年公羊傳衞孫良夫帥師及齊師戰于新築衞師敗績新築人仲叔于奚救孫桓子桓子是以免于奚守新築大夫既衞人賞之以邑賞于奚辭請曲縣軒縣也周禮天子樂宫縣四周諸侯軒縣闕南方繁纓以朝許之繁纓馬飾皆諸侯之服仲尼聞之曰惜也不如多與之邑唯器與名不可以假人器車服名爵號君之所司也名以出信名位不愆為民所信信以守器動不失信則車服可保器以藏禮車服所以表尊卑禮以行義尊卑有禮各得其宜義以生利得其宜則利生利以平民政之大節也若以假人與人政也政亡則國家從之弗可止也已成二年左氏傳君天下曰天子朝諸侯分職授政任功曰予一人皆擯者辭也天下謂外及四海也今漢於蠻夷稱天子於王侯稱皇帝覲禮曰伯父實來余一人嘉之余予古今字踐阼臨祭祀内事曰孝王某外事曰嗣王某皆祝辭也唯宗廟稱孝天地社稷祭之郊内而曰嗣王不敢同外内臨諸侯畛於鬼神曰有天王某甫畛致也祝告至于鬼神辭也曰有天王某甫某甫且字也不名者下親往也周禮大㑹同過山川則大祝用事焉鬼神謂百辟卿士也畛或為祇崩曰天王崩史書策辭復曰天子復矣始死時呼魄辭也不呼名臣不名君也諸侯呼字告喪曰天王登假告赴也登上也假已也上已者若仙去云耳措之廟立之主曰帝同之天神春秋傳曰凡君卒哭而祔祔而作主天子未除喪曰予小子謙未敢稱一人春秋傳曰以諸侯之踰年即位亦知天子之踰年即位以天子三年然後稱王亦知諸侯於其封内三年稱子生名之死亦名之生名之曰小子王死亦曰小子王也晉有小子侯是僭取於天子號也五官之長曰伯謂為三公者周禮九命作伯是職方職主也是伯分主東西者春秋傳曰自陜以來周公主之自陜以西召公主之一相處乎内是或為氏其擯於天子也曰天子之吏擯者辭也春秋傳曰王命委之三吏謂三公也天子同姓謂之伯父異姓謂之伯舅自稱於諸侯曰天子之老於外曰公於其國曰君稱之以父與舅親親之辭也外自其私土之外天子畿内九州之長入天子之國曰牧每一州之中天子選諸侯之賢者以為之牧也周禮曰乃施典于邦國而建其牧天子同姓謂之叔父異姓謂之叔舅於外曰侯於其國曰君牧尊於大國之君而謂之叔父辟二伯也亦以此為尊禮或損之而益謂此類也外自其國之外九州之中曰侯者本爵也二王之後不為牧其在東夷北狄西戎南蠻雖大曰子謂九州之外長也天子亦選其諸侯之賢者以為之子子猶牧也入天子之國曰子天子亦謂之子雖有侯伯之地本爵亦無過子是以同名曰子於内自稱曰不穀與民言之稱穀善也謙於外自稱曰王老威遠國也外亦其戎狄之中庶方小侯入天子之國曰某人於外曰子自稱曰孤謂戎狄自子男君也男者於外亦曰男舉尊言之諸侯見天子曰臣某侯某謂嗇夫承命告天子辭也其為州牧則曰天子之老臣某侯某奉圭請覲某侯者國名某者人名其與民言自稱曰寡人謙也於臣亦然其在凶服曰適子孤凶服亦謂未除喪臨祭祀内事曰孝子某侯某外事曰曽孫某侯某稱國者逺辟天子死曰薨亦史書䇿辭復曰某甫復矣某甫且字並曲禮凡自稱天子曰予一人謙自别於人而已伯曰天子之力臣伯上公九命分陜諸侯之於天子曰某土之守臣某其在邊邑曰某屏之臣某其於敵以下曰寡人小國之君曰孤擯者亦曰孤邊邑謂九州之外大國之君自稱曰寡人擯者曰寡君玊藻君存稱世子明當世父位為君君薨稱子某縁民臣之心不可一日無君故稱子某明繼父也名者尸柩尚存猶以君前名臣也既葬稱子不名者無所屈也縁終始之義一年不二君故稱子也踰年稱公不可曠年無君傳莊三十二年公羊天子不言出諸侯不生名君子不親惡天子之言出諸侯之生名皆有大惡君子所逺出名以絶之春秋傳曰天王出居於鄭衛侯朔入于衞是也諸侯失地名滅同姓名絶之曲禮諸侯使人使於諸侯使者自稱曰寡君之老繫於君以為尊也此謂諸侯之卿上大夫列國之大夫入天子之國曰某士亦謂諸侯之卿也三命以下於天子為士曰某士者若晉韓起聘于周擯者曰晉士起自稱曰陪臣某陪重也於外曰子子有德之稱魯春秋曰齊高子來盟於其國曰寡君之老使者自稱曰某使謂使人於諸侯也某名也同上上大夫曰下臣擯者曰寡君之老下大夫自名擯者曰寡大夫世子自名擯者曰寡君之適擯者之辭主謂見于他國君下大夫自名於他國君曰外臣某公子曰臣孽孽當作枿聲之誤士曰傳遽之臣於大夫曰外私傳遽以車馬給使者也士臣於大夫者曰私人大夫私事使私人擯則稱名私事使謂以君命私行非聘也若魯成公時晉侯使韓穿來言汶陽之田歸之于齊之類公士擯則曰寡大夫寡君之老謂聘也大聘使上大夫小聘使下大夫玊藻非以君命使則不稱寡大夫士則曰寡君之老謂擯贊者辭也不稱寡君不言寡君之某言姓名而已大夫卿士其使則皆曰寡君之某檀弓曰仕而未有禄者君有饋焉曰獻使焉曰寡君之老士相見禮國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾雖賓於其國家猶有所尊也卿老上卿也世臣父時老臣君大夫之子不敢自稱曰余小子辟天子之子未除喪之名君大夫天子大夫有土地者大夫士之子不敢自稱曰嗣子某亦辟其君之子未除喪之名不敢與世子同名辟僭傲也其先之生則亦不改世或為大曲禮天子之妃曰后后之言後也諸侯曰夫人夫之言扶大夫曰孺人孺之言屬士曰婦人婦之言服庶人曰妻妻之言齊夫人自稱于天子曰老婦自稱于天子謂畿内諸侯之夫人助祭若時事見自稱於諸侯曰寡小君謂饗來朝諸侯之時自稱於其君曰小童自世婦以下自稱曰婢子小童若云未成人也婢之言卑也於其君稱此以接見體敵嫌其當同上邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人寡寡德謙辭論語右名號子云天無二日土無二王家無二主尊無二上示民有君臣之别也春秋不稱楚越之王喪禮君不稱天大夫不稱君恐民之惑也楚越之君僭號稱王不稱其喪謂不書葬也春秋傳曰吳楚之君不書葬辟其僭號也臣者天君稱天子為天王稱諸侯不言天公辟王也大夫有臣者稱之曰主不言君辟諸侯也此四者皆為使民疑惑不知孰者尊也周禮曰主友之讎視從父昆弟坊記孔丘卒公誄之曰旻天不弔不憗遺一老俾屏余一人以在位仁覆閔下故稱旻天弔至也憗且也俾使也屏蔽也煢煢余在疚嗚呼哀哉尼父無自律疚病也律法也言喪尼父無以自為法子贛曰君其不殁於魯乎夫子之言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱一人非名也天子稱一人非諸侯之名君兩失之哀十六年左氏傳黃帝堯舜垂衣裳而天下治蓋取諸乾坤乾坤變化而無為易繫辭傳帝曰予欲觀古人之象日月星辰山龍華蟲作㑹宗彞藻火粉米黼黻絺繡以五采彰施于五色作服汝明象像也日月以下物象是也易曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤則上衣下裳之制創自黃帝而成於堯舜也日月星辰取其照臨也山取其鎮也龍取其變也華蟲雉取其文也㑹繪也宗彝虎蜼取其孝也藻水草取其潔也火取其明也粉米白米取其養也黼若斧形取其斷也黻為兩已相背取其辨也絺鄭氏讀為黹紩也紩以為繡也日也月也星辰也山也龍也華蟲也六者繪之於衣宗彝也藻也火也粉米也黼也黻也六者繡之于裳所謂十二章也衣之六章其序自上而下裳之六章其序自下而上采者青黃赤白黑也色者言施之于繒帛也繪于衣繡于裳皆雜施五采以為五色也汝明者汝當明其大小尊卑之差等也又案周禮以日月星辰畫于旂冕服九章登龍于山登火于宗彞以龍山華蟲火宗彞五者繪于衣以藻粉黼黻四者繡於裳衮冕九章以龍為首鷩冕七章以華蟲為首毳冕五章以虎蜼為首蓋亦增損有虞之制而為之耳稷益臯陶曰天命有德五服五章哉五服五等之服自九章以至一章是也言天命有德之人則五等之服以彰顯之臯陶謨禹惡衣服而致美乎黻冕衣服常服黻蔽膝也以韋為之冕冠也皆祭服也論語有虞氏皇而祭深衣而養老夏后氏收而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭𤣥衣而養老皇冕屬也畫羽飾焉凡冕屬其服皆𤣥上纁下有虞氏十二章周九章夏殷未聞凡養老之服皆其時與羣臣燕之服有虞氏質深衣而已夏而改之尚黑而黑衣裳殷尚白而縞衣裳周則兼用之𤣥衣素裳其冠則牟追章甫委貌也諸侯以天子之燕服為朝服燕禮曰燕朝服服是服也王者之後亦以燕服為之魯季康子朝服以縞僭宋之禮也天子皮弁以日視朝也王制委貌周道也章甫殷道也毋追夏后氏之道也或謂委貌為𤣥冠委猶安也言所以安正容貌章明也殷質言以表明丈夫也甫或為父今文為斧毋發聲也追猶堆也夏后氏質以其形名之三冠皆所常服以行道也其制之異同未之聞周弁殷冔夏收弁名出於槃槃大也言所以自光大也冔名出于幠幠覆也言所以自覆飾也收言所以收斂髮也齊所服而祭也其制之異未聞三王共皮弁素積質不變士冠禮顔淵問為邦子曰服周之冕周冕有五祭服之冠也冠上有覆前後有旒黃帝以來蓋已有之而制度儀等至周始備然其為物小而加於衆體之上故雖華而不為靡雖費而不及奢夫子取之蓋亦以為文而得其中也代論語已上七條歴服制弁師掌王之五冕皆𤣥冕朱裏延紐冕服有六而言五冕者大裘之冕蓋無旒不聫數也延冕之覆在上是以名焉紐小鼻在武上笄所貫也今時冠卷當簪者廣袤以冠縰其舊象與五采繅十有二就皆五采玊十有二玊笄朱紘繅雜文之名也合五采絲為之繩垂于延之前後各十二所謂邃延也就成也繩之每一帀而貫五采玊十二斿則十二玊也每就間蓋一寸朱紘以朱組為紘也紘一條屬兩端於武繅不言皆有不皆者此為衮衣之冕十二斿則用玊二百八十八鷩衣之冕繅九斿用玊二百一十六毳衣之冕七斿用玉百六十八希衣之冕五斿用玊百二十𤣥衣之冕三斿用玊七十二諸侯之繅斿九就瑉玊三采其餘如王之事繅斿皆就玊填玊笄侯當為公字之誤也三采朱白蒼也其餘謂延紐皆𤣥覆朱裏與王同也出此則異繅斿皆就皆三采也每繅九成則九斿也公之冕用玊百六十二玊填塞耳者故書瑉作璑鄭司農云繅當為藻繅古字也藻今字也同物同音璑惡玊名王之皮弁㑹五采玊璂象邸玊笄故書㑹作䯤鄭司農云讀如馬㑹之㑹謂以五采束髮也士喪禮曰檜用組乃笄檜讀與䯤同書之異耳説曰以組束髪乃著笄謂之檜沛國人謂反紒為䯤璂讀如綦車轂之綦𤣥謂會讀如大㑹之㑹㑹縫中也璂讀如薄借綦之綦綦結也皮弁之縫中每貫結五采玊十二以為飾謂之綦詩云㑹弁如星又曰其弁伊綦是也邸下柢也以象骨為之諸侯及孤卿大夫之冕韋弁皮弁各以其等為之而掌其禁令各以其等繅斿玊璂如其命數也冕則侯伯繅七就用玊九十八子男繅五就用玊五十繅玊皆三采孤繅四就用玊三十二三命之卿繅三就用玊十八再命之大夫繅再就用玊八繅玊皆朱緑韋弁皮弁則侯伯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玊亦二采一命之大夫冕而無斿士變冕為爵弁其韋弁皮弁之㑹無結飾玊藻曰君未有命不敢即乘服不言冠弁冠弁兼於韋弁皮弁矣夏官天子玊藻十有二旒前後邃延雜采曰天子以五采藻為旒旒十有二前後邃延者言皆出冕前後而垂也天子齊肩延冕上覆也𤣥表纁裏玊藻天子之冕朱緑藻十有二旒諸侯九上大夫七下大夫五士三朱緑似夏殷禮也周禮天子五采藻禮器天子冕而朱紘諸侯冕而青紘祭義王后親織𤣥紞説云紞冠之垂前後者昭謂紞所以懸瑱當耳者也公侯之夫人加之以紘綖既織紞復加之紘綎也冕曰紘綎纓之無緌者也從下而上不結綖冕上覆之者也國語魯語子曰麻冕禮也今也純儉吾從衆麻冕緇布冠也純絲也儉謂省約緇布冠以三十升布為之升八十縷則其經二千四百縷矣細密難成不如用絲之省約論語有匪君子充耳琇瑩㑹弁如星充耳瑱也琇瑩美石也天子玊瑱諸侯以石㑹縫也弁皮弁也以玊飾皮弁之縫中如星之明也衞風淇澳充耳以素乎而尚之以瓊華乎而充耳以纊懸瑱所謂紞也尚加也瓊華美石似玊者即所以為瑱也充耳以青乎而尚之以瓊瑩乎而瓊瑩亦美石似玊者充耳以黃乎而尚之以瓊英乎而瓊英亦美石似玊者齊風著其弁伊騏弁皮弁也騏馬之青黑色者弁之色亦如此也書云四人騏弁今作綦曹風鳲鳩皮弁笄爵弁笄緇組紘纁邊笄今之簪有笄者屈組為紘垂為飾無笄者纓而結其絛纁邊組側赤也爵弁者制如冕黑色但無繅耳周禮王之皮弁㑹五采玉璂象邸玊笄諸侯及孤卿大夫之冕皮弁各以其等為之則士之皮弁又無玊象邸飾士冠禮以上十條冕弁之制𤣥冠朱組纓天子之冠也緇布冠繢緌諸侯之冠皆始冠之冠也𤣥冠委貌也諸侯緇布冠有緌尊者飾也繢或作繪緌或作蕤𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也言齊時所服也四命以上齊祭異冠縞冠𤣥武子姓之冠也謂父喪服子為之不純吉也武冠卷也古者冠卷殊縞冠素紕既祥之冠也紕縁邊也紕讀如埤益之埤既祥之冠也已祥祭而服之也閒傳曰大祥素縞麻衣垂緌五寸惰游之士也惰游罷民也亦縞冠素紕凶服之象也垂長緌明非既祥𤣥冠縞武不齒之服也所謂不帥教者居冠屬武謂燕居冠也著冠於武少威儀自天子下達有事然後緌燕無事者去飾大帛不緌帛當為白聲之誤也大帛謂白布冠也不緌凶服去飾玊藻大白冠緇布之冠皆不蕤委武𤣥縞而后蕤不蕤質無飾也大白冠大白之布冠也春秋傳曰衞文公大布之衣大白之冠委武冠卷也秦人曰委齊東曰武𤣥𤣥冠也縞縞冠也雜記始冠緇布冠自諸侯下達冠而敝之可也本大古耳非時王之法服也玊藻始冠之緇布之冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也大古無飾非時人緌也雜記曰大白緇布之冠不緌大白即大古白布冠今喪冠也齊則緇之者鬼神尚幽闇也唐虞以上曰大古也冠而敝之可也此重古而冠之耳三代改制齊冠不復用也以白布冠質以為喪冠也郊特牲古者冠縮縫今也衡縫縮從也今禮制衡讀為橫今冠橫縫以其辟積多弓檀緇布冠缺項青組纓屬于缺緇纚廣終幅長六尺缺讀如有頍者弁之頍緇布冠無笄者著頍圍髪際結頂中隅為四綴以固冠也項中有􅕒亦由固頍為之耳今未冠笄者著卷幘頍象之所生也滕薛名蔮為頍屬猶著纚今之幘梁也終充也纚一幅長六尺足以韜髪而結之矣緇布冠今小吏冠其遺象也士冠禮彼都人士臺笠緇撮臺夫須也緇撮緇布冠也其制小僅可撮其髻也小雅都人士黃衣黃冠而祭息田夫也祭謂既蜡臘先祖五祀也於是勞農以休息之論語曰黃衣狐裘野夫黃冠黃冠草服也言祭以息民服象其時物之色季秋而草木黃落郊特牲已上八條冠制追師掌王后之首服為副編次追衡笄為九嬪及外内命婦之首服以待祭祀賓客鄭司農云追冠名士冠禮記曰委貌周道也章甫殷道也母追夏后氏之道也追師掌冠冕之官故並主王后之首服副者婦人之首服祭統曰君卷冕立于阼夫人副禕立于東房衡維持冠者春秋傳曰衡紞紘綎𤣥謂副之言覆所以覆首為之飾其遺象若今歩繇矣服之以從王祭祀編編列髪為之其遺象若今假紒矣服之以桑也次次第髮長短為之所謂髲髢服之以見王王后之燕居亦纚笄總而已追猶治也詩云追琢其章王后之衡笄皆以玊為之唯祭服有衡垂于副之兩旁當耳其下以紞懸瑱詩云玼兮玼兮其之翟也鬒髪如雲不屑鬄也玊之瑱也是之謂也笄卷髪者外内命婦衣鞠衣襢衣者服編衣縁衣者服次外内命婦非王祭祀賓客佐后之禮自於其家則亦降焉少牢饋食禮曰主婦髲鬄衣移袂特牲饋食禮曰主婦纚笄綃衣是也昬禮女次純衣攝盛服耳主人爵弁以迎移𬒮縁衣之袂凡諸侯夫人於其國衣服與王后同天官君子偕老副笄六珈副祭服之首飾編髪為之笄衡笄也垂于副之兩旁當耳其下以紞懸瑱珈之言加也以玊加于笄而為飾也玊之瑱也象之揥也瑱塞耳也象象骨也揥所以摘髪也鄘風君子偕老此二條婦人首服喪服布總箭笄傳曰箭笄長尺吉笄尺二寸喪服女子子適人者為其父母卒哭子折笄首以笄傳曰折笄首者折吉笄之首也吉笄者象笄也有首者若今時刻鏤摘頭矣同上此二條因喪服見婦人吉笄之制司服掌王之吉凶衣服辨其名物與其用事用事祭祀視朝甸凶弔之事衣服各有所用王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕六服同冕者首飾尊也先公謂后稷之後大王之前不窋至諸盩饗射饗食賓客與諸侯射也羣小祀林澤墳衍四方百物之屬鄭司農云大裘羔裘也衮巻龍衣也鷩禆衣也毳罽衣也𤣥謂書曰予欲觀古人之象日月星辰山龍華蟲作繢宗彝藻火粉米黼黻希繡此古天子冕服十二章舜欲觀焉華蟲五色之蟲繢人職曰鳥獸蛇雜四時五色以章之謂是也希讀為絺或作黹字之誤也王者相變至周而以日月星辰畫於旌旗所謂三辰旂旗昭其明也而冕服九章登龍于山登火於宗彝尊其神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彝皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆希以為繡則衮之衣五章裳四章凡九也鷩畫以雉謂華蟲也其衣三章裳四章凡七也毳畫虎蜼謂宗彝也其衣三章裳二章凡五也希刺粉米無畫也其衣一章裳二章凡三也𤣥者衣無文裳刺黻而已是以謂𤣥焉凡冕服皆𤣥衣纁裳凡兵事韋弁服韋弁以韎韋為弁又以為衣裳春秋傳曰晉郤至衣韎韋之跗注是也今時五伯緹衣古兵服之遺色眂朝則皮弁服視朝視内外朝之事皮弁之服十五升白布衣積素以為裳王受諸侯朝覲於廟則衮冕凡甸冠弁服甸田獵也冠弁委貌其服緇布衣亦積素以為裳諸侯以為視朝之服詩國風曰緇衣之宜兮謂王服此以田王卒食而居則𤣥端公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服士之服自皮弁而下如大夫之服其齊服有𤣥端素端自公之衮冕至卿大夫之𤣥冕皆其朝聘天子及助祭之服諸侯非二王後其餘皆𤣥冕而祭於已雜記曰大夫冕而祭于公弁而祭於已士弁而祭於公冠而祭于已大夫爵弁自祭家廟唯孤爾其餘皆𤣥冠與士同𤣥冠自祭其廟者其服朝服𤣥端諸侯之自相朝聘皆皮弁服此天子日視朝之服士齊有素端者亦為札荒有所禱請變素服言素端者明異制鄭司農云𤣥有襦裳者為端𤣥謂端者取其正也士之衣袂皆二尺二寸而屬幅是廣袤等也其祛尺二寸大夫以上侈之侈之者蓋半而益一焉半而益一則其袂三尺三寸祛尺八寸春官天子玊藻十有二旒前後邃延龍卷以祭祭先王之服也龍巻畫龍於衣字或作衮疑畫蟠龍故謂之巻𤣥端而朝日聽朔端當為冕字之誤也𤣥衣而冕冕服之下皮弁以日視朝遂以食卒食𤣥端而居天子服𤣥端燕居也諸侯𤣥端以祭祭先君也端亦當為冕字之誤也諸侯祭宗廟之服唯魯與天子同禆冕以朝朝天子也禆冕公衮侯伯鷩子男毳也皮弁以聽朔於大廟皮弁下天子也朝服以日視朝於内朝朝服冠𤣥端素裳也退適路寢聽政大夫退然後適小寢釋服釋服服𤣥端又朝服以食食必朝服所以敬養身也夕深衣祭牢肉玊藻制三公一命巻若有加則賜也不過九命巻俗讀也其通則曰衮三公八命矣復加一命則服龍衮與王者之後同多於此則賜非命服也虞夏之制天子服有日月星辰周禮曰諸公之服自衮冕而下如王之服王制再命受服鄭司農云受服受祭衣服為上士𤣥謂此受𤣥冕之服列國之大夫再命於子男為卿卿大夫自𤣥冕而下如孤之服王之中士亦再命則爵弁服春官大宗伯大夫冕而祭於公弁而祭於已士弁而祭於公冠而祭於已弁爵弁也冠𤣥冠也祭於公助君祭也大夫爵弁而祭于已唯孤爾士弁而親迎然則士弁而祭於已可也縁類欲許之也親迎雖亦已之事攝盛服爾非常也雜記少牢饋食之禮主人朝服特牲饋食之禮主人冠端𤣥冠端𤣥𤣥冠端端下言𤣥者𤣥冠有不𤣥端者朝𤣥端夕深衣謂大夫士也論玊藻諸已上八條通天子侯大夫士之服衣正色裳間色謂冕服𤣥上纁下同上畫繪之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之𤣥地謂之黃青與白相次也赤與黑相次也𤣥與黃相次也此言畫繢六色所象及布采之第次繢以為衣青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五采備謂之繡此言刺繡采所用繡以為裳土以黃其象方天時變古人之象無天地也為此記者見時有之耳子家駒曰天子僭天意亦是也鄭司農云天時變謂畫天隨四時色火以圜鄭司農云為圜形似火也𤣥謂形如半環然在裳山以章章讀為獐獐山物也在衣齊人謂麋為獐水以龍龍水物在衣鳥獸蛇所謂華蟲也在衣蟲之毛鱗有文采者雜四時五色之位以章之謂之巧章明也繢繡皆用五采鮮明之是為巧凡畫繪之事後素功素白采也後布之謂其易漬汙也不言繡繡以絲也鄭司農説以論語曰繢事後素工考記禮有以文為貴者天子龍衮諸侯黼大夫黻士𤣥衣纁裳此祭冕服也禮記上公冕服九章侯伯冕服七章子男冕服五章冕服著冕所服之衣也九章者自龍山以下七章者自華蟲以下五章者自宗彝以下也人秋官大行覲禮侯氏禆冕禆冕者衣禆衣而冠冕也禆之為言埤也天子六服大裘為上其餘為禆以事尊卑服之而諸侯亦服焉上公衮無升龍侯伯鷩子男毳孤絺卿大夫𤣥此差司服所掌也之已上五條冕服制士冠禮爵弁服纁裳純衣緇帶韎韐此與君祭之服雜記曰士弁而祭于公爵弁者冕之次其色赤而微黑如爵頭然或謂之緅其布三十升纁裳淺絳裳凡染絳一入謂之縓再入謂之頳三入謂之壎朱則四入與純衣絲衣也餘衣皆用布唯冕與爵弁服用絲耳先裳後衣者欲令下近緇明衣與帶同色韎韐韞韍也士韞韍而幽衡合韋為之士染以茅蒐因以名焉今齊人名蒨為韎韐韍之制似韠冠弁者不與衣陳而言于上以冠名服耳皮弁服素積緇帶素韠此與君視朔之服也皮弁者以白鹿皮為冠象上古也積猶辟也以素為裳辟蹙其要中皮弁之衣用布亦十五升其色象焉𤣥端𤣥裳黃裳雜裳可也緇帶爵蹕此莫夕於朝之服𤣥端即朝服之衣易其裳耳上士𤣥裳中士黃裳下士雜裳雜裳者前𤣥後黃易曰夫𤣥黃者天地之雜也天𤣥而地黃士皆爵韋為韠其爵同不以𤣥冠名服者是為緇布冠陳之玉藻曰韠君朱大夫素士爵韋朝服十五升雜記士冠禮筮于庿門主人𤣥冠朝服緇帶素韠𤣥冠委貌也朝服者十五升布衣而素裳也衣不言色者衣與冠同也緇帶黑繒帶也士帶博二寸再繚四寸屈垂三尺素韠白韋韠也長三尺上廣一尺下廣二尺其頸五寸肩革帶博三寸天子與其臣𤣥冕以視朔皮弁以日視朝諸侯與其臣皮弁以視朔朝服以日視朝凡染黑五入為緅七入為緇𤣥則六入與端已上三條爵弁皮弁𤣥冠𤣥服之制深衣三祛三祛者謂要中之數也祛尺二寸圍之為二尺四寸三之七尺二寸縫齊倍要縫紩也紩下齊倍要中齊丈四尺四寸縫或為縫或為豐祍當旁祍謂裳幅所交裂也凡祍者或殺而下或殺而上是以小要取名焉祍屬衣則垂而放之屬裳則縫之以合前後上下相變𬒮可以囘肘二尺二寸之節長中繼揜尺其為長衣中衣則繼𬒮揜一尺若今褎矣深衣則緣而已祫二寸曲領也祛尺二寸𬒮口也緣廣寸半飾邊也玊藻古者深衣蓋有制度以應規矩繩權衡言聖人制事必有法度短毋見膚衣服蔽形長毋被土為汙辱也續祍鉤邊續猶屬也祍在裳旁者也屬連之不殊裳前後也鉤讀如烏喙必鉤之鉤鉤邊若今曲裾也續或為裕要縫半下三分要中減一以益下下宜寛也要或為優袼之高下可以運肘肘不能不出入袼衣𬒮當掖之縫也袂之長短反詘之及肘𬒮屬幅於衣詘而至肘當臂中為節臂骨上下各尺二寸則𬒮肘以前尺二寸肘或為腕帶下毋厭髀上毋厭脅當無骨者當骨緩急難為中也制十有二幅以應十有二月裳六幅幅分之以為上下之殺𬒮圜以應規謂胡下也曲祫如矩以應方祫交領也古者方領如今小兒衣領負繩及踝以應直繩謂裻與後幅相當之縫也踝跟也下齊如權衡以應平齊緝故規者行舉手以為容行舉手謂揖讓負繩抱方者以直其政方其義也故易曰坤六二之動直以方也言深衣之直應易之丈也政或為正下齊如權衡者以安志而平心也心平志安行乃止或低或仰則心有異志者與五法已施故聖人服之言非法不服故規矩取其無私繩取其直權衡取其平故先王貴之貴此衣也故可以為文可以為武可以擯相可以治軍旅完且弗費善衣之次也完且弗費言可苦衣而易有也深衣者用十五升布鍜濯灰治純之以采善衣朝祭之服也自士以上深衣為之次庶人吉服深衣而已具父母大父母衣純以繢具父母衣純以青如孤子衣純以素尊者存以多飾為孝繢畫文也三十以下無父稱孤純𬒮縁純邊廣各寸半純謂縁之也縁𬒮謂其口也縁緆也緣邊衣裳之側廣各寸半則表裏共三寸矣唯祫廣二寸深衣鄭目録云名曰深衣者以其記深衣之制也深衣連衣裳而純之以采者素純曰長衣有表則謂之中衣大夫以上祭服之中衣用素詩云素衣朱襮玊藻曰以帛裏布非禮也士祭以朝服中衣以布明矣非帷裳必殺之朝祭之服裳用正幅如帷要有辟積而旁無殺縫其餘若深衣異半下齊倍要則無辟積而有殺縫矣論語以帛裏布非禮也中外宜相稱也冕服絲衣也中衣用素皮弁服朝服𤣥端麻衣也中衣用布藻玉素衣朱襮從子于沃襮領地諸侯之服繡黼飾而丹朱純也子指桓叔也沃曲沃也素衣朱繡從子于鵠朱繡即朱襮也鵠曲沃邑也唐風揚之水繡黼丹朱中衣大夫之僭禮也詳見總要篇中已上六條深衣長衣衣之制司裘掌為大裘以供王祀天之服鄭司農云大裘黑羔裘服以祀天示質中秋獻良裘良善也中秋鳥獸㲝毨因其良時而用之鄭司農云良裘王所服也𤣥謂良裘玊藻所謂黼裘與季秋獻功裘以待頒賜功裘人工微麤謂狐青麛裘之屬鄭司農云功裘卿大夫所服嵗終則㑹唯王之裘不㑹天官唯君有黼裘以誓省大裘非古也僭天子也天子祭上帝則大裘而冕大裘羔裘也黼裘以羔與狐白雜為黼文也省當為獮獮秋田也國君有黼裘誓獮田之禮時大夫又有大裘也君衣狐白裘錦衣以裼之君衣狐白毛之裘則以素錦為衣覆之使可裼也袒而有衣曰裼必覆之者裘䙝也詩云衣錦絅衣裳錦絅裳然則錦衣復有上衣明矣天子狐白之上衣皮弁服與凡裼衣象裘色也君之右虎裘厥左狼裘衞尊者宜武猛士不衣狐白辟君者狐之白者少以少為貴也君子狐青裘豹褎𤣥綃衣以裼之君子大夫士也綃綺屬也染之以𤣥於狐青裘相宜狐青裘蓋𤣥衣之裘麛裘青豻褎絞衣以裼之豻胡大也絞蒼黃色孔子曰素衣麑裘羔裘豹飾緇衣以裼之飾猶褎也孔子曰緇衣羔裘狐裘黃衣以裼之黃衣大蜡時臘先祖之服也孔子曰黃衣狐裘錦衣狐裘諸侯之服也非諸侯則不用錦衣為裼玉藻羔裘逍遙狐裘以朝緇衣羔裘諸侯之朝服錦衣狐裘其朝天子之服也檜風羔裘羔羊之皮素絲五紽小曰羔大曰羊皮所以為裘大夫燕居之服素白也紽未詳蓋以絲飾裘之名也羔羊之革素絲五緎革猶皮也緎裘之縫界也羔羊之縫素絲五總縫縫皮合之以為裘也總亦未詳召南羔羊羔裘豹飾孔武有力飾緣袖也禮君用純物臣下之故羔裘而以豹皮為飾也豹甚武而有力故服其所飾之裘者如之羔裘晏兮三英粲兮晏鮮盛也三英裘飾也未詳其制粲光明也鄭風羔裘緇衣羔裘素衣麑裘黃衣狐裘緇黑色羔裘用黑羊皮麑鹿子色白狐色黃衣以裼裘欲其相稱䙝裘長短右𬒮長欲其温短右𬒮所以便作事狐貉之厚以居狐貉毛深温厚私居取其適體論語犬羊之裘不裼質略亦庶人無文飾不文飾也不裼裼主於有文飾之事裘之裼也見美也君子於事以見美為敬弔則襲不盡飾也喪非所以見美君在則裼盡飾也臣於君所服之襲也充美也充猶覆也所敬不主於君則䙝是故尸襲尸尊執玊龜襲重寶瑞也無事則裼弗敢充也謂已致龜玊也玉藻禮不盛服不充禮盛者服充大事不崇曲敬故大裘不裼謂祭天也周禮王祀昊天上帝則服大裘而冕同上表裘不入公門表裘外衣也䙝當表之乃出襲裘不入公門衣裘必當裼也同上執玊其有藉者則裼無藉者則襲藉藻也裼襲文質相變耳有藻為文裼見美亦文無藻為質襲充美亦質圭璋特而襲璧琮加束帛而裼亦是也曲禮子曰裼襲之不相因也欲民之毋相瀆也不相因者以其或以裼為敬或以襲為敬禮盛者以襲為敬執玉龜之屬也禮不盛者以裼為敬受享是也制表記裼已上十一條論裘兼論襲之異天子素帶朱裏終辟而素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶謂大帶也而素帶終辟謂諸侯也諸侯不朱裏合素為之如今衣帶為之下天子也大夫亦如之率繂也士以下皆禪不合而繂積如今作幧頭為之也辟讀如禆冕之禆禆謂以繒采飾其側人君充之大夫禆其紐及下士禆其末而已居士道藝處士也并紐約用組三寸長齊于帶紳長至士三尺有司二尺有五寸子游曰參分帶下紳居一焉紳韠結三齊三寸謂約帶紐組之廣也長齊于帶與紳齊也紳帶之垂者也言其屈而重也論語曰子張書諸紳有司府史之屬也三分帶下而長三尺則帶高於紳也結約餘也結或為袗大夫大帶四寸雜帶君朱綠大夫𤣥華士緇辟二寸再繚四寸凡帶有率無箴功雜猶飾也即上之禆也君禆裨帶上以朱下以緑終之大夫垂外以𤣥内以華華黃色也士禆垂之下外内皆以緇是謂緇帶大夫以上以素皆廣四寸士以練廣二寸再繚之凡帶有司之帶也亦繂之如士帶矣無箴功則不禆之士雖繂帶禆亦用箴功凡帶不禆下士也肆束及帶勤者有事則收之走則擁之肆讀為肄肄餘也餘束約組之餘紐也勤謂執勞辱之事也玉藻已上大帶之制革帶博二寸詳見下韠制條此一條革帶之制有虞氏服韍夏后氏山殷火周龍章韍冕服之韠也舜始作之以尊祭服禹湯至周増以畫文後王彌飾也山取其仁可仰也大取其明也龍取其變化也天子備焉諸侯火而下大夫山士韎韋而已韍或作黻明堂位朱芾斯皇室家君王芾天子純朱諸侯黃朱皇猶煌煌也君諸侯也小雅斯干赤芾金舄㑹同有繹赤芾諸侯之服金舄赤舄而加金飾亦諸侯之服也時見曰㑹殷見曰同繹陳列聫屬之貌也小雅車攻一命緼韍再命赤韍三命赤韍此𤣥冕爵弁服之韠尊祭服異其名耳韍之言亦蔽也緼赤黃之間色所謂韎也周禮公侯伯之卿三命其大夫再命其士一命子男之卿再命其大夫一命其士不命玊藻韎韐有奭以作六師韎茅蒐所染色也韐韠也合韋為之周官所謂韋弁兵事之服也奭赤貌作猶起也六師六軍也天子六軍小雅瞻彼洛矣韠君朱大夫素士爵韋此𤣥端服之蹕也韠之言蔽也凡韠以韋為之必象裳色則天子諸侯𤣥端朱裳大夫素裳唯士𤣥裳黃裳雜裳也皮弁服皆素蹕圜殺直目韠制天子直四角直無圜殺公侯前後方殺四角使之方變於天子也所殺者去上下各五寸大夫前方後挫角圜其上角變於君也韠以下為前以上為後士前後正士賤與君同不嫌也正直方之間語也天子之士則直諸侯之士則方韠下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸頸五寸亦謂廣也頸中央肩兩角皆上接革帶以繫之肩與革帶廣同凡佩繫於革帶玉藻韠長三尺下廣二尺上廣一尺㑹去上五寸紕以爵韋六寸不至下五寸純以素紃以五采㑹謂領上縫也領之所用蓋與紕同在旁曰紕在下曰純素生帛也紕六寸者中執之表裏各三寸也純紕所不至者五寸與㑹去上同紃施諸縫中若今時絛也雜記齊則綪結佩而爵蹕爵蹕者齊服𤣥端條玉藻之已上八韍韠制笏天子以球玊諸侯以象大夫以魚須文竹士竹本象可也球美玊也文猶飾也大夫士飾竹以為笏不敢與君並用純物也玉藻天子御珽諸侯御荼大夫服笏御服皆器用之名尊者謂之御卑者謂之服珽大圭荼古舒字玉之上圓下方者也荀子天子搢珽方正於天下也此亦笏也謂之珽珽之言珽然無所屈也或謂之大圭長三尺杼上終葵首者於杼上又廣其首方如椎頭是謂無所屈後則恒直相玊書曰珽玊六寸明自炤諸侯荼前詘後直讓於天子也荼讀為舒遲之舒舒懦者所畏在前也詘謂圜殺其首不為椎頭唯天子詘焉是以謂笏為荼大夫前詘後詘無所不讓也大夫奉君命出入者也上有天子下有已君又殺其下而圜玊藻笏度二尺有六寸其中博三寸其殺六分而去一殺猶杼也天子杼上終葵首諸侯不終葵首大夫士又杼其下首廣二寸半同上大圭長三尺杼上終葵首天子服之注見後玊器章玊人王大圭執鎮圭以朝日詳見後玊器章天子執玊笏以朝日管子年不順成君衣布縉本搢本去珽荼佩士笏也士以竹為笏飾本以象玊藻將適公所史進象笏書思對命思所思念將以告君者也對所以對君者也命所受君命者也書之於笏為失忘也同上見於天子與射無説笏入大廟説笏非禮也言凡吉事無所説笏也大廟之中唯君當事説笏也小功不説笏當事免則説之免悲哀哭踊之時不在於記事也小功輕不當事可以搢笏也既搢必盥雖有執於朝弗有盥矣搢笏輒盥為必執事凡有指畫於君前用笏造受命於君前則書於笏笏畢用也因飾焉畢盡也十同上制已上條笏古之君子必佩玊比德焉君子士以上右徵角左宫羽玊聲所中也徵角在右事也民也可以勞宫羽在左君也物也宜逸趨以采齊路門之外樂節宅門外謂之趨齊當為楚薺之薺行以肆夏登堂之樂節周還中規反行也宜圜折還中矩曲行也宜方進則揖之退則揚之然後玊鏘鳴也揖之謂小俛見於前也揚之謂小仰見於後也鏘聲貌故君子在車則聞鸞和之聲行則鳴佩玊是以非辟之心無自入也鸞在衡和在式自由也玊藻上車以和鸞為節下車以佩玊為度上有蔥衡下有雙璜衝牙衡平也半璧曰璜璜在旁衝牙在中玭珠以納其閒納於衡璜衝牙之閒玭亦作蠙琚瑀以雜之總曰玭珠而赤者曰琚白者曰瑀或曰瑀美玊琚石次玊行以采茨趨以肆夏步環中規折還中矩進則揖之揖一作厭退則揚之然后玊鏘鳴也大戴禮玉府共王之服玉佩玉珠玉佩玊者王之所帶者也玉藻曰君子于玊比德焉天子佩白玊而𤣥組綬詩傳曰佩玊上有蔥衡下有雙璜衝牙蠙珠以納其間鄭司農云服玊冠飾十二玊天官君無故玊不去身故謂災患喪病曲禮凡帶必有佩玊唯喪否喪主於哀去飾也凡謂天子以至士佩玉有衝牙居中央以前後觸也君子無故玊不去身君子於玉比德焉故謂喪與災𤯝天子佩白玉而𤣥組綬公侯佩山𤣥玊而朱組綬大夫佩水蒼玊而純組綬世子佩瑜玊而綦組綬士佩瓀玫而緼組綬王有山𤣥水蒼者祖之文色所似也綬者所以貫佩玊相承受者也純當為緇古文緇字或作絲旁才綦文雜色也緼赤黄孔子佩象環五寸而綦組綬謙不比德亦不事也象有文理者也環取可循而無窮玊藻君在不佩玊左結佩右設佩謂世子也出所處而君在焉則去德佩而設事佩辟德而示即事也結其左者若於事有未能也結者結其綬不使鳴焉居則設佩謂所處而君不在焉朝則結佩朝於君亦結左齊則綪結佩綪屈也結又屈之思神靈不在事也同上一命緼韍幽衡再命赤韍幽衡三命赤韍蔥衡衡佩玊之衡也幽讀為黝黑謂之黝青謂之蔥同上去喪無所不佩君子無故玊不去身觿礪之屬亦皆佩之論語何以舟之維玊及瑤鞞琫容刀舟帶也鞞刀鞘也琫刀上飾也容刀容飾之刀也或曰容刀如言容臭謂鞞琫之中容此刀耳大雅公劉君子至止鞞琫有珌君子指天子也鞞容刀之鞞今刀鞘也琫上飾珌下飾亦戎服也小雅瞻彼洛矣已上十條佩制内司服掌王后之六服禕衣揄狄闕狄鞠衣展衣緣衣素沙鄭司農云禕衣畫衣也祭統曰君卷冕立于阼夫人副禕立于東房揄狄闕狄畫羽飾展衣白衣也喪大記曰復者朝服君以巻夫人以屈狄世婦以䄠衣屈者音聲與闕相似䄠與展相似皆婦人之服鞠衣黃衣也素沙赤衣也𤣥謂狄當為翟翟雉名伊雒而南素質五色皆備成章曰翬江淮而南青質五色皆備成章曰摇王后之服刻繒為之形而采畫之綴於衣以為文章禕衣畫翬者揄狄畫搖者闕狄刻而不畫此三者皆祭服從王祭先王則服禕衣祭先公則服揄翟祭羣小祀則服闕翟今世有圭衣者蓋三翟之遺俗鞠衣黃桑服也色如鞠塵象桑葉始生月令三月薦鞠衣于上帝告桑事展衣以禮見王及賓客之服字當為䄠䄠之言亶亶誠也詩國風曰玼兮玼兮其之翟也下云胡然而天也胡然而帝也言其德當神明又曰瑳兮瑳兮其之展也下云展如之人兮邦之媛也言其行配君子二者之義與禮合矣雜記曰夫人服税衣揄翟又喪大記曰士妻以禒衣言禒者甚衆字或作税此禒衣者實作禒衣也禒衣御于王之服亦以燕居男子之禒衣黒則是亦黑也六服備於此矣禕揄狄展聲相近縁字之誤也以下推次其色則闕狄赤揄狄青禕衣𤣥婦人尚專一德無所兼連衣裳不異其色素沙者今之白縳也六服皆袍制以白縳為裏使之張顯今世有沙縠者名出于此辨外内命婦之服鞠衣展衣緣衣素沙内命婦之服鞠衣九嬪也展衣世婦也禒衣女御也外命婦者其夫孤也則服鞠衣其夫卿大夫也則服展衣其夫士也則服緣衣三夫人及公之妻其闕狄以下乎侯伯之夫人揄狄子男之夫人亦闕狄唯三公後禕衣凡祭祀賓客共后之衣服及九嬪世婦凡命婦共其衣服凡者凡女御與外命婦也言及言凡殊貴賤也春秋之義王人雖微者猶序乎諸侯之上所以尊尊也臣之命者再命以上受服則下士之妻不共也外命婦唯王祭祀賓客以禮佐后得服此上服自於其家則降焉天官王后禕衣夫人揄狄禕讀如翬揄讀如摇翬搖皆翟雉名刻繒而畫之著於衣為飾因以為名也後世作字異耳夫人三夫人亦侯伯之夫人也王者之後夫人亦禕衣君命屈狄再命禕衣一命䄠衣士禒衣君女君也屈周禮作闕謂刻繒為翟不畫也此子男之夫人及其卿大夫士之妻命服也禕當為鞠字之誤禮天子諸侯命其臣后夫人亦命其妻以衣服所謂夫尊於朝妻榮於室子男之卿再命而妻鞠衣則鞠衣禮衣禒衣者諸侯之臣皆分三等其妻以次受此服公之臣孤為上卿大夫次之侯伯子男之臣卿為上大夫次之士次之禒或作税唯世婦命於奠繭其他則皆從男子奠猶獻也凡世婦以下蠶事畢獻繭乃命之以其服天子之后夫人九嬪及諸侯之夫人夫在其位妻得服其服玊藻少牢饋食之禮主婦被錫衣侈𬒮被錫讀為髲鬄古者或剔賤者刑者之髪以被婦人之紒為飾因名髲鬄焉此周禮所謂次也不纚笄者大夫妻尊亦衣綃衣而侈其𬒮耳侈者葢半士妻之𬒮以益之衣三尺三寸𬒮一尺八寸特牲饋食之禮主婦纚笄宵衣纚笄者服宵綺屬也此衣染之以黑其繒本名曰宵詩有素衣朱宵記有𤣥宵衣凡婦人助祭者同服也士昬禮女次純衣纁袇次首飾也今時髲也周禮追師掌為副編次純衣絲衣女從者畢袗𤣥則此衣亦𤣥矣袇亦緣也袇之言任也以纁緣其衣象陰氣上任也凡婦人不常施袇之衣盛昏禮為此服喪大記曰復衣不以袇明非常姆纚笄宵衣纚縚髮笄今時簪也纚亦廣充幅長六尺宵讀為詩素衣朱綃之綃魯詩以綃為綺屬也姆亦𤣥衣以綃為領因以為名且相别耳女從者畢袗𤣥纚笄被顈黼女從者謂姪娣也袗同也同𤣥者上下皆𤣥也顈禪也詩曰素衣朱襮爾雅云黼領謂之襮周禮曰白與黑謂之黼天子諸侯后夫人狄衣卿大夫之妻刺黼以為領如今偃領矣士妻始嫁施禪黻於領上假盛飾耳言被明非常服婦乘以几姆加景景之制蓋加明衣加之以為行道禦塵令衣鮮明也景亦明也已上五條婦人服制屨人掌王及后之服屨為赤舄黑舄赤繶黃繶青句素屨葛屨屨自明矣必連言服者著服各有屨也複下曰舄禪下曰屨古人言屨以通於複今世言屨以通於禪俗易語反與舄屨有絇有繶有純者飾也鄭司農云赤繶黃繶以赤黃之絲為下縁士喪禮曰夏葛屨冬皮屨皆繶緇純禮家説繶亦謂以采絲礫其下𤣥謂凡屨舄各象其裳之色士冠禮曰𤣥端黑屨青句繶純素積白屨緇絇繶純爵弁纁屨黑絇繶純是也王吉服有九舄有三等赤舄為上冕服之舄也詩云王錫韓侯𤣥衮赤舄則諸侯與王同下有白舄黑舄王后吉服六唯祭服有舄𤣥舄為上禕衣之舄也下有青舄赤舄鞠衣以下皆屨耳句當作絇聲之誤也絇繶純者同色今云赤繶黃繶青絇雜互言之明舄屨衆多反覆以見之凡舄之飾如繢之次赤繶者王黑舄之飾黃繶者王后𤣥舄之飾青絇者王白舄之飾言繶必有絇純言絇亦有繶純三者相將王及后之赤舄皆黑飾后之青舄白飾凡屨之飾如繡次也黃屨白飾白屨黑飾黑屨青飾絇謂之拘著舄屨之頭以為行戒繶縫中紃純縁也天子諸侯吉事皆舄其餘唯服冕衣翟著舄耳士爵弁纁屨黑絇繶純尊祭服之屨飾從繢也素屨者非純吉有凶去飾者言葛屨明有用皮時辨外内命夫命婦之命屨功屨散屨命夫之命屨纁屨命婦之命屨黄屨以下功屨次命屨於孤卿大夫則白屨黑屨九嬪内子亦然世婦命婦以黑屨為功屨女御士妻命屨而已士及士妻謂再命受服者散屨亦謂去飾凡四時之祭祀以宜服之祭祀而有素屨散屨者唯大祥時官天屨夏用葛𤣥端黑屨青絇繶純純博寸屨者順裳色𤣥端黑屨以𤣥裳為正也絇之言拘也以為行戒狀如刀衣鼻在屨頭繶縫中紃也純縁也三者皆青博廣也素積白屨以魁柎之緇絇繶純純博寸魁蜃蛤柎注也爵弁纁屨黑絇繶純純博寸爵弁屨以黑為飾爵弁尊其屨飾以繢次冬皮屨可也不屨繐屨繐屨喪屨也縷不灰治曰繐士冠禮偪屨著綦偪行縢綦屨繫也内則赤芾在股邪幅在下邪幅偪也邪纒於足如今行縢所以束脛在股下也小雅采菽及已上四條屨偪制五色六章十二衣還相為質也五色六章晝繢事也周禮考工記曰土以黃其象方天時變火以圜山以草水以龍鳥獸蛇雜四時五色之位以章之謂之巧也禮運春天子衣青衣服倉玊夏衣朱衣服赤玊中央土衣黃衣服黃玊秋衣白衣服白玊冬衣黑衣服𤣥玊凡所服玊謂冠飾及所佩者之衡璜也此衣服取於殷時而有變焉非周制也周禮朝祀戎獵車服各以其事不以四時為異又玊藻曰天子龍衮以祭𤣥端而朝日皮弁以日視朝與此皆殊月令此二條每月服色士不衣織織染絲織之士衣染繒也無君者不貳采大夫去位宜服𤣥端𤣥裳非列采不入公門列采正服振絺綌不入公門表裘不入公門振謂為袗袗禪也表裘外衣也二者形且䙝皆當表之乃出襲裘不入公門注見前纊為繭緼為𫀆衣有著之異名也纊謂今之新緜也緼謂今纊及舊絮也禪為絅有衣裳而無裏帛為褶有表裏而無著玊藻黼領謂之襮繡刺黼文以褗領緣謂之純衣緣飾也袕謂之褮衣開孔也衣眥謂之襟交領衱謂之𥚑衣後𥚑也衿謂之袸衣小帶佩衿謂之禐佩玊之帶二屬衣蔽前謂之襜今蔽膝也婦人之禕謂之縭縭緌也即今之香纓也禕邪交落帶繫於體因名為禕緌繫也裳削幅謂之纀削殺其幅深衣之裳爾雅衣錦褧衣裳錦褧裳褧禪也鄭風丰玊府掌王之燕衣服燕衣服者巾絮寢衣袍襗之屬皆良貨賄所成天官君子不以紺緅飾君子謂孔子紺深青揚赤色齊服也緅綘色三年之喪以飾練服也飾領縁也紅紫不以為䙝服紅紫間色不正且近於婦人女子之服也䙝服私居服也言此則不以為朝祭之服可知當暑袗絺綌必表而出之袗禪也葛之精者曰絺粗者曰綌表而出之謂先著裏衣表絺綌而出之于外欲其不見體也詩所謂䝉彼縐絺是也羔裘𤣥冠不以弔喪主素吉主𤣥弔必變服所以哀死齊必有明衣布齊必沐浴浴竟則著明衣所以明潔其體也以布為之必有寢衣長一身有半齊主於敬不可解衣而寢又不可著明衣而寢故别有寢衣其半蓋以覆足論語士喪禮陳襲事縁衣黑衣裳赤縁之謂之褖褖之言縁也所以表𫀆者也喪大記曰衣必有裳𫀆必有表不禪謂之一稱浴衣於篋浴衣已浴所衣之衣以布為之其制如今通裁明衣裳用幕布𬒮屬幅長下膝明衣所以親身為圭潔也幕布帷幕之布升數未聞也屬幅不削幅也長下膝又有裳於蔽下體深也有前後裳不辟長及觳不辟質也觳足跗也凡他服短毋見膚長無被土縓綼緆一染謂之縓今紅也飾裳在幅曰綼在下曰緆緇純七八為緇緇黑色也飾衣曰純謂領與𬒮衣以緇裳以縓象天地也士喪記設明衣婦衣則設中帶中帶者今之褌襂同上父母存冠衣不純素為其有喪象也玊藻曰縞冠𤣥武子姓之冠也縞冠素紕既祥之冠也深衣曰具父母衣純以青孤子當室冠衣不純采早喪親雖除喪不忘哀也謂年未三十者三十壯有室有代親之端不為孤也當室適子也深衣曰孤子衣純以素曲禮麻者不紳執玊不麻麻不加於采吉凶不相干也麻謂絰也紳大帶也喪以要絰代大帶也麻不加於采衣采者不麻謂弁絰也必服弔服是也采𤣥纁之衣條雜記雜已上十衣服制童子不衣裘裳裘大温消隂氣使不堪苦不衣裳便易禮曲童子不裘不帛不縷絇裘帛温傷壯氣也絇屨頭飾也玊藻十年衣不帛𥜗袴不用帛為襦袴為大温傷隂氣也二十而冠可以衣裘帛内則童子之節也緇布衣錦縁錦紳并紐錦束髮皆朱錦也童子未冠之稱也冠禮曰將冠者采衣紒也玉藻士冠禮將冠者采衣紒采衣未冠者所服玉藻曰童子緇布衣錦縁錦紳并紐錦束髪皆朱錦也紒結髪已上五條童子服制司服大札大荒大烖素服大札疫病也大荒飢饉也大烖水火為害君臣素服縞冠若晉伯宗哭梁山之崩士素端見前春官年不順成天子素服自貶損也君衣布搢本君衣布者謂若衞文公大布之衣大帛之冠是也玊藻大夫士去國素衣素裳素冠徹緣鞮屨素簚三月而復服言以喪禮自處也臣無君猶無天也徹猶去也鞮屨無絇之菲也簚覆笭也曲禮已上三條素服大司徒以本俗六安萬民六曰同衣服民雖有富者衣服不得獨異地官仲秋乃命司服具飭衣裳文繡有恒制有大小度有長短此謂祭服也文謂畫也祭服之制畫衣而繡裳衣服有量必循其故此謂朝燕及他服凡此為寒益至也詩云七月流火九月授衣於是作之可也冠帶有常因制衣服而作之也令月天子五年一巡守制度衣服正之革制度衣服者為畔畔者君討討誅也王制作異服以疑衆殺異服若聚鷸冠瓊弁也命服不入於市尊物非民所宜有布帛精麤不中數幅廣狹不中量不粥於市姦色亂正色不粥於市凡以其不可用也數升縷多少錦文珠玊成器不粥於市衣服不粥於市不示民以奢也關執禁以譏禁異服王制子曰長民者衣服不貳從容有常以齊其民則民德壹二不一也緇衣曰國家未道則不充其服焉謂若衞文公者未道未合於道玊藻君賜衣服服以拜敬君惠也賜君未有命弗敢即服也謂卿大夫受賜於天子者歸必致於其君君有命乃服之同上冕弁藏於私家非禮也是謂脅君刼脅之君也冕弁君之尊服禮運不學雜服不能安禮雜服冕服皮弁之屬雜或為雅學記衣服在躬而不知其名為罔罔猶罔罔無知貌論少儀已上十條雜衣服之事㡛氏涷絲以涚水漚其絲七日去地尺暴之故書涚作湄鄭司農云湄水温水也𤣥謂涚水以灰所泲水也漚漸也楚人曰漚齊人曰涹晝暴諸日夜宿諸井七日七夜是謂水涷宿諸井縣井中涷帛以欄為灰渥淳其帛實諸澤器淫之以蜃渥讀如繒人渥管之渥以欄木之灰漸釋其帛也杜子春云淫當為湼書亦或為湛鄭司農云澤器謂􅉸澤之器蜃謂灰也士冠禮曰素積白屨以魁柎之説曰魁蛤也周官亦有白盛之蜃蜃蛤也玄謂淫薄粉之令帛白蛤今海旁有焉清其灰而盝之而揮之清澄也於灰澄而出盝晞之晞而揮去其蜃而沃之而盝之而塗之而宿之更渥淳之明日沃而盝之朝更沃至夕盝之又更沃至旦盝之亦七日如漚絲也晝暴諸日夜宿諸井七日七夜是謂水湅考工記湅此一條絲帛染人掌染絲帛凡染春暴練夏纁𤣥秋染夏冬獻功暴練練其素而暴之故書纁作䵫鄭司農云䵫當讀為纁纁謂絳也夏大也秋乃大染𤣥謂纁𤣥者謂始可以染此色者𤣥纁者天地之色以為祭服石染當及盛暑熱潤始湛研之三月而後可用考工記鍾氏則染纁術也染𤣥則史傳闕矣染夏者染五色謂之夏者其色以夏狄為飾禹貢曰羽􅍒夏狄是其總名其類有六曰翬曰摇曰􅔧曰甾曰希曰蹲其毛羽五色皆備成章染者擬以為深淺之度是以放而取名焉掌凡染事天官鍾氏染羽以朱湛丹秫三月而熾之鄭司農云湛漬也丹秫赤粟𤣥謂湛讀如漸車帷裳之漸熾炊也羽所以飾旌旗及王后之車淳而漬之淳沃也以炊下湯沃其熾烝之以漬羽漬猶染也三入為纁五入為緅七入為緇染纁者三入而成又再染以黑則為緅緅今禮俗文作爵言如爵頭色也又復再染以黒乃成緇矣鄭司農云以論語曰君子不以紺緅飾又曰緇衣羔裘爾雅云一染謂之縓再染謂之竀三染謂之纁詩云緇衣之宜兮𤣥謂此同色耳染布帛者染人掌之凡𤣥色者在緅緇之間其六入者與考工記一染謂之縓今之紅也再染謂之頳染赤三染謂之纁纁絳也青謂之蔥淺青黑謂之黝黝黒貌周禮曰隂祀用黝牲斧謂之黼黼文畫斧形因名云爾雅季夏命婦官染采黼黻文章必以法故無或差貸婦功染人也采五色黑黃倉赤莫不質良無敢詐偽質正也良善也所用染者當得真采正善也以給郊廟祭祀之服以為旗章以别貴賤等級之度旗章旌旗及章服也采月令已上四條染右衣服皮弁者所以法古至質冠名也以鹿皮者取其文章也三王共皮弁素積裳也腰中辟積至質不易之服反古不忘本也麻冕者周宗廟之冠也前俛而後仰故謂之冕所以用麻為之者女功之始亦不忘本也垂旒者示不視邪纊塞耳示不聽讒也委貌周朝廷理政事行道德之冠委貎者有曲有貎也爵弁者周人宗廟之冠也周之冠色所以爵何為周尚赤所以不純赤但如爵頭何以本制冠者法天天色𤣥者不失其質故周加赤殷加白夏之冠色純𤣥聖人所以制衣服何以為絺絺巾蔽形表德勸善别尊卑也以狐羔為裘何取輕暖因狐死首丘明君子不忘本也羔者取跪乳遜順也天子狐白諸侯狐黃大夫倉士羔裘亦因别尊卑也所以必有紳帶示敬謹自約整也紼者蔽也行以蔽前天子朱紼諸侯赤紼以韋為之者反古不忘本也上廣一尺下廣二尺天一地二也長三尺法天地人也白虎通狐突曰衣身之章也章貴賤佩衷之旗也旗表也所以表明其中心故服其身則衣之純必以純色為服用其衷則佩之度衷中也佩玊者士君子常度閔二年左氏傳孔子曰生乎今之世志古之道居今之俗服古之服舎此而為非者不亦鮮乎哀公曰然則今夫章甫句屨紳帶而搢笏者此皆賢乎孔子曰否不必然今夫端衣𤣥裳冕而乘路者志不在於食葷斬衰簡屨杖而歠粥者志不在於飲食故生乎今之世志古之道居今之俗服古之服舎此而為非者雖有不亦鮮乎大戴記哀公問於孔子曰夫子之服其儒服與哀公館孔子見其服與士大夫異又與庶人不同疑為儒服而問之孔子對曰丘少居魯衣逢掖之衣長居宋冠章甫之冠丘聞之也君子之學也博其服也鄉丘不知儒服逢猶大也大掖之衣大𬒮禪衣也此君子有道藝者所衣也孔子生魯長而之宋而冠焉宋其祖所出也衣少所居之服冠長所居之冠是之謂鄉言不知儒服非哀公意不在於儒乃今問其服庶人禪衣𬒮三尺二寸祛尺二寸儒行𤣥冠紫綏自魯桓公始也蓋僭宋王者之後服也緌當用繢玉藻管仲鏤簋朱紘君子以為濫矣朱紘天子冕之紘也諸侯青組紘大夫士當緇組紘纁邊晏平仲澣衣濯冠以朝君子以為隘矣澣衣濯冠儉不務新禮器朝服之以縞也自季康子始也亦僭宋王者之後孔子曰朝服而朝卒朔然後服之謂諸侯與羣臣也諸侯現朔皮斥服玊藻季康子朝服以縞曾子問於孔子曰禮乎孔子曰諸侯皮弁以告朔然後服之以視朝若此者禮也朝服以縞僭宋禮也孔子惡指斥康子但言諸侯之禮而已而諸侯皮弁以告朔卒然後朝服以視朝朝服明不用縞家語鄭子華之弟子臧出奔宋十六年殺子華故好聚鷸冠鷸鳥名聚鷸羽以為冠非法之服鄭伯聞而惡之惡其服非法使盜誘之盜殺之于陳宋之間君子曰服之不衷身之災也衷猶適也詩曰彼其之子不稱其服詩曹風刺小人在位言彼人之德不稱其服子臧之服不稱也夫僖二十四年左氏傳子産為政上下有服公卿大夫服不相踰襄三十年左氏傳禮書綱目卷七十
