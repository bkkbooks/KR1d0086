body:
  text: 禮書綱目附録卷中婺源江永撰論琴以琴證論古今法十六條三分損益之法其來尚矣今以為不然而别為之法得無無徴而不信乎曰是非無徴也古之樂器流傳於今其最古雅而自然者莫如琴以琴證之則古今二法之離合判然於絃徽之間矣蔡氏之書證之於琴而不合其大者有六按舊法羽宫角徴之間為二變以補其缺始無遼濶之虞使古之為琴者誠慮此宜以二變間於正聲之間胡為舍此不用而命第六絃曰少宫第七絃曰少商此果何説乎其不合者一也樂工指法或以四絃為蕤賓變徴五絃為林鍾徵六絃為南吕羽七絃為應鍾變宫見陳暘樂書此俗工相傳之誤也古法原以初絃中徽應六絃散聲二絃中徽應七絃散聲舊法姑洗為黄鍾之角不可稍移易者琴家宫調却按初絃十徽應三絃散聲十徽位近仲吕而非姑洗此據古律言之今法十徽正當蕤賓其不合者二也中徽當琴體之半初絃為黄鍾清聲古人所謂黄鍾之宫清濁之衷律吕之本者此也黄鍾正宫調於此起調畢曲泛聲發於此者音獨洪大與他徽異聲以中為貴也蔡氏之書於黄鍾四寸半之下註曰無謂九分之寸竒零不盡仲吕反生所不及而旋宫所不用也使其果無而不用則初絃中徽為虚設矣胡為以泛聲扣之音獨隆隆然乎其不合者三也三分損益所生之律參差不齊以絃比管而計其尺寸初絃唯林鍾當九徽南吕當八徽若太簇則在十三徽之外姑洗則在十一徽之内十三徽則無律二變律則無徽胡為徽律相齟齬乎其不合者四也舊法旋宫一均止用七聲施之編鍾編磬猶可也用之於琴則不然琴每絃皆有三十六聲除太清者不用其餘各因曲調隨宜取聲何嘗限之以七若依蔡氏之法則按徽取聲皆不得出本均之外聲之可用者無幾且黄鍾一均有濁而無清應鍾一均有清而無濁只須彈一兩絃即可成曲調而諸絃諸徽皆無用有是理乎其不合者五也嘗試以趙彦肅所傳風雅詩譜按聲彈之只須初絃次絃其餘皆無用其聲全濁不成韵調可知詩譜之非真其於鹿鳴諸詩黄鍾太簇用清聲猶賴有此兩聲以濟之稍稍可聽若依蔡氏法此二律并不得用清聲法則宻矣其如聲不諧於耳何琴以聲律為體以徽為用彈者按徽取聲音調自諧次絃以後律漸長而位漸疎至六七絃則半律亦如正律之長故按徽之聲有正當律者有當律之前半後半與中間者如蔡氏之法必須用正用半與夫變律變半律按圖似有條理施之於琴則煩而難用且古琴曲之傳於今者其聲甚美何嘗拘拘蔡氏旋宫之法乎其不合者六也若如今法則五聲用其均齊者以為體取其應徽者以為用諸律則計尺寸而匀布之中徽既為黄鍾清聲矣十徽為四分絃之三於聲之位當角之中於律正當蕤賓猶一嵗之夏至也十三徽為八分絃之七於聲之位當商之近前於律正當夾鍾猶一嵗之春分也十二徽為六分絃之五於聲之位當商之近後於律則當姑洗九徽為三分絃之二於聲之位為徽之近前於律則當夷則此皆徽律正相當者也十一徽為角之近初仲吕當之而稍上八徽為羽之近前無射近之而在右此二徽律不正相當者别有其故後論泛聲中詳之七徽與律相當者五微差者二相當者其常微差者其變亦可知今律脗合於琴者多矣又因徽之自然者以為五聲之用次絃以下隨其調之髙下而進退焉此琴家之本法較之拘於三分損益泥於變聲變律者果孰離而孰合乎後之言律吕者當於古雅自然之器精宻考之一洗千餘年沿襲之説可也論琴徽泛聲應先天八卦横圖琴有十三徽説者但以為象閏而已然以泛聲彈之左手微按絃右手擊絃當徽則泠泠有清音不當徽則啞然無聲則其位置不可分毫移動此必有所以然之理古今未嘗發明永深思之而得四説其一則應先天八卦横圖也盖琴絃四倍黄鍾三尺六寸自龍齦至臨岳七徽為中界自臨岳至七徽以四徽為中界七徽至龍齦以十徽為中界又自臨岳至四徽以一徽為中界十徽至龍齦以十三徽為中界自一徽至四徽四寸半為上準象黄鍾子聲四徽至中徽九寸為中準象黄鍾中聲中徽至龍齦一尺八寸為下準象黄鍾濁聲重按之取木聲則自尾至首為三段徽按之取泛聲則自首至尾為四段一至四一段也四至七二段也七至十三段也十至十三四段也中兩段倍於前後段又併一徽内十三徽外凡為四寸半者有八儼然有先天八卦横圖之象焉一徽内無聲之處乾也一至四兑也四至七離與震也七至十巽與坎也十至十三艮也十三至龍齦無聲之處坤也乾坤老而不用故首尾無聲六子代父母用事故十三徽有聲也首尾雖無聲而聲實出於首尾則乾坤為不用之用猶一家父母雖老畢竟以父母為主也細推之第一徽兌之下畫也二徽兌之中畫也三徽兌之上畫也四徽為兌離之間少女中女相接之處也五徽離之中畫也六徽震之初畫也七徽為震巽之間兩儀大分界之處也七徽内陽主進畫自下而上七徽外陰主退畫自上而下八徽巽之下畫也九徽坎之中畫也十徽為坎艮之間中男少男相接之處也十一徽艮之上畫也十二徽艮之中畫也十三徽艮之下畫也三男三女皆用事發聲而少男少女血氣方充為人道生育之始尤用事故兌艮一畫各發一聲而離震巽坎一卦止發一聲也且其中尤有微妙者焉二五九與十二徽皆居本段三分之一三徽却後二分六徽却後四分八徽却前四分十一徽却前二分不與諸徽均列按之卦畫皆有至理盖四徽十徽居兩卦之間三徽當兑之上畫一陰為兌之主稍却而後不欲近乎離十一徽當艮之上畫一陽為艮之主稍却而前不欲近乎坎少女中女同居而志不同行少男中男並處而性不相合也且兌金也性畏火之鑠艮土也性惡水之濕故各却少許以避之造化自然之理也五徽正當離之中畫九徽正當坎之中畫若均布之六徽宜當震之中畫八徽宜當巽之中畫然離以中畫之陰為主震以下畫之陽為主故六徽當稍却而後乃得其本位坎以中畫之陽為主巽以下畫之陰為主故八徽當稍却而前乃得其本位也且火以木為體木以水為母故震木稍却而後以就火之炎巽木稍却而前以就水之潤也伏羲八卦横圖為作易之始其自然之理數乃見之於琴徽吁妙矣哉論泛聲應六十四卦横圖泛聲既應先天八卦横圖矣由三畫之卦積至六畫為六十四卦横圖又有自然之應者焉一徽内十三徽外皆無聲乾坤二宫不用也一徽則承乾宫末之地天泰而接乎兌宫之天澤履也二徽當火澤暌三徽當水澤節四徽則承地澤臨之後而接乎離宫之天火同人也五徽當水火既濟六徽當火雷噬嗑七徽當地雷復與天風姤之間陰陽之大交界也八徽當水風井九徽當火水未濟十徽則承地水師之後而接乎艮宫之天山遯也十一徽當火山旅十二徽當水山蹇十三徽終于地山謙而接乎坤宫之天地否也凡此諸徽當兩宫交界之間者則有乾坤之卦不當交界之間者必有坎離之卦乾坤坎離為四正故當此有聲也始承泰天地交也終接否天地不交也中於復姤陽始長陰始生也界於同人與師火之始水之終也少女少男之宫血氣並充水火皆當之中女少男之宫當其水火之交不交而不當其純卦純則不相為用也長男長女之宫火近震水近巽當其近不當其逺逺者先衰也天地之道陽有餘而陰不足長男猶可生育故六徽當火雷噬嗑泛聲猶有清音長女天癸先絶故八徽當水風井泛聲全濁似無聲也又以卦爻細推之二徽當暌之六五三徽若均布之當節之六三退二位當初九也五徽當既濟之六二六徽若均布之當噬嗑之九四退四位當初九也七徽後爻自上而下八徽若均布之當井之六四却後四位當初六也九徽當未濟之九二也十一徽若均布之當旅之九三却二位當初六也十二徽當蹇之九五也兌巽陰宫遇離而止遇坎而却震艮陽宫遇坎而止遇離而却男女異類宜相避也坎離二宫水火相遇則各止其所矣此又以卦象人事推之皆有自然之妙焉論泛聲應節氣泛聲應卦畫既有自然之理矣抑又有微妙者焉全絃猶一嵗也三尺六寸二十四分之每分一寸有半當一氣臨岳際則冬至也一徽内四寸半之地有三氣為冬至小寒大寒以其當冬令陽微之時故無聲一徽當立春陽氣出地故有聲二徽雨水也三徽驚蟄也四徽春分也五徽穀雨也六徽小滿也七徽夏至也八徽大暑也九徽處暑也十徽秋分也十一徽寒露也十二徽霜降也十三徽立冬也陽氣將入地故聲終於此自此至龍齦四寸半之地為小雪大雪冬至皆閉藏之時故無聲也自春分至秋分一月而一徽自立春至春分秋分至立冬皆一月而兩徽者春初為萬物之始生秋末為萬物之已成故聲獨多也四立之節唯立春立冬有徽而立夏立秋無徽者立春立冬為陽氣出入之限春夏與夏秋之間陽氣皆在地上非陰陽之大界故無聲也冬至雖無聲而聲皆出於首尾則十三徽之聲皆其聲猶乾元之統天也驚蟄一徽稍却而後寒露一徽稍却而前者驚蟄為木氣之動寒露為金氣之藏陽性常速故未至其地而先有聲陰性常緩故已過其地而後有聲也小滿一徽又却而後大暑一徽又却而前者凡聲音屬金四月金始生畏午火之鑠故却而後六月火氣盛金正伏故却而前皆金之避火也諸徽泛聲亦有不同中徽最洪大其聲隆隆然夏至陽極也諸徽稍不當徽即無聲獨中徽過一指猶有聲陽盛有餘也九徽十徽最清亮其聲空空然金氣正肅清也一二徽聲細陽方長也十二十三徽聲不甚發陽欲藏也八徽聲最不揚似無聲然大暑火盛而金伏也吁造化之理微矣哉抑妙矣哉論泛聲應納音泛聲之理以卦畫節氣推之既如此矣又不止是也六十甲子以數定為五行名曰納音其理與聲音相闗以琴徽推之亦有黙契者焉盖十三徽分為四段一段中有甲子一周細推其徽位之相當一為甲子二為甲寅三為壬寅四為甲子五為甲申六為壬寅七復為甲子七徽後左右相對八為壬寅九為甲申十為甲子十一為壬寅十二為甲申十三為甲子納音五行甲子壬寅為金甲申為水當金水則有聲也五行成質者金為清木土則濁矣有氣而未成質者水為清火則濁矣故獨當清者而鳴六十甲子三分之為甲子甲申甲辰若當甲辰則為火其音濁故三徽六徽八徽十一徽皆却至壬寅之位而鳴不與諸徽均列也此泛聲唯金水有聲若於七徽外取本聲則又五行皆全龍齦起甲子十三徽為已夘土十二徽甲申水十一徽戊子火十徽甲午金九徽甲辰火八徽癸丑木七徽甲子金凡二金二火一土一水一木五行之音皆備第八徽若匀布則當甲寅水五行缺一故退一位至癸丑木而五行全造化自然之妙如此總論泛聲琴必當徽乃有泛聲一絃十三聲七絃九十一聲正如人身動脉頭手足各三部左右十八處當其部切之乃應手否則不應也古今未有言泛聲所以然者今推之乃有四説八卦也六十四卦也節氣也納音也四者殊途而皆可通朱子所謂萬物各具一理萬理同出一原故推而無不通也既得琴徽之所以然而聲律有確據矣以下乃論取聲布律調絃換調之法論按徽取五聲五聲之體雖有定界而五聲之用取諸琴徽初絃十三徽為商十二徽為清商次絃之聲隨調髙下而應之下則應十三徽髙則應十二徽第十一徽為慢角十徽為正角三絃亦隨調髙下而應之下則應十一徽髙則應十徽九徽為徴四絃應之八徽為羽五絃應之中徽為少宫六絃應之次絃中徽為少商七絃應之諸徽泛聲本無五聲之序而按徽取本聲則絃於此取應諸調於此轉換有自然之理焉又論舊以太簇八寸為商於琴絃三尺二寸在十三徽外半寸然泛聲至十三徽三尺一寸五分而始發聲則當以十三徽為商盖十三徽外其聲太濁雖三尺二寸四分之地已交商界必更進九分而後有徽舊法三分徽益一上生商其如此處無徽何又舊法以姑洗為角其位在十一徽之内然角聲一發於十一徽一發於十徽彈慢角調商以十一徽為角彈宫調者却以十徽為角猶清商調以十二徽為商也舊法唯有姑洗為角故角徴間相去逺不得不有變徴以補其缺角不能再生宫故有變宫以續其斷證之於琴則不合矣諸絃布律法諸絃之律各以今律布之布至少少聲而止法如左一絃全律毎律減一寸五分半律毎律減七分五釐黄龍齦散聲大三尺四寸五分太三尺三寸外並十三徽夾三尺一寸五分三十徽姑三尺徽十二仲二尺八寸五分十一徽内二分蕤二尺七寸徽十林二尺五寸五分十徽九徽之間夷二尺四寸九徽南二尺二寸五分八徽外無二尺一寸分八徽内四應一尺九寸五分七徽外黄清中徽仲清一尺四寸二分五釐者六徽内從自七徽以上唯當徽近徽録之餘略後倣此夷清一尺二寸五徽黄清清九寸四徽二絃全律毎律減一寸七分一釐四毫竒半律每律減八分五釐七毫竒夾龍齦散聲姑三尺四寸二分八釐竒仲三尺二寸五分七釐竒並十三徽外蕤三尺八分五釐竒十三徽内林二尺九寸一分四釐竒十一徽外四分竒夷二尺七寸四分竒十徽外四分竒南二尺五寸七分竒十徽内無二尺四寸徽九應二尺二寸三分弱九徽八徽之間黄清二尺五分七釐竒八徽内大清一尺九寸七分太清一尺八寸八分六釐並七徽外夾清中徽林清一尺四寸五分七釐六徽内無清一尺二寸五徽黄清清一尺二分八釐竒四徽外二絃清商調用全律每律減一寸八分半律每律減九分姑龍齦散聲仲三尺四寸二分蕤三尺二寸四分並十三徽外林三尺六分徽十三内夷二尺八寸八分十一徽外一分南二尺七寸十徽無二尺五寸二分十徽九徽之間應三尺三寸四分九徽内黄清二尺一寸六分外八徽二分大清二尺七分太清一尺九寸八分夾清一尺八寸九分徽並七外姑清中徽夷清一尺四寸四分六徽内黄清清一尺八分内五徽三絃慢角調用全律每律減一寸八分八釐竒半律每律減九分四釐竒仲龍齦散聲借二分蕤三尺三寸九分竒林三尺二寸一釐竒並十三徽外夷三尺一分分十二徽外一南二尺八寸二分竒十一徽内無二尺六寸三分四釐竒竒十徽内六分應二尺四寸四分竒九徽外黄清二尺二寸五分竒徽九徽八之間大清二尺一寸六分竒八徽外太清二尺七分弱八徽内夾清一尺九寸七分竒姑清一尺八寸八分竒並七徽外仲清一尺七寸八分七釐竒中徽内一分二釐竒南清一尺四寸一分六徽内黄清清一尺一寸三分弱五徽内三絃宫調用全律每律減二寸半律每律減一寸蕤龍齦散聲林三尺四寸夷三尺二寸外並十三徽南三尺徽十二無二尺八寸分十一徽内七應二尺六寸十徽内黄清二尺四寸九徽大清二尺三寸太清二尺二寸並八徽外夾清二尺一寸八徽内姑清二尺仲清一尺九寸並七徽外蕤清中徽南清一尺五寸外六徽黄清清一尺二寸五徽四絃全律每律減二寸二分半半律每律減一寸一分二釐半夷龍齦散聲南三尺三寸七分半十三徽外無三尺一寸五分十三徽應二尺九寸二分半十一徽外黄清二尺七寸十徽大清二尺五寸八分竒太清二尺四寸七分半並九徽外夾清二尺三寸六分竒九徽内姑清二尺二寸五分九徽八徽之間仲清二尺一寸三分竒八徽蕤清二尺二分半林清一尺九寸一分竒並七徽外夷清中徽應清一尺四寸一分竒内六徽黄清清一尺三寸五徽外五絃全律毎律減二寸五分二釐三毫竒半律每律減一寸二分六釐一毫竒無龍齦散聲借六分太應三尺二寸八分竒十三徽外黄清三尺二寸太十二徽外大清二尺九寸竒十二徽内太清二尺七寸七分竒十徽外夾清二尺六寸五分十徽内五分姑清二尺五寸二分竒十徽外仲清二尺三寸九分太九徽蕤清二尺二寸七分竒九徽八徽之間林清二尺一寸四分竒八徽夷清二尺一分八釐竒南清一尺八寸九分竒並七徽外無清一尺七寸六分六釐竒中徽内三分竒黄清清一尺五寸一分竒六徽外五絃清商蕤賓調皆用全律每律減二寸三分寸之二半律每律減一寸三分寸之一無應之間龍齦散聲應三尺四寸六分竒黄清三尺二寸外並十三徽大清三尺六分竒十二徽外太清二尺九寸三分竒十二徽内夾清二尺八寸十一徽内姑清二尺六寸六分竒十徽内仲清二尺五寸三分奇徽十徽九之間蕤清二尺四寸九徽林清二尺二寸六分竒九徽八徽之間夷清二尺一寸三分竒八徽南清二尺無清一尺八寸六分竒並七徽外應清一尺七寸三分竒中徽内黄清清一尺六寸六徽外六絃黄清與一絃諸律位同六絃慢宫調用半律每律減一寸四分四釐初絃全律位與此同應鍾黄清之間龍齦散聲黄清三尺四寸五分六釐大清三尺三寸一分二釐太清三尺一寸六分八釐並十三徽外夾清三尺二分四釐十二徽外姑清二尺八寸八分十一徽外仲清二尺七寸三分六釐十徽外蕤清二尺五寸九分二釐十徽九徽之間林清二尺四寸四分八釐九徽外夷清二尺三寸竒九徽内南清二尺一寸六分八徽外無清二尺一分六釐内八徽應清一尺八寸七分二釐七徽黄清清一尺七寸二分八釐徽七内七絃夾清與二絃諸律位同七絃姑清與清商調二絃諸律位同論布律用六十甲子紀分數諸絃布律大畧如前法若欲加宻當以六十甲子紀其分數初絃龍齦起甲子之半十三徽當乙夘十二徽當甲申十一徽當乙丑之近前十徽當甲午九徽當甲辰八徽當癸丑之近前七徽復當甲子以後又以六十位布至四徽復當甲子自七徽外一位得三分七徽内一位得一分半次絃以下各以本徽本位起龍齦亦各如其絃而伸之位漸疎分數漸多如此則分數皆可考此未及詳布第言其大略云論隔絃取聲音諸絃散而扣之間一絃則應於第十徽而隨調轉絃必有一絃當退一徽至十一徽然後應皆理勢自然如此如宫調五絃十徽應七絃散聲四絃十徽應六絃散聲二絃十徽應四絃散聲初絃十徽應三絃散聲唯三絃獨退一徽於十一徽應五絃散聲朱子琴律説及答吴元士書皆深疑此事詳為之説似謂獨退一徽常在三絃不知此唯宫調調絃則如此若更一調則退徽又在他絃不常在三絃也宋中興志姜䕫樂議其圖説甚明朱子盖亦考之不詳耳又蔡西山先生謂琴唯黄鍾一均但絣定七絃以彈十一宫朱子謂季通之説不可行考之姜䕫圖説琴須轉絃合調蔡氏絣定七絃之説誠誤矣朱子又謂古人隨月調絃若調至應鍾則絃急恐絶此亦不然古法轉絃合調一調但轉兩三絃非盡取七絃而更之也調之髙下絃之緊慢上下不過一律非謂由黄鍾而漸緊以至於應鍾也姜䕫圖説言簡而明今因其説推之如左慢角調調絃法姜䕫曰黄鍾大吕並用慢角調故於大絃十一徽應三絃散聲古大吕比今律短按慢角調者角絃慢張也此調宫絃退一位取十一徽仲吕角應三絃散聲三絃仲吕角取十徽内無射羽應五絃散聲五絃近無射羽取十徽内夾鍾清商應七絃散聲二絃夾鍾商取十徽外夷則徴應四絃散聲四絃夷則徵取十徽黄鍾清應六絃散聲此調諸絃如常唯角絃慢故名凡徽律差數分者聲相近亦得相應後倣此清商調調絃法姜曰太簇夾鍾竝用清商調故於二絃十一徽應四絃散聲古太簇今在太夾之間古夾鍾今在夾姑之間按清商調者商絃髙一律也此調宫絃取十徽蕤賓角應三絃散聲三絃蕤賓角取十徽無射應鍾之間應五絃散聲五絃無應間羽取十徽内姑洗清商應七絃散聲三絃姑洗商取十一徽夷則徴應四絃散聲四絃夷則徴取十徽黄鍾清應六絃散聲此調商絃緊而五絃七絃亦隨之宫調調絃法姜曰姑洗仲吕蕤賓竝用宫調故於三絃十一徽應五絃散聲古姑洗今近仲吕古仲吕今近蕤賓古蕤賓今近林鍾按宫調者以初絃為主也宫絃取十徽蕤賓角應三絃散聲三絃蕤賓角取十一徽内無射羽應五絃散聲五絃近無射羽取十徽内夾鍾清商應七絃散聲二絃夾鍾商取十徽外夷則徴應四絃散聲四絃夷則徴取十徽黄鍾清應六絃散聲慢宫調調絃法姜曰林鍾夷則並用慢宫調故於四絃十一徽應六絃散聲古林鍾今為夷則古夷則今近南吕按慢宫調者大絃與第六絃慢張下半律也宫絃取十徽仲吕角應三絃三聲三絃仲吕角取十徽内無射羽應五絃散聲五絃近無射羽取十徽内夾鍾清商應七絃散聲二絃夾鍾商取十徽外夷則徴應四絃散聲四絃夷則徴取十一徽應鍾與黄鍾清間慢宫應六絃散聲此調宫絃慢角絃亦如之而六絃亦慢蕤賓調調絃法姜曰南吕無射應鍾竝用蕤賓故於五絃十一徽應七絃散聲古南吕今在南無間古無射今在無應間古應鍾今在廣黄間按蕤賓調者角絃緊當蕤賓位而第五絃亦隨之也此調宫絃取十徽蕤賓角應三絃散聲三絃蕤賓角取十徽無射應鍾之間應五絃散聲五絃無應間羽取十一徽内夾鍾清商應七絃散聲二絃夾鍾商取十徽外夷則徴應四絃散聲四絃夷則徴取十徽黄鍾清應六絃散聲古蕤賓近今林鍾若三絃散聲取今律林鍾則絃太緊恐不可張且二絃夾鍾商太逺而四絃夷則徴太促又於三絃十徽應五絃散聲五絃羽為應鍾則羽宫之間亦太促矣故三絃取角聲當今律之蕤賓更不可移而上古名此調為蕤賓與今法若暗合焉又按宫調三絃亦是蕤賓但取十一徽應五絃散聲五絃如其位此以十徽應五絃則五絃隨之而緊與宫調異五調中慢宫調最下慢角調次之宫調為中聲蕤賓調稍髙清商調最髙以今律言之黄鍾大吕太簇用慢角調夾鍾姑洗用清商調仲吕蕤賓林鍾用宫調夷則南吕用慢宫調無射應鍾用蕤賓調論四清聲二條論四清聲不可去樂有黄鍾大吕太簇夾鍾四清聲尚矣古者編鍾編磬皆十六枚是十二律如四聲也琴之六七絃雖只少宫少商而諸律清聲皆偹且復有少少聲焉又不止四清而已瑟有二十五絃亦諸清聲皆備也四清者宋樂志以為為夷則以下四律為宫使商角不陵僭宫聲然只有四清而角以後不妨用全律沈括馮元以為唯臣民不可陵君事物則不必避也黄鍾宫調雖以清黄起調其間仍用黄鍾全律為君故姑洗角雖用全律亦不為民陵君也古用四清極有調理原不始於王朴李照范鎮樂皆去四清不知何以成樂編鍾磬可去四枚管絃則清聲自具雖欲去之安得而去之乎論陳𤾉樂書之疎率陳氏樂書其主意大約以為先王之樂唯有五聲十二律後世乃有二變四清此皆鄭衛之音凡八音之器皆當去二變四清以復古此耳食之學粗率之見未嘗深思細考其故者也二變誠非自然之理然欲去二變當先去三分損益之説如琴絃之用正聲則二變不待去而自去若不考其所以用二變之由而仍泥三分損益之説則角徴與羽宫之間安得不用二變以補其缺乎至欲去四清尤為不思之甚無論旋宫避陵犯四清不當去即欲去之而勢亦不可得而去如琴初絃中徽内皆是清聲次絃中徽外已有清聲五絃則十三徽以内皆是清聲試問彈琴者唯取全律濁聲乎陳氏謂七絃琴為害理必去二絃以復舜之五絃試問五絃果無清聲乎不唯五絃即一絃至中徽已是清聲矣如其説雖孫登之一絃琴尚多一半為無用寧有是理乎宋太宗加二絃有九絃琴清聲皆具陳氏謂當益一絃取其倍五聲獨不思五聲加倍清聲不已居半乎竹聲中簫管箎笛之屬凡七孔九孔者陳氏皆惡之五孔六孔八孔者陳氏皆取之謂五孔合五聲六孔合六律八孔合八音此但欲以數目比擬無異兒童之見不知管笛之屬黄鍾宫聲皆出中管諸孔皆閉五孔者四孔為商角徴羽餘一孔即是半宫聲六孔者五孔具十一律上一孔必是黄鍾清非五孔即為五聲六孔即為六律也八孔則四清皆具矣乃以應八音取之試問一器與八音有何交涉乎陳氏徒嘖嘖於四清其粗率不思如此彼所據以為説者但以周禮有凡為樂器以十有二律為之數度一語耳不知半律清聲亦是本律之半未嘗出於十二律之外也善乎翰林學士馮元之駁李照曰前聖制樂取法非一故有十三管之和十九管之巢三十六簧之竽二十五絃之瑟十二絃之筝九絃七絃之琴十六枚之鍾磬各自取義寧有一之於律吕専為十二之數也四清聲之説正為臣民相避以為尊卑今若止用十二數旋相考擊至夷則以下四管為宫之時臣民相越則陳犯之音作此甚不可者也楊徐之破范鎮曰編鍾編磬十六其來逺矣不獨見於周禮小胥之説漢成帝時犍為郡於水濱得古磬十六枚帝因是陳禮樂雅頌之聲以風化天下其事載於禮樂志漢承秦秦未嘗制禮作樂其稱古磬十六者乃二帝三王之遺法也王朴樂内編鍾編磬以其聲律太髙歌者難逐故四清聲置而不用及神宗朝下二律則四清皆用而諧協矣今鎮所製匏竹之器簫必十六管是四清在其間矣自古無十二管之簫豈簫韶九成之樂已有鄭衛之聲乎此皆説之不可易者李范二家已屬謬見陳氏徒悅乎去鄭復雅之名而不察其實以二家之識為髙其未之深思乎論旋宫一條論旋宫有活法十二律旋相為宫古有是言後人論律講於此者詳矣一均七聲有用正律者有用半律者有用變律與變半律者以此布為八十四聲六十調甚易及其被之管絃施之金石常齟齬而難行竊意旋宫當别有活法或一均不必限以七聲或徴羽二聲之律不必短於本宫此當與知音者參定未可執一定之圖説膠柱而鼓瑟也論樂調三條辯黄鍾全律起調畢曲之非樂之有調其理甚微其勢皆出於自然如初一聲為某聲其尾亦是此聲其中曲折皆隨初一聲之髙下而抑揚焉調平者衆聲皆隨之而平調髙者衆聲皆随之而髙調下者衆聲皆隨之而下大約太濁太清之聲不可以起調如初一聲太下則其後遇當下之聲更不能抑而管無可吹絃無可彈歌者亦無其聲矣或初一聲太髙則其後遇當髙之聲更不能揚而管無可吹絃無可彈歌者亦不能及此聲矣故起調之聲必在清濁之間其前更有下於此者其後更有髙於此者然後可以抑揚曲折而成曲調焉儒家論樂不知此理謂黄鍾一均皆用正律更無清聲變律雜其間為最純粹是謂初一聲即用黄鍾全律起調如此則太簇以下六律皆短聲皆髙但有揚而無抑豈能成曲調乎試以管絃騐之笛家曽有以中管之合字為調首琴家曽有以初絃之散聲為調首者乎凡雅樂所謂黄鍾清宫俗樂所謂正宫者皆以半黄鍾清聲起調而非以全律濁聲起調也黄鍾清聲起調其後更有清聲可以揚其前皆下於調首可以抑是以能成調也以今笛家俗樂騐之有所謂上字調者其調平下五孔皆開更髙焉則為六字調字譜皆移上二聲或一聲更下焉則為尺字調字譜皆移下一聲若過乎六字尺字則太髙太下不能成調矣雅樂亦相似也宋時雅樂俗樂皆無徴角調但有宫商羽三調而已宫者清宫商者清商皆不用黄鍾大吕太簇夾鍾四濁聲也徽宗使人强為徴調但能以徴聲起而不以徴聲終見朱子語類此不知何故或由風氣使然乎由此觀之雅樂起調之聲未甚下者即不能為焉有黄鍾最濁之聲而可為者乎朱子論樂初亦以為黄鍾五調皆以黄鍾正律起調畢曲其後云古人亦用黄鍾清聲為調前説非是見朱子語類九十二卷輔廣録注中然則朱子後亦自覺其誤矣蔡氏不習於音不知樂調有自然之理當時趙彦肅傳得唐時鄉飲酒風雅十二詩譜小雅六詩為黄鍾清宫調二南六詩為無射清商調皆以清黄起調畢曲雖其譜未必盡是而用清黄為調自是勢不得不然蔡氏想當見之蔽於黄鍾無半律之説故不肯信耳再論樂調或問黄鍾全律既不可起調徴角二聲又不能為調然則十二律之能為調者鮮矣不知隋之萬寳常唐之祖孝孫何以皆能為八十四調乎且周禮三大祭樂但無商調而有宫角徴羽齊景公時有徴招角招郢中曲有流徴髙漸離易水擊筑有變徴此又何以説乎曰樂聲有流變而為樂有活法考古者當以意㑹可也凡樂皆氣也人亦氣也同在鴻濛一氣之中不得不隨氣運而遷流如詩文為人聲亦樂之類古之詩文後人不能作則後世不能為此樂調古人能為之又何足怪乎且古人為樂當有活法未必如後人之律書一均定用七聲而徴羽皆不可過宫商也齊之徴招角招未知其聲何如若郢中之流徴易水之變徴亦俗樂之類後世宴樂固自有徴調亦不為異也若萬寳常史言其撰樂譜論八音旋宫之法為八十四調百四十四律其聲淡雅不為時所好何妥易之今不可考祖孝孫作唐雅樂為四十八曲八十四調亦不知其果皆應律否大約古人之能為諸調者當必有活法若如儒家之説即一琴已不能易一均而况八音皆能旋宫乎論龜兹琵琶七調隋史言龜兹人蘇祗婆善琵琶調有七種以其七調勘校七音宜若符契一曰婆陁力華言平聲即宫聲也二曰雞識華言長聲即商聲也三曰沙識華言質直聲即角聲也四曰沙侯加濫華言應聲即變徴聲也五曰沙臘華言應聲即徴聲也六曰般瞻華言五聲即羽聲也七曰侯利􅝍華言斛牛聲即變宫聲也鄭譯因習而彈之始得七聲之正按此則西域亦有七音然其語與華異未必果合於五聲二變也琴家却只有五調慢宫慢角之類張琴有𦂳慢何以不能為七調乎慢宫調有似於變宫蕤賓調却是角聲之髙者不得謂之變徴然則西域之七調未必果合七音其所謂沙侯加濫調安知非角聲之髙者乎論造律三條論造律以聲和為主制律求聲氣之元事之最難者也黄鍾之管㝠符天道若不可以毫釐差然其分數甚微非人所能察使有天生自然之律管則可若出於人為安能使其無毫釐之差竊謂造律必須善審音者聽之聲和為主聲既和矣雖有小差於樂亦無大害譬如工人製琴製笙製簫笛者其分寸豈能畫一哉吹之彈之而聲和焉斯為善器矣邢雲路論之最當特載之邢曰古樂既亡欲求聲器者宜何施而可亦唯依古以千二百黍求長九寸空圍九分之管使其和也則已如有不和必其黍之顆與管之分未當也則惟本吾之平其心易其氣徐聽人聲之髙下上下考之以求其中聲盖人之聲無古今一也古尺之分寸與黍之大小不可考矣即今上黨之黍有大者次者不一安知古所用者為何等黍又安知其律之分寸視後代何尺為當哉但以人聲察之以耳聰審之以九寸千二百黍約之斯可矣程子曰黄鍾之聲亦不難定世自有知音者將上下聲考之既得正便將黍實其管㸔管實得幾粒然後推而定法可也張子曰律吕有可求之理徳性淳厚者必能知之朱子曰樂之為教今無師授當立一學樂學使士大夫習之必有精通者出三説皆探本之論也論人身取律寸法古之尺寸雖出於律而制字之意則皆本於人身人身中指第二節其内兩紋相距為寸醫家鍼炙量人穴道所謂同身寸者取諸此也今人伸大指與食指為五寸張兩手為五尺古法以張兩手為一尋然則今之五尺當古之八尺今之五寸當古之八寸而古之一尺當今工人尺六寸二分五釐也以中指第二節内紋為一寸者度之自中指端至掌後第二節横紋而九寸至第三節横紋而一尺然則古之黄鍾九寸即今人中指端至掌後第二節横紋之度也雖人有髙下手指有長短以中人量之相去盖不甚逺是則一伸掌而黄鍾之廣瞭然如在目前矣夫律寸天生也人身之寸亦天生也二者當不約而同與其求之於古尺古器求之於縱黍横黍荒逺者無稽紛紜者難信曷若求之中人之手腕指節為最近而可據者乎夫律數精微雖未可執此一途以求合唯以人身之寸為主而更以古器古法參互而審定之雖不中或亦不逺乎論人聲合管聲人聲之有宫商角徴羽也其别有四有一韻具五聲者字音出於喉為宫出於舌為商出於牙為角出於齒為徴出於唇為羽即切韻三十六字母之分屬喉舌牙齒唇與半舌半齒是也有一韻屬一聲者其韻合口呼之為宫開口呼之為商張牙呼之為角齊齒呼之為徴聚吻呼之為羽如公韻屬宫岡韻屬商是也又一韻之中重濁之字為宫商輕清之字為角徴羽如彈琴操者遇重濁之字則彈重濁之聲以應之遇輕清之字則彈輕清之聲以應之是也又有同是一字隨其曲調之髙下而歌之遇髙調則此字聲髙遇平調則此字聲平遇低調則此字聲低則一字皆可為宫商角徴羽也樂以人聲為主人聲出於喉猶管聲出於管中造律者欲求聲氣之元既酌乎分寸之度空圍之量更以人聲參定之可也論候氣二條論候氣不可信律管固有冥符天道之理然欲埋之於地以候氣恐不可信天氣一而地氣殊雖使律之長短廣狹皆如法其能一一氣應灰飛耶事未經目驗不敢臆斷也邢雲路亦深疑此事云録袁黄候氣法明袁黄號了凡通律厯之學所著有厯法新書闗中李世達為之作序中間有與張江陵論候氣五不合之説頗有理此事史不載又不見於他書僅見此序而已永恐久而失墜特録之以備言律學者考覈其言依法候之而飛灰皆應未知果有此否也李序云昔張江陵傲睨一世無所許可獨折節於了凡延為諸子師江陵自謂深明律學命官依占法造三層宻室又依蔡氏多截管以候氣不應請袁往視之復命曰候之室宜擇清静間曠之地今瓦礫叢積則地氣不清一不合也築室三層専固地氣耳故外室之墻掘地三尺而築之二層木室之坂宜入地一尺六寸三層室入地七寸六分今皆不然止可封地上之氣而不可封地中之氣二不合也外室之門宜向子第二層門宜向午第三層門復向子所以反復而固氣也今皆向午三不合也聲氣之元竒之象數厥有自然之理必心探造化之秘者始可制器諧聲不然求之累黍酌之古器皆不可廢今觀所截諸管大小不倫四不合也天地之形常相參差故天之午常偏於丙上二分五釐今日圭所測是也地之午常偏午上二分五釐冬至候黄鍾之宫宜埋壬子之中一室只有一位豈可多截管乎五不合也由是託之擇地於天壇之南隅依法候之而飛灰皆應張甚喜欲委之正樂袁請先改厯法語不合遂稱疾求歸歸未幾而張變作矣律吕餘論四條聲音自有流變凡聲氣也人亦氣也同在一氣之中其勢自有流變非人之所能禦古樂之變為新聲亦猶古禮之易為俗習其勢不得不然今人行古禮有不安於心者則聴古樂亦豈能諧於耳乎耳不諧則神不洽神不洽則氣不和不洽和亦何貴於樂若曰樂者所以事神非徒以悅人則亦不然凡神依人而行人之所不欣暢者神聽亦未必其和平也故古樂難復亦無庸强復但當於今樂中去其粗厲髙急繁促淫蕩諸聲節奏紆徐曲調和雅稍近乎周子之所謂淡者焉則所以歡暢神人移風易俗者在此矣若不察乎流變之理而欲髙言復古是猶以人心不安之禮强人以必行也豈所謂知時識勢者哉俗樂可求雅樂俗樂以合四一上勾尺工凡五六十字為譜十二律與四清聲皆在其中隨其調之髙下而進退焉所謂雅樂亦當不出乎此為雅樂者必深明乎俗樂之理而後可求雅樂即不能肄及於此者亦必與俗樂工之稍知義理者參合而圖之未有徒考器數虚談聲律而能成樂者也宋世制樂諸賢帷劉几知俗樂常與伶人善笛者遊其餘諸君子既未嘗肄其事又鄙伶工為賤技不足與謀則亦安能深知樂中之曲折哉判雅俗為二途學士大夫不與伶工相習此亦從來作樂者之通患也樂器不必泥古聲寓於器器不古雅則聲亦隨之然天下事今不如古者固多古不如今者亦不少古之笙用匏今之笙用木匏音劣於木則何必拘於用匏而謂八音不可缺一乎古之木聲用柷敔後世節樂用拍板而雅樂猶用柷敔柷敔之音粗厲拍板之音清越則亦何必不用拍板乎後世諸部樂器中擇其善者用之可也度量權衡不必泥古古法度量權衡皆受法於黄鍾天下皆欲其齊同古之度量權衡相去不甚遠故齊之猶易後世度長量大權重與古懸殊民間用之既乆勢難改易千里之内三者必不能同而民俗便之逺方之懋遷者正因度量衡之同而計其錙銖以收贏餘之利則不同不足為病正所以為利也宋政和間作大晟樂以律尺及斗斛枰新式頒行天下限以月日令天下盡毁舊器不從令者許民首告其擾民不已甚乎後之作樂者律成而制三器藏之内府以備他日之校勘可也若民間所用固當聽從民便毋斤斤於法古似亦事勢之宜焉已禮書綱目附録卷中
