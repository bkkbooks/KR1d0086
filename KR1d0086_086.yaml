林集仲于林灌無木太其清黄鳴南喈無喈清黄葛清黄之清太覃林兮清黄施林于南中無谷清黄維林葉南莫南莫是刈是濩姑為林絺姑為太綌姑服太之無太斁黄言清黄告姑師南氏林言林告姑言太歸黄薄黄汚姑我太私姑薄姑澣仲我林衣南害南澣林害無否太歸清黄寧南父林母黄葛覃三章章六句無射清商俗呼越調采清黄采姑卷林耳南不林盈姑頃林筐南嗟中我林懐無人太寘黄彼如周太行黄陟清黄彼無崔南嵬林我林馬姑虺南隤林我中姑姑酌南彼無金姑罍太維清太以林不南永無懐清黄陟黄彼姑髙南岡林我林馬姑𤣥南黄林我姑姑太酌姑彼黄兕太觥姑維清黄以林不南永無傷清黄陟清黄彼南砠清黄矣林我黄馬姑瘏太矣黄我中僕姑痡林矣南云清黄何南吁無矣清黄卷耳四章章四句無射清商俗呼越調維黄鵲姑有中巢林維清黄鳩無居南之林之中子林于無歸太百清黄兩林御南之清黄維黄鵲林有南巢林維林鳩姑方太之黄之林子黄于林歸姑百太兩黄將太之黄維清黄鵲無有南巢林維南鳩林盈南之清黄之清黄子南于姑歸林百清太兩林成南之清黄鵲巢三章章四句無射清商俗呼越調于清黄以南采林繁南于林沼姑于太沚姑于黄以姑用太之姑公清黄侯南之無事黄于黄以林采黄繁南于太澗黄之太中姑于姑以南用林之南公清黄侯南之清太宫黄被清黄之清太僮南僮林夙清太夜林在南公清黄被黄之姑祁太祁姑薄林言南還無歸黄采繁三章章四句無射清商俗呼越調于黄以南采林蘋南南姑澗林之南濵林于林以姑采仲藻林于彼行潦于以盛之維筐及筥于以湘之維錡及釜于以奠之宗室牖下誰其尸之有齊季女采蘋三章章四句無射清商俗呼越調右周南召南六詩譜周南召南正始之道王化之基故用之鄉人焉用之邦國焉詩序酒朱子曰鄉飲及鄉射禮合樂周南闗雎葛覃巻耳召南鵲巢采蘩采蘋燕禮亦云遂歌鄉樂亦即此六篇也鄭氏云合樂謂歌樂與衆聲皆作周南召南國風篇也王后國君夫人房中之樂歌也闗雎言后妃之徳葛覃言后妃之職巻耳言后妃之志鵲巢言國君夫人之徳采蘩言國君夫人不失職采蘋言卿大夫之妻能修其法度夫婦之道生民之本王政之端此六篇者其教之原也故國君與其臣下及四方之賔燕用之合樂也鄉樂者風也小雅為諸侯之樂大雅頌為天子之樂大戴禮云凡雅二十六篇其八篇可歌鹿鳴貍首鵲巢采蘩采蘋伐檀白駒歌騶虞八篇廢不可歌七篇商齊可歌也三篇問晉志云漢末杜夔傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭朱子曰按大戴禮頗有闕誤其篇目都數皆不可考至漢末年止存三篇而加文王又不知其何自來也其後改作新辭舊典遂廢至唐開元鄉飲酒禮其所奏樂乃有此十二篇之目而其聲今亦莫得聞矣此譜乃趙彦肅所傳云即開元遺聲也古聲亡滅已久不知當時工師何所考而為此也竊疑古樂有唱有嘆唱者發歌句也和者繼其聲也詩詞之外應更有疊字散聲以歎發其趣故漢晉之間舊曲既失其傳則其辭雖存而世莫能補為此故也若但如此譜直以一聲叶一字則古詩篇篇可歌無復樂崩之歎矣夫豈然哉又其以清聲為調似亦非古法然古聲既不可考則姑存此以見聲歌之彷彿俟知樂者考其得失云序案儀禮經傳通解以十二詩譜為詩樂篇目録題云古亦無此篇而大樂遺聲其絶乆矣今取世傳唐開元十二詩譜補之以粗見其彷彿然亦未知其果有以合於古之遺聲否也字又案趙彦肅朱子門人子欽簫韶九成鳳凰來儀簫古文作箾舞者所執之物季札觀周樂見舞韶箾者則箾韶盖舜樂之總名也今文作簫故先儒誤以簫管釋之功以九叙故樂以九成来儀者來舞而有容儀也益稷舞干羽于兩階七旬有苗格干楯羽翳也皆舞者所執也兩階賔主之階也大禹謨大司樂以樂舞教國子舞雲門大卷大咸大磬大夏大濩大武此周所存六代之樂黄帝樂曰雲門大巻黄帝能成名萬物以明民共財言其徳如雲之所出民得以有族類大咸咸池堯樂也堯能殫均紹刑法以儀民言其徳無所不施大磬舜樂也言其德能堯之道也大夏禹樂也禹治水傅土言其徳能大中國也大濩湯樂也湯以寛治民而除其邪言其徳能使天下得其所也大武武王樂也武王伐紂以除其害言其徳能成武功乃分樂而序之舞雲門以祀天神舞咸池以祭地示舞大磬以祀四望舞大夏以祭山川舞大濩以享先妣舞大武以享先祖雲門之舞冬日至于地上之圜丘奏之咸池之舞夏日至於澤中之方丘奏之九磬之舞於宗廟之中奏之詳見樂制樂師掌國學之政以教國子小舞謂以年幼少時教之舞内則曰十三舞勺成童舞象二十舞大夏凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞故書皇作䍿鄭司農云帗舞者全羽羽舞者析羽皇舞者以羽冐覆頭上衣飾翡翠之羽旄舞者氂牛之尾干舞者兵舞人舞者手舞社稷以帗宗廟以羽四方以皇辟廱以旄兵事以干星辰以人䍿讀皇𤣥謂帗析五采繒今靈星舞子持之是也皇雜五采羽如鳯凰色持以舞人舞無所執以手袖為威儀四方以羽宗廟以人山川以干旱暵以皇詔來瞽臯舞注詳樂制大胥掌學士之版以待致諸子鄭司農云學士謂卿大夫諸子學舞者版籍也今時鄉户籍世謂之户版大胥主此籍以待當召聚學舞者卿大夫之諸子則案此籍以召之漢大樂律曰卑者之子不得舞宗廟之酎除吏二千石到六百石及闗内侯到五大夫子先取適子髙七尺以上年二十到年三十顔色和順身體修治者以為舞人與古用卿大夫子同義以六樂之會正其位大同六樂之節奏正其位使相應也言為大合樂習之以序出入舞者以長幼次之使出入不紕錯凡祭祀之用樂者以鼓徴學士撃鼓以召之文王世子曰大昕鼓徴所以警衆小胥掌學士之徴令而比之觵其不敬者比猶校也不敬謂慢期不時至也觵罰爵也詩云兕觵其觩廵舞列而撻其怠慢者撻猶抶也抶以荆扑籥師掌教國子舞羽龡籥文舞有特羽吹籥者所謂籥舞也文王世子曰秋冬學羽籥詩云左手執籥右手秉翟祭祀則鼓羽籥之舞鼓之者恒為之節司干掌舞器舞器羽籥之屬祭祀舞者既陳則授舞器既舞則受之既已也受取藏之官並春司兵祭祀授舞者兵授以朱干玉戚之屬司戈盾祭祀授舞者兵諸子凡樂事正舞位授舞器位佾處也並夏官鼓人凡祭祀百物之神鼓兵舞帗舞者兵謂干戚也帗列五采繒為之有秉皆舞者所執舞師掌教兵舞帥而舞山川之祭祀教帗舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀教皇舞帥而舞旱暵之事羽析白羽為之形如帗也四方之祭祀謂四望也旱暵之事謂雩也暵熱氣也鄭司農云皇舞蒙羽舞書或為䍿𤣥為皇析五采羽為之亦如帗凡野舞則皆教之野舞謂野人欲學舞者凡小祭祀則不興舞小祭祀王𤣥冕所祭者興猶作也並地官凡學世子及學士必時四時各有宜學士謂司徒論俊選所升於學者春夏學干戈秋冬學羽籥皆於東序干盾也戈句孑㦸也干戈萬舞象武也用動作之時學之羽籥籥舞象文也用安静之時學之詩云左手執籥右手秉翟小樂正學干大胥賛之籥師學戈籥師丞贊之四人皆樂官之屬也通職秋冬亦學以羽籥小樂正樂師也周禮樂師掌國學之政教國子小舞大胥掌學士之版以待致諸子春入學舍菜合舞秋頒學合聲籥師掌教國子舞羽吹籥大樂正學舞干戚戚斧也子文王世十有三年舞勺成童舞象先學勺後學象文武之次也成童十五以上二十舞大夏大夏樂之文武備者也三舞今皆亡内則右樂舞吴公子札來聘請觀於周樂見舞象箾南籥者象箾舞所執南籥以籥舞也皆文王之樂曰美哉猶有憾美哉美其容也文王恨不及已致太平見舞大武者武王樂曰美哉周之盛也其若此乎見舞韶濩者殷湯樂曰聖人之宏也而猶有慙德聖人之難也慙於始伐見舞大夏者禹之樂曰美哉勤而不徳非禹其誰能脩之盡力溝洫勤也見舞韶箾者舜樂曰徳至矣哉大矣如天之無不幬也幬覆也如地之無不載也雖甚盛徳其蔑以加於此矣觀止矣若有他樂吾不敢請矣魯用四代之樂故及韶箾而季子知其終也季札賢眀才博在吴雖已涉見此樂歌之文然未聞中國雅聲故請作周樂欲聴其聲然後依聲以參時政知其興衰也聞秦詩謂之夏聲聞頌曰五聲和八風平皆論聲以參政也舞畢知其樂終是素知其篇數傳襄二十九年左氏舞莫重於武宿夜武宿夜武曲名也義祭先鼓以警戒三步以見方再始以著往復亂以飭歸先鼓將奏樂先擊鼓以警戒衆也三步謂將舞必先三舉足以見其舞之漸也再始以著往武王除喪至盟津之上紂未可伐還歸三年乃遂伐之武舞再更始以明伐時再往也復亂以飭歸謂鳴鐃而退明以整歸也諸侯徳盛而教尊五榖時熟然後賞之以樂故其治民勞者其舞行綴逺其治民逸者其舞行綴短故觀其舞知其徳民勞則徳薄鄼相去逺舞人少也民逸則徳盛鄼相去近舞人多也並樂記諸侯朱干設錫冕而舞大武諸侯之僭禮也言此皆天子之禮也干盾也錫傳其背如龜也武萬舞也郊特牲王子頽享五大夫樂及徧舞皆舞六代之樂左莊二十年氏傳鄭伯享王于闕西辟樂備闕象魏也樂備備六代之樂氏莊二十一年左傳宋公享晉侯于楚丘請以桑林桑林殷天子之樂名荀罃辭辭讓之荀偃士匄曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀魯有禘樂賔祭用之禘三年大祭則作四代之樂别祭羣公則用諸侯樂宋以桑林享君不亦可乎言具天子樂也舞師題以旌夏師樂師也旌夏大旌也題識也以大旌表識其行列晉侯懼而退入於房旌夏非常卒見之人心偶有所畏去旌卒享而還衮十年左氏傳魯以禘禮祀周公於大廟朱干玉戚冕而舞大武皮弁素積裼而舞大夏朱干赤大盾也戚斧也冕冠名也諸公之服自衮冕而下如王之服也大武周舞也大夏夏舞也明堂位夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也管象吹管而舞武象之樂也朱干赤盾戚斧也此武象之舞所執也佾猶列也大夏禹樂文舞也執羽籥文武之舞皆八列互言之耳康猶褒大也祭統隠公五年考仲子之宫初獻六羽成仲子宫安其主而祭之公問羽數故書羽考仲子之宫將萬焉萬舞也公問羽數於衆仲問執羽人數對曰天子用八八八六十四人諸侯用六六六三十六人大夫四四四十六人士二二二四人士有功賜用樂夫舞所以節八音而行八風八音金石絲竹匏土革木也八風八方之風也以八音之器播八方之風手之舞之足之蹈之節其制而序其情故自八以下唯天子得盡物數故以八為列諸侯則不敢用八公從之於是初獻六羽始用六佾也魯唯文王周公廟得用八而他公遂因仍僭而用之今隠公特立此婦人之廟詳問衆仲衆仲因明大典故傳亦因言始用六佾其後季氏舞八佾于庭知唯在仲子廟用六春秋左氏傳譏始僭諸公也六羽之為僭奈何天子八佾佾者列也八人為列也八八六十四人法八風諸公六六人為列六六三十六人法六律諸侯四四人為列四四十六人法四人始僭諸公昉於此乎前此矣前此則曷為始乎此僭諸公猶可言也僭天子不可言也前僭八佾於恵公廟大惡不可言也公羊傳舞夏天子八佾諸公六佾諸侯四佾夏大也大謂大雉大雉翟雉佾之言列八人為列又有八列八八六十四人也並執翟雉之羽而舞也天子用八象八風諸公用六降殺以兩也初獻六羽始僭樂矣穀梁傳萬者何干舞也干謂楯也能為人扞難而不使害人故聖王貴之以為武樂萬者其篇名武王以萬人服天下民樂之故名之云爾籥者何籥舞也籥所吹以節舞也吹籥而舞文樂之長宣八年公羊傳將禘於襄公萬者二人其衆萬於季氏禘祭也萬舞也於禘公當三十六人臧孫曰此之謂不能庸先君之廟不能用禮也蓋襄公别立廟昭二十五年左氏傳子家駒曰諸侯僭於天子大夫僭於諸侯久矣設兩觀乘大路朱干干楯也以朱飾楯玉戚戚斧也以玉飾斧以舞大夏大夏夏樂也周所以舞夏樂者王者始起未制作之時取先王之樂與已同者假以風化天下天下大同乃自作樂取夏樂者與周俱文也王者舞六樂於宗廟之中舞先王之樂明有法也舞已之樂明有制也舞四夷之樂大徳廣及之也東夷之樂曰侏離南夷之樂曰任西夷之樂曰禁北夷之樂曰昧八佾以舞大武此皆天子之禮也昭二十五年公羊傳孔子謂季氏八佾舞於庭是可忍也孰不可忍也季氏魯大夫季孫氏也佾舞列也天子八諸侯六大夫四士二毎佾人數如其佾數或曰毎佾八人未詳孰是季氏以大夫而僭用天子之禮樂孔子言其此事尚忍為之則何事不可忍為或曰忍容忍也盖深疾之之辭兩范氏曰樂舞之數自上而下降殺以兩而已故之間不可以毫髮僭差也孔子為政先正禮樂則季氏之罪不容誅矣謝氏曰君子於其所不當為不敢須臾處不忍故也而季氏忍此矣則雖弑父與君亦何所憚而不為乎論語禮書綱目卷八十四
