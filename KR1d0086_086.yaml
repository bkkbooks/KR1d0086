body:
  text: 禮書綱目卷八十四婺源江永撰歌舞樂五補詩言志歌永言聲依永律和聲心之所之謂之志心有所之必形於言故曰詩言志既形於言則必有長短之節故曰歌永言既有長短則必有清濁髙下之殊故曰聲依永聲者宫商角徴羽也大抵歌聲長而濁者為宫以漸而清且短則為商為角為徴為羽所謂聲依永也既有長短清濁則又必以十二律和之乃能成文而不亂假令黄鍾為宫則太簇為商姑沈為角林鍾為徴南吕為羽蓋以三分損益隔八相生而得之餘律皆然即禮運所謂五聲六律十二管還相為宫所謂律和聲也舜典戛擊鳴球搏拊琴瑟以詠下管鼗鼓合止柷敔笙鏞以間詳樂制大司樂九徳之歌於宗廟之中奏之鄭司農云九徳之歌春秋傳所謂水火金木土榖謂之六府正徳利用厚生謂之三事六府三事謂之九功九功之徳皆可歌也謂之九歌也大師教六詩曰風曰賦曰比曰興曰雅曰頌教教瞽矇也風言賢聖治道之遺化也賦之言鋪直鋪陳今之政教善惡比見今之失不敢斥言取比類以言之興見今之美嫌於媚諛取善事以喻勸之雅正也言人之正者以為後世法頌之言誦也容也誦今之徳廣以美之鄭司農云古而自有風雅頌之名故延陵季子觀樂於魯時孔子尚幼未定詩書而曰為之歌邶鄘衛曰是其衛風乎又為之歌小雅大雅又為之歌頌論語曰吾自衛反魯然後樂正雅頌各得其所時禮樂自諸侯出頗有謬亂不正孔子正之曰比曰興比者比方於物也興者託事於物以六徳為之本所教詩必有知仁聖義中和之道然後可教以樂歌以六律為之音以律視其人為之音知其宜何歌子貢見帥乙而問曰賜聞樂歌各有宜若賜者宜何歌此問人性也本人之性莫善於律小師掌教弦歌弦謂琴瑟也歌依詠詩也瞽矇掌播弦歌播謂發揚其音掌九徳六詩之歌以役大師役為之使鍾師凡樂事以鍾鼓奏九夏詳樂制籥章中春龡豳詩以逆暑中秋夜逆寒亦如之凡國祈年于田祖龡豳雅國祭蜡則龡豳頌詳吉禮百神篇春並官徒歌謂之謡詩曰我歌且謡爾雅右樂歌昔葛天氏之樂三人掺牛尾投足以歌八闋葛天氏古帝名投足猶蹀足闋終也一曰載民二曰𤣥鳥三曰遂草木四曰奮五榖五曰敬天常六曰逹帝功七曰依地徳八曰總萬物之極樂之八篇名也吕氏春秋禹曰徳惟善政政在養民水火金木土穀惟修正徳利用厚生惟和九功惟叙九叙惟歌戒之用休董之用威勸之以九歌俾勿壊此周禮所謂九徳之歌大禹謨九功之徳皆可歌也謂之九歌六府三事謂之九功水火金木土榖謂之六府正徳利用厚生謂之三事文七年左氏傳舜作五絃之琴歌南風之詩詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮家語詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟嘆之嗟嘆之不足故永歌之永歌之不足不知手之舞之足之蹈之也情發於聲聲成文謂之音發猶見也聲謂宫商角徴羽也聲成文者宫商上下相應治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困故正得失動天地感鬼神莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風俗故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌上以風化下下以風刺上主文而譎諌言之者無罪聞之者足以戒故曰風風化風刺皆謂譬喻不斥言也主文主與樂之宫商相應也譎諫詠歌依違不直諫至於王道衰禮義廢政教失國異政家殊俗而變風變雅作矣國史眀乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以風其上逹於事變而懐其舊俗者也故變風發乎情止乎禮義發乎情民之正也止乎禮義先王之澤也是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛徳之形容以其成功告於神眀者也是謂四始詩之至也始者王道興衰之所由於詩序君鄭康成小雅大雅譜云其用樂國以小雅天子以大雅然而饗賔或上取燕或下就天子饗元侯歌肆夏合文王諸侯歌文王合鹿鳴諸侯於鄰國之君與天子於諸侯同天子諸侯燕羣臣及聘問之賔皆歌鹿鳴合卿樂比其著畧大校見在書籍禮崩樂壊不可得詳吳公子札來聘請觀於周樂魯以周公故有天子禮樂使工為之歌周南召南此皆各依其本國歌所常用聲曲曰美哉美其聲始基之矣周南召南王化之基猶未也猶有商紂未盡善也然勤而不怨矣未能安樂然其音不怨怒為之歌邶鄘衞武王伐紂分其地為三監三監叛周公滅之更封康叔并三監之地故三國盡被康叔之化曰美哉淵乎憂而不困者也淵深也亡國之音哀以思其民困衞康叔武公徳化深逺雖遭宣公滛亂懿公滅亡民猶秉義不至於困吾聞衛康叔武公之徳如是是其衛風乎康叔周公弟武公康叔九世孫皆衞之令徳君也聴聲以為别故有疑言為之歌王王黍離也幽王遇西戎之禍平王東遷王政不行於天下風俗下與諸侯同故不為雅曰美哉思而不懼其周之東乎宗周隕滅故憂思猶有先王之遺風故不懼為之歌鄭詩第七曰美哉其細已甚民弗堪也是其先亡乎美其有治政之音譏其煩碎知不能乆為之歌齊詩第八曰美哉泱泱乎大風也哉泱泱宏大之聲表東海者其大公乎大公封齊為東海之表式國未可量也言其或將復興為之歌豳詩第十五豳周之舊國在新平漆縣東北曰美哉蕩乎樂而不滛其周公之東乎蕩乎蕩然也樂而不滛言有節周公遭管蔡之變東征三年為成王陳后稷先公不敢荒滛以成王業故言其周公之東乎為之歌秦詩第十一後仲尼剛定故不同曰此之謂夏聲夫能夏則大大之至也其周之舊乎秦本在西戎汧隴之西秦仲始有車馬禮樂去戎狄之音而有諸夏之聲故謂之夏聲及襄公佐周平王東遷而受其故地故曰周之舊為之歌魏詩第九魏姬姓國閔元年晉獻公滅之曰美哉渢渢乎大而婉險而易行以徳輔此則眀主也渢渢中庸之聲婉約也險當為儉字之誤也大而約則儉節易行惜其國小無明君也為之歌唐詩第十唐晉詩曰思深哉其有陶唐氏之遺民乎不然何憂之逺也晉本唐國故有堯之遺風憂深思逺情發於聲非令徳之後誰能若是為之歌陳詩第十二曰國無主其能久乎滛聲放蕩無所畏忌故曰國無主自鄶以下無譏焉鄶第十三曹第十四言季子聞此二國歌不復譏論之以其微也為之歌小雅小雅小正亦樂歌之常曰美哉思而不貳思文武之徳無貳叛之心怨而不言有哀音其周徳之衰乎衰小也猶有先王之遺民焉謂有殷王餘俗故未大衰為之歌大雅大雅陳文王之徳以正天下曰廣哉熈熈乎熈熈和樂聲曲而有直體論其聲其文王之徳乎雅頌所以詠盛徳形容故但歌其美者不皆歌變雅為之歌頌頌者以其成功告於神明曰至矣哉言道備直而不倨倨傲曲而不屈屈撓邇而不偪謙退逺而不攜攜貳遷而不滛滛過蕩復而不厭常日新哀而不愁知命樂而不荒節之以禮用而不匱徳宏大廣而不宣不自顯施而不費因氏所利而利之取而不貪義然後取處而不底守之以道行而不流制之以義五聲和宫商角徴羽謂之五聲八風平八方之風謂之八風節有度守有序八音克諧節有度也無相奪倫守有序也盛徳之所同也頌有殷魯故曰盛徳之所同㐮二十九年左氏傳子贛見師乙而問焉曰賜聞聲歌各有宜也如賜者宜何歌也師樂官也乙名聲歌各有宜氣順性也師乙曰乙賤工也何足以問所宜請誦其所聞而吾子自執焉樂人稱工執猶處也寛而静柔而正者宜歌頌廣大而静疏逹而信者宜歌大雅恭儉而好禮者宜歌小雅正直而静㢘而謙者宜歌風肆直而慈愛者宜歌商商宋詩也愛或為哀溫良而能斷者宜歌齊夫歌者直已而陳徳也動已而天地應焉四時和焉星辰理焉萬物育焉直已而陳徳各因其徳歌所宜育生也故商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢㫁眀乎齊之音者見利而讓屢數也數㫁事以其肆直也見利而讓以其温良能㫁也斷猶決也臨事而屢㫁勇也見利而讓義也有勇有義非歌孰能保此保猶安也知也故歌者上如抗下如隊曲如折止如槀木倨中矩句中鉤纍纍乎端如貫珠言歌聲之著動人心之審如有此事故歌之為言也長言之也說之故言之言之不足故長言之長言之不足故嗟嘆之嗟嘆之不足故不知手之舞之足之蹈之也長言之引其聲也嗟嘆和續之也不知手之舞之足之蹈之歡之至也樂記衛甯武子來聘公與之宴為賦湛露及彤弓非禮之常公特命樂人以示意故言為賦湛露彤弓詩小雅不辭又不答賦使行人私焉私問之對曰臣以為肄業及之也肆習也魯人失所賦甯武子佯不知此其愚不可及昔諸侯朝正於王朝而受政教也王宴樂之於是乎賦湛露則天子當陽諸侯用命也湛露曰湛湛露斯匪陽不晞晞乾也言露見日而乾猶諸侯禀天子命而行諸侯敵王所愾而獻其功敵猶當也愾恨怒也王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以眀報功宴樂今陪臣來繼舊好方論天子之樂故自稱陪臣君辱貺之其敢干大禮以自取戾貺賜也干犯也戾罪也文四年左氏傳叔孫穆子聘於晉穆子魯卿叔孫得臣之子豹也晉悼公饗之以饗禮禮之樂及鹿鳴之三而後拜樂三及至也悼公先為穆子作肆夏文王各三篇而不拜至作鹿鳴之三篇而後拜樂三也晉侯使行人問焉行人官名掌賔客之禮傳曰韓獻子使行人子員問焉曰子以君命鎮撫敝邑鎮重也撫安也不腆先君之禮以辱從者腆厚也稱從者謙也不腆之樂以節之以樂節禮也吾子舍其大而加禮於其細敢問何禮也大謂肆夏文王細謂鹿鳴也對曰寡君使豹来繼先君之好君以諸侯之故貺使臣以大禮貺賜也夫先樂金奏肆夏繁遏渠天子所以饗元侯也金奏以鍾奏樂也肆夏一名樊韶夏一名遏納夏一名渠此三夏曲也禮有九夏周禮鍾師掌以鍾鼓奏九夏元侯牧伯也鄭司農云九夏皆篇名頌之類也載也在樂章樂崩亦從而亡是以頌不能具夫歌文王大眀緜則兩君相見之樂也文王大眀緜大雅之首文王之三也此三篇皆美文王武王有聖徳天所輔祚其徴應符騐著見於天乃天命非人力也周公欲昭先王之徳於天下故兩君相見得以為樂也皆昭令徳以合好也皆非使臣之所敢聞也臣以為肄業及之故不敢拜肄習也以為樂人自習修其業而及之故不敢拜今伶簫咏歌及鹿鳴之三伶伶人樂官也簫樂器編管為之言樂人以簫作此三篇之聲與歌者相應也詩云簫管備舉君之所以貺使臣臣敢不拜貺夫鹿鳴君之所以嘉先君之好也敢不拜嘉嘉善也鹿鳴曰我有嘉賔徳音孔昭是為嘉善先君之好也四牡君之所以章使臣之勤也敢不拜章四牡君勞使臣之樂也章著也言臣奉命勞勤於外述叙其情以歌樂之所以著其勤勞也皇皇者華君教使臣曰每懐靡及皇皇者華君遣使臣之樂也皇皇猶煌煌也懐私為每懐靡無也言臣奉使當榮顯其君如華之色煌煌然既受命當思在公毎人人懐其私於事將無所及諏謀度詢必咨於周敢不拜教此六者皆君之所以教臣也訪問於善為咨忠信為周言諏謀度詢必當咨之於忠信之人臣聞之曰懐和為每懐鄭後司農云和當為私咨才為諏才當為事傳曰咨事為諏咨事為謀事當為難傳曰咨難為謀咨義為度咨禮義為度度亦謀也咨親為詢詢親戚之謀忠信為周言當咨之於忠信之人也詩云周爰咨詢君貺使臣以大禮重之以六徳敢不重拜六徳謂諏也謀