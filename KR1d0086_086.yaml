body:
  text: 禮書綱目卷八十四婺源江永撰歌舞樂五補詩言志歌永言聲依永律和聲心之所之謂之志心有所之必形於言故曰詩言志既形於言則必有長短之節故曰歌永言既有長短則必有清濁髙下之殊故曰聲依永聲者宫商角徴羽也大抵歌聲長而濁者為宫以漸而清且短則為商為角為徴為羽所謂聲依永也既有長短清濁則又必以十二律和之乃能成文而不亂假令黃鍾為宫則太簇為商姑沈為角林鍾為徴南吕為羽蓋以三分損益隔八相生而得之餘律皆然即禮運所謂五聲六律十二管還相為宫所謂律和聲也舜典戛擊鳴球搏拊琴瑟以詠下管鼗鼓合止柷敔笙鏞以間詳樂制大司樂九德之歌於宗廟之中奏之鄭司農云九德之歌春秋傳所謂水火金木土榖謂之六府正德利用厚生謂之三事六府三事謂之九功九功之德皆可歌也謂之九歌也大師教六詩曰風曰賦曰比曰興曰雅曰頌教教瞽矇也風言賢聖治道之遺化也賦之言鋪直鋪陳今之政教善惡比見今之失不敢斥言取比類以言之興見今之美嫌於媚諛取善事以喻勸之雅正也言人之正者以為後世法頌之言誦也容也誦今之德廣以美之鄭司農云古而自有風雅頌之名故延陵季子觀樂於魯時孔子尚幼未定詩書而曰為之歌邶鄘衛曰是其衛風乎又為之歌小雅大雅又為之歌頌論語曰吾自衛反魯然後樂正雅頌各得其所時禮樂自諸侯出頗有謬亂不正孔子正之曰比曰興比者比方於物也興者託事於物以六德為之本所教詩必有知仁聖義中和之道然後可教以樂歌以六律為之音以律視其人為之音知其宜何歌子貢見帥乙而問曰賜聞樂歌各有宜若賜者宜何歌此問人性也本人之性莫善於律小師掌教弦歌弦謂琴瑟也歌依詠詩也瞽矇掌播弦歌播謂發揚其音掌九德六詩之歌以役大師役為之使鍾師凡樂事以鍾鼓奏九夏詳樂制籥章中春吹豳詩以逆暑中秋夜逆寒亦如之凡國祈年于田祖吹豳雅國祭蠟則吹豳頌詳吉禮百神篇春並官徒歌謂之謡詩曰我歌且謡爾雅右樂歌昔葛天氏之樂三人摻牛尾投足以歌八闋葛天氏古帝名投足猶蹀足闋終也一曰載民二曰𤣥鳥三曰遂草木四曰奮五榖五曰敬天常六曰逹帝功七曰依地德八曰總萬物之極樂之八篇名也吕氏春秋禹曰德惟善政政在養民水火金木土穀惟修正德利用厚生惟和九功惟叙九叙惟歌戒之用休董之用威勸之以九歌俾勿壞此周禮所謂九德之歌大禹謨九功之德皆可歌也謂之九歌六府三事謂之九功水火金木土榖謂之六府正德利用厚生謂之三事文七年左氏傳舜作五絃之琴歌南風之詩詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮家語詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟嘆之嗟嘆之不足故永歌之永歌之不足不知手之舞之足之蹈之也情發於聲聲成文謂之音發猶見也聲謂宫商角徴羽也聲成文者宫商上下相應治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困故正得失動天地感鬼神莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風俗故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌上以風化下下以風刺上主文而譎諌言之者無罪聞之者足以戒故曰風風化風刺皆謂譬喻不斥言也主文主與樂之宫商相應也譎諫詠歌依違不直諫至於王道衰禮義廢政教失國異政家殊俗而變風變雅作矣國史眀乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以風其上逹於事變而懷其舊俗者也故變風發乎情止乎禮義發乎情民之正也止乎禮義先王之澤也是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛德之形容以其成功告於神眀者也是謂四始詩之至也始者王道興衰之所由於詩序君鄭康成小雅大雅譜云其用樂國以小雅天子以大雅然而饗賔或上取燕或下就天子饗元侯歌肆夏合文王諸侯歌文王合鹿鳴諸侯於鄰國之君與天子於諸侯同天子諸侯燕羣臣及聘問之賔皆歌鹿鳴合卿樂比其著略大校見在書籍禮崩樂壞不可得詳吳公子札來聘請觀於周樂魯以周公故有天子禮樂使工為之歌周南召南此皆各依其本國歌所常用聲曲曰美哉美其聲始基之矣周南召南王化之基猶未也猶有商紂未盡善也然勤而不怨矣未能安樂然其音不怨怒為之歌邶鄘衛武王伐紂分其地為三監三監叛周公滅之更封康叔并三監之地故三國盡被康叔之化曰美哉淵乎憂而不困者也淵深也亡國之音哀以思其民困衛康叔武公德化深逺雖遭宣公淫亂懿公滅亡民猶秉義不至於困吾聞衛康叔武公之德如是是其衛風乎康叔周公弟武公康叔九世孫皆衛之令德君也聽聲以為别故有疑言為之歌王王黍離也幽王遇西戎之禍平王東遷王政不行於天下風俗下與諸侯同故不為雅曰美哉思而不懼其周之東乎宗周隕滅故憂思猶有先王之遺風故不懼為之歌鄭詩第七曰美哉其細已甚民弗堪也是其先亡乎美其有治政之音譏其煩碎知不能久為之歌齊詩第八曰美哉泱泱乎大風也哉泱泱宏大之聲表東海者其大公乎大公封齊為東海之表式國未可量也言其或將復興為之歌豳詩第十五豳周之舊國在新平漆縣東北曰美哉蕩乎樂而不淫其周公之東乎蕩乎蕩然也樂而不淫言有節周公遭管蔡之變東征三年為成王陳后稷先公不敢荒淫以成王業故言其周公之東乎為之歌秦詩第十一後仲尼剛定故不同曰此之謂夏聲夫能夏則大大之至也其周之舊乎秦本在西戎汧隴之西秦仲始有車馬禮樂去戎狄之音而有諸夏之聲故謂之夏聲及襄公佐周平王東遷而受其故地故曰周之舊為之歌魏詩第九魏姬姓國閔元年晉獻公滅之曰美哉渢渢乎大而婉險而易行以德輔此則眀主也渢渢中庸之聲婉約也險當為儉字之誤也大而約則儉節易行惜其國小無明君也為之歌唐詩第十唐晉詩曰思深哉其有陶唐氏之遺民乎不然何憂之逺也晉本唐國故有堯之遺風憂深思逺情發於聲非令德之後誰能若是為之歌陳詩第十二曰國無主其能久乎淫聲放蕩無所畏忌故曰國無主自鄶以下無譏焉鄶第十三曹第十四言季子聞此二國歌不復譏論之以其微也為之歌小雅小雅小正亦樂歌之常曰美哉思而不二思文武之德無二叛之心怨而不言有哀音其周德之衰乎衰小也猶有先王之遺民焉謂有殷王餘俗故未大衰為之歌大雅大雅陳文王之德以正天下曰廣哉熙熙乎熙熙和樂聲曲而有直體論其聲其文王之德乎雅頌所以詠盛德形容故但歌其美者不皆歌變雅為之歌頌頌者以其成功告於神明曰至矣哉言道備直而不倨倨傲曲而不屈屈撓邇而不逼謙退逺而不攜攜二遷而不淫淫過蕩復而不厭常日新哀而不愁知命樂而不荒節之以禮用而不匱德宏大廣而不宣不自顯施而不費因氏所利而利之取而不貪義然後取處而不底守之以道行而不流制之以義五聲和宫商角徴羽謂之五聲八風平八方之風謂之八風節有度守有序八音克諧節有度也無相奪倫守有序也盛德之所同也頌有殷魯故曰盛德之所同襄二十九年左氏傳子贛見師乙而問焉曰賜聞聲歌各有宜也如賜者宜何歌也師樂官也乙名聲歌各有宜氣順性也師乙曰乙賤工也何足以問所宜請誦其所聞而吾子自執焉樂人稱工執猶處也寬而靜柔而正者宜歌頌廣大而靜疏逹而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜廉而謙者宜歌風肆直而慈愛者宜歌商商宋詩也愛或為哀溫良而能斷者宜歌齊夫歌者直已而陳德也動已而天地應焉四時和焉星辰理焉萬物育焉直已而陳德各因其德歌所宜育生也故商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢斷眀乎齊之音者見利而讓屢數也數斷事以其肆直也見利而讓以其溫良能斷也斷猶決也臨事而屢斷勇也見利而讓義也有勇有義非歌孰能保此保猶安也知也故歌者上如抗下如隊曲如折止如槀木倨中矩句中鉤纍纍乎端如貫珠言歌聲之著動人心之審如有此事故歌之為言也長言之也說之故言之言之不足故長言之長言之不足故嗟嘆之嗟嘆之不足故不知手之舞之足之蹈之也長言之引其聲也嗟嘆和續之也不知手之舞之足之蹈之歡之至也樂記衛寧武子來聘公與之宴為賦湛露及彤弓非禮之常公特命樂人以示意故言為賦湛露彤弓詩小雅不辭又不答賦使行人私焉私問之對曰臣以為肄業及之也肆習也魯人失所賦寧武子佯不知此其愚不可及昔諸侯朝正於王朝而受政教也王宴樂之於是乎賦湛露則天子當陽諸侯用命也湛露曰湛湛露斯匪陽不晞晞乾也言露見日而乾猶諸侯禀天子命而行諸侯敵王所愾而獻其功敵猶當也愾恨怒也王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以眀報功宴樂今陪臣來繼舊好方論天子之樂故自稱陪臣君辱貺之其敢干大禮以自取戾貺賜也干犯也戾罪也文四年左氏傳叔孫穆子聘於晉穆子魯卿叔孫得臣之子豹也晉悼公饗之以饗禮禮之樂及鹿鳴之三而後拜樂三及至也悼公先為穆子作肆夏文王各三篇而不拜至作鹿鳴之三篇而後拜樂三也晉侯使行人問焉行人官名掌賔客之禮傳曰韓獻子使行人子員問焉曰子以君命鎮撫敝邑鎮重也撫安也不腆先君之禮以辱從者腆厚也稱從者謙也不腆之樂以節之以樂節禮也吾子舍其大而加禮於其細敢問何禮也大謂肆夏文王細謂鹿鳴也對曰寡君使豹來繼先君之好君以諸侯之故貺使臣以大禮貺賜也夫先樂金奏肆夏繁遏渠天子所以饗元侯也金奏以鍾奏樂也肆夏一名樊韶夏一名遏納夏一名渠此三夏曲也禮有九夏周禮鍾師掌以鍾鼓奏九夏元侯牧伯也鄭司農云九夏皆篇名頌之類也載也在樂章樂崩亦從而亡是以頌不能具夫歌文王大眀綿則兩君相見之樂也文王大眀綿大雅之首文王之三也此三篇皆美文王武王有聖德天所輔祚其徴應符驗著見於天乃天命非人力也周公欲昭先王之德於天下故兩君相見得以為樂也皆昭令德以合好也皆非使臣之所敢聞也臣以為肄業及之故不敢拜肄習也以為樂人自習修其業而及之故不敢拜今伶簫咏歌及鹿鳴之三伶伶人樂官也簫樂器編管為之言樂人以簫作此三篇之聲與歌者相應也詩云簫管備舉君之所以貺使臣臣敢不拜貺夫鹿鳴君之所以嘉先君之好也敢不拜嘉嘉善也鹿鳴曰我有嘉賔德音孔昭是為嘉善先君之好也四牡君之所以章使臣之勤也敢不拜章四牡君勞使臣之樂也章著也言臣奉命勞勤於外述叙其情以歌樂之所以著其勤勞也皇皇者華君教使臣曰每懷靡及皇皇者華君遣使臣之樂也皇皇猶煌煌也懷私為每懷靡無也言臣奉使當榮顯其君如華之色煌煌然既受命當思在公每人人懷其私於事將無所及諏謀度詢必咨於周敢不拜教此六者皆君之所以教臣也訪問於善為咨忠信為周言諏謀度詢必當咨之於忠信之人臣聞之曰懷和為每懷鄭後司農云和當為私咨才為諏才當為事傳曰咨事為諏咨事為謀事當為難傳曰咨難為謀咨義為度咨禮義為度度亦謀也咨親為詢詢親戚之謀忠信為周言當咨之於忠信之人也詩云周爰咨詢君貺使臣以大禮重之以六德敢不重拜六德謂諏也謀也度也詢也咨也周也見國語魯語燕左氏傳詳嘉禮饗食記大夫之奏肆夏也由趙文子始也僭諸侯趙文子晉大夫名武郊特牲三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂三家魯大夫孟孫叔孫季孫之家也雍周頌篇名徹祭畢而收其俎也天子宗廟之祭則歌雍以徹是時三家僭而用之相助也辟公諸侯也穆穆深逺之意天子之容也此雍詩之辭孔子引之言三家之堂非有此事亦何取於此義而歌之乎譏其無知妄作以取僭竊之罪程子曰周公之功固大矣皆臣子之分所當為魯安得獨用天子禮樂哉成王之賜伯禽之受皆非也其因襲之弊遂使季氏僭八佾三家僭雍徹故仲尼譏之子曰吾自衛反魯然後樂正雅頌各得其所魯哀公十一年冬孔子自衛反魯是時周禮在魯然詩樂亦頗殘缺失次孔子周流四方參互考訂以知其說晚知道終不行故歸而正之子曰師摯之始關雎之亂洋洋乎盈耳哉師摯魯樂師名摯也亂樂之卒章也史記曰關雎之亂以為風始洋洋美盛意孔子自衛反魯而正樂適師摯在官之初故樂之美盛如此語並論呦清黃呦南鹿蕤鳴姑食南野姑之太蘋黃我蕤有林嘉應賔南鼓林瑟南吹清黃笙林吹蕤笙林鼓南簧姑承應筐清黃是姑將南人林之南好黃我姑示林我南周清太行清黃呦黃呦姑鹿鳴姑食林野南之清太蒿清黃我林有南嘉應賔清黃德南音蕤孔姑昭林視姑民南不清黃恌姑君應子清黃是姑則蕤是姑效南我林有南旨黃酒姑嘉林賔南式應燕南以清太敖清黃呦黃呦姑鹿太鳴黃食太野黃之蕤芩姑我蕤有南嘉應賔南鼓林瑟南鼓清黃琴林鼓蕤瑟林鼓南琴姑和應樂清黃且姑湛南我林有南旨黃酒姑以林燕南樂黃嘉應賔南之清太心清黃鹿鳴三章章八句黃鍾清宫俗呼正宫四黃牡姑騑蕤騑姑周太道黃倭蕤遲姑豈林不南懷應歸清黃王蕤事姑靡林盬南我林心黃傷應悲清黃四黃牡姑騑林騑南嘽應嘽南駱清太馬清黃豈蕤不林懷應歸南王蕤事姑靡太盬黃不林遑姑啓太處黃翩清黃翩姑者林隼南載姑飛應載林下南集蕤于南苞蕤栩林王太事黃靡蕤盬姑不林遑南將清太父清黃翩清黃翩姑者蕤隼姑載林飛應載林止南集林于南苞蕤杞姑王蕤事姑靡林盬南不黃遑蕤將太母黃駕黃彼太四黃駱姑載林驟南駸清黃駸林豈林不南懷應歸黃是太用黃作蕤歌姑將應母黃來清太諗清黃四牡五章章五句黃鍾清宫俗呼正宫皇黃皇南者林華南于林彼姑原林隰南侁蕤侁林征蕤夫姑每應懷南靡清太及清黃我黃馬姑維蕤駒姑六黃轡姑如林濡南載林馳南載黃驅姑周蕤爰姑咨太諏黃我清黃馬林維應騏清黃六林轡南如蕤絲姑載林馳南載蕤驅周應爰黃咨清太謀清黃我清黃馬林維應駱六蕤轡姑沃林若南載蕤馳南載蕤驅林周黃爰姑咨太度黃我黃馬南維應駰清黃六清黃轡姑既林均南載林馳南載黃驅姑周應爰南咨清太詢清黃皇皇者華五章章四句黃鍾清宮俗呼正宫魚清黃麗姑于蕤罶姑鱨太鯊黃君蕤子林有應酒南旨林且南多清黃魚黃麗姑于太罶清黃魴蕤鯉姑君蕤子林有蕤酒姑多蕤且林旨黃魚清黃麗清太于應罶清黃鰋林鯉南君蕤子姑有林酒南旨林且南有清黃物清黃其姑多應矣南維蕤其姑嘉林矣南物蕤其林旨蕤矣姑維南其蕤偕姑矣林物黃其太有黃矣姑維應其南時太矣清黃魚麗六章三章章四句三章章二句黃鍾清宫俗呼正宫南清黃有林嘉應魚南蒸應然南罩姑罩南君林子南有蕤酒姑嘉應賔清黃式林燕南以清太樂清黃南清黃有南嘉蕤魚姑蒸蕤然姑汕林汕南君林子南有黃酒姑嘉黃賔姑式太燕黃以南衎清黃南清黃有清太樛應木南甘清黃瓠林纍南之清黃君黃子太有黃酒姑嘉清太賔清黃式應燕南綏清太之清黃翩黃翩太者黃隼姑蒸林然南來蕤思姑君清黃子姑有林酒南嘉蕤賔姑式太燕黃又南思清黃南有嘉魚四章章四句黃鍾清宫俗呼正宫南清黃山太有應臺南北應山南有清太萊清黃樂應只清黃君應子南邦林家南之清黃基林樂蕤只林君南子姑萬黃夀姑無太期黃南黃山姑有蕤桑姑北黃山姑有太楊黃樂蕤只林君應子南邦林家南之黃光林樂應只清黃君蕤子姑萬林夀南無清太疆清黃南清黃山林有應把南北林山南有清太李清黃樂應只清黃君應子南民南之蕤父姑母林樂蕤只林君蕤子姑德蕤音姑不太已黃南黃山太有黃栲姑北南山蕤有姑杻林樂蕤只林君應子南遐林不南眉清太夀清黃樂應只清黃君蕤子姑德應音南是林茂清黃南清黃山姑有蕤枸姑北應山黃有清太楰清黃樂應只清黃君應子南遐南不蕤黃姑耉林樂蕤只林君蕤子姑保清黃艾南爾林後清黃南山有臺五章章六句黃鍾清宫俗呼正宫右小雅六詩譜大學始教宵雅肄三官其始也宵之言小也肆習也習小雅之三謂鹿鳴四牡皇皇者華也此皆君臣宴樂相勞苦之詩為始學者習之所以勸之以官且取上下相和厚笙學記南朱子曰按鄉飲酒及燕禮皆歌此三篇入奏陔白華華黍問歌魚麗笙由庚歌南有嘉魚笙崇邱歌南山有臺笙由儀六笙詩本無辭聲亦不傳關清黃關南雎林鳩南在黃河姑之太洲黃窈林窕南淑清黃女姑君清黃子林好南逑清黃參清黃差南荇林菜南左林右南流無之黃窈中窕林淑無女姑寤太寐姑求太之黃求清黃之南不林得南寤姑寐中思南服林悠姑哉中悠姑哉太輾清黃轉南反無側清黃參清黃差無荇南菜林左清太右林采南之清黃窈姑窕中淑林女南琴林瑟姑友太之姑參太差黃荇姑菜林左林右姑芼林之南窈清黃窕南淑林女清太鍾黃鼓南樂無之清黃關雎三章一章章四句二章章八句無射清商俗呼越調葛黃之太覃姑兮太施太于姑中太谷黃維仲葉南萋無萋太黃南鳥無于南飛林集仲于林灌無木太其清黃鳴南喈無喈清黃葛清黃之清太覃林兮清黃施林于南中無谷清黃維林葉南莫南莫是刈是濩姑為林絺姑為太綌姑服太之無太斁黃言清黃告姑師南氏林言林告姑言太歸黃薄黃汚姑我太私姑薄姑浣仲我林衣南害南浣林害無否太歸清黃寧南父林母黃葛覃三章章六句無射清商俗呼越調采清黃采姑卷林耳南不林盈姑頃林筐南嗟中我林懷無人太置黃彼如周太行黃陟清黃彼無崔南嵬林我林馬姑虺南隤林我中姑姑酌南彼無金姑罍太維清太以林不南永無懷清黃陟黃彼姑髙南岡林我林馬姑𤣥南黃林我姑姑太酌姑彼黃兕太觥姑維清黃以林不南永無傷清黃陟清黃彼南砠清黃矣林我黃馬姑瘏太矣黃我中僕姑痡林矣南云清黃何南吁無矣清黃卷耳四章章四句無射清商俗呼越調維黃鵲姑有中巢林維清黃鳩無居南之林之中子林于無歸太百清黃兩林御南之清黃維黃鵲林有南巢林維林鳩姑方太之黃之林子黃于林歸姑百太兩黃將太之黃維清黃鵲無有南巢林維南鳩林盈南之清黃之清黃子南于姑歸林百清太兩林成南之清黃鵲巢三章章四句無射清商俗呼越調于清黃以南采林繁南于林沼姑于太沚姑于黃以姑用太之姑公清黃侯南之無事黃于黃以林采黃繁南于太澗黃之太中姑于姑以南用林之南公清黃侯南之清太宫黃被清黃之清太僮南僮林夙清太夜林在南公清黃被黃之姑祁太祁姑薄林言南還無歸黃采繁三章章四句無射清商俗呼越調于黃以南采林蘋南南姑澗林之南濵林于林以姑采仲藻林于彼行潦于以盛之維筐及筥于以湘之維錡及釜于以奠之宗室牖下誰其尸之有齊季女采蘋三章章四句無射清商俗呼越調右周南召南六詩譜周南召南正始之道王化之基故用之鄉人焉用之邦國焉詩序酒朱子曰鄉飲及鄉射禮合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋燕禮亦云遂歌鄉樂亦即此六篇也鄭氏云合樂謂歌樂與衆聲皆作周南召南國風篇也王后國君夫人房中之樂歌也關雎言后妃之德葛覃言后妃之職卷耳言后妃之志鵲巢言國君夫人之德采蘩言國君夫人不失職采蘋言卿大夫之妻能修其法度夫婦之道生民之本王政之端此六篇者其教之原也故國君與其臣下及四方之賔燕用之合樂也鄉樂者風也小雅為諸侯之樂大雅頌為天子之樂大戴禮云凡雅二十六篇其八篇可歌鹿鳴貍首鵲巢采蘩采蘋伐檀白駒歌騶虞八篇廢不可歌七篇商齊可歌也三篇問晉志云漢末杜夔傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭朱子曰按大戴禮頗有闕誤其篇目都數皆不可考至漢末年止存三篇而加文王又不知其何自來也其後改作新辭舊典遂廢至唐開元鄉飲酒禮其所奏樂乃有此十二篇之目而其聲今亦莫得聞矣此譜乃趙彥肅所傳云即開元遺聲也古聲亡滅已久不知當時工師何所考而為此也竊疑古樂有唱有嘆唱者發歌句也和者繼其聲也詩詞之外應更有疊字散聲以歎發其趣故漢晉之間舊曲既失其傳則其辭雖存而世莫能補為此故也若但如此譜直以一聲叶一字則古詩篇篇可歌無復樂崩之歎矣夫豈然哉又其以清聲為調似亦非古法然古聲既不可考則姑存此以見聲歌之倣佛俟知樂者考其得失云序案儀禮經傳通解以十二詩譜為詩樂篇目録題云古亦無此篇而大樂遺聲其絶久矣今取世傳唐開元十二詩譜補之以粗見其倣佛然亦未知其果有以合於古之遺聲否也字又案趙彥肅朱子門人子欽簫韶九成鳳凰來儀簫古文作簫舞者所執之物季札觀周樂見舞韶簫者則簫韶蓋舜樂之總名也今文作簫故先儒誤以簫管釋之功以九叙故樂以九成來儀者來舞而有容儀也益稷舞干羽于兩階七旬有苗格干楯羽翳也皆舞者所執也兩階賔主之階也大禹謨大司樂以樂舞教國子舞雲門大卷大咸大磬大夏大濩大武此周所存六代之樂黃帝樂曰雲門大卷黃帝能成名萬物以明民共財言其德如雲之所出民得以有族類大咸咸池堯樂也堯能殫均紹刑法以儀民言其德無所不施大磬舜樂也言其德能堯之道也大夏禹樂也禹治水傅土言其德能大中國也大濩湯樂也湯以寬治民而除其邪言其德能使天下得其所也大武武王樂也武王伐紂以除其害言其德能成武功乃分樂而序之舞雲門以祀天神舞咸池以祭地示舞大磬以祀四望舞大夏以祭山川舞大濩以享先妣舞大武以享先祖雲門之舞冬日至于地上之圜丘奏之咸池之舞夏日至於澤中之方丘奏之九磬之舞於宗廟之中奏之詳見樂制樂師掌國學之政以教國子小舞謂以年幼少時教之舞內則曰十三舞勺成童舞象二十舞大夏凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞故書皇作䍿鄭司農云帗舞者全羽羽舞者析羽皇舞者以羽冒覆頭上衣飾翡翠之羽旄舞者氂牛之尾干舞者兵舞人舞者手舞社稷以帗宗廟以羽四方以皇辟雍以旄兵事以干星辰以人䍿讀皇𤣥謂帗析五采繒今靈星舞子持之是也皇雜五采羽如鳯凰色持以舞人舞無所執以手袖為威儀四方以羽宗廟以人山川以干旱暵以皇詔來瞽臯舞注詳樂制大胥掌學士之版以待致諸子鄭司農云學士謂卿大夫諸子學舞者版籍也今時鄉户籍世謂之户版大胥主此籍以待當召聚學舞者卿大夫之諸子則案此籍以召之漢大樂律曰卑者之子不得舞宗廟之酎除吏二千石到六百石及關內侯到五大夫子先取適子髙七尺以上年二十到年三十顔色和順身體修治者以為舞人與古用卿大夫子同義以六樂之會正其位大同六樂之節奏正其位使相應也言為大合樂習之以序出入舞者以長幼次之使出入不紕錯凡祭祀之用樂者以鼓徴學士擊鼓以召之文王世子曰大昕鼓徴所以警衆小胥掌學士之徴令而比之觥其不敬者比猶校也不敬謂慢期不時至也觥罰爵也詩云兕觥其觩巡舞列而撻其怠慢者撻猶抶也抶以荆撲籥師掌教國子舞羽吹籥文舞有特羽吹籥者所謂籥舞也文王世子曰秋冬學羽籥詩云左手執籥右手秉翟祭祀則鼓羽籥之舞鼓之者恆為之節司干掌舞器舞器羽籥之屬祭祀舞者既陳則授舞器既舞則受之既已也受取藏之官並春司兵祭祀授舞者兵授以朱干玉戚之屬司戈盾祭祀授舞者兵諸子凡樂事正舞位授舞器位佾處也並夏官鼓人凡祭祀百物之神鼓兵舞帗舞者兵謂干戚也帗列五采繒為之有秉皆舞者所執舞師掌教兵舞帥而舞山川之祭祀教帗舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀教皇舞帥而舞旱暵之事羽析白羽為之形如帗也四方之祭祀謂四望也旱暵之事謂雩也暵熱氣也鄭司農云皇舞蒙羽舞書或為䍿𤣥為皇析五采羽為之亦如帗凡野舞則皆教之野舞謂野人欲學舞者凡小祭祀則不興舞小祭祀王𤣥冕所祭者興猶作也並地官凡學世子及學士必時四時各有宜學士謂司徒論俊選所升於學者春夏學干戈秋冬學羽籥皆於東序干盾也戈句孑㦸也干戈萬舞象武也用動作之時學之羽籥籥舞象文也用安靜之時學之詩云左手執籥右手秉翟小樂正學干大胥贊之籥師學戈籥師丞贊之四人皆樂官之屬也通職秋冬亦學以羽籥小樂正樂師也周禮樂師掌國學之政教國子小舞大胥掌學士之版以待致諸子春入學舍菜合舞秋頒學合聲籥師掌教國子舞羽吹籥大樂正學舞干戚戚斧也子文王世十有三年舞勺成童舞象先學勺後學象文武之次也成童十五以上二十舞大夏大夏樂之文武備者也三舞今皆亡內則右樂舞吳公子札來聘請觀於周樂見舞象簫南籥者象簫舞所執南籥以籥舞也皆文王之樂曰美哉猶有憾美哉美其容也文王恨不及已致太平見舞大武者武王樂曰美哉周之盛也其若此乎見舞韶濩者殷湯樂曰聖人之宏也而猶有慙德聖人之難也慙於始伐見舞大夏者禹之樂曰美哉勤而不德非禹其誰能修之盡力溝洫勤也見舞韶簫者舜樂曰德至矣哉大矣如天之無不幬也幬覆也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請矣魯用四代之樂故及韶簫而季子知其終也季札賢眀才博在吳雖已涉見此樂歌之文然未聞中國雅聲故請作周樂欲聽其聲然後依聲以參時政知其興衰也聞秦詩謂之夏聲聞頌曰五聲和八風平皆論聲以參政也舞畢知其樂終是素知其篇數傳襄二十九年左氏舞莫重於武宿夜武宿夜武曲名也義祭先鼓以警戒三步以見方再始以著往復亂以飭歸先鼓將奏樂先擊鼓以警戒衆也三步謂將舞必先三舉足以見其舞之漸也再始以著往武王除喪至盟津之上紂未可伐還歸三年乃遂伐之武舞再更始以明伐時再往也復亂以飭歸謂鳴鐃而退明以整歸也諸侯德盛而教尊五榖時熟然後賞之以樂故其治民勞者其舞行綴逺其治民逸者其舞行綴短故觀其舞知其德民勞則德薄鄼相去逺舞人少也民逸則德盛鄼相去近舞人多也並樂記諸侯朱干設錫冕而舞大武諸侯之僭禮也言此皆天子之禮也干盾也錫傳其背如龜也武萬舞也郊特牲王子頽享五大夫樂及遍舞皆舞六代之樂左莊二十年氏傳鄭伯享王于闕西辟樂備闕象魏也樂備備六代之樂氏莊二十一年左傳宋公享晉侯于楚丘請以桑林桑林殷天子之樂名荀罃辭辭讓之荀偃士丐曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀魯有禘樂賔祭用之禘三年大祭則作四代之樂别祭羣公則用諸侯樂宋以桑林享君不亦可乎言具天子樂也舞師題以旌夏師樂師也旌夏大旌也題識也以大旌表識其行列晉侯懼而退入於房旌夏非常卒見之人心偶有所畏去旌卒享而還衮十年左氏傳魯以禘禮祀周公於大廟朱干玉戚冕而舞大武皮辨素積裼而舞大夏朱干赤大盾也戚斧也冕冠名也諸公之服自衮冕而下如王之服也大武周舞也大夏夏舞也明堂位夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也管象吹管而舞武象之樂也朱干赤盾戚斧也此武象之舞所執也佾猶列也大夏禹樂文舞也執羽籥文武之舞皆八列互言之耳康猶褒大也祭統隱公五年考仲子之宫初獻六羽成仲子宫安其主而祭之公問羽數故書羽考仲子之宫將萬焉萬舞也公問羽數於衆仲問執羽人數對曰天子用八八八六十四人諸侯用六六六三十六人大夫四四四十六人士二二二四人士有功賜用樂夫舞所以節八音而行八風八音金石絲竹匏土革木也八風八方之風也以八音之器播八方之風手之舞之足之蹈之節其制而序其情故自八以下唯天子得盡物數故以八為列諸侯則不敢用八公從之於是初獻六羽始用六佾也魯唯文王周公廟得用八而他公遂因仍僭而用之今隱公特立此婦人之廟詳問衆仲衆仲因明大典故傳亦因言始用六佾其後季氏舞八佾于庭知唯在仲子廟用六春秋左氏傳譏始僭諸公也六羽之為僭奈何天子八佾佾者列也八人為列也八八六十四人法八風諸公六六人為列六六三十六人法六律諸侯四四人為列四四十六人法四人始僭諸公昉於此乎前此矣前此則曷為始乎此僭諸公猶可言也僭天子不可言也前僭八佾於惠公廟大惡不可言也公羊傳舞夏天子八佾諸公六佾諸侯四佾夏大也大謂大雉大雉翟雉佾之言列八人為列又有八列八八六十四人也並執翟雉之羽而舞也天子用八象八風諸公用六降殺以兩也初獻六羽始僭樂矣穀梁傳萬者何干舞也干謂楯也能為人扞難而不使害人故聖王貴之以為武樂萬者其篇名武王以萬人服天下民樂之故名之云爾籥者何籥舞也籥所吹以節舞也吹籥而舞文樂之長宣八年公羊傳將禘於襄公萬者二人其衆萬於季氏禘祭也萬舞也於禘公當三十六人臧孫曰此之謂不能庸先君之廟不能用禮也蓋襄公别立廟昭二十五年左氏傳子家駒曰諸侯僭於天子大夫僭於諸侯久矣設兩觀乘大路朱干干楯也以朱飾楯玉戚戚斧也以玉飾斧以舞大夏大夏夏樂也周所以舞夏樂者王者始起未制作之時取先王之樂與已同者假以風化天下天下大同乃自作樂取夏樂者與周俱文也王者舞六樂於宗廟之中舞先王之樂明有法也舞已之樂明有制也舞四夷之樂大德廣及之也東夷之樂曰侏離南夷之樂曰任西夷之樂曰禁北夷之樂曰昧八佾以舞大武此皆天子之禮也昭二十五年公羊傳孔子謂季氏八佾舞於庭是可忍也孰不可忍也季氏魯大夫季孫氏也佾舞列也天子八諸侯六大夫四士二每佾人數如其佾數或曰每佾八人未詳孰是季氏以大夫而僭用天子之禮樂孔子言其此事尚忍為之則何事不可忍為或曰忍容忍也蓋深疾之之辭兩范氏曰樂舞之數自上而下降殺以兩而已故之間不可以毫髮僭差也孔子為政先正禮樂則季氏之罪不容誅矣謝氏曰君子於其所不當為不敢須臾處不忍故也而季氏忍此矣則雖弒父與君亦何所憚而不為乎論語禮書綱目卷八十四
