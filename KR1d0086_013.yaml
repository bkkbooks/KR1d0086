body:
  text: 禮書綱目卷十一婺源江永撰三射記嘉禮十六補梓人為侯廣與崇方參分其廣而鵠居一焉崇高也方猶等也高廣等者謂侯中也天子射禮以九為節侯道九十弓弓二寸以為侯中則天子侯中丈八尺諸侯於其國亦然鵠所射也以皮為之各如其侯也居侯中參分之一則此鵠方六尺惟大射以皮飾侯大射者將祭之射也其餘有賓射燕射上兩個與其身三下兩個半之鄭司農云兩個謂布可以維持侯者也上方兩枚與身三設身廣一丈兩個各一丈凡為三丈下兩個半之傅地故短也𤣥謂個讀若齊人搚幹之幹上個下個皆謂舌也身躬也鄉射禮記曰倍中以為躬倍躬以為左右舌下舌半上舌然則九節之侯身三丈六尺上個七丈二尺下個五丈四尺其制身夾中個夾身在上下各一幅此侯凡用布三十六丈言上個與其身三者明身居一分上個倍之耳亦為下個半上個出也個或謂之舌者取其出而左右也侯制上廣下狹蓋取象於人也張臂八尺張足六尺是取象率焉上綱與下綱出舌尋縜寸焉綱所以繫侯於植者也上下皆出舌一尋者亦人張手之節也鄭司農云綱連侯繩也縜籠綱者縜讀為竹中皮之縜舌維持侯者張皮侯而棲鵠則春以功皮侯以皮所飾之侯司裘職曰王大射則共虎侯熊侯豹侯設其鵠謂此侯也春讀為蠢蠢作也出也天子將祭必與諸侯羣臣射以作其容體出其合於禮樂者與之事鬼神焉張五采之侯則遠國屬五采之侯謂以五采畫正之侯也射人職曰以射法治射儀王以六耦射三侯三獲三容樂以騶虞九節五正下曰若王大射則以貍步張三侯明此五正之侯非大射之侯明矣其職又曰諸侯在朝則皆北面逺國屬者若諸侯朝㑹王張此侯與之射所謂賓射也正之外方如鵠內二尺五采者內朱白次之蒼次之黃次之黑次之其侯之飾又以五采畫雲氣焉張獸侯則王以息燕獸侯畫獸之侯也鄉射記曰凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕凡畫者丹質是獸侯之差也息者休農息老物也燕謂勞使臣若與羣臣間暇飲酒而射侯考工記此一條總論三射制天子將祭必先習射於澤澤者所以擇士也已射於澤而后射於射宮射中者得與於祭不中者不得與於祭詳見射義古者天子之制諸侯歲獻貢士於天子天子試之於射宮其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭同上論此二條是天子大射司裘王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠大射者為祭祀射王將有郊廟之事以射擇諸侯及羣臣與邦國所貢之士可以與祭者射者可以觀德行其容體比於禮其節比於樂而中多者得與於祭諸侯謂三公及王子弟封於畿內者卿大夫亦皆有采地焉其將祀其先祖亦與羣臣射以擇之凡大射各於其射宮侯者其所射也以虎熊豹麋之皮飾其側又方制之以為􅙯謂之鵠著於侯中所謂皮侯王之大射虎侯王所自射也熊侯諸侯所射豹侯侯卿大夫以下所射諸侯之大射熊侯諸侯所自射豹羣臣所射卿大夫之大射麋侯君臣共射焉凡此侯道虎九十弓熊七十弓豹麋五十弓列國之諸侯大射大侯亦九十參七十干五十逺尊得伸可同耳所射正謂之侯者天子中之則能服諸侯諸侯以下中之則得為諸侯鄭司農云鵠鵠毛也方十尺曰侯四尺曰鵠二尺曰正四寸曰質𤣥謂侯中之大小取數於侯道鄉射記曰弓二寸以為侯中則九十弓者侯中廣丈八尺七十弓者侯中廣丈四尺五十弓者侯中廣一丈尊卑異等此數明矣考工記曰梓人為侯廣與崇方參分其廣而鵠居一焉然則侯中丈八尺者鵠方六尺侯中丈四尺者鵠方四尺六寸大半寸侯中一丈者鵠方三尺三寸少半寸謂之鵠者取名於鳱鵠鳱鵠小鳥而難中是以中之為雋亦取鵠之言較較者直也射所以直已志用虎熊豹麋之皮示服猛討迷惑者射者大禮故取義衆也士不大射士無臣祭無所擇故書諸侯則共熊侯虎侯杜子春云虎當為豹天官此一條論天子以下大射之侯大宗伯以嘉禮親萬民以賓射之禮親故舊朋友射禮雖王亦立賓主也王之故舊朋友為世子時共在學者天子亦有友諸侯之義武王誓曰我友邦冡君是也司寇職有議故之辟議賓之辟春官此一條論天子賓射射人以射法治射儀王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射犴侯一獲一容樂以采蘩五節二正射法王射之禮治射儀謂肄之也鄭司農云三侯虎熊豹也容者乏也待獲者所蔽也九節析羽九重設於長杠也正所射也詩云終日射侯不出正兮二侯熊豹也犴侯犴者獸名也獸有貙犴熊虎𤣥謂三侯者五正三正二正之侯也二侯者三正二正之侯也一侯者二正而已此皆與賔射於朝之禮也考工梓人職曰張五采之侯則逺國屬逺國謂諸侯來朝者也五采之侯即五正之侯也正之言正也射者內志正則能中焉畫五正之侯中朱次白次蒼次黃𤣥居外三正損𤣥黃二正去白蒼而畫以朱緑其外之廣皆居侯中參分之一中二尺今儒家云四尺曰正二尺曰鵠鵠乃用皮其大如正此說失之矣大射禮犴作干讀如宜犴宜獄之犴犴胡犬也士與士射則以犴皮飾侯下大夫也大夫以上與賔射飾侯以雲氣用采各如其正九節七節五節者奏樂以為射節之差言節者容侯道之數也樂記曰明乎其節之志不失其事則功成而德行立夏官此一條論天子以下賓射之法凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕此所謂獸侯也燕射則張之鄉射及賔射當張采侯二正而記此者天子諸侯之燕射各以其鄉射之禮而張此侯由是云焉白質赤質者謂采其地其地不采者白布也熊麋虎豹鹿豕皆正面畫其頭象於正鵠之處耳君畫一臣畫二陽竒隂偶之數也燕射射熊虎豹不妄上下相犯射麋鹿豕志在君臣相飬也其畫之皆毛物之屬凡畫者丹質賓射之侯燕射之侯皆畫雲氣於側以為飾必先以丹采其地丹淺於赤鄉射記此一條論天子以下燕射之侯樂師凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節騶虞采蘋采蘩皆樂章名在國風召南唯貍首在樂記射義曰騶虞者樂官備也貍首者樂㑹時也采蘋者樂循法也采蘩者樂不失職也是故天子以備官為節諸侯以時㑹為節卿大夫以循法為節士以不失職為節鄭司農云以大射禮曰樂正命大師曰奏貍首間若一大師不興許諾樂正反位奏貍首以射貍首曾孫春官鍾師凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩鄭司農云騶虞聖獸同上此二條論天子以下樂節天子之弓合九而成規諸侯合七而成規大夫合五而成規士合三而成規體往來之衰也往體寡來體多則合多往體多來體寡則合少而圜下夏官司弓矢此一條論天子以弓制君國中射則皮樹中以翿旌獲白羽與朱羽糅國中城中也謂燕射也皮樹獸名以翿旌獲尚文德也今文皮樹為繁豎糅為韜古文無以於郊則閭中以旌獲於郊謂大射也大射於大學王制曰小學在於公宮之左大學在郊閭獸名如驢一角或曰如驢岐蹄周書曰北唐以閭析羽為旌於竟則虎中龍旜於竟謂與鄰國君射也畫龍於旜尚文章也通帛為旜大夫兕中各以其物獲兕獸名似牛一角士鹿中翿旌以獲謂小國之州長也用翿為旌以獲無物也古文無以獲唯君有射於國中其餘否臣不習武事於君側也古文有作又今文無其餘否旌鄉射記此一條論諸侯以下中及獲之制右總要射人若王大射則以貍步張三侯鄭司農云貍步謂一舉足為一步於今為半步𤣥謂貍善搏者也行則止而擬度焉其發必獲是以量侯道法之也侯道者各以弓為度九節者九十弓七節者七十弓五節者五十弓弓之下制長六尺大射禮曰大侯九十參七十干五十是也三侯者司裘所共虎熊豹侯也列國之君大射亦張三侯數與天子同大侯熊侯也參讀為糝糝雜也雜者豹鵠而麋飾下天子大夫夏官車僕大射共三乏鄭司農云乏讀為匱乏之乏春官司常凡射共獲旌獲旌獲者所持旌同上服不氏射則贊張侯以旌居乏而待獲贊佐也大射禮曰命量人巾車張三侯杜子春云待當為持書亦或為持乏讀為匱乏之乏持獲者所蔽𤣥謂待獲待射者中舉旌以獲夏官掌次射則張耦次耦俱升射者次在洗東大射曰遂命三耦取弓矢於次天官笙師凡射共其鍾笙之樂鐘笙與鐘聲相應之笙春官典庸器祭祀帥其屬而設筍虡陳庸器賓射亦如之設筍虡眂瞭當以縣樂器焉陳功器以華國也同上司几筵大射王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几斧謂之黼其繡白黑采以絳帛為質依其制如屏風然於依前為王設席左右有几優至尊也鄭司農云紛讀為豳又讀為和粉之粉謂白繡也純讀為均服之均純緣也繅讀為藻率之藻次席虎皮為席書顧命曰成王將崩命大保芮伯畢公等被冕服憑玉几𤣥謂紛如綬有文而狹者繅席削蒲蒻展之編以五采若今合歡席矣畫謂雲氣也次席桃枝席有次列成文同上牛人賔射共其膳羞之牛羞進也所進賔之膳燕禮小臣請執幂者與羞膳者至獻賔而膳宰設折俎地官司服射則鷩冕射與諸侯射也鷩畫以雉謂草蟲也其衣三章裳四章凡七章春官大司樂大射王出入令奏王夏眂瞭賔射皆奏其鐘鼓擊朄以奏之其登歌大師自奏之鎛師祭祀鼓其金奏之樂賓射亦如之並春官射人掌國之三公孤卿大夫之位三公北面孤東面卿大夫西面其摯三公執璧孤執皮帛卿執羔大夫雁位將射始入見君之位不言士者此與諸侯之賔射士不與也燕禮曰公升即位於席西鄉小臣納卿大夫卿大夫皆入門右北面東上士立於西方東面北上大射亦云則凡朝燕及射臣見於君之禮同諸侯在朝則皆北面詔相其法謂諸侯來朝而未歸王與之射於朝者皆北面從三公位法其禮儀夏官司弓矢恆矢庳矢用諸散射恆矢安居之矢也庳矢象焉二者皆可以散射也謂禮射及習射也前後訂其行平也大射燕射共弓矢如數并夾如數如當射者之數也每一人一弓乘矢并夾矢籋也同上大司馬若大射則合諸侯之六耦大射王將祭射於射宮以選賢也王射三侯以諸侯為六耦小司馬凡射掌其事如大司馬之法並同上大史凡射事飾中舍算執其禮事舍讀曰釋鄭司農云中所以盛算也𤣥謂設算於中以待射時而取之中則釋之鄉射禮曰君國中射則皮豎中於郊則閭中於竟則虎中大夫兕中士鹿中天子之中未聞春官膳人掌王之用弓矢抉拾鄭司農云抉者所以縱弦也拾者所以引弦也詩曰決拾既佽詩家說或謂抉謂引弦彄也拾謂韝扞也𤣥謂抉挾矢時所以持弦飾也著右手巨指士喪禮曰抉用正王棘若檡棘則天子用象骨與韝扞著左臂裏以韋為之掌詔王射告王當射之節贊王弓矢之事授之受之夏官大僕王射則贊弓矢贊謂授之受之小臣賓射掌事如大僕之法賔射與諸侯來朝者射射人王射則令去侯立於後以矢行告卒令取矢鄭司農云射人主令人去侯所而立於後也以矢行告射人主以矢行高下左右告於王也大射禮曰大射正立於公後以矢行告於公下曰留上曰揚左右曰方杜子春說以矢行告告白射事於王王則執矢也杜子春說不與禮經合疑非是也卒令取矢謂射卒射人令當取矢者使取矢也𤣥謂令去侯者命負侯者去侯也鄉射曰司馬命獲者執旌以負侯祭侯則為位祭侯獻服不服不以祭侯為位為服不受獻之位也大射曰服不侯西北三步北面拜受爵與大史數射中射中數射者中侯之算也大射曰司射適階西釋弓去朴襲進由中東立於中南北面視算佐司馬治射正射正射之法儀也射鳥氏射則取矢矢在侯高則以并夾取之鄭司農云王射射鳥氏主取其矢矢在侯高者矢著侯高人手不能及則以并夾取之并夾針箭具夾讀為甲故司弓矢職曰大射燕射共弓矢并夾並同上祭侯之禮以酒脯醢謂司馬實爵而獻獲者於侯薦脯醢折俎獲者執以祭侯其辭曰惟若寧侯若猶女也寧安也謂先有功德其鬼有神毋或若女不寧侯不屬於王所故抗而射女或有也若如也屬猶朝㑹也抗舉也張也强飲强食詒女曾孫諸侯百福詒遺也曾孫諸侯謂女後世為諸侯者考工梓人大司樂及射令奏騶虞騶虞樂章名在召南之卒章王射以騶虞為節詔諸侯以弓矢舞舞謂執弓挾矢揖讓進退之儀官春樂師燕射帥射夫以弓矢舞射夫衆耦也故書燕為舞帥為率射夫為射矢鄭司農云舞當為燕率當為帥射矢當為射夫大師大射帥瞽而歌射節射節王歌騶虞並同上右天子射儀敦弓既堅四鍭既鈞舍矢既均序賔以賢敦弓既句既挾四鍭四鍭如樹序賔以不侮大雅行葦詳見嘉事雜記篇諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮詳見射義君與射則為下射袒朱襦樂作而后就物小臣以巾授矢稍屬不以樂志既發則小臣受弓以授弓人上射退於物一笴既發則答君而俟若飲君燕則夾爵君在大夫射則肉袒詳見燕禮君使士射不能則辭以疾言曰某有負薪之憂射者所以觀德唯有疾可以辭也使士射謂以備耦也憂或為疾曲禮右諸侯以下射儀大射鄉射有正篇侯中樂節等已見總要章賓之初筵左右秩秩籩豆有楚殽核維旅酒既和旨飲酒孔偕鐘鼓既設舉酬逸逸大侯既抗弓矢斯張射夫既同獻爾發功發彼有的以祈爾爵賦也初筵初即席也左右筵之左右也秩秩有序也楚列貌殽豆實也核籩實也旅陳也和旨謂美也孔甚也偕齊一也設宿設而又遷於下也大射樂人宿縣厥明將射乃遷樂於下以避射位是也舉酬舉所奠之酬爵也逸逸往來有序也大侯君侯也天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕天子侯身一丈其中三分居一白質畫熊其外則丹地畫以雲氣抗張也凡射張侯而不繫左下綱中掩束之至將射則司馬命張侯弟子脫束遂繫左下綱也大侯張而弓矢亦張節也射夫既同比其耦也射禮選羣臣為三耦三耦之外其餘各自取匹謂之衆耦獻猶奏也發發矢也的質也祈求也爵射不中者飲豐上之觶也者衛武公飲酒悔過而作此詩此章言因射而飲初筵禮儀之盛酒既調美而飲者齊一至於設鐘鼓舉酬爵抗大侯張弓矢而衆耦拾發各心競云我以此求爵汝也筵小雅賔之初范獻子來聘公享之展莊叔執幣公將以酬賔射者三耦二人為耦公臣不足取於家臣家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦言公室卑微公臣不能備於三耦襄二十九年左氏傳司弓矢王弓弧弓以授射甲革椹質者往禮寡來體多曰王弧甲革革甲也春秋傳曰蹲甲而射之質正也樹椹以為射正射甲與椹試弓習武也澤共射椹質之弓矢鄭司農云澤澤宮也所以習射選士之處也射義曰天子將祭必先習射於澤澤者所以擇士也已射於澤而后射於射宮射中者得與於祭夏官圉師射則充椹質杜子春讀椹為齊人言鐵椹之椹椹質所射者習射處同上禮射不主皮主皮之射勝者又射不勝者降禮射謂以禮樂也大射賔射燕射是矣不主皮者貴其容體比於禮其節比於樂不待中為雋也言不勝者降則不復升射也主皮者無侯張獸皮而射之主於獲也尚書傳曰戰鬪不可不習故於搜狩以間之也間之者貫之也貫之者習之也凡祭取餘獲陳於澤然後卿大夫相與射也中者雖不中也取不中者雖中也不取何以然所以貴揖讓之取也而賤勇力之取嚮之取也於囿中勇力之取也今之取也於澤宮揖讓之取也澤習禮之處非所以行禮其射又主中此主皮之射與天子大射張皮侯賔射張五采之侯燕射張獸侯鄉射記右武射戰鬭不可不習故於獀狩間之也間之者貫之也貫之也者習之也已祭取餘獲陳於澤澤射宮也然後卿大夫相與射命中者雖不中取也命不中者雖中不取何以也所以貴揖讓之取而賤勇力之取也嚮之取於國中勇力之取也今之取於澤揖讓之取也尚書大傳散軍而郊射左射貍首右射騶虞而貫革之射息也郊射為射宮於郊也左東學右西學也貍首騶虞所以歌為節也貫革射穿甲革也樂記射義嘉禮十七古者諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮故燕禮者所以明君臣之義也鄉飲酒之禮者所以明長幼之序也言别尊卑老稚而後射以觀德行也故射者進退周旋必中禮內志正外體直然後持弓失審固持弓矢審固然後可以言中此可以觀德行矣內正外直習於禮樂有德行者也正鵠之名出於此也其節天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節騶虞者樂官備也貍首者樂㑹時也采蘋者樂循法也采蘩者樂不失職也是故天子以備官為節諸侯以時㑹天子為節卿大夫以循法為節士以不失職為節故明乎其節之志以不失其事則功成而德行立德行立則無暴亂之禍矣功成則國安故曰射者所以觀盛德也騶虞采蘋采蘩今詩篇名貍首逸下云曾孫侯氏是也樂官備者謂騶虞曰一發五豝喻得賢者多也于嗟乎騶虞嘆仁人也樂㑹時者謂貍首曰小大莫處御於君所樂循法者謂采蘋曰于以采蘋南澗之濵循澗以采蘋喻循法度以成君事也樂不失職者謂采蘩曰被之童童夙夜在公是故古者天子以射選諸侯卿大夫士射者男子之事也因而飾之以禮樂也故事之盡禮樂而可數為以立德行者莫若射故聖王務焉選士者先德行乃後決之於射男子生而有射事學禮樂以飾之是故古者天子之制諸侯嵗獻貢士於天子天子試之於射宮其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓而削地故曰射者射為諸侯也嵗獻獻國事之書及計偕物也三嵗而貢士舊說云大國三人次國二人小國一人是以諸侯君臣盡志於射以習禮樂夫君臣習禮樂而以流亡者未之有也流猶放也書曰流共工於幽州故詩曰曽孫侯氏四正具舉大夫君子凡以庶士小大莫處御於君所以燕以射則燕則譽言君臣相與盡志於射以習禮樂則安則譽也是以天子制之而諸侯務焉此天子之所以養諸侯而兵不用諸侯自為正之具也此曾孫之詩諸侯之射節也四正正爵四行也四行者獻賓獻公獻卿獻大夫乃後樂作而射也莫處無安居其官次者也御猶侍也以燕以射先行燕禮乃射也則燕則譽言國安則有名譽譽或為與射義射之為言者繹也或曰舍也繹者各繹已之志也故心平體正持弓矢審固持弓矢審固則射中矣故曰為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射已之鵠故天子之大射謂之射侯射侯者射為諸侯也射中則得為諸侯射不中則不得為諸侯大射將祭擇士之射也以為某鵠者將射還視侯中之時意曰此鵠乃為某之鵠吾中之則成人不中之則不成人也得為諸侯謂有慶也不得為諸侯謂有讓也天子將祭必先習射於澤澤者所以擇士也已射於澤而后射於射宮射中者得與於祭不中者不得與於祭不得與於祭者有讓削以地得與於祭者有慶益以地進爵絀地是也澤宮名士謂諸侯朝者諸臣及所貢士也皆先令習射於澤己乃射於射宮課中否也諸侯有慶者先進爵有讓者先削地故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用穀也飯食之謂也男子生則設弧於門左三日負之又為之射乃食子也射者仁之道也射求正諸巳已正而后發發而不中則不怨勝巳者反求諸已而已矣諸猶於也孔子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子必也射乎言君子至於射則有爭也下降也亦揖讓而升降勝者袒決遂執張弓不勝者襲說決拾卻左手右加弛弓於其上而升飲君子恥之是以射則爭中孔子曰射者何以射何以聽循聲而發發而不失正鵠者其唯賢者乎若夫不肖之人則彼將安能以中何以言其難也聲謂樂節也畫布曰正棲皮曰鵠正之言正也鵠之言梏也梏直也言人正直乃能中也發或為射其郊特牲篇孔子曰射之以樂也何以聽何以射注多射容與樂節相應也詩云發彼有的以祈爾爵祈求也求中以辭爵也酒者所以養老也所以養病也求中以辭爵者辭養也發猶射也的謂所射之識也言射的必欲中之者以求不飲女爵也辭養讓見飬也爾或為有同上子曰射不主皮為力不同科古之道也射不主皮鄉射禮文為力不同科孔子解禮之意如此也皮革也布侯而棲革於其中以為的所謂鵠也科等也古者射以觀德但主於中而不主於貫革蓋以人之力有强弱不同等也記曰武王克商散軍郊射而貫革之射息正謂此也周衰禮廢列國兵爭復尚貫革故孔子歎之論語子曰射有似乎君子失諸正鵠反求諸其身反求於其身不以怨人畫布曰正棲皮曰鵠中庸孔子曰士使之射不能則辭以疾縣弧之義也男子生而設弧於門左示有射道而未能也女子設帨郊特牲天子所以親射何助陽氣逹萬物也春氣微弱恐物有窒塞不能自達者夫射自內發外貫堅入剛象物之生故以射達之也含文嘉曰天子射熊諸侯射麋大夫射虎豹士射鹿豕天子所以射熊何示服猛巧佞也熊為獸猛巧者非但當服猛也示當服天下巧佞之臣也諸侯射麋者示達迷惑人也麋之言迷也大夫射虎豹者示服猛也士射鹿豕者示除害也各取德所能服也大夫士兩射者人臣示為君親視事身勞苦也侯者以布為之何用人事之始也本正則末正矣所以名為侯何明諸侯有不朝者則射之所以不射正身何君子重同類不忍射之故畫獸而射之射正何為乎曰射義非一也夫射者執弓堅固心平體正然後中也二人爭勝樂以德養也勝負俱降以崇禮讓可以選士故射選士大夫勝者發近而制遠也其兵短而害長也故可以戒難也所以必因射助陽選士者所以扶助微弱而抑其强和調隂陽戒不虞也因射習禮樂射於堂上何示從上制下也天子射百二十步諸侯九十步大夫七十步士五十步明尊者所服逺卑者所服近也白虎通禮書綱目卷十一
