body:
  text: 禮書綱目卷七十六婺源江永撰曲禮曲禮一曲禮曰毋不敬禮主於敬見疏曰云曲禮曰是引儀禮正經今不者或在三千散亡之中也儼若思儼矜莊貌人之坐思貌必儼然安定辭審言語也易曰言語者君子之樞機疏曰鄭氏注云樞謂户樞機謂弩牙户樞之發或明或暗弩牙之發或中或否以喻君子之言或榮或辱安民哉此上三句可以安民說曲禮者美之云耳又或問敬程子曰主一之謂敬問一曰無適之謂一曰但整齊嚴肅則心自一一則自無非辟之干矣安吕大臨曰毋不敬者正其心也儼若思者正其貌也定辭者正其言也三者正則無所往而非正所謂大人正已而物正者也天下至大取諸修身而無不足故曰安民哉此禮之本故於曲禮首章言之敖不可長欲不可從志不可滿樂不可極敖五報反長丁丈反從足用反樂音洛四者慢遊之道桀紂所以自禍賢者狎而敬之畏而愛之狎習也近也謂附而近之習其所行也月令曰雖有貴賤近習心服曰畏曾子曰吾先子之所畏衰朱子曰人之常情與人親狎則敬弛有所畏敬則愛惟賢者乃能狎而敬之是以雖安而不慢畏而愛之是以貌恭而情親也愛而知其惡憎而知其善謂凡與人交不可以已之愛憎誣人之善惡惟朱子曰已之愛憎或出私心而人之善惡自有公論賢者存心中正乃能不以此而廢彼也積而能散謂已有蓄積見貧窮者則當能散以賙救之若宋樂氏疏曰樂氏事見春秋襄二十九年傳安安而能遷謂已今安此之安圖後有害則當能遷晉舅犯與姜氏醉重耳而行近之六疏曰舅犯事見春秋僖二十三年傳皆朱子曰此上句文意大同皆䝉賢者二字為文言衆人所不能唯賢者能之耳舊注非是臨財毋苟得為傷亷也疏為于僞反下同曰非義而取之謂之苟得臨難毋苟免難乃旦反為傷義也狠毋求勝分毋求多狠胡懇反分扶問反䦧為傷㔻也狠䦧也謂爭訟也詩云兄弟䦧于牆呼厯反疏曰小小䦧狠當引過歸已不可求勝元是衆人之物當共分之毋得求多入已禮不妄說人說音悅為近佞媚也君子說之不以其道則不說也人朱子曰禮有常度不可為佞媚以求說於世不辭費為傷信君子先行其言而後從之朱子曰辭達則止不貴於多禮不踰節不侵侮不好狎好呼報反卑為傷敬也凡人習近為好狎上疏曰禮所以辨尊别等級使上不逼下下不僭故不踰越節度禮主於敬自卑而尊人故不侵犯侮慢於人賢者狎而敬之若直近而習之則是好狎修身踐言謂之善行行下孟反下同之踐履也言履而行行修言道禮之質也言道言合于道質猶本也禮為之文飾耳禮聞取於人不聞取人取於舊七樹反謂趣就師求道也皇如字謂取師之道其謂君人者取於人謂高尚其道取人謂制服身禮聞來學不聞往教尊道藝於朱子曰此雖兩節其實互明一事也取人者童䝉求我朋自逺來也取人者好為人師我求童䝉也禮有取於人所以彼有來學無取人所以我無往教也大上貴德大音泰施大上帝皇之世其民施而不惟報始豉反下同疏曰惟思也其次務施報三王之世禮始興焉禮尚往來往而不來非禮也來而不往亦非禮也疑事毋質質成也彼已俱疑而已成言之終不然則傷知知音智疏曰人多專固未知而為已知故戒之若成言疑事後為賢人所譏則傷已智也直而勿有直正也已若不疑則當稱師友而正之謙也有疏曰當稱師友所說以正之勿為已此義也並曲禮不疑在躬躬身也不服行所不知使身疑也不度民械度大洛反械户戒反器械兵器也不計度民家之物使已亦有强朱子曰為不欲校人之弱且嫌不審也不願於大家大謂富之廣也朱子曰嫌有貪欲汰侈之意不訾重器訾子斯反計訾思也重猶寶也成朱子曰訾猶度也下毋訾衣服器字義同此國語云訾相其質漢書云為無訾者又云不訾之身皆此義此言不訾重器者謂不欲量物之貴賤亦避不審也少儀不窺密嫌伺人之私也密隱曲處也不旁狎妄相服習終或爭訟與朱子曰旁泛及也泛人狎習不恭敬也不道舊故言知識之過失損友也孔子曰故舊不遺則民不偷惡朱子曰舊事既非今日所急且或揚人宿過以取憎如陳勝賓客言勝故情為勝所殺之類也不戲色暫變傾顔色為非常則人不長失敬也慢不長丁丈反絶句朱子曰戲色謂嬉笑侮之容上同毋拔來毋報往拔蒲末反報音赴也報讀為赴疾之赴拔赴皆疾人來往所之當有宿漸不可卒也卒才忽反毋瀆神瀆謂數而不敬數色角反毋循枉前日之不正不可復遵行當求自伸毋測未至測意度也億朱子曰孔子所謂逆詐不信之類也毋訾衣服成器訾思也成猶善也思此則疾貧也朱子曰與不訾重器之意同毋身質言語質成也聞疑則傳疑若成之則或有所誤也皆朱子曰即上文疑事毋質之意也此三節十七事非謙遜謹厚之道故戒之同上博聞强識而讓敦善行而不怠謂之君子識音志行下孟反敦厚君子不盡人之歡不竭人之忠以全交也歡謂飲食忠謂衣服之物而呂大臨曰君子躬自厚而薄責於人責人厚莫之應此交之所以難全也歡謂好於我也忠謂盡心於我也好於我者望之不深則不至於倦而難繼酬酒不舉三酌油油而退是也盡心於我者不要其必力致則不至於不能勉而絶詩云每有良朋蒸也無戎是也並曲禮右通言夫禮者所以定親踈決嫌疑别同異明是非也疏曰五服大功已上服粗者為親小功己下服精者為疏妾為女君期女君為妾若報之則太重降之則有舅姑為婦之嫌故全不服是決嫌孔子之喪門人疑所服子貢請若喪父而無服是決疑本同今異姑姊妹是也本異今同世母叔母及子婦是也主人未斂子游裼裘而弔得禮是也曾子襲裘而弔失禮非也但嫌疑同異是非之屬在禮甚衆各舉一事為證道德仁義非禮不成教訓正俗非禮不備分爭辨訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊朝直遙反宦音患分辨皆别宦仕也班次也涖臨也莊敬也學或為御此疏曰熊氏云宦謂學仕宦之事學謂習學六藝二者俱是事師左傳靈輒云宦三年矣服䖍云宦學也是學職事為宦也是以君子恭敬撙節退讓以明禮撙祖本反在撙猶趨也趨疏曰在貌為恭心為敬撙也節法度也言恆趨於法度鸚鵡能言不離飛鳥猩猩能言不離禽獸今人而無禮雖能言不亦禽獸之心乎夫惟禽獸無禮故父子聚麀鸚厄耕反離力智反猩音生麀音憂聚猶共也鹿牝曰麀獸疏曰通言之鳥不可曰獸亦可曰禽是故聖人作為禮以教人使人以有禮知自别於禽獸吕大臨曰人所以貴於物者理義也聖人因理義之同然而制之為禮然後父子有親君臣有義男女有别人道所以立而與天地參也縱恣怠放滅天理而窮人欲是果於自暴自棄而不欲齒於人類者乎人有禮則安無禮則危故曰禮者不可不學也夫禮者自卑而尊人雖負販者必有尊也而况富貴乎負販者尤輕佻志利宜若無禮然富貴而知好禮則不驕不淫貧賤而知好禮則志不懾懾之涉反曲懾猶怯惑並禮君子之容舒遲見所尊者齊遫齊側皆反遫音速也謙慤貌也遫猶蹙蹙疏曰舒遲閒雅也雖尋常舒遲若見所尊者則齊遫齊遫言自斂持不敢寬奢足容重舉欲遲也手容恭髙且正也目容端不睇祖也睇大計反口容止不妄動也聲容靜不噦咳也苦噦於厥反咳代反頭容直不傾顧也氣容肅似不息也立容德如有豫也授疏曰德得也立則磬折如人物豫己巳受得之之形也色容莊勃如戰色不疏曰常矜莊乍變動也玉藻坐如尸視貌正也敬玉藻注尸居神位慎也立如齊齊側皆反磬且聽也齊謂祭祀時時疏曰士虞禮主人哭出復位祝闔牖户如食間是祭有聽法磬謂屈身如磬之折祭前有齊所以自整齊祭日神前亦當齊則齊是先後通稱此言立如齊非祭前坐齊故云謂祭祀時朱子曰此二句上有若夫二字乃大戴曾子事父母篇文别起下文之義録者誤并取之也今刪去曲禮燕居告溫溫告謂教使也詩云溫溫恭人溫疏曰燕居色尚和善教人使人之時唯須溫不欲嚴栗凡祭容貌顔色如見所祭者如暏其人在此喪容纍纍纍良追反羸憊貌也皮羸力皮反憊拜反色容顚顚顚音田也憂思貌視容瞿瞿梅梅瞿紀具反貌不審貌也微疏曰瞿瞿驚遽之梅梅猶微謂微昧也言容繭繭繭古典反聲氣微也猶疏曰繭繭綿綿戎容暨暨暨其記反果毅貌也言容詻詻詻五格反教令嚴也色容厲厲義形貌也故疏曰以義斷割嚴威視容清明察於事也立容辨卑毋讇辨彼檢反讇音諂傾辨讀作貶自貶卑謂磬折也讇謂身以有下也頭頸必中頭容直山立不搖動也時行時而後行也詩云威儀孔時盛氣顚實揚休顚音田氣顚讀為闐揚讀為陽聲之誤也盛身中之使之闐滿其息若陽氣之休物也玉色色不變也至朱子曰自立容以下此又通言之玉藻賓客主恭祭祀主敬喪事主哀㑹同主詡詡况矩反若恭在貌也而敬又在心詡謂敏而有勇齊國佐疏曰詡謂敏大言語㑹同時貴在敏偼勇武自光大成二年左傳齊晉戰于鞍齊國佐陳辭以拒晉師是敏而有勇也少儀喪事欲其縱縱爾縱音總總趨事貌縱讀如領之總吉事欲其折折爾折大兮反人安舒貌詩云好提提故喪事雖遽不陵節吉事雖止不怠陵躐也止立俟事時也怠惰也故騷騷爾則野謂大疾曰大音泰下同疏喪事過為急疾則如田野之人急切無禮鼎鼎爾則小人謂大舒則疏曰吉事不自嚴敬如小人然形體寬慢也君子蓋猶猶爾疾舒之中吉疏曰君子於喪事得疾之中於事得舒之中蓋行禮之時明間法則志意猶猶然猶猶是曉逹之貌擅弓欣然喜樂者鐘鼓之色愀然清靜者縗絰之色漻然豐滿者兵甲之色愀七小反管子君子衰絰則有哀色端冕則有敬色甲胄則有不可辱之色衰七雷反證言色稱其服也稱尺反表記當食不歎食或以樂非歎所者疏曰人君吉食則有樂賤則無故云或也臨喪則必有哀色臨樂不歎介胄則有不可犯之色貌與事相宜配介甲也故君子戒愼不失色於人色厲而內荏貌恭心狠非情者也臨荏而審反朱子曰失色謂失其所當如喪不哀軍旅不嚴之類曲禮祭極敬不繼之以樂朝極辨不繼之以倦樂音洛朝直遙反下同半極猶盡也辨分别政事也祭義曰祭之日樂與哀饗之必樂疏曰祭禮極盡於敬不可於終末繼之以樂而不敬朝禮極盡於分别政事不可於終末繼之以解倦而不分别表記言語之美穆穆皇皇朝廷之美濟濟翔翔祭祀之美齊齊皇皇車馬之美匪匪翼翼鸞和之美肅肅雍雍美音儀濟子禮反齊如字皇音往匪芳非反皆匪讀如四牡騑騑之騑齊齊皇皇讀如歸往之往美當為儀字之誤也周禮教國子六儀一曰祭祀之容二曰賓客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容穆疏曰言語謂賓客言語故鄭注保氏云賓客之容穆皇皇皆美人之狀濟濟翔翔謂威儀厚重寬舒之貌皇謂歸往之往謂心所繫往孝子祭祀威儀嚴正心有繫屬故齊齊皇皇然匪匪翼翼皆是車馬之形狀故詩云四牡騑騑又云四牡翼翼皆是馬之嚴正也肅肅敬貌雍雍和貌少儀志有四興朝廷之志淵然清以嚴祭祀之志諭然思以和軍旅之志怫然愠然精以厲喪紀之志漻然憂以湫四志形中四色發外維如志色之經也怫符勿反慍紆粉反漻音聊清深也湫即由反容有四起朝廷之容師師然翼翼然整以敬祭祀之容遂遂然粥粥然敬以婉軍旅之容湢然肅然固以猛喪紀之容怮然懾然若不還容經也粥于六反婉紆晚反湢彼側反怮于求反又於久反懾質涉反若夫立而跛坐而蹁體怠懈志驕慠䟃視數顧容色不比動靜不以度咳唾疾言嗟氣不順皆禁也跛彼寄反蹁蒲堅反足不正也䟃七含反數音朔比毗志反咳音慨唾吐卧反並賈誼新書容經右容節子曰君子莊敬日强安肆日偷肆恣也偷苟且也肆或為䙝君子不以一日使其躬儳焉如不終日儳在鑑反又仕鑑反無儳焉可輕賤之貌也如不終日言人而無禮死時疏曰君子常行善道不以一日之間使其身儳焉可輕賤如小人不能終竟一日也表記正考父疏曰家語云宋泯公熙生弗父何何生宋父周周生世子勝勝生正考父考父生孔父嘉其後以孔為氏孔父生木金父金父生臯夷臯夷生防叔防叔避華氏之逼而奔魯生伯夏伯夏生叔梁紇梁紇生孔子佐戴武宣三人皆宋君三命兹益共其音恭下同位三命上卿也言髙益恭故其鼎銘云考父廟之鼎一命而僂再命而傴三命而俯僂力主反傴紆甫反俯共於傴傴共於僂循牆而走言不敢安行亦莫余敢侮其共如是人亦莫敢侮饘於是鬻於是以糊余口饘之然反鬻之六反言於是鼎中為饘鬻饘鬻糊屬至儉其共也如是昭七年左氏傳諸侯從劉康公成肅公㑹晉侯伐秦劉康公王季子成子受脤于社不敬脤市軫反故脤宜社之肉也盛以脤器曰脤宜出兵祭社之名盛音成劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福養威儀以致福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰膰音煩膰祭肉戎有受脤神之大節也交神之大節今成子惰棄其命矣惰則失中和之氣其不反乎既行成肅公卒于瑕成公十三年左氏傳柯陵之㑹㑹在魯成公十七年晉厲公視逺步髙厲公晉成公之孫景公之子州蒲也視逺望視逺步高舉足髙單襄公曰單音善朝襄公王卿士單之諡也夫君子目以定體足以從之是以觀其容而知其心矣體手足也心不固則容不正目以處義義宜也足以步目今晉侯視逺而足高目不在體在存也而足不步目其心必異矣目體不相從何以能久夫合諸侯民之大事也於是乎觀存亡故國將無咎其君在㑹步言視聽必皆無謫則可以知德矣明年晉弒厲公國語周語晉孫談之子周適周事單襄公談晉襄公之孫惠伯談也周者談之子晉悼公之名晉自獻公用驪姬之讒詛不畜羣公子故孫周適周事襄公立無跛跛彼義反跛偏任也視無還還音旋晴轉復反為旋聽無聳不聳耳而聽言無逺逺謂非耳目所及也晉國有憂未嘗不戚急其宗也有慶未嘗不怡慶福也怡悅也襄公有疾召頃公而告之頃公襄公之子曰必善晉周將得晉國其行也文行下孟反能文則得天地天地所胙小而後國胙才素反國胙福也天之所福小則得大則得天下且夫立無跛正也視無還端也聽無聳成也成定也言無逺慎也為晉休戚不背本也為于僞反背音佩休喜也被文相德非國何取相悉亮反非被服文德又以四行輔助之國何取言必得也及晉弒厲公迎而立之是為悼公晉以復霸復扶又反司上衛侯在楚北宮文子見令尹圍之威儀言於衛侯曰令尹似君矣將有他志言語瞻視行步不常雖獲其志不能終也公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世聞音問臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也棣直計反選息戀反選詩邶風棣棣富而間也數也言君臣上下父子兄弟內外大小皆有威儀也周詩曰朋友攸攝攝以威儀詩大雅攸所也攝佐也言朋友之道必相教訓以威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也樂音洛圍襄三十一年左氏傳明年令尹楚楚子而自立是為靈王後十三年楚人弒之于乾溪單子會韓宣子于周單子單成公視下言徐叔向曰單子其將死乎朝有著定著定朝內列位常處謂之表著會有表有會設表以為位衣有襘帶有結結古外反襘領會結𢃄結也會朝之言必聞于表著之位所以昭事序也視不過結襘之中所以道容貌也言以命之容貌以眀之失則有闕今單子為王官伯而命事於會視不登𢃄言不過步貌不道容而言不昭矣不道不共不昭不從貌正曰共言順曰從無守氣矣十二月單成公卒昭十一年左氏傳子贛由其家來謁於孔子孔子正顔舉杖磬折而立曰子之大親毋乃不寧乎放杖而立曰子之兄弟亦得無恙乎曵杖倍而行曰妻子家中得母病乎故身之倨佝手之高下顔色聲氣各有宜稱所以眀尊卑别疏戚也折之舌反倨紀具反佝公豆反稱去聲别彼列反賈誼容經天子視不上於夾不下於𢃄上時掌反下同夾音劫視夾交領也天子至尊臣之目不過此有疏曰此一節論天子以下其臣視君尊卑異之事夾謂朝祭服之曲領國君綏視綏他果反氏視國君彌高綏讀為妥妥視謂視上於夾疏曰庾云妥頽下之貌執器以心為平故以下為妥此視以面為平故妥下於面則上於夾也大夫衡視視大夫又彌高也衡平也平視謂視面也士視五步士視得旁遊目五步之中也視大夫以上上下遊目不得勢凡視上於面則敖敖五報反敖則仰下於帶則憂憂則低傾則姦辟頭旁視心不正也傾或為側流辟匹亦反似疏曰若祖尊者而欹側旁視目東西則有姦惡之意也曲禮凡與大人言始視面中視抱卒視面毋改衆皆若是若父則遊目毋上於面毋下於𢃄若不言立則視足坐則視膝詳見士相見篇坐視膝立視足應對言語視面士相見云子視父則遊目無上於面無下於𢃄若不言立則視足坐則視膝鄭云不言則伺其行起而已立視前六尺而大之蓋臣於君前視也近視六尺自此而廣之雖逺視而不過三丈六尺曲禮曰立視五嶲彼在車上與此不同也荀子視有四則朝廷之視端㳅平衡祭祀之視視如有將軍旅之視固植虎張喪紀之視下㳅垂綱視經也㳅古疏字賈誼容經右瞻視之容並坐不橫肱為害旁人授立不跪授坐不立為煩尊者俯仰受之曲禮受立授立不坐由便跪疏曰坐亦跪也凡尊卑相授乃以為敬受立謂尊者立以物與卑者卑者受此尊者之物授立謂尊者立己以物授尊者此皆不坐以尊者立已若坐則尊者屈而低身煩尊者故也性之直者則有之矣有之有跪者也謂受授於尊者而尊者短則跪不敢以長臨之有疏曰尊者天性直自如此短小若受授尊者之物則坐以尊者短小若立對之則以長臨尊故也少儀大祝辨九􅉔一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰褒􅉔九曰肅􅉔以享右祭祀大音泰􅉔音拜竒居宜反褒音報空稽首拜頭至地也頓首拜頭叩地也首拜頭至手所謂拜手也吉拜拜而後稽顙謂齊衰不杖以下者言吉者此殷之凶拜周以其拜與頓首相近故謂之吉拜云凶拜稽顙而後拜謂三年服者杜子春云振讀為振鐸之振動讀為哀慟之慟竒讀為竒偶之竒謂先屈一膝今雅拜是也或云竒讀曰倚倚拜謂持節持㦸拜身倚之以拜鄭大夫云動讀為董書亦或為董振董以兩手相擊竒拜謂一拜也褒讀為報報拜再拜是也鄭司農云褒拜今時持節拜是也肅拜但俯下手今時揖是也介者不拜故曰為事故敢肅使者𤣥謂振動戰栗變動之拜書曰王動色變一拜答臣下拜再拜拜神與尸享獻也謂朝獻饋獻也右讀為侑侑勸尸食而拜齊音咨撎於至反為事于僞反使所吏反疏曰此九拜之中四種是正拜五者逐事生名還依四者正拜而為之稽首頓首空首此三者相因而為之空首者先以兩手拱至地乃頭至手以其頭不至地故名空首頓首者為空首之時引頭至地首頓地即舉故名頓首稽首者稽稽留之稽頭至地多時則為稽首也此三者正拜也稽首拜中最重臣拜君之拜頓首平敵自相拜之拜空首君答臣下拜知義然者案左傳孟武伯曰非天子寡君無所稽首知武子曰天子在而君辱稽首寡君懼矣郊特牲曰大夫之臣不稽首非尊家臣以辟君也如是則諸侯於天子臣於君稽首禮之正大夫之臣及凡自敵者皆當從頓首之拜也如是差之君拜臣下當從空首其有敬事亦稽首故洛誥云周公拜手稽首成王拜手稽首此兩相尊敬故皆稽首肅拜者拜中最輕唯軍中有此肅拜婦人亦以肅拜為正其餘五者附此四種正拜振動附稽首吉拜附頓首凶拜亦附稽首竒拜附空首褒拜亦附稽首此九拜不專為祭祀而以祭禮結之者祭事重故舉言之又曰稽首頓首二種拜俱頭至地但稽首至地多時頓首至地即舉故以叩地言之謂若以首叩物然云所謂拜手即尚書拜手稽首也吉拜謂齊衰以下喪拜而云吉者對凶拜為輕此拜先作頓首後作稽顙稽顙還是頓首但觸地無容則謂之稽顙云齊衰不杖以下者以其杖齊衰入凶拜中故雜記云父在為妻不杖不稽顙明知父沒為妻杖而稽顙也云此殷之凶拜者檀弓云拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也三年之喪吾從其至者鄭注云自期如殷可則是齊衰不杖以下用殷之喪拜也云與頓首相近謂拜體相近也凶拜謂三年服者雜記云三年之喪以喪拜非三年喪以吉拜是也杜子春振動奇讀字後鄭皆從之雅拜倚拜二說後鄭皆不從鄭大夫振董之讀兩手相擊之說皆不從云奇拜謂一拜案燕禮大射君於臣有一拜之時後鄭從之云報拜謂再拜後鄭亦從司農持節拜之說後鄭不從肅拜之說案鄉飲酒賓客入門有撎八之法推手曰揖引手曰撎成十六年晉楚戰于鄢陵楚子使工尹襄問卻至以弓卻至云不敢拜命注云介者不拜又云為事故敢肅使者三肅使者而退是軍中有肅拜法後鄭引書王動色變者案今文大誓得火鳥之瑞使上附以周公書報誥于王王動色變雖不見拜文亦當為稽首拜也知再拜拜神與尸者特牲祝酌奠主人再拜又獻尸尸拜受主人拜送是也云侑勸尸食而拜者特牲少牢尸食祝侑主人皆有拜也未朱子曰注疏振動奇拜褒拜之義詳是否春官凡男拜尚左手左陽凡女拜尚右手右隂也內則婦人吉事雖有君賜肅拜為尸坐則不手拜肅拜為喪主則不手拜肅拜拜低頭也手拜手至地也婦人以肅拜為正凶事乃手拜耳為尸為祖姑之尸也士虞禮曰男男尸女女尸為喪主不手拜者為夫與長子當稽顙也其餘亦手拜而已雖或為唯或曰為喪主則不手拜肅拜也疏曰肅拜如今婦人拜也為尸坐者謂虞祭婦人為祖姑作尸也周禮坐尸嫌婦人或異故明之若平常祭無婦人之尸故設同几而已不手拜肅拜者婦人為尸或答拜時但肅拜而不手拜也又曰手拜以手至地則周禮空首鄭注周禮空首拜頭至手此云手至地者此手拜之法先以手至地而頭來至手故兩注不同其實一也肅拜婦人之常而昏禮拜扱地以其新來為婦盡禮於舅姑故也左傳穆嬴頓首於宣子者有求於宣子非禮之正也少儀介者不拜為其拜而蓌拜為于僞反蓌子卧反曰蓌則失容節蓌猶詐也疏著鎧者不為式敬故宜無所拜之也蓌挫也戎容暨暨著甲而屈拜則挫損其戎威之容也一云蓌詐也言著鎧而拜形儀不足似詐也屈朱子曰蓌猶言有所枝柱不利伸也曲禮揖人必違其位禮以變為敬已疏曰位已之位也於位而見前人已所宜敬者當離位而嚮彼遙揖是以燕禮君降階爾卿大夫鄭注云爾近也揖而移近之明雖君臣皆須違位而揖也同上步中武象趨中韶濩中丁仲反濩音護韶佩玉之聲緩則中武象速則中濩也荀子趨以采齊行以肆夏周還中規折還中矩進則揖之退則揚之然後玉鏘鳴也詳名器上天子穆穆諸侯皇皇大夫濟濟士蹌蹌庶人僬僬濟子禮反下同蹌七浪反僬子妙反皇皆行容止之貌也聘禮曰賓入門皇又曰且行又曰衆介北面鏘鏘焉凡行容尊者體盤卑者體蹙盛盤步丹反蹙子六反穆穆威儀多貌也皇皇自莊也濟濟徐行有節蹌蹌容貌舒揚也僬僬者卑盡之貌庶人卑賤都無容儀並僬僬行而已凡行容下不得兼上上得兼下皇是諸侯之容聘禮人臣而云皇者執玉入廟門得進其容亦如其君行禮也若在本國則濟濟衆介士也卑故不得進容猶蹌蹌而已曲禮君與尸行接武尊者尚徐蹈半迹疏曰君天子諸侯也武迹也接武者二足相躡每蹈於半未得各自成迹也尊者舒遲故君及尸並步遲狹大夫繼武迹相及也卑疏曰謂兩足跡相接繼也大夫漸故與尸行步稍廣逺也士中武迹間容迹躡疏曰中猶間也每徙足間容一足地乃之士極卑故及尸行步極廣也徐趨皆用是君大夫士之徐行也皆如與尸行之節也疾趨則欲發而手足毋移疾趨謂直行也疏數目若發謂起屨也移之言靡迤也毋移欲其直且正欲或為數數色角反迤羊爾反疏曰謂他事行禮須直身速行時既無所執持欲屨頭恆起無復繼接之異其迹或疏或數自若尋常但手足猶宜直正不得邪低靡迤搖動也圈豚行不舉足齊如流圈舉逺反又去阮反豚大本反齊音咨圈轉也豚之言若有所循不舉足曵踵則衣之齊如水之流矣孔子執圭則然此徐趨也疏曰圈豚行者言徐趨法曳轉足循地而行也不舉足謂足不離地齊裳下緝也足既不舉身又俯折則裳下委地曳足如水流狀也席上亦然尊處亦尚徐也是疏曰言在席上未坐其行之時亦如圈豚行齊如流也端行頥霤如矢辨行剡剡起屨頥音夷霤力救反辨皮彥反剡以漸反此疾趨也端直也頤或為䨨也而疏曰端行謂直身而行也頥霤者行既疾身乃小折頭直俯臨前頥如屋霤之垂也如矢者身趨前進不邪如箭也辨急也既是疾趨冝急行也剡剡身起貌急行欲速而身屨恆起也執龜玉舉前曵踵蹜蹜如也踵章勇反蹜色六反跟著徐趨之事疏曰踵足後也謂將行之際初舉足前後曳足跟行不離地舉足疾數也凡行容惕惕惕音傷也惕惕直疾貌凡行謂道路也直疏曰道路雖速疾又不忘於故其容直而疾也廟中齊齊齊才兮反恭慤貌也疏曰齊齊自收持嚴正之貌以對神不敢舒散故也朝廷濟濟翔翔莊敬貌也有疏曰濟濟威儀矜莊也翔翔行而張拱也玉藻帷薄之外不趨不見尊者行自由不為容也入則容行而張足曰趨以疏曰帷幔也薄簾也禮天子外屏諸侯內屏卿大夫簾士以帷外屏門外為之內屏門內為之邦君樹塞門是也臣先朝君至屏而加肅敬屏外不敬故不趨今言帷薄謂大夫士也其外不趨則內可趨為敬也堂上不趨為其迫也堂下則趨執玉不趨志重玉也聘禮曰上介授賓玉於廟門外內疏曰引聘禮證賓有執玉於堂下時也賓執玉入門不疾趨而為徐趨玉藻云執龜玉舉前曵踵蹜蹜如也注云著徐趨之事是也堂上接武武迹也迹相接謂每移足半躡之中人之迹尺二寸是疏曰半躡之每進六寸也堂下布武布武謂每移足各自成迹不相躡室中不翔又為其迫也行而張拱曰翔曲禮執玉執龜策不趨堂上不趨城上不趨策音䇿也於重器於近尊於迫狹無容步張足曰趨少儀凡奉者當心提者當帶奉芳勇反挈高下之節者疏曰物有宜奉持之者有冝提之者奉之仰手當心奉持其物提之者屈臂當帶而提挈其物帶有二處朝服之屬其帶則高於心深衣之類其帶則下於脅玉藻說大帶云三分帶下紳居二焉紳長三尺而居帶之下三分之二則帶之下去地四尺五寸矣人長八尺為限若帶下四尺五寸則帶上所除止三尺五寸故知朝服等帶則高也深衣云帶下毋厭髀上毋厭脅當毋骨者故知深衣之帶則下也今云提者當帶謂深衣之帶且古人恆著深衣此明平常提奉益可知也執天子之器則上衡國君則平衡大夫則綏之士則提之凡執主器執輕如不克執主器操幣圭璧則尚左手行不舉足車輪曳踵詳臣禮篇曲禮凡執幣者不趨容彌蹙以為儀不趨主慎也以進而益恭為威儀耳今文無容别疏曰案小行人合六幣玉馬皮圭璧帛皆稱幣下文云執玉則此幣謂皮馬享幣及禽摯皆是凡趨有二種有疾趨行而張足曰趨是也有徐趨則下文舒武舉前曳踵是也此云不趨者不為疾趨又不為徐趨但疾徐之間為之故以進而益恭為威儀也執玉者則唯舒武舉前曳踵唯舒者重玉器尤慎也武迹也舉前曳踵備􅠶跲也今文無者古文曳作抴􅠶音致跲其業反抴以制反也疏曰唯舒者案玉藻云執龜玉不趨為重玉器尤慎此篇直見以禽摯相見之禮無執玉朝聘之事而云執玉者因執贄兼見之也舒朱子曰注疏以舒字絶句陸佃曰容彌蹙同唯武則然則讀武字絶句矣其說近是士相見禮固頥正視平肩正背臂如抱鼓足間二寸端面攝纓端股整足體不搖肘曰經立因以微磬曰共立因以磬折曰肅立因以垂佩曰卑立立容也共音恭下同坐以經立之容肘不差而足不跌視平衡曰經坐微俯視尊者之膝曰共坐仰首視不出尋常之內曰肅坐廢首低肘曰卑坐坐容也跌徒結反低與低同行以微磬之容臂不搖掉肩不下上身似不則從然而任行容也掉徒弔反趨以微磬之容飄然翼然肩狀若㳅足如射箭趨容也旋以微磬之容其始動也穆如驚其固復也旄如濯絲跘旋之容也式六反跘步般反跪以微磬之容揄右而下進左而起手有抑揚各尊其紀跪容也拜以磬折之容吉事上左凶事上右隨前以舉項衡以下寧速無遲背項之狀如屋之𤣥拜容也𤣥未詳拜而未起伏容也賈誼容經右坐立拜揖步趨奉持之容襄公如晉孟獻子相公稽首相悉亮反至相儀也稽首首地知武子曰天子在而君辱稽首寡君懼矣稽首事天子之禮孟獻子曰以敝邑介在東表密邇仇讎仇讎謂齊楚與晉爭寡君將君是望敢不稽首傳言獻子能固事盟主襄三年左氏傳哀公㑹齊侯盟於䝉齊侯簡公弟平公敖也孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首十七年傳公及齊侯邾子盟於顧齊人責稽首責十七年齊侯為公稽首不見答顧齊地因歌之曰魯人之皋數年不覺使我高蹈臯緩也髙蹈猶逺行也言魯人皋緩數年不知答齊稽首故使我高蹈來為此㑹唯其儒書以為二國憂二國齊邾也言魯據周禮不肯答稽首令齊邾逺至二十一年傳大夫之臣不稽首非尊家臣以辟君也辟音避諸辟國君也疏曰侯稽首於天子大夫稽首於諸侯若大夫之臣又稽首於大夫便是一國兩君故云以避君也大夫得稽首於諸侯不辟天子者諸侯有大功德出封畿外專有其國故大夫得專盡臣禮事之也郊特牲孔子與門人立拱而尚右二三子亦皆尚右效孔子也孔子曰二三子之嗜學也嗜貪我則有姊之喪故也二三子皆尚左復正也喪尚右右隂也吉尚左左陽也檀弓君子之居恆當盧鄉明反鄉許亮寢恆東首首手又反首生氣也若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐迅音信衣於既反又如字敬天之怒日五盥沐稷而靧梁櫛用樿櫛髮晞用象櫛進禨進羞工乃升歌盥音管靧音悔櫛側乙反樿章善反禨其既反晞乾也沭靧必進禨作樂盈氣也更言進羞明為羞籩豆之實疏曰盥洗手也沭沐髮也靧洗面也取稷粱之潘汁用將洗面沐髮竝須滑故也然此大夫禮耳人君則沐靧皆梁也樿白理木也櫛梳也沐髮為除垢膩故用白理澀木以為櫛晞乾燥也沐已燥則已澀故用象牙滑櫛以通之也禨謂酒也少儀注云沐而飲酒曰禨是沐畢必進禨酒又進羞知非亷羞者庶羞為食而設今進禨則為飲設羞故知是羞籩羞豆非庶羞也進羞之後樂工乃升堂以琴瑟而歌以其新沐體虗補益氣也浴用二巾上絺下綌絺丑疑反綌去逆反刷刷去垢也色劣反出杆履蒯席連用湯杅音雩蒯若怪反連力旦反杅浴器也蒯席澀便於洗足也連猶釋也也疏曰出杅浴竟而出盆也蒯菲草席澀踐之刮去垢連用湯言釋去足垢用湯瀾也履蒲席衣晞身乃屨進飲衣於既反亦盈氣也進飲玉藻仲夏之月君子齊戒處必掩身毋躁齊側皆反猶掩猶隱翳也躁動也今月令毋躁為欲靜隂疏曰毋躁冝靜以安萌也止聲色毋或進進猶御見也聲謂樂也易及樂春秋說夏至人主與羣臣從八能之士作樂五日今止之非其道也疏曰歌樂華麗之事為助隂靜故止之毋或進者嬪房不得進御侍夕亦為微隂始動不可動於隂事也鄭必知諸緯文作樂為是者以周禮夏至祭地方澤皆有作樂之文不得云止樂也言朱子曰止聲色蓋亦處必掩身毋躁之義若以止樂則拘矣月令之說蓋多有未安而此難以為非也注文蓋失其指矣薄滋味毋致和和户卧反為其氣異此時傷人節耆欲定心氣耆市志反散微隂扶精不可也仲冬之月君子齊戒處必掩身身欲寧去聲色禁耆欲安形性事欲靜以待隂陽之所定去起吕反秋寧安也聲謂樂也易及樂春說云冬至人主與羣臣從八能之士作樂五日此言去樂又相反月令右居處齊潔之事子之燕居申申如也夭夭如也燕居閒暇無事之時楊氏曰申申其容舒也夭夭其色愈也程子曰此弟子善形容聖人處也為申申字說不盡故更著夭夭字今人燕居之時不怠惰放肆必太嚴厲嚴厲時著此四字不得怠惰放肆時亦著此四字不得惟聖人便自有中和之氣述而齊必有眀衣布齊側皆反明齊必沭浴浴竟即著眀衣所以潔其體也以布為之必有寢衣長一身有半長去聲著齊主於敬不可解衣而寢又不可以眀衣而寢故别有寢衣其半蓋以覆足齊必變食居必遷坐變食謂不飲酒不茹葷遷坐易常處也此一節記孔子謹齊之事楊氏曰齊所以交神故致潔變常以盡敬席不正不坐謝氏曰聖人心安於正故於位之不正者雖小不處寢不尸居不容尸謂偃卧似死人也居居家容容儀范氏曰寢不尸非惡其類於死也惰慢之氣不設於身體雖舒布其四體而亦未嘗肆耳居不容非惰也但不若奉祭祀見賓客而已申申天天是也迅雷風烈必變迅疾也烈猛也必變者所以敬天之怒記曰若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐黨並鄉言有四術言敬以國朝廷之言也文言有序祭祀之言也屏氣折聲軍旅之言也言若不足喪紀之言也言經也賈誼容經君命大夫與士肄在官言官在府言府在庫言庫在朝言朝朝言不及犬馬在朝言禮問禮對以禮詳臣禮恭敬章居喪不言樂祭事不言凶公庭不言婦女非其時也公事不私議嫌若姦也曲禮朝廷曰退近君為進廷疏曰謂於朝之中若欲散還則稱曰退燕遊曰歸禮褻主於家也師役曰罷罷音疲勞罷之言罷也春秋傳曰師還曰罷同疏曰莊八年秋師還公羊傳曰還者何等辭也此滅姓何善爾病之也何休云慰勞其罷病也是鄭用公羊為注也之朱子曰易曰或鼓或罷與史記將軍罷休就舍罷亦同少儀凡言非對也妥而後傳言與君言言使臣與大人言言事君與老者言言使弟子與幼者言言孝弟於父兄與衆言言忠信慈祥與居官者言言忠信詳見士相見禮擬人必於其倫擬魚起反士擬猶比也倫猶類也比大夫當於大夫比當於士不以其類則有所褻問天子之年對曰聞之始服衣若干尺矣既不敢言年又不敢斤至尊所能王疏曰此謂幼少新立之王或有逺方異域人來不知年大小問朝廷之臣臣答之必有法則禮齒路馬有誅而至尊體貴故臣不敢輕言君年及形長短與才技所堪故依違而對也但云聞之謙不敢言見也云始服衣若干尺謂或五尺或六尺隨長短而言之幼則衣短長則衣長問者聞之則知王之長幼矣古者謂數為若干故儀禮數射算云若干純若干竒若如也干求也言事本不定當如此求之也問國君之年長曰能從宗廟社稷之事矣幼曰未能從宗廟社稷之事也問大夫之子長曰能御矣幼曰未能御也問士之子長曰能典謁矣幼曰未能典謁也問庶人之子長曰能負薪矣幼曰未能負薪也長丁丈反下同御皆言其能則長幼可知猶主也書曰越乃御事謂主事者謁請也謂能擯贊出入以事請告也禮四十强而仕五十命為大夫疏曰國君言所能者辟天子也人君十五有飬子之禮能主國則知十五以上未能主國則知十四以下大夫子年長幼當以二十為限也御謂主事也官有世功子學父業故有御事之稱典謁主賓客告請之事也少儀士之子長曰能耕幼曰能負薪未能負薪謂士祿薄子猶以農事為業與此不同者亦當有田無田之異此士是有田者故子免耕負薪而典謁注引曲禮釋所以問其子之義以大夫士其年既定故不假問其年而問其子也曲禮問國君之子長幼長則曰能從社稷之事矣幼則曰能御未能御御謂御事若疏曰幼則曰能御御治也謂已能治事大幼則曰未能治事此治事謂尋常小於社稷之事問大夫之子長幼長則曰能從樂人之事矣幼則曰能正於樂人未能正於樂人正樂政也周禮大司樂以樂德教國子中和祇庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大韶大夏大濩大武習道音導卷音權令疏曰正謂政令以幼者樂未成但聽政於樂人受樂人所教問士之子長幼長則曰能耕矣幼則曰能負薪未能負薪士祿薄子以農事為業少儀問國君之富數地以對山澤之所出問大夫之富曰有宰食力祭器衣服不假問士之富以車數對問庶人之富數畜以對數色主反下數畜同畜許六反皆在其所制以多少對宰邑士也食力謂民之賦稅地疏曰問國君之富謂問諸侯之臣求知其君封內土所出也云富者非問其多金帛是問最所優饒者也不問天子者率土之物莫非王有故不須問也數地廣狹對之又以魚鹽金錫之屬隨有而對若晉文公謂楚成王曰羽毛齒革君地生焉是也問大夫之富非他國人問其臣也有宰明有采地食力謂食下民賦稅之力也衣服祭服也四命大夫得自造祭器衣服故不假若三命以下有田者造而不備則假借也士有地不多亦無邑宰故其屬吏但以其車數對上士三命則得賜車馬副車隨命中士乘棧車無副車也畜謂雞豚之屬弔喪弗能賵不問其所費問疾弗能遺不問其所欲見人弗能館不問其所舍賜人者不曰來取與人者不問其所欲賵音附遺于季反也皆為傷思也見人見行人館舍與人不問其所欲己物或時非其所欲將不與也並曲禮問品味曰子亟食於某乎問道藝曰子習於某乎子善於某乎亟去翼反德不斥人謙也道三三行也藝六藝及疏曰此明賓主相問之事雖先知其所食所習所善其問之猶疑而稱乎乎者謙退之辭是不正指斥人所能也少儀入竟而問禁入國而問俗入門而問諱竟音境中皆為敬主人也禁謂政教俗謂常所行與所惡也國城中也惡烏路反疏曰諱主人祖先之名宜先知之欲為避之也問諱而以門為限者主人出至大門外迎客客入門方應交接故於門為限也禮不諱嫌名二名不偏諱為其難辟也嫌名謂音聲相近若禹與雨丘與區也偏謂二名不一一諱也孔子之母名徴在言在不稱徴言徴不稱在辟音避下同禹雨並于矩反丘區並去求反今按區字古音本讀為丘釋文一讀丘于反疏謂丘與區音異義同皆非鄭指今不取君所無私諱謂臣言於君前不辟家諱尊無二大夫之所有公諱辟君諱也所疏曰於大夫之止得避公家之諱不得避大夫諱所以然者尊君諱也若兼為大夫諱則君諱不尊也或曰大夫所有公諱者君及大夫諱耳亦無已之私諱見玉藻辟玉藻於大夫所有公諱無私諱注云公諱若言語所先君之名疏曰謂士與大夫言但諱君家不自私諱父母也詩書不諱臨文不諱為其失事正疏曰何𦙍云詩書謂教學時臨文謂禮義文行事時諱今按詩書謂誦讀臨文謂作文玉藻教學臨文不注云為惑不知者廟中不諱為有事於高祖則不諱曽祖以下尊無二也於下則諱上夫人之諱雖質君之前臣不諱也臣於夫人之家恩逺也質猶對也疏曰夫人本家所諱臣雖對君前而言語不為諱也婦諱不出門婦親逺於宮中言辟之諱疏曰門謂婦宮門婦家之但於婦宮中不言耳若於宫外則不諱也大功小功不諱疏曰古者期親則為諱曲禮士於君所言大夫沒矣則稱諡若字名士與大夫言名士字大夫君所大夫存亦名君疏曰士於君所言大夫者謂士在君前與言論及於大夫也沒矣則稱諡若字者君前臣名若大夫生則士呼其名沒則於君前稱彼諡無諡則稱字不呼其名敬貴故也名士者士賤雖已死而此生士與君言猶呼其名也與大夫言名士字大夫者謂士與大夫言論及他生大夫士士賤故呼之名大夫貴故呼之字也若大夫士卒則字士諡大夫玉藻父前子名君前臣名對至尊無大小皆稱名晉疏曰成十六年鄢陵之戰公陷于淖欒書欲載侯針曰書退針是書之子對晉侯而稱書是於君前臣名其父也君使士射不能則辭以疾言曰某有負薪之憂射者所以觀德唯有疾可以辭也使士射謂以備耦也憂或為疾疏曰射法每兩人相對以决勝負名曰耦耦貴賤必對故卿與卿耦大夫與大夫耦或奇餘不足則使士備耦故有使士射之禮若不能不得云不能但當自稱有疾所以然者射以表德士既升朝必宜有德也負薪之憂言已有擔樵之餘勞不堪射也士祿代耕且問庶人子云能負薪而今云士負薪者亦謙辭也兼言昔未為士時經擔樵今猶發動昔日之勞也白虎通云天子病曰不豫諸侯曰負子公羊云負兹未知其說孰是隱義云諸侯曰不兹大夫曰犬馬士曰負薪並曲禮禮居是邑不非其大夫懼於訕上荀子國君去其國止之曰奈何去社稷也大夫曰奈何去宗廟也士曰奈何去墳墓也皆民臣殷勤之言諌疏曰大夫士去國謂三不從或以罪見黜者士雖無臣民而屬吏止之也士亦有廟辟大夫言墳墓亦與大夫互也曲禮右言語之禮孔子於鄉黨恂恂如也似不能言者恂相倫反賢恂恂信實之貌似不能言者謙卑遜順不以知先人也鄉黨父兄宗族之所在故孔子居之其容貌辭氣如此其在宗廟朝廷便便言唯謹爾朝直遙反下同便旁連反言便便辨也宗廟禮法之所在朝廷政事之所出不可不明辨故必詳問而極言之但謹而不放爾貌此一節記孔子在鄉黨宗廟朝廷言之不同也朝與下夫言侃侃如也與上大夫言誾誾如也侃若旦反誾魚巾反五此君未視朝時也王制諸侯上大夫卿下大夫人許氏說文侃侃剛直也誾誾和悅而諍也食不語寢不言答述曰語自言曰言范氏曰聖人存心不他當食而食當寢而寢言語非其時也楊氏曰肺為氣主而聲出焉寢食則氣窒而不通語言恐傷之也亦通並鄉黨子入大廟每事問或曰孰謂鄹人之子知禮乎入大廟每事問子聞之曰是禮也大音泰鄹側留反大廟魯周公廟此蓋孔子始仕之時入而助祭也鄹魯邑名孔子父叔梁紇嘗為其邑大夫孔子自少以知禮聞故或人因此而譏之孔子言是禮者敬謹之至乃所以為禮也尹氏曰禮者敬而已矣雖知亦問謹之至也其為敬莫大於此謂之不知禮者豈足以知孔子哉八佾孔子曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隱未見顔色而言謂之瞽君子有德位之通稱愆過也瞽無目不能察言觀色矣尹氏曰時然後言則無三者之患季氏魏中山舍人倉唐使文侯召倉唐而見之曰擊無恙倉唐曰唯唯如是者三乃曰君出太子而封之國君名之非禮也文侯怵然為之變容問曰子之君無恙乎倉唐曰臣來時拜送書於庭文侯指顧左右曰子之君長孰與是倉唐曰禮擬人必於其倫諸侯無偶無所擬之曰長大孰與寡人倉唐曰君賜之外府之裘則能勝之賜之辨𢃄則不更其造使色吏反見賢遍反唯于鬼反怵尺律反為于僞反勝音升更音更說苑君子不以辭盡人不見人之言語則以為善其餘行或時惡也故天下有道則行有枝葉天下無道則辭有枝葉行有枝葉所以益德也言有枝葉是聚虗華也枝葉依幹而生言行亦由禮出是故君子於有喪者之側不能賵焉則不問其所費於有病者之側不能饋焉則不問其所欲有客不能館則不問其所舍皆辟有言而無其實表記二名不偏諱夫子之母名徴在言在不稱徴言徴不稱在稱舉也雜記曰妻之諱不舉諸其側檀弓范獻子聘于魯范獻子宣子之子士鞅也聘在魯昭二十二年問具山敖山魯人以其鄉對言其鄉之山也獻子曰不為具敖乎對曰先君獻武之諱也獻伯禽之曾孫微公之子獻公具也武獻公之庶子武公敖也獻子歸遍告其所知曰人不可以不學吾適魯而名其二諱為笑焉唯不學也言學則必知諱不見笑也禮入境而問禁入門而問諱人之有學也如木之有枝葉也木有枝葉猶庇䕃人而况君子之學乎國語晉語晉獻文子成室晉大夫發焉文子趙武也作室成晉君獻之謂賀也諸大夫亦發禮以往張老曰美哉輪焉美哉奐焉心譏其奢也輪輪困言高大奐言衆多歌於斯哭於斯聚國族於斯祭祀死喪燕㑹於此足矣言此者欲防其後復為文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也北面再拜稽首全要領者免於刑誅也晉卿大夫之墓地在九原京蓋字之誤也當為原君子謂之善頌善禱善頌謂張老之言善禱謂文子之言禱求也檀弓凡尊必尚𤣥酒不忘古也唯君面尊面猶鄉也燕禮曰司官尊于東楹之西兩方壺左𤣥酒公尊瓦大兩有豐在尊南面上唯饗野人皆酒飲賤者不備禮玉藻尊者以酌者之左為上尊尊者設尊者也酌者鄉尊其左則右尊也尊壺者面其鼻鼻在面中言鄉人也凡洗必盥先盥乃洗爵先自潔也盥有不洗也並少儀飲玉爵者弗揮為其寶而脆曲禮飲酒者禨者醮者有折俎不坐折俎尊徹之乃坐也已沐飲曰禨酌始冠曰醮取俎進俎不坐以其有足亦柄尺之類其有折俎者取祭反之不坐燔亦如之亦為柄尺之類也燔炙也鄉射曰賓奠爵于薦西取肺坐絶祭左手嚌之興加于俎坐悅手尸則坐尸尊也少牢饋食禮曰尸左執爵右兼取肝肺擩于俎鹽振祭嚌之加于菹豆並少儀諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珍故謂祭饗王制牛羊之肺離而不提心提猶絶也􅩿離之不絶中央少者使易絶以祭耳君子不食圂腴周禮圂作豢謂犬豕之屬食未穀者也腴有似於人穢羞首者進喙祭耳耳出見也並少儀大祝辨九祭一曰命祭二曰衍祭三曰炮祭四曰周祭五曰振祭六曰擩祭七曰絶祭八曰繚祭九曰共祭杜子春云命祭祭有所主命也振祭振讀為慎禮家讀振為振旅之振擩祭擩讀為虞芮之芮鄭司農云衍祭羡之道中如今祭殤無所主命周祭四面為坐也炮祭燔柴也爾雅曰祭天曰燔柴擩祭以肝肺菹擩鹽醢中以祭也繚祭以手從肺本循之至于未乃絶以祭也絶祭不循其本直絶肺以祭也重肺賤肝故初祭絶肺以祭謂之絶祭至祭之末禮殺之後但擩肝鹽中振之擬之若祭狀弗祭謂之振祭特牲饋食禮曰取菹擩于醢祭于豆間鄉射禮曰取肺坐絶祭鄉飲酒禮曰右取肺左卻手執本坐弗繚右絶末以祭少牢曰取肝擩于鹽振祭𤣥謂九祭皆謂祭食者命祭者玉藻曰君若賜之食而君客之則命之祭然後祭是也衍字當為延炮字當為包聲之誤也延祭者曲禮曰客若降等執食興辭主人興辭於客然後客坐主人延客祭是也包猶兼也兼祭者有司曰宰夫贊者取白黑以授尸尸受兼祭于豆祭是也周猶遍也遍祭者曲禮曰殽之序遍祭之是也振祭擩祭本同不食者擩則祭之將食者既擩必振乃祭也絶祭繚祭亦本同禮多者繚之禮略者絶則祭之共猶授也王祭食宰夫授祭孝經說曰共綏執授春官凡齊執之以右居之於左齊謂食羮醬飲有齊和者也居於左手之上右手執而正之由便也凡羞有湆者不以齊齊和也並少儀羮之有菜者用梜其無菜者不用梜梜猶箸也今人或謂梜為梜提曲禮未步爵不嘗羞步行也少儀為天子削瓜者副之巾以絺副析也既削又四析之乃橫斷之而巾覆焉為國君者華之巾以綌華中裂之不四析也為大夫纍之纍倮也謂不巾覆也士疐之不中裂橫斷去疐而已庶人齕之不橫斷曲禮食棗桃李弗致於核恭也弗致者謂不置於地瓜祭上環食中棄所操上環頭忖也也朱子曰頭忖謂疐頭所切一環以其所生之本味最甘美又先斷而不汚故以為祭中者中環也亦甘且潔故以奉尊者所操下環為手所持處以其味薄而不潔故棄之而不食也玉藻為君子擇葱薤則絶其本末為有萎乾少儀一室之人非賓客一人徹同事合居者也賓客則各徹其饌也一食之人一人徹一猶聚也為赴事聚食也凡燕食婦人不徹婦人質不備禮玉藻餕餘不祭父不祭子夫不祭妻食人之餘曰餕餕而不祭唯此類也食尊者之餘則祭盛之恐朱子曰禮君賜腥則熟而薦之以為榮若賜熟食則是餕餘故不祭妻子雖卑於已然既沒則以神道接之故亦不以祭也曲禮右飲食之禮凡言賓主之事附相見禮侍食於君者附臣禮事長者附少儀其雜者附此篇有虞氏祭首夏后氏祭心殷祭肝周祭肺氣主盛也位明堂食不厭精膾不厭細食飯也精鑿也牛羊與魚之腥聶而切之為膾食精則能飬人膾粗則能害人不厭言以是為善非謂必欲如是也食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食饐飯傷熱濕也餲味變也魚爛曰餒肉腐曰敗色惡臭惡未敗而色臭變也飪烹調生熟之節也不時五穀不成果實未熟之類此𢾗者皆足以傷人故不食割不正不食不得其醬不食割肉不方正者不食造次不離於正也漢陸續之母切肉未嘗不正斷葱以寸為度蓋其質美與此暗合也食肉用醬各有所宜不得則不食惡其不備也此二者無害於人但不以嗜味而苟食耳肉雖多不使勝食氣惟酒無量不及亂食以穀為主故不使肉勝食氣酒以為人合歡故不為量但以醉為節而不及亂耳程子曰不及亂者非惟不使亂志雖血氣亦不可使亂但浹洽而已可也沽酒市脯不食沽市皆買也恐不精潔或傷人也與不嘗康子之藥同意不撤薑食薑通神明去穢惡故不撤不多食適可而止無貪心也祭於公不宿肉祭肉不出三日出三日不食之矣助祭於公所得胙肉歸即頒賜不俟經宿者不留神惠也家之祭肉則不過三日皆以分賜蓋過三日則肉必敗而人不食之是褻鬼神之餘也但比君所賜胙可少緩耳食不語寢不言答述曰語自言曰言范氏曰聖人存心不他當食而食當寢而寢言語非其時也楊氏曰肺為氣主而聲出焉寢食則氣窒而不通語言恐傷之也亦通雖疏食菜羮瓜祭必齊如也古人飲食每種各出少許置之豆間之地以祭先代始為飲食之人不忘本也齊嚴敬貌孔子雖薄物必祭其祭必敬聖人之誠也此一節記孔子飲食之節謝氏曰聖人飲食如此非極口腹之欲蓋飬氣體不以傷生當如此然聖人之所不食窮口腹者或反食之欲心勝而不暇擇也論語齊大饑黔敖為食於路以待饑者而食之有餓者蒙袂輯屨貿貿然來蒙袂不欲見人也輯斂也斂屨力憊不能屨也貿貿日不明之貌黔敖左奉食右執飲曰嗟來食揚其目而視之曰豫唯不食嗟來之食以至於斯也嗟來食雖閔而呼之非敬辭從而謝焉終不食而死從猶就也曽子聞之曰微與其嗟也可去其謝也可食微猶無也無與止其狂狷之辭檀弓為人祭曰致福為已祭而致膳於君子曰膳祔練曰告此皆致祭禮之餘於君子攝主言致福申其辭也自祭言膳謙也祔練言告不敢以為福膳也凡膳告於君子主人展之以授使者於阼階之南南面再拜稽首送反命主人又再拜稽首展者具也其禮大牢則以牛左肩臂臑折九箇少牢則以羊左肩七箇犆豕則以豕左肩五箇折斷分之也皆用左者右以祭也羊豕不言臂臑因牛序之可知其以乘壺酒束修一犬賜人若獻人則陳酒執修以將命亦曰乘壺酒束修一犬陳重者執輕者便也乘壺四壺也酒謂清也糟也不言陳犬或無修者牽犬以致命也於卑者曰賜於尊者曰獻其以鼎肉則執以將命鼎肉謂牲體已解可升於鼎其禽加於一雙則執一雙以將命委其餘加猶多也犬則執緤守犬田犬則授擯者既受乃問犬名牛則執紖馬則執靮皆右之緤靷靮皆所以繫制之者守犬田犬問名畜飬者當呼之名謂若韓盧宋鵲之屬右之者執之宜由便也臣則左之異於衆物臣謂囚俘車則說綏執以將命甲若有以前之則執以將命無以前之則袒櫜奉胄甲鎧也有以前之謂他摯幣也橐㢰鎧衣也胄兜鍪也袒其衣出兜鍪以致命器則執蓋謂有表裏弓則以左手屈韣執拊韣弓衣也左手屈衣并於拊執之而右手執蕭劍則啓櫝蓋襲之加夫襓與劍焉櫝謂劍函也襲郤合之夫襓劍衣也加劍於衣上夫或為煩皆發聲笏書修苞苴弓茵席枕凡穎杖琴瑟戈有刃者櫝策籥其執之皆尚左手苞苴謂編束蕉葦以襄魚肉也茵著蓐也穎警枕也策著也籥如笛三孔皆十六物也左手執上上陽也右手執下下隂也刀卻刃授穎削授拊辟用時穎鐶也拊謂杞凡有刺刃者以授人則辟刃辟刃不以正鄉人也並少儀水潦降不獻魚鱉不饒多也獻鳥者佛其首為其喙害人也佛戾也蓋為小竹籠以冒之畜鳥者則勿佛也畜飬也飬則馴獻車馬者執䇿綏獻甲者執胄獻杖者執末獻民虜者操右袂獻粟者執右契獻米者操量鼓獻孰食者操醬齊獻田宅者操書致凡操執者謂手所舉以告者也設其大者舉其小者便也甲鎧也胄兜鍪也民虜軍所獲也操其右袂制之契劵要也右為尊量鼓量器名凡遺人弓者張弓尚筋弛弓尚角弓有往來體皆欲令其常曲隤然順也遺人無時已定體則張之未定體則弛之右手執簫左手承弣簫弭頭也謂之簫簫邪也弣把中尊卑垂帨帨佩巾也磬折則佩垂授受之儀尊卑一朱子曰此謂賓主雖或一尊一卑然皆當磬折垂帨也若主人拜拜受也則客還辟辟拜辟拜謙不敢當主人自受由客之左接下承弣由從也從客之左右客尊之接下接客手下也承弣郤手則簫覆手與鄉與客並然後受於堂上則俱南面禮敵者並授進劍者左首左首尊也進戈者前其鐏後其刃進矛㦸者前其鐓後刃敬也三兵鐏鐓雖在下猶為首鋭底曰鐏取其鐏地平底曰鐓取其鐓地進几杖者拂之尊者所馮依拂去塵敬效馬效羊者右牽之用右手便效猶呈見效犬者左牽之犬齛齧人右手當禁備之執禽者左首左首尊飾羔鴈者以繢繢畫也諸侯大夫以布天子大夫以畫受珠玉者以掬慎也掬手巾受弓劍者以𬒮敬也凡以弓劒苞苴簞笥問人者問猶遺也苞苴裏魚肉或以葦或以茅簞笥盛飯食者圜曰簞方曰笥操以受命如使之容謂使者曲禮君將適他臣如致金玉貨貝於君則曰致馬資於有司敵者曰贈從者適他行朝會也資猶用也贈送也少儀凡於尊者有獻而弗敢以聞此所獻亂也少儀曰君將適他臣若致金玉貨貝於君則曰致馬資於有司是其類也凡獻於君大夫使宰士親皆再拜稽首送之敬也膳於君有葷桃茢於大夫去茢於士去葷皆造於膳宰膳美食也葷桃茢辟凶邪也大夫用葷桃士桃而已葷薑及辛菜也茢炎帚也造於膳宰既致命而授之葷或作焄凡賜君子與小人不同日慎於尊卑大夫親賜士士拜受又拜於其室衣服弗服以拜異於君惠也拜受又就拜於其家是所謂再拜也敵者不在拜於其室謂來賜時不見也見則不復往也酒肉之賜弗再拜輕也受重賜者拜受又拜於其室也並玉藻君子於有饋者弗能見則不視其饋饋遺也不能見謂有疾也不視猶不內也坊記右問遺之禮問人於他邦再拜而受之拜送使者如親見之敬也康子饋藥拜而受之曰丘未達不敢嘗范氏曰凡賜食必嘗以拜藥未達則不敢嘗受而不飲則虛人之賜故告之如此然則可飲而飲不可飲而不飲皆在其中矣楊氏曰大夫有賜拜而受之禮也未逹不敢嘗謹疾也必告之直也此一節記孔子與人交之誠意朋友之饋雖車馬非祭肉不拜朋友有通財之義故雖車馬之重不拜祭肉則拜者敬其祖考同於已親也並論語陽貨欲見孔子而惡無禮大夫有賜於士不得受於其家則往拜其門陽貨瞰孔子之亡也而饋孔子蒸豚孔子亦瞰其亡也而往拜之當是時陽貨先豈得不見欲見孔子欲召孔子來見已也惡無禮畏人以已為無禮也受於其家對使人拜受於家也其門大夫之門也瞰窺也陽貨於魯為大夫孔子為士故以此物及其不在而饋之欲其來拜而見之也先謂先來加禮也孟子吳公子札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉大帶也吳地貴縞鄭地貴紵故各獻已所貴示損已而不為彼貨利襄二十九年左氏傳子思在魯使以書如衛問子上子上北面再拜受書伏讀然後與使者宴遂為復書返中庭北面再拜以授使者既受書然後退使者還魯問子思曰吾子堂上南面立授臣書事畢送臣子上中庭拜授臣書而不送何也子思曰拜而不送敬也使而送之賓也孔叢子雜訓陳臻問曰前日於齊王餽兼金一百而不受於宋餽七十鎰而受於薛餽五十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣陳臻孟子弟子兼金好金也其價兼倍於常者一百百鎰也孟子曰皆是也皆適於義也當在宋也豫將有逺行行者必以贐辭曰餽贐豫何為不受贐送行者之禮也當在薛也子有戒心辭曰聞戒故為兵餽之豫何為不受時人有欲害孟子者孟子設兵以戒備之薛君以金餽為孟子兵備辭曰聞子之有戒心也若於齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎無逺行戒心之事是未有所處也取猶致也於尹氏曰君子之辭受取豫唯當理而已孟子國君不乘竒車出入必正也竒車獵衣之屬車上不廣咳為若自矜廣猶𢎞也不妄指為惑衆立視五巂立平視也巂猶規也謂輪轉之度巂或為蕊式視馬尾小俯顧不過轂為掩在後國中以䇿彗恤勿驅塵不出軌入國不馳彗竹帚恤勿搔摩也韋朱子曰䇿彗疑謂䇿之彗若今時鞭末帶耳曲禮鸞設於鑣和設於軾馬動而鸞鳴鸞鳴而和應行之節也鸞和皆鈴也韓詩內傳坐乘以經坐之容手撫式視五旅欲無顧顧不過轂小禮動中禮式大禮下坐車之容也立乘以經立之容右持綏而左臂詘存劍之緯欲無顧顧不過轂小禮據中禮式大禮下立車之容也禮介者不拜兵車不式不顧不言反抑式以應武容也兵車之容也賈誼容經國君下齊牛式宗廟大夫士下公門式路馬皆廣敬也疏曰案齊右職注云王見牲則拱而式又引曲禮曰國君下宗廟式齊牛與此文異熊氏云此文誤當以周禮注為正君子式黃髮敬老也下卿位尊賢也卿位卿之朝位也君出過之而上車入未至而下車入國不馳愛人也馳善藺人也入里必式不誣十室並曲禮公行下衆公諸侯也下衆不敢誣衆也禮國君下卿位遇衆則式禮之也國語周語國君撫式大夫下之大夫撫式士下之撫猶據也據式小俯崇敬也乘車必正立曲禮乘二車則式佐車則否二車佐車皆副車也朝祀之副曰二戎獵之副曰佐魯莊公敗于乾時公喪戎路傳乘而歸少儀婦人不立乘異於男子曲禮右乘車之容升車必正立執綏綏挽以上車之索也范氏曰正立執綏則心體無不正而誠意肅恭矣蓋君子莊敬無所不在升車則見於此也車中不內顧不疾言不親指內顧回視也禮曰顧不過轂三者皆失容且惑人此一節記孔子升車之容凶服者式之式負版者式車前橫木有所敬則俯而慿之負版持邦國圖籍者式此二者哀有喪重民數也人惟萬物之靈而王者之所天也故周禮獻民數于王王拜受之况其下者敢不敬乎並論語君車將駕則僕執䇿立於馬前監駕且為馬行已駕僕展軨展軨具視效駕白已駕奮衣由右上取二綏奮振去塵也二副也跪乘未敢立敬也執䇿分轡驅之五步而立調試之君出就車則僕并轡授綏車上僕所主左右攘辟謂羣臣陪位侍駕者攘卻也或曰攘古讓字車驅而騶至於大門君撫僕之手而顧命車右就車門閭溝渠必步車右勇力之士備制非常者君行則陪乘君式則下步行凡僕人之禮必授人綏若僕者降等則受不然則否若僕者降等則撫僕之手不然則自下拘之撫小止之謙也自下拘之由僕手下取之也僕與已同爵則不受僕御婦人則進左手後右手逺嫌御國君則進右手後左手而俯敬也曲禮執君之乘車則坐執執轡謂守之也君不在車坐示不行也僕者右帶劍負良綏申之面拖諸幦面前也幦覆苓也良綏君綏也負之由左肩上入右掖下申之於前覆苓上也以散綏升執轡然後步步行也僕於君子君子升下則授綏始乘則式君子下行然後還立還車而立以俟其去酌尸之僕如君之僕當其為尸則尊其在車則左執轡右受爵祭左右軌范乃飲周禮大御祭兩軹祭軌乃飲軌與軹於車同轊頭也軌與范聲同謂軾前也並少儀右僕御之禮禮從宜事不可常也晉士丐帥帥侵齊聞齊侯卒乃還春秋善之使從俗亦事不可常也牲幣之屬則當從俗所出禮器曰天不生地不飬君子不以為禮鬼神不饗君子行禮不求變俗求猶務也不務變其故重本也謂去其先祖之國居他國祭祀之禮居喪之服哭泣之位皆如其國之故謹修其法而審行之其法謂其先祖之制度若夏殷去國三世爵祿有列於朝出入有詔於國三世自祖至孫踰久可以變故俗而猶不變者爵祿有列於朝謂君不絶其祖祀復立其族若臧紇奔邾立臧為矣詔告也謂與卿大夫吉凶往來相赴告若兄弟宗族猶存則反告於宗後謂無列無詔者反告亦謂吉凶也宗後宗子也去國三世爵祿無列於朝出入無詔於國唯興之日從新國之法以故國與已無恩興謂起為卿大夫貧者不以貨財為禮老者不以筋力為禮禮許儉不非無也年五十始杖八十拜君命一坐再至並曲禮右從宜從俗將適舍求母固謂行而就人館固猶常也求主人物不可以舊常致時乏無周禮土訓辨地物原其生以詔地求其類將上堂聲必揚驚內人也户外有二屨言聞則入言不聞則不入將入户視必下入户奉扃視瞻母回不干掩人之私也奉扃敬也户開亦開户闔亦闔不以後來變先有後入者闔而勿遂示不拒人離坐離立毋往參焉離立者不出中閒為于人私也離兩也並曲禮登席不由前為躐席升必由下也徒坐不盡席尺示無所求於前不忘謙也讀書食則齊豆去席尺讀書聲當聞尊者食為汚席也玉藻執虛如執盈入虛如有人重慎凡祭於室中堂上無跣燕則有之祭不跣者主敬也燕則有跣為歡也天子諸侯祭有坐尸於堂之禮祭所尊在室燕所尊在堂將燕降說屨乃升堂並少儀登城不指城上不呼為惑人當食不歎食或以樂非歎所臨樂不歎客車不入大門謙也犬馬不上於堂非摯幣也並曲禮右雜記孟子既娶將入私室其婦袒而在內孟子不悅遂去不入婦辭孟母而求去曰妾聞夫婦之道私室不與焉今者妾竊墮在室而夫子見妾勃然不悅是客妾也婦人之義蓋不客宿請歸父母孟母召孟子而謂之曰夫禮將入門問孰存所以致敬也將上堂聲必揚所以戒人也將入户視必下恐見人過也今子不察於禮而責禮於人不亦逺乎孟子謝遂留其婦君子謂孟母知禮而明於姑母之道列女傳禮書綱目卷七十六
