body:
  text: 禮書綱目卷一婺源江永撰士冠禮嘉禮一經鄭氏目録云童子任職居士位年二十而冠主人𤣥冠朝服則是仕于諸侯天子之士朝服皮辨素積古者四民世事士之子恆為士冠于五禮屬嘉禮士冠禮筮於廟門筮者以蓍問日吉凶於易也冠必筮日于廟門者重以成人之禮成子孫也廟謂禰廟不于堂者嫌蓍之靈由廟神主人𤣥冠朝服緇帶素韠即位於門東西面主人將冠者之父兄也𤣥冠委貌也朝服者十五升布衣而素裳也衣不言色者衣與冠同也筮必朝服尊蓍龜之道也緇帶黑繒帶也士帶博二寸再繚四寸屈垂三尺素韠白韋韠也長三尺上廣一尺下廣二尺其頸五寸肩革帶博二寸天子與其臣𤣥冕以視朔皮辨以日視朝諸侯與其臣皮辨以視朔朝服以日視朝凡染黑五入為緅七入為緇𤣥則六入與有司如主人服即位於西方東面北上有司羣吏有事者謂主人之吏所自辟除府史以下也今時卒吏及假吏皆是也筮與席所卦者具饌於西孰筮所以問吉凶謂蓍也所卦者所以畫地記爻易曰六畫而成卦饌陳也具俱也西孰門外西堂也布席於門中闑西閾外西面闑門橛也閾閫也古文闑為槷閾為蹙筮人執策抽上韇兼執之進受命於主人筮人有司主三易者也韇藏策之器也今時藏弓矢者謂之韇凡也兼并也進前也自西方而前受命者當知所筮也宰自右少退贊命宰有司主政教者也自由也贊佐也命告也佐主人告所以筮也少儀曰贊幣自左詔辭自右筮人許諾右還即席坐西面卦者在左即就也東面受命右還北行就席卦者有司主畫地識爻者也卒筮書卦執以示主人卒已也書卦者筮人以方寫所得之卦也主人受視反之反還也筮人還東面旅占卒進告吉旅衆也還與其屬共占之古文旅作臚若不吉則筮逺日如初儀逺日旬之外徹筮席徹去也斂也宗人告事畢宗人有司主禮者也右筮日記凡卜筮日旬之外曰逺某日旬之內曰近某日旬十日也吉事先近日吉事祭祀冠娶之屬也曲禮主人戒賓賓禮辭許戒警也告也賓主人之僚友古者有吉事則樂與賢者歡成之有凶事則欲與賢者哀戚之今將冠子故就告僚友使來禮辭一辭而許也再辭而許曰固辭三辭曰終辭不許也主人再拜賓答拜主人退賓拜送退去也歸也右戒賓戒賓曰某有子某將加布於其首願吾子之教之也吾子相親之辭吾我也子男子之美稱古文某為謀賓對曰某不敏恐不能共事以病吾子敢辭病猶辱也古文病為秉主人曰某猶願吾子之終教之也賓對曰吾子重有命某敢不從敢不從許之辭之諸辭本總見經後舊例悉分附本章左以從簡便今仍之前期三日筮賓如求日之儀前期三日空二日也筮賓筮其可使冠子者賢者恆吉冠義曰古者冠禮筮日筮賓所以敬冠事敬冠事所以重禮重禮所以為國本右筮賓乃宿賓賓如主人服出門左西靣再拜主人東靣答拜宿進也宿者必先戒戒不必宿其不宿者為衆賓或悉來或否主人朝服乃宿賓賓許主人再拜賓答拜主人退賓拜送乃宿賓者親相見致其辭宿贊冠者一人亦如之贊冠者佐賓為冠事者謂賓若他官之屬中士若下士也宿之以筮賓之明日右宿賓宿曰某將加布於某之首吾子將蒞之敢宿賓對曰某敢不夙興蒞臨也今文無對厥明夕為期於廟門之外主人立於門東兄弟在其南少退西靣北上有司皆如宿服立於西方東靣北上厥其也宿服朝服擯者請期宰告曰質明行事擯者有司佐禮者在主人曰擯在客曰介質正也宰告曰旦日正明行冠事告兄弟及有司擯者告也告事畢宗人告也擯者告期於賓之家右為期夙興設洗直於東榮南北以堂深水在洗東夙早也興起也洗承盥洗者棄水器也士用鐡榮屋翼也周制自卿大夫以下其室為夏屋水器尊卑皆用金罍及大小異陳服於房中西墉下東領北上墉墻爵辨服纁裳純衣緇帶韎韐此與君祭之服雜記曰士辨而祭于公爵辨者冕之次其色赤而微黑如爵頭然或謂之緅其布三十升纁裳淺綘裳凡染綘一入謂之縓再入謂之頳三入謂之纁朱則四入與純衣絲衣也餘衣皆用布惟冕與爵辨服用絲耳先裳後衣者欲令下近緇明衣與帶同色韎韐縕紱也士縕紱而幽衡合韋為之士染以茅搜因以名焉今齊人名蒨為韎韐韍之制似韠冠辨者不與衣陳而言於上以冠名服耳今文纁皆作熏字皮辨服素積緇帶素韠此與君視朔之服皮辨者以白鹿皮為冠象上古也積猶辟也以素為裳辟戲其要中皮辨之衣用布十五升其色象焉𤣥端𤣥裳黃裳雜裳可也緇帶爵韠此莫夕於朝之服𤣥端即朝服之衣易其裳耳上士𤣥裳中士黃裳下士雜裳雜裳者前𤣥後黃易曰夫𤣥黃者天地之雜也天𤣥而地黃士皆爵韋為韠其爵同不以𤣥冠名服者是為緇布冠陳之玉藻曰韠君朱大夫素士爵韋緇布冠缺項青組纓屬於缺緇纚廣終幅長六尺皮辨笄爵辨笄緇組紘纁邉同篋缺讀如有頍者辨之頍緇布冠無笄者著頍圍髮際結項中隅為四綴以固冠也項中有􅕒亦由固頍為之耳今未冠笄者著卷幘頍象之所生也滕薛名蔮為頍屬猶著纚今之幘梁也終充也纚一幅長六尺足以韜髮而結之矣笄今之簮有笄者屈組為紘垂為飾無笄者纓而結其絛纁邉組側赤也同篋謂此以上凡六物隋方曰篋櫛實於簞簞笥也蒲筵二在南筵席也側尊一甒醴在服北有篚實勺觶角柶脯醢南上側猶特也無偶曰側置酒曰尊側者無𤣥酒服北者纁裳北也篚竹器如笭者勺尊升所以㪺酒也爵三升曰觶柶狀如匕以角為之者欲滑也南上者篚次尊籩豆次篚古文甒作廡爵辨皮辨緇布冠各一匴執以待於西坫南南靣東上賓升則東靣爵辨者制如冕黑色但無繅耳周禮王之皮辨㑹五采玉璂象邸玉笄諸侯及孤卿大夫之冕皮辨各以其等為之則士之皮辨又無玉象邸飾緇布冠今小吏冠其遺象也匴竹器名今之冠箱也執之者有司也坫在堂角古文匴為纂坫為䄡屨夏用葛𤣥端黑屨青絇繶純純博寸屨者順裳色𤣥端黑屨以𤣥裳為正也絇之言拘也以為行戒狀如刀衣鼻在屨頭繶縫中紃也純緣也三者皆青博廣也素積白屨以魁柎之緇絇繶純純博寸魁蜃蛤柎注也爵辨纁屨黑絇繶純純博寸爵辨屨以黑為飾爵辨尊其屨飾以繢次冬皮屨可也屨繐屨繐屨喪屨也縷不灰治曰繐按此三屨本在辭後記前今從舊移附此加圈以隔之右陳器服主人𤣥端爵韠立於阼階下直東序西靣𤣥端士入廟之服也阼猶酢也東階所以答酢賓客也堂東西墻謂之序兄弟畢袗𤣥立於洗東西靣北上兄弟主人親戚也畢猶盡也袗同也𤣥者𤣥衣𤣥裳也緇帶韠位在洗東退于主人不爵韠者降于主人也古文袗為均也擯者𤣥端負東孰東孰門內東堂負之北靣將冠者采衣紒在房中南靣采衣未冠者所服玉藻曰童子緇布衣錦緣錦紳并紐錦束髮皆朱錦也紒結髮古文紒為結右即位賓如主人服贊者𤣥端從之立於外門之外外門大門外擯者告告者出請入告主人迎出門左西靣再拜賓答拜左東也出以東為左入以東為右主人揖贊者與賔揖先入贊者賤揖之而已又與賓揖先入道之贊者隨賓每曲揖周左宗廟入外門將東曲揖直廟將北曲又揖至於廟門揖入三揖至於階三讓入門將右曲揖將北曲揖當碑揖主人升立於序端西靣賓西序東靣主人賓俱升立相鄉贊者盥於洗西升立於房中西靣南上盥於洗西由賓階升也立于房中近其事也南上尊于主人之贊者古文盥皆作洗右迎賓主人之贊者筵於東序少北西靣主人之贊者其屬中士若下士筵布席也東序主人位也適子冠于阼少北辟主人將冠者出房南靣南靣立于房外之西待賓命贊者奠纚笄櫛於筵南端贊者賓之贊冠者也奠停也古人櫛為節賓揖將冠者將冠者即筵坐贊者坐櫛設纚即就設施賓降主人降賓辭主人對主人降為賓將盥不敢安位也辭對之辭未聞賓盥卒一揖一讓升主人升復初位揖讓皆一者降于初古文一皆作一賓筵前坐正纚興降西階一等執冠者升一等東靣受賓正纚者將加冠宜親之興起也降下也下一等升一等則中等相授冠緇布冠也賓右手執項左手執前進容乃祝坐如初乃冠興復位贊者卒進容者行翔而前鶬焉至則立祝坐如初坐筵前興起也復位西席東面卒謂設缺項結纓也冠者興賔揖之適房服𤣥端爵韠出房南面復出房南面者一加禮成觀衆以容體右始加始加祝曰令月吉日始加元服令吉皆善也元首也棄爾幼志順爾成德夀考惟祺介爾景福爾汝也既冠為成德祺祥也介景皆大也因冠而戒且勸之女如是則有壽考之祥大女之大福也賓揖之即筵坐櫛設笄賓盥正纚如初降二等受皮辨右執項左執前進祝加之如初復位贊者卒紘如初為不見者言也卒紘謂繫屬之興賓揖之適房服素積素韠容出房南靣容者再加彌成其儀益繁右再加再加曰吉月令辰乃申爾服辰子丑也申重也敬爾威儀淑慎爾德眉壽萬年永受胡福胡猶遐也逺也逺無窮古文眉作糜賓降三等受爵辨加之服纁裳韎韐其他如加皮辨之儀降三等下至地他謂卒紘容出徹皮辨冠櫛筵入於房徹者贊冠者主人之贊者為之右三加三加曰以嵗之正以月之令咸加爾服正猶善也咸皆也皆加女之三服謂緇布冠皮辨爵辨也兄弟具在以成厥德厥其黃耉無疆受天之慶黃黃髮也耉凍梨也皆壽徴也疆竟筵於户西南靣筵主人之贊者户西室户西贊者洗於房中側酌醴加柶覆之靣葉洗盥而洗爵者昏禮曰房中之洗在北堂直室東隅篚在洗東北靣盥側酌者言無為之薦者面前也葉柶大端贊酌者賓尊不入房古文葉為擖賓揖冠者就筵筵西南靣賓受醴於户東加柶靣枋筵前北靣户東室户東今文枋為柄冠者筵西拜受觶賓東靣答拜筵西拜南面拜也賓還答拜於西序之位東靣者明成人與為禮異于答主人薦脯醢贊冠者也冠者即筵坐左執觶右祭脯醢以柶祭醴二興筵末坐啐醴捷柶興降筵坐奠觶拜執觶興賓答拜捷柶扱柶于醴中其拜皆如初古文啐為呼右醴冠者醴辭曰甘醴惟厚嘉薦令芳嘉善也善薦謂脯醢芳香也拜受祭之以定爾祥承天之休壽考不忘休美也不忘長有令名冠者奠觶於薦東降筵北靣坐取脯降自西階適東壁北靣見於母薦東薦左凡奠爵將舉者于右不舉者于左適東壁者出闈門也時母在闈門之外婦人入廟由闈門母拜受子拜送母又拜婦人于丈夫雖其子猶俠拜右冠者見母賓降直西序東靣主人降復初位初位初至階讓升之位冠者立於西階東南靣賓字之冠者對對應也其辭未聞右字冠者字辭曰禮儀既備令月吉日昭告爾字爰字孔嘉昭明也爰于也孔甚也髦士攸宜宜之於假髦俊也攸所也于猶為也假大也宜之是為大矣永受保之曰伯某甫仲叔季唯其所當伯仲叔季長幼之稱甫是丈夫之美稱孔子為尼甫周大夫有嘉甫宋大夫有孔甫是其類甫字或作父記幼名冠字五十以伯仲死諡周道也檀弓賓出主人送於廟門外不出外門將醴之請醴賓賓禮辭許賓就次此醴當作禮禮賓者欲謝其勤勞也次門外更衣處也以帷幕簟席為之右賓出就次冠者見於兄弟兄弟再拜冠者答拜見贊者西靣拜亦如之見贊者西面拜則見兄弟東靣拜贊者後賓出入見姑姊如見母入入寢門也廟在寢門之外如見母者亦北靣姑姊亦俠拜也不見妹妹卑右冠者見兄弟贊者及姑姊乃易服服𤣥冠𤣥端爵韠奠摰見於君遂以摯見於卿大夫鄉先生易服不朝服者非朝事也摯雉也鄉先生鄉中老人為卿大夫致仕者右奠摯於君及卿大夫鄉先生晉趙文子冠文子趙盾之孫趙朔之子趙武也冠謂以士禮始冠見欒武子武子曰美哉武子欒書也禮既冠奠摯于君遂以贄見于卿大夫先生美哉美成人也昔吾逮事莊主莊莊子朔之諡也大夫稱主趙朔嘗將下軍欒書佐之華則榮矣實之不知請務實乎榮者有色貌實之不知華而不實也見范文子文子范變文子曰而今可以戒矣夫賢者寵至而益戒不足者為寵驕知不足者得寵而驕故興王賞諫臣逸王罰之先王疾是驕也見韓獻子獻子晉卿韓厥獻子曰戒之此謂成人成人在始與善始與善善進善不善蔑由至矣蔑無始與不善不善進不善善亦蔑由至矣如草木之産也各以其物物類也人之有冠猶宫室之有牆屋也糞除而已又何加焉糞除喻自修潔見智武子武子曰吾子勉之武子晉卿荀首之子荀罃成子之文宣子之忠其可忘乎吾子勉之有宣子之忠而納之以成子之文事君必濟濟成也見張老而語之張老晉大夫張孟張老曰善矣從欒伯之言可以滋滋益也范叔之教可以大韓子之戒可以成物備矣志在子物事也人事已偹能行與否在子之志智子之道善矣道訓也是先主覆露子也先主謂成宣露潤也國語晉語乃醴賓以一獻之禮一獻者主人獻賓而已即燕無亞獻者獻酢酬賓主人各兩爵而禮成特牲少牢饋食之禮獻尸此其類也士禮一獻卿大夫三獻賔醴不用柶者泲其醴內則曰飲重醴稻醴清糟黍醴清糟粱醴清糟凡醴事質者用糟文者用清主人酬賓束帛儷皮飲賓客而從之以財貨曰酬所以申暢厚意束帛十端也儷皮兩鹿皮也古文儷為離贊者皆與贊冠者為介贊者衆賓也皆與亦飲酒為衆賓介賓之輔以贊為之尊之飲酒之禮賢者為賓其次為介賔出主人送於外門外再拜歸賔爼一獻之禮有薦有俎其牲未聞使人歸諸賓家也右醴賓此章以上正禮已具以下皆禮之變若不醴則醮用酒若不醴謂國有舊俗可行聖人用焉不改者也曲禮曰君子行禮不求變俗祭祀之禮居喪之服哭泣之位皆如其國之故謹修其法而審行之是也酌而無酬酢曰醮醴亦當為禮尊於房户之間兩甒有禁𤣥酒在西加勺南枋房戶間者房西室戶東也禁承尊之器也名之為禁者因為酒戒也𤣥酒新水也雖今不用猶設之不忘古也洗有篚在西南順洗庭洗當東榮南北以堂深篚亦以盛勺觶陳于洗西南順北為上也始加醮用脯醢賓降取爵於篚辭降如初卒洗升酌始加者言一加一醮也加冠於東序醮之於戶西同耳始醮亦薦脯醢賓降者爵在庭酒在堂將自酌也辭降如初如將冠時降盥辭主人降也凡薦出自東房冠者拜受賓答拜如初贊者筵於戶西賓升揖冠者就筵乃酌冠者南面拜受賓授爵東面答拜如醴禮也於賓答拜贊者則亦薦之冠者升筵坐左執爵右祭脯醢祭酒興筵末坐啐酒降筵拜賓答拜冠者奠爵於薦東立於筵西冠者立俟賓命賓揖之則就東序之筵徹薦爵筵尊不徹徹薦與爵者辟後加也不徹筵尊三加可相因由便也加皮辨如初儀再醮攝酒其他皆如初攝猶整也整酒謂撓之今文攝為聶加爵辨如初儀三醮有乾肉折爼嚌之其他如初乾肉牲體之脯也折其體以為爼嚌嘗之北面取脯見於母右醮醮辭曰㫖酒既清嘉薦亶時亶誠也古文亶為疸始加元服兄弟具來孝友時格永乃保之善父母為孝善兄弟為友時是也格至也永長也保安也行此乃能保之今文格為嘏凡醮者不祝再醮曰㫖酒既湑嘉薦伊脯湑清也伊惟也乃申爾服禮儀有序祭此嘉爵承天之祜祜福也三醮曰㫖酒令芳籩豆有楚㫖美也椘陳列之貌咸加爾服肴升折爼肴升折爼亦謂豚承天之慶受福無疆若殺則特豚載合升離肺實於鼎設扄冪特豚一豚也凡牲皆用左胖煮于鑊曰亨在鼎曰升在爼曰載載合升者明亨與載皆合左右胖離割也割肺者使可祭也可嚌也今文扄為鉉古文冪為密始醮如初亦薦脯醢徹薦爵筵尊不徹矣再醮兩豆葵菹螺醢兩籩栗脯螺醢螔蝓醢今文螺為蝸三醮攝酒如再醮加爼嚌之皆如初嚌肺攝酒如再醮則再醮亦攝之矣加爼嚌之嚌當為祭字之誤也祭爼如初如祭脯醢卒醮取籩脯以降如初右殺牲醮若孤子則父兄戒宿父兄諸父諸兄冠之日主人紒而迎賓拜揖讓立於序端皆如冠主禮於阼冠主冠者親父若宗兄也古文紒為結今文禮作醴凡拜北面於阼階上賓亦北面於西階上答拜若殺則舉鼎陳於門外直東孰北面孤子得申禮盛之父在有鼎不陳於門外右孤子冠記父沒而冠則已冠掃地而祭於禰已祭而見伯父叔父而后饗冠者饗謂禮之見曾子問詳冠昏記若庶子則冠於房外南面遂醮焉房外謂尊東也不於阼階非代也不醮於客位成而不尊右庶子冠冠者母不在則使人受脯於西階下右母不在冠義嘉禮二禮之所尊尊其義也言禮所以尊尊其有義也失其義陳其數祝史之事也故其數可陳也其義難知也知其義而敬守之天子之所以治天下也言政之要盡於禮之義郊特牲凡人之所以為人者禮義也禮義之始在於正容體齊顔色順辭令言人為禮以此三者始也容體正顔色齊辭令順而后禮義備以正君臣親父子和長幼言三始既偹乃可求以三行也君臣正父子親長幼和而后禮義立立猶成也故冠而后服備服備而后容體正顔色齊辭令順言服未偹者未可求以三始也童子之服采衣紒故曰冠者禮之始也是故古者聖王重冠古者冠禮筮日筮賓所以敬冠事敬冠事所以重禮重禮所以為國本也國以禮為本故冠於阼以著代也醮於客位三加彌尊加有成也阼謂主人之北也適子冠於阼若不醴則醮用酒於客位敬而成之也戶西為客位庶子冠於房戶外又因醮焉不代父也冠者初加緇布冠次加皮辨次加爵辨每加益尊所以益成也已冠而字之成人之道也字所以相尊也見於母母拜之見於兄弟兄弟拜之成人而與為禮也𤣥冠𤣥端奠摯於君所遂以摯見於鄉大夫鄉先生以成人見也鄉先生同鄉老致仕者服𤣥冠𤣥端異於朝也成人之者將責成人禮焉也將責為人子為人弟為人臣為人少者之禮行焉將責四者之行於人其禮可不重與言責人以大禮者已接之不可以苟故孝弟忠順之行立而后可以為人可以為人而后可以治人也故聖王重禮故曰冠者禮之始也嘉事之重者也是故古者重冠重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也嘉事嘉禮也宗伯掌五禮有吉禮有凶禮有賓禮有軍禮有嘉禮而冠屬嘉禮周禮曰以昏冠之禮親成男女也冠義冠義始冠之緇布之冠也記注始冠三加先加緇布冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也大古唐虞以上緌纓飾未之聞大古質無飾古始冠冠其齊冠白布冠今之喪冠是也不記注太古無飾非時人緌也雜記曰大白緇布之冠緌大白即太古白布冠今喪冠也齊則緇之者鬼神尚幽暗也唐虞以上曰太古也冠而敝之可也記注此重古而冠之耳三代改制齊冠不復用也以白布冠質以為喪冠也適子冠於阼以著代也記注東序少北近主位也醮於客位加有成也每加而有成人之道也成人則益尊醮於客位尊之也記注三加彌尊喻其志也記注始加緇布冠次皮辨次爵辨冠益尊則志益大也冠而字之敬其名也名者質所受于父母冠成人益文故敬之人記注重以未成之時呼之委貌周道也章甫殷道也母追夏后氏之道也或謂委貌為𤣥冠委猶安也言所以安正容貌章明也殷質言以表明丈夫也甫或為父今文為斧毋發聲也追猶堆也夏后氏質以其形名之三冠皆所常服以行道也其制之異同未之聞記注常所服以行道之冠也或謂委貌為𤣥冠也周辨殷冔夏收辨名出於槃槃大也言以自光大也冔名出於幠幠覆也言所以自覆飾也收言所以收斂髮也齊所以服而祭也其制之義未之聞記注齊所服而祭也三王共皮辨素積質不變于記注所不易先代無大夫冠禮而有其昏禮古者五十而后爵何大夫冠禮之有據時有未冠而命為大夫者周之初禮年未五十而有賢才者試以大夫之事猶服士服行士禮二十而冠急成人也五十乃爵重官人也大夫或時改娶有昏禮是也也記注言年五十乃爵為大夫也其有昏禮或改取諸侯之有冠禮夏之末造也造作也自夏初以上諸侯雖父死子繼年未滿五十者亦服士服行士禮五十乃命也至其衰末上下相亂篡弒所由生故作公侯冠禮以正君臣也坊記曰君不與同姓同車與異姓同車不同服示民不嫌也以此坊民民猶得同姓以弒其君冠記注言夏初以上諸侯雖有幼而即位者猶以士禮冠之亦五十乃爵命也至其衰末未成人者多見篡弒乃更即位則爵命之以正君臣而有諸侯之冠禮天子之元子士也天下無生而貴者也元子世子也無生而貴皆由下升著記注儲君副主猶云士也明人有賢行德乃得貴也繼世以立諸侯象賢也象法也為子孫行法先祖之賢故使之繼世也記注賢者子孫恆能法其先祖德行以官爵人德之殺也殺猶衰也德大者爵以大官德小者爵以小官記注言德益厚官益尊也死而諡今也古者生無爵死無諡今謂周衰記之時也古謂殷前士生不為爵死不為諡周制以士為爵死猶不為諡耳下大夫也今記之時死則諡之非也諡之由魯莊公始也周記注古謂殷以前也大夫以上乃謂之爵死有諡非也制爵及命士雖及之猶不諡耳今記時死則諡之禮也特士冠記郊牲同禮書綱目卷一
